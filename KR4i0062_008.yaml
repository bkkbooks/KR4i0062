body:
  text: 宋詩紀事卷八錢塘厲鶚撰杜衍衍字世昌越州山陰人大中祥符元年進士仁宗朝拜同中書門下平章事罷知兗州以太子少師致仕封祁國公卒贈司徒兼侍中諡正獻石林詩話杜正獻公自少清羸若不勝衣年過四十鬢髮即盡白雖立朝孤峻凛然不可屈而不為竒節危行歐公素出其門公謝事居家歐適來為守相與甚歡公不甚飲酒唯賦詩酬唱是時年八十然憂國之意猶慷慨不巳每見于色歐和詩有貌先年老因憂國事與心違始乞身公得之大喜常自諷誦當時以謂不惟曲盡公志雖其形貌亦在模寫中也蔡寬夫詩史杜正獻公以直諒端方名天下平生踐履未有一事少出禮法年過七十謝事始學草書遂盡其妙今使人每見之其英特爽秀無所降屈之氣猶可想見林下書懷從政區區到白頭一生寧肯顧恩讐雙鳧乘雁常深愧野馬黃羊亦過憂豈是林泉堪佚老只緣蒲柳不禁秋始終幸會承平日樂聖唯能擊壤謳皇朝類苑野馬黃羊乃張説傳所謂吾肉非黃羊必不畏喫血非野馬必不畏刺是也幽居即事寂寂復寂寂告老間居日徑草高於人林鳥熟如客黃卷不釋手清風常滿室內顧平生心無過此時適宋文鑑睢陽五老圖并序時祁公年八十夫蹈榮名而保終吉都貴勢而躋遐耉白首一節人生所難今致政官師相國杜公雅度敏識圭璋巖廟清德令望龜準當世功成自引得謝君門視所難得者則安享之謂所難行者則恬居之燕申睢陽與賔客太原王公故衛尉河東畢卿兵部沛國朱公駕部始平馮公咸以耆年挂冠優遊鄉梓暇日宴集為五老會賦詩酬唱怡然相得宋人形於繪事以紀其盛昔唐白樂天居洛陽為九老會於今圖識相傳以為勝事距兹數百載無能紹者以今況昔則休烈巨美過之明逸遊公之門久矣以鄉閭世契倍厚常品今假守留鑰日登翹館因得圖像占述序引以代鄉校詠謠之萬一至和丙申中秋日錢明逸序五人四百有餘歲俱稱分曹與挂冠天地至仁難補報林泉幽致許盤桓花朝月夕隨時樂雪鬢霜髯滿座寒若也睢陽為故事何妨列向畫圖看事文類聚前集澠水燕談慶歷末祁公告老退居南京與太子賔客致仕王渙光祿卿致仕畢世長兵部郎分司朱貫尚書郎致仕馮平為五老會吟醉相勸士大夫高之祁公以故相耆德尤為天下傾慕兵部詩云九老且無元老貴莫將西洛一般看五人年皆八十餘康寧爽健相得甚歡故祁公詩云五人四百有餘歲俱稱分曹與挂冠而畢年最髙時九十餘故其詩云非才忝預最高年是時歐文忠留守睢陽而歎慕借其詩觀之用次韻卒章云聞説優逰多唱和新詩何惜借傳看和孫圭祕丞説章草書老來楷法不如初試向間齋習草書下筆何曽見飛動雕章早巳過吹噓伯英比聖功難到懷素稱狂力有餘若謂伊余堪繼踵只應緣木可求魚苕溪漁隱叢話睢水卜居無似老且病惟恐歸田遲一旦得引年九天還聽卑為霑二品祿俾盡百年期恩深淪骨髓感極橫涕洟始營菟裘地同向睢水湄城隅最窮僻匠者寧求竒卜築悉由已軒牖亦隨宜外以庇風雨內以安妻兒燕雀莫羣噪鷦鷯才一枝因念古聖賢名為千古垂何嘗廣居室儉為後人師亞聖樂簞食寢丘無立錐文終防世奪景相恥家為文園四壁立鄭公小殿移伊余具員者適會承平時無術毗萬務無才抗四夷為郡亦齪齪勞心徒孜孜保身亦天幸拊已宜自知開卷顔間厚復懼來者嗤朂哉知止足清白猶可追合璧事類别集蓮花鑿破蒼苔作小池芰荷分得緑差差曉來一朵煙波上似畫真妃出浴時後村千家詩鄉有好事者出君謨行草八分書數幅中有梅聖俞詩一首因成拙句以識二美莆田筆健與文豪尤愛南山縣詠髙欲使英辭長潤石每逢佳句即揮毫清如韶濩諧音律逸似鸞皇振羽毛羲獻有靈應悵望當時不見此風騷瀛奎律髓雨中荷花翠蓋佳人臨水立檀粉不勻香汗濕一陳風來碧浪翻真珠零落難收拾少室山房續筆叢寶林寺中懷無絆外緣間深掩禪扉客到難勝景可曽飛錫去好山多秖捲簾看晝升講座天花落夜步吟軒海月殘今日逢師堪論道歸心愁思一時寬越詠題懷素自題卷後狂僧草聖繼張顛卷後兼題大歷年堪與儒門為至寶武功家世久相傳逺蒙運使度支以資政范公所寄黃素小字韓文公伯夷頌請許昌文公淮西富公題詩於後才翁復綴雅什兼寄長安晏公公亦有作衍久兹休退人事僅廢不意雅故未移悉以副本為貺俾愚繼之斷此怔忪既感且愧輒爾率強成拙句奉呈敢言亦驥之乘聊為續貂之比耳衍上希文健筆妙韓文文為首陽山下人寧止一言旌義士欲教萬古勸忠臣頌聲益與英聲遠事迹還隨墨迹新當世宗工復題詠尤宜率爾盡書紳以上式古堂書考畢世長世長天聖中以虞部郎中知台州司農卿致仕睢陽五老會詩年九十四歲非才最忝預髙年分務由來近挂冠敢造巨賢論軌躅幸依都府得盤桓篇章捧和慙風雅眷待優隆荷歲寒儻許衰容參盛列欲憑繪事永傳看事文類聚前集馮平平駕部郎中致仕睢陽五老會詩年八十七歲詔恩分務許優間肯借留都獬豸冠名宦儻來空擾攘丘園歸去且盤桓醉遊春圃煙霞暖吟聽秋潭水石寒退傅況兼為隱伴紅塵那復舉頭看事文類聚前集王渙渙禮部侍郎致仕睢陽五老會詩年九十歲分曹歸政養耆年李下何由更整冠賢相賦詩同笑傲聖君優詔許盤桓龎眉老叟俱稱壽凌雪喬松豈畏寒屈指五人齊五福鄉人須作二疏看事文類聚前集朱貫貫兵部郎中致仕各還朝政遇堯年鶴髮俱宜預道冠乍到林泉能放曠全拋簪紱尚盤桓君恩至重如天覆相座時親畏地寒九老且無元老貴莫將西洛一般看事文類聚前集曹修古修古字述之建安人大中祥符元年進士官監察御史天聖初抗疏忤旨出知興化軍卒贈右諫議大夫池上荷葉罩芙蓉員香映嫩紅佳人南陌上翠蓋立春風青箱雜記題清心堂在興化軍治詩刻于壁天府鞠囚三節日霜臺待漏五更時薰風一覺清涼睡莫問浮名髙與卑興化府志曹修睦修睦修古弟大中祥符元年進士官司封員外郎分司南京致仕贈仁曉禪師竹簟翠筠織簟寄禪齋半夜秋從枕底來若也此時人問道涼天捲卻暑天開青箱雜記葛宫宫字公雅丹陽人大中祥符元年進士仕至工部侍郎立方之曽伯祖有青暘集句翩翻燕子朱門靜狼藉梨花小院間韻語陽秋蕭貫貫字貫之臨江軍新喻人大中祥符二年進士第二纍官刑部員外郎知饒州遷兵部員外郎宫中曉寒歌十二嶤關隱空緑獸猊呀酒椒壁馥渴烏涓涓不相續轆轤欲轉霏紅玉百刻香殘隕蓮燭五龍吐水漫寒漿紅綃佩魚無左璫兩兩懸足瞻扶桑紅萍半規出波面回首觚稜九霞絢鳴鞘逺從天上來大劒髙冠滿前殿宋史文苑傳貫初感疾夢緑衣中人召至帝所賦禁中曉寒歌詞語清麗人以比唐李賀豫章詩話蕭貫少時夢至一宫殿羣女如神仙一人授紙云此衍波箋煩賦曉寒歌貫援筆立成云云仙曰子詩甚有竒語異日必貴程琳琳字天球博野人祥符四年進士舉服勤詞學科慶歷中官至鎮安軍節度使同平章事卒贈太師中書令諡文簡海棠海外移根灼灼竒風情間麗比應稀晶熒寶萼排珠琲旖旎芳叢蔟繡帷繁極只愁隨暮雨飄多何計駐春暉浣花溪上年年意露濕煙霞拂客衣海棠譜司馬池池字和中陜州夏縣人舉進士歷官至天章閣待制知河中府徙同州又徙杭州晉州行色冷於陂水淡於秋逺陌初窮到渡頭賴是丹青不能畫畫成應遣一生愁中都志行色詩石刻在故安豐縣張文潛作記云待制司馬公嘗監安豐酒稅作此詩其孫宏知縣事刻于石梅聖俞嘗言詩之工者寫難狀之景如在目前含不盡之意見于言外此詩有焉燕肅肅字穆之青州益都人第進士纍遷龍圖閣待制知鄧州以禮部侍郎致仕宋史本傳肅喜為詩能畫入妙品嘗造指南車記里鼓二車及敧器以獻又上蓮花漏法在明州為海潮圖著海潮論二篇繫犀帶遷龍圖閣直青箱雜記本朝之制待制止學士始賜金帶燕公為待制十年不遷乃作陳情詩上時宰曰鬢邊今日白腰下幾時黃時宰憐之未幾遷直學士僻居茅齋城市遠草徑接漁村白日偶無客青山長對門藥爐留火暖花塢帶煙昏靜坐搜新句冥心傍酒樽宋文鑑贈惠山慶上人陸羽泉邊倚瘦筇參差臺殿映疏松五天講去春騎虎一鉢擎來晝伏龍像閣磬敲清有韻蘚庭雪過靜無蹤相逢多説遊方話知老靈山第幾峯無錫縣志蔣堂堂字希魯宜興人大中祥符五年進士仁宗時歷官江淮發運使禮部侍郎嘗兩守吳郡後謝事因家焉自號遂翁有吳門集贈陳虞卿寵秩拜春坊歸休識慮長掃門卑魏勃設醴謝元王一水蓴鱸國羣山橘柚鄉喜君添老社煙駕尚徜徉中吳紀聞陳之竒字虞卿鄉人以其有賢德故以君子稱之雖閭巷小兒亦知愛敬有爭訟久不決者跨蹇驢至其家以大義感動之皆為之革心自挂冠後間居十八年熙寧初卒葬花山王岐公為作志題之曰陳君子墓銘始公之謝事也蔣堂侍郎語人曰舉天下皆知有富貴而虞卿獨以知止易衆人之心吾喜林下有人矣新井歌并序堯峯皓暹遲禪師有道行居常遊吾門一日且曰山鑿石造井逾歲僅成既冽而甘大為叢林之利願得紀述以永其傳因作歌云白雲莽莽青山頭一穴四面飛泉流其初山間舊井涸枯腸燥吻海衆羞于時大士寶雲者頤指土脈智慮周山靈所感道心爽檀施聿來工力鳩雲鍤齊下遠雷動石火內擊飛星稠百尺虛空廓地表自注鑿井求水出土一尺即有一尺虛空見內書一泓清冽呀深幽人疑從天墮月窟或問何處移龍湫次則其徒駭殊勝競持應器嘗甘柔飢狖連臂喜跳擲渴烏引喙鳴鉤輈碧甃光中轆轤曉銀牀側畔梧桐秋寶坊金地互相映谷鮒坎蛙難此留傍俯江形小衣帶下窺湖面卑浮漚何兹鑿飲有功利一掬入口醍醐優熱者濯之昏鈍洪病者沃之沈痼瘳而我時邀墨客去松澗遠挈都籃遊淨瓶汲引試香荈雅具羅列無腥甌自注茶經羶鼎腥甌非器也比之玉乳不差别自注曲阿有玉乳泉誚彼練月多謬悠自注俗傳天竺有練月井而茶經水記皆不載今兹泉眼在魯塢所喜雲液鄰莬裘自注魯塢乃堯峯地豫所居去之一舍苧翁既往乏鑒者水記未載豫將修此山此井永不廢此歌其庶傳南州過葉道卿侍讀小園秀野亭連小隱堂紅蕖緑篠媚滄浪卞山居士自注道卿自號也無歸意卻借吳儂作醉鄉自注蘇人多遊飲于此園隱圃雅得莬裘地清宜隱者心緑葵才有甲青桂漸成陰獨曳山屐往無勞俗駕尋湛然常寂處水月一菴深南湖臺危臺竹樹間湖水伴深間清淺採香徑方圓明月灣放魚隨物性載石作家山自喜歸休早全勝賀老還嶢榭水中央兹為隱遁鄉小園香寂寂一派曉泱泱煙草碧彌岸露桃紅壓牆自注新植桃一百本鴟夷儻居此未必入滄浪水次揭危亭煙堤四面平栽蘆延宿鷺種栁待啼鶯雪霽清流漲風來夜艇橫輕微莫臨墍吾老懶逢迎以上吳郡志吳郡志隱囿在靈芝坊樞密直學士蔣堂之居堂兩守吳謝事因家焉自號遂翁囿中有巖扃水月菴煙蘿亭風篁亭香嵒峯古井貪山等堂嘗自賦隱圃十二詠結菴池上名水月宅南小溪上結宇十餘柱名溪館又築南湖臺于水中皆有詩守會稽日修永和故事作一派西園曲水聲水邊終日會冠纓幾年詩筆無停綴不似當年有罰觥會稽志贈惟政禪師禪客尋常入舊都黃牛角上挂瓶盂有時帶笠穿雲去便好和雲作畫圖西湖髙僧事略惟政禪師字渙然居功臣山淨土院出入常跨一黃牛慶歷中侍郎蔣公堂贈詩蓋實録也題􅖘亭􅖘亭深處枕清溪萬木回環盡翠微梅萼破香知臘近栁梢含緑認春歸風前列嶂琴三疊雪後羣山玉四圍顧我此來盤礴久塵勞瀟灑頓忘機常州府志句深鎖煙光在樓閣旋移春色入門牆題吳殿丞應之新葺兩圃圃中有紅梅閣吳有姬曰紅梅因以名閣吳郡志蔡齊齊字子思萊州膠水人大中祥符八年進士第一仁宗朝拜禮部侍郎參知政事出知潁州卒贈兵部尚書諡文忠孔平仲談苑真宗臨軒策士夜夢牆下有菜一苗甚盛與殿基相高及拆第一卷乃是蔡齊上見其容貌曰得人矣特詔金吾七人清道自齊始小孤山危峯屹立長江上勢折華胥限百蠻鼇背孤撑青玉柱斗杓斜插翠雲鬟月生西海初三夜潮到東吳第一關安得扁舟多載酒放歌擊楫浪花間安慶府志黃鑑鑑字唐卿浦城人大中祥符八年進士纍遷太常博士為國史院編修官出倅蘇州有楊文公談苑楊公筆苑句圖送李殿省赴任常熟即都尉元昆吳山紫翠倚晴空潘令風流向此中雨飽公田方稼稔春生香徑雜葩紅綵艫銜尾凌波駛頳鯉駢頭薦俎豐玉季情深重暌索南雲延脰接飛鴻吳都文粹謝絳絳字希深濤之子以任補校書郎復登大中祥符八年進士甲科仁宗朝纍除知制誥判吏部流內銓太常禮院出知鄧州有集儒林公議謝絳吳人有詞藻景祐中知制誥然輕黠利脣吻人罕測其心人謂之十一面觀音小隱園詩并序余近營别墅於小隱巖忽憶癸酉冬春詔逆虜使於陳橋驛夢中偶賦及寤寫在牘背今因巖名知所賦三言前契矣遂足為八句僕本塵外士功名若毫末因尋小隱園忽見羣芳發昔夢宛可記靈契方兹達會須挂朝纓歸弄巖前月答梅聖俞問隱聖俞一紙書問我小隱居小隱詎有異築室數畝餘巖壑不峻崒田園非美腴所欲近丘墓歲時來掃除先人夢讀史遵道本聖徒絶筆於此詩子孫無忽諸刻石置中堂但使過者趨題榜為服訓義取銘盤盂後嶺雙松亭徑術何縈迂下臨富春渚萬象生有無東偏作草舍可以施琴壺門前碧塘水萬本栽荷蕖風來觸香氣長著人衣裾溪水決決流黍稻可勿枯柔桑及美果種廣莫記株澗草不識名野禽多異呼坐此易歲晏漸與人世疏在昔東陵侯瓜壠猶親鉏楊惲謝九列種豆南山隅余嘗考槃賦從我者誰歟近來傅越石趣尚若不殊儻間丘壑徑不願升斗儲如君美材具日月升雲衢安敢預招挽粗自陳其愚以上杭州府志富春遺事梅聖俞堯臣與謝希深為詩文友互相切劘希深居富陽小隱山别築室曰讀書堂構雙松亭于前倚山臨江雜植花果沼荷稻墟環流布種頗稱幽人之居聖俞慕悅其風時以詩文問答倡和一時傳為雅事云句王貌間如鶴黃吟苦似猿職官分紀國朝天聖中修國史王安簡謝陽夏李邯鄲黃唐卿為編修官安簡神情沖淡唐卿刻意篇什謝戲為句云云范仲淹仲淹字希文其先邠人後徙吳縣大中祥符八年進士仁宗朝擢右司諫歷樞密副使參知政事以資政殿學士為陜西四路宣撫使知邠州徙鄧州荆南杭州青州卒贈兵部尚書諡文正有丹陽集孔平仲談苑范文正公幼孤隨母適朱氏因冒朱姓後復本姓啓曰志在投秦入境遂稱于張祿名非霸越乘舟乃效于陶朱止彈履霜一操老學菴筆記范文正公喜彈琴時人謂之范履霜牡丹陽和不擇地海角亦逢春憶得上林色相看如故人澠水燕談海陵西溪鹽場初吕文靖公嘗官于此手植牡丹一本有詩刻石後范文正公亦嘗臨蒞復題一絶人以二公詩筆貴重護欄歲久茂盛每歲花開百朵為海濵竒觀淮上遇風一棹危如葉傍觀欲損神他年在平地無忽險中人后山詩話雖弄翰戲語卒然而作其濟險加澤未嘗忘也懷慶朔堂曰琯按饒州府志堂在舊州治內公謫守時建慶朔堂前手自栽便移官去未曽開如今憶著成離恨秖託春風管領來卻掃編春風鄱陽天慶觀道士也其所居之室曰春風軒因以自名公在郡時與之遊今移守丹陽蓋以寄之云陽喜樂籍未幾召還作詩寄西溪叢語公守鄱後政云云到京以綿胭脂寄其人題詩云江南有美人别後長相憶何以慰相思贈汝好顔色至今墨迹在鄱陽士大夫家贈葉少卿退也天之道東南事了人風波拋舊路花月伴間身湖外扁舟遠門中駟馬新心從今日泰家似昔時貧見子登西掖攜孫過北鄰白雲高閣曙淥水後池春尊酒呼前輩爐香叩上真只應陰德在八十富精神中吳紀聞葉參字少列嘗守吳郡既謝事因居焉其子清臣字道卿登禁從持本路漕節侍養搢紳榮之范文正公贈以詩觀風樓髙壓郡西城觀風不浪名山川千里色語笑萬家聲碧寺煙中靜紅橋栁際明登臨豈劉白滿目是詩情中吳紀聞子城之西舊建樓其上名觀風在唐但謂之西樓白樂天有西樓命宴詩後改為觀風今復名西樓矣公作守時賦詩虎丘昔見虎耽耽今為佛子巖雲寒不出寺劒淨未離潭幽步蘿垂徑高禪雪閉菴吳都十萬户煙瓦遍東南木蘭堂堂在郡治後唐張摶自湖州刺史移蘇州于堂前大植木蘭花當盛開時燕郡吏詩客堂上列歌鐘多慙不如古卻羡木蘭花曽見霓裳舞自注白樂天為蘇州刺史常教此舞野色非煙亦非霧羃羃映樓臺白鳥忽點破殘陽還照開肯隨芳草歇疑逐遠帆來誰會山公意登髙醉始回林下偶談范文正此詩不下司馬池行色之作梅聖俞所謂寫難狀之景如在目前也芝山寺在廬山樓殿冠崔嵬靈芝安在哉雲飛過江去花落入城來得食鴉朝聚聞經虎夜回偶臨西閣望五老夕陽開饒州作三出邊城鬢似絲齋中瀟灑過禪師每疏歌酒緣多病不負雲山賴有詩半雨黃花秋賞健一江明月夜歸遲人間禍福何須道問著衰翁也自知送鄞尉竇君片帆飛去若輕鴻一霎春潮過浙東王謝江山久蕭索子真今為起清風送丁司理赴明州仙家枝葉令威孫南去司刑庇越民金闕道書微旨在獄多陰德是真人道書謂升真者皆須曽為獄官瀟灑桐廬郡瀟灑桐廬郡烏龍山靄中使君無一事心與白雲空瀟灑桐廬郡家家竹引泉令人思杜牧無處不潺湲瀟灑桐廬郡全家長道情不過歌舞事繞舍石泉聲瀟灑桐廬郡嚴陵舊釣臺江山如不勝光武肯教來以上范文正公集嚴陵祠漢包六合網英豪一箇冥鴻惜羽毛世祖功臣三十六雲臺爭似釣臺髙湘山野録北固樓北固髙樓海氣寒使君應此憑闌干春山雨後青無數借與淮南子細看方輿勝覽桐廬方正父家藏唐翰林畫白芍藥豫來領郡事因獲一見感歎久之題二十八字景祐元年十月七日治亂興衰甚可嗟徒憐水調訴榮華開元盛事今何在尚有霓裳寄此花困學齋雜録滕宗諒宗諒字子京河南人大中祥符八年進士從泰州軍事推官召試學士院改大理寺丞歷左司諫出知湖虢嶽蘇四州贈回道士華州回道士來到嶽州城别我遊何處秋空一劒橫東軒筆録宗亮謫守巴陵郡有華州回道士上謁風骨聳秀神宇清邁滕知為異人口占一詩贈之遊茅山句曲山中古洞天金堂玉室地相連方當蘧子知非日已過茅君得道年鎮江府志王益益字舜良臨川人荆公之父祥符八年進士任蜀之新繁令至都官員外郎和梅公儀留題重光寺羅漢院贈憲上人曉剃吟髭雪半零海窗曽呪鉢龍醒早同西竺能持法應笑南僧不會經雲氣晝間侵麈柄蘚痕春老上銅瓶近來禪觀都無語手指餘花滿寺庭成都文類詹中正中正衢州人大中祥符入年甲科時稱詹白雲退居宦情文思競闌珊利户名樞莫我關無可奈何新白髮不如歸去舊青山須知百歲都為夢未信千金買得間珍重尊中賢聖酒非因風月亦開顔句吟餘妓散杯中酒歸去蝶隨頭上花以上瀛奎律髓田況況字元均冀州信都人舉進士甲科復舉賢良方正纍遷右正言知制誥以右諫議大夫知成都府召為御史中丞樞密使終尚書右丞贈太子太保諡宣簡有金巖集琴堂西漢文章世所知相如閎麗冠當時遊人不賞凌雲賦只説琴堂是故基成都遨樂詩元日登安福寺塔歲歷起新元錦里春意早詰旦會朋寀羣遊僕騶導像塔倚中霄翬簷結重橑隨俗縱危步超若薄清昊千里如指掌萬象可窮討野闊山勢迥寒餘林色老遨賞空閭巷朅來喧稚耄人物事多間車馬擁行道顧兹歡娛俗良慰羇逺抱第念民政疏無庸答宸造二十八日謁生祿祠遊淨衆寺千騎出重闉嚴祠淨宇鄰映林沽酒斾迎馬獻花人豔日披紅霧香颸起路塵韶華特明媚不似逺方春三月三日登學射山麗日照芳春良辰重元巳陽濵修袚除華林程射技所尚或不同從俗亦足喜門外盛車徒山半列鄽市彩堋飛鏑逺醉席歌聲起回頭望城郭煙靄相表裏秀色滿郊原遙影落川涘目倦意猶逺思餘情未已登髙貴能賦感物暢幽旨宜哉賢大夫由斯見春美四月十九日泛浣花溪浣花溪上春風後節物正宜行樂時十里綺羅青蓋密萬家歌吹緑楊垂畫船疊鼓臨芳漵綵閣淩波泛羽巵霞錦漸曛歸棹促滿城歡醉待旌旗以上成都文類种放放字明逸洛陽人隱終南山之豹林谷後以薦授左司諫纍遷諫議大夫辭歸大中祥符八年終工部侍郎有集湘山野録真宗初詔种隱君至闕以敷對稱旨日既高中人送中書膳諸相皆盛服以俟种至止長揖而已楊大年以詩嘲之曰不把一言襌萬乘秖叉雙手揖三公上聞之獨召楊曰知卿有詩戲种某安知無一言裨朕乎出一皂囊內有所奏十議俾大年觀之澄懷録种明逸嗜酒嘗種秫自釀曰空山清寂聊以養和自號雲溪醉侯詩話總龜太平興國中李繼遷以西夏叛朝廷興師逮十餘年至咸平末章聖有厭兵之意處士种放在山中有詩云狂徒負恩信聖主恥干戈章聖聞之即遣使召至授左司諫會景德初繼遷死其子德明願納欵遂罷兵放拜官復歸終南終于工部侍郎瀟湘感事離離江草與江花往事洲邊一歎嗟漢傅有才終去國楚臣無罪亦沈沙淒涼野浦飛寒雁牢落汀祠聚晚鴉無限清忠歸浪底滔滔千頃屬漁家古今詩話寄二華隱者我本厭虛名致身天子庭不終高尚事有愧少微星北闕空追悔西山羡獨醒秋風舊期約何日去冥冥老學菴筆記夏日山居陰陰林木靜寂寂無人境紅綻紫葳香嵐沈玉膏冷看雲時獨坐慎事當中省何客馭風來新篁動疏影宋文鑑無題丹樓縹眇路歧傍共説祈真白玉堂珠樹風髙低絳節靈臺香冷醮虛皇名傅六合何昭晰事隔三清限渺茫欲識當年漢家意竹宫梧殿更淒涼玉照新志黃康弼題廣化寺阿育王塔齊野非吳渚支郎是子陵釣臺千古月寶塔萬年燈于欽齊乘阿育王塔在臨淄城西唐太和中建寺五代無棣僧道圓居之與宋太祖有舊加號蓋國大師塔增為十二級祥符中更名廣化寺黃康弼詩云云李湛湛大中祥符間祕書監永慶寺在常熟巖扉開早涼谷鳥分逺翔花氣濕幽徑磬聲清上方雲生松澗底花落蘚池傍致有遺榮意移時坐石牀吳郡志破山興福寺在常熟即常建題詩處雲門十里長殿塔明朝陽半夜風雨至滿山松桂香清猿嘯逺樹好鳥鳴虛廊塵纓斷可濯胡為語滄浪破山寺志龍昌期昌期字起之陵州人祥符中遊京師明鎬奏授太子洗馬明堂泛恩改殿中丞有竹軒小集宋史劉敞傳蜀人龍昌期著書傳經以詭僻惑衆文彥博薦諸朝賜五品服敞與歐陽修俱曰昌期違古畔道學非而博王制之所必誅未使即少正卯之刑已幸矣又何賞焉乞追還詔書昌期聞之懼不敢受賜三山即事百貨隨潮船入市萬家沽酒市垂簾蒼煙巷陌青榕老白露園林紫蔗甜翰墨大全蘇為為祥符間知邵武軍又嘗知宣州湖州湖州作野艇間撑處湖天景亦微春波無限緑白鳥自由飛栁色濃垂岸山光冷照衣時攜一壺酒戀到晚涼歸青箱雜記為湖州詩數十首惟此篇足為絶唱宣城花宣城花疊嶂樓前簇綺霞若非翠露陶潛宅即是紅藏小謝家青箱雜記為在宣城有詩十首皆以宣城為目內宣城花一首尤為清麗邵武作愛重八九月登臨髙下樓林紅雲白處寒瀨泊漁舟同上句夜浪珠還浦春泥象印蹤送劉端州楊文公談苑賈同同字希得臨淄人舉進士除大理評事通判充州纍遷殿中丞知棣州卒門人私諡存道先生示蔡通判聖君恩重龍頭選慈母年髙鶴髮垂君寵母恩俱未報酒如成病悔何追合璧事類蔡文忠公齊喜酒飲量過人既登第通判濟州日飲醇酎往往至醉是時太夫人年已高頗憂之一日賈存道先生過濟文忠館之數日先生愛文忠之賢慮其以酒廢學生疾乃為詩示文忠云云文忠瞿然起謝自是非親客不對酒終身未嘗至醉方仲荀仲荀祥符中以尚書屯田員外郎知蘇州虎丘海涌起平田禪扉古木間出城先見塔入寺始知山堂靜參徒散巢喧乳鶴還祖龍求寶劒曽此鑿孱顔吳郡志陳綱綱太常博士知晉州留題霍山應聖公廟石刻在霍州峻極巍峩勢望雄層巒疊嶂翠重重為神有感興唐祚作鎮無疆福晉封材産十州資構厦泉分數邑潤耕農幽巖舊榻髙人隱絶頂遺墳古帝蹤欲雨片雲生峭壁未明先日照危峯斷崖當午晴雷震深壑經秋積靄濃樵去每逢遊洞鹿僧禪時見戲潭龍名光祀典傳千載御祝牲牢致享恭大中祥符五年六月二十五日岢嵐軍判官鄭世卿書栗再興刻字求古録趙宗萬宗萬字仲囦越州人大中祥符間詔舉遺逸被召不起句斗懸金印心難動屏列春山眼暫開萬姓統譜趙宗萬築室于越郡之照水坊左瞰平湖前挹秦望畜一鶴號丹砂引以為侣讀書鼓琴怡然自適祥符中詔舉遺逸郡守康戩以宗萬薦尋被召因獻跛鱉傳以自見且請自託于道家者流朝廷不奪其志即其家賜以羽服後十餘年卒嘗為詩云云宋詩紀事卷八
