body:
  text: 宋詩紀事巻九十四錢塘厲鶚撰何仙姑劉貢父中山詩話云何仙姑永州人不食無漏世傳其神異明胡元瑞筆叢云當是宋初人題永州故人亭全永從來稱舊郡瀟湘源上構軒新門前自古有流水亭上于今無故人風細日斜南楚晩鳥題花落東湘春因公問我昔日事江左亭名不是真劉斧摭遺袁夏過永州見何仙姑曰吾鄉有貴人亭今有故人亭何也仙曰此亭名因選詩有洞庭值歸客瀟湘逢故人而得之彼亭非也仙作詩云云曹仙姑題梅壇漢代梅君此鍊丹古壇翠駮蘚花斑目窮鳥道青天逺榻轉松隂白日閑烟隔樓臺分象外風吹鐘磬落人閒不知乗詔沖昇後幾度飛鸞到舊山梅仙事實李少雲病中詠梅花素豔明寒雪清香任曉風可憐渾似我零落此山中許彦周詩話有李氏女者名少雲本士族夫死無子著道士服往來江淮閒僕頃年見之金陵其詩有云幾多柳絮風翻雪無數桃花水浸霞無脂澤氣又喜煉丹砂大扺類魏伯陽法而有銖兩加精詳者也嘗語僕曰我命薄政恐不能成此藥耳後二年見之痩病骨立僕問曰子丹成欲仙乎惟甚痩則鶴背能勝也笑曰忍相戲耶病中作梅花詩尋卒無著無著丞相蘇頌女年三十出家參大慧得悟號妙總禪師絶句一葉扁舟泛𣺌茫呈橈舞棹别宫商雲山海月都抛卻贏得莊周蜨夢長泉南雜記正覺正覺海鹽人樞密郭三益孫女適雲閒葉氏早寡誓節為尼居法雲寺絶句春朝湖上風兼雨世事如花落又開退省閉門真樂處閑雲終日去還來海鹽縣圖經宋詩紀事巻九十四
