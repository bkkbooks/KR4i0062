body:
  text: 宋詩紀事卷七十九錢塘厲鶚撰張琰琰字汝玉廣陵人身七尺長髯有節槩補州牙兵隨制置李庭芝潰圍南赴行在所追者及之麾下鳥獸散琰獨鬬死出塞曲腰閒插雄劒中夜龍虎吼平明登前途萬里不回首男兒當野死豈為印如斗忠誠表壯節燦爛千古後朝發山陽去暮宿清水頭上馬左右射捷下如獼猴先發服勇決手提血髑髏兵家互勝負凡百愼前籌官柳不見樓東黃布帘樹猶如此我何堪裊裊亭亭忒無賴又將春色誤江南以上谷音熊與和與和字天樂豫章人性介淡無妻不食肉通經史百氏之書布衣草屨遨遊諸名山尤嗜彈琴草書唐元宗鐡像巍冠攢疊碧雲花坐閲山中幾歲華莫把金丹輕㸃化正愁生死困安家木平飼龍亭次韻方巨山耳見何如得眼聞山根磅礴極初分浮漚起滅自潭影大地晴隂空嶺雲何處老人來聼講他年少府有移文由來清調須吾輩幸不山王愧五君以上谷音晏乂乂字明粲宜春人風度秀整主趙崇澭後澭逮繫乂自請詣獄俱以瘐死訪吳平生一語不肯吐浩然披髮行西林美人十日跨驢出黃葉堆門雲雪深夢中春樹年年少寒雲浦浦連片帆髙浪起斗酒夕陽偏沙市懷司馬州城笑老邊太平冠蓋盡爾敢望諸賢以上谷音楊應登應登字幼平臨江人寬厚長者有德行言辭七試國子不第退就耕牧老于南塘水宿水宿逢今雨春歸返故園聖朝臣已老往事客何言乞米分鄰里看書到子孫蒼茫不可會一笑了清樽寄趙梅州江城雁叫天如水寒色蒼蒼草朩死哀歌未斷月東出有才無命可流涕今我不樂思梅州束帶深衣百僚底天下規矩見卓絶龍章麟角諸公子白頭時節得蠻府歸來閉門呼不起惆悵平生狗馬病風后力牧長已矣為公問酒日日酤熏天富貴憂患始以上谷音楊雯雯字天章應登之孫迢迢空同山迢迢空同山乃在西極巔玉泉䕃靈芝上有千歲仙安得凌風翼相從白雲間神仙本冥漠天運仍推遷不如酌我酒或得成自然田父要我語飲者亦非賢願君長獨醒加餐足髙年宋武帝廟溪聲答松風巨石出老拳古樹不知名岌岌蛟龍纏夕隂互出沒秋華帶芳鮮蔥蔥帝王氣棟宇垂千年虎賁秉霜㦸慘淡生雲烟宫人翠龍駕手持玉連蜷昌明坐慌惚精神靁在天大呼司雍間旬月無秦燕昔為萬夫特今受衆目憐石馬亦埋沒歲時草芊芊小臣異代士見之淚迸泉齊人思爽鳩蜀人哀杜鵑江東舊正朔禮奉敢不䖍但願君王心不忘載荻船下山又再拜白日當空懸北客北客相催發一日舉千帆遙憐庾開府歲晚望江南宿峽市人烟正搖落樓笛頗清圓老樹依山驛東風上峽船江湖萬里外燈火十年前世路能令老吾生且醉眠早春不知何處碧雲鄉冉冉平生可斷腸怪底乾坤惟理在老來歲月更心長城頭急鼓千家夢江上殘梅一水香自作醉侯開醉國笑人奔走為誰忙以上谷音趙卯發卯發昌州人通判池州權州事元兵至同妻雍氏縊死裂衣書詩寄弟城池不髙深無財又無兵惟有死報國來生作弟兄昭忠逸詠注唐珏珏字玉潛號菊山會稽人冬青行馬箠問髐行南面欲起語野麕尚屯束何物敢盜取餘花拾飄蕩白日哀后土六合忽怪事蛻龍挂茅宇老天鑒區區千載護風雨冬青花不可折南風吹凉積香雪遙遙翠蓋萬年枝上有鳳巢下龍穴君不見犬之年羊之月霹靂一聲天地裂夢中作曰琯按遂昌雜録作林景熙今從輟耕録作珏詩珠亡忽震蛟龍睡軒弊寧忘犬馬情親拾寒瓊出幽草四山風雨鬼神驚一壞自築珠丘土雙匣親傳竺國經獨有春風知此意年年杜宇哭冬青昭陵玉匣走天涯金粟堆寒起暮鴉水到蘭亭轉嗚咽不知真帖落誰家珠鳧玉雁又成埃斑竹臨江首重回猶憶年時寒食節天家一騎奉香來輟耕録嵗戊寅有總江南浮屠者嘉朩揚喇勒智恃恩橫肆勢焰爍人不可具狀十二月十有二日帥徒役頓蕭山發趙氏諸陵寢至斷殘支體攫珠襦玉柙焚其胔棄骨草莽閒時珏年三十二歲聞之痛憤亟貨其家具得白金百星許執劵行貸得白金又百星許乃具酒醪市羊豕邀里中少年若干輩狎坐轟飲酒且酣少年起請曰君儒者若是將何為焉唐慘然具以告願收遺骸共瘞之衆謝曰諾中一少年曰發丘中郎將耽耽餓虎事露奈何唐曰余固籌矣今四郊多暴骨取竄以易誰復知之乃斫文木為匱復黃絹為囊各署其表曰某陵某陵分委而散遣之蕝地以藏為文而告詰旦事訖來集出白金羡餘以酬戒勿泄越七日總浮屠下令裒陵骨雜置牛馬枯骼中築一塔壓之名曰鎮南杭民悲切不忍仰視了不知陵骨之猶存也禍淫不爽流傳京師上達四聰天怒赫赫飛風雷號令捽首禍者北焉山隂人始有籍籍傳唐氏者由是唐之義風震動吳越聲生勢長若胥江掀八月之濤名雖髙困固自若明年已卯後上元兩日唐出觀燈歸忽坐隕息奄奄若將絶者良久始蘇曰吾見黃衣吏持文書來告曰王召君導之往觀闕巍峩宫宇靚麗殆非人世閒有一冕旒坐殿上數黃衣貴人逡巡降揖曰藉君掩骸其有以報唐乃升謁造王前王謂曰汝受命寠且貧兼無妻若子今忠義動天帝命賜汝伉儷子三人田三頃拜謝降出遂覺罔不知其何也踰時越有治中袁俊齊至始下車為子求師有以唐薦者一見置賔館一日問曰吾渡江聞有唐氏瘞宋諸陵骨子豈其宗耶左右指君曰此是已袁大駭拱手曰君此舉豫讓不能抗也曵之坐北靣而納拜焉禮敬特加情款益篤叩知家徒四壁惻然嗟矜語左右曰唐先生家甚寒吾當料理使有妻有田以給左右逢迎爰諏爰度不數月二事俱愜聘婦偶故國之公女負郭食故國之公田所費一一自袁出人固竒唐之節而又竒唐之遇兩髙之曰二公真義士爾後獲三丈夫子鼎立頎頎凡夢中神所許稽其數無一不合咄咄怪事乃如此唐葬骨後又于宋常朝殿掘冬青樹植于所函土堆上有詩云云王英孫英孫字才翁一作子才號修竹會稽人少保端明殿學士克謙之子仕將作監主簿家饒于資宋亡後延致四方名士賦詠相娛與山隂徐受之天祐並為一時人士所宗林霽山王修竹詩序云豫數從公游嘯吟泉石每一篇出有飛出宇宙之槩已而斂入絲粟寂乎無聲使人三歎不能已嶽武穆王墓埋骨西湖土一丘殘陽荒草幾經秋中原望斷因公死北客猶能說舊愁武林舊事題髙房山夜山圖等閒吳越在毫端疊巘微茫月影寒一曲危闌人獨倚江山渾在夢中看鐡綱珊瑚寶林寺飛來幾千載臺殿壓岧嶤落日飛仙鼠秋風下健鵰山腰微露石海眼暗通潮堪歎元英後詩名竟寂寥越詠陳觀國觀國字用賔會稽人王修竹監簿之友送鄧牧心出陶山青山無送迎幽人自來去落葉若相送卷卷及行屨簷端有孤雲仍為守其處落葉惜人不在山孤雲尚期人再還斯人可期復可惜我處落葉孤雲閒吳禮部詩話柴元彪元彪字炳中號澤臞居士官察推有襪線集錢唐懷古百年朝市舊登覽若為情落日銅駝陌東風夾馬營路隨荆棘斷城與黍離平可惜西湖月燒燈兩度晴僧房夜冷山冷沒禁當那堪更漏長寒欺秋後扇風試夜來霜茭白心如墨冬青子亦黃秖宜煨芋栗齧引對緇郎秋日江郎道中豆花疏雨浥輕埃野店新涼入酒杯草帶斷烟棲古道樹含殘靄翳荒臺湖光隱見萍分合山色有無雲去來滿眼秋光無盡意三峯萬古碧崔嵬灌花小圃辛勤植衆芳年年雨露借恩光近來天氣髙難問抱甕從朝到夕陽上中齊相公年年長是客天涯幾向天涯夢到家歸到故家無一事兔葵鶯粟正開花以上柴氏四隱集黃庚庚字星甫天台人嘗客山陰王修竹監簿家與嚴陵胡天放永嘉林霽山遊越中詩社試枕易題推為第一有月屋漫稿王修竹館舍即事池館翠涼處寬閒稱客居未仙猶閬苑不夢亦華胥竹淨堪居鶴荷香欲醉魚心清無箇事長日一編書秋色山陰詩社中選憑髙望不極望斷動愁情落日凄涼處西風㸃染成丹楓明野驛白水浸江城馬上人回首戎戎黯客程鶴林仙壇寺古壇歸鶴杳野鹿自成羣嵐氣浮清曉鐘聲出白雲樹穿僧屋老水到寺門分人世無窮事山中了不聞見雁有懷滿眼西風憶故廬親朋音問久相疏年年江上無情雁只帶秋來不帶書枕易越中詩社試題都魁古鼎烟銷倦㸃朱翛然髙臥夜寒初四簷寂寂半牀夢兩鬢蕭蕭一卷書日月冥心知代謝陰陽回首驗盈虛起來萬象皆吾有收拾乾坤在草廬舟次摴蒱廟短櫂衝寒過浦東扁舟一葉載詩翁斷烟流水殘鴉外古木荒祠夕照中吟罷小樓何處笛酒醒孤枕半江風潮生潮落朝還暮堪歎浮生似轉蓬偶書頻年蹤跡墮江湖三徑苔荒憶舊廬身老方知生計拙家貧漸覺故人疏松薪拾去朝炊黍漁火分來夜讀書怨鶴驚猿應待我台山何日賦歸歟以上月屋漫稿顧逢逢字君際吳郡人宋末舉進士不第學詩于周弼稱顧五言自署其居為五字田家後辟吳縣學官别號梅山樵叟有船窗夜話負暄雜録及詩集善權寺英臺讀書地舊刻字猶存一閣出霄漢萬松連寺門洞深雲氣冷池淺鹿行渾山下流來水風雷日夜喧宜興縣志早秋湖上藕花香裏去獨坐自尋詩秋意在何處夕陽將下時鳥幽忘立久山好覺行遲飲興忽然動橋邊有酒旗雪中同鄭所南訪趙溪梅移宅雖然逺攜笻到兩回只知相别去不道又重來溪鯽和冰煮鄰醅帶雪開詩家堪入畫滿眼玉樓臺以上珊瑚朩難林同同字子真號空齊處士福清人以世澤授官棄不仕元兵至福州監丞劉同子糾義兵即其家置忠義局敵至同死之有孝詩一卷劉後村跋子真性純孝父寒齊病左右侍湯藥至不忍入州應舉嘗赴胄試自里抵家得詩一卷十之九皆思親之言年未四十慨然罷舉志尤潔非躬耕不食植梅百株日哦其下魏孝子役于大國陟彼屺兮瞻望母兮狄仁傑登山望雲曰吾親舍其下念母嗟陟屺思親徒望雲可憐魏孝子不比狄參軍韓伯瑜母杖不痛哀母力弱對母悲泣梁彥先使焦通觀其像通感悟盡孝母力今衰矣悲啼得杖輕流風在繪像猶足感焦生徐庶辭先主曰老母見蕤方寸亂矣王陵母曰為語陵母以老妾故持二心不勝方寸亂豈暇二心持忍矣王陵將賢哉徐庶辭桓沖小字買德郎母病須羊以解以身質羊後為江州刺史不辭身作質只為母須羊此日江州牧當年買德郎文中子汾水之曲冇先人之敝廬在有田可以具饘粥彈琴著書不願仕也先人舊所理汾曲有田廬何意求聞達彈琴自著書王悅導之子有髙名事親色飬諸子莫及導見輒有喜色色飬傾餘子髙名重一時足為丞相喜豈計外人知木蘭古樂府云阿爺無大兒木蘭無長兄願為市鞍馬從此替爺征謹勿悲生女均之有至情縈能贖父罪蘭亦替爺征以上孝詩陳巖巖字清隱青陽人生宋末有九華詩集會仙峯在九華中峯之側趙知微嘗中秋遇雨率其徒登峯上月出雲淨諸峯呈露及歸復雨因名之仙袂飄飄拂翠巔知微來此宴羣仙人間風雨山間月始信仙家别有天碧桃巖自要貪閒非避秦洞門隔斷世間塵山中不置四時歷開到碧桃知是春以上九華山志馬南寶南寶香山人景炎二年端宗航海過邑獻粟千石拜權工部侍郎宋亡于崖山被執死之句目擊崖門天地改寸心難與夜潮消衆星耿耿滄溟底恨不同歸一少微廣東通志王奕奕字伯敬玉山人官本州教授自號玉斗山人有東行斐稿絶句呈周日湖草帶黏天只辨星燧樓盡化作郵亭栁橋梅驛多來使只寄山中飬鶴經玉斗山人集送謝疊山先生北行皇天久矣眼垂青盼盼先生此一行遺表不隨諸葛死離騷長伴屈原清兩生無補秦興廢一出仍關魯重輕白骨青山如得所何須兒女哭清明西江詩話何行行字自強廣昌人生宋末為武平令題龍泉觀蓬萊境界隔風烟一帶銀河接九天禮斗瑶臺春草合豢龍石鉢玉沙圓紅雲幾片危樓上古木千尋落照邊惆悵仙人何處去空餘月色滿山川西江詩話吳倧倧字尚賢歙人有漁磯脞語句舊聞有西山松風六月寒明當整襟屨舒笑青雲端招手塵外人瀹泉采芳蓀夏暑方回桐江集江凱凱字伯幾號雪矼婺源旃坑人許山屋之客山屋愛之妻以子相士俞方塘方塘之鑒形可識方諸之鑒心始得相形何如更論心以貌取人當有失君不見虞皇項籍兩重瞳成湯曹交皆九尺新安文獻志汪炎昶炎昶字懋逺婺源人紫巖族孫有古逸民詩集趙東山云古逸先生詩微婉遒徑亦時出于悲壯激烈書興時時溪上行或與幽人遇手把一編書共倚崖邊樹鷺近始暫飛魚驚卻重聚佳景不待求足熟自知處稚子愛相隨似亦耽幽趣香嚴院犖確疲幽徑扶持仗瘦笻斷崖何處路細雨隔山鐘猿竊重簾果僧樵臥澗松人言深僻處别更有靈蹤南山宣平隱處今始過烟霞城郭路幾何野渡誰浮夕陽艇空山尚響樵人歌石壇荒涼疊苔蘚谷鳥啁唽深松蘿何當更值買酒至一笑使我朱顔配聞笛荒村犬吠人猶行驚鳥亂啼山月明南鄰搗砧適復罷何處吹笛秋更清疑含白龍堆外怨不恨黃鶴樓中聼螢飛露下百草溼倚風激烈思平生過往歲避地之所屋毁人遷依舊蒼苔小徑斜當時從此入山家心疑謬誤還疑是雨溼棠梨一樹花以上新安文獻志黃誠性挽文丞相三百餘年樂育恩晚從科目得斯人﨑嶇嶺海期年國零落氊毛萬死身諸葛未亡猶有漢包胥欲泣更無秦挑燈慷慨歌梁父鬢髮蕭森􅋏鬼神吳禮部詩話葉林林字儒藻一字元文一作去文號本山錢唐人生宋末隱大滌山沖天觀與鄧牧深相得或欲薦之朝聞其清議而止大德丙午書偈案上泊然而化衆稱髙行先生至道宫猶存巨鑊記熙豐翠靄春深古路通千百舂鋤一株樹野田飛下雪花風洞霄圖志石室洞低垂石室洞杖屨易躋攀有路穿雲窟無門對月關誰騎仙鹿去我笑國蝸跧若使今猶昨清宵聞珮環又登石室作逺遊貞白二仙家今日追尋路不賖七十二叢秋色裏有人曾約去看花石徑春深疊古苔洞天無鑰為誰開白雲本是無心物風趁松花作雨來以上洞霄詩集鄧剡剡字光薦號中齊廬陵人祥興時歷官禮部侍郎丞相文信公客也崖山兵潰為張𢎞範所得教其次子得放還有中齊集挽文信公詩憶公淚懸河九地無處瀉想公騎赤龍請命蒼梧野世人醉生死翻笑獨醒者焉知千載英精爽皎不夜義士無廢興時運有代謝念昔喪亂初公騎使君馬奮袂起勤王慷慨淚盈把須臾三萬衆如自九天下燈棊書檄交笑語雜悲咤捧土障洪河一繩維大廈至哉朝宗性百折終不舍身北冠自南血碧心肯化顔鉤凛忠徑杜詩蔚騷雅晉陽骨肉冤東市刀兵解精誠揭天日氣魄動夷夏丈夫如此何一死尤足怕田橫老賔客白髮餘息假有時夢巖電意悟當飄灑非無中丞傳殺青自誰寫魂歸哀江南千秋俎鄉社吳禮部詩話鷓鴣詞行不得也哥哥瘦妻弱子羸牸馱天長地濶多網羅南音漸少北語多肉飛不起可奈何行不得也哥哥遂昌雜録步月盈盈當春月含情隔幽櫺好懷不自制起坐可一庭百蟲未敢怨卉木正蔥菁餘光散草露乃復似秋螢夜聞雨聲歸思浩然西風響髙樹鄉夢去帆前稚子衡門下先塋亂葉邊老來多一出歸去恰經年海燕巢何晚秋期落爾先午坐後亭隔簾遲日午風微社燕驚寒未肯歸讀了丹經成默坐時時一片杏花飛望夫山朝望夫暮望夫一夕化作山石枯潮水去卻回行人來不來以上天下同文集題龍山鐘豐山背後鐘霜月平原定夜半響鯨音隱隱天地應山靈鶴夢醒獨聽還獨詠蕭蕭蓬蒿中收入杜陵徑青原山志避亂至烏巖山贈承節趙公山在香山縣東南流水桃花又避秦誅茅西崦結為鄰如公尚友浮丘伯顧我早師梅子真棊酒從容新里社衣冠蕭散古遺民他年史傳收芳跡應許牽聯作隱人廣東通志甘泳泳字泳之一字中夫崇仁人生宋末工詩不娶有東溪集自述總角希聞道殘生乃付詩未曾前輩識敢辱近人知飄泊身餘健蕭閒鬢欲衰一簾書四壁寒日在清池過南湖忽有一事礙胸次擺脫不去呼酒來溟溟濛濛混沌在坦坦蕩蕩虛空開精神一生留筆墨形骸昨夜為尊罍年年看梅今白髮晴日江路行莓苔以上天下同文集林昉昉三山人送西秦張仲實遊大滌洞天此時仙興發九鎖訪名峯玉洞晝飛鼠石池春浴龍異人花外見道士酒邊逢余欲采芳茗白雲何所從洞霄詩集羅公升公升字時翁吉之永豐人大父開禮從文丞相勤王兵敗被執不食死公升以軍功授本邑尉北游圖恢復不果有滄洲先生集秋懷舊日方山子凄涼寄一簞蟲聲來倦枕秋思入憑闌已是肱三折那堪指一彈中宵更風雨誰念客氊寒避地雨急啼鴉切山昏去客奔竄身楚南極獨立鄭東門卜處無神珓招餘有斷魂死生毫髮事不足纍乾坤四海風濤日誰歟柱急流山東雄劇孟薊北化田疇氣靜天閽晚星沈戌角秋如君關氣數寧不重離憂演福寺賈妃葬處褘翟當年讓福人妃與謝后俱入宫穆陵主意于賈楊太后曰謝家有福遂立謝后早亡何用羡長春帝鄉壞土真無憾愁絶龍沙萬里身以上滄洲集宋詩紀事卷七十九
