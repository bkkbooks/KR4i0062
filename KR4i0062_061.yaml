body:
  text: 宋詩紀事卷六十一錢塘厲鶚撰鄭性之性之字信之初名自誠福州人嘉定元年進士第一理宗朝纍官寶章閣待制知樞密院參知政事出知福州鶚按咸淳臨安志自誠為嘉定元年榜首宋史作四年誤四年榜首趙建大也今訂正落梅夜來幾陳隔窗風便恐明朝已掃空點在青苔真可惜不如吹入酒杯中後村千家詩章樵樵號洞麓昌化人嘉定元年進士歷官知漣海軍授朝散郎知處州卒伽溪在昌化縣試將生計問農家兒大扶犂女漚麻燒筍煮葵供午餉山中樂事自無涯杭州府志諸葛興興字仁叟會稽人嘉定元年進士為彭澤奉化兩丞嘗作會稽九頌有梅軒集曹娥祠瞻靈祠兮江之湄凛豫心兮肅祗表卓行兮尚之祀垂妙辭兮淳之碑嗟窈窕兮踐天性一念烈兮萬古鏡山眉兮蒼蒼江練兮茫茫江之水兮可竭娥之靈兮不可滅會稽續志杜範範字成之黃巖人嘉定元年進士端平中拜監察御史纍遷禮部尚書淳祐二年拜右丞相卒贈少傳諡清獻有集戊辰冬和湯南萬韻春初走京華秋杪歸舊廬簡編廢已久開卷澀且疏誰能擊其蒙石田或可腴雁山有佳士讀盡天下書足迹半九州不憚道里迂陋邦何足臨而亦來我居相從一樽酒未厭園中蔬笑談欣有合浩若縱壑魚人生惟所適所適各有途胸中茍不迷到處皆通衢簟瓢有真樂顔氏何其臞沒沒嗟我生未知終焉圖論交須論心所論在不渝願君示一語令我反三隅君無金玉音請誦一束芻良月遊水樂久矣聞水樂邂逅作此遊林立攢萬石曲徑穿深幽谽谺開古洞下有清淺流惜哉非古音噴薄皆人謀流觴飲山淥風鬢吹颼颼欲歸興未盡攜手湖上樓斜陽獻萬狀浩以雙目收白鳥去復還翩翩良自由我夲山林人對此多慚憂歲月不我與宴間其可偷便合作歸計老矣安所投世事皆漫爾政恐空白頭和澧州喜雨韻秋色在何許浮嵐疊翠間江清雙鳥渡天濶片雲間雅量肩文舉新詩壓子山更深聽逺溜哦詠答潺潺送湯仲熊國正以直去國朔風翦木末碩果懸孤危邈矣冥飛鴻異哉聞鳴鴟莫雲結愁隂送君江之湄去者挽莫留留者良自悲何當謝塵鞅鼓枻相追隨以上杜清獻公集薛師點師點鄞人嘉定元年進士酬答張安撫伯玉先生寡交率天性積疴攻妙藥干祿念蒸嘗著書恣談謔永矣離畏途何況縻好爵感子故人意屏吏延鈴閣時剖千秋心兼訂三山約風流張平子文采謝康樂潛魚媚幽潭髙鳥眤林薄物類既參差天地亦寥廓但愁霜霰多石出兼水落甬上耆舊集洪咨夔咨夔字舜俞於潛人嘉定元年進士理宗朝纍官刑部尚書翰林學士知制誥加端明殿學士提舉萬壽觀卒諡忠文有平齋集鶚按咸淳臨安志有嘉定元年鄭自誠榜無二年榜宋史誤今訂正相至仇逺稗史洪平齋新第後上衛王書自宰州縣無不捃托其短大概云昔之宰相端委廟堂進退百官今之宰相招權納賄倚勢作威而巳凡及一職必如上式俱用而已二字時相怒十年不調洪有桃符云未得之乎一字力祗因而已十年間贈石室朱修行響泉一𣲖落天風人在浮雲栁絮中亭午柴扉猶未啓碧玲瓏底拒霜紅直玉堂作禁門深鎖寂無譁濃墨淋漓兩相麻唱徹五更天未曉一池月浸紫薇花題東山在臨安縣西三里相傳謝安石高卧之地金堂玉室舊相羊被髮依然下大荒風送嬋娟飛落蘂雲移縹眇溼疏篁桓伊筝外深情酒幼度棊邊定力香萬事古今開闔眼樓頭吹面水風涼天目山招隱歌雲氣斂兮天目之巔濤江線橫兮海門濺濺扶桑子半兮陽烏翻可俯而掬兮咽以天井無聲之泉子其隱乎吾與子兮拾荃正月十九日孟享從駕黃繖中間一點紅繡雲鹵簿海棠風鈞容聲出雲霄外馬上誰憐有老聾壬辰小雪前奉親遊道場何山何山如幽人道場如大家穰穰衲子腳刺刺騷翁牙挾雋控寒飇披光躡晨霞危顚矯窣堵平疇略汙邪巖泉跑虎湧徑松髯龍拏鐘梵破深寂金碧開芬葩修廊步履峻傑閣望眼賒山勢佩玦矗湖光鏡奩谺清節杳靄入古辨空濛遮列翠不可唾羣籟無敢譁坐我旃檀林酌之槍旗茶宇定岫出雲語妙天雨花吾生久墮甑昔遊慣乘槎夷猶廬阜陽宿留岷江涯高曾留嶠棧卑或搜崖窪舊夢難歷省此行足雄誇老親八十健間儔二三佳拍浮一葉渺收覽萬景奢富貴上蔡犬貧賤東陵瓜未須笑落鐸誰能苦􅡬沙候門占噪鵲旋橈趁歸鴉竒事恐沒沒舉詩屬僧伽感王荆公事君臣一德盛熙寧厭故趨新用六經但怪畫圖來鄭俠何期奏議出唐坰掌中大地山河舞舌底中原草木腥養就禍胎身始去依然鍾阜向人青以上平齋集梅礀詩話荆公行青苖免役等法引用一等小人天下受其苦卒召六十年後靖康之禍洪平齋有詩云云按國史俠嘗從安石學坰乃安石所薦皆以新法不便攻之此詩乃五十六字史論都城火九月丙戌夜未中祝融漲熖通天紅層樓傑觀舞燧象綺峯繡陌奔燭龍始從李博士橋起三面分風十五里崩摧洶洶海潮翻填咽紛紛釜魚死開禧回祿前未聞今更五分多二分大塗小撤噤不講拱手坐視連宵焚殿前將軍猛如虎救得汾陽令公府祖宗神靈飛上天痛哉九廟成焦土梅礀詩話紹定辛卯臨安大火九廟俱燬獨丞相史彌逺賜第以殿司軍救撲而存洪平齋哭都城火詩云云末意規諷時宰甚切聞之者足以戒吳泳泳字叔永號鶴林潼川人嘉定元年進士理宗朝仕至起居舍人兼直學士院權刑部尚書終寶章閣學士知泉州有鶴林集嘉熙丁酉七月上浣遊大滌題住山龔沖妙艮泓軒舊與清泉白石盟身間方作洞霄行青山延客元無鎖碧澗流花似有情古洞欲隨仙隱去髙岡終待鳳來鳴道人喚我松間飲坐拂寒雲月未生洞霄詩集沈大椿大椿嘉定中真州判官自維揚回真州一官安敢問青氊形影相看祗自憐黃鵠已登青漢去白鷗空占淺沙眠杏花開遍揚州雨桞色渾鋪瓜渚煙老眼生疏堪自笑浪驚風物向淮天青蒲短短桞斜斜入眼新愁亂莫遮雨潤固應宜筍蕨風叨端不貸鶯花春來止酒常因病客裏逢人秪問家安得扁舟下荆水一歸老我舊生涯維揚志胡矩矩字仲方廬陵人銓之孫嘉定中官工部尚書出知福州嘉定二年秋重遊洞霄重尋九鎖躡丹梯回首空驚歲月移風虎守閽寧易到冰龍候路郤先馳松筠老去俱全節猿鶴迎來盡故知更拂棲真洞間石弟兄同記勝遊時餘杭泉石欠幽探淨拂衣塵入翠嵐九鎖山門雲上下一峯天柱殿西南元封舊事無人記德壽仙遊有客談痛飲丹泉卧磐石松風滿耳夢初酣洞霄詩集句自孤花底三更月郤怨棲前一笛風落梅鶴林玉露吕午午字伯可歙縣人嘉定四年進士歷官浙東提刑監察御史遷起居史院官卒贈華文閣學士有竹坡類稿馬城花窠寓居臨安馬城作老子西城住今踰十載期裁花成茂樹種栁長髙枝移接從渠巧誇傳到處知擔頭挑賣去一一是趨時竹坡類稿和嶽王廟壁上韻祁閶西一舍有菴曰東松紹興初嶽卾王提兵經吾郡西上士卒秋毫無犯卒宿人門外足不敢一越限內嘗憩是菴留題當年唯説嶽家軍紀律森嚴孰與鄰師過村村皆按堵功成處處可鐫珉威名千古更無敵詞翰數行俱絶塵擬取中原報明主亦勞餘刃到黃巾新安文獻志徐文卿文卿字斯遠號樟丘玉山人嘉定四年進士與趙昌父韓仲止齊名有蕭秋詩集葉水心序云斯遠淹玩衆作淩暴偃蹇情瘦而意潤貌枯而神澤方于西江宗𣲖斯又過之遊洞巖跨馬絶風煙夜與雲俱宿彈琴向窗間微月挂森木曉行巖上路一溪緣淨緑路窮入其中溪流貫山腹巖開類天設石亂疑鬼伏水從何自來乃爾瑩心目巖前野僧居種桃滿空谷惜已過芳時不見花芬馥平生青霞志恥受紅塵辱老我茅三間兹山疑可卜前賢小集拾遺偶題緑樹何稠疊清風稍羡餘枕縈雲片片簾透雨疏疏修筧通泉壑殘碑出野鉏丘陵知幾變耕稼雜陶漁雨後到南山村家衝雨入窮山山民猶閉關橘垂茅屋畔梅映竹籬間竒石依林立清泉繞舍灣吾思隱兹地凝立未知還以上瀛奎律髓周端朝端朝字子靖永嘉人從朱晦菴武夷讀書登嘉定四年進士官至刑部侍郎諡文忠三江口吳門臺北竹樓隅三日追陪漫叟居曉夢驚辭赤壁鶴夜棲看打武昌魚橫洲遙漵分燈影落月斜河運斗車回伏三江問漢口陸離蘭葉響環琚東甌詩集程公許公許字季與一字希穎號滄洲敘州宣化人嘉定四年進士理宗朝纍官中書舍人禮部侍郎進權刑部尚書有塵缶集牡丹春工殫巧萬花叢晚見昭儀擅漢宮可惜芳時天不借三更雨歇五更風全芳備祖黃子信子信長泰人嘉定四年特奏名第二人調新會鹽場有散翁集投楊帥六年兩度拜宸旒換得青衫白上頭飛鵲秖因無樹繞窮猿何暇擇林投明知著腳當來誤幾欲抽身不自由安得有錢了官債便無三徑也歸休歸時作笑倩西風拂舊埃歸時行李似初來也知三載清貧好博得一家強健回漳州府志子信初調新會鹽場帥楊長孺以其老榜為監當心易之常捃托其簿書子信將拂衣而去因投以詩云云周假菴題趙千里夜潮圖款書嘉定庚午仲夏一日煙蒼蒼江茫茫明月夜挂天中央奔潮不盡當日恨金波怒捲虯龍長浦口秋飛揚鷗雁不眠聲周章風髙沙漲望難到羽翰但逐潮低昻窗間簾炷香開卷有素商何須八月上錢唐對此秋濤生錦囊珊瑚網袁甫甫字廣微鄞人嘉定七年進士第一歷官吏部侍郎兼國子祭酒權兵部尚書卒贈少傅諡正肅題陳和仲尊明亭亭在山巔氣象巍然山從何來蜿蜿蜒蜒我坐亭上極目一望羣峯畢朝尊無與抗我撫亭下萬象難寫一一分明入我盞斝有時擕笻偕我朋從莫知我心獨撫孤松甬上耆舊集徐清叟清叟字直翁浦城人嘉定七年進士理宗朝歷官廣東安撫使權兵部尚書拜端明殿學士知樞密院事兼參知政事提舉佑神觀出知泉州卒贈少師諡忠簡淨明院梅巖恭和髙廟御製偶因祀事訪丹霞寺古山深石徑斜衝凍細尋梅信息枝頭喜見狀元花咸淳臨安志贈建寧妓唐玉上國新行巧樣花一枝聊插鬢雲斜嬌羞未肯從郎意故把芳容半面遮豹隱紀談陳耆卿耆卿字壽老臨海人嘉定七年進士官至國子司業著有篔窗集赤城志葉水心云陳君之作馳驟羣言特立新意險不不流怪巧不入浮艱食行新榖未升除榖罄窶人托麥以為命今年種麥如去年去年滿屋今空田吁嗟皇天毋乃戾去年浙右當死嵗湘中死寇淮死兵留得東州僅旒綴秖今艱食遽如斯豈是造物有乘除我無一語活四海對之泣下徒霑裾催租官吏如束溼里正打門急復急安得君眼如月長灼破田家蓑與笠全芳備祖王伯大伯大字幼學號留耕福州人嘉定七年進士理宗朝纍官端明殿學士拜參知政事贈戴石屏詩老相過鬢巳星吟魂未減昔年清揮毫不著塵埃語盡把梅花巧琢成梅礀詩話丹青閣傑閣岧嶤倚碧蒼菊花時節此持觴市聲一段隔秋水橋影半空橫夕陽挺挺霜筠排壑立涓涓石溜引山長人言絶頂多竒觀安得間身宿上方詩家鼎臠郭磊卿磊卿字子竒仙居人嘉定七年進士端平初拜右正言尋擢右史以直言為史嵩之所忌除起居郎卒諡正肅有兌齋集偶題更無清興在杯觴不用蒲葵扇自涼月色靜時山鶴叫一庭清景藕花香宋藝圃集李劉劉字公甫號梅亭崇仁人嘉定七年進士仕至中書舍人直學士院寶章閣待制卒有詩文類稿孫雲翼李梅亭先生小傳劉嘗從真德秀遊丏詞科文字留飲書室指竹夫人為題曰蘄春縣君祝氏可衛國夫人劉援筆立成末聨云於戲保抱攜持朕不忘乙夜之寢展轉反側爾尚形四方之風德秀擊節歎賞嘉熙已亥四月誕皇子告廟祝文劉以學士當筆以四柱作一聨云亥年已月無長蛇封豕之虞午日丑時有歸馬放牛之兆時方有蜀警人咸賞其中的有梅亭四六行世記夢壯志巳違黃鵠下老身合占白鷗前夜來耿耿江湖夢秋水長天一釣船前賢小集拾遺聞笛何處桓伊酒力雄分明嚼徴更含宫倚樓三弄西風急不覺梅花大半空後村千家詩項容孫容孫字仲履號雲藪江陵人嘉定七年進士理宗朝官殿中侍御史山中憶兄弟鴻雁不成行飄零歲月長一身三處夢半夜九回腸積雪欺茅屋孤燈照錦囊何當夜聼雨郤話此凄涼詩林萬選吳昌裔昌裔字季永號青蓮山人中江人嘉定七年進士理宗朝歷官知婺州加集英殿修撰以寶章閣待制致仕卒諡忠肅有集擕客山行詠陶嘉月自雙徑來洞霄丹巖翠壑林立環擁神剜鬼刻不可名狀餐雲潄月偶得八吟留之山中以紀幽踐嘉熙三年三月榖雨存三首上界神仙住九華故留靈鎖護煙霞雲根欲斷溪回處流出山中幾片花九鎖山鑿破千年渾沌心石楠當戶洞愔愔詩臞猶怯春寒在捫石梯雲不敢深棲真洞誰鑿巖扉石竇開懸崖飛瀑轉風雷須臾白浪從天下野客不知何處來飛玉亭洞霄詩集吳淵淵字道父寧國人嘉定七年進士纍官江東安撫使行宫留守兼屯田使拜參知政事封金陵侯有退菴遺集登南城江城一眺思悠悠平楚蒼然野水流衰草寒煙梅丈墓敗垣斜日謝公樓江山有恨英雄老天地無私草木秋萬古興亡俱是夢不知何者為身謀句一帶天分南北限兩眉煙鎖古今愁蛾眉山菴遺集以上退吳潛潛字毅夫寧國人淵弟嘉定十年進士第一淳祐中歷官特進左丞相封許國公以沈炎論劾謫化州團練使循州安置有履齋遺集睡起行北園睡起卸冠簪園行獨自吟山昏知雨到樹密覺春深竹外童相報門前客見尋歸來即敗意誰者是知心即事春隂漠漠護輕寒春晝無聊午夢間幽鳥不知人意改銜花飛傍小闌干以上履齋遺集聞同官會碧沚碧沚堂前瞰水官秖應喚作玉壺看頗聞秩秩玳筵展莫遣匆匆銀燭殘酒付别腸寧怕窄詩由廣舌不憂乾老夫孤坐三更月欲往從之道路難萬頃湖光浩不收花汀竹嶼思悠悠黃公舊隱知何地賀監言歸乞此洲良夜最佳唯午夜今秋偏好是中秋舉杯酒露月同吸仰面青天可問不占春亭即事桃花幾片隔牆飛獨自危樓徙倚時目送斷鴻雲外沒東風吹淚落天涯見他門戶插垂楊懊恨江南客子腸春夢誰云無準托連宵合眼是家鄉題暗香疏影詞後用潘德久贈薑白石韻人生浮脆若菰蒲四十年前此丈夫擬向西湖酹孤魄想應風月易招呼以上開慶四明續志和人賦金魚仙人藥苗化為魚身雖纖細味豐腴土人涉溪如採荇以布為網猶恐疏不比吳王耽嗜鱠松江千古留腥滓好似春茶槍與旗俯視銀條不足數人生所樂在家鄉何必定食河之魴琴髙仙遊不可躡自向崑崙朝玉皇玉皇一笑倚天末乞與五湖任囊括扁舟煙雨歸去來卧聽魚槎聲濊濊吳禮部詩話宣城涇縣有琴髙山有琴髙溪俗傳控鯉而升之所每嵗三月中有小魚數十萬一日來集亦傳以為投藥滓所化至今人待此日盡網之曝以為乾味甚美吳履齋嘗賦詩和人韻云云絶句編茅為屋竹為椽屋上青山屋下泉半掩柴門人不見老牛將犢傍籬眠句楊桞年年人老大江山處處客凄涼以上全芳備祖汪立中立中四明人甲戌廷對後到洞霄丙戌假守新安又得寄徑成詩紀遊憶昔尋幽興未終重來洞府訪仙翁十年塵土身將隱千里華陽路暗通山水秪如前日好松杉似與老人同明朝又入黃塵去回首青山一夢中洞霄詩集丘嶽嶽號煦山丹徒人嘉定十年進士江淮制置使自淮梱代歸領纍偕親友遊虎丘偶成影語以紀歲月淳祐庚戌七月二十五日一目四蒼莽突然見林丘飛來靈鷲峯幻出蓬萊洲浮圖髙崒嵂石徑通深幽生公講經臺曾聞石點頭劒池杳無底修綆汲寒流千古詫異傳此事還是不我來秋向深良苗匝平疇憂國願年豐一稔銷百憂虎丘志陳塤塤字和仲鄞人嘉定十年進士歷尚書吏部侍郎國子司業曰琯按方氏瀛奎律髓注云陳塤字伯和號習菴其先陽翟人寓居桐廬分水道中午困思茶無處煎溪橋側畔認炊煙松窗竹牖人家靜旋借沙瓶汲澗泉前賢小集拾遺山居次滕元秀韻解組滄溟畔擕家紫翠間地臨雙港勝天與兩年間茅屋靜聞雨竹籬疏見山所慚鄰舍老句險不容攀瀛奎律髓釣臺第十九泉十年不泛釣臺船夢想髙風日月邊今日偶來無住著再嘗灘下煮茶泉嚴州府志遊虎丘老龍拖雨過平川曉影初開樹色鮮有片白雲收不盡日髙猶在講臺邊碧玉千尋劒影寒夜深光怪逼危闌句吳霸略成塵土空有青山覆石壇虎丘志王邁邁字實之號臞軒居士興化軍仙遊人嘉定十年進士調南外睦宗院教授召試學士院改通判漳州應詔直言為臺官所劾削二秩淳祐中知卲武軍豫祠卒贈司農少卿飛翼樓舊傳説范蠡故址亭前一望海東流更有雄樓在上頭燕子飛來春漠漠鴟夷仙去水悠悠神交故國三千里目斷中原四百州日暮片雲棲古樹昔人留與後人愁詩家鼎臠除夕憶昔都門值歲除髙樓張燭戲呼盧久依淨社參尊宿難向新豐認酒徒天子未知工草賦鄰人或倩寫桃符寒宵别有窮生活點勘離騷擁地爐後村千家詩賀林簿新娶金華門外厭京塵烏帽山前結帨巾翁壻相看冰映玉庭闈一笑頰生春昔言爾爾嫌隨俗今喚卿卿喜有人來歲夢蘭嘉兆叶犀錢玉果出娛賔翰墨大全句未知死所先期死自笑狂生老更狂齊東野語王實之邁有文名落魄不羈為正字日因輪對及故相擅權理宗宣諭曰姑置衛王之事邁即抗聲曰陛下一則曰衛王再則曰衛王何容保之至耶上怒不答徑轉御屏曰此狂生也邁歸鄉里自稱敕賜狂生嘗有詩云云羅必元必元字亨父號北谷隆興府進賢人嘉定十年進士度宗朝纍官直寶章閣兼宗學博士金陵作六朝遺迹舊山川萬里長江當守邊一念易驕人事廢不關飛渡北來船憑髙懷古思悠悠遙想騎驢白下遊不是龍眠圖畫裏如今親到蔣山頭景定建康志宋詩紀事卷六十一
