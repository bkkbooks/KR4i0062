body:
  text: 宋詩紀事巻八十四錢塘厲鶚撰花蘂夫人夫人姓徐氏蜀之青城人以才色入蜀宫後主嬖之號花蘂夫人效王建作宫詞百首國亡入宋備後宫鐵圍山叢談國朝降下西蜀而花蘂夫人又隨昶歸中國昶至且十日則召花蘂夫人入宫中而昶遂死昌陵後亦惑之常造毒藥爲患不能禁太宗在晉邸時數數諫昌陵而不克去一日兄弟相與獵苑中花蘂夫人在側晉邸方調弓矢引滿政擬走獸忽回射花蘂夫人一箭而死焉改齋漫錄徐匡璋納女于孟昶拜貴妃别號能花蘂夫人意花不足擬其色似花蘂翾輕也又升號慧妃號如其性也王師下蜀太祖聞其名命别䕶送陳無巳云姓費誤矣奉召作君王城上豎降旗妾在深宫那得知十四萬人齊解甲更無一箇是男兒後山詩話僞蜀降太祖召花蘂夫人使陳詩誦其國亡詩云云太祖悦蓋蜀兵十四萬而王師數萬耳宫詞五雲樓閣鳳城閒花木長新日月閒三十六宫連内苑太平天子住崑山龍池九曲遠相通楊柳絲牽兩岸風長似江南好風景畫船來去碧波中殿名新立號重光島上亭臺盡改張但是一人行幸處黄金閣子鎖牙牀廚船進食蔟時新侍宴無非是近臣日午殿頭宣索鱠隔花催喚打魚人御製新翻曲子成六宫纔唱未知名盡將觱篥來抄譜先按君王玉笛聲太虚高閣凌虛殿背倚城牆面枕池諸院各分娘子位羊車到處不教知殿前宫女總纖腰初學乘騎怯又嬌上得馬來才似走幾回抛鞚把鞍橋自教宫娥學打毬玉鞍初跨柳腰柔上棚知是官家認徧徧長贏第一籌内家追逐採蓮時驚起沙鷗兩岸飛蘭棹把來齊拍水並船相鬭溼羅衣月頭支給買花錢滿殿宫人近數千遇著唱名多不語含羞走過御牀前水車踏水上宫城寢殿簷頭滴滴鳴助得聖人高枕興夜深長作遠灘聲沈香亭子傍池斜夏日巡遊歇翠華簾畔越盆盛淨水内人手裏剖銀𤓰薄羅衫子透肌膚夏日初長板閣虛獨自倚欄無一事水風涼處讀文書六宫一例羅冠子新樣交鐫白玉花欲試淡妝兼道服面前宣與唾盂家春天睡起曉妝成隨侍君王觸處行畫得自家梳洗樣相憑女伴把來呈小小宫娥到内園未梳雲鬢臉如蓮自從配與夫人後不使尋花亂入船春日龍池小宴開岸邊亭子號流杯沈檀刻作神仙女對捧金樽水上來摴蒱冷澹學投壺箭倚腰身約畫圖盡對君王稱妙手一人來謝一人輸明朝臘日官家出隨駕先須點内人回鶻衣裝回鶻馬就中偏稱小腰身高燒紅燭照銀燈秋晩花池景色澄今夜聖人新殿㝛後宫相競覓祗承池心小樣釣漁船入翫偏宜向晩天挂得綵帆敎便放急風吹過水門邊㑹仙觀内玉清壇新點宫人作女冠每度駕來羞不出羽衣初著怕人看小院珠簾著地垂院中排比不相知羡他鸚鵡能言語窗裏偷敎鸜鵒兒内人承寵賜新房紅紙泥窗遶畫廊種得海柑才結子乞求自過與君王梨園弟子蔟池頭小樂攜來候宴游旋炙紅笙先按拍海棠花下合梁州秋曉紅妝傍水行競將衣袖撲蜻蜓回頭瞥見宫中喚幾度藏身入畫屏内人深夜學迷藏徧遶花叢水岸傍乗興或來仙洞裏大家尋覓一時忙管弦聲急滿龍池宫女藏鉤夜宴時好是聖人親捉得便將濃墨掃䨇眉安排諸院接行廊外檻周回十里強靑錦地衣紅繡毯盡鋪龍腦鬱金香年初十五最風流新賜雲鬟使上頭按罷霓裳歸院裏畫樓雲閣總重修花蘂夫人宫詞成都文類王平甫云熙寧間奉詔定蜀楚秦氏三家所獻書得一弊紙所書花蘂夫人詩共三十二首乃夫人親筆而詞甚奇謹令繕寫入三館而歸口誦數篇于丞相安石明日中書語及之而王珪馮京願傳其本于是盛行于世張夫人哭魏夫人香散簾幃寂塵生翰墨閑空傳三壼譽無復内朝班揮麈後錄曾文肅熙寧初爲海州懷仁令有監酒使臣張者小女甫六七歲甚爲惠黠文肅之室魏夫人憐之敎以誦詩書頗通解其後南北暌隔紹聖初文肅柄事樞時張氏女已入禁中雖無名位以善筆札掌命令之出入忽與夫人相聞夫人以夫貴疏封瀛國稱壽禁庭始相見叙舊自後嵗時遣問夫人殁張作詩哭之云云從此絶迹矣後四十年靖康之變張從昭慈聖獻南渡至錢唐朱忠靖筆錄所記昭慈遣其傳導反正之議張夫人者卽其人也年八十餘終楊妹子楊妹子恭聖皇后之妹書史㑹要楊妹子書法極似寧宗馬遠畫多其所題語關情思人或譏之題趙伯驌畫蓮開宫沼年年盛香染斑衣葉葉新願借琴音奏清雅薰風涼殿壽䨇親題菊花圖莫惜朝衣準酒錢淵明身卽此花仙重陽滿滿杯中泛一縷黄金是一年以上珊瑚網題馬遠畫梅重重疊疊染緗黄此際春光巳半芳開處不禁風日煖亂飄晴雪點衣裳白玉蜨梅銖衣翠蓋暎朱顏未委何年入帝關默被畫工傳寫得至今猶似在衡山著雪紅梅夭桃豔杏豈相同紅潤姿容冷淡中披拂輕烟何所似動人春色碧紗籠烟鎖紅梅渾如冷蜨㝛花房擁抱檀心憶舊香開到寒梢尤可愛此般必是漢宫妝綠萼玉蜨項鼎鉉呼桓日記鑑臺叔出觀馬遠單條四幅俱楊妹子題後各有楊娃之章一小方印王清惠清惠字沖華宋昭儀德祐丙子隨三宫入燕按東圉客談有昭儀王清惠賦滿江紅詞楊儀金姬别傳作黄惠清當是傳聞之誤送水雲歸呉并序水雲畱金臺一紀琴書相與無虛日秋風天際束書告行此懷愴然定知夜夢先過黄河也一時同人以勸君更盡一杯酒西岀陽關無故人分韻賦詩爲贈他時海上相逢當各說神仙人語又豈以世間聲律爲拘拘耶朔風獵獵割人面萬里歸人淚如霰江南江北路茫茫粟酒千鍾爲君勸水雲集李陵臺和汪水雲韻李陵臺上望荅子五言詩客路八千里鄕心十二時孟勞欣巳稅區脫未相離忽報江南使新來貢荔枝擣衣詩呈水雲妾命薄如葉流離萬里行黄塵燕塞外愁聽擣衣聲秋夜寄水月水雲二昆玉萬里倦行役秋來瘦幾分因看河北月忽憶海東雲以上楊儀金姬别傳陳眞淑送水雲歸呉天山雪子落紛紛醉擁貂裘坐夜分明日馬頭南地去琴邊應是有文君黄慧眞同前高疊燕山冰雪勁萬里長安風雨横君衣雲錦勒花驄此酒一杯何日更何鳳儀同前十年燕客身如病一曲剡溪心不競憑君寄與愛梅仙天理現時人事盡周靜眞同前燕山雪花大如席馬上吟詩無紙筆他時若遇隴頭人折寄梅枝須一一葉靜慧同前塞上砧聲響似雷憐君騎馬向南回今宵且向穹廬醉後夜相思無此杯孔清眞同前痩馬長吟蹇驢吼坐聽三軍擊刁斗歸人鞁馬不須忙爲我更釂葡萄酒鄭惠眞同前琵琶撥盡昭君泣蘆葉吹殘蔡琰啼歸見林逋煩說似唐僧三藏入天西方妙靜同前萬里秦城風淅淅一望蘇州雲幂幂君今得旨歸故鄉反鎖衡門勿輕出翁懿淑同前金門夜醉紫霞觴乞得黄冠還故鄉一似陳摶歸華嶽又如李泌過衡陽章妙懿同前一從騎馬逐鈴鑾過了千山又萬山君巳歸裝向南去不堪腸斷唱陽關蔣懿順同前十年牢落醉穹廬不用歸榮駟馬車他日儻思人在北音書還寄雁來無林順德同前歸舟夜泊西興渡坐看潮來又潮去江草江花春復春山青水綠元如故袁正淑同前抱琴歸去海東濵莫逐成連覓子春十里西湖明月在孤山尋訪種梅人以上水雲集朱氏袖中遺詩旣不辱國幸免辱身世食宋祿羞爲北臣妾輩之死守於一貞忠臣孝子期以自新西湖志餘至元十一年丙子二月巴延以宋謝全兩后以下北去五月二日抵上都朝見十二日夜宋宫人陳氏朱氏與二小姬沐浴整衣焚香縊死朱氏遺四言詩于袖中宋詩紀事巻八十四
