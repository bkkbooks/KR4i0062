body:
  text: 宋詩紀事巻六十四錢塘厲鶚撰丁黼黼字文伯號涎溪池州人寳慶初官成都制置使嘉熙三年北兵至力戰死之賜額立廟諡恭愍送錢尉入國正是朔風吹雪初行幐結束問征途不能刺刺對婢子已是昻昻真丈夫常惠舊曾隨屬國烏孫今亦病匈奴不知漢節歸何日準擬殷勤說汴都益部談資陳起起字宗之錢塘人開書肆于睦親坊亦號陳道人寳慶初以詩禍為史彌逺所黥有芸居乙稿瀛奎律髓寳慶初史彌逺廢立之際錢唐書肆陳起宗之能詩凡江湖詩人俱與之善刋江湖集以售劉潛夫南岳稿亦與焉宗之賦詩有云秋雨梧桐皇子府春風楊栁相公橋夲改劉屏山句也或嫁秋雨春風句為敖器之所作言者併潜夫梅詩論列劈江湖集板二人皆坐罪而宗之坐流配于是詔禁士大夫作詩紹定癸已彌逺死詩禁解秋懷又見街頭賣紫萸老懷擾擾類催租客來喜得吳江紙欲寫新吟一字無過三橋懷山堂賣花聲裏憑闌處沽酒樓前對雨時景物如初情自老夕陽波上燕差池挽許梅屋桐隂吟社憶當年别後攀梅結數椽湖海有聲排逸韻弓旌不至歎遺賢兒收殘稿能傳業自誌平生不媿天航便雙魚無復得夾山西望淚潺湲以上芸居乙稾夜過西湖鵲巢猶挂三更月漁板驚回一片鷗吟得詩成無筆寫蘸他春水畫船頭梅磵詩話鄭斯立斯立字立之贈陳宗之昔人耽隱約屠酤身亦安矧伊叢古書枕藉于其間讀書博詩趣鬻書奉親歡君能有此樂冷淡世所難我本抱孤尚為貧試彈冠欲和南薰琴秋風欻戒寒恬無分外想賸有日晷閒閲書于市廛得君羈思寛誦其所為詩刻苦雕肺肝陶韋淡不俗郊島深以艱君勇欲兼之日夜吟辛酸京華聲利窟車馬如浪翻淡妝誰為容古曲誰為彈桐隂覆月色静夜獨往還人皆掉臂過我自刮眼看百年適志耳豈必身是官不見林和靖清名載孤山前賢小集拾遺翁定定字應叟建安人有𤓰圃集劉後村跋應叟尤工律詩送人去國之章有山人處士疎直之氣傷時聞警之作有忠臣孝子微婉之義感知懐友之什有俠客節士死生不相背負之意送胡季昭竄象郡應詔書聞便逺行廬陵不獨詫邦衡寸心秖恐孤天地百口何期累弟兄世態浮雲多變換公朝初日盍清明危言在國為元氣君子從來豈願名鶴林玉露季昭廬陵人寳慶初元為大理評事應詔上書言濟邸事竄象郡翁定諸人送行云云兄于建弟國賔皆懷竒負氣友愛最隆得罪之日嚢無一錢子建挈家歸賣文以活國賔奮然徒步從其兄于貶所李昭殁詔許歸葬贈朝奉郎官其一子洪舜俞草贈官制詞云朕訪落伊始首下詔求讜直盖與諫鼓謗木同意以直言求人而以直言罪之豈朕心哉爾風裁峭潔志槪激壯繇尉廷平上書公車言人之所難言方嘉貫日之忠巳墮偃月之計開塗胥口訪事瀧頭曾無幾微見于顔面何氣節之烈也仁祖能全介于逺謫之餘孝祖能㧞銓于投荒之後撫今懐往魂不可招潦霧墮鳶悲悔何及陟階員外仍官厥子用旌折檻之直且識投杼之過爾雖死可不朽矣胡炎炎寳慶初太學生送胡季昭竄象郡一封朝奏大明宫噓起廬陵古直風言路從來天樣闊蠻荒誰使徑旁通朝中競送長沙傅嶺表爭迎小澹翁學館諸生空飽飯臨分憂國意何窮鶴林玉露李昂英昂英字俊明番禺人寳慶丙戌廷對第三淳祐初官吏部郎累擢龍圖閣待制吏部侍郎歸隱文溪卒諡忠簡有文溪集久住白雲呈鎮長老桑下戒三宿我此尚畱戀曹溪悟一夕我復無知見鎮公房遜客所須如執劵園丁曉供茹行者時灌硯飯奴更芻馬紙帳費香篆主人真好事荅應了無倦欲歸興未闌坐享伊蒲饌酌别張子元并序子元已注今年班籍去臘余以言職免歸子元不待引見毅然相隨南還茲再入京送之至鑒空閣下用東坡韻為别南士如君幾妙處方寸境撑腸五千巻落筆擅三影喜談狂朱雲恥作諛谷永憂時㸃髭雪未肎疎鑷鏡摩挲匣中龍起視斗牛耿每同畫灰語寒夜僮僕屏吾儕期嵗晏世俗任炎冷江亭揮别酒謔笑闘機警景文兄弟情畝異禾同穎日邊多便驛頻書來越嶺景泰寺樹合疑山盡攀緣有路通逺鴉追夕照低雁壓西風瀑勢雷虛壑松聲浪半空凭闌僧指似漲霧是城中送舶使周甲堂堂山立舊朝簪久屈清流督獻琛風送連艘出獅國浪吹殘句到雞林平生不隔同袍面中嵗難禁惜别心歸見耆英定相問秖言閉户萬山深以上文溪集送湛師回華首寺翩然拂袖忽然回帶得羅浮面目來乞食又還雙足繭坐禪豈是寸心灰故依華首從三靖旋摘茶芽供一杯蘭若苦空君不厭可能為我掃蒼苔羅浮山志洪夢炎夢炎字季思號然齋淳安人寳慶二年進士歴官武學博士出知衢州有集髙齋桂窟植桂不在多種徳如種樹前人能種後人傳自有清隂滿庭户髙枝淩雲低覆䦨晴光翠色生晝寒人家多愛種桃李幾日春風紅滿地何如此花開獨遲蟾宫窟裏秋香細課兒讀書書滿牀更將幽興引壺觴半酣獨臥髙齋下啼鳥數聲清晝長淳安縣志徐經孫經孫字仲立初名子柔豐城人寳慶二年進士累遷刑部侍郎太子詹事拜翰林學士知制誥忤賈似道罷歸閒居十年卒諡文惠有矩山存稾病中有感習嬾多成病旬餘久覆杯帳中聞燕語瓶裏看花開醫已肱三折愁來腸九迴何時得疎散屐齒印蒼苔送太庾黎丞客懷秋易惡送客更當秋薄宦相從久孤征肎暫畱酒輕離思重目短大江流黄菊聊持贈寒香晩不羞福州即景一别居諸嵗月増遙聞此景畫難能潮田種稻重收榖石路逢人半是僧城裏三山千蔟寺夜間雙塔百枝燈當年六月東山下地湧寒泉潄齒冰以上矩山存稾吳子良子良字明輔臨海人寳慶二年進士官至湖南運使大府少卿有荆溪集葵花俗名一丈紅花生初咫尺意思已尋丈一日復一日看看衆花上全芳備祖馬光祖光祖字華父金華人寳慶二年進士仕至寳章閣直學士沿江制置使江東安撫使知建康府拜知樞密院事以金紫光禄大夫致仕卒諡莊敏汝南灣當時只號汝南灣後有三人住此間自謂逸民須隱約並稱賢士想髙閒秖縁水味都殊異且欲鄰居數往還好事有時相就飲不妨鐺腳􅍟青山焦氏筆乗汝南灣當秦淮曲折處齊陸慧曉清介自立家于灣前張融牽船住岸卜鄰以居劉瓛及弟璉二人并居其間水有異味時共酌飲之馬制使光祖有詩翁甫甫字景山崇安人寳慶二年進士累官江西轉運使改知泉州有浩堂類稾九日秋風兩度身為客巳見重陽未到家村酒不堪供節事秖將青眼看黄花全芳備祖程元鳳元鳳字申甫歙人紹定二年進士累遷參知政事拜右丞相兼樞密院使罷充醴泉觀使度宗即位拜少傅右丞相進封吉國公致仕卒諡文清明堂大禮慶成詩聖心翼翼對蒼穹蕆事明禋協肅雍玉輅曉升香霧滃紫壇夜款瑞烟濃風聲應律諧簫管月色澄空映璧琮丹鳳樓前恩施溥歡呼三祝效堯封森嚴羽衛擁和鑾咫尺龍顔侍至尊禋祀儀文勤聖問敬天實意進芻言百神受職來鴻祉多士承休肅駿奔右饗不常威可畏載歌周頌報皇恩寳祐五年史院修髙孝光寧四朝國史成上進九月明堂升侑髙宗禮成進詩三章稱賀聖主嚴恭徳意真兩儀合饗鑒精純九筵五室儀章舊一祖三宗侑典新風日盎温鑾輅駕月星明穊玉巵陳元良式獻邦家慶共祝吾皇夀萬春格天盛徳素躬全肸蠁交通心即天供幣用將祈永命奉粢端為告豐年寛條日布民安業捷幟星馳將護邊虎拜紫宸稱賀處祥光縈繞御爐烟愚臣何幸際明時才本疎庸玷宰司未報聖恩懐夕惕更叨使領侍親祠駿奔重屋儀文肅雞揭端門惠術施歸美慚微天保頌畏威願繼我將詩以上明良慶㑹録李曾伯曾伯字長孺覃懐人居嘉興理宗朝歷官四川宣撫使賜同進士出身為湖南安撫使進觀文殿學士又知慶元府兼沿海制置使有可齋類稾題二水光華軒歷歷湖南道駸駸嶺右州感時僧解夏觸事客驚秋雨洗流金虐風生落木愁一萍如寄耳往夢付悠悠寧廟挽詞徳化勤三紀仁聲溢九州澣衣昭禹儉昃食軫文憂潤色恢鴻業艱難啟燕謀中興宗漢廟端自敬天休自聽山東詔甘泉息夜煙璽膺新玉帛圖貢舊山川望切堯民日憂形杞國天中原尤感泣不獨老臣然利州登棧道足跡初來劒北州試登危棧瞰江流萬山西接地窮處一水東歸天盡頭欲訪殽函無健馬相忘楚漢付輕鷗丈夫要了中原事未分持竿老釣舟偶得希真巖壑舊隱正在小圃因賦數峯佳致藹前修心匠玲瓏小更幽公去我來幾傳舎人非物是一虚舟矗天栁色新條改垂地藤隂舊迹畱坐對黄花誰領㑹猶疑胡蜨是莊周以上可齋類稾厲文翁文翁字聖錫號小山居士東陽人唐詩人御史元之後父少保模理宗朝以郊恩入仕累官權户部尚書端明殿學士兩浙制置使兼知臨安府封東陽郡開國侯庭竹渭川未暇栽千畝庭檻聊須種數根最愛深秋羣木脱獨欺風雨戰黄昏全芳備祖句暮雲春雪江南北回首人生歎路歧梅且喜臥龍常自在新詩特地報平安松全芳備祖岳珂珂字肅之號亦齋又號倦翁忠武王孫敷文閣待制霖子管内勸農使知嘉興歴官户部侍郎淮東總領有玉楮集無題秋水芙蓉試早妝半軒微雨灑鴛鴦細腰正欠酬金餅奮翼何堪卸玉梁髮鬒釵横人在牖繩低斗轉月侵牀無情花影雲來去都作一天風露涼試廬陵賀發竹絲筆此君素以直節名延風揖月標韻清何人心匠出天巧縷析毫分勻且輕居然束縛復其始即墨紆朱封管城世門官爵豈必計且幸一家同汗青九月十三日始就郊墅拜寳謨閣直學士提舉江州太平興國宫之命槐影西清舞翠鸞竹宫髙接五雲環職陪溫洛圖書地名在元封卜祝間晝訪未承龍閣問晨香猶廁羽衣班祠官到處無公事且聽松聲老此山以上玉楮集鶴林寺秋枕竹鳴屋晝棊松掩關雨晴猶溼徑雲薄不藏山未洗中原恨誰消永日閒西風動征隰空媿鬢毛斑鶴林寺志董太初保應廟在新昌縣十四都隋諸王避難殁葬其地水旱疾疫祈禱輙應寳慶二年從郷民之請建庿賜額庿食空山八百年衣冠猶是李唐前汴河十里垂楊栁何似松隂數畝田紹興府志顔頤仲頤仲字景正龍溪人煥章閣學士師魯孫以祖䕃補官累擢吏部尚書寳章閣學士提舉玉隆宫卒栁栁漸成隂萬縷斜舞腰柔弱弄韶華一庭春色無人管簷雨聲中飛盡花廣羣芳譜祝穆穆字和父曽祖確歙之名士于朱文公為外祖父康國始從文公居崇安穆少與弟舉同事文公于雲谷得其緒論嘗著事文類聚方輿勝覽行世山礬花玲瓏葉底雪花寒清晝香熏草木閒移植小軒供宴坐恍疑身在普陀山全芳備祖楊棟棟字元極青城人紹定二年進士度宗朝官同知樞宻院事參知政事出知慶元府卒有平舟集浄土寺追和東坡韻在臨安吳越王建令君督來期書郵日旁午世事不足論清游乃先務朝朝叩禪關復此得浄宇淺斟琥珀濃細嚼銀絲縷味雋問牛酥軒髙來燕乳曲折溪屢横尖圓峯可數萬頃喧桑田一蔟静松塢由來鏡中人不殊草頭露越主朝汴宫蜀客盡吳語剝蝕浄土碑荒殘峽山路桑梓如之何誰能忘一顧日詢錦橋新三歎清流俯咸淳臨安志蔡抗抗字仲節號九軒處士元定孫沈之子也紹定二年進士累官擢吏部尚書端明殿學士同知樞宻院事拜參知政事以忤時相落職奉祠卒諡文簡改文肅大隱屏脱畧塵世慮仙巖共夷猶乗源得風便快楫行扁舟神仙現竒怪古木横巖陬振衣萬仞髙天風動衣樞巍巍隱屏峯擎天峙中流良朋論心事感慨悲新秋浩歎復浩歌一飲還一酬南陽豈終臥東山諒同憂斟酌素有定今焉試為籌西方起暝色歸袂不可畱去去惜離别後㑹良悠悠武夷山志陳松龍松龍字應初號三嶼閩縣人紹定二年進士仕為京口倅大理司直荼䕷布葉叢條翠作圍自生芒刺護裳衣莫嫌野興難拘束秖伴春風亦見幾全芳備祖曾原一原一字子實號蒼山贑州寧都人領鄉薦紹定中與戴石屏結江湖吟社賦楊妃韈七嵗作萬騎西行駐馬嵬浚波曾此墮塵埃誰知一掬香羅小踏轉開元宇宙來梅磵詩話鄭㑹㑹字有極號亦山江亭夜坐呈曾蒼山江梅欺雪樹槎牙梅片飄零雪片斜夜半和風到窗紙不知是雪是梅花詩林萬選游金精山春風棧閣曉雲寒中有潺潺玉一灣白石棊盤青石磴蘚花猶帶漢時斑金精風月題邸閒壁酴醿香夢怯春寒翠掩重門燕子閒敲斷玉釵紅燭冷計程應説到常山宋藝圃集陳夢庚夢庚字景長閩人紹定中廣西路漕幕大隱屏大隱屏前風月閒何人手種萬琅玕深深五曲東流水合作千年洙泗看武夷詩集徐元杰元杰字仁伯信州上饒人紹定五年進士第一歷著作佐郎兼兵部郎官進太常少卿兼給事中國子祭酒卒諡忠愍湖上花開紅樹亂鶯啼草長平湖白鷺飛風物晴和人意好夕陽簫鼓幾船歸西溪叢話孫子秀子秀字元實餘姚人紹定五年進士開慶初歷提點兩浙刑獄除太常少卿兼知臨安府游丹山四明洞天居第九巨靈擘石開窗牖捫蘿陟巘不憚勞同行況遇忘年友老苔護石蒼虎閒飛瀑懸崖玉龍吼豁然人與境俱勝未必醉翁真在酒徘徊步月醉忘歸世事浮雲竟何有姚江逸詩朱繼芳繼芳字李實建安人紹定五年進士有静佳乙稾登眺破㡌任風吹天知鬢已絲大江流禹蹟老樹見秦時北際山如礪南溟水似池夜涼無夢到久矣歎吾衰江湖偉觀葛嶺夀星院上有閣曰江湖偉觀安撫趙與夀建吳山表裏水為池百有餘年壯帝畿天目舊將雙鳳下海門新拱六龍飛胥濤白雪生秋思太乙紅雲駐夕暉江上沙鷗湖上舫栁絲風裏兩依依次韻野水花朝之集睡起名園百舌嬌一年春事説今朝鞦韆庭院紅三徑舴艋池塘緑半腰苔色染青吟屐蠟花風吹暖弊裘貂主人自欠西湖債管領風光是客邀吳歌雁影江潭底秋聲浦溆間吳兒歌一曲月子幾回彎揚州金陵王氣水東流流到淮南古岸頭夜半一聲天上曲錦㠶天子下揚州用前韻謝野水郎君招飲為有池臺無限嬌遊人歌舞尚朝朝清漪浴日開金面晴哢調風衮緑腰騷客五花唐殿馬主家七葉漢庭貂丁寧紅紫休開徧約住春風待見邀題李秋堂盟鷗集相逢已恨十年遲買酒吳山一夜時明日送春仍送客栁花風颺鬢邊絲辛亥二月望祭齋宫因逰甘園朝霏作雨連天溼花氣熏人到骨香四望水亭無正面有花多䖏背湖光老眼看花興未厭不知頭上雨亷纖流鶯浪語東風恨誰拗花枝插㡌檐滄浪風月我登滄浪亭復歌滄浪曲歌竟復長歌杳杳山水緑天風吹𣪚髮山月照濯足為謝獨醒人漁家酒初熟以上静佳乙槀靈芝寺黄金帀地小橋通四面清平納逺空雲氣長扶天子座日光浮動梵王宫殘碑幾字莓苔雨疎磬一聲楊栁風沙鳥不知行樂事背人飛過夕陽東武林舊事寺在湧金門外錢王故苑芝生其間捨以為寺髙宗孝宗凡四臨幸朱静佳有詩六言栁下白頭釣叟不知生長何年前度君王遊幸賣魚收得金錢武林舊事淳熙間夀皇以天下養毎奉徳夀三殿游幸湖山凡㳺觀買賣皆無所禁小舟時有宣喚賜予如宋五嫂魚羮嘗經御賞人所共趨遂成富媪朱静佳六言詩云云往往修舊京金明池故事以安太上之心豈特事遊觀之美哉薛師傅師傅鄞人紹定五年進士有雪蓑集六橋閒步出郭青岑近臨流白鳥飛笙歌春雨歇草樹夕陽微山色邀藜杖湖風颭葛衣虚舟林處士不見鶴來歸甬上耆舊集俞桂桂字希郄仁和人紹定五年進士有漁溪詩稾過湖舟移别岸水紋開日㬉風香正落梅山色濠濠横畫軸白鷗飛處帶詩來虎丘突兀浮圖插翠微吳王事迹總成非寺僧未晩山門閉不放閒雲一片飛松江送人西風蕭瑟入船窗送客離愁酒滿缸好記此時分袂處暮烟微雨過松江以上漁溪詩橐方岳岳字巨山號秋崖祁門人紹定五年進士兩為文學掌故官中祕書出守袁州有秋崖先生小稾泊歙浦此路難為別丹楓似去年人行秋色裏雁落客愁邊霜月攲寒渚江聲驚夜船孤城吹角處獨立𣺌風烟約黄成之觀瓊花予不及從以詩代簡杜宇聲中鬢欲華春風將緑又天涯欠隨江夏無雙士共看揚州第一花想像烟雲人跨鶴淋漓詩句字棲鴉蹇驢不管唐衫溼醉兀歸鞍暮雨斜立春都堂受誓祭九宫壇輦路春融雪未乾雞人初唱五更寒瓊幡第一番花信吹上東皇太一壇湖上沙暖鴛鴦傍栁眠春來亦嬾避湖船佳人窈窕惜顔色自照晴波整翠鈿今嵗春風特地寒百花無頼已催殘馬塍曉雨如塵細處處筠籃賣牡丹緑波如畫雨初晴一岸烟蕪極望平日暮落花風欲定小樓弦管壓新聲游人抵死惜春韶風暖花香酒未消須向先賢堂上去畫船無數泊長橋清明日舟次吳門篷窗恰受夕陽明楊栁梨花半月程老去不知寒食近一篙烟水載春行趙昭儀春浴紅薇滴露䕶輕寒微鬌香絲卸玉鸞秪道春風庭院祕外間巳作畫圖看以上秋崖小稾陸壡壡字景思號雲西㑹稽人佃五世孫紹定五年進士官禮部員外崇政殿説書謝皋羽編天地閒集列于文謝諸公後絶句采藥人歸聞术氣尋仙路逺夢桃花買來山醸全如水亦解昏昏到日斜野槿扶疎當縛籬山深不用掩山扉客來踏破松梢月鶴向主人頭上飛全芳備祖退宫人破篋猶存舊賜香輕將魂夢别昭陽秖知鏡裏春難駐誰道人間夜更長父母家貧容不得君王恩重死難忘東風二月垂楊栁猶禁飛花入苑牆天地間集湯巾巾字仲能安仁人官制幹以廬山三疊泉寄張宗瑞九疊峯頭一道泉分明來處與雲連幾人競賞飛流勝今日方知至味全鴻漸但嘗唐代水涪翁不到紹熙年從茲康谷宜居二試問真巖老詠仙游宦紀聞廬山三疊泉于紹熙辛亥嵗始為世人所見從來未有以瀹茗者紹定癸已湯制幹仲能主白鹿教席始品題以為不譲谷簾寄張宗瑞云云張輯輯字宗瑞履信之子馮深居目為東仙有欸乃集朱湛盧序其詞云東澤得詩法于姜堯章世所傳欸乃集皆以為采石月下謫仙復作不知其又能詞也次湯制幹寄三疊泉韻寒碧朋尊勝酒泉松聲逺壑憶畱連詩于水品進三疊名與谷簾真兩全畫壁烟霞醒昨夢茶經日月著新年山靈似語湯夫子恨殺屏風李謫仙游宦紀聞紹定癸巳湯制幹伸能主白鹿教席始品題三疊以為不讓谷簾常以詩寄二泉張賡之云云九疊屏風之下舊有太白書室蕭崱崱字則山號大山臨江人紹定進士以太府丞奉祠贈陸冰詩標格真清映雪霜每聽新語覺神傷茶分鴻漸經中味菊愛龜䝉賦裏香圃積玉多知學飽囊裝金少為貧忙向來笑疾難醫在老筆空抄十巻方梅磵詩話純用陸姓事與東坡贈張子野詩頗相類鴻漸龜䝉的對荻芽江客因貧識荻芽一清塵退雜魚蝦燒成味挾濠邊雨掘得身離雁外沙春饌且供行釜菜秋江莫管釣船花食根思到蕭騷葉痛感邊聲咽戍笳茘子選荔過于選士難味佳能有幾登盤林家新出金釵子合入君謨譜後看句雨過亂蓑堆野艇月明長笛和菱歌以上全芳備祖章謙亨謙亨湖州人紹定中鉛山令浄惠院浄惠荒涼寺平林淺阜閒殿存碧支佛門對赭亭山遶屋竹隂翠沿階苔暈斑雨中來託宿卻羨白鷗閑廣信府志安如山如山字汝止廣漢人善擊劒左右射讀經史百氏之書端平甲午安撫曹友聞辟掌書記不起友聞戰死如山往收其骨藏諸其先人之側乃東下老于㑹稽曹將軍將軍精悍姿齒齒碎鐵石在昔童稚中但聞飽經術縱横騁柔翰丹雘間金碧有司塞明詔敝邑屈詞伯芹香春水生冠玉侍重席脱畧章句陋搜抉窮理窟未及文化成其如王土窄丈夫報主願豈必䝉清秩蒼皇請去位滿面秋栗烈糾合熊虎羣旌斾揚廣陌正當摩厲閒一鼓拔勍敵屯兵沔水源千里斧􅎒􅎒浩蕩排烟旻西極安屼嵲奈何國無人腐儒秉旄鉞賞予入私門金湯授盜賊公時奮臂争反遭獻玉刖三軍視馬首慟哭下天壁功成坐齟齬憤怒鬚插㦸中宵拔劒起肅肅整勁翮吐氣風雲生搴旗陷堅列貫穿死生地蹀血天地黑勢雖衆寡懸形未雌雄決路窮斷首尾衆盡乃手格豈知龍虎逝黯淡山川色百萬尚震驚嗚呼死諸葛長城但自壊千古痛稠結肉食無逺謀野史有直筆酒酣歌節士皛皛霜月白下瞿塘去去如奔馬來來無盡船人心似江水日夜向吳天以上谷音黎宙宙號月潭游金精山不到金精久山空花自香殿梁唐嵗月石鼓漢文章洞杳多雲氣崖髙易夕陽酌泉消世慮吾亦正徜徉金精風月宋詩紀事巻六十四
