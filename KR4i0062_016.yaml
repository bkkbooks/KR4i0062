body:
  text: 宋詩紀事卷十六錢塘厲鶚撰蘇寀寀字公佐磁州滏陽人舉進士神宗朝纍官給事中知河南府和趙閲道游海雲山笙歌揭虛閣帷幕匝春池且與民同樂都忘天一涯舊遊嗟倏忽故步喜追隨陌上人如堵歸鞍莫載馳成都文類吕夏卿夏卿字縉叔晉江人慶厯二年進士調江寧尉用薦為編修唐書官書成遷直祕閣同知禮院熙寧初遷兵部員外郎知制誥出知潁州卒泉州府志初歐宋二公典領唐史十七年書始成凡預載筆者皆一時髙選前後十餘人遷徙不常唯夏卿與范鎮自發凡訖于絶筆夏卿又纂新書紀志傳義例摘二公繁文闕誤目為唐書直筆新例一卷唐兵志三卷又集天下碑刻為唐文獻考歷代氏族譜志為古今世系表春陰海棠隂淺日黃昏畫閣輕寒繡被溫春夢醒來能記否賣花聲過忽開門後村千家詩陳襄襄字述古候官人慶歷二年進士歷官知制誥直學士院知陳州徙杭州以樞密直學士知通進銀臺司兼侍讀判尚書都省卒贈給事中有古靈集送關都官致仕鴻雁于飛送關公也公能以禮致仕惜其有老成德不衰不養于朝天子不用古禮留之故作是詩也鴻雁于飛歸戾于澤君子于田亦適維則旅力不愆曷云其極庶民之耋職自為愚君子之耋其德有濡旅力不愆曷云其劬有堅松柏君子斧之有實秠稷農夫有之天子有老曷其與歸野有白駒來食我牟君子之往胡為不留我心悠悠為天子之憂幽齊幽境絶塵蹤莓苔上粉墉秋聲連夜雨寒色一溪松學有書千卷歡無酒萬鍾雲屏孤夢斷寂寞掩巫峯和子瞻沿牒京口憶西湖出遊見寄春隂漠漠燕飛飛可惜春風與子違半嶺烟霞紅斾入滿湖風月畫船歸緱笙一闋人何在遼鶴重來事已非猶憶去年離别處鳥啼花落客霑衣寄逺飛鵲翩翩暮欲棲楚天新月射璇題袖中已滅三年字心曲惟通一㸃犀步障影迷金谷路桃花香隔武陵溪瑶華好折無人寄腸斷江樓百尺梯夜意熏爐香燼蕙烟沈凛冽寒生翡翠衾月國音塵千里絶仙山樓閣五雲深離懷暗耿金壺漏獨夢多驚玉女砧騎省中郎才調逸擬將文筆賦秋心使還咸熙館道中作土曠人稀使驛賖山中殊不類中華白沙有路鴛鴦泊芳草無情妯娌花氈館夜燈眠漢節石梁秋吹動胡笳歸來覽照看顔色斗覺霜毛兩鬢加韋羌山在天台山西上有石壁字如科斗去年曾覽韋羌圖云有仙人古篆書千尺石巖無路到不知科斗是何書中和堂木芙蓉盛開戲贈子瞻千林寒葉正疏黃占得珍叢第一芳容易便開三百朵此心應不畏秋霜題寶嚴院垂雲亭在杭州七寶山小亭巉絶出雲間萬象升沈不得閒莫怪詩翁頭白早時來向此寫湖山以上古靈先生集連庠庠字元禮應山人慶厯二年進士為宜城令至都官郎中宋史隱逸傳連庶字君錫舉進士監陳州稅罷歸始與弟庠在鄉里時宋郊兄弟歐陽修皆依之及二宋貴達不可其志退居二十年守道好修非其義秋毫不可汚也庠亦登科敏于政事號良吏終都官郎中襄州守王侯洙復峴山羊公祠大江西來繞重城猶如叢花匹練縈左山右阜若開避曾是峴首當頭橫江湍衝山山不動滔滔雪浪東南傾隤然巨勢壓漢境萬楚不得專雄名四時美景千百狀登臨可以攄襟靈近麓挼藍秋水緑幽巖團纈春葩明寒林蕭疏四靣合夏木延袤長川青危巔碑墊龜螭蟄隂崖檜老蛟龍形俯瞰洲島相向背風恬江靣羅紋生漁舠數百集其下瞥然來往一葉輕波底崢嶸沈翠影槎頭鳧雁斂霜翎天然佳致信可尚直是丹青寫不成叔子當年樂山水每來置酒空壚罌賢達勝士共愛此謂此風景魁南荆荆人被化思不已立祠山椒共祭牲爾來綿亘幾千載瓦飛棟撓誰經營守臣罕肯著腳到遂至完固屬兼并非憚鳩工繕完葺誠知仁政難繼聲帝眷襄陽曰重鎮宜從館閣擇名卿明公之來百城悅壺漿竹馬相歡迎政成公休屢登覽山前車騎長晶熒傃空寓目看不足詩豪佚發輸精誠乃敕寮屬復祠宇仍從嶺上新虛亭歲時遊憩備言詠荆人愛之猶巨平羊公之政公之化異時一致當同評兩賢繼美何以況山之永兮水之清襄陽府志李觀觀字夢符自號玉溪叟袁州人慶厯二年試南宫賦偶落韻有司愛其䇿為取特㫖由是登第以著作佐郎知臨江軍清江縣嘗為太學官出判處州宜春傳信録朝議大夫李觀夢符史傳諸書過目成誦文章如元次山登第歷官知處州不就請監南嶽廟以歸建玉溪洞中有抱一堂水仙亭有梅所曰香雪塢有衆花處曰錦繡塢貯書史處曰文藪終日醉吟溪上於世味淡如也題處州直廳壁十謁朱門九不開利名淵藪且徘徊自知不是公侯骨夜夜江山入夢來能改齊漫録許當當字當時慶厯初為古田令桃溪桃溪一何清想像武陵水所愛春風時灼灼花數里漁艇日來去無人識歸止安知歷幽源不遇神仙子福州府志石蒼舒蒼舒字才叔雍人善行草官承事郎通判保安庫别韓魏公闕七字簾前二聖擁千官唯有掃門霜鬢客卻隨社燕入長安過庭録石蒼舒與韓魏公有舊韓拜相石至干祿留數月無成石作詩以别歸韓覽之惻然遂注一官而去胡恢恢金陵人華州推官句建業江山千里逺長安風雪一家寒夢溪筆談金陵胡恢善篆𨽻坐法失官困于京師上韓魏公詩魏公深憐之令篆太學石經得復官任華州推官而卒姚嗣宗嗣宗關中人韓魏公薦試大理評事續湘山野録嗣宗關中詩豪忽繩檢坦然自任杜祁公帥長安多裁品人物謂尹師魯曰姚生如何人尹曰嗣宗者使白衣入翰林亦不忝減死一等黥流海島亦不屈姚聞之大喜曰所謂善評我者也書驛壁南越干戈未息肩五原金鼓又轟天崆峒山叟笑無語飽聽松風春晝眠續湘山野録元昊以河西叛朝廷方羈籠關中豪傑之際嗣宗因題詩二於壁其五言有踏碎賀蘭石掃清西海塵布衣能效死可惜作窮鱗之句韓忠獻公竒之奏補職官既而一庸生張某亦堂堂人蝟髯黑靣頂青巾緇裘持一詩代刺搖袖以謁杜公有長安有客靣如鐡為報君王早築臺之句杜祁公亦異之奏補乾祐一尉而胸中無一物未幾以贓去任俞汝尚汝尚字仁廓號退翁又號溪堂居士歸安人慶厯二年進士王安石當國欲置汝尚御史驛召詣京力辭得免從趙抃於青州以屯田郎中致仕卒贈張伯玉倅古睦新定烟霞外溪山清可依夜風泉澑響春雨藥苖肥野鶴眠花圃晴嵐溼案衣預知公暇日垂釣子陵磯詩林萬選題三角亭竒哉山中人構此亭上宇蕙徑斜映帶林烟盡吞吐春無四靣花夜缺一簷雨寄傲足有餘何須存廣廡前賢小集拾遺久客久客西城裏人家似舊鄰衆知趨事懶僧厭打門頻倦枕費窗燭閒書破硯塵陰晴消白日門巷忽青春瀛奎律髓賈黯黯字直孺南陽人慶厯六年進士第一嘉祐中纍擢翰林學士英宗朝遷給事中權御史中丞以疾乞郡除翰林侍讀學士知陳州卒贈禮部侍郎襄州守王侯洙復峴山羊公祠古郡襄水陽羣山繞郛郭其閒峴首者羊公最所樂登臨見洲渚氣象真磅礴公乎既已沒髙碑此鑱鑿廟食有遺像當時盛丹雘到今僅千載碑廟皆頽落喬木荒榛閒廟址存依約碑倒石屢易文字免缺錯我侯至之初亭廟皆新作為詩道其意風化思所託侯慕羊公心仁政及物博將見襄陽治與古相侔若襄陽府志季康伯襄州太守王侯洙復峴山羊公祠賢哉西晉巨平侯刻碑立祠在荆州州民萬家見之者掩面汍瀾雙淚流逮今綿歷幾百祀峴首巍然臨漢水碑鈋廢祠榛莽中蕭蕭只有悲風起內閣深沈侍從臣赤帷皂蓋來行春殷勤拂碑復祠貌一朝舊迹重如新山光葱蒨水清冽天長地久無時别古人今人空茫茫惟是功名不能滅襄陽府志張去惑襄州太守王侯洙復峴山羊公祠漢江千里清溶溶惟此南夏奠其中因山為城峙險固一國形勝何髙雄嶷然巨首名曰峴回壓靣勢尊且崇東扼迅流疑引翼西峙羣阜如盤龍嶔巇峻拔不可擬絶岸萬丈凌長空下闞澄潭迥無際旁睨比屋幾可封天意造物豈虛設控蠻鎮楚舒隆隆自昔登憩且非一此山振動惟羊公有志平吳運祕略竭心衛晉推元功綏懷逺邇人所服開墾田疇時以豐慨然置酒適清曠中郎幕府賢而通語公令望髙四海當與斯山永無窮自是綿綿歲歷久閲碑墮淚存遺蹤亭祠浸壞詎可窕山歸民籍木以童前知興衰故有日覽者歎息追無從龍圖王公守兹土修舉廢墜詰初終感物思人但長息剡章疾置聞四聰聖宸動色可其請兹山復興氣象融耽耽大廈揭亭宇肅肅真像嚴祠宫遂使靈光享血食禁樵復祀資恪恭大抵有功及民物盛德期與天地充今之視古皆一致休哉千載懷清風襄陽府志王介介字中父衢州人以制舉登第性聰悟絶人所嘗讀書皆成誦而任氣多忤物以故不達終于館職送張君宰吳江乍被軒綏寵新辭計省繁三江吳故國百里漢郎官烟水蓴芽紫霜天橘顆丹優游民政外風月即清歡明道雜志句命也豈終否時乎不暫留勉哉藏素業以待歲之秋贈人下第明道雜志中父作詩多用助語作句如贈人落第詩云云此格古未有也草廬三顧動幽蟄蕙帳一空生曉寒石林詩話中甫與王荆公游甚款未嘗降意相下熙寧初荆公以翰林學士被召前此屢召不起至是始受命介以詩寄公云云蓋有所諷公得之大笑他日作詩有丈夫出處非無意猿鶴從來自不知之句蓋為介發也劉敞敞字原父臨江新喻人慶厯六年進士第二纍遷知制誥拜翰林學士改集賢院學士判南京御史臺卒門人私諡曰公是先生有集郡齊讀書志原父出知永興惑官妓得驚眩疾力求便郡仁宗謂執政曰如敞者豈易得耶賜以新橙五十劉原父晚年病不復識字日月兒劉跂暇日記女皆不能認人言永興中多發冡墓求古物致此瓊花并序自淮南遷東平移后土廟瓊花植于濯纓亭此花天下只一株耳永叔為揚州作無雙亭以賞之彼土人别號八仙花或云李衛公所賦玉蘂即此種淮海無雙玉蘂花異時來自八仙家魯人未覩天中樹乞與春風賞物華鐡漿館以下二首奉使作稍出盧龍塞回看萬壑青曠原開磧口别道入松亭此館以南屬奚山溪深險以北屬契丹稍平衍漸近磧矣别一道自松亭關入幽州甚徑易敵常祕不欲漢使知代馬寒隨草奚車夕戴星忽悲田子泰寂寞向千齡奚人以車帳為生晝夜移徙檀州正月二日窮谷回看盡孤城平望遙自古北口山至此都盡市聲衙日集此州衙日市集海蓋午時消每旦海氣如霧至晚消盡土人謂之海蓋冠帶才通漢山川更入遼春風解冰雪最覺馬蹄驕春草春草綿綿不可名水邊原上亂抽莖似嫌車馬繁華處才入城門便不生飲子華家醉翁不來令蘂仙彈醉思仙翠睂紅袖拜尊前撩亂春聲入四弦坐少車公還不樂為君重奏醉思仙以上公是先生集李士衡硯劉涇州所得李侯寶硯劉侯得上有刺史李元刻云是天寶八年冬端州東溪靈卵石我語二客此不然天寶稱載不稱年刺史為守州為郡此獨云爾奚所傳兩君盧胡為絶倒嗟爾於人幾何寶萬事售僞必眩真此固區區無足道硯箋觀永叔五代史大意晚有屬先生拔書彚是非原正始簡古斥辭費裦善傷獲麟疾邪記有蜚處心必至公撥亂豈多諱何必藏名山端如避羅罻合璧事類後集聞鶯醉裏春空盡江邊客未歸可憐鳴睍睆似欲訴芳菲珍樹移時語殘花入眼稀離居亦幽獨求友莫相違鴨腳鶚按此首又見梅堯臣集魏帝昧逺圖於吳求鴨腳乃為吳人料重玩志已愜江南有佳木修聳入天插葉如闌邊跡子剝杏中甲持之奉漢宫百果不相壓養雞茅茨一畞宫生理備委曲雞豚自古昔豢養隨世俗鑿垣安其棲幼長何碌碌旦出四散飛暮還相投宿頗哀鴻鵠輩飲啄不充腹何事萬里遊羈旅傷局促衣冠相嫵媚庭廡更追逐未悟糞土非豈知稻粱辱物理常有此人情苦不足安見避世翁頽然臥空谷以上合璧事類别集贈李才元待詔先生窮巷居簞瓢屢空方晏如自探井臼秣羸馬卻整衣冠迎賜書王人駐車久歎息天子聞之動顔色飽死曾不及侏儒牧民會肯舒筋力詔書朝出蓬萊宫繡衣還鄉由上衷君今已作二千石亦將復為第五公徐度却掃編李才元大臨仕仁宗朝為館職家貧甚僮僕不具多躬執賤役一日自秣馬會例賜御書使者及門適見之歎息而去歸以白上上大驚異遂命知廣安軍熙寧中知制誥坐封還李定除御史詞頭與宋次道蘇子容俱得罪于是名重桃花小樓西望那人家出屋香梢幾樹花只恐東風能作惡亂紅如雨墮窗紗全芳備祖夏夜涼風響髙樹清露墜明河雖復夏夜短巳覺秋氣多豔膚麗華燭皓齒揚清歌臨觴不作意奈此粲者何避暑録話此詩當是在長安時作雜詩效玉川體毁巢鳳不至竭澤龍不游賢者有所歸得非龍鳳儔周公下白屋聖德被九州趙禹謝賔客漢朝以為優澆淳不相襲用舍何其繆茍徇一身利不為萬姓謀哀彼杕杜詩死生遺道周宋藝圃集劉攽攽字貢父與兄敞同舉慶厯六年進士歷祕書少監出知蔡州召拜中書舍人卒弟子私諡曰公非先生有集上書行仕不至二千石賈不至五百萬此事夸者憂而非志士歎君不見下邳受書起幄中運籌制千里功成不受二萬戶拂衣歸從赤松子君不見計倪半䇿誅強吳鴟夷扁舟泛五湖三致千金不自擅至今籍籍宗陶朱大賢富貴不為已心事邈與常人殊逢時致身如反手雲蒸龍變無時無君勿愛上書獻賦稱賢豪刺繡倚市相矜髙丈夫昔曾笑徒勞商賈旦旦稱錐刀自校書郎出倅秦州作璧門金闕倚天開五見宫花落井槐明日扁舟滄海去卻將雲氣望蓬萊長蘆寺越舶吳商倚萬橈紺園金剎起中宵魚龍聽法多因雨江海歸心每上潮林黑夜深燈影白川平天濶梵聲遙心知水怪俱調伏惜取靈犀不用燒送裴二知蘇州著書元尚白送客鬼揶揄積水望江海秋風吹舳艫貴人千騎長紫綬左魚符道愛明南國歡聲接舊吳曉霜繁橘柚過雨熟菰蒲安得如吾子從君飛赤鳧賦歐公廳前兩白鶴明公真愛鶴愛鶴選仙骨遂令千里姿為君軒墀物啄腥豈復辭雞羣鎩翼欲比鳧鷖馴聆音發舞似矜客避寒孤警將依人歐公云此禽畏寒每舍屋中吾聞芝田逸翮不如此世上悠悠誰識真詠史自古邊功緣底事多因嬖幸欲封侯不如直與黃金印惜取沙場萬髑髏齊東野語貢父此詩蓋指當時王韶李憲輩耳絶句青苔滿地初晴後緑樹無人晝夢餘惟有南風舊相識徑開門户又翻書以上公非先生集别茶嬌畫堂銀燭徹宵明白玉佳人唱渭城唱盡一杯須起舞關河風月不勝情過庭録長安妓有茶嬌者以色慧稱貢父惑之被召造朝茶嬌逺送貢父作詩别之至闕永叔去城四十五里迓貢父適病酒未起永叔日非獨酒能病人茶亦能病人矣襄州淳于髠墓微言動相國大笑絶冠纓流轉有餘智滑稽全姓名師儒空稷下衡蓋盡南荆贅壻不為辱旅墳知客卿石林詩話貢父天資滑稽遇可諢諧雖公卿不避與王荆公素厚荆公當國亦屢謔之雖每為絶倒然意終不能平也元祐初知襄州淳于墓在焉題詩云云蓋以自解也寄韓玉汝嫖姚不復顧家為誰謂東山久不歸卷耳幸容攜婉孌皇華何處有光輝石林詩話元豐初契丹來議地界韓丞相玉汝出分畫將行與愛妾劉氏劇飲通夕且作詞留别翌日忽中批步軍司遣兵為搬家追送之初莫測所由久之方知自樂府發也貢父玉汝姻黨即作小詩寄之以戲云黛陀石硯一片蒼山石遙憐巧匠心能存辟雍法宛是馬蹄金氣奪秋雲溼光涵墨海深魚龍隨醉筆變化出幽涔硯箋句瀉湯奪得茶三昧覓句還窺詩一斑優古堂詩話錢唐南屏謙師妙于茶事東坡贈之詩云道人曉出南屏山來試㸃茶三昧手劉貢父亦贈詩云裴煜煜字如晦慶厯六年省元治平中以開封府提刑知蘇州入判三司都磨勘司多景樓登臨每憶衛公詩多景唯於此處宜海岸千艘浮若芥邦人萬室布如棊江山氣象回環見宇宙端倪指㸃知禪老莫辭勤迓候使君官滿有歸期墨莊漫録多景樓在北固山甘露寺中李贊皇題臨江亭詩有多景懸窗牖之句以是命名樓即臨江亭故基裴煜守潤日賦詩錢顗顗字安道無錫人慶歷六年進士熙寧初為御史裏行以論奏王安石貶監衢州稅遊爛柯山春郊雜遝擁紅旌共訪仙蹤嘯傲行雲徑直從深崦入石梁宛在半空橫巖邊瑶圃新開出洞裏芝田舊種成羽客一枰無復見青山留得爛柯名爛柯山洞志劉彝彝字執中福州人少從胡瑗學中慶厯六年進士初為胊山令熙寧二年召對除兩浙運判移知虔州加直史館知桂林除名編隸涪州召還卒有居陽集夜宿善權寺追懷陳述古精識世所稀及道古稀有伊人雖云亡遺德不可朽嘗厭石渠游是邦爰出守浚河納湖波股派活畎畝學宫起城隅塗人或薪槱既富而教之薄俗適忠厚矧豫平生時昏弱賴磨揉共擷姬孔微肯出臯稷後醇源浩罔涯實行靡容茍猶其老巖阿寂寞待同叩天乎奪大成旅兹宜興阜我來剃荆榛雨淚滴杯酒慟哭起秋風落葉紛林藪永懷三益恩語報乏瓊玖願子生人閒世世為親友周必大歸廬陵日記悼賢詩良田十頃接晴烟曾假過侯救旱年俸麥一車開德濟流民千里荷生全人嗟逝水今亡已俗感遺風尚泫然獨對老僧談舊事斜陽春色漫盈川嵊縣志前剡令過昱字彥敷皇祐三年以祕書郎來知剡事連值歲祲出常平錢糴米以活流民復割俸麥七十斛為種假超化院十餘頃役饑民耕種之明年得麥五百餘斛民賴以活熙寧中昱巳亡彝過故院與僧追誦欷歔見民有談及公去無不泣下因此作詩題之院壁胡楚材楚材睦州壽昌人慶厯六年進士憶彭頭山久客倦行役故山安在哉松竹讀書室水石釣魚臺明月照歸夢西風吹酒杯亭亭籬下菊寂寞為誰開嚴州府志楊蟠蟠字公濟章安人一作錢唐人慶歷六年進士為密和二州推官以詩知名元祐中蘇軾知杭州蟠為通判與軾倡酬為多後知溫壽二州卒有集陪潤州裴如晦學士遊金山回作世上蓬萊第幾洲長雲漠漠鳥飛愁海山亂㸃當軒出江水中分繞檻流天逺樓臺橫北固夜深燈火見揚州回船卻望金陵月獨倚牙旗坐上頭宋文鑑蓴菜休說江東日日寒到來且覓鑑湖船鶴生嫩頂浮新紫龍脫香髯帶舊涎玉割鱸魚迎刃滑香炊稻飯落匙圓歸期不待秋風起漉酒調羮似去年苕溪漁隱叢話東岡隋真觀法師塔東岡人不識野寺在樵漁落葉年年滿春風為掃除楊梅塢夏日紅相照天晴塢自開襄陽多稚子摘贈故人來西溪為愛西溪好長憂溪水窮山源春更落散入野田中錢唐江上一氣連江色寥寥萬古清客心兼浪湧時事與潮生路轉青山出沙空白鳥行幾年滄海夢吟罷獨含情以上咸淳臨安志去郡後作為官一十政宦遊五十秋平生憶何處最憶是溫州思逺城南曲西岑古渡頭緑觴春送酒紅燭夜行舟不敢言遺愛唯應念舊遊慿君將此曲寫寄謝公樓溫州府志時燕堂在高郵州治東衆樂園蟠為守時建吏隱盂城九十旬豐年日日是佳辰賦成席上猶飛雪歌動梁閒已落塵此地誰為愛酒伴他時儻憶種花人五壇芍藥齊教放何處揚州更覓春髙郵州志練光亭寒光萬頃淡髙秋粉壁朱闌佇客愁晚日蕭蕭聞落葉晴天歷歷數飛鷗烟橫絶島疏難掩月在平波瑩不流懷抱未忘知有處且和風笛醉滄洲丹陽縣志孫永永字曼叔趙人舉進士官吏部尚書諡康簡清明每年每遇清明節把酒尋花特地忙今日江頭衰病起佛前新火一爐香古今歲時雜詠袁陟陟字世弼號遁翁南昌人慶歷六年進士知當塗縣官止太常博士卒有遁翁集王直方詩話世弼詩慕韋應物而遒麗竒壯過之潘子真詩話世弼宦遊當塗時郭功甫尚未弱冠世弼愛其才薦于梅聖俞自爾有聲功甫嘗曰數載汲引袁二丈力也蒿埋三尺不敢忘其賜苕溪漁隱叢話世弼年十七題百文詩云瓊田收𥝧稏玉澑注琅玕讀書最苦因爾癯瘠歿時才三十四歲自作墓志有詩文十卷號遁翁集今不復傳過金陵謁吳大帝廟未冠時作人苦曹瞞虐天悲漢祿終山河分鼎峙氣象發江東一旦墟京國彌年豢幼冲炎精竟灰燼紫蓋出艨艟長䇿資公瑾雄才得吕䝉招延師友義繼述父兄忠舊府峩雙闕驚濤涌半空風雲龍虎勢日月帝王功地力因時險神謀與意通屈伸思所濟逆順審于衷駿足虻交貨靈牙耀即戎同盟界函谷獨斷保蠶叢定霸葵丘劣推心建武同長沙兆生識典午賴餘風戰守遺蹤在登臨四望中陵遷成萬古世異想羣雄歌舞居民祀干戈逐虜功征帆來浦外久客悵途窮精鋭銷孤劒飄零若斷蓬徘徊靈廡下暮葉亂江楓苕溪漁隱叢話題劉仁瞻畫像陳前仙琕生無愧鼓下蠻奴死合羞三尺吳縑暗塵土􅏮然蒼鶻欲橫秋苕溪漁隱叢話王旐遊金陵升元寺見僧房壁上有繪金紫大夫題詩云云不能解卷畫歸示其父平甫曰此劉仁瞻像袁世弼詩也此詩俊拔可喜琕實呼璸袁誤呼也贈郭功甫二絶從來多病王僧祐自小能文謝惠連各厭塵勞思物外莫辭攜手訪林泉雪後姑溪水更深冥冥寒雨作連隂旅懷未可頓消遣思與洛生溪上吟苕溪漁隱叢話荆公居金陵為功甫手寫所賦詩一軸有此兩篇世弼贈功甫詩也贈功父方山憶共泛金船屈指于今五六年風送梨花吹醉靣月和溪水上歸韉浮生聚散應難料末路窮通盡偶然欲問故人牢落事鹿裘深入白雲眠王直方詩話王介甫嘗手書此詩臨終作青靄千峯暝悲風萬古呼其誰挂寶劒應有奠生芻皎月東方隕長松半壑枯山泉吾所愛聲到夜臺無詩人玉屑謝景初景初字師厚絳子慶厯六年進士官大理評事出知餘姚縣多惠政屢遷益州路提㸃刑獄以屯田郎致仕黃山谷其壻也有宛陵集王直方詩話謝師厚方為其女擇對見黃山谷詩曰吾得壻如此足矣山谷之詩卒從謝公得句法有詩曰自往見謝公論詩得濠梁所云謝天中記紙以人得名者有謝公有薛濤公者富春謝司封景初創箋樣以便尺書因以為名謝公冇十色箋深紅粉白杏紅明黃深青淺青深緑淺緑銅緑淺雲十色也觀餘姚海氛海上風與雨未朕先氣升澤鹵雜山雲蓊鬱相熏蒸交語面已障安辨丘與陵衣濡帶革緩臭腥殊可憎自非昌其陽疾癘得以乘君子卻陰邪何必醫師能法喜堂虛堂庇風雨結構不務壯外飾無髹彤置物況容長開篋藥劑靈拈棊白黑抗階花淡亦夭庭石碧交向出門鳥雀喧燕處物我喪吳俗夸有素佛徒侈相尚獨能守質靜坐以矯流宕棲之果自喜何須山海上以上宋文鑑石谷亭飛瀑落泉下峭壁陡絶千萬丈濺急雪片飛望若匹練廣曲嶺隔青林三里已聞響其傍有巨石平潤可俯仰愚俗所不道我輩數來賞須期秋色清攀蘿將爾上會稽志句倒著衣裳迎戶外盡呼兒女拜燈前後山詩話謝師厚廢居于鄧王左丞存其妹壻也奉使荆湖枉道過之夜至其家師厚有詩云云宋詩紀事卷十六
