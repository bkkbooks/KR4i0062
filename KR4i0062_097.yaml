body:
  text: 宋詩紀事卷九十七錢塘厲鶚撰單氏單氏一作華氏成都妓句帝王師不得日月老應難送陳摶吟窗雜録溫琬琬字仲圭本姓郝氏良家子父殁流為陜倡通翰墨尤長于詩蔡子醇訪得三十篇寄逺小花靜院東風起燕燕鶯鶯拂桃李斜倚紅牆卜逺人樓外春山幾千里郡守命賦香篆一縷祥煙綺席浮瑞香濃膩繞賢侯還同薄命增惆悵萬轉千回不自由以上青瑣高議周韶韶杭妓求落籍隴上巢空歲月驚忍看回首自梳翎開籠若放雪衣女長念觀音般若經侯鯖録蘇東坡云杭州營籍周韶多蓄竒茗常與君謨鬬勝之又知作詩子容過杭陳述古飲之韶泣求落籍子容曰可作一絶韶援筆立成云云韶時有服衣白一座嗟歎遂落籍同輩皆有詩送之胡楚龍靚者最善固知杭人多慧也胡楚楚杭妓絶句不見當時丁令威年來處處是相思若將此恨同芳草却恐青青有盡時後山詩話送周韶落籍淡妝輕素鶴翎紅移入朱闌便不同應笑西園舊桃李強勻顔色待東風侯鯖録龍靚靚杭妓獻張郎中天與羣芳十樣葩獨分顔色不堪誇牡丹芍藥人題遍自分身如鼓子花後山詩話云張子野老于杭多為官妓作詞而不及靚靚獻詩云云子野遂為作詞送周韶落籍桃花流水本無塵一落人間幾度春解佩暫酬交甫意濯纓還作武陵人侯鯖録周氏周氏古田妓春晴瞥然飛過誰家燕驀地香來甚處花深院日長無箇事一瓶春水自煎茶贈陳築夢和殘月過樓西月過樓西夢已迷喚起一聲腸斷處落花枝上鷓鴣啼夷堅志陳築字夢和莆田人崇寧初登第為福州古田尉至官惑一倡周氏周能詩嘗以詩贈築首句蓋寓築字也胡文媛文媛汴妓歸河東茹魁句却有一端宜恨處開花相背有何功續青瑣高議文媛云物之同本者開花則相背況二姓結一生之好能無反覆乎楚娘楚娘建昌妓後歸三山林茂叔桂花丹桂迎風蓓蕾開摘來斜插竟相偎清香不與羣芳並仙種原從月裏來吟堂詩話盈盈吳妓事詳王山詩後寄王山枝上差差緑林間䔩䔩紅已歎芳菲盡安能尊俎空君不見銅駝茂草長安東金鑣玉勒雪花驄三十年前是俠少纍纍昨日成衰翁幾時滿飲流霞鍾共君倒載夕陽中夷堅志謝金蓮答趙生紅梨花詩本分天然白雪香誰知今日却濃妝秋千院落溶溶月羞覩紅脂睡海棠彤管遺編梁意娘述懷蹤迹浮萍落五湖一番相别一番孤不知此去從何處還許春風得見無彤管遺編蘇小娟小娟錢唐妓答趙倅君住襄江妾住吳無情人寄有情書當年若也來相訪還有於潛絹也無武林紀事太學生趙不敏與妓蘇盼奴狎赴官三載後有祿俸餘資囑其弟趙院判遺盼奴且言盼奴妹小娟俊雅可謀致之佳耦也院判至錢唐則盼奴一月前死矣小娟亦為盼奴所歡以於潛官絹誣扳繫獄院判言于府倅倅召出之付以所遺物小娟自謂不識院判何人及拆書惟一詩小娟默然倅命和之援筆書云云倅喜免其償絹脫籍歸院判偕老焉襄陽妓以下無姓名襄陽妓建隆年中人送武補闕弄珠灘上欲銷魂獨把離懷寄酒尊無限煙花不留意忍教芳草怨王孫能改齋漫録老妓題太平興國寺壁曽趁東風看幾巡冒霜開喚滿城人殘脂剩粉憐猶在欲向彌陀借小春楓窗小牘淳化三年冬十月太平興國寺牡丹紅紫盛開不踰春月冠蓋雲擁有老妓題詩云云其妓遂復車馬盈門臨川妓郡守席上作同是天邊侍從臣江頭相遇轉情親瑩如臨汝無瑕玉暖作廬陵有腳春五馬今朝成十馬兩人前日壓千人便看飛詔催歸去共坐中書秉化鈞夷堅志張安國守臨川王宣子解廬陵郡印歸次撫安國置酒招郡士陳漢卿參會適散樂一妓言學作詩漢卿語之太守呼為五馬今日兩州使君對席便成十馬汝體此意作八句妓凝立良久即高吟云云安國歎賞竟日賞以萬錢宋詩紀事卷九十七
