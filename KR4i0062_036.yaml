body:
  text: 宋詩紀事卷三十六錢塘厲鶚撰張守守字子固晉陵人崇寧元年進士紹興中拜參知政事兼樞密院事以資政殿學士知紹興府卒諡文靖有毗陵集汴上小雨復霽隄沙不起潤如酥坐看飛雲自卷舒隴陌人閒牛䑛犢栁陂波淺鷺窺魚殘花糝徑東風後碧草黏天暮雨初分付榮枯蝸兩角濁醪青杏送春餘前賢小集拾遺蔡佃佃字耕道襄之孫旻之子崇寧初進士蔡京當軸欲羅致門下竟不能屈㑹星異上疏責監溫州稅後以朝請郎提㸃兩浙刑獄文獻通考直齊陳氏曰余嘗宦莆至蔡忠惠襄居去城三里荔子號玉堂紅者正在其處矮屋欲壓頭猶是舊物京卞同郡晚出欲附名閥自稱族弟襄孫佃唱名第一京時當國以族孫引嫌降第二佃終身恨之豁然閣長風東南來濁浪撓清鏡小軒寂寞人默視心獨靜扁舟暫掩泊思與孤鴻迥洞庭眼中物何必更乘興頑石謾巑岏終慚泗濵磬吳江縣志雷轟漈在仙逰縣九鯉湖東水流石激擬鳴雷洞裏乾坤别有臺玉舄扶風飛復下瓊花帶雨落還開鐘聲敲斷白雲裊樹影盤回黃鶴來笑道神仙無處覔空留丹竈冷莓苔興化府志曾開開字天逰贑縣人準子幾之叔兄崇寧二年進士歷官權中書舍人建炎初纍遷禮部侍郎兼直學士院忤秦檜出知徽州李伯紀丞相挽詩先帝收多士惟公發妙年清班依日月讜論薄雲天終賴高名重來扶大業全誰提太史筆臣主頌俱賢太上初傳祚安危俯仰間從容回萬乘指顧復三關漠北塵沙迥閩中日月閒誰知千載後遺恨在燕山追數中興相公居第一人初期從北狩寧料久南巡此日勞明主他年憶舊臣東都朝萬國不復見簪紳一别睢陽後風霜十五年勞生俱老矣流涕獨澘然丹鼎秋來就心燈半夜傳定應真不死歸卧白雲邊梁溪集附朱勝非勝非字藏一蔡州人崇寧二年上舍登第高宗朝纍除尚書右僕射同中書門下平章事出知湖州卒諡忠靖和同省秋夜省宿老火未甘退稚金方力征炎涼分勝負頃刻變隂晴容齊四筆政和末老蔡以太師魯國公總治三省年巳過七十與少宰王黼爭權相傾朱藏一在館閣詩云云兩人門下士互興譖言以為嘲謗士論指三館為閙藍天聖寺古檜雷霆起蟄虯夭矯勢欲上忽然化此木尚作拏雲狀婆娑枝幹垂生澀紐結壯圖經不能記父老那可訪晉杉定儕類蜀柏豈輩行櫟夢何足神槐語固巳妄自無斧斤憂未始疑大匠湖州府志李鞉鞉字彥淵富陽人崇寧二年進士紹興中除比部郎秦檜欲以子與鞉女為婚鞉郤之丏外持憲閩部奉祠卒有去嗔居士集三學院在富陽縣小檻平臨更爽孤雲徙倚長閒飛出偶成霖雨歸來依舊青山杭州府志李彌大彌大字似矩號無礙居士彌遜之兄崇寧二年進士高宗朝歷工部尚書顯謨閣直學士逰堯峯院雲峯何岧嶤去天餘幾丈其下蔚華林幽禪屹相向我逰先朝暾海日射巾杖飛蓋不須持步步蒼松障山僧知我來羅立鳧雁行提攜兩行人為我談實相一種勿弦琴三嘆無聲唱開軒面東南千里入俯仰西登妙高臺更欲恣曠望土斷澤繞山烟濤渺雲浪恐是六鼇連蓬壺墮莽蒼又疑鯨入海偃脊起青嶂時方老火熾金石流欲煬須臾變雲雨為作雄風壯翻手回涼秋掀舞千林響誰云免水宫自是神龍藏三高如可作吾欲五湖訪洗足巨浸心振衣孤峯上寄語夸奪流得飽但相忘長哦可當歌踏月下空曠遊洞庭山并序昔白樂天為姑蘇太守遊洞庭山題詩翠峯寺有笙歌畫船之句紹興壬子彌大守平江越月而張片帆來首訪翠峯追懷古昔擬樂天體聊繼其韻時異事别各遂所適之樂爾山浮羣玉碧空沈萬頃光涵幾許深梵剎樓臺噓海蜃洞天日月浴闕金秋林結緑留連賞春塢藏紅次第吟擬泛一舟追范蠡從來世味不關心以上吳郡志唐庚庚字子西丹棱人舉進士受知張商英擢提舉京畿常平商英罷相貶惠州㑹赦北歸卒有眉山集墨莊漫録唐子西在惠州釀酒二種其醇和者名飬生主稍冽者名齊物論詩多新意不沿襲前人語考雁湖李氏曰唐子西文采風流人謂文獻通為小東坡內前行內前車馬撥不開文德殿下宣麻回紫微侍郎拜右相中使押赴文昌臺旄頭昨夜光照牖是夕收光如秃帚明日化為甘雨來官家喚作調元手周公禮樂未要作致身姚宋也不惡鄉來兩公當國年民閒斗米三四錢獨醒雜志唐子西內前行為張天覺作也天覺自中書侍郎除右僕射蔡京以少保致仕四海歡呼善類增氣時彗見而遽沒旱甚而雨人皆以為天覺拜相感召所致上大喜書商霖二字以賜故子西具言之曰張商英拜相子西作內文獻通考直齊陳氏前行坐貶惠州歸蜀而卒收家書西州消息到南州骨肉無他嵗有秋驥子解吟青玉案木蘭堪戰黑山頭即時旅思春冰拆昨夜燈花黍穗抽從此歸田應坐享故山已為理菟裘除夕患難思年改龍鍾惜嵗除關河先壟逺天地小臣孤吾道憑溫酒時情付擁爐南荒足妖怪此日謾桃符夜坐懷舍弟無雲仍露坐有月更江臯沈陸傷吾道浮生憶爾曹扁舟應夏口此夕數秋毫不見今三載當時巳二毛以上眉山集次韻强幼安冬日旅舍殘嵗無多日此身猶旅人客情安枕少天色舉杯頻桂玉黃金盡風埃白髮新異鄉梅信逺誰寄一枝春次韻幼安留别韻白頭重踏軟紅塵獨立鵷行覺異倫往事巳空誰叙舊好詩乍見且嘗新細思寂寂門羅雀猶勝纍纍冢卧麟力請宫祠知意否漸謀歸老錦江濵强行父唐先生文録云行父自錢唐罷官如京師眉山唐先生同寓于城東景德僧舍與同郡關注子東日從之逰退而記其論文之語得數紙以歸明年先生得請宫祠歸瀘道卒于鳳翔先生嘗次行父詩二首蓋絶筆于是矣集者逸之故併記云餘杭强行父幼安記秧馬擬向明時受一廛著鞭常恐老農先行藏巳問吾家舉從此馳名四十年䂬溪詩話東坡逰武昌嘗作秧馬歌唐子西至羅浮始識此器作詩云云亦巧于用事謫羅浮作說與門前白鷺羣也須從此斷知聞諸公有意除鉤黨甲乙推排恐到君鶴林玉露蔡薿薿字文饒開封人崇寧五年進士第一纍官翰林學士禮部尚書房州安置送宋朝請倅邢州布衣初喜得相從淡薄情懷老更同春酒杯盤花爛漫夜堂燈火雪冥濛家傳辭藻喧時譽地近鄉枌識土風早晚漢庭裦一鶚待看霜翮上秋空詩林萬選趙鼎鼎字元鎮號得全居士解州聞喜人崇寧五年進士紹興初纍官簽書樞密院事拜尚書右僕射同中書門下平章事安置湖州移吉陽軍薨孝宗朝賜諡忠簡贈太傅配享高宗廟庭有忠正德文集老學菴筆記趙元鎮丞相謫朱崖病亟自書銘旌云身騎箕尾歸天上氣作山河壯夲朝趨三衢别故人時車駕幸杭州傖父何由習楚風家山俱在古河東相逢憔悴干戈後追數悲歡夢寐中摻袂又成千里别放歌空念一尊同他年儻有加飱字試問漁舟鶴笠翁咸淳臨安志夜雨不寐西風吹雨夜瀟瀟冷燼殘香共寂寥要作秋江篷底睡正宜窗外有芭蕉梅澗詩話梅執禮執禮字和勝婺州浦江人崇寧五年進士歷户部尚書死靖康之難高宗朝贈資政殿學士句有令可干難閉户無人堪訪懶移舟天之未喪斯文也吾亦何為不豫哉庚溪詩話和勝未冠時家貧親老無以為養大雪中以詩謁邑宰云云邑令延之令訓其子弟方應舉未捷有詩自遣云云成無玷無玷字士慤武康人崇寧五年進士宣和初官餘杭丞建炎中知鄂州靺鞨貝勒圍急無玷堅守晨起巡城霜滑墜足而卒洞霄宫我欲觀太華一笑凌險阻滅跡恨未果衰容遽如許東南豈不佳泉石閟靈府未訪潛川源且尋天目乳一峯拔地起離立誰敢侮千年絶附麗萬壑失媚嫵有如人中傑羞與絳灌伍翠箬藏丹藥一作砂石洞飛白鼠逰人倦登涉異境何由睹振衣凌絶頂雲外聽天語仙人儻豫迎從此遂輕舉洞霄詩集廖剛剛字用中南劒州順昌人崇寧五年進士紹興中歷官御史中丞工部尚書以徽猷閣直學士提舉亳州明道宫卒有高峯集題楊子光雙溪閣倚天華棟俯長洲渺渺雙溪一鑑秋匹馬問津迷去客新帆分港競歸舟花飄兩洞紅交浪影落三山翠合流清夜鳴榔何處曲冷光平泛玉簾鉤代祖父次韻酬羅君寶見贈蕭條門巷陋於顔老去青春僅得閒心畫傳家無計䇿手談留客漫機關靜思往事千年上俯歎勞生一夢閒多謝光臨無别意為聞流水與高山題南墩鋪雨中聞猿聲素所未識復渡二峻嶺蓋亦創見因紀行役之勞云見說龍巖路猿啼今始聞深林埋宿霧高嶺出層雲天去頭三尺崖垂足二分只愁雙目眩敢恃一杯醺捫歷泥增滑瘏痡日向曛長安九軌道誰識此閒情題渚宫畫橋紅去卷蛾眉臺榭遺蹤草樹迷獨有天然無限意一池春水浴鳧鷖蔓草春深緑更齊玉鞭何處選芳菲舊時錦繡叢中蝶卻傍疏籬野菜飛衛州試院次韻盛當時官長寵示絶句洗眼貪看幼婦詞玉人空遣暗相思憑誰為報歸期近趁得桃花爛漫時題蔡州栁莊鋪雲垂曠野路漫漫策策秋聲作暮寒已分故園天樣逺不知何處是長安以上髙峯集吳倜倜字公度烏程人崇寧五年進士試禮部第一仕至敕令所刪定官出為寧海推官宿大滌山解驂投宿到蓬壺骨冷魂清夢寐無可怪春禽曉啼月又催行李出凡途洞霄詩集龔況況字濬之程子崇寧五年進士終祠部員外郎右朝議大夫自號起隱子有起隱集詠劉伶逃名以酒轉名髙醉裏張髯買二豪日月巳為吾户牖何妨東海作醇醪九日自古誰無九日詩詩成須道菊花枝直饒無菊何妨醉野蓼村葵總是題逰天峯寺杖藜高踏半山雲不見此山知幾春異時人物凋零盡只有青山似故人送唐太監東門相别又相逢轉覺衰頽一老翁子約重來我方去滿庭黃葉正秋風句貪山借船賞嗜酒典琴沽閒多卷滿新成句懶極牀堆未答書客疏間吠犬庖匱割啼雞得句怕難續避人長轉多山色秋難老池光夜不昏以上中吳紀聞史徽徽字洵美鹽官人崇寧五年進士纍官右司郎中髙宗即位起為司農少卿建炎三年扈駕江口遇害贈觀文殿修撰大觀閒題南京道河亭榖雨初晴緑漲溝落花流水共浮浮東風莫掃榆錢去為買殘春更少留陶朱新録李光光字泰發上虞人崇寧五年進士纍官司勳員外郎欽宗擢右司諫高宗朝進吏部尚書除參知政事因爭和議安置瓊州移昌化軍卒追復資政殿學士諡莊簡千巖亭家山好處尋難遍日日當門只卧龍欲盡南山巖壑勝須來亭上少從容老學菴筆記李莊簡奉祠還里先君築小亭曰千巖盡見南山公來必終日嘗賦詩云云言及時事憤切興歎謂秦相曰咸陽一日舉酒屬先君曰某行且逺謫矣咸陽尤忌者某與趙元鎮耳趙既過嶠某何可免青鞋布襪即日行矣後十餘日果有藤州之命哭子脫屣塵寰委蛻蟬真形渺渺駕非烟丹臺路杳無歸日白玉樓成不待年宴坐我方依古佛空行汝去作飛仙恩深父子情難割淚滴千行到九泉賔退録李莊簡之子孟博苦學有文紹興五年進士第三人及第隨父南遷卒于瓊州先是數月孟博夢至一所海山空濶樓觀特起雲霄閒有軒榜曰空明先世諸父環坐其中指一席曰留以待汝遂寤臨終雲氣起于寢冠服宛然自雲中冉冉升舉瓊人悉見之莊簡有詩悼之云云越州雙雁道中晚潮落盡水涓涓栁老秧齊過禁烟十里人家雞犬靜竹扉斜掩護蠶眠詩人玉屑戲贈伴送使臣日日孤村對落暉蠻烟深處忍分離追攀重見蔡明逺贖罪難逢郭子儀南渡每憂鳶共墮北轅應許雁相隨馬蹄慣踏關山路他日看來又送誰詩人玉屑公在政府與秦檜議論不合為中司所擊送藤州安置差密院使臣送之公戲贈詩云云題廣德州三峯樓一川花栁擁雕闌濃緑浮空四面山便欲攜家來此住不將名姓落人間方輿勝覽莊簡自記云上虞李泰定提兵平宣城寇回登此留宿紹興壬子季春五日題智林寺在常熟縣李墓村扁舟來訪小叢林花木通幽院落深旋拂胡牀成午夢閒持貝葉動秋吟竹聲瑟瑟生虛籟山意峩峩入素琴更喜老綱能㑹事手攜爐銚自相尋蘇州府志挽李忠定綱忠言直節動華夷肻為投閒便息機南國忽聞梁木折中原猶望袞衣歸平生學術唯心得晚節功名與願違老病無因執哀靷朔風空有淚霑衣邵武府志李邴邴字漢老濟州任城人昭玘猶子崇寧五年進士纍官翰林學士紹興初拜參知政事資政殿學士寓泉州卒諡文敏有雲龕草堂集揮麈録漢老少日作漢宫春詞膾炙人口所謂問玉堂何似茅舍疏籬者是也政和間自王省丁憂歸山東服終造朝舉國無與談者方倀倀無計時王黼為首相忽遣人招至東閣開宴出其家姬十數人酒半唱是詞侑觴大醉而歸數日遂有館閣之命小學紺珠南渡三詞人李邴汪藻樓鑰也詠梅綿霜歷雪忿開遲風笛無情抵死吹鼎實未成心尚苦不甘桃李傍疏籬能改齊漫録李漢老建炎末自簽書樞密遷知院二三月而罷為梅詩以托意銅雀硯魏宫歌舞久成塵重見陶家幾世孫銅雀不鳴唯解渴管城何罪遽遭髠硯箋云徐鉉得銅雀瓦注水試墨即滲鉉笑曰豈銅雀之渴乎漢老詩蓋因此九日木落霜洲溪水清登臨滿目是飄零黃花有意憐幽獨白酒無聊漫醉醒闕五六二句牢愁錯倚西風立楚些巴渝不可聽合璧事類前集宫詞舞袖何年絡臂鞲蛛絲網斷玉搔頭羊車一去空餘竹紈扇相看不到秋宋藝圃集謁迪上人數脊招提四面山羡師終日掩柴關憑闌人語風烟上乞食僧來紫翠閒萬木深藏雲泱莽一溪空鎖月彎環十年不踏門前路只遣松風送我還清源文獻琴泉軒次韻但怪朱絲韻枯木那知古澗墜寒泉鳥啼靜夜應傳譜風入寒松擬續弦妙體難尋斤斫處高吟寧墮膝橫邊飲光到此如欣舞笑倒雲門逸格禪南安縣志寶林寺青燈映獨宿世事忽如遺一榻寒無夢高齊靜見詩長空消海氣逺壑淡幽姿欲問無生意高人不可期雪軒在蕺山戒珠寺四山環繞翠岧嶤想見凌晨雪未消四萬八千修月手不知何處琢瓊瑶以上紹興府志方惟深惟深字子通莆田人家長洲崇寧五年特奏名授興化軍助教有方祕校集中吳紀聞子通最長于詩凡有所作王荆公讀之必稱善謂深得唐人句法子通逰王氏之門初無迎合意後隱城東故廬與樂圃先生皆為一時所高每部使者及守帥下車必即其廬而見之前後上章論薦者甚衆竟絶祿仕意僧仲殊贈詩有依舊淒涼無長物只餘松檜養秋風之句可以見其清高矣年八十三嵗無子一女適樂圃先生之子發以詩集呈荆公侑以詩年來身計欲何為跌宕無成一軸詩懶把行藏問詹尹願將生死遇秦醫丹青效虎留心拙斤匠良工入手遲此日知音堪屬意枯桐正在半焦時訪人不遇題壁何年突兀庭前石昔日何人種松柏乘興閒來就榻眠一枕春風君莫惜城西今古陽山色城中誰有千年宅往來何必見主人主人自是亭中客謁荆公不遇春江渺渺抱檣流烟草茸茸一片愁吹盡柳花人不見春旗催日下城頭中吳紀聞此詩荆公親書方冊間因誤載臨川集和五日郡守開宴㑹九老于廣化寺韻使君瀟灑上賔閒金地無人晝閉關風靜簫聲來世外日長仙境在人間詩成郢客爭揮翰曲罷吳姬一破顔此節東南無此㑹髙名千古映湖山以上中吳紀聞程公闢留客開元寺飲二首晝錦新坊路稍西興來攜客就僧扉尊前倒玉清無比筆下鏗金妙欲飛籃輿直須乘月去榜歌時聽採菱歸流傳白雪吳城滿頓覺炎歊一夕微仙老論文小往還多才令尹獨能攀攜觴步入千花界借榻清臨一水間笑語不驚沙鳥去襟懷猶道野僧閒城中此地無人愛坐對西南見好山劒池雲崖倚天開蒼淵下澄徹世傳靈劒飛山石千丈裂神蹤去不返今作蛟龍穴是非莽難詰嵗久多異說惟當清夜來靜賞潭上月千人石生公天人師講法花雨墮當時聽法衆并入千人坐山祇常護持山鳥不敢涴野人心茫然傲蕩多酒過醉來不肯歸石上看雲卧以上吳郡志和周楚望紅梅用韻清香皓質世稱竒試作輕紅更自宜紫府與丹來換骨春風吹酒上凝脂直教臘雪無藏處只恐朝雲有去時溪上野桃何足種秦人應獨未相知瀛奎律髓云曾裘父艇齊詩話以此為徐師川十三嵗詩見知東坡蓋妄也慶元中陳剛刋板巳著為子通矣舟下建溪客航收浦月黃昏野店無燈欲閉門倒出岸沙楓半死繫舟猶有去年痕莆陽文獻此詩荆公愛之嘗書坐右後人誤入荆公集中王寀寀字輔道一字道輔韶子登第官校書郎翰林學士兵部侍郎宣和中以左道為林靈素所陷棄市同劉元靜逰嵩山峻極中院作爛紅一㸃出浮漚夜坐嵩峯頂上頭笑對僧窗談祖德當年七十四回逰風月堂詩話洛陽劉伯夀築室嵩山下每登高頂回則于峻極中院援筆記嵗月捐館之年題云豫今年若干嵗登頂凡七十四次矣精力雖疲而心猶未足也王輔道學士與其孫宣義郎元靜逰嵩至中院作一絶句示之浪花一江秋水浸寒空漁笛無端弄晚風萬里波心誰折得夕陽影裏碎殘紅夷堅志曹道沖售詩京都隨所命題即就羣不逞欲苦之乃求浪花詩絶句仍以紅字為韻曹謝曰非吾所能為唯南薰門外菊坡王輔道學士能之耳不逞曰我固知其名久矣但彼在館閣吾儕小人豈容輒詣曹曰試齎佳紙筆往拜求之必可得于是相率修謁下拜有請王欣然捉筆一揮而成讀者歎服汪藻藻字彥章德興人崇寧中第進士高宗朝纍除中書舍人兼直學士院擢給事中遷兵部侍郎兼侍講拜翰林學士出知外郡奪職居永州卒有浮溪集寓簡秦熺狀元及第汪彥章以啓賀㑹之有云三年而奉詔䇿固南宫進士之所同一舉而首儒科蓋東閣郎君之未有夲欲屬對之工而熺父子怒以為輕巳彥章自此得罪羇置湖湘孫覿汪公墓志云公以大手筆稱天下金華勸講石室紬書典冊施之朝廷樂歌薦之郊廟鴻文碩學暴耀一世而詩律高妙興寄深逺亦非近世詩人所能桃源行祖龍門外神傳璧方士猶言仙可得東行欲與羡門親咫尺蓬萊滄海隔那知平地有青雲只屬尋常避世人關中日月空萬古花下山川長一身中原别後無消息聞說邊塵因感昔誰教晉鼎判東西卻愧秦城限南北人閒萬事愈堪憐此地當時亦偶然何事區區漢天子種桃辛苦求長年庚溪詩話語意新妙王摩詰韓退之劉禹錫王介甫諸人所未道避地酉亭野步今日幸無雨天空出遙岑行行不知疲遂至春江潯汲路轉籬落人家在桑隂平疇漲清波隴麥如人深溝畎戲鳧騖新蒲映浮沈我生夲樵漁對此諧初心風物豈不好悲來自能任邊塵暗中原四海如驚禽黃屋狩萬里兩宮隔晨昏龍移螻蟻窺月晦蟾蜍侵宇宙有顚覆兹逰豈嶇嶔銷憂賴濁醪太息誰能斟過臨平一别九霄路風烟長滿衣已成身老大無復世輕肥天濶鳥雙下山寒人獨歸曉來何處雨春水滿巖扉睡起涼生岸鉤簾坐小窗麥風能起柁梅雨不鳴江往事心常折歸途影自雙依然蒲栁地人老故先降以上浮溪集春日一春略無十日晴處處浮雲將雨行野田春水碧于鏡人影渡傍鷗不驚桃花嫣然出籬笑似開未開最有情茅茨烟暝客衣溼破夢午雞啼一聲逰宦紀聞此篇一出為詩社諸公所稱蓋公幼年作也題張資政汝川圖淡巖書堂昔人曾此結精廬故老猶傳井臼餘今代子房來卜築要看圯上一編書多寶院每尋疏磬訪支郎苔竹交隂杖屨㫄絲履㲲巾聊取用風流不減贊公房金石臺花光連接兩臺春中有眠雲跂石人莫使鞭笞鸞鳳去時來重現宰官身懷賢菴履綦行處日蒼苔鞶帨深藏月一開已辦此身同法喜不應臨感更難裁題江南春曉圖忽從林杪見朝暉釋嶠孤雲半欲飛何惜扁舟并畫我要從海際望春歸題大年小景忽驚坐上江天渺半幅鵝溪寫霜曉風低黃蘆潮欲到平沙無人喧宿鳥向來著眼應萬里開卷尺餘那盡了須知王孫寄筆力平日氣吞雲夢小故將㸃綴調兒輩不待淋漓翻墨沼滕王蛺蝶往誰並曹霸驊騮今巳少坐令好事費百金窗几短屏橫軸繞君家此夲傳幾世羇客見之先絶倒江頭歷歷舊行處好在漁磯落寒潦浮家泛宅歸去來還看飛鴻卧林杪以上聲畫集題止戈堂此老胸中百萬兵暫勞試手沸狼羣山頭不復望廷尉柱後何須用惠文解帶為城聊戲劇賣刀買犢便耕耘三山勝處開華屋千載人傳舊史名千里閩山驛騎飛天書趣解海邊圍異軍方逐蒼頭起元帥徐將白羽揮翻就鐃歌春舉酒收還烽火夜開扉向來萬事關兵氣都作風光坐上歸桐江詩話程進道紹興初帥閩中殄滅諸寇以武庫為止戈堂一時諸公題詠甚多汪彥章二詩為絶唱士人買妾既而疾以詩戲之但知瓊樹鬬清新不道三彭接有神處仲未聞開閣事維摩空對問禪人封侯燕頷何妨瘦伐性蛾眉卻怕顰從此空花掃除盡定須嚼蠟向橫陳陶朱新録賦琴高魚百川萃南州水族何磊砢其閒琴高魚初未列楚些豈堪陪薧鮮裁用當肴果土人私自珍千里事封裹遂令四方傳噍嚼亦云頗俗云琴高生控鯉宛溪左靈蹤散如烟遺鬛尚餘顆向來騎鯨人逸駕嘗慕我不應當時逰反用此么麼得無效齊諧怪者記之過彭越小如錢蹤跡由漢禍越王載王餘變化更微瑣因知天地閒人莫窮物夥區區于其中臆決蓋不可僞真吾何知且用慰頤朵賔退録涇縣東北二十里有琴溪俗傳琴高隱所溪中有一種小魚他處所無俗謂琴高投藥滓所化號琴高魚歲三月來集漁者網取漬鹽曝之州縣須索以充苞苴其來久矣前輩多形之賦詠汪浮溪此詩夲集不載郊丘書事琅輿深出未央門十里圜壇氣象尊圭璧三千周典備貔貅百萬漢兵屯青城浮靄連霜動黃道微風帶日溫不用靈光符聖武從來精祲答乾坤前賢小集拾遺隆祐太后挽詞慶源由魏國奉祀及宣仁盛德儀中壼私恩絶外親長秋期不老厚夜忽無晨來嵗柔桑緑誰臨繭館春朔漠遐征後南州俶擾時人心憂社稷天意屬簾帷擁佑千齡主圖回萬世基中興能事畢倐與帝鄉期合璧事類前集秀水閒居録元祐末哲宗方擇后京師里巷作打毬戲以一擊入窠者為勝謂之孟入于是孟在女應入宫之選至紹聖間禁掖造纈有匠者姓孟獻樣兩大蝴蝶相對掩以纈帶曰孟家蟬民間競服之未幾后廢處瑤華宫號華陽教主玉清妙靜仙師議者皆以為蟬者禪也出家之兆也靖康中京師失守皇族近屬皆詣金營以后廢嵗久無預時事不復取金既退邦昌請后入居延福宫今上踐阼迎后至睢陽上尊號曰隆祐皇太后建炎三年車駕至餘杭有苖劉之變后復垂簾以平內難紹興元年崩于㑹稽上諡號曰昭慈獻烈後更諡曰昭慈聖獻至是前讖乃驗焉孟入者兩復入也蟬者禪御兩地垂簾之應也大統中絶而復續天位暫傾而復正者后之力可謂異人矣宿焦山方丈明發理烟艇歡言濟遙岑盤渦沸風雨稍辨鐘磬音行行並疏栁迎客多幽禽扶輿上犖確始見江湖深臺殿明海色嵌空憶龍吟修廊延客步妙香慰人心遐眺未云極千巖忽秋隂孤月欲生嶺諸天悉浮金兹逰信竒絶況接支道林夜語不知旦虛窗對橫參人閒驚毫末物外雄窺臨稽首悟真理微生安所任蒼崖有竒字霜乾約重尋京口三山志句人閒何事非戲劇鶴有乘軒蛙給廪水經注引晉中州記惠帝為太子令曰若官蝦蟇可給廩困學紀聞王雲雲字子飛澤州人舉進士嘗使高麗撰雞林志以進擢祕書郎靖康中以資政殿學士副康王使金次磁州為百姓所殺程卓使金録磁州驛有顯應崔府君廟高宗為王尚書雲迫以使金磁人擊裂王雲高宗欲退無馬可乘神人扶馬載之南渡河今立祠西湖贈大仰齊禪師大仰古名剎師居二紀中夲無一法說須信萬緣空體與太虛合心將諸祖同唐來三百載不墜釋迦風袁州府志句為憐緑葉四時在不可朱䦨一日無此君軒花谷錦繡萬徐文文高郵人題雪竇和尚親書偈卷老子休去歇去遺墨今傳古傳相見夲來面目不離當處湛然崇寧癸未高郵徐文志雅堂雜抄宋詩紀事卷三十六
