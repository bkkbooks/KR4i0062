body:
  text: 宋詩紀事巻三十九錢塘厲鶚撰姚孝錫孝錫字仲純豐縣人政和四年登第調代州兵曹有雞肋集齊東野語金人宼雁門州将恇怯議降孝錫竟投牀太鼾不與其議既得脱去遂往五臺簿移疾不仕因家焉治生積粟至數萬石遇饑歳盡出以賑貧乏所居正據五䑓之勝亭榭數十座花竹百畆中歳盡以家事付諸子日與賔朋放浪山水詩酒閒自號醉軒題滕茂實祠本期蘓鄭共揚鑣不意芝蘭失後凋遺老秖今猶涕淚後生無復識風標西陘雁度霜前塞滹水樵爭日暮橋追想平生英偉魄凌雲一笑豈能招齊東野語睡起生涯甘分寄耕桑山色圍門水遶牆困病久懲耽酒癖愛閒猶有和詩忙簷冰滴砌春猶冷野馬浮川日漸長舊事老年多記憶故園歸夢正悠揚次韻王無競見寄客懐重倚仲宣樓白草黄雲塞上秋山色不隨塵世改水聲還抱故城流隙中畏景那堪玩鏡裏衰顔秖自羞多媿詩人苦相憶逺傳佳句弔清愁次韻秋興老畏年光速愁添旅夢多西風著梧竹歸思入烟波夜永憑詩遣顔衰得酒和故溪千樹桞誰復曬漁蓑題桞溪别墅雨霽風和不動塵桞邊攜酒賞青春頻來溪鳥渾相識渡水穿花不避人次李平子登臺有感韻落日孤雲帯逺岡戍樓烟瘴舊邊場疲民卒歳方懐土逺客憑髙自憶鄉漢使一朝延四皓秦詩千古弔三良行藏此意無人解聊借青山送酒觴以上中州集句岸漲魚吹沫山空石轉雷谷虚生地籟境寂散天香節物後先南北異人情冷煖古今同久客交情諳冷煖衰年病骨識隂晴元晏暮年常抱病子山終日苦思歸食貧豈復甘秦炙客病空懐奏楚音以上齊東野語張綱綱字彦正丹陽人政和四年上舎釋褐第一髙宗朝累官權吏部尚書參知政事以資政殿學士知婺州致仕卒諡文定改賜章簡有華陽集聞官軍掩殺城中羣㓂次傳道韻未復錢唐郡先收鐵甕城妖星隨月落殺氣逐參横已築鯨鯢觀重新鼓角聲大江應好在流恨幾時平寄宿隱静東軒軒外竹引飛泉落池中隔窗聞之如秋雨瀉簷聲踏殘西日寄僧房一炷爐熏秋夜長誰作響泉喧客枕夢回敧聽雨淋浪老夫辭榮里居行年八十酒閒漫成拙句述意而已不以示外也莫笑樽前白髪翁曽騎竹馬戲元豐年彌八秩癡頑在身荷三朝寵眷隆綠野敢將前哲比香山幸有老人同興來尚欲尋幽去收拾殘春杖履中以上華陽集朱粹粹政和中豐城令題梅仙觀書投北闕言無用吏隱南昌寄此閒身陟九霄歸紫府名垂千古寄青山夜壇星斗誰瞻仰曉殿雲烟自往還幾疊髙峯人䍐到分明眞境異塵寰梅仙事實胡景裕景裕字好問湘潭進士餞范子范公稱之父當年邂逅帝王畿歳月侵尋若電飛學士榮除青瑣闥故人老著白麻衣尊前且鬭閒身健眼底休論往事非第恐鋒車促嚴召片帆明發不輕違范公稱過庭錄何㮚㮚字文鎭仙井監人政和五年進士第一歴官尚書右僕射兼中書侍郎死靖康之難建炎初贈觀文殿大學士上庠錄政和丙申殿試何㮚為狀元潘良貴次之皆年少有丰貌而第三郭孝友頗古怪唱名日呵出御街觀者皆曰状元眞何郎榜眼真潘郎第三人真郭郎也曰璐按政和五年丙申應作乙未在金營題詩念念通前劫依依返舊魂人生㑹有死遺恨滿乾坤三朝北盟㑹編潘良貴良貴字子賤一字義榮金華人政和初上舍釋褐建炎初為左司諫紹興中除中書舍人出知明州提舉明道宫歸李光得罪以通書坐降三官卒有黙成居士集夜坐聞竹聲示姪室明窗有燈夜暗天無月趺坐依蒲團竹聲助清絶初疑小雨至蕭蕭俄復歇忽然變軒昻風湍散巖穴聽久耳根靜萬慮皆瑩徹塵凡不待掃境妙心自潔竒哉不二門欲倩維摩説雪中偶成飛花看六出俄向臘中來解驗人情喜始知天意回夜闌窗愈白曉凍日難開麥熟何時節飢民正可哀贈方仁聲學道悠悠未見功敢云凡質有仙風他年一鉢江湖去先向苕溪訪葛洪以上黙成居士集陳光禄挽詩强敵登城日中華將士奔人皆趨北闕君獨死南門祕計無人用英聲有史存秋原悲淚落桂酒與招魂庚溪詩話先君光禄靖康閒為京城守禦司屬官嘗以守禦䇿獻于朝議者沮之京城失守督將士與虜戰遂以身殉國潘待制子賤為挽詩云云吴師道敬鄉録陳巖肖子象金華人父徳固死靖康之難子象以任子中詞科仕至兵部侍郎著庚溪詩話題三江亭守明州日作假守衰顔病日侵湖山雖好倦追尋登城忽覩三江水快我平生萬里心聊築小亭怡父老敢承佳句粲珠金春濤正待諸君賞更拂詩牌看醉吟延祐四明志沈與求與求字必先徳清人政和五年進士髙宗朝累官吏部尚書翰林學士兼侍讀除參知政事知樞密院卒贈左銀青光禄大夫諡忠敏有龜溪集錢唐賦水母疾風吹雨回江城艣牙嘔呀潮欲平客居喜無人事攖相與環坐臨前楹眼中水怪狀莫名出没沙觜如浮罌復如緇笠絶兩纓渾沌七竅俱未形塊然背負羣蝦行嗟其巧以怪自呈凝目𢥠視相將迎老漁旁睨笑發聲曰此水母官何驚江流如奔絶滄瀛潮汐往來月為程藏納衆汚無滿盈浮埃塵滓溷九清結成此物宜昬盲使蝦導迷作雙睛乃能接引蚌與蟶亦猶巨蛩二體併離則無目為光精江天八月霜葉鳴罟師得蝦供水征水母棄擲羅縱横試令收拾輸庖丁絳礬收涎體紆縈飛刀縷切武火烹花磁飣餖粲白英不殊冰盤堆水晶稻醯齏寒芼香橙入齒已復能解酲遣漁止矣忽復評嗟哉此性愚不更定矜故態招三彭且摩枵腹甘藜羮秋日閒居茅屋秋風斗破除蕭騷渾似浣溪居青山侍坐從吾好黄㡌籠頭與俗殊頼有園官能送菜可無溪友解畱魚從今輙莫慚枵腹一飽須煩插架書以上龜溪集夜書山驛天寒夜向闌月出山更靜風露搖青空萬象光耿耿啼螀泣幽草賔鴻度前嶺歸來坐孤窗松竹舞清影前賢小集拾遺臞菴為王文孺作地控三州界池開十丈蓮桑麻無杜曲松菊有斜川别浦歸帆逺他山晩照妍江湖春水闊容與白鷗前吳郡志洪皓皓字光弼鄱陽人政和五年進士建炎三年假禮部尚書使金不屈被畱十五年始還除徽猷閣直學士尋謫英州徙袁州卒復官諡忠宣有鄱陽集名臣言行續錄永祐陵崩于五國城公即燕山開泰寺為文以薦曰千歳厭世莫遂乗雲之仙四海遏音同深䘮考之戚況故宫為禾黍改館徒饋于秦牢新庿游衣冠招魂但歌于楚些雖置河東之賦莫止江南之哀遺民失望而痛心孤臣久縶唯歐血伏願盛徳之祀傳百世以彌冒在天之靈繼三后而不朽故臣讀之無不流涕石碏大義滅親惡吁及厚篤忠純大義無私遂滅親後代姦邪殘骨肉屢援斯語陷良臣賔退録劉無極無極字晞顔丹徒人政和五年進士終尚書郎漾花池一池春水綠如苔水上新紅取次開閒倚東風看魚樂動揺花片卻驚猜墨荘漫録秦檜檜字㑹之江寧人政和五年進士中詞科靖康中除御史中丞從二帝北遷髙宗建炎初達蘭縱使來歸拜禮部尚書紹興中拜右僕射同中書門下平章事累加太師益國公死贈申王諡忠獻開禧初追奪王爵改諡繆醜賔退録紹興閒禁中呼秦太師為太平翁翁見放翁詩注題范文正公書伯夷頌後髙賢邈已逺凛凛生氣存韓范不時有此心誰與論鐵網珊瑚長樂郭隚䟦云片紙三百年承平碩輔姓字皦皦如日月見之束袵盤辟若檜若似道亦蝨其間使人指畫唾罵然則士不以夷齊自淑其不為文正公罪人者幾希葉廷珪廷珪字嗣忠崇安人政和五年進士知徳興縣中興召為太常寺丞與秦檜不合出知泉州篤學淳雅名重當時葉顒陳俊卿黄祖舜鄭丙皆出其門有海錄碎事末利露華洗出通身白沈水熏成換骨香近説根苗移上苑休慚系出本南荒全芳備祖翁采采字景文崇安人政和五年進士調歸州教授貽里中舊遊偶控星槎到日邊幾回歸夢入閩川鄉關阻絶三千里江海馳驅四十年白髪應憎梅共放青衫漫與草爭鮮相逢準約春風裏棃嶺雲深叫杜鵑崇安縣志郭印印成都人政和中進士遊大隋山我聞大隋名夢寐猶記錄得檄天彭道喜氣和可掬出城六十里﨑嶇轉江曲山門忽斗上危歩依筇竹崩石帶烟雲異草羅㵎谷寂鳥下窺人纍猨時挂木路窮纔見寺金碧煥雙目祖師古定光燈冷無人續開公生異世大事如付囑僧言山長隂朝暮雲容蹙兹辰為我晴疊岫堆濃綠虚閣倚秋風一洗塵土俗舉手揖丹景横身跨白鹿十年勞問訊親到心始足坐久燭漸微借榻雲閒宿山寒寐不成窗外泉鳴玉全蜀藝文志下巖寺雲安欣及境小刹為徘徊殿閣隨巖轉軒窗向水開僧雖持鉢去客自艤舟來欲往無畱計幽懐亦暢哉四川總志傅崧卿崧卿字子駿山隂人墨卿從父弟政和五年進士髙宗朝累官中書舎人給事中卒有樵風溪堂集題趙宗萬跛鼈傳後鶴書東召竟牢辭一去騎鯨世莫追㑹有丹青遺像在誰將配食季眞祠㑹稽續志趙宗萬字仲囦山隂人築室郡之照水坊畜一鶴號丹砂引以為侣祥符中詔舉遺逸郡守以宗萬薦尋被召乃曰吾老矣不足任事獻跛鼈傳以自見朝廷賜以羽服崧卿為賦詩云云王珉珉字中玉大名人懿敏公素之後政和五年上舎出身紹興閒歴臺諫從官寓家三衢還靖師草屢跣足山行踐綠蕪道人應念我﨑嶇還將達磨西歸履暫作王喬羽化鳧為愛輕鬆宜踏石更憐瀟灑勝聨珠還君舊物君收取認得拖泥帶水無前賢小集拾遺何大圭大圭字晉之廣徳人政和八年嘉王榜進士仕為祕書省著作郎偶然作茅屋松窗小隱家茶煙漠漠水斜斜簷閒乳燕未成語庭下石橊爭放花頼有詩書銷白日倦隨車馬走黄沙林泉舊約好徑去風雨滿江垂釣車庚溪詩話薛朋龜朋龜字彦益鄞人政和八年進士官權工部郎知興國軍奉祠與汪思温輩結社林下稱四明五老和潘良貴題明州三江亭韻爽氣寒光四壁侵青山千仞水千尋逺觀吾里瀛洲路悵望誰人魏闕心春到已多鳴玉佩酒酣應有解貂金紫微太守經營巧消得時賢次第吟延祐四明志鄭瑴瑴字致剛建安人政和八年進士授安陸府教授高宗即位擢監察御史拜御史中丞累遷端明殿學士同簽書樞密院事卒諡忠穆杜鵑詩杜鵑飛飛無定棲寄巢生子百鳥依園林花老晝夜啼安得百鳥挾以歸建炎復辟記建炎己酉苗劉之變端明殿學士同簽書樞密事鄭瑴奏苗傅劉正彦等悖逆肆虐擅行殺戮朝廷近日差除多出二人之意兼聞以簽書樞密院召吕頥浩以禮部尚書召張浚又分張俊之兵以五百人歸陜及浚不受命俊不肻分所部兵遂謫浚以散官居郴州擢俊以節度知鳳翔皆出傅等姦謀使外無强兵謀臣内生變亂事不可緩遂一章乞畱吕頤浩知金陵一章言張浚不當謫而求有膽氣謹密可共事之人得奉議郎謝嚮令為客旅徒歩如平江見張浚等具言城中之事令嚴兵備大張聲勢持重緩進使其自遁無致城中之變驚動三宫撰杜鵑詩四句親寫令攜去執呈諸人以為信驗梅礀詩話建炎閒苗傅劉正彦作亂是時中丞鄭瑴密遣謝嚮如平江仍作詩示吕元直張徳逺二公吕張得詩即起兵成復辟功詩不徒作也張浚浚字徳逺綿竹人政和八年進士高宗朝拜右僕射中書門下平章事兼都督諸路軍馬孝宗即位封魏國公除樞密使卒贈太師諡忠獻李伯紀丞相挽詩蒼蒼安可料舊徳奄重泉痛為黎民惜誰扶大厦顚英風摩日月正氣返山川丙午功勲在豐碑萬口傳梁溪集附朝陽巖已覺雲天闊風聲四面涼路幽遲晩日巖古挹流香客舍長年靜漁舟底事忙相逢賢太守不用管弦將零陵志郭奕奕川陜宣撫司幹辦公事嘲張宣撫秦山未盡蜀山來日照關門兩扇開刺史莫嫌迎候逺相公新送陜西回三朝北盟㑹編建炎四年九月張浚以陜西五路軍軍于富平為婁室所襲不戰而潰宣撫幹官郭奕為詩曰婁室大王傳語張老謝得送到糧草㪷秤不畱一件怎生見得多少及退軍入散關過漫天坡又有詩云云後奕罷官住晋州賣蒸餅為生晏如也王庭珪庭珪字民瞻安福人政和八年進士紹興中胡銓上疏乞斬檜謫新州庭珪獨以詩送行坐訕謗流夜郎檜死許自便孝宗召對内殿除直敷文閣有盧溪集題宣和御畫玉鎖宫扉三十六誰識連昌滿宫竹内苑寒梅欲放春龍池水暖鴛鴦浴宣和殿後新雨晴兩鵲飛來東向鳴當時妙手貌不成君王筆下春風生長安老人眼曽見萬歳山頭翠華轉恨臣不及宣政初痛哭天涯觀畫圖和劉美中尚書聽寳月彈桃源春曉何年鑿源開混茫桃花兩岸吹紅香煙消逺浦生微陽漁舟誤行溪水長溪迴岸轉山隙光疑有絳闕仙人房居民爭出羅酒漿花閒笑語音琅琅抱琴釋子眉髮蒼響泉韻磬鳴長廊能彈往事悲孟嘗昔時臺沼今耕桑又如勇士赴敵場坐令遊子思故鄉清猨抱木號鴻荒孤吟劃見丹氣翔曲終待月西南廂重調十指初不忙如見古畫秦衣裳春天百鳥爭頡頏桃源歸來今已忘彈到落花空斷腸送胡邦衡赴新州貶所囊封初上九重關是日清都虎豹閒百辟動容觀奏牘幾人回首媿朝班名髙北斗星辰上身墮南州瘴海間不待他年公議出漢廷行召賈生還大廈元非一木支身將獨力拄傾危癡兒不了公家事男子要為天下竒當日姦䛕皆膽落平生忠義只心知端能飽喫新州飯在處江山足䕶持娱書堂詩話胡忠簡以言事忤檜謫嶺外王盧溪送以詩為邑人歐陽識告訐竄辰州檜死而還題辰州壁辰州更在武陵西毎望長安信息希二十年興搢紳禍一終朝失相公威外人初説哥奴病遠道俄傳逐客歸當日㺯權誰敢指如今憶得姓依稀桯史王盧溪在夜郎郡守承望風旨待以囚隷檜死郵筒至張燕公堂以待之盧溪既得自便之命題詩壁間蓋志喜也初至行在望中樓閣入青冥疑是長安舊帝京十里荷花開世界幾年羇旅憶神京老隨丹詔身猶健夢入華胥眼尚生行盡沙河塘上路夜深燈火識昇平以上盧溪集夜蛾兒碧眼銀鬚粉撲衣又隨雪桞趁燈輝怕寒還戀南華夢凝佇釵頭未肯飛前賢小集拾遺滕茂實茂實字秀穎杭州臨安人政和八年進士初名祼徽宗賜改焉靖康初以工部員外假侍郎使金見畱終身布衣稱宋使者歿于雁門其友董詵錄其哀辭來獻詔宣付史館裦録之紹興二年贈龍圖閣直學士諡忠節茂實奉使無狀不復返父母之邦所當從其主以全臣節或怒而與之死幸以所仗旛裹其屍及以所篆九字刋之石埋之臺山寺下不必封樹蓋昔年病中嘗夢遊清涼境界覺而病愈恐亦前緣今預作哀辭幾于不達方之淵明則不可若蘓屬國牧羊海上而五言之作始敢援此例云齏鹽老書生繆作王都官索米了無補從事敢辭難殊鄰復盟好仗節來榆關城守久不下川途望漫漫儉輩果不惜一往何當還牧羊困蘓武假道拘張騫流離念窘束坐閱四序遷同來悉已歸我獨畱塞垣形影自相弔國破家亦殘呼天竟不聞痛甚傷肺肝相逢老兄弟悼歎安得歡波瀾巻大厦一木難求安就不違我心渠不汗我顔昔燕破齊王羣臣望風奔王蠋獨守節齊人有甘言經首自絶脰感慨今昔聞未嘗食齊祿徒以老為民況我祿數世一死何足論遠或歿江海近或死朝昏歛我不須衣裹屍以黄旛題作宋臣墓篆字當深刋我室年尚少兒女皆童頑四海無置錐飄流倍悲酸誰當給衣食使不死飢寒歳時一酹我猶足慰我魂我魂亦悠悠異鄉寄沈冤他時風雨夜草木號空山齊東野語茂實與路允廸樞密宋彦通翰林修撰奉使金國割三鎮太原尋奉密詔據城不下金人怒之囚于雲中淵聖北遷茂實冠裳迎謁拜伏號泣請侍舊主俱行不從且誘之曰國破主遷所以畱公者蓋將大用遂畱之雁門放允廸彦通南歸先是自分必死遂囑友人董詵以奉使黄旛裹屍而𦵏且大書九篆字云宋使者東陽滕茂實墓復作詩自序云云後竟以憂憤成疾殂北人哀其忠為之起墓雁門山歳時致祭焉後董詵自拔南歸上所為詩贈直龍圖閣國史甚畧予訪之北方紀錄得其實焉天寧節有感節臨重十慶天寧古殿焚香祝帝齡身在北方金佛刹眼看南極老人星千官花覆常陪燕萬里雲遙阻在庭松栢滿山聊獻壽小臣孤操亦青青汴梁故老云徽宗本以五月五日生以俗忌移之十月十日故此詩有重十之句偶成纖雲巻盡見秋容古木交隂一掃空雪壓羣山曉來雨葉青缺甃幾番風欲歸未得人將老屢送還來鬼亦窮頼得子卿佳傳在整冠時讀慰飄蓬哀隆德守臣張確確浮休張舜民弟嘗為烏延帥幕獨不廷謁童貫詩弔之睢陽萬古一張廵忠義傳家有世臣顔子伏膺當入室潘郎望拜肯同塵圍城抱恨天猶晦仗劒臨危氣益振歎子鄰邦盡曹李偷生端作九泉人以上中州集宋之才之才字廷佐瑞安人政和八年上舍出身髙宗朝為考功員外郎隆山院危嶝盤雲杪驚濤漲晩空江山端有待杖屨偶相同孤塔蒼茫外千帆杳靄中誰知丘壑趣未縛輭塵紅東甌詩集朱松松字喬年徽州婺源人政和八年同上舎出身南渡歴司勲員外郎出知饒州主管台州崇道觀有韋齋集新筍春風吹起籜龍兒戢戢滿山人未知急喚蒼頭斸烟雨明朝吹作碧參差曾端伯百家詩選朱吏部喬年儒學決科刻苦為詩紹興初綦處厚為翰林學士毎哦其詩最愛此絶葢前人有筍詩曰急忙喫著不可遲一夜南風變成竹喬年㸃化乃爾精巧處厚力薦于朝後為尚書郎春晩書懐萬里西遊為覓詩錦城更付一官癡脱巾漉酒從人笑拄笏看山頗自竒疎雨池塘魚避釣曉鶯窗戸客爭棊老來帕與春為别醉過殘紅滿地時曉過吳縣舟行有嚴程越國常曉發雙櫓兀殘夢起坐窺落月人家岸野水霧雨籠䆳闥遙憐瑣窗人敧枕聴鴉軋坐睡坐久睡屢兀手失未了書清風脱然至心醒得我娛起看孤隙光了不移錙銖云何短夢中萬境生須臾嗟彼市朝子百巧營其軀安知非夢境過眼滅無餘以上韋齋集朱橰橰字逢年韋齋之弟有玉瀾集三山次潘靜之升書記韻客路那知嵗月長掀眉一笑苾篘房且傾徐邈聖賢酒不問陳登上下牀雲影翻空迷海嶠秋聲隨夢到家鄉明朝各聽船窗雨猶憶枯棊戰四郎大食缾窳質謝天巧風輪出鬼謀入窯奔閼伯隨舶震陽侯獨鳥藏身穏雙虹繞腹流可充王㑹賦漆簡寫成周六月二十日次日立秋天涯明日見秋風錯莫誰驚覆井桐豈意楚山招隱處盡歸蜀客廣騷中釣魚偶爾針偏直乞米茫然帖自工獨卧南軒聽南澗蠻花猶作杜鵑紅以上玉瀾集張叔夜叔夜字嵇仲開封人侍中耆孫以䕃補官召試制誥賜進士出身累擢中書舎人遷給事中出知海青二州歴簽書樞密院事靖康殉難贈開府儀同三司諡忠文岐王宫侍兒出家六尺輕羅染麴塵金蓮歩穩襯湘裙從今不入襄王夢剪盡巫山一朶雲竹坡詩話樞密張公嵇仲喜談兵論邊事面目極嚴冷而作小詩有風味謝舉廉舉廉字民師新喻人政和閒以進士知南康受知東坡有藍溪集獨醒雜志東坡嶺南歸民師袖書及舊作遮謁東坡覽之大見稱賞謂民師曰子之文如上等紫磨金須還子十七貫五百遂畱語終日民師著述極多今其族摘坡語名上金集葢其一也戲題指紋鬭牛圖左者前其角右者後其足浼君雙指螺戰此兩觳觫草長水逺日悠悠不向桑閒自在休蝸頭尚可屠蠻觸壁上從今鬭二牛聲畫集西捷口號聖明陛下如先帝闢國謀臣似召公不遣毛嬙嬪漠北只將魏尚守雲中百年境土逡廵復萬里窠巢指顧空今日版圖非昔日玉關西有嶺名蔥苕溪漁隱叢話句萬里一時開驥足百年今始破天荒獨醒雜志江西自國初以來士人未有以狀元及第者紹聖四年何忠孺昌言始以對䇿居第一里人傳為盛事故謝民師有詩寄忠孺云云葢記時人之語也尹焞焞字彦明洛人子漸之孫少從伊川學舉進士䇿問欲誅元祐黨籍不對而出遂罷舉靖康中賜號和靖處士南渡初以薦入經筵擢徽猷閣待制有集自秦入蜀道中作南枝北枝春事休啼鶯乳燕也舍愁朝來回首頻惆悵身過秦川最盡頭和靖先生集喻汝礪汝礪字廸孺蜀之仁壽人第進士靖康中官祠部員外郎金人議立偽楚汝礪不為屈遂歸隱于邛山之陽自號捫膝先生有捫膝稾困學紀聞後魏葛榮䧟冀州賈景興稱疾不拜毎捫其膝曰吾不負汝偽楚之僭喻汝礪捫其膝曰此豈易屈者哉以捫膝自號葢本于此謁江瀆廟坤軸東南傾大江日夜注前驅下洛洙餘濤畧吳楚任勢不期勞得意隨所遇水也初無營神哉亮誰主芳蘭沈清華碧藻舒翠縷晨鵠戲野岸春鳧集深渚均是得所安而神豈私汝古來幾精魄拾此迷所處滛遊不知還沙村失烟樹而我後千載悠然在江滸抱嗇貴無競矜名忌多取冥冥罨岸風滛滛打船雨舞雪窺洪濤開蘋渡前浦再拜謝神貺聊復隨所住遊海雲山渺渺天宇初便復有此山清晨及兹遊遐想百代前來者㡬何人當時各為歡淑質揚妙舞哀絲遞清彈樂事坐如昨芳歳已屢殫向來所遊人落葉不復還迥然散逺目感之為長歎竹林遥舊所鵲巢豈昔眠念誰當久存而不住所緣破涕聊一怡山川卻萋妍未知後世事誰復當來旋清曉坐四天王院杳杳天宇涼月墜星亦稀朝暉下檐隙遠色開林扉寂坐無物役隱几或在斯曠焉耳目清擬覺形神歸溷世跡若近抱沖心獨微故殿經幾年何人所摹規當時亦姱哉作者良已罷快意取一好于身亮何私不知壯觀地徒使來者悲坐頃又成昔安知今是非遊西臺院暑雪軒觀石鏡城中苦伊鬱兹軒獨高褰連甍動參差錯畦横阡眠雪嶠正孤峙若與我周旋逺翠浮蕩瀁輕鷗下聫軒密竹罥幽逕新蒲澹清漣初遊愜餘懐既久幽念攢慨彼泉下人灼灼夸令顔忽焉墜榛莽窈窕不可援一鏡空復情況乃塊石頑哀哉彼愚子婉孌情所牽差勝茂陵公更詠方士言謁諸葛廟孤雲何其高明月不可繫灼灼抱此心與世自涇渭釋耒從所歡感亂亦歔欷咨惟今之人竊國未云耻七首入吳市秋風動燕水區區袁與曹等是刺客耳而我于其間秉義不敢墜哀音回衝飇清義動幽䆳天心固難亮吾獨信所履溶溶日間雲漠漠苔㸃砌飢鼯墜蒼瓦澹薄公所憩静然想英姿孤懐亦差慰遊琴臺臯朔語類俳上頗倡優之嚴吾數預事慘懔失所棲慨彼猜忌姿公卿命如絲夫子迺謁閒闕五字眷言彼姝子深情結幽期浩露泛酒甕輕雲思琴徽撫絃視八荒頗覺秦岫低紛紛漢諸子悟解良獨遲一朝不自保頸血霑裳衣公豈不炯介慮禍葢已微汚已迥前識達生邁天倪闊哉昭曠情豈屑後代嗤子雲墨池讀書豈不好憂憤還自兹書中見古人隱閔惻餘思遇險理有激尋分意多隨娟娟感姱容慼慼念幽棲曽是無閒然孰焉惬所宜覽之不自聊悵然起遙悲不如撥置之濁酒聊一持先生頗多事斯心昧前知亦復坐竒字慘戚亡所歸晩泛浣花遂宿草堂扣橈泛澄虚濯流睇幽芳晩霙襯竒樹夕霏媚疎篁歸鳥亦暫閒夜魄動初涼忽焉衆星微天高月舒光昔也杜陵子澹然此茅堂客至酒自斟句得意已忘云何嘗念飢零落在道旁古來技入神一飯豈所望吾輩天所窮慨歌淚霑裳草堂詩燦燦詩翁錦里西只緣詩好合窮棲竹鋪冷色雲連寺桞漾晴絲鳥過溪凝怨不禁關樹暗駐情應恨蜀山低離人苦怕春歸盡可忍紅英半著泥亂後飄零歇此身風光無頼更清新客懐易感酒添病詩思苦慳花減春南枝北枝鶯舌巧前村後村雨腳勻暫借溪邊老為客花心栁眼莫撩人上席帥先公御吏如御兵迎刃而解如庖丁掀髯一笑黠吏走蜀中草木知威名伯兄渠渠天下士嵩高少室之英靈妙齡提書陳閶闔竑議可以諧韶韺昨年兩作益州牧西南惡少不敢行後來繼者有季弟潭潭大度涵滄溟指麾萬事不作意決皆雨電風烟生南望峨嵋西玉壘逸氣夜與銀河傾幅巾筇杖過何許閒邀仲元訪君平小童蓬葆夜吹笙往往笑倒長庚星㧞劍起舞者誰子杜陵老翁醉不醒坐中入眼無俗物胡為見我眼自青武侯廟前有古柏風吟雨歗蛟龍聲我來正欲刳爾腹琢作巨屋丹其楹琢作巨室丹其楹繪此落落三名卿尚使千載知儀型喻子作詩如鼎銘以上成都文類題周昉美人拜月圖東風元是無消息獨捲珠簾望春色風驚紅葉墮珊珊夢斷行雲泣殘月悒悒柔情不自持此心端被月先知窺窗入戸如相伴應是嬌娥慣别離聲畫集傅察察字公晦孟州濟源人堯俞從孫舉進士歷吏部員外郎宣和七年使金見斡喇布不拜死之贈徽猷閣待制諡忠肅有集次申教授直宿皎皎虚堂帶月清金風入律露華明潘郎寓直生秋興韓子長歌憶短檠驚鵲繞枝巢未穩幽蟲臨砌隱餘聲郤嫌詩思掩歸夢數盡高城長短更李良龍示牡丹長句謹賦一見竒葩潑眼明兩川風物寄爭新十家京洛供長日萬朶東秦照暮春諦視尚疑傾國女醉吟猶似謫仙人定知不是無情物為有真香暗度頻僕家近洛而常官青社故云以上傅忠肅集王仲嶷一作薿仲嶷字豐父丞相珪少子政和中守㑹稽後擢待制建炎初知衰州金人入江西坐失守削籍時秦檜當國為其兄仲山壻啟懇開陳詔復元官句白髮衰天癸丹砂養地丁老境得為丘壑伴醉鄉還勝子孫扶詠杖許彦周詩話朱載上載上舒州人官黄州教授翌之父句官閒無一事胡蜨上堦飛耆舊續聞東坡居黄州客有誦朱公之詩云云東坡稱賞再三遂為知己朱翌翌字新仲舒州人號灊山居士政和閒進士南渡後寓家桐廬為中書舎人忤時宰謫曲江晚召還卜居鄞自號省事老人有集揮麈後錄朱新仲仕江寧在王彦昭幕中有代彦昭春日畱客致語云寒食止數日閒才晴又雨牡丹葢數十種欲折還芳皆魯公帖與牡丹譜中全語也彦昭好令人歌桞三變樂府新聲又嘗作樂語曰正好歡娛歌葉樹數聲啼鳥不妨沈醉拚畫堂一枕春酲又皆栁詞中語題顔魯公像千五百年如烈日二十四州惟一人朝衣視坎趨前死羽服行山即此身後村詩話示同㑹無奈春寒老不禁喜看晴日上窗櫺羣花半露乾坤巧百刻平分晝夜停拄杖有時挑莱甲桔橰無復問畦丁逢春不出何為者衆醉誰知可獨醒瀛奎律髓競秀閣輞川遙展右丞圖盤谷中藏李愿居龍睡潭深飛客櫂鳳鳴枝老結吾廬但令蠟屐去前齒安用鴟夷託後車西望子陵三十里烟雲來往問何如嚴州府志句天氣未佳宜且住風波如此欲安之送汪彦章南遷耆舊續聞三徑誰從陶靖節重陽惟有傅延年本草菊一名傅延年困學紀聞經年不濯子春足半月纔梳叔夜頭嬾軒此時老子興不淺旦日將軍幸早臨招郭侯飲何以報之青玉案我姑酌彼黄金罍以上後村詩話王庭秀庭秀字彦穎明州鄞人登政和上舍第建炎中御史臺檢法官直祕閣主管崇道觀有磨衲集同舍弟泛舟西湖登晝錦堂歩至紫翠亭望嬾堂景物懐故龍圖舒先生城中十頃湖雲水相演漾春風破冰谷拍岸新流漲平鋪鴨頭綠澹沲蒲萄釀朱甍媚孤嶼梵宇麗相向萬瓦生清暉千花聨錦帳晨曦照炯炯芳氣浮泱泱日暮姿態妍烟霞渺空曠誰將水仙境聊借詩人仗臥䕶五年城追懐老詩將微吟示清野鏖戰得閒放變化無端倪虚無落名狀坐令湖上景勝絶神宇王當時經行地藻麗隨屨杖斯人今則亡物色亦摧䘮他年牛馬走曽拜丈人行塵埃久飄泊歳月成漫浪問訊嬾堂君松竹忻無恙尚意壁間聲持賡朱絲唱撫事重興嗟陳迹徒悵望哦公十洲詩風月為悽愴延祐四明志朱筠筠字仲端青田人政和中由上庠特奏名除蘄春監有竹軒小集和郡守劉巨濟重開石門洞謝公箕潁流特擬耽幽棲蠟屐得洞天雙鶴頫清溪擬追𤣥圃遊對此為階基披榛剪蘿蔦宿霧暝欲迷方當誇高標焉能分徑蹊鬼物諒奪氣幽禽亦驚啼卓哉曠世懐心與境不攜俯視囂塵中榮枯猶稗荑孰知東海偏秦鞭預排驅付與破荒手從此凌丹梯括蒼彚紀楊友夔友夔字舜韶吳郡人盜發孫堅墓作闔廬城南荒古丘昔誰𦵏者孫豫州久無過客為下馬時有牧童來放牛居然珍寳出光怪識者夜見蹤其由玉環金盌到塵市土花不蝕餘千秋州家亷問亟封守賊曹掩骼窮姦偷已知其中有可欲亦恐未免無窮憂當時義師奮四海少日已無袁與劉英雄異世凛如在暴露無乃為神羞人生浮脆那可料螻蟻烏鳶從所求高陵勸爾一杯酒自古南山能錮不吳郡志吳孫王墓在盤門外三里政和閒村民發墓甎皆作篆𨽻為萬歳永藏之文有東西銀杯初若燦花良久化為腐土又得金搔頭數十枚父老相傳云長沙王墓王即孫䇿郡人楊友夔為詩直指以為孫堅有高陵之句按史堅自塟曲阿紹熙辛亥郡人舉賢良方正滕宬以史考之定為孫䇿所塟與世俗長沙王之説稍合何鑄鑄字伯壽餘杭人政和五年進士紹興中官御史中丞龐祐甫卜居白蘋洲走筆寄感君愛白蘋洲攜家面碧流皇程惟百里宦跡只扁舟過盡江淮地何如宛洛游行宫催種栁禾黍滿神州吳興藝文補宋詩紀事巻三十九
