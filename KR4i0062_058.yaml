body:
  text: 宋詩紀事巻五十八錢塘厲鶚撰劉宰宰字平國金壇人紹熙元年進士調江寧尉真州司法寧宗朝韓侂胄枋國不復仕自號漫塘病叟寳慶初除將作少監進直敷文閣知寧國府不拜卒諡文清有漫塘集北固山望揚州懐古北固城髙萬象秋煙竿一縷認揚州試乗緑漲三篙水要見珠簾十里樓淚溼宫衣朝霧重愁薫寒草夕陽浮隋隄舊事無人問兩兩垂楊繫客舟秋懐一抺紅綃日腳霞千林暮靄納歸鴉西風捲盡梧桐葉乞與中庭散月華雲邉阻雨薔薇籬落送春䦨筍甚園林早夏閒牛背牧兒酣午夢不知風雨過前山以上漫塘集張嗣古嗣古宜春人紹熙元年進士歴起居舍人中奉大夫直龍圖閣仰山龍湫崎嶇鳥道開烟蘿長空偃蹇聲蕩摩白龍怒吼挂絕壁蒼兕離立迎清波枯竹拄破青苔色雷雨收功神斂迹窮源不得空歸來掬雪摶珠三歎息登妙高亭雨餘山石洗孱顏臥虎蹲羊各自閒杖屨貪穿秋色好不知衣惹蘚㾗斑以上袁州府志聶子述子述字善之建昌軍南城人紹熙元年進士嘉定中四川制置使曾以顯謨閣學士使金卒諡文定曾公道夫出示先世手澤斂袵拜觀之餘敬題二小詩嘉定壬午下元日香瓣平生滿意熏更參曲阜問闗津秖宜黄閣官尊貴不敢近前丞相嗔一門翰墨森圭璧諸老題評粲錦花珍重雲仍好收拾夜虹貫月定君家鐵網珊瑚李􅌫􅌫字季永燾次子紹熙元年進士理宗朝歴官同知樞宻事四川宣撫使有恱齋集離巫山晚泊棹石灘下黄昏風雨阻江濵翠綰羣峯暮色匀一夜子規啼到曉孤舟愁殺未歸人上巳從史巫山祓飲江臯風沙一夕巻冥冥曉色曈曚上翠屏薄宦驅人成老大佳時得酒慰飄零紅餘晚樹迷幽谷綠漲晴波失逺汀卻是崇山兼峻嶺看來渾不減蘭亭以上全蜀藝文志詹義義都昌人紹熙元年進士登科後觧嘲讀盡詩書五六擔老來方得一青衫佳人問我年多少五十年前二十三清夜錄詹羲遊武夷石廪巖前繫小舟娟娟明月照清秋仙人一夜吹長笛三十六峯雲盡收武夷詩集滕岑岑字元秀嚴州建徳人紹興乙卯領鄉薦屢上南宫不第紹熙元年庚戌特奏名仕為温州平陽縣丞有無所可用集方萬里序回至郡讀釣臺集見有曰月色揺江如汞走又有所謂七里風煙萬里寛者心異之細視則郡人龍嶺老樵滕公作也嚴州府志元秀平生苦吟與陳塤相倡和佳處自謂髙視大歴十才子詩凡三千首趙汝歴知郡日借其集不還故傳者甚少大抵皆江西體也後宋景濓序睦州詩派岑實與焉秋晚槭槭霜風勁駸駸物象雕屢遷憐蟋蟀一敗笑芭蕉林葉疎逾響山雲薄易消雖無逺行役對此亦何聊瀛奎律髓句斷橋測水露半影野渡擉泥留亂㾗拄杖送僧鄭興裔興裔字光錫顯肅皇后外戚也紹熙初知揚州瓊花春晩驅車到古祠看花復誦舊題詩少年嘗記六七月大暑曾開三五枝醉酒輒來思往事凭䦨欲去立多時八仙髣髴休疑似相隔仙凡只一絲瓊花譜董道輔道輔武陵人于湖張孝祥門人紹熙庚戌中秋後三日拜于湖先生墓曉出白下門瘦馬踏秋色鍾山度蒼翠慰我逺游客暮投清果寺花草獻幽寂長廊静無人落日照東壁平生張于湖萬里去一息翩然九州外汗漫跨鯨脊乾坤能㡬時安用較顏跖文章失津梁所念斯道厄夜䦨耿不寐搔首聽蕭瑟懐人感西風翁仲守孤柏景定建康志張沄沄字聲父呉興人紹熙二年發觧詠苔梅老龍全身著艾蒳不耐久蟄潛拏空爪頭撥動陽春信香在霜㾗雪㸃中題黄巖酒肆東風吹雨水平沙下卻籃輿訪酒家行役不知春早晩牆頭紅杏欲飛花以上梅礀詩話歐陽謙之謙之字希遜廬陵人學于朱子題睢陽五老圖欵題紹熙壬子厚徳良多積善根賢才他日在兒孫當知相里非凡壻豈有陳平乆席門五老繪圖千載譽群公詩禮百年存憑君挾取傳家學青史賢良有後昆鐡網珊瑚韓梴梴蘄王世忠孫紹熙初官直祕閣知眞州游洞霄宫雲去山空鶴自來天壇石室巳蒼苔洞前石鼔叩即應巖上仙眞挽不回明月照人山霧合東風吹㵎野蘭開髙眼百尺長松下閑看飛花落酒杯洞霄詩集韓松松梴弟游棲眞洞黄冠具竹輿邀我游棲眞山家雜水樹野徑横荆榛長松臥蒼蛟亂石錯紫鱗委曲至洞府積雪開䨇門結頂寳盖高下可容百人神仙獨何之棊局今猶存翠子拂不落衣袖生清芬山門局未終浮世三千春安得從之游一笑淩層雲洞霄詩集陸淞淞字子逸號雲溪山隂人官辰州守放翁雁行也耆舊續聞陸辰州子逸左丞佃之孫晚以疾廢卜築于秀野越之佳山水也放傲世閒不復有營念對客則終日清談不倦尢好語前軰事鄉校頌并序鄉校海鹽縣大夫能敎育人材而成之也維鄉有校示民有知敎始豫遜廸于訓彝維風化是裨維校在鄉示民有防入孝出悌為忠為良斯邦家之光鄉校有基如徳弗虧劉侯遷之魏侯新之李侯能成之其遷者初其新者中肄業傳道有師有宗繄李侯之功樂只君子孰後孰先顯有嘉聞於斯萬年維大夫之賢鄉校五章章五句海鹽縣圖經李直飬字無害維揚人正民之孫紹熙中為海鹽令興學校修大成殿置書籍祭器兼設小學擇師敎之陸淞有詩陳亮亮字同父婺州永康人淳熙中詣闕上書光宗紹熙四年䇿進士擢第一授簽書建康府判官㕔公事未至而卒端平初諡文毅有龍川集及第謝恩和御製詩韻雲漢昭回倬錦章爛然衣被九天光巳將徳雨平分布更把仁風與奉揚治道修明當正宁皇威震疊到遐方復讐自是平生志勿謂儒臣鬢髪蒼龍川集梅花疎枝横玉瘦小萼㸃珠光一朶忽先變百花皆後香欲傳春信息不怕雪埋藏玉笛休三弄東君正主張全芳備祖崔與之崔之字正子廣州増城人紹熙四年進士理宗朝累除廣東安撫使拜參知政事右丞相致仕卒累封南海郡開國公諡清獻有菊坡集送䕫門丁帥赴召議論方前席功名早上坡去帆𤓰蔓水遺愛竹枝歌同志星辰少孤愁暮雨多倚風窮望眼碧色渺平莎峽山飛來寺萬里星槎海上旋名山今喜得攀緣猿揮孫恪千年淚月照維摩半夜禪磴長荒苔人跡少厓攅古樹鵲巢懸江流上溯曹溪水時送鐘聲到洞前以上菊坡集孫伯温伯温字南叟豐城人紹熙四年進士知臨湘縣游麻姑山瀑布泉九官守不嚴失卻兩玉龍塵世著不得忽來此山中雷電白日間冰雪詩人胸天公不汝尤為人作年豐娯書堂詩話麻姑山瀑布分作兩派而下灌溉甚廣豐城孫南叟嘗賦古風云云甚有西江體馮多福多福常州人紹熙四年進士寳慶中以直寳謨閣出守鎮江鶴林寺春郊躬勸相税駕擬禪闗院古深藏竹堂虛淨對山日曛農父醉雲伴老僧閑暇日還攜茗同來瀹虎斑鶴林寺志喬行簡行簡字夀朋婺州東陽人紹熙四年進士理宗朝拜左丞相平章軍國事封肅國公及請老加少保保寧軍節度使醴泉觀使封魯國公卒贈太師諡文惠有孔山集池荷萱草軒窗處處幽酒中不著客中愁芭蕉葉上無多雨分與池荷一半秋全芳備祖㳺三丘山在東陽縣南晉義熙閒殷仲文為東陽守嘗登此山後人思之若㐮陽之羊祜故又名峴山疑是乗風到九天不知身在此山巓萬家攢蔟炊煙底一水縈紆去鳥邊便覺塵縁輕似羽何妨詩思湧如泉停杯更待林梢月歸去家僮想未眠東陽縣志程珌珌字懐古休寧人先世本洺州自號洺水遺民紹熙四年進士理宗朝累官禮部尚書翰林學士知制誥厯端眀殿學士致仕卒贈少師有洺水集流觴西湖用范左史韻畫船同載若登仙卻笑泥韀馬不前要識冷烟催榖雨須知澹日養花天千條翠栁隨風舞一樹夭桃照水妍始信人生行樂耳虛名那用世閒傳出南郊清甚春風吹屣到南園著酒塗酥花正繁更喜滿前無俗物横塘疎竹渭南村以上洺水集句黄麻方草罷紅藥正花翻省試紅藥當階翻詩吹劍録許景迃景迃舊名閎山隂人紹熙癸丑進士有野雪吟稾詠虞羙人草合歡枝葉想腰身不共長安草木春若聽楚歌能楚舞未央空有戚夫人全芳偹祖詠茭翠葉森森劒有棱柔條鬆甚比輕氷江湖若借秋風便好與蓴鱸伴季鷹蘇州府志句野店青窺户春船緑漲篙梅磵詩話周燀燀字昭禮邦之子樞密麟之之族姪南渡寓居臨安府之清波門著清波雜志曰琯按今刋本清波雜志作煇舊本有紹熙四年張貴謨序書中俱作燀宜從之句捲簾試約東君問花信風來第㡬番春詞清波雜志尹徳鄰徳鄰字直卿永豐人紹熙中太學生問寢龍樓曉父母人皆有儀刑自冕旒問安趨燕寢拂曉過龍樓鶴駕嚴晨衛雞人徹夜籌慈闈天語接飛棟月華收萬姓齊歌舞三宫款獻酬小儒憂國切㡬白九分頭鶴林玉露光宗以疾不能過宫徳鄰初參太學簾引詩題出問寢龍樓曉詩成學官擊節人皆傳誦周震震紹熙中知泉州惠安縣春月勸農至華林寺飛廉怒見海天眀十里籃輿出勸耕隴麥低頭須雨意林花仰面笑春晴熙寮連轡勤因事父老傳杯識至情及物無功慚竊廩豐年有願是忠誠泉州府志馮椅椅字竒之都昌人紹熙四年進士充江西運司幹辦公事攝上高令詠歸亭在筠州上髙縣弓轉寒溪月一灣下臨虎豹踞斕斑林烟濶處飛層閣雲影窮頭䕶逺山衿佩光隂弦誦裏丹青人物畫圗閒紅塵堆案那能到只有漁船自往還瑞州府志俞灝灝字商卿世居杭紹熈四年進士厯麾節皆有聲寳慶二年致仕築室九里松自號青松居士有集武康道中竹窗聽雨自安眠不道驚湍近屋前省得去年桃葉渡水㾗秖到樹旁邊前賢小集拾遺湖隄晚行暝色俄從草色生管弦羅綺盡歸城不應閑却孤山路我自扶藜月下行盛淳臨安志孫惟信惟信字季蕃號花翁開封人居婺州光宗時棄官隱西湖有集文獻通考陳氏曰花翁在江湖頗有標致多見前軰多聞舊事善雅談長短句尤工劉後村花翁墓誌季蕃貫開封少受祖澤調監當不樂棄去始昏于婺後去婺㳺留蘓杭最乆一榻之外無長物躬㸑而食書無乞米之帖文無逐貧之賦終其身如此名重江浙公卿閒聞花翁至爭倒屣所談非山水風月一不挂口長身緼袍意度疎曠見者疑為俠客異人其倚聲度曲公瑾之妙散髪横笛野王之逸奮袖起舞越石之壮也賦女冠還俗疊卻霞綃上醮衣女童髽髻緑楊垂重調螺黛為眉淺再試弓鞵舉歩遲紫府烟花鶯喚醒丹房雲雨鶴通知簾低紅杏春風暖清夢應曾見舊師詩人玉屑垂絲海棠嫋嫋垂絲不自持更禁日炙與風吹仙家見慣渾閒事乞與人間看一枝後村千家詩禪寂之所有賣花聲出廊廡間清婉動耳曲巷深房憶帝州賣花庭宇㝡風流窗紗破曉斜開扇簾繡籠隂半上鉤少日喜拈春在手暮年羞戴雪盈頭泉南寺裏蕭蕭雨婉婉一聲無限愁詩家鼎臠劉過過字改之號龍洲道人吉州太和人嘗伏闕上書請光宗過宫復以書抵時宰陳恢復方畧不報放浪湖海間有龍洲集多景樓開禧乙丑作金焦兩山相對起不盡中流大江水一樓坐斷天中央收拾淮南數千里西風把酒門來游木葉漸脱人間秋闗河景物異南北神京不見䨇淚流君不見王勃詞華能盖世當時未遇庸人耳翩然落拓豫章㳺滕王閣中悲帝子又不見李白才思真天人時人不省為謫仙一朝放跡金陵去鳯凰臺上望長安我今四海㳺將徧東厯蘓杭西漢沔第一江山最上頭天地無人獨登覽樓髙意逺愁緒多樓乎樓乎奈爾何安得李白與王勃名與此樓長突兀題謝耕道一犂春雨圖阿耘無田食破硯養親日糴供朝飯凝塵壁上挂瓶罌寒日窗前照藜莧汝父訓汝汝當知有田無田未可期有田不耕汝嬾病無田説田真畫餅畫田之外更畫牛捕風捉影何時休頭上安頭又詩軸全家不應猶食粥寄湖州趙侍郎桑柘村村烟樹濃新秧刺水麥梳風舟行苕霅䨇溪上人在蘇杭兩郡中鼔角麗聲喧旦暮旌旗小隊間青紅主人夙有神仙骨合住水晶天上宫以上龍洲集賦羊腰腎羹㧞毫已付管城子爛胃曾封闗内侯死後不知身外物也隨樽俎伴風流挽張魏公背水未成韓信陣眀星已隕武侯軍平生一㸃不平氣化作祝融峯上雲山房隨筆辛稼軒帥浙東時晦菴南軒任倉憲使劉改之欲見辛不納二公為之地云某日公宴至後筵便坐君可來門者不納但喧呼之必可入既而改之如所教門下果諠譁辛問故門者以告辛怒甚二公因言改之豪傑也善賦詩可試納之改之至長揖公問能詩乎曰能時方進羊腰腎羹辛命賦之改之對甚寒願乞巵酒酒罷乞韻時飲酒手顫餘瀝流于懐因以流字為韻即吟云云辛大喜命共嘗此羮終席而去厚餽焉席散南軒邀至公廨置酒語之曰先君魏公一生公忠為國功厄于命來挽者竟無一章得此意願君有意為發幽潛改之即賦一絶云云南軒為之堕涙令龍洲集中不見此二詩豈遺珠耶朱晞顔晞顔字子囦新安人慶元中廣西漕使慶元改元寒食日陪都運寺丞逰白龍洞時牡丹盛開小酌巖下夕陽西度並轡而歸小溪潄碧響潺潺路入龍宫杳靄間佳節漫添新白髮故人頼有舊青山花朝㡬共湘南醉萍迹何年嶺北還歸路聨鑣紅日晚多慚龍卧白雲閒粤西詩載白嶽寄懐林間留我住多時似與烟霞夙有期野老烹茶來獻客巖猨偷果去呼兒静思世上千年事不值山中一局棊欲説行藏舒巻意洞天惟有白雲知齊雲山志鄒應龍應龍字景初卲武軍太寜人慶元元年進士第一理宗朝累官端眀殿學士簽書樞密院事知慶元府兼沿海制置使逰寳盖巖夙有斯巖約今朝喜踐盟路從支澗入人在半空行六月如霜候四時長雨聲願求容膝地著我過浮生邵武府志林士表句有書来進御無語不闗農進農書陳伯震句修眉濃淡裏寸碧有無間開簾出逺山鄧伯秀句在我時舒巻從他自去留鉤簾宿鷺朱縉句冰玉詞新吐塵埃氣不留清文嫓皇猷陳瑄句似嫌秦閣小欲際楚天浮風幔不依樓吹劍録省題詩雖場屋末技間有以此見長如林士表諸人句皆主司所刮目鶚按以上皆南宋中葉人不可詳其次第姑附于此羅椿椿字永年自號就齋廬陵人楊誠齋髙弟寄楊誠齋慶元初誠齋與朱文公同召誠齋力辭不愁風月秪憂時髪為君王寸寸絲司馬要為元祐起西樞政坐夀皇知苦辭君命驚凡子清對梅花更與誰夢繞師門三稽首起敲氷硯訴相思送永豐汪令錦纜梅花浦江南作縣歸新来薦鶚牘驚動衮龍衣嵗晩情難别心親事卻違恐君天上去扶病出烟霏句露溼看花腳鶯啼欲曉山春消千嶂雪清逼五湖秋以上鶴林玉露林亦之亦之字學可號月漁福清人林光朝嘗講學莆之紅泉及卒學者請亦之繼其席趙汝愚帥閩嘗以亦之行業上于朝未㡬卒學者稱網山先生景定間諡文介贈廸功郎有集曰琯按眀王應山云縣志贈官不言賜諡三山續志稱文介先生葢私諡也劉後村䟦網山律詩高妙者絶類唐人題林稚春菊花枕子歌故人所説菊花枕似把氷丸月下飲秋水一䨇眀烱烱數在青嚢第一品狂風江上吹蒹葭往往得之嵇阮家閉門讀書二十載眼睛損盡生空花建陽小作箸頭書殘更燈火亂蟲魚石渠文字大如斗場屋嵗月又不偶卻来南山青草邊東西盡為菊花田手提長筐向山曲一下收拾三百斛昨者昏迷才起来解把蠅頭小字讀乃知妙物通羣仙一切藥裹應棄捐丁亥九月十六夜偕李監倉宿龍臥山中聼雨看月同時事也所謂魚與熊掌兼得之賦詩一篇以紀其事相喚此山来狂風吹我衣把酒桂花下山雲片段飛掩門雨初滴開門月還上倚門看月眀半山聞雨響人間有佳景詩句頗發越何曾似今夕聽雨還看月九日下水口黄花時候苦思鄉急水還家一日強不道南風打頭上客船搖櫓作重陽寄表弟章由之為理曲堆屋廬苦来為客竟何為宅舍荒村誰與治别墅雖無輞川畫生涯堪入杜陵詩身如燕子年年去家似漁舟處處移丹井西頭曲堆下更煩嵗晚定疎籬輓光澤朱君諱賡字師賢諸老蕭蕭似巻塵不堪再見素旌新白頭縣尉笭箵浦夜雨寒窗是舊人以上網山集曽從龍從龍字君錫晉江人公亮四世從孫慶元五年進士第一累官知樞密院事兼參知政事卒贈少師題衢州順溪館紅照西沈暫解鞍偶然假館豈求安新豐獨酌誰為侣坐對窗前竹一竿娯書堂詩話曾參預從龍赴省時館于衢之順溪題一絶云云識者巳韙之矣是年竟至大魁致身政府至今其館扁為狀元魏了翁了翁字華父號鶴山邛州蒲江人慶元五年進士理宗朝累官簽書樞密院事改資政殿學士福州安撫使卒贈太師諡文靖有鶴山集題謝耕道一犂春雨圗牀頭夜雨滴到眀村南村北春水生老婦攜兒出門去老翁赤腳呵牛耕一䨇不借挂木杪半破夫須衝曉行耕罷洗泥枕犢鼻卧看人間蠻觸争題上亭驛紅錦綳盛河北賊紫金盞酌夀王妃弄成晩嵗郎當曲正是三郎快活時原注俗所謂快活三郎者即明皇也十二月九日雪融夜起達旦逺鐘入枕報新晴衾鐵衣棱夢不成起傍梅花讀周易一窗眀月四簷聲梅磵詩話後二句寄興髙逺人所傳誦紫宸殿御筵即事蛾眉班捲戴花回遥望君王玉色開畫楯諸班謝茶酒尻髙首下一聲雷以上鶴山集題米南宫雲山圖漠漠雲林小小山誰家茅屋隱松間石橋雨過天台逺采藥仙人去未還式古堂畫考盧祖臯祖臯字申之又字次䕫號蒲江永嘉人樓攻媿甥慶元五年進士嘉定中為軍器少監權直學士院貴耳集蒲江貌字修整作小詞纖雅詩如舟中獨酌云山川似舊客懐老天地何言春事深及玉堂有感松江別詩余領先生詞外之㫖黄玉林云蒲江乃趙紫芝翁靈舒諸賢之詩友其詞甚工字字可入律吕浙東西皆歌之玉堂有感兩山風雨故留寒九陌香泥苦未乾開到海棠春爛漫擔頭時得數枝看松江别詩眀月垂虹㡬度秋短篷長是繫人愁暮烟疎雨分攜地更上松江百尺樓以上貴耳集廟山道中粉黄蛺蜨遶疎籬山崦人家挂酒旗細雨嫩寒衫袖薄客中知是菊花時梅磵詩話酴醿雪榦雲條一架春酒中風度夢中聞春風不是無顔色過了梅花便是君全芳備祖讀書細字燈前老不便小齋新冷夜無眠數聲牆竹蕭蕭雨一縷銅爐淡淡煙種橘小擘枝頭滿袖香纍纍秋實正宜霜每來長是移時去為爾風流似故鄉以上僧居簡北礀集附雨後得月小飲懐趙天樂梅花此夜稀嘉月弄光輝不飲強呼酒欲眠重啟扉語髙驚鶴睡坐乆見烏飛想見湖居友扁舟不肎歸東甌詩集周師成師成字宗聖號雉山長興人慶元五年進士貴耳集宗聖少年秀麗讀書善記議論古今落落可聽有詩髙逺愛作選格仕不得志晚年若有所遇如遊仙散聖之徒梅采采芳梅枝瑣碎白雲姿在山千花怨出山百鳥啼操持思所寄轉趾述所思清披太始風寒應太虚月一日拂人衣三嵗香不歇貴耳集敖陶孫陶孫字器之長樂人慶元五年進士官泉州簽判有臞翁集次韻馮孔武雪中簡聞人簿乞炭君不見朱門煌煌多近臣豹胎煮糜蠟為薪庭中盛設潑寒戲炙手欲近還嗔人誰知曝背茅簷下欲獻要是山林真兒童抑搔皮肉輭日輪過中方欠伸懸鶉結駟兩相笑百年俱成一窖塵先生自是冷官様要看入火紅麒麟撚鬚自作詠雪句祕思早與相如親蒲團擁裘結僧坐别有絺綌君南鄰願廻六龍照后土施與萬國無邊春屑瓊鏤玉入肺腑拍手一笑吾未貧奉寄旌徳尉劉申之諸劉兄弟賢一一無可選竹林鋭頭郎風味吾小阮平生天機深善閉得内楗邇來卿何曺不辦折腰本稍傳詩語東朝日照蘭畹伊余戰紛華心斾凡㡬偃劃逢君家語雋永初一臠識遺飽新得友勝悟夙損緬懐歌商地蕭瑟松澗逺隂隂蕪菁花碧蜨相與晩是中著髙士物意自偃蹇向來白衣宰雲壑論補衮優游濟艱難如以禹代鯀劉郎秀眉宇秋隼立高巘端能謝師匠萬巻自鉏墾時須閲世諦一及城門鍵功名頭上簪日月風中幰何時㑹呉下春動長洲苑以上臞翁集題三元樓壁左手旋乾右轉坤如何羣小恣流言狼胡無地居姬旦魚腹終天弔屈原一死固知公所欠孤忠幸有史長存九泉若遇韓忠獻休道如今有末孫四朝聞見錄慶元初韓侂胄既逐趙忠定太學諸生敖陶孫賦詩於三元樓云云方書于樓之木壁壁巳不復存陶孫知捕者至急更行酒者衣持煖酒具下捕者與交臂問敖上舍在否對以若問太學秀才耶飲方酣陶孫亟亡命歸走閩後登乙丑第西樓秪有西樓日日登闌干東角毎深凭一層巳是愁無奈想見仙人十二層後村千家詩蘇大璋大璋字顒之古田人慶元五年進士官著作佐郎出知吉州鳳翀峯在古田縣五花石早起聨鑣上翠微瞰虛歴級歩嶔崎昔聞華頂蓮生藕今見南山菊滿籬縱眼横看天地闊壯懐唯有鬼神知安期引我丹霄路十里雲烟特地披福州真徳秀徳秀字希元浦城人慶元五年進士中詞科紹定中拜參知政事進資政殿直學士提舉萬夀觀卒諡文忠學者稱西山先生有集挹仙亭漢宫葦篋兒呱呱濟南梓柱隂扶疎富平家人正媮樂安昌帝師工獻諛子真東南一尉耳黄綬凄涼百僚底手持短疏叩天閽義激丹衷淚横眥翩然一朝徑拂衣愛君無路空依依人傳九江巳仙去呉門再見是邪非神仙茫茫那可測上帝從來賞忠直天上果有驂鸞人合領羣真朝北極自從舉手謝世間千年白鶴何時還玉簫聲斷杉檜冷秪餘丹竈留空山谷口之孫古膚使亭斸青冥挹仙袂耿耿應懐貫日忠飄飄那羡淩雲氣我來快讀華星篇清徹毛骨風冷然何當結屋最高頂一榻容我分雲烟㑹長沙十二縣宰作從來守令與斯民都是同胞一體親豈有脂膏供爾禄不思痛癢切吾身此邦秪以唐時古我輩當如漢吏循今日湘潭一巵酒直須散作滿懐春蓉塘詩話西山先生帥潭時作皇后閣端午帖子記得當年夢月符浴蘭節後恰旬餘欲知天錫無疆夀認取仙蜍頷下書瑤池十丈藕花香清賞尤便水殿涼聞說内家多樂事前星親自捧霞觴贈張童子虎頭燕頷及鳶肩自笑都無一事全惟有數條􅏨様骨尚堪山澤作臞仙如􅏨骨出人倫書聞君早號張童子顧我初非韓退之可惜浪抛洙泗業秪看風鑑學希夷以上西山集易祓祓字彥章潭州人第進士開禧官左司諫浯溪中興頌湘江東西直浯溪上有十丈中興碑誰鑿豐碑鎮山曲溪邉羙人羙如玉想當歌頌大業時胸蟠星斗光陸離蠶頭蠆尾更清勁凛凛襟懐冰雪瑩水部之文魯公書兩翁寥寂千載餘後來更有黄太史健筆題詩起翁死一派溪流徹底清溪邉鏡石堅而明我思古人不可見水石猶作瓊瑰聲偶來真仙訪遺跡烟雨凄迷山路溼野叟䝉頭看打碑君其問諸水邉石浯溪集葉秀發秀發字茂叔金華人慶元進士知休寧縣題龍吟寺曉色愁征轡疎鐘忽斷林荒溪窮虎跡古寺到龍吟竹影殘燈暗苔㾗落葉深客懐無共說攲枕聽霜砧黄山志呉豐豐官韶州經幹贈胡彥忠古羊人物舜風餘子姓傳來秪舊廬為愛一門能守義相承五世不分居廣東通志胡彥忠曲江人五世同居慶元己未經幹呉豐假宿其家深加奬歎為言于臺閫列上其事旌表其門俞成成字元徳東陽人著螢雪叢說慶元庚申自為序題釣臺千古英風想子陵釣臺緣此㡬人登誰知避諱更嚴氏灘與州名總誤稱螢雪叢説嚴子陵本姓荘避顯宗諱遂稱嚴氏若釣臺若七里灘亦皆以嚴命名無非循習之訛而莫知其非也宣和閒方臘寇江浙改睦州為嚴州葢本于此至如范蔚宗操東漢之史筆初不究其姓氏之由遽曰嚴光而傳之無乃以田千秋為車千秋乎黄元夫句葦村風下鴉千㸃麥隴天垂月一梳螢雪叢王廉清廉清字仲信汝隂人雪溪先生銍長子問學該博與弟明清齊名著有京都歳時記廣古今同姓名録補定水陸章句新乾曜真形圗題玉霄亭在台州子城上曽守谹父建谹父廉清之舅氏也憶昔新亭敞玉霄使君髯舅意飄飄春風㶑灩黄金琖明月參差紫玉簫歌吹舊蹤空草木風流閑話屬漁樵凭欄無限凄凉意寂寞寒江落暮潮赤城志王明清明清字仲言汝隂人雪溪先生銍之次子慶元間寓居嘉禾官泰州倅著有揮麈三録玉照新志投轄録清林詩話句凄清寳鈿初分處愁絶清光欲破時玉照新志紹興閒乙卯張安國為右史明清與仲信兄鄭舉善郭世禎李大正李泳多館于安國家春日同游西湖至普安寺于忩戸閒得玉釵半股青蚨半文想是游人歡洽所分授偶遺之者各賦詩以紀其事明清云云葉樾樾慶元初監海鹽澉浦鎮稅三里塘掐梅扶疎不耐繁華意足自然清絶壁閒幻出横斜秪欠紗窗明月澉水志孔夢斗追詠鄒道鄉所植揚州學四柏道鄉採芹暇手植四株柏相對有真味愛此歳寒格忠言賈奇禍㡬削諫臣跡柏亦助道鄉每號風雨夕柏死公不死大名日皦白後人補種之存棠思召伯亭亭儼相持撑雲空百尺是柏出雖晩風致猶古昔我來跂遺芳清坐假一席徘徊意難捨猛把䦨干拍寄語景行人用意謹勿窄惟揚志倪垕垕淮南節度判官追詠鄒道鄉所植揚州學四柏次前韻斯文以道重所取不但柏借彼剛特姿昻然見標格嵗華閲如流蒼髯尚陳跡田晝亦奇士三歎子革夕人生運窮逹敢愛母頭白冷冷清風閒媿死㡬侯伯誰歟繼遺響高臥樓百尺袖攜萬斛珠一笑俯今昔知心古槐樹交䕃上簾席大開多士鑪韶竽辨節拍所養貴所用量廣滄海窄惟揚志薛寘寘字持志明州昌國人慶元五年進士調衡陽簿洩潭瀑布秋高水壯雪飛濤巖水招風怒竅號不是玉虹低㵎飲白龍施雨下山腰大徳昌國州志宋詩紀事巻五十八
