body:
  text: 宋詩紀事卷三十二錢塘厲鶚撰許景衡景衡字少伊溫州瑞安人元祐元年進士高宗朝官至御史中丞遷尚書左丞罷為資政殿學士提舉洞霄宫卒諡忠簡有橫塘集寸碧亭杖履尋常行樂處不論小徑與幽亭誰知蒼莽千峯外尚有仙山一點靑東甌詩集登仙巖寺龍穴梅潭抱嶺斜憶曾同試雨前茶稍須林壑開雲葉便倩兒童汲井花一别仙山空夢寐三年邉塞走塵沙合須覓片間田地鄰舍如儂有幾家仙巖寺志魯百能百能吳興人元祐元年進士醉仙崖在秦州舊天水縣連鳯山高倚靑冥揖酒星山崖誰作醉仙形從來天地為衾枕應笑人間有獨醒方輿勝覽李豸豸字方叔陽翟人少以文字見知于蘇軾元祐初軾知舉意在必得豸以魁多士及考章援程文以為豸無疑遂以為魁既拆號悵然出院薦竟無成而卒有濟南集友人董耘饋長沙貓筍豸以享太史公太史公輒作詩為貺因筍寓意且以為贈耳豸即和之亦以寓自興之意且述前相知之情焉節藏泥滓氣凌空薦俎寧知肉味重未許韋編充簡䇿已勝絲委誑蛟龍短萌任逐霜刀重美幹須煩雪壤封他日要令高士愛不應常共宰夫供師友談紀苕溪漁隱叢話李方叔稱范淳甫為太史公以其為國史修撰也觀吳正獻真次公不許畫麒麟孝宣妙選知名臣拜公之像想風度乃是雲臺子顔之文孫元豐天子建原廟玉宇萬棟臨端門纍朝名臣儼冠劒列聖御坐開乾坤修廊祕殿鎖春色倣佛音容皆駿奔相君相業皆元元旗常彜鼎定書勛儀形在歿侍神考英氣噩噩凝天閽嗣皇方思服闕美欲考辟公觀列文君傳兹圖落人世世人遂得知瑜璠吾知袁公固有後能平楚獄竟無冤召公甘棠猶不伐衛武之德誰能諼君不見溫公之像滿人間願廣此圖令並傳聲畫録寒食千株密炬出嚴闉走馬天街賜近臣我亦茅簷自鑽燧煨針燒艾檢銅人娛書堂詩話此詩善述冷淡況味飮襄陽沈氏家醉題侍兒小瑩羣帶旋剪香羅列地垂嬌紅嫩緑寫珠璣花前欲作重重結繫定春光不放歸墨莊漫録驪上歌君門如天深九重君王如帝坐法宫人生難處是安穩何為來此驪山中復道連雲接金闕樓觀隱隱橫翠紅林深谷暗迷八駿朝東暮西勞六龍六龍西幸峩眉棧悲風便入華清院霓裳蕭散羽衣空麋鹿來遊虛市變我上朝元春半老滿地落花人不掃羯鼓樓高挂夕陽長生殿古生青草可憐吳楚兩醯雞築臺未就已堪悲長楊五柞漢幸免江都樓成隋自迷由來流連多喪德宴安鴆毒因奢惑三風十愆古所戒不必驪山可亡國宋文鑑遊寶應寺雨後秋風入翠微我來仍值晚涼時山遮日腳斜陽早雲礙鍾聲出谷遲故國空餘煙冉冉舊宫何在黍離離興亡滿眼無人語獨倚闌干默自知詩林萬選劉延世延世字述之臨江人公是先生猶子少有盛名元祐初遊太學不得志築堂講業名曰抱甕自題墨竹酷愛此君心常將墨點真毫端雖在手難寫淡精神畫繼翡翠避人忽起鳴衣桁掠水飛來立釣磯靜處欲留看不足翠光點破夕陽歸後村千家詩和孫公索酒紫貂寒擁鼻緑蟻細侵脣蓮燭當時事壺頭此日春孫公談圃種竹梅蒸方過有餘潤竹醉由來自古云掘地聊栽數竿竹開簾還當一溪雲歲時廣記句靜室焚香盤膝坐長廊看畫散衣行孫公談圃劉述之句趣尚之高有如此者王履履字坦翁開封人元祐初從父景琚南郊恩為三班奉職元符上書編置新州入黨籍靖康初除相州觀察使扈駕被留死之臨難歌曰琯按此歌宋史作李若水矯首向天兮天卒無言忠臣效死兮死亦何愆三朝北盟會編喻陟賀岷州太守种誼破鬼章周后持盈日戎夷負固年廟謀期必勝閫略制於先不假天山箭行聞杕杜篇凱還俘馘獻圖像有凌煙陜西通志王純臣賀岷州太守种誼破鬼章黃塵匹馬捷書來且喜洮東破虜回縱使濮西功第一未聞生縛七渠魁陜西通志鄭至道至道莆田人伯玉之孫元祐二年以雄州防禦推官知天台縣為政寬簡邑人悅服秩滿扳戀因家于台今廣龍鄭乃其裔也劉阮洞采藥歸來世代賖洞門方此掃煙霞碧流淸泚弄明月翠巘高低飄落花芳草已迷當日路白雲空想舊人家自慙不是浮觴侣漫向人前醉帽斜台州府志王公亮公亮字明遠句足榖醫還驗占桑夢巳靈王得臣麈史豫弟光輔鄰臣郡以經行應詔元祐丁卯賜第歸未幾因出墜馬傷甚十一日而卒年四十八王公亮明遠挽詞云云衆咸推服范子正子正忠宣公純仁長子鶚按范忠宣二子正平字子夷次正思字子默范公稱過庭録云六伯祖子正七伯祖子夷是子正為忠宣長子史不載故佚其名孔林漢陵玉匣盡秦山銀海空干戈百世後獨究先聖宫樹有千年色門無數仞崇盛德包覆載遂順因所宗坐若顔閔後頗聞鄒魯風撫膺感遺言零落涕霑胸過庭録寄季顏師顏謫齊州歷下故人今何在音書又已隔寒暄多年别後紛紛事何日尊前細細論忍見風霜摧羽翮空教江漢瀉詞源聖朝寬大超前古即有恩光照覆盆范公稱過庭録六伯祖子正丞相長子有大才博學年甫三十二而卒有文集百卷魯直為跋其後兵火集散亡而魯直集中此跋亦闕其略云士之學期于沒而不朽君子之道百世以俟聖人故壽夭之際未嘗置言鳧鶴之短長故物不能齊也雖然有連城之璧操之甚栗中道而毁豈能使人無槩于心哉范子正余不及友也豫聞其人又得其言皆可傳後問其所遊則司馬溫公愛之問其為吏則年三十試吏單父方使者剝膚椎髓取于民以自為功子正以歲飢獨拾單父民錢十九雖沒可以不朽矣或謂子正父祖皆名世士自冝如此應之曰文王割烹武王飪鼎叔旦舉而用之管蔡不食誰強之則子正賢于人遠矣元祐二年三月庚午豫章黃庭堅書范致虛致虛字謙叔建陽人元祐三年進士徽宗朝為尚書左丞靖康中知京兆府高宗即位終資政殿學士泛松江黛潑峯巒安用染鏡澄湖靣不須磨已驚張翰鱸如玉想見西施髻似螺目斷樓高知水濶雲開山盡見天多吾家本是煙波主好律漁翁一曲歌吳江縣志趙宗印宗印汾州孝義人少為僧范致虛令還俗授河東制置使提義兵所向輒下王師敗於富平慟哭入華山不知所終題佛剎七十勞生西復東鄉關在念感飄蓬大遼半歲九分盡全晉一年千里空周召已亡無善政蔡童雖死有餘風華陰乞食商山去巖谷幽尋四老翁封氏編年范致虛在長安措置兵馬招募諸色人借補官資宗印本姓趙汾州人題詩佛剎云云安撫席益遣人追回與語大竒之薦之致虛令還俗為節制參議宗印以僧為一軍謂之尊勝隊以行童為一軍謂之靜勝隊軍至陜州攻奪潼關劉燾燾字無言長興人誼之子元祐三年進士仕為祕閣修撰有見南山集上庠録元祐間馬涓張庭堅等四人擅名太學時號四俊劉燾湖州人年少亦自負初補太學生聞而慕之以刺謁曰不識可當一俊否涓等詭計以困之曰每誡當預為一字限于程試中用之善者乃預既而程試燾請字涓等曰第一句用將字其時策問神宗實録燾對曰秉史筆者權猶將也雖君命有所不受而況其他乎後果為第一聞者服之因目燾曰挨尸俊同友人泛舟至仁王寺靑秧出水細於針嫩葉初齊緑未深又是一年春欲盡杖藜乘興足幽尋前賢小集拾遺題召伯埭斗野亭地勢如披掌天形似覆盤三星羅戶牖北斗挂闌干晚色芙蕖靜秋香桂子寒更無山礙眼剩覺水雲寬庚溪詩話此詩題梁間盡得斗野景物罨畫溪在長興竹林深處杜鵑啼兩岸靑靑草色齊欲識人間真罨畫朱藤倒影入清溪湖州府志宿華嚴院夜宿霧山霧晨茹芝山芝年來嗜好衰但與靑山宜登臨意未愜出戶車已脂王事有期程愛山豈余私﨑嶇田野間食寢將安之天寒未落日稅駕忽在兹二山已陳迹兹處尤新竒翠竹與黃花一一對山扉對景自忘言若與豫心期眠雲飽山色那得困與飢山僧喜我來迎我留新詩我有愛山癖山僧知不知吳氏詩永郭三益三益字愼求常州人元祐三年進士仙居令靖康間湖南安撫建炎初同知樞密院事題仙居南峯寺藍光軒山光竹影交寒輝下有碧浸吹漣漪沙痕隱隱白鳥去石聲鑿鑿扁舟歸芝蘭發香禪味遠雲霧吐秀人家稀須知春事不可挽杜鵑已繞林中飛吳禮部詩話寒巖道人棲碧山雲居在空曲十年海潮音外物緣已熟更尋妙高頂超然具幽築古木插空靑寒筠抱巖緑時攜貝葉書步入深林讀雲衣冷蕭條靜對含煙玉客來境非喧客去境自足宵眼護神虎晝引穿花鹿庵中三昧語藥我貪癡毒何當脫雙鳧藜杖追高躅天台山志馬存存字子才鄱陽人因慕徐節孝道德寓楚州卒業于其門元祐三年進士為越州觀察推官有集長淮謠節孝先生作淮之水贈之子才答以長淮謠長淮之水青如苔行人但覺心眼開湘江豈無水魚腹忠魂埋但見愁雲結雨猿聲哀浙江豈無水鴟革漂胥骸但見潮頭怒氣如山來孤臣詞客到江上何以寬心懷長淮之水繞楚流先生家住淮上頭黃金萬斛浴明月碧玉一片含淸秋酒花入靣歌一曲淮上百物無間愁合璧事類前集句可憐一覺登天夢不夢商巖夢棹郎咏漢文帝記聞困學孫發發字妙仲元祐三年進士崇仁尉絶句林亭長夏愛重陰來引茶甌一散襟忽去郤來蜂個個自啼還住烏深深能改齋漫録太史章章德清人元祐三年進士題宴坐石白雲曾罩定中身石上雲歸不見人應有山神長守護松風時為掃埃塵吳興藝文補張壆􅘏字子厚武進人元祐三年進士甲科養親不仕蘇軾薦為校書郎不出崇寧初賜處士號卒諡正素蒙齋筆談正素處士清通遠略不為崖異賀鑄最有口才好雌黃人物於子厚亦無間言每折節事之稱曰通隱先生夢中作楚峽雲嬌宋玉愁月明溪淨印銀鉤襄王定是思前夢又抱霞衾上玉樓紫薇詩話送吕子進籬鷃雲鵬各有程匆匆送别未忘情恨君不在篷籠底共聽蕭蕭夜雨聲宋文鑑宗澤澤字汝霖婺州義烏人元祐六年進士靖康元年知磁州勤王兵起康王以澤為副元師建炎間纍遷延康殿學士京城留守兼開封尹連結諸路義兵方剋日渡河力請上還京為黃潛善汪伯彥所沮憂憤疽發背卒贈觀文殿學士諡忠簡有集華隂道上二絶煙遮晃目初凝雪日映斕斑卻是花馬度急流行小崦柳絲如織映人家菅茅作屋幾家居雲碓風簾路不紆坡側杏花溪畔柳分明摩詰輞川圖詩説紀事楊用修云余嘗見石刻宗忠簡此二絶至洛都人士女各紛華列肆飛樓事事嘉政恐皇都無此致萬家流水一城花以上宗忠簡公集朱之純之純華亭人元祐六年進士自題谷陽園湖齋平湖十頃水汪洋得意茅齋且屈藏園種小桃今結子池栽翠芰更聞香六龜已兆千年瑞雙鶴看呈八月祥居此翛然忘世味此心尤懶去龍陽自注云子湖上治圃於桃根獲古龜六枚其小如錢雲間有仙鶴觀每歲中秋夜有仙鶴下觀因得名今余治圃谷水鄰其地至元嘉禾志歐陽闢闢字晦夫桂州靈川人從學於梅聖俞元祐六年進士任石康令困學紀聞歐陽闢字晦夫桂州人東坡南遷至合浦闢時為石康令出其詩稿數十幅注坡詩者以為文忠之族非也寄京師畫院待詔王公器有唐畫癖唯王維自謂前身應畫師君今畫祖躐神奧權敵造化爭分持君今畫品到神處祖身再生何異疑宋唐相距更纍代典型尚在寧少隳正恐聲名出祖上況早力學工文詞曩吟佳句每記憶一字可買堪貧羸天地兩間府萬物物物圖繪略不遺飛潛動植出把握臻幽造妙窮豪絲顧堂陸室牆數仞直發門鐍深探窺人間流落已足貴況蔑國手展設施景靈九殿初締構九屏博選丹靑竒睿旨屬君亟應命牡丹孔雀他無為雕闌醜石要傑怪議敢共事才郭熙屏間散布十八種爛然逼真生羽儀南徐西趙不復數宸翰點賜收高資慈聖光獻升仙際睟容將貌精者誰都城名輩皆縮手君特奉詔趨宫闈重瞳背淚親眷矚一筆立就難動移上心中愜愈增慟金口由此皆歎咨禁庭內外曰唯肖進秩一等躋官資聖表神蹤閟天上盛美空傳萬一知考牧一圖最卓絶羊牛爾牧俱來思羊羣三百牛九十角耳􅋾溼訛寢宜聚無鬬觸形甚澤馴擾畢來肱以麾地從善利畜得所或闕升降或飮池牧人負餱荷蓑笠可禦暑雨仍禦飢薪蒸用足尚餘力博取禽獸雄與雌紛紛事物已曲盡亡一不合無羊詩豐年富庶義亦備舉目如在宣王時前視未有後鮮儷獨步詎肻容並馳不見古人豈君恨但恨古人不見之琅玕碾軸蜀錦褾賢王寶祕輕瓌琦巨公名卿競題跋鋒起議論誇淵微我始鄰居久結好草廬對雪傳孱衰喬松瘦竹旁掩映梅花半拆臨澗湄素琴橫榻書滿架緑瓶注酒傾椰巵罏灰不識炭火燼坐擁絛褐峩接㒿筵前凌亂舞六出筆凍硯底方生斯女奴瞰窗不避冷青裙赤腳了髮垂我無泉石營此景君畫雖巧令人悲十年遠别如夢寐此圖出處嘗自隨去春京國重會合愈見極藝觀忘疲矜我孜孜嗜盆篤為作秋江四鷺鷥芙蓉照波蔭寒菊芰菼獵獵西風吹感君贈我瀟灑意意勸把釣江湖歸煙瀾素濶無寸尺今縱見勸歸已遲君嗟五十眼力減將亦謀隱長掩扉我擬更求冬月景知君老筆尚能揮聲畫集楊朏朏字持王閩人元祐六年進士終建寧軍節度書記入黨籍玉泉院荔支軒曾觀荔支圖幾費丹青妝能紅能紫亦能緑不能寫作天然香曾讀荔支譜品品堪第一較量滋味論高低大抵聞名不聞實我疑真宰推化工安排百果分番紅杏梅桃李不足數先教碌碌隨春風錦囊玉液相渾淪百果讓作東南元别有真香與色味一時分付荔支軒廣羣芳譜秦覯覯字少章觀弟元祐六年進士調臨安簿曰璐案宋史觀弟覿字少章覯字少儀天社任淵注陳後山詩云秦覯字少章從蘇公學任淵宋人當無誤今從之和王直方夜坐幃幔高深夜漏長頗從詩酒傲冰霜燭花漸暗人初睡金獸無煙卻有香王直方詩話少章初登第成親後和余夜坐詩云云讀者無不笑其貧富之頓異呈東坡先生十里薰風菡萏初我公所至有西湖欲將公事湖中了見説官間事亦無鶴林玉露東坡守杭守潁皆有西湖故潁川謝表云入參兩禁每玷北扉之榮出典二州輒為西湖之長秦少章詩云云鮑慎由慎由字欽止處州龍泉人元祐六年進士徽宗朝除工部員外郎厯知明海二州卒有夷白堂小集雨餘礎潤雨欲作好風每見先蕭蕭清入簾令我心灑然閉門倦永夏枕書日昏眠快此風雨餘端如濯飛泉盆山有佳趣草木更幽妍井華養文石香篆橫雲煙俯仰方丈間勝事亦可憐永懷觸熱子我勞良獨賢宋文鑑謝傳神蔡景直馳譽丹青有古風筆端及我未宜蒙雲臺麟閣遙相望枉寫裦公與鄂公能改齋漫録夜坐萬卷堆中種眼花睡魔亦厭夜深茶平生不草長門賦豈有黃金送酒家後村千家詩與鄭公華自朐山鄰舟行舟行有後先相去能幾許鏗轟金鼓聲見面不得語水花來幽香岸栁過疏雨登艫各乘風解帆會聯浦間攜小龍團睡起就君煮楊慎清暑録周行已行己字恭叔永嘉人師事程伊川登元祐六年進士官至祕書省正字有浮沚先生集絶境亭雲橫絶塵境峻􅰕若繩削羣山列培塿衆星分脈絡下瞰萬瓦居縹眇見樓閣松風發天籟泠然衆音作皛皛天宇清塵襟一澄廓東甌詩集周之深之深長興人元祐六年進士遊淸果寺西郊出郭未十里寺在白雲深處藏僧為愛間長閉戶客來無路自回廊近松古瓦落夜子傍水小池生暮光指點依稀飯籮水不知何處問興亡吳氏詩永鄭居中居中字達夫開封人舉進士徽宗朝厯少保太宰兼門下侍郎兼知樞密院事封燕國公進太保薨贈太師華原郡王諡文正挽顧學正公甫可惜病相如誰尋封禪書雙親千里外一葉九秋餘風露翻歸旐塵埃鎖故廬虎丘山下路會葬有鄉車廣文官舍泠如冰幾歎朝衫脫未能忽買春田埋玉地猶懸絳帳讀書燈佳名空綴仙都石妙偈爭傳海寺僧一幅粉旌春水漫惜君誰不涕奔騰中吳紀聞崔鶠鶠字德符雍丘人徙陽翟元祐中第進士元符末上書入邪等坐廢三十年靖康初擢右正言以疾乞解官除直龍圖閣提舉嵩山崇福宫卒自號婆娑先生有婆娑集雪浪齋日記德符詩所謂食鯨老氣橫九州廬山詩云遙知金剎近林表揚幡尾滕王閣詩云小艇元從天上來白雲自向杯中落潁昌富文物崔鶠陳恬猶為下士郡齋讀書志鶠長於詩淸婉敷腴有唐人風鄱陽詩記得詩狂欲發時鄱陽湖裏月明知無人為覓桓伊笛自卷秋蘆片葉吹過庭録會節園梅花下作去年白玉花結子深林間小憩藉清影低顰啄微酸故人不復見春事今已闌繞樹尋履迹空餘土花斑墨莊漫録德符監西京洛南稻田務時中官容佐掌宫鑰于洛郡僚事之唯恐不及獨德符不肯見之容極銜之德符一日送客于會節園時梅花己殘與客飲梅花下巳而容奏陳以會節園為景華御苑德符初不知也明年暮春復騎羸馬從老兵徑入園中梅下哦詩徘徊而去次日容見地有馬迹問園吏以崔對容遂劾奏鶠徑入御苑以此罪廢秋日即事秋草門前已沒鞾更無人過野人家離離踈竹時聞雨淡淡輕煙不隔花黃州道中莫愁微雨落輕雲十里長亭未墊巾流水小橋山下路馬頭無處不逢春以上墨莊漫録早秋雨霽圖我離蜀山來赤日走東州竒峯作眼想一過神已留翩翩宋公子新詩藹風流丹青見新韻瀟灑出林丘依微萬里遙曠朗一雨收高雲杳褰開縞日明華秋風裙映山靑眇眇行李幽得非送將歸色有離别憂念我山海僻針砭不為瘳目看孤鴻飛心已麋鹿遊吾兒能扶犂此幘便可投勿言尺寸許是中有菟裘與叔易過石佛看宋大夫畫山水霜落石林江氣清隔江猶見暮山橫箇中只欠崔夫子滿帽秋風信馬行觀黃筌畫花蒼顔白髮我雖陳見了青紅幾度新更向黃生毫末裏全家看盡劒南春淺淺紅顔與白腮臥枝斜葉抱新開何人與作春風面誑得蜂兒日日來和老人觀牧圖作官畏人嘲胡孫騎牧牛卻離大江水還家整歸舟還家此計不可移此樂勿令兒輩知行歌帶索拾遺穗耳靜不復聞征鼙功名亦妄爾吾生去此將何之趁此青草長自牧牛與羊不減九十頭何翅三百強沙平水淺南山下千角萬蹄如此畫牛腰吹笛遡秋風不問人間矍鑠翁以上聲畫集子石硯石家有兒玉含晶噓為雲氣吸為晴純精與之相感并孕育萬狀流千名黃昏鬼泣不忍聽且為白鵝換黃庭硯箋海棠渾是華清出浴初碧綃斜掩見紅膚便教桃李能言語要比嬌妍比得無海棠譜潛心齋以下三首寄漫叟雙扉掩餘香一榻下涼幔前人嗟不死萬古映黃卷時時擷英華一一詣微遠鼎食姑置之此味良不淺止遽軒我如萬斛船歲久腰已懶誰能逐相師終日問手版去謀一寸安輒被三尺挽憐公謝蠻觸鼓臥旗亦偃丈室此家英妙姿玉雪照冠冕新詩一何似鸞鵠見蕭散躡屐往從之寧復念重趼以上苕溪漁隱叢話早春偶題曰璐按此詩又見林之竒拙齋集寒風淅瀝鳴枯葦小鴨睡殘猶未起更教細雨結春寒坐聽蕭蕭打窗紙石盆養蒲已抽翠雕斛栽花先弄紫擁爐閉閣賦幽香未怕春冰生硯水題績溪雪峯樓題詩最高處不為待人看記著今朝勝山明松雪寒以上宋文鑑婆娑園在郟縣西鶠居此晚禽噪竹百千翅殘菊橫枝三兩花好在山園養衰疾風波不到野人家河南通志黃葆光葆光字元暉黟縣人賜進士出身崇寧初以薦為太學博士擢侍御史守處州贈孫至豐勸農因到好溪頭把酒相看憶舊遊三十年來如一夢可憐空負釣魚舟蓉塘詩話麗水孫薪至豐元祐中以明經擢第授荆門軍教授不赴質性清介絶意仕進與黃葆光為太學舊遊宣和六年黃出守處州薪不屑詣郡謁見黃約以勸農日會于洞溪僧舍至期薪以扁舟來會黃贈詩云云朝詠之詠之字之道説之從弟以蔭入官復登進士第又中宏詞科第一除河中教授元符上書罷為京兆録事以朝請郎提舉崇福宮卒有崇福集曲洧舊聞崇寧初凡元祐子弟仕宦者並不得至都城朝之道自洛中罷官回留中牟驛纍日以詩寄京師姻舊其結句云一時雞犬皆霄漢獨有劉安不得仙語傳于時議者美之壽星寺石磴插青漢禪宫入渺冥歸雲侵客坐流水亂松聲天近月逾白竹多山更青從來丘壑志不獨付孫登咸淳臨安志杭州思歸丘壑情無盡田園興有餘何當厭澤國不奈憶吾廬庭戶草應長江山木已踈何時整歸棹八月洞庭湖杭州府志句旌旗太乙三山外車馬長楊五柞中栁外雕鞍公子醉水邊紈扇麗人行紫微詩話岑象求象求字巖起梓州人終寶文閣待制入黨籍遊定林院野濶蓮宫迥樓臺半倚山地連巴峽近門對濮溪灣柏徑松煙溼巖房雨蘚斑白雲邀客住明月伴僧間經梵喧譁外香燈杳靄間勝遊或邂逅危構喜躋攀世路長何極塵心久欲還輶車正催發緩步出重關全蜀藝文志程頤頤字正叔皓弟元祐初以薦授崇政殿説書紹聖中削籍竄涪州徙峽州卒入黨籍學者稱伊川先生嘉定中追諡曰正封伊陽伯從祀宣聖廟庭有伊川集陸渾樂遊東郊漸微緑驅馬欣獨往舟縈野渡時水樂春山響身間愛物外趣逸諧心賞歸路逐樵歌落日寒山上河南府志司馬槱槱字才仲溫公姪孫元祐中舉賢良科調錢唐尉有夏陽集郡齋讀書志才仲喜為宫體詩故世傳其為鬼物所祟閨怨銷盡輕寒不自禁新愁唯向靜中深尋常曾入三更夢咫尺空論萬里心人去鳳幃雲漠漠雁回珠箔日沈沈春風洞口花常在只許劉郎一度尋前賢小集拾遺遊富陽蛻龍洞憩池上梅蕚春前破松髯雨後滋石崖鳴野鶴竹塢竄香狸山腳重重轉溪流活活遲殷勤窺洞府又到濯龍池遊千頃山在昌化縣上有龍潭廣數百畝禱雨輒應欲為龍池遊束裝戒蓐食雞鳴天未曙呼童蠟雙屐縈回溯寒溪確犖凌亂石迢迢萬丈嶺宛轉蒼龍脊山高吐朝氣恍不辨咫尺俯聽雷雨聲仰逐猿猱迹委蛇度花塢緑淨草可席喜如出籠檻身輕飛鳥捷不辭雙足困遠探蛟龍窟傳聞此山頂舊有滄海色邇來三十年潭湫變枯荻至今應江潮尚有鷗鷺集至理竟未解對之空太息不如西湖遊揮篙泛瑤碧以上咸淳臨安志遊九鎖撩花踏水細尋香間逐孤雲入翠岡九鎖已深看更好七人相對話應長百年空向塵埃老五月聊乘洞府涼可笑潛川狂道士未逢玉室與金堂洞霄詩集洛春謠洛陽春水揚春風銅駝陌上桃花紅高樓疊栁緑相向綃帳金鸞香霧濃錦裘公子五陵客拳毛赤兔雙蹄白金鉤寶玦逐飛香醉入花叢惱花魄青蛾皓齒别吳倡梅粉妝成半額黃羅屏繡幕圍寒玉帳裏吹笙學鳳皇細緑圍紅曉煙溼車馬騑騑雲櫛櫛瓊蘂杯深琥珀濃鴛鴦枕冷珊瑚澀吹龍笛歌白紵蘭席淋漓日將暮君不見灞陵岸上楊栁枝靑靑送别傷南浦古今詩統遊佛日山淨慧寺石冷苔生暈風高竹度涼道人何處去春色半滄浪鐵網珊瑚句身既事十主女亦妃九龍懶真子集同州登城縣有九龍廟只一妃耳土人云馮瀛王之女也司馬才仲戲題詩云云過客讀之無不一笑司馬棫棫字才叔槱弟登進士第嘗應賢良以黨錮不召有逸堂集郡齋讀書志才叔詩雖纎豔比其兄稍莊雅妾薄命自注近有里中舉子棄其妻者戲為賦之二月東風初不惡後園桃李先春落高堂去婦對花愁君恩非輕妾命薄憶昔三星光在天煌煌車馬朱門前結䄜幸得事君子願託絲蘿千百年履痕才遍君家地相看已覺君心異門外新歡一破顏室中舊愛雙垂淚妾心比玉自堅貞君眼如星到處明女子暌離泰山重丈夫棄置鴻毛輕莫誇緑鬢紅顔好女色由來不長保君不見灞上鑾輿祓禊回阿嬌已向長門老春晚獨遊鳳林園紅英亂點緑苔錢林影扶踈翠可憐飛蝶惹殘花上露戲魚搖碎水中天金羈不見尋芳馬蘭棹空停載酒船送盡春歸人亦去鶯啼花發又明年江干小雪楓落吳江小雪天三三兩兩捕魚船蹇驢瘦馬何方客眼看風波不著鞭以上前賢小集拾遺趙鼎臣鼎臣字承之衛城人自號葦溪翁元祐進士宣和中以右文殿修撰知鄧州召為太府卿有竹隱畸士集二蘇賢良硯不見東坡老弟昆年年曲阜履猶存計功何必悲周鼎會使詞林百怪奔硯箋句詞源江海浩奔忙句法風騷森出入古來此景歎經歲今夜誰家不倚樓中秋待月以上雪浪齋日記馬玿玿合肥人生元祐間華嚴寺此君亭歌次韻信安毛漸八座鎮俗光文翁政間鳴珂晚丁東邀賔尋勝遇郊郭最愛檀欒森梵宫虛簷新敞小亭峻幽徑靜掩間門重修枝應待丹鳳集徑節只許青松同根蟠南借秦淮潤影疏北露鍾山峯乃知景淡有真趣何必花豔羅雕櫳放懷喜遂開口笑傳杯不覺酡顏紅談圍浩浩真意得棊戰紛紛喜與濃人生倏忽猶逆旅少壯易失今衰容得喪何須論塞馬用捨寧復驚㸑桐逍遙齊物慕蒙叟淡泊無生師大雄英遊幸陪諸公後傾蓋夙已披懷胸芝蘭亦既序蒙益切磋願使協于中佳章每出連戰勝格調綽有先賢風顧豫酬和不量力嗟哉寸莛撞巨鐘景定建康志梁君貺春帖東方和氣斗回杓龍角聲中轉紫霄聖主問安天未曉求衣親護玉宸朝宋藝圃集吳則禮則禮字子副富川人中復子以父澤入仕晚居豫章自號北湖居士有北湖集簡田升之時升之赴金陵建業流風端可憐石城江色曉鮮鮮鳥窺漢節梅花底雨溼柁樓春水邊霜髮讐書有東觀錦囊覓句屬南天枯腸不飽大官肉我種芋魁今十年宋文鑑絶句華館相望接使星長淮南北已休兵便須買酒催行樂更覓何時是太平滿船買了洞庭柑雪色新裁白苧衫喚得吳姬同一醉春風相送過江南楊誠齋詩話尤延之嘗誦吳則禮此二詩仰欣欣字大貺吳興人徙永嘉以孝行稱元祐中郡守郟亶奏聞大觀二年敕贈將仕郎有永嘉百題詩集南湖酒旗翻野色漁棹弄秋光百里荷花境曾圖入帝鄉溫州府志林放放字達本仙居人元祐中將上禮部以親死廬墓不果遂築草堂於東山隱焉左譽銘其墓東山高臥三間老屋青山幽清風灑灑寒颼颼脫巾坦腹臥其下此身直與淵明儔老松飛翠落夏簟六月不暑涼於秋人生百年一夢幻世間萬事空悠悠一聲野鶴忽驚醒山爐活火茶煙浮贈琴僧霜林凋落雲影垂朔風獵獵鼓寒威偶來禪房訪虛寂上人為我彈金徽此調悠悠泯千載今日忽聞一嗟咨上人所彈不在指我亦非于耳聽之霜天玉磬敲清曉夜月秋聲動翠微舉世紛紛愛箏築寂寥古意誰能知過門不知鍾期子愼勿汗漫調朱絲以上台州府志范純粹純粹字德孺仲淹第四子以蔭仕元祐中厯寶文閣待制知熙州紹聖中入黨籍徽宗朝鄂州安置句慣處賤貧知世態飽諳遷謫見家風風月堂詩話范德孺崇寧之貶與山谷倡和甚多有一聯云云可以識范氏之名節矣林旦旦字次中希之弟第進士元祐中厯太僕卿河東轉運使曲水亭治平中宰定海作巖澑抱山急傳觴何太頻回看野客醉還笑濁醪醇漢曲人方遠蘭亭迹易陳勞生無足校酣放即天真射圃百步開新圃彎弧注采正尊罍供樂事金鼓疊歡聲敏手徒為妙中心自要平何人能舉觶觀堵定縱橫以上乾道四明圖經蘇元老元老字在廷眉山人東坡從孫舉進士官太常少卿坐元祐黨纍罷提點明道宫卒有九峯集懷安官舍病起九日作籬菊今年折最繁繞叢新朵上雕盤病知嘉節霜風冷喜對高堂骨肉歡久廢笑歌慵飲酒只聞兒女勸加餐如何猛下藜牀去又逐鵷鴻振羽翰古今歲時雜詠冤亭卞留題靈巖古詩十韻石刻在泰山屈指數四絶四絶中最優此景冠天下不獨竒東州夜月透巖白亂雲和雨收甘泉瀉山腹聖日穿崖頭大暑不知夏爽氣常如秋風高松子落天外鐘聲浮祖師生朗右古殿名般舟人巧不可至天意何所留老生笑相語此事常窮求移出蓬萊島待吾仙子遊元祐庚午三月二十八日東武王璞書求古録蔡安持安持字資中睢陽人題靈巖寺四絶之中處最先山圍宫殿鎖雲煙當年鶴馭歸何處世上猶傳錫杖泉元祐壬申十月求古録李周周元祐初直龍圖閣充陜西轉運使華清懷古雕戈鐵騎正縱橫環上羅衣血染腥蜀道歸來應悔禍香囊特地泣娉婷吾家居處本關西舊記遺蹤事不迷屢過華清無一字恐人笑我不留題元祐四年春二月驪山刻石宋詩紀事卷三十二
