body:
  text: 宋詩紀事卷四十二錢塘厲鶚撰陳序序字彥育句容人從蘇庠學詩受知于浙漕向伯恭邀與同行妻以愛姬姬寇萊公元孫也伯恭聞于朝授和州文學終删定官有碧巖集遊鍾山題八功德水菴壁寒騎瘦馬度山腰目斷清溪第一橋盡是帝王陵墓處野風荒草暝蕭蕭十年塵土暗衣巾亂走江鄉一病身西第將軍成底事北朝開府是何人清波雜志方千里千里官舒州簽判題真源宫萬歲丹霞府千函蘂笈書時時瞻絳節往往下雲車近與剛風接高連上帝居登前望南嶽清蹕滿空虛宋藝圃集錢惟嶽曹娥碑曹娥廟貌樹豐碑千古行人誦色絲苦恨當年題八字不旌賢孝只旌辭方輿勝覽胡致隆致隆字藏之臨江人自號蕭灘居士父彥明與山谷進士同年故藏之以詩取知于山谷無子遺稿不傳題吳生畫桃源圖王宰十日畫一石左思十年賦三都誰似今時吳道子咄嗟能辦武陵圖武陵不與人閒隔可憐舊日無尋覓蒼蒼烟水只依然試倩漁舟問消息聲畫集題瘞鶴銘當年誰為裹𤣥黃潮打孤城草木荒華表竟無新信息斷碑空有碎文章雲埋紫蓋峯何在烟鎖青田路正長遙想華亭披道氅夜隨明月過錢唐蘆浦筆記星子樓葛巾藤杖竹籧篨靜夜江樓縱目初海獸擎山出彭蠡玉龍銜水下匡廬三更雲盡猿啼露十里月寒人捕魚已問湖山借圭角他年來此老樵漁方輿勝覽山谷坐上分題賦藕平生冰雪姿七星羅心胸豈無有絲毫上裨天子聰而不自見達胡為乎泥中沈疴正無賴安得君從容其子亦可憐風味如乃翁合璧事類别集喜曹劉二從事見過蕭蕭細雨鎖柴門喜見風流二使君俊逸萬春猶録事清新子建尚參軍飄零世路詩千首寥落江湖酒一尊多病揚雄謝來往暮年誰更可論文詩林萬選羅從彥從彥字仲素南劒州羅源人從龜山遊以纍舉恩授惠州博羅縣主簿紹興初卒學者稱豫章先生淳祐閒諡文質有集題一鉢菴可憐萱草信無憂誰謂幽蘭解結愁欲得寸田荆棘斷秖應長伴赤松遊豫章集熊蕃蕃字叔茂建陽人宗王安石之學長于吟詠嘗作茶録登金山注海銀成壑浮空玉作堆鼇翻三島出鷲駕一峯來塔影波搖動鐘聲潮拍回猶嗟禪伯老虛入妙高臺金山志略何麒麒張丞相商英外孫外大父丞相初登科為雒縣主簿經攝垍窯鎮稅官留詩護國寺中令狐監征録以見寄謹再拜追和而記其後傳翁遺墨賸咨嗟四海當年尚一家大老不為今日用小詩徒遣後人誇興來思跨巴滇馬歸去方乘下澤車燕麥兔葵僧舍裏何如夢得訪桃花成都文類虎丘平地涌巖壑棱層驚大雄何曾逺人世真欲傍天宫白虎威靈在赤烏緣影空生公能說法音與塔鈴同吳都志龍多山世路聱牙赤水過故升天險問龍多書中舊識唐公昉圖裏又聞馮蓋羅方與勝覽在合州赤水縣北按唐孫職方樵龍多山録有至道觀東有大池即唐武后時放生池中峯有唐鷲臺院東有佛慧院有萬竹竹徑圍尺有東巖廣五十丈多唐人刻字又有靈山院泉自巖出瀦為方池大旱不竭其山髙明窈深變態萬狀有駕鶴軒下視涪水如帶烟雲出沒山之偉觀也圖經云廣漢人馮蓋羅煉丹于此晉永嘉三年舉家十七人仙去何麒詩云云董瞿老黃彥與從無逸求妻埋銘以硯謝之無逸邀子作歌君不見昌黎翁南遷益覺文章工滑稽戲作毛穎傳陶泓之族稱𢎞農又不見東坡翁生涯寄食破硯中詆訶龍尾尊鳳咮更誇丹石蒸赤紅古來文士耽翰墨十有八九坐此窮怪君落筆妙言語四壁才堪蔽風雨幾年結桞送奴星文窮跳梁推不去硯能窮人君不鄙爾來諛墓得龍尾緹巾什襲不妄觀碑字三縑何足擬玉堂視草乃稱之只恐𤣥文似揚子君誇此硯文似羅奈君鹿裘帶索何我雖忍窮亦好事尚能搜句為君歌嗚呼魯公乞米家食粥不費銀鉤寫珠玉前賢小集拾遺杜柬之雲安玉虛觀南軒感事偶書古觀久荒涼寂然外人境草木既榛蕪風雨亦頽隕我來一糞除地淨窗為坰晨光散桐隂夕照落柏影置以六尺牀度此三伏永終朝饜清涼半夜或凄冷客至共浮瓜睡餘獨煮茗遙聞斗筲兒爭奪沸蛙黽街頭米十干旱井費縻綆對我脫粟盤徐餐休祝鯁稚梧值歲首擢起青琅玕其葉大如掌其隂勻若攤弱幹尋丈展氣已雲霄干期之四五載定足容棲鸞我老無定居僦屋蝸螺跧平生輞川宅面勢胸中盤何當遂誅茅規庭十步寬非無松柏堅未易蒼龍摶種此南窗下醉眠風雨寒至自雲安題淨戒院山口出雲鳩喚雨三月巴山蒸溽暑濁流來作虎眼文一葉孤舟命如縷道傍緑樹清隂涼中有金仙古道場去家才餘二百里且復看此青篔簹出門滿目傷羈旅歸舍還煎碎兒女欲問闍黎借榻眠臥對龕燈淡無語麥芒焦桑椹紫田家夫婦忙欲死蠶入蔟麥登場夫婦飽暖孰可當道傍書生空有婦不蠶而衣真汝負功名富貴老不來書劒風塵一生誤何時即買百株桑身耕婦織策最良董生莫厭徴租吏蘇子無由黑貂敝雲安下巖濤江翻雪卷湖灘晚泊巖扉暫解顔夙有淨緣逢寺喜老無生理伴僧閒殘雲已斷獨飛雨落日將沈卻照山半夜秋聲驚客夢一簾珠貝冷珊珊以上全蜀藝文志李祁祁字蕭遠尚書郎謫監漢陽酒稅郎官湖春日兩山收雨暗平沙遮斷溪梅隔水花留得烟林作圖畫依稀松磴有人家空山玉蘂照瓊瑰到處尋花共往回欲識春風最竒處試來同看雨中梅朦朧花影月黃昏著意春風入酒痕知是江梅喜佳客例垂花蘂照清樽十日春隂到水亭水邊楊桞一時青梅花過盡桃花惡乞取山礬入淨瓶能改齊漫録張師中楓橋寺吳門多精藍此寺名尤古距城七里餘冠蓋日亭午古徑通采香遠岫對棲虎巖扉橫野橋塔影落前浦霜樓鳴曉鐘夕舸軋雙櫓方丈中有人學佛洞禪語跡忙心已閒道樂行彌苦不為喧所遷意以靜為主河必深山林峯巒繞軒戶吳郡志徐欣西清詩話徐欣作詩有唐人風氣嘗和雪詩云著衣輕有暈入水淡無痕劒池劒去池空一水寒遊人到此憑闌干年來是事消磨盡只有青山好靜看西清詩話周李李字德紹海陵人燀之季父悅川碾茶獨抱遺經舌本乾笑呼赤腳碾龍團但知兩腋清風起未識捧甌春筍寒清波雜志朝載之載之字伯宇仕封丘丞有封丘集朝公武郡齊讀書志世父封丘府君黃魯直薦于蘇子瞻云朝伯宇謹厚守文從遊多長者願一語敖戒之子瞻答云朝伯宇詩騷細看甚竒麗信乎其家多異材也感時事作森森月裏栽丹桂歷歷天邊種白榆雖未乘槎上霄漢會須沈網取珊瑚曲洧舊聞政和以後花石綱浸盛朝伯宇有詩人多傳誦昭靈夫人祠殺翁分我一杯羮龍種由來事杳冥安用生兒作劉季暮年無骨葬昭靈能改齊漫録劉旦旦敞之孫樞密奉世之子句膺門昔忝登龍客董墓今悲下馬人能改齊漫録劉仲馮樞密之子旦能詩傅康泊嘗薦之旦後過公墓賦詩人多稱傳祖德恭德恭字肅之無擇弟提刑無頗之子宣政閒待普州太守闕寓居安陸致政張安卿承事挽詩重歎張夫子神襟遽弗寧摧山傾嶽算萎哲奄椿齡舊室惟圖像新阡但刻銘何堪聽歌挽埋玉在幽坰祖龍學集附翟望望汴京人大父光圖為安定靖王教授望年二十喜讀騷經寓詞蘅杜閒每水邊沙外屬思幽放人莫測其意寄言洞簫吹兮春烟緑風光粲兮人如玉搴木蘭兮溯流波懷彼美兮憂心若何曹勛松隱文集李怤怤字去言公擇尚書猶子春晚花瘦烟羸可奈何不關渠事鳥聲和無人掃地驚原闕分付輕紅上碧莎墨莊漫録句去國春城桃李花楓林葉病尚天涯今年九日風前帽北客扁舟雨後沙蒼黃避地小兒女漂泊連牀老弟兄紫微詩話朝貫之貫之字季一曰琯按朱辨風月堂詩話稱為朝季一檢討又云朝察院季一蓋其歷官也聞朝季一生無他嗜獨見墨丸喜動眉春渚紀宇其所製銘曰朝季一寄寂堂造者不減潘陳句草堂不見杜陵老折得青松度水歸訪杜師與不遇紫微詩話朝謙之謙之字恭道居信州紹興閒以敷文閣直學士知建康南巖南巖夫何為山作天倚蓋山南溪山復飛頂壓其外當空橫廣額架屋喉舌內嘗聆釋氏說仰覆各世界千閒未可著五畝良不隘清冷氣射人熱惱從此潰崖奔木疏瘦谷遠鳥幽怪朅豫與二子高興偶相戒松舟下清江毛髮數蝦蟹籃輿上峻嶺幢節望杉檜李侯勳門胄文彩山作繪趙君儒林孫嫮美蘭結佩不為城府遊繼此日于邁寧知老逾拙意在精力退得居溪南山食飲與山對夔魈入奧突雲雨出紳襘顧此誠未逢欣然與心㑹彭湖兩崖蹙泉作一線霈禪月古臺空靈境自明晦平生所驅使詩酒俱好在天涯得吾侣物外從所快便欲登赤城一觀天宇大廣信府志章縡縡字伯成楶之子終戶部郎中權知揚州句船尾淮山青未了馬頭隋桞緑相迎送龔校書紀聞中吳范季隨季隨學詩于韓子蒼有陵陽室中語南源寺懶逐兒曹載酒行朅來蕭寺作清明江湖萬里此身健風雨一春今日晴露地野花雙戲蝶並湖烟樹獨啼鶯挂冠神武何時見只合深藏諱姓名撫州府志吕知止知止本中從叔絶句彭澤有琴嘗無絃大令舊物惟青氊我亦四壁對默坐中有一牀供晝眠初涼西風吹木葉庭戶作涼時夜有愁人歎寒先病骨知以上紫微詩話許彥國彥國字表民青社人有詩集周邦彥云寬平優游中極物情惜乎流落不偶故世人知之者或寡也紫騮馬黃金絡頭玉為觼蜀錦障泥亂雲葉花閒顧影驕不行萬里龍駒空汗血露牀秋粟飽不食青芻苜蓿無顔色君不見東郊瘦馬百戰場天寒日暮烏啄瘡秋雨歎曰璐按此詩宋藝圃集作許顗霖雨不出動隔旬門外秋草長于人江湖浩渺欲無岸錦石最小猶生雲微陽片月何曽見只有莓苔昏筆硯田家禾穗未暇悲茅屋且為螢火飛以上宋文鑑虞美人草行鴻門玉斗紛如雪十萬降兵夜流血咸陽宫殿三月紅霸業已隨煙燼滅剛強必死仁義王隂陵失道非天亡英雄本學萬人敵何須屑屑悲紅妝三軍敗盡旌旗倒玉帳佳人坐中老香魂夜逐劒光飛清血化為原上草芳心寂寞寄寒枝舊曲聞來似斂眉哀怨徘徊愁不語恰如初聽楚歌時滔滔逝水流今古楚漢興亡兩丘土當年遺事總成空慷慨尊前為誰舞苕溪漁隱叢話冷齊以此詩為曾子宣夫人魏氏作余昔隨侍先君守合肥嘗借得許表民家集集中有此詩又合肥老儒郭全美乃表民席下舊諸生云親見渠作此詩今曾端伯編詩選亦列于表民詩中覽者可以無疑亦知冷齊之妄也采蓮吟湖邊日落鴛鴦飛羅衣香轉蘭舟移蓮根斷處手滿絲手滿絲不能理秋雲深隔君子臨高臺高臺跨崇岡簷宇鎖空霧新晴洗雙目千里在跬步霏霏漁浦烟冉冉富春樹風花不我私何以理愁緒誰疏白玉窗中有浮雲度浮雲吹不開不見行人去以上前賢小集拾遺漁父榮辱從來總不知幾閒茅屋對漁磯江鷗散處夜無伴荷葉老時秋有衣後村千家詩晚宿江漲橋鳥徑青山外人家苦竹邊江城懸夜鎖魚市散空船岸靜涵秋月林昏宿水烟又尋僧榻臥夜冷欲無眠咸淳臨安志葉大年挽王學正偉書劒當年遊上都賢關蟲篆校諸儒文華燦燦九苞鳳俊氣駸駸千里駒妙質競誰揮堊墁白頭空此死樵蘇遺編殘槀應猶在搔首令人益歎吁遺文膾炙在吾鄉賦罷誰能少薦揚聲迹有妻先夢蝶行藏無子付洴方雲蘿烟蔓新泉宅秋月春花舊野堂交倡彩箋真翰墨幾人知為寶巾箱中吳紀聞王偉字康國居太學有聲鄉人謂之王學正識與不識皆尊敬之有堂名逸野以纍試不利日遊適其中讀書自娛其持身治家鄉中率以為法生平無子王氏舉族祀之不絶葉大年挽之云云李逺逺字器之僕久客錢唐有吹笛月下者同旅聞之凄然有歸思屬令賦之柯亭之椽不復得蘄州黃竹今尚存蒼崖翠壁産修幹千頃蕭索烟雲昏羌人眼力發天巧長笛裁成鳳膺飽老龍餘響出空星欲噴炎天作秋曉西湖夜寂涼風生山頭一鉤新月明商聲悽悲羽聲壯行子忽忽難為情時無緑珠清音激皓齒野王臨風三弄亦已矣惟有愁端無古今舉刀不斷東流水深閨蘭燈照空牀笛聲不如離恨長曲終人散一惆悵回首江山非故鄉萬事浮雲過寥廓且醉杯中琥珀薄君不見玉管橫吹黃鶴樓江城五月梅花落前賢小集拾遺陳君嚮絶句無情今古垂楊岸客舍不禁風絮亂他年若解拂人頭只恐青青顔色換陶朱新録君嚮少年在京悅一小鬟作李若水若水本名若冰欽宗賜名若水字清卿曲周人靖康初以上舍登第由太學博士歷吏部侍郎京師陷從欽宗幸金營不屈死之建炎初贈觀文殿學士諡忠愍有集靖康小雅靖康之難死節之士公為第一弔之詩曰烈烈李公實備全德義動幽冥氣貫金石扈蹕敵營爰定忠烈杞人之憂廢立大厄公挺不顧二酋面叱勇甚雷霆天地動色命輕鴻毛名高斗極燎原之火不變藍璧滔天之溺砥柱獨立死得其所震耀方册奉使太原途中呈王坦翁副使舊持漢節愧前人消息傳來苦不真五鼓促回千里夢一官妨盡百年身關山吐月程程逺詩界含秋句句新孤館可能忘客恨脫巾聊進一杯春三朝北盟㑹編衣襟中詩戎馬南來久不歸山河殘破一身微功名誤我等雲過歲月驚人和雪飛每事恐貽千古笑此心甘與衆人違艱難唯有君親重血淚斑斑染客衣能改齊漫録化成巖翠石黏雲溼寒巖帶蘚深樹函懷古意水印讀書心經濟神猶在幽棲徑可尋青氊吾舊物稅駕臥山隂江西通志句東風無迹秀芳草野鳥不言銜落花一庭鳥跡天書怪八尺簟紋人字寒蛬聲千里暮雁影一天秋合璧事類後集毛寶寶字文友靖康元年以朝請大夫延康殿學士知杭州冷泉亭詩并序昔人以為冷泉未極其妙因加小亭然泠然水光滃然山翠以故去者過半豫以謂不必加工但去其尤贅者斯善也如明鏡而加繢畫非不美好所以為清明者逝矣拂拭菑翳舊觀復還面山取勢俯山中亭外安亭自蔽蒙眼界已通無礙物胸中陡覺有真空試尋櫓響驚時變洞中事卻聽猿啼與舊同白猿事萬事須臾成壞裏我來閲世一初終咸淳臨安志富直柔直柔字季申弼之孫以父任補官靖康初賜進士出身高宗朝纍除同知樞密院事提舉洞霄宫題萬象亭并序燕堂後本登覽勝處窘于短垣叢薄中未見識拔觀文葉公政成之暇命鑿垣築臺建亭其上遂為一府面勢殊特之觀落成有日謹賦拙詩少見欣快之意堂後山川面面通向來竒觀窘蒿蓬元戎小試經綸手萬象都歸指顧中雨罷卷簾憑爽氣酒酣極目送飛鴻明年鳳閣鸞臺上好寄新詩下北風淳熙三山志鄧肅肅字志宏沙縣人欽宗朝召對補承務郎張邦昌僭位奔赴南京擢左正言罷歸家居紹興三年卒有栟櫚集花石詩蔽江載石巧玲瓏雨過嶙峋萬玉峰艫尾相銜貢天子坐移蓬島到深宫浮花浪蘂自朱白月窟鬼方更竒絶繽紛萬里來如雲上林玉砌酣春色皇帝之圃浩無涯日月所照同一家北連幽薊南交趾東極蟠木西流沙安得守令體宸衷不復區區踵前蹤但為君王安百姓圃中無日不春風栟櫚集宋史本傳肅少入太學時東南貢花石綱作詩十一章言守令搜求擾民用事者見之屏出學欽宗嗣位召對便殿補承務郎寄朱韋齊歸帽納毫真得䇿要箋留帶計還疏公如買菜苦求益我已忘腰何用渠閉戶羽衣聊自適推窗柿葉對人書帝都聲價君知否寄付新傳折檻朱陸文裕溪山餘話韋齊觴客栟櫚以冠帶寓之醉起韋齊曰留以質紙筆明日如約韋齊受筆還冠而以紙少留帶曰儻無千幅終不還故栟櫚為寄此詩前輩風流調笑藹藹如此曾如驥如驥泰和人為寶慶通判死金兵之難建炎改元贈敷文閣待制諡忠愍題考功印紙謹將節義二字結果印紙一宗了卻神遊何處澄江明月清風豫章詩話金兵薄寶慶通判泰和曾公如驥遣弟如駿歸曰吾既以身許國不得顧先人宗祀矣汝其圖之涕泣與別復取考功印紙題其上云云澄江指秦和故鄉也事亟矣書舍生取義一章于壁以明已志城將陷左右請迎降公叱之登子城投資江死郡人義而斂厝之明年建炎改元太學生上書叙其功何迂叟迂叟字次仲黃州人遊赤壁和答韓子蒼兒時宗伯寄吾州諷誦高文至白頭二賦人間真吐鳳五年溪上不驚鷗蟹嘗見水人猶怒鶻有危巢孰敢留珍重使君尋故跡西風悵望卞城樓能改齊漫録東坡謫居于黃五年赤壁巨鶻棲于喬木之上後賦所謂攀栖鶻之危巢俯馮夷之幽宫是已韓子蒼靖康中守黃州三月而罷因遊赤壁而鶻已去作詩示何次仲迂叟次仲和答王以寧以寧字周士湘潭人由太學生仕鼎澧帥幕靖康初徴天下兵以寧走鼎州乞師解太原圍建炎中以宣撫司參謀制置襄鄧有詞一卷道中聞九里香即木犀花湖南呼九里香不見江梅三百日聲斷紫簫愁夢長何許緑裙紅帔客御風來獻返魂香墨莊漫録句人情千里白頭浪世事幾番黃葉風和人叢話苕溪漁隱熊彥詩彥詩字叔雅安仁人靖康中太學博士三朝北盟會編自帝䝉塵金人館于齊宫日遣蕭慶須索城中物校書郎劉才邵傅宿國子監主簿葉將博士熊彥詩上官悟等五人押經書印板并館中圖籍往營中交割屏山夜雪和劉彥沖潭溪四景之一夜深寒妥帖前村人斷絶何許小茅茨開門滿山雪翰墨大全司馬朴朴字文季溫公之姪孫以外祖范純仁恩補官欽宗時為兵部侍郎以奉使見留金人挾以北去居于祁陽授以官不可竟握節而死高宗贈兵部尚書諡忠潔無餘居士齊壁有沈傅師遊道林嶽麓詩石刻穆仲等和之因亦次韻湘西勝景豈易論羣山騰闖萬里奔鶴泉一麓騫鵬噣松風十里藏祇園當時侍御偶題寫筆力孰敢爭榮尊東京少年妙詞藻南陽舊族齊隂樊天心月脅出竒語使我展讀忘朝昏差差戈劒隱一敵落落旗鼓嚴千屯無餘居士勵幽志細研六藝方專門凍骭嬌兒慣腸莧啼飢瘦婦餘淚痕唯君德義允相愜每窮道妙角與根他人勸酒逐驚魂二子頻酌勤空樽醉中詩成渺江海風外帆影徒飛翻卷藏篋笥何戢戢風生襟褎何軒軒嗟乎我亦有餘腐陋哉羊政囚華元中州集句積雪日出杲雪飛梅已殘朋遊要及時閣鄰有遐觀乘此蕪穢平快覽天宇寬霽色混銀界曠望連江干山如白毫相滉溢清揚端一氣轉浩渺萬里皆瀰漫優哉賦梁苑想像排廣寒中州集文季工書翰有晉人筆意興陵萬機之暇嘗購其遺墨學之有雪霽同韓公度登圓福寺閣和李效之詩今略載于此云云此下不可讀當俟善本考之季炳炳號寄菴弔危翁一南鄉老人危翁一歲晏雨晴扶杖出驚聞二帝塵再䝉歸闔柴門哭三日眼空愁絶聲遂止里人唁翁翁死矣凛然生氣申包胥萬古千秋葬忠義邵武府志危翁一光澤人家貧業樵聞二帝北狩哭三日骨立而死季寄菴以詩弔之余淳禮淳禮靖康丙午海康令題遺直軒二蘇翰墨仙同謫百蠻裏時有田舍翁結茅住行李邇來三十年聞名輒掩耳天定能勝人稍復蒙料理公卿尋斷編臺隸藏敝屣敗屋亦見修變故乃如此開軒畫遺像凛凛有生氣卻恨封德彝不見盛時死兄弟對牀眠此意孤一世騎鯨儻相逢笑人真好事廣東通志海康城南吳國鑑館蘇子由之所時子瞻亦謫儋耳同處月餘清康丙午令余淳禮買地開軒繪二公像于中且賦詩顔博文博文字持約德州人靖康初官著作佐郎金人立僞楚時充事務官草勸進表南渡初竄澧州移賀州死清河書畫舫顔持約晚有鄭䖍之貶作山水橫看頗有清致在五羊賣畫自活竟死瘴鄉末利花竹梢脫青錦榕葉隨黃雲嶺頭暑正煩見此蕚緑君欲言嬌不吐藏意久未分最憐月初上濃香夢中聞蕭然六曲屏西施帶微醺叢深珊瑚帳枝轉翡翠裙譬如追風騎一抹萬馬羣銅瓶汲清泚聊復為子勤願言少須臾對此髯參軍墨莊漫録末利嶺外人或云抹麗謂能掩衆花也顔持約謫官嶺表時作詩云云題李叔班山水橫卷青山為誰高影壓三百里竹深已迷橋荷密半藏水區區名利人坐瞑真可鄙慨想雲屋中恐是古君子通江石泉滑崩崖朝雪重牧兒心苦飢牛寒挽不動誰人倚長松胸有九雲夢西風吹屋動一笑無與共後村詩話王希深合和新香烟氣清灑不類尋常可以為道人開筆端消息玉水沈沈影銅爐裊裊烟為思丹鳳髓不愛老龍涎皂帽真閒客黃衣小病仙定知雲屋下繡被有人眠香乘宋齊愈齊愈字文淵靖康初官諫議大夫建炎初以推舉僞楚論死絶句向來松檜喜無恙坐久復聞南㵎鐘隱隱修廊人語絶四山滴瀝雪鳴風宫詞禁城春水碧溶溶洗出桃花萬片紅葉上細看無一字始知無女怨春風睢陽道中竹溪噎絶雨才通無數深紅閒淺紅山店落英春寂寂青旗吹盡柳花風以上能改齊漫録張澄澄字達明舒州人靖康初官監察御史建炎南渡至尚書右丞寓居臨川有淡巖集源潭露槳依灘急霜飇入鬢清秋痕到晴樹江勢擁孤城野鶴疑仙羽檣烏伴水程故園千嶂外白首不勝情撫州府志仰山蕭寺藏幽谷溪流燕尾分松蘿諸㵎合鐘鼓上方聞寶塔開晴日龍潭隔暮雲躋攀窮勝境猿鶴似為羣袁州府志賀允中允中字子忱靖康中為郎中紹興中拜參知政事李伯紀丞相挽詩已矣經邦業茫然造物心人生固有定天意頗難諶此日嗟亡鑑當年用作霖吾皇方願治十事想遺針梁溪集附李儔儔汴京留守靖康閒陷于金挽張忠文公叔夜命世文章伯鴻樞柱石臣殞身因衛社嗣德豈無人丹旐西原路輀車萬里春一門䝉待遇徒有淚霑巾雲麓漫抄張忠文公叔夜稽仲靖康間以南道總管知鄧州首提兵勤王以不推戴異姓取過軍前既議和傳到訃音云靖康丙午閏十一月內提兵次安上門除簽書樞密院在國子監街東陶潛園子內住十二月二十五日京城破以不推戴異姓取過軍前丁未年三月二十七日離京北去道中不食至白溝或曰過界河也仰天大呼遂不復語明日薨在易州孤山寨五月十六日也擡三程遂火化第六子仲熊字慈甫隨行祭祀丁巳年十一月十八日到東京相國寺慧林禪院後于天壽院前幕士馮直家下戊午年十月十七日葬于陽翟縣旌忠功德墳寺及録到挽詩四首上官仲恭句君不見喬木參天獨樂園至今猶是溫公宅朱子語類蔡京父子在京城之西南坊對賜甲第四區極天下土木之工一曰太師第乃京之自居也二曰樞密第乃攸之居也三曰駙馬第乃鞗之居也攸妻劉乃明達明節之族有寵而二劉不能容乃出嫁攸權寵之盛亞之京攸四第對開金碧相照嘗見上官仲恭詩一編其閒有城西曲言蔡氏侈奢敗亡之事最為豪健末句云云仲恭乃上官彥衡之子也惜其詩不行于世呂渭老渭老字聖求嘉興人宣靖閒朝士有感塵斷征車杳雲低毳帳深古今那有此天地亦何心檇李詩繫宋詩紀事卷四十二
