body:
  text: 宋詩紀事卷二十八錢塘厲鶚撰李昭玘昭玘字成季任城人濤五世孫自洛徙齊元豐二年進士以薦為祕書正字厯起居舍人崇寧入黨籍奪官閒居自號樂靜先生有樂靜集雲龕李氏序略云伯父詩奇麗愜適章斷句絶餘思羡溢得詩人味外之味春日遊金明池日有江湖思坐無車馬塵橫橋自照水啼鳥不驚人輦路晴飛絮宫門暗鎖春多情老園吏灑地喜相親宋文鑑觀劉孝嗣寫真程生高價傳兩都劉子骨相真丈夫呼兒當軒試一展噱噱指點相驚呼此應前日坐頭客何乃不語嚴襟裾胸中豪氣不可狀但見粉墨無紆餘虎頭食肉亦天賦尺面封侯宜不誣須知中令有真相忽效香山悲故吾凌煙功臣易磨滅貞觀學士猶傳模當時人物不易得曾看風神有此無觀江都王畫馬落落名王唐帝孫筆端飛灑只逡巡風雲絶足知何在粉墨餘姿若有神可信權奇盡龍種不應腲脮失天真驊驑寂寞龍眠死更復何人接後塵觀畫夢澤正天寒南峯帶秋色詩人句不盡餘意傳粉墨年來兩眼昏吏牘苦侵迫明窗展橫素刮膜謝砭石往時蓬萊宫圖畫燦東壁拾遺老隂峭思訓麗春碧經年一過眼行繞不暇食太行逢李生筆勢妙思索未成真營丘不俗巳高格安得十萬錢盡致鵝溪白不須念衣裘䃜灰日滋殖寫我江湖心浩蕩滿千尺以上聲畫集句靜疑多事非求福老覺無心勝攝生優古堂詩話劉弇弇字偉明江西安福人元豐二年進士復中詞科厯官知峩眉縣改太學博士元符中有事南郊進大禮賦除祕書省正字徽宗立改著作佐郎實録院檢討卒有龍雲集走筆答郭子隆句稽春歸幾何時緑樹隂已滿蕭條子雲巷誰借吹噓暖常日雙柴扉深扃類休浣稚燕掠翩翾疏蟬弄凄斷擷芳聊自娛任從食息懶嶷嶷棲鸞郎蝸居間三款兒童憚逢迎應客事謾誕謝絶高軒榮秖增鼯鼠短賴君不吾靳殷勤接誾侃酸然梅雨天煩襟斗湔浣送李侯朝散還任西山閲今昔章水弄清泚雲陴插天半滕閣中隱起青鴛千萬家湖光豁如洗鍾陵一都會信亦非偶爾君來無幾何所得巳倍蓰笑談送白日慷慨拾遐軌成詩殆百篇天籟落凡耳事竣告還朝相送情難已悲歌一再行杯觴覆蒼翠秋標拔孤雲鴻鴈思吾子人日去年人日螺江邊今年人日在通川故家浩蕩五千里客子騷屑心茫然霜蘆盡解故時葉生意陡爾歸蘭荃海風如刀冰塞渡欲航野水雪暗天他鄉信美非吾土香草恱魂真浪傳南冠故聲秖操楚劉章雅志惟歌田五秉如單費廩粟一囊就盡持餐錢顚毛冉冉不吾與齒根浮動輕于翾小雀誰言畏死鷂未肯屈折同杯棬章貢直西三徑在爾來望眼欲成穿科桑洗竹真吾事孰使齪齪才充員何時解得無拘束歸釣潭頭楓葉鯿秋日儀真即事丁字河頭紋錦翼似是東園故鸂鷘天風蕭蕭吹汝急遣汝周章無好色江蘺羃䍥過行人一顧為之三歎息我願舴艋從溪翁雙春鋤邊作幽客莆田雜詩清樾陂陀外春深四五家叢祠下簫鼓平楚暗桑麻水國潛虯偃夭程去鳥賖仙山乃在目瀟灑送生涯九曲池昔帝檣烏下日邊曾留清蹕此蹁躚魚龍窟暗浮春漲鳧雁行低破暝煙星閣摧頽空嵗月蕪城埋沒舊山川後庭一曲陳家破更看當年水調傳題吉水南華院紫翠浮浮奪晚昏生涯谷汲與松焚俗塵一點自應少終日到門惟白雲野興由來愜杖藜層巒影裏見翬飛虛堂一炷起凝碧化作九天雲染衣以上龍雲集獨醒雜志吉水南華院在山谷窮絶處有白雲堂劉偉明未第時曾寓書劒于此堂有詩劉跂跂字斯立摯之子王鞏之壻與弟蹈同登元豐三年進士遭黨禍為李延年所誣編管壽春自號學易老人有學易集題半隱堂一堂圖籍自陶冶三徑蕭蘭俱歲華定非平恩許侯宅㑹是仲長公理家端居雅不煩拼擋佳設頗嘗成咄嗟唯我身閒數來往徽弦一泛即生涯宋文鑑絶句麥隴漫漫宿槀黃新苗寸寸未經霜手中馬箠餘三尺想見歸時如許長能改齊漫録句急雨欲來先暑氣涼風已過卻秋聲龍山寺話優古堂詩欲成蹇士賦應作半人詩病中後村詩話黃裳裳字冕仲南平人元豐五年進士第一纍官端明殿學士禮部尚書有演山集王恱序云逸歌長句駿發踔厲兼衆體而有之簡元輿祠部百花巖上仙人住巖下為州山水聚白頭青冢南北人倒影沈沈獨懷古倚闌把酒與誰同況是使君為獻主應喚漁舟疏葦中旋膾游鱗落紅縷祕書坐上最軒昻能共春雲爭態度紅衣帶月今何處幾轉春殘掩朱戶飛船送客空斷腸梁塵謾落聲中句虛白亭前湖水間忽為霓裳起思慕出門沙土亂如雨薰風吹夢天南去燕子樓盼盼初歸樓上時相如燕子長雙飛有才將色世間少況復節義猶堪依將軍一去十餘載玉簫瑤瑟無心解豈不能死空相隨以色纍公非所知白老曾為賦詩客風䙚花枝醉無力後會勳郎漢陽驛因語戲欷已成昔走筆還賡美人句猶感白楊堪作柱我來登賞非唐人尚引多情聊愴神人生真盡皆為塵百年一餉難留春高樓人散誰復親只有燕子年年新社日遊雲門山不須扶我自登山腳力能勝十八盤一字雁低頭上過兩城人細掌中看雖知北戶緣猶在卻笑南柯夢未闌忽見歸雲應是信滿襟先得洞天寒秋日有感秋來猶寄一涯天葉葉秋聲似去年可恨蕭晨長在客不堪孤館更聞蟬以上演山集朝說之說之字以道濟州巨野人端彥之子自號景迂生元豐五年進士蘇軾以著述科薦元符末與崔鶠同書邪籍靖康初召為著作郎試中書舍人兼東宫詹事建炎初終徽猷閣待制有景迂生集陳叔易被召出山作二絶句東海一生垂釣客石渠萬卷校書郎丈人風味今如此鶴到揚州興更長鶚按此首本集無處士何人為作牙盡攜猿鶴到京華故山巖壑應惆悵六六峯前只一家風月堂詩話唐秦系和韋蘇州詩具銜云東海釣客試祕書省校書郎本朝陳恬叔易隱陽翟澗上號澗上丈人大觀間宋喬年諷監司薦于朝起為館閣書疏中猶不去丈人之號朝以道作詩譏之其後以道謁叔易于京師有婢應門嚴妝麗服熟視之乃故時澗上赤腳也以道又作一絶云明皇打毬圖宫殿千門白晝開三郎沈醉打毬回九齡已老韓休死明日應無諫疏來超然亭戲作時為明州船場終日一杯終日醉看潮初上看潮回自疑前世陶貞白乘興閒遊鄮縣來贈筆處士屠希屠希祖是屠牛坦今日卻屠秋毫自識有心三副健可憐無補一生勞排悶鄜畤來為吏多愁尚喜論山川分漢郡人物客羌村老杜詩有羌村宫廢神仙在天清二負昏山海經二負之梏在此莫言無妙麗土稚動金門陸放翁跋景迂此詩云鄜人善作土偶兒精巧雖都下莫及宫禁及貴戚家爭以高價取之喪亂隔絶南人不復知此句遂亦難解可歎鄭洛道中遇降羌作鶚按宋文鑑作朝詠之沙場尺箠致羌渾玉陛俱承雨露恩自笑百年家鳳闕一生腸斷國西門老學庵筆記朝氏世居都下昭德坊其家以元祐黨人及元符上書籍記不許入國門者數人以道其一也鄭洛道中遇降羌以道詩云云答陳叔易求長松長松不經黃帝手小斸漫翻嵩室雲縱有何堪寄夫子鼎頭寶氣自氤氳思四明所居今朝旅恨到何處軒窗直到桃花渡桃花渡上風吹雨道人芒屩誰來去贈鄜田玘前世能歌田順郎今身追悔太昌昌戲泥巧盡羣兒態休憶小姑初倚牀以上景迂生集老學庵筆記承平時鄜州田氏作泥孩兒名天下態度無窮一對至直十縑一牀至三十千一牀者或五或七也豫家舊藏一對臥者有小字云鄜州田玘製句干戈難作牆東客疾病猶存硯北身墨莊漫録朝說之以道作感事詩云云牆東用王君公事而硯北身乃漢上題襟集段成式書云杯宴之餘常居硯北蓋言几案南面人坐硯之北也朝補之補之字無咎年十七從父端友宰杭州之新城著錢唐七述受知蘇軾舉進士試開封及禮部别院皆第一元祐中為著作郎紹聖末謫監信州酒稅起知泗州入黨籍有雞肋集芳儀曲金陵宫殿春霏微江南花發鷓鴣飛風流國主家千口十五吹簫粉黛稀滿堂詩酒皆詞客奪錦揮毫在瑤席後庭一曲風景改收淚臨江悲故國令公獻籍朝未央敕書築第優降王魏俘曾不輸織室供奉一官奔武疆秦淮潮水鍾山樹塞北江南易懷土雙燕清秋夢柏梁吹落天涯猶並羽相隨未是斷腸悲黃河應有卻還時寧知翻手一朝事咫尺山河不可期倉皇三鼓滹沱岸良人白馬今誰見國亡家破一身存薄命如雲信流轉芳儀加我名字新教歌遣舞不由人採珠拾翠衣裳好深紅暗盡驚邊塵隂山射虎邊風急嘈雜琵琶酒闌泣無言數遍天河星只有南箕近鄉邑當年千指渡江來千指不知身獨哀中原骨肉又零落黃鵠寄意何當回生男自有四方志女子那知出門事君不見李陵椎髻泣窮邊丈夫漂泊猶堪憐避暑漫鈔李芳儀江南國主李景女也納土後在京師初嫁供奉官孫某為武疆都監為遼中聖宗所獲封芳儀生公主一人趙至忠虞部自北歸明嘗仕遼為翰林學士修國史著虜庭雜記載其事時朝補之為北都教官覽其書而悲之與顔復長道作芳儀曲云云江州廬山真風觀李主有國日施財修之刋姓氏于石有太寧公主永禧公主皆李景女不知芳儀者孰是也行路難和鮮于大夫子駿贈君珊瑚夜光之角枕玳瑁明月之雕牀一繭秋蟾一麗縠百和更生之寶香穠華紛紛白日暮紅顔寂寂無留芳人生失意十八九君心美惡誰能量願君虛懷廣末照聽我一曲關山長不見班姬與陳后寧聞衰落尚專房苕溪漁隱叢話余觀雞肋集古樂府是其所長辭格俊逸可喜自題畫留春堂山水大屏胸中正可吞雲夢盞裏何妨對聖賢有意清秋入衡霍為君無盡寫江天和李秬雙頭牡丹二喬新獲吳宫怯雙隗初臨晉帳羞月地故應相伴語風前各是一般愁廬山南康南麓江州北五百僧房綴蜜脾盡是廬山佳絶處不知何處合題詩塔山對雨在新城縣山外圓天一鏡開山頭雲起似浮埃松吟竹舞水紋亂坐見溪南風雨來謝王立之送蠟梅去年不見蠟梅開準擬新年恰恰來芳菲意淺姿容淺憶得素兒如此梅以上雞肋集墨莊漫録王直方立之父名棫家多侍兒而小鬟素兒尤妍麗王嘗以蠟梅花送朝無咎以詩謝之有句云云考校同文館戲贈子方兼呈文潛二十年來曹子方新詩曾見未能忘多才善謔稱物芳吳娃席上呼作郎瞥然何許歲月長只今未老毛髮蒼自言逢掖非昔狂傳經華隂夫子堂何曾騎馬身挾槍詔隨上將西擊羌董蒲跗注謂我臧夜行馬嶺飢無糧鼓鼙驚谷騎卷岡吏呼為微醉在牀前鋒奄至靈武傍中堅反後無敢驤城開三日牧蔽隍百駝載笴千橐裝旌旗立壘烏鳥揚還軍不省一矢亡坐師無獲勞不償鐃歌入奏虛錦囊秋風鱸魚思故鄉鋭頭宜董鸛鵝行得官猶領萬驌驦王城對巷如參商那知連月居兹房稱多量少非我王羣公古鏡懸秋光閉門飯飽庭葉黃秋盤登官酌香吳音訛雜變秦涼令壺老柏笑覆觴淹留平日夢欲翔得君可樂殊未央人生傾蓋何所望結交松柏要冰霜中天號出玉璽章青驄御史騰康莊歸期屈指未可忙聞君況有夢虺祥生女不惡嫁鄰牆掃軒留客具酒漿與君更約城南張同文館倡和詩余幹幹字樗年次韻贈無咎學士毗陵城如金斗方往事厯厯那能忘相逢童子佩蘭芳秀發人指誰家郎未幾重見突而長即今不覺秋蓬蒼戲笑豈復為兒狂追昔宓子初登堂辭鋒峭拔森刀槍器識況遠包夷羌陽秋寧肻露否臧有子遊學先聚糧相將百里陟岵岡邂逅一揖坐僧牀大辨傾注如無旁天馬方謂先騫驤觀魚誰復駐濠隍瓜期受代垂趨裝當路奏牘交稱揚行將起擢奄云亡坐令志氣不得償傳家豈詫錢一囊諸兒經行名州鄉挾書繼踵諸父行旋見天衢飛驌驦論治直要超周商術卑效淺笑杜房況是亨運遭興王致君紹祖邦家光何止追考歸焚黃邃庭朝露明藝香異書滿閣秋氣涼詠歌間成隨豆觴讀之如欲凌雲翔暫迂大手離未央闕六字望挈篋來寄深閨霜賔興賢能視文章尊尚周孔麾韓莊搜奇殆有通夕忙英游疑動聚星祥我歸復翳環堵牆世味已能如飲漿羲皇上人琴一張同文館倡和詩耿南仲南仲字晞道開封府人元豐五年進士徽宗朝為太子詹事改寶文閣直學士欽宗朝升尚書左丞門下侍郎高宗即位罷為觀文殿學士提舉洞霄宫言者論其主和誤國鐫秩安置南雄州行至吉州卒秋日同文館次鄧愼思韻秋日同文館閒無一事依鬭羊誰得雋倦鳥客思歸寢處還相向過從不患稀何當有星聚誰為問璇璣秋日同文館褎然觀國光泗濵何限磬岱麓易求梁劒氣頻衝斗錐鋒定出囊於余慙拙匠操尺預量長秋日同文館新涼逐雨回棘垣要吏局蕙悵憶山隈射為巧狙發田因文豹來西城隨分鎖夫我室多才次韻謹思九日考罷試卷呈同院諸公貢珍已選茂良充猶被拘縻類縛鐘淥酒强陪高館飲黃花不似故園逢棊枰苦戰挑燈坐蘚壁閒題捧硯從風葉滿庭秋索寞更籌向盡睡方濃以上同文館倡和詩栁子文子文字仲遠次韻呈愼思學士咸韶濩武來何方鏗鏘入耳安能忘陽春蘭芷秋菊芳金門詞客青袍郎昭回下燭光焰長深山大澤龍蛇蒼浩歌激烈元非狂正逢聖主開明堂風煙關塞收旗槍舞干兩階臣戎羌喋血拓境謀非臧邊城夜行休齎糧採詩不復嘲青岡蛜蝛戢羽戌婦牀移文北山猿鶴傍渥窪朱龍兩服驤胥靡版築罷浚隍白環楛矢貢篚裝航海萬里風帆揚窮邊種落嗟脣亡諸蕃入學願可償槐花舉子促書囊成均貢士賢登鄉東門宣詔札十行我慙駑駘追驌驦何敢望回不及商毛遂未至空連房同舍十九人余獨後入賴有墨妙江都王傳摸共分此日光驊驑騄驃兩耳黃想見蹙踏披天香坐覺暑退秋堂涼拘攣齷齪漫引觴門外烏雙飛翔悠悠逝川東未央故山魚鳥空相望鄧侯意氣摩秋霜朝吟百篇暮千章駢羅經史貫列莊落紙但見書吏忙孔鸞羽儀各效祥鄙夫不學空面牆先饋不用驚五漿鳥號要須賁育張同文館倡和詩商倚倚淄川人官太學博士入元祐黨籍秋日同文館次鄧愼思韻秋日同文館高堂燕集齊杯盤供魯酒殽核缺張梨楊孟持新論韓莊鄙舊題須知宗匠手文采冠朝閨秋日同文館何人獨擅場養莪方在沚琢玉已成章筆别千鋒陳庭焚一炷香得賢從此始豈特致民康秋日同文館棲林看晚雞斗垂宫殿北月轉戶庭西酒勸杯中淥詩分燭下題何時還九陌細雨莫成泥初入試院承詔掄材敢倦行廣庭深鎖待羣英分場自敵三千客決勝誰降七十城夜案尚閒塗卷筆曉堂方聽讀書聲每早嘗聞無咎諸公讀書聲歸時還有黃花否已覺秋風滿袖生以上同文館倡和詩李之儀之儀字端叔之純從弟元豐中舉進士元祐初為樞密院編修官從蘇軾於定州幕府元符中監內香藥庫徽宗朝提舉河東常平坐草范純仁遺表編管太平州卒揮塵後録元祐間端叔于尺牘尤工東坡先生稱之以為得發遣三昧利州湯泉華清賜浴記當年偶託荒山結勝緣未必興衰異今昔曾經天女卸金鈿墨莊漫録利州褎禪山相近地名平疴鎮湯泉溫溫可探是朱砂湯人傳昔有兩美人來浴既去異香郁郁纍日不散端叔過浴池上作詩云云贈人一作與當塗楊珠通中玉冷夢偏長花影籠階月浸涼挽斷羅巾留不住覺來猶有去時香情隨榆莢不勝飄心似楊花暖欲消擬借瓊林大盈庫約君孤注賭妖嬈詠吕吉甫宅晉朝雙檜用劉夢得韻故迹悲涼古木奇勢分庭下蔚相差霜根半露出林虎畫影全舒破賊旗寶界曾回鋪地色節旄遠映插雲枝劉郎風韻知誰敵儒帥端能表異時墨莊漫録揚州吕吉甫觀文宅乃晉鎮西將軍謝仁祖宅也在唐為法雲寺有雙檜存焉猶當時物也劉禹錫有詩吉甫家居時檜尚依然建炎兵火樹遂亡矣李去言相别二年忽得書知在吳中答書偶成官路相逢一笑休共知身世兩虛舟楚材有用誰青眼趙將無功枉白頭會見姓名通北闕何妨風韻冠南州求田接武如鳧鷖只缺元龍百尺樓書扇幾年無事在江湖醉倒黃公舊酒壚覺後不知新月上滿身花影倩人扶曾延之置酒後閣侍人以裙帶求詩御醅盞畔千頭菊椽燭光中四和香紅粉莫嗟霜滿頷也應歌處似周郎以上姑溪集借范光祿麻師一雪雀圖時任許幕圖中塵跡已冥冥說著麻翁耳便醒凍雀高低棲舞白枯槎零亂倚寒青欲憑妙手聊模寫暫借遺蹤作典刑老去未能忘著相他年要伴草堂靈過庭録還俗道士聞道華陽客儒衣謁紫微舊山連藥賣孤鶴帶雲歸栁市名猶在桃源夢已稀還家見鷗鳥應愧背船飛老學庵筆記趙德儒德儒爵里未詳與李端叔倡和中隱庵在昔避世賢隱居豈自喜甘守西山餓清洗潁陽耳一旦事高尚萬古激貪鄙孰謂樂山林便可輕朝市竊笑效顰人不知捧心美妄將凡庸姿敢希明哲軌盜此嘉遁名紛若干時子仕途指捷徑矯僞汚清史聖朝揚仄陋采録無遐邇不遺下體葑況乃中鄉芑多士生此時貧且賤焉恥夢自傅巖來獵從渭濵起隱居聞此風翻然烏可已聊為知者道庶達名庵旨姑溪集附王鞏鞏字定國莘縣人文正公旦之孫工部尚書素之子嘗倅揚州坐與蘇軾遊謫監筠州鹽稅罷還官至宗正丞入黨籍自號清虛先生有集墨莊漫録王定國寄詩于東坡答書云新詩篇篇皆竒老拙此回真不及矣窮人之具輒欲交割與公魏道輔見而笑曰定國亦難作交代只是且權攝耳挽蘇黃門子由憶昔持風憲防微意獨深一時經國慮千載愛君心坤道存終始乾綱正古今當時人物盡惆悵獨知音自注元祐中議册后宣仁御文德殿發册公語余密告吕丞相微仲母后御前殿兹不可啓微仲明日留身宣仁詔宫中本殿發册時人無知者已矣東門路空悲未盡情交親踰四紀憂患共平生此去音容隔徒多涕淚橫蜀山千萬疊何處是佳城自注公前年寄書約豫至許田曰有南齊翠竹滿軒可與定國為十日之飲此老年未盡之情也靜者宜膺壽胡為忽夢楹傷嗟見行路優典識皇情徒泣巴山路終悲蜀道程弟兄仁達意千古各垂名自注公與子瞻嘗泊巴江夜雨相約伴還蜀竟不果歸今子瞻葬汝公歸眉山王祥有言歸葬仁也留葬達也墨莊漫録蕭相樓盧杞姦邪四海憂相君邦國自同休分符朝去雲中闕開府南來江上州百尺樓高瞻故國九華山色倚晴眸定知直道傳千古杜牧文章在上頭方輿勝覽杜牧池州重建蕭相樓記蕭丞相復為刺史時樹樓于大㕔西北隅上藏九經書下為刺史便㕔事大厯十年乙卯建會昌四年甲子權刺史李方元具材刺史杜牧命工皆仍舊制自初至再凡七十一年湘山光孝寺半嶺風吹草木香落階花雨送春忙從師遠借雲庵臥還我平生午枕涼蓮社緇黃常得伴鹿門妻子亦相將化身欲似河東栁更向山頭望故鄉桂林府志楊天惠天惠字祐父郫縣人元豐進士攝卭州學官徽宗朝上書言事入黨籍卒左丞馮澥志其墓號西州文伯次韻吳帥題保福壁淨瓶猶貯近頒冰拄杖還扶舊醉藤遮莫簪花倩天女未妨燕坐折談僧送孫正忠移成都小漕升平芝菌效神奇況乃賢豪用世資人物熙寧中興日風流荆國適同時起家便作三公客乘傳何為九折馳少府但分新賜節石渠猶借舊官儀素心久辨經綸計妙意前知遇合期聊與西南成勝事暫將清獻續良規橋橫萬里重開府水接雙流共去思怊惆參卿無限意道傍索筆强題詩溫江縣二瑞頌并序溫江隸成都遠王畿三千幾百里有奇蓋西南偏邑也政和二年夏六月有嘉禾産於嚴氏之圃凡二本是歲十二月復有甘露降于學宫之柏凡三日鄉以白縣縣以白府府遣從事即縣核狀皆有實可復不誣輒具書若圖上尚書省以聞詔下其副尚書禮部藏焉于是前縣臣宗道馳書諭假彭山丞臣天惠曰盍頌諸臣對越北闕而奏頌曰於皇御極百志惟敘曰農而農曰士而士爾安爾宫爾寧爾畝恩詔數下仁滂德膴農飽以歌士喜式舞協氣從之祥嘏如雨乃産嘉禾以慶農扈乃降甘露以幸士子其慶伊何珠穗紛舉俾爾甌窶戶有億秭其幸維何雲液醲湑俾爾膏馥濡及嬰孺維我哲后博臨下土相彼多禾均此靈露道拜稽首誕告奔走惠拜稽首盱衡語語敢獻稗官以贊矇瞽以上成都文類劉拯拯字彥修宣州南陵人第進士元豐中為監察御史徽宗朝纍遷吏部尚書空心潭碧潭發幽石瀟灑無纖塵寒光湛秋月有物難比倫離鉤況無魚千尺徒垂綸到此心已空何用濯我纓破山寺志張商英商英字天覺號無盡居士蜀之新津人登進士第為章惇所薦紹聖初纍擢左司諫工部侍郎大觀中厯尚書右僕射中書侍郎貶衡州復官卒贈少保諡文忠曾入黨籍有無盡集揮塵前録張天覺紹聖初章子厚薦登言路攻擊元祐諸賢不遺餘力至欲發溫公吕正獻公之墓晚既免相詩有回看同列進不覺寸心忙之句桐江集商英雄辨詭譎自謂得兜率悅之傳天下號相公禪孤憤吟青青一本桑下可百夫息泠泠一井泉上有千人汲千里以為郡百里以為邑生齒豈不繁教化繄爾力何事北窗人歎此徒勞職宋文鑑留題護國寺時為雒縣主簿經攝垍窯鎮稅薄宦區區可歎嗟寂寥寒館過村家神錐豈向囊中出寶劒聊憑醉後誇就祿勉持毛義檄讀書空滿惠生車掩關不識青春好一夜狂風已落花成都文類靈泉寺著法華合論作寺在歸州西三里合道通為七卷經默教開眼示羣生不須天女添瓶水自有靈泉一派清方輿勝覽中秋不見柯山客中秋月又圓夜來清滴露天末淡收煙念遠情非俗凌虛骨欲仙素琴鳴此恨相與對嬋娟合璧事類前集讀書燈小籠疏四面明紙罩孤燈自小共寒熱相親如友朋舊書曾遍照新燭莫相憎幾為吟詩苦留光到夙興合璧事類外集貓白玉狻猊藉錦茵寫經湖上淨名軒吾方大謬求前定爾亦何知不少喧出沒任從倉內鼠鑽窺寧似檻中猿高眠永日長相對更約冬衾共足溫合璧事類别集華陽洞素虎班虯躡紫煙幾看滄海變桑田赤城玉笥尋真後又到華陽第八天茅山集見山亭簾卷疏煙醉眼開浮雲飛盡見崔嵬苦嗟霖雨遮藏久深謝清風引致來丹桂有時明月滿舊山無路白猿哀禪僧指我真空理心火茫然一夜灰杭州府志青原山七祖塔一派青原出少林信衣到此只傳心尋常示衆無人會盡向廬陵米價尋青原山志題睢陽五老圖肅奉嚴韻德政調元向道閒天朝詔許實辭冠丹心耿耿懸象魏青史昭昭照玉桓晚節友賢陽鳳暖老年憂世谷駒寒太平猶自存龜鑑後進儀刑仰慕看式古堂書考吳與與字可權漳浦人元豐五年進士餘干令纍遷奉議郎通判潮州白雲亭在餘干縣白雲城上唐李德裕建高城頓崇岡上與白雲遇昔賢此登臨懷古得佳句結亭自何人歲月更已屢古篆僅存名頽簷颯將仆我來訪遺蹤環賞愜幽趣鳩工扶墊隍選木換隳蠹津梁五道人悉力願相赴經營未終月突兀見翬翥英英蒼梧雲朝暮此屯聚時從南山來倏向高巖去去來本無心虛亭日新故因之望故鄉更識親闈處南山互牽情憑闌目空注饒州府志鄒浩浩字志完常州晉陵人元豐五年進士擢右正言坐諫立劉后謫新州徽宗朝遷吏部侍郎再謫永州大觀元年復直龍圖閣卒入黨籍高宗朝贈寶文閣學士諡曰忠有道鄉集送俞秀老歸維揚踏雪驅驅原憲履御風獵獵老萊衣情投豈比鍾山出興盡還同剡水歸煬帝池邊松䕃遠維摩室內燭光微攜笻促席徜徉處應記當年接下機湖上雜詠荷葉如錢三月時幅巾藜杖一追隨邇來勝事知多少惟有風標公子知杜牧之以白鷺為風標公子過永州淡山巖作我入幽巖亦偶然初無消息與人傳訓狐戲學仙伽客一夜飛鳴報老禪以上道鄉集冷齊夜話鄒志完南遷北還過永州淡山巖巖有訓狐凡貴客至則鳴志完將至而狐輒鳴寺僧出迎志完怪之僧以鳴狐為對志完有詩云云弔仲殊長老逆行天莫測雉作瀆中經漚滅風前質蓮開火後形鉢盂殘蜜白爐篆冷煙青空有誰家曲人間得細聽老學庵筆記仲殊長老喜食蜜崇寧中忽上堂辭衆閉門自縊死及火化舍利不可勝計鄒忠公作詩云云末句謂其上於樂府也游酢酢字定夫建州建陽人嘉祐間以文行知名程明道典扶溝學招使肄業登元豐五年進士仕至監察御史厯知漢陽軍和舒濠三州有集餞賀方回分韻得歸字邀客十分飲送君千里歸情隨緑水去目斷白鷗飛松菊今應在風塵昔已非維舟後夜月能不重依依濓洛風雅題河清縣廨小院閒亭長薜蘿鹿來穿徑晚經過夕陽蕭散簿書少窗裏南山明月多水亭清溪一曲繞朱樓荷密風稠咽斷流夾岸垂楊煙細細小橋流水即滄洲以上河南府志鍾胄胄字少游又字公緒贛州龍南人元豐五年進士纍官廣西計度轉運使進龍圖閣學士兼本路安撫管句經略使致仕有集龍南石玉巖萬石結叢林縈回鳥道深山高雲漠漠洞古緑隂隂壁擁虯龍篆崖懸鍾鼓音不須愁日暮勝景且追尋贛州府志仵盤盤字艮翁終南人父信本軍職終文思副使以䕃補借職元豐中監青州臨淄酒稅絶句太一峯前是我家滿牀書籍舊生涯春城戀酒不歸去老卻碧桃無限花西溪叢話或以此詩題酒樓皆云是神仙非也陳輔輔字輔之丹陽人少負俊才不事科舉自號南郭子人稱南郭先生訪建康楊德逢題壁北山松粉未飄花白下風輕麥腳斜身似舊時王謝燕一年一度到君家苕溪漁隱叢話楊德逢驥居金陵輔每清明上冢即過湖隂之居清談終日元豐間頻歲訪之不遇乃題此詩楊歸見之吟賞不置嘗稱于荆公公笑曰此正戲君為尋常百姓耳楊亦大笑湖上有作平湖共天遠浸月坐寒光乘流溯荃壁棹舟尋藥房佳人折輕荷隨風來珍香顧眄但微笑眉宇何清揚日暮共攜手遙指煙中湘鎮江府志周邦彥邦彥字美成錢唐人邠之姪元豐中獻汴都賦召為太學正徽宗朝仕至徽猷閣待制提舉大晟府出知順昌府提舉洞霄宫晚居明州卒自號清真居士有文集陳郁話腴周邦彥字美成自號清真二百年來以樂府獨步貴人學士市儂妓女皆知美成詞為可愛至于詩歌自經史中流出當時以詩名家如朝張皆自歎以為不及樓攻愧云清真樂府播傳風流自命顧曲名堂不能自已過羊角哀左伯桃墓溧水縣南元祐中為令時作古交久淪喪末世尤反覆谷風歌焚輪黃鳥譬伐木永懷羊與左重義踰血屬客行干楚王冬雪無斗粟傾糧活一士誓不俱死辱風雲為慘變鳥獸同躑躅角哀哭前途伯桃槁空谷終乘大夫車千騎下棺櫝子長何所疑舊史刋不録獨行貴茍難義俠輕殺戮雖云匪中制要可興薄俗荒墳鄰萬鬼溘死皆碌碌何事荆將軍摻戈相窘逐鳳凰臺危臺飄盡碧梧花勝地凄涼屬梵家鳳入紫雲招不得木魚堂殿下飢鴉以上景定建康志春帖子鸞輅青旗殿閣寬祠官奠璧下春壇曉開魚鑰朝衣集綵勝飄揚百辟冠合璧事類前集春雨耕人扶耒語林丘花外時時落一鷗欲驗春來多少雨野塘漫水可回舟後村千家詩曝日冬曦如村釀奇溫止須臾行行正須此戀戀忽已無齊東野語天賜白并序永樂城陷王湛曲真夜縋以出真持木為兵且走且敵前陷大澤中顧其旁有馬而白暫上馳去五鼓達米脂城因以得脫真名其馬為天賜白蔡天啓得其事於西人邀豫同賦君不見書生鐫羌勒兵入羌來薄城束練急蠟丸飛出辭大家帳下健兒紛雨泣鑿沙到石終無水擾擾萬人如渴蟻挽絙竊出兩將軍虜箭隨來風掠耳道傍神馬白雪毛噤口不嘶深夜逃忽聞漢語米脂下黑霧壓城風怒號脫身歸來對刀筆短衣射虎朝朝出自椎雜寶塗箭創心折骨驚如昨日榖城魯公天下雄隂陵一跌兵力窮檥舟不渡謝亭長有何面目歸江東將軍偶生名已弱鐵花暗澀龍文鍔縞帳肥芻酬馬恩閒望旄頭向西落陳郁話腴翟嗣宗嗣宗臨淮尉偶見蜘蛛因成四韻織絲來往疾如梭長愛騰空作網羅害物身心雖甚小漫天綱紀亦無多林間宿鳥應嫌汝簾下飛蟲亦懼他莫學螳螂捕蟬勇須知黃雀奈君何復齊謾録翟尉臨淮頗為監司所窘遂于館驛題蜘蛛云云林子中時為發運過而見之召而誚責且戒以毋為浮薄因薦之于朝陳傳佐郎將林中生致佐郎將名王頭顱十四五乾德可禽嗟不謀同惡相濟能包羞降書冉冉過中洲中軍傳呼笑點頭蠻首算成勿藥喜君臣稱觴弭多壘元戎凱旋隔天水夜經桄榔趨決里驅將十萬人性命換得交州數張紙揮麈後録元豐中交趾李乾德陷雍亷州詔郭逵討之遂復雍州進次富良江又破之獲賊將洪真太子者於是乾德議降而逵以重兵壓富良江與交人止一水之隔吳沖卿丞相忌其成功堂帖令班師逵逗遛不進交人大入全軍皆覆逵坐貶秩當時詩人陳傳作佐郎將云云魏泰泰字道輔襄陽人曾布之婦弟為人無行而有口米元章稱其與王平甫並為詩豪崇觀間章惇為相欲官之不就有臨漢隱居集東軒筆録隱居詩話桐江詩話道輔試院中因上請主文恃才豪縱不能忍一時之忿毆主文幾死坐是不許取應潘子真詩話道輔博極羣書尤能談朝野可喜事亹亹終日挽王平甫海內文章傑朝廷亮直聞黃瓊起處士子夏遽修文貝錦生遷怒江湖久離羣傷心王佐略不得致華勳東軒筆録熙寧中河東河北陜西大飢百姓流移于京西就食鄭俠監安上門遂畫流民圖及疏言時政之失遂坐流竄而中丞鄧綰知諫院鄧潤甫言王安國嘗借俠奏槀觀之有奬成之言意在非毁其兄坐此放歸田里逾年起為大理丞監真州糧料院不赴而卒余嘗為挽詞頗道其事題黃魯直集端求古人遺琢抉手不停方其得機羽往往失鵬鯨隱居詩話黃庭堅喜作詩得名好用南朝人語專求古人未使之一二竒字綴葺而成詩自以為工其實所見之狹也故句雖新竒而氣乏渾厚吾嘗作詩題編後云云蓋謂是也荆門别張天覺秋風十驛望台星想見冰壺照坐清零雨已回公旦駕挽鬚聊聽野王筝三朝元老心方壯四海蒼生耳已傾白髮故人來一别卻歸林下看升平桐江詩話詩律峻峭今人不可及也闕題博山燒沈水煙燼氣不滅日暮向門前楊花散成雪潘子真詩話不減江左詩人語暗人初睡金鴨優古堂詩話秦少章詩燭花漸無煙卻有香魏道輔詩云云與少章詩意同寄米元章緑野風回草偃波方塘疏雨淨傾荷幾年蕭寺書紅葉一日山隂換白鵝湘浦夕同要月醉洞湖還憶扣舷歌緇衣化盡故山去白髮相思一倍多淨名齊帖邵緝緝神宗朝提舉淮南常平事題長興吳城高臺無地曲池平漂泊句吳宿古城一岸溼雲沈夜色四山涼葉下秋聲湖州府志王無咎無咎字補之南城人官直講遊麻姑山仙軿昔日此流連氣象遼遼尚宛然溪落斷崖為遠瀑路從絶頂見平田千年芝有靈禽戲一洞雲留羽客眠已樂勝游塵境外況陪清論酒尊前麻姑山志劉誼誼字宜翁長興人第進士元豐間廣東江西提舉常平官上疏論新法勒停隱茅山題黃山溫泉山有靈砂泉色紅滌除身垢信成功不除心上無明業只與山間衆水同曲洧舊聞居茅山作曾跨江西使者鞍舊言才上便休官三茅得夢全清瘦頭髮鬅鬙布襖寬西吳里語趙彥若彥若字元考師民子以父任為將作監簿元豐中厯官祕書監哲宗朝纍擢禮部尚書翰林學士紹聖初貶安遠軍節度副使澧州安置卒與黨籍有集端午帖子揚子江中方鑄鏡未央宫裏更飛符菱花欲共朱靈合驗盡神姦又得無容齊五筆周壽壽字李老一字元翁濂溪先生長子元豐五年進士初任吉州司戶次秀州知録終司封郎中題金粟寺菴清池帶蒼巘結構俯林麓扶疏竹外山相向隔羅縠老禪謝人境歲晚收白足誰聆跫然音息隱尚爭逐道場坐千劫不愧桑下宿定中觀潮汐絶事心已熟常棠澉水志徐嘉言嘉言知海鹽縣事題金粟寺菴和前韻招提敞山嵒新菴隱嵒麓石沼引清流風漪皺文縠晴暉滿虛室一水淡自足菴前有含暉亭心明身宴閒境寂誰尋逐寒林帶月行夜榻和雲宿若欲問西來一齊飽秋熟澉水志趙大成閏中秋桂影中秋特地圓況當餘閏魄澄鮮因懷勝賞初經月免使詩人歎隔年萬象斂光增浩蕩四溟收夜助嬋娟鮮雲清廊心田豫乘興能無賦詠篇合璧事類前集宋詩紀事卷二十八
