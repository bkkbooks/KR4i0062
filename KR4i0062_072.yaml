body:
  text: 宋詩紀事巻七十二錢塘厲鶚撰張堯同堯同嘉興人有嘉禾百詠嘉禾百詠存十首殳山丹竈功成後寥寥掩石扉但聞蟬巳蛻不見鶴來歸蘇小小墓泉下骨應朽幽魂獨未銷幾番淸夜月孤影度南橋韭溪終與雙溪接分流入市來市橋人影合不解洗塵埃朱買臣墓世事春風轉榮枯一夢間繡衣人不見孤冢舊家山天心湖拍岸浮春綠菰蒲四逺生網羅人不到魚鳥亦忘情月波樓天濶冰河淨溪平玉鑑寒巻簾看晩色鷗鳥傍䦨干列岫亭吾州風物好唯是欠靑山忽有洞庭色來從一笑間跨塘橋路接張涇近塘連谷水長一聲淸鶴唳片月在滄浪樂郊亭竹下淸風好時來挂幅巾待逢田叟問誰是樂郊人長水鄉古鄉也故楞嚴大師子璿作楞嚴疏文謂之長水疏古來名未滅人好水還淸一讀髙僧疏塵勞悟此生以上嘉禾百詠梁佐佐理宗時人與史安之倡和髙山堂危巓層閣倚雲平一凭危闌醉魄醒霽雨亂山生淡碧帶風寒竹有餘靑孤猨傍石來深礀幽鳥衝烟入畫屏卻讓高僧占仙景蓬萊不獨在滄溟嵊縣志毛珝珝字元白三衢人有吾竹小稾李龏和父序云柯山毛元白詩人之秀者也惜其少文自晦不求聞于時吟稾一帙淸深雅正跡前事而寫芳襟有沈千運獨挺一世之作廬山栖賢寺名重于諸刹前賢舊隱蹤無人知有路隔樹忽聞鐘瀑壯山疑裂雲深寺若封或傳遺稾在三叩昔時松墨龍眞人尸居雷八荒斷甎殘墨生蒼茫鯢桓下􅕉九淵墨神光倒射角與亢平聲明明元氣淋漓蹟水㡳焚槐海波赤周流萬化元無極姑使人心識天則浙江白鷴舊事隨波去太極陰陽自吞吐長虹夜貫黑頭船四紀沙迎相公路馮夷作劇眞等閒五都有客雄其閒上林三官浪憂國千年海㡳生銅山丹陽館渡江南來第一驛幾度華堂延雁客百年運逐曉雲空愁殺鞮官老無職南徐今日古陽關不斷歌聲祖離席國讐巳復事尤多折損年年春柳碧富池廟船頭蜀錦三千尺倒影長虹浸寒碧相逢不是紫髯郎鸚鵡洲邊眼生棘江頭簫鼓雜靈鴉人道陰兵曾䕶國安知樓下雪千堆不是吞曹氣衝激滄浪亭濯纓人去水空寒事屬明時欲問難日暮客歸園館閉鷺鷥飛上石棊槃子美故物唯石枰存石湖一片湖光接薜蘿功名餘事屬吟多至今魚鳥皆堪敬曾見烏巾照碧波以上吾竹小稾黄伯厚晩泊片㠶寂寞繞孤村茅店驚寒半掩門行草不成風斷雁一江烟雨正黄昏後村千家詩范大中立春寄梅壇楊逸老仕路蹉跎又見春區區深厭走紅塵未能解脫無窮事長憶逍遙自在人瓦缶汲泉朝灌藥羽衣濛露夜朝眞灑然物外淸虛境呼吸淳元養氣神梅仙事實劉瀾瀾字養源號江村天台人初爲道士還俗干謁無成卒劉後村跋云天台劉君瀾詩四巻短篇如新戒縛律大篇如散聖安禪詩之體製畧備桐江曉泊風蕭蕭冰瑟瑟淡烟空濛冠朝日灘頭枯朩如畫出鸜鵒飛來添一筆梅礀詩話夜訪侃直翁疎瓴亂見星危坐冷無燈索句髮先白餐蔬貌盡靑棲禽翻麓雪墮栗破溪冰昨夜中峯頂因看海日昇瀛奎律髓句東風半綠官圩草西日遙紅别岸山梅礀詩話李億柳倚岸依依一兩株溪風吹影暮烟疎靑條拂水長如線釣叟折來穿白魚後村千家詩劉允升繭漆花淸晨歩上金雞嶺極目漫山繭漆花雪蘂瓊絲亦堪賞樵童蠶婦帶歸家全芳備祖易元矩斑竹一别虞妃去不還愁雲空鎖九疑山世閒多少相思淚灑徧脩篁染不斑全芳備祖何應龍應龍字子翔錢塘人有橘潭詩稾春寒博山熏盡鷓鴣斑羅帶同心不忍看莫近闌干聽春雨樓高無處著春寒有别樓上佳人唱渭城樓前楊柳綰離情一聲未是難聽處最是難聽第四聲臨安僦樓過了燒燈望燕歸春寒剗地勒芳期杏花深巷無人賣細雨空簾盡日垂芍藥金蘂絲頭茜染成五雲樓映玉盤傾謝郎一入中書後二十四橋空月明以上橘潭詩稾傷春玉纖輕揭繡簾開行到花前淚滿腮正爾春心無處託一雙蝴蜨忽飛來後村千家詩蔡槃槃號䆳菴永嘉人𤓰洲烟際繫孤舟蘆花兩岸秋江空雙雁落天迥一星流急鼓西津渡殘燈北固樓商人茅店下沽酒話揚州東甌詩集羅竹谷竹谷廬陵人羅大經之父名字未詳送曾雲巢被召泰華山人上赤墀上嗟安在見何遲老于尚父投竿日少似轅生對策時怨鶴驚猨辭舊隱鞭鸞笞鳳總新知早陳經國平邊策歸領雲巢舊住持送胡季昭竄象郡好讀牀頭易一編盈虛消息總天然崢嶸齒頰皆冰雪肎怕炎方有瘴烟以上鶴林玉露羅大經大經字景綸廬陵人登第爲容州法曹掾著鶴林玉露茶聲松風檜雨到來初急引銅瓶離竹爐待得聲聞俱寂後一甌春雪勝醍醐鶴林玉露陪桂林伯趙季仁遊桂林暗洞列炬數百隨以鼓吹市人從之者以千計巳而入申而出入自曾公巖出于棲霞洞入若深夜出乃白晝恍如隔宿異世季仁索余賦詩紀之瑰奇恣搜討貝闕靑瑤房方隘疑永巷俄敞如華堂玉橋巧橫溪瓊戸正當窗仙佛肖髣髴鐘鼓鏗擊撞贔贔左顧龜狺狺欲吠庬丹竈儼亡恙芝田藹生香搏噬千怪聚絢爛五色光更無一塵涴但覺六月涼玲瓏穿數路屈曲通三湘相傳與九疑通神鬼妙剜刻乾坤眞混茫入如深夜暗出乃皦日光隔世疑怳惚異境難揣量鶴林玉露王荆公錯認蒼姬六典書中原從此變蕭疎幅巾投老鍾山日辛苦區區活數魚鶴林玉露王荆公新法煩苛毒流寰宇晩歳歸鍾山作放魚詩云物我皆畏苦舎之寧啖茹其與梁武帝窮兵嗜殺而以麫代犧牲者何殊吳規父蛙斂藏鼓吹寂無言𨁝跳何曾離草根舉世盡貪生處樂坎中應自有乾坤後村千家詩劉汝進汝進號山翁漫塘幼子與客九日遊龍山以塵世難逢開口笑分韻得口字縱歩龍山顚放舟尤蕩口羣然雁鶩行雜之牛馬走我拙不能詩我病不能酒試問賞花人還有菊花否山房隨筆吕炎炎字仲明閨思夜久香銷翡翠匳十分春恨上眉尖荼䕷謝了櫻桃過人影參差月半簾詩林萬選車若水若水字淸臣號玉峯山民黃巖人從杜淸獻公游有腳氣集玉峯宂稾江湖偉觀十年不向此凭闌景象依然一望間龍蜃吐雲天入水樓臺倒影日銜山僧于僻寺難爲隱人在扁舟不是閒孤鶴似尋和靖宅盤空飛下復飛還咸淳臨安志庚申襄陽耆舊總堪羞只有龐公巳入州自向芭蕉眠夜雨不堪更鼓在牀頭赤城詩集陳嘉言嘉言侯官人仕爲建州司戸咸淳末築室台嶼人稱書隱先生題太姥墓太姥山在福寧州東堯時有種藍老姥家於路傍有道士求漿姥飲以醪因授丹砂服之七月七日乗龍上升有虚墓存焉吾聞堯時種藍嫗世代更移那可數帝堯朽骨無微塵此間猶有堯時墓墓中老嫗知不知五帝三王奚以爲狼貪鼠竊攫尺土窾朩未枯巳易主君不見仙人掌分明指取靑天上騎龍謁帝大羅天不逐華蟲挂塵網又不見石棊盤人去盤空局已殘當時勝負此何有爭先劫奪摧心肝請君絶頂試披寫左望東甌右東冶山川不見無諸揺但見烽烟徧郊野野老吞聲掩淚哀茫茫滄海生蓬萊名勝志羅與之與之字與甫螺川人有雪坡小稾玉梁道中雜詠淸商汎西來刺刺滿林塢草朩儵變衰柯葉不相顧昔時翳空雲今作連山雨菊花猶强項籬邊爭媚嫵泠泠澗㡳泉破碎山根翠似欲畱佳客曲折二十四我行無定止蠟屐信所詣偶來儵舍去乗興聊復爾濛鴻玉梁境縹緲雲霞仙月壇白雲洞遺址空依然千年唯亂石蹲踞秋山烟徘徊莫可覓酌盡丹井泉山居雨作糟牀注秋生鱸鱠思巻簾了淸景流水褭烟絲一夜潦收野水淨雲陣布重陰一夜西風急千山黃葉深身猶披暑服耳巳厭寒砧對此無心者還應雪滿簪寄衣曲愁腸結欲斷邊衣猶未成寒窗翦刀落疑是劒環聲爲言日薄寒濃春意微花鬚柳眼尚依稀爲言羯鼓休頻打催得先開卽早飛山行盡日流連興未闌寒鴉背負夕陽還遙知今夜空窗夢只在江南水石間倦倚蟬聲燕語細相和池雨纔浮點點荷倦倚闌干消永日葡萄陰薄柳風多以上雪坡小稾陳東之游沃洲山我本名山人屢作名山興天台一住三十年盡日捫蘿陟雲磴上攬四萬八千丈之髙秋參差明河兩肩並下瞰三百六十度之朝暾滅没飛烟八荒淨或隨仙氣得丹牀雙闕夜深看斗柄今年積雨天地晴一策快作西南征沃洲最佳天姥勝連山直下秋崢嶸竹萌修纎會稽箭芝莖菌蠢商山英秋陽不碎空翠影絶壑倒瀉銀河聲山腰細路如絲直三兩漁樵行落日炊烟暝色小茅屋松子秋聲斷崖石溪流飯屑胡麻香土輭春膏霜朮白送書松際有猨公問酒礀陰多朩客靑冥樓閣仙人家鬱藍流光瀉晴碧霓旌隊下鶴萬羣絳節朝回雲五色人間但有桃花源桃花春香流水渾三生凡骨不得到兩耳夜半空聽猿李白尋眞不得返支遁卜築逺費錢至今山靈䕶光怪石蘿山薜餘秋妍陳郎故宅更深閟雞犬林塘隔塵世淸秋著屐一登之路僻夕陰門半閟盤陀石在長楠陰脫畧塵纓換秋意晴窗示我兩山圖老眼摩挲觀一二便揮健筆寫我詩惜哉賞音今絶稀謫仙一去五百載人間山水無淸輝舊時仙人白雲唱怪我白首歸何時我生白首歴浩劫眼中億萬蟲沙春夢非陳郎挽我十日住掉頭不顧自有南山期餐霞絶粒鍊精魄長生之學非荒嬉三千年前有宿約來巳不早歸不遲長揖羣仙謝兒輩倒挾萬里冥鴻飛越詠保應廟投迹空山計巳非江都消息亂來稀廟前幾種春香草錯怪王孫去不歸新昌縣志縣之十四都隋諸王避難殁葬其地水旱疾疫祈禱輒應宋寶慶二年從鄉民之請建廟賜額陳東之有詩云云吳濟濟字巨川號廉靜鮑家田搖斾家家酒扶犁處處村草深迷井口槿密擁籬根綠水明秧本靑山失燒痕多應忌蠶事畏客閉柴門咸淳臨安志鮑家田在錢塘門外東山衖之北吳越相鮑君福賜田于錢塘因以名焉吳廉靜有詩野外卽事橫朩渡前溪藤深路欲迷瘦笻諳亂石老屐帶新泥盡日綠陰合有時黄鳥啼多情雙蛺蜨飛傍㡌簷低前賢小集拾遺劉蕭仲子規深藏密葉人難見斷送春光夢一空啼後血流成底事只應都作暎山紅後村千家詩丁先民游大滌山我欲避塵囂乘風入洞霄循溪山作路駕水石爲橋臺殿黄金鎖神仙碧玉簫拂衣天柱頂淸思欲飄飄洞霄詩集張簡簡號槎溪天津橋月夜行闕獨崔嵬垂楊夾道栽河通桃葉渡門對雨花臺世事棊千變人生夢一回誰知今夜月曾照六朝來詩林萬選吳震齋玉簪花素娥昔日宴仙家醉裏從他寶髻斜遺下玉簪無覓處如今化作一枝花全芳備祖馬樗山瓊花三月淮南鼓戰塵無雙亭下隘遊人此花不解興亡意也向年年閧一春全芳備祖王琮琮字中玉括蒼人監永嘉酒稅有雅林小稾題獨醒小亭東嘉酒舍予所創退食多畱此翛然一散襟涼從曉來覺秋向雨中深牆竹侵山色檐茅雜柳陰有誰能載酒過我共幽尋秋夜有懷醉書十韻秋風從何來䬃䬃入窗牖殘燈耿不寐照我客顔厚故園豈不佳亦頗興懷否黄金桂百樹碧玉池十畝猨鶴響空山亭臺映疎柳觥籌雜野䔩筆硯得佳友愁無彈鵲句雋有持螯手人生行樂耳功名有時有點檢屐幾兩土苴米五斗浩然歸去來萬事不如酒舟過孤山寂寞梅花處士墳竹圍巖腳一泉深偷瞻翠輦曾遊處水鑰年年䕶綠陰以上雅林小槀李景文景文號東谷黄巖人有東谷詩稾病後感興寄車玉峯先生折梅寄故人故人靑雲閒靑雲杳無路夢裏相往還我愛梅花媚彼惜桃李顔相逢不相契何事勞追攀守此歳寒心持以遺所懽廬墓有感流水遶門去愁雲壓徑斜無人燒柏子有客問梅花橘熟猨窺樹池空鳥啄沙自傷寒谷日不及照昏鴉以上台州府志陳以莊以莊字敬叟號月溪建安人劉後村跋云敬叟才氣淸拔力量宏放穀城黃子厚之甥也故其詩酷似云闕題鳳簫一去幾經年古朩靑蘿鎖洞天黠鬼不量曾竊藥眞人豈礙作飛仙細看丹竈凝烟地知有淸朝應世賢欲下蒼崖郤回首何時著我弄雲泉後村千家詩春興輕衫短帽久塵埃零落香篝媿麝煤春半工夫花繡了社邊消息燕銜來豈無綠野供千騎幸有黄封可一杯明日淸明能出否憑誰先爲掃莓苔詩林萬選吳惟信惟信字仲孚霅川人寓吳中有菊潭詩集蘇堤淸明卽事梨花風起正淸明游子尋春半出城日暮笙歌收拾去萬株楊柳屬流鶯西湖雨吟溼了荷花雨便休晩風歸柳澹於秋一生不作機心事合轉船頭向白鷗曉吟翠帳香淸捲碧紗風捎殘雨溼檐牙蜻蜓亦被涼勾引淸曉低飛入水花秋夕南風吹露下秋空烏鵲無聲占碧桐天氣微涼人好睡闌干閒在月明中野望閒與蘆花立水邊歸心客思兩茫然夕陽收盡天風急一樹寒鴉落野田拜和靖墓墳草年年一度靑梅花無主自飄零定知魂在梅花上只有春風喚得醒自序一劒辭家竟陸沈夢思空向故廬深槎迷河漢千年恨樹隔關山萬里心衣垢正憐貧未去鏡明忽有老相尋春歸不與人爲約靑草催詩亦嬾吟秋夕雨聲雲氣暮蕭蕭羅扇恩疎井樹凋心事暗隨歸夢去壁燈畱與可憐宵詠貓弄花撲蜨悔當年喫到殘糜味卻鮮不肎春風畱業種破氊尋夢佛燈前以上菊潭詩集絶句白髮傷春又一年閒將心事卜金錢梨花瘦盡東風嬾商畧平生到杜鵑齊東野語糜先生吳之老儒也時吳仲孚客吳一日遇諸塗叩以近作仲孚誦絶句云云糜老屈膝拜曰子謫仙人也老夫每欲效顰則漢髙祖唐太宗追逐不少置矣翁元龍元龍字時可號處靜四明人杜淸獻成之之客題曹娥墓自從西子入吳宫幸有英娥可勸忠同姓最慙曹孟徳垂名只許叔先雄虛生浪死人何限白日靑天古一同看得冢頭三寸草也嫌桃李嫁東風娥江題詠葉維瞻維瞻號石軒題西陽嶺杜鵑啼處花成血燕子忙時麥未胎舉世但知春易老不知春老幾人來詩林萬選徐存存號寓軒遊洞霄宫淸眞羽士舊仙官日奉琳宫紫翠間五洞烟霞龍窟宅一壺天地道家山滌泉盤轉冰涵沼隱石屏開玉敞關可笑濯纓來覽勝輸他高臥白雲閒洞霄詩集馮輗輗慈谿人題慶安寺古松寒松一幹老蒼蒼古寺門前歳月長匠伯偶圖舟楫利禪翁方患斧斤傷得全此日同齊櫟勿翦他年比召棠可但與君期久逺相將俱列大夫行陳郁話腴明之慈谿縣慶安寺前有古松夾道綿亘數里其一最巨蜿蜒若龍飛偃如蓋臨池之上邑長沈時升有造舟之役睥睨兹松將斤焉里士馮文學輗作詩以遺沈賴以不伐松因詩而夀焉劉元茂元茂號石㵎性愛菊繙帙得菊葉何年霜後黄花葉色蠹猶存舊巻詩曾是往來籬下讀一枝閑弄被風吹山家清供陳潤道潤道天台人吳民女吳民嗜錢如嗜飴天屬之愛亦可移養女日夜望長成長成未必爲民妻百金求師敎歌舞便望將身贍門戸一家飽暖不自憐傍人視之方垂涎朱門列屋爭妍麗百計逢迎主人意常時疎棄自悲啼一旦承恩多妒忌古人怕爲蕩子婦夜夜孤眠淚如雨今人甘爲貴人妾得意失意花上月蕩子不歸寧空房主人喜怒多不常陳郁話腴吳下風俗尚侈細民有女必敎之樂藝以待設宴者之呼使令莫逆奉承惟㳟蓋覬利贍家一切不顧名爲私妓實與公妓無異也長大鬻爲妾狼戾則籍之官動以千計習俗薄惡莫此爲甚天台陳潤道作吳民女一篇殊益風敎施樞樞字知言號浮玉有芸隱横舟稾龜溪市橋見月樓臺疊翠遶淸溪淺澹雲邊月一眉行到市聲相接處傍橋燈火未移時滄浪亭長史遺蹤二百年直敎名字到今傳渚香細浥蓮須雨野色輕圍竹尾烟但得幽情關水石何煩隱跡痼林泉客中正有塵纓在來此淸遊亦是緣晩思客路悠悠强自安亦因吟事可相寛小窗過了廉纖雨細與東風說晩寒開爐次夕以不禁離抱來訪宏菴挑燈細語漏促忘歸卽事有賦時黄澹翁在焉客裏情懷不自如夜深來訪子雲居挑燈細按新翻曲拂案同看舊架書梧葉敲風蛬砌冷菊香消雨鶴庭虛相逢且與開眉笑莫遣吟邊酒琖疎以上芸隱横丹藁龔炳炳字文伯高郵人閒詠年踰八袠雪蒙頭時對親朋話舊遊萬事無心閒日月一杯有味小公侯癡兒麁爾逃譏議家訓從來戒克掊世道漸難宜勇退爲吾閒早理松楸陳郁話腴鄒登龍登龍字震父臨江人有梅屋吟眞西山跋鄒君之詩言造理句入律金至百鍊而精珠穿九曲而巧戴石屏跋讀震父詩巻如行春風巷陌見時花游女動人心目多矣使其加以苦心進進不已野夫它日當避三舍題杜少陵草堂圖背郭好林塘誅茅作草堂因吟白鵶谷爲卜碧雞坊籠竹和烟靜江梅帶雪香四松經喪亂閱世幾風霜梅花約臂金寒拓綺疏搔頭玉重壓香酥含章簷下新妝額試啟菱花得似無王氏山居聞道山居好林深逺俗情茶烟熏壁暗蘿月射窗明學稼脩禾譜栽花識藥名無人覺幽隱爲有讀書聲以上梅屋吟余觀復觀復字中行旴江人有北窗詩稾次韻橊蔟殷紅竹迸靑風驚檐玉一時鳴晩來幽趣無人解流水聲中看月行北窗詩稾左瀛瀛字睿之黄巖人緯元孫咸淳初卒有委羽續集妾薄命妾貌微微改君恩漸漸疎本期爲匹鳥深恐作前魚卻月無心畫香雲信手梳佳人多薄命不必重欷歔黄巖英氣胡子期子期黃巖人理宗時太學生訪開公不遇獨歩小菴淸憑軒數曉星霜華連野白山色滿門靑風定松猶響香銷室自馨孤雲何處宿案上掩蓮經黃巖英氣李景雷景雷號小幘翁黃巖人和宋伯仁韻自笑馮唐老未侯短衣匹馬異鄉遊臥聞破屋蕭蕭雨坐聽西風葉葉秋鄴下巳非公幹在周南徒歎子長畱丈夫蓋世英雄氣肎學世間兒女愁黄巖英氣宋詩紀事巻七十二
