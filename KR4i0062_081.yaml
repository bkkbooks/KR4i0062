body:
  text: 宋詩紀事卷八十一錢塘厲鶚撰鄧牧牧字牧心錢唐人與謝翺友善歲丙申至山陰王修竹延致陶山書院已亥入洞霄止于超然館住山沈介石為營白鹿山房居之與葉林為深交林坐蛻踰月牧亦無疾而化所著有洞霄圖志遊山志雜文稿名伯牙琴衆稱曰文行先生九鎖山十詠存三首棲真洞何年采真遊遺此棲遁迹流泉金石奏伏鼠霜雪色浮世幾興亡殘棊耿苔石龍洞老龍山中居出山作霖雨風雲幾聚散田野正辛苦神仙地位高使爾司下土仙人隱迹至人猶神龍變化不可測隆然七尺軀印此一片石我行半江海空飛杳無迹洞霄詩集寄友我在越君在吳馳書邀我遊西湖我還吳君適越遙隔三江共明月明月可望佳人參差笑言何時寫我相思知君去掃嚴陵墓祇把清尊酹黃土浮雲茫茫江水深感慨空勞弔今古孤山山下約陳實聨騎須來踏春色西湖千樹花正繁莫待春風吹雪積有酒如澠有肉如陵鼓趙瑟彈秦箏與君沉醉不用醒人生行樂耳何必千秋萬歲名吳禮部詩話湯仲友仲友初名益以字行更字端夫吳郡人學詩于周弼晚號西樓有壯遊詩集弔葛嶺賈秋壑故居檀板歌殘陌上花過牆荆棘刺簷牙指揮已失鐵如意賜豫寧存玉辟邪敗屋春歸無主燕廢池雨産在官蛙木棉菴外尤愁絶月黑夜深聞鬼車山房隨筆盧熊蘇州府志云湯仲友過賈相宅一篇最為人所稱留題惠山寺梁溪停短棹帶月步西關路盡忽逢寺松多不見山巖腰雲殿古洞口石泉間到此政吟苦秋聲滿樹間惠山集西湖山色波光步步隨古今難畫亦難詩水浮亭館花間出船載笙歌栁外移過眼年華如去鳥惱人春色似遊絲六橋幾見輪蹄換取樂莫辭金屈巵西湖遊覽志虎丘虎是何年踞名存迹已亡塔從林外出山向寺中藏池暗生寒氣臺荒受夕陽更無人道古來祇為春忙虎丘志遊洞庭寒色滿空山翛然一徑間鳥啼黃葉外人度翠峯間古殿藏雲氣唐碑帶蘚斑未窮幽絶處興盡忽思還震澤編趙棠棠字國炎弔瓊花名擅無雙氣色雄忍將一死報東風他年我若修花史合傳瓊妃烈女中山房隨筆揚州瓊花天下祇一本士大夫愛重作亭花側扁曰無雙德祐乙亥北師至花遂不榮趙棠國炎賦絶句弔之李坦之坦之字道坦錢唐人生宋季早歲入洞霄宫學文于高士鄧牧心為所稱許杜鵑行吾聞昔有蜀天子化作冤禽名杜宇一身流落懷故鄉萬里逢人訴離苦西來縱呼巫峽間楚臺花落青春闌臺中魂夢久寂寞行雲日暮愁空山明朝復向瀟湘發北叫蒼梧江竹裂竹間之淚花上血怨入東風俱不滅天涯無窮朝暮啼王孫草緑不思歸哀哉王孫終不歸江南江北楊花飛寄吳正傳拂袖行歌歸故鄉相思又是一星霜夢回江上秋楓杳愁入天涯春草長書問久淹嗟契闊詩章時讀慰凄涼知君亦有逍遙興肯學征鴻為稻粱送人歸嚴陵並寄吳正傳官車一兩馬並馳送君朝出城門西投觴誓河以為别東流到海無還期雲間挂冠歸故里河上停帆謝遊子不願松江食巨鱸甘向桐川釣寒水子陵昔釣川之側百尺高臺猶屹立斜日歸舟繫石根稽首清風無愧色金華洞天深且幽神仙牧羊松下遊故人吳君仙者儔高卧巖屋秋浮浮兹山相鄰邇睦州山翠俯壓城南樓吳君之家某水丘尺書欲煩親手投一見足寫平生憂白鷂子歌淮西猛士高將軍新獲驍禽被涼素調之弗顧情未狎跨馬臂出城東去征鴻作字雲邊斜聳身直上誰能遮天寒日暮望不見北風萬里吹瑶花雲飛忽斷鴻飛郤短草長煙際沙漠但餘孤色搖清秋未許纖毫生碧落歸來珍衛不解韝親手餧肉供飢喉英雄遇合固有分可惜驚塵俱雪頭李白酒樓歌緑楊酒樓春水涯白也繫馬樓東家千金醉盡不復顧猶吹玉笛引吳娃日斜樓外東風起春愁滿眼楊花裏高歌一曲下樓去傳遍江南數十里錦袍緑水迷蹤迹月落空梁照顔色江頭盡日不見人樓上幾年無此客倚闌仰看西飛雲胡為不飲愁其身即今寂寞千年後誰酹青青山下墳句落日中原小悲風易水寒凡物皆歸土深山始見天落葉城南草緑王孫去江上花飛燕子來清江百曲秋花底漁火孤村暮雨中芙蓉水碧雙鳧冷苜蓿秋高萬馬肥以上吳禮部詩話吕徽之徽之字起猷號六松台之仙居人遁迹不出操行極高詠雪用滕字韻天上九龍施法水人間二鼠齧枯藤鶩鵝聲亂功收蔡蝴蝶飛來妙過滕復請曇字韻又賦萬里關河凍欲含渾如天地尚函三橋邊驢子詩何惡帳底羔兒酒正酣竹委長身寒郭索松埋短髮老瞿曇不如乘此擒元濟一洗江南草朩慙輟耕録徽之長於詩宋亡隱居萬竹山中樵漁自給一日大雪攜楮幣易粟富家聞其分韻賦詩有得滕字者苦吟不就徽之笑曰何不舉滕王蛺蝶事衆迎入請成之援筆而就又請賦曇字韻隨筆書訖徑出問姓字不答與之粟曰吾豈受不義者必欲易之刺船而去遣人尾其後路甚迂僻雪霽往訪唯草屋一間忽米桶有人乃徽之妻也因天寒故坐其中詬所之曰捕魚溪上詣之吕方檥舟隔岸遙揖曰諸公曷先如舍遲我乎少選徽之攜魚換酒歸盡歡别它日復往已逸莫知其處冬日斗室蕭蕭日晏眠疏狂唯與懶相便尋常甲子無心記看到梅花又一年台州府志劉彥章彥章吉水人宋亡後與劉桂隱劉申齋講學有詩名題廬陵義士傳淮海風回吹血腥青原不改舊時青中朝將帥論功賞不及江南一白丁題新淦劉貞女傳百年節義仗英豪一死翻憐女子高不敢高歌題卷上轉喉恐觸舊官曹以上吉安府志胡貫齋貫齋廬陵人挽文山裂指秋風感别離乾坤人物太奇奇生為孝子忠臣勸死結皇天后土知萬折江流魚腹石千年人立首陽碑一門史氏春秋筆愁絶湖光入畫時庶齋老學叢談洪平齋挽疊山千古精忠日月光恨無麟筆寫堂堂還家恥作梁江總辟穀誰知張子房後死十年應有待輕生萬里故非狂有兒可拾江邊骨須信人亡道不亡疊山集附趙澗邊挽疊山西山東海莫容身芒屨蕭蕭萬里塵去住更無寬歲月死生惟有一君親丹心故國紅雲冷白骨他鄉塞草春不是回頭春已暮至今猶説似癡人疊山集附翁森森字秀卿號一瓢台州仙居人宋亡隱居教授有一瓢集四時讀書樂山光照檻水繞廊舞雩歸詠春風香好鳥枝頭亦朋友落花水面皆文章蹉跎莫遣韶光老人生唯有讀書好讀書之樂樂何如緑滿窗前草不除新竹壓簷桑四圍小齋幽敞明朱曦晝長吟罷蟬鳴樹夜深燼落螢入幃北窗高卧羲皇侣只因素稔讀書趣讀書之樂樂無窮瑤琴一曲來薰風昨夜庭前葉有聲籬豆花開蟋蟀鳴不覺商意滿林薄蕭然萬籟涵虛清近牀賴有短檠在及此讀書功更倍讀書之樂樂陶陶起弄明月霜天高朩落水盡千崖枯炯然吾亦見真吾坐對韋編燈動壁高歌夜半霜壓廬地爐茶鼎烹活火一清足稱讀書者讀書之樂何處尋數點梅花天地心仙居縣志陸正正字行正號率齋居士嘉興之武原鄉人精於律吕象數之學元世祖遣程文海至江南訪求賢士稱疾不出後復與劉因同徵不赴隱居教授以終門人私諡曰靖獻先生古意結褵事君子誓作形與影人事多乖離彼此暌燕郢尺書沈素鱗啼鵑催逝景妾命詎終薄君心那得冷開簾花撲面淚落紛如綆柘上遺詩潘音音字聲甫天台人宋季躬耕不仕築室南洲山中詔徵天下遺逸廉訪使檄贊之行固辭有待清軒遺稿有所思中心有所思蹙損雙蛾眉美人竟長往使我歎離居寂寞就孤枕強眠誰得知夜深清露重飛夢欲何之覺來日遲遲分照上羅幃妝臺理雲鬢種種盡成絲山中寄友人我來卧白雲潭影清華髮經歲無稻粱侵晨采薇蕨峯頭天籟鳴隴上樵歌發還擬醉濁醪與君弄山月悼楊侍郎屈指漢遺老如君復幾何鳳池冠劒近鈴閣典章多國已成禾黍人還隱薜蘿那堪川上水東逝乏回波山居阻雨霏霏風雨暗郊原有客含凄獨掩門山鬼嘯雲移峭壁毒龍將海浸孤村愁來自灑青楓淚戰罷誰招絶漠魂繭足空齋無一語不因岑寂怨黃昏聞鵑子規聲切月輪斜起望諸陵憶漢家婦女尋芳渾不解鬢雲爭插杜鵑花以上待清軒遺稿凌嵒嵒字山英號石泉華亭人少習舉子業宋亡即卷處一放于詩有古木風瓢集題機山六峯喬木鎖雲根青接平原數里村此處無人來聽鶴海靈山鬼哭黃昏松江府志汪斗建斗建淳安人生宋末有雲留小稿錢唐懷古江上城低煙樹紅江潮西去幾時東吳宫花草隨春暮禹會樓臺入夢空萬里孤雲留夕照千年遺恨訴秋風鳳凰飛去無消息漠漠遙岑煙雨中嚴州府志黃超然超然字立道號壽雲黃巖人秋夜秋近園林風露涼蟲聲無數出頽牆前朝舊事過如夢不抵清秋一夜長黃巖英氣陳古遇古遇平江人元俞焯稱其詩高古無宋末氣不嫻于時志怪沈沈萬仞淵下有驪龍珠佩之壽松喬售之冨侔都貪夫臨淵羡重利輕微軀百金不龜藥千金水犀珠丹砂與翠羽陸産海所無齎裝濤浪中巨闕光炯如粲粲兩青童駢肩何所須再拜上珠翠敢問龍起居青童粲玉齒雲龍臥元虗為君窮珠山鞭雲取長驅雲急風更惡蒼梧來時徐丹藥兩須失哀哉飽鯨魚俞焯詩詞餘話云立意高遠不在建安黃初下馬别主馬别主兮涕泗霑臆士别主兮喜見顏色于嗟馬兮胡戀而駐于嗟士兮胡棄而背詩詞餘話云哀忱悽斷足以警世俗連文鳳以下月泉吟社文鳳字伯正號應山三山人杭清吟社入月泉吟社第一名託名羅公福黃灝月泉吟社序浦江吳渭字清翁號潛齋宋時嘗為義烏令元初退食于吳溪延致鄉遺老方韶父與閩謝臯羽吳思齊主于家始作月泉吟社四方吟士從之三子者乃為其評較揭賞云又送詩賞小劄序月泉社吳清翁盟詩預于丙戌小春望日以春日田園雜興為題至丁亥正月望日牧卷月終結局收二千七百三十五卷選中二百八十名三月三日揭榜第一名公服羅一縑七丈筆五貼墨五笏第二名公服羅一縑六丈筆四貼墨四笏第三名公服羅一縑五丈筆三貼墨三笏第四名止第十名春衫羅一縑筆二貼墨二笏第十一名止二十名各深衣布一縑筆一貼墨一笏第二十一名止三十名各深衣布一縑筆一貼第三十一名止五十名各筆一貼墨一笏吟箋二沓春日田園雜興老我無心出市朝東風林壑自逍遙一犂好雨秧初種幾道寒泉藥旋澆放犢曉登雲外壟聽鶯時立栁邊橋池塘見説生新草已許吟魂入夢招評云衆傑作中求其粹然無疵極整齊而不窘邊幅者此為冠馮澄澄字澄翁號來清義烏人月泉吟社第二名託名司馬澄翁前題編闌春思倩吟鞭著面和風軟似綿黃犢烏犍秧穀候雄蜂雌蝶菜花天把鉏健婦踏煙壟抱甕丈人分野泉忙事關心在何處流鶯不聽聽啼鵑評云起善包括兩聨説田園的而雜興寓其中末語亦不泛梁相相字必大杭人月泉吟社第三名託名高宇前題膏雨初晴布穀啼村村景物正熙熙誰知農圃無窮樂自與鶯花有舊期彭澤歸來唯種桞石湖老去最能詩桃紅李白新秧緑問著東風總不知評云前聨妙於紐合後聨引陶范不為事縛句法更高末借言雜興的是老手又梁必大杭人武林九友會月泉吟社第十三名託名魏子大麥疇連草色蔬徑帶蕪痕布穀叫殘雨杏花開半村吾生老農圃世事付兒孫但遇芳菲景高歌酒滿尊評云前四句詠題後乃述意末二句亦不離春興格韻甚高五言中未易多得劉應龜應龜字元益號山南義烏人月泉吟社第五名自署山南隱逸前題獨犬寥寥晝護門是間也自有桃源梅藏竹掩無多路人語雞聲又一村屋角枯藤黏樹活田頭野水入溪渾我來拾得春風句分付沙鷗莫浪言評云此卷七言凡六首律細韻高如耕餘樹有牛磨癢稅足溪無人照瘢青春卻付鳴鳩管白日全輸臥犢間此等語敻未易及鼎嘗一臠餘可槩知