桐江人月泉吟社第三十九名自署樵逸山人前題村居只是舊衣冠北墅南園熟往還雨外泥深牛觳觫花邊風暖鳥間關躬耕自得莘郊樂日涉誰知陶徑間只説桑麻元自好不須釋耒歎時艱評云全篇辭氣雍容末韻哀不傷怨不怒深得詩人之旨陳公凱公凱字君用號月泉竹臞吟社第四十名自署柳圃後為月泉書院山長前題春風冗我田園務野思芳情約不齊檢點瓜丘仍芋壠按行桑墅更秧畦偶陪靈運山前屐或學東坡雨外犂薄暮倦歸專一事旋誅生菜甕黃齏評云詠雜興甚工但失之刻露然其好處亦在此又第四十六名託名陳鶴臯世事不挂眼寄情農圃中鉏犂衝曉雨杖屨立東風芽穀驗仁脈澆花趲化工獨餘真意味濁酒自燒菘評云前聯平後聯有思索俞自得自得號吟隱金華孝順鎮人月泉吟社第四十二名前題暄和春景好供詩日暖風輕土脈肥白鷺時窺秧刺刺黃鶯頻説柳依依幾回野水聞姑惡數樹春陰叫姊歸物態滿前看不足等間吟詠對斜暉評云語新而對巧所謂多識于鳥獸草木之名但末二句不過敷演起句耳王進之進之建德人月泉吟社第四十七名自署臨清前題桑田滄海幾興亡歲歲東風自扇揚細麥新秧隨意長間花幽草為誰芳午橋蕭散名千古金谷繁華夢一場滿眼春愁禁不得數聲啼鳥在斜陽評云有悠長味無艱澀語後半篇視前略不及又第四十九名自署王進之東君私我此身間脫卻青衫野服更桑可以絲麻可績麥宜續食韭宜羮分甘壟上耕雲隱夢不湖邊拾翠行物意豈知滄海變曉風依舊語流鶯評云以雅健語寫高潔操悠然之興見于篇末陳希聲希聲義烏人月泉吟社第五十名託名元長卿前題回文二首存一香紅眩眼纈蕤英竹杖扶吟縱步行桑眼蟇含青蕾小麥鬚蝦磔翠芒輕黃花菜圃午風軟緑水秧畦春野平芳樹幾聲鳩雨過蒼蒼柳色弄煙晴評云回文二首俱妥順亦出苦心又第五十一名託名聞人伯仲三首存一田園興在早春時眼纈生紅喜上眉門巷日高人掃雪池塘煙漲水流澌杯柈新歲歡同社燈火元宵鬧古祠野老告余春事及夜來小雨過前陂評云三春分作三首曲盡變態非茍為敷演者所能及戴東老東老月泉吟社第五十二名前題飲了椒盤收了燈翁攜稚子步新晴茅柴初熟勝臘醞萊蔔久齏宜晚羮伏卵雞留上春種出欄牛試吉辰耕去年官賦今年罷寂甚門前犬吠聲評云狀三春之景得處亦多起頭一句欠嚴重陳文增文增苕水人月泉吟社第五十四名前題熙熙壠畝扇和風蔟蔟人煙野意濃培溉桑麻沿汲路徑行薺麥省耕農飮牛澗暖山搖影接果枝青蘚拆封酒熟花香村欲社芒鞋藤杖儘從容評云起見題意兩聯中五六尤工月泉吟社摘句圖無機老農云名利有危機老于農圃宜子問云驅卻餘寒碎土牛田園生計又從頭田農夫云桃李場中巳免參只將農圃繫頭銜唐人機軸云風暖柴荆鳥語幽麥高麻矮野桑柔以上起句忘懷老人云寸地不可棄東風何處無五雲山人云種瓜思夏實分菊待秋花老農云幸存耕雨地況值養花時劉存行云麥苖花下緑犢子草邊黃石姥寄客云水暖眠秧珥風香豎茗旗雙澗云雨露桑麻深夜話清明花柳少年心雲水云晴雨花時遊子意寒暄秧信老農心白雲人云犢外醉分芳草臥鶯邊吟踏落花行傅宣山云生意滿腔秧出穀飛花有思柳飄絲自家意思云耕鋤曉雨有餘地應接東風無暇時柳耆云野犢正忙犂曉雨谷鶯才出管東風俞如山云鳥隨牛後窺秧穀蝶趁蜂來戀菜花跨犢者云有酒便嘗烹筍蕨無花聊自賞桑麻清溪叟云社近記穿黃繭子雨前趲摘紫槍旗山野人云鶯藏楊柳金歌舞蝶宿梨花雪夢魂盤隱末子云桃林我憶放牛日葵圃誰思逸馬時扶杖夫云一生甘作扶犂手萬變寧移抱甕心廷雲云蛙鳴暮夜官何為蝶戀芳菲夢不知翁自適云鴉趁犂翻爭啄食蜂黏絮落苦貪香郭建德云煙連草色迷平野雨趁鳩聲過别村駱侕賔云烹罷籜龍新上箸修來秧馬尚依牆陳帝臣云清曉蛙聲引啼鴂夕陽牛背立歸鴉晚靜云牛飮芳陂鴉立背馬過秀野蝶隨蹄竹蓑笠翁云蠶一二眠催出伏秧三四葉尚憂風俞野處云郎罷耕歸呼囝牧阿翁眠起問姑蠶以上聯句藍田道人云晴原望新麥一片緑雲香林泉生云桃李公門者將蕪胡不歸傅九萬云笑他思著蓴鱸者卻感秋風始去官以上結句月泉吟社鄭協溪橋晚興寂寞亭基野渡邊春流平岸草芊芊一川晚照人間立滿袖楊花聽杜鵑錢唐晚望錢唐江上夜潮過秋靜寒煙白露多吳越青山明月裏舟人齊唱異鄉歌以上天地間集徐直方直方字古為觀水滄江無盡水夜夜隨潮去若復作潮來滄江止不住天地間集何新之新之字仲德號橫舟西安人仕至樞密院編修官後知忠安軍死節有詩林萬選秋夜泛舟飛星曵寒影野水淡碧空人生定何物扁舟空影中何年有宇宙生此木末風有力不向上難到蓬萊宫空攀棲鶻巢搔首如飛蓬俯仰慨今昔此懷安可窮天地間集王仲素仲素號石髓歸去詞種松雨濯髮折筍春墮指長嘯歸去來滄江一天水天地間集何天定天定號菊屋散策孤坐忽不樂出門聊散行溪喧亂人語樹偃礙農耕雨徑莓苔積陽坡草朩明道逢九十老相對話承平天地間集王曼之曼之號野處西窗西窗枕寒池池邊老松樹渴猿下偷泉見影忽驚去春日郊行出門逢柳色忽過野橋西坐石看潮長隔花聞鳥啼地隨芳草盡樹與夕陽齊不是桃源路行人亦自迷以上天地間集范協協號觀山年年年年如燕一還家又訪幽居過水涯風雨滿城春欲暮山中猶有碧桃花天地間集吳子文子文號東窗訪隱者不遇道人入山訪道人山深俗朴雞犬馴道人不見道人去􅧑毶草木無邊春天地間集韓竹坡采菊擷我百結衣為君采東籬半日不盈掬明朝還滿枝悠然何處是千古正如斯天地間集唐涇涇字清父道州龍山人甲戍客臨安時賈似道當國金谷煙花醉未醒鼾邊無夢到功名十郎腹裏長函劒六丈胸中舊貯兵天豕星沈狼有影海鰌風緊鶴無聲如聞浩浩愁相訊何日衣冠樂太平江南紀事吳山一髮暮雲孤愁向湘纍訊故都鳳去只餘韶樂在雁來還有帛書無杏壇有客陳孤注平隴何人復五銖歌徹黍離風雨惡南山深處叫烏烏廣亡徙海箕冠如櫛擁旄旌誰執騂毛歃晉盟遵海而南關氣數渡江以北少功名火旗暗靄雲藏闕水陳周遭雪壓城一榻不容人鼾睡那知霧島是神京崖山亡萬里輿圖入朔方搖搖孤注海之陽石尤風惡雲藏軫天駟星沈月掩房島上有人悲義士水濵無處問君王羲和指著烏飛路去去虞淵暮色蒼以上忠義集彭秋宇乙亥紀聞羽書朝暮漲氛埃天詔勤王起草萊塞上風高鷹揚去江頭霧暗馬飛來諸賢忠愛謀安出四將英靈喚不回漠漠雲天秋萬里飛鳴無數雁鴻哀秋興二首沙塵破褐客秋風落落親朋半老翁野曠有時聞嘯虎天寬無處寄征鴻四方玉帛燕山北萬里帆檣海水東回首可憐歌舞地方花石礎樹陰中西風卷地送凄涼目斷歸帆落日黃雁過江天雲漠漠龍遊滄海水茫茫故人入夢三更月近事驚心兩鬢霜試把濁醪澆磊磈尊中猶帶芷蘭香以上忠義集劉麟瑞麟瑞號如村南豐人有昭忠逸詠西和知州陳公寅守將楊公鋭陰風蕭颯起黃埃鐵騎追奔動地來石堡梯空天險北水門釁隙殺機開不期溟海鵬千里自守封疆鴆一杯四十萬民登鬼録伊誰為使哭聲哀階州守臣董公鵬飛相傳報怨撼階州虎旅飛來睨敵樓楛矢蔽空天入暝鵝車衝壘地生愁金城魚肉千年恨闔境衣冠六日休莫怪傳家猶強項雲孫忠節更風流丞相江公萬里知府江公萬頃名重天閽侍太微昔年南國秉樞機人歸緑野身猶健兵滿紅塵世巳非止水亭前風淅淅鄱陽城外草依依棣華相映人間瑞節惠隆名世所稀丞相信國公文公天祥金字牌飛出建章鬱孤萬壘為勤王驅馳嶺海君臣寓囚繫燕雲道路長六籍一時光日月孤忠千古立綱常全歸凛凛渾生氣南北人誇姓字香湖南安撫知潭州李公芾平楚樓頭矢石驚焚香稽首别宸京盡殲妻子期全節寧死封疆不忍生煙焰張空隳趙璧旌旗倒影下湘城善刀人在同觀化名與澄江一樣清江東運判趙公淮妾某氏石頭城昔號金湯岌岌孤墉戰馬場西日突圍逃溧水南冠荷校説維揚血凝漢節誇男子身寄秦淮藉女郎千載妾身貞更潔仰天哭向水雲鄉淮東制置使李公庭芝淮海曾聞一偉人十年臥護息邊塵重來鐵騎攻城急旋執金戈赴陳頻夢入甌閩期立極路遵通泰倏捐身平山堂下悲風起魂繞瓊花萬樹春參政高公應松腸斷吳山錦繡叢六更聲絶海潮空千門鎖月移行在八駿乘風憩會同扈蹕孤臣慙主辱征鞍萬里哭途窮兩宫緩緩趨朝陛回首天南獨死忠丞相陸公秀夫八面兵威八面攻馮夷飛血洗千篷波翻水寨乾坤震風仆檣旗社稷空百辟散班奔鷁首孤臣扈蹕憩龍宫茫茫南國重回首一片丹心照海紅樞密張公世傑曾擁貔貅奏凱歌崖山雲暝竟蹉跎地空九有棲荒服寨列千艘保海阿龍躍璽沈天若此烏嗚矴絶事如何鯨波沃日炎光熄凜凛英魂尚枕戈江東制置使謝公枋得草履麻衣漫蔽形十年賣卜慣零丁願從楚地師龔勝欲向遼城友管寧采石吟成期絶粒娥碑讀罷棄餘齡一門盡節均無愧千載西山疊疊青少主納款天目山崩厯數終降幡揚揚出孤墉六龍捲霧歸三島八座迎風啓獨松塵掩玉階消王氣潮移雪屋示軍容由來興廢天難問斷礎頽垣泣曉蛩以上昭忠遺詠宋詩紀事卷八十一
