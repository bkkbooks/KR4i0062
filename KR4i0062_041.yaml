body:
  text: 宋詩紀事卷四十一錢塘厲鶚撰王晞韓晞韓興化軍人宣和六年進士紹興間樞密樓照宣撫關陜辟為屬改京秩朝廷欲借兵西夏犄角金人差管押生蕃三百餘口歸夏國道無疏虞纍遷大理少卿方庭實宣諭陜西贈以詩晞韓和之時秦檜方主和議誣以他獄欲置之死上閔其勞移潯州赦歸卒和方廷實見贈誰憐定逺不生還驛騎翩翩出漢關未肻西風回馬首要傳飛檄過千山莆陽文獻張闡闡字大猷永嘉人宣和六年進士高宗朝纍遷宗正少卿孝宗朝遷工部尚書顯謨閣學士奉祠卒諡忠簡奉祠後作八請犯天顔今朝出漢關渾如倦飛鳥日暮傍巢還合璧事類後集王之道之道字彥猷號相山居士無為軍人宣和六年進士建炎中保山寨攝鄉郡尋以議和忤秦檜晚起漕湖南官樞密使有相山集蒙城早行蒙城在應天府汴河西上入京路殘月千家閉荒城萬木號舉頭華蓋近回睇啓明高野迥霜迎面風清冷透袍十年河上路從此步金鼇瀛奎律髓繡溪畫橋雕檻接招提新有幽人傍繡溪千頃波明天上下兩奩光映水東西飛樓湧殿參差見古木修篁咫尺迷此景此時君信否緑楊影裏囀黃鸝廬州志詹度度宣和中資政殿學士同知燕山府送宣撫童貫平燕班師長途春色送英雄滿目江山映日紅劒戟夜搖楊桞月旌旗曉拂杏花風行時一決平戎策到後須成濟世功為報燕山諸將吏太平取在笑談中三朝北盟會編蔡柟柟字堅老南城人嘗為宜春别駕宣和以前人歿于乾道庚寅曾公卷吕居仁輩皆與倡和有雲壑隱居集浩歌集泊釣臺高臺百尺凌空碧維舟夜久霜月白癭木窣窣搖枯藤寒瀨潺潺落蒼石先生退隱知幾年漢家鐘鼎徒凌煙高風千古磨不盡山水照映長明鮮我來俯仰慚羈旅衝寒愁怕玄冬暮此身不負白鷗盟暫此遲留亦何預起來搔首江茫茫孤篷卻逐雁隨陽人生遊行豈易得惟有此夕難相忘釣臺集登郡學稽古閣晚望簷外川原迥煙中草樹微山城暮吹角客子淚霑衣歲月經身老行藏與願違歸禽帶落日渺渺背人飛詠新荷堅老嘗謁韓子蒼令賦此詩朱闌橋下水平池四面無風桞自垂疑是水仙吟意懶碧羅箋卷未題詩以上西江通志陸元光元光字蒙老歸安人博學善吟詠宣和初為嘉興令後改晉陵詠蟬緑隂深處汝行藏風露從來是稻粱莫倚髙枝縱繁響也須回首顧螳螂庚溪詩話蒙老宰晉陵時州幕官有好讒謗同列者一日同會聞蟬蒙老即席賦此其人聞而少戢嘉禾八詠存二首金魚池池上春風動白蘋池邊清淺見金鱗新波巳縱遊魚樂調笑江頭結網人五柳橋五桞先生倦折腰孤眠千載仰風標青衫令尹頭如雪不厭朝昏過此橋至元嘉禾志鄭強強閩人宣和中萍鄉令化成巖城郭囂塵外江山勝槩中鏗然一灘水和以萬松風夾徑森竒石危亭納大空蒼巖不能語曾識贊皇公袁州府志程瑀瑀字伯宇饒州浮梁人宣和中太學試第一官屯田郎中謫監漳州鹽稅高宗朝纍除兵部尚書龍圖閣學士提舉江州太平宫卒有飽山集拜程剛愍公墓早從賔客傅青扉晚舉絲綸對紫微忠憤欲先同列死邊塵驚繞屬車飛墓間挂劒心猶在帳下談經事已非太學諸生皆白髮汪汪老淚溼征衣饒州府志公名振字伯玉樂平人少入太學徽宗幸學以右職除官纍擢國子司業兼太子舍人靖康元年以吏部侍郎尹開封金兵至及于難高宗立贈端明殿學士賜諡剛愍墓在樂平懷義鄉李芬芬宣和進士吳將軍元瑜丹青妙當世吳王命扁舟下海陵貌徐神翁像以歸故為詩敘其事以贈秦皇寤寐茅盈語鋭意長生欲輕舉徐福藥就仙骨成雲海茫茫但延佇東西日月秋復春海變桑田更幾人忽思重看舊寰宇驂鸞直下江淮濵布衣野叟不耕藝自向琳宫操祓篲祕語親書悟世人一坐忽驚三十歲淮南奉道聞真迹命使扁舟訪消息畫手從來獨擅長一見仙風心自得歸來目斷蒼煙垠三尺生綃醉墨翻軸上神翁不解語倣佛白鶴乘孤雲海陵相望一千里嗟我塵勞未云已授書圯上會有期誠心願取黃公履宣和畫譜黃次山次山字季岑豐城人宣和進士建炎中官吏部郎中提點湖南刑獄有三餘集田家春日緯竹梁溪面誅茅舍道傍臘收冰下紙春課社前薑露草牛羊長風花杖屨香人生但如此官獨為誰忙前賢小集拾遺趙良嗣良嗣本遼人馬植因童貫來降改姓名李良嗣薦于朝獻策伐遼賜國姓纍官延康殿學士光祿大夫以罪奪職靖康初戮于桞州宣和四年使金作朔風吹雪下雞山獨暗穹廬夜色寒聞道燕然好消息曉來驛騎報平安馬擴茅齋自序上京作建國舊碑邊月暗興王故地野風乾回頭笑向王公子騎馬隨軍上五鑾桯史趙良嗣絳人來降以能文為裕陵眷遇曾兼史局令續通鑑長編重和元年十二月推修四朝會要帝系后妃吉禮三類賞良嗣以參詳轉秩後坐誅余讀北遼遺事見良嗣與王瓌使女真隨軍攻遼上京城破有詩云五鑾乃上京殿名保機之故巢也劉佖佖宣和間為昌國尉投泄潭龍宫未躍天衢卧寂寥碧潭流溢海山腰埋藏頭角雖經歲際會風雲在一朝既若有心成變化豈能無意及枯焦神蹤許為蒼生起願擊香車上九霄延祜四明志李處權處權字巽伯洛陽人邯鄲公淑曾孫宣和間與陳叔易朱希真以詩名南渡後嘗領三衢有嵩菴集送二十兄還鎮江此行檢校幽棲事佳處知公故未忘新筍豈應過母大舊松想已及人長老來對客須靈照貧後持家藉孟光世亂身危何處是二年孤負北窗涼瀛奎律髓吳可可字思道金陵人宣和末官至團練使責授武節大夫有詩名孫仲益作汪彥章墓志云大璫梁師成用事小人朋附目為隱相武人吳可者師成許以能詩至出入臥內公罷符寶可過公致師成意曰聞名久矣幸不鄙過我禁從可拱而俟也公謝不注客曰吾曹望隱相之門如在天上召而不往何故公曰若使我與可輩為伍耶李端叔跋云思道詩妙處略無斧鑿痕字字皆有來歷病酒無聊病酒對殘春簾幕重重更掩門惡雨斜風花落盡小樓人下欲黃昏戲作冷語闕十八字思如冬露下紫薇花影中長哦白雪明光宫衆泉涌此萬卷胸春霽南國春光一半歸杏花零落淡胭脂新晴院字寒猶在曉絮欺風不肻飛以上墨莊漫録小醉小醉初醒過竹村數家殘雪擁籬根風前有恨梅千點溪上無人月一痕次韻劉元舉子規蜀魄悲鳴楚國春試憑清些與招魂柔腸欲斷雲橫嶺幽夢初回月挂村客舍花光隨野水故園桞色負柴門飽聞錦里無窮樂早晚歸來訪子孫遊清涼寺延步石城塢迢迢去興長野田耕晚雨寒樹倚斜陽載酒追狂客論才得漫郎無因遂高蹈時復借山房以上前賢小集拾遺贈戴彥衡病來謾喜折叉股老去尚懷雙脊龍他日扁舟會乘興摩挲圭璧小從容羅願新安志新安墨以黃山名數十年來造者乃在婺源黃岡山戴彥衡吳滋為最彥衡自紹興八年以薦作復古殿等墨其初降雙角龍樣是米待制元暉所畫繼作圭壁及戲虎樣時議欲就禁苑為窯稍取九里松古松為之彥衡以松生道旁平地不可用其後衢池工者載他山松往造亦竟不成彥衡未幾死嘗出貢餘一圭示米公米以為罕有其比詩人吳可贈詩云云句東風可是間來往時送紅梅一陳香優古堂詩話李方叔喜吳可小詩云云殊不知張藝叟酴醿詩亦云晚風亦自知人意時去時來管送香趙季西季西宣和間人丹青閣跨壑飛簷屋數楹上橫山色下溪聲等間題作丹青閣未必丹青畫得成方與勝覽在建寧府開元寺側元豐初太守石禹勤建宣和中趙季西命名且賦詩云章憲憲字叔度吳郡人宣和中監漢陽酒稅有復軒集吳郡志章甫字端叔自建之浦城徙居于吳崇寧初除都官郎中尋挂冠歸藏書萬卷讎校精密年六十二卒子八人憲其一也憲樂道好德操履高潔鄉里謂之隱君子其學師事王信泊而與朱子發吕居仁等遊嘗自作復軒記謂葺先人之廬治東廡之軒以貯經史百氏之書名之曰復以警其學其後圃又有清曠堂詠歸清閟遐觀三亭以慕古尚賢皆有詩登齊雲樓飛樓縹眇瞰吳邦表裏江湖自一方曲檻高窗雲細薄落霞孤鶩水蒼茫固知興廢因時有獨覺江山共古長回首中原正愁思不堪殘日半規黃題處士顧禧漫莊何許明人眼松間見古堂泉聲到棐几山影覆繩牀愛酒陶元亮聽蛙孔德璋紛紛戰蠻觸丘壑信難忘遐觀亭吾慕陶靖節處約而平寬涉園自成趣矯首復遐觀我亦散遊目俯仰天地間雲煙自舒卷湖嶺相回環永與形役謝豈有俗慮干想像斜川遊千載乃相關松江謁王文孺令宰暑退涼生過雨天鳧飛鷺浴暮江前秋風小浪鴨頭水斜日輕帆燕尾船青眼卻欣逢地主白頭相對聳詩肩林塘勝處開尊俎只欠冰輪特地圓以上吳郡志挽著作王先生蘋伊洛流風在丘軻道益尊遺經啓幽眇後學有淵源鑽仰知由户衰遲阻及門三年思晬面一旦絶微言西觀才黔突題輿卻佐州濟時卑管晏齎志在春秋曖曖孤雲沒沈沈厚夜幽升堂聞禮樂終覺愧程仇王著作集附連南夫南夫宣和末以太常少卿使金紹興中知泉州不附和議落職滴水巖滴水巖高路欲窮佩環聲響玉玲瓏一天星斗墮青漢萬斛珠璣瀉碧空滄海徑歸朝夕會曹溪不隔本源通何妨凝佇龕巖下更沐如來灌頂功廣東通志許安仁安仁字仲山襄邑人晚以特奏名得官調南劒州順昌尉許彥周詩話季父仲山所著厄竒集自序曰水激之以亂石則有聲麝藏之以褻器則馨齊不下者二城田單因而縱兵文獨不待厄而後竒乎和徽宗御製宫詞輕寒慘慘透衾羅玉箭銅壺漏水多常是未明供服御夢回頻問夜如何許彥周詩話夢中作山色濃如滴湖光平如席風月不相識相逢便相得許彥周詩話季父病中夢至一處泛舟環水皆竒峰可愛賦詩云云既寤而言之後數日卒植竹吏隱堂後因題珍重勞君慰逺遊繁聲疏影一堂秋主人看即官期滿分付風塵與子猷斸破中庭一畝苔主人白髮手親栽即今誰信清貞節須向三冬雪後來能改齋漫録題善山院瓦爐柏子裊殘煙午夢醒時一暢然不悟功名負終老荒山飢走又三年延平府志周邦邦海陵人居錢唐右文殿修撰知廣州穜之孫官迪功郎江東帥幕著政和大理入貢録次陳彥育遊鍾山韻雄壓吳頭控楚腰千峯環拱冶城橋黃旗紫蓋旋歸漢古剎淒涼尚號蕭郗后化蟒之地鹿苑院土人名為蕭帝寺北嶽經行匪濫巾相陪來現隱淪身春蘿秋桂還吾輩白浪紅塵付若人清波雜志范周周字無外文正之姪孫純古之子負才不羈安貧自樂所居號范家園中吳紀聞范周少負不羈之才工于詩詞不求聞達所居號范家園亭安貧樂道未嘗屈折于人盛季文作守時頗嫚士嘗于元宵作寶鼎現詞投之極蒙嘉奬因遺酒五百壺其詞每遇燈夕諸郡皆歌之巡夜絶句自古輕儒孰若秦山河社稷付他人而今重士如周室忍使書生作夜巡中吳紀聞方臘之亂郡中令總甲巡護雖士流亦不免無外率府庠諸生冠帶夜行首用大燈籠書一絶于其上郡將聞之亟為罷去題崑山絶頂萬疊青巒厭巨崑四垂空闊水天分夜光寒帶三江月春色隂連百里雲桂子鶴鳴空半落天香僧出定中聞不將此境憑張益三百年來屬老文中吳紀聞木香暖風吹麝入鉛華不肻隨春到謝家半夜粉寒香泣露也應和月怨梨花墨莊漫録范公稱公稱文正公之後著過庭録無題赤縣東城尉它年業舊儒老為知道馬中有報恩珠歲月侵餘齒風埃上短鬚賴逢同志友襟韻不相孤過庭録燕照鄰照鄰字明仲陽翟人隱居不仕絶句女騃兒癡十口餘進時無業退無廬一窗風雨韓城夜火冷燈青照舊書過庭録范仲溫仲溫字元實祖禹之子秦少遊之壻吕居仁之表叔學詩于黃山谷有潛溪詩眼鐵圍山叢談仲溫嘗預貴人家會有侍兒喜歌秦少遊長短句坐中略不顧及酒酣歡洽侍兒始問此郎何人仲溫遽起叉手而對曰某乃山抹微雲女壻也聞者為之絶倒句夷甫雌黃須倚閣君卿脣舌要施行紫微詩話陸宰宰字元鈞佃子官朝請大夫直祕閣贈少師施宿會稽志紹興十三年始建祕書省于臨安天井巷之東詔求遺書于天下首命紹興府録直祕閣陸宰家書來上凡萬三千卷有竒句奴愛才如蕭穎士婢知詩似鄭康成陸遊劒南集云先少師宣和初有贈朝公以道詩云云朝公大愛賞今逸全篇偶讀朝公文集泣而足之士不逢時勇退耕閉門自號景迂生逺聞佳士輒心許老見異書猶眼明奴愛才如蕭穎士婢知詩似鄭康成早孤遇續殘章涕已傾偏多感欲崔子方江上逢朝適道渺渺連江雨微微到面風主人留一餉佳士得相逢會面嗟何晚論詩許有功君家好兄弟更覺此心同宋文鑑田亘亘字元邈陽翟人與陳叔易崔德符菩建炎中以察官召卒江梅千林含凍鬱蒼蒼只有江梅獨自芳暗吐幽香穿别院半攲斜影入寒塘冰膚宛是姑仙女粉面端疑騎省郎若是蜜奴曾拂掠肻收紅豔貯蜂房瀛奎律髓元邈梅詩三首前二首云趁暖不隨千卉折凌寒先伴六花開臨流照影為誰好映竹無人空自憐皆佳惟用索笑事不叶故不録飛鳶旋旋晴空作鶻盤仰空誰不羡高間豈知盡日勞心眼只在塵寰腐鼠間瀛奎律髓此蓋譏相國寺前資寮僧而作其為人可知也王晉卿圖瀛山筆畫精緻京師貴遊蓄之為希代之寶自圖書棄擲于路陽翟張飛卿見而得之過九江以遺友人傅延之延之出以示余余悲而賦詩他日緘縢屬貴遊詎知遷徙過南州天涯與汝共淪落淚溼湓江煙雨秋清河書畫舫張茂宗茂宗徽宗朝知潭州留題衡嶽觀靈嶽峯前遊古觀此中何别蘂珠宫五雲仙客形皆異十洞煙花景不同鍊藥爐香金石氣醮星壇冷薜蘿風因聞大道修真訣咫尺三清路可通南嶽總勝集李先輔先輔廬陵人題朱陵洞水簾一片挂蒼崖分明不惹埃蹙成珠顆白垂下水簾來野燕飛難入山風卷不開聲聲去朝海無意戀巖隈南嶽總勝集蘇庠庠字養直澧州人伯固之子初以病目自號眚翁後徙居丹陽之後湖更號後湖病民紹興間居廬山與徐俯同召不起卒年八十餘有後湖集鶴林玉露紹興間養直與徐師川同召師川赴養直辭師川造朝便道過養直留飲甚歡二公平日對奕徐高于蘇是日養直拈一子笑視師川曰今日須還老夫下此一著師川有愧色清江曲屬玉雙飛水滿塘菰蒲深處浴鴛鴦白蘋滿棹歸來晚秋著蘆花兩岸霜扁舟繫岸依林樾蕭蕭兩鬢吹華髮萬事不理醉復醒長占煙波弄明月苕溪漁隱叢話東坡云此篇若置在太白集中誰復疑其非也後清江曲層波渺渺山蒼蒼輕霜隕木蓮葉黃呼兒極浦下笭箵社甕欲熟浮蛆香輕帆淅瀝鳴秋雨日暮乘流自相語一笛秋風萬事休白鳥翩翩落煙渚苕溪漁隱叢話賦王文孺臞菴王郎臞菴摩詰詩煙花繞舍江繞籬石渠東觀了無夢筆牀茶竈行相期古人已往不可作甫里顧有今天隨東鄰蟹舍肻著我請辦蓑笠懸牛衣中吳紀聞吳江王份字文孺自號臞菴嘗築圃于松江之側買樹作址計三百萬錢圃成極東南之勝蘇庠詩云云前題笛弄松江明月蓑披笠澤歸雲若道青霄快活五侯何處如君浮天閣玉蟾飛入水晶宫萬頃琉璃碎晚風詩就雲歸不知處斷山零落有無中秋落空江動碧虛黃蘆洲渚雁飛初我來欲訪鴟夷子為挂西風十幅蒲平逺堂桞外西風六幅蒲野塘睡鴨對舂鉏如何喚得王摩詰畫作江南煙雨圖吳郡志臞菴在松江之濵邑人王份有超俗趣營此以居圍江湖以入圃故多桞塘花嶼景物秀野名聞四方一時名勝喜遊之皆為題詩圃中有與間平逺種德及山堂四堂煙雨觀橫秋閣凌風臺鬱峩城釣靈灘琉璃沼臞翁澗竹廳龜巢雲關纈林楓林等處而浮天閣為第一總謂之臞菴份字文孺以特恩補官嘗為大冶令歸休老焉送子經歸臨安牛背行將老鷗沙盟已寒蓴鱸付張翰書札報任安古學飽胸次驚瀾翻筆端西湖十頃月留取醉時看宿飛來峰下吳中未歷佳山水湖上懷思去惘然雲去雲歸兩峯寺鷗飛鷗沒夕陽天客愁官渡落花雨歸夢下湖春水船想得對牀成夜話何須隴月向人圓以上咸淳臨安志題張公洞銅官之南山復山捫蘿絶壁苔蘚斑只今何處可容足乞我石房雲一間毗陵志德友近在咫尺乃不相過因成一詩十日已吹梅信風絶憐未許一尊同喜君不減習主簿愧我殊非龎德公德友求薝蔔花栽戲作小詩代簡問訊雲蘿小隱家剡藤醉墨半攲斜酒餘落筆已殊絶發興不須薝蔔花鐵網珊瑚紹興中建安徐詡跋云蘇公隱丹徒五召不起周君德友主縣簿願從之遊文書往來委曲如瑣求之古人未易一二也題塘塠山風漪軒竹隂既疏明流泉復清駛佳響聞山泉涼風淡然至幽人此安禪閲世一遊戲何必周八垠是中有能事至湖上沙晚水痕碧蕭蕭蒲葦秋鴻飛遵逺渚木落見滄洲藤杖吟還倚風簾行可休有懷誰共語暝色起林丘以上鎮江府志張彥智句兩岸更無通步路四時常有避風船咸淳毗陵志蔣三舍在宜興縣西洴浰四圍皆澤國宣和間張寶文彥智遇風寄宿贈以詩有句云云和者盈卷薛然答賈支使寄鶴瑞羽竒姿踉蹌形稱為仙馭過蒼冥何年厚祿曾居衛幾世前身本姓丁幸有逺雲兼逺水莫臨華表與華亭勞君贈我清歌侣將去田園夜坐聽合璧事類别集楊軒牡丹楊妃歌舞態西子巧讒魂利劒斬不斷餘妖鍾此根光華日已盛闌檻豈長存寄語尋芳者須知松桂尊合璧事類别集鄭鋼鋼宣和中承議郎題資州東巖徑轉得幽谷雲巖屹相向谽谺偃重簷彎環依疊嶂緬想融結初鐫鑱自天匠了無斧鑿迹但覺盤根壯深可數千尺廣逾八九丈洞穴既窈窕松門亦昭曠廓含三千界中列五百像巨楠布幢蓋翠蔓垂帷帳木靈不知名境幽或難狀我時馳征軺奔走倦塵鞅獲此一段竒欣然愜微尚欲去興未闌行行重回望名勝志宋詩紀事卷四十一
