body:
  text: 宋詩紀事卷十四錢塘厲鶚撰蘇舜欽舜欽字子美其先梓州人家開封易簡孫耆子舜元弟景祐中進士纍遷集賢校理監進奏院坐用故紙錢除名居蘇州買水石作滄浪亭以自適終湖州長史卒有滄浪集耆舊續聞蘇子美監奏邸舊例鬻故官劵以賽神因而宴客獨李定不預遂捃托其事言于中丞王拱辰御史劉元瑜迎合時宰之意興奏邸之獄一時英雋斥逐殆盡有一網打盡之語故梅聖俞有詩云一客不得食覆鼎傷衆賓蓋指李定也王直方詩話子美嘗作春睡詩云身如蟬蛻一榻上夢似楊花千里飛歐公見之驚曰子美可念未幾果卒淮中晚泊犢頭春隂垂野草青青時有幽花一樹明晚泊孤舟古祠下滿川風雨看潮生夏意别院深深夏簟清石榴開遍透簾明樹隂滿地日卓午夢覺流鶯時一聲王直方詩話黃山谷最愛此二詩纍書之或真草或大字送人歸吳江江雲春重雨垂垂索莫情懷送客歸不慣東流促回棹羡他雙燕逆風飛天平山吳會括衆山戢戢不可數其間號天平突兀為之主傑然鎮西南羣嶺爭拱輔吾知造物意必以屏大府清溪至峯前仰視勢飛舞偉石如長人肅立欲言路捫蘿緣險磴爛漫松石古中腰有危亭前對翠峰舉石竇迸玉泉泠泠四時雨源生白雲間顔色若粉乳旱年或播灑潤可足九土奈何但澄徹未為應龍取豫方棄塵中巗壑素自許盤桓擇勝處至此快心膂養內聊自清終勝甘於虎過蘇州東出盤門刮眼明蕭蕭疏雨更隂晴緑楊白鷺俱自得近水逺山皆有情萬物盛衰天意在一身羈苦俗人輕無窮好景無緣住旅棹區區暮亦行獨步滄浪亭花枝低攲草生迷不可騎入步是宜時時攜酒只獨往醉倒惟有春風知石林詩話姑蘇州學之南積水彌數十頃傍有小山高下曲折相望蓋錢氏時廣陵王所作既積土為山因以為池瀦水焉瑞光寺即其宅而此其别圃也慶厯間子美謫廢以四十千得之為居傍水作亭曰滄浪歐陽公詩所謂清風明月本無價可惜只賣四萬錢者是也子美既死其孤不能保遂屢易主矣道幽獨間放之趣苕溪漁隱叢話此詩真能長橋觀魚曙光東向欲朧明漁艇縱橫映逺汀濤面白煙昏落月嶺頭殘燒混疏星鳴榔莫觸蛟龍睡舉網時聞魚鱉腥我實宦遊無況者擬來隨爾帶笭箵苕溪漁隱叢話元次山集自釋云帶笭箵而畫船注云上郎丁下桑荒切竹器也故唐書音訓云讀作郎桑見結本集音訓又音上力丁下息拯切取魚籠也然廣韻集韻于庚清青三韻皆不收此箵字並于上聲迥字韻中收之蘇子美黃魯直秦少遊皆于青字韻中押真誤也秋日登閶門年光冉冉催人老雲物涓涓又變秋家在鳳凰城闕下江山何事苦相留以上滄浪集古今詩話子美自書此詩旁云江山留人也人留江山也卒不用亦詩之讖南園南園吳越廣陵王元璙之舊圃也歲久摧圯至元豐中猶有流杯四照百花樂堂惹雲風月等處西施臺下見名園百草干花特地繁欲問吳王當日事後來桃李若為言吳郡志句玉帳夜嚴冰似水茅齋春靜草如煙窮居和長安帥葉清臣見寄西清詩話江休復休復字鄰幾開封陳留人舉進士充集賢校理坐與蘇舜欽祠神會飲謫監蔡州稅久之復官歷刑部郎中修起居注卒有集詩話總龜江鄰幾善為詩清淡有古風蘇子美坐進奏院事謫官後死吳中江作詩云郡邸獄寃誰與辨臯橋客死世同悲用事精當嘗有古詩云五十踐衰境如我在明年江天資淳雅喜飲酒鼓琴圍棊人以酒召之未嘗不醉或不能歸即宿人家商度風韻陶靖節之比云江嘗通判廬州有酒官善琴以坐職不得出江旦旦就之郡中沙門道士及里畝能棊者數人呼與同往郡人見之習熟因畫為圖前列趨道一人騎馬青蓋其後沙門道士褐衣數人葛巾芒履纍纍相尋意思蕭散惜時無名手此畫不足傳後何減稽阮也歐陽公序云鄰幾學問通博文詞雅正詩尤清淡間肆可喜秋懷西風萬里至曠然天地秋暮雨生夕涼百蟲鳴啾啾楚山曉蒼蒼楚水亦悠悠騷人試登臨感物增離憂所思在遐方欲往路阻修香草有蕙茝嘉樹有梧楸白露委芳馨雕零使我愁窮年倦羇窘江湖思舊遊紉蘭製芰荷飄泛一葉舟肆情雲水間意適何所求同持國宿太學官舍翳翳雲月薄泠泠雪風清學省夜岑寂天街斷人行廣庭層閣隂尋廊步餘明松篠遞遙響如聞弦誦聲悠悠子佩詩講座塵埃生回就直舍休亹亹談道精心會境物融泯然遺世營寒眠屢展轉寤言寫素誠以上宋文鑑王官谷司空侍郎故居首陽采薇士商代緬以遐唐季有夫子遁世肥且嘉拔迹離汚險抗志凌青霞剝運扇頽風姦雄比回邪不然隨波流橫噬猰㺄牙吁哉土德衰暌乖鬼盈車英英夫子賢顯晦吾所嗟相見棲隱情遺文搴菁華山藏白駒谷水繞騷人家躊躇碧峯前寒日忽以斜王官谷集李絢絢字見素邛州依政人第進士仕為太子中允宰相杜衍拔置臺省坐讒出知潤州纍遷起居舍人權判吏部流內銓卒送天柱馮先生間馳風馭恣飄飄因失仙班幾度朝紫閣舊鄰秦樹老赤城新别海山遙飛鳧又説春經嶽叱橘曾令夜探潮不是桃源不歸去故人多半在煙霄洞霄詩集句收得桑榆歸物外種成桃李滿人間和杜相譜歷代吟王益柔益柔字勝之曙子仁宗朝用蔭至殿中丞除集賢校理坐蘇舜欽奏邸獄黜監復州酒纍遷知制誥兼直學士院以祕書監出知外郡遙題錢公輔衆樂亭四明舊説南湖好歲久瀕崖變塗潦建旟一日得賢侯千里山川真再造偃月隄成車馬道湖光如􅎒天如抱鴛鴦瓦影亂鳧鷖緑栁環隄花映島珠宫貝闕競來還泉客鮫人爭獻寶春風浩蕩波濤起髣佛仙人騎赤鯉金盤下箸飽鱸魚塵事茫茫隔煙水都人士女從如雲絲竹清音兩岸聞飲酣落筆歌緑水爛漫天葩飄逺芬延祐四明志張羣羣仁宗朝太常少卿謫袁州道中寄蘇子美憶昨共繫吳門舟我獨千里君獨留江花粲爾不同醉野月娟然增此愁談笑還令舌本強詩篇頓覺筆鋒柔滄浪書信無消息鴻雁來時數舉頭袁州府志鮮于侁侁字子駿閬中人景祐中進士乙科慶厯中遷祕書丞神宗朝為利州路轉運使元祐初拜左諫議大夫出知陳州卒紹聖間與黨籍有諫議集郡齋讀書志侁治經術有法論著多出新意晚年為詩與楚詞尤工人以為有屈宋風新堂夜坐月色皎然由連理亭信步庭中徘徊久之因為五言一首秋風動微涼天雨新霽後間齋獨隱几明月在高栁振衣步庭下皓氣入襟袖天空雲漢明隱約辨列宿蒼蒼松檜上零露霏欲澑脫葉滿間園繁華逮衰朽清宵望蟾彩宜付一杯酒多病謝尊罍城頭轉寒漏宋文鑑舜祠道歷山兮逶蛇思古人兮感慨並儲胥兮肅止仰魯雲兮暗曖獸何鳴兮林中鳥何悲兮山上木何為兮不翦草何為兮茂暢帝之神兮在天帝之德兮在人物具兮四海心精兮一純采秀實兮山間摘其毛兮澗底玉醴湛兮瓊茅肴修雜兮蘭茝樂備兮九奏鳳舞兮儀韶人駿奔兮如在君卒享兮神交兖州府志和文與可洋州園池千峯起華陽一水連天漢初月正沈鉤隱然飛兩岸湖橋城上望南園園深知幾許啼鳥聞間關遊人不知處南園琴躋積翠外絺結穹窿間軒楹最佳處四顧唯江山二樂榭春歸閬風家巧入天匠手能將五色雲點綴當戶牖披錦亭陕西通志吕溱溱字濟叔揚州人寶元元年進士第一纍擢知制誥知杭州拜翰林學士神宗朝官至樞密直學士提舉醴泉觀卒贈禮部侍郎米芾書吕溱事云溱為人簡倨每接賔客不過數言時人目為七字舍人句九霄離海嶠一夕過天池試鯤化為鵬東都事略仁宗見此句曰此當作狀元升為第一范鎮鎮字景仁華陽人居洛陽寶元元年舉進士為禮部第一纍知制誥英宗立遷翰林學士神宗朝歷端明殿學士提舉崇福宫封蜀郡公卒諡忠文有集東都事略鎮為文清麗簡逺少時嘗賦長嘯卻胡騎流傳契丹謂鎮為長嘯公迂叟詩話范景仁喜為詩年六十三致仕一朝思鄉里遂輕行入蜀故人吕才元大臨知梓州景仁枉道過之歸至成都日與鄉人樂飲散財于親舊之貧者遂遊峨嵋青城山下巫峽出荆門凡期歲乃還京師在道作詩凡三百五篇其一聨云不學鄉人誇駟馬未饒吾祖泛扁舟此二事他人所不用也仲逺龍圖見邀學射之遊先寄五十六言幾年魂夢寄西州春晚歸逢學射遊十里香風塵不動半山晴日雨初收指揮赤隊呈飛騎次第紅妝數勝籌夾道綺羅瞻望處管絃旌斾擁鼇頭送羅勝卿同年提舉玉局觀匹馬西歸去知君得意偏人情重鄉里官職更神仙曉後無衙鼓旬頭有俸錢何須駕白鶴辛苦上青天以上成都文類送張職方守筠州職方名正子公紀亦守衢州南國一麾守知公安此行家山雖萬里子舍只鄰城驛問中宵至風謡接畛聲定應持課最同命到天京方輿勝覽七夕翠幕瑶梯百尺樓樓前星斗自悠悠天家仙會能多少未到平明已别愁合璧事類前集再至史局史局逾年别重來已涕零先書未絶筆又欲汗新青合璧事類後集范蜀公少與栁耆卿同年愛其才美聞作樂章嘗歎曰繆其用心謝事之後親舊間盛唱栁詞復歎曰仁廟四十二年太平吾身為史官二十年不能贊述而耆卿能盡形容之黃葵開時間淡斂時愁蘭菊應容預勝流剩欲持杯相領略一庭風露不禁秋合璧事類别集韓太丞同守成都春色草將深春寒栁未隂青天指行棧緑水蕩離襟後乘何為託前旌喻此心南枝倦飛翼慿為寄歸音全蜀藝文志雞鳴臺在靈寶縣南齊田文客詐雞鳴度關處今人築臺古人惟恃衆心城何事秦皇苦好兵本設函關禁姦詐不知夜半有雞鳴河南通志和王都尉慣乘霄漢鶴翻説淤泥蓮可惜玉臺處等間間幾年式古堂書考王晉卿跋云公不喜釋氏故有是句亦可一笑也又云余前年恩移清潁道出許昌前途小阻留西湖之别館者幾一月常與韓持國范景仁泛舟嘯咏使人頓忘去國流離之恨也韓公德性溫厚風度高雅固已可愛范公雖老而精神不衰議論純正白須紅靣動輒醺酣時余有所賦詠公即取紅蓮葉命筆疾書初不經思佳詞麗句頃刻而成坐客莫不驚歎也比聞朝廷就除端明殿學士以寵之因思方今進任老成如公者若再起之亦足以厚風俗耳蘇緘緘字宣甫晉江人紳從弟寶元元年進士知雍州儂寇至嬰城以守城陷自焚死贈奉國軍節度使諡忠勇英德碧落洞此洞誰開鑿難窮造化原地幽疑窟室巖透若天閽蘚石髙低路樵聲裏外村雲嵐青欲滴煙壁翠堪捫一帶溪泉急千枝石乳繁鼠飛猶白晝虎嘯近黃昏老木吟風韻枯崖滲雨痕碧瀾秋寸寸寧負羽皇言清源文獻司馬光光字君實陜州夏縣人以父池任入官寶元初進士甲科纍除知制誥改天章閣待制知諫院英宗朝除龍圖閣直學士改右諫議大夫神宗即位擢翰林學士判西京留司御史臺拜資政殿學士哲宗即位拜左僕射兼門下侍郎薨于位贈太師溫國公諡文正有傳家集澠水燕談司馬文正公高才全德大得中外之望公之退十有餘年天下日冀其復用故子瞻獨樂園詩曰先生獨何事四海望陶冶兒童誦君實走卒知司馬蓋紀實也孤臣泣血録金人入汴駐青城索監書藏經如資治通鑑蘇黃文集之屬皆指名取索當時朝廷行下諸路盡毁坡谷著作姦黨傳會至欲焚資治通鑑賴有神宗御製序文不敢毁而敵國之敬重顧如此正公言行俱高然亦每有謔語侯鯖録司馬文嘗作詩云由來獄吏少和氣臯陶之狀如削瓜困學紀聞司馬公早朝詩太白明如李出漢天文志熒惑踰歲星居其東北半寸所如連李又即事云雨不成遊布路歸出左傳自朝布路而罷今集皆注云恐誤蓋不考也謝孫興宗惠草蟲扇吳僧畫團扇點綴成微蟲秋毫宛皆具獨竊天地功細者及蛛螫大者才阜螽枯枝擁寒蜩黃蘂黏飛蜂翾然得生意上下相追從徒觀飛動姿寧覩筆墨蹤兒曹取真物細校無不同恐其遂躍去亟取藏箱中乃知藝無小意精神可通不興誤圖蠅能感紫髯翁子猷狀蟬雀藏本傳河東不知古何如此畫今人雄僧亡已云久其徒頗能工舊法存百一要足超凡庸友人幸為賜物薄意何隆玩之不替手愛重心無窮常如對君子穆穆來清風送張兵部中庸知遂州劒嶺橫天古棧微相如重駕傳車歸雙親倚門望已久千騎踏雪行如飛人間富貴非不有似君榮耀世亦稀聞道西州遺像在使我涕泗空霑衣先人知小溪縣正版籍均賦役聞邑人誦之畫像猶存衆樂亭在鄞縣西湖中錢公倚所建橫橋通廢島華宇出荒榛風月逢知已湖山得主人使君如獨樂衆庶必深顰何以知家給笙歌滿水濵送章伯鎮知湖州江外饒佳郡吳興天下稀蓴羮紫絲滑鱸膾玉花肥星斗寒相照煙波碧四圍栁侯還作牧草樹轉清輝皇后閣春帖子慶壽風煙接未央飛樓復道鬱相望春來無以消長日間取經書教小王夫人閣春帖子聖主終朝視萬機燕居専事飬希夷千門永晝春岑寂不用車前插竹枝以上傳家集詩林廣記司馬公此帖亦皆寓諷勸之意始至洛中言懷三十餘年西復東勞生薄宦等飛蓬所存舊業唯清白不負君恩有朴忠早避喧煩真得策未逢危辱好收功太平觸處農桑滿嬴取閭閻鶴髮翁石林詩話溫公熙寧間自長安得請留臺而歸作過堯夫天津居草軟波清沙路微手攜筇杖著深衣白鷗不信忘機久見我猶穿栁岸飛聞見前録公判西京留司御史臺遂居洛買園于尊賢坊以獨樂名之嘗謂康節曰光陜人先生衛人今同居洛即鄉人也有如先生道學之尊當以年德為貴官職不足道也一日著深衣自崇德寺書局散步洛水隄上因過天津之居謁曰程秀才云既見溫公也問其故笑曰司馬出程伯休父故曰程耆英會洛下衣冠愛惜春相從小飲任天真隨家所有自可樂為具雖微誰笑貧不待珍羞方下筯只將佳景便娛賔庾公此興知非淺藜藿終難作主人作真率會伯康君從七十八歲安之七十七歲正叔七十四歲不疑七十三歲叔達七十歲光六十五歲合五百一十歲口號成詩用安之前韻七人五百有餘歲同醉花前今古稀走馬鬬雞非我事紵衣絲髮且相輝經春無事連翩醉彼此往來能幾家切莫辭斟十分酒儘從他笑滿頭花以上洛中耆英會詩和景仁卜居許下景仁頃見許居洛今而倍之故詩頗致其怨壯齒相知約歲寒索居今日鬢俱斑拂衣已解虞卿印築室何須謝傅山許下田園雖有素洛中花卉足供間他年決意歸何處便見交情厚薄間次韻謝杜祁公借觀五老圖脫遺軒冕就安間笑傲丘園縱倒冠白髮憂民雖種種丹心許國尚桓桓鴻冥得路高難慕松老無風韻自寒聞説優遊多唱和新篇何惜畫圖看鐡網珊瑚句煙曲香尋篆杯深酒過花明道雜志石揚休揚休字昌言眉山人舉進士歷刑部員外郎知制誥同判太常寺遷工部郎中卒鶚按司馬溫公詩自注云釋褐昌言除同州推官光華州判官是與溫公同年也東都事略揚休喜間放平居飬猿鶴收圖書以自適工于詩什世稱其才謝文瑩師攜琴見訪鄭衛湮俗耳正聲追不回誰傳廣陵操老盡嶧陽材古意為師復清風尋我來幽隂竹軒下重約月明開湘山野録皇祐間館中詩筆石揚休最得唐人風格海棠開盡妖桃落盡梨淺荂深萼照華池都緣西蜀盤根逺豈是東君屬意遲煙慘别容醺宿酒露凝啼臉溼胭脂須知賈相風流甚曾許神仙品格竒海棠譜吕公著公著字晦叔夷簡子舉進士纍遷殿中丞神宗朝官資政殿大學士哲宗即位拜右僕射兼中書侍郎元祐三年拜司空同平章軍國事薨贈太師申國公諡正獻入黨籍有集分題得癭木壺天地産衆材任材謂之智棟桷與楹杙小大無有棄方者以矩度圓者中規制嗟爾木之癭何異肉有贅生成擁腫姿賦象難取類櫽括所不施鉤繩為爾廢大匠睨而往惻然乃有意孰非造化功而終朽不器刳剔虛其中朱漆為之偽㪺漿挹酒醴施用惟其利犧象非不珍金罍非不貴設之于楹階十目肻注視幸因左右容及見為竒異人之于才性夫豈逺于是性雖有不善在教之揉勵才亡不可用由上所措置飾陋就其長皆得為良士執一以廢百衆功何由備是惟聖人心能通天下志宋文鑑風月堂詩話歐公居潁上申公吕晦叔作太守聚星堂燕集賦詩分韻公得松字申公得雪字劉原父得風字魏廣得春字焦千之得石字王回得酒字徐無逸得寒字又賦室中物公得鸚鵡螺杯申公得癭木壺劉原父得張越琴魏廣得澄心紙焦千之得金星硯王回得方竹杖徐無逸得月硯屏風又賦席間果公得橄欖申公得紅蕉子劉原父得溫柑魏廣得鳳棲焦千之得金橘王回得荔枝徐無逸得楊梅又賦壁間畫像公得杜甫申公得李文饒劉原父得韓退之魏廣得謝安石焦千之得諸葛孔明王回得李白徐無逸得魏鄭公詩編成一集流行于世當時四方能文之士及館閣諸公皆以不與此會為恨南窗紀談歐公稱賞此詩以為有宰相器吕公弼公弼字賔臣夷簡仲子賜進士出身歷樞密直學士知成都府神宗朝進樞密使出知外郡為西太一宫使薨贈太尉諡惠穆琴臺煙樹重城側琴臺千古餘早為梁苑客晚向茂陵居賦給尚書筆歸乘使者車清風覿舊隱長自聳鄉閭嚴真觀卜肆垂簾地依然門徑開沈冥時已往思慕客猶來鳥啄虛簷壞狐穿古井摧空餘舊磯石歲歲長春苔以上成都文類趙衆衆官龍州簽判與司馬溫公同時題倅廳吏隱堂滿耳江聲滿目山此身疑不在人寰民含古意村村靜吏束刑書日日間方輿勝覽張徵徵字百常陳留人寶元元年進士甲科自然亭久雨妨漁復滯樵自然亭上一逍遙萬緣不是間中起百事唯于睡裏消老去自知如蠛蠓病來誰悟似芭蕉愛名之世忘名客幸有山林舊市朝瀛奎律髓書故三司副使陳公亞之詩軸後欵題元豐三年破錦囊開玉振金舍人胸次右丞心為時黼藻衣冠藪與國丹青翰墨林慷慨似誰雙舞劒風流隨處一歌琴燕貽苦志追先烈子夏何須論淺深鐡網珊瑚吳充充字沖卿建安浦城人育弟寶元元年進士熙寧中纍遷檢校太傅樞密使代王安石為中書門下平章事監修國史罷為觀文殿大學士西太一宫使卒贈司空兼侍中諡正獻聽讀詩義感事時修撰經義所初進二南有旨資政殿進讀雪銷鳷鵲御溝融燕見殊恩綴上公晝日乍驚三接寵正風獲聽二南終解頤共仰天顔喜牆面才容聖域通午漏漸長知禹惜侍臣何術補堯聰王荆文公詩自注史院席上作蘭臺開史局玉斝賜君餘賔友求三事規摹本八書汗青裁倣此衰白盍歸歟詔許從容會何妨醉上車揮麈後録神宗朝詔修仁英兩朝國史開局日詔史院賜筵時吳沖卿為首相提舉二府及修史官就席上成詩沖卿唱首送張君宰吳江全吳風景好之子去弦歌夜犬驚胥少秋鱸餉客多縣樓疑海蜃衙鼓答江鼉遙想晨鳧下長橋正緑波明道雜志題招提院靜照堂人説招提好師從靜照來親攜玉堂句徐叩蓽門開好事能如此題詩豈易哉明年得東守繫舸一裴回至元嘉禾志遙贈錢公輔使君新自四明歸邀我同為衆樂詩山川可愛惜未見晝想夕思心為罷恍然神遇若有得齎身乃在天之涯漲海連空四無岸天吳卻坐鮫人觀以手揮弄日月丹能令桑田變瀰漫海邊偶到山城中山城二月多春風牛羊間暇夕陽晚樓閣參差朝霧濃一泓山澑佛頭緑環以翠屛風六曲人煙擾擾事嬉遊落花啼鳥滿汀洲中為臺榭鬬十二上有藻井排文楸旁人指點此何許云是四明行樂處此樂為民非為身始知集賢錢使君使君風韻誰之比政事次公詩短李醉憑熊軾勸耕疇狂取螺杯翻舞袂儂愛使君君勿歸詔書奪去何如為間侍玉皇香案側銀臺深阻無消息意迷卻悟坐空齋忽省君詩昨日來疊紙為君書所見不知衆樂誠然哉延祐四明志宋敏求敏求字次道綬子賜進士第為館閣校勘治平中知制誥神宗朝忤王安石以右諫議大夫奉朝請尋除史館修撰集賢院學士加龍圖閣學士卒贈禮部侍郎有書闈前後集西垣制辭文集史院席上奉和首相吳公元韻二聖垂鴻烈天臨四紀餘元台來率屬賜會寵刋書世業叨榮甚君恩可報歟衮衣相照爛歸擁鹿鳴車揮麈後録題招提院靜照堂叢林起新構燕坐水雲鄉本自禪心靜能令世纍忘幡花圍晝永鐘梵度宵長歸裓新篇富籠紗映寶坊至元嘉禾志薛利和利和字天益興化人寶元元年進士歷知春潮惠三州遷屯田員外郎謝王介甫一路生靈陡蝢貧廟堂康濟豈無人君侯若問茶租日請把茶租乞與人莆陽文獻熙寧二年王安石議𣙜茶欲擢利和提舉廣東茶事利和作詩謝之云云遂就常調通判廣州茶法卒不行栁應辰應辰武陵人寶元元年進士仕至尚書都官員外郎永州通判刻浯溪石上浯溪石上大江邊心記間將此地鐫自有後人來屈指四千六百甲寅年容齋五筆浯溪石上有大押字題云押字起于心心之所記人不能知大宋熙寧十年甲寅歲武陵栁應辰仍有詩云云閬中陳思跋云栁都官欲以怪取名者所至留押字盈丈莫知其何為押字古人書名之草者施于文記以自識别耳今鐫刻廣博如許已可怪矣好事者謂能袪逐不祥真大可笑邵必必字不疑丹陽人亢從父寶元元年進士官龍圖閣直學士知成都題錢公輔衆樂亭海邊民物鮮歡娛太守經營與衆俱園圃新陰多杞栁池塘生意足魚蒲長空不礙髙飛鵠淺水兼容短脛鳧此樂有誰知我趣歸來紅斾日西䀯延祐四明志裴若訥若訥常州江陰人寶元元年進士江隂絶句紫蓴江上是吾家一葉扁舟一釣車何必陶公種魚法雨汀煙渚盡生涯錦繡萬花谷宋詩紀事卷十四
