body:
  text: 宋詩紀事卷三十一錢塘厲鶚撰吕川川字里未詳吕吉甫知維揚日賣詩于市贈致仕郭朝儀漫道任公釣有神六鼇無迹海生塵爭如靜臥南窗下蘭菊任爭秋與春陶朱新録張頌頌字公美潁昌人舉進士不第句人散鞦韆間挂月露零蝴蝶冷眠風麈史徐璹璹字全父少年登科晚益流落終武義縣主簿春日醉中作時寓婺州清漣寺驚雷殷殷南山曲一夜山前春雨足美人睡起怯餘寒衣褪香消紅減玉朝雲靄靄弄情態野柳狂風無管束東風也自足春情吹破一溪煙水緑泊宅編薛紹彭紹彭字道祖號翠微居士長安人定武帥薛向師正之子米元章書畫友雲頂山山壓重峯首寺占紫雲頂西遊金泉來登山緩歸軫昨暮下三學出谷已延頸山名高劒外回首陋前嶺躋攀困難到賴此晝亦永巍巍石城出步步松徑引靑霄屋萬楹下俯二川境玉壘連金雁西軒列阡畛靑城與岷峨天際暮雲隱少城白煙裏水墨淡微影江流一練帶不復辨漁艇東慚梓澤隘右喜錦川迥磐陀石不轉枯枿弄芒穎四更月未出蕙帳天風緊客行弊帤垢到此凡慮屏暫時方外遊聊愜素心靜明朝武江路拘窘逐炎景左綿山中多靑松風俗賤之止供樵㸑之用郡齋僧剎不見一本余過而太息輒諷通守晉伯移植佳處使人知為可貴東川距縣百里餘入境遂不復有晉伯因以為惠沿流而來至此皆活作詩述謝并代簡師道史君紹彭上越王樓下種成行濯濯分來一葦杭偃蓋可須千歲幹封條已傲九秋霜含風便有笙竽韻帶雨偏垂玉露光免作㸑煙茅屋底華軒自在拂雲長和巨濟韻通泉字法出官奴日日臨池恨不如雙鯉可無輕素練數行惟作硬黃書鄉關何處三秦路馬足經年萬里餘多謝玉華宫畔客新詩未覺故人疏臨池通泉為如字韻牽非實事也不笑不笑句曾夢春塘題碧草偶來霧夕看紅蕖曉露凝蕪徑斜陽滿畫橋不眠聽竹雨高臥枕風湍去意已輕千里陌深杯難醉九回腸灞陵葉落秋風裏忍對霜天數雁行以上郁氏書畫題跋記王谹谹字稚川與黃山谷倡和書旅邸壁雁外無書為客久蛬邊有夢到家多畫堂玉佩縈雲響不及桃源欸乃歌天社任淵山谷內集注彭山黃氏有山谷手書此詩云王谹稚川元豐初調官京師寓家鼎州親年九十餘矣嘗閲貴人家歌舞醉歸書其旅邸壁云云余訪稚川于邸而和之蔣擴擴字充之送鄧德甫高談耳冷幾經秋解后長沙得少留莫畏洞庭風浪險主翁元是濟川舟范公稱過庭録鄧璋德甫永州人鄉舉八行忠宣謫永館門下教授諸孫後過長沙與故人蔣充之遇蔣送詩云云蔣由是詩名播湖湘間吕由庚由庚誨之子句地下若逢中執法為言今日再升平聞見前録神宗即位吕誨獻可擢御史中丞一日紫宸早朝司馬溫公為翰林學士相遇朝路溫公密問曰今日請對何所言獻可舉手曰袖中彈文乃新參也溫公愕然曰王介甫素有學行奈何論言獻可正色曰君實亦為是言耶安石雖有時名好執偏見不通物情喜人佞巳置諸宰輔天下必受其禍矣未幾中書省置三司條例司始變祖宗舊法所用皆憸薄少年天下騷然溫公退居洛慨然曰吕獻可之先見吾不如也獻可出知鄧州病乞致仕溫公康節日就臥內問疾一日手書托溫公以墓銘溫公亟省之己瞑目矣溫公呼之曰更有以見屬乎獻可復張目曰天下事尚可為君實勉之後溫公相天下再改元祐之盛獻可不及見矣溫公薨獻可之子由庚挽詩云云鄭景望景望湘山人生元豐元祐間有蒙齋筆談在潁州作城頭曉漏鳴丁丁窗間月落郤未眀衡陽歸雁過欲盡汝南荒雞初一鳴悠悠斷夢了不記草草微吟還獨成人生得意須幾許一睡稍足無餘情蒙齋筆談余每夜寐過分輒不能再睡展轉一榻時聞鼠囓唧唧有聲亦是一樂事當門老僕鼻息如雷間亦為囈語或悲或喜或怒或歌聽之每啓齒意其亦必自以為得而余不得與也常在潁州時初自翰林免官先君為倅歸養居後圃三間小室旁無與鄰左右惟一黥意況巳如此嘗有詩云云鄭周卿周卿襄邑人公肅右丞之孫知鄆州中都縣句鶴歸空有恨雲散本無心悼妾許彥周詩話楊萬畢萬畢字通一淇州人句千里暮雲山已黑一燈孤館酒初醒蔡寬夫詩史索寞之意盡于此矣史驤驤字思遠句花分先後留春久地帶東南見月多塵史令狐挺題相思河鄜州北百里有相思河岸有郵置曰相思鋪誰把相思號此河塞垣車馬往來多只應自古征人淚灑向空川作逝波墨客揮犀魯千之題崇明寺心情稍覺難如舊勝迹依然日月新鶴怨猿驚嗟往事再來山色似迎人修武縣志許元祐風水洞野寺依山立松橋避石斜壞梁飛白蟻枯木挂靑蛇道路悲蓬轉功名惜鬢華聊將洞中水試洗眼前花咸淳臨安志周辨臨海淨土院一徑森森入翠微翠微深處見禪扉倚雲殿閣光相照蔽日松杉碧四圍竹引澗泉寒繞屋雨蒸山靄潤侵衣十年遊宦今重到景物依前舊識稀輿地紀勝閻欽受欽受官御史宿瀛州高唐館借問襄王安在哉山川此地勝陽臺今朝寓宿高唐館神女何曾入夢來漫叟詩話閻伯才句魚貫羸師堪坐縛爾時可歎蜀無人陰平橋聞困學紀張冕冕官翰林學士海棠海棠栽植遍塵寰未必成都欲詠難山木瓜開千顆顆水林檎發一攢攢自注大約木爪林檎花初發皆與海棠相類但花稀而先葉耳惟山木瓜水林檎尤似山木瓜揚州有之楮木叢也初疑紅豆爭頭綴忽覺燕脂衆手丸西蜀人家根墢小南荆官舍樹枝寬髙穿羣木無因蔽平倚危樓最好看十畝園林渾似火數方池面悉如丹錦袍萬丈仍連袂自注白傳珠被齊光更合歡自注楚辭風嫋細腰妝正罷自注楚宫露晞銅雀淚新乾晨曦逺借彤雲暖秋魄微侵甲帳寒會宴豈勞供幄幕採香應見費龍檀穠燒遊女青絲髮殷染妖姬白玉冠賔席半移隈茜綬使車多熱蔟雕鞍層層排朵縈飛蝶密密交柯宿翠翰詩客早慙矜縷管畫工誰敢衒霜紈本期相伴千場醉可忍輕邀百卉殘川路尚移隨迅瀨蕃盤猶折出長瀾飄零綘雪深盈尺收拾晴霞散結團時去獨應賢者識色空潛有達人觀譜為仙子終須美自注花譜以海棠為神仙王禹稱海仙詩序實作寒梅况不酸自注寒梅事具序中五六年來離别恨春宵頻夢石臺盤自注王石臺盤在後園海棠下至今存焉海棠譜元溥溥字泉鄉宜興人號耘軒歲後書懷他鄉故鄉老若此新歲舊歲窮依然烹茶但有二升水沽酒初無三百錢咸淳毗陵志徐範過太行山路繞羊腸躡屐齊萬山金碧總堪題舉頭日月中天近極目乾坤五嶽低自笑鹽車騏驥厄誰憐枳棘鳳皇棲欲投古寺禪房宿喜見僧歸落日西河內縣志朝元忠西歸安得龍山一作湖潮駕回安河水水從樓前來中有美人淚人生髙唐觀有情何能己復齋漫録徐評評新城邑令寧國院岑寂千山曲縈紆一徑微樓臺靑嶂合窗戶亂雲飛野色侵僧衲池光射客衣偶來修吏隱到此益忘機咸淳臨安志周式式成都人句花前嫫母醜雪裏屈原醒庭松譜厯代吟珠簾繡户遲遲日柳絮梨花寂寂春苕溪漁隱叢話查許國許國字匪躬海陵人官奉議郎僑居荆南鳴弦峯在英州南虞舜南巡撫琴于此木葉蕭蕭江水淸幅巾藜杖繞山行忽然行到山深處聽得鳴弦一兩聲方輿勝覽王觀國觀國長沙人著學林題北巖院雲巖亂石潄寒泉通夕泉聲到枕邊宛似昔年嚴瀨口五更風雨宿溪船南安縣志陳古過武侯廟羣雄角逐自驅除邂逅真龍起畏途材並管蕭非亞匹氣吞曹馬直庸奴兩朝冠蓋尊元老千載風雲屈壯圖天欲鼎分終割據可憐憂國竟捐軀成都文類王潤之潤之字德玉山陰人寶林寺支公曾駐錫規矩舊叢林飛鼠殿堂古靈鰻井穴深磬聲來竹外塔影臥池陰幸有相知客時時過我吟越詠王子思表兄丁行之俾豫作山水一軸秃髮管城書不中麝煤滿硯隨輕濃煙雲變怪本無定丹靑故匪能形容解衣盤礴無人久妙迹于今復何有揮毫要使真宰泣歎息初非癡絶手遼東有人丁令威去家得仙今暫歸上界繁華異丘壑安得長林大麓長追隨聯翩大軸要豫寫敲冰不在鵝溪下吾既不能為喬松直幹摩蒼天又不能為小童一線飛紙鳶萬里江山入平遠映取畫師閻立本何源秀才為余畫山水圖覓詩孤峯特立何巉巉勢與霄漢高相參左蟠右列分嶺岫儼如至尊朝子男怪豫蝸室不函丈欲有異境超塵凡素嫌挂壁故妥帖平地作此千嵌巖雲蒸霧結深莫測長林大麓亂不芟想當變怪蟄龍虎中有窟穴誰能探將崩未崩江動石欲去不去風滿帆山坳林缺見天際隱約萬里橫煙嵐嗟豫質性素山野視此丘壑心益耽斗升之粟真秣莝野馬垂耳就轡銜西山爽氣日在望吏卒侍側嚴若監靑鞋布襪棄不著誰令自苦披靑衫頗羞漁父駐短棹似笑大夫新被讒寄言鳥獸儻可侣吾將從汝棲林巒以上聲畫集陳遠長橋玩月世間八月十五夜何處樓臺得月多不及吳江橋上望水晶宫殿揖嫦娥吳江縣志曾晦之晦之南豐人次唐彥猷顧亭林韻煙雨三家市黃門卜此居著書千紙在祠宇幾椽疏潮汐成今古牛羊有里墟舉兵鉏逆節風烈照無餘至元嘉禾志蘇文饒文饒官大監鴻溝置俎均牢彘峩冠信沐猴方矜几上肉己墮幄中籌海嶽歸三尺衣冠閟一丘路人猶指示上下是鴻溝春晚芳草莫尋遊處迹好花空認折殘枝啼鶯似怨歸何速舞蝶應憐出太遲以上後村千家詩傅子容題楊汝士玉蘂帖比瑒更礬總未佳要須博物是張華因觀異代前賢帖知是唐昌玉蘂花高齋詩話唐人題唐昌觀玉蘂花詩云一樹瓏鬆玉刻成飄廊點地色輕輕女冠夜覓香來處唯見階前碎月明今瑒花即玉蘂花也介甫以比瑒謂當用此瑒字蓋瑒玉名取其白耳魯直又更其名為山礬謂可以染也盧陵假謙叔多聞士也家藏異書古刻至多有楊汝士與白二十二帖云唐昌玉蘂以少故見貴耳自來江南山山有之土人取以供染事不甚惜也則知瑒花之為玉蘂無疑矣傅子容見此帖乃作絶句云云鄭猶詠王子安應城新亭一簪華髮一牀書盡日新亭適意無莫道長安天樣遠長安自不厭江湖前年諫獵出長楊乞得新亭作醉鄉好把靑衫送酒媼從教人識御爐香侯鯖録宋翰題涪陵郡錦繡洲猶在熊羆夢已無文風齊兩蜀仙洞接三都白石從天設靑崖見地圖荔支妃子國不復曩時輸方輿勝覽傅翼翼永豐令猿嶠在建昌軍新城縣參差茅屋帶村煙驛路﨑嶇石岸邊風物盡成三谷景溪山分斷七閩天夜猿乘月悲霜樹秋石和雲瀉澗泉謝守來遊已千載何人能為續佳篇輿地紀勝史沆沆早登進士第坐事遷謫而死平生好持人短長世以凶人目之雖古人亦妄肆詆訾云題琵琶亭坐上騷人雖有淚江邊寡婦不難欺若使王涯聞此曲織羅應過賞花詩賔退録李沖元過姑孰作琉璃萬頃碧如堆畫棟連雲戶牖開晴嶂勢吞三楚盡暮潮聲帶九江來六朝寂莫惟流水孤壘荒涼只舊臺惆悵騎鯨人已老夜船空棹月明回輿地紀勝房偉訪古訪古城西話劫灰子雲相如安在哉成都萬事變亦盡惟有石筍雙崔嵬成都文類馬彝次吳江驛蘭舟東下泊吳江暫寄郵亭看渺茫魯望舊蹤追感歎季鷹前事入思量當軒雨過峯巒秀隔岸風來橘柚香散髮未能歸未遂鱸魚時節負秋光吳江縣志柳伯達題濮公仙洞昔日何人占弋山波光嵐翠照淮灣佩蘭隱者今何在煉石仙人去不還緑水渡頭空自急白雲嶺上至今間高峯張令祠邉望古井荒城半草間汝寧府志何泳送成都護戎韓舍人戎符重析引絲言愼簡長才護外藩三戟傳榮存北第二城分職俯南原嚴墀密侍親中扆危棧前驅屬左鞬江泊夜聲頻度枕山行晴碧互迎軒歌驪暫愴朋遊遠叱馭都忘暑氣煩仄席正求詩禮帥詔歸非久俟東轅成都文類范祥送成都護戎韓舍人全蜀兵符重霄宸注念勞臨戎號人傑分組得時髦軍府威名播齋壇世閥高厯橋題駟馬揚斾啓三刀矍鑠前謀大澄清此志豪忠臣希子貢民頌繼王裦臘市繁千蓋春江漲萬艘浣溪雲粉薄公暇廢援毫成都文類蔡若水若水庫部員外郎麻源靈豐祠偶因乞雨到麻源碧澗縈紆亂石間未省謝公吟賞後更誰乘月弄潺湲麻姑集王子韶子韶字聖美太原人舉進士厯禮部員外郎哲宗朝進祕書監拜集賢殿修撰知明州卒神宗皇帝挽詞寶餌方嘰玉金盤忽造冰周人悲地拆杞國怨天崩杳霧霾隂月鯢膏耿夜燈傷心歌舞妓灑血望西陵脫屣人寰忽上天投淵果熟會羣仙帳宫雲暝龍為駕綴幄天寒鶴記年萬里出師輕衛霍一朝行事付談遷功名半古升遐早獨抱遺弓涕泫然楊公彥齡筆録閻伯敏朝雲峯巫山十二峯之三山頭行雲自朝朝陽臺暮色連雲霄朝來暮去變雲雨送老行客無回橈淨壇峯山頭枝枝竹掃壇舟子竹枝歌上灘炷香上廟擲杯珓但乞如願舟平安起雲峯叉頭嫋娜山花枝裙尾舊纈山麻衣朝隨雲起採薪去暮趁女伴穿雲歸以上全蜀藝文志陳純純字元朴莆田人遊桃源與三仙女倡和中秋月和桃源夫人仙源嘗誤到羇思正蕭然秋靜夜方靜月圓人更圓清尊歌越調仙棹泛晴川幽意知多少重重類楚綿詩話總龜饒師道師道南城人遊麻姑山拂曉旌幢遠訪真洞中和氣一番新爭迎謝守同遊客盡是方平舊會人山峭亭臺多占月地靈風物只如春淸歡何必笙簧助自有紅泉碧澗鄰輿地紀勝閻孝忠題黃相山東帶連山接五羊西分郴水下三湘路人到此休南去嶺外千峯盡瘴鄉錦繡萬花谷查仲本溫泉在重慶俯城北浴罷臨泉一整冠令人搔首憶長安御湯搖蕩雙龍影疑是羣羌蔟馬鞍錦繡萬花谷宋詩紀事卷三十一
