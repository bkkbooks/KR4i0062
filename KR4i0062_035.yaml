body:
  text: 宋詩紀事卷三十五錢塘厲鶚撰陳汝錫汝錫字師豫青田人紹聖四年進士浙東安撫使有鶴溪集暮遊石門洞落帆倚芳洲冷日銜翠壁沙平野步穩不費支笻力邂逅到幽洞雲水已昏夕隂崖上蒼穹杳不見轍迹巖前月色薄細路稍可覓瀑泉號秋聲飛練不計尺僧房得少憩坐久耳方寂河梁謫仙人握手見胸臆囊無一錢看志有萬里適拄頰坐西山琢句愈工績同遊得二妙筆陳亦勍敵笑談頗傾坐酬唱屢即席顧豫舌本強咀嚼覺清液林泉信幽竒嵗月尤迅亟兹遊莫辭頻能著幾緉屐句間愁莫浪遣留為痛飲資以上括蒼彚紀葉夢得夢得字少蘊吳縣人清臣曽孫紹聖四年進士纍官龍圖閣直學士帥杭州髙宗朝除尚書右丞江東安撫使兼知建康府行宫留守移知福州提舉洞霄宫居吳興辨山自號石林居士有石林集送模歸卞山并示僧宗義為余守西巖者自我離山間忽巳兩改月飢人不忘食未坐先巳説家僮挾書至驚起慰愁絶推尋到雞犬問訊窮曲折此生豈多為一壑萬慮滅可能復大錯更鑄八州鐵自注江東領八州汝歸馬蹄輕初不恨觸熱殷勤報松竹吾豈成久别端居探幽竒自謂略已遍昨登西山巔雄絶昔未見溪湖莽吞吐雲物紛百變乃知十年間尚或遺勝踐巢成輒棄去我豈秋社燕自注築南山絶頂亭亭基垂成而來為吾課童僕開闢盡二面莫言羊腸險徑小煩屢轉杖藜不用扶吾腳猶爾健次韻再答激仲生涯久許捕魚郎鳧雁相追不亂行但遣陶廬有松徑不辭楚酒醉椒漿交情老柏寒方見妙語靈珠夜有光回首漸知歸路好已看梅栁動初陽杜堅大夫作南窗求詩為賦意得不願多心間夲長虗超然適有契天地良有餘頗念彭澤老所懷常宴如南窗僅幾何盤薄萬古初束帶悟已往世紛便能疏懸知千載情共有三間廬杜子老不遇買田賦歸歟西山鬱攙空江山繞故墟衡門閉松菊亦有琴與書邂逅一杯酒安知我非渠題朝公耄惠崇溪山荒林翳宿莽脫木寒無煙不知三間茅中有幾醉眠山逺尚見雪江空欲吞天歸舟定何許滄波方渺然戲方仁聲四絶句戲弄偏舟泊宅村卻尋三徑築茅墩雲邉此意真難解賸作新詩與細論水檻新開似浣花傍溪須更作浮槎秖應屢費王宏酒時要清樽對落霞不惜囊錢信手空荒田卻擬望年豐天公可是憐風月判遣詩人一例窮盧橘楊梅已及時我歸先自在前期平生不作宣明靣浪愧將軍建鼓旗仁聲舊居城東泊宅村張志和所遊也今徙西溪作雲茅庵因東岡為小亭號茅墩欲傍溪開水檻久無資會郡守有饋之酒五十壺不敢飲亟易之乃克成有田數十畝常苦下潦余居石林與雲茅南北正相望故四章皆及之康集以上建景修與吾同為郎夜宿尚書新省之祠曹廳步月庭下為言往常以九月望夜道錢唐與詩僧可久泛西湖至孤山已夜分是嵗早寒月色正中湖面渺然如鎔銀傍山松檜參天露下葉間薿薿皆有光微風動湖水晃漾與林葉相射可久清癯苦吟坐中凄然不勝寒索衣無所有空米囊覆其背為平生得此無幾吾為作詩記之霜風獵獵將寒威林下山僧見亦稀怪得題詩無俗語十年肝膈湛寒輝澄懷録逰南峯寺并序逰南峯寺獨登待月嶺而還長老才上人示欲作亭嶺上以待豫再至因以詩贈云澤國鍾下流有山獨西南標竒借明眼夙昔多窮探腹背眩金碧鐘魚半精藍支郎放鶴處妙解無餘談高木氣未炎緑隂正清酣我懶倦登陟兹行吒猶堪幽尋雖云初佳處默巳諳久欲謝塵滓往同彌勒龕平生術九九晚識前三三才也實可人窮年玩煙嵐胸中有定水萬境潛包含嚴霜掃頳紫老幹餘楩楠噉蔗要自佳食荼亦云甘坐斷方丈室天花雨毿毿笑我窘世網何殊老眠蠶我今巳解縛真理早自耽但恐愛山意多求尚成貪願借待月嶺重開石頭庵偃松久傲兀碧琳故澄涵言尋覺庵路更欲從遍參吳郡志送嚴壻侍郎北使朔風吹雪暗龍荒荷橐驚看玉節郎楛矢石砮音拏傳地産醫閭析木照天光傳車玉帛風塵息盟府山河嵗月長寄語遺民知帝力勉拋鋒鏑事耕桑瀛奎律髓少蘊以妙年出蔡京之門靖康初守南京當罷廢胡文定公以其才奏謂不當因蔡氏而棄之然石林詩話専主半山而隂抑蘇黃非正論也秦檜之和雖萬世之下知其非是後四句含糊説過無一毫忠義感慨之意則猶是黨蔡尊舒紹述之徒常態也劉安上安上字元禮永嘉人紹聖四年進士歷侍御史給事中除徽猷閣待制出知外郡有給事集清漣亭泛舟高樹環清池波平春正緑移舟近南岸倒影見華屋危橋屬修徑幽思生逺目更登狎鷗亭可以忘寵辱憶鸂鷘鸂鷘知何許南園春水多稻粱隨分有煙雨想無他世上貪毛羽湖邊足網羅池塘棲息穩慎勿厭風波賀右經臣見過為愛端居上郡章里閭何幸得徜徉買田郭外春耕早築室湖濵野趣長且把舊書遮病眼了無塵事擾中腸故人訪我留佳句應笑年來兩鬢蒼萬田道中水濶疑無路雲深僅有山兒童划小艇出沒稻塍間花靨鎮下蔡嬉逰地春風萬杏繁誰家堪繫馬青月壁竹籬門花靨誰名鎮梅妝自古傳家家小兒女滿額點花鈿舒州西門拂雲亭外竹千竿靜聽清聲戞玉寒卻憶謝公巖下路水風涼處戰檀欒以上給事集寇國寶國寶字荆山徐州人從陳無已學紹聖四年進士為吳縣主簿後山集有贈國寶絶句云承家從昔如君少得士於君孰我先口擬説詩心已解世間快馬不須鞭題閶門外小寺壁黃葉西陂水漫流籧篨風急滯扁舟夕陽暝色來千里人語雞聲共一石林詩話此詩尤佳從蘇黃門庭中來固自不同周知微知微字明老吳興人紹聖四年進士為晉州縣尉到官不數月不告于州徑來京師人問其故云我欲求教授至京不得一夕大醉而卒雙頭白蓮圖君不學叔隗季隗南歸晉又不學大喬小喬東入吳一種桃根與桃葉若為化作雙芙渠臨淮政成有餘暇坐令華屋生瀟灑鵝溪一幅萬里寬移得浙川入圖畫天空水濶江茫茫想見女英與娥皇九疑雲深蒼梧逺冰姿玉泣不成妝苦心抱恨何時了香骨應甘沒秋草不如回首謝秋風分作尹邢來漢宫苕溪漁隱叢話浮萍小靨浮青水拍隄隄邊草色更相宜一番榖雨晚晴後萬點楊花春盡時解與曲池藏寶鑑不教新月妒娥眉怪來别岸波光濶知是漁郎艇子移庚溪詩話題龜山回文在旴𣅿縣北迢迢緑樹淮天曉靄靄紅霞海日晴遙望四山雲接水碧峯千點數帆輕方輿勝覽句後車鶯燕春聲早前騎熊羆夜氣遒邊塞上元遊宴口號暮天斜去空成字逺地頻來不寄書咏雁詩以上庚溪話疾風甚雨悲遊子峻嶺崇山非故鄉優古堂詩話姚舜明舜明字廷輝嵊縣人紹聖四年進士除直祕閣提點兩浙刑獄髙宗朝充江淮荆浙都督府隨軍轉運使權户部侍郎進徽猷閣待制贈翠微主僧沖邈僧臘俗年俱老大儒書佛教舊精勤姑蘇一萬披緇客四事無如彼上人中吳紀聞王元甫元甫紹聖間居廬山敕賜髙尚處士蘇東坡過九江因道士胡洞微求謁之元甫云吾不見士大夫十年矣竟不見景陽井動地隋兵至君王尚宴安須知天下窄不及井中寬樓外鋒交白溪邊血染丹無情是殘月依舊照闌干能改齋漫録黃大臨大臨字元明山谷之兄紹聖中萍鄉令後山詩話魯直有癡弟蓄素琴而不御蟲蝨入焉魯直嘲之曰龍池藏壁蝨而未有對魯直之兄大臨旦見牀下以溺器畜生魚問知乃其弟也大呼曰我有對矣乃虎子養溪魚也寅菴詩寄魯直手把齊民種蒔書莎衫臺笠事耘鉏夏栽醉竹餘千箇春糞辰瓜滿百區早秫旋舂嘗麴蘖新粱炊熟自樵蘇日西杖屨行山口招得鄰丁作飲徒西江詩話黃叔達叔達字知命山谷之弟鶚按黃玉林云名知命字元明誤豫章詩話黃知命黔中數詩附山谷集中殊有家法或云山谷潤色以成弟之名嘗與陳履常謁法雲禪師夜歸衣白衫騎驢緣道搖頭而歌履常行于後一市驚以為異人明日李伯時畫以為圖邢惇夫作歌行次巫山宋楙宗遣騎送折花厨醖攻許愁城終不開青州從事斬關來喚得巫山強項令折花傾酒對陽臺上南陵坡風餐水宿六千里蛇退猿啼八百盤上得坡來總歡喜摩圍依約見峯巒題小猿叫驛大猿叫罷小猿啼箐裏行人白晝迷惡藤牽頭石齧足嫗牽兒隨淚陸續我亦下行莫啼哭以上山谷集附劉光光紹聖中仙居令括蒼洞古洞藏真不記年翠崖蒼壁故依然怪來一夜清無夢身在仙家第十天赤城志李元膺元膺東平人南京教官紹聖間李孝美作墨譜法式元膺為序蓋此時人也十憶詩憶行屏帳腰支出洞房花枝窣地領巾長羣邊遮定鴛鴦小只有金蓮步步香憶坐椅上藤花闞面平繡裙斜綽茜羅輕踏青姊妹頻來喚鴛履貪弓不意行憶飲緑蟻頻催未厭多帊羅香軟襯金荷從教弄酒春衫涴别有風流上眼波憶歌一串紅牙碎玉敲碧雲無力駐晴霄也知唱到關情處緩按餘聲眼色招憶書纖玉參差象管輕蜀箋小硯碧窗明袖紗密掩嗔郎看學寫鴛鴦字未成憶博小閣爭籌畫燭低錦茵圍坐玉相歌嬌羞慣被諸郎戲袖映春蔥出注遲憶顰漫注橫波無語處輕攏小板欲歌時千愁萬恨關心曲卻使眉尖學别離憶笑從來題目值千金無事羞多始見心乍向客前猶掩斂不知已覺鈿窩深憶眠泥嬌成困日初長暫卸輕裙玉簟涼漠漠帳煙籠玉枕粉肌生汗白蓮香憶妝宫樣梳兒金縷犀叉梁水玉刻蛟螭眉間要點雙心事不管蕭郎只畫眉墨莊漫録王全玉作宫體十憶詩李元膺見之愛其詞意宛轉且曰讀之動人老狂不能巳聊復效尤其情致殊姸麗自非風流才思者不能也李釡釜字元量元符三年進士第一留題王官谷司空唐達士寂寞卧雲岑擾擾任羣態休休信此心泉聲半山急栁色舊庭深倣佛登臨處遺蹤一訪尋蒲倅李釜元量解官東還蒲解巡鹽鄒信子亮虞鄉酒正周謂德孺尉孔塤和叔首山孫鳳聖符酌餞王官谷食後至瀑布亭取水試茶日暮分首舊有鄙詩一章因并題焉王官谷集張勸勸字閎道永福人元符三年進士歷中書舍人給事中御史中丞述古殿學士知本州陛辭除工部尚書靖康初避去除名勒停山輝堂在福州東山愛同寺蕭蕭松竹蔭華扉更敞虛堂隱翠微雲露峯巒橫秀色月低巖壑弄清輝分開逺碧鳴泉落點破寒光白鳥飛還似山隂秋霽後照人懷抱欲忘歸淳熙三山志安惇惇字處厚廣安軍人上舍釋褐元符初纍官御史中丞徽宗朝拜同知樞密院卒重建太虛觀昔年逰歷訪霓旌多謝仙師數里迎今日重來知有意此身應不為公卿能改齋漫録樞密安公諱犯御名元祐末為江東漕因逰廬山太虛觀未至數里間有道士紫衣皂巾領徒七人迎謁既而不知所在至觀謁陸靜修仙師遺像則宛然其人也元符未庚辰公再到賦詩向子諲子諲字伯恭臨江人敏中元孫欽聖憲肅皇后再從姪元符初以恩補官高宗朝歷徽猷閣直學士知平江府尋致仕號所居曰薌林題王文孺臞菴仙翁五十鬢猶青髙臥柴門畫亦扄茅舍已忘鐘鼎夢蒲輪休過薜蘿亭隂森門巷先生柳寂寞江天處士星晚嵗田間農事了間鈔寧戚相牛經吳郡志題薌林莫問清江與洛陽山林總是一般香兩家地占西南勝可是前人例姓楊樓攻愧集云香山得洛陽履道坊楊常侍舊宅薌林得臨江五栁坊楊遵道光祿别墅有詩云云題米元暉橫軸早為山谷印可晚陪帝所清間筆力休論扛鼎神功更解移山向日家居道士今朝碧落仙鄉胸次山髙水逺筆端雲起風狂攻愧集跋石􅐂􅐂字敏若蕪湖人元符三年進士宣和元年中辭科仕止密州教授有橘林集絶句來時萬縷弄輕黃去日飛毬滿路傍我比楊花更飄蕩楊花只是一春忙後村詩話成都嵗暮始微寒小酌遣興革帶頻移紗帽寬茶鐺欲熟篆香殘踈梅巳報先春信小雨初成十月寒身似野僧猶有髮門如村舍強名官鼠肝蟲臂元無擇遇酒猶能罄一歡詩林萬選柳絮若無筋力太輕柔何物如今得自由帶雨飄來成墜雪卷春歸去作飛毬全芳備祖咏雪鸚鵡杯中未覺貧寒凝酒面不成鱗如何飛上參軍鬢與惱紅樓歌舞人菊坡叢話句鳥聲應為故人好梨雪欲將春事空負郭生涯千畝竹長年心事四愁詩千里江山漁笛晚十年燈火客氊寒日邊人去雁行斷江上秋髙楓葉寒天濶鳥雙下山寒人獨歸苕溪漁隱叢話石敏若橘林集汪彥章龍溪集今並行於世二集之詩相犯甚衆不可槩舉未知果誰作耶設或皆彥章作則橘林集中好詩無多儻去此遂空冀北之羣矣曾誠誠字存之孝寬子元符間祕書監獨醒雜志南豐之曾曰鞏曰牟曰宰曰布曰肇章貢之曾曰弼曰懋曰班曰開曰幾皆以伯仲取科第致位通顯南豐之最著者子固子開而子宣遂登相位章貢之最著者叔夏天猷若吉甫雖晚遇亦終次對此二族蓋甲於江南也泉南之曾自丞相魯公一傳而有樞密孝寬再傳而為祕監誠三傳而為今丞相懷又曾氏之最著也與同舍諸公飲王詵都尉家有侍兒輩侍香求詩求字者以煙濃近侍香為韻得濃字俯仰佳人看墨蹤和研親炷寶熏濃詩情過筆當千里妙思凝香欲萬重山盎泄雲傾白酒越羅霑露浥黃封從來粉黛宜燈燭妙手憑誰寫醉容七夕王都尉邀同舍置酒聽琵琶寶鑑凌雲結綺髙小奩爭巧暮分曹春蔥細撚龍香撥秀頸偏明邏逤槽牛既寫形呈粔籹馬軍馳酒送蒲萄淚珠散作人間露最覺更闌潤錦絛以上墨莊漫録田晝晝字承君陽翟人以世父況任為校書郎元符間監廣利門建中靖國初召為大宗正丞知淮陽軍有集蘭亭續考潘牥云鄒正言浩赴貶所其友人告之曰使君官京師遇寒疾五日不汗死矣獨嶺海之外能死人哉友為誰田晝是也黨論之興墨莊漫録許洛兩都士大夫之淵藪指為許洛兩黨崔德符陳叔易皆戊戌生田承君李方叔皆己亥生並居潁昌陽翟時號戊巳四先生以為許黨之魁故諸公皆坐廢之久築長隄築長隄白頭荷杵隨者妻背脅傴僂筋力微以手置胸路旁啼老夫七十嫗與齊五尺應門生兩兒夜來春雨深一犂破曉徑去耕南陂南鄰里正豪且強白紙大字來呼追科頭跣足不得稽要與官長修長隄官長亦大賢能得使者意正隄駕軺軒不復問餘事終當升諸朝自足富妻子何惜桑榆年一為官長死杜牧弟病兄孤失所依當時書語最堪悲豈圖乞得南州後卻恨尋芳去較遲以上宋文鑑邵伯溫伯溫字子文康節先生子以薦入仕為西京教授徽宗朝入元符上書邪等纍遷提點成都路刑獄有河南集邵氏聞見録李氏席上有感翻翻繡袖上紅茵舞姬猶是舊精神坐中莫怪無歡意我與將軍是故人過庭録子文為陜西宣撫司馬與路鈐李君交往甚熟李家有數侍婢每遇歌宴子文必預後十餘年而李君巳死值其妻生辰命子姪宴子文于書舍遣舊婢出舞酒酣子文感愴宿昔即席作詩云云諸子得之入呈其母皆感泣不自勝乃令謂子文曰宅中得公佳句情緒作惡難復行酒即容别日款會子文不終席而退良久憮然曰所謂口乃禍門充城口號山圍翠合水連雲萬室樓臺照眼明地勝風淳真樂國四川惟説好充城錦繡萬花谷姚舜陟舜陟江隂軍簽判題常樂寺五雲臺虛空本無雲一氣誰所主雲空兩無礙起滅自散聚吾聞心歸源空殞亦無所應知不空者物感自如雨君看賢首師自視木與土與雲亦奚期況問色有五云何坐説法瑞應乃如許休疑諸天集未必衆龍吐雲空法如是我説無説故堂中嫡孫在客至當問取至元嘉禾志吕希哲希哲字原明公著之子以蔭入官用薦為崇政殿説書徽宗朝歷直祕閣出知曹州入黨籍奪職罷為宫祠卒絶句水晶宫殿玉花零點綴宫槐卧素屏特敕下簾延墨客不因風雪廢談經朝氏客語原明元祐間侍講大雪不罷講講孟子有感哲廟一笑喜為絶句云云絶句老讀文書興易闌須知養病不如間竹牀瓦枕虛堂上卧看江南雨後山紫微詩話公謫居歷陽閉門卻掃不交人物有絶句云云句獨抱遺經唐處士差強人意漢將軍吕氏家孰記楊國寶應之余從姑之子也少強學力行元豐中會于都城余見其貧而不屈老而益壯以詩贈之云云除卻借書沽酒外更無一事擾公私伊洛淵源録滎陽公晚居宿州真揚間十餘年衣食不給有至絶糧數日者公處之宴然靜坐一室家事一切不問不以毫髮事託州縣其在和州嘗作詩云云間居日讀一爻遍考古今諸儒之説默坐沈思隨事解釋夜則與子孫評論古今商𣙜得失久之方罷楊道孚道孚字克一張文潛之甥少有才思為舅所知遺滎陽吕公雨緑霜紅郭外田山濃水淡欲寒天參軍抱病陪真賞一檄呼歸亦可憐紫微詩話元符初滎陽公謫居歷陽道孚為州法掾從公出遊以職事遽歸遺公詩云云李甲甲字景元華亭人善為填詞小令有聞于時畫翎毛有意外之趣米海嶽嘗稱之蘇東坡題嘉興景德寺李景元畫竹詩云聞説神仙郭恕先醉中狂筆勢瀾翻百年寥落何人在只有華亭李景元題畫誰發煙雲六尺綃寒山秋樹晚蕭蕭十年來往吳淞口錯認溪南舊板橋柘上遺詩劉定定字子先官户部侍郎謝章子厚故人天上有書來責我疏愚喚不回兩處共瞻千里月十年不寄一枝梅塵泥自與雲霄隔駑馬難追騏驥才莫謂無心向門下也曾終夕望三台高齋詩話章子厚與劉子先有場屋之舊子厚居京口子先守姑蘇以新醞洞庭春寄之其後隔十年子厚拜相亦不通問寄書誚其相忘逺引之意子先以詩謝云云即召為宰屬遂遷户侍劉彥祖彥祖任館職句别後頻芳草愁邊更落花風月堂詩話朝以道云此詩酷似劉夢得張鏌送向綜通判桂州百里常淹展驥材除書逺自九天來緑油車上揚旌去畫鷁舟中疉鼓催桂嶺花光紛似雪荔江波色淥如苔訟庭塵滿無留事惟伴登臨燕席開粵西詩載申屠炯寶林寺在越州城中龜山上欲共高僧話幽尋入寶林途分喧寂境座息是非心老鶴栖巢穩靈鰻蟄井深山中饒勝迹嵗月幾登臨越咏封萬里題錢知監東臯别業别墅連城郭超然逺垢氛蚌明宵閣見鶴唳曉堂聞翠滴階前露紅鋪水上雲悠悠持祿者應愧不如君至元嘉禾志陳肅肅都官員外郎蔡經宅巖扉生翠靄石壁凌朱霞草木狀多怪鸞鶴歸如家誰嫌狡獪心滿地投丹砂麻姑集張懷憶吳江多年襆被玉山岑鬢雪欺人忽滿簪駑馬雖然貪短豆野麋終是憶長林鱸魚未得乘歸興鷗鳥惟應信此心見説新橋好風景會須乘月濯煩襟吳郡志翁緯緯新會長官使華亭在莆田城北五里臨溪之西瀑布髙可百尺先輩徐夤之别墅走清奔碧日潺湲勢與晴江逺接連沙草翠微驅馬路岸花紅溼釣魚船煙生逺店收寒雨風起髙梧咽暮蟬徐氏舊居人識否渡南溪下白雲邊興化府志林子來歙硯瑟瑟方池霧縠紋麝煙初𣪚墨花春晴窗靜晝桐隂轉筆下雲生字入神硯箋楊槱隂平道棧道險復險客懷愁更愁萬山俱絶壁一水不通舟陜西通志陶應題寶雞縣雪樓當月動清寒渭水梁山鳥外看聞説德宗曾到此吟詩不敢倚闌干方輿勝覽岑碩碩字希微句金屋暖猶積玉關寒更深雪伯嚭肆讒吻夫差失霸圖吳山廟極目又芳草捲簾非故山旅中春日登樓代吟譜歷章造西樓高花古柳傍城闉遊目江城次第新百感中來倍惆悵滿城煙雨滿城春吳郡志胡融葛洪井在太平縣丹崖山荒巔有野井古意豁宜搜蘚石巳摧剝雲蘿閟清幽憶昔抱朴翁煉液棲高邱丹成巳蟬蛻巖花幾春秋台州府志郭挺挺字元傑許昌人從李方叔學挽李方叔憔悴詞林失俊英巳應精爽在蓬瀛楷模昔日依元禮貧病他年纍長卿無復波瀾窺大手空將日月送虛名當時潁曲為耕地秖有風灘晝夜聲過庭録程之邵元符中知福建路提舉陜西茶馬碧光亭在釣龍臺山寺壓高臺最上頭一亭新就得清逰天連逺岫交相碧地枕長江分外幽煙際晴光渾不斷望中詩思浩難收公餘幸有賔朋樂聊把狂篇索唱酬淳熙三山志宋詩紀事卷三十五
