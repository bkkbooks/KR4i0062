body:
  text: 宋詩紀事卷七錢塘厲鶚撰孫僅僅字鄰幾何弟咸平元年進士第一纍官集賢院學士權知開封府後領審刑院進給事中卒有甘棠集澠水燕談孫何孫僅學行文詞傾動場屋何既為狀元王黃州覽僅文編書其後曰明年再就堯階試應被人呼小狀元後榜僅果為第一黃州復以詩寄之云病中何幸忽開顔記得詩稱小狀元粉壁乍懸龍虎榜錦標終屬鶺鴒原并寄何詩曰唯愛君家棣華榜登科記上並龍頭潘逍遙亦有詩曰歸來遍檢登科記未見連年放弟兄而陳堯叟堯咨兄弟亦前後相繼為狀元實士林盛事也勘書儒官無外事招客勘青編筆墨東西置朱黃次第研頻憂傷㸃竄細恐誤流傳改是文辭正增加字數全端坐窮今古披襟見聖賢得興忘昏曉題名記歲年棲毫思確論廢卷為忘篇魚魯皆刪定誰人敢間然宋文鑑贈种徵君放雄名英槩比君難二十髙名滿世間飛詔幾回來北闕草𤣥終不出南山詩篇落處風雷動筆力停時造化閒仙術每將丹訣解史才曽把逸書刪家僮只有猿隨從坐客唯聞鶴往還兩制詞臣求識面九重天子望祗顔處士星孤輕世俗大夫松好賤官班棊殘夜石秦雲斷琴徹秋嵓蜀月彎朝議蒲輪看再降肻教從此老柴關合璧事類後集句汾水冷光搖畫㦸蒙山秋色鎖層樓送劉綜學士出守并門詩話總龜李慶孫慶孫泉州惠安人咸平元年進士官水部郎句軸裝曲譜泥金字樹記花名玉篆牌韻語陽秋晏元獻云太乞兒相若諳富貴者不爾也錢易易字希白昆之弟歸宋中咸平二年進士仕為翰林學士卒有金閨瀛洲西垣制集擬張籍上裴晉公午橋莊上千竿竹緑野堂中白日春富貴極來唯歎老功名髙後轉輕身嚴更未報皇城裏勝賞時遊洛水濵昨日庭趨三節度淮西曽是執戈人許彥周詩話錢希白作擬唐詩百篇備諸家之體自序曰今之所擬不獨其詞至于題目豈欲拋離本集或有事疏斯亦見之本傳嵇康小舞詞并序薛九江南富家子得侍宫中善歌舞嵇康嵇康江南曲名也學舞於鍾離氏建業破零落於江北豫遇於洛陽福善坊趙春舍飲酣於是歌嵇康其詞即後主所製焉嘗感激坐人皆泣春舉酒請舞謝曰老矣腰腕衰硬無復舊態乃强起小舞終曲而罷座有王生者請豫為嵇康小舞詞薛九三十侍中郎蘭香花態生春堂龍盤王氣變秋霧淮聲哭月浮秋霜宜城酒煙濕羇腹與君强舞當時曲玉樹遺辭莫重聽黃塵染鬢無前緑我聞襄陽白銅鞮荒情古豔傳幽悲淒涼不抵亡國恨座中苦淚飛柔絲洛陽公子擎銀觴跪奴和曲生輝光茂陵旅夢無春草彤管含羞裁短章補侍兒小名録西遊曲花銷秋老白日短敗紅荒緑迷空館擬將清血灑昭陵幽谷蛇啼半山晚十年辭家勤獻書王孫不許延公車江頭祖廟祭無血重門生草寒離離我有王孫三尺劒姦骨無痕古波豔佩入函關無故人玉握凋零七星暗宋文鑑句緑章封事緘初啓青鳳求凰尾乍開芭蕉談苑楊文公雙蜂上簾額獨鵲䙚庭柯詩人玉屑李堪堪字仲任晉陵人咸平二年登第景德間為古田令官至工部尚書仙樓道院在古田縣五華山尋源探雲霞中有金仙家綺疏見飛翬雕闌燦朱華珍禽棲不去靈液流無涯晴旭起風篁空香送天花春雷㑹社鼓寒煙聚海茶竒峰媚如削芳樹一何嘉且將白閣齊絶與紅塵賒終然謝朝紱此地營丹砂福州府志句海月隨帆落溪花繞驛流送周建州皇朝類苑陳堯咨堯咨字嘉謨堯佐弟咸平三年進士第一歷官翰林學士武信軍節度使知河陽又徙天雄軍卒贈太尉諡康肅普濟院在餘桃山逺峯峯碧林疏葉葉紅憑闌對僧語如在畫圖中㑹稽志題三桂亭不誇六印滿腰懸二頃仍尋負郭田當日弟兄皆刷羽如今鴻雁盡摩天扶疏巳問新栽竹清淺猶尋舊潄泉大尹今來還又去夕陽旌斾復翩翩陜西通志三桂亭在長安城南宋諫議大夫陳公之别墅三子堯叟堯佐堯咨皆登科故亭因以名大中祥符間堯咨知永興軍書詩于碑至今猶存邵煥煥淳安人咸平三年進士仕至員外郎句官船風破浪關吏鼓通晨送晏集賢南歸皇朝類苑李永句朝憑玉几言猶在夜啓金縢事巳非熙陵挽詞退朝録春明鄭戩戩字天休吳縣人舉進士纍官右諫議大夫樞密副使以資政殿學士知杭州復為陜西四路安撫使拜奉國軍節度使卒贈太尉諡文肅句春至不擇地路旁花自開嘉祐雜志長安北禪寺筍石鄭天休資政題十字刋之許式式字叔矜吳郡人咸平三年進士官比部郎中出守南昌終轉運使寄洞山聰禪師語言全不滯高躡祖師蹤夜坐連雲石春栽帶雨松鑑分金殿燭山答月樓鐘有問西來意虛堂對遠峯林閒録王曙曙字晦叔河南人東臯子績之後舉進士咸平中舉賢良方正科策入等仁宗朝歷官樞密使拜同中書門下平章事卒贈太保中書令諡文康有集回峯院山勢欲壓海禪扃向此開魚龍腥不到日月影先來樹色秋擎出鐘聲浪答回何期隨吏役暫得拂塵埃娛書堂詩話文康王公晦叔嘗宰定海縣賦回峯院詩云云商逸卿得遺墨刻之句千山送客東西路一樹照人南北枝苕溪漁隱叢話許洞洞字洞天吳郡人太子洗馬仲容之子咸平三年進士以忤知州馬知節奏除名祥符初祀汾陰獻三盛禮賦官烏江主簿有集歐公詩話許洞進士及第無名子嘲曰張康渾裹馬許洞閙裝妻吳郡圖經續記許洞以文辭稱于吳尤邃左氏春秋嗜酒嘗從酒家貸飲一日大寫壁作歌數百言鄉人競來觀之售數倍乃盡捐其所負至吳郡志許洞所居常植一竹以表特操吳人今詠之曰許洞門前一竿竹贈潘閬潘逍遙平生才氣如天高倚天大笑無所懼天公嗔汝口呶呶罰教臨老頭補衲歸中條我願中條山神鎮長在驅雷叱電趕出者老怪中吳紀聞洞與潘閬錢易為友狂放不羈閬坐盧多遜黨亡命乃變姓名僧服入中條山洞密贈之王曾曾字孝先益都人咸平五年鄉貢試禮部廷對皆第一仁宗朝拜右僕射兼門下侍郎平章事集賢殿大學士封沂國公卒贈侍中諡文正歷代吟譜王曽投吕文穆早梅詩雪中未問和羮事且向百花頭上開吕公曰此生次第安排作狀元宰相矣後果然李文定公迪咸平景德澠水燕談王文正公曽間相繼狀元及第其後更踐政府及罷相鎮青又為交承故文正送文定移鎮兗海詩有錦標得雋曽相繼金鼎調元亦踐更之句又云并土兒童君再見㑹稽章紱我偏榮蓋文定再鎮兗而青社文正鄉里也皇帝閣立春帖子北陸凝陰盡千門淑氣新年年金殿裏寶字帖宜春合璧事類前集送何水部蒙出牧袁州雉省榮遷拜命新魚符重佩出關頻停驂卻訪枌榆社戀闕回瞻析木津水薤有誰裨政術江山終日助吟神一麾嶺外遙相望應合趨庭問絹人江西通志句欲謝君恩卻無語心前笑指赤靈符夫人閣端午帖子合璧事類前集陳亞亞字亞之維揚人咸平五年進士嘗為杭之於潛令仕至太常少卿好為藥名詩有澄源集迂叟詩話陳亞郎中滑稽嘗為藥名詩百首其美者有風月前湖夜軒窗半夏涼不失詩家之體齊讀書志藥名詩始于唐人張籍有江臯嵗郡暮相逢地黃葉霜前半下枝之句人謂起於亞之實不然也絶句滿室圖書雜典墳華亭仙客岱雲根他年若不和花賣便是吾家好子孫澠水燕談陳亞少卿畜書數千卷名畫數十軸平生之所寶者晚年退居有華亭雙鶴怪石一株尤竒峭與異花數十本列植于所居為詩戒子孫云云登湖州銷暑樓重樓肆登賞豈羡石為廊風雨前湖夜軒窗半夏涼罾青識漁浦芝紫認仙鄉卻恐當歸闕靈仙為别傷宋文鑑惜竹出檻亦不翦從教長舊叢年年到朱夏葉葉是清風庚溪詩話懷舊隱多愧當年未第間卜居人外得清閒排聯花品曽非僭愛惜苔錢不是慳秋閣詩情天淡淡夕溪漁思月彎彎而今慚厚明朝祿敢念藏愚莫買山瀛奎律髓句浪平天影接山盡樹根回翰府名談棊為臘寒呵子下衣嫌春瘦縮砂裁藥名馬嘶曽到寺犬吠乍行村郊行箱以上青雜記章得象得象字希言浦城人咸平五年進士纍遷兵部郎中知制誥翰林學士寶元初拜同中書門下平章事集賢殿大學士慶歷中拜鎮安軍節度使封郇國公徙判河南府守司空卒贈太尉兼侍中諡文憲改諡文簡巾子山翠微閣在台州步步雲梯徹上層回頭自覺欲飛騰頻來不是塵中客久住偏宜物外僧下寺鐘聲沈地底前峯塔影落階棱憑闌未盡吟詩興卻擬乘間更一登赤城志玉光亭在玉山縣千層懷玉對軒窗池上新亭號玉光秖此便堪為吏隱神仙官職水雲鄉方輿勝覽峽山飛來寺澄江詰曲峽中天遠使歸時駐畫船久别忽經星一紀暫來才見月三弦勞生草草真徒爾陳迹依依亦愴然回首越城何處是山南渺莽只雲煙廣東通志李冠冠字世英歷城人以文學稱與王樵賈同齊名官乾寧主簿有東臯集寄王肩望霜臺御史新為郡棘寺廷評繼下車首謁梓桐王處士教風從此重詩書澠水燕談王樵字肩望淄川人性超逸深老易善擊劒有概世之志廬梓桐山稱淄右書生不交塵務山東賈同李冠皆尊仰之咸平中契丹內寇舉族北俘潛入虜中訪其親纍年乃歸持諸喪刻木為親葬奐山東立祠奉侍終身太守劉通詣樵踰垣遁去其後高辨知州事范諷為通判相與就見之李冠以詩寄之晚自號贅世翁為贊書其門曰書生王樵薄命寡志無益於人道號贅世豫卜地纍卵名繭室中壘石刻銘其上曰生前殺軀以虞不備沒後寄魄以備不虞後感疾即入室自掩户乃卒以古劒殉葬著遊邊集安邊三䇿說史皆散失濟南李芝為贅世先生傳載其事王貽永貽永字季長祁人溥之孫咸平中尚太宗女鄭國長公主纍官樞密使同中書門下平章事拜尚書右僕射檢校太師卒諡康靖句河朔雪深思愛日并門春暖詠甘棠送劉綜學士出守并門詩話總龜李迪迪字復古鄄城人景德二年舉進士第一歷翰林學士給事中參知政事拜吏部侍郎兼太子少傅同中書門下平章事致仕卒贈司空侍中諡文定有集題河陽後城平嵩閣南指嵩髙北太行大河中出貫靈長君王不恃金湯險自有仁恩結萬方宋文鑑晏殊殊字同叔臨川人七歲能屬文景德初以神童召試賜進士出身纍擢知制誥翰林學士慶厯中拜集賢殿學士同中書門下平章事兼樞密院使出知永興軍徙河南以疾歸京師留侍經筵卒贈司空兼侍中諡元獻有臨川集紫微集歸田録晏元獻善評詩嘗云老覺腰金重慵便枕玉涼未是富貴語不如笙歌歸院落燈火下樓臺此善言富貴者也人皆以為知言為詩者宋子京筆記云天聖初元以來縉紳間益少唯丞相晏公殊錢公惟演翰林劉公筠數人而已晏丞相末年詩見編集者乃過萬篇唐人以來未有然晏不自貴重其文凡門下客及官屬解聲韻者悉與之酬和云郡齊讀書志殊性剛峻幼孤篤學為文溫純應用尤長於詩抒情寓物詞多曠達當世賢士如范文正歐陽文忠皆出其門女適富鄭公楊察世稱其知人云示張寺丞王校勘元巳清明假未開小園幽徑獨徘徊春寒不定斑斑雨宿醉難禁灩灩杯無可奈何花落去似曽相識燕歸來遊梁賦客多風味莫惜青錢萬選才復齊漫録晏元獻因觀王琪大明寺詩板大加稱賞召至同飯飯巳又同步遊池上時春晚有落花晏公每得句書牆壁間或彌年未嘗强對且如無可奈何花落去一句至今未能對也王應聲曰似曽相識燕歸來自此辟置館職遂躋侍從和宋子京召還學士院網索軒窗邃鑾坡羽衛重鷁舟還下瀨星駟出飛龍賦待三英集詩須五吏供㑹看邊燧息橫覩紫泥封復齊漫録立春祠太乙紫花雙節引青童一片空歌韻曉風太昊兹辰授春令鸞旗應在矞雲中華燈明滅羽衣攢翠柳蕭森矮檜寒千步回廊繞金殿水蒼瑤佩響珊珊上巳瓊林苑宴二府同游池上即事口占殿後花枝白間紅樓前當道緑楊風橫飛綵艦波光外倒寫朱橋水影中曲榭回廊手伎喧綵樓朱舫鼓聲繁游人巳著濃春去不待歌長舞袖翻寒食東城作王城百五車馬繁重帷黕幕紛郊原游人得意惜光景恣尋復樹登高軒平蕪逺水知何許眼裏迢迢空處所梨花淡豔柳絲長百計撩春作烟雨歌哭聲中半落暉雕鞍繡轂尚遲歸荒田野草人間事誰向伶𤣥淚滿衣七夕百子池深漲緑苔九光燈迥照浮埃天孫寶駕何年駐阿母飇輪此夜來空外粉筵和霧溼靜中珠幌徹明開秋河不斷長相望豈獨人間事可哀中秋月一輪霜影轉庭梧此夕羇人獨向隅未必素娥無悵恨玉蟾清冷桂花孤以上古今嵗時雜詠詠上竿伎百尺竿頭裊裊身足騰跟挂駭傍人漢陰有叟君知否抱甕區區亦未貧侯鯖録弔蘇哥蘇哥風味逼天真恐是文君以上人何日九原芳草緑大家攜酒哭青春西清詩話元獻初罷政事守亳社每歎士風雕落一日營妓曰劉蘇哥有約終身而其母禁之至苦不勝鬱悒方春物暄妍馳駿馬出郊登髙冢曠望長慟而卒元獻云士大夫受人盼睞隨燥溼變渝如翻覆手曽狂女子不若為序其事以詩弔之云東軒筆録晏元獻當國子京為翰苑晏愛宋之才雅欲旦夕相見遂稅一第于旁近延居之其親密如此遇中秋宴客晏召宋出妓飲酒賦詩達旦方罷翌日罷相宋當草詞頗極詆斥至有廣營産以殖私多役兵而規利之語觀者駭歎苕溪漁隱叢話元獻弔劉蘇哥詩序蓋指子京而言也煮茶稽山新茗緑如烟靜挈都籃煮惠泉未向人間殺風景更持醪醑醉花前西清詩話李義山雜纂品目數十蓋以文滑稽者其一曰殺風景謂清泉濯足花上曬褌背山起樓燒琴煮鶴對花啜茗松下喝道晏元獻守潁以惠山泉烹日注茶從容置酒賦詩云云自此殺風景之語頗著于世盂蘭盆紅白薇英落朱黃槿豔殘家人愁溽暑計日望盂蘭老學菴筆記故都殘暑不過七月中旬俗以望日具素饌享先織竹作盆貯紙錢焚之謂之盂蘭盆以為盂蘭盆倒則寒來矣晏元獻詩云云張殿院惠古瓦硯鄴城宫殿久荒涼縹瓦隨波出禁牆誰約蘚文成古硯等閒裁破碧鴛鴦已恣玉鋒磨蘚骨更持蟾淚溼雲根欲知千載淒涼意尚有昭陽夜雨痕硯箋初秋寓直絡河星斗夜闌干禁署沈沈閉九關上帝册書羣玉府仙人宫殿巨鼇山涼蟾影度秋陰薄促漏聲來夜唱閒擁鼻吟多欲愁絶嚴鐘淒斷樹烏還合璧事類前集賦得秋雨㸃滴行雲覆苑牆飄蕭微影度回塘秦聲未覺朱弦潤楚夢先知薤葉涼野水有波增淡碧霜林無韻溼疏黃螢稀燕寂髙窗暮正是西風玉漏長寓意油璧香車不再逢峽雲無迹任西東梨花院落溶溶月柳絮池塘淡淡風幾日寂寥傷酒後一番蕭索禁烟中魚書欲寄何由達水遠山長處處同春陰十二重環閟洞房愔愔危樹俯回塘風迷戲蝶閒無緒露裛幽花冷自香綺席醉吟銷桂酌玉臺愁作澀銀簧梅青麥緑江城路更與登高望楚鄉以上瀛奎律髓送凌侍郎歸鄉一作送林侍郎還知宣州江南藩郡古宣城碧落神仙擁使旌津吏戒船東下穩縣僚負弩晝歸榮江山謝守髙吟地風月朱公故里情曽預漢庭三獨坐府中誰敢伴飛觥曹氏歷代詩選巢父井稟生值堯年率性在龎厚安巢一枝上豈曰鶉居陋潁波人洗耳曽不汚牛口諒兹耕耒暇鑿飲隈林藪含飴鼓其腹帝力豫何有遂令千載外此地存遺甃泓然逼喬木宛若棲塒舊鄉人揭題榜行旅諧瞻覯我來觀古蹟愕立徘徊久淒其望清風不獲見師友願言斟復酌拭面洗心垢翹勤慕髙躅感慨陳巵酒思齊胡可望庶以寬容瞀夙駕恨長途憑髙重回首汝州志題東湖涵虛閣水有支流樹有孫重重門巷挂朱軒三君雅望標人傑千里澄波隔世喧西對户庭徐孺宅北傳鐘梵給孤園欲知嗣續無窮勝兩兩榮歸漢使轓江西詩話句靜尋啄木藏身處閒看遊絲到地時樓臺冷落收燈夜門巷蕭條掃雪天已定復搖春水色似紅如白野棠花春風任花落流水旋杯行以上歷代吟譜樓臺側畔楊花過簾幕中間燕子飛青箱雜記晏穎穎殊弟官奉禮郎臨蛻遺詩江外三千里人間十八年此時誰復見一鶴上遼天道山清話晏穎臨川人丞相元獻公之弟童子時有聲真宗召試翰林院賦宫沼瑞蓮賜出身授奉禮郎穎聞報閉書室高臥家人呼之不應掊鎖就視則巳蛻去旁得書一紙云云時年十八張及及字之元蜀人景德二年進士仁宗朝主管三司鹽鐵出為淮南轉運使贈黃孫二處士二公髙節厭喧卑同寄蕭宫共展眉玉樹冰壺齊品格野雲臯鶴本追隨泉流指下何人賞嶽峭毫端只自知眷戀賢侯美風教故山歸去尚遲遲茅亭客話黃處士延矩字垂範眉陽人也少為僧性僻而簡常言家習正聲自唐以來待詔金門父隨僖宗入蜀至某四世矣琴最盛于蜀製斫者數家唯雷氏而巳咸平中知州馮公知節召孫知微畫俾處士彈琴二公俱止僧舍嘗㑹愚茅亭進士張及贈詩贈杜鼎升家本樊川老蜀都世家冠劒豈寒儒筆耕尚可儲三載酒戰猶能敵百夫僻愛舜琴湘水弄每懸孫畫醉仙圖孟光笑語長相逐喚作梁鴻得也無茅亭客話杜鼎升字大舉形神清秀有古人之風鬻書自給夫婦皆八十餘每遇芳時好景選勝偕行人皆羡其髙年逸樂進士張及贈詩云云郎簡簡字叔亷一字簡之臨安人一作錢唐人景德二年進士歷官右諫議大夫給事中以工部侍郎致仕家居卒贈吏部侍郎宋史本傳簡性和易喜賔客即錢唐城北治園廬自號武林居士導引服餌嵗晚顔如丹尤好醫術人有疾多處方療之有集驗方行于世謝蒙齊筆談郎簡侍郎慶歷中與杜祁公相善事居里中築别館徑山下種菖蒲以自餌山中人目為菖蒲田范文正知錢唐亦重其為人揮麈前録徐度敦立為二卿明清訪之坐間問曰度今此居號侍郎橋何耶明清應以仁宗朝郎簡以工部侍郎致仕居此杭人德之遂以名橋訪徐沖晦湖上訪髙士徑深行緑苔應聞山犬吠知是野人來岸幘出相接柴門自為開林閒清話久薄暮榜舟回宋文鑑鮑當當景德二年進士為河南府法曹歷職方員外郎有清風集方勺泊宅編先子至杭創小圃在清波門外有詩云安得斷茅環堵地漁樵終老繼清風方知是圃乃鮑當郎中故居鮑有詩名清風集時號鮑清風孤雁天寒稻粱少萬里孤難進不惜充君庖為帶邊城信溫公續詩話當為河南法曹初失知府薛映尚書意因獻孤雁詩薛大嗟賞自是遊宴無不預焉不復以掾屬待之時人謂之鮑孤雁薛嘗暑月詣其廨舍當方露頂狼狽入易服把板而出之忘其幞頭薛嚴重左右莫敢言者坐久之月上當顧見髮影大慙以公服袖掩頭而走松江夜泊舟閒人已息林際月微明一片清江水中涵萬古情宋文鑑寄西湖擇棲公兩信海潮喧曉夕百年事過無遺跡舊住招提有幾人春風苔長湖邊石送人南歸凄凄楊柳暮時復一蟬聲滄海不可極風帆難計程微烟生晚浦斜日上孤城欲寄相思札誰傳萬里情以上前賢小集拾遺題林和靖隱居湖水春來緑山雲夏亦繁何如隱君子長嘯掩柴門文翰類選江任任建陽人景德二年進士官祕閣校理知秦州句珠盤臨路泣斗印入鄉提送人皇朝類苑黃覺覺字民先浦城人景德二年進士為殿中丞送梅昌言出鎮太原五馬雍容出鎮時都人爭看好風儀文章一代喧髙價忠直三朝受聖知帳下軍容生劒戟門前行色擁旌旗雲籠古戍黃榆暗雪滿長郊白草衰出去暫開貔虎幕歸來須占鳳皇池鬢間未有一莖白陶鑄蒼生固不遲翠屏筆談梅雅自修飾容儀偉如得詩大喜周啓明啓明字昭回處州縉雲人景德中舉賢良方正罷歸仁宗朝仕至太常丞句一丸童子藥五返使臣車近臣疾愈朝類苑皇鴟夷江上畬田稔牛斗星邊貫索空送皇甫提刑楊文公談苑戚維維楚丘人堅素先生同文子大中祥符初纍官都官員外郎職方郎中送何水部蒙出牧袁州又領親民任星車别紫微隼旟新命重鶴髮故人稀雲樹看如畫風帆去似飛鄉中諸父老榮羡錦衣歸袁州府志孫元方元方大中祥符初官殿中丞送何水部蒙出牧袁州聖君再命擁朱輪合是南方受賜頻雙鬢任從添白髮六條誰許繼清塵風牽澤國秋帆遠路入豐州晝錦新莫為故鄉延去櫂宜春人望待行春袁州府志錢丕丕惟治子大中祥符初官駕部員外郎終光祿少卿送何水部蒙出知袁州白首名郎有幾人雙旌晝錦不如君楚江萍暖烘朝日玉女衣輕挂曉雲極浦仙舟煙淡淡髙秋郡閣葉紛紛政成更與他州别從古宜陽重藝文袁州府志盛元元大中祥符初屯田員外郎送何水部蒙出牧袁州文昌郎位改清資乞領魚符賦式微雉省月寒慵夜直隼旟風細喜秋歸宜春酒助新開宴侍史香餘舊賜衣客向西山思井舊莫教漚鳥見人飛袁州府志青陽楷楷蜀人題玉光亭和章郇公韻鳴琴賢宰有三長吟得新詞敵夜光好是斷章無以和神仙官職水雲鄉信州圖經玉光亭在玉山縣㕔之東章郇公詩碑在焉蜀人青陽楷和韻云云髙覿覿字㑹之宿州蘄人第進士纍官集賢院學士進給事中知單州海棠錦里花中色最竒妖嬈天付本來稀綺霞忽照迷紅障縠露輕籠設翠幃繁朵有情妝媚景纖枝無力帶殘暉好將繡向羅襟上永作香閨楚楚衣海棠譜宋詩紀事卷七
