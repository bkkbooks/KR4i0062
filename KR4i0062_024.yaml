body:
  text: 宋詩紀事卷二十四錢塘厲鶚撰周延雋延雋字仲章鄒平人治平間以職方郎中知台州纍遷太常少卿經臺幽致極東南清隂潤客衫林深才辨徑雲滿欲藏巖琴想山猿伴花憎谷鳥銜孤標如可挹墜稿悵開緘台州府志王詵詵字晉卿開封人選尚英宗女秦國大長公主為利州防禦使以黨籍貶均州歷定州觀察使開國公駙馬都尉贈昭化軍節度使諡榮安劉後村西園雅集圖跋云夲朝戚畹惟李端願王晉卿二駙馬好文喜士世傳孫巨源三通鼓眉山公金叉墜之詞想見一時風流醖藉未幾烏臺鞠詩案賔主俱謫而囀春鶯輩亦流落于他人矣後唐莊宗廟代梁繼李號良圖卻惑歌兒便喪軀試拂塵埃覘遺像元來滿靣是髭鬚侯鯖録湖上贈别並序余前年恩移清潁道出許昌前途小阻留西湖之别館者幾一月常與韓持國范景仁泛舟嘯詠使人頓忘去國流離之恨也韓公德性溫厚風度髙雅固已可愛范公雖老而精神不衰議論純正白鬚紅靣動輒醺酣時余有所賦詠公即取紅蓮葉命筆疾書初不經思佳辭麗句頃刻而成坐客莫不驚歎也比聞朝廷就除端明殿學士以寵之因思方今進任老成如公者若再起之亦足以厚風俗耳清影十分月暗香千柄蓮不知從此别高會復何年奉和子瞻內翰見贈長韻帝子相從玉斗邊洞簫忽斷散非煙平生未省山水窟一朝身到心茫然長安日遠那復見掘地寧知能及泉幾年漂泊漢江上東流不舍悲長川山重水逺景無盡翠幕金屛開目前晴雲羃羃曉籠岫碧嶂溶溶春接天四時為我供畫夲巧自增損媸與姸心匠構盡遠江意筆鋒耕遍西山田蒼顔華髮何所遣聊將戲墨忘餘年將軍色山自金碧蕭郎翠竹夸嬋娟風流千載無虎頭於今妙絶推龍眠豈圖俗筆挂高詠從此得名因謫仙愛詩好畫本天性輞口先生疑宿緣會當别寫一匹煙霞境更應消得玉堂醉筆揮長篇子瞻再和前篇非唯格韻高絶而語意鄭重相與甚厚因復用韻答謝之憶從南澗北山邊慣見冷雲和野煙山深路僻空弔影夢驚松竹風蕭然杕藜芒屩謝麈境巳甘老去棲林泉春籃採术問康伯夜竈養丹陪稚川漁樵每笑坐爭席鷗鷺無機馴我前一朝忽作長安夢此生猶欲更問天歸來未央拜天子枯荄敢自期春妍造物潛移真幻影感時未用驚桑田醉來卻畫山中景水墨想像追當年玉堂故人相與厚意使嫫母齊聨娟豈知憂患耗心力讀書懶去但欲眠屠龍學就本無用只堪投老依金仙更得新詩寫珠玉勸我不作區中緣佩服忠言匪論報短章重次木瓜篇以上式古堂書考句佳人巳屬沙叱利義士今無古押衙許彥周詩話晉卿得罪外謫後房善歌者名囀春鶯為密縣馬氏所得後還朝尋訪微知之作詩云云僕在密縣與馬縉輔逰知之最詳縉輔在其兄處猶見之西清詩話云過潁昌見之誤也章峴峴治平中廣南西路提點刑獄轉運使丁未上已重遊龍隱巖溪干檥棹訪巖扉危磴攀躋不欲歸埀乳滴聲當佛座宿雲留潤在僧衣聊開禊席臨流水間擲文竿到落暉旅宦天涯甘寂寞送春無意惜芳菲桂勝蔡覿覿治平中定海縣尉正覺寺清風軒在定海縣西北海風拍枕燈初暗山雨打窗人正寒料得此軒秋更好怒濤推月上闌干延祐四明志滿執中執中字子權廣陵人治平中為萬壽令石屏路石屏月如水石壁雲不動間中欹枕臥天地同一夢明月溪月出溪水清月落溪水黑茫茫溪上人笑與月為客以上滁陽志馬道道吉州人啄木翠翎迎日動紅觜響煙蘿不顧泥丸及唯貪得食多才離枯朽木又上最高柯吳楚園林濶忙忙爭奈何翰府名談治平中有為吉水令忘其姓名治邑嚴酷野人馬道為啄木詩諷之令見詩稍緩刑時人目曰馬啄木薛唐唐鄞人有田間集田舍作世業存五畝家風守二南適情無過睡幽事不妨貪母老厨增肉朋來樹選柑每慙躬稼穡未及野農諳甬上耆舊集蕭介夫介夫字純臣泰和人英宗朝官萍鄉簿將進酒歌勸君莫纍黑山土纍得黑山竟何補勸君莫勒燕然石勒得燕然又何益百年歲月能幾何螢燭光中都瞬息我今安得萬丈梯騰騰直上天街墀剪折金烏翅截下玉兔蹄使玉兔不能走金烏不得飛然後舉泰山為肉林東海為酒池君不見吳下秋風悲金谷園中春草衰不如相逄且飲酒齊聲拍掌大唱金縷衣吉安府志錢忠句滿目生涯千頃浪全家衣食一綸竿吳郡志治平中錢忠過吳遊賞遙見一好女子獨棹煙波間忠悅之贈詩云云女擕詩呈父父以女妻忠泛舟同入煙波不知所往錢信句安得神仙術試為施康濟使此平望村如吾江子滙齊東野語錢信平望蚊詩云云吳興獨江子滙無蚊舊傳馬自然泊舟於此王安禮安禮字和甫安石弟早登科纍官知制詔翰林學士知開封府尚書左丞紹聖初罷知太原府卒有王魏公集恭和御製上元觀燈鑾輿清曉出瑶臺羽衛瞻迎扇影開鳳闕張燈天上坐雞林獻曲海邊來修文可笑秦無䇿能賦休誇楚有才星漢未斜鈞樂闋君王宣示萬年杯瓊林苑賜宴餞留守太尉輒繼高韻名德曾來重四夷朝廷今日見官儀陪祠自冠三公位分陜猶為百辟師金谷望塵多眷舊瓊林賜餞盡巫疑都人喜見斾旌美寧識勳名在鼎彝以上瀛奎律髓王安國安國字平甫安禮弟神宗召試賜第為祕閣校理呂惠卿引連鄭俠獄奪官卒有集耆舊續聞熙寧中高麗遣使入貢且求王平甫學士京師題詠有旨令權知開封府元厚之內翰抄録以賜厚之自詣平甫求新著平甫以詩戲之曰誰使詩仙來鳳沼欲傳賈客過雞林題滕王閣滕王平昔好追逰高閣依然枕碧流勝地幾經興廢事夕陽偏照古今愁城中樹密千家市天際人歸一葉舟極目滄波吟不盡西山重疊亂雲浮能改齋漫録王平甫年十三作記夢萬頃波濤木葉飛笙簫宮殿號靈芝揮毫不似人間世長樂鐘聲夢覺時冷齋夜話王平甫熙寧癸丑歲直宿崇文院夢有邀之至海上見海水中宮殿甚盛其中作樂笙簫鼓吹之妓甚衆題其名曰靈芝宮邀之者欲俱往有人在宮側隔水謂曰時未至且令去他日當迎之至此恍惚夢覺時禁中已鳴鐘平甫頗自命不凡為詩記之杭州呈勝之遊覽須知此地佳紛紛人物敵京華林巒臘雪千家水城郭春風二月花彩舫笙歌吹落日畫樓燈燭映殘霞如君援筆宜摹寫付與塵埃北客誇瀛奎律髓云此平甫作誤入荆公集西湖春日曰琯按以下二首誤入林逋集爭得才如杜牧之試來湖上輒題詩春煙寺院敲茶鼓夕照樓臺卓酒旗濃吐雜芳薰巘崿溼飛雙翠破漣漪人間幸有蓑兼笠且上漁舟作釣師春隂似雨非晴意思深宿酲牽率臥重衾苦憐燕子寒相並生怕梨花晚不禁薄薄簾帷欺欲透遙遙歌管壓來沈北園南陌狂無數秖有芳菲會此心以上瀛奎律髓句海鵬未擊三千里天馬須歸十二間苕溪漁隱叢話風暄翠幕春沾酒露溼筠籠夜賣花洛中聞見前録當時徐氏擅筆墨夜圍夢墮空中篩金玉詩話王師弔伐江左城破或夢丱角女子行空中以巨篩篩物散落如豆著地皆成人問其故曰此當死於難者後見貴人盛冠服繼墮于地云此徐舍人也既寤聞徐鍇死圍城中王文公兄弟在金陵和王微之哲登髙齋詩押篩字平甫有句云云此事竒譎而屈曲強韻中可謂摶虎手也宮殿影搖河漢外江湖夢斷曉鐘邊館中題壁忽吟佳句詩驅暑逺勝前人檄愈風病中答蘇子容九月清霜送陶令千年白日見滕公王繹學士挽詞以上隱居詩話沈遼遼字睿逹錢唐人遘弟用兄任監夀州酒稅熙寧中以太常寺奉禮郎監杭州軍資庫轉運使攝華亭縣他使者以夙憾文致其罪下獄奪官流永州徙池州有雲巢編金玉詩話遼尤工翰墨登科之後遊京師偶為人書裙帶詞頗不典流傳逹于宮禁近幸嬪御服之遂塵乙覽後削籍為民奉陪穎叔賦鎖院牡丹昔年曾到洛城中玉碗金盤深淺紅行上荆溪溪畔寺愧將白髮對東風池陽寒煙寂寂鎖青溪圓月亭亭上曲隄小杜風情遙可想間調絲竹舞金泥陸機宅朝日欲出已復西人間興廢那可知崑山陵谷久巳變水傍惟有將軍碑龜兹舞龜兹舞龜兹舞始自漢時入樂府世上雖傳此樂名不知此樂猶傳否黃扉朱邸畫無事美人親尋教坊譜衣冠盡得畫圖看樂器多因西域取紅緑裀結坐後部長笛短簫形製古雞婁揩鼓舊所識饒貝流蘇分白羽玉顔二女髙髻花孔雀羅衫金畫縷紅鞾玉帶踏筵出初驚翔鸞下玄圃中有一人奏羯鼓頭如山兮手如雨其間曲調雜晉楚歌詞至今傳晉語須臾曲罷立前廡歎息平生未嘗覩清都閬苑昔有夢寂寞如今在何所我家家住滄海涯上國樂事殊未知玉顔邀我索題詩它時有夢與誰期以上雲巢編王欽臣欽臣字仲至洙之子用蔭入官文彥博薦試學士院賜進士及第歷集賢殿修撰知和州徙饒州斥提舉太平觀徽宗立復待制知成德軍卒入黨籍有廣諷味集宿華嶽觀凌空老樹雲垂葉壓屋梨花雪照人深愧地仙教俗客殷勤留看華山春再題華嶽觀石壇流水共蒼苔青竹林間一徑開可惜梨花飛巳盡前年遊客始重來以上江鄰幾雜志召試學士院試罷作翠木隂隂白玉堂老來方此試文章日斜奏罷長楊賦間拂塵埃看畫牆西清詩話荆公見之甚歎賞為改作奏賦長楊罷且云詩家語如此乃健戲書長老院蜀國相如最好詞武皇深恨不同時凌雲賦罷還無用寂寞文園興可知能改齋漫録熙寧中王仲至自河北被召用荆公薦對神宗問所與遊從公奏宋敏求帝默然遣任公因留一詩書長老院中云云荆公愛其詩自題於所執扇與秦少逰于恭敏李公燕間堂聨句黃葉山頭初帶雪緑波尊酒暫回春王已聞璧月瓊枝句更著朝雲暮雨人秦老愧紅妝翻曲妙喜逄佳客放懷新王天明又出桃源去仙境何時再問津秦漫能改齋録次韻蘇子由詠李伯時所藏韓幹馬天間不遇頭亦垂真性夲不求青絲由來竒骨類竒士立見俱似囊中錐鳳頭初踏蔥嶺至繡膊東由青海馳春風宛轉白玉鐙晚日照耀黃金羈李侯對此意匠發造物真比毫端竒方歅之相豈可擬顛倒未免雄稱雌翰林相繼寫高韻何止羊何共和之玉花照夜古稱美顔色乃是論其皮固知神駿不易寫心與道合方能知文章書畫固一理不見摩詰前身應畫師聲畫集使遼回謁恭敏李公席上作穹廬三月巳淹留白雪黃雲見即愁滿袖塵埃何處洗李家池上海棠洲詩人玉屑遊王官谷鐘鼎山林出處明中間不合枉高情有錢須買王官谷流水聲中過一生王官谷集安燾燾字厚卿開封人舉進士神宗朝歷官同知樞密院事哲宗朝拜門下侍郎落職知大名府徽宗朝知河南降祁州團練副使還洛卒入元祐黨籍重題江干初雪圖事詳韓忠彥詩下曾遊滄海困驚瀾晚涉風波路更難從此江湖無限景不如秖向畫圖看石林詩話韓忠彥忠彥字師朴琦子以父任為將作監復舉進士元祐中同知樞密院事徽宗朝進左僕射兼門下侍郎封儀國公謫磁州團練副使致仕卒入元祐黨籍題江干初雪圖諸公當日聚巖廊半謫南荒半巳亡唯有紫樞黃閣老再開圖畫看瀟湘石林詩話江干初雪圖真迹藏李邦直家唐蠟紙夲世傳王摩詰所作元豐間王禹玉蔡持正韓玉汝章子厚王和甫張邃明安厚卿七人題詩建中靖國元年韓師朴相邦直厚卿同在二府時前七人者所存惟厚卿而巳持正貶死嶺外禹玉追貶子厚方貶玉汝和甫邃明則死久矣故師朴題其後云云紫樞黃閣謂邦直在門下厚卿在西府也厚卿復題邦直亦自題云駕幸太學恢崇儒教頓生光天子親來幸上庠星辨煌煌環帝座霜袍密密綴周行廟祠稽首尊先聖書義終篇勸嗣王學道深慙非入室此辰榮事亦升堂中州題咏集許遵遵字仲塗泗州人第進士熙寧間判大理出知潤州提舉崇福宮遊風水洞水洞連風洞精藍兩洞前山高易藏日樹老不知年板有華宗什名留少傅篇煙波門外境寂寞變桑田咸淳臨安志沈立立字立之歷陽人舉進士歷江淮發運使知越杭二州英韶在前徒矜下里之曲風雅未喪豈繫擊轅之音不圖綴綺靡之辭抑將導敦厚之旨耳海棠雖盛於蜀人不甚貴因暇偶成五言百韻律詩一章知我者無加焉岷蜀地千里海棠花獨姸萬株佳麗國二月豔陽天叢萼勻如布修蕤巧似編彤雲輕點綴赤玉碎雕鐫瑟瑟光輪瑩猩猩血借鮮淺深相向背疏密遞句牽輕蒨重重染丹砂細細研蘂纖金粟拱鬚嫩紫絲拳紅蠟隨英滴明璣著顆穿初莖爭裊娜翹幹共蹁躚絶代知無價生香不減􅀢分靈應桂苑鍾粹定星躔木帝經邦相花王入室賢祥飇如剪拂卿靄共陶甄真宰隂推轂句芒與著鞭不須憂薄命好為惜流年贊翼施生柄扶持煦嫗權主張韶令正調燮淑威宣和氣高低洽芳心次第還金叉人十二珠履客三千雲雨迷巫峽風波怨洛川娉婷宜住楚妖冶合居燕繡被通宵展華燈徹曙燃橫披前檻外半出假山巔暗羡遊蜂採偷輸蟻穴沿瘦嫌闕網織柔怯女蘿纒蓄恨憑誰訊無言只自憐文君酒壚畔揚子草堂前品格生來别風流到老全繁中生悵望衆裏見喧闐暄暖精神出晴明意態便關關鶯對語兩兩燕高鶱天上宜封殖人間偶佇延共櫻圍别館與杏擁斜阡清暖簾爭卷黃昏幕尚褰低籠金轣轆高映畫秋千忽認梁園妓深疑閬苑仙蔥蔥來蕙圃逺逺别芝田羞隱冥濛霧輕如淡蕩煙乍逄開羽扇初喜下雲軿倣佛同星靨依稀帶翠鈿五銖衣宛轉七寶帳翩翾獨立挨霓節成行列彩旃困宜欹虎枕步好襯金蓮舞定休廽袖妝濃不傅鉛蓋張松鬱鬱茵藉草芊芉馥郁蘭供夢扶蘇栁伴眠軀輕彌綽約腰細更便嬛婭姹常顒若幽柔自灑然侍兒羅白芷婢子列芳荃口口濃檀注腮腮薄粉填解圍施葉幄買笑有榆錢旖旎環瑶席婆娑匝玳筵嬌依屏曲曲泣對露涓涓南陌輕埃蔽東郊夕照連幾時休縹眇從此識嬋姢是處遺簮珥誰家不管弦妒姬貪恐失戲稚惜何顛折閃搔頭褪擎樅約腕揎戴遮鬟上鳯裝壓鬢邉蟬汲引新歡聚消磨忽忿蠲縱觀須倒載命宴必加籩翻曲教歌媛更詞送酒船鄉心須暫解病眼當時痊迢遰來油壁從容住錦韉雅宜交讓比穠與棣華聫不憤參朱槿寧甘混木棉酴醿潛失色躑躅敢差肩素奈思投迹夭桃耻借貟梧桐愧金井芍藥濫花磚併壓辛夷俗潛排寶馬蔫天恩無久恃人寵莫長專布影交三徑敷榮遍一廛凝眸方曄曄回首旋翩翩可忍驚飇挫胡煩急景煎珊瑚隨手碎絳雪繞枝旋拂漢霞初散當樓月自圎飄零隨蠛蠓散亂逐漪漣灼灼龜城外亭亭錦水邉抱愁應慘蹙有淚即潺湲午隱迷蝴蝶朝寒怨杜鵑物情元倚伏人意莫拘攣擢秀高羣木稱珍極八埏未開獨脈脈憂落固悁悁别著新文紀重尋舊譜箋共知紅豔好誰辨赤心堅實合陪朱李根宜灌醴泉栽須憐竹柏樹莫繞烏鳶耻托膏腴茂當隨富貴遷為多猶底滯因逺尚迍邅客思易成亂心期未省愆畫思摩詰筆吟稱薛濤箋醉目休頻送詩情豈易緣薛能誇麗句鄭谷賞佳篇止感芳姿美那憐託地偏山經猶罕記方志未多傳巧詠憂才竭冥搜得意闕遐陬寡真賞僻境忍輕捐抽祕慙非據探竒敢讓先援毫敘名卉聊用放懷焉海棠譜張舜民舜民字藝叟邠州人第進士元祐初除監察御史徽宗朝為吏部侍郎以龍圗閣待制知同州坐元祐黨貶商州卒高宗追贈寶文閣直學士自號浮休居士又號矴齋娶陳師道之姊有畫墁集畫繼藝叟生平嗜畫題評精確雖南遷羈旅中每所經從必搜訪題識東南士大夫家所藏名品悉載録中亦能自作山水有理致最刻意於郡齋讀書志藝叟為文豪重詩晚好樂府百餘篇自序云年踰耳順方敢言詩百世之後必有知音者孫公談圃張藝叟謫郴州稅郴多碧蓮根大如碗張嘗以墨印于詩稿上以詫北人也西征回途中二絶靈州城下千枝栁總被官軍斫作薪他日玉關歸去路將何攀折贈行人青銅峽裡韋煙路十去從軍九不回白骨似沙沙似雪將軍休上望鄉臺東坡題跋舜民通綀西事從高遵裕西征回途中作二絶云云為轉運判官李蔡所奏貶郴州監稅舜民言官軍圍靈武不下糧盡而退西人從城上呼官軍漢人兀攃否或仰而答曰兀攃城上皆大笑西人謂慙為兀攃也自題畫扇忽忽西遷不記年二妃祠外橘州前眼昏筆戰誰能畫無奈霜紈似月圎鄧正字宅見劉明復所畫麓山秋景洛陽才子見長沙自識中丹鬢未華文武才全皆不試丹青筆妙更誰加老杉列在皇堂上小景將歸學士家我有故山常自寫免教魂夢落天涯題薛判官秋溪煙竹深墨畫竹竹明白淡墨畫竹竹帶煙高堂忽爾開數幅半隱半見如自然贈山人張無惑善畫山水西征已度故關山秋雨零零路屈盤受盡艱辛心不足解程又展畫圖看以上畫繼京兆安汾叟赴辟臨洮幕府南舒李君自畫陽關圖并詩以送行浮休居士為繼其後古人送行贈以言李君送人兼以畫自寫陽關萬里情奉送安西從辟者澄心古紙白如銀筆墨輕清意瀟灑短亭離筵列歌舞亭亭喧喧蔟車馬溪邉一叟靜垂綸橋畔俄逄兩負薪掣臂蒼鷹隨獵犬聳耳駏驢扶隻輪長安陌上多豪俠正值春風三二月分明朝雨浥輕塵客舍青青栁色新主人舉杯苦勸客道是西征無故人殷勤一曲歌者闋歌者背淚霑羅巾酒闌童僕各辭親結束韜縢意氣振稚子牽衣老人哭道上行客皆酸辛唯有溪邉釣魚叟寂寂投竿如不聞李君此畫何容易畫出漁樵有深意為道世間離别人若箇不因名與利紅蓮幕府盡竒才家近南山紫翠堆烜赫朱門當巷陌潺湲流水繞亭臺當軒怪石人稀見夾道長松手自栽靜鎖園林鶯對語密穿堂戶燕驚回試問主翁在何所近向安西幕府開歌舞教成頭已白功名未立老相催西山東國不我與造父王良安在哉已卜買田箕嶺下更看築室潁水隈慿君傳語王摩詰畫箇陶潛歸去來聲畫集紈扇紈扇夲招風曾將熱時用秋來挂璧上卻被風吹動蒙齋筆談感時事戲作少年辛苦校蟲魚晚嵗雕蟲恥壯夫自是諸生猶習氣果然紫詔盡驅除酒間李賀皆投筆地下班揚亦引車唯有少陵頑鈍叟靜中吟撚白髭鬚韻語陽秋熙寧四年荆公預政罷詩賦專以經義取士元祐五年復用詩賦紹聖初以詩賦為元祐學術復罷之政和中遂著于令士庶傳習詩賦者杖一百畏謹者至不敢作故藝叟感而賦此真州儀真觀聞説仙鄉接一作即瀨鄉間遊詩侣禮虛皇三潮寶𣲖通胥浦萬葉靈杉蔽蜀岡天地杳冥供寫像江山廽合助靈祥五雲送入蓬萊島留與人間作道場古今詩話揚州揚子縣古白沙鎮也祥符丁晉公鑄聖祖天尊像遂為真州有儀真觀觀西一水縈廽南入大江號曰胥浦一日三潮俗云子胥解劍之所觀之記載使者以像在舟日方午潮水忽至今有午潮張藝叟詩云云和喻明仲馬上吹笛越客思歸黯不平間持長笛寫秦聲羡君氣海如斯壯博我詞鋒孰敢爭江上梅花開又落隴頭流水咽還驚豈知不寐鰥魚眼獨坐山堂對月明墨莊漫録喻陟明仲睦州人持節數部政績藹著雅善散𨽻尤妙長笛每行按至山水佳處馬上臨凰快作數弄嘗有馬上吹笛詩寄藝叟藝叟和之云云東坡先生哀詞并序我守中山乃公舊國雪浪蕭齋於焉食宿俯察履綦仰看梁木思賢閲古皆經貶逐玉井芙蓉一切牽復云云石與人俱貶人亡石尚存郤憐堅重質不減浪花痕滿酌中山酒重添丈八盆公兮不歸北萬里一招魂思賢閲古皆中山後圃堂名墨莊漫録東坡帥中山得黑石白脈如孫知微所畫石間奔流盡水之變作白石大盆以盛之激水其上名其室曰雪浪齋公自銘云玉井芙蓉丈八盆伏流飛空潄其根時有英州之命後謫惠州又徙海外故中山後政以公遷謫雪浪之名遂廢元符中始被北歸之命將至吳中張藝叟守中山葺治雪浪齋重安盆石方欲作詩寄公聞公之薨乃作哀詞云云題木居士波穿火透本無竒初見潮州刺史詩當日老翁終不免後來居士欲奚為山中雷雨誰宜主水底蛟龍睡不知若使天年俱自遂如今已復長孫枝墨莊漫録退之所題木居士在今衡州耒陽縣鼇口寺元豐初年旱暵禱之不應縣令析而焚之僧道符更刻木為形以事藝叟南遷郴州過而見之題詩于壁戲作芝蘭雖好忌當門何况庭前惡土墩畚鍤才興雙劍出狐狸盡去老松蹲百年守冢真堪笑一日開軒亦可尊安得擲從天外去成都石筍至今存墨莊漫録衢州廳事下舊有土勢隆起篠木叢生相傳云古冢也舊有碑其文曰五百年刺史為吾守墓以此前後相承皆畏而不敢慢紹聖元年齊安孫賁公素為守問之左右以是對公命毁去之官吏大恐闔府叩頭以諌公曰藉令土中有賢者骨當以禮法遷之乃為文自祭而除之斸深丈餘了無他異但有二石峯長五六尺堅瘦清潤又有大木之根蟠踞其下羣疑遂定石上有刻云乾符五年五月三日安于此押衙徐諷龍山起此石處得二石刺史季闕題又刻云開寶七年重疊峨嵋山於廳事前于郡齋文會閣移季公之石安置于此刺史慎知禮題時公素方修州治南韶光園重建清冷堂堂成季乃移二石于堂下名曰雙石嗟乎慎公移石去公之得石凡九十七年公素之破疑冢出石去慎公又一百二十一年物之顯晦抑自有數第不知峨嵋之廢乃冒冢之名自何時也公素一旦戲笑為之遂釋千百年之惑張藝叟有詩云云公素可謂剛毅正直自信之君子也過魏文貞公舊莊破屋居人少柴門春草長兒童不識字耕稼鄭公莊老學菴筆記宣赦詩擊鼓填街道傳聲過水濵國嚴三嵗祀恩洗萬方春舟楫隨南斗衣冠拱北辰嶺南并嶺北多少望歸人侯鯖録紹聖中藝叟入黨籍繫潭州赦書中獨元祐人不赦為詩云云九日一見黃花只自羞蕭然短髮不禁秋誰人為整烏紗帽獨倚西風滿眼愁合璧事類前集次長蘆炎荒往返正三年重過長蘆古寺前萬里風波行欲盡停橈南望一澘然輿地紀勝賜資治通鑑呈范淳父學士通鑑初成賜近臣不遺疏賤布恩均我投淮水五千里君滯周南二十春東觀汗青身是夢西宮削稿事如新細思當日修書者秖有三人今一人菊坡叢詁治平中英宗患歷代史繁多難見令司馬溫公編進君臣事迹請置局辟官薦劉道原劉貢父又辟范淳父在局書成進上神宗賜名資治通鑑元豐末進五代記遷公資政殿學士除淳父袐書省正字為賞時道原已死貢父方貶官衡州也元祐初溫公還朝作門下侍郎用宰相蔡持正劄子付下國子監開板令溫公門下士及館職校讎之板成遍賜宰執侍從及校讎官各以表謝張藝叟詩云云三人謂貢父道原淳父也打麥打麥打麥彭彭魄魄聲在山南應山北四月太陽出東北才離海嶠麥尚青轉到天心麥已熟鶡旦催人夜不眠竹雞呌雨雲如墨大婦腰鐮出小婦具筐逐上壠先捋青下壠已成束田家以苦乃為樂敢憚頭枯面焦黑貴人薦廟已嘗新酒醴雍容會所親曲終厭飫勞童僕豈信田家未入脣盡將精好輸公賦次把升斗求市人麥秋正急又秧禾豐嵗自少凶嵗多田家辛苦可奈何將此打麥詞兼作插禾歌酴醿冰肌雪豔映殘春燠日薰風入四鄰任是主人能愛惜也􅍆一半與遊人真珠花風中的皪月中看解作人間五月寒一似漢宮梳洗了玉瓏璁壓翠雲冠以上函淵鑑類板子磯石上紅花低照水山頭緑篠細含煙天生一夲徐熙畫秖欠鷓鴣相對眠太平府志離真州日日北風吹上水年年客思攪新秋山長水逺連三楚物態人情又一州隔岸晚峯如見揖並船孤鶩似相留因知景略非前逹身後猶須具十牛揚州府志陶弼弼字商翁永州祁陽人以功授陽朔縣主簿歷官知雍州招納諸蠻有功四遷為東上閣門使康州團練使有集送趙樞寺丞宰虔化縣路入虔雲去如何輕解携人煙五嶺北星斗大江西暖雪梅花樹晴雷贛石溪青衫欲無淚不奈鷓鴣啼出嶺題石灰鋪馬度嚴關口生歸喜復嗟天文離卷舌人影背含沙江勢一再曲梅梢三四花登高休問路雲際是吾家登崑崙臺落照古城隅邊風動隼旟久間忘戰略多病熟醫書白髮隨年短新情與世疏桃花春水起還釣舊溪魚天涯亭雨色絲絲風色驕天涯亭上覺魂消一家生意付秋瘴萬里歸心隨暮潮兵送逺人還海界吏申遷客入津橋山公對此聊酣飲怕見醒來兩鬢凋以上陶雍州集寄蘇州徐處士辨辨能畫山水平南無䇿鬢如霜七十峯前舊隱鄉相約祝融孤頂上借君吟筆畫瀟湘聲畫集賔州作金鼓聲闌劒戟收使君廽上雅歌樓尊前一闋清商曲消盡窮邊萬里愁往歲傳聞南詔檄近時方築伏波城安城太守知邊計菡萏花中閲水兵閣皂山崇真宮在臨江新淦縣北山形如閣山色如皂故名道書云第二十福地即漢張道陵丁令威葛孝先修煉之地萬仞天門閣皂形隂陽不似衆山青一區海上神仙宅數曲人間水墨屏華表鶴歸春谷響玉京龍起夜潭腥可憐張葛無人繼三級高壇拂杳冥陽朔縣作榕葉森森蓋縣衙不離牀衽見煙霞民耕紫芋為朝食僧煮黃藤代晚茶瀑布聲中窺案牘女蘿隂裏勸桑麻欲知言偃弦歌處水墨屏風數百家以上方輿勝覽端硯贈王欲端硯如池狀潤疑雲雨通粗官不識字好去伴詩翁硯箋寄新沅守謝麟險盡天開溪路平詩書新將典新城三千戍卒今無幾十萬屯田古未耕屬縣乞除防虎檻生蠻願獻採砂坑從兹預擬風塵息盡是仁威下斾旌辰州府志山茶江南池館厭浮紅零落山煙山雨中郤是北人偏愛惜數枝和雪上屏風後村千家詩詠藕萬頃金波裡誰將玉節栽絲應鮫乞與津是蚌分來盤貯冰猶結刀侵雪易摧防風骨外折混沌竅中開月寺僧家鉢風亭酒客杯胸中秋氣入牙角雨聲回自愧塵泥賤得蒙尊爼陪與君消酷暑瓜李莫相猜蝶暖翅玉羅薄香鬚金線微青春二三月白日一雙飛露重休深入風高且暫歸南園芳樹下燕雀最多機以上合壁事類别集題栁州柑子堂栁子厚手植子厚才名甲有唐謫官分得荔支鄉羅池水盡黃柑死獨有穹碑在畫堂錦繡萬花谷黃陵廟溪上龍蛇屋蕭條帝子祠竹䀶當日淚山色後人疑仙服霞留綺新妝月印眉楚民亡水旱簫鼓謝神禧粵西詩載句雪山經夏冷天馬入秋肥塞上隂微辨樵火霽早誤僧鐘行役渴蜂銜硯水飢蝶嗅瓶花順州梟鳴社旁樹盜發冢中金鹿飲沙渾水猿飢果落雲將老未聞金作印師寒猶用鐵為衣山險不能留霸業水聲惟解送年華道近可憐駑馬駿時平不見布衣雄以上後村詩話搜兵四解降王縛報國三登上將壇觀曹武惠畫像澠水燕談王令令字逄原廣陵人王安石愛其才因妻以吳夫人女弟年二十八卒有廣陵集韓幹馬天寶天子盛天廏吐番入馬上天夀紫衣牧吏偏坐前騎入金門不容驟西極苜蓿為誰肥六間飛黃臥嗟瘦乾元殿下誰把筆當年人無出幹右傳聞三馬同日死死魄到紙氣方就鐵勒夾口重兩銜墨絲卓尾合雙紐天門未上人就觀奚官驚嗟失開口生搜朔野空毛羣死斷世工無後手當時天子惜不傳送入御府置官守邊塵勃鬱燕薊來宮闕蕭騷既聞後誰拚千金出手收足踏萬里避奔走幾經蹂蹀道邊塵今日寧無紙上垢尊前病客不識書但驚骨氣世未有冀北駿足無時無生不逄幹死空朽世工無手不肻休往往氣骨陋如狗假山鯨牙鯤鬛相摩捽巨靈戲撮天凹突舊山風老狂雲根重湖凍脫秋波骨我來謂怪非得真醉揭碧海瞰蛟窟不然禹鼎魑魅形神顚鬼脅相撑揬以上廣陵集墨莊漫録夏均父言此詩竒險不蹈襲前人文同同字與可梓潼人自號笑笑先生第進士仕至太常博士集賢校理元豐初出守湖州行至宛丘驛忽留不行沐浴冠帶正坐而逝有丹淵集蘇東坡云文與可莖竹初不自貴重四方之人持縑而請者足相躡于門與可厭之投諸地而罵曰吾將以為襪材士大夫傳之以為口實及與可洋州還而豫為徐州與可遺余書曰近語士大夫吾墨竹一𣲖近在彭城可往求之襪材當萃于子矣書尾後寫一詩其略云擬將一假鵝溪絹掃取寒梢萬尺長余謂與可竹長萬尺當用絹二百五十匹知公倦于筆硯願得此絹而已因答其詩曰世間那有千尋竹月落空庭影許長與可笑曰蘇子辨則辨矣然二百五十匹吾將買田而歸老焉深不攖世故熙寧初時石林詩話與可為人靖論既不一士大夫好惡紛然同在館閣未嘗有所向背時子瞻𢾗上書論天下事退而與賔客亦多以時事為譏誚同極以為不然每苦口力戒之子瞻出為杭州通判同送行詩有北客若來休問事西湖雖好莫吟詩之句及黃州之謫正坐杭州詩語人以為知言退谷消夏録世傳道臻淨因禪師居都城隅三十年不出戶無所嗜好獨雪方丈四壁請與可畫墨竹謂人曰若使逰人見之心自清涼此君蓋替我説法也秦王卷衣咸陽秦王家宮闕明曉霞丹文映碧鏤光采相鉤加銅螭逐銀霓壓屋驚蟠拏洞戶鎖日月其中光景賒春風動珠箔鸞額金窠斜美人卻扇坐羞落庭下花間弄玉指環輕冰扼紅牙君王顧之笑為駐七寶車自卷金縷衣龍鸞蔚紛葩持以贈所愛結歡期無涯容齋四筆云語意深入騷人閫域王昭君絶豔生殊域芳年入內庭誰知金屋寵只是信丹青幾歲後宮塵今朝絶國春君王重恩信不欲遣他人極目邊沙逺傷心漢月圓一生埋沒恨長入四條弦容齋四筆云令人讀之縹眇然感慨無已新晴山月高松漏疏月落影如畫地徘徊愛其才夜久不能寐怯風池荷卷病雨山果墜誰伴豫苦吟滿林啼絡緯春閨枕帶縈春意窗紗漏曉光蠨蛸傷逺别鶗鴂感流芳妝匣蒸殘粉熏爐減舊香洞房燈燭外只有夢悠揚咏鷺避雨竹間點點迎風栁下翩翩靜依寒蓼如畫獨立晴沙可憐以上丹淵集娛書堂詩話云清拔可喜題上清宮壁天氣隂隂别作寒夕陽林下動歸鞍忽聞人報後山雪更上上清宮上看老學菴筆記錢協協字穆父易之孫彥逺之子居崇德州錢里以從父明逸任元祐初歷龍圖閣直學士知開封府拜翰林學士出知池州入元祐黨籍宋史夲傳協知開封臨事益精蘇軾乘其據案時遺之詩協掃筆立就以報軾曰電掃訟庭響答詩筒近所未見也風姿甚美有九子都下九老學菴筆記錢穆父子母祠作一巾紵美丈夫坐于西偏俗以為九子母之夫都下謂穆父為九子母夫東坡贈詩云九子羡君門戶壯蓋戲之也以米二碩送秦少遊作二十八字儒館優賢蓋取頤校讐尤自困朝飢西鄰為祿無多少希薄才堪作淖糜王直方詩話和閣老舍人曝書會天祿圗書府藝籖歲曝頻幡經窮藏室賜會集儒紳顧陸高標好鍾王妙入神可無鉛槧吏來預石渠賔事文類聚後集送奉使鈐轄高侯之任成都烈士由來不徇名西南萬里不留行熊羆訓整屯干計尊爼雍容鎮百城閫外使華新報聘山西家法舊論兵封侯富貴須由命請訪沈冥賣卜生合璧事類後集和辨才法師新亭初成詩韻幻泡昧空色真夢遊黃丘宦學類狂走爾來三十秋齒髮非他時歲月不我留古剎插亂石蟄龍蟠霞湫天人大導師駐錫今白頭安住差護念晚節非沈浮昔嘗謂出處未用相劣優權術分二智股肱均九流今知擾擾者詎得逍遙遊從兹許禮足尚可治幽憂天竺寺志劉淑淑神宗朝以朝請大夫守蘇州題虎丘衮席頻虛未賜環遊心暫寄水雲間霓旌初下姑蘇苑蠟屐先尋虎阜山高興不辭溪路險幽情更羡野僧間留連景物慵回首畫舫寒侵暮角還虎丘志王仲敏次劉公遊虎丘韻松隂嵐影翠回環盡在牆垣繚繞間舟楫更無通别浦煙霞曽不接他山詩亡石在雲徒恨劒去池荒水自間偷得公餘來一晌遙城鐘鼓出催還虎丘志崔靜遊桂林伏波巖和章提刑峴古木纒溪出老根四時香火廟空存人家曉聚鳧鴨亂水怪夜翻星斗渾靈洞仙遊雲自鎖隂崖龍去石生䀶幸同軒從乘餘興酣醉清時酒一樽名勝志葉祖洽祖洽字敦禮邵武人熙寧庚戌進士第一終集賢殿修撰句已分桂葉爭雲路不負榴花結露枝海録碎事卲武郡庭有石榴一株士人視結實之多少以為登科之信熙寧庚戌嵗有雙實於本末者又有附枝而雙實者是嵗葉祖洽上官均名在一二何與均兄弟同榜祖洽有句云云宋詩紀事卷二十四
