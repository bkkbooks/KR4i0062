body:
  text: 宋詩紀事巻五十五錢塘厲鶚撰郭晞宗晞宗字宗之仙居人淳熙五年進士仕終瓊管安撫有漫齋槀白紵詞遥夜迢迢夜未央井梧月白啼寒螿感時念徃誰不傷婕妤寵絶辤昭陽手中團扇篋中藏吳姬織紵秋蟬翼一絲徃復千情積金粟尺量金斗熨為君裁袍為君惜同盛同衰莫相失姑蘇臺春花開秋雁來長風幾度姑蘇臺不見臺上人臺下月徘徊一樹梧桐生綠苔以上赤城詩集楊濟濟字濟道淳熙五年進士歷著作郞出知果州有鈍齋集文獻通考陳氏曰京鏜帥蜀上巳出遨濟為樂語云三月三日豈無水邊麗人一觴一詠亦有山陰禊事又云良辰美景賞心樂事四者難并崇山峻嶺修竹茂林羣賢畢至一時傳誦雲安龍脊灘洞庭老龍時出没萬斛舟航皆辟易此龍脊背巳鐵石肎逐時好作人日我呼邦人來踏磧恍然如見河圖出大巫雞卜占云吉小巫竹枝歌轉激飄石揚沙障江色塵埃何處不相襲摩挲石刻聊偃息恐有老人來横笛四朝詩章良能良能字達之麗水人居吳興淳熙五年進士除著作佐郞寧宗朝官至參知政事弁陽周公謹之外大父也有嘉林集題玲瓏山在吳興短鍤長鑱出萬峰鑿開混沌作玲瓏市朝可是無巇嶮更向山林巧用工癸辛雜識題李伯時飛騎習射圖禁營貔虎天廐龍技癢不奈芻粟豐聞道寶津嘗䕶駕前期踴躍矜驍雄紅綃低繫栁枝碧滿滿彎弓斫鬉射偶然穿葉未為竒􅎒下紅綃方破的綵䋲長曵綵毬輕閃爍眩轉如奔星弦頭霹靂起馬脚回看一箭落欃槍烏紗㡌穏春衫薄文韉煥爛青絲絡千歩塲深隔九關畢景馳驅有餘樂李侯應奉隨春官日晏歸穿衞士班平生抵死憐神駿絶藝那能不細看不學閻公伏池側倉皇丹粉供宣索他年乗興試追尋妙處秖湏憑子墨十六蹄翻意態真罄控應節顧眄親當時騎士盡應爾尚想元豐兵制新慨今多事困供億養兵殆且殫民力未聞士歌馬騰槽安得從容觀戲劇吳禮部詩話李伯時畫飛騎習射圖其手帖云公麟元豐初㸃撿南宫試巻畢陪預集英殿門應奉廷試因得至衛士班見飛騎習射拕毬楊枝戲人偉馬駿妙天下選時乗輿幸寶津有日督課勝負窮景不休故頗遂縱觀今追圖大槩以奉雌堂清玩若氣勢不至差俗則丹青可屏當䝉照恕也元祐丁夘臘日謹題又云第一斫鬉射最難引弓然多中中者自帛而下平􅎒斷之射毬鮮中以飛䃂故十發三四中為精矣尤延之楊廷秀樓大防皆有題詩朱文公跋云觀龍眠飛騎圖及讀延之廷秀大防三君子佳句因思法雲秀公語尤物移人甚可畏也後又有古體詩二首其一云奉題太丞丈龍眠騎射圖下有叔簡字不著姓其一題嘉定庚午四月二十日章良能考續通鑑長編紹熙元年庚戌秋八月校書郞王叔簡與禮部郎李巘著作郞鄧馹同檢視劉季榮所造新歴叔簡必王叔簡也王叔簡叔簡字敬文渠江人淳熙五年進士紹熙中官校書郞題李伯時飛騎習射圖飛毬飲羽栁如􅎒馬氣横生人更傑不作遊觀御寶津騎戰還應一當百天家行樂少人知龍眠屬從天上歸意象慘淡研精微曹霸以來無此竒壯夫披圖雙淚垂時危那得生致之吳禮部詩話曾躍麟躍麟字子龍南恩州人淳熙五年進士官監察御史聞西浦漁歌作西浦鳴榔下釣磯歌聲欸乃送斜暉扣舷互荅驚鷗夢拍手歡呼看鷺飛山接素琴仙子過洲連青草使君歸海天空闊家長在一任蘆花雪㸃衣廣東通志甘同叔同叔字異豐城人淳熙五年進士官桂州民曹攝荔浦縣有節軒集題昌山聖姥廟分宜古縣環清溪重岡複嶺如奔馳行逢山斷水流處閱城廟枕山之西我來落日在前嶺摩挲一讀盧肇碑嗟唐今去亦已久尚餘文字光陸離云昔秦人有天下鏖戰六國愚黔黎碭山雲氣望不見神物乃降江之嫠雷轟電合助光怪蜿蜒墮地偕羣兒赤鱣王鮪奉鼎俎追逐甘旨憐姥慈姥先仙去環佩冷安能蟠蟄從兒戲劉累不出浮俗隘况肎委質嬴與斯珠宫貝闕世所希銅環十二白玉扉紉蘭作佩香披披招揺手掉芙蓉旗哀彈清瑟和宓妃大川擊鼓勞馮夷巨魚踴躍黿鼉随蝦蟹瑣細不得追廟門開闔風颺颸千年萬載龍居之野巫便伺薦酒卮簫鼓坎坎來宫祠五彩不辨虺與螭聊以幻化驚群迷嗟我四海久望霓無復空抱明月輝好施膏澤雨六合豈止但慰袁人思歴階酌水致此辭退以遺誼傳于詩才慳語纇論甚卑龍兮謹勿相訶譏袁州府志張釜釜字君量綱之孫淳熙五年進士累遷端明殿學士簽書樞密院事送鶴還齊雲胎仙誰遣到塵寰盡日清吟伴我閑不作冲天支遁想頗疑擕箭佐卿還欲追鸞駕煙霞上肎處雞群伯仲閒為語齊雲好看取他年我欲訪緱山茅山志閻蒼舒蒼舒字才元淳熙中以試吏部尚書使金賀正旦見金史交聘表皇宋書錄蒼舒工正書雄徤而有楷則尤工扁榜今陳相堯佐家將相堂大字乃其所書贈揚州郡帥郭侯東南形勝惟揚州介江負淮作襟喉有國以來幾百戰弔古千載空悠悠哀哉荒王與蕩子鈍盡鐵劒崇倡優迷樓九曲爛如畫珠簾十里半上鉤當年二十四橋月曾照三十六宫秋平山堂上一長歎但有衰草埋荒丘歐仙蘇仙不可喚江南江北無風流何人復誦廣陵散黯然悲恨不可収秖今英主正用武増五萬竈屯貔貅金城堅築壯營壘綺叚細錯良田疇神謨廟筭萬全舉天時既至湏人謀將軍山西名将種家聲直到青海頭男兒有死必報國正當為上分此憂勉旃速辦古人事貂蟬本自出兜鍪揚州府志席天祐天祐樂平人精醫嘗從劉武忠軍采用兵之勢寓于棊遂成絶藝淳熙六年冬醉卧僧房作霜侵古屋月侵窗撥盡寒灰夜未央仗劍起看吳楚分将星今見幾分光夷堅志程端蒙端䝉字正思徳興人朱子門人淳熙七年鄉貢補太學生對䇿不合罷歸絶句滿城塵土汚人甚出郭青山入眼多挐取小舟煙霧裏此生真箇老漁蓑饒州府志黄由由字子由長洲人淳熙八年進士第一寧宗時仕至刑部尚書兼直學士院自號盤隠居士歸來歸來三閲月無事一闗心刈草尋花徑開池漾竹隂江邊問明月天際數歸禽幸有髙賔至相逢似竹林吳江縣志莫若拙若拙仁和人寓家崇徳淳熙八年進士題資福院平綠軒結屋地猶淺鉤簾景盡還嵐光烟樹外野色酒杯閒别墅從渠樂清吟屬我閑狎鷗時㸃白機事不相闗至元嘉禾志吳柔勝柔勝字勝之宣州人淳熙八年進士屢遷司農寺丞出知隨州除祕閣修撰主管亳州明道宫卒諡正肅春晝深巷寂無人鳥聲花塢春蓽門長日掩天地一閑身宛雅李廷忠廷忠號橘山於潛人淳熙八年進士游大滌清溪路入武陵源雞犬人家隔近村㧞地一峯危作柱棲雲五洞窄開門空庭有客掃松影古徑無人踏蘚痕我欲白雲巖畔宿月明一夜聽啼猨洞霄詩集陳銘銘字日新玉山人淳熙八年進士春波漁市瀕溪有居廛兩岸舟競檥風含水氣腥曉作漁人市魚羹何處無無錢買金鯉嘉興府志于革革字去非號竹田豐城人淳熙八年進士知房州春晩舎南舎北草萋萋原上行人路欲迷巳是春寒仍禁火楝花風急子規啼詩人玉屑詠箋七八葉蘆秋水裏兩三箇雁夕陽邊筆頭到處渾無礙埽破寒潭一蔟烟後村千家詩清都觀髙崖雨洗月華清白袷青藤曵復行老檜不知仙馭逺屋頭猶帶玉簫聲南昌府志俞烈烈字若晦臨安人淳熙八年進士累除中書舎人嘉定初知鎮江府權吏部侍郎有盤隠詩編題清虚堂在臨安淨梵院天清蠶麥餘綠結桃李實老僧詩銜袖過我語言質懐山意先行如病夢芝术去山才一舎鞭䇿不終日堂簷新結束空洞無長物風來舞翠杉土煖榮病橘欲行意先清舌評驥不及何由觧鞍臥夜枕雨蕭瑟談元契參同酒㫖妙真一懐新辜雅趣意嬾健筆亦如罷參僧野禪縛枯律咸淳臨安志孫元卿元卿樂清人淳熙八年進士仕至國子監丞與錢孝先游洞霄元冥相我作山行捲郤重隂放曉晴但見峯巒互扃鎖不知宫闕隠崢嶸雲根洞穴篝燈入井底波瀾撫掌生喚客入山還送客淙琤猶有石泉聲洞霄詩集傅誠誠字至叔仙游人嘗從朱文公游淳熙八年第進士調永春尉從侍郎黄艾參政使北張巖開督府于京口奏辟幕僚著述皆出其手遷太常博士子彦卿能文以疾卒誠哭之過哀輪對閒卒于殿下妙庭觀在富陽縣董雙成故宅㑹宴瑶池阿母家九霞光繞翠瓊車坐中一曲山香舞㡌上看看有落花杭州府志朱師古師古蜀人孝宗朝著作郎句集英殿下初登第神虎門前便挂冠建炎以來朝野雜記淳熙辛丑孝宗䇿士有昌元王昂應祥者既賜第調潼川府司户參軍自言年踰六十不願出仕上嘉之特賜承務郎致仕蜀人在朝者皆以詩送之著作郎朱師古一聨最為的切句昌泰昌泰蜀人淳熙中浙東提刑題新繁句氏盤溪客至輒命酌為言花巳開青山長委髻白骨舊生苔不飲固癡絶能詩宜數來頗憂明日雨紅紫落成堆成都文類馮仲柔仲柔山隂人淳熙壬寅沿檄游大滌洞天洞府深沈别有天翬飛樓閣聳晴烟詩傳玉局驚凡目丹就金爐記昔年翠湧千波横絶壁風吹萬籟入飛泉他年待我功成後卜室青山絶世緣洞霄詩集衛涇涇字清叔號後樂居士崑山人淳熙十一年進士第一除祕書省正字累官參知政事寶慶二年卒追封秦國公諡文節有後樂集游澱山湖疎星殘月尚朦朧閒入烟波滿棹風始覺舟移楊栁岸直疑身到水晶宫烏鴉天際墨千㸃白鷺灘頭玉一叢欸乃數聲回首處西山渾在有無中松江府志徐得之得之字思叔夢莘弟淳熙十一年進士有靜安作具徐氏世有史學從子天麟譔西漢㑹要東漢㑹要皆行于世試雙井茶先生老作宜州鬼誰與一甌同注湯至今捧著雙井椀猶帶是翁書傳香方輿勝覧句迺翁畫灰敎兒書嬌兒赤骭玉雪膚厥妻曝日補破襦弊筐何有金十奴題貧樂圖鶴林玉露謝直直元名希孟避寧宗諱改名直字古民台州黄巖人伋之孫從陸象山遊淳熙十一年進士歷太社令嘉興府通判龎元英談藪謝希孟與鄉人陳伯益好相調戲伯益面狹多髯希孟見冩真挂壁上題云伯益之面大無兩指髭髯不仁侵擾乎其旁而不已于是乎伯益之面所餘無幾伯益病之莫能報希孟後改名直伯益于是以兩句詠其名炊餅擔頭挑取去白衣鋪上喝将來聞者絶倒遣懐寄致道貧者士之常富亦我所欲得常詎可厭逐欲何由足荒哉化蜨翁微歟監河粟人生命如綫日湏不盈匊俯仰天地閒何由謝羈束前賢小集拾遺俞應符應符字徳瑞錢塘人淳熙十一年進士累官參知政事曹公疑冢生前欺天絶漢統死後欺人設疑冢人生用智死即休何用餘機到丘壟人言疑冢我不疑我有一法君未知直湏掘盡疑冢七十二必有一冢藏君屍七修類槀俞應奎秦皇石在昌化縣百丈山祖龍盛氣役神鞭壁立無移只屹然定是先朝陳寶化隂靈寂寂笑求仙杭州府志髙似孫似孫字續古餘姚人文虎子淳熙十一年進士歷官校書郎守處州有疎寮小集文獻通考陳直齊云似孫少有俊聲登甲科不自愛重為館職上韓侂胄生日詩九首皆暗用錫字為清議所不齒晩知處州尤貪酷其讀書以隠僻為博其作文以怪澀為竒至有甚可笑者就中詩猶可觀也括日有籍妓洪渠慧黠過癸辛雜識髙疎寮守人一日歌真珠簾詞至病酒情懐猶困嬾使之演其聲若病酒而困嬾者疎寮極稱賞之適有客云卿自用卿法髙因視洪云吾亦愛吾渠遂與落籍而去以此得嘖言者入餘杭縣明發遵西陸驅車月流光佳山迎車來知是古餘杭危樹露如雨平野日未陽支流滀清源弱羽無髙翔人家叢灌下世載山水鄉扣門作午憇白飯羞文魴邂逅有足歡離合非其常主人不予鄙予畱亦徜徉憩昌化民家晩程息勞轍白日流西暉水鳥得魚去耘夫荷鉏歸川原杳芊綿林野雜依霏一來叩竹館相邀入荆扉重巖吐清溜澄隂布殘馡曰予考此室十世相因依左右桑果足嵗日雞豚肥豐猶未至裕歉亦無能飢予聞良自愜欲謀北山薇有田可同耕有蠶當共衣車夫猝無情此志仍重違荅李才翁素意杳難尋殘罏屬晩隂花知西洛事雁呌北人心客共艱難盡詩隨老大深金陵書不到消息又沉沉荅宇文文學無能應俗苦皇皇詩不驚人筆事荒天下無山如飯顆人閒有水自滄浪左杯右蟹一舟足早韭晩菘三畝强莫謂覺來無可嗜逢人猶自覓花忙燕文貴山水圖道山堂上御府畫展巻猶能記老燕十日何由辦水石千金那可分江天楚湘兩岸風落木海嶽三秋雁度川大山小山俱好隠江南夢去曲肱眠荅武昌吳廣文生平不識武昌樓官栁青青好在不庾亮笛吹黄鶴月簡棲碑駁碧苔秋山横赤壁含情斷水出瞿塘快意流何處呌君同一醉並舟秦女擘箜篌琵琶引人生聚散難為别何况悤悤作吳越梅梢帶雪下昭陽明朝便隔闗山月長城不戰四夷平臣妾一死鴻毛輕回憑漢使報天子為妾奏此琵琶聲長安城中百萬户家家競學琵琶譜酸聲苦調少人知食雪天山憶蘇武西風吹霜雁飛飛漢宫月照秋砧衣嫖姚巳死甲兵老公主公主何時歸銅雀硯歌曹公夜讌淩雲臺一言契闊含餘哀分香老妓各雲雨歌舞不盡薶蒿萊漠漠頽基鄴山下萬里烟塵無一瓦井榦尊酒自平生烏鵲飛南播遺雅老農墾雨開荒寒一礫千金苔未乾世人好竒不好近真比周簋仍商盤老璞渾渾殊質魯得水猶能發妍嫵更與人閒作瓌古月明夜盗西陵土黄居中瀟湘圖歌天暒而雨斷兮作蒼梧九疑之髙秋風行而川怒兮洩瀟湘洞庭之奔流樹不知名兮山抱複嶺沙不計程兮水趨他洲波作止兮蛟舞蛟蟄雲晦明兮猨呼猨愁原不可作兮蘭亦塵土賈傅歸漢兮鵩其何尤誰呼魚兮北墅有酒誰鼓枻兮南津有舟懐斯人兮杳靄千里目悵望兮吾其歸休騎鸞引夜騎白鶴出琳闕千萬仙官鏘佩玦雲雷帖妥過剛風左推日丸右扶月一息瑶池翠水家阿母迎謁龍驅車青娥彈絲玉妃酒折盡蟠桃紅玉花九天丈人來問道太極之前天不老丹霞一氣玉虚宫寶笈金繩容探討井君沐浴波五色洞房光芒上奔日天上傳呼六丁直星斗離闌礙鸞翼以上疎寮小集由校書郎授徽倅道出金陵投留守吳雲壑四朝渥遇鬢微絲多少恩榮世少知長樂花深春侍宴重華香暖夕論詩黄金籝滿無心愛古錦囊歸有字竒一笑難陪珠履客看臨古帖對梅枝四朝聞見録絶句曰琯按東臯雜錄作陳天錫舎南舎北雪猶存山外斜陽不到門一夜冷香吹入夢野梅千樹月明村全芳俻祖延祥觀水明一色抱神州雨壓輕塵不敢浮山北山南人喚酒春前春後客憑樓射熊館暗花扶扆下鵠池深栁拂舟白髪都人能道舊君王曾奉上皇遊武林舊事四聖延祥觀西依孤山為林和靖故居花寒水潔氣象幽古三朝臨幸有韋太后沉香四聖像小蓬萊閣瀛嶼堂金沙井六一泉高疎寮有詩聚景園翠華不向苑中來可是年年惜露臺水際春風寒漠漠官梅郤作野梅開武林舊事聚景園在清波門外孝宗致養之地嘉泰閒寧宗奉成肅太后亦嘗臨幸其後蕪廢不修高疎寮詩云云游九鎖洞門金畫翠琅玕杏不多花月澑寒借得御書經自讀松風淨洗石棊盤洞霄詩集汪強中郎中送蟹連日天街候駕歸且呼酒對早梅飛從來吏部髙情别右手分將老蟹肥蟹畧水西抱崖一水限僧居空翠冥濛畫不如落日遊人山窈窕清風啼鳥竹蕭疎詩家鼎臠楊嗣勛惠茯苓道是青神谷元通白帝厓有松如壯士其魄化嬰兒雲溼侵鴉觜天寒翦絲堯初香摘髓秦後雪凝脂穴動龍蛇窘山空鳥獸悲惟将千歲力自了一生竒都下栁生春思拂京華不管閒人也憶家添盡好香那睡得月痕如水浸梨花荅辛㓜安青天不惜日壯士偏知秋自古有竒畫如今空白頭彼時當再來吾老不可留天推璧月上星入銀河流躔度若此急人生與之浮終夜自起舞無人共登樓典謨有陳言河洛非故州黄鶴呼不來誰能理殘裘以上後村詩話别雲門回首雲邊更看松風流王謝舊行蹤不知誰繼諸賢後夜半來聽六寺鐘雲門志畧石橋一石上負崑崙柱一水西奔牛女渚玉幹獰鱗萬松古夜夜神光干帝宇石滑苔危水一縷四海長依開闢雨月落未落半規吐雨足敲泉龍擺舞蔡山渡江上人家破竹門潮生水長浸籬根鮆魚一尺枇杷小放溜船來酒滿樽以上甬上耆舊集句汾獻升雲鼎秦遺蝕雪碑買硯沙冷雁一二天長帆有無曹娥江白浪不侵魚復陣青苔猶䕶劍闗銘送蜀客旋作池來分剡曲畧教花處似蘇堤池西話後村詩天差鶴管烹茶水風夾花吹煮蟹烟蟹畧莫若沖若沖字子謙若拙弟淳熙十一年進士歷官至大理寺丞丏外除知永州不赴卒有語溪集初春趙仁父寓資福院平綠軒見招平綠題詩四十年尋幽不厭水雲邉一犁還又耕春後三白重來醉臘前自笑挂冠林下客獲陪揮麈坐中賢絶嫌幻色撩人思快睹晴川接逺天嘉興府志過崇福院在青鎮南首歲融春卜有秋曉行猶自索貂裘身閑暫脱㣲官縛市隠何如此地幽一水相望三里近十年重到片時留買田擬作終焉計直是飄然不繫舟烏青文獻程卓卓字從元大昌從子淳熙十一年進士歷官同知樞密院事封新安郡侯贈特進資政殿大學士諡正惠有集遊金焦二山揚子長江天際來中流有山何壮哉深根盤礴千萬丈寸土不受雙崔巍金山屹據上流險四面佛屋相環回來帆去槳别艫舳住僧過客煩追陪排空傑閣揖滄海海山亂㸃浮纎埃龍潭列聳石峯巧獨立野鶴慵毰毸堂前回首指遺像坡翁印老留青煤其人巳去詩尚在唱酬風月相徘徊再三瞻我二山去縹緲又入雲濤堆焦山一望二十里舟師駕櫓如奔雷行行滉蕩呼吸頃繫䌫确犖登山隈山中僧少竹木古瘦根迸石穿莓苔幽姿野態隨歩出勝處徃徃多樓臺洪厓路轉尋瘞鶴幾年浪打風雨摧遺銘破碎石剝落摩挲細讀心眸開同行韻逺心未盡飛仙亭上傾尊罍酒酣我為發絶唱底湏方外求蓬萊金山志畧雪巖石門一望路迢迢五老峯髙聳碧霄泉挂珠簾當洞口烟拖練帶束山腰香爐捧出仙人掌輦輅行過織女橋午夜月明天似水鶴歸松頂聽吹簫齊雲山志鞏豐豐字仲至號栗齋其先鄆州湏城人渡江為婺州武義人少游吕東萊之門淳熙十一年進士嘗知臨安縣稍遷提轄左藏庫卒有東平集葉水心墓誌云仲至片詞半牘皆清朗得言外趣尤工為詩多至三千餘首曉起甘蔗洲曉起東風惡晴嵐忽變昏船隨山共走霧與水相吞鉦鼓遥知寨桑麻畧辨村雨來無凖則容易溼柴門湖嶺下十里是為黯澹灘行者多至此捨舟急流方了又髙岡日永周旋未覺忙壁上字多知店老嶺邊松茂喜車凉叢叢亂篠承攲石帖帖新荷戀小塘黯澹惡灘應笑我為虞魚腹犯羊腸以上瀛奎律髓翠蛟亭泉出天柱之趾將至洞霄門數折下墜方盛時如蛟飲㵎亭當木石最竒處舊取東坡詩語名以舞翠客謂不若直名翠蛟為不費荅知宫事王君思明欣然改之為賦一首木石相因依妙處在得水遇其相合時㵎蹙水多止巍巍天柱峯雙洞空無底怪石抱山迴灌木參天起青蛟走玉骨元脈貫石髓曲折暫得伸掀舞如掉尾亭成自何年不陋亦不侈秋深泉久縮亭影照清泚忽遇水飛流亭入銀濤裏怒蛟捲亭去相距不盈咫一落墜兩谼力竭勢方巳終疑入江湖赴海日千里昨夜山雨號梧竹盡風靡轟雷與石闘蛟怒幾欲死吾亭方宴然清曉見窗几因擕一樽來與客相料理賸擬畫將歸題詩郤畱此翠㣲亭就亭舉杯落葉滿地知宫王君請和韋蘇州落葉滿空山之句行跡年來到處稀獨于巖壑有深期鵝溪道士能相屬請和空山落木詩洞霄即事積蘚青踰一寸痕山靈守䕶幾千春長藤横繫巖邊木何日重來挂葛巾以上洞霄詩集炊熟日有愴松楸小樓吹斷玉笙哀春半餘寒去復來五歲不澆墳上土望鄉心折刺桐開濓洛風雅楊安誠安誠字道父蜀人白帝廟并序白帝廟神舊傳以為公孫氏以予考之非也公孫氏享國日淺轍迹未嘗至夔獨遣田戎任滿戍江關岑彭入江闗不復為戍守公孫氏無從廟食按酈道元水經注瞿塘灘上有神廟甚靈刺史二千石過其下不敢伐鼓鳴角恐致風雨舟人上水以布裹篙足不令觸石有聲蓋不謂其神為公孫氏瞿塘天下至險必有神物司之但有廟偶連白帝城俗遂從而訛爾余徃來三峽皆託神之庇輒為賦此庶來者有所考云淳熙十一年正月晦日西蜀楊安誠道父書蜀江萬壑俱東奔瞿塘喧豗爭一門驚濤駭浪建瓴下顛崖仆谷相吐吞朋妖窟宅恃幽阻正晝噴薄隂霾昏靈宫奕奕鎮地險衆瀆稟令川祇尊赤甲後聳黄熊躍灩澦前峙青猨蹲舳艫銜尾下吳楚約束蛟鰐如雞豚舊傳鼓角致雨雹裹篙不觸撐舟痕綜理脈絡盡西徼帝假之柄攸司存子陽祚國十年近此地未省東其轅連江列炬鐵鎖斷戎滿奔北無留屯江關回首盡漢幟遺黎何自知公孫血食漢代定不爾但有故壘山之樊子羙誤信齊東語感慨勇畧招英魂山川之靈載望秩僭偽詎可同時論向來名實久淆溷薦祼無乃凟俎膰請從酈元為考證神理昭昭斯可原全蜀藝文志謝牧題洪陽洞石上特特攜笻探洞房中藏精氣凛寒芒神仙久視知難學乞取逍遥物外方淳熙乙巳冬書遊名山記馮端榮端榮崇安令題武夷淳熙丙午花滿晴烟樹滿雲我來寧是學仙人願將九曲溪頭水散作年年百里春武夷詩集李持國夀興國守九月三日縹緲黄堂擁瑞烟神光照社記當年風雲慶㑹千齡際萸菊佳辰六日前蕩節巳嘗煩出使輔藩聊復頼于宣廟堂參贊猶虚位飛詔行看下九天聖宋名臣獻夀集劉季裴季裴字少度福安人孝宗朝終祕閣修撰夀朱守匡鼎談經世少雙一時文物動虞庠江湖雖隔金閨籍衣袖仍聞玉案香墨客幾年陪畫隼板輿平日到蘐堂時清身徤堪行樂未見荆榛老鳯凰聖宋名臣獻夀集李獻可獻可吉水人賦宫人午睡御手指嬋姢青春白晝眠粉勻香汗溼髻壓翠雲偏栁妒眉間綠桃嫌臉上鮮夢魂何處是知繞帝王邊吉安府志獻可六歲能詩孝宗召入宫時宫人正午睡帝命為詩獻可即賦云云帝撫其背曰何不作我家兒命宫人繡御掌于背以賜歸王正已正已四明人珩之子淳熙中官太府卿題天開圖畫亭并序姚伯愿使君築亭真州子城西北隅盡得江山之勝乞名于四明王正已因誦山谷天開圖畫即江山之句遂以名亭又為賦此詩夜來殘暑鏖西風秋聲摵摵先井桐纎雲四巻天開容一碧萬里磨青銅使君退食新凉逢厭看凝寝香雲濃領客欲送孤飛鴻城隅髙亭溼青紅曠野四望開心胸前瞻江山勝而雄琉璃波光羣玉峯水墨正爾難為工天開地闢今古中此景自若無初終天豈為我施新功我心得之眼相從収入几席無遺蹤錦囊得助防詩窮李成郭熙將無同撫掌一笑浮金鍾儀真縣志宋詩紀事巻五十五
