body:
  text: 宋詩紀事卷九十一錢塘厲鶚撰乾康乾康零陵人以詩為齊已所稱至宋乾德中猶存經方干舊居鏡湖中有月處士後無人荻笋抽髙節鱸魚躍老鱗詩話總龜賦殘雪六出竒花已住開郡城相次見樓臺時人莫把和泥看一片飛從天上來詩話總龜乾德中左補闕王伸知永州乾康捧詩見伸覩其老醜曰豈有狀貌如此能為詩乎時積雪方消命康詠之伸驚異待以殊禮延壽延壽字沖立號抱一子杭州人棄吏出家吳越忠懿王延住永明寺著宗鏡録開寶八年入滅賜號智覺禪師閒居閒居誰似我退跡理難過要勢危身早浮榮敗德多雨催蟲出穴寒逼鳥移窠野徑無人翦疏窗入薜蘿宋髙僧詩選永牙永牙居圭峯賜紫贈英公大師吾宗何事獨稱雄今昔名髙繼古風王右軍書得智永李陽冰篆付英公墨研天電煤疑絶硯琢端溪石欲空珍重真蹤千載後誰來三日看無窮英公十八體篆書碑墨池編釋夢英衡州人效十八體書尤工玉箸嘗至大梁太宗召之簾前賜紫服去游終南山師號宣義正緣句桞牆髙于花怒飛方可至竒哉游夏徒吐辭作雄翅送人謁桞開歷代吟譜仲休仲休一作仲林越僧李文靖公以名上賜號海慧大師有天衣十峯詠錢易為序雲門寺鶴唳峯前路行行世慮消蘿交藏石竇雲破露山椒樹老形多怪人間色似驕誰同訪諸謝烟草滿溪橋宋髙僧詩選贊寧贊寧德清髙氏子出家杭州龍興寺吳越武肅王署為兩浙僧統賜號明義宋太宗召對滋福殿詔修髙僧傳咸平初加右街僧録又著內典集外學集至道二年示寂諡曰圓明大師寄題水月禪院在洞庭山縹眇峯下梁大同四年建山有無礙泉參差峯岫書雲昏入望攀蘿濁浪奔震澤涌山來北岸華陽連洞到東門日生樹掛紅霞腳風起波搖白石根聞有上方僧住處橘花林下採蘭蓀吳郡志居天柱山四野豁家庭柴門夜不扃水邊成半偈月下了殘經雖逐諸塵轉終歸一念醒未知斯旨者萬役盡勞形瀛奎律髓福全福全金鄉沙門自詠生成盞裏水丹青巧盡工夫學不成郤笑當時陸鴻漸煎茶贏得好名聲清異録沙門福全生于金鄉長于茶海能注茶幻茶成一句詩並㸃四甌共一絶句泛乎湯表小小物類唾手辦耳禮越日造門求觀湯戲自詠云云法常法常河南釋句優游麴世界爛漫枕神仙清異録河南釋法常性英爽酷嗜酒無寒暑風雨常醉醉即熟寢覺即朗吟云云定諸定諸晉江僧曾楚公會與為方外友有去華集詠鸚鵡罩向金籠好羽儀分明喉舌似君稀不須一向隨人語須信人心有是非泉州府志希晝希晝劒南人九僧之一歐公詩話九僧詩集今不傳當時有進士許洞俊逸士也嘗會諸僧分題出一紙約曰不得犯此一字其字乃山水風雲竹石花草雪霜星日禽鳥之類諸僧閣筆鄭樵通志藝文略九僧選句圖一卷書惠崇師房詩名在四方獨此寄閒房故域寒濤闊春城夜夢長禽聲沈遠朩花影動回廊幾為分題客殷勤掃石牀寄題武當郡守吏隱亭郡亭傳吏隱閒自使君心卷幕知來客懸燈見宿禽茶烟逢石斷棊響入花深會逐南帆便乘秋寄此吟留題承旨宋侍郎林亭翰苑營嘉致到來山意深會茶多野客啼竹半沙禽雪澑懸危石棊燈射遠林言詩素非苦虛答侍臣心以上瀛奎律髓懷廣南轉運陳學士極望隨南斗迢迢思欲迷春生桂嶺外人在海門西殘日依山盡長天向水低遙知仙館夢夜夜怯猿啼禪藻集句天長來月正朩末度猿稀遊雁蕩曉天金馬路晚嵗石霜心贈句學士山日秋光短江虹晚影低寄人寄禪關樹老乞食塞城荒贈關上人楊文公談苑保暹保暹金華人九僧之二有處囊訣書杭州西湖涉公堂孤舟孤鶴與孤雲湖上深居自不羣髙臥可能容一榻青山西岸且平分宋髙僧詩選早秋閒寄宇昭窗虛枕簟明微覺早涼生深院無人語長松滴雨聲詩來禪外得愁入靜中平遠念西林下相思合慰情秋徑杉竹清隂合閒行意有憑涼生初過雨靜極忽歸僧蟲迹穿幽穴苔痕接斷棱翻思深隱處峯頂下層層以上瀛奎律髓天厨禁臠云自然令人愛悅不假人言然後為貴文兆文兆南越人九僧之三巴峽聞猿倚棹望雲際寥寥出峽情心如無一事愁不在三聲帶露諸峯迥懸空片月明何人同此聽徹曉得詩成宋髙僧詩選宿西山精舍西山乘興宿靜稱寂寥心一徑松杉老三更雨雪深草堂僧語息雲閣磬聲沈未遂長棲此雙峯曉待尋瀛奎律髓行肇行肇天台人九僧之四泛若邪溪霽雨牽野情孤舟遂茲賞積水連逺空落日垂萬象岸迥雲獨隨山轉泉更響望望極寒源猶言放輕槳宋髙僧詩選酬贈夢真上人禪舍因吟往晴來坐徹宵春通三徑晚家别九江遙巢重禽初宿窗明葉旋飄住期應未定謝守有詩招自注青社凌使君以詩見招送文光上人西游髙朩墜殘葉關河入遠心嵩游忘楚夢華近識秦音塔古懸圖認碑荒背燒尋幾思興替事獨上灞陵吟以上瀛奎律髓句定錫樵停斧窺人鳥立槎送僧江聲鼇背去帆影斗邊飛送人之鄞江楊文公談苑簡長簡長沃洲人九僧之五張景序云上人之詩始發于寂寞漸進于沖和盡出于清竒卒歸于雅靜夜感無眠動歸心寒燈坐將滅長恐浮雲生奪我西窗月宋髙僧詩選送僧南歸漸老念鄉國先歸獨羡君吳山全接漢江樹半藏雲振錫林烟斷添瓶㵎月分重棲上方定孤狖雪中聞瀛奎律髓送方仲荀行客心如何借劒為君歌雨昏山未開花盡春無多欲知貧别情涕淚空滂沱晚次江陵楚路接江陵倦行愁問程異卿無舊識多難足離情落日懸秋樹寒蕪上廢城前山不可望斷續暮猿聲以上禪藻集寄雲水禪師千峯聳寒翠古剎凌秋雲髙人斂幽跡世事何由聞禪石抱蒼蘚祖衣含淨氛有時溪上步自與鳥猿羣雲門志略句烟壘沈寒角霜空擊怒鵰送人歸寧州楊文公談苑惟鳯惟鳳青城人號持正九僧之六有風雅拾翠圖王隨序云持正大師一章一聨皆出清新發乎濬逸賦象可以披圖畫騰英可以潤金石弔長禪師霜鐘侵漏急相弔晚悲濃海客傳遺偈林僧寫病容潄泉流落葉定石集鳴蛩回首雲門望殘陽下遠峯瀛奎律髓句草檄飛燕壘降幡入漢宫邊將岸盡吳山出潮平越樹低送人歸天台寺近東溟日山連北固春題甘露招提家逺知琴在時清賣劒歸送陳處士厯代吟譜惠崇惠崇淮南人一作建陽人九僧之七有集錢易序云步驟髙下去古人不遠釋子之詩可相等者不易得清波雜志崇非但能詩畫亦有名世謂惠崇小景者是也書林逸人壁詩語動驚衆誰知慕隱淪水烟常似暝林雪乍如春薄酒懶邀客好書愁借人有時行藥去忘郤戴紗巾宋髙僧詩選池上鷺分賦得明字雨絶方塘溢遲徊不復驚曝翎沙日暖引步島風清照水千尋迥棲烟一㸃明主人池上鳳見爾憶蓬瀛湘山野録寇萊公延詩僧惠崇于池亭探􅍐分題萊公得池上桞青字韻崇得池上鷺明字韻崇默繞池徑馳心杳冥以搜之自午及晡忽以二指㸃空微笑曰此篇功在明字凡五押之俱不倒今方得之公曰試請口舉崇舉詩云云公笑曰吾之桞功在青字巳四押之終未愜不若且罷訪楊雲卿淮上别業地近得頻到相攜向野亭河分岡勢斷春入燒痕青望久人收釣吟餘鶴振翎不愁歸路晚明月上前汀瀛奎律髓自撰句圖河分岡勢斷春入燒痕青書楊雲卿别業隂井生秋早明河轉曙遲長信詞地形吞蜀盡江勢抱蠻回送遠上人西遊嶺暮春猿急江寒白鳥稀江行晚泊歸禽動疏竹落果響寒塘上谷相公池上作野人傳相鶴山吏學彈琴贈陳六少府香淺冰生井宵分月上軒夜坐掩門青檜老出定白髭長贈凝上人浪經蛟浦闊山入鬼門寒送遷客遺偈傳諸國留真在一峯經緣公舊寺河冰堅渡馬塞雪密藏鵰塞上久别年顔改相逢夜話長喜長公至多年不道姓幾日旋移家隱者鳥歸杉墮雪僧定石沈雲宿東林寺露寒金掌重天近玉繩低上翰林楊學士著書驚日短彈劒惜春深柳氏書齊探騎通番壘降兵逐漢旗上王太尉露下牛羊靜河明桑柘空田家秋夕林斷城隍出江分島嶼回舟行鎖城山月上吹角海鷗驚寄梅蘇州卷幔來風遠移牀得月多宿揚侍郎東亭白浪分吳國青山隔楚天送程至空潭聞鹿飲疏樹見僧行游隱靜寺劒佩明山雪旌旗溼海雲送錢供奉巡警曠野行人少長河去鳥平梅鼎臣河亭月髙山舍迥霜落石門深宿肇公山齊霜多秦朩迥雲盡漢山孤送盧經西歸夜閒潮動舸秋迥月臨城濠梁夜泊葉落風中盡蟲聲月下多崔仰秋居行縣山迎舸論兵雲繞旗贈裴使君繁霜衣上積殘月馬前低早行磬斷蟲聲出峯回鶴影沈秋夕移家臨醜石租地得靈泉書韓退之屋壁秋近草蟲亂夜遙霜月低秋夕懷長公海鷗聽舜舞山鬼醉堯觴觀宴鄉老中食下林狖夜禪移冢狐贈素上人扇聲猶泛暑井氣忽生秋晚夏殘月楚山曉孤煙江廟春江行早發梵容分古像唐語入新經宿翻經館清少卿房鶴傳滄海信僧和白雲詩題王太保道院寒禽棲古柳破月入微雲秋夕懷汪白花漏沈山月雲衣起海風贈白上人樓中天姥月座上杜陵人喜陳助至人歸岡舍迥雁過渚田遙冬日野望山色臨巴迥江流入漢清送人牧榮州湘雲隨雁斷楚路背人遙春申道中松風吹髮亂巖澑濺棊寒贈李道士境閒僧渡水雲盡鶴盤空棲霞寺古路隨岡起秋帆轉浦斜林逋河亭禽寒時動竹露盡忽翻荷楊祕監池上嵐重琴棊溼風長枕簟寒魏野山亭離磧雁衝雪渡河人上冰塞下夜梵通雲竇秋香滿石叢寄白閣能上人關河雙鬢白風雪一燈青陜西道中殺氣生龍劒威風動虎旗送防秋楊將軍落潮鳴下岸飛雨暗中峯瓜洲亭子月躔黃道迥春入紫微深賀劉舍人寒燈催臘盡曉角喚春歸除夜雁行沈古戍鵰影轉寒沙幽并道中景霽雲回合秋生樹動搖送僧歸天台亂水僧頻過荒林鶴不還過陳摶田居露館濤驚枕空庭月伴琴宿橫江館馬渡冰河闊鵰盤磧日髙維邢道中驚蟬移古柳鬬雀墮寒庭國清寺秋居松風傳夕磬溪霧擁春燈書平上人山房霓旌搖曙景鳳吹繞春雲觀南郊天仗坐石雲生袖添泉月入瓶贈義省上人萬國無刑治三邊不戰平升平詞暝鶴棲金剎秋僧過石橋國清寺雲殘松掃石風動鶴歸松吕氏西齊風暖鳥巢朩日髙人灌園劉參幽居竹風驚宿鶴潭月戲春鷖楊都官池上圭竇先知曉盆池别見天書方居士壁月露疏寒柝雲濤閃畫旗送陳舍人巡㣳鶴驚金剎露龍蟄玉瓶泉宿齊上人禪齊暄風生朩末遲景入泉心春日寇公贊池上河來天上闊雲度月邊輕七夕海人來相鶴山狖下彈琴贈王道士畫鷁浮秋浪金鐃響夕雲送孫荆州丹楓映郭迥緑嶼背江深江城晚望危澑含清瑟飛花㸃玉觴題王太保山亭朱旗凌雪卷畫角入雲吹送李秦州孤雲還靜境遠籟發秋空畫上人西齊圍棊分雪石汲井動金沙李太博山莊井含春氣碧樓轉夕隂清宫中詞鳥暝風沈角天清月上旗送吳袁州斜吹鳴金錫歸雲擁石牀寄肇公古戍生煙直平沙落日遲塞上拂石雲離帚嘗茶月入鐺嗣上人遠嶼迎檣出寒林帶岸回舟行來時雲擁衲别夜月隨笻送延上人路橫岡燒斷風轉浦帆斜馬蠙淮亭劒靜龍歸匣旗閒虎繞竿上殿前戴太保品畫逢名嶽橫琴憶古賢髙諲書齊雲隂移漢塞石色入秦天太一山地遙羣馬小天闊一鵰平塞上送人江花凌霰發山澑入池深范溶園池長風躍馬路小雪射鵰天獵騎古朩風烟盡寒潭星斗深髙略書院渡河風動斾巡部雨霑車送段工部河北轉運青箱雜記歐陽公詩話惠崇詩多佳句有百句圖刋石于長安宇昭宇昭江南人九僧之八塞上贈王太尉嫖姚立大勳萬里絶妖氛馬放降來地鵰閒戰後雲月侵孤壘沒燒徹遠蕪分不慣為邊客宵笳懶欲聞幽居即事掃苔人迹外漸老喜深藏路僻閒行遠春晴晝睡長餘花留暮蝶幽草