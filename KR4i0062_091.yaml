詩舒王少與遊嘗以其詩示歐公曰此道人作肝臟饅頭也舒王不悟其意歐公曰是中無一㸃菜氣璉䝉仁廟賞識留住東京淨因禪院甚久嘗作偈乞還山云云擇璘擇璘剡中寶積寺僧寄禮法師寺枕滄溟上門長掩寂寥定回花漏斷講徹獸烟消入檻泉聲細當軒嶽色遙何時重㑹席南望路迢迢宋髙僧詩選詠杜鵑花蠶老麥黃三月天青山處處有啼鵑斷崖幾樹深如血照水晴花曖欲然三歎鶴林成夢寐前生閬苑覓神仙小山拄頰愁無奈又怕聲聲聒夜眠剡録無夢無夢鄂州僧書朩牌詩身為車兮心為軾車動軾隨無計息交梨火棗是誰無自是不除荆與棘身為客兮心為主主人平和客安堵若還主客不安寧精神管定辭君去墨客揮犀無夢多化府畿村落閒手持朩牌一靣正書詩二首云云善暹喜暹臨江軍人初參雪竇顯曾居座下後住開先寺辭顯禪師題壁不是無心繼祖燈道慚未廁嶺南能三更月下離巖竇眷眷無言戀碧層補續髙僧傳寶黁寶黁光黃閒狂僧年百三十嵗死于熙寧十年既死人有見之者題逆旅壁滿院秋光濃欲滴老僧倚杖青松側只怪髙聲問不應嗔余踏破蒼苔色苕溪漁隱叢話惟政惟政餘杭僧有錦溪集補續髙僧傳政禪師住功臣山標致甚髙蔣侍郎堂守錢塘與師為方外友冬不擁爐以荻花作毬納足于中客至共之好玩月盤膝大盆中浮于水上自旋其盤吟笑達旦率以為常出入常跨一黃牛世稱為政黃牛山中作橋上山萬重橋下水千里惟有白鷺鷥見我常來此林閒録辭侍郎蔣公宴客見招昨日曾將今日期出門倚杖又思惟為僧只合居巖谷國士筵中甚不宜自題像貌古形疏倚杖藜分明畫出須菩提解空不許離聲色似聽孤猿月下啼以上西湖髙僧事略香林洞香林接幽洞香乳無時滴日暮白雲歸攀之不可得宋髙僧詩選則之則之字彞老外岡楊氏子學詩于西湖順老學禪于大覺璉禪師有禪外集早梅數萼初含雪孤清畫本難有香終是别雖瘦亦勝寒橫笛和愁聽斜枝倚病看朔風如解意容易莫吹殘雪霽觀梅荒園晚景斂寒烟數朵清新破雪邊幽豔有誰能畫得冷香無主賴詩傳看來最畏前村笛折去休逢野渡船向晚十分終更好靜兼江月淡娟娟以上中吳紀聞繼儒貽顯宗上人僧間師更間危坐雪堂寒白日門常掩紅塵事不干吟終燈燼落講罷印香殘仍欲添佳致栽松近藥闌李蓘黃谷䜈談云沁水縣榼山寺中宋石刻九僧詩人各一首不盡佳不録此刻在治平二年十二月望日思雅送王山人歸千峯舊居千萬岑歸去獨攜琴物外情難遏雲中路再尋花繁溪圃合桞暗野橋深想到垂綸處和苔掃竹隂黃谷䜈談惠渙送王山人歸隱山人惟委命豈戀世塵閒干祿不得志移家住遠山醉眠溪石靜吟倚草堂間到想無餘事林僧日往還黃谷䜈談靈澄山居因僧問我西來意我話山居不記年草履秖栽三箇耳麻衣曾補兩番肩東菴每見西菴雪下㵎常流上㵎泉半夜白雲消散後一輪明月到牀前春花集顯忠顯忠贊寧弟子白雲莊門外仙莊近翠岑杖藜時得去幽尋牛羊數㸃烟雲遠雞犬一聲桑柘深髙下間田如布局東西流水若鳴琴更聽野老談農事忘却人閒萬種心宋髙僧詩選閒居竹裏編茅倚石根竹莖疏處見前村閒眠盡日無人到自有清風為掃門詩人玉屑隱嶽洞在新昌縣石城山融結自何時曾為幾陵谷不見昔賢蹤空遺此巖腹一徑斷烟榛千岑老雲朩尋常人更稀虎豹暗棲宿紹興府志清晦登閣小閣稱幽隱登臨眺晚晴暮雲埋落日寒樹夾孤城鳥道穿山色人烟隔水聲自憐疏散意多不計浮名宋髙僧詩選祖心祖心號晦堂南雄始興郭氏子少為書生出家參黃檗南公繼其法席住隆興府黃龍寺元符三年示寂賜號寶覺客齊詩話黃龍心禪師初謁雲峯恱公留三年往依黃檗南公無所得試閲傳燈至僧問多福曰如何是多福一叢竹曰一莖兩莖斜三莖四莖曲頓覺有省旋游京師南還廬山退黃龍院作不住唐朝寺間為宋地僧生涯三事衲故舊一枝藤乞食隨緣過逢山任意登相逢莫相笑不是嶺南能許彥周詩話深靜平實道眼所了非世閒文士詩僧所能髣佛元淨元淨字無象於潛徐氏子住持杭州上下二天竺賜紫衣及辨才號學徒踰萬人趙閲道蘇子瞻秦少游皆與倡酬退居龍井聖壽院次韻參寥懷秦少游學士巖棲朩食已皤然交舊何人慰眼前素與晝公心印合每思秦子意珠圓當年步月來幽谷拄杖穿雲冒夕烟臺閣山林本無異故應文字未離禪風月堂詩話東坡題後云辨才作此詩時年八十一矣平生不學作詩如風吹水自成文理而參寥與吾輩詩乃如巧人織繡耳文彧文彧號文寶大師有詩格句十年弓劒為誰苦萬里山河不自由題項羽廟吟譜歷代惠隆惠隆有靈溪集句繞砌淺莎鳴促織斷檐殘雨挂遊絲題廢宅譜歷代吟宗美宗美有晉江集題延福寺倚檻寒松偃連雲一徑橫就中圖不得窗外入江聲自題詩集新集芻蕘六百篇冥搜疑到不還天多慙未得騷人旨虛役身心五十年句浣紗舊曲何人笛一一隨風到客舟泊吳江代吟譜以上歷維琳維琳武康沈氏子好學能詩熙寧中東坡居士倅杭請住徑山宣和元年崇右道教詔僧為德士皆頂冠師聚徒說偈而逝東坡志林徑山長老維琳行峻而通文麗而清問東坡疾扁舟駕蘭陵目換舊風物君家有天人雌雄維摩詰我口吞文殊千里來問疾若以偈相答露柱皆笑出雲麓漫抄題松大夫去作棟梁材無復清隂護緑苔只恐夜深明月下誤他千里鶴飛來補續髙僧傳師居銅山院有松合抱縣大夫將取以治廨師知之命削皮題詩其上尉至讀其詩乃止省回省回住南嶽雙峯寺辭衆偈九十二光隂分明對衆說遠洞散寒雲幽窗度殘月五燈㑹元師於元豐六年九月十七日坐逝茶毗齒頂不壞上有五色異光重喜重喜熙寧中㑹稽人少以捕魚為生日誦觀世音菩薩不少休舊不識字輒能書又能作偈頌絶句地爐無火一囊空雪似揚花落嵗窮乞得苧麻縫破衲不知身在寂寥中竹坡詩話句行到寺中寺坐觀山外山遊蕺山上方院程守公闢索詩老學菴筆記曇秀山光寺扁舟乘興到山光古寺臨流勝氣藏慙愧南風知我意吹將草朩作天香東坡題跋子在廣陵與朝無咎曇秀道人同舟送客山光寺客去豫醉臥舟中曇秀作詩靚禪師題巨商壁去年巢穴畫梁邊春暖雙雙繞檻前莫訝主人簾不卷恐銜泥土汚花甎冷齊夜話絶句春天一夜雨雱𩃱添得溪流意氣多剛把山僧推倒郤不知到海後如何冷齊夜話靚禪師有道老宿也主筠之三峯嘗赴供民家渡溪漲靚重為溪流所陷童子掖至岸坐沙石閒垂頭如雨中鶴忽指溪作詩云云後住汝州香山無疾而化日益日益保寧勇禪師法嗣偶作金谷春光長滿眼紅藥花梢香爛漫昨夜西風一陳寒遍地殘芳落何限王孫醉倒不知歸猶向闌邊索金盞禪藻集可遵可遵福州僧佛印元公自京師還過金陵作詩贈之上國歸來路幾千渾身猶帶御爐烟鳳皇山下敲篷詠驚起山翁白晝眠題湯泉禪庭誰作石龍頭龍口湯泉沸不休直待衆生塵垢盡我方清冷混常流以上冷齊夜話道潛道潛字參寥於潛何氏子與秦觀蘇軾遊軾守杭卜智果精舍居之軾南遷坐詩語刺譏得罪返初服建中靖國初詔復祝髮崇寧末歸老江湖嘗賜號妙總大師有集東坡詩話僕在黃州參寥自武陵來訪館之東坡一日夢參寥誦新詩覺而記兩句云寒食清明都過了石泉槐火一時新後七年出守錢塘而參寥始卜居湖上智果院院有泉出石縫間甘冷宜茶寒食之明日僕與客泛舟自孤山來謁參寥汲泉鑽火烹黃檗茶忽悟所夢詩兆于七年之前衆客驚歎知傳記所載蓋不妄也羅墨莊漫録吕溫卿為浙漕屢起大獄復欲網參寥參寥本名曇潛東坡改之曰道潛吕索牒勘驗竟坐刑還俗編管兖州經臨平作風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲續骩骳說參寥子常在臨平道中賦詩云云東坡一見而刻諸石宗婦曹夫人善丹青作臨平藕花圖人爭傳寫東園曲渚回塘孰與期杖藜終日自忘機隔林倣佛聞機杼知有人家在水西冷齊夜話道潛性褊憎凡子如讐作詩追法淵明其語有逼真處曰數聲柔櫓蒼茫外何處江村人夜歸又曰隔林倣佛聞機杼知有人家在翠微時從東坡在黃州士大夫以書抵坡曰聞日與詩僧相從豈非隔林倣佛聞機杼者乎真東山勝游也坡以書示潛誦前句曰此吾師七字詩號秋江赤葉楓林落酒旗白沙洲渚夕陽微數聲柔櫓蒼茫外何處江村人夜歸余初入智果院蘇翰林率賔客相送者十六人各賦詩一章用圓覺經云以大圓覺為我伽藍身心安居平等性智為韻得以字泰山屹天下四海同仰止我公命世英突兀等于是胸中廓秋漢皎絶微雲滓當年事危言軒冕如脫屣正貴知我希寧慚不吾以風雲果再符六翮排空起一昨厭承明抗章求迤邐餘杭古雄藩比屋富生齒立談政可成興不負山水雍容敦末契訪我頑且鄙大斾輝松門禽猿亦驚喜森森門下士左右粲珠履使君道德安圭角非所恃軟語如春風薰然著桃李今朝真勝事千載足遺美安得筆如椽磨崖為公紀卜居智果答方外青燈殘篆夜寥寥門外秋風振葦蕭慚愧髙人能見憶為豫西望立溪橋湖上去嵗春風上苑行爛窺紅紫厭平生而今眼底無姚魏浪蘂浮花懶問名城隈野水緑逶迤裊裊輕舟掠岸過欲採藝蘭無覓處野花汀草占春多風月堂詩話東坡南遷參寥居西湖智果院交遊無復囊時之盛作湖上絶句云云詩既出遂有返初服之禍建中靖國閒曽子開明其非辜始還故服口占絶句寄語東山窈窕娘好將幽夢惱襄王禪心巳作霑泥絮不逐春風上下狂侯鯖録東坡在徐州參寥自錢塘訪之坡席上令一妓戲求詩口占云云一座大驚自是名聞海內夏日龍井書事雨過千巖爽氣新孤懷入夜與誰鄰風蟬故故頻移樹山月時時自近人禮樂汝其攻我短形骸吾已付天真露華漸冷飛蚊息窗裏吟燈亦可親自憐多病畏炎曦長夏投蹤此最宜青石白沙含淺瀨碧梧蒼竹聒涼颸雲中雞犬聽難辨谷口漁樵問不知斑杖芒鞋隨步遠歸來烟火認茅茨以上參寥集題東坡墨竹贈官妓小鳳團箋已自竒謫仙重掃嵗寒枝梢頭餘墨猶含潤恰似梳風洗雨時風月堂詩話坡在餘杭㑹客以彩箋作墨竹贈官妓且令索詩于參寥參寥援筆立就仲殊仲殊字師利俗姓張氏名揮安州進士因事出家住蘇州承天寺杭州吳山寶月寺有寶月集東坡志林蘇州仲殊師利長老能文善詩及歌詞皆操筆立就豫曰此僧胸中無一毫髮事故與之游聞殊中吳紀為士人嘗與鄉薦其妻以藥毒之遂棄家為僧工于長短句東坡先生與之往來甚厚時時食蜜解其藥人號蜜殊喜作豔詞孚草堂嘗以詩針之竟莫能改一日造郡中接坐之閒見庭下一婦人投牒立于雨中守命殊詠之口就一詞云濃潤侵衣暗香飄砌雨中花色添憔悴鳳鞋濕透立多時不言不語厭厭地眉上新訴薄情手中文字因何不倩鱗鴻寄想伊只官中誰管間公事後殊自經于枇杷下輕薄子更之曰枇杷樹下立多時不言不語厭厭地潤州北固樓前一笛風斷雲飛出建章宫江南二月多芳草春在濛濛細雨中題李伯時支遁相馬圖月窟精神不受羈白雲野老太支離當時若也無人識駿骨靈心各自知以上侯鯖録訪方子通多年不見玉川翁今日相逢小榭東依舊清涼無長物只餘松檜養秋風中吳紀聞黃左丞席上作瑞麟香暖玉芙蓉畫蠟凝輝到曉紅數㸃漏移衙仗北一番雨滴甲樓東夢游黃閣鸞巢外身臥彤幃虎帳中報道譙門初日上起來簾幕杏花風能改齊漫録黃左丞安中守平江日㑹客仲殊亦與焉以疲倦先起熟寐于黃堂中及覺日已曈曨矣黃因罰作此詩始放去瑞麟香安中家所造也京口懷古一昨丹陽王氣銷盡將豪侈謝塵囂衣冠不復宗唐代父老猶能道晉朝萬嵗樓邊誰唱月千秋橋上自吹簫青山不與興亡事只共垂楊伴海潮方輿勝覽慎長老慎長老廬山圓通寺僧和東坡詩韻東軒長老未相逢巳見黃州一信通何必揚眉資目擊須知千里事同風蘇文忠公集云子由在筠作東軒記或戲之為東軒長老其壻曹煥往筠余作一絶句送曹以戲子由曹過廬山出以示圓通慎長老慎欣然亦作一絶送客出門歸入室趺坐化去清順清順字怡然杭州西湖北山僧王荆公愛其詩東坡晚年亦與之唱酬題西湖僧舍壁竹暗不通日泉聲落如雨春風自有期桃李亂深塢竹坡詩話東坡遊西湖于僧舍壁聞見小詩問誰所作或告以錢塘僧清順即日求得之一見甚喜而順之名出矣余留錢塘七八年有誦順詩者往往不逮前篇政以所見之未多耳然使止于此亦可傳也十竹軒城中寸土如寸金幽軒種竹只十箇春風慎勿長兒孫穿我階前緑苔破北山垂雲菴久從林下遊頗識林下趣縱然緑隂繁不礙清風度間于石上眠落葉不知數一鳥忽飛來啼破幽絶處以上詩人玉屑宿天竺昔人不可見行路多長松空遺煉丹處井幹緑苔封月明還獨宿白雲下踈鐘夜半桂子落不知自何峯宋髙僧詩選書景舒菴壁大布君能著始知蠶口非冢閒容一榻身外但三衣護戒避生草淨心觀落暉寂寥能自守今世固應稀瀛奎律髓守詮守詮一作惠詮杭州梵天寺僧題梵天寺落日寒蟬鳴獨歸林下寺松扉夜未掩片月隨行屨唯聞犬吠聲又入青蘿去竹坡詩話余讀東坡和梵天寺僧守詮詩嘗喜其清絶過人晚遊錢塘始得詮詩乃知其幽深清逺自有林下一種風流東坡雖欲回三峽倒流之瀾與溪壑爭流終不近也先覺北窗炙輠惠先覺最為東坡元章所禮為人朴野布衣草履繩棕櫚為帶時夜半起捶其法嗣門索火甚急知是得句也惠覺詩渾然天成無一毫斧鑿痕雍容間逸最有唐人風氣題大慈塢祖塔院谷口兩三家平田一望賒春深多遇雨夜靜獨鳴蛙雲暗未通月林香始辨花誰驚孤枕曉濤白捲江沙北窗炙輠思聰思聰字聞復孤山僧竹坡詩話聞復杭州孤山僧東坡倅杭令和參寥子昏字韻大加稱賞大觀政和閒挾琴游梁日登中貴人之門久之遂還俗為御前使臣方其將冠巾也蘇叔黨因浙僧入都送之詩云試誦北山移為我招琴聰詩至已無及矣句千㸃亂山橫紫翠一鉤新月挂黃昏竹坡詩話枇杷花發天欲雪黃雀不飛枝上寒雪浪齊日記髙子勉喜吳僧聞復此句南越石佛寺松竹行才盡香城絶世塵倚巖開半殿鑿石見全身鐘鼓中天曉烟花上界春出門重稽首願值下生晨宋髙僧詩選楚巒青城山觀靜見門庭紫氣生前山嵐靄入樓青玉壇醮罷鬼神喜金鼎藥成雞犬靈巖下水光分五色壺中人壽過千齡何當一日拋凡骨騎取蒼龍上杳冥宋髙僧詩選懶雲田橫墓荒冢臨歧尚隱然春風吹緑草芊芊牧兒亂唱黃昏後猶似悲歌薤露篇河南府志道英道英俗姓胡泉州人嗣覺照琦禪師絶句南北東西住險巇古巖寒桂冷依依無人到我經行地明月清風擬付誰補續髙僧傳文政文政南嶽僧題勝業寺山鳥無凡音山雲無俗狀引得白頭僧時時倚藜杖南嶽總勝集用孫浮槎山在廬州古傳自海浮來有梵僧過此曰此耆闍一峯也梁武帝女為尼于山建道林寺歐陽公有記山為浮來海莫沈蕭梁曾此布黃金梵僧親指耆闍窟帝女歸傳達磨心地控好峯排萬仞㵎餘流水落千尋靈蹤斷處人何在日夕雲霞望轉深禪藻集雲知雲知西湖普福院僧鄴公菴歌呼猿㵎西藏石筍丹桂蒼松達鷲嶺幾年陳迹絶纖埃一旦佳名出清景山家時喜來五馬相攜款曲空嵒下遂許誅茅結小菴異日功成伴瀟灑菴成可以資靜觀目前直見江湖寬鄴公政簡每頻到試茶笑傲浮雲端物外似忘軒冕貴此中深得林泉意野人陪著病維摩游息自同方丈地芳猷從此流千載且得而今光勝槩咸淳臨安志普福院天福二年吳越王舊建名資嚴大中祥符元年改今額有石筍白沙泉熙寧元年諫議大夫祖無擇出守于杭愛石筍之勝僧雲知結草為菴取公封國以鄴為名有歌宋詩紀事卷九十一
