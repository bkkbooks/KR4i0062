body:
  text: 宋詩紀事卷三錢塘厲鶚撰幸夤遜夤遜夔州雲安監人一云成都人仕後蜀為翰林學士工部侍郎隨昶歸宋授右庶子鎮國行軍司馬楊伯嵓六帖補孟蜀翰林幸夤遜夢掌中生草不絶掌制草數年雲因登巨石知來處勃勃元生緑蘚痕靜即等閒藏草木動時頃刻遍乾坤橫天未必朋元惡捧日還曾瑞至尊不獨朝朝在巫峽楚王何事謾勞魂全唐詩句若教作鎮居中國爭得泥金在泰山岷山録吟窗雜才聞暖律先偷眼既待和風始展睂栁嚼處春冰敲齒冷咽時雪液沃心寒梨事文類聚徐鉉鉉字鼎臣廣陵人仕南唐纍官翰林學士歸宋為直學士院給事中散騎常侍淳化初坐纍黜靜難軍司馬卒有騎省集隱居詩話梅聖俞贈鄰居詩壁隙透燈光籬根分井口徐鉉亦有喜李少保卜鄰云井泉分地脈砧杵共秋聲此句尤閒逺也夢遊魂夢悠揚不奈何夜來還在故人家香濛蠟燭時時暗戶映屏風故故斜檀的慢調銀字管雲鬟低綴折枝花天明又是人閒别洞口春深道路賒繡幌銀屏杳靄閒若非魂夢到應難窗前人靜偏宜夜戶內春濃不識寒蘸甲遞觴纖似玉含詞忍笑膩於檀錦書若要知名字滿縣花開不姓潘南國佳人字玉兒芙蓉雙臉逺山睂仙郎有約長相憶阿母無猜不得知夢裏行雲還倏忽暗中攜手乍疑遲因思别後閒窗下織得回文幾首詩餞蒯參軍亮宦海州作昔年聞有蒯先生二十年來道不行抵掌曾談天下事折腰猶忤俗人情老還上國風光薄貧裏歸裝結束輕遷客臨流各惆悵晚風黃葉滿孤城以上騎省集郡齊讀書志江東布衣蒯亮好大言夸誕鉉喜之客於門下稽神録中事多亮所言吳王挽辭倏忽千齡盡冥茫萬事空青松洛陽陌白草建康宫道德遺文在興衰自古同受恩無補報反袂泣途窮土德承餘烈江南廣舊恩一朝人事變千古信書存哀挽周原道銘旌鄭國門此生雖未死寂寞已消魂翟耆年籀史徐鉉鼎臣從李煜歸朝為銀青光祿大夫右散騎常侍太平興國中李煜薨詔侍臣撰煜神道碑有欲中傷鉉者奏曰吳王事莫若徐鉉為詳遂詔鉉撰鉉泣曰臣舊事李煜陛下容臣存故主之義乃敢奉詔太宗許之鉉但推言厯數有盡天命有歸而已其警句云東鄰搆禍南箕扇疑投杼致慈親之惑乞火無鄰婦之詞始勞因壘之師終後塗山之㑹太宗覽之稱歎不已異日復得鉉所撰吳王挽詞今傳者二首云云鉉被詔撰江南録故有信書之句東鄰謂錢俶也句蘭橈破浪城陰直玉勒穿花苑樹深遊木蕳亭千帆日助陰山勢萬里風馳下瀨聲觀習水戰向空咄咄頻書字忘世滔滔莫問津病中野日蒼茫悲鵩舍水風陰濕敝貂裘謫居三朝恩澤馮唐老萬里江關賀監歸陳祕監歸泉州落月依樓閣歸雲擁殿廊宿山寺玉壺野史吳淑淑字正儀潤州丹陽人仕南唐為內史歸宋薦試學士院授大理評事預修太平御覽文苑英華纍遷起居舍人職方員外郎卒有文集事類賦江淮異人録祕閣閒談句漢殿夜涼初閣筆渚宫秋晚得懸車詩話總龜荆南朱昻晚以工侍乞骸骨真宗賜坐寵詔留候秋涼還故吳淑贈詩云云秦南運南運宋初官尚書郎題青紗連二枕陰香裝豔入青紗還與攲眠好事家夢裏卻成三色雨沈山不敢鬬清華清異録舒雅作青紗連二枕滿貯酴醿木犀瑞香散蘂甚益鼻根尚書郎秦南運見之留詩張洎洎字師黯改字偕仁滁州全椒人仕南唐知制誥中書舍人歸宋為史館修撰翰林學士淳化中參知政事卒贈刑部侍郎有集十國春秋初洎將後主命入貢作十詩以詆訾汴京風物至有一堆灰之句蘇易簡得其親書及是與易簡同事不相能語人曰清河更作異即以一堆灰之詩進呈矣洎為少屈暮春月內署閣前海棠花盛開率爾七言八韻寄長卿諫議去嵗海棠花發日曾將詩句詠芳妍今來花發春依舊君已雄飛玉案前驟隔清塵樞要地獨攀紅蘂豔陽天疏枝髙映銀臺月嫩葉低含綺閣烟花落花開留勝賞春來春去感流年清辭早綴巴人唱妙翰猶緘蜀國箋共仰壯圖方赫耳自嗟衰鬢轉皤然因慿鶯蝶傳消息莫忘蓬萊有病仙海棠譜張佖佖字子澄常州人仕南唐為內史舍人歸宋官虞部郎中十國春秋太宗朝佖在史館一日問曰卿家每食多客敘談何事佖曰臣之親舊客都下乏食故嘗過臣飯然止菜羮而已明日太宗遣快行者伺之果然喜其不隱遷官郎中人稱菜羮張家佖為人長者後官河南每寒食必親拜後主墓哭之甚哀李氏子孫陵替常分俸贍給焉寄人别夢依依到謝家小廊回合曲闌斜多情只有春庭月猶為離人照落花春江雨雨溟溟風泠泠老松瘦竹臨烟汀空江冷落野雲重村中鬼火微如星夜驚溪上漁人起滴瀝篷聲滿愁耳子規呌斷獨未眠罨岸春濤打船尾以上全唐詩邵拙拙宣城人句萬國未得雨孤雲猶在山馬令南唐書歸明傳邵拙宣城人有詩三百篇命曰廬嶽集曹郎趙慶以詩貽之云邁古文章金鸑鷟出塵行止玉麒麟歸皇朝就應制科有司以聞未詔而卒時悼其苦學能文而不得達于名位或議其詩有句云云斯為應矣劉吉吉江左人事李煜為傳詔承㫖歸朝為供奉官知河渠利害委以八作務太平興國中河大決吉塞河有方略人目為劉跋河後為崇儀使有詩三百首名釣鼇集句一箭不中鵠五湖歸釣魚贈隱者歷代吟譜龔穎頴字同秀邵武人初仕南唐為內史歸宋為殿中侍御史次韻贈丁謂之膽怯何由戴鐵冠秖緣昭代奬孤寒曲肱未遂違前志直指無聞是曠官三署每傳朝客說五溪閒憑郡樓看祝君早得文場雋況值天階正舞干青箱雜記穎自負文學少許人談論多所折難太宗朝知朗州士罕造其門獨丁謂贄文求見穎倒屣延迓酬對終日以至忘食曰自唐韓栁後今得子矣異日丁獻詩於穎穎次韻和酬潘慎修慎修字德成莆田人仕南唐為祕書省正字歸宋為太常博士真宗朝纍擢翰林侍讀學士有集禁林宴㑹之什紅藥深嚴肅廣筵嘉招仍許厠羣仙忽窺宸翰雲龍動乍揭天辭日月懸散作楷模珍寶惜永刋金石共流傳況當枚馬從容地仍集班揚侍從賢敢竊休明為盛觀願陳風詠播薰弦不辭勝引承歡醉長洽升平億萬年翰苑羣書句如今縱得仙翁術也怯君王四路饒楊文公談苑太宗棊品第一待詔有賈元者臻于絶格時人以為王積薪之比元嗜酒病死楊希粲蔣元吉李應昌朱懷辟皆國手然非元之敵晚有李仲元棊絶勝可侔于元嵗餘亦卒朝士有蔣居中潘慎修亦善棊至三品內士陳好元四品多得侍棊自元而下皆受三道慎修受四道好元受五道慎修獻詩云云羅穎穎南昌人南唐入宋句嫚侮羣豪誇大度可憐容得辟陽侯馬令南唐書穎開寶中詣金陵舉進士第例以黃衣守選及王師問罪後主銜璧穎再應鄉舉下第道經漢髙祖廟題詩落句云云少頃輒自免冠鞠伏廟廷口陳自咎之言掖去數日卒孟歸唐歸唐湖湘連上人南唐水部郎賔于之子廕受祕書正字吉州民掾歸宋遷大理丞以罪貶袁州司户句練色有窮處寒聲無盡時龍衮江南野史孟賔于入江南生子名歸唐少能詩就廬山國學遂得瀑布詩云云時鄰房儒生亦得此聮遂互訟其句助教不能理因送江州各以全篇意勢定之而歸唐較勝大為時人所仰黃夷簡夷簡字明舉福州人少仕吳越為明州判官歸宋纍遷都官郎中召試翰林知制誥檢校祕書監吳越備史補遺開寶二年秋九月忠懿王遣元帥府掌書記黃夷簡入貢太祖謂夷簡曰汝歸語元帥當訓練甲兵江南倔强不朝我將討之元帥當助我無信人言脣亡齒寒王密表謝且請師期句宿雨一番蔬甲嫩春山幾焙茗旗香皇朝類苑錢惟治惟治字和世吳越廢王倧長子忠懿王俶養為已子歸宋領鎮國軍節度使左驍衛上將軍卒追封彭城郡王生平慕皮陸為詩有集吳越世家疑辨俶以嫡嗣惟濬無檢故器惟治數俾權發遣軍國之務洎入朝惟濬止奉朝請而委惟治藩任焉春日登大悲閣回文聖主欽崇教千光顯紺容映雲窗綺暖籠月箔花重淨剎香風逺危闌碧霧濃勝因良以詠華國一斯逢碧天臨迥閣晴雪㸃山屏夕烟侵冷箔明月斂閒亭冰川詩式湖州府志吳越回文綬帶連環詩碑在法華寺節度使錢惟治作九十首張在在青州布衣少能文尤精詩奇蹇不遇老死場屋題龍興寺老柏院南鄰北舍牡丹開年少尋芳日幾回惟有君家老柏樹春風來似不曾來澠水燕談文潞公皇祐中鎮青詣老柏院訪在所題字已漫滅公惜其不傳為大字書于東廊之壁叢話元祐中州學教授畢仲愈題跋刻石西溪于平嵐亭上傅霖霖字逸巖青州人少與張詠同學霖隱不仕詠既顯求霖三十年不可得及詠知陳州乃來謁曰子將去來報子耳翌日别去後一月詠卒贈張乖崖忍把浮名賣卻閒門前流水對青山青山不語無人事門外風光任往還苕溪漁隱叢話句劇談驅夜瘧幽夢得鄉書復齊漫録傅霖開寶中嘗與張乖崖㑹于韓城終夕談話鄰有病瘧為之不作公每有書與傅傅必先夢故傅有句云云陶彞彞陶穀之猶子句生涼好喚雞蘇佛回味宜稱橄欖仙清異録豫讀胡嶠茶詩霑牙舊姓餘甘氏破睡當封不夜侯愛其新奇猶子彞年十二嵗令效法之近晚成篇云云彞亦文辭之有基址者也張齊賢齊賢字師亮曹州人徙家洛陽太祖幸西都以布衣上書太平興國二年舉進士纍官同中書門下平章事以司空致仕卒贈司徒諡文定致仕後戲贈故人午橋今得晉公廬花木烟雲興有餘師亮白頭心已足四登兩府九尚書宋史本傳齊賢歸洛得裴度午橋莊有池榭松竹之盛日與親舊觴詠其間意甚曠適御書飛白玉堂之署三體宸章併宣禁苑覩兹盛事輒動斐然寵深仙署降新牌御筆親題重俊才四字千齡懸日月兩篇三體琢瓊瓌登科郤桂皆同樹入室邱門盡仰回余與承㫖學士皆御前科選而學士最受聖恩顧遇則前後門生俱深榮羡故有是也寓直靜封芝檢去密宣榮對玉泉來職清望峻人稀見地貴扃嚴晝罕開多幸謬持黃閣柄烟霄時得遂游陪翰苑羣書石將軍南征賦贈五花密布生門出三令重宣宿將聽劃地豈能容賊窟指天不許見妖星醪投漢水期分飲石削巴邱待勒銘洗盡甲兵安草木君山依舊望中青陸氏善鳴集吕䝉正䝉正字聖功河南人起居郎龜圖子太平興國二年舉進士第一纍知制誥為翰林學士歷司空兼門下侍郎同平章事纍封許國公卒贈中書令諡文穆邵伯溫聞見録公微時行伊水上見賣瓜者意欲得之無錢可買其人偶遺一枚于地公悵然取食之後作相買園臨伊水起亭以饐瓜為名尹洛日作昔作儒生謁貢闈今提相印出黃扉九重鴛鷺醉中别萬里烟霄達了歸鄰叟盡垂新鶴髮故人猶著舊麻衣洛陽謾說多才子自歎遭逢似我稀青箱雜記洛陽龍門有吕文穆公讀書龕云初有友二人共棲偃于此一人則溫尚書仲舒一人忘姓名及唱第文穆狀元溫中甲科其一人拂衣歸隱文穆作相太宗問昔誰為友文穆以歸隱者對遽以著作佐郎召不起文穆罷相尹洛作詩云云讀書龍門山土室作八灘風急浪花飛手把魚竿傍釣磯自是鉤頭香餌别此心終待得魚歸鴻溝在河陰縣即楚漢分界處溝中流水已成塵溝畔荒涼起暮雲大抵關河須一統可能天地更平分烟橫緑野山空在樹倚髙原日漸曛方憑征鞍思往事數聲風笛馬前聞以上開封府志李虛已虛已字公受建安人太平興國二年進士纍官知遂州終工部侍郎與壻晏殊唱酬有雅正集羅願新安志真宗喜談經命馮元橫易謂曰朕不欲煩近臣久立欲選純孝之士數人止如同人便裘頂帽講經並坐暇則薦茗果盡笑論削去進說之儀遇疲則罷元薦查道及李虛已李行簡三人虛已母喪明醫者曰浮翳泊眼能舌舐千日者可勿藥自愈虛已舐之二年遂復明困學紀聞李虛己初與曾致堯倡酬致堯謂曰子之詩雖工而音韻尤啞虛已初未悟既而得沈休文所謂前有浮聲後須切響遂精于格律次韻和內翰楊大年見寄鼇冠三峯碧海寬雲謠初下靄芝蘭採珠宫裏驪龍睡織錦機中彩鳳盤藥砌蒼苔錢作㸃粉牆修竹玉為竿閒從莊蝶親鳬舄曾得安期九轉丹次韻和汝南秀才遊淨土見寄長松繫馬放吟鞭水殿沈檀一樹烟苔破閒階幽鳥立草芳深院老僧眠桃花欲放條風後茶蘂新供穀雨前衰㑹賞詩多狎客我無歧路近神仙以上瀛奎律髓送何水部䝉出牧袁州宜川三月水東流秀出江南二十州紅斾使君今日去白衣舉子昔年遊宜春乃公舊遊海潮賦就藏書府盧肇進賦宣付史館競渡詩成在郡樓國史待修循吏傳早飛聲政達凝旒袁州府志曹衍衍衡陽人貧女自恨無媒出嫁遲老來方始遇佳期滿頭白髮為新婦笑殺豪家年少兒能改齊漫録太平興國初石熙載尚書出守長沙以衍所著野史繳薦之因得召對袖詩二十章上進首篇乃鷺鷥貧女兩絶句蓋託意也太宗大喜召試學士院除東宫洗馬監泌陽酒稅何䝉䝉字叔昭洪州人官贊善出守袁州句塞日穿痕斷邊雲透影飛縹眇隨黃屋陰沈護御衣玉壺野史太宗親征契丹師還途中御製有鑾輿臨紫塞朔野凍雲飛遂令何䝉進鑾輿臨塞賦凍雲飛詩召對嘉賞授贊善䝉詩有句云云韓丕丕字太簡華州鄭人太平興國三年進士歷知制誥右諫議大夫翰林學士工部侍郎出知滁州禁林宴㑹之什鼇宫明麗倚春寒宴㑹羣仙喜繼觀聖作照臨新日月御書飛動集龍鸞綺談雅似聞天樂瓊液香勝飲露槃坐久杳同𤣥圃外吟餘飄若碧雲端演綸視草微才怯原闕四字霈澤寬因想前賢倍知幸多云遭值太平難翰苑羣書寄嶽陽劉從事秋來憶故人寓目臨大野逺近聞清商依稀奏豳雅經霜樹半紅無風葉自下一片洞庭心聊慿塞鴻寫顧氏積書嵒選田錫錫字表聖嘉州洪雅人太平興國三年進士纍官左拾遺直史館為河北轉運副使擢右諫議大夫史館修撰卒贈工部尚書有咸平集江南曲金蟬飾緑雲細靨蘂黃新南浦解清佩西溪采白蘋密竹映深花湖山日欲曛春腸知已斷脈脈兩難親吳豔若芙蓉乘舟弄湖水照影不知休雲鬟墮簪珥含笑忽回頭見人羞欲死歸去入花溪棹濺鴛鴦起金陵王氣銷六朝墮霸業白雲千古恨空江照樓堞虎邱羅蔓草姑蘇委楓葉懷賢思伍員靈濤浩難涉倚柱吟暮春慘慘黃昏雨零落櫻桃斜掩户未張燈火簾幕深樓閣巢寒聞燕語昔時常說長安好而今厭走長安道蘇秦辨說長卿才自笑功名何不早人悄悄倚柱時情脈脈無人知憐春惜逺情不盡斜雨兼花暗溼衣擬古棠溪出精金百鍊無餘滓鑄得芙蓉劒靈輝若秋水陸可斷兕犀幽亦驚神鬼照物雙影寒中霄靈氣紫有時風雨至欲作龍蛇起海酒與陵肉寶燭延奇士歡飲取傳觀英圖各相視吐氣成虹霓將平不平事大笑荆軻輩卒如兒女子遊子中夜心功名忽嗟暮黑貂空上書甘泉方獻賦白日驚壯齒青雲有英顧收采茍不時珊瑚亦生蠹花雨雨裏飛花片片紅雨微花亂轉冥濛川原何處連天草簾幕無人半日風寂寞劉楨新病後凄迷莊舄苦吟中可堪更是黃昏景燕冷鶯寒恨想同秋夜有懷寄副翰宋白舍人秋風蕭瑟北山椒賴有琴樽慰寂寥書幌靜憐斜月鑒窗燈寒帶落花挑久辭知已來江國少寄音書過海潮因憶玉堂今夜直建章宫漏正迢迢題天竺寺三月楊花撲馬飛連鑣來款白雲扉湖邊鐘磬含清籟樹杪樓臺靄翠微野景留人狂欲住春光啼鳥勸思歸萋萋芳草重回首十里松門照落暉以上咸平集王旦旦字子明大名莘人太平興國五年進士及第纍官右正言知制誥真宗朝兼工部尚書同中書門下平章事遷右僕射昭文館大學士兼門下侍郎加太尉兼侍中卒贈太師尚書令魏國公諡文正有集禁林宴㑹之什喜綴真仙宴禁林玉堂新事好供吟天章刻石興風雅宸翰書牌耀古今勢逸奪回龍鳳跡調髙流入管弦音光凝玉斝瓊漿潤冷布花甎藥樹陰地貴每朝金殿近景清如到玉壺深得陪嘉㑹榮觀大虔效賡歌樂聖心翰苑羣書南恩州西樓江樓橫玉虹西山羅畫屏荒城斗樣大此樓何崢嶸炎嶺狀隴蜀三州通蓬瀛人烟幾村落數㸃如晨星誰謂海一涯好山無數青錦繡萬花谷李沆沆字太初肥鄉人太平興國五年進士真宗朝歷參知政事加門下侍郎尚書右僕射卒諡文靖伏覩禁林新成盛事輒思歌詠不避荒蕪上李學士禁庭多士列華簪嚴樂輝光冠古今御筆騰驤題玉署宸章照耀詠詞林虛堂挂後傳千載翠琰刋成直萬金振復文明知聖作尊崇儒術見天心增修一院烟霞麗曲宴羣英雨露深自我昌朝為盛事鼇山清峻重難尋翰苑羣書蘇易簡易簡字太簡梓州銅山人太平興國五年進士纍知制誥充翰林學士遷給事中參知政事出知陳州卒贈禮部尚書有集歷代吟譜蘇易簡舉進士不起草凡三題千餘言數刻而就太宗曰君臣千載遇對曰忠孝一生心晚年贈僧詩憮悴二卿三十六與師氣味不爭多贈翰林學士宋公天子昔取士先俾分媸妍濟濟俊兼秀師師麟與鸞小子最承知同輩尋改觀甲等叨薦名髙飛便凌烟遂使拜扆坐果得超神仙迄今才七嵗相接乘華軒蔡寬夫詩史蘇參政易簡取開封府解時宋尚書白為試官是嵗登第後十年白為翰林學士易簡亦繼召入贈白詩云云題臨蘭亭序有若象夫子尚興闕里門虎賁狀蔡雍猶旁文舉樽昭陵自一閉真迹不復存豫今獲此本亦可比璵璠周益公題跋禁林宴㑹之什時御書飛白玉堂之署四字頒賜翰苑雨晴禁署絶纖塵宴㑹名賢四海聞供職盡居清顯地崇儒同感聖明君翩然飛白璇題字煥若丹青翠琰文梓澤笙歌誠外物蘭亭詩酒不同羣少年已作瀛洲老他日終棲太華雲莫怪坐閒全不飲心中和氣自醺醺翰苑羣書樂史史字子正撫州宜黃人仕南唐祕書郎入宋太平興國五年復登進士歷水部員外郎使兩浙巡撫判西京留司御史臺卒有仙洞集鐘山寺千峯夾一徑一徑花枕泉聽泉復看花行到鐘山前古寺雲生屋髙僧月伴禪自慙留一宿匹馬又朝天撫州府志向敏中敏中字常之開封人太平興國五年進士纍擢右諫議大夫同知樞密院事真宗朝進右僕射兼門下侍郎又進左僕射昭文館大學士卒贈太尉中書令諡文簡酬寇平仲九萬鵬霄振翼時與君同折月中枝細思淳化持衡者得到于今更有誰合璧事類前集向文簡敏中寇忠愍準二相同以太平興國五年登第後文簡秉鈞忠愍以使相守長安作詩寄文簡有嵗寒唯有公兼我白首猶持將相權之句文簡酬之云云桃花千朵穠芳倚樹斜一枝枝綴亂雲霞慿君莫厭臨風看占斷春光是此花全芳備祖延安守嵗律管風生消暮景塞原烟靜絶妖氛坐移殘燭光陰變故舊年華一夜分詩林萬選偶吟遣懷昔為宰輔居黃閣今作元戎控夏臺萬里蒼黔慙受賜一方清晏有何才紫宸杳杳彌年别紅斾翩翩映日開將相官榮如我少不須頻獻手中杯瀛奎律髓峽山飛來寺峽山地勝安禪處萬仞危樓壓要津世上豈知名利事浪中空笑往來人倚門怪石狂遮面入座寒雲碎繞身日暮西風懶回首滿林幽鳥語聲頻廣東通志句四時常有烟棚合三月猶無菜甲生延州作志嘉祐雜宋湜湜字持正京兆長安人太平興國五年進士再知制誥真宗朝拜中書舍人改給事中充樞密副使扈從北巡卒於澶州贈刑部尚書諡忠定有集送陳堯叟赴廣西漕憐君將命拜新恩送别都門亦斷魂雨歇桂林秋更暖瘴連梅嶺月多昏詔頒海徼征徭薄兵罷蠻州市井繁愧我不才居禁近前春灑掃待回轅桂林府志戚綸綸字仲言應天楚邱人維弟太平興國八年進士大中祥符初歷官樞密直學士出知杭州天禧中太常少卿分司南京卒有集送何水部䝉出牧袁州連翩作牧藹嘉聲重疊光華是此行畫隼前驅男子貴錦衣當晝故鄉榮虎溪駐目曾遊熟采石維舟舊吏迎公舊講學廬阜復經太平州舊治來暮謳謠應載路遲留桑梓肯忘情郡樓擁翠峯巒合井邑交光竹樹明醇酎豈知千日醉宜春舊多醇酎溫泉常見四時清郡下溫泉夏冷冬暖春飲之宜人郡得名焉下車不問山河改布政先期獄訟平何日紫宸偏顧矚聖君留意在編氓袁州府志劉昌言昌言字禹謨泉州南安人少工文詞節度陳洪進辟功曹參軍偕洪進歸宋舉太平興國八年進士官至同知樞密院事工部侍郎卒贈工部尚書上吕相公䝉正重名清望遍華夷恐是神仙不可知一舉首登龍虎榜十年身到鳳凰池廟堂只是無言者門館常如未貴時除卻洛京居守外聖朝賢相復書誰瀛奎律髓句惟有夜來蝴蝶夢翩翩飛入刺桐花下第歷代吟譜李巽巽字仲權邵武人太平興國八年進士仕至度支郎中兩浙轉運使登第遺鄉人當年蹤跡困泥塵不意乘時亦化鱗為報鄉閭親戚道如今席帽已離身青箱雜記巽纍舉不第為鄉人所侮曰李秀才應舉空去空回知席帽甚時得離身至是乃遺鄉人云云蓋國初猶襲唐風士子皆曳袍重戴出則以席帽自隨李建中建中字得中京兆人太平興國八年進士纍官直集賢院掌西京留守司御史臺愛洛中風土遂居之人謂之李西臺官至工部郎中判太府寺卒有集宣和書譜李西臺居洛中以林泉自娛善篆籀草隸八分于真行尤精當時士大夫得其筆跡莫不爭藏以為楷法題洛陽華嚴院楊少師書壁後杉松倒澗雪霜乾屋壁麝煤風雨寒我亦平生有書癖一回入寺一回看蔡寬夫詩史楊凝式仕後唐晉漢閒落魄不任檢束自號楊風子終能以智自完書法髙妙傑出五代可與顏栁並軌今洛中僧寺尚多有其遺跡題華嚴院詩云院似禪心靜花如覺性圓自然知了義爭肯學神仙用筆尤奔放奇逸李西臺建中平生師凝式書題詩于傍書亦自深穩老健前輩所貴重也懷湘南舊游寄起居劉學士老情詩思關何處渾是湘南水岸頭殘白晚雲歸嶽麓濃香秋菊滿汀洲靜尋緑徑煎茶寺遍上紅牆賣酒樓西洛分臺素拘檢繡衣不得等閒遊曲洧舊聞真定康敦復嘗語豫曰河東見所在酒壚皆飾以紅牆詢之父老云相沿襲如此不知其所始也後讀李留臺集有懷湘南舊游寄起居劉學士詩云云據此詩則湖南亦有之不獨河東也但留臺不著所出為可恨也題菩提寺龍門雙闕湧雲烟雪未飛花雁下前徹底清流照車馬分臺御史過伊川能改齊漫録淡山巖在零陵郡秦周貞實之舊居常思羽衣人宅此巖崖旁虛室通大道靈闕掩中黃古朴宫殿深偃亞松桂香洞户漏夕月未罅生微陽疊齒上層巔露井連曲房斷壁橫廣幕矗石排吟牀蟄痕燕穴空乳溜虯鱗張清泉弄春漲靈草經冬芳自笑老倒容誰與刀圭霜金版佩上籍玉音歌洞章珠幢夜森立絳節朝飛揚咫尺仙路髙喧囂世機忙浮埃走車馬奔迸多事場真地擁烟霞根本無為鄉不到久歎息一來徒悲傷但聽鏗華鐘所得心耳涼苕溪漁隱叢話直宿春風夜急銅龍漏淡月半斜金井闌已覺亞枝花露重宿鶯猶睡怯餘寒早朝著衣香重海棠風人在瀛洲御苑東將對赤墀班未定井幹樓角日先紅娛書堂詩話李西臺直宿早朝二詩吕居仁跋云觀西臺詩想見國初太平氣象不逺餘風遺烈足以竦動後世眇想正觀初難與數子諧吾於諸公亦云桐柏觀永懷閒訪道斗上上仙居瀑布磬聲外桂花林影疏山名孫綽賦觀額葛洪書已負秋來約誅茅興有餘赤城志題仙都山時為兩浙轉運副使巖巖仙都山肅肅黃帝宫巨石臨廣澤千仞凌髙穹肇當融結初全得造化功深可蟠厚壤峭疑接冥鴻雲斬去路存丹鼎遺跡空抽潤草心碧敷香蓮葉紅升龍扳矯矯飛鳳鳴噰噰而我集仙署嘗比瀛洲雄星移婺女閒鳳駕析木東到覺毛骨爽坐如羽翼沖萬事皆氛埃一氣歸鴻濛遐哉上聖道邈與元化同金簡奠至誠玉書銘代工功成解冠劒棲息期此中仙都山志句山程授館聞鴻夜水國還家欲雪天送人談苑楊文公漲烟春氣重貯月夜痕深西湖歷代吟譜趙昌言昌言字仲謨汾州孝義人太平興國初進士纍官給事中參知政事真宗朝坐事奪官遷户部侍郎卒喜英公大師相訪僧中何事最聞名筆札髙奇是夢英十八家書垂墨妙一千年聖遇文明未將六籍重刋石余惜國家未明師筆如唐朝刋六經于石壁已駕三車到化城此日勞師相枉訪豁然襟抱慰平生夢英大師詩碑臧丙丙字夢夀大名人太平興國初進士官右諫議大夫知江陵府寄贈終南英公上人是箇人言好性靈鎬京碑記念千㕔五言出格為詩匠百盞長杯應酒星曾把篆求身上紫幾將金買面前青多聞國士相尋訪莫把松門晝夜扃夢英大師詩碑鄭起起官左拾遺贈英公大師玉殿承恩四十年水雲心已悟南禪李斯篆字功何妙賈島詩章學太𤣥笻在幾嗟無虎鬬鉢腥長笑有龍眠聞今未老休慵墮剩把書蹤石上鐫夢英大師詩碑馬去非去非官侍御史知雜事寄懷英公大師清交雲隱秋鴻水隱魚相思難得惠休書遙聞養性棲蓮嶽不肯攜笻入帝都金殿聖緣應未斷玉堂知己漸凋疏何人曾得陪髙論頭戴神羊馬大夫夢英大師詩碑王承衎承衎官尚食使昭州刺史知鳳翔府贈英公大師文章篆籀久傳芳灰志禪門道愈光豐鎬有心營寶剎瀟湘無意臥雲房陶情早著詩千首混俗何妨酒百觴若許宗雷重結社願持香火學空王夢英大師詩碑陳文皓文皓官康州刺史知同州軍州事喜宣義大師英公相訪三事天衣兩字師長安風月更誰知閒騎劣馬尋碑去醉臥荒廬出寺遲辭贍不容誇犬子興闌兼許吐魚兒左馮假道來看我正值嚴冬大雪時夢英大師詩碑穎贄贄官太子中允知洛陽縣事贈英公大師蠻箋象管少年時幾賦簾前祝夀詩三殿荷恩卿相看兩朝承寵帝王知尋窮太華髙低景念盡長安內外碑可惜篆文今絶筆李陽冰後只吾師夢英大師詩碑宋溫舒溫舒官左拾遺知耀州軍事贈英公上人粹鍾衡嶽誕吾師十九彤廷賜紫衣青簡篆文窮妙絶碧雲詩句入𤣥微降龍鉢裏無塵染回雁峯前有夢歸他日好同蓮社約逸眠禪坐兩忘機夢英大師詩碑李頌頌官太常博士贈英公大師篆髙神品秀爽天骨敏構機先談深理窟濬極蒼源元臻籀闥玉無疵瑕車有輗軏達識圓明靈襟洞豁粹稟飛星胸挂流月大飲陶陶閒遊兀兀肯如常人名利乾沒英公十八體篆書碑盧嶽嶽官太子中舍送英公大師歸終南擬息游方興蘿龕近翠微幾程勞夜夢一錫向秋歸月彩籠清磬嵐光潤紫衣重尋溪上路楓葉下巖扉英公十八體篆書碑許道寧道寧官著作佐郎贈英公大師業就攜笻别五湖御簾香暖幾曾趨清搜象外吟情逸𤣥達禪中惠性殊江塢秋思霜橘美雲房髙寄海峯孤白蓮共結他年約還放疏慵入社無英公十八體篆書碑陳省華省華字善則閬中人官至左諫議大夫堯叟堯佐堯咨其子也登慧聚寺上方四望平川獨一峯峯前瀟灑是蓮宫松聲竹韻千年冷水色山光萬古同客到每憐樓閣異僧言因得鬼神功縣民遙喜行春至鼓腹閒歌夕照中崑山雜詠夏侯嘉正嘉正字會之江陵人太平興國中進士擢右正言直史館兼直祕閣句兩制誠堪羡青雲侍玉輿宋史文苑傳太宗元夕御乾元門觀燈嘉正獻五言十韻詩末句云云上和賜有狹劣終雖舉通才列上台之句議者以為誡嘉正之好進也宋詩紀事卷三
