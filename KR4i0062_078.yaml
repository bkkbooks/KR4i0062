body:
  text: 宋詩紀事卷七十八錢塘厲鶚撰蔣捷捷字勝欲陽羡人德祜進士自號竹山遁跡不仕以詞名東坡田老去紅灰酒瓮前向來青草瘴江邉卜居自為溪山好不是區區為買田毗陵志王易簡易簡字理得號可竹山隂人宋末登進士除瑞安主簿不赴隱居城南有山中觀史吟九鎖山十詠存二首大滌洞蕭灑殊庭西玉室甚孱顔華陽隱邃道元蓋浮塵寰紞紞天鼓鳴爛爛巖石斑誰懸隔凡石此石非人間羣仙本容物為我開重關來賢巖絶壁中嵌空秀石下插地緬懷玉局仙于此冠蓋萃雲泉儼昨遊卉朩遺古意青山日迎客何者傳姓字斯人千載名覽勝乃餘事以上洞霄詩集奉題高房山尚書夜山圖高侯妙筆生夜光李侯正倚牛斗傍公略浙江行省照磨寓居吳山淒涼看盡吳山月玉鏡臺前翠鳯凰鐡網珊瑚遊寶林寺元度存遺跡元英有舊詩城中獨高處雪後最佳時拂壁書行紀逢僧問一作談故祠䦨干頻徙倚不奈朔風吹越詠錢大椿大椿字坦仲淳安人宋末舉進士春夜燕子銜泥已下簾深深庭院薄寒天海棠枝上黃昏月楊桞枝頭淺淡煙句引芳情春夢蝶頻催愁緒夜啼鵑踏青年少歸來晚斗酒花隂枕石眠青溪詩集盧珏珏字登父淳安人宋末舉進士有可菴集天邉風露樓漫題十二䦨干俯碧溪憑高一覽衆山低晴灘歷歷輕帆上烟樹重重幽鳥啼但覺興隨流水逺不知身與白雲齊年來欲問東皇信多種梅花在竹西嚴州府志真山民山民自呼山民或云名桂芳括蒼人宋末進士李生喬歎以為不愧乃祖文忠西山以是知其姓真痛值亂亡深自湮沒世無得而稱焉惟所至好題詠因流傳人間張伯子謂為宋末一陶元亮云有山民集幽居雜興松桂小莵裘山扉幽更幽蜂王衙早晚燕子社春秋鬢秃難遮老心寬不貯愁年來把鋤手無復揖公侯山亭避暑怕礙清風入丁寧莫下簾地皆宜避暑人自要趨炎竹色水千頃松聲風四簷此中有幽趣多取未傷亷泊白沙渡日暮片帆落渡頭生暝煙與鷗分渚泊邀月共船眠燈影漁舟外湍聲客枕邊離懷正無奈况復聼啼鵑渡江之越宿蕭山縣昨夜大江舟今宵小驛樓隻身千里客孤枕一燈秋市酒難成醉鄉書莫寄愁胸中無史記浪作㑹稽遊兵後劉秀寬見過冉冉嵗云暮門居安所知途窮身是纍痛定語猶悲衰鬢數莖雪空囊一卷詩儒衣例如此惜也不逢時東粵廟頽䦨斜照網蛛絲陳迹淒涼萬古悲柘朩尚鳴亡國怨山松曽見受封時碑因苔蝕無完字城為田侵失舊基當日東甌知幾戰如今贏得一荒祠三峯寺寂寞烟林噪亂鴉青鞋步入野僧家雲深不礙鐘聲出日轉還移塔影斜廊下蝸黏沿砌蘚佛前蜂戀插瓶花竹牀紙帳清如水一枕松風聼煮茶梅仙山西都不知夀安用獨長年縱有丹爐在難吹漢火然九日懶把黃花插滿頭正緣老大見花羞年來頗恨儒冠誤好倩西風吹去休以上山民集吳仲軒仲軒進賢人宋末進士隱居教授元初程巨夫疏薦不起謝程巨夫學士抱疾經年久何期徵詔臨藝窗書已蠧竹葉徑尤深空返皇華使難忘鷗鳥心懷君雖感激衰鬢不勝簪西江詩話汪元量元量字火有號水雲錢唐人以善琴事謝后王昭儀宋亡隨三宮留燕後為黃冠師南歸往來匡廬彭蠡間世莫測其去留長身玉立修髯廣額音若洪鐘江右人以為神仙多畫其像祀之有水雲集湖山類槀李鶴田湖山類槀跋云往時讀泣血録為之淚下因歎德祐之事意必有杭之文章巨公書于野史後人見而悲之未必不若余今日之讀泣血録也一日吳友汪水雲出示類槀紀其亡國之戚去國之苦間關愁歎之狀備見于詩微而顯隱而彰哀而不怨欷歔而悲甚于痛哭豈泣血録所可並也開元天寶之事紀于草堂後人以詩史目之水雲之詩亦宋亡之詩史也其詩亦鼓吹草堂者也其愁思抑鬱不可復伸則又有甚于草堂者也噫水雲留詩與後人哀耶留詩與後人愁也可感也重可感也敬賦二十字書綴卷尾云天地事如許英雄鬢已斑淚添東海水愁壓北邙山錢塘歌錢塘江上龍光死錢王宮闕今如此白髮宮娃作逺遊漠漠平沙千萬里西北高樓白雲齊欲落未落日已低古人不見今人去江水東流烏夜啼醉歌亂㸃連聲殺六更熒熒庭燎待天明侍臣已寫投降表臣妾僉名謝道清湧金門外雨晴初多少紅船上下趨龍管鳯簫無韻調郤撾戰鼓下西湖賈魏公府湖邉不見碾香車斷珥遺鈿滿路途門徑風輕飛野馬亭臺火盡及池魚海棠花下生青杞石竹叢邉出紫蘇郤憶相公游賞日三千衛士立階除送琴師毛敏仲北行西塞山前日落處北關門外雨來天南人墮淚北人笑臣甫低頭拜杜鵑蘇子瞻喫惠州飯黃魯直度鬼門關今日君行清淚落他年勛業勒燕山北征北師有嚴程挽我投燕京挾此萬卷書明發萬里行出門隔山嶽未知死與生三宮錦帆張粉陳吹鸞笙遺氓拜路傍號哭皆失聲吳山何青青吳水何泠泠山水豈有極天地終無情回首呌重華蒼梧雲正橫秋日酬王昭儀愁到濃時酒自斟挑燈看劍淚痕深黃金臺逈少知已碧玉調高空好音萬葉秋風孤館夢一燈夜雨故鄉心庭前昨夜梧桐雨徑氣蕭蕭入短襟太皇謝太后挽章大漠隂風起羈孤血淚懸忽聞天下母已赴月中仙哀樂浮雲外榮枯逝水前遺書乞骸骨歸葬越山邉女道士王昭儀仙游詩吳國生如夢幽州死未寒金閨詩卷在玉案道書閒苦霧䝉丹旐酸風射素棺人間無葬地天上有仙山瀛國公入西域為僧號朩波講師木老西天去袈裟說梵文生前從此别去後不相聞忍聼北方燕愁看西域雲永懷心未已梁月白紛紛全太后為尼南國舊王母西方新世尊頭顱歸妙相富貴悟空門傳法優婆域誦經孤獨園夜䦨清磬罷趺坐雪花繁以上湖山類槀題賜硯斧柯片石伴幽閒堪與遺民共號頑試憶當年承賜事墨痕如淚盡成斑改蟲齊筆疏水雲以善琴供奉國亡隨三宮入燕久之請為黃冠南歸藏有賜硯背刻天錫永寶四字分書右刻水雲二篆字左刻楷書絶句云云其北征古詩云北師有嚴程挽我投燕京挾此萬卷書明發萬里行則硯必並載入燕以詩書授瀛國公皆此硯矣李吟山贈汪水雲青雲貴戚玉麟兒曽逐鸞車入紫闈王母窗前窺面日太真席上畫眉時滄溟水濶龍何在華表秋深鶴未歸三尺焦桐千古意黃金誰與鑄鍾期水雲集附吳仁傑送汪水雲入湘碧水波翻海亦摧奮身鼇背護蓬萊忍隨天上紅雲散郤馭關中紫氣回天道有常須變化元關無鑰任敲推攜琴更拜蒼梧野闕想南薰入調來水雲集附遊古意送謝疊山先生北行滿懷忠孝有天知不管人間事已非萬里乾坤雙草屨百年身世一麻衣行藏自信牀頭易臥病惟餐隴首薇儻過宗周見禾黍幾多新淚灑殘暉疊山集附葉愛梅送謝疊山先生后土茫茫兩屩行綱常事重此身輕大江有士一人闕千載見君雙眼明俯仰元無愧今古英雄何必盡公卿早知莫賣成都卜省得人知大隱名疊山毛靜可送謝疊山先生一襟書傳日星懸湖海聲名五十年事不求知惟此理文之未喪豈皆天人方驚怪歐陽子我獨悲傷魯仲連看鏡倚樓秋已暮風巾霜屨重依然疊山集附魏天應天應號梅野建安人疊山門人送疊翁老師北行和韻先生心事炳丹青頭影何曽愧獨行商嶺芝能如橘隱首陽粟不似薇清綱常正要身扶植出處端為世重輕安得寒泉來㑹宿參同極論到天明疊山集附蔡正孫正孫號䝉齊疊山門人送疊翁老師北行和韻山色愁豫渺渺青平生心事杜鵑行霜叨雪虐天終定嵗晚江空水自清肩上綱常千古重眼前榮辱一毫輕離明坤順文箕事此是先生素講明疊山集附陳逹翁逹翁建安人送疊山先生流落﨑嶇二十年幾回灑血杜鵑前一雙芒屩乾坤窄萬古丹心日月懸案上靈龜元不食樊中孤鶴且安眠逃名不得名終在行止非人亦有天疊山集附王濟淵濟淵字道可疊山門人送疊山先生希夷何意出山中心事當年漢臥龍行止但憑天作主别離初不淚霑胸定知晚菊能存節未必寒松肯受封大義昭明千載事前程儘更好從容疊山集附謝鑰鑰字君殷號草堂晞髮道人翺之父也玩月有感入夜茶甌苦上眉眼花推落石牀棊舉頭郤恨天邉月顚倒山河作樹枝天地間集謝翺翺字臯羽一字臯父閩之長溪人後徙浦城咸淳中試進士不第丞相文信公開府延平署咨議參軍信公被執後避地浙東在浦江主吳渭家與方鳯吳思齊逰度釣臺南地為文冢名㑹友之所曰汐社期晚而信集同好名氏作許劒録取吳季子意乙未八月寓杭終于婦劉氏舍友人方鳯吳思齊輩歸其骨葬于釣臺從初志也有晞髮集鄧牧心謝臯羽傳略云臯父性耿介不以貧纍人所居産薪若炭率秋暮載至杭易米卒嵗少裕則資遊江海訪前代故實著宋史補唐詩人無傳者三十餘薦傳近世隱逸數萹嵗甲午與杭人鄧牧相遇㑹稽結為方外友牧因為言杭大都㑹文士輩出余知若干人盍往見之旬日别去逮牧歸杭君巳挈家錢塘江上問所從遊皆前所聞者其信好學也乙未秋牧薄遊山水間君病篤望牧不至懷以詩曰謝豹花開桑葉齊戴勝芊生草藥肥九鎖山人歸未歸蓋絶筆于此鄉謝處士傳略云臯羽常布衣杖䇿參人任松軍事晚登子陵西臺以竹如意擊石歌招魂之詞曰魂來兮何極魂去兮江水黑化為朱鳥兮其咮焉食歌闋竹石俱碎失聲哭何其情之悲也方韶卿謝臯羽行狀略云君遺槀在時舊所為悉棄去今在者手抄詩六卷雜文五卷唐補傳一卷南史贊一卷楚辭等芳草圗譜一卷宋鐃歌鼓吹曲騎吹曲各一卷睦州山水人物古蹟記一卷浦陽先民傳一卷東坡夜雨句圗一卷浙東西遊録九卷春秋左氏續辨歷代詩譜未脫槀選唐韋桞諸家及東都五體在集外烏棲曲擬張司業吳宮草深四五月破楚門開烏啼歇美人軍裝多在船歸來把弓墮弓弦越羅如粟越王獻宮中飬蠶不作線轆轤出屋井水淺梔樹花萎子如繭烏栖烏啼宫燭秋越女入宮吳女愁廢居行海濤翻空秋草短白跎入窠啖雀卵經年廢屋無居人孕婦夜向船中産歸來多雨臼生魚穴蟲祝子滿户樞鄰家置屋供官役買得沂王園令宅古叉歎刑徒鬼火去飄忽息婦堆前殯齊發白烟淚溼樵叟來拾得慈獻陵中髮青長七尺光照地髮下宛轉金叉二持歸薰沐置高堂包裹恐為神所將妻兒朝拜復暮拜冉冉臥病不得瘥省知天物厭凡庸夜送白龍潭水中叩頭郤顧祈免死永入幽宮伴龍子瓊花引后土祠前車馬道天人種花無瑤草英雲蘂珠欲上天夜半黃門催進表酒香浮春露泥泥二十四橋雪如洗隂風吹雪月墮地幾人不得揚州死孤貞抱一不再識夜歸閬風曉無蹟蒼苔染根煙雨泣嵗久游魂化為碧後瓊花引揚州城門夜塞雪揚州城中哭明月墮枝溼雲故鬼愁西來隂風無健鶻神鴉愁空衆芳歇一夕蒼苔變華髮宫花織簾塵掩襪玉華無因進吳越灕灕淮水山央央誰其死者李與姜飛仙引遊沃洲水簾谷作赤城後門桃花尾溼浸蘼蕪洗蒼耳小支菩提海上來天風吹下谷簾水斜珠界左轉復右華蓋縣肝三葉紫內閒肉芝承乳流鬼母仙姝臨洗胃蒼龜守關朝太微色阻讒神誣奏事海桑男子在謫籍驅鹿行車閏年至和靖墓山中處士白麻履死後無書獻天子青童𤣥鶴晝上天夜下玉棺葬湖水湖隄四合葑如髮芳樹玲瓏倚春雪百年鳯舞雲霧空玉碗人間出句越宮嵐塔雨恍如失飛網繞湖冠聚鷸林宇焚芝秋寂歷斗下無人嗣太乙冬青樹引别玉潛冬青樹山南陲九日靈禽居上枝知君種年星在尾根到九泉護龍髓恆星晝霣夜不見七度山南與鬼戰願君此心無所移此樹終有開花時山南金粟見離離白衣人拜樹下起靈禽啄粟枝上飛翠鎖亭避雨自注亭有魏王妃所題字尚新王嘗以王子成德軍節度使鎮南故妃至其處客有遊山衣著久如薜荔行行萬翠亭忽作風雨憩仰面無所覩梁間有題字問此何人書婉娩有弱氣云昔魏王妃書字學李衛乘雲到此山灑墨在空翠塵風吹土花倐忽景物異疑此夢與仙不類人間世聼雨山厨壓炊煙野雨起薄暮孤客臥空牀不識門前路回風已若休入壑忽如赴荒林啼鬼車往往不見處鄰翁起厭勝咒作禹餘步聼雨雜咒聲起歌和其語咒靜雨亦止還眠向窗曙佽飛廟迎神引劍歌兮擊筑茭青兮蓼緑夕濟甬兮沈玉步巫兮禹孫葺神藩兮楚軍神之乘兮海雲噀芳兮越咒斬將兮神祐秋零露兮為醑春集鴉兮神語風蕭蕭兮滿旗雲之車兮來思鴻門宴火雲屬地汗流宇杯影龍蛇分漢楚楚人起舞本為楚中有楚人為漢舞鸊鵜淬光雌不語楚國孤臣泣俘虜他年疽背怒發此芒碭雲歸作風雨君看楚舞如楚何楚舞未終聞楚歌有洗舊誥綾作青色鬻將以為緣以紺繒易得之作手卷賦小樂章求好事書其後吳宮輦路傷行客繭冰壓雲凝曉色門前新掃染家鄰借人鋪設殘衣帛官花翦綾連院號覆取翻看成一道織紋宛轉敕字新知是初誰六尺誥城霞失彩宮蘚病中與海圖上衣領改顔幸售緣所遭褪藥𤣥香洗藍影青綢易得淚承睫擊筑楚歌無故發歌殘求書好事人異代儻傳誥綾帖雪中方四隱君訪宿有詩憶鹿田風雨舊遊奉和併呈吳六贊府金華入北山空響出靜竚鹿田在其顚肺石鳴風雨有客六七人昔遊至其處唯我愁不眠起坐蹴君語謂此定何聲百感生離緒玩非琴與瑟復異砧將杵醉者呼不應愁者自為苦空櫺冷孤衾展轉如巢樹溼歌散餘悲以足拊柱礎爾來又七年欲至困羈旅傳聞老桑門已復蟬蛻去入山惡少年巾鉢空其聚乃知人世間何者為客主而我同懷人忽復異處所夢中遙相望各抱不售賈有客不同遊亦是同懷者地主况有期輿馬不待假儻規宿山中畸人不應舍效孟郊體閒庭生柏影荇藻交行路忽忽如有人起視不見處牽牛秋正中海白夜疑曙野風吹空巢波濤在孤樹閨中玻瓈盆貯水看落月看月復看日日月從此出愛此日與月傾瀉入妾懷疑此一掬水中涵濟與淮淚落水中影見妾頭上叉哭正節徐先生凄涼攜子女冠佩赴重隂塌井千年事青天此夜深哀辭山石刻恤典海舟沈里族南薰夢東都直至今送汪十多年隱賣漿此去結山房掃菌侵花落種松如草長老期秋欲至貧味水初嘗嵗晚逢樵獵音書定不忘哭所知總戎臨百粵花鳥瘴江村落日失滄海寒風上薊門雨青餘化血林黑見歸魂欲哭山陽笛鄰人亦不存山隂道中呈鄭正朴翁楊桞逺天色野風來水涯異鄉同夢客今雨故人家越樹夜啼鳥禹陵冬落花悠悠江海意為爾鬢先華寒食姑蘇道中頻年感烟草荒冢幾人耕吳楚逢寒食山村見獨行天隂月不死江晚汐徐生到海征帆影悠悠識此情秋日憶過秦國公主園野影林柳盡山昏瓦塔齊涼宵風雨過一雁西南啼嵐霧洗巾帨井泉生蒺藜傷心拂塵麈衣淚溼空綈西臺哭所思殘年哭知已白日下荒臺淚落吳江水隨潮到海回故衣猶染碧后土不憐才未老山中客唯應賦八哀萬松道中望南太白筍輿行萬山中有十里亭老樹秪一色野公逾百齡柴關當太白藥氣近樵青罔草黏枯翼巢枝落退翎期探幽谷水共劚松根苓艾納下天雨塵風吹冥冥採藥候潮山宿山頂精藍夜中望海蛟門南去鳥此地望迢迢積溼侵幡黑生寒入夢飄見燈歸舶夜聞偈解衣朝土植皆為藥山枝不滿樵暗光珠母徙秋影石花消擬候槎回漢寧甘客老遼郤尋徐福島因問秦皇橋于彼看日出羽旌焉可招以上晞髮集過杭州故宮禾黍何人為守閽落花臺殿暗銷魂朝元閣下歸來燕不見前頭鸚鵡言紫雲樓閣宴流霞今日淒涼佛子家殘照下山花霧散萬年枝上挂袈裟重過隔江風雨動諸陵無主園池草自春聞說就中誰最泣女冠猶有舊宮人春閨詞手觸殘紅頭懶梳香隨蝴蝶上衣裾暖風吹睡無言語又向牀頭看夢書山中道士山中道士服朝霞二十修行别故家留客一杯清苦蜜蜂房知是近梅花秋夜詞愁生山外山恨殺樹邉樹隔斷秋月明不使共一處秋社寄山中故人燕子來時人送客不堪離别淚霑衣如今為客秋風裏更向人家送燕歸以上晞髮道人近槀方鳯鳯字韶卿一字景山婺州浦江人試太學舉禮部不第特恩授容州文學歸隱仙華山同里義烏令吳渭闢家孰敬事之疾革命子樗題其旌曰容州示不忘也時稱為巖南先生有存雅堂槀龔聖豫評嵒南詩云由本論之在人倫不在人事等而上之在天地不在古今北山道中起犯春霜一徑寒清遊乘興約吟鞍眼中最恨友朋少塵外頻聞山水寬溪落舊痕枯野埠樹浮空翠溼危欄巖頭幾處懸冰白已作羣羊化石看西鹿田寺聼雨禪棲投倦客山雨起更䦨窗葉散幽響石林生峭寒洞深猶暗瀑江逺忽風湍想像雲蘿外應宜晚色看賦三洞金華北山三洞天垂髫欲往金華顛春風吹衣雨洗履瘦笻忽挂蒼山烟山高地平走幽澗根絡石上森楠楩步從飛橋瞰石洞崖色閲世知幾年風痕霧迹化異物龍首昻左尾右旋就中暗穴如蟇頤急水㵼碧鳴媧弦遡流束炬照徒涉肩背擦石行拳攣水窮路夷內景得以炬交燭窮幽𤣥細紋蹙波湧浪接皓彩凝雪飛霜鮮大為獅子虎犀象瑣碎亦復蜂屯然蜿蜒雙蟠角尾具一一玉爪拏蒼堅穹龜負甲色深墨長蛇白質相縈纒鐘能鐘聲鼓能鼓不假樅虡知誰懸直櫺斜檻藏湢室短畦長町移原田青雲白霓五色霞笑畫敗絮留丹鉛中途經過最深窅伏身低眺洞口泉空明一隙隔逺見秋蟾浴海光嬋娟左巖架衣頗橫亘疊摺衆皺垂蹁躚自餘神怪不可極似鑿非鑿鐫非鐫出登山腰叩中洞外視石井聞潺潺入深蹈險思縋綆長竿揭炬後且先水簾可俯心為掉到此十九歸言遄嗜竒不憚歷磊砢足以目故差輕便翻身郤望水簾處銀河天落懸吾前常情疑復下百尺積水定作神龍淵石乾徑闢郤易進玉筍拔地修而圓宜為淵處乃為屋亦或摩蘚題新篇同遊疑我久未出笑謂豈欲井底眠林幽風起日已晚猶睨髙洞山之巔薪蒸可買樵我導不逺數里仍攀緣傍從右壁入深坼如鐡户限瓊為櫋儼然海相挂珠絡熟視豈信非夸傳左為朝真正面入便想笙鶴遨羣仙雲霞波濤仙衣裳竒詭豈必下洞専欻然修梁架巖起左右蒼白龍形全望中極底勝漆黑雙扉隱隱起半邊天光一道燭扉內知此明罅從何穿􅋼深壁峭不可往安得插羽如飛鳶嗟余茲遊尚牽俗身所驟歷辭難宣但思乞水學坡老洗眼看字消餘年金華紀遊詩赤松上下雨霏微八詠樓頭重拂衣西港晴來汀草長北巖幽處洞泉飛風敲定磬鹿春過月滿丹臺鶴夜歸歷覽因知古詞客盛誇雲夢未全非以上存雅堂遺槀哭陸秀夫祚微方擁幼勢極尚扶顛鼇背舟中國龍胡水底天鞏存周已晚蜀盡漢無年獨有丹心皎長依海日懸金華雜識仙華山仙華矗萬仞我乃廬其東日夕與山對今茲踏岑巃起左信奔鹿當前任啼狨大嘯崖石裂一覽天宇空蒼松飽風雨絶壑挂老龍樵斧不得睨撫根憩吾躬邈哉軒轅氏問道由崆峒龍髯一以逺千載悲遺弓猶傳少女靈鍊玉于焉宮山林重帝胄香火明民衷我來重懷古攬涕臨西風何當速刺飛一洗磊落胸金華府志吳思齊思齊字子善括蒼人家永康由任子入官監新城稅調嘉興丞宋亡後主浦陽吳渭清翁家與謝臯羽方韶卿交好同臯羽登嚴陵西釣臺哭文丞相臯羽卒又與同人㑹哭于小爐峯嘗與韶卿倡和臯羽序而題其編曰風雨集曰琯按臯羽西臺慟哭記語多廋詞稱文山為唐宰相魯公三友人為甲乙丙明初張孟兼丁注以甲為吳思齊乙為馮桂芳丙為翁衡程敏政宋遺民録思齊由任子入官為嘉興縣丞洪提刑起畏辟置類田吏用事者言辦此可通籍思齊曰以民怨祿非得也賈氏柄國上將以鹵簿臨其母喪文侍郎及翁將上疏論之懼禍中止思齊以書朂之曰叱嗟而母婢也公不可默俄不願仕請監南嶽廟流寓桐廬值宋亡不出獨與方鳯謝翺方燾友善自號全歸子大德辛丑卒宋濓吳思齊傳思齊所著書有左氏傳闕疑擬周公瑾平荆州碑司馬孚贊汐社詩集題鹿苑寺壁間記魯簡肅公羅漢見夢事是法本平等無怠亦無敬如何證無生却來見參政姚桐夀樂郊私語詹本本字道生建安人溫言正行丞相江萬里薦為郎先致書本本方坐門前石上釣使者至問本居本曰前即持竿渡溪去不知所終春日攜客游武夷山腳健枝梧百里插蒼峭粼粼石可把曙色坐逺釣風水真笙竽歷落太古調衣冠帶莽蒼山鬼驚二妙雲月正忘年花鳥更索笑回船翠淩亂吾道付長嘯閒中萬事問不知山中一樽酒掃石坐松風緑隂滿巾䄂宿天台風泉隔西屋獨夜寒自生開窗失山色白雲壓前楹纍盡得瀟灑去住俱不驚鼻息答僧鐘霜露入殘更以上谷音皇甫明子明子字東生四明人性豪宕乘小舟挂布帆載琴尊書籍釣具往來江湖至元丙子發狂痛哭蹈海水國水國淒涼住秋宵爛漫眠歸雲猶帶雨墮月忽明船社稷資長算髭鬚近暮年亂離棲不定百口託浮田海口窮島迷孤青颶風蕩頑寒不知是海口萬里空波瀾蛟龍恃幽沈怒氣雄屈蟠崢嶸抉秋隂挂席潮如山熒惑表南紀天去何時還雲旗光慘淡腰下青琅玕誰能居甬東一死諒非難嗚呼朝宗意㑹見桑土乾京口行京口兵可用酒可飲一語參差族成血忠賊相持各凛凛豈知好醜隔形骸父為孔鸞子為鴆人衆天定理則那遺臭流芳且髙枕以上谷音鮑輗輗字以行括蒼人性嗜酒授簡萬言教授得錢悉送酒家遇客盡飲乃去晚益傲誕衲衣髽結游青城不返襄陽行今日何來春氣柔東城騎馬花綢繆為君停馬一呼酒花前倒披紫綺裘玉脂泛濫魚鳥飫歌舞倦矣蛾眉愁千金萬夀好賔主今我不樂嵗如流豈比世上狂馳子一語不合行掉頭嗚呼天倫古所定非有大故寧相尤天馬天馬抱竒相緊骨瞳方明出入百萬中有如一鳥輕宇宙莽超踏風雲慘經營獨倚雄傑態蕭蕭隨北征朝飲南海頭夕秣乃幽并失主坐黯淡别羣奮長鳴豈無輕俠兒金羈懸朱纓但感束帛義不忍負死生低頭為君老喑喑萬里情重到錢唐生死雙飛正可憐若為白髮上征船未應分首江南去更有春光七十年無賴山光疊疊青玉魚金碗早飄零冷思禹穴真竒事千古衣冠託杳冥萬家歌舞送浮生曽有涓埃答太平猿鶴沙蟲天始定不須辛苦怨南征聞道深春雪打圍誰憐身上藕絲衣莫憂白璧成塵土解逐南風萬里歸唯有寒潮不世情朝朝暮暮過空城百年車馬閶門外獨獨春風草又生以上谷音崔璆璆字子玉京口人美風儀善談論晚病狂攜大瓢貯酒行市拍掌歌笑未死十日自表石題曰醉鄉伯崔璆之墓攜戮鉞泛江酒星落京口化為崔子玉孤舟載壺觴水花紅映肉小兒唱銅斗大兒倒醽醁一笑不知年浩蕩天地屋愼勿臨竇呼人生隨轉燭嗣宗禮法仇鍾㑹被殺戮咄咄咄咄復咄咄小兒成老翁么微各形色追琢元化工不知春風去又見千緑叢主人美客懷載酒行溪東一步一回首十步尊已空靈均與太白醒醉同所終願見化蠛蠓生死託壺中今日一何好今日一何好花下醉狼籍醉中有竒事夢見生羽翼浩蕩排虛空靈君好顏色朱衣持大篆授我醉鄉伯頓首玉墀下臣璆才蟣蝨封此抑何功請陳愚頑臆臣家京口東門前大江碧臣願駕長風吹作酒萬石萬象各千鍾拍拍大庭國推枕在山中紙衾霜曉月以上谷音魚潛潛字德昭姑孰人敦重和易推分淡泊不忤于物所居環堵掃地焚香彈琴讀書養鵝鴨百頭以給食終八十餘楊白花楊白花誰教度簾幕搖蕩春風能幾何不比無情自漂泊人生秪合作支離長秋鴉啼江水落古意二首青青陵上柏落落徑不摧人生百年內朝夕變所懷斗酒命同好萬里不顧回聞有昌國君談笑黃金臺柔言更長跪信是富貴媒但恐氣習移古今不同才寄言去國者嵗晚有餘哀權衡豈公平天駟但伏櫪東井不救渴倉庫何時實元工肯假借名器甚可惜如何萬萬古不行督責術送鄭祕書南歸垂老乃如此憑高俱惘然空能正幾字好去作千年童子歌鴝鵒幽人拜杜鵑江花獨爛漫春去得誰憐聞歌流雲行水出名姝酒盡花前雙玉壺此曲江南都忘郤春風轉調小單于以上谷音柯芝芝字士先瑞陽人早通五經善詞賦又詣行在所見章祕書求讀書省中益通諸家教授生徒著書百餘卷餘髮餘髮蕭蕭白垂領十年一拙門庭冷來頻沙鳥頗相識起晚鄰雞已三請形骸挂樹豈復好心緒如蓬不能整平生幾緉空馺􅤥老去一杯先酩酊俗言秪虞方鑿忤人事但愜幽居屏聖賢未必盡芻狗天地何堪共蛙黽若為苴履曽足芥幸不桞衫真欲癭一聲樵響何處來獨立看雲發深省耳耳耳耳非佳語陸陸難為顏我生胡不淑多戚長鮮歡搖落復已緑春風滿江干最靈起豫興欲言骨肉酸園桑摧為薪桃李亦半殘翹蕘企晴燠九室十更寒飛錢如美色乃入貴者䦨丘閭有榖賣窮欄朝無饘不售信成隱徒手良抱歎宛轉愒餘息溝壑分寸間吾輩正不免遑暇恤彼瘝橫江橫江一片碧㩦鶴上漁船收綸不成下郤抱釣竿眠以上谷音柯茂謙茂謙字退之芝之子江行早發陶鐺煮孤影寒燈沸青花冰開數江樹月落失人家魯港賈似道喪師之地十年回首付霑襟斷甲沈沙齒齒深可惜使船如使馬不聞聲鼓但聲金人歌鬼哭都堪淚水落江空正獨吟遺老蕭條漸無語酒旗颭颭出蘆林以上谷音師嚴嚴字道立襄陽人讀書識大義善槊射自圍中拔身走行在所上書論事不報拂衣去客死武陵藺五見訪漢隂美人青兕裘獨騎瘦馬尋荒丘花前下馬迎一笑珠玉在側形骸羞酒酣散髮箕踞坐錦帶爛爛懸吳鉤剸蛟刺虎好身手碧瞳如水涵清秋惜哉科目大脫略壯士豈為章句囚中原格鬬困不已江波朩落寒悠悠武陵客居浩蕩千年調飢寒八尺身不愁逢魍魎可笑繫麒麟殘雪江村路空山澗水春時危終逺去道在豈全貧公安早發去國秦公子窮途阮步兵别離如昨日豪俠異平生江月為誰好巴船何處行高秋伴搖落早發若為情以上谷音邵定定字中立廬陵人溫粹博雅通周易春秋宅邉植梅竹蘭桂蓮菊各十餘本深衣大帶婆娑其間自稱六薌老人山中白日看雲坐清秋對雨眠眉頭無一事筆下有千年漁家漁家臨水住春盡無花開年年謝流水流得好花來以上谷音宋詩紀事卷七十八
