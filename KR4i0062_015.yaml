body:
  text: 宋詩紀事卷十五錢塘厲鶚撰李大臨大臨字才元成都華陽人寶元元年進士纍官祕閣校理神宗朝除知制誥天章閣待制西園辨蘭亭和韻沙石香叢葉葉青卻因聲誤得蟬名騷人佩處唯荆渚識者知來遍蜀城消得作亭滋九畹便當入室異羣英非逢至鑒分明說汨沒人間過此生成都文類題招提院靜照堂地勝常新構僧閒晝杜門山林誰樂靜城市亦非喧客引空彈指風來不動幡秖應常宴坐對境一無言至元嘉禾志謁濂溪周虞部簾前翠靄逼廬山門掩寒流盡日閒我亦忘機淡榮利喜君髙躅到松關廬山志周孟陽孟陽字春卿其先成都人徙海陵第進士英宗朝纍官集賢殿修撰同判太常寺神宗立拜天章閣待制孫公談圃周孟陽春卿英宗宫僚聖眷素厚書簡以老丈稱之當議儲副時英宗固辭春卿就臥內諭意上大悟拜春卿牀下遂正儲位裕陵在東宫朝廷復以春卿為翼善春卿為人純直謂不當為父子宫僚上表力辭有親奉堯言躬承禹拜之句題招提院靜照堂羡師遺世網舊隱敞新堂月白秋庭小風清晝磬長逺遊輕勢利歸夢在滄浪滿篋朝賢句孤雲出帝鄉至元嘉禾志句地髙多與風雲會天近常為日月鄰遊徑山話梅礀詩閻詢詢字議道鳳翔天興人第進士又中書判拔萃科神宗朝歷右諫議大夫提舉上清宫題招提院靜照堂浙右僧居盛虛堂葺有功迷來隨萬化淨後照三空夜永松軒月秋深竹岸風我心閒已久夢到水鄉中至元嘉禾志林億題招提院靜照堂檇李湖山外招提煙靄中靜由諸漏盡照覺萬緣空馬祖傳懷海牛頭住法融誰來訪宗㫖現定即家風至元嘉禾志張宗永宗永華州人寶元中知建安縣題陳相别業喬松翠竹絶纖埃門對寒山盡日開應是主人貪報國功成名遂不歸來墨客揮犀宗永嘗以事失鄭州陳相意陳公有别業在鄠杜閒宗永知公好絶句詩乘閒詣之于壁大書二韻莊督録以聞公覽而善之待之如初句大書文字隄防老剩買峯巒准備閒倦遊雜録雷簡夫簡夫字太簡郃陽人康定中杜衍薦之以校書郎簽書秦州觀察判官纍遷尚書職方員外郎寄甘露舒公上人成都多少寺梵學競推能到老不破戒滿城唯此僧池龍聽夜講海客施年燈别後空相憶塵勞正可憎成都文類元居中居中錢唐人康定中台州守至太常少卿風水洞上祖龍圖無擇洞蔽深雲逺俗塵山中曾未識朱輪自從白傅來遊後五百年閒又一人咸淳臨安志蘇頌頌字子容南安人紳之子徙居丹陽慶厯二年進士神宗朝歷集賢院學士知開封府哲宗即位纍遷翰林學士拜右僕射兼中書門下侍郎罷為集禧觀使徽宗立進太子太保纍爵趙郡公卒贈司空魏國公有集送朱郎中壽昌通判河中弼風詠凱風以成孝子志鄭人復君母傳稱能錫類中郎常有懷生不識所恃登朝雖厚祿當食每忘饋念昔鞠育勞嗟今出處異倚門豈不待兩求終莫致乳烏思反哺哀鳴自垂翅百草搖春暉寧無謝生意灑血向穹壤解組出臺寺馳驅咸雍郊歷訪經行地至行感神明精誠通夢寐悠悠大道傍親息忽相值紫綬拜北堂白頭歸長嗣悲欣叙契濶恍如隔生事四紀世路殊一朝版輿侍兹事昔未有聞者共驚喟帥守為之言詔趣還官次當年二千石寵名非所利仕或便鄉關安用竹符使蒲中母家近自屈為倅二受命慰慈顔騰裝愜歸思既徇報德心亦安效官智觴以萬壽薦衣成五綵戲無復興寒泉何須賦大隧令人及聖善孝慈兩不匱贈言述髙風庶用激忠義次韻蔣穎叔同遊南屏見惠長篇青山橫莽蒼萬石出南麓古剎表耆闍髙聲聳羣玉居惟擇岡巒近靡數松竹郡郭路非遙遊人舂不宿陟巘極躋攀循崖勞傴伏架筒引流泉跨嶺構重屋講坐據妙峯禪堂對枯木幽尋難屢期將往誰能獨偶逢霜臺客暫駐驄馬足聨步訪叢林終朝走郊牧相期方外遊頓忘河上曲夷路喜君騰髙閣暫豫束更聽名理言俯愜心中欲況已證真常詎止齊寵辱願言挹清風可用警浮俗贈同事閣使以下二首使北時作山路盡陂陀行人涉險多風頭沙磧暗日上雪霜和草淺鷹飛地冰流馬飲河平生畫圖見不料此經過奚山路出奚山路入中京界道旁店舍頗多人物亦衆行盡奚山路更賖路旁時見百餘家風煙不改盧龍俗唐盧龍節度兼押契丹使塵土猶兼瀚海沙朱板刻旗村肆食食邸門挂木刻朱旗青氊通幰貴人車貴族之家車屋通以青氊覆之皇恩百嵗加荒憬物俗依稀亦慕華暮春與諸同僚登鍾山望牛首清明天氣和江南春色濃風物正繁富邦人競遊從官曹幸多暇交朋偶相逢并驅出東郊乘興遊北鍾陟險不蠟屐扶危靡搘笻上登道林祠俯觀辟支峯亂山次阡陌長江繞提封蕭條舊井邑茂盛新杉松攬物思浩然懷古心顒顒念昔全盛時兹山衆所宗天都對雙闕霸業基盤龍六朝遞興廢百祀居要衝人情屢改易世事紛交攻當時佳麗地一旦空遺蹤唯有出岫雲古今無變容和題李公麟陽關圖三尺冰紈一絶詩翩翩車馬送行時尊前懷古閒開卷看盡關山逺别離以上魏公集和右僕射劉公莘老夜直中書省見寄之什五年班綴望䕫龍曾託帡幪庇雨風末路自憐黃髮老早時曾識黑頭公升沈不改交情見出處雖殊趨舍同謾叩蕪音答髙唱終慚下管應清宫卻掃編即席獻文潞公髙燕初陪聽拊鼙清談仍許奉揮犀自知伯起難逋峭不及淳于善滑稽舞奏未終花十八酒行先困玉東西荷公德度容狂簡故敢忘懷去町畦卻掃編熙寧間蘇丞相奉使契丹道過北京時文潞公為留守燕會款洽文公因問魏收有逋峭難為之語何謂蘇公曰聞之宋元憲公蓋梁上小柱名取有曲折之義耳蘇公以文人多用近語而未及此乃用為一詩紀席上事獻文公云春帖璇霄一夕斗杓東㶑艷晨曦照九重和氣薰風摩蓋壤競銷金甲事春農宋藝圃集王安石安石字介甫臨川人慶厯二年進士神宗朝纍除知制誥翰林學士拜同中書門下平章事加尚書左僕射兼門下侍郎封荆國公卒諡曰文崇寧閒追封舒王有臨川集䝉齊筆談荆公初生家人見有獾入其産室故小字獾郎後山詩話魯直謂荆公之詩莫年方妙然格髙而體下如似聞青秧底復作龜兆坼乃前人所未道又云扶輿度陽焰窈窕一川花雖前人亦未易道也然學三謝失於巧耳石林詩話蔡天啓言荆公每稱老杜鉤簾宿鷺起丸藥流鶯囀之句以為用意高峭五字之模楷他日公作詩青山捫蝨坐黃鳥挾書眠自謂不减杜詩以為得意然不能舉全篇余頃嘗以語薛肇明肇明時被㫖編公集遍求之終莫之得或云公但得此一聨未嘗成章也西清詩話仁廟嘉祐中開賞花釣魚宴介甫以知制誥預末坐帝出詩示羣臣次第屬和末至介甫日將夕矣亟欲奏御得披香殿字未有對時鄭毅夫獬接席顧介甫曰宜對太液池故其詩有云披香殿上留朱輦太液池邊送玉杯翌日都下盛傳王舍人竊栁詞太液波翻披香簾卷介甫頗銜之退之喜雪獻裴尚書詩云喜深優古堂詩話韓將䇿試驚密仰簷窺又云氣嚴當酒暖灑密聽窗知荆公全用一聨云借問火城將䇿試何如雲屋聽窗知甫作韓魏公挽詩云木稼嘗因逹雞肋編王介官怕山摧今見哲人萎時華山崩京師木冰極為中的人多不見木稼出處按舊唐書五行志開元二十九年十一月二十二日雨木冰凝寒凍冽而數日不解寧王見而歎曰諺云樹稼逹官怕必冇大臣當之其月王薨出其門自以為澠水燕談王荆公之時學者得榮一被稱與往往名重天下公之治經尤尚解字末流務為新竒寖成穿鑿朝廷患之詔學者兼用舊傳注不専治新經禁援引字解于是學者皆變所學至有著書以詆公之學者又諱稱公門人故張藝叟為挽詞曰今日江湖從學者人人諱道是門生及後詔公配享神廟贈官賜諡俾學者復治新經用字解昔之學者稍稍復稱公門人有無名氏改藝叟卒章云人人卻道是門生話荆公題金陵此君亭詩云誰憐直節髙齊詩生來瘦自許高才老更剛賔客每對公稱頌此句公輒顰蹙不樂晚年與平甫坐亭上觀詩牌曰少時作此題榜一傳不可追改大抵少年題詩可以為戒平甫曰此揚子雲悔其少作也敖陶孫詩評王荆公如鄧艾縋兵入蜀要以險絶為功團扇玉斧修成寶月團月中仍有女乘鸞青冥風露非人世鬢亂叉橫特地寒天㕑禁臠云讀之令人一唱三歎譬如朱弦疏越有遺音者也和女詩青燈一㸃映窗紗好讀楞嚴莫憶家能了諸緣如幻夢世間唯有妙蓮花冷齊夜話舒王女吳安持妻蓬萊縣君工詩多佳句有詩寄舒王王以楞嚴經新釋付之并和云云寒穴泉神泉冽冰霜髙穴與雲平空山渟千秋不出嗚咽聲山風吹更寒山月相與清北客不到此如何洗煩酲墨莊漫録華亭有寒穴泉與無錫惠山泉味相同荆公嘗有詩云寄蔡氏女建業東郭望城西堠干嶂承宇百泉繞霤青遙遙兮纚屬緑宛宛兮橫逗積李兮縞夜崇桃兮炫書蘭馥兮衆植竹娟兮常茂栁蔫綿兮含姿松偃蹇兮獻秀鳥跂兮下上魚躍兮左右顧我兮適我有斑兮伏獸感時物兮念汝遲汝歸兮擕幼我營兮北渚有懷兮歸女石梁兮以苫蓋緑陰隂兮承宇仰有桂兮俯有蘭嗟女歸兮路豈難望超然之白雲臨清流而長嘆朱文公楚詞後語云寄蔡氏女者王文公之所作也公以文章節行高一世而尤以道德經濟為己任被遇神宗致位宰相世方仰其有為庶幾復見二帝三王之盛而公乃汲汲以財利兵革為先務引用凶邪排擯忠直躁迫強戾使天下之人囂然喪其樂生之心卒之羣姦嗣虐流毒四海至於崇宣之際而禍亂極矣公又以女妻蔡卞此其所豫之詞也然其言平淡簡遠翛然有出塵之趣視其平生行事心術略無毫髮肖似此夫子所以有于豫改是之歎也歟絶句穰侯老擅關中事嘗恐諸侯客子來我亦暮年專一壑每聞車馬便驚猜侯鯖録元豐末有以王介甫罷相歸金陵後資用不足達裕陵睿聽者上即遣使以黃金二百兩就賜之介甫初喜意召已既知賜金不悅即不受舉送蔣山修寺為朝廷祈福此詩未能忘情在丘壑者也與外弟飲一自君家把酒杯六年波浪與塵埃不知烏石岡頭路到老相尋得幾回冷齊夜話山谷言詩意無窮而人才有限以有限之才追無窮之意雖淵明少陵不得工不易其意而造其語謂之換骨法規摹其意形容之謂之奪胎法如顧況詩曰一别二十年人堪幾回别其詞簡緩而意精確荆公與故人詩云云所謂奪胎法也賞心亭霸氣消磨不復存舊朝臺殿只空村孤城倚薄青天近細草侵尋白日昏稍覺野雲成晚霽却疑山月是朝暾此時江海無窮興醒客無言醉客喧自金陵至丹陽道中有感數百年來王氣消難將往事問漁樵苑方秦地皆蕪沒山借揚州更寂寥荒埭暗雞催月曉空場老雉挾春驕豪華只有諸陵在往往黃金出市朝藝苑雌黃豫與鄉人翁行可同舟泝汴因談及詩行可云介甫善下字如空場老雉挾春驕下得挾字最好即孟子挾長挾貴之挾豫謂介甫又有紫莧凌風怯蒼苔挾雨驕後山有寒氣挾霜侵敗絮賔鴻將子度微明其用挾字亦與前一聨同末言陵墓遭發金玉出於人閒矣初夏絶句石梁茅屋有灣崎流水濺濺度兩陂晴日暖風生麥氣緑隂幽草勝花時娛書堂詩話范石湖云嘗䝉恩獨引觴詠壽皇與行苑中親誦後句以為佳試院中作少年操筆坐中庭子墨文章頗自輕聖世選才終用賦白頭來此試諸生詳定官作童子常誇作賦工暮年羞悔有揚雄當年賜帛倡優等今日論才將相中細甚客卿因筆墨卑於爾雅注魚蟲漢家故事真當改新詠知君勝弱翁韻語陽秋荆公以詩賦決科而深不樂詩賦試院中五絶其一云云後作詳定官復有詩云云熙寧四年預政遂罷詩賦專以經義取士蓋平日之志也歲晚月映林塘靜風涵笑語涼俯窺憐淨渌小立佇幽香攜幼尋新菂扶衰上野航延緣久未已歲晚惜流光漫叟詩話荆公定林後詩精深華妙非少作之比嘗作歲晚詩自比謝靈運識者以為然示公佐殘生傷性老耽書年少東來復起豫各據槁梧同不寐偶然聞雨落階除壬辰寒食客思似楊栁春風千萬條更傾寒食淚欲漲冶城潮巾髮雪爭出鏡顔朱早凋未知軒冕樂但欲老漁樵自白土村入北寺雨過百泉出秋聲連衆山獨尋飛鳥外時度亂流閒坐石偶成歇看雲相與還會須營一畝長此聽潺潺泊船瓜洲京口瓜洲一水閒鍾山秖隔數重山春風又緑江南岸明月何時照我還容齊續筆吳中士人家藏其草初云又到江南岸圈去到字注曰不好改為過復圈去而改為入旋改為滿凡如是十許字始定為緑送和甫寄女子荒煙涼雨助人悲淚染衣襟不自知除卻春風沙際緑一如送汝過江時以上臨川集釋普聞詩論拂去豪逸之氣屏蕩老健之節其意韻幽逺清癯雅麗為得也寄池州夏太初一水衣巾剪翠綃九華環珮刻青瑶生才故有山川氣卜築兼無市井嚻三葉素風門閥在十年塵跡履綦銷歸榮早晚重攜手莫負幽人久見招能改齊漫録王荆公有唐律一首寄池州夏太初今集不載序云不到太初郎中兄所居遂已十年以詩攀寄絶句白馬津頭驛路邊陰森喬木帶漪漣斜陽一馬匆匆過夢寐如今十五年能改齊漫録荆公題一絶于夏旻扇今集不載柳瑾瑾字子玉慶厯二年進士句過盡金湯知帝策見求貂虎識君儀男兒本有四方志秖在蓬瀛自不知王荆文公詩自注陳洙洙字師道建陽人慶厯二年進士歷殿中侍御史嘉祐中上疏助司馬光論建儲且飲藥而卒以明無所覬望奏下大計遂定仁宗聞洙死賜錢百萬元祐初用光言官其一子吳耿先生還北山舊居蒼浪兩鬢斑盡意六經間有術佐明主無官歸故山釣臺春水碧吟榭暮雲閒見說還家後重將舊史刪前賢小集拾遺遊雲際寺在邵武軍光澤縣清曉捫蘿踏嶺雲寒風飛澑溼衣巾上攀霄漢無多地直視城闉幾點塵古木半陰藏宿霧山禽相語厭遊人明年更補閩中吏來看桃花爛漫春瀛奎律髓靖安寺五代時建寧詩人江為故宅處士亡來二百年故居牢落變祇園詩名長共江山在寃氣尚磨星斗昏臺榭幾人留好句漁樵何處問曾孫昔時泉石生涯地日暮寒雲繞寺門建寧府志毛維瞻維瞻開封人居三衢慶厯二年進士纍遷參知政事筠州山房樓上青山繞四陲畫樓百步引朱扉落成當與公同上一看長江白練飛江西通志王圭圭字禹玉華陽人徙舒琪之從弟慶厯二年進士官翰林學士知開封府兼侍讀學士神宗朝拜尚書左僕射門下侍郎哲宗即位封岐國公卒贈太師諡曰文有華陽集王文正公日録神廟時每夕有赤氣見西北隅如火至人定後乃滅人以為皇子生之祥故禹玉作大燕樂詞云未曉清風生殿閣經旬赤氣照乾坤未幾皇子生大燕羣臣于集英殿文潞公丞相出鎮西京奉詔於瓊林苑燕餞從列皆賦詩送行都門秋色滿旌旗祖帳容陪醉御巵功業特髙嘉祐末精神如破貝州時匣中寶劒騰霜鍔海上仙桃壓露枝昨日更聞褒詔下别刋名姓入周彝墨莊漫録東臯筆録嘉祐中文潞公彥博富鄭公弼為相劉沆王堯臣為參政始議立皇嗣而事祕不傳雖英宗亦莫知也元豐中王公之子同光上書言先帝之立乃先臣在政府始議也其始終事並藏臣家乃宣取上驚歎久之是時富劉王三公皆已薨獨潞公留守西京遽召至闕慰藉恩禮隆厚册拜太尉及還西都上作詩送行有報在不言功之句兩府並出餞皆有詩王禹玉詩云功業特高嘉祐末精神如破貝州時蓋謂是也上元應制雪消華月滿仙臺萬燭當樓寶扇開雙鳳雲中扶輦下六鼇海上駕山來鎬京春酒霑周燕汾水秋風陋漢才一曲升平人共樂君王又進紫霞杯韻語陽秋元豐中令從臣和元夕觀燈詩蔡持正密叩王公云應制上元詩如何使事禹玉曰鼇山鳳輦外不可使章子厚靣笑之十七日登對神宗獨賞禹玉詩妙於使事史院席上和首相吳公原韻曉下金門路君筵聽召餘簪纓三壽客筆削兩朝書身老雖逢此恩深盡醉歟傳聞訪餘事應走使臣車揮麈後録在翰苑作晨光未動曉驂催又向壇頭飲社杯自笑治聾終不是明年強健更重來懶真子録和梅公儀琴髙魚三月江南花亂開青溪曲曲水如苔琴高一去無蹤迹枉是漁人尚見猜賔退録溫成皇后閣立春帖子曰璐按曲洧舊聞作歐公詩昔聞海上有仙山煙鎖樓臺日月閒花下玉容長不老只應春色勝人間隱居詩話溫成皇后初薨會立春進帖子是時歐陽修王圭同在翰苑以其虛閣故不進俄有㫖令進王圭遽口占一首歐陽歎其美麗端午帖子紫閣曈曨隱曉霞瑶墀九御薦菖華何人又進江心鑑試與君王卻衆邪容齊五筆夫人閣端午帖子後苑尋青趁午前歸來競鬬玊闌邉袖中獨有香藝草留與君王辟蠹編後村詩話挽老蘇先生岷峨地僻少人行一日西來譽滿京白首只知聞道勝青衫不及到家榮𤣥猿夜哭銘旌過紫燕朝飛挽鐸迎天祿校書多分薄子雲那得葬鄉城蘇集附録大饗明堂慶成皇祐更秋律明堂奉帝禋粢盛雖薦德霜露本懷親於赫朝三后無文秩百神九筵交玉幣重屋近星辰邃幄留飇御清壇墮月津衣冠漢儀舊金石舜韶新受胙開宣室鳴鐘降紫宸羣陰光復旦叶氣斗回春靈貺叢千祝豐恩滲四垠慙非老辭筆徒學煥堯文瀛奎律髓禹玊為詞臣則摛藻細潤典雅徑健未有後來全句長句之病時號為至寶丹以多用金玉珠璣錦繡之類然亦有不全然者此詩豈不謂之細潤典雅再登賞心亭六朝遺迹此空存城壓滄波到海門萬里江山來醉眼九秋天地入吟魂於今玉樹悲歌起當日黃旗王氣昏人事不同風物在悵然猶得對芳樽詩林萬選宫詞花裏宫鶯曉未啼千牛仗下報班齊銀袍五百趨龍尾天子臨軒賜御題侍輦歸來步玉階試穿金縷鳳頭鞋階前摘得宜男草笑插黃金十二叉內苑宫人學打毬青絲飛控紫驊驑朝朝結束防宣喚一樣真珠絡轡頭黃昏鎖院聽宣除翰長平明趁起居撰就白麻先進草金泥降出內中書紗幔薄垂金麥穗簾鉤纖挂玉蔥條樓西别起長春殿香壁紅泥透蜀椒內人稀見木鞦韆爭擘珠簾帳殿前第一錦標誰奪得右軍輸卻小龍船盤龍新織翠雲裘簡點黃封玉匣收防備秋來供御著金箱捧入曝衣樓盡日閒窗賭選仙小娃爭覓倒盆錢上籌爭占蓬萊島一擲乘鸞出洞天十家宮詞呈永叔書事嘉祐二年禮部倡和誥書初捧下西箱重棘連催暮鑰忙緑繡珥貂留帝詔元注元夕有緑衣中使傳宣紫衣鋪案拜宸香卷如驟雨收聲急筆似飛泉落勢長十五年前出門下最榮今日預東堂歐陽修歸田録嘉祐二年余與端明韓子華翰長王禹玉侍讀范景仁龍圖梅公儀同知禮部貢舉辟梅聖俞為小試官凡鎖院五十日六人者相與倡和為古律歌詩一百七十餘篇為三卷禹玉余為校理時武成王廟所解進士也至此新入翰林與余同院又同知貢舉故禹玉贈余云十五年前出門下最榮今日預東堂余答云昔時叨入武成官曾看揮毫氣吐虹夢寐閒思十年事笑談今日一尊同喜君新賜黃金帶顧我今為白髮翁依韻恭和聖製龍圖天章閣觀三聖御書半夜傳君召西清閲帝文筆回丹穴鳳歌起沛鄉雲御幄金虯轉仙墀羽仗分君王自天縱況復睿心勤以上曹氏歷代詩選句披褐曾陳定羌策汗青猶著立儲書春風澤國吟箋落夜雨溪堂宴豆疏許彥周詩話外祖父邵安簡公布衣時上平元昊䇿又嘗勸仁廟早立太子晚年自樞府出知越州又移鄆州其薨也岐公作挽詞云云不獨語句精練且是著題金縷黃龍扇蘭芽翠釡湯夫人閣端午帖子繞臂雙條達紅紗晝夢驚同上震邸陪經席辰階總化鈞晏元獻挽詩未染仙人杏先柔帝女桑皇后閣帖子靈宫千福墮清庿一誠專南郊舊蠹翻書㰅羣訛正說鈴校理東觀曉日破紅浮鬭栱夕雲凝紫護周垣祠太乙宫官職聲名君自有何妨更絶郢中吟和石昌言雪灼灼海棠誰復折差差燕子又還飛以上海録碎事舞急錦腰迎十八酒酣玉盞照東西墨莊漫録樂府六么曲有花十八古有玉東西杯對甚新石象之象之字簡夫新昌人慶歷二年進士官太常丞詠愁來何容易去何遲半在心頭半在眉門掩落花春去後窗涵殘月酒醒時柔如萬頃連天草亂似千尋匝地絲除却五侯歌舞地人閒何處不相隨新昌縣志石聲之聲之新昌人遊南明山秖應尋勝到林泉四抱危峯萬朵蓮僧過不知山隱寺客來方見洞開天浮圖照水光相映古木依崖影倒懸風露了非人世界濯纓秋後玉壺仙越咏黃庶向宗道庶字亞夫分寧人慶厯二年進士歷州郡從事攝康州有伐檀集山谷其子也宿趙屯蘆花一股水弭棹日已暮山閒聞雞犬無人見煙樹行逐羊豕跡始識入市路菱芡與魚蟹居人足來去漁家無鄉縣滿船載稚乳鞭笞公私急醉眠聼秋雨怪石山鬼水怪著薜荔天祿辟邪眠莓苔鉤簾坐對心語口曾見漢唐池館來斑石枕聯句同向宗道斸得西山骨磨礱露斑駮凝結一何怪宗道形模萬難學直疑彩雲根庶又訝紫珉礏中瘦􅀈蛟腹宗道外文灼龜殼冷剖清泉肝庶􅖽榰老鼇腳堅方君子性宗道清純聖人璞有氣當補天庶無瑕應並瑴定漬盤古苔宗道想漏神晨藥堪作夢寐寶庶尤是炎蒸託眠月病頭愈宗道橫風醒肺濯珊瑚侈可唾庶陶甄脆堪撲夜深魘鬼驚宗道晝冷詩魔愕首愜無俗夢庶心清去煩惡蘄簟方敢友宗道蜀笻良可攫何必檄愈風庶何必文驅瘧質任兒女嗤宗道頑宜童僕謔枕流固迂誕庶藉糟徒落魄潤生審將雨宗道輝發宜有珏髑髏莊生狂庶虎魄宋武薄欲鑱中郎銘文章體猶弱欲祕淮南書神仙志可樂宗道我疑混沌礦誰與礱竅鑿可作甘寢輿華胥詣冥寞庶子道足施為我拙困嬰縛已謀具巾屨行當老嵩霍子其乞我歸終焉臥雲壑宗道嗜好我已癖須求子惟慤氊舊王固惜瓢陋顔不博異時一經子便當千金橐客退獨摩拂臥送山月落庶以上伐檀集韓欽聖欽聖慶歷二年進士句迎鋒畫幡轉交鏃采文繁省試勳門賜㦸古今詩話句龍緯緯蜀人慶厯進士太學博士題惠泉寄知軍郎中在荆門﨑嶇荆門山叢起為東厄陽岡盤氣勢陰竇融液脈源濯雲根移流噴石罅拆呀呀兩岸閒平㵎才數席環岸貯清泚古鏡照秋色恬風不生紋至底無隱物澄輝泛嵐翠淨影溶天碧潛花深坰坰䕃樹髙崒崒清光照毛髮爽氣灑肌骨如入冰壺中亭宇何鮮飾瓶罌日往來舉汲易為力短綆何勞人輕舠恰容客當時竟陵翁老死卻不歷品第十九泉遺此良可惜此泉惠此土唯日流不息作詩頌惠泉勉哉君子德荆州府志賈宗諒宗諒官內園洛苑如京崇儀使上元日駕幸太乙宫燒香金鑾晨動暖風微比屋歡呼望帝暉天喜宴開新福館雲深香滿侍臣衣九韶鳳舞當雙闕萬燭龍趨護六飛為與吾民同樂事月輪猶未下端闈古今歲時雜詠宋詩紀事卷十五
