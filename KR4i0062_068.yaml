body:
  text: 宋詩紀事卷六十八錢塘厲鶚撰吳大有大有字有大號松壑嵊縣人寶祐間遊太學率諸生上書言賈似道姦狀不遂退處林泉與林昉仇遠白珽等以詩酒相娛元初辟為國子檢閲不赴餞陳隨隱歸臨川我昔見君方成童長吉才華驚巨公人間科第不屑就直使聲名聞九重乃翁引上凝華殿子虛不待他人薦入直來來凡幾年天上奇書盡曽見翩然歸去大江西二疏父子還相隨故鄉分得雲水地卻喜不爽漁樵期春雨騎牛對烟草何如振衣隨龍五雲表秋霜黃獨煨地爐何如駝峯犀筯食天廚林間拾葉抄詩句何如宫妃捧硯揮毫處溪邊照影著荷衣何如龍門應制奪錦時鈞天夢斷難回顧浩然合在山中住金石臺前伴白雲六年不踏西湖路今日重來發長吁忍看清平破草廬盡拈書籍向人賣歸買田園供荷鋤乃翁齒髮落倚門待兒斜日薄孤山梅花帶不歸卻喚扁舟載童鶴隨隱漫録遊天竺編茅為屋住結葉作衣裳不試燒金訣唯尋煮石方洗瓢溪月冷采藥野雲香常有仙家鶴飛來繞石牀天竺寺志雜詩兩年書問斷湖海竟悠悠一見心雖滿相看淚忽流彩烟山色暮碧瀨月痕秋明日登程去鶺鴒沙上愁山中多雨水秋晚正妨農病菜和根煮新粳帶溼舂擁沙埋廢井墮石折枯松寂寂猿啼晝白雲藏數峯客行情最苦草草共清尊萬水千山路今朝好出門雁聲低度水村深中有人敲月下砧滿屋秋風燈欲暗江山千里故園心以上珊瑚網陳仁玉仁玉號碧棲仙居人第進士開慶中禮部郎中兼崇政殿說書除直祕閣浙東提刑兼知衢州直敷文閣南峯寺藍光軒懷吳直翁懷佳人兮山扃躡烟霏兮步輕蹇獨立兮山上空山無人兮寒松自聲懷佳人兮何許白雲封關兮猿鶴看戶羌有懷兮曷訴風虛徐兮簷鐸語辭佳人兮未來聊逍遙兮容與吳禮部詩話遊洞霄宮天柱峯頭疊紫烟遙看萬玉聳相連雲深九鎖疑無路翠豁一區俄有天爽氣襲人森石樹嗔雷飛雨響山泉翛然不類人間世今日自驚平地仙洞霄詩集題蘇端明書乳泉賦後坡公謫海上人傳已仙去道逄章子厚遄復返塵路至言想世驚猶閟乳泉賦遙憐嵩山丘千古不可駐式古堂書考陳宜中宜中字與權永嘉人景定三年進士第二德祐元年除知樞密院參知政事拜特進右丞相元兵至臨安宜中宵遁入閩益王以為左丞相井澳之敗宜中如占城不反後歿於暹如占城經吳川極浦亭顛風吹雨過吳川極浦亭前望遠天有路可通環嶼外無山堪並首陽巔溪雲起處潮初長夜月高時人未眠異日北歸須記取平蕪盡處一峯圓廣東通志丁開張中行開字復見長沙人負氣敢言安撫向士璧被問開獨詣闕上疏具陳士璧有大功軍府小費不宜推究書奏羈管揚州嵗餘卒可惜日者今何及天乎有不平功高人共嫉事定我當烹父老俱嗚咽天王本聖明不愁罹黨禍攜淚向孤城漂泊嶽陽遇張中行泛舟洞庭晚宿君山聨句元氣無根株開地脈有斷絶中行日月互吞吐開雲霧自生滅中行楚妃結幽想開巴客答清吷中行寧知莽蒼中不假巨鼇力勢閲南紀浮開思隨西風發形影寄孤舟中行吾道成鴂舌笑談正淩傲開俯仰不逼側每與景物㑹中行未省歡娛畢疊翠晚愔愔開墮黃秋的的魚龍負贔屭中行獨鳥去不息曠原眇周抱開異境超慌惚徑度萬頃空中行忽得一拳碧稍稍雞犬近開依依鐘梵夕推門月微墮中行煮茗香初歇衣裳識霜信開瓶鉢了禪悅事定心源清中行夢回斗柄直周游興欲盡開長往計未決出門更回首中行沙水蕩虛白美哉神禹功開已矣三苖國山川長不朽中行愚智俱可惜神交正冥冥開指㸃空歷歷甚勿語俗人中行桃源恐相失開建業誰遣凄涼滿眼中蘋花渺渺又秋風龍蹲虎踞江山大馬去牛來社稷空縱有千人惟諾諾本無百嵗更匆匆乾坤顛倒孤舟在聊復殘生伴釣翁揚州嵗莫萬國回春日層城晚眺餘江聲隔吳楚原色到邳徐大閲軍容壯狂歌客禮疏百年寒荻裏風雨憶吾廬以上谷音吕人龍人龍字首之淳安人景定三年進士終承務郎有鳳山集春歸過卻清明豔冶天梨花飛雪柳森煙欲憑鶯燕留春住無奈東風信杜鵑青溪詩話宿建興寺路入招提晚更深萬山秋老薄寒生芙蓉枝上無多雨自把孤懷滴到明嚴州府志方逢振逢振字君玉逢辰弟景定三年進士歷國史實録院檢討遷太府寺簿宋亡歸隱風潭有山房集風潭精舍偶成茅屋三間一塢雲此窩真足養吾神不知逐鹿斷蛇手但見落花啼鳥春石几梅瓶添水活地爐茶鼎煮泉新古今天地何窮盡愧我其閒作散人山房集徐天祜天祜字受之山陰人景定三年進士與王修竹齊名洛思山在蕭山昔有洛下人隨太尉朱雋來㑹稽三年不得返乃登山北望而歎故名歸去蹉跎嵗月深羈愁無奈故鄉心人生畢竟俱懷土莊舄當時自越吟方干島在鑑湖中一名筍莊平生心事白鷗知一卷雲菴處士詩占得鏡中奇絶處祇緣身值廣明時白樓亭世說孫興公許元度共在白樓亭商略先往名逹林公既非所屬聽訖云二賢故自有才情江右名流共往還白樓何許只青山不須商略間今古物換星移俯仰閒許詢園在蕭山許詢嘗登永興縣西山築室其上蕭然自放乃號其岫為蕭山高棲不受鶴書招北幹家園久寂寥明月空懷人姓許故山猶自岫名蕭錢王祠石鏡山前結駟遊故鄉霞錦遍林邱秖今東府空遺廟露立唐碑老樹秋以上紹興府志宗必經必經字子文南昌人景定三年進士通判瑞州宋亡入元世祖詔求江南人才留夢炎程文海交薦固辭械至燕繫獄三嵗放還有玉溪集孺子亭連天大厦莫容身小向湖邊一問津心事說知林下郭姓名誤入府中陳半篙緑水三間屋一榻清風百世人只有青青隄上柳至今猶是漢時春滕王閣高閣連城十二䦨西風領客共躋攀半簾烟雨長空外千里江湖咫尺間鴈帶秋聲歸别浦鶯分春色過巴山當年蛺蝶知誰畫一夢莊周去不還以上南昌府志家坤翁坤翁號頤山眉州人景定三年以戶部郎中知撫州遊金石臺撫州羊角山北崖有石岡南向曰金石臺廬陵遊樂夕陽山太守何人若是班三島幻成一丘小五峯對峙兩溪環竹閒庭院鄰翁卜木杪樓臺仙者寰紫笑扶疏枝幹老春來得興頗開顔撫州府志陳郁郁字仲文號藏一臨川人理宗朝充緝熙殿應制景定間充東宮講堂掌書兼撰述德祐乙亥卒撫州府志度宗嘗贊郁像云文窺西漢詩到盛唐侍豫左右知汝忠良石湖歸途人與西風結約來芙蓉花氣撲吟杯曲塘好處都行遍帶得一身秋色回東園書所見娉婷游女步東園曲徑相逄一少年不肯比肩花下過含羞卻立海棠邊城東看柳翻暖為寒一信風畫橋南北岸西東春歸楊柳無私意深淺青黃自不同蘇隄曉望荷邊清露襲人衣風裏明蟾浴曉池涼影潤香吟不得手扳堤柳立多時景靈宮恭謝駕回丞相以下皆簪花幸驂恭謝覩繁華馬上歸來戴御花老婦稚兒相顧問也頒春色到詩家以上隨隱漫録賦翁仲限久字韻銅仙擎露秋風表珍重劉郎千萬壽老瞞攘鼎貽孫謀因逼此仙俱受垢仙寧折骨拒非招恥為姦雄效奔走汚名翁仲俾司門口不能言心自否洛陽宮殿一灰飛天上此標獨長久君不見堂堂冠劒隱滕城萬古六丁驅鬼守隨隱漫録抱獨山人跋云紹定壬辰九日徐逸觀陳藏一所作翁仲詩命意布辭灼見魅鄉呼魄指冤俾受言奬如在荆棘中流涕而話往事嗚呼如詩人忠憤之心隨事而見可勝歎哉因執筆惘惘而書劉辰翁辰翁字㑹孟廬陵人少登陸象山之門補太學生景定壬戌廷試對策忤賈似道置丙第以親老請濓溪書院山長薦居史館又除太學博士皆固辭宋亡隱居卒有須溪集蘇李泣别圖事已矣泣何為蘇武節李陵詩噫送李鶴田入浙赴趙春谷招天下南北車書通行人㸃㸃過汴宮空餘艮嶽一拳土黯慘如雪吹不融平乘樓上王夷甫一流中外淚如雨西風羽扇不障塵更是蓮子隨根去政事堂中三相公往往退食如夔龍少年慟哭不見用一語不合靣發紅八年流落無處所合眼當朝竟如許忠魂不到海門潮别殿芙蓉廢為圃茫茫古路日平西不信金銅不淚垂浮沈親故懶相問白髮唯有春風知李侯髀肉堪流涕同谷哀吟越州弟買絲刺繡刺未成公子翩翩鴈書至飄飄起望白雲閒裘雪牛車度赤山年餘七十能幾見我且欲往窮當還平生高李經行處寂寞斷橋漂落絮不知到日似枯魚淚入黃河别魴鱮當空殿閣密雲團曽和薰弦接羽翰至今尚留花石否杜鵑再賦長恨端蘇州正念東鄰女傷心更遇楊開府語言憔悴敢分明買酒行澆茂陵土讀杜拾遺百憂集行有感我生行年將六十不知何者為憂戚富貴不驕貧賤安以此存心度朝夕往來承乏佐中書大官羊膳供堂食只今賜老作編氓衣食信天無固必陋巷簞瓢如素居不管茅茨春雨溼門前載酒求賦詩錦軸牙籖日堆積在官不置附郭田既老翻得稽古力毁譽都忘月旦評姓名不上春秋筆朝米不煩鄰僧送暮米不煩太倉糴我亦一飯不忘君丈人相輕所不及傷哉白首杜拾遺入蜀還秦勞轍迹文章蓋世亦何為妻子相看百憂集龍霧洲雪此處幾人行隔波搖暮晴洲回江似玦山遠雪如城離合看雙櫓荒寒又一程今年梅未醉最覺别來輕夜雨夜半起雷車天門報曉衙何消如此雨又有未開花繡被人中酒茅簷客夢家一晴天地闊稽首見重華清明日偶成海日高高天欲斜斷橋無復聽嘔啞墓中酩酊已千載陌上清明有幾家已老愈疏唯酒盞更晴相覓是梅花年年春怨深如昨莫把無涯恨有涯春晴江柳長天草色齊新晴何物不芳菲無因化作千蝴蝶西蜀東吳款款歸探梅江天欲雪未雪時絶江探梅驢倒騎空中著我方成畫亂後逢花且賦詩以上須溪集初晴初日入高樓歸雲雜江樹魚游新雨晴鳥語晨光吐天容起復覩烟色轉輕素牆草麗車前巷溝映泥路窗明袪宿潤礎泫滑微步㑹朝有宿客過午無來屨沿砌上蠙衣虛庭竿犢袴人生足無事世故非所慮彼語吾不聞清風有時度戲題無人知坦腹水影半簾苔驚謂青蟲墮垂絲忽上來春歸留春一日不可種樹十年未成芳草斷腸花落緑窗攜手鶯聲以上天下同文集宣和雙蟹圖卷款題已未前史臣某講餘幾暇諫書空艮嶽江湖入眼中郭索能令天一笑畫圖何必靣春風郁氏書畫題跋記錢舜選舜選號春塘吳江人景定癸亥特旨以布衣陳隨隱除東宫掌書作詩賀之吟筆何須管用銀日供撰述聖恩新只今已脫凡塵去便作金丹換骨人夜泛孤篷載月船靜搜吟料六橋邊詩成上逹宸聰了流落人間到處傳紀夢翠峯嵳峩三十六寒泉落空響哀玉甃花石路勢縈紆玉闌干護修筠緑雪髯老人負紫瓢金絲麈尾遙相招紅螺酌酒湛湛碧坐倚蒼石吹洞簫孤鶴來傳天上詔老人挽余偕一到飄飄高舉淩青冥直過罡風履黃道祥光樓閣倚崢嶸神虎守關森衛兵雙闔朱扉忽微啓中有靈官來遠迎絳衣持斧立丹陛玉皇手中玉如意雲璈風瑟自宫商天聲清越非人世帝旁青童傳帝宣文華宫中呼謫仙謫仙顧余笑且言子宜亟反來他年探懷贈我五色筆子當寶之慎勿失濃香氤氳迷帝所長揖老人下西廡身從日月上頭行俯視斗杓分子午雲氣相隨步武生過耳但覺松風鳴覺來握筆紀佳夢月明樓鼓撾三更以上隨隱漫録示妷才過中年百念輕獨於風月未忘情貧將入骨詩方好事不縈心夢亦清萬卷難圖金馬貴一篷當與白鷗盟幸然不作諸侯客猶恐江湖說姓名詩家鼎臠韋居安居安吳興人宋季進士司糾三衢著梅礀詩話景定壬戌得數椽於城南慈感渡側詢之故老云距賈耘老水閣舊址不遠因作五言八句卜居求靜處喜傍碧溪灣隔岸高低柳當軒遠近山天開圖畫久人共水雲閒聞說賈耘老舊曽居此閒梅澗詩話淩萬頃萬頃字叔度號松臞崑山人景定進士劉龍洲墓嘗隨薦鶚上天閽肯信荒山泣斷魂百嵗光陰隨酒盡一生氣概秖詩存冢傾平地藤蘿合碑倚空巖霧雨昏縱是紙灰那得到落花寒食不開門崑山縣志錢選選字舜舉號玉潭吳興人景定閒鄉貢進士家有習懶齊因自稱習懶翁霅川翁清臞老人皆其别號也清河書畫舫錢舜舉與趙子昂同里並在吳興八俊中至元間子昂徵入功名赫赫諸人皆依附取官獨舜舉齟齬不合流連詩畫以老春暮晴日溪光動草堂兩峯浮翠瞰滄浪獨揮羽扇成何事更嘆芒鞋為底忙一水澄清魚避影萬紅狼藉蝶分香東風自是無情物白日楊花莫漫狂友人判太平歸來詩卷宫錦翩翩五色麟如君端合侍楓宸山中老去陶𢎞景湖曲歸來賀季真上界神仙足官府此身城郭舊人民還鄉我結同盟社只看桃花莫問春春日即事十日春風暄且妍溪頭花柳競相鮮美人遙隔山川外社雨忽來尊爼前白髮青春猶故我夕陽幽草自新阡五陵公子莫相笑曽散黃金樂少年雜書地僻秋深戎馬閒一尊隨處且開顔誰思銅雀埋黃土但憶金人出漢關六合茫茫天共遠五湖杳杳雁飛還中年陶寫無絲竹王謝風流莫强攀以上丘吉吳興絶唱仇書圖兩兩挾策遊康衢聚戲不異同隊魚忽然兒態起爭競捐棄篋笥仇詩書自題浮玉山居圖瞻彼南山岑白雲何翩翩下有幽棲人嘯歌樂徂年叢石映清泚嘉木淡芳妍日月無終極陵谷從變遷神襟軼寥廓興寄揮五弦塵彯一以絶招隱奚足言題桃源圖始信桃源隔幾塵後來無復問津人武陵不是花開晚流到人閒卻暮春題洪崖先生像卷神駕馭景飇太虛時總轡元道不可分直悟天人際羣從皆成仙玩世不計年何當事神遊許我笑拍肩題竹林七賢圖昔人好沈酣人事不復理但進杯中物應世聊爾爾悠悠天地閒偷樂本無愧諸賢各有心流俗無輕議以上珊瑚網題秋茄圖憶昔毗山愛寫生瓜茄任我筆縱橫自憐老去翻成拙學圃今猶學不成霅溪翁雪霽望山圖并引至元二十九年余留太湖之濱雪霽舟行溪上西望辨山作此圖且賦詩云辨山之陽冠吳興峮嶙巀嶭望不平煥然仙宫隱其下衆山所仰青復青雪花夜積山如換乘興行舟須放緩平生不識五老峯且寫吾鄉一奇觀倚天蒼辨獨崔嵬仙闕遨遊愧不才攬鏡頻嗟雙鬢改推窗三見六花開山中酒戶衝寒去城裏行人踏雪來安得時晴風日好竹林深處且銜杯以上郁氏書畫題跋記何基基字子恭金華人師事黃勉齊景定五年薦舉賢良咸淳授史館校勘兼崇政殿說書不受卒學者稱北山先生賜諡文定有集春日閒居輕陰薄薄籠朝曦小雨斑斑溼燕泥春草階前隨意緑曉鶯花裏盡情啼宋藝圃集李芾芾字叔章其先廣平人徙汴南渡徙衡州以蔭入仕咸淳中知潭州兼湖南安撫使德祐元年元兵圍城力盡死之贈端明殿學士諡忠節浯溪讀中興頌羯鼓梨園跡已荒斯文猶在日星光我來細拂青苔石不憶三郎憶漫郎永州府志江萬里萬里字子遠號古心都昌人太學上舍出身度宗朝同知樞密院事進參知政事忤賈似道退居鄱陽元兵至城陷赴止水死贈太師益國公諡文忠水亭結亭臨水似舟中夜雨瀟瀟亂打篷荷葉曉看元不溼卻疑誤聽五更風絶句草際春回殘雪消强扶衰病傍溪橋東風不管梅花落自釀新黃染柳條以上全芳備祖章鑑鑑字公秉寧州人以别院省試及第纍官權參知政事遷同知樞密院事咸淳十年拜右丞相兼樞密使元兵逼臨安鑑託故去遣使召還罷相豫祠季年屏居山中有杭山集送道士歸得日觀風月詩幾卷江湖屐一雙斷蛟懷劒石跨鶴叩禪窗土潤巖生雨林幽寺隔江歸當訪仙隱相對酒盈缸杭山買得漁磯繫釣船魚龍吹浪駭鷗眠從來白石清泉地勝似青山小洞天以上南昌府志許月卿月卿字太空婺源人後字宋士人稱山屋先生理宗朝進士歷承直郎浙西運幹賈似道當國試館職言不合罷去閉門著書號泉田子宋亡不出十年而卒有先天集追賦暮遊并序余庚子冬挈家離廣陵將肄奉常試業于京師舟泊無錫日已暮與王希聖微服遊南禪蓋訪古也參寥題名壁無恙寺記有碑碑陰結字甚偉視之蔡京也出門烟樹蒼然數僧偶語而已余與希聖卻立四顧曰此佳景也當寫之為詩而舉子業亂其中不能就暇日追想宛在其目為詩以寄希聖其明年冬十一月也嵗月驅人又可一慨錫山舟泊似荒村微服南禪古跡存壁上姓名今已遠碑陰人物了能言薄遊草草寒侵袖遠思悠悠風滿軒攜手出門煙樹密數僧離立語黃昏厭厭厭厭夜飲忘更深客不來辭主有情僮僕觸屛成蝶夢姬姜擪笛作蟬聲月如有待行行慢風不生嗔細細清萍散人生何可料嬋娟千里共交盟吟蛩吟蛩不管興亡事舞蝶那分夢覺身别浦連檣歸遠客高山小徑過樵人以上先天集丁石石字實道黃巖人景定壬戌除夜羅列椒盤人未眠紅爐圍坐笑燈前時光過隙那知老才到雞鳴又一年黃巖英氣宋詩紀事卷六十八
