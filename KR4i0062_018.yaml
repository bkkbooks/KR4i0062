body:
  text: 宋詩紀事卷十八錢塘厲鶚撰馮京京字當世鄂州江夏人皇祐元年舉進士鄉選禮部廷試皆第一纍官知制誥翰林學士旋擢參知政事尋以觀文殿大學士出鎮河陽歷大名彰德拜太子太師致仕卒贈司徒諡文簡有灊山集詔修兩朝國史賜筵史院和首相吳公原韻天密叢雲曉風清一雨餘三長太史筆二典帝王書按武知何者霑恩匪幸歟吐茵平日事何憚汚公車揮麈後録謝鄂倅南宫城嘗思鵬海隔飛翻曽得天風送羽翰恩比丘山何以戴心同金石欲移難經年空歎音書絶千里常思道義歡每向江陵試遺治邑人猶指縣題看湘山野録馮大參當世始求薦于武昌會小宗者庸繆寡鑒堅欲黜落又欲置末綴時鄂倅南宫城監試當拆封定卷大不平奮臂力主之以公冠于鄉版果取大魁釋褐除荆南倅南宫遷潭倅以詩謝之句琴彈夜月龍魂冷劒擊秋風鬼膽粗塵埃掉臂離長陌琴酒和雲入舊山豐年足酒容身易世路無媒著腳難以上鶴林玉露沈遘遘字文通錢唐人皇祐元年進士第二歷知杭越揚三州官至翰林學士卒有西溪集題山光寺寺在揚州馬蹄輕蹙栁花浮醉入淮南第一州不是青樓羞薄幸自緣無錦不纏頭髙臺已傾池已平隋家宫殿春草生千年往事何足歎廣陵非復舊時城送施密學守錢唐塞外風煙河上塵歸來始覺二毛新承明自厭頻趨直滄海還思一濯巾幕府旌旗初壓境畫船歌吹便行春湖山滿目舊遊在何日從公醉紫蓴南漪堂山繞湖堂寺繞山平生願向此中間青雲白水相浮蕩野客髙僧獨往還年少自嫌軒冕纍因循將恐鬢鬚斑南漪最是逍遙地且挹清波濯愧顔以上西溪集和王微之漁陽圗燕山自是漢家地北望分明掌股間休作畫圗張屋壁空令壯士老朱顔聲畫集天祿研匜歌張君贈我古研滴四腳爬沙角如戟肉翼絡髀老獸姿世不能名眼未識我知此為天祿兒口銜一寸黃金匜蟾蜍嚼月兩吻坼天鯨胸穴雙泉飛玉聲琮琤珠迸落影射巖石光瀺灂未央書殿立䯱髵曽見揚雄老投閣子孫晚出中平間渴烏翻車灑平洛宗資墓口臥露霜頭角頓挫仍騰攫爾來拂拭傍几案眉目睢盱苔蘚剝形模不入世俗用疑付大手傳糟粕未能點綴清廟頌開闢大易摛春秋就令闕五字末勢猶足為遷彪物無貴賤繫所用千金乞我直暗投圗書散落愈闕下晚歲惟有齏鹽謀學注蟲魚問老圃無乃塌颯為匜羞緯略祖無擇無擇字擇之上蔡人進士髙第纍官直集賢院出知袁州入為龍圗閣學士權知開封府進學士知鄭杭二州神宗朝知通進銀臺司知明州坐事謫忠正軍節度副使移知信陽軍卒有煥斗集高齋詩話祖無擇晚娶徐氏有姿色議親之時無擇為館職徐氏必欲咨相其人而無擇貌寢恐不得當同舍馮當世丰姿秀美乃諭媒妁俟馮出局揚鞭躍馬經過徐居曰此祖學士也徐竊窺甚喜成婚始悟其非竟以反目離婚歐公嘗作詩曰無擇聲名重當世早歲多竒晚乃偶蓋謂此也遊真陽石室昔讀到難篇乃聞真陽室亦嘗怪斯人稱道或浮實邈在數千里莫覯煙霞質青山有獨往吾志久矣必如何驂俗駕尚此行朝紱繆分南顧憂惟刑在欽恤孤宦雖云遠勝踐其敢失行行訪雲巖草木披蒙密呀然一穴開勢欲吞朝日嵐光屏障展乳澑龍蛇屈溪流自清泚松韻何蕭瑟酌酒飲遊客謂言此可述周生誠不誣所紀窮纖悉惜哉非吾土無由寄蓬蓽平生丘壑心與道共湮鬱難進而易退終當守儒術唐周夔作到難篇謂此洞離長安逺故到者難也途次金陵逢同年沈五判官數載天涯别年來不定居扁舟忽相值孤抱信何如公幹猶多病奉述孝先仍懶書自謂人生從坎壈客意且躊躇淡薄市橋酒鮮肥江岸魚可來同飲食勿笑此蕭疏琵琶亭晚泊湓江半客舟琵琶亭下動間愁霓裳緑腰杳何許楓葉荻花空自秋賈傅有才悲鵩鳥楚騷終古怨靈修莫言司馬青衫溼今日行人亦涕流以上祖龍學集慈嚴院在楊村風水洞太康間葛稚川捨宅為寺上元間賜額恩德大中祥符二年改今額恩德傳名久慈嚴賜號新樓臺闕三字風水憶長春客有披襟者時無洗耳人清音發鐘磬翠色混松筠住合登仙籍來宜出俗塵經年嗟倥傯半日喜逡巡席上詩情逸樽中酒味醇匆匆又歸去自愧使君身咸淳臨安志盧石盧石在宜陽門外東湖上唐狀元盧肇家石竒秀可愛宋守祖無擇徙置東湖袁山之陽秀水側草履遺基誰氏宅皆云子發其姓盧往以文章名籍籍宅中舊物何所存惟有嶙峋一巨石闊才三尺髙倍尋久卧塵沙羣瓦礫余心好異因獨往下馬環視聊拂拭地表可見十二三已足怪駭動魂魄呼工運鍤塹其傍挽以長絙百夫力歡然鼓譟登大車恍爾如蒙巨靈劈選置東湖最佳處四面澄波映天碧倚空突兀無與鄰頓覺亭臺增氣色彎環幽竇莫敢探恐有乖龍飛霹靂余嘗南遊到陽朔衆峯矗矗春筍植捫蘿踏蘚窮之遍若此竒卓曽未識郡人奔走來如雲故老驚看復唧唧乃言此石遇真賞屈指于今年二百沈埋曠代誰爾珍一日身價逾荆璧嗟余束髮大夫後區區志尚惟忠直十年再謫非不窮猶慕堅凝無改易如何故老不我愚感物再三形歎息石不能言人有言勿使他時重堙厄記萬載縣風俗居民覆其屋大半施白瓦山際兩三家如經新雪下以上袁州府志沈遜遜仕為判官和同年祖擇之韻一自曽經别於今歎索居善交思栁惠多病是相如官下頻無況天涯每得書舊懷長惋歎此會合躊躇曉露生蘭苑秋風動鱠魚蕭然林野性與世轉為疏祖龍學集附陳詵詵官袁州通判和祖擇之學士袁州慶豐堂十詠存四年長身多病間鈔已試方未甘先犬馬畢命報恩光曉案三杯後間烹北苑茶色香俱絶品雪放滿甌花雨霽輕埃息間吟面曲池遊鱗時對擲雙破碧漣漪朝來因試筆間答故交書莫怪音塵絶吾心與世疏祖龍學集附蕭亢宗亢宗廣陵人奉和祖無擇郡守詠盧石石是人非世所傳宜陽城郭古山川和光瓦礫曽無纍委質泥沙積有年地僻久為神物護時來方遇使君賢介然作鎮東湖上德政何當向此鐫祖龍學集附張徽徽官朝議大夫上柱國致仕聞祖擇之曽遊潁川西湖詩以寄之河勢橫斜帶地形碧斿丹斾昔常經驛名未改風塵黑碑字猶存雨蘚青薦福寺名園林倡杳渺擷芳亭名洲渚妓娉婷汝南一值賢人降分野于今占德星祖龍學集附羅誘誘鄉貢進士官教諭和祖無擇太守九日登宜春臺九日經年一再來不妨吏隱遣懷開時豐訟少欣多暇秋晚花黃儘任催幸遇登髙筵宴樂喜容落帽客追陪預愁詔入三公去芹泮誰思樂育才祖龍學集附閻珣珣江西運使祖擇之學士惠示吏隱宜春郡十詩奉答達觀終知世事勞利名都是一鴻毛登瀛自有仙遊樂緩帶何妨吏隱髙深意庇民躋富夀正辭華國聳英髦摶風九萬期鵬翼且傲松軒弄彩毫祖龍學集附宋攄攄鄉貢進士和祖無擇太守九日登宜春臺登髙佳節喜重來會客依隨五馬開帽落秋風隨意適杯迎露菊趁時催東籬幸有主人席絳帳那逢上客陪時李泰伯預坐欲報君恩話歸去不妨尊酒論文才祖龍學集附陳闡闡字伯通仙遊人皇祐元年進士守知萊州題梅仙山先生吏隱寄南昌千里來尋物外鄉汲水尚憐春井泄藏丹猶發夜壇光鶴歸華表人何在犬吠雲深日自長我擬重來訪遺迹手搘笻杖少徜徉梅仙事實張公庠公庠字元善皇祐元年進士有泗州集道中一絶一年春事已成空擁鼻微吟半醉中夾路桃花新雨過馬蹄無處避殘紅侯鯖録遊白鶴山初眠官栁未成隂馬上聊為擁鼻吟逺宦情懷消壯志好花時節負歸心别離長恨人南北會合休辭酒淺深欲把春愁間抖擻亂山高處一登臨能改齋漫録張才翁風韻不羈初仕臨卭秋官郡守張公庠待之不厚會有白鶴之遊郡守率屬官同往才翁不預乃語官妓楊皎曰老子到彼必有詩詞可速寄來公庠既到白鶴便留題云云皎録寄才翁才翁增減作雨中花詞寄皎云萬縷青青初眠官栁向人猶未成隂據雕鞍馬上擁鼻微吟逺宦情懷誰問空嗟壯志消沈正是好花時節山城留滯忍負歸心别離長恨飄蓬無定誰念會合難慿相聚裏休辭金盞酒淺還深欲把春愁抖擻春愁轉更難禁亂山髙處慿闌垂袖聊寄登臨公庠再坐皎歌于側公庠問之皎前稟曰張司理恰寄來令皎歌之以獻台座公庠遂青顧才翁尤厚宫詞上番宫女捲簾時閃閃寒鴉拂曉啼才索赭袍催進輦紫宸門外報班齊佳人唯是惜韶年懶向紅窗理管弦錦席安排胡蝶局深宫不忌賭金錢太皥祠壇數級紅青旗搖曵日曚曨人間未覺春風至先入宜春小苑中月華浮動上階稜侍宴歸來掩繡屛子夜酒醒蘭燭暗碧紗窗外度流螢十家宫詞郡齋宴坐為州容散誕真慰野人情撼膝禪初悟搖頭句未成試香秋院靜鬭墨午窗明已有東歸計柴扉掩姓名瀛奎律髓盧秉秉字仲甫湖州德清人皇祐元年進士提點兩浙刑獄加集賢殿修撰知渭州遷龍圗閣直學士提舉祠霄宫卒有文集絶句十月都門風薄衣搗砧聲裏雁南飛野人不識長安樂且趁鱸魚一棹肥西溪叢話題汴河驛中青衫白髮病參軍旋糶黃糧買酒尊但得有錢留客醉也勝騎馬傍人門吟窗雜録舒王見此詩尤極稱賞俄薦于朝數年間遂超顯仕孫覺覺字莘老高郵人皇祐元年進士元豐初除右正言歷外郡哲宗朝拜御史中丞提舉靈仙觀卒紹聖中以元祐黨奪兩官徽宗即位復職有集聞朝議以子瞻送髙麗文章異域有知音鴨緑差池一醉吟穎士聲名動中國樂天辭筆過雞林節毛零落氊吞雪辨舌縱橫印佩金奉世風流家世事幾隨浪拍海東岑合璧事類後集介亭在杭州鳯凰山太守祖無擇建真人昔未起奔鹿駭四方連延天目山兩乳百里長有地跨江海無種生侯王中宵燎穹旻列石表壇場朱旗大梁野英氣通八荒寥寥百年後故物亦已亡所餘彼巉巖峯巒屹相望主人承明老星斗工文章築亭紫霄上坐客蒼林旁攀雲弄明月曉星出扶桑禹山隔波濤簡書永埋藏願逢希夷使水土還故常宋藝圃集李育育字仲蒙吳人皇祐元年進士飛騎橋魏人野戰如鷹揚吳人水戰如龍驤氣吞魏王惟吳王建旗敢到新城旁霸主心當萬夫敵麾下倉皇無羽翼途窮事變接短兵生死之間不容息馬奔津橋橋半撤洶洶有聲如地裂蛟怒橫飛秋水空鶚驚徑度秋雲缺奮迅金羈汗霑臆濟主艱難天借力艱難始是報主時平日主君須愛惜避暑録話吳志孫權征合肥為魏將張遼所襲乘駿馬上津橋橋板撤丈餘超度得免故以名橋今在廬州境中育有詩云云錢公輔公輔字君倚常州武進人皇祐元年進士知明州進知制誥神宗朝拜天章閣待制知諫院出知揚州衆樂亭詩并序衆樂亭居南湖之中南湖又居城之中望之真如方丈瀛洲焉以其近而易至四時勝賞得以與民共之民之遊者環觀無窮而終日不厭孟子曰獨樂與衆樂孰樂不若與衆衆樂之名于是乎書既又為詩以記真景之萬一云誰把江湖付此翁江湖更在廣城中葺成世界三千景占得鵬天九萬風宴豆四時喧畫鼓遊人兩岸跨長虹他年若數東南勝須作蓬萊第一宫延祐四明志寄題翠麓寺呈伯強寺丞曩時曽作家山遊亭有翠麓排新幽疏軒密牖竹鏘戛烈風徑雨松颼飀呀然出户瞰山足屹然數竿圍上頭掃除雲峯聳客步煎煮錫水供茶甌我時既合衆賔飲醉岸山幘心遲留山僧顧我丐詩榜詩未脫吻驚旋輈四方環走倐已晚十載負約今相酬珍藍增葺想勝舊我已白首縻藩州何當一賦歸去來再款巖室空披搜吾宗道人正嘉遁擺脫世上無窮憂欣逢主人賢且令泉石笑傲都相求上人灑掃莫暫間行行逆我西來舟惠山古今考馮浩浩仁宗朝集賢校理知鄆州遙贈錢公輔嘗聞衆樂亭未窺衆樂景今蒙貺新詩若得暫觀省萬象盈紙來孤風隨筆騁丹青慙近工造化與遙領因識主人懷殆非郡侯政所寄嬉遊中期歡衆庶競無俾一夫愁將和四時盛此而推是心況乎持大柄青山緑水佳百草千花勝吾將因宦遊異日細謠詠鄞縣志吕誨誨字獻可開封人端之孫第進士官殿中侍御史熙寧初為御史中丞與王安石不合出知鄧州提舉崇福宫致仕卒贈通議大夫和邵堯夫見寄時知鄧州冥冥鴻羽在雲天邈阻風音已十年不謂聖朝求治理尚容遺逸卧林泉羡君自有隨時樂顧我官間飽晝眠應笑無成三黜後病衰方始賦歸田聞見前録趙君錫君錫字無愧洛陽人舉進士為宗正丞元祐中拜御史中丞以天章閣待制出知應天府紹聖中貶少府監分司南京入黨籍紀事送太師潞公西歸樂人多用教坊家席上羣公換口誇內裏宣來蕉葉盞御前賜出縷金花坐上才初佳句傳中官寫得便聞天聖人合笑搜尋了依韻當時賜和篇西苑重排餞會時新篇御製降彤墀明朝上巳無公事赴宴臣僚總進詩文昌雜録趙君錫作小詩二十篇紀恩寵以送潞公其尤為人傳誦者三章雖王建宫詞無以過此也姚闢闢字子張金壇人皇祐元年進士歷官項城令通州通判與蘇洵同修禮書歐陽公甚稱之挽老蘇先生羈旅都門十載中轉頭浮宦已成空青衫暫寄文安宅白社長留處士風萬里雲山歸故國一帆江月照疏篷世間窮達何須校只有聲名是至公蘇集附望文脊山懷瞿硎先生文脊山中姓已逃江城爭美少微髙應知司馬來窺鼎便學秦人去種桃海上音書斷鴻雁洞中吟嘯伴猿猱鹿裘誰識先生志卻把虛詞倚伏滔寧國府志范純仁王辟疆純仁字堯夫仲淹次子皇祐元年進士神宗朝纍擢天章閣待制哲宗朝落職貶永州安置建中靖國初召為光祿卿分司南京卒贈開府儀同三司諡忠宣與黨籍有集寒食日泛舟合友逢佳節攜尊泛碧流溪風消酒力煙樹入春愁羣鴨開波練疏雲透月鉤平生懷古意最羡五湖逰和吳仲庶春遊海雲寺東郊行樂冠西州古寺岧嶤翠嶺頭化俗文翁傳愷悌尋山謝傅繼風流天涯尊酒欣相遇劒外三春得共遊雅興直須窮勝賞年光難使隙駒留和吳仲庶龍圗西園海棠丹葩翠葉競妖濃蜂蝶翩翩弄暖風濯雨正疑宫錦爛媚晴先奪曉霞紅芬菲劒外從來勝歡賞天涯為爾同卻想鄉關足塵土只應能見畫圖中和鄭通議青州范公泉勝概因人得久存此泉疏鑿自先君澄源不負當時意清影猶涵昔日雲養正迥當深澗下朝宗應與衆流分今逢賢帥光陳迹名逐新詩海內聞遊嵩山與王弱翁聨句靈境中天秀辟疆雄名古到今位尊朝列嶽純仁勢重壓千岑靜鎖神仙宅辟疆高盤宇宙心孤稜標日月純仁絶仞倚戈鐔彩棟靈祠邃辟疆層簷淨剎深民祈傳覡語純仁國祀致君忱碑古苔生字辟疆堂虛畫蠹金山呼曽薦夀純仁神降即為霖事怪塗山石少室山下有啓母石辟疆形端玉女砧峯巒排翠玉純仁灘瀨潄鳴琴蕙帳人誰繼辟疆金泥迹可尋唐經藏寶妙純仁魏殿想鸞音會善寺魏文帝離宫雲作他方雨辟疆松連别院隂谷泉長浸斗山有七星泉純仁頂路欲捫參探穴夢潛動辟疆捫蘿力不禁箕熊分蟻垤純仁伊洛認蹄涔鳥道樵夫去辟疆龍潭驛使臨衆仙停羽駕頂有八仙壇仁純昔帝儼宸襟山有玄宗御容選勝先看記辟疆乘危可作針天門開四極山有東西二天門純仁樹品冠雙林少林有則天一品松五品松靈藥看苖斸辟疆香醪挈榼斟道宫庭不掃純仁學館突無黔山有書院壟麥風搖浪辟疆溪淙石聳簪雜花春爛漫純仁老木夜蕭森夕照河光接辟疆晴嵐塔影侵深崖藏積雪純仁虛壑響幽禽溪月寒澄霽辟疆巖煙暮杳沈寺橋橫螮蝀純仁禪磬擊璆琳拂壁題新字辟疆逢僧舉舊吟疲驂何處解純仁髙閣在﨑嶔辟疆以上范忠宣公集王霽和吳公仲庶遊海雲寺大帥新謠十五州殘春摸石是遨頭氲氲喜氣隨民遍冉冉風光盡日流野俗只知觀宴賞主人非獨為嬉遊晚回都騎簫鼙引觀稼郊原亦暫留成都文類馮介和吳公仲庶遊海雲寺及時行樂慰刀州曉背重城信馬頭彩石散隨香被去芳塵紛逐鈿車流匆匆曲水當年會草草東山舊日遊不是海雲今獨勝清風長共好詩留成都文類楊希元和吳公仲庶遊海雲寺三春行樂盛刀州況是春光欲盡頭使節在郊觀似堵香輪爭道去如流正逢鈴閣多間日肻對花時負勝遊會得公心惜歡意欲歸猶自儘遲留成都文類張湍和吳公仲庶遊海雲寺海雲真賞甲刀州十里春光拂馬頭花酒價髙分宴樂綺羅人好助風流出郊行斾從編俗摸石居民事勝遊斜日歡心猶未足藩侯歸轡為遲留成都文類薛繗和吳公仲庶遊海雲寺寺占靈峯更近州喧闐騶從錦瀍頭歌鐘乍奏晴雷殷戈甲急趨春水流幾處醉眠方枕藉一城謠俗重嬉遊賢侯惠意民知否幾刻嚴闉為爾留成都文類楊咸章咸章字晦之蜀人梵安寺內浣溪四老唱和詩有序伏覩益之奉議尊兄欲于浣花梵安寺之普賢約漢公子臧作三老會又築堂繪像榜曰三老誠蜀中之盛事咸章方調官武信敢卜謝事少陪雅集輒更為四老因賦拙詩上浼清覽聞説懸車三老儒約為繪像訪僧居蟹螯杯酒歡無極鼎足韜裘樂有餘暑簟共觀岷嶺雪春盤同膾蜀江魚歸來一榻如相許須信逍遙倍二疏成都文類楊損之損之字益之蜀人宗弟晦之通直有詩陳武信歸簉三老之後損之喜繼元韻以勉之未拋名利尚區區方卜榮遷武信居思簉林泉三老後已經年紀七旬餘且來在野同遊鹿莫學臨淵卻羡魚子美堂鄰願為約免教朋友舊情疏成都文類任傑傑字漢公蜀人傑衰朽無取辱益之見招同諸友為四老會晦之承議有詩傑謹次其韻夫子關西出衆儒肻來尋我卜幽居忘憂棊局真佳趣投老詩篇是緒餘故舊已蒙吟伐木太平只恐罩嘉魚主人醉指前溪路松菊清涼月影疏成都文類楊武仲武仲字子臧蜀人武伸伏承益之奉議轉示晦之佳什謹依元韻次和素髮龎眉一陋儒常陪龍友到禪居我隨益者誠多幸人歎賢哉愧有餘坐上共飛純玉斝腰間齊佩白銀魚髙吟清論常終日會數朋交信不疏成都文類吕陶陶蜀人昨日漢公承議見召與三老友談笑大醉退而作詩少謝勤意六十年前里巷遊北歸重此接交儔據鞍矍鑠誇朱紱把酒殷勤勸白頭況是三春逢美景何妨一笑斷多愁間中嵗月非難遣須得新詩事唱酬和吳公仲庶遊海雲寺玉節重來鎮此州暫驅千騎上峯頭春闌好為良辰惜俗樂誰知急景流山色也疑今日盛物情渾勝頃年遊登臨賦詠應難再持語鄉人早借留以上成都文類葛琳和運使學士浣花亭韻井絡西南區成都號佳麗錦城十里外物景居然異傍縈浣花溪中開布金地杜宅巋遺址任祠載經祀按蜀記梵安寺乃杜甫舊宅在浣花去城十里大歷中節度使崔寧妻任氏亦居之後捨為寺人為立廟于其中每嵗四月十九凡三日衆遨樂于此自昔嵗一遊有亭久摧廢將期泛舟會先此留旌騎弗基矧肻構後人莫豫嗣冠蓋或戾止風雨無所庇我公至之初行樂徇人意柅車集賔組幕天陳燕器茍弗謀髙明胡為革偷敝鳩工度材用奢儉求中制舉從縣官給下靡秋毫費巍然大厦成甚于折枝易藩條息偃暇時律清和際落成及休辰夙駕欣重詣羣嬉逐使轂雜處同蠶市棟宇美可觀席筵陳有次芳尊既罷撤綵舲妥登憩夾岸布緹帟中流喧鼓吹泝沿煙靄間禽魚共翔戲都人與士女疊足連帷被弄珠疑漢曲浮觴均洛禊暗暗日將暮熙熙衆皆醉恍入武陵源卻返塵寰世自是畢遨賞始復專民事農耕士就學商販工居肆蜀邦生齒繁衣食良艱匱三時急耕播寸壤無遺棄兹焉俾暇逸所以慰勤瘁上賴天子心慎重坤維寄既擇邇臣德來秉諸侯瑞且命太史賢出攬澄清轡第務廣教育孜孜布仁惠匪圗亟聚斂規規奉邦計和氣斯涵濡羣生皆茂遂乃躋富夀域共樂升平治不才備屬僚罔補公家利廕宇幸焉依雅聲慙善繼願比召南篇永歌棠蔽芾成都文類費著嵗華紀麗譜四月十九日浣花佑聖夫人誕日也太守出笮橋門至梵安寺謁夫人祠就宴于寺之設廳既宴登舟觀諸軍騎射倡樂導前泝流至百花潭觀水嬉競渡官舫民船乘流上下或幕帟水濵以事遊賞最為出郊之勝周敦頤敦頤字茂叔道州營道人以舅龍圗閣學士鄭向恩補官熙寧初纍官至廣東轉運判官提點刑獄因疾求知南康軍築室廬阜下號曰濓溪嘉定中諡元公淳祐中封汝南伯從祀孔子廟庭有集同宋復古遊大林寺三月僧房暖林花互照明路盤層頂上人在半空行水色雲含白禽聲谷應清天風拂襟袖縹眇覺身輕靜思篇靜思歸舊隱日出半山晴醉榻雲籠潤吟窗瀑瀉清得間方達士失計只勞生朝市誰頭白車輪未曉鳴題春晚花落柴門掩夕暉昏鴉數點傍林飛吟餘小立闌干外遙見樵漁一路歸題濓溪書堂元子溪曰瀼相傳到于今此俗良易化不欺顧相欽廬山我所愛買田山之隂田間有清水清泚出山心山心無塵土白石照沈沈潺湲來數里到此始澄深書堂構其上隱几看雲岑倚梧或敧枕風月盈沖襟有時吟復默酒罷鳴幽琴數十黃卷軸賢聖談無音窗前即疇圃圃外桑麻林芋蔬可卒嵗絹布足衣衾吾樂蓋易足名濓以自針誰為相朝暮岸木寒蕭森以上濓溪集郭獬送吳中復守長沙初登西漢文章府便領吳王第一州繞郭白雲衡嶽近滿帆明月洞庭秋淵鑑類函王吉吉淮東人試校書郎遊琅邪呈鋭公長老踏石披雲一徑通翠微環合見神宫峯巒鬱密泉聲上樓殿參差樹色中子夜千溪分水月清秋十里韻松風平生久佇名山約吟賞今才信宿同南滁會景編周圻圻尚書都官員外郎通判滁州事遊琅邪寺杉松夾道緑森森古寺尤欣結客尋殿閣長時異香滿亭臺佳處白雲深清泉迸石落寒谷幽鳥避人穿茂林緩步間看舊題詠盆池蓮葉幾浮沈南滁會景編安昌期昌期皇祐初舉進士調永定尉去官放浪山水間題清遠峽和光洞蕙帳將辭去猿猱不忍啼琴書自為樂朋友孰相攜丹竈非吾藥青雲别有梯峽山豫暫隱人莫擬夷齊萬姓統譜趙抗揚杭揚抃二弟皇祐間抃為江源令抗揚與俱引流聨句有抃序江源縣江繚治廨址而東距三百步瀧湍馳激朝暮嗚在耳使人聽愛弗倦遂臿渠通民田來囿亭階廡間環回旋繞溝行沼渟起居遊觀清快心目公暇事休與弟抗揚坐東軒樂然盤桓共為詩章云别派從江垠邀流入農畎淙淙來源深㶁㶁度溝淺疏功浹旬畢溉利千步遠田觀疑澤瀦坎聽類瓴建波行拂落葉浸長浮生蘚孤鶴眼怪窺纖魚鬛跳展映葦色莫分喧琴韻難辨增霖晨閙蛙涵月夜驚犬憐黃澆菊籬惜紫沃蘭畹吏治窯甓甃童戲芒車卷灌攜合手勞潄掬致腰俯庭秋臨加涼軒夏向消炟我矜近濟能僮賀遙沒免貯戺理巨甔歸廚架修筧供淘飯盎糧給澳羮鼎臠調藥修舊餌煎茶試新荈坐客頻泛觴蹲兒屢滌硯聆寒心脫煩挹冷酒除面間眺笻步隨靜看髭吟撚髙懷造文攄清興團詩遣題為引流篇記耳非自衒名勝志宋詩紀事卷十八
