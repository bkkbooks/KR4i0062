body:
  text: 宋詩紀事巻十七錢塘厲鶚撰強至至字幾聖錢唐人慶歴六年進士刻苦攻詩韓魏公甚重之官祠部員外郎有集墨蟹瑣瑣江湖中忽在幽人壁短螯利雙鉞長跪生六戟骨眼驚自然熟視審精墨初疑蟺穴束猶帶浮泥黑横行竟何從躁心固已息終朝牆壁閒頗有肥霜色我來空持杯左手莫汝食誰奪造化功生成歸筆力蟹略賈麟自睦來杭復將如蘇戲贈短句春風那復繫狂游朝醉桐江暮栁洲大手千篇随地埽一身四海逐雲浮榮名不落閒宵夢退築聊為晚嵗謀老橘殘鱸猶有興片心還起洞庭舟瀛奎律髄句士良士良成都人慶歴六年進士和呉中復太守春遊海雲寺佛土依山福逺州春行繡騎上雲頭補天彩石盈池在朝海清江繞寺流四國仰煩郇伯勞羣生翹望謝安遊早知為礪為霖意惟有西民欲暫畱成都文類陳舜俞舜俞字令舉烏程人慶歴六年進士嘉祐四年登制科歴都官員外郎坐詆新法謫南康酒稅赦還卒嘗居秀州之白牛村自號白牛居士有集棲賢寺辟蛇行者應開寺拭眼髙僧尚有墳龍帶雨歸三峽水鳥銜花出五峯雲方輿勝覽騎牛歌我騎牛君莫笑人閒萬事從吾好千金市骨駿馬來乗肥大躍湏年少蒲為鞭草為轡瀑布山前松徑裏看山聽水要行遲輕䇿緩驅塵不起布袍葛帶烏接䍦山家裝束不時宜匏尊注酒就背飲皁囊貯書當角垂我狂吟醉欲倒同醉同吟白雲老此老不可天下人一住廬山三十春聲如洪鐘目如電七十神光射人面上牛下牛不要扶合與山中作畫圗汴州馬上顧何如春泥沒腹仍濺㡌夜半歸來人亦痡天真䘮盡百憂集衣食毛髮歸妻孥爭如來騎牛水光山色俱悠悠梅磵詩話陳舜俞令舉嘉禾人慶歴中登進士乙科嘉祐四年中制科宰越之山隂秩滿當召試館職㑹朝廷行青苖法上書力詆時政謫監南康軍酒稅到官與劉太博凝之日跨雙犢以窮匡廬泉石之勝此歌世爭傳之後遇赦還鄉絶意仕進元豐中卒𦵏於吾鄉南門外之蘇灣距城僅三里許過者必式焉淵明醉石活活飛泉清繞石悠悠天幕翠鋪空是非分付千鍾裏日月銷磨一醉中栁絮任飄荒徑畔菊花仍在舊籬中水聲山色年年好尚使游人想素風廬山紀事和開祖丹陽别子瞻後寄仙舟繫栁野橋東㑹合情多勞謫翁相對一尊浮蟻酒輕寒二月小桃風羇懐散誕謳歌裏世事縱横醉笑中莫恨明朝又離索人生何處不悤悤瀛奎律髓林屋洞洞天三十六第九曰林屋神仙固難名瓌怪存紀錄曠嵗懷尋賞兹晨幸臨矚馳神在真游豈復懦深谷解韈納芒履然松命光燭初行已傴僂漸入但匍匐顧瞻避衝磕濘淖沒手足如此百餘歩始可立寓目或垂若鐘虡或植若旌纛有如案而平有如几而曲鐫刻非人工晶瑩燦黄玉遥知竅穴外定有金庭錄凡肥不可往叩擊安敢黷鸞鳯無消息但見白蝙蝠却還望㣲明既出猶喘促霑衣憐石髓孰悔泥塗辱庶幾達㣲慕養生相吾福毛公壇古壇疊亂石草木何參差黄衣守其傍陳蹟刋豐碑曰初劉真人齒髪不可訾但見紺綠毛被體鬖鬖垂雲軿一日去空山畱庭壝弟子散巖谷荆榛蔽荒基晚有周息元探訪親斬披白鹿忽跪前靈符見葳蕤地勝人既偶凝嚴起寳祠束帛下幽聘良馬維素絲前朝揖高風有美皮陸詩殆今三百年事去物亦隳喬松委樵蘇野蔓號狐狸惟有鍊丹井甘冽無等夷一酌匪消渇飲慕尚神禧以上震澤編王存存字正仲丹陽人慶厯六年進士神宗朝歴龍圗閣直學士知開封府拜兵部尚書哲宗朝累官尚書左丞以端明殿學士知蔡州紹聖初提舉崇禧觀致仕卒贈左銀青光祿大夫與黨籍史院席上奉和首相呉公元韻上聖論思著前言摭緒餘瓊筵初賜醴石室載紬書徽範貽來者功成念昔歟欲知開局盛門擁相君車揮麈後錄遊焦山連山擁滄江峭絶視兹鮮由來一氣結殊不麗衆巘林深鳥聲悅境静人自逺方吾抱幽介對此萬慮遣京口三山志登北固山晚登北固頂俛視南徐城廢壘何茫茫山川迥縱横千載競誰有六朝空戰爭豪氣不可問古墳人正耕過丹陽舊居漂泊經故國繫舟款柴扉破屋他人居昔鄰今或非父老迎我飲祝我晝錦衣我謝父老言朴拙非所祈一官走塵土實廹寒與飢去鄉未幾載頗覺儔侣稀人事已可嗟況當白首歸泚泚練塘水綠楊䕃漁磯有田尚可耕誓將父老依以上鎮江府志句珠韉錫御恩猶在玉輦親扶事已空孔平仲談苑光獻曹太皇嘗作珠子鞍轡上施紅羅銷金坐子賜神宗神宗駕幸金明池遂乗此韉太皇太后病稍閒神宗親製一小輦極為輕巧以珠玉黄金飾之進於太皇遂載而之涼殿太后扶其左神宗扶其右太皇下輦曰官家太后親自扶輦當時在曹家作女時安知有今日之盛喜見顔色王正仲進光獻挽詞云云蓋用此兩事也韓絳絳字子華靈夀人徙雍丘忠獻公億子慶厯中進士歴翰林學士御史中丞神宗朝拜同中書門下平章事封康國公卒贈太傅諡獻肅韓元吉桐隂舊話獻肅公諱絳字子華發觧過省殿試皆第三以元祐三年三月薨皆三數亦異事也故蘇魏公挽詩云三登慶歴三人第四入熙寜四輔導蓋公自樞副遷參政宣撫陕右即軍中拜昭文相再入史館相也復齋漫錄子華兄弟皆為宰相其家呼為三相公呼持國為五相公云又京師人呼為桐木韓家蓋公家門有梧桐木取為稱以别魏公子華沒陸農師為挽章以記之所謂棠棣行中為宰相梧桐名上識韓家是也子華以辰年辰月辰日辰時薨農師又詩云非關庚子曽占鵩自是辰年併值龍游鴻慶院乆旱雨初足樂游春正深喧闐觀士女清曠入山林佛界雲成寳僧園地布金方塘探子石髙閣盍朋簪沙水通溪白松筠逐徑隂紛華從滿目幽寂自虚心印組端為累巖扃得蹔尋晩風吹綠野歸騎已駸駸成都文類和范蜀公題蜀中花圖徑尺千餘朶矜誇古復今錦城春物異粉面瑞雲深賞愛難忘酒珍竒不廢金應知色空理夢幻即懽心聲畫集謁仙翁祠書山蓀亭玉井不可到玉泉聊可尋馬行穿亂石人語入深林川迥沙明色溪喧谷響音我來方六月雲榭一披襟華嶽全集韓維維字持國絳弟以廕入仕英宗朝累除知制誥神宗即位為翰林學士加承㫖元祐初拜門下侍郎以太子少傳致仕紹聖中坐元祐黨謫均州安置元符初復官卒有南陽集寄孔寜極雨滴菴上茅風亂窗前竹繁聲互入耳欲寐不得熟緬懐田舎翁石徑滑馬足連山暗秋燈一路何處宿過庭錄持國守許孔居郊常具車馬邀致郡治之養真菴同衾促膝快論人間事乆而後歸一夕大雨孔告還持國獨寢菴中寄詩云云下横嶺望寜極舍驅車下横嶺西走龍陽道青煙幾人家綠野四山抱鳥啼春意䦨林變夏隂早應近先生廬民風故醇好王直方詩話韓持國嘗有詩云青煙幾人家綠野山四抱當時無不傳之同曼叔游菩提寺高城如破崖寺帶喬木古禪房掩清晝佛畫剝寒雨荒池野蔓合濁水佳蓮吐蕭條聨騎游淡薄對僧語秋風日夕好勝事從此數盧溪盧攜讀書處伊人沒已乆溪澑亦如綫淳氣揖老僧清隂坐春院始悟入山深幽林鳥聲變西溪我從南嶺來引轡下雲木不知溪流處但見翠滿谷涼葉覆山泉修篁翳茅屋奉同原父賦澄心堂紙江南國土未破前澄心名紙世已傳髙堂乆傾不復見誰謂此物猶依然當時萬杵擣雲葉鋪出几案滑且堅剡溪藤骨不足數蜀江玉屑誰復憐君臣嬉燕盛文采駢章麗句鬬巧儇一朝零落随散地中原篋笥生光鮮君安得此尚百幅題以大句先羣賢羣賢落筆富精麗瓊琚寳玦相鉤聨嗟予材力豈當敵雖欲強賦何能妍獨耽玩物古所戒崇尚浮藻政豈先江南可哀紙可惜後有觀者存吾篇王直方詩話澄心堂紙乃江南李後主所製國初亦不甚以為貴自劉貢甫首為題之又邀諸公賦之然後世以為貴重貢甫詩云當時百金售一幅澄心堂中千萬軸後人聞名寜復得就令得之亦不識文忠公詩云君不見曼卿子美真竒材乆已零落埋黄埃君家雖有澄心紙有敢下筆知誰哉梅聖俞云寒溪浸紙春夜月敲冰舉簾勻割指焙乾堅滑若鋪玉一幅百金曽不儗柬坡云詩老囊空一不畱一番曽作百金收又從宋肇求此紙云知君也厭雕肝腎分我江南數斛愁同化光陪寜極之滍陽城不踏南溪路于今又幾春能來共聨轡還是舊游人載酒真乗興談經或入神歡餘不無媿林壑可還身杜君章家賦海棠濯錦江頭千萬枝當年未解惜芳菲而今得向君家見不怕春寒雨溼衣石林詩話韓持國雖剛果特立風節凜然而情致風流絶出時輩許昌崔象之舊第今為杜君章所有廳後小亭僅丈餘舊有海棠兩株每花開時持國輒載酒日飲其下嵗以為常至今故老猶能言之韓忠獻公嘗帥蜀持國兄弟皆侍行尚少故前兩句云酴醿平生為愛此香濃仰面常迎落架風毎恐春歸有遺恨典刑猶在酒杯中以上南陽集程伯淳自洛過訪時范純禮亦居潁昌作詩示之閉門讀易程夫子清坐焚香范使君顧我未能忘世味綠尊紅妓對斜曛苕溪漁隠叢話句數畝家園荒杞菊一池秋水沸龜魚雪浪齋日記韓持國句前人評云沸字直錢一笛西風吹落日滿帆行客背孤城合璧事類後集韓縝縝字玉汝維之弟第進士英宗朝歴淮南轉運使神宗朝累知樞宻院事哲宗朝拜尚書右僕射兼中書侍郎出知潁昌府以太子太保致仕卒贈司空崇國公諡莊敏桐隂舊話莊敏公縝初求字於歐陽文忠公公以小合幅紙書玉女二字送來莊敏大不樂明日相見猶有愠容文忠公曰出處無㸃水君何怪邪取筆添女字三㸃相與一笑蓋詩中王欲玉女但音發作汝也前輩亦雅戲如此苕溪漁隠叢話東坡云韓縝為秦州酷暴少恩以賊殺不辜去官秦人語云寧逄乳虎莫逄韓玉汝孫臨最善滑稽尤善對或曰莫逄韓玉汝當以何對臨應聲曰可怕李金吾天下以為口實可怕李金吾乃杜子美詩東山寺久有東林約因乗暇日游眼明初出郭神王欲凌秋野曠鶱孤隼江清颺逺鷗近山青嶂合多稼綠雲浮雞犬聲相接溝塍水亂流度橋喧從騎環樹轉鳴騶問俗驚堯壤尋僧到沃洲深沈開寳闥磅礴􅦫華輈像設嚴珠殿經聲隱絳幬仰看香刹直徐歩畫廊脩遇物皆周覽逄軒即少畱前庭初顯豁後徑轉深幽野嶺蒼筠麗霜楓赤葉稠隔牆聞好鳥循沼玩游鯈翠榦椶纔剝紅芒稻半收凌虚登陛道帀境對岑樓暗谷藏危棧平沙際别州川原同聚沫身世劇浮鷗回首飄鄉思臨尊浣客愁清閒資善奕決勝在冥搜影動穰苴表風生曲逆籌歸鞍不敢緩斜日照文楸四朝詩邵亢亢字興宗丹陽人舉茂才入等神宗朝歴樞宻直學士知開封府拜樞宻副使以資政殿學士知外郡卒贈吏部尚書諡安簡寄呉處厚流年真似隙中駒别後情懐嬾更踈天上又頒新厯日牀頭未答故人書殷勤羔雁工曹檄狼藉杯盤上客魚好在仲宣家萬里從軍苦樂定何如青箱雜記樞宻邵公亢謂余詩似樂天熙寜中余辟定武帥幕公自鄆附所作詩一軸并寄余詩張掞掞字文裕齊州歴城人舉進士累遷龍圗閣知成都軍英宗朝為戸部侍郎致仕熙寜中卒賀執政入東西府熙寜中始建東西府宣執政遷秩借官車輦仍賜御筵五仙同日集蓬萊玉宇珠簾次第開乍向壺中窺日月猶疑海上見樓臺光生金鉉調元地榮極璿樞命世才共荷聖賢天地寵定知霖雨及時來李壁王荆文公詩注丁偃偃蘇州人仁宗朝進士句白虎前芳掩金華舊事輕天心非不寤垂意在蒼生省試邇英延講藝温公詩話郟修輔修輔慶歴中以大理寺丞為豐城令至和元年為奉化令隱潭在奉化縣西北在昔知何人鑿破青山骨飛泉直下來千尺瀉倐忽兩壁蒼翠閒一陣風雷突傍無塵埃蹤中有蛟龍窟寒氣不可嚮猛勢豈能屈安得當旱年為霖濟羣物四明龍薈張師錫師錫開封襄邑人工部侍郎去華子仁宗朝仕至殿中丞老兒詩五十韻鬢髮盡皤然眉分白雪鮮週遮延客話傴僂抱孫憐無病常供粥非寒亦衣綿假温衾擁背借力杖搘肩貌比三峯老年過四皓仙喚方離枕上扶始到門前每愛烹山茗常嫌飣石蓮耳聾如塞纊眼暗似籠煙宴坐羸凭几乗騎困嚲鞭頭搖如轉旋脣動若抽牽骨冷愁離火牙疼怯漱泉形骸將就木囊橐尚貪錢膠睫乾眵綴黏髭冷涕懸披裘腰嬾繫濯手袖慵揎擡舉衣頻換扶持藥屢煎坐多茵易破行少履難穿喜婢裁帬布嗔妻買粉鈿房敎深下幕牀遣厚鋪氊琴聽憐三樂圗張笑七賢看經嫌字小敲磬喜聲圓食罷羮流袂杯餘酒帶涎樂來湏遣罷醫到乆相延裹帽縱横掠梳頭取次纏長吁思往事多感聽哀絃氣注腰還重風牽口更偏墓松先遣種誌石預教鐫客到唯求藥僧來忽問禪養茶懸竈壁曬艾曝簷椽怒僕空睜眼嗔兒謾握拳心驚嫌蹴踘腳輭怕秋千局縮同寒狖摧豗似餓鳶觀瞻多目眩舉動即頭旋女嫁求紅燭男婚乞綵錢已聞頒几杖寜更佩韋弦賔客身非與去聲兒孫事已傳養和屏作伴如意拂相連乆棄登山屐惟存負郭田呻吟朝不樂展轉夜無眠呼稚臨牀畔看書就枕邉冷疑懐貯水虚訝耳聞蟬束帛非無分安車信有緣伏生甘坐末絳老讓行先拘急將風夜昏沈欲雨天雞皮塵漸漬齯齒食頻填每憶居郎署常思釣渭川喜逄迎佛㑹羞赴賞花筵徑狹容移檻堦危索減甎好生焚鳥網惡殺拆漁船既感桑榆日常嗟蒲栁年長思當弱冠悔不賸狂顛賔退錄喜子登第御榜今朝至見名心始安爾能俱中第吾可遂休官賀客畱連飲家書反覆看世科誰不繼得慰二親難詩話總龜楊備備字修之建平人億之弟慶歴中為尚書虞部員外郎分司南京上輕車都尉有姑蘇百題金陵覽古詩鶚按景定建康志載作金陵詩者楊備字修之張敦頤六朝事蹟作楊修今据文獻通考當與中呉紀聞所載姑蘇百題俱屬楊備六朝事蹟作楊修者筆誤也夢中作月俸蚨錢數甚㣲不知從宦幾時歸東呉一片煙波在欲問何人買釣磯中呉紀聞楊郎中天聖中為長溪令夢中忽作詩云云及寤心潛異之明道初宰華亭俄丁内艱遂家于呉中樂其風土之美安而弗遷因悟夢中所作幾于前定嘗效白體作我愛姑蘇好十章又作姑蘇百題詩每題箋釋其事蠡口霸越勲名閒世才五湖煙浪一帆開猶防烏喙傷同輩此地復招文種來華山精舍巖屏晚樹噪寒鴉嵐翠樓臺釋子家池面鑑光功徳水金波影裏石蓮花汎太湖漁舠載酒日相隨一笛蘆花深處吹湖面風收雲影散水天反照碧琉璃姑蘇臺山花野草一荒丘雲裏驕奢舊蹟畱珠翠管弦人不見上頭麋鹿至今遊響屧廊歩歩香翻羅韈塵粉紅花豔滿宫春傾城一笑無遺迹不見長廊響屧人洗馬池在蘓州郡學南一一牽來種是龍臨波深下更嘶風金鞍玉勒抛何處騰踏渥洼寒影中以上呉郡志新亭滿目江山異洛陽北人懐土淚干行不知亡國中書令歸老新亭是故鄉晉新宫玉案金爐對御牀巋然應似魯靈光螭頭直下雙魚尾不讓西京舊栢梁蠶堂摘繭抽絲女在機茅簷葦箔舊堂扉年年桑柘如雲綠翻織誰家錦地衣臺城六朝遺蹟好山川宫闕灰寒草樹煙江令白頭歸故國多情合賦黍離篇層城觀亦名穿針樓秋星如彈月如梳宫妓香添乞巧爐萬縷千針同一意眼穿腸斷得知無秦淮一氣東南王斗牛祖龍潛為子孫憂金陵地脈何曽斷不覺真人已姓劉獨足臺鳥跡分明在帝臺管弦聲裏戰書來回頭一覺風流夢猶得朱門傍水開胭脂井擒虎戈矛滿六宫春花無樹不秋風蒼黄益見多情處同穴甘心赴井中以上六朝事蹟張俞俞字少愚益州郫人屢舉不第用薦除祕書省校書郎願以授父顯忠而自隱於家文彦博治蜀為築室青城山白雲溪以處之號白雲先生有白雲集宋史隱逸傳俞六召不應其卒也妻蒲氏名芝賢而有文為之誄曰髙視往古哲士實殷施及秦漢餘烈氛氲挺生英傑卓爾逸羣孰為今世亦有其人其人伊何白雲隱君嘗曰丈夫趨世不偶仕非其志祿不可茍營營末途非吾所守吾生有涯少實多艱窮亦自固困亦不顛不貴人爵知命樂天脫簪散髮眠雲聽泉有峯千仞有溪數曲廣成遺趾呉興髙躅䟽石通徑依林架屋麋鹿同羣晝游夜息嶺月破雲秋霖灑竹清意何窮真心自得放言遺慮何榮何辱孟春感疾閉户不出豈期遂往英標永隔抒詞哽噎揮涕汍瀾人誰無死惜乎材賢已矣吾人嗚呼哀哉遊驪山玉帝樓前鎖碧霞終年培養牡丹芽不妨野鹿踰垣入銜出宫中第一花青瑣髙議題漢州妓項帊羅蜀國佳人號細腰東臺御史惜妖嬈從今喚作楊臺栁舞盡春風萬萬條邵伯温聞見前錄慶歴間文潞公知成都府年未四十多讌集有飛語至京師御史何郯聖從因謁告歸上遣伺察之聖從將至潞公亦為之動少愚謂公曰聖從之來無足念因迎見於漢州㑹有營妓善舞聖從喜之問其姓妓曰楊聖從曰所謂楊臺栁者少愚即取妓之項帊羅題詩云云命其妓作栁枝詞歌之聖從為之霑醉後數日聖從至成都頗嚴重一日潞公大作樂迎其妓雜府妓中歌少愚之詩以酌聖從毎為之醉聖從還朝潞公之謗乃息楚中作渺渺洞庭野蕭蕭黄鶴樓水通雲夢浦人渡沔陽舟廣澤侵呉壤孤城接郢丘山分三楚斷溪入九江流寂寞休兵月紛紜戰國秋呉生來赤壁魏武定荆州六代慿形勢羣雄死寇讐凄涼帝子宅浩蕩禰衡洲萬里浮雲暮千年故國愁武昌宫不見麋鹿自羣游潘子真詩話蠶婦昨日入城市歸來淚滿巾徧身羅綺者不是養蠶人宋文鑑謁白帝廟孤山扞江口上有白帝祠横視天下險萬流皆俯窺古殿鎖神物悲風出隂帷天昏瓦棟折狐鼠亦生威優巫日鼔舞鬼怪生奔馳雷霆巻蛟窟雹火燒松枝入戸精魄動有如隂兵随吁哉漢盜亂海内遂崩離赤龍始潛躍逐鹿過秦時公孫奮神劒定蜀圗安危隴坻開北戸荆門啓東陲長驅百萬衆日鬭天下師羣豪插羽翼與漢爭雄雌兩帝不並立興亡良可悲天運雖有在聖賢豈無為昭皇攬英傑襲軌奄重基自注先主武侯風雲共浩蕩千古餘寒碑威神竟不沒萬里震南夷方輿勝覽翠㣲寺翠㣲寺本翠㣲宫樓閣亭臺數十重天子不來僧又死樵夫時倒一株松清波别志蘇麟句近水樓臺先得月向陽花木易為春翰府名談蘇麟為杭州屬縣廵檢范文正鎮錢唐兵官皆獲薦書獨麟在外邑未見收錄麟入府獻詩云云文正薦之王冲次韻范公遊雲門仲淹髙躡五雲堆平看萬象開樵風溪路遠華雨梵天來刹倚三峯直鐘傳萬壑迴叨陪上方燕依約近中台雲門志略霍交和趙閱道遊海雲山山深藏古寺旁枕舊方池鼓響掲雲外石探從水涯使旌遊不倦瑞麥獻相随事簡民同樂歸心莫競馳成都文類任大中大中字子固三衢人老于儒學作詩寒苦趙清獻喜之從清逸老人遊西山夜宿翠巖聨句蒼龍夭矯西北來鑿破明珠成碧岫任何人駕空起樓閣地靈不敢藏餘秀潘鎖窗雲重衣巾潤梳木風清肌骨透任客來一夜與僧談氣覺浩然充宇宙潘絶句莫管流年一擲梭花前對酒且髙歌命中若有終湏有到底無時不奈何以上潘子真詩話送永倅周茂叔還濓溪君去何人最淚流老翁身獨宿南州随君不及秋來鴈直到瀟湘水盡頭廬山志邢夢臣和趙閲道游海雲山使旌驅近郭民宴列芳池洩洩春臺上沈沈暮海涯鴻驚人宛轉電激騎追随此㑹經年至湏防日似馳成都文類白贄和趙閱道題新繁周表權如詔亭亭名詔語宻相沿湏信從來教義全肯構嘗探詩禮業出綸特表父師賢早安素履知文富晩服朱衣稱賞延不是韋家專講學豈聞旛戟到門前成都文類石景立景立溫州郡守迎趙清獻公遊雁蕩鴈蕩天台路險艱多應特地隔塵寰不辭登陟來千里為是東南第一山爭望台星從海上方知蓬島在人間武林二老圗中見重惜官師遠莫攀雁山志劉孝孫和趙閱道題新繁周表權如詔亭義方曽榜舊亭名子已為郎典要城身服上恩今日顯詔符前語是人驚正如伯起鱣堂兆兼勝于公駟閥榮試問繁江諸父老詩書何似寳金籝成都文類張球上吕許公近日㕑中乏短供孩兒啼哭飯籮空母因低語告兒道爺有新詩謁相公青瑣髙議郭從周從周西川人贈何中正三字來時月正圓一麾從此出秦川錢唐春色濃如酒貪醉花間卧不還翠屏筆談何龍圗中正初登第聞西川郭從周精于卜乃以縑素求筮從周作一絶贈之云云後自秦川移杭州而捐館舍從周之筮何其驗歟郟僑僑字子髙亶子晚年自號凝和子鄉人謂之郟長官登翠微作崑山上方有僧屋曰翠㣲行客倦奔馳尋師到翠㣲相看無俗語一笑任天機曲沼淡寒玉横山鎖落暉情根枯未得愛此幾忘歸訪凌峯賢上人歩入凌峯閣尋師師未歸凭䦨寂無語唯見白雲飛為簡公約賦素琴堂素琴之堂虚且清素琴之韻淪杳冥神閒意定默自鳴宫商不動誰與聽堂中道人骨不俗貌龎形端顔瑩玉我嘗見之醒心目寜必絲桐弦斷續嗚呼靖節已死不復聞成虧相半疑昭文阮手鍾耳相吞吐素琴之道詎可論道人道人聽我語紛紛世俗誰師古金徽玉軫方歩武虚堂榜名無自苦以上中呉紀聞陳翥翥字子翔號咸聱子又號銅陵逸民慶歴閒布衣好植桐竹又號桐竹君作桐譜桐竹君詠高桐凌紫霞修篁拂碧雲吾常居其閒自號桐竹君不解放俗利所希脫世紛㑹友但文學啓談皆典墳吁嗟機巧徒反道胡足云桐譜宋詩紀事巻十七
