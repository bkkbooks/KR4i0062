body:
  text: 宋詩紀事巻三十七錢塘厲鶚撰曽幾幾字吉甫贛縣人徙河南以兄弼恤恩授將仕郎試吏部優等賜上舎出身歴校書郎髙宗朝歴江西浙西提刑與秦檜不合去位僑寓上饒居茶山寺自號茶山居士檜死召為秘書少監權禮部侍郎提舉玉隆觀致仕卒諡文清有集詩人玉屑唐人詩喜以兩句道一事茶山詩中多用此體如又從江北路重到竹西亭若無三日雨那復一年秋似知重九日故放兩三花次第繙經集教兒理在亡又得新詩句如聞謦欬音如何萬家縣不見一枝梅此格亦甚省力也又云陸放翁詩本于茶山故趙仲白題曾文清公詩集云清于月出初三夜澹似湯烹第一泉咄咄逼人門弟子劒南巳見一燈傳謂放翁也然茶山之學亦出于韓子蒼三家句律大槩相似至放翁則加豪矣汪彥章内翰除守臨川以詩賀之臨川内史詔除誰里巷傳聞報客知金馬門深曾草制水精宫冷近題詩行看畫隼旌旗入定把書麟筆札隨若訪毘耶舊居士無人問疾鬢成絲三衢道中梅子黄時日日晴小溪泛盡卻山行綠隂不減來時路添得黄鸝四五聲以上前賢小集拾遺題訪戴圖小艇相從本不期剡中雪月並明時不因興盡回舩去那得山隂一段竒賔退錄茶山似病元非病求閒方得閒殘僧六七軰敗屋兩三間野外無供給城中斷往還同行木上坐相與住茶山清波雜志謝路憲送蟹從來歎賞内黄侯風味尊前第一流秖合蹣跚赴湯鼎不須辛苦上糟丘娱書堂詩話内黄侯甚新雪中登王正中書閣對雪誰堪語登樓似欲仙人家修月戸丈室散花天峰疊鉤簾外江横隱几前寒深落雁渚清集釣魚船解病從摩詰消愁得仲宣展書明細字烹茗溼疎煙月好還同夢詩成已下弦明年儻相憶為一到關邊瀛奎律髓諸人見和返魂梅再次韻蠟炬髙花半欲摧斑斑小雨學黄梅有時燕寢香中坐如夢前村雪裏開披拂故令攜袖滿横斜便欲暎窗來重簾幽戸深深閉亦恐風飄不得回瀛奎律髓製香者合諸香令氣味如梅花號之曰返魂梅詩中數句善形容前村雪裡横斜映窗等語挽而歸之于所聞之香既雅潔又標致壬戌歲除作明朝六十歳矣禪榻蕭然丈室空薫銷火冷閉門中光隂大似燭見跋問學秖如船逆風一歳臨分驚老大五更相守笑兒童休言四十明朝過看取霜髥六十翁瀛奎律髓此紹興十二年壬戌也遊張公洞張公洞府未著腳向人浪説遊荆溪欲看直上翠羽蓋不惜扶下青雲梯勁風翻動土囊口暗水流出桃花蹊卻將深處問兒輩一夕飛夢窮攀躋發宜興老境垂垂六十年又將家上鐵頭船客畱陽羨秖三月歸去玉溪無一錢觀水觀山都廢食聽風聽雨不妨眠從今布韤青鞵夢不到張公即善權宜興邵智卿天逺堂目極雲沙静𣺌然邵卿風月過年年雁行滅沒山横晩漁艇空濛水接天南國棠隂春寂寂東風𤓰蔓日綿綿問君許作鄰翁否陽羨溪邊即買田以上咸淳毘陵志聞李泰發參政得旨自便將歸以詩迓之苦遭前政墮危機二十餘年詠式微天上謫仙皆欲殺海濵大老竟來歸故園松菊猶存否舊日人民果是非最小郎君今弱冠别時聞道不勝衣菊坡叢話送倉部吕治先守齊安倉部名大器字治先茶山之壻是生東萊先生成公者齊安剖竹要循良分付吾家坦腹郎賸有江山連赤壁終稀獄訟到黄堂鈴齋晝永宜深念邊瑣秋髙合過防此地元之遺烈在風流容易鬢毛蒼曹氏歴代詩選程堂堂字公明眉山人舉進士為駕部郎中善畫墨竹題成都笮橋觀音院自畫竹無姓無名逼夜來院僧根問苦相猜攜燈笑指屏閒竹記得當年手自栽畫繼翟汝文汝文字公巽丹陽人舉進士累官浙東安撫使紹興初拜翰林學士參知政事卒門人私諡忠惠先生有集焦山水輪依風負坤輿百川東流同灌輸掀巾之陂莽吞受沃焦之山初不濡雲根終久插江湖狂瀾滔天隨巻舒空神迴標避突兀海門排霄岌相扶僧居蠔山迷向背佛宇蜃氣成吹嘘我游𤣥冬崖壑枯洪濤濺雨吹裳裾風來駕潮愁海若溟漲跋浪翻鯨魚虞淵咸池相蕩潏月阿日窟漂方隅此身浮漚一緣聚四大溼相彌空虚鍼鋒懸持妙喜住蟁睫坐睨焦螟居山中老禪眼於菟香飯遣化分彫胡重淵垂涎舞蛟首方丈宴寢凝熏爐夜寒月黑照濁水乞取壊衲摩尼珠京口三山志句青女霜如失黄人日故遲困學紀聞符瑞圖日二黄人守者外國人來降翟公巽云云張擴擴字彦實一字子微鄱陽人崇寧中進士南渡歴中書舎人有東窗集約兄楚材西湖觀梅次韻天上新驂寳輅回看花仍趁雪英開折歸忍負金蕉葉笑插新臨玉鏡臺女堞未須翻角調錦囊先喜助詩材少蓬自是調羮手葉底應尋好句來揮麈餘話彦實知廣徳軍秩滿造朝除著作郎其兄楚材為祕書少監彦實約觀梅西湖楚材有詩彦實次韻云云時楚材再婚故及玉鏡臺事秦㑹之見之大稱賞曰旦夕當以文字官相處遷擢左史再遷而掌外制戱成二毫筆絕句包羞曽借虎皮蒙筆陣仍推作鋒未用吹毛强分别即今同受管城封揮麈餘話楊原仲與彦實並居西掖代言多彦實與之潤色偶成二毫筆絶句原仲以為誚巳愬之會之訹言路彈之彦實罷為宫祠送顧景繁暫歸浙西牆頭飛花如雪委牆根老栁絲垂地春正濃時君不畱山路曉風鳴馬箠濤江入眼浪千尺想見吳儂問行李田園久荒漫檢校親舊相逢半悲喜行朝諸公訪人材故人新賜尚書履袖中有䇿則可陳君亦因行聊爾耳贈顧景繁顧侯風味更嚴苦家貧闕辨三韭菹龜腸撐突五千巻底用㑹稡箋蟲魚虎頭文字逼前輩衮衮顓蒙分尺素天閑老驥日千里何用鹽車追蹇歩以上中吳紀聞詠曾徽言端硯君家文房珍尤者一一數端溪從誰得不記歳月古中窪削天成外鑿餘雷斧向來萑葦中險作百碎補硯箋蔡居厚居厚字寛夫熙寧御史延熙子第進士大觀初拜右正言累官徽猷閣待制有詩話句先生萬古名何用博士三年冗不治為太學博士和人韻梅礀詩話宋肈肈字楙宗巫山令與蘇黄游杜鵑暖雲無定半隂晴茅屋紙窗深復明喬木參天竹千莖巴山欲曉風露清杜鵑飛鳴遶江城魚腹四月江水生林花落盡空含情瀼東瀼西朝暮聲全蜀藝文志三峽堂林巒十里上巉巖飛檻初憑縹緲閒夔子風烟依白帝夜郎耕稼接烏蠻砌横亂石遙臨㵎門對高峯近帶山咫尺驚湍吁莫測每來登此念鄉關白帝城江雨霏霏白帝城秋草未枯春草生古來獸壘如雲横萬里瞿塘斷人行至今三峽路崢嶸時清不見更屯兵荒涼廢堞沒春耕但見牛羊日西平以上四川總志宋京京成都人崇寧進士琴臺蜀事補亡君不見成都郭西有琴臺長卿遺跡埋黄埃千年免為狐窟化作佛廟空崔嵬黄鬚老人猶記得昔時荒破樵蘇入鉏犂畏淺牛腳勻古甕耕開數逾十乃知昔人用意深甕下取聲元為琴人琴不見甕巳掘唯有鳥雀來悲吟一朝風流隨手盡況復千年何所訊安得雄辭弔汝魂寂寞秋蕪耿寒燐武擔君不見蜀王妃子墓突兀成都城中若山積墓頭寒鏡澀無光妒月欺烟化為石鴻荒無根憑野史直謂山妖化妃子臨終未免懐首丘運土山中𦵏于此山名武擔錦江邊用是得名千萬年如今佛閣倚空翠老木盤鬱摩蒼天晴雲入穴西山出捲簾坐見嵐光滴安得文如汲冡書免使後人疑往昔以上成都文類徐遹遹閩人崇寧中特奏名仕至朝官知廣德軍瓊林宴罷作白髪青衫晩得官瓊林宴罷酒腸寛平康過盡無人問畱得宫花醒後看墨荘漫録崇寧二年徐為特奏名魁時巳老矣赴聞喜賜宴扵瓊林苑歸騎過平康同年所簪花多為羣倡所求唯遹至寓花乃獨存因戱題一絶蒋存仁存仁崇寧閒青田人題八角亭在青田縣南陳安撫汝錫建由來秖説四簷亭今日先生八角成最喜瀟瀟春夜雨一簷分作兩簷聲括蒼彚紀葛繁繁丹徒人興祖子號鶴林居士崇寧閒臨潁主簿守鎮江題雪竇和尚親書偈後眞機昔振雲門路祖席今多雪竇孫傳到慧林花果盛湏知葉落總歸根志雅堂雜鈔王叡叡號靈轂子崇寧閒人解昭君怨莫怨工人醜畫身莫嫌明主遣和親當時不作閼氏去秖是宫中一舞人侯鯖錄栁交交字成叔崇寧丙戌為袁州别駕題洪陽洞在袁州分宜縣洞口春歸草木長洞中流水薜蘿香眞仙鶴馭今何處應共白雲朝帝鄉游名山記侯彭老立春朝來煮菜往鞭牛已覺江邊雪意休習習東風收雨腳暄暄曉日綻雲頭尊前未放梅花老鬢上先看栁帶柔及取春花時一醉莫教沈瘦更清秋合璧事類前集李夷行夷行字炳大崇寧閒都水丞出為泗州守入元祐黨籍題獨樂園見山臺臺側盡栽花卉闕首句紛紛紅紫蔟虚簷山光不肻饒春色故向花閒出數尖過庭錄潘良正遊洞霄宫石壇風冷露華凝羣玉崢嶸蔟畫屏水赤久傳丹作井山髙時借翠為庭鶴迎仙馭迷三㠀雲入洞天朝百靈回首武陵歸去路碧桃零落晩峯青洞霄詩集江贄贄字叔圭崇安人初舉八行游上庠學士蘇徳輿薦其賢召不赴政和中太史奏少微星見朝命舉遺逸三聘不起賜號少微先生有通鑑節要行于世和邑宰韻一室蕭然傍水灣應知窮達不相關釣魚溪遶黄沙路種粟原通白馬山何事偶逢天子詔疎才寧望嗇夫綸瑶篇總媿非吾事自信巢由别有班崇安縣志鄧春卿春卿字榮伯長汀人崇寧閒詔舉遺逸八行皆不就絶句在陋媿無顔子志過廬難稱魏公心望塵不敢希潘岳雲滿山頭雪滿簪萬姓統譜鄧春卿卜築南山之阿太守章清訪之謝不能肅有詩云云周彦質彦質崇寧閒直祕閣權發遣江東南路轉運副使有宫詞宫詞太一元宵駕幸初喧闐絲管擁鑾輿主家夾道金車駐歩障徐開奏起居文思主吏籍通閨逐節供須各品題知是禁園挑菜日雕牀十扛進金箆翠弁仙衣下玉廊修眞宫女夜焚香舒徐有月隨蓮歩綽約無人見靚妝名園蹴踘稱春遊近宻宣呈技最優當殿不教身背向側巾飛出足跟毬端午茸花蔟彩鸞高標寳鑑鏤金鞶不宜夏景銷酥腕似覺新來百索寛資善諸王就傅初常宣歩輦按觀書六宫準擬經由處一一排門候起居十家宫詞陳虛中虚中崇寧閒守臨川魏壇觀夫人在兮若冰雪夫人去兮仙跡滅可怕如今學道人羅帬帶上同心結復齋漫録臨川距城南一里有觀曰魏壇葢魏夫人經遊之地具諸顔魯公碑以故諸女眞嗣續不絶然而守戒者鮮矣陳守虛中云云陳恬恬字叔易堯叟裔孫居陽翟㵎上村無仕宦意崇觀閒朝廷召之郡守勸駕不得已而起建炎初召赴行在直祕閣有澗上丈人集過庭録𨽻州陳恬叔易以才名稱鄉里自號㵎上丈人里人之子從叔易學文而好刷飾頭面舉止妖嬈目為㵎上丈母綽崔鶠齊名號陽城郡齋讀書志陳恬與鮮于三士又與晁以道同卜隱居于嵩山大觀中召赴闕除校書郎以道寄詩戱之曰處士何人為作牙盡攜猨鶴到京華故山巖壑應惆悵六六峯前秖一家寄晁以道求嵩山長松松上花兮松下根食之年貌與松鄰君今既是松閒客采送衰翁亦可人珊瑚鉤詩話題畫扇萬里稻梁高興誰將出入君懐巳訝天邊月上更疑蘋末風來聲畫集子規暮春春巳晩不見子規飛莫是無歸處山禽不勸歸後村千家詩謝葛汝州寧卿遺公庫酒肉薪米不是故人供祿米初非縣令給豬肝養賢禮厚隆三簋拜賜恩深豔一簞韻語陽秋江暐暐字彦明永新人喜作詩事母極孝崇觀閒吉守以八行薦不報自號轑陽居士句鬬草事空猶昨日惜花心在又明年獨醒雜志周子雍子雍汝隂人學詩于陳無已句風生閶闔春來早月到蓬萊夜未中容齋四筆大觀初京師元夕張燈時再復湟郡徽宗賦詩賜羣臣云午夜笙歌連海嶠春風燈火過湟中開封尹宋喬年不能詩走介求援于其客周子雍得句云云為時輩所稱曰璐按耆舊續聞作趙䶵之子雍未知孰是王寘寘字李逹泉州人大觀初遊太學時蔡京當國寘與同舍生陳朝老上書攻之坐遷自訟齋十餘年宣和中以特奏名補官絶句耕田博飯未為辱為米折腰真可憐高卧北窗風颯至更于何處覓神仙泉州府志王安中安中字履道陽曲人第進士政和中自大名主簿累擢中書舍人翰林學士承㫖出鎮燕山府召除檢校太保大名府尹兼北京畱守司公事靖康初貶象州有初寮集周平園序公年二十有七送某曾大父詩云不論與汝小一月政自容君數百人專用吾宗公瑾伯仁事精切渾成不類少作宣和七年十二月二十一日就睿謨殿張燈預賞元宵曲燕應制并序臣比蒙聖恩召赴禁殿曲宴其日垂拱奏事退俟于睿謨外次花巾絲履進自東序促武再拜陞即坐席女樂數千陳于殿廷南端袍帶鮮澤行綴嚴政酒行歌啟音節清亮樂作舞入聲度閑美俱出于禁坊法部之右于時臘雪新霽風日妍暖巳作春意御榻之前有寳檻植千葉桃花陛下指示羣臣曰杪冬隆寒花已盛開于是皆頓首曰陛下神聖能回造化草木實被生成之賜乃先時呈瑞以悦聖情日既中仄甫畢初筵有旨許登景龍樓由穆清亷外閣道以東升望艮嶽松竹蒼然南視琳宫雲烟絢爛其北則清江長橋宛若物外都人百萬遨遊樓下歡聲四起尤足以見太平豐盛之象羣臣頌歎久之既久復詔觀于穆清遂侍宴于平成萬炬層出彌望不極如星挂空而光彩動揺于海雲濤波之上戸牖屏柱茶牀燎爐皆五色琉璃綴以夜光火齊照耀璀璨從官環繞則又都合宫蕭臺崇樓傑閣森羅布濩臣心目震駭莫有能測其機緘制作之妙已而陪從天歩至會寧殿瓊鋪珠箔合沓炳煥其所陳則虞敦夏鼎商盤紀甗龍文夔首雲雷科斗眞若邃古三代之物陛下既于黼坐親取寳器酌酒臨勸命宫婢奏細樂于前玉食嘉果南珍海錯手自分賜載色載笑雍容無閒羣臣飲徳莫不霑醉夜分乃散歸路觀者如堵他日稱謝陛下申諭一二輔臣俾作詩以記而臣安中預焉臣猥以凡才蒙陛下親擢備位政府曾未閱月有此非常之遇形容頌實雖無詔旨猶當自效惟是鈞天帝所昔人夢寐或有形開而悟想像莫及而臣今者身歴邃嚴目擊竒勝顧嘗以文字誤被聖奨且面命之其榮至矣序見清波雜志上帝通明闕神霄廣愛天九光環日月五色麗雲烟紫氣開三極瓊璈列萬仙希夷塵境斷髣髴玉經傳妙道逢昌運眞王撫契賢龜圖規大壯龍位正純乾穹昊親無閒皇居掇自然剛風同變化祥氣共陶甄層觀星潢上重闉斗柄邊摩空七雉峻冠嶠六鼇連夢想何曽到階升信有緣昕朝初放仗密宴忽聞宣清禁來鳴佩修廊入並肩獸鋪金半闔鸞陣繡㣲褰霽景畱庭砌雷文繪桷梴宫簾波錦漾殿榜字金塡花擁巍巍座香浮秩秩筵嵩呼稱萬億韶奏侍三千華歳推堯歴元璣候舜璿冰霜知臘後梅栁認春前造化應呈巧芳菲巳鬬妍樛枝彫檻小多葉露桃鮮錯落飛杯斝鏘洋雜管弦承雲歌歷歷回雪舞翩翩黼幄祥氛合銅壺永漏延鎬京方置醴羲馭自停鞭乃聖情深渥諸臣意更䖍宗藩親魯衞相芾拱閎顚側弁恩光浹中觴詔蹕旋寳薫攜滿袖御果得加籩要賞嬉遊盛俄追歩武遄騰身複道表送目夾城田耎仰揖蒼龍象旁臨艮嶽巓謳歌紛廣陌簫鼓樂豐年赫奕攢輕幰珍竒集市鄽博盧多袒跣飲肆競蹁躚蕃衍開朱邸崔嵬照彩椽橋虹灣矗矗江練泮濺濺擊柝周廬晩張燈别院先餘霞揺綺暈列宿舍珠躔浩蕩三山㠀棱層十丈蓮再趨天北極郤立榻東偏既用家人禮仍占聖製篇兕觥從酩酊蟾魄待嬋娟轉眄隨親指環觀得縱穿曲屏江浪蹙巨柱赤虯纏光透垂枝井晶銜帶壁錢蕭臺千級峻重屋八窗全就席花墪帀行樽紫袖揎交輝方爍爍起立復闐闐邃宇㑹寧過中宵勝賞專鋪陳尤有韻清雅不相沿戸箔明珠串欄釭水碧棬規模商甗鑄款識魯壺鐫秦曲移筝柱唐妝儼鬢蟬窄襟珠綴領髙朶翠為鈿喜氣排寒冱輕颸洗靜便層琳藉璣組方鼎炷龍涎瑪瑙供盤大玻璃琢琖圓暖金傾小榼屑玉釀新泉帝子天才異英姿棣萼聨頻看揮斗盌端是吸鯨川推食俱均逮攘餐及墜捐海螯初破㱿江柱乍離淵寧數披緜雀休論縮項鯿南珍誇飣餖北饌厭烹煎賜橘懐頳卵酡顔釂寳船言歸荷慈惠末節笑拘攣放鑰嚴扃啟籠紗逸足牽冰輪挂銀漢夜色映華韉人識重熙象功參獨斷權五辰今不忒六氣永無愆天紀承三古時雍變八埏比閭増版籍疆埸罷戈鋋文軌包夷夏弦歌徧幅員恢儒榮藻薦作士極魚鳶慶胄貽謀顯多男景福緜迓衡常穆穆遵路益平平亭障今踰隴耕耘久際燕信通鵬海漲威竄犬戎羶東擬封雲岱西將款㵎瀍琳科宣蘂笈玉府下雲軿帝籍勤初播宫蠶長自眠繭絲登六寢稃米秀中田廟鶴垂昭格壇光監吉蠲靈芝滋菌蠢甘醴湧潺湲合教尨風革頒經衆疾痊雨隨親禱降河避上流遷執契皇猷洽披圖福物駢太和輸橐籥妙用絶蹄筌此際君臣悅應先簡册編雅稱魚罩罩頌述鼓咽咽詎比千齡遇猶聞四始箋羇臣起韋布陋質媿駑鉛驟俾陪機政由來出眷憐恩方拜綸綍報未效塵涓密席叨臨勸凡蹤第曲拳雖無三峽水曽歩八花甎渝望知難稱才慳合勉旃鈞天思盡賦賸續白雲牋揮塵後録宋史本傳徽宗嘗宴睿謨殿命安中賦詩百韻以紀其事詩成賞歎不已令大書于殿屏凡侍臣皆以副本賜之立春帖子彤霞蒨霧繞觚棱樓雪融銀滴半層别曉擬開延福宴夾城先試景龍燈皇帝閣玉燕翩翩入鬢雲花風初掠縷金羣神霄宫裏驂鸞侣來侍長生大帝君妃嬪閣二首政和七年進幼老春秋王安中以文章有時名交結蔡攸攸善之引入禁中太上賜燕飲半酣是時鄭妃有寵猶未正中宫上出之鄭氏簪玉花上有雙飛玉燕攸謂安中曰豈可無詩安中即作詩進之太上大喜蘂笈琅函受祕文清虛道合玉晨君瑤臺夜靜朝真久金屋春寒閱籙勤皇后閣曈曨曉日上金鋪的皪春冰泮玉壺繡戸綠窗塵不到凝酥㸃就輞川圖妃嬪閣二首重和二年進墨荘漫錄云不唯才思清麗皆紀當時事也題王維畫嘉陵江山圖江山已暗大同殿絲管猶喧凝碧池别寫嘉陵三百里右丞心事與誰知過庭錄明皇幸蜀過嘉陵愛其江山命吳道子圖于大同殿壁王維復畫小蔟履道詩云云王摩詰釣魚圖我本江湖人市朝豈無心偶然墮世網如鳥思長林交親豈不多之子徳我深賜沐有餘閒一馬如相尋茅亭容膝耳九衢可窺臨挂壁出古圖驚笑靡自任筆墨麤可識佳處疑非今佳哉王摩話風味我所欽自狀釣車圖葦閒相挐音有如渼陂遊一杜挾兩岑坐令黄塵中思落清江潯秦子詩思古清新間雄沈示我五字句月杵鳴秋砧回杯勸摩詰對畫手自斟我賞子髙趣子聆我微忱譬如影與形妙在同一隂我時坐其㫄清風溢幽衿歸來歩長廊缺月戸半侵丹鳥已過草齒頰猶哦吟煩公有聲畫相我無弦琴次秦夷行觀老杜畫像韻寒折天吳圖飢糴太倉粟拾遺官在朝何異老林麓英風想亷藺妙手傳顧陸蒙茸頭傾冠駊騀鐙脫足熊兒與阿段左右相扶逐生平經綸具悵望青蒲伏窮塗付麴糵放意謝羈東草堂幸無事君騎時見辱清吟動霄堮逸豔驚魚目顧兹神明意豈易丹青卜當時腰長鑱憔悴十指秃聲名乾坤破生事歳月促但聞列仙臞豈見肉食墨企予攀逸駕短歩羞匍匐不能師廣袖乃爾好竒服嗜詩得雋永徐味自當肉不知裦公貴顧謂何郎俗窮通等夢幻思慮自振觸苦吟秖效尤呼醆進蟻綠祁陽成逸畫浯溪圖相示為作長句少文閱世老不出自畫雲山滿牆壁澄懐觀道追所歴坐覺琴聲隱金石我亦七年湖外客夢中猶汎湘江碧浯溪之圖喜新得身卧嶺南心嶺北憶嘗畱語溪邊僧異時人讀唐中興說與此乃秦典刑三句入韻之罘銘今欲復作誰可令似有元結無眞卿風烟慘淡萬古情不如且尋畫隱成以上聲畫集象州上元二年白玉堂揮翰供帖子風生起草臺墨㸃澄心紙三年文昌省拜賜近尺咫紅蓼朌御盤金幡䙚宫蘂晩為日南客環堵隱烏几朝來聞擊鼓土牛出城市幽懐不自閑欲逐春事起安得五畝園種蔬引江水清波雜志句後人誰促漁陽戰舊守猶遷象郡來初到象州遺史中興馮熙載熙載字彦為衢州西安人大觀元年進士宣和閒由尚書左丞遷中書侍郎出知亳州提舉洞霄宫卒諡文節宣和七年十二月二十一日就睿謨殿張燈預賞元宵曲燕應制化工欲放陽春到先教𤣥冥戮衰草凝冰封地萬木僵誰向雪中探天巧璿璣星回斗指寅羣芳未知時已春人心蕩漾趁佳節燈夕獨冠年華新昇平萬里同文軌井邑相連通四裔蘭膏競吐夜烘春和叔回車避羲轡巍巍九禁倚天開温風更覺先春來試燈不用雨花俗迎陽為郤寒崔嵬宣和初載𤣥冬尾瑞白纔消塵不起穆清先賞屬欽鄰錦繡雲龍頒宴喜初聞傳詔開睿謨歩障幾里承金鋪調音度曲三千女正似廣樂陳清都遏雲妙唱韓娥侣回雪飛花稱獨歩千春蟠木效紅英獻壽當筵豈金母上林晩色烟靄輕景龍遊人歡笑聲霞裾月佩擁仙仗翠鳳挾輦趨平成銅華金掌散晶彩翠碧重重蔟珠琲先從前殿望脩廊日出綺霞紅滿海神光通透雲母屏驪龍出舞波濤驚煌煌黼座承天命座下錯落如明星榻前玉案肴核旅獸炭銀爐夜初鼓憲天重屋訝雲屯崇道簫臺疑蜃吐前楹火柱回萬牛藺卿壁碎光色浮周圍照耀眼界徹冰壺漾月生珠流㸃㸃金錢盡銜璧豹髓騰輝粲銀礫絲篁人籟有機緘皦繹清音傳屋壁須臾隨蹕登㑹寧如驂鸞鶴遊紫清彩蟾倒影上浮空纖雲不㸃惟光明四壁垂簾玉非玉銀釭吐豔相連屬棼楣横帶碧玻璃一朶翠雲承日轂萬光閃爍爭吐吞燭龍銜耀輝西崑又如電母神鞭馳金虵著壁不可捫端信竒工通造化豈比偃師能幻假丹青漫數顧虎頭盤礴解衣未容寫此時帝御鈞天臺紫垣兩兩明三台尚方飲器萬金寳古玉未足誇雲雷帝傍侍女雲華品玉立仙標及時韻四音促柱泛笙簫應有翔鸞落千仞龍瓶瀉酒如流泉御廚絡繹紛珍鮮榻邊爭欲供天笑快倒頗類虹吸川厭厭夜飲方歡洽玉漏頻催鼓三疊金門初下醉歸時正見冰輪上城堞微臣去歳陪清班惡詩誤辱重瞳觀小才易窮眞䑕技再賦愈覺相如慳詩話總龜王漢漢太常博士知潮州題湖山立石如碑卓水濵磊落未名聞蘚駮瓊姿出蝸行篆字分器渾猶抱璞勢迥已凌雲幸免隨金鍛寧憂與玉焚螭形徒岌岌鳥跡欠云云若使昌黎見應摛逐鱷文潮中雜記宋詩記事巻三十七
