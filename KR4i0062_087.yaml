body:
  text: 宋詩紀事卷八十七錢塘厲鶚撰楊朴妻送夫赴召更休落魄耽杯酒且莫猖狂愛詠詩今日捉將官裏去這回斷送老頭皮東坡志林真宗東封還訪天下隱者得杞人楊朴能為詩召對自言不能上問臨行有人作詩送卿否朴曰惟臣妻有一首云云上大笑放還山命其子一官就養蒨桃蒨桃寇萊公妾呈寇公一曲清歌一束綾美人猶自意嫌輕不知織女螢窗下幾度拋梭織得成風徑衣單手屢呵幽窗軋軋度寒梭臘天日短不盈尺何似妖姬一曲歌侍兒小名録拾遺萊公因㑹贈歌姬以一束綾蒨桃作詩呈公劉元載妻厯代吟譜孫冕三英集序云三英者三哲婦之詞也世有男子大誇篇詠而意隨語盡者滔滔皆然三英婦德天賦若此忍不序而碣之乎劉詩話總龜天聖中禮部尚書孫冕序三英集元載妻詹光茂妻趙晟之母早梅寄逺惜别三詩劉妻哀子無立詹妻留夫侍母病趙母懼子逺遊孫公愛其才以取之早梅南枝向暖北枝寒一種春風有兩般憑仗髙樓莫吹笛大家留取倚䦨干厯代吟譜詹光茂妻寄逺錦江江上探春回銷盡寒冰落盡梅爭得兒夫似春色一年一度一歸來厯代吟譜趙晟母惜别暖有花枝冷有冰佳人後㑹却無憑預愁離别苦相對挑盡漁陽一夜燈厯代吟譜謝希孟希孟字母儀晉江人景山之妹嫁陳安國早卒歐陽公序云希孟之詩尤隱約深厚守禮而不自放有古幽間淑女之風非特婦人之能言也詠芍藥好是一時豔本無千歲期所以謔相贈載之在聲詩句為花雖可期論德亦終鮮牡丹句牽主人衣一步行不得薔薇薰薰麝臍烈灼灼猩血殷躑躅樹既摧為薪花亦落為塵凌霄豔陽一何好零落千載寃朱槿盜者得其便掉頭笑且歌曼陀羅花卞子真賞闕莊生夢還怯蝴蝶花代吟譜以上歷許氏許氏虞部之女方勉妻夫犯夜禁代呈郡守鄭毅夫明時樂事娛詩酒帝里風光剩占春况是白衣重得侣不堪青斾自招人早知玉漏催三鼓肯把金貂換百巡大扺仁人憐氣類免教孤客作囚身詩話總龜句匣劍未磨朝錯血已聞刺客殺袁絲讀朝錯傳遺編彤管徐氏徐氏侍從宥之女吳丞相妻偶題絮吹栁陌三春雨花落梨園一笛風百尺玉樓簾半捲夜深人在水晶宫墨莊漫録錢氏錢氏封南宫縣君絶句士悲秋色女懷春此語由來未是真儻若有情相眷戀四時天氣總愁人侯鯖録王氏王氏名文淑荆公之妹張奎妻封長安縣君鶚按墨莊漫録作荆公女適吳丞相之子封長安縣君誤今從隱居詩話改正隱居詩話張奎妻長安縣君荆公之妹也佳句為最其云草草杯盤供笑語昏昏燈火話平生荆公妻吳國夫人亦能文嘗有小詞約諸親遊西湖有云待得明年重把酒擕手那知無雨又無風脫灑可喜戲詠白羅繫髻香羅如雪縷新裁惹住烏雲不放回還似逺山秋水際夜來吹散一枝梅墨莊漫録李氏李氏建昌人公擇之姊江西洪亶郎中妻封文城縣君挽兄公擇尚書久厯金門貴未酬黃屋知如聞天祿客抱恨作銘詩皇朝類苑王氏王氏荆公女吳安持妻封蓬萊縣君李璧王荆文公詩注介父二女長適吳安持寶文閻待制次適蔡卞寄父西風不入小窗紗秋意應憐我憶家極目江山千萬恨依然和淚看黃花冷齊夜話李樗大夫妻文獻通考李樗有毛詩詳解三十六卷陳氏曰樗閩之名儒于林少穎為外兄謝魏國范夫人朝來瑞靄遍祥虛果見麻姑降陋居陶令滿籬唯有菊相如四壁但藏書蕭條庭館門羅雀冷落杯盤食缺魚缺後二句過庭録王氏王氏平甫女劉天保妻句不緣燕子穿簾幕春去秋來那得知隱居詩話李珦珦字溫叔都官員外郎某之幼女八歲能詩適王常泛舟江湖溺死榴花烈火真紅輕皺面晨霞碎翦貼枝條金刀刺出猩猩血濺落芳叢久不銷翰府名談魏夫人魏夫人襄陽人道輔之姊曾子宣丞相之妻句使君自為君恩厚不是區區愛華山老學菴筆記曾子宣丞相元豐間帥慶州召還往來潼關夫人魏氏作詩戲之云女郎曹希藴贈乾明寺繡尼集句睡起楊花滿繡牀為他人作嫁衣裳因過竹院逢僧話始覺空門氣味長楊公彥齡筆録新月禁鼓初聞第一敲乍看新月出林梢誰家寶鏡新磨出匣小參差蓋不交桐江詩話女郎曹希藴貨詩都下有人以敲梢交為韻索賦新月詩曹賦云云摹多遜之句也句記得小軒岑寂夜月移疏影上東牆漫叟詩話希藴詩雖格韻不髙時有巧語嘗作墨竹詩云云此語最工賀方回姝寄賀方回獨倚危䦨淚滿襟小園春色懶追尋深恩縱似丁香結難展芭蕉一寸心能改齊漫録方回眷一姝别久姝寄詩云云賀因所寄詩成栁色黃詞云薄雨催寒斜照弄晴春意空闊長亭栁色才黃逺客一枝先折烟橫水際映帶幾㸃歸鴉東風消盡龍沙雪還記出門時恰而今時節將發畫樓芳酒紅淚清歌頓成輕别巳是經年杳杳音塵都絶欲知方寸共有幾許清愁芭蕉不展丁香結枉望斷天涯兩厭厭風月丁渥妻寄外淚濕香羅帕臨風不肯乾欲憑西去鴈寄與薄情看雲齊廣録進士丁渥在太學夢歸家見妻于燈下披箋握管為書寄生生曰我已至矣何用書為妻但揮涕而不答又于别幅見詩云云生既覺以語同舍客客曰君思念之極以至于此後旬日得書并詩皆夢中所見無少差矣并門徐帥屬內子句幕中舞客呈鸜鵒帳下牙兵困蒺䔧和韻幕中有醉起舞者華衮自宜還舊物繡衣先見冠同寮和韻送屬官除監司故相家也耆舊續聞并門徐帥屬內子能詩林子中為帥每首唱徐密寫歸衆方操觚內子詩已來必有可觀陳氏陳氏述古女適李氏題小鴈屏紅蓼淡蘆欹曲水幾雙容與對西風扁舟阻向江鄉去却喜相逢一枕中曲屏誰畫小瀟湘鴈落秋風蓼半黃雲淡雨疏孤嶼逺泠泠清夢到髙唐耆舊續聞陳述古女適李氏從夫仕晉寧軍判官部使者以小鴈屏求詩自作黃魯直小楷題其上云謝氏謝氏王元甫妻送外此去唯宜早早還休教重起望夫山君看湘水祠前竹不是男兒淚染斑青瑣髙議髙氏髙氏淮南士大夫妻暮春感懷楊花日日長無定海燕年年却有歸一瞬青春疾如電等間著盡縷金衣厯代吟譜盧氏句田舍轆轤出短牆村落鞦韆挂髙樹寒食厯代吟譜葉桂女桂女字月流琵琶亭樂天當日最多情淚滴青衫酒重傾明月滿船無處問不聞商女琵琶聲中山詩話李氏女李氏女毗陵人詠破鏡十六歲作半輪殘月掩塵埃依稀猶有開元字想得清光未破時買盡人間不平事墨客揮犀鮑娘題兑溪驛溪驛舊名彡烟光滿翠嵐須知今夜好宿處是江南清波雜志衢信閒驛名兑溪謂其水作三道來作彡字形鮑娘題詩蔣穎叔和之暨氏女暨氏女建安人句多情樵牧頻篸首無主蜂鶯任宿房春渚紀聞建安暨氏女子十歲能詩賦野花云云觀者雖加驚賞而知其後不保貞素竟更數夫流落而終王氏王氏趙德麟妻絶句白藕作花風巳秋不堪殘睡更回頭晚雲帶雨歸飛急去作西窗一夜愁苕溪漁隱叢話此趙德麟細君作也德麟既鰥居因見此篇遂與之為親余以為此二十八字媒也張氏張氏藝叟女司馬朴妻句莫訝淚頻滴都緣心未灰滿目烟含芳草緑倚䦨露泣海棠紅墨莊漫録藝叟久經遷謫怏怏不平嘗內集分題賦詩其女得蠟燭有句云云浮休有慚色司馬朴之室藝叟女也鄜延路上寺中一聫云云或者便是詠燭者王氏王氏曹組之母兄弟幼孤王氏教養成就雪中觀妓梁王宴罷下瑶臺窄窄紅鞾步雪來恰是陽春三月暮楊花飛處牡丹開桐江詩話陳氏陳氏蜀人唐暨妻送張邦基母念别每驚魂流年多病身惟我延陵子情真意更親分擕無淚盡望逺起愁新老眼將何暖音書不厭頻雪意亂江雲江梅漸放春雁歸人去後愁與歲華新榮路君方振園居我豈貧惟餘憂我念相憶莫霑巾墨莊漫録唐暨潜亨質肅公猶子余母之舅也隱居襄陽著周公政典以周官定臧否鄒志完為序娶陳氏蜀人令德純茂尤工文章大觀中先君為郡學官代還以詩送别余母云云丘氏丘氏朝奉郎邱舜中女諸女皆能文詞每兄弟內集必聮詠為樂寄外簾裏孤燈覺曉遲獨眠留得宿妝眉珊瑚枕上驚殘夢認得蕭郎馬過時西清詩話周仲美題郵亭壁世居京師父遊宦家于成都既而適李氏子侍舅姑宦泗上從良人赴金陵幕偶因事棄官入華山有長往之意仲美即寄身合肥外祖家方求歸未得㑹舅遽調任長沙不免共載而南雲水茫茫去國益逺形影相弔灑涕何言因書所懷于壁愛妾不愛子為問此何理棄官更棄妻人情寧可巳永訣泗之濱遺言空在耳三載無朝昏孤幃淚如洗婦人義從夫一節誓生死江鄉感殘春腸斷晚烟起西望太華峯不知幾千里王直方詩話郭暉妻答外碧紗窗下啓緘封尺紙從頭徹尾空應是仙郎懷别恨憶人全在不言中葉夢得崖下放言士人郭暉因寄妻問誤封一白紙去細君得之乃寄一絶云秦少遊女句眼前雖有還鄉路馬上曾無放我情靖康間題壁澗詩話梅李清照清照號易安居士濟南人格非之女趙挺之之子明誠妻其母王狀元拱辰女亦工文章清照晚節不終再適張汝舟流落江湖間卒有潄玉集朱子遊藝論本朝婦人能文只有李易安與魏夫人李有詩大略云兩漢本繼紹新室如贅疣所以嵇中散至死薄殷周中散非湯武得國引之以比王莽如此等語豈女子所能苕溪漁隱叢話易安再適張汝舟未幾反目有啓事與綦處厚云猥以桑榆之晚景配兹駔儈之下材傳者無不笑之學士綦崇禮啓清照啓雲麓漫抄易安投翰林素習義方麁明詩禮近因疾病欲至膏肓牛蟻不分灰釘已具嘗藥雖存弱弟應門惟有老兵既爾蒼皇因成造次信彼如簧之說惑兹似錦之言弟既可欺持官文書來輒信身幾欲死非玉鏡架亦安知僶俯難言優柔莫決呻吟未定強以同歸視聽才分實難共處猥以桑榆之晚景配兹駔儈之下才身既懷臭之可嫌惟求脫去彼素抱璧之將往決欲殺之遂肆侵凌日加毆擊可念劉伶之肋難勝石勒之拳局地扣天敢效談娘之善訴升堂入室素非李赤之甘心外援難求自陳何害豈期末事乃得上聞取自宸衷付之廷尉被桎梏而置對同凶醜以陳詞豈惟賈生羞絳灌為儕何啻老子與韓非同傳但祈脫死莫望償金友凶橫者十旬蓋非天降居囹圄者九日豈是人為抵雀捐金利當安往將頭碎璧失固可知實自繆愚分知獄市此蓋伏遇內翰承㫖搢紳望族冠蓋清流日下無雙人間第一奉天克復本緣陸贄之詞淮蔡底平實以㑹昌之詔哀憐無告雖未解驂感戴鴻恩如真出已故兹白首得免丹書清照敢不省過知慚捫心識愧責全責智已難逃萬世之譏敗德敗名何以見中朝之士雖南山之竹豈能窮多口之談惟智者之言可以止無根之謗髙鵬尺􅀈本異升沈火鼠冰蠶難同嗜好達者共惜童子皆知願賜品題與加湔洗誓當布衣蔬食溫故知新再見江山依舊一瓶一鉢重歸畎畝更須三沐三薰忝在葭莩敢兹塵瀆建康日易清波雜志頃見易安族人言明誠在安每值天大雪即頂笠披蓑循城逺覽以尋詩得句必邀其夫賡和明誠每苦之也四六談麈唐人祭文多用四六雖韓退之亦然故李易安祭趙湖州文曰白日正中歎龎公之機捷堅城自墮憐杞婦之悲深婦人四六之工者琅嬛記李易安賀人攣生啓中有云無午未二時之分有伯仲兩楷之侣既繫臂而繫足實難弟而難兄玉刻雙璋錦挑對褓注曰任文二子攣生德卿生于午道卿生于未張伯楷仲楷兄弟形狀無二白汲兄弟母不能辨以五綵繩一繫于臂一繫于足上樞密韓公工部尚書胡公并序紹興癸丑五月兩公使金通兩宫也易安父祖出韓公門下見此大號令不能忘言作詩各一章以寄意以待采詩者云三年夏六月天子視朝久凝旒望南雲垂衣思北狩如聞帝若曰嶽牧與羣后賢寧無半千運已過陽九勿勒燕然銘勿種金城栁豈無純孝臣識此霜露悲何必羮捨肉便可車載脂土地非所惜玉帛如塵泥誰當可將命幣厚辭益卑四嶽僉曰俞臣下帝所知中朝第一人春官有昌黎身為百夫特行足萬人師嘉祐與建中為政有臯䕫漢家畏王商唐室尊子儀是時已破膽將命公所宜公拜手稽首受命白玉墀曰臣敢辭難此亦何等時家人安足謀妻子不必辭願奉天地靈願奉宗廟威徑持紫泥詔直入黃龍城北人定稽顙侍子當來迎仁君方博信狂生休請纓或取犬馬血與結天日盟胡公清德人所難謀同德協心志安脫衣已被漢恩暖離歌不道易水寒皇天久隂后土濕雨勢未回風勢急車聲轔轔馬蕭蕭壯士懦夫俱感泣閭閻嫠婦亦何知瀝血投書干記室葵邱踐土非荒城勿輕談士棄儒生露布詞成馬猶倚峭函關出雞未鳴巧匠何曾棄樗櫟芻蕘之言或有益不乞隋珠與和璧只乞鄉關新信息靈光雖在應蕭條草中翁仲今何若遺氓豈尚種桑麻敗將如聞保城郭嫠家父祖生齊魯位下名髙人比數當時稷下縱談時猶記人揮汗成雨子孫南渡今幾年漂零遂與流人互欲將血淚寄山河去灑東山一壞土雲麓漫抄浯溪中興頌詩和張文潜五十年功如電掃華清花栁咸陽草五坊供奉鬬雞兒酒肉堆中不知老叛兵忽自天上來逆臣亦是姦雄才勤政樓前走戎馬珠翠踏盡香塵埃何為出戰輒披靡傳置荔枝多馬死堯功舜德本如天安用區區紀文字著碑銘德真陋哉乃令神鬼磨山崖子儀光弼不用猜天心悔禍人心開夏為殷鑒當深戒簡䇿汗青今具在君不見當時張說最多機雖生已被姚崇賣君不見驚人廢興傳天寶中興碑上今生草不知負國有姦雄但說成功尊國老誰令妃子天上來虢秦韓國皆天才苑桑羯鼓玉方響春風不敢生塵埃姓名誰復知安史健兒猛將安眠死去天尺五抱甕峯峯頭鑿出開元字時移勢去真可哀姦人心醜深如崖西蜀萬里尚能反南內一閉何時開可憐孝德如天大反使將軍稱好在嗚呼奴輩乃不能道輔國用事張后尊乃能念春薺長安作斤賣清波雜志曉夢曉夢隨疏鐘飄然躡雲霞因緣安期生邂逅萼緑華秋風正無賴吹盡玉井花共看藕如船同食棗如瓜翩翩坐上客意妙語亦佳嘲辭鬬詭辨活火分新茶雖非助帝功其樂何莫涯人生能如此何必故歸家起來斂衣坐掩耳厭喧譁心知不可見念念猶咨嗟感懷寒窗敗几無書史公路可憐合至此青州從事孔方君終日紛紛喜生事作詩謝絶聊閉門燕寢凝香有佳思靜中我乃見至交烏有先生子虛子春殘春殘何事苦思鄉病裏梳頭眼最長梁燕語多終日在薔薇風細一簾香以上彤管遺編夜發嚴灘巨艦只緣因利往扁舟亦是為名來往來有愧先生德特地通宵過釣臺釣臺集句詩情如夜鵲三繞未能安少陵也自可憐人更待明年試春草以上風月堂詩話南來尚怯吳江冷北狩應悲易水寒南渡衣冠少王導北來消息缺劉琨建炎初作以上詩話雋永楊氏楊氏越漁者楊翁女歸謝生與謝生聮句珠簾半牀月青竹滿林風楊何事今宵景無人解與同謝宫閨詩史陸放翁妾題壁玉階蟋蟀鬧清夜金井梧桐辭故枝一枕凄涼眠不得呼燈起作感秋詩隨隱漫録陸放翁宿驛中見題壁詩詢之驛卒女也遂納為妾方餘半載夫人逐之妾賦卜算子云只知眉上愁不識愁來路窗外有芭蕉陳陳黃昏雨曉起理殘妝整頓教愁去不合畫春山依舊留愁住文婉文婉溫州樂清人錢氏婦句霜月天邊清興逺金鐘雲裏夢魂間題白石山史詩女吕氏吕氏伯恭之祖姑封清源君句前身當是陶淵明愛酒不入逺公社詩女史韓玉父題漠口鋪并序妾本秦人先大父嘗仕于朝因亂遂家錢唐幼時易安居士教以詩及笄父母以妻上舍林子建去年林得官歸閩妾傾囊以助其行林許秋冬間遣騎迎妾久之杳然何其食言耶不免擕女奴自錢唐而之三山比至林已官旴江矣因而復回延平經由順昌假道昭武而去歎客旅之可厭笑人事之多乖因理髮漠口鋪漫題數語于壁云南行踰萬山復入武陽路黎明與雞興理髮漠口鋪旴江在何所極目烟水暮生平良自珍羞為浪子婦知君非秋胡強顔且西去彤管遺編何師韞師韞字季才金溪人抱甕先生天裴女嫁臨川饒氏四十而寡所居有懶愚樹遂榜室曰懶愚有詩集自題懶愚室君不見南嶽懶殘師佯狂啖殘食粥涕任垂頤懶為俗人拭又不見愚溪子栁子堂堂古遺直因以愚名溪于今慕其德二子真吾師欲見不可得唯有懶愚樹終日對顔色齊威勤讀書輪扁巧斫輪勤巧動心志何如懶愚真衰年髮已皤行少坐時多亦欲效勤巧奈此懶愚何夷堅志失假山偈片石亡來歲月深昔時尋覔到而今元來只在家山裏枉費工夫别處尋撫州府志何氏喜浮屠教遍閲華嚴諸經一日偕夫往白楊山作失假山偈云云年四十孀居紹興間張魏公浚迎侍母鎮國太夫人帥閩道出界山太夫人亦通禪學聞其名踵門一見契合呼為無生法友汪氏汪氏彥章女內江劉五清之配寄良人旅食京華歲月多聖賢事業竟如何明年佇聽泥金報間把關雎獨自歌四川總志朱淑真淑真號幽棲居士錢唐人世居桃村工詩嫁為市井民妻不得志殁宛陵魏仲恭輯其詩名曰斷腸集傷春覽鏡驚容却自嫌逢春長是病厭厭吹花弄粉新來懶惹恨供愁近日添生怕子規聲到耳苦羞雙燕語穿簾眉頭眼底無他事須信離情一味嚴初夏竹搖清影罩幽窗兩兩時禽噪夕陽謝却海棠飛盡絮困人天氣日初長秋夜夜久無眠秋氣清燭花頻翦欲三更鋪牀涼滿梧桐月月在梧桐缺處明馬塍一塍芳草碧芊芊活水穿花暗護田蠺事正忙農事急不知春色為誰妍以上斷腸集賦小鬟舞五絶管弦催上錦茵時體態輕盈秖欲飛若使明皇當日見阿蠻無計誑楊妃香茵穩襯半鉤月往來凌波雲影滅弦催拍緊促將遍兩袖翩然作回雪栁腰不被春拘管鳳轉鸞回霞袖緩舞徹伊州力不禁筵前撲簌花飛滿占斷京華第一春清歌妙舞實超羣只愁到曉人星散化作巫山一段雲燭花影裏粉姿閒一㸃愁侵兩㸃山不怕帶他飛燕妒無言逐拍省弓彎西湖志餘與淑真同時有魏夫人亦能詩嘗置酒邀淑真命小鬟隊舞因索詩以飛雪滿羣山為韻淑真醉中援筆賦五絶云云不惟詞㫖豔麗而舞態之妙亦可想見也劉彤彤字文美江寧章文虎妻寄外碧紗窗外一聲蟬牽斷愁腸懶晝眠千里才郎歸未得無言空撥玉爐烟苕溪漁隱叢話陳氏陳氏號梅莊提刑仲微女適新昌胡縣丞有詩集述懷一片愁心怯杜鵑懶妝從任鬢雲偏怕郎說起陽關意常掩琵琶第四弦山城落日弄昏黃又了平生半日忙侍妾不須燒絳蠟讓他明月入回廊名媛璣囊黃淑淑字致柔適建寧進士王防寡居後族議改適因詠竹以見志詠竹徑直忠臣節孤髙烈女心四時同一色霜雪不能侵名媛璣囊連倩女倩女延平人適鄰生陳彥臣題竹簾緑筠劈破條條直紅線經回眼眼奇為愛如花成片段致令直節有參差名媛璣囊華春娘春娘適徐君亮贈外燕子樓中燕子飛芹泥一㸃誤霑衣主人頻起嗔嫌意垂下珠簾不放歸彤管新編黃氏黃氏適福建潘用中感懷䦨干間倚日偏長短笛無情苦斷腸安得身輕如燕子隨風容易到君傍名媛璣囊謝慧卿慧卿巴縣人有閏餘集絶句尋得桃源可學仙丹書唯恐鳳飛傳雨收峯頂雲歸洞風到池塘月滿天四川總志王瓊奴瓊奴徐苕郎妻答外茜色霞箋照面赬玉郎何事太多情風流不是無佳句兩字相思寫不成名媛璣囊林杜娘杜娘杭州新城人逰碧沼勝居幽谷泉聲冷鳥啼僧定深好花叢古砌寒瀑發髙岑逰客陸鴻漸居人支道林欲歸青嶂去臨去復沈吟彤管遺編朱逸仙寄元驤卿郎今多病如家令妾自拚躬怨楚王斜壓玉叉成獨夢低垂𤣥髮繫柔腸四朝詩金麗卿麗卿杭州人題廣信道中家住錢唐山水圖梅邊栁外識林蘇平生慣占清涼國豈料人間有暑途古杭雜記詩集賈蓬萊春曉方池水影薄曲檻鳥聲嬌鸞鏡紅綿冷蛾眉翠黛消冶容舒嫩萼幽思結柔條纎指收花露輕將雪粉調謝姊惠鞋蓮瓣娟娟逺寄將繡羅猶帶指尖香弓彎著上無行處獨立花隂看鴈行以上彤管遺編鄧氏寄衣欲寄寒衣上帝都連宵裁翦眼糢糊可憐寬窄無人試淚逐西風灑去途四朝詩來氏來氏豫章人水仙花二首瑶池來宴老仙家醉倒風流萼緑華白玉斷笄金暈頂幻成癡絶女兒花花盟平日不曾寒六月曝根髙處安待得秋殘親手種萬姬圍繞雪中看全芳備祖女郎張惠卿題常山店壁迢遞投前店颼颼守破窗一燈明復暗顧影不成雙清波雜志毛友龍妻寄外翦燭親封錦字書擬憑歸鴈寄天隅經年未報千秦䇿不識如今舌在無詩話總龜沈清友清友姑蘇女子絶句晚天移棹泊垂虹閒倚蓬窗問釣翁為底鱸魚低價賣年來朝市怕秋風隨隱漫録清友一絶得風人之體又詠漁父起家紅蓼岸傳世緑蓑衣詠牧童自便牛背穩却笑馬蹄忙得下字之工于本大妻本大故姓許旌陽族也得仙術又變姓名夫婦偕隱西山下得仙詩醉舞狂歌踏落花緑羅裙帶有丹砂往來城市買山藥那箇西山是我家宫閨詩史楊氏婦楊氏婦永嘉人送夫從軍海壇門外浪滔天妾上城樓君上船回首西風深巷底梅花霜月夜如年東甌詩集俞氏俞氏號菊窗賀陳隨隱以布衣除東宫掌書萬人海裏闢幽扉欲學深居只布衣不道內前車馬鬧又催父子入宫闈隨隱漫録宋氏宋氏天台人鬻廬自歎年來刺骨貧吾廬今巳屬西鄰殷勤說與東園栁他日相逢是路人趙葵行營雜録天台宋氏家本富後貧鬻廬于鄰價成作詩云云富者見詩惻然即以劵還之亦不索其直鄉人嘉其誼趙葵姬絶句柝聲默報早朝回滿院春風繡户開怪得無人理絲竹緑隂深處摘青梅古今女史趙葵同知樞密院朝罷歸私第而諸姬不見葵往訪之乃羣聚摘青梅有一姬善詩賦葵責令賦詩云云韓希孟希孟巴陵人魏公五世孫襄陽賈尚書子瓊之婦年十八開慶初元兵至嶽陽為卒所掠赴水越三日得其尸練裙帶中有詩曰璐按練裙帶中詩宋史與輟耕録不同今兩存之練裙帶詩我質本瑚璉宗廟供蘋蘩一朝嬰禍難失身戎馬間寧當血刃死不作袵席完漢上有王猛江南無謝安長號赴洪流激烈摧心肝宋史烈女傳又宋未有天下堅正臣禮秉開國百戰功每陳惟雄整及侍周幼主臣心常炯炯帝曰卿北伐山戎今有警死狗莫擊尾此行當繫頸即日辭陛下盡敵心欲逞陳橋忽兵變不得守箕潁禪讓法堯舜民物普安靜有國三百年仁義道馳騁未改祖宗法天胡肆大眚細思天地理中有幸不幸天果喪中原大似裂冠袵君誠不獨活臣實無魏丙失人焉得人垂戒嘗耿耿江左無謝安塞北有王猛所以戎馬來飛渡巴陵境大江限南北今此一舴艋本期固封疆誰謂如畫餅烈火燎昆岡不辨金玉礦妾本良家子性僻守孤梗嫁與尚書兒銜署紫蘭省直以才德合不棄宿瘤癭初結合歡帶誓比日月昞鴛鴦㑹雙飛比目願常並豈期金石堅化作桑榆景旄頭熱正然蚩尤氣先屏不意風馬牛復及此燕郢一方遭劫虜六族死俄頃退鷁落迅風孤鸞弔空影簮堅折白玉瓶沈斷青梗一死空冥府憂心長炳炳意堅志不移改邑不改井我本瑚璉器安肯作溺皿志節匪轉石氣噎如吞鯁不敢爝火然願為死灰冷貪生念麴蛾乞憐羞虎穽借此清江水葬我全首領皇天如有知定作血面請願魂化精衛填海使成嶺輟耕録節婦王氏王氏臨海人題清風嶺崖石君王無道妾當灾棄女拋男逐馬來夫面不知何日見此身料得幾時回兩行清淚偷頻滴一片愁眉鎖未開回首故山看漸逺存亡兩字實哀哉東園客談至元十三年丞相巴延平宋以偏師徇台台之臨海民婦王氏者美姿容被掠千夫長殺其舅姑與夫而欲私之婦誓死不可自念且被汚因陽曰能俾我為舅姑與夫服期月乃可事主君千夫長見其不難于死從所請仍使俘婦雜守之師還挈還行至嵊過清風嶺婦仰天竊歎曰吾知所以死矣即齧拇指出血寫口占詩于崖石上寫畢投崖下以死死之日距今且將八九十年石上血墳起如始寫時不為風雨所剝蝕嵊丞謝端為之立祠盧氏盧氏荆門州人統制吳源妻送夫赴襄陽羡君家世舊纓簮百戰常懷報主心草檄有才追記室築臺無路繼淮隂射鵰紫塞秋雲黑走馬黃河夜雪深白首丹衷知未變歸來雙肘印黃金絶命詞夫為萇𢎞血妾感共姜詩夫妻同死義天地一凄其荆門紀略源救襄陽陳殁氏聞訃大慟部署家事畢焚香泣拜曰夫死王事忠也妾敢不相從于地下遂賦此詩自縊死杜氏婦北行作江淮幼女别鄉閭好似明妃逺嫁無默默一心歸故國區區千里逐狂夫慵拈簫管吹羌曲懶繫羅裙舞鷓鴣多少眼前悲泣事不如花栁舊江都山房隨筆英州司寇女以下無姓名閨媛過梅嶺題并序妾幼年侍父任英州司寇既代歸父以大庾本號梅嶺今蕩然無一株遂市三十本植于嶺之左右因留詩于寺壁今隨夫任端溪復至此嶺已為圬鏝者所覆即命墨于故處滇江今日掌刑回上得梅山不見梅輟俸買栽三十樹清香留與雪中開墨客揮犀上庠士人妻寄鞋襪細襪弓鞋巧樣新殷勤寄與讀書人好將穩步青雲上莫向平康漫惹塵名媛璣囊太學生妻寄夫數日相望極須知意思迷夢魂不怕險飛過大江西合璧事類前集有書生娶後逰太學久不歸一夕夢返其家見妻秉燭寫詩書生怪而記之後家書至有詩一首如夢中所見無殊夢之夕乃發書之日浣花女潭畔芙蓉芙蓉花發滿江紅盡道芙蓉勝妾容昨日妾從隄上過如何人不看芙蓉顧氏積書巖選無名女子永安驛題柱無人解妾心日夜長如醉妾不是瓊奴意與瓊奴㑹名媛璣囊崖州女子詠花扇團扇畫方新金花照席茵那緣燈下見更值月中人四朝詩無名女子靖康閒題鄧州南陽驛壁流落南來自可嗟避人不敢御鉛華却思當日鶯鶯事獨立東風霧鬢斜陶朱新録無名婦人句蚌胎光透殼犀角暈盈尖詠月許彥周詩話鄱陽婦人建炎初題黃連步接官亭壁妾鄱陽人也女工之外從事詩禮不幸嚴霜下墜泰山其頽飄泊一身所適非偶薰蕕同器情何以堪昨浮家洞庭怒張一帆良人倐為鬼録吁臣不事二主女不事二夫其奈何哉偶攜稚子來登客亭感時傷心遂成小絶知我者其天乎故里蕭條一望間此身飄泊歎空還感時有恨無人說愁斂雙蛾對暮山景定建康志宋詩紀事卷八十七
