body:
  text: 宋詩紀事卷十九錢塘厲鶚撰楊繪繪字元素綿竹人皇祐初擢進士第二神宗朝纍官翰林學士御史中丞哲宗朝終天章閣待制知杭州有集墨莊漫録嘉祐中有王永年者娶宗女求舉于竇卞楊繪得監金耀門書庫嘗置酒延卞繪出其妻間坐妻以左右手掬酒以飲卞繪謂之白玉蓮花杯可謂善體物者也春遊傾城追逐豔陽天上已清明節序連桃李光隂足駘蕩湖山風月更鮮妍谷中答響飄新曲波底妝光揚綵船遲日未西人已醉緑楊柔弱舞秋千合璧事類前集落花夜來經雨學啼妝今日摧紅怨夕陽已落旋隨春水急強留還怯晚風狂應將别恨慿鶯語更把歸期趁蝶忙誰謂多情消不得夢魂猶惜滿闌香夢梁録夀山夀山北接侵隋碧溳水南流接漢清宋玉陽臺猶暮雨子虛夢澤已春耕湖廣總志謝景溫景溫字師直綘次子皇祐元年進士元祐初歷官權刑部尚書知鄆州徙知河陽中山詩話梅聖俞幼戲謝師直詩曰古錦裁詩句斑衣戲坐隅木奴今正熟肻效陸郎無師直小名錦衣奴至十嵗讀此方悟之遊雲門若邪欲盡山轉青中有三寺山為屏秦峯表裏植蒼翠仰視萬木相崢嶸雪霜洗盡塵土迹龍蛇蟄處煙氛生我攜賔友事登覽穿徑已覺毛骨輕窮幽陟險興不盡巖房留宿神逾清寒隨隂谷一夜至酒力半酣如不勝狂歌出行步竹徑正是溪橋雙月明幽泉亂迸石竇響松風逺送哀猿聲凌晨後嶺縱俯仰長林翠阜何從衡獻之舊地不可辨懸崖欲斷石為坑五雲散盡遺迹滅老僧至今傳此名慿髙覽古復太息翻嗟萬事多廢興丈夫出處固未測我于山水夙有盟區區世路雖可厭脫身向此誠獨醒豈如乘興事兹樂賞心不繫窮與亨昔人避世非獲已我今安學禽鳥情雲門集吕大防大防字微仲藍田人皇祐初進士神宗朝纍除知制誥哲宗即位為翰林學士拜尚書右丞封汲郡公進尚書左僕射兼門下侍郎紹聖初以黨論責授舒州團練使循州安置未踰嶺卒髙宗朝復故官贈太師宣國公諡正愍有吕汲公文録萬里橋西有僧居曰聖果後瀕錦江有修竹數千竿僧辨作亭于竹中豫與諸公自橋乘舟泝流過之因名亭曰萬里蓋取其發源注海與橋名同而實異作小詩識之萬里橋西萬里亭錦江春漲與隄平拏舟直入修篁裏坐聽風湍徹骨清成都文類李覯覯字泰伯建昌軍南城人皇祐初以薦試太學助教終海門主簿太學説書有退居類稿絶句人言落日是天涯望極天涯不見家已恨碧山相掩映碧山還被暮雲遮青箱雜記識者謂此詩意有重重障礙李君其不偶乎後果如其言清明遲遲日影坐成曛聞説清明在此晨花卉不宜愁眼看句萌能為幾人春銷磨志氣多因老檢點交遊半作塵欲向醉中聊自適病來還厭舉杯頻王方平五百餘年别恨多東征重得見青蛾劈麟始擬窮歡樂不奈間人背癢何璧月璧月迢迢出暮山素娥心事問應難世間最解悲圓缺秪有方諸淚不乾梁帝凝旒南面總虛名廟祀何曽暫割牲但學禪心能忍辱莫羞侯景陷臺城送僧遊廬山行非為客住非家此去廬山況不遐要見南朝舊人物池中唯有白蓮花憶錢唐江當年乘醉舉歸帆隱隱前山日半銜好是滿江涵返照水仙齊著淡紅衫以上盱江集望海亭席上作七閩山水掌中窺乘興登臨到落暉誰在畫簾沽酒處幾多鳴櫓趁潮歸晴來海色依稀見醉後鄉心積漸微山鳥不知紅粉樂一聲檀板便驚飛湘山野録蔡君謨出守福唐時泰伯自建昌攜文迓之一日命泰伯及陳孝亷烈早膳于後圃望海亭不設樽酒膳罷欲起時方暮春鬻酒于園郡人嬉遊藉姬數子時亦尋芳于此既太守在亭因斂袖聲喏而退蔡公遂留之旋命觥具就以為侑酒方行舉歌一拍陳烈者驚懼怖駭越牆攀木而遁泰伯即席賦詩云云句幾函道藏金壺墨一片秋容玉井花仙都觀酒鄉貧更入詩債病猶還和陳殿撰天冷雲含白溪清水獻沙感秋歷代吟譜張唐英唐英字次功蜀州新津人丞相商英之兄自號黃松子皇祐初調榖城令熙寧中仕至殿中侍御史有嘉祐名臣傳蜀檮杌行于世題傳舍詩先帝昭陵土未乾又聞永厚葬衣冠小臣有淚皆成血忍向東風看牡丹邵氏聞見前録熙寧元年春唐英以前御史服除還京朝過洛府尹同僚屬出賞花皆不見題詩傳舍云云時仁宗山陵初成英宗厭代尹聞之遣書為禮卻而不受賴唐英還朝不得歸臺不然河南尹者不免矣裴大亮大亮皇祐四年以尚書虞部員外郎知商州題西巖寺清溪如鑑照行人谷鳥山花景漸新五馬頻來無别事為思江上若邪春陜西通志鄭炎炎皇祐初漢中郡守贈張俞秀才遊金華山凌晨别我將何適鶴態飄然振霜翮指點金華欲去遊騎驢直造煙霞宅一片嵐光凝不飛數里松隂翠如滴背臘山寒雪未消迎春地暖花爭拆水潺潺兮風索索簾卷虛堂正岑寂高歌應有鬼神聽狀物潛驅鴻化力繄我浮生繫郡符安得乘間訪靈迹吟成一首送君詩倩僧勒上巖邉石陜西通志鄭獬獬字毅夫安州安陸人皇祐五年進士第一神宗朝拜翰林學士為王安石所惡出知杭州徙青州提舉鴻慶宫卒有鄖溪集郡齋讀書志毅夫為文有豪氣峭整無長語與滕達道少相善嗜酒落魄無檢操人目之曰滕屠鄭沽題垂虹橋寄同年叔楙祕校劉孜字叔楙原父之弟時為吳江尉三百闌干鎖畫橋行人波上踏靈鼇插天螮蝀玉腰闊跨海鯨鯢金背髙路直鑿開元氣白影寒壓破大江豪此中自與銀河接不必仙槎八月濤中吳紀聞題僧文瑩所居壁守杭日作西湖頻送客緑波舟楫輕春入蘿徑靜浪花翻逺晴題杭郡閣雨影橫殘虹秋容隂映日寒江帶暮流曉角穿雲出峯藏翠如織宿鳥去無迹封書寄所懷聊託金門翼玉壺清話二詩時頗訝其氣象不逺後解杭麾將赴青社以病泊舟楚州卒省中畫屏蘆雁髙堂傾動長江流黃蘆羣雁滿滄洲掃開長安塵土窟寫出江南煙水秋兩雁斜飛入空闊四雁顧慕橫沙頭髙風拉折蒼玉幹蘆花雪盡無人收赤日飛光不敢近但覺爽氣屏間浮嘗聞畫龍入神變坐馳雲雨天地遊只恐此雁亦飛去瀟瀟萬里誰能留聲畫集采鳧茨朝攜一筐出暮攜一筐歸十指欲流血且急眼前飢官倉豈無粟粒粒藏珠璣一粒不出倉倉中羣鼠肥宋文鑑朱亥冢髙論唐虞儒者事賣交負國豈勝言憑君莫笑金椎陋卻是屠酤解報恩老學菴筆記絶句田家汨汨水流渾一樹高花明逺村雲意不知殘照好卻將微雨送黃昏能改齋漫録代探花郎一絶嫩緑輕紅相向開一番走馬探春回青衫不管露痕溼直入亂花深處來苕溪漁隱叢話春詞小池春破玉玲瓏聲觸簾鉤漸好風間繞闌干掐花樹春痕已著半梢紅錦繡萬花谷蠡口絶句千重越甲夜城圍戰罷君王醉不知若論破吳功第一黃金只合鑄西施庚溪詩話吳門蠡口瀕太湖乃范蠡自此乘扁舟泛五湖也鄭毅夫詩云云雪晴天外丹霞一抹紅瓦溝已見雪花溶前山未放曉寒散猶鎖白雲三兩峯後村千家詩恭和御製賞花釣魚輦路鮮雲五色開一聲清蹕下天來水光翠繞九重殿花氣濃熏萬夀杯繡幕煙深紅會合文竿風隱緑徘徊蓬山絶頂無人到詔許羣仙盡日陪寄程公闢念昔都門手一攜春禽幾向苧蘿啼夢回金殿風光别吟到銀河月影低舞急錦腰迎十八酒酣金盞照東西何時得遂扁舟去雪棹同君泛剡溪以上瀛奎律髓浮雲樓在安陸樓在浮雲縹眇間浮雲破處見朱闌山光對入鄖城紫溪影橫飛夢澤寒湖廣總志上翰林中使傳宣內翰家君王令草侍中麻紫泥金印封題了銀燭才燒一寸花淵鑒類函句東飛江雲北飛燕同寄青春不相見夜來過嶺忽聞雨今日滿溪俱是花詩人玉屑滕元發元發初名甫字元發以避髙魯王諱改字為名而字達道東陽人家蘇州皇祐五年進士第三神宗朝纍官知開封府翰林學士出守外郡哲宗朝以龍圗閣學士知揚州卒諡章敏梁溪漫志滕達道未遇時與諸生講學于僧舍主僧出諸生夜盜其犬而烹之事聞有司治其罪滕公為丐免守曰如能為盜犬賦則將釋之滕公即口占其詞曰僧既無狀犬誠可偷輟藍宮之夜吠充綘帳之晨羞摶飯引來喜掉續貂之尾索綯牽去驚回顧兔之頭守大笑竟置不問寄越州范希文太守江山千里接仁風都在東南秀氣中為問玉皇香案吏蓬萊何似水晶宫能改齋漫録時元發守吳興送俞退翁致仕還鄉清時沖節是身謀御史郎官不肻留回首軒裳雙脫屣放懷天地一輕漚卞雲霅月柴門靜芰雨蘋風野艇秋仰羡冥鴻空自愧區區圖報未知休湖州府志句萬國休兵外羣生奏凱中皇祐五年御試吹律聽軍聲寒日邊聲斷春風塞草長傳聞漢都護歸奉萬年觴西旅來王話以上古今詩野色更無山隔斷天光直與水相連月波樓話竹坡詩陳汝義汝義晉江人皇祐五年進士寄題錢公輔衆樂亭聞説湖亭又一新不徒行樂樂斯民水光賸占鷗鳧地人意賞從桃李春試展畫圖清俗眼況聞几席傲天真使君已陟螭頭貴應為煙雲入夢頻延祐四明志韋驤驤字子駿錢唐人皇祐五年進士纍遷主客郎中出為夔路憲知明州提舉洞霄宫有韋先生集古金章全椒民間二稚子得金章于野分而競焉入于縣縣以獻州黃金鑄印龜為鈕埋沒郊原已綿久春泥深處襯耕蹄臘雪銷時經獵走臘去春來幾百年年年寂莫無夤緣不知何代何王賜于此奚為獨墜捐由來至寶寧長棄一旦光輝難自祕牧兒蕘子兩窺觀不識雕章秪知利里胥白官官為收歘從下邑歸之州發囊啓襲生精彩十目爭視寒星流粲然五字分明在蒼龍副將軍所佩將軍安在惟空名方寸堅剛終不潰物否而通理所宜在人誰謂殊于斯請看金印雜瓦礫未逢採拾無輕嗤登蓬萊閣行盡東州到此州登臨更盡北山頭孤城突兀連滄海三島參差聳暮秋廣座下疑鼇負石危簷遠學蜃為樓蓬萊方丈雖冥邈髙閣今朝亦勝遊賦牡丹黃齏倚闌凋謝若為情旋拾殘紅入鼎烹吞秀嚼香須細細送春唯此一杯羮以上韋先生集蒲宗孟宗孟字傳正閬州新井人皇祐五年進士神宗朝擢翰林學士拜尚書左丞罷知亳杭鄆三州徙河中卒有集遊虎丘長松繞步水灣環寺據吳王冢墓間瘦石千層開碧玉疏篁十里裹青山壁從池上嶄巖起雲出門前自在間零落生公講臺下無人説法但空還遊虎丘山書錢唐舊遊失卻湖山恨去舟新年無意作春遊東風昨夜思龍井曉雨全家入虎丘望見遠峯疑石弄南高峯勝處誤尋歸路認花樓沙河勝處明朝一出閶門去清夢遙知在兩州以上吳郡志題徐沖晦處士舊隱沖晦先生不肻官布衣謁帝布衣還尚嫌姓字騰人口惟恐文章落世間大隱不妨居市井高吟何處問家山平生寄意江湖上雲自無心水自間興化府志錢藻藻字純老臨安人文穆王元瓘子儼曽孫閣門祗候順之之子家蘇州皇祐五年進士仕至翰林侍讀學士權知開封府天平山白雲泉白雲巖靜最深隈泉溜泓溶石竇開宿霧不生澄曉月殘風輕漾蟄寒雷源從天漢星邊落流自鼇峯海上回莫謂無心事奔注曽隨霖雨下山來吳郡志李先先字淵宗許州臨潁人第進士官至祕書監與杜秀才南極多老人及見九代孫君今古儋州氣質清且溫今年八十二頗覺行步奔白鬚映紅頰疑是羲皇人淵鑑類函吳處厚處厚字伯固邵武人皇祐五年進士初為將作丞蔡確嘗從處厚學賦及作相處厚通箋乞憐無汲引意用王圭薦除館職出知漢陽軍上蔡確車蓋亭詩擢知衛州卒紹聖中以元祐黨追貶歙州别駕有青箱雜記萍洲可談吳處厚知漢陽軍每謂鸚鵡洲沔鄂佳處欲賦詩未就一日綱吏來告覆舟吳問所在吏曰鸕鷀堰吳拊案連唱大竒徐曰吾經年為鸚鵡洲尋一對不得天俾汝也因得末減九江琵琶亭夜泊潯陽宿酒樓琵琶亭畔荻花秋雲沈鳥沒事已往月白風清江自流送客西陵若邪溪畔醉秋風獵獵船旗照水紅後夜錢唐酒樓上夢魂應繞浙江東青箱雜記王安國作詩多使酒樓嘗語余曰楊文公詩有江南一酒樓隄栁拂人頭李白題詩遍酒樓錢昭度詩亦有酒樓長憶錢唐江上望酒樓人散雨千絲子詩有幾酒樓余答曰吾詩有二酒樓安國曰足矣題王正叔濦景亭亂鶯啼處栁飛花拍拍春流漲曉沙正是江南梅子熟年年離恨寄天涯宣和畫譜王榖字正叔居偃城之南城有小亭下臨濦水榜曰濦景亭南通淮蔡北望箕頴川原明秀甚類江鄉景物吳處厚詩云云自諸暨抵剡夷猶雙槳去莫不辨東西夕照偏依樹秋光半落溪風髙一雁過雲薄四天低莽蕩孤舟缷水村楊栁堤出得雲門路風悽日夕曛船撑鏡湖水路指沃洲雲山色周遭見溪流屈曲分一觴復一詠誰是右將軍剡録李常常字公擇南康建昌人皇祐中進士元豐中歷太常少卿禮部侍郎哲宗朝拜吏部侍郎御史中丞出知成都有集解雨送神曲怒風兮揚塵日爍石兮將焚水泉竭兮厚地裂嘉榖稿兮孰薅且耘神龍兮靈壑挹清波兮幽濆鳴鼉鼓兮舞神覡庶下鑒兮霈祥氛肅旗斾兮先驅咽簫笳兮擁歸輿椒醑甘兮牲幣潔始肸蠁兮為之躊蹰瞻前山兮嵯峩指去路兮縈紆神德大兮報無以晦徒感涕兮長吁宋文鑑馬雲雲皇祐中蘇州節度推官訪踞湖仇山人隱居雞犬眠雲白日空暮春花木滿川紅茶甌香沸松林火藥杵聲清石澗風玉帛未聞招隱士神仙今喜識臺翁夕陽半局殘棊在醉倚巖邊紫桂叢踞湖山山臨太湖上寺隱青蘿間五塢洞壑邃衆峯屏障環濃嵐面光彩驚波背潺湲雲歸定僧寂月伴樵夫還林墅掩蒙密級磴容躋攀錢氏建茅社此地為家山條竹塢檀欒遍巖川幽谷氣象鮮風玉自宫徴秋籟成管弦夕靄起碧霧晨曦生緑煙花繁紫鳯飽質徑蒼虯攣藤蘿交密蔭仰不見雲天欲訪桃源路塢塢疑相連吳郡志踞湖山即橫山也錢氏有國日造寺于山下曰薦福寺里人又以寺名名之山有五大塢圖經又名五塢山五塢舊名不雅皇祐五年節度推官馬雲三遊此山求其林澗之美峯壑之秀雲景之麗泉石之怪因其物象名之曰芳桂飛泉條竹丹霞白雲合踞湖為六題以詠之襄州太守王侯洙復峴山羊公祠漢水舒舒山崇崇岧然峴首稱清雄南方強吳恃割據選命儒將登元戎太康以來千餘載荆州遺愛思羊公江山襟帶號形勝藉此因成輔晉功公謂髙賢事迹異視之間暇無匆匆測知當日登臨意景物亦與今朝同新就峯嶺作亭舍面勢豁若凌煙虹蒼蒼雲木望不盡浩蕩古意深何窮盤回小徑至釣石山下臨水有巨石曰釣臺俯視凝碧相連通叢篁森束林蓊鬱又從其下興祠宫迅湍急瀨鳴湱湱濃嵐翠靄霏濛濛晦晴氣象隨變易朝昏萬狀殊初終閣老分符二千石旟竿刻隼車畫熊管內民租絶逋負里社歌鼓歡年豐府門晝扄官事退時引賔佐嬉其中崖條嶺蔓雜丹白澗花滿眼羅青紅磴道迤邐陟縈屈飄若巾屨騰秋空豈獨遊觀樂間燕圗樹佳政希前風經由粗得究本末強顔模寫慙非工音辭鄙俚雖一唱下詞寒苦無怡融襄陽府志顧臨臨字子敦會稽人皇祐中舉説書科為國子監直講元祐中拜天章閣待制河北都轉運使召為刑兵吏三部侍郎兼侍讀翰林學士紹聖初以龍圗閣學士知定州因黨論奪職斥饒州居住雞肋編顧臨子敦內翰姿狀雄偉少未顯時人以顧屠嘲之元祐中自給事中為河北都運使蘇子瞻作詩送之云我友顧子敦軀膽兩雄偉便便十圍腹不但貯經史容君數百人一笑萬事已十年卧江海了不見愠喜磨刀向豬羊釃酒會鄰里歸來如一夢豐頰愈茂美平生批敇手濃墨寫黃紙會當勒燕然廊廟登劒履翻然向河朔坐念東郡水河來屹不去如尊乃勇耳顧得之不樂既行羣公祖道郊外子瞻辭疾不往和前韻以送因以自解焉君為江南英面作河朔偉人間一好漢誰似張長史上書苦留君言拙輒報巳置之勿復道出處俱可喜攀輿共六尺食肉飛萬里誰言逺近殊等是朝廷美遙知别送處醉墨爭淋紙我以病杜門商頌空振履後會知何日一歡如覆水善保千金軀前言戲之耳題招提院靜照堂踏暑夏日長履霜冬日短乞詩賁新堂經年不辭緩虛院莓苔青客衣塵土滿自矜非俗求容色長衎衎盈篋寶珠璣東歸春正暖靜照名已傳主人宜亦反至元嘉禾志駕幸太學五紀寥寥舊典章一朝清蹕下膠庠旗常日月隨天轉文武衣冠列宿行拜老徒煩嗟漢室談經戒逸慕周王已叨法從陪臨幸安足賡諸詠在堂中州題詠集句如逢公釀年來富鬬虎匡螯稻正肥蟹略胡瑗瑗字翼之泰州海陵人仁宗朝以布衣召拜校書郎為湖州學官皇祐中為國子監直講嘉祐中遷太子中允充天章閣直講以太常博士致仕石壁并序余嘗覽李翰林題涇川汪倫别業二章其詞俊逸欲屬和之今十月自新安歷旌德而仙尉曽公望同遊石壁蓋勝境也竒峯對聳清溪中流路出半峯佳秀可愛傳聞新建汪公所居不遠掩映溪岫率類于此且欲尋訪迫暮不獲因思旌川即涇川接境也而幽勝過之汪公亦倫之别派也而儒雅勝之豈可使諷詠不及于古乎輒成一首題于汪公屋壁雖不及藻飾佳境比肩英流庶俾謫仙之詩不獨專美矣李白好溪山浩蕩旌川遊題詩汪氏壁聲動桃花洲英辭逸無繼爾來三百秋汪公亦蕃衍宗支冠南州其間新建居林泉最清幽竹聲滿道院山光入書樓仙氣既飄飄儒風亦悠悠子孫多俊異詞行咸精修我來至石壁賞之不能休酣味碧溪水苦飲黃金甌因羡汪君居復思汪君投遇景清興發浩與天雲浮斐章異繡段灑翰非銀鉤庶與謫仙詩千古同風流寧國府志王疇疇字景彝濟隂人舉進士皇祐中召試直祕閣英宗朝纍遷翰林學士禮部侍郎拜樞密副使卒贈兵部尚書諡忠簡送同年蒲叔範察判杭州監釋之久未調王粲當從軍謂言塞垣事壯氣橫風雲育材幸明代薦賢無令君如無漢酤冗沈此荆山珍萍氏本譏酒周官有彝倫孝武事卻攘志清天地屯連兵無時已四海蕭然貧官始操釀具𣙜之飽師人利源一以泄頽波蕩無垠糜榖費耒耜良糵爭清醇酒禁著律令犯笞及其身狂藥乃陷穽傷哉堯舜民炎靈屬我后天資英且仁邦力早雄富漢制仍相循嵗賦二千萬經入固已勤彌年擁武節聚邉清國氛雄雄百萬師跨邁擊燕秦仰給傾武庫賞賚圗戎勳加斂猶不足返古當何云杭城東南劇地將湖海鄰𣙜利冠天下旗亭壓重闉彼雖斗筲職亦擇才英臣風露氣已肅溪潭寒彌新沙榜朝泛泛吳濤暮沄沄南州近牛斗氣象雄霜旻汀楓變老枿赤葉晴相紛嘗茶泊幽寺觀魚下輕䑳行當收翹楚寧復混蒸薪無為狎吳叟坐戀秋江蓴宋文鑑陳洎洎字亞之彭城人后山之祖皇祐中官鹽鐵副使有詩集眉山李􅌫云案陳公國朝正史實録俱無傳然常以嵗月考求公嘗歷知懷州審刑院寶元間自屯田員外郎為副端尋升臺端巳而出漕京西淮南京東慶厯五年轉吏部員外郎加直史館改使益梓路六年入為度支使副尋轉鹽鐵后山集載皇祐元年以副使行河還卒今史亦失書曲阜顔復云少于先子遺書中得公啓問詩章讀之往往意在棲退若送行閬中詩公時為審刑官朝中望譽始充大已有乞醉墦間之歎是知君子自重而不茍合者詩稿一卷詞格秀古造句愈工則入淡泊愈深若借宅云四壁舊貧寧畏盜一枝雖小易容巢贈無巳師云他年遠公社若箇是遺民藍溪間適云露侵僧履蘭三徑秋入農歌雨一犁秋居云井臼貧雖樂溪山遠未歸貽漁者云擬共停橈醉天幕緩歌濯足不回頭詩大小二十二篇䦘中送行不預焉逸者可知巳離郭店馬上回寄鄉知回望離亭映楚山慨然西笑入長安貪程野僕擔書引惜别鄉人駐足觀霞襯曙光烘積靄栁和春色蕩輕寒遙知此地歸來日迎取相如駟馬看過項羽廟八千子弟已投戈夜帳猶聞怨楚歌學敵萬人成底事不思一箇范增多寄寶臣寺丞萬里扶靈宅夀阡謝公純孝是家傳廬開四尺成寒土榱列三圍陋昔賢先域定生連理樹門人多廢蓼莪篇我心罔極君應念露白霜清泣昊天藍溪間居白鹿原東虎候西結廬岑寂映藍溪霜侵僧履蘭三徑秋入農歌雨一犁耽枕溜聲疑水宿拂簷山色類巖棲閉門養拙無人問揭盡陳篇日又低開元寺凌虛閣對雪寄唐卿瓊滴琳華一夜凝凌虛雕檻曉來憑眼觀銀色三千界身到瑤臺十二層玉灑砌塵供庾斛粉融簷水妒房陵化人宫好分明在恨不同君把袂登雉媒朱冠衮背一何鮮聲厲情驕目悍然若道物情皆錫類雉媒爭似鴆媒賢還劉處士先令公鄩功名録自注劉公事朱梁當年力戰蕩妖氛十萬雄師四七勳將略妙欺班定逺家聲髙過李將軍銘圗魏鼎文猶在筆勒燕山迹尚分今日間披有遺恨可憐生不遇明君謝人惠三峯朱柿烏椑珍果益丹明新折紅林蒂尚青漿冷夜凝仙掌露味甘秋剖楚江萍圓堆玉碗櫻難並剩薦金尊酒易醒應念茂陵消渴者整籃封貯到雲扄過田文墓當年聞奏雍門琴話著池臺淚滿襟何況今朝陵谷畔池臺無迹可追尋對雪寄崔仲裕自注時在藍田聞崔在酒舍春鶴韜霞勢漸濃卷簾庭館好支笻乘槎路闊寒凝凍種玉畦平曉被封天上瑤宫當月圃海中銀闕聳鼇峯思君不得同吟賞知在旗亭第幾重南齊曲江歡宴侍華裾舞拍琴歌藝有餘獨有純臣王叔寶解陳封禪一篇書自注南齊太祖曲江宴羣臣各使效伎藝褚淵彈琵琶王僧虔彈琴沈文季歌張敬兒舞王敬則拍張王儉曰臣無所解唯解誦書因跪帝前誦相如封禪書帝笑曰此盛德之事吾何以堪之湖上逢漁者雨蓑煙笠洞庭秋獨繭綸輕一葉舟擬共停橈醉天幕緩歌濯足不回頭秋日端居暑退蚊雷靜門間雀刺稀露莎蛬自急星樹鵲何依井臼貧雖樂溪山逺未歸時情似秋雁一一背寒飛以上陳副使集蘇舜元舜元字才翁舊字叔才開封人易簡孫皇祐中為提點兩浙刑獄守尚書度支員外郎有集明道雜志才翁子美兄弟也子美名籍甚才翁人少稱之然才翁書字清徑老健實過子美至為詩有嘉句子美亦不逮也送梁子熙聨句大榮大辱能生死人叔才二物不並以撓厥真子美之子病悶腸如車輪叔才勞憂到母餓寒著身子美世俗鹵莽輒置莫親叔才文殺光豔伏不得伸子美悽吟哀號酸入四鄰叔才夜計破午若燕作秦子美腹憤軋軋胸竒陳陳叔才淮國晚嶺吳渠春津子美去謝夙藴歸逢故辛子美雌火相丑刮鑿遁屯叔才駕風鞭霆以脫凡鱗子美苕溪漁隱叢話山谷云二蘇文章豪健痛快如此潘陸不足吞也仙都山龍車鳯輦入瑤天轍迹髙懸不可攀唯有風吹闕水青蓮花葉落人間仙都山志青州資政寄示小楷伯夷頌許昌相公以詩跋尾因作詩謝二公兼呈永興觀文相公舜元上法書遙逐使車還嘉句新從相府頒牢落二賢天地外自注孤竹之二賢風流三絶古今間台文競耀髙逾麗化筆交揮老更間不用悲吟恐飛去豈無神物護重關鐵網珊瑚釣鼇石在長樂當陽寺未窮雙佛剎先到一漁家山雨已殘葉溪風猶落花汲泉沙脈動敲火石痕斜應是任公子竹間曽煮茶福州府志句斷香浮缺月古像守昏燈宿僧院明道雜志陳侁侁皇祐間袁州通判題鄭都官墳祠公沒嵗已遠公名人競傳榛蕪四尺土風雅三百篇世未泯斯道天實生我賢築宫古原上一奠一悽然袁州府志管師復師復龍泉人從胡安定學隱居不仕人稱卧雲先生句滿塢白雲耕不破一潭明月釣無痕括蒼彚紀宋詩紀事卷十九
