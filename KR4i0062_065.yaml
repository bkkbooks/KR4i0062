body:
  text: 宋詩紀事巻六十五錢塘厲鶚撰陳均均字平甫號雲巖莆田人俊卿從孫肄業太學嘗輯宋編年舉要備要二書端平初有言于朝者敕賜廸功郎不受卒九江聞雁烟波渺渺夢悠悠家在江南海盡頭音信稀疎兄弟隔一聲新雁九江秋詩家鼎臠鶴林寺知有楓林坐竹間每尋紆路試登山虛簷忽見籠中鶴似我愛閒身未閒竹遶髙僧逢話處花畱仙者舊開枝道身虛淡元無著付與東風爛漫吹鶴林寺志杜旃旃字仲髙旟弟與弟斿叔髙旞季髙旝幼髙俱博學工文人稱金華五髙嘗占湖漕舉首有癖齋小集綠珠行蜀絲殷空金作谷珊瑚成林珠百斛彼姝千花萬花蔟明月出胎波照綠鏡中飛鸞掌中身夜月春花看不足悲歡倚伏為禍福西里憐顰東市戮願將舊意奉新人此别它生定難卜君因妾死莫多怨妾死君前君眼見髙樓直下如海深璧玉一碎沙中沈平時感君愛妾貌今日令君知妾心讀杜詩斐然有作王澤久淪浹正聲皆雅言百川忽西流青黄雜犧尊騷經吹死灰明燭日月昏綺麗兆建安淳古還開元夫子握元氣大音發胚腪明婁失毫芒神羲隘乾坤再變六義彰一日五典惇上該周南風下返湘水魂仲尼不容刪餘子何足吞五季兵戈繁嘲􅑜蟲鳥喧頽波既瀰漫新竒尚西崑吻喙生譏評神鬼懐憤冤王蘇發醯甕黄陳窮河源煌煌百年間後學同推尊時時或嘗鼎往往猶戴盆倣摹惑銅槃箋釋訛金根顧予小子旃獨受罔極恩神融淚交墮思苦心屢捫相望五百載如接顔色温爐冶無停工況復忝諸孫斯文誠尚存庶以起九原陸務觀赴召四海文章陸放翁百年漁釣兩龜䝉數關天地吾何與老作春秋道未窮李耳守官逾二代張蒼職史到三公坐令嘉泰追周漢此是君王第一功以上癖齋小集杜斿斿字叔髙端平初以布衣召入館閣校讎陳同甫跋云叔髙之詩如干戈森立有虎食牛之氣而左右發春妍以輝暎于其閒嚴先生釣臺斯人真隐處寂寞使人愁正著雙臺在還從一老逰涼風動隂壑斜日下滄洲灘畔沈沈水潛魚亦避鈎釣臺集游九功九功字勉之建陽人用䕃補官除湖北運判知鄂州召為兵部郎官出知泉州端平初仕至司農少卿寳謨閣直學士與兄九言自為師友講明理學號受齋先生諡文清絶句烟翠松林碧玉灣捲簾波影動清寒住山未必知山好卻是行人得細看全芳備祖荅黄叔暘冥鴻倦雲飛斂翼退遵渚秋蟲感時至自野來在宇老我久合歸溪山況延佇俯此沙水清面彼烟塵聚壟斷既衝衝瀾倒亦詡詡豈無砥中立而不改風雨忽忻逺寄聲秀句盈章吐璀璨爛寒芒晴空見冰柱頗聞詞瑒筆漫焉棄如土黃梁枕上過得之亦不處獨行固不移尤在審去取詩字鼎臠李伯玉伯玉字純甫饒州餘干人端平二年進士第二仕至敷文閣待制權禮部尚書兼侍讀卒有斛峯集懐湯尚書伯紀一曲清歌一弄琴十千美酒十分斟江流不動潮初上斗柄將垂夜向深沙觜露漙孤鶴警潭心月冷老龍吟此時最是懐鄉國雲裏征鴻閒逺砧饒州府志潘牥牥字庭堅閩人端平二年進士第三歷太學正通判潭州有紫巖集齊東野語庭堅富沙人初名公筠後以詔嵗乞靈南臺神夢有人持方牛首與之遂易名牥理宗殿試第三人跌宕不覊為福建帥司機宜文字日醉騎黃犢歌離騷于市嘗約同舍置酒瀑泉酒行令曰有能以瀑泉灌頂而吟不絶口者衆拜之庭堅被酒豪甚脱巾髽髻裸立流泉之衝高唱濯纓之章衆謬為驚歎羅拜以為不可及歸即卧病而殂庭堅年六亡嵗時嘗和人詩云竹纔生便直梅到死猶香識者知其不永劉潛夫誌其墓云庭堅為文脱去筆墨蹊徑秀拔精妙結字有顔筋栁骨小楷尤工廷試第三第傳京師紙貴初逺相擅國諱聞綱常端平親政奮發獨斷雪故王收人望乙未䇿士庭堅對曰陛下手足之愛生榮死哀反不得視士庶人宜厚東海之恩裂淮南之土以致人和時對者數百人庭堅語最直澧陵一郭依稀隔渡頭解鞍來倚店家樓已攀桂樹吟招隱因看梅花賦逺游市上俚音多楚語橋邊碧色是湘流江南郷國三千里目送羈鴻起暮愁後村干家詩題嶽麓寺道郷臺坡仙不謫黃黃應無雪堂道郷不如新此臺無道郷青山非其人山靈能頡頏一落名勝手境與人俱香悲吟倚空寂臨眺生慨慷道郷不可作承君不可忘困學紀聞景靈宫恭謝駕回丞相以下皆簮花輦路安排看駕回千官花壓㡌簷垂君王不輟憂勤念玉貌還如未插時隨隱漫録落梅一夜風吹恐不禁曉來零落已駸駸忍看病鶴和苔啄空遣飢蜂繞竹尋稚子躊躕看不埽老夫索寞坐微吟窗前最是關情處拾片殷勤在掌心夢粱錄英烈夫人廟淮海豔姬毛惜惜蛾眉有此萬人英恨無七首學秦女向使裹頭真杲卿玉骨花顔城下土冰魂雪魄史閒名古今無限腰金者歌舞筵中過一生髙郵州志毛惜惜郵之官妓也端平二年榮全據城叛召惜惜佐酒不屈罵賊死詔封英烈夫人賜廟潘牥有詩曹娥江一川紅日漲晴波黄絹碑漫閉碧蘿不止但争三十里曹瞞元不識曹娥娥江題詠林希逸希逸字肅翁福清人端平二年進士歷官翰林權直兼崇政殿説書直祕閣知興化軍有鬳齋續集竹溪十一稾劉後村跋乾淳閒林艾軒始好深湛之思加鍜鍊之功有經嵗累月繕一章未就者一傳為網山林氏名亦之字學可再傳為樂軒陳氏名藻字元潔三傳為竹溪詩比其師槁乾中含華滋蕭散中藏嚴密窘狹中見紆餘題馬和之覓句圖先生隱几奴煨火斜插疎枝破瓦尊鶴夢未回更幾轉吟成應是月黄昏明皇聽笛圖夀王妃弄寧王笛對面三郎背老伶卻恨馬嵬西去路無人吹出雨淋鈴題江貫道山水四言此畫疋絹作石林簡齋有詩跋逺山叢叢逺樹濛濛咫尺萬里江行其中短長何岸髙低何峯彼坻彼峙彼瀑彼洪晴嵐乍豁煙靄蔥籠或斷或屬且淡且濃爾崒奚寺爾盤奚宫或垣隂翳或梁嵌空有吠者厖有樵者翁危檣落碇短棹掀篷往來異趨寂動殊容羃翠其庭豈非盧鴻畧彴而渡豈非龜蒙昔我經行雲山萬重若淮南北與江西東亦蓑而雨亦㡌而風乃今追維夢境相從及此開巻恍然昔同誰居作者造化論功淹總其裔熙成是宗聲聞九陛既召而終謂彼樹白貫道畫林木如算子其身皆白識其身窮其然豈然訊之天公此名穹壤疇曰不逢題達磨渡蘆圖白頭浪中碧眼胡赤腳笑蹋雁銜蘆太平寺主不知我觀音後身誰誑渠是身如幻本來空偶然游戲非神通當年涉海向震旦扁舟本與商胡同君不見壺丘弟子御風飛猶有所待周笑之又不見横抛錫杖渡水僧回瞻黄檗稱大乗此胡法器更竒在何曽以此為聖解蕭郎不悟義不畱欲要時人畧驚怪異時埋骨寄熊耳萬里西歸提隻履忽從蔥嶺遇宋雲雅意依然今日是此圖誰筆面如活客來卻詠臨波韈若將底事比渠儂老胡暗中定羞殺以上竹溪十一稾曾三異三異字無疑號雲巢新淦人以隱逸召為祕閣校勘除太社令鶴林玉露雲巢周益公門人博學工文尤精考訂以隱逸召立朝逾年未及有所開陳奉祠而歸年九十乃終攜茶訪楊東山搴衣不待履霜回到得如今亦樂哉泓穎有時供戲劇軒裳無用任塵埃眉頭猶自懐千恨興到何如酒一杯知道華山方睡覺打門聊伴茗奴來鶴林玉露端平初楊東山累辭召命以集英殿修撰致仕家居年八十雲巢攜茶䄂詩訪之詩云云陳容容字公儲自號所翁福唐人端平二年進士倅臨江入為國子監主簿出守莆田圖繪寳鑑所翁詩文豪壯善畫龍得變化之意潑墨成雲噀水成霧醉餘大呌脱巾濡墨信手塗抹然後以筆成之或一臂一首隱約不可名狀曾不經意皆得神妙題浯溪中興頌銀旗金甲渡巴西靈武城樓巳萬幾一札秖聞元帥命五牋合待使臣歸未聞請表更追表且看黄衣換紫衣天性非由人偽滅何緣尚父結張妃六等勝如誅獨栁二張縱活亦何顔太師死後猶書法水部刑章托頌閒最憶海青投樂器絶憐甄濟隱青山中興碑下姦臣懼天道何嘗不好還隨隱漫錄張道洽道洽字澤民號實齋衢州開化人端平二年進士嘗為池州簽判後辟襄陽府推官卒平生作梅花詩三百餘首方萬里序實齋先生詩無一語不平淡而豪放之氣自不可掩詠梅詩極多篇有意句有韻梅花行盡荒林一徑苔竹梢深處數枝開絶知南雪羞相並欲嫁東風恥自媒無主野橋隨月管有根寒谷也春回醉餘不睡庭前地秖恐忽吹花落來瀛奎律髓李山節山節汾州人金亡歸宋詠楊妃菊命委馬嵬坡畔泥驚魂飛上傲霜枝西風落日東籬下薄幸三郎知不知山房隨筆端平中朱湛盧復之使北展覲八陵引李與王仲偕南李初任郷郡節制司幹後任浙西倅時正倅陳三嶼松龍㑹僚友于多景樓賞楊妃菊令諸妓各持紙筆侍衆官請詩李自江下後至酒一行起背手數步吟云云辭致精切或至閣筆陳振孫振孫字伯玉號直齋安吉縣人端平中仕為浙西提舉改知嘉興府嘗著書錄解題題張氏十詠圖平生聞説張三影十詠誰知有乃翁逢世昇平百年久與齡耆艾一家同名賢叙述文章好勝事流傳繪素工遐想盛時生恨晚恍如身在畫圖中齊東野語朱復之復之字幾仲號湛盧建安人端平中使北展謁八陵楓鳳山髙兮上有楓青女染葉猩血紅莫辭老紅嫁西風一夜憔悴成秃翁全芳備祖句忽聽夏禽三五弄新紅突過石橊枝初夏紅蕖老去羞明鏡推讓朱榮上蓼梢秋日後村詩話周弼弼字伯弼文璞之子有端平詩雋建寧浦城李頻行祠建安梨嶽老梨木刻作唐朝建州牧香爐忽動吹寒灰浦城環翠隂風來嶺頭頑石盡能走澗下奔泉皆倒回猨猱啼兮鬼嘯野六元虯兮四驪馬想須吟遶碧草亭舉手髙翻白雲寫峯為文通名夢筆楊公書堂曾散帙麗月鮮霞付與誰烟墅有人還築室田父何所祈贈爾青麰黒桑椹里儒何所求贈爾黄粱布囊枕萬嵗兮千秋既往兮復畱抽蘭心拆椒口簸南箕挹北斗不假竹枝歌何須折楊栁秖用秦原妙絶詞傳入神弦薦春酒寄杜北山一曲小湖濵幽居不厭貧坐容禪子憩家就麴生鄰簷竹侵燈衆籬花落竈頻幾時吟得句寄與豫章人孫伯符墓梧葉蕭蕭墓草長夢魂曾斷九迴腸空聞絳帊離漳水誰見黄旗入洛陽虎跱有基宫樹老龍盤無廟石城荒赤烏不識桑田變猶自棲棲戀白楊山居春晚索居牢落動關心但覺悤悤嵗月侵無夢不因憐畫静有懐多是惜春深草香稚蜨銷胡粉花落蠻鶯變楚金最是不禁芳樹色能涵幾日又成隂荻港波眼沄沄浪復輕稍蘇羈束過清明倩人覓路先尋酒久客懐郷始見餳松下紫芽肥野菜竹閒青葉帶山櫻自從一别齊安後直到今朝始聽鶯中和節時節悤忙過隙駒可堪岑寂就船居不禁衰病慵耽酒無益閒交嬾報書風暖暮田歸海燕雨酣春水上潮魚客中自是光隂速纔見新正又月初釣臺晴江漾漾綠波來惆悵君房去不回秦苑山河歸故國越郷風雨閉荒臺春風一道江蘺長落日千峯杜宇哀欲訪釣舟無處所野花如雪滿汀開野廟野廟荒蕪倒掩扉寂寥香火客來稀年年歸燕相看覻空滴春泥損畫衣夜深虛堂人静不聞更獨坐書牀對夜燈門外不知春雪霽半峯殘月一溪冰題僧子温畫水墨葡萄褭褭多應半熟時落斜髙挂冷攅枝分明記得山窻下一架寒藤帶雨垂除夕思歸山妻書到多日野渡舟横幾回想見溪邊亭上故人待我銜杯以上端平詩雋陳瀧瀧字伯雨其先汴人徙于吳郷薦漕試皆不利晚號碧澗翁與湯仲友髙常顧逢皆吳中端淳名士題蘇子美滄浪亭有甃井方石上刻字兩行云滄浪亭奕局整履上飛虹風髙退酒容葉黄翻亂蜨樹老卧蒼龍古徑秋霜滑空山暮靄濃滄浪棊石在題筆暗塵封硯北雜志樓扶扶字叔茂號梅麓鄞人端平中沿江制置司幹官淳祐中知泰州軍事句夜深更擁寒衾坐明月梅花共一窗全芳備祖張端義端義字正夫自號荃翁鄭州人居姑蘇端平中應詔三上書韶州安置有貴耳集賦秋江圖浪静風平月正中自揺柔櫓駕孤篷若無三萬六千頃把甚江湖著此翁貴耳集附自作小傳大父雲莊公登辛未榜先君詠齋為淮南漕光宗即位初年應詔上書下後省看詳羅紫薇㸃劉左史光祖極稱賞之將上為時宰所沮予少苦讀書肄舉子業勇于弓馬嘗拜平齋項先生于荆南如慈湖説齋鶴山菊坡習菴皆從之逰愛作詩賦小詞盧蒲江取碧雲千里暮紅葉十分秋之句周晉仙取怨春紅豔冷之句孟藏春取蜨詩不因花退盡必是夢殘時之句凡海内名勝來吳必訪樂圃之張書桃符曰江湖旦過詩酒叢林應端平詔上第三書得旨韶州安置以螻蟻之微嬰斧鉞之威人皆危之當國者云詔以直言罪以直言非祖宗制幸脱萬死考之典故安置待宰執侍從居住待庶官聽讀待士子自效待軍將小臣用大臣之法誤矣或者以安置為竄謫之極典又非也余三十年前賦秋江圖一絶今白髮種種儻符此詩語吾志畢矣余生于淳熙之己亥書于淳祐之辛丑年六十有三有上皇帝三書詩五百首詞二百首雜著三百篇曰荃翁集挽周晉仙䇿杖辭朋友形骸巳可憐無錢親藥裹冐雨上歸船官竟生前棄詩應死後傳空餘京洛月愁照夜臺邊詩家鼎臠盧方春方春號栁南永嘉人嘉熙戊戌進士送陸郎中歸越喈喈風雨餘出晝思何如鏡裏無慚色囊中有諫書寒崖立松柏清廟擲璠璵四海看霜月光明秖似初詩林萬選窄嶺危嶺惡有名窄嶺險無數石鼻巻我車石牙隱我步空岡蟲九頭黒身眼四顧擲之聲愈厲飛前使人怖想當開闢時已是樵獵路茅臭不成山瀑斷不成布丫嵒升惡猨啼涔立飢鷺蘆花大如錢況乃時寒冱遐征誤假道撫景自作怒林壑非出倫筆硯不入務腳怠宿未投天低日俄暮東甌詩集錢時時字子是號融堂淳安人受學慈湖之門嘉熙二年以薦授秘閣校勘出佐浙東倉幕召為史館檢閲有蜀阜前後集十六渡頗聞十六渡客子良間關一雨落澗谷湍氣怒潺潺我來屬秋晚霜葉初斕斑窈窕行竹輿鳴禽相與閑複嶺互交鎖淺瀬隨回灣路斷一罅通石磴危躋攀時見荷鋤者行歌語蠻蠻採山有薇蕨結廬有茅菅安知避世人不曾巢其間何時一枝筇溯流到黄山桃源事荒怪誰謂非人寰蜀阜精廬無風自涼方欣然出户見竹雞將雛砌外薝蔔浄如洗蒼筤清且深依巖自幽潤況無日影侵亭午一升階忽若投凌隂涼氣颯以入肅肅生衣襟大火浮炎埃虛堂抱雲林安得冰霜顔聽我山中吟盤桓去未忍砌外行山禽一母將四雛出没叢草隂我非有馴徳渠自無機心欣然歸北窗載弄南風琴袁尚友座中王屯田出與可竹甚竒歸成古調郎星聚頭金地麓十月夜堂春昱昱屯田博古到名畫座上忽展牛腰束我生不識須菩提薛鶴楊梅姑置之寒梢八幅竒更偉上有巴中與可題蒼蛟滑足石詰曲鐵鉤怒掃連蛇腹攲風灑雨清逼人恍疑身在篔簹谷千尋雙榦劍拔雄筆力有盡意無窮冥冥上與風霆㑹拭目變化洪陂龍長憶東坡一轉語與可徳人非畫史輪囷寫出嵗寒心正要諸公來料理薛稷鶴楊補之梅並唐畫須菩提皆座上所觀新晴宿雲穿日薄商畧作新晴燕子先期社海棠今日春溪山雙白鬢天地一閑身無語東風裏飛花亂撲人安素午睡禾黍秋相近溪山日自長午窗千嶂雨幽夢一簾香以上蜀阜集溪南遇雨溪風颯颯雨霏霏秋滿蘋汀獨步歸丹噀園林棠葉老錦纒籬落豆花肥眼前風景依然在箇裏光隂得者稀憶著嵗寒雲壑上山禽對雨傍人飛嚴州府志登蜀阜秋暮如京嵗暮還春來更墮藥瓢閒眼前有底閑風月忍得經年不上山青溪詩集賈似道似道字師憲號秋壑天台人姊為理宗貴妃詔赴廷對登嘉熙二年進士累拜少傅右丞相度宗朝拜太師平章軍國重事徳祐初元兵破鄂州出督師潰于魯港謫髙州團練使循州安置至漳州木綿菴監押鄭虎臣拉殺之盧熊蘇州府志鄭虎臣宅在鶴舞橋東其家鉅富居第之盛號鄭半州四時飲饌各有品目著集珍日用一巻并元夕閏燈實録一巻當宋末殺賈似道于木綿菴即其人也虎臣字景召歸葛嶺舊居罷官歸舊宅山水得頻過息影隄邊樹清心湖面波勞無功可紀頑有命相磨見説連朝雨田家正剪禾題孤山半是樓臺換卻春幾回獨立更消魂斷隄野水梅花宅千古春風月一痕紫薇嶺在昌化縣西風落葉路漫漫衣袂微生旦暮寒秖隔片雲家便到逺山移作夢中看鳳山在於潛縣數家烟火深村裏幾處牛羊落照中客久不歸心事逺梧桐葉葉是秋風宿天竺通元菴十里髙楓樹松邊屋數閒客同終夜語心是一般閑燈色難禁雨秋聲不離山明朝分手後俗事不相關咸淳庚午冬大雪遺安撫潛侍郎臘前又放玉園林一片花飛一片心瀌奕端由人所召燮調多媿病難任乾坤浩浩無偏處田野穰穰更自今但得諸賢成此樂櫂舟我欲去山隂以上咸淳臨安志芍藥又是揚州芍藥時花應笑我賦歸遲滿堂畱客春如畫對酒何妨鬢似絲玉立黄塵那可到錦幃紅蠟最相宜買山若就當移種此際誰能杖履隨梅花朔風吹面正塵埃忽見江梅驛使來憶著家山石橋畔一枝冷落為誰開山北山南雪未消村村店店酒旗招春風過處人行少一樹疎花傍小橋閨怨燕子樓前栁色新畫眉人去鏡生塵年來羞結空牀夢閑撥琵琶過一春以上全芳備祖寒食寒食家家插栁枝戀春春亦不多時兒孫秖解花前醉青冢能消幾箇悲三朝野史寒食詩云云此賈秋壑于徳祐元年上母墳回至集賢堂所作豈非亡國之讖天台石橋古寺行終日僧房出翠微瀑為煎茗水雲作坐禪衣尊者難相遇逰人又獨歸一猨橋外急便是不忘機天台山志句梅花見處多畱句諫草藏來定得名送朝客談深雪偶朱南杰南杰丹徒人嘉熙二年進士溧水令有學吟同陳如叔逰湖四月湖邊冷若秋先賢堂下繫扁舟山頭積翠來新意波面飄紅憶舊逰無奈楊花欺倦客巳多荷葉覆輕漚隄邊誰道春歸了猶有一聲黄栗畱題吳梅菴和靖索句圖童寒鶴冷雪霏霏正是先生得句時一叚孤清圖不盡梅花從此厭人詩以上學吟錢黙黙號梅谷時子秋思坐擁遺衾百尺樓湘簾髙捲不勝秋半窗涼月三更夢一枕凄風萬斛愁青溪詩集錢槱槱默弟溪上秋老蘆花冉冉飛曉天寒氣襲人衣輕橈櫂入鷗羣去釣得鱸魚帶雨歸青溪詩集蔡公亮公亮嘉熙中監岳見孫夢觀雪窗文集附錄一字天石室隂幽卻朗然仰窺長罅見清元不知誰把如椽筆畫出光明一字天武夷詩集翁逢龍逢龍號石龜四明人嘉熙中平江通判天津橋下馬過天津聽傳禁漏頻惟憐一橋月曾照六朝人金剝宫門字紅飛粉壁塵中官來宿内因問帝郷親景定建康志曹娥江再拜靈娥廟魂清若可招幡風吹古渡帆月落殘潮碑有行人讀香多野客燒迎神漢朝曲時聽起雲霄娥江題詠杜耒耒字子野號小山旴江人鶴林玉露嘉熙間山東忠義李全跋扈日甚朝廷擇人帥山陽見士大夫無可使遂用許國許國武人也特換文資除太府卿以重其行國至山陽偃然自大受全庭參全軍忿怒囚而殺之幙客杜子野詩人也亦死焉送胡季昭竄象郡事見翁定詩廬陵一小郡百嵗兩胡公論事雖小異處心應略同有書莫焚稾無恨豈傷弓病媿不逺别寫詩霜月中鶴林玉露寒夜寒夜客來茶當酒竹爐湯沸火初紅尋常一樣窗前月纔有梅花便不同同紫芝宿雙嶺本作翠巖㳺反成雙嶺畱雲深山易晚雨過寺如秋野水連青竹殘僧半白頭上方成共宿劇語到元幽以上前賢小集拾遺苕溪風掠篷窗兩鬢秋生涯無嵗不扁舟吟詩本欲相消遣及到吟成字字愁詩林萬選趙范范字武仲號中菴衡山人少從父方軍累官淮東安撫與弟葵討平李全進工部尚書沿江制置使尋知襄陽府北軍内叛言者劾范落職送建寧府居住嘉熙初復官卒于家絶句半窗圖畫梅花月一枕波濤松樹風不是客愁眠不得此山詩在此香中全芳備祖趙葵葵字南仲號信菴范弟少從父方軍中補承務郎以淮東提刑平李全有功進兵部侍郎淳祐中拜右丞相兼樞宻使咸淳初特授少師武安軍節度使封冀國公薨贈太傅諡忠靖有集劉後村跋少保丞相魯國信菴趙公事兩朝出將入相四十餘年發曠懐于翰墨寓雄心于杯酒其訏謨定命則雅人之致家庭唯諾則萬石之訓結交氣義則河梁之作望古慷慨則梁父之吟至于陶寫性情賞好風月雖玉臺香匳諸人極力追琢者不能及也雪夜酒力欺寒淺心清睡較遲梅花擎雪影和月度疎籬雪玉龍昨夜起天涯曉看團花一尺圍莫放妝臺簾巻上怕驚釵畔寳鸞飛以上後村千家詩避暑水亭作水亭四面朱䦨遶蔟蔟逰魚戲萍藻六龍畏熱不敢行海波煎徹蓬萊㠀身眠七尺白蝦鬚頭枕一枚紅瑪瑙公子猶嫌扇力微行人多在紅塵道昨非菴日纂趙葵嘗避暑水亭作詩六句已成葵遂睡去有侍婢續二句云云惠山寺古木森森映碧苔嵯峩樓閣倚天開山僧不問朝天客自注冰泉浸野梅常州府志林興宗興宗字景復莆田人官曲江守句最是北來詩料少地寒難得見梅花形容變盡頭如雪不改當時一寸心梅磵詩話宋嘉定寳紹間叛將李全駐兵淮東之山陽驕悍難制戕許國逐姚翀殺命士茍夢玉杜耒士大夫視山陽不啻如蛇鄉虎落時莆人林興宗景復授法曹以往時論壯之安晚鄭公在鎖闥餞行有詩云淮海轅門立竒士要看左袒為劉時葢勉其盡節也景復到任後改淮安令辛卯春全破通泰犯揚州為王師掩擊殪城下其妻楊姑姑懼朝廷必討遂掃衆盡俘執南官北去景復羈囚山東凡十年挺節無所汙安晚餞詩可無負矣信菴趙公遣問物色損金資得之以反縣國印與告身俱存趙公奏乞旌擢以勸盡節者朝廷錄用官至曲江守景復北地詩云云江湖間多稱之葉夢鼎夢鼎字鎮之寧海人嘉熙上舍釋褐淳祐中為祕書郎寳祐初以集賢殿修撰知贑州咸淳閒特拜右丞相惡與賈似道同政力辭益王即位召為少師道梗不能赴南向慟哭而還卒于家瀛洲亭在撫州西北汝城髙處著危欄人在蒼寒縹緲閒下瞰無邊春境界西來第一好江山酒拈重碧酣詩思栁曳輕黄入笑顔閣老可能專此勝蛾眉花底又催班撫州府志許裴棐字忱夫號梅屋海鹽人嘉熙中隱居秦溪于水南種梅數十樹自號梅屋有梅屋詩稾融春小綴許梅屋嘗自序其藏書目云予性喜書舊積書千餘巻今不啻倍之人有竒編見無不錄以故環室皆書今即老而貧乎而人不鄙夷子之貧鬼不揶揄予之貧皆書賜也訪潘叔明一室寛于養鶴籠荻簾疎透雪花風怪來几案無寒色春在題詩巻子中明妃漢家眉斧息邊塵功壓貔貅百萬人好把香閨舊脂粉豔妝顔色上麒麟元夕後湖上作自從樓閣罷燒燈未有今朝一日晴暖拆葑邊冰翼破寒畱山頂雪痕輕驕驄已印尋芳跡小妓新翻鬻唱聲每箇旗亭商一醉也應排日到清明枯荷萬柄綠荷衰颯盡雨中無可盖眠鷗當時乍疉青錢滿肯信池塘有暮秋泥孩兒牧瀆一塊泥裝塑恣華侈所恨肌體微金珠載不起雙罩紅紗廚嬌立瓶花底少婦初嘗酸一玩一心喜潛乞大士靈生子願如爾豈知貧家兒呱呱瘦于鬼棄卧橋巷閒誰或顧生死人賤不如泥三歎而已矣以上梅屋詩稿筍蕨羮趁得山家筍蕨春借廚烹煮自炊薪倩誰分我杯羮去寄與中朝食肉人山家清供黄簡簡一名居簡字元易號東浦建安人寓吳工詩嘉熙中卒通判翁逢龍葬之虎丘有東浦集雲墅談雋犂春操為謝耕道作東山兮雲浮東澗兮雨流失今不勤兮曷其有秋水滛兮石齧田碻磝兮一跬九折予勞兮何辭牛奚罪兮從予以羸眇良疇兮彌野獨功倍兮刈寡雖然不愈于無田而逰兮嵗晏凄其桑落之下招荆江蕩子衝風逐飛雲庭葉紛墮槁蕩子久不歸佳人坐中老蕭蕭楚山晚湛湛江水流經從望夫石那得不回頭以上前賢小集拾遺柴望望字仲山號秋堂衢州江山人嘉熙閒為太學上舍除中書奏名淳祐六年丙午元日日食詔求直言上丙丁龜鑑忤時相意詔下府獄趙節齋疏救得放歸田里因又號歸田景炎二年端宗登極三山孔大諫奏薦特授廸功郎史館國史編校辭歸山中宋亡後稱宋逋臣有道州台衣集詠史集困學紀聞淳祐丙午衢士柴望上丙丁龜鑑其表云今來古往治日少而亂日多主聖臣賢前車覆而後車誡月夜溪莊訪舊山山明月露何處認梅花石室冷疑水溪流白是沙清吟幽客夢華髮故人家相見即歸去已應河漢斜天地間集靈芝寺别祖席諸友落日寒城暮雨餘滿斟離酒意何如見妻還指張儀舌痛國誰憐賈誼書羸馬病童旋雇倩寺禽山獠亦欷歔長安可是深居處更向深山深處居鶚按淳祐六年秋堂以上丙丁龜鑑下獄趙京尹節齋疏救之放歸田里設祖道涌金門外者為三山鄭震紹武吳陵建安葉元素松溪朱繼芳錢唐翁孟寅田井陳麟黄溱南康馮去辨西江趙崇嶓曾原一旴江黄載汶陽周弼時晩色涵岫商颷振林各賦詩為别見蘇幼安所撰墓誌中靈芝寺正在涌金門外和王景陽越中寄别韻王名億之號松間故人書秖問平安分已還山豈願官猨鶴不驚松徑夢貂蟬難換竹皮冠長安落葉秋深見故國斜陽雨後看莫道剡中吟不盡不成吟處亦停鞍送宋南山開蜀閫殿上傳宣内引官一封歷歷奏忠肝八千里路先聲至百萬都人夾道觀節度晉公先授鉞淮隂韓信舊登壇擎天正要中流柱莫擬人間蜀道難和通判弟隨亨書感韻風沙萬里夢堪驚地老天荒秖此情世上但知王蠋義人間唯有伯夷清堂前舊燕歸何處花外啼鵑月幾更莫話凄涼當日事劒歌淚盡血霑纓沛中歌秦時日月漢山河家計今誰與仲多天子不知天下貴酒中唯唱沛中歌以上柴氏四隱集戴昺昺字景明號東野石屏之從孫嘉熙已亥授贑州法曹參軍有東野農歌集秋日過屏山菴凄切抱葉蟬閒關棲樹禽入山本避喧復愛聆此音微颸動夕爽薄雲散秋隂衆籟閴以静片月生東林有感著身平地更多憂一棹思為泛宅謀昨夜西風邊報急防江也要釣魚舟以上農歌集髙子鳳子鳳字儀甫華亭人嘗注杜詩林竹溪為序題楊補之墨梅巻籬根玉瘦兩三枝為繞吟香夜不歸安得宻林千畝月仰眠吹笛看花飛松風餘韻宋詩紀事巻六十五
