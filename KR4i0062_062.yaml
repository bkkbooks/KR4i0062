body:
  text: 宋詩紀事卷六十二錢塘厲鶚撰李元白元白字希太奉化人嘉定十年進士任永州通判有四家胡笳詞曰璐按陳鳴鶴東越文苑有李元白者寧化人工詩嘗集杜句為一編又集大觀升平詞進之授初品官二人未知孰是廢寺鶚按詩林萬選作李杜溪沙橫漲水䀶平間扣雲關壁半傾殿上土花人不到斷甎支睡岸蟬鳴後村千家詩陸德輿德輿字載之崇德人埈之諸從孫嘉定十年進士官至吏部尚書題資福院平緑軒帶市人煙遠連村野色幽山從天際出水抱檻前流茅屋無端礙松醪有意留因懷陵谷感無語對沙鷗至元嘉禾志鄭清之清之字德源鄞縣人嘉定十年進士史彌遠薦為魏憲王府教授理宗嗣位以定䇿功纍拜太傅左丞相封魏國公致仕卒封魏郡王諡忠定有安晚集癸辛雜識清之淳祐再相政事多出姪孫太原手昏繆貪汙有人作詩譏之云先生自號為安晚晚節何為不自安香山貓食粥梵宫新遣兩貍奴晨粥飢餐食肉如料是伊蒲三昧熟不知繞膝訴無魚詠茄青紫皮膚類宰官光圓頭腦作僧看如何緇俗偏同嗜入口元來總一般冬瓜剪剪黃花秋後春霜皮露葉護長身生來籠統君休笑腹內能容數百人以上安晚堂集淨明院郊壇齋宫齋宿虛間只淨明俗氛暫洗覺身輕半山雲腳炊煙溼一枕松聲澗水鳴對語老禪真法器譯經新諦出僧檠歸翻貝葉蓮花頌猶帶招提月影清咸淳臨安志題雪竇妙髙峰陸地芳洲擁翠翹巨靈穿石滾雲濤摶空蒼鳳欲飛舞奔海玉龍爭怒號萬象橫陳坤軸富一亭平挹月輪髙獨醒未覺孤清景笑酌寒泉讀楚騷延祐四明志姚鏞鏞字希聲號雪篷又號敬菴剡人嘉定十年進士吉州判官以平寇功擢守贑州貶衡陽有雪篷集寓霅川王戴溪頭小隱仙漁翁引上霅溪船幾回倦釣思歸去又為蘋花住一年春夜曲金魚鎖合蘭釭小酒不支愁尋睡早梨花欲墮風更寒燕子不歸春自老流蘇護帳香雲結三十六簧清吹咽緘書欲寄湘水深城烏啼落花西月桐廬兩岸山如蔟中流鎖翠微風帆逆水上江鶴背人飛野廟青桐樹人家白板扉嚴陵臺下過不敢浣塵衣訪中洲踏雨來敲竹下門荷香清透紫綃裙相逢未暇論竒字先向水邊看白雲以上雪篷集題衡嶽萬山環拱祝融尊紫蓋前趨若駿奔火德中天扶日月炎方一柱鎮乾坤久無執贄來侵牧空有穹碑立廟門北望中原青一髮凄其四嶽正塵昏離衡州天恩下釋湘纍客心事悠悠月滿船種藥已收思病日著書不就負殘年雜花怪石分人去老竹荒亭入畫傳歸夢鑑湖三百里白鷗相候亦欣然法華寺入門松徑幽樹杪見鐘樓客至犬迎吠香消僧出遊水花迎晚照風葉引涼秋欲作居山計吾盟在白鷗以上梅礀詩話秋風皓氣薄衣襟疏聲集暝林鴈驚煙塞夢鱸入故鄉心靜落階前葉清傳月下砧更憐茅屋破愁絶少陵吟後村千家詩趙東野東野贑州人題姚雪篷騎牛像騎牛無笠又無蓑斷隴橫岡到處過暖日暄風不常有前村雨暗却如何鶴林玉露姚鏞為吉州判官以平寇論功不數年擢守章貢嘗令畫工肖其像騎牛於礀谷之間索郡人趙東野題云云蓋規切之也居無何忤帥臣以貪劾之貶衡陽人服東野先見王野野字子文號潛齋金華人嘉定十三年進士理宗朝拜端明殿學士簽書樞密院事提舉洞霄宮卒有文集劉後村跋潛齋詩本學術隆師友扶忠賢絀邪佞愛君如愛親憂民如憂已合於詩人之所謂六義者絶句雨重垂楊緣未乾一渠流碧㺯潺潺暝鴉過盡東風惡獨倚衡門看遠山全芳備祖贈凝神菴朱髙士拋郤林泉趣卓菴臨近村兩窗吞日月一室養乾坤菊露秋籬重松風午枕喧蒲團數胎息不肯學傍門赤松山志上霄洞吾聞北山陽巖壑寶相竅何年開鴻濛隨地通窔奧朝真髙難攀冰壺深莫料詭怪者雙龍崖室最蒼峭上霄雖晚出煙霞寄孤嶠尋源陟空山訪仙款遺廟始探頗褊窄稍入亦窈窕上穴由梯升傍穿須火照青廠既鬱鬱白乳仍皭皭旁通多曲折幽眇轉竒妙窮探豈不欲所畏自微爝昏昏蝙蝠飛悄悄鼪鼯呌或疑洞靈出或恐山鬼嘯又聞村中氓鑿石供灰燒俄然得深竇傾城盡登眺何人不好事窒塞迷其要此雖幸獨存荒僻委蓬藋儻移傍京邑車馬日號召了知神仙事茫昧不堪弔豈無隱淪士巖築像唯肖畬田沃可耕澗水清可釣平生愛泉石自謂飢可療喜兹近吾隱來往足談笑此意復誰論行行逢荷蓧金華府志清明日遊鶴林寺蒿目黃塵擾擾間出門偶到鶴林山仙花僧竹俱陳迹白日青天秖自間竹院間來春正遲籜龍猶自有孫枝野夫豈識尋芳意為愛光風面面吹鶴林寺志李伸之伸之官統制為金人所獲不屈死獻帥府經歷一飯感恩無地報此心許國巳天知胸中千古蟠鍾阜一死鴻毛斷不移劉祁歸潛志貞祐南征獲一統制官李伸之者帥府經歷官劉逹卿召而飲之且誘以降將宥焉伸之獻詩云云竟就死蔣重珍重珍字良貴無錫人嘉定十六年進士第一理宗朝歷官集英殿修撰刑部侍即致仕卒諡忠文題蕭嶽英常州朱氏畫草蟲卷常州草蟲天下竒女郎新樣不緣師未應好手傳輪扁便恐前身是郭熙筆端生意已如生點綴沙蟲機不停淺著鵝黃作胡蝶深將猩血染蜻蜓咸淳毗陵志自題雲龍小隱龍山錫山兩山雲出能為雨入氤氳雲山之氣有斂散斂散之理斯為神我廬山下有小隱雲為動兮山為靜悠然而出物之澤屹然而峙地之鎮我見雲山喜與俱雲山無情不見余我比雲山多此見日月相看兩不厭常州府志徐鹿卿鹿卿字德夫隆興豐城人嘉定十六年進士理宗朝纍遷太府少卿兼右司權給事中歷禮部侍郎提舉鴻禧觀致仕卒諡清正有泉谷存稿湛泉酌餞黎文有詩壁間遂次其韻幾人林下賦歸休公獨翩然汗漫遊味道不妨寒似水入時須用曲如鉤從來鄰父邀皆去底事官曹挽不留後夜相從那復得月明千里故山秋鬱孤洞天夢跨長虹海上遊寒生肌骨一壺秋好風吹得詩魂醒自寄人間羣玉樓以上泉谷存稿章鑑鑑字君玉號藝齋昌化人嘉定十六年進士官至華文閣待制林洪山家清供云章藝齋宰德清時雖槐古馬髙尤喜延客然飲食多不取諸市恐旁緣以擾人金錢花巧冶都由造化爐風磨雨洗好形模花神果有神通力買斷春光用得無合璧事類别集牟子才子才字存叟其先井研人家湖州嘉定十六年進士理宗朝歷官權禮部尚書兼直學士院國史實録院修撰以資政殿學士致仕卒諡清忠有存齋集南園買家喜傍水精宫正是南園故址中我欲築堂名六老追還慶歷太平風齊東野語慶歷六年吳興太守馬大卿會六老于南園酒酣賦詩教授湖學安定胡先生為序其事六人者工部侍郎郎簡年七十九司封員外郎范説年八十六衛尉寺丞張維年九十一俱致仕劉維慶年九十二周守中年九十五吳琰年七十二皆有子弟列爵于朝詩及序刻石園中後園廢為牟氏之居存齋詩云云趙以夫以夫字用甫號虛齋長樂人嘉定進士知漳州理宗朝歷資政殿學士吏部尚書同修國史詠蘭一朵俄生几案光尚如逸士氣昻藏秋風試與平章看何似當時林下香全芳備祖戴栩栩字文子永嘉人嘉定中進士湖南安撫司參議松臺王綽云永嘉之作唐詩者首四靈繼四靈之後則有劉詠道戴文子張直翁潘幼明趙幾道劉成道盧次夔趙叔魯趙端行陳叔方者作而鼓舞倡率從容指論則又有瓜廬隱君薛師石焉白鶴寺子晉昔遊處平臺片石成寺名猶記鶴松響卻疑笙巖壁飛雙瀑金沙照一泓野人豈仙伴隨鹿過溪行前賢小集拾遺送廬陵胡季昭夢昱以上濟邸封事貶象州古郡荒涼象迹新君行況是去裝貧此愁欲别栁邊雨明日初程桂外人從古不多如意事加餐宜惜未歸身春風未必天涯盡木斛花開瘴水深象臺首末李義山義山號後林嘉魚人嘉定中進士樞密院編修題梅壇毛慶甫雲恱樓雲本無心悅者誰華陽去後少人知欲分半席無因到一片飛來是覓詩梅仙事實幸元龍元龍字震父髙安人舉進士理宗朝任朝奉郎郢州通判有松垣集遊越山上得越山半方壺紫翠環山幽春溜響花落午隂間梵剎依松外仙家在竹間小窗借髙枕風定鳥綿蠻松垣集陸垕垕號盤隱官府判嘉定中與僧居簡倡和冷泉亭放閘水泉聲飛出閘委折緑隂間此地原無暑多時不入山草攲疑石墜水定見魚還難得同猿鶴遊吟半日間咸淳臨安志留碩碩字仲志魏公正之子嘉定間守南恩州陽江勸農春風句引出郊行小隊迢迢草路平自笑田蕪不歸去三千里外勸人耕肇慶府志錢厚厚字德載嘉定中常熟令號竹巖懶翁有竹巖拾稿潄石軒危石參差上霄漢中涵萬壑冰玉清與誰流出洗塵滓遺我一林風雨聲洞霄詩集崔起之起之嘉定中為宣城尉題萬翠亭亭在旌德姚司戶建名山繞旌川未易千百計棲真聳其西二幕青扞蔽栁山與龍山連亘殆無際大鼇從東出石鼓相軒輊華容接鶴形蔓衍若難制擁南有梓山盤屹萬里勢有殿曰甘露岡崒插天地玉壺枕其北鳧山復相比磣嶺介鳳凰大洞闡天祕姚君天韻竒氣槩髙一世胸中飽丘壑作亭非壯麗獨能極遐觀領略萬山翠蒼玉無遁形秀色歸一視卻笑昔人非所見殊無異東亭亂清暉僅得翠微意東山羅紅裙未免聲色纍唯君别幽趣徜徉樂清致青山不改舊領客時一醉寧國府志史彌寧彌寧字安卿鄞人浩之姪嘉定中以國子舍生蒞春坊事帶閣門宣贊舍人知邵陽有友林乙稿寄雲夫黔國相逢地蒼燈共夜篝雲龍念東野柏馬歎之罘郵傳一分手河山再見秋交情如繾綣不在寄書稠鄭中卿惠蝤蛑客窗不作侯鯖夢隨分魚蝦薦一杯食指怪生連夜動敲門郭索送詩來寄慥齋弟鷗鷺逄人問歸信三年作客負滄洲詩袍醉帽黃埃底羞見扶風馬少遊春暮同社會飲張園小樓得飛字殘紅委地水平池楊栁隂隂鶯亂飛山色滿樓新雨後一簾風絮卷春歸以上友林乙稿史彌鞏彌鞏字南叔浩從姪嘉定中進士江東提刑題羊左墓餘耳當年刎頸交所爭利害僅豪毛一朝泜水相屠戮豈識羊哀左伯桃景定建康志史安之安之字子田浩之孫嘉定初知嵊縣求髙似孫作剡録邑之文獻藉以不墜高山堂和節度梁公韻在寶積寺後僧擇璘建閣憑嵬構敞軒扃一望塵凡目暫醒巖嶂遠供千疊翠松篁還聳四時青登臨雅愛恣吟筆圖畫尤宜作座屏我欲從君遊未得壯心方欲翥南溟嵊縣志李諶諶字誠之號臞菴晉江人雲龕居士邴之孫嘉定中以朝議大夫敷文閣待制守建州後為戶部侍郎謁丞相祠觀八陳圖人言忠孝不磨滅神物護持存水滸千家陵谷幾變遷此石不移自章武本由黃帝古兵法六十四以八為伍髯孫且懼仲逹走賊操遊魂何敢拒刻銘沙沒水底碑教戰石存山下鼓一片丹心天地間萬世聞風猶禦侮我來起敬凛如生再拜一言公必取瀼流東截陳圖前寖隳城壁頽民宇能安拳石止波流願回瀼患思民撫常使夔人知感公踏磧年年弔千古控巴臺次韻誰道地拘逼仄須知天閟幽妍一段丹靑臺閣何人淡掃松煙以上四川總志楊長孺長孺字伯子號東山萬里子嘉定間守湖州後為番禺帥端平初纍辭召命以集英殿修撰致仕家居卒跋大人論配享書稿覆羮真得皂囊書錦水元來勝石渠但寶銀鉤并鐵畫何須玉帶與金魚鶴林玉露髙廟配享洪容齋在翰苑以吕頤浩趙鼎韓世忠張俊四人為請蓋文武各用兩人出孝宗意也遂令侍從議識者多謂吕元直不厭人望張魏公不應獨遺楊誠齋時為祕書少監以書爭之以欺專私三罪斥容齋且言魏公有社稷大功五建復辟之勳發儲嗣之議誅范瓊以正朝綱用吳玠以保全蜀卻劉麟以定江左于是有旨再令詳議越數日上忽諭大臣曰吕頤浩等正合公論更不須議洪邁固是輕率楊萬里亦未免浮薄于是二人皆求去容齋守南徐誠齋守高安當苖劉作亂時矯隆祐詔貶竄魏公髙宗在升暘宫方啜羮左右來告驚懼羮覆于手手為之傷暨復辟見魏公泣數行下舉手示公痕迹猶在題湖州畫像面有憂民色天知報國心三年風月少兩鬢雪霜深更莫留形迹何曾廢古今不如隨我去相伴老山林鶴林玉露嘉定間楊伯子為湖州守治聲為三輔冠郡士相與肖像祠于學宫與工部尚書戴少望並祠伯子意不悅會持浙東庾節將行辭先聖先師禮畢與校官諸生坐講堂命取畫像題詩其上遂卷藏而行當時士子有戲和其詩者末句云可憐戴工部獨樹不成林茨菰花折來趁得未晨光清露晞風帶月涼長葉剪刀亷不割小花茉莉淡無香稀疏略糝瑤臺雪升降常涵翠管漿恰恨山中窮到骨茨菰也遣入詩囊全芳備祖句三間破屋一牀書錦心繡口氷肌膚自紉枯葉作袴襦此君便是長鬚奴題貧樂圖和徐思叔韻鶴林玉露吳晦之晦之寧國人寧國府志嘉定中與韓沆仲和石巖魯瞻相友善沆善書嘗手書晦之十絶句自為跋世稱吳詩韓字可謂並美寄石魯瞻憶昔從遊杖履中有山亭上醉春風主人已作騎鯨客自注時仲和巳歿誰識當年兩病翁寧國府志彭仲衡仲衡清江人了頭巖前峰號龜今是龜近巖謂月亦匪月世間景幻語未真説著了頭便癡絶蒼然頑石由天成道旁過者皆含情我來於此發浩歎乃知有色能傾城蘆浦筆記胡偉偉字元邁嘉定間新安布衣寓吳中有宫詞集句鶚按玉照新志云胡偉元邁新安人父舜申作乙已泗州録巳酉避亂録據此當是胡仔元任之從兄弟也宫詞集句雞人唱曉五門開宫女更番上直來御仗催班元會集遙聞索扇一時回羅鄴花蘂夫人王禹玉王建披香仙殿試春衣等候官家未出時整了翠環勻了面大家裝著鬭時宜晏同叔禹玉花蘂夫人宋子京王殿前香騎逐飛毬一樣真珠絡轡頭誇道自家能走馬掉鞭橫過小紅樓張籍王禹玉王建花蘂夫人映林先發幾枝梅準擬君王便看來競走巾車迎鳳輦殿前排宴賞花開元微之王建吳可花蘂夫人美人弄鏡插梅花抹月批雲自一家三十六宮春信早不應青女妒容華鄭毅夫饒節蔡文饒洪玉父新生帝子浴漪瀾頻奏仙韶喜誕筵願上玉宸千萬歲大家恩賜洗兒錢宋白詞吳可家宮王禹玉吳賾十汪莘莘字叔耕休寧人嘉定中以布衣應詔上封事不果用有方壺存稿秋日飲錢塘門外雙清樓西湖日日可尋芳樓上憑闌意未忘斫取荷花三萬朵作他貧女嫁衣裳次潘别駕韻野店溪橋栁色新千愁萬恨為何人殷勤織就黃金縷帶雨籠煙過一春夏日西湖間居十里湖山苦見招栁隄荷蕩赤闌橋待他朝市人歸後獨泛扁舟吹玉簫露冷風清斗柄遷芙蕖零落謝家船都人正作黃粱夢獨占西湖明月天以上方壺方稿詹初初字子元休寧人以薦入太學為學録與汪莘善有流塘集出心原心原在流塘南行行陟南原遙望北山岑上有千尺崖下有髙樹林髙林轉幽隩戛然啼雙禽流水自迅逝白雲淡無心䇿杖者誰子間來坐春隂相逢籜林下擕手溪水濵對之兩無言悠然鳴素琴素琴清且越暢以披沖襟沖襟良自爾那知春巳深流塘集留元剛元剛字茂潛永春人嘉定間直學士院有雲麓集武夷九曲棹歌存二首七曲催船快上灘好山留與漫郎看經行雪瀑仙屏下恍記齋堂夜帳寒九曲遙岑更鬱然板橋漁市引長川喚回白馬賔雲夢來看桑麻萬里天鐵網珊瑚王益祥益祥長樂人寧宗朝官監察御史題資福院平緑軒丈室無餘地生涯小有天推窗成曠闊俯檻繞清漣載酒日邊客聞歌栁外船隔墻人易與賸著買山錢至元姑蘇志陳宓宓字師復丞相俊卿子以父任入官寧宗朝歷軍器監簿出知南康軍改南劒州寶慶初致仕城山榖城巖穴似飛來十里湖光鏡面開夜雨松窗僧榻靜秋風栁岸釣船回尋幽便叩生雲洞乘興還登呼月臺每到西湖吟咏處令人偏憶故山梅興化府志張潞潞字東之吉之永新人牧昭州詩師誠齋石湖有張昭州集句䇿勳蓑笠上自是一雲臺嚴瀨憂兄行不得勸客不如歸答二禽獨木乘危涉勞薪帶溼炊秋雨紫垂戶外瞻天近緑墜樓前到地香紫牡丹後村詩話陳塤塤俊卿之後知南安縣謝趙憲副使惠建茶貢餘自合到侯王誰遣甘芳入莧腸野客驚看龍鳳銙家人學試蟹魚湯題來諫議三封印分到尚書八餅綱盡灑從前腥腐氣時時澆取簡編香莆陽文獻曾槃槃字樂道幾之孫左司逢之子官工部句還持病眼將昏力來看仙山未了青題武夷類續集合璧事吳機機字子發天台人嘉定中知真州題煙雨竒觀樓在真州吳機建取葉石林半空煙雨之句此景儀真亦有年何人管領向樓前江淮自昔雖南北煙雨從來肯變遷萬里孤帆遺恨在半空佳句至今傳諸公欲會當時意且對滄波泛酒船儀真縣志宋詩紀事卷六十二
