body:
  text: 宋詩紀事巻八十八錢塘厲鶚撰張繼常繼常宋初入内都知為鎮戎軍鈐轄題鎮戎軍㕔壁夜聞磧外鈴聲苦曉聽城頭畫角哀不是感恩心似鐵誰人肯向此間來楊文公談苑裴愈愈字益之真宗朝内臣奉命江南搜訪遺書名畫歸奏稱㫖用是累居三館以聞識自任句東吳山色家家月南楚江聲浦浦風送魯秀才南逰楊栁影疎秋霽雨梧桐葉墜夕陽天聞蟬皇朝類苑裴湘湘字楚老愈之子仁宗朝内臣有肯堂集賦得和氣致祥應詔君徳承天道沖融協太和卿雲呈瑞早膏澤應時多煦集連枝本嘉扶異穎禾五星還聚井丹鳳更巢阿藪澤無遺士邊防久息戈黔黎逢至化稽首載賡歌青箱雜記明道中仁宗御便殿試進士詩賦亦命湘賦之數刻而成仁宗嗟賞左右中人為之動色翰林李公淑序其集云予嘗嘉河東父子起銀璫右貂能以屬辭拔其倫益之三朝侍臣老不廢學又課厲二子使皆有立約已慎履如周仁石慶而楚老孳孳嗜書克自淬琢云岑宗旦宗旦字子文開封人仁宗朝以父遺表通籍璧門終九品官善行書有漢唐十一人書評宣和書譜宗旦趣尚髙逺不為茍合取容于世年十七棄官逰東南山水間暮年一無嗜好寄傲親朋間畧不為身後計得酒輙醉酣長哦揮灑以為真樂聽琴詩琴中太古意方外無為心彈之道頗散不彈理彌深所以陶元亮何須弦上音宣和書譜王紳紳元豐初内官效王建作宫詞百首以獻太皇太后生日詩太皇生日最尊榮獻夀宫中未五更天子捧觴仍再拜寶慈侍立到天明寶慈皇太后宫名太后幸景靈宫駕前露面䨇童女詩平明彩仗幸琳宫紫府仙童下九重整頓瓏璁時駐馬畫工闇地貌真容以上温公續詩話宋詩紀事巻八十八
