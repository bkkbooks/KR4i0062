body:
  text: 宋詩紀事卷四十六錢塘厲鶚撰周紫芝紫芝字少隱宣城人紹興中登第歷官樞密院編修右司知興國軍自號竹坡居士有太倉梯米集及竹坡詩話方萬里跋少隱嘗謂作詩先嚴格律然後及句法得此語於張文潛李端叔越臺曲玉顔如花越王女自小嬌癡不歌舞嫁作江南國主妃日日思歸淚如雨江南江北梅子黃潮頭夜漲秦淮江江邉雨多地卑濕旋築髙臺勻曉妝千艘命載越中土喜見越人仍越語人生腳踏鄉土難無復歸心越中去髙臺何易傾曲池亦復平越姬一去向千載不見此臺空有名方與勝覽在建康府縣西七里今尉廳後故老相傳云昔越王女嫁於此懷土思歸故越王築臺以居之慰其懷土之思秋蘭藝蘭當九畹蘭生香滿路紉君身上衣光明奪縑素孤芳一衰歇凋零濕秋露佩服君子心亦足慰遲暮弔洪氏女并兩侍兒就死由來不自疑玉顔那為賊鋒低了知今日投淵婦猶勝當年斷臂妻敵騎駸駸戰艦嬌春江漫漫濕金翹但將紅袖供歌舞郤為周郎笑二喬梁溪漫志中興死節之士固不乏而女子守節者亦多有之洪鴻父羽之女適繁昌焦洧一日遇巨盜於江中欲逼之女義不受汙投江而死兩侍兒大曰宜恩小曰勻奴姓吳氏女兄弟也俱有色藝亦相隨赴水死焦之甥徐伯逺傳其事竹坡周少隱為之賦二詩云云黃文若攜秦别駕侍兒像見過戲題二絶能事空傳王右丞句如徐庾轉難名明眸正似溪光樣自古無人畫得成謝家林下小梅花不著紅藍染綘紗莫笑畫師無國手玉肌元不愛鉛華題錢少愚四畫鴛浦一點傷春恨看成兩鬢霜如今無此夢莫畫兩鴛鴦釣雪一作東吳去回頭又十年可憐江上雪空落釣魚船蘭亭事去空千載何曾有若人只應煙樹裏便是永和春秋觀雨足三湘岸煙含七澤秋可能無尺地分得庾郎愁以上太倉稊未集題淨空院誰穿巨石貯清泉不見超公舊講筵龍伴白雲歸寶藏魚隨流水下春田咸淳臨安志元忠作單于下程圖單于獵罷臥錦紅解鞍休騎荒磧中蒼駒騧駱六十匹隱谷映坡分尾騣九駝五牛羊頗倍沙草晚牧生寒風貴賤大小只五百執作意態皆不同二鷹在臂二鷹架駿犬當對能爭功氊廬鼎列帳幕擁鼓角未吹驚塞鴻上山髙髙置烽燧毛囊貯獲間刀弓水泉在側挹其上長河杳杳流無窮素紈六幅筆何巧胡瓌盡妙誰能通今日都城有别識别識共許劉元忠許貴州出蘇叔黨樹石老坡騎鯨上天去小坡落筆如風雨能添老樹著巖間為石傳神自翁語兩坡俱死真可惜君有一拳何處得誰向九原呼此翁為我五日畫一石以上聲畫集題湖上壁寒食風埃滿客巾西湖煙雨送愁頻日髙未起鳥呼夢春晚不歸花笑人前賢小集拾遺戲作小詩用少陵事百尺寒松老幹枯韋郎筆妙古今無何如莫掃鵝溪絹留取天吳紫鳯圖竹坡詩話使少陵尚無恙當為我一捧腹也句設客元無琴裏曲供官尚有篋中詩太倉稊米集云東坡嘗言古今語未有無對者琴家謂琴聲能娛俗耳者為設客曲頃時有作送太守詩者僕嘗問之其人曰此供官詩不足觀于是設客曲乃始有對戲作俳體詩云云關耆孫耆孫字夀卿蜀人紹興間進士官著作佐郎送劉朝美侍郎歸蜀清議久不作世無公是非秖因翻故紙不覺蹈危機東壁夢初斷西山蕨正肥十年成底事贏得載書歸庚溪詩話兵部侍郎劉朝美儀鳯蜀之普州人性酷嗜書喜傳録初以禮部侍郎攝祕書少監後即真凡祕府書籍傳寫殆遍如國史之類又置副夲親自校讎至杜門絶交遷兵侍猶傳寫不絶張持國之綱為副端言其書癖至曠廢職事以是罷歸蜀關夀卿以詩贈行鶚按宋史劉儀鳯傳亦載此事劉僩僩字寬夫吉水人沆孫紹興進士官至待制青原臺在廬陵郡西射圃東南隅春臺百尺枕蕪城傑檻層軒入紫清坐嘯風雲生畫棟劇談河漢瀉朱甍山圍蘭若青螺逺江帶蘋州白練橫挂席會淩南斗去羽人遼海看騎鯨豫章詩話陳鵬飛鵬飛字少南永嘉人紹興進士官太學博士崇政殿説書忤秦檜謫居惠州卒有羅浮集文獻通考陳氏曰秦檜子熺嘗從之遊在禮部時熺為侍郎文書不應令鵬飛輒批還之熺浸不平鵬飛説書崇政殿因論春秋母以子貴言公羊非是檜怒謫惠州以殁贈雍管察推陳仲輔幕下誰人識杲之微聞贊畫向蓮池登樓不恨鄉關逺拄笏只言山色竒直道自能消鬼魅髙人何處不軒羲他年坐上話銅狄可是蓬萊清淺時惠州府志唐仲友仲友字與政金華人登紹興進士復中宏詞科纍官知台州為同官髙文虎譖于提刑劾罷主管武夷沖道觀有説齋集遊蓋竹山在台州臨海縣籃輿東出初雨收衆山捲霧奔蒼虯麥田幪幪連千疇去年見種今有秋農家碗大即快活使君不去能無羞春光欲盡誰挽留千林薿薿新緑柔桐花逺近淡無色自開自落那關愁洞天為我暫晴霽使我蠟屐窮冥搜天門發秀萬馬下水口離立羣峰稠瀑泉對面瀉絶壁寶劍卻倚丹鳯樓溪聲噴薄雷震動石色古怪神剜鎪洞門谽谺風颼颼香爐峰下蛟龍湫中岑特秀小為貴左右旌節森戈矛幾時祕奧一日睹談笑指示君知不精廬但欲占勝處專事棟宇非良謀飛閣跨水納佳氣突兀殿堂居上頭軒忩髙下有竒致洗滌肺腑明雙眸我將于此棲羽流鳯笙鶴駕應來逰丹成一舉淩九州下視濁世如浮漚靈祠欵謁路阻修層巖傾澗邃且幽經營輪奐亦未就揮金爾助何須求晚雲漠漠鳴雨鳩僕痡泥滑吾欲休虹橋列炬趣歸騎城鼓已報初更籌追攀别乘聊復爾乘興何如王子猷習池不為倒載去兒童不用拍手攔街謳赤城志折彥質彥質字中古雲中人涇原帥可適之子紹興間官樞密使為趙鼎所薦秦檜指為黨謫昌化軍後移郴州復官過太平州拜李端叔遺像東來遂數月弛擔已渺茫猶喜葘患身獲登先生堂肅衣拜遺像依然雙頰光宛若侍坐側妙語發天藏厄窮出天意人理難度量所幸言不朽與世為文章齎此復何恨私淑良不忘小郎出見我問知雛鳳凰他年起門户塵滓濯秋陽世事幾變滅人生真黃粱置之不足道感慨涕淚滂我行方有程墳山空相望跋浯溪造極圖浯溪未到已登臨筆力能窮造化心我是零陵新逐客披圖一一可追尋跋湘西清絶圖與山分淺正傷神蠟屐明朝陌上塵誰寫湘西清絶景巧移林壑慰行人以上聲畫集湘山寓久渾忘客臨行似别家途窮身更怯秋老鬢先華生計黃茅合歸期碧海賖湘山今夜雨留我意無涯桂林府志超然亭超然亭上鬢毛斑浩蕩秋風小立間豈為詩情堪過海秖緣腳力要尋山峭峰斷續天容缺髙壘縈紆地勢慳回首不堪東北望桂林萬里是秦關粵西詩載謝許君瑶東坡遺物來歸我兩手摩挲思不窮舉取吾家阿堵物愧無青玊案酬公廣東通志東坡移亷州以茶盂惠許君瑶後為折樞密所得有詩謝許云云何耕耕字道夫紹興中守蜀之嘉州有惠政與何逢原孫松夀宋誨號四循良民繪像祀之青羊宫按趙閲道成都記載官乃老子乘青羊降其地今有臺存焉一再官錦城咫尺望琳宫未始得得來正墮役役中今朝弄晴雨䇿蹇隨春風頗愛意象古停驂小從容縹渺百尺臺突起凌半空憑闌俯修竹決眥明孤鴻信哉神仙宅不受塵垢蒙稽首五千言衆妙一以通靜觀萬物復豈假九轉功區區立訓詁亦哂河上公癡人慕羽化心外求鴻濛要騎白鶴背往訪青羊蹤題龍華佛閣西川鑿山三大像突兀皆在江之湄修覺九頂見略盡獨此恨未瞻容儀朅來勝地了疇昔輕軒瘦馬相追隨百尺金軀信雄傑三乘寶閣何瑰竒燃犀不用照幽鬼擊鼓自合趨馮夷前人開創願力廣下與舟楫扶傾危六月灘濤劇奔吼一分性命爭毫釐篙工落膽行者泣彈指乞活天人師人心狎水水多禍佛力在人人不知慈悲但作布施想江神雖怒將何為普通山距府東十數里青州禪師洪杲道場也自龍華歸過之棟宇頽落僧徒鄙野良為可惜是夜雨大作因書所聞所見為長韻錦城之東山培塿突起伽藍壓山口入門氣象頗不凡在昔規模定非茍黃絹碑詞著眼看青州老衲知名久自披榛徑結茅屋不翦霜華散蓬首市門有女捧巾盥衣裓無花生穢垢至今一轉鶺鴒語散作諸方獅子吼祖燈寂寞何人繼窣堵岧嶤惟鬼守法席草長深沒膝僧榻屋穿光見斗似聞占籍多衍沃合選名緇振頽朽我來不覺三歎息眼底盡空諸所有自開粗席掃塵坌聊寄間眠憩奔走夢回中夜雨鳴簷卧聼東風寒入牖明朝散步轉山脊好語相呼聞野叟抽芒巳見麥翻浪搗麨懸知香滿手須臾日影散林樾絢練春光被花栁僕夫催歸屢不應景物殊佳寧忍負出山騎馬更躊躇乘暇應須重載酒以上成都文類李彚彚紹興中添差台州通判遊九鎖山何人能識洞中天勝地興從漢武年石作雙門標俗駕路為九鎖折溪泉四山松檜相回合五洞煙霞暗接連浮世功名何日已挂冠來結此山緣洞霄詩集鄭昌齡昌齡紹興中太府寺主簿李忠定公挽詩炎圖第一相蕭公王謝風流愧下風力正君臣先偽楚不將金帛問和戎輸忠自昔忘夷險注意如今見始終駐馬佳城天莫問寒空慘淡沒孤鴻梁溪集附吳岡岡紹興中閩縣尉李忠定公挽詩夢卜庸真相艱難倚大儒英風起衰懦直氣懾姦諛琳館終髙臥燕然漫壯圖哀榮看贈典猶足慰寰區梁溪集附頓起起汝南人紹興中提點西川刑獄贈成都寓舍賢婦二喻詩嘗聞趙清獻恤孤慰亡友至今西蜀人談美不容口二喻出儒家清貧一無有零丁依老母破屋僧堂後相對誦詩書未嘗窺户牖圭折玉彌方山寒松更茂縣宰初聞名咨嗟為之久從容語其配夫人曽見否長者二十三次亦十八九青裾長蔽膝荆簪短在首我欲效清獻言不為人取近於吾邑中選壻得豪右夫人相宰意魚蔬薦尊酒屈致二喻來呼名老與夀長曰安夀次曰安老女子當有行詩稱逺父母飢寒日月長蓬蓽風雨漏大喻前致詞灑淚濕衣袖荷德固巳深緘情亦須剖上言親未葬心欲土自負下述妹未笄􅑱􅑱無傅姆還家復獻書自敘貧且陋鉛華世所悅銅臭非吾偶肻效閭閈間碌碌逐雞狗世無梁伯鸞應嫌孟光醜孔明若再生承女甘箕帚陳義一何髙夫人驚拊手至今書稿在光輝射星斗董子慕髙風喜曰真吾婦吾親雙白髮吾弟室未授眷言姊妹賢可以相先後五兩幣雖輕意則千金厚輜軒雙造門觀者競奔走女子尚能爾男兒宜自守重䀻或不來豈欲終畎畝畜德尚未充髙位亦虛受寄語事君者慎勿輕去就成都文類范浚浚字茂明蘭溪人紹興間舉賢良方正以秦檜當國不起學者稱曰香溪先生有集讀長門賦阿嬌負恃顔姝好那知漢帝恩難保一朝秋水落芙蕖幾歲長門閉春草自憐長世等前魚舊寵全移衛子夫獨夜不眠香草枕東箱斜月上金鋪曉驚永巷車音近失喜疑君枉瑶軫臨風望幸立多時卻是輕雷聲隱隱年年織女會牽牛百子池邉侍宴逰自從一落離宫後無復穿針更上樓淩霄花栽松待成隂種漆擬作器人皆笑艱拙往往得後利君看植淩霄百尺蔓柔翠新花鬱煌煌照日吐妍媚風霜忽搖落大木亦凋瘁視爾託根生枯莖無殘蒂先榮疾蕭瑟物理固難恃淩霄亟芳華衰歇亦容易以上香溪集馬純純字子約自號朴􅈪翁默之孫紹興中為江西漕隆興初以太中大夫致仕居越之陶朱鄉有陶朱新録題能仁寺壁十年衰病卧林泉鵷鷺羣飛競刺天黃紙除書猶到汝固知清世不遺賢會稽志僧宗昂住會稽能仁寺有故相寓寺中巳而復相宗昂被敕住持郎官馬子約題詩法堂壁吕願中願中字叔恭紹興中知靜江府宋史秦檜傳靜江府驛名秦城願中率賔僚賦秦城王氣詩媚檜由此得召郡守吕叔恭以甲戍季春七日遊中隱嵓山水膏肓之興未巳後兩日再拉機宜劉子思監州朱國輔經屬陳朝彥同至新洞所見愈竒真所謂倒餐甘蔗聊書五十六字爽塏虛明小洞天巉嵓埀乳類鋒銛薰風習習來三面夏雨蕭蕭欠一簷指顧羣山勞應接徘徊歸騎縱觀瞻門前緑水泓澄淨底處應須是谷簾桂勝蔣璨璨字宣卿宜興人之竒從子紹興中以集賢殿修撰知蘇州除敷文閣待制提舉洪州玉隆宫沖寂觀去南莊數里肇建於有唐逮今數百年中間衰弊吾家曽祖太傅公為司出納且主盟興起之相繼纍世不墜兵火之後殿宇久廢弗理房舍荒寂璨今再至不勝感歎故作二詩紹興甲子季秋某拜呈兔井橋邉鷁首橫過逢仍怯近鄉情路人失喜交頭語鄰犬何知掉尾迎重到雲房驚落寞直須金闕早崇成百年香火追先志始信吾宗世濟榮慣見琳宫全盛時朅來荒梗倍傷悽虛堂不復瞻遺迹自注先考通奉書壁在八蔣院今不復存敗壁才容覓舊題自注伯考樞密太師題三史院僅留數字帝傅前修皆矩矱雲孫後裔合攀躋興衰補弊應商略徙倚修廊日欲西式古堂書考丁宣一作卜宣字宗旦延陵人紹興中處州通判仙都山世上洞天三十六縉雲第二十九區古木參天駕雲屋總真靈迹號仙都獨峰壁立三千尺凌空聳翠屹然孤仰瞻絶頂煙嵐際曽開菡萏名鼎湖舊説軒轅駐車轍雲軿風馭經此塗石釜烹煉丹砂就乘龍帝鄉在須臾紫虛碧落超塵世侍臣無路攀龍鬚唐朝天子仙李裔德格天心來瑞符祥煙嘉氣慶雲布山中九轉萬歲呼步虛一作櫩對峙雲斷續東西互竦髙下殊澗邉幽徑登鳥道上有鏡巖如方壼崖中乳水瀝嵌罅滴石成穴如仰盂水一晝夜斛加半潦不泛溢旱不枯魯望曽記周景復絶粒餐霞黃老徒棲真妙入懸珠會八十年餘隱此居千古寥寥桑海變仙迹縹眇還有無石門瀑布雖云好此間殊甚未昜居特然造化鍾神秀虎頭妙手亦難圖仙都山志胡升升字子上括蒼人紹興間官湖北提舉仙都山鼎湖不可見巍然但孤峯特立亘萬古氣壓諸山雄黃帝久得仙遊行跨飛龍至今世俗傳尚指輦路通頗如升天檜追求白鹿蹤常言貴荒唐厥見真兒童顧惟此山竒實宜仙所宫水聲來泠風和以萬本松客枕久未穩笙簫滿虛空頗疑九成音不在二典中但恐蚩尤旗曄曄舒長虹雖能獨不死忍視斯民窮君看涿鹿戰萬古蒙其功鼎湖何足道帝德彌蒼穹仙都山志程元祜贈朱童子虎臣浮梁人年九歲紹興間武殿試十二矢中九的講孫子兵法諸葛八陳圖賜金帶武狀元補承信郎我聞汪錡生列國能執干戈衛社禝孺子可教繄復誰張良授書為帝師寥寥厥後不復繼棘門老將反兒戲邇來忽得朱虎臣九歲知兵及古人僕姑十上九破的玊帳亡書咸誦臆壘石布作常山蛇指陳八陳橫復斜天姿安勇亞二子腦脂壯士應羞死虎生三月定欺牛勿謂渠小將何求志在竒功平禍亂自許多多而益辦欲造天閽試所長中興君相正明良拔萃為將上不惜好奬此郎明勸激凌烈九歲初無謀猶呼虎子封亭侯觀君頭頷合食肉膽大于軀早驚俗皇家祐武喜逢時洗眼行看得意時饒州府志張表臣表臣字正民右承議郎通判常州與朝以道逰紹興中為司農丞有珊瑚鉤詩話觀髙郵寺壁曹仁熙畫水曹生畫手信有神豪端風雨生奫沄波濤不合來翻屋鮫鰐何須欲噬人湯湯此水勢方割陽侯鬱怒馮夷搏鼇擲鯨呿海嶽驚霧塞雲昏光景薄開元將軍愛驊騮權竒滅沒隘九州時危此物豈易得寫此尚可銷人憂末有乃孫能畫水逋客見之心欲死雷奔電擊走中原魚怖龍愁寧忍視先生道眼髙崑崙聊將妙語破迷津中流險絶待舟楫四海浩蕩須經綸我衰甘作淮海客身脫埀涎頭雪白驚心未定畏崩湍欲覓平波泛家宅此身端的老江湖雨笠煙蓑是所圖他年但飽揚州米今日寧論甓社珠珊瑚鉤詩話題睢陽雙廟漁陽突騎滿關東百戰孤城挫賊鋒唐室興亡繫公等九原可作更誰從珊瑚鉤詩話睢陽雙廟俗謂之五侯廟蓋南雷賈與同功皆受封爵亦作其像于廊廡耳古今歌詠唯王荆公黃豫章為警䇿豫官宋城題詩自以為無愧前人聼琵琶白鴿潛來入紫槽朱鸞飛去唳青霄江邉塞上情何限瀛府霓裳曲再調謾道靈妃鼓瑶瑟虛傳仙子弄雲璈小憐破得春風恨何似今宵月正髙珊瑚鉤詩話客有獻李衛公以古木者云有異公命剖之作琵琶槽其文自然成白鴿豫嘗語朝次膺曰公緑頭鴨琵琶詞誠妙絶蓋自曉風殘月之後始有移船出塞之曲然某亦曽有一詩云云公曰詩亦不惡和陳叔易就朝以道求長松暫隱嵩髙六六峯未乘雲氣御飛龍自餐白石求黃石更採長松寄赤松句碧藕連根絲不斷紅蕖著子意何多山塘莫車水梅雨正分龍婺州道中珊瑚鉤詩話鄭望之望之字顧道彭城人官吏部侍郎僑居上饒揮塵後録舅氏曽宏父生長綺紈而風流醖藉聞于搢紳長于歌詩膾炙人口紹興中守黃州有雙鬟小顰者頗慧黠宏父令誦東坡先生赤壁前後二賦客至代謳人多稱之後歸上饒時鄭顧道呂居仁朝恭道俱為寓客日夕往來顧道教其小獲亦為此技宏父顧鄭笑曰此真所謂效顰也除夕可是今年老也無兒孫次第飲屠蘇一門骨肉知多少日出高時到老夫清波雜志鄭顧道侍郎居上饒享高夀嘗見其除夕小詩親筆云何稱稱字德揚龍泉人紹與甲科為吏部郎官除福建提舉有玉雪堂小集王文孺臞菴多羡王居士心間事事幽山從天末見江近枕邉流春圃千葩秀霜林百果收更能窮物理濠上看魚遊柳外長虹臥江邉小市圓水搖千嶂影窗納五湖天隔岸誰家圃開帆何處船非關臺榭好此地最堪憐吳郡志蒙與義王文孺臞菴一島風煙水四圍軒亭窈窕更幽竒眼中泉石論溪買行處壺觴逐境移倦馬虺隤前日路寒松偃蹇舊年枝自嗟老去殊癡絶一月春愁廢作詩吳郡志李彌正彌正連江人彌遜之弟官吏部郎兼史館王文孺臞菴和祝鎰韻勞車發危坂倦艘失飛湍滔滔褦襶子疾走殊未闌鶴仙擺名宦結廬松江干笑拍萍風浮瞬視草露溥圖川不愧輞序谷寧先盤門豈俗駕拒室無哀筝彈按行松菊間淡然有餘歡蓮巢衆香聚浮天百憂寬秋光斂洲渚暮翠籠峰巒我來挾良朋道故盟未寒錬顔仰孤標耐久同蒼官終當役薪水刀圭卻衰殘吳郡志徐作王文孺臞菴藜莧幽人室丘園隱者居一原青嶂合萬木緑隂疏手把歸田賦腰懸種樹書桑麻連畛秀網罟入溪漁吳郡志程敦厚敦厚字子山眉山人紹興間官中書舍人附檜坐謫朝野遺記程子山為中舍時秦檜善之一日呼入內閣坐候終日獨案上有紫綾褾一册書聖人以日星為紀賦末有類貢進士學生秦塤呈文采豔麗子山兀坐靜觀幾成誦及晚竟不出乃退子山叵測也又數日差知貢舉乃大悟以此命題乃孫果首選王文孺臞菴壁上煙蘿子忩前鴻素書短籬開窈窕嫩竹轉扶疏世事霜前葉聲名澗底樗柴桑陶靖節日暮荷歸鉏吳郡志惜海棠開晚今年春色可勝嗟二月山中未見花長憶去年今夜月海棠花影到忩紗海棠譜題陳閎中畫明皇太真聯轡圖並轡春風禁籞逰外間底事上心頭騎驢後日嘉陵道料得君王始欲愁髙似孫緯略曽惇惇字宏父紆之子紹興中守台州黃州有詩集獻秦益公絶句紹興壬辰既罷三大將議和曽守黃州作黃泥坂下雪猶深赤壁磯頭江欲平驛吏西來聞好語番人巳出蔡州城和戎詔下破羣疑無復旄頭彗紫微屈指銷兵宜有報先看長樂板輿歸能改齋漫録題東湖三年領客醉東湖欲去猶攜竹裏厨誰解挽留狂太守風荷十頃翠相扶赤城志龍溪新亭懷玉知名寺諸峰翠插天凌雲飛略彴照水舞蜿蜒午日孤穿履新涼定著鞭更須煩惠逺小立虎溪邉廣信府志向滈滈字豐之紹興間為萍鄉令有樂齋詞莞爾堂夏日偶成槐影參差日轉廊時看野鳥下橫塘間忩緑映篔簹淨流水紅浮菡萏香座有琴觴真道院徑通花木似禪房文楸珍簟珠簾裏與子同消夏日長袁州府志陳仲平仲平紹興中知瓊州軍吏隱堂在瓊州城北隅仲平建李光命名海山地僻少迎將心逸身間白日長儘欲吟哦追沈謝不求名迹擬龔黃旋移泉石成雲壑時引笙歌入醉鄉吏散簾埀公事省清風一榻傲羲皇廣東通志葉黯黯字晦叔嘗除敕令所刪定官紹興中為福建帥屬和洪容齋鎖院作文章萬言抵杯水世上虛名徒爾耳我常自笑一生癡那更將癡笑羣子大屋沈沈餘百年到今所閲知幾士看渠得失自偶然其間悲喜從何起君聞我言亦大笑為説萬事總如此缺兩句急須了卻公家事門外不知春有幾缺三句飛雨時聞打忩紙他年萬一復相從未必從容今日似送容齋自福倅滿歸一門伯仲知誰似四海文章正數君何事與豫如舊識由來于世兩相聞間官各喜光隂賸勝地空多物色分忽復翻然從此去便應變化上青雲此地相從驚嵗晚登臨况是客歸時卻將襟抱向誰可正爾艱難唯子知情到中年工作惡别于生世易為悲梅花盡醉清江上黯淡西風凍雨埀以上容齋三筆張昌昌字師言紹興中以參知政事出知潭州逰真源宫漠漠山雲閣雨離離澗草搖風看處行穿空翠不妨小駐孤笻木末輕風索索雲邉小雨斑斑行盡丹霞林樾皖山下看灊山宋藝圃集郭浩浩字充道順德軍中安堡人涇原鈐轄成之子充渭州兵馬都監紹興中歷金房開逹州經略安撫使樞密院都統制卒贈檢校少師諡恭毅隴口作隴口山深草木荒行人到此斷肝腸耳中不忍聼鸚鵡猶在枝頭説上皇蓉塘詩話建炎筆録云浩按邉至隴口見紅白二鸚鵡鳴于樹間問上皇安否浩詰其因蓋隴州歲貢鸚鵡徽宗置在安妃閣教以詩文及宣和末使人發還夲土二鳥猶感恩不忘浩因賦詩陳煥煥字少微博羅人紹興中特科調髙要簿梅花雲裏溪橋獨樹春客來驚起曉妝勻試從意外看風味方信留侯似婦人肇慶府志李若川若川字子至紹興中江南東路轉運判官乾道初以吏部尚書使金途中阻雨髙雲無急雨飛灑如絲輕幽人動羇思冒雨登歸程風來曉煙亂雲破春山明眷言憩荒館我懷有餘情壺中載濁酒飲罷還自傾酒盡興不盡關關山鳥鳴理舟為客始逾月迢迢若經年晝永空館寂古木參雲煙我生聞道淺未能超世緣念此方寸地憂來相縈纒今晨動幽興沙岸泊歸船岸逺望不極歸思隨長川村社歌清曉鼕鼕鳴社鼓前村後村走兒女田家醵錢共賽神謝神時晴復時雨案有肴酒爐有香老巫禱祝躬案傍願得年年被神福秋冝稻榖春冝桑人淳禮簡酒無數歌笑喧闐日將暮田翁攲側醉歸來山頭明月山前路以上前賢小集拾遺司馬伋伋字季思紹興中官處州通判淳熙中以敷文閣待制守蘇州老學菴筆記紹興末謝景思守括蒼司馬季思佐之皆名伋劉季高以書與景思曰公作守司馬九作倅想郡事皆如律令也聞者絶倒點易亭在舊治南園洞天占勝作新亭曲檻危簷揖翠屏四顧風煙入懷袖一灣溪水抱沙汀羽人不見論平昔雙鶴猶存舊典型幸得官間成吏隱何妨續説舊羲經處州府志送汪尚書大猷歸鄞憶昔銓衡地為郎得並逰惟公合明陟顧我分夷猶功業行將遂軒車去莫留祠庭固誠請帝眷益綢繆日者真竒中春風畫鷁行東山須繼起南浦獨傷情越岸江山麗都門祖道榮里閭髙臥際趣詔逐追程寧波府志陳克克字子髙臨海人紹興中為敕令所刪定官自號赤城居士僑居金陵有天台集李庚跋云刪定余鄉人也詩多情致詞尤上軍三朝北盟會編紹興七年命吕祉節制淮西馬辟陳克子髙為參謀子髙欣然應其辟葉夢得曰吕安老非馭將之才子髙詩人非國士也勸止之不從夢得贈以詩曰解談孫破虜那厭羽征西克留其家以單騎從軍後􅐱瓊之變終于不免代王正平從諫掾乞畫憑肩美人扇子二首道人已悟孩提事棄擲泥兒壞紙鳶聞道近來都識破丹青便面亦輕捐難陀已幻登伽女童子猶參蘇密多正士逡巡不應受可能分供病維摩跋趙朝議江行初雪圖我夲孤舟蓑笠翁雪崖煙樹一生中如今不向江湖去鬬艦旌旗照水紅謝曹中甫惠著色山水抹胸曹郎富天巧發思綺紈間規模寶月團淺淡分眉山丹青綴錦樹金碧羅煙鬟爐峰香自湧楚客杳難攀政宜林下風妙想非人寰飄蕭河官步羅抹陵九關我家老孟光刻畫非妖嫻繡鳯褐顚倒錦鯨棄榛菅忍將漫汗澤敗此修連姢緘藏寄書篆曉夢生斕斑曹夫人牧羊圖日長永巷車音細插竹灑鹽紛妒恃美人零落涇水寒雨鬢風鬟一揮淚柔毛􅋾􅋾與人羣兒女恩怨徒紛紛洞房那復知許事但畫逺牧連空雲檞葉飄蕭晚風徑羖䍽相追寒鵲並短童何處沙草深族走羣飛各天性向來鞍馬曹將軍文采斑斑今尚存林下美人更超絶新圖不作五花文以上聲畫集瑞香佳人在空谷雙星思銀河契闊不自命盛時豈蹉跎娟娟匡廬秀如此粲者何幽忩下團圞微風自婆娑寂寥千載初戢戢蓬艾多何階計方便千金聘綺羅赤闌青篾舫丁寧護根窠泥沙亦天幸扳聯入宣和誰令蘭蕙徒憔悴守巖阿苕溪漁隱叢話陽羡春歌石亭梅花落如積吐􅽸斕斑竹茹赤祝陵有酒清若空煮糯蒸魚作寒食長橋新晴好天氣兩市兒郎棹船戲溪頭鐃鼓狂殺儂青蓋紅裙偶相值風光何處最可憐邵家髙樓白日邉樓下逰人顔色喜溪南黃帽應羞死三月未有二月殘靈龜可信淹水乾葑草青青促歸去短簫橫笛説明年咸淳毗陵志返魂梅次蘇藉韻誰道春歸無覓處眠齋香霧作春昏君詩似説江南信試與梅花招斷魂老夫粥後惟耽睡灰暖香濃百念消不學朱門貴公子鴨爐煙裏逞風標漫道君家四壁空衣篝沈水晚朦朧詩情似被花相惱入我香奩境界中香乘句淚眼生憎好天氣離腸偏觸病心情贈别許彥周詩話韓偓溫庭筠未嘗措意及此鳥聲妨客夢花片攪春心西溪叢話臨春結綺今何在屹立巉巉終不改可憐江總負君恩白頭仍作北朝臣三品石苕溪漁隱叢話姚寬寬字令威宏弟嵊人以父舜明任補官權尚書户部員外郎樞密院編修官有西溪集春晴風雨惜春殘新晴為啓關白雲歸去盡還我舊青山後村千家詩春暮送碧雲闍黎歸靈巖歸意太匆匆逢春去住中淡香花濕雨薄影絮行風覓句愁何許談玄學未窮因緣知有處秖莫恨飄蓬詩林萬選天台夜雨瘴海逺黏天山城入暝煙春潮生蛤暈夜雨長蝸涎燈几花時落風簾客未眠平生懷此地今夕意茫然天台山志古博嶺在越城西北風獵獵駕寒雲低壓平川路欲昏人馬忽驚俱辟昜一聲乳虎下前村宿太雄寺在諸暨縣解榻無凝塵雲房愜幽素清寒薄衾枕微涼散庭户夢彼流水聲鉤簾捲山霧時與靜者俱為擬湯休句以上紹興府志姚宏宏字令聲剡人舜明子宣和中在上庠南渡後初任監杭州稅調知衢州江山縣秦檜以宿怨追赴大理而死夢筆驛江淹舊居一宵短夢驚流俗千載髙名挂里閭遂使晚生矜此意癡眠不讀半行書庚溪詩話云可警後學錢端禮端禮字處和臨安人徙台之臨海惟演四世孫少師忱之子以恩補官孝宗朝纍除參知政事兼權知樞密院事出知紹興府卒諡忠肅題米元暉瀟湘圖畫手自髙前輩雲山已屬吾曹若會瀟湘物色便合醉讀離騷郁氏書畫題跋記劉岑岑字季髙吳興人髙宗朝官徽猷閣待制嘗知鎮江皇宋書録劉公能書縱逸而不拘舊法蓋有自得之趣有娑嚩齋號柯山齊東野語紹興以來文散階皆有左右字以别有無出身惟嘗犯贓者則去之劉季髙得罪秦氏坐贓廢後復去其左字季髙署銜不以為愧也貞女祠貞女巳云逺芳名聞至今煙波瀨江上松柏古祠深暮色留殘照悲風動逺林謫仙文不死讀罷為霑襟貞烈集李茂之茂之邵武人忠定公綱之子自稱蕭然羈客侍家君詣洞霄宫道出天竺山紀興九里松隂路三天竺國山日蒸巖霧紫花點石苔斑溪盡寺方到雲深僧獨還吟行隨杖履蹤迹出人間天竺寺志劉韞韞字仲固韐之弟以門蔭入仕建寧府志仲固歷倅三州典二郡歸隱于崇安縣南所居有家山堂拙致堂昉齋仙人方丈龜峯樓月波臺積芳園藥圃春谷香界晚蔬秋香徑曲池軒前村秀野朱晦翁為作十五詠以紀其勝場南寺曉起隂霾喜絶收急忙扶酒為春留落花千點野亭寂啼鳥一聲春事幽施食臺髙禽易啄長明燈暗鼠潛偷山僧摘茗吹茶竈留客殷勤學趙州建寧府志劉子翬子翬字彥沖號病翁崇安人韐季子以蔭補承務郎除通判興化軍尋以宿疾辭歸與胡憲劉勉之講學學者稱為屏山先生有集吳傅朋遊絲書歌圓清無瑕二三月時見遊絲轉空闊誰人寫此一段竒著紙春風吹不脫紛紜糾結疑非書安得龍蛇如許臞神蹤政喜縈不斷老眼只愁看若無定知苖裔出飛白古人妙處君潛得勿輕漠漠一縷浮力遒可挂千鈞石眷豫弟兄情不忘軸之逺寄悠然堂謝公遺髯凛若活衛后落鬒搖人光翻思長安夜飛蓋醉哦聲落南山外亂離契闊四十秋筆意與人俱老大政成著腳明河津外家風流今絶倫文章固自有機杼戲事豈足勞心神容齋三筆吳傅朋遊絲書賦詩者以百數劉彥沖古風一篇尤為馳騁痛快且卒章含譏諷正中傅朋之癖聞筝月髙夜鳴筝聲從綺忩來隨風更迢遞縈雲暫徘徊餘音若可玩繁弦互相催不見理筝人遙知心所懷寧悲舊寵棄豈念新期乖含情鬱不發寄曲宣餘哀一彈飛霜零再撫流光頽每恨聼者稀銀甲生浮埃幽幽孤鳯吟衆鳥聲難諧盛年嗟不偶況乃容華衰道同符片諾志異勞事媒棲棲牆東客亦抱淩雲才逰朱勔園晨暉麗丹極翼翼侔帝居向來堂上人零落煙海隅聯翩際時會振迹皆刑餘閨帷尚帝主皂𨽻乘軒車流威被東南生殺在措呼樓船載花石里巷無袴襦至今江左地風雲亦嗟吁叨榮巳過量受禍如償逋荒涼戟門路尚想冠蓋趨客船維岸桞鄰人罾池魚徘徊極幽觀曲折迷歸途夜月扃綺户春風散羅裾繁華能幾時喪亂實感豫曹鄶豫何譏此曹真人奴汴京紀事空嗟覆鼎誤前朝骨朽人間罵未消夜月池臺王傅宅春風揚桞相公橋篤耨清香步障遮並桃冠子玉簪斜一時風物堪魂斷機女猶挑韻字紗萬炬銀花錦繡圍景龍門外軟紅飛凄涼但有雲頭月曾照當時步輦歸橋上逰人度鏡光五花殿裏奏笙簧日曛未放龍舟泊中使傳宣趣鄆王磐石曾聞受國封承恩不與幸臣同時危運作髙城炮猶解捐軀立戰功梁園歌舞足風流美酒如刀解斷愁憶得少年多樂事夜深燈火上樊樓倉黃禁陌夜飛戈南去人稀北去多自古黃沙埋皓齒不堪重唱蓬上聲蓬歌輦轂繁華事可傷師師垂老過湖湘縷衣檀板無顔色一曲當年動帝王瀛奎律髓云不減唐人題胡原仙山居寂寂臨湖屋湖風為掩門鳥聲幽谷樹山影夕陽村好事長留客雖貧亦置尊平生枯淡意出此有誰論泊舟莽莽荒淡岸回回亂石灘雨寒收市早風急泊舟難宇縣兵猶鬬乾坤網正寬殷勤囑龍劍莫久卧波瀾開善寺寒聲蕭蕭霜葉秋石路磽確穿林幽雲橫逺岫若平斷風約小溪如倒流偶經名藍亦終日喜有勝士同兹逰移牀果茗咄嗟辦杖屨欲歸仍更留悠然堂在崇安潭溪吾廬猶未完作意創此堂悠然見南山髙風邈相望賔至聊共娛無賔自徜徉宴坐巖在潭溪青青榹樹林下蔭蒼蘚石幽人宴坐時懷抱忘其適不見暮樵歸寒山雨中碧以上屏山集陳晉錫晉錫明州人紹興十二年進士題衆樂亭神襟百慮不容侵勝槩乘間偶訪尋趺坐豈無觀水術臨流應有濟川心斂將蓬島溶溶氣散作陽春字字金郢曲調髙人寡和微生何敢綴雄吟乾道四明圖經宋詩紀事卷四十六
