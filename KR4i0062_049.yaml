body:
  text: 宋詩紀事卷四十九錢塘厲鶚撰林季仲季仲字懿成永嘉人南渡時太常少卿守婺州送會稽虞仲琳虞頗通性理之學男兒何苦弊羣書學到根源物物無曾子當年多一唯顔淵終日只如愚水流萬折心無競月落千山影自孤執手沙頭休話别與君元不隔江湖題赤松山黃初平祠路轉溪回草木香有人荷笠山之陽定知我是金華守笑道牧民如牧羊羽仗霓旌去不還空餘掬水落人間至今山下無苦旱便是田家九轉丹以上庚溪詩話劉無降遊秀峯寺曉乘輕舸出江城晚上籃輿卻倦行盡日松風響巖谷小窗聽作亂泉聲吳郡志聞人武子武子紹興間人張綱有聞人武子改官制墨梅隴首人歸信息稀愁看冰楮破寒枝瑶姬駐立緣何事直到霜飛月墮時聲畫集王鎬鎬字從周永嘉人仕至忠州守移竹後雨洗紅窣窣烏蓲雨落紫颼颼皂角風挂起北窗聊問訊新移來竹定惺鬆詩人玉屑句髮爽帶風梳齒疏和月潄早行未知真是嶽秖見半為雲望嶽避喧那厭雨宜睡不思茶觀橋寓樓雲學催詩黑風仍作誦清將雨凍雪寒梅雙蠟屐澄江明月一竿絲紹師覓詩催租例擾潘邠老付麥誰憐石曼卿送潘文叔山色兩間供步障松陰半畝當郵亭出舂陵籍通上界神仙府身見甘泉侍從臣上何尚書以上娛書堂詩話葉采采字仲圭號平巖書事雙雙瓦雀行書案點點楊花入硯池間坐小窗讀周易不知春去已多時濂洛風雅陳光道光道字不矜南城人夢中贈神女蔡筝娘十首存四長恐凡材不合仙喜逢神女熟因緣雲中隱隱開金鎖路入麻姑小有天海石榴花映綺窗碧芙蓉朵亞銀塘青鸞不舞蒼虯卧滿院春風白日長老聃西逝即浮屠莫怪窗間貝葉書長哂楊妃仙格劣卻教鸚鵡誦真如玉女倚天多喜笑素娥如月與精神假饒不許長年住猶勝人間不遇人夷堅志劉士季次韻何漕司小紅翠亭少陵遺迹瀼西東端的髙齋在此中今日花枝弄煙雨前時蔬甲卧霜風自注此地舊為蔬畦根株移取他山翠跗萼輸來别圃紅收拾陽春無盡藏夔人端説兩詩翁全蜀藝文志劉王孟題呂先生畫像短褐長絛大布巾雲霞咽嗽九天春可憐世上屠沽子喚作尋常賣墨人聲畫集曾揆揆字舜卿南豐人題資福院平緑軒終日勤勞雁鶩行偶然來訪贊公房扶疏草木四圍合縈繞溪流一帶長倚檻豈能成傑句把杯多是説名方問師乞取安心法宴坐蒲團對佛香至元嘉禾志林歆吳中寒食寒食家家踏曉晴好風吹我出重城幾灣野水迎人白數點家山刮眼明已有鴒原聮乘樂何須鷁尾並橈行山前父老應相笑為我頻來學送迎吳郡志朱明之崑山慧聚寺并序離常熟至崑山泊慧聚寺而詩情尤壯復為二章附于五題蓋山雞自愛其尾亦欲以多為貴也古寺有逺名欲遊先夢生飛猿礀底嘯靈烏雲間鳴影密樓臺衆香繁草樹榮何年照佛火燦燦長光明石林髙月生蘚閣疏磬鳴宿鳥夢難就定僧魂更清香風動花影巖瀑飛玉聲遙夜坐來短但餘天外情吳郡志胡循滄浪亭竄逐本無罪羇窮向此忘野煙含悵望落日滿滄浪亂草荒來緑幽蘭死亦香楚些招不得秋水似瀟湘吳郡志滄浪亭在郡學之南積水彌數十􅒪旁有小山髙下曲折與水相縈帶錢氏時廣陵王元璙池館或云近戚中吳軍節度使孫承祐所作慶厯間蘇舜欽子美得之作亭曰滄浪云毛幵幵字平仲三衢人友之子仕至宛陵東陽二州倅有樵隱集泊釣臺洲渚寒雲薄暮天蕭蕭燈火落帆邊嚴陵灘下孤舟逺一夜歸心聽雨眠釣臺集蔡雋題汀州蒼玉洞向來曾醉呼猿洞亂石崩雲擁坐隅誰料七閩煙瘴底半巖風物似西湖錦繡萬花谷鄭子覃題苕溪道觀壁紛紛紅雨入蒼苔密蔭新成鶯友來擬逐幽人夢蓬島一聲裂竹故驚回苕溪漁隱叢話周仲卿月泉石罅玉為髓月梭金作稜蒼苔誰鑿破白雪自堅凝穿豈太山霤清于萬壑冰此中無六月門外氣如蒸湖州府志月泉在德清縣慈相寺出石罅間形如半月吕東萊疏云斷崖吐月才出半規古甃涵星尚懷全璧久矣寶奩之廢時哉玉斧之修護此清寒祓其氛翳名髙詩社再傳和仲之符價重帝城復值文饒之運周仲卿有詩王崈崈字德升新淦人困躓場屋入玉笥山依道士潘與齡獨居白雲齋十餘年卒醫山道中濺石韻寒泉依稀言語處回頭覺無人又上前溪去山樵山樵竹裏居略彴才堪度落日淡平疇牛羊點寒暮獨醒雜志語意蕭散非逺外聲利者不能也許志仁志仁字信叔寄衣曲貂裘雖云溫非妾手中迹唯此萬里衣一針三歎息歎息恐人聞縫時常避人開緘勿嫌涴中有雙淚痕江南十月雁初飛邊地才秋塞草衰衣成妾手君寧見寒到君邊妾自知寄書問征夫好在何當還西風吹妾夢夜度魯陽關和姚令威春晚即事卧看遊絲媚逺天起尋幽徑卻茫然句成落絮飛花裏心在殘霞夕照邊無復雙魚傳尺素空餘寶瑟思華年年來情味人應笑白首傷春祗醉眠以上前賢小集拾遺俞似似官廣州鈐轄題英州金山寺壁轉食膠膠擾擾間林泉髙步未容攀興來尚有平生履管領東南到處山容齋隨筆似妻趙夫人親書此詩于寺壁字畫徑四寸遒健類薛稷王度度字武臣豫章新吳人句雲生坐來石風掩讀殘書危紅賒晚景漲緑上平沙鴉分供餘食鴿亂著殘棊樵斧和雲斫漁蓑帶雪披娛書堂詩話王武臣吟詩有警句皆清竒可誦張紫微謝艮齋極稱賞之王菉漪梅不受塵埃半點侵竹籬茅舍自甘心秖因誤識林和靖惹得詩人説到今西溪叢話李朴朴字德卲廣陵人端硯巖石凝清粹端然絶世珍聲清輕楚玉色潤勝燕珉硯箋李似權記夢碧玉山頭碧玉泉琮琤聲裏數流年不知曾與何人到笑想丹題似昔緣石壁蒼苔露未乾小池射日石團團弄泉潄玉歸何暮風捲橫雲細細看能改齋漫録俞疇疇字叔惠南渡初人跋山谷書范滂傳帖貂璫羣雛擅天網手驅名流入鉤黨屯雲蔽日日光無􅣧金神器春冰上汝南節士居危邦志剗蕭艾扶蘭芳致君生不逮堯舜死合夷齊俱首陽千年興壞真暮旦殷鑒詎應如許逺安知後人哀後人又起諸賢落南歎宜州老子筆有神蟬蛻顔揚端逼真少模龍爪已名世晚用雞毛亦絶人平生孟博吾尚友時事駸駸建寧舊胸蟠萬卷老蠻鄉獨感斯文聊運肘老子書名橫九州一紙千金不當酬此書豈但翰墨設心事悢悢關百憂人言老子味禪悅疾惡視滂寧爾切須知許國本精忠不幸為滂甘伏節九原莫作令人悲遺墨敗素皆吾師從君乞取宜州字要對崇寧黨籍碑桯史柴中守跋山谷書范滂傳帖小春晝日如春晚飲罷披圖清興逺夜光照屋四座驚金薤銀鉤真墨本當年太史謫宜州腸斷梅花棲戍樓拾遺不逢東道主翰林長作夜郎囚蠻煙瘴雨森鈇鉞更值韓盧搜兔窟老色上面歡去心惟有忠肝懸日月郡丞嗜好殊世人投箋乞字傳兒孫平生孟博是知已筆下寫出精神騫興亡萬古同一轍黨論到頭不堪説刋章下郡漢道微清流入河唐祚絶先朝白晝狐亦鳴正氣消盡邪氣生殿門斷碑仆未起中原戎馬來縱橫生蛟入手不敢玩往事凄涼重三歎蘭亭瘞鶴徒爾為好刻此書禆廟算桯史宗道傳道傳南渡初人伏波巖曰璐按顧氏選本作賈黃中字句小異銅柱威聲凛百蠻肻貪捆載溷溪山無人為起文淵問端的珠還薏苡還桂勝馬益益福州通判奉和蔡公寒食遊二山作屬吏參陪宴二山金杯滿沃酒腸寬公私不禁三朝火風雨都無一日寒花引遊蜂香四座人穿蕭寺景千般清明休假歡心洽飽德咸知有上官淳熙三山志蒲瀛次韻袁升之遊海雲寺鴻慶院山茶之什山茶兩本上連空疊葉棲枝占佛宫雀尾有金輸紺碧鶴頭無火讓殷紅優于峽茗稱呼異劣與梅花氣候同誰識諸天雨花外道人宴坐雪霜中遊呪土寺西臺偶到城西寺人言呪土墳夕陽臺半出秋草徑斜分地下無紅粉天邊有碧雲徘徊追往事風急葉紛紛以上成都文類許尹尹字覺民紹興中處州守和吳謹思題仙都山黃帝得仙從此去鼎湖傳説幾經年龍髯墮地成青草直到如今不上天仙都山志吳謹微謹微紹興中縉雲人遊仙都山薄宦驅人畏簡書金柔暑濁倦征途歸來有意尋真境路入仙都不憚迂山下霏微雨灑塵門前嘹唳鶴迎人遂成一覺仙都夢更訪遺蹤得隱真仙都山志楊咸亨江郊亭新成賦二十三韻蜀江千里東南傾峽門橫鎖千丈鯨吳帆蜀楫過如織府主四海皆弟兄城西門前二十里客去當送來當迎藤梢橘刺密無路短亭四壁荒榛荆春風淡沱酌客處我陪後乘同郊行碧油紅斾駐沙尾連宵急雨鼓不鳴元戎玉皇香案吏俯仰茅屋無乃輕擘山鞭石相原隰釘頭瓦縫粟縷盈偉哉幻出此竒觀丹楹畫棟光峥嶸山長波迥目力短空濛宜雨髙宜晴危嵐滴翠染窗戶空江倒影翻簷甍天長地久設相待更為佳處題佳名梁間橫陳大手筆龍蛇飛動神鬼驚髙齋百篇子美唱峴首千載羊公情試呼小隊訪新館壯遊始與勝槩并披雲喚月星斗動放舟聞鶴天水明練光渺渺風力壯疊鼓西上帆東征舳艫冠蓋兩歎息歡謡晝亂通樵聲元戎故是活國手山河指顧風塵清凄涼三峽小遊戲朴斫丹黝安足程明堂梁棟要杞梓天關一柱須公擎紛紛故吏萬里外燕雀行慶大厦成賦詩抵掌者誰子夜郎野老楊咸亨全蜀藝文志沈東東字元敘崑山人遊滄浪亭草蔓花枝與世新登臨空復想清塵只今唯有亭前水曾識春風載酒人中吳紀聞沈長卿長卿字文伯湖州人為常州倅忤秦檜貶化州句翠蛾環坐憶洲錢至元嘉禾志洲錢市在崇德縣西北二十七里宋南渡初士大夫來寓者殆二十家贈申國趙公不求父子寓踰一紀慶公善應字彥逺詩翰尤妙蘇計屬師德仁仲吕顯謨正已仲發迭主詩盟即祇園精舍為簮盍之所詩人沈文伯有句云云柴援援嘗為小吏自言周室之裔頗能詩寄逺别時指我堂前栁栁色青時望子時今日栁綿吹欲盡尚憑書去説相思客舍隻影寄空館蕭然飢鶴姿秋風北窗來問我歸何時以上卻掃編張頔清淮樓在濠州觀魚惠子臺蕪沒夢蝶莊生冢木秋唯有清淮供四望年年依舊背城流方輿勝覽邵稽仲龍州峭壁陰森古木稠亂山深處指龍州猿啼鴉噪溪雲暮不是愁人亦自愁方輿勝覽許表項王廟在烏江號靈惠廟千載興亡莫浪愁漢家功業亦荒邱空餘原上虞姬草舞盡春風未肯休方輿勝覽史幹題鵝鼻山龍泉五盞張帆去鵝鼻三杯衣錦歸寄與長泉後來者年年盛事莫相違方輿勝覽山在眉州青神縣長泉北長泉士人每登科而歸鄉人迓之于此三酌史幹有詩宋詩紀事卷四十九
