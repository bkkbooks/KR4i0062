body:
  text: 宋詩紀事卷二十二錢塘厲鶚撰王觀觀字通叟高郵人一作如臯人嘉祐二年進士纍遷大理丞知江都縣嘗著楊州賦及芍藥譜莫惱翁穀垂乾穗豆垂角雨足年登不勝樂烏巾紫領銀鬚長白酒滿杯翁自酌翁醉不知秋色涼兒捋翁鬚孫撼牀莫惱翁翁年已高百事慵竹坡詩話此詩可與張文昌爭衡李渤渤字子文樂昌人嘉祐二年進士官至朝奉郎知白州韶州府志渤世業儒有聲嶺表郡人號李夫子嘗試南昌作聞伯夷之風頑夫亷賦人稱為李伯夷武溪扁舟初泛入瀧船隱約乘槎上漢年岸狹束成三級浪山高分得一毫天掃開盤石那無酒流出桃花恐有仙青史若能留姓字直須來此釣溪烟韶州府志郟亶亶字正夫太倉人嘉祐二年進士初授睦州團練推官除司農寺丞提舉兩浙水利元祐初為太府寺丞出知溫州卒有吳門水利書鍾山訪王荆公時遣其子僑就學十里松隂蔣子山暮烟收盡梵宫寬夜深更向紫微宿坐久始知凡骨寒一𣲖石泉流沆瀣數庭霜竹顫琅玕大鵬泛有摶風便還許鷦鷯附羽翰中吳紀聞王回回字深父福州侯官人嘉祐二年進士補亳州衛真縣主簿歲餘自免去治平初以薦知南頓縣命下而卒有集浙江有感候潮門外浙江西曾憶浮舟自此歸萬古波濤今日是一身蹤跡昔人非愁侵壯齒頭先白淚入秋風眼易眵日暮倣徨不能去連隄疏柳更依依咸淳臨安志吕大鈞大鈞字和叔大防弟嘉祐二年進士乙科終于鄜延路漕司屬官從橫渠張子學有誠德集曾㸃函丈從容問且酬展才無不至諸侯可憐曾㸃推鳴瑟獨對春風詠不休宋文鑑黃通通字介夫邵武人嘉祐二年進士除大理寺丞元夕春樓十二玉梯橫紫府千門夜不扃疑是嫦娥弄春色彩雲移下一天星邵武府志劉輝輝元名幾字之道鉛山人嘉祐四年進士第一官大理評事有東歸集文獻通考陳氏曰輝文體竒澀歐陽公惡之下第及是在殿廬得其賦大喜既唱名乃輝也公愕然堯舜性仁賦至今傳誦與客遊太平僧舍兩道翠隂迎騎合四圍清氣逼人來林端有路雲千級物外忘機酒一杯翰府名談豐稷稷字相之明州鄞人嘉祐四年進士徽宗朝歷官御史中丞工部尚書兼侍讀以樞密學士出守越州入元祐黨籍安置台州徙建州卒建炎中追復學士諡清敏運司園亭詩和章質夫玉溪堂一水從何來應是崑山頂釃成緑玉池虛堂逗清影公退泠然賞了非心外境魚泳陽光動鳥啼春晝永潺玉亭養源在西山如玉抱精白引之落錦渠歷耳不可擇風雨雜鳴球珠璣寫雲液恰似偃溪聲醒悟迷途客以上成都文類題朱朴隱居天和堂路左漿先饋門前屨幾重勇歸塵事擲恬處道心濃弄水知幽谷觀雲想妙峯夜深孤鶴唳清露滴髙松至元嘉禾志駕幸太學鳯幄雲開日月光九霄鳴蹕下虞庠朝元進士鴻成列拱極名臣玉照行問道賈生稱五學乞言戴聖美三王上心夙悟周公戒天下安危自一堂中州題詠集朱長文長文字伯原其先越州剡人家吳郡嘉祐四年進士授祕書省校書郎改許州司戶參軍充蘇州教授築室郡西表曰樂圃鄉人稱為樂圃先生紹聖閒除祕書省正字兼樞密院編修卒有樂圃文集避暑録話元豐閒淮浙士人以疾不仕因以行義聞鄉里者二人楚州徐積仲車蘇州朱長文伯原仲車以聾伯原以跛奉陪太守及諸公遊虎丘何必襄陽孟浩然苦吟自可繼前賢虎丘合去十二度見白公詩熊軾再遊三百年雲閣為君追舊額飛雲閣本名齊雲樓今追復之霓裳從古播朱弦白公在蘇作霓裳曲此行不減唐人樂暢飲惟無八酒仙次梅評事韻瓶盂蕭灑似村家任有籝金豈足誇自入醉鄉頭不白新詩何用祝蒼華以上樂圃餘稿胡宗愈宗愈字完夫常州人宿從子嘉祐四年進士哲宗朝歷尚書右丞終吏部尚書寄題錢公輔衆樂亭平湖拍岸海潮通亭在平湖杳靄中花豔含春雲島晚波光照夜玉壺空動搖人影雙橋月洗滌塵襟四靣風野老半酣亭下笑漁樵今日與民同延祐四明志章惇惇字子厚浦城人嘉祐四年進士元豐中歷門下侍郎哲宗即位遷知樞密院事左僕射兼門下侍郎遷特進封申國公徽宗朝責潭州安置再貶雷州司户參軍徙湖州居住揮麈餘話章惇之父俞邭公族子早歲無行妻之母楊氏早寡俞與之通已而生子以一合置水緘置其內持以還俞俞得之云此兒五行甚佳將大吾門既長登第即惇也東坡先生送其出守湖州詩云方丈仙人出渺茫高情猶愛水雲鄉惇以為譏已怨之紹聖中為相坡渡海蓋修怨也遊虎丘次韻闔閭城外小層巒瘦竹寒松數里間並岸逢僧知近寺入門鑿石漸登山純鉤劒化空池在幽獨詩成白日閒遊客幸無官事束何須齊舫斂昏還和蒲宗孟遊虎丘山書錢唐舊遊傳聞城角艤行舟自擁笙歌選勝遊偶為寒江阻潮汐再容清賞矚林丘燕回吳苑風和雪夢斷錢塘月滿樓盡把蘇杭好烟景醉吟將去詫東州以上吳郡志題李邦直家江行初雪圖江頭微雪北風急憶泊武昌舟尾時潮來浪打船欲破擁被醉眠人不知退齊閒雅録過石槽鋪在卲陽瘴癘潛銷瑞氣和梅峯千里潤烟蘿人逢雙堠雖云逺路在好山寧厭多方輿勝覽梅山歌開梅山開梅山梅山萬仞摩星躔捫蘿鳥道十步九曲折時有僵木橫崖巔肩摩直下視南嶽回首蜀道猶平川人家迤邐見板屋火耕磽確多畬田穿堂之鼓堂壁懸兩頭擊鼓歌聲傳長藤酌酒跪而飲何物爽口鹽為先白巾裹髻衣錯結野花山果青埀肩如今丁口漸繁息世界雖異如桃源熙寧天子聖慮逺命將傳檄令開邊給牛貸種使開懇植桑種稻輸緡錢不持寸刃得地一千里王道蕩蕩堯為天大開庠序明禮教撫柔新俗威無專小臣作詩備雅樂梅山之崖詩可鐫此詩可勒不可泯頌聲千古長潺潺湖廣總志長沙國漢高帝始王吳芮芮將梅鋗時以益陽梅林為家號梅山後為蠻王扶氏據之至宋熙寧六年章惇諭平五寨分其地為二始以下梅山地安化縣屬武安軍惇有梅山歌云云張芻芻字聖民嘉祐四年進士官度支員外郎守登州又為淮南轉運使題招提院靜照堂檇李舊禪扉叢林自翠微寺居天外靜僧向日邊歸野水涵齊几閒雲宿釣磯庭前祖來意誰為柏依依至元嘉禾志陸伸題招提院靜照堂閒房增締構宴坐隔囂埃屋木不加飾庭花時自開虛明殊止水寂絶等寒灰齊外無餘事欣逢高士來至元嘉禾志徐徽徽字仲元滁州人嘉祐四年進士歷官提舉利州改常平抗疏致仕居獨山號獨山翁編滁陽慶歷集襄城胙土分茅奠此岡金根玉輅總輝光誰知三百餘年後老樹殘蟬送夕陽滁陽志蔡確確字持正晉江人嘉祐四年進士歷知制誥御史中丞參知政事元豐五年拜尚書右僕射兼中書侍郎哲宗立轉左僕射元祐中罷知陳州奪職徙安州又徙鄧州坐譏訕責英州别駕新州安置題王維江行初雪畫吳兒龜手網寒川急雪鳴蓑浪拍船青弋渡頭曽臥看令人卻憶十年前聲畫集春日十二天街雨壓沙秋千咿喔響人家東風㑹勸十分酒寒食初開百玉花年少斬新金絡馬柳隂無數畫輪車春來誰道遲遲日尤覺春來日易斜後村千家詩崇政殿放榜黃帕開封出奏篇銀袍二百玉階前威顔咫尺瞻中扆名姓傳呼下九天宫墨旋題黃甲字禁門已蔟杏花韉孤臣拜賜交悲喜相望光芬十五年合璧事類前集楊花楊花三月暮撩亂送春歸盡日閒相逐無風亦自飛輕輕攔乳燕故故撲征衣莫上高樓望排徊滿落暉合璧事類别集悼侍兒鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸侯鯖録持正謫新州侍兒從焉名琵琶常養一鸚鵡甚慧丞相呼琵琶即扣一響板鸚鵡傳言呼之琵琶逝後誤扣響板鸚鵡猶傳言丞相大慟感疾不起嘗為詩云云夏日登車蓋亭公事無多客亦稀朱衣小吏不須隨溪潭直上虛亭裏臥展柴桑處士詩一川佳景疏簾外四靣涼風曲檻頭緑野平流來逺棹青天白雨起靈湫紙屏石枕竹方牀手倦拋書午夢長睡覺莞然成獨笑數聲漁笛在滄浪苕溪漁隱叢話蔡確守安州夏登車蓋亭作十絶句為吳處厚箋注得罪調新州其一絶云云殊有閒適自在之意靜中自足勝炎蒸入眼兼無俗物憎何處機心驚白鳥誰人怒劒逐青蠅西山髣佛見松筠日日來看色轉新聞說桃花巖石畔讀書曾有謫仙人風搖熟果時聞落雨滴餘花亦自香葉底出巢黃口閙波閒逐隊小魚忙來結芳廬向翠微自持杯酒對清暉水趨夢澤悠悠過雲抱西山冉冉飛矯矯名臣郝甑山忠言直節上元閒古人不見清風在歎息思公俯碧灣溪中曾有戈船士溪上今無佩犢人病守翛然唯坐嘯白鷗紅鶴伴閒身喧豗六月浩無津行見沙洲束兩濵如帶溪流何足道沈沈滄海㑹揚塵堯山堂外紀蔡確以弟碩贓敗謫守安州夏日登車蓋亭作此十絶時吳處厚知漢陽軍箋注以聞其略云五篇涉譏諷何處機心驚白鳥誰人怒劒逐青蠅以譏讒譖之人葉底出巢黃口閙波閒逐隊小魚忙譏新進用事之人睡起莞然成獨笑方今朝廷清明不知確笑何事矯矯名臣郝甑山忠言直節上元閒按郝處俊封甑山公唐髙宗欲遜位天后處俊上疏諫此事正在上元三年今皇太后垂簾遵用章獻明肅故事確指武后以比太后沈沈滄海㑹揚塵謂人夀幾何尤非佳語宣仁盛怒令確分晰終不自明遂貶新州楊傑傑字次公無為軍人嘉祐四年進士元祐中歷禮部員外郎出知潤州除兩浙提㸃刑獄卒有無為集勿去草行勿去草草無惡若比世俗俗浮薄君不見長安公鄉家公卿盛時客如麻公卿去後門無車又不見千里萬里江湖濵觸目悽悽無故人唯有芳草隨車輪一日還舊居門前草先鉏草與主人實無負主人于草宜何如勿去草草無惡若比世俗俗浮薄謝公約惠墨竹圖幽人噴墨寫成竹變化琅玕作𤣥玉公約贈我兩大軸不比丹青凡草木六月都城苦炎燠車馬紛紛正馳逐曲臺官冷晝掩關淨掃虛堂展寒緑簾閒忽有微風來不動纖枝清滿屋憶得扁舟載雪時曾寄㑹稽江上宿二妃廟黃陵二妃廟客過動愁顔湘水有時盡帝車何日還血斑千畝竹魂斷九疑山欲問蒼梧事白雲生棟閒以上無為集雨花臺梁武帝時有雲光法師講經于此空書來震旦康樂造淵微貝葉深山譯曼花半夜飛香清雖透筆蘂散不霑衣舊社白蓮老逺公應望歸六朝事蹟淨居寺在建昌新城縣南逹人到岸不須船留寄寒雲幾百年欲問上方多少逺為言先過淨居天輿地紀勝西湖參寥山房我愛參寥一味閒巖房占得畫屏間斫開東廡數枝竹放入西湖十里山石底酌泉清徹骨門前逢客强為顔白雲幽鳥應相信出本無心倦即還咸淳臨安志元祐元年六月十六日還自海上入佛日山淨慧道場瞻禮懷禪師塔時長老弼公即阿育王大覺禪師之嗣也送豫出山酌甘泉而别因留詩佛日山前水行人甘露杯須知源𣲖逺直自四明來鐡網珊瑚劉祕祕官奉職與楊次公倡和贈傳神歐陽價筆妙今為第一人心期造化奪天真精神形骨從來一移入青縑似兩身古今詩話李顒舟泊太湖旋經義興境頓棹石蘭渚震澤為何在今惟太湖浦圓經縈五百盼目眇無覩高天渺若岸長津雜如縷窈窕尋灣崎迢遞望巒嶼驚飇揚飛湍浮霄漾懸岨輕禽翔雲漢遊鱗憩中滸黯靄天時隂嶢巖舟航舞馮河安可馴靜觀戒行旅震澤編關景仁景仁字彥長錢唐人魯之子嘉祐四年進士贈小蘇昔日聞蘇小今朝見小蘇未知蘇小貌得似小蘇無泗上録元居中作宿守郡有官妓小蘇善歌舞令就座客關彥長求詩贈之云云李定定字資深揚州人舉進士元豐閒官御史中丞哲宗朝謫居滁州詩話總龜李定字仲求洪州人又李定字資深揚州人元豐中御史中丞又李定濟南人嘉祐中老于正卿同姓名者凡三人老學菴筆記潘子賤題蔡奴傳神云嘉祐閒風塵中人亦如此嗚呼盛哉蔡實元豐中人也仇氏初在民閒生子為浮屠曰了元即佛印禪師又為廣陵國子博士李問妾生定出嫁郜氏生蔡奴故京師人謂蔡奴為郜六襁褓所生母被東軒筆録司農少卿朱夀昌在出治平中棄官入關中尋訪得于陜州蘇子瞻作詩序且譏切世之不養者李定見之大惋恨㑹為中丞劾軾作詩訕謗將致不測賴上保持之止黜為黃州團練副使海棠輕紅如杏素遮梨直似佳人照碧池已是化工教豔絶莫嫌青帝與開遲烟滋綽約明雙臉雨借妖饒入四支西蜀有名須得地瓊林髙壓百花竒海棠譜琴溪芳草茸茸襯馬蹄兩陪憲節過琴溪東風又屬梨花月膏雨新調燕子泥郵舍亭空蒼蘚合釣臺人去暮雲棲此行不憚驅馳逺千里江山入品題寧國府志邵雍雍字堯夫河南人嘉祐中詔求遺逸授將作監簿復舉逸士補潁州團練推官稱疾不起名其居曰安樂窩自號安樂先生元祐中諡康節有擊壤集安樂窩半記不記夢覺後似愁無愁情倦時擁衾側臥未欲起簾外落花撩亂飛聞見前録司馬溫公愛此詩請書紙簾上謝司馬君實諸公買園重謝諸公為買園買園城裏占林泉七千來步平流水二十餘家爭出錢嘉祐卜居終是僦熙寧受劵遂能專鳯凰樓下新閒客道德坊中舊散仙洛浦清風朝滿袖嵩岑皓月夜盈軒接䍦倒戴芰荷畔談麈輕揮楊柳邊陌徹銅駝花爛漫隄連金谷草芊綿青春未老尚可出紅日已髙猶自眠洞號長生宜有主窩名安樂豈無權敢于世上明開眼㑹向人間别看天盡送光隂歸酒盞都移造化入詩篇也知此片好田地消得堯夫筆似椽聞見前録康節先公慶歷間過洛愛其山水風俗之美始有卜築之意至皇祐元年洛人為買宅于履道坊西天慶觀東康節復還葉縣嘉祐七年王宣徽尹洛就天津橋南五代節度使安審琦故宅基為屋三十間請康節還居之富韓公命其客孟約買對宅一園皆有水竹花木之勝熙寧初行買官田之法天津之宅亦官地榜三月人不忍買諸公曰使先生之宅他人居之吾輩䝉恥矣司馬溫公而下集錢買之先生以詩謝溫公諸公云云今宅契司馬溫公户名園契富韓公户名莊契王郎中戶名康節初不改也寄吕獻可一别星霜二紀中升沈音問不相通林間談笑須歸我天下安危且係公萬乘几前當蹇諤百花洲上略相從不知月白風清夜能憶伊川舊釣翁和司馬君實過天津居風背河聲近亦微斜陽淡泊隔雲衣一雙白鷺來烟外將下沙頭卻背飛春遊吟人間佳節惟寒食天下名園重洛陽金谷暖橫宫殿碧銅駝晴合綺羅光橋邊楊柳細垂地花外秋千半出牆白馬蹄輕草如剪爛遊于此十年狂小車吟自從三度絶韋編不讀書來十二年大􅜔子中消白晝小車兒上看青天閒為水竹雲山主靜得風花雪月權俯仰之間無所愧任他人謗似神仙以上擊壤集張岫岫字子望滎陽人與兄峋同登進士受學于卲康節洛陽觀花平生自是愛花人到處尋芳不遇真秖道人間無正色今朝初見洛陽春王直方詩話此詩蓋託意卲堯夫曹確確常州人嘉祐四年進士題季子墓人間不記吳王事江上今存季子宫壞壁亂飄青蘚雨破檐時蕩白榆風衣冠何處堆春草雞酒長年任野翁下馬一看思舊德浮名應與暮雲空咸淳毗陵志程珦珦字伯溫西洛人兵部侍郎羽之曾孫以祖任為郊社齊郎嘗知龔鳯磁漢四州積遷大中大夫漢州作濯纓泉潔存遺跡促軫亭空想舊風公暇未應無客㑹春遊更喜與民同方輿勝覽程皓皓字伯淳珦之子舉進士神宗朝以薦為太子中允監察御史裏行罷知扶溝縣責監汝州鹽稅卒文潞公題其墓曰明道先生嘉定中追諡曰純封河南伯從祀宣聖廟庭有明道集林下偶談山谷稱周濂溪胸次如光風霽月又云西風壯士淚多為程皓滴東坡為濓溪詩云夫子豈我輩造物乃其徒蓋蘇氏師友未嘗不起敬于周程如此惜乎後因嘻笑而成仇敵也長嘯巖中得冰以石敲餐甚佳車倦人煩渴思長巖中冰片玉成方老仙笑我塵勞久乞與雲膏洗俗腸送吕晦叔赴河陽曉日都門颭斾旌晚風鐃吹入三城知公再為蒼生起不是尋常刺史行西湖潩水橋邊鴨子陂樓臺只在郡城西煙波乍見心先快島嶼將尋路欲迷盡日無風橫舴艋有時經雨飲虹霓如何咫尺塵埃地不使遊人續杖藜陳公廙園修禊事席上賦盛集蘭亭舊風流洛社今坐中無俗客水面有清音香篆來還去花枝泛復沈未須愁日暮天際是輕隂以上河南程氏文集顔復復字長道太初子嘉祐中訪有道之士京東部使者以復應詔賜進士為校書郎元祐中纍官國子祭酒天章閣待制卒寄雲門靈運禪師雲門山嶺棕葉青雲門山下隂溪鳴山翁毁服悖世榮此心圓靜無能名松間一飯養槁形石壁幾見秋苔生愛山不免搜其情掇拾短闋成長行施子傳來竒可驚爽闓空谷天外聲髙峯擺蕩疑莖英雲門集劉摯摯字莘老永靜東光人家于東平嘉祐中擢甲科神宗朝纍遷禮部侍郎哲宗即位歷官門下侍郎以觀文殿大學士出知鄆州紹聖初以黨論貶光祿卿分司南京再貶鼎州團練副使新州安置卒紹興中贈少師諡忠肅有集孫少卿鹿頭山詩并畫圖使君真愛鹿頭山圖畫歌吟共為傳塵世那知武陵事時人爭誦永嘉篇行春游醉常勞夢按部登臨又隔年有客平生志林壑坐憐雙眼隔雲烟聲畫集夜直中書省寄左丞子容公膺門早歲預登龍儉幕中間託下風敢謂彈冠煩貢禹每思移疾避胡公論文青眼今猶在報國丹心老更同夜直沈迷坐東省齊居清絶望南宫卻掃編蘇子容留守南都莘老時為判官蘇大器愛之後同秉政因祠事各居本省致齊寄語云云湖上口號緑荷深不見湖光萬柄清風動晚涼莫恨細葩猶未爛葉香元是勝花香能改齊漫録易元吉畫猿槲林秋葉青玉繁枝間倒挂秋山猿古面睢盱露瘦月氄毛勻膩舒𤣥雲老猿顧子稍留滯小猿引臂勞攀援坐疑跳擲避人去仿佛悲嘯生壁間巴山楚峽幾千里寒巖數丈移秋軒渺然獨起林壑志平生願得與彼羣吾知畫者古有說神鬼為易犬馬難物之有象衆所識難以僞筆淆其真傳聞易生近已死此筆遂絶無幾存安得千金買遺紙真僞常與識者論聲畫集絳帳臺在江陵東漢馬融教授弟子于此馬融號耆舊太守南郡來橫經坐絳帳自處何崔嵬帳前列徒弟帳後歌管陪書生貧賤志遽以聲色回方輿勝覽王巖叟巖叟字彥霖大名清平人仁宗初置明經科鄉舉省試廷對皆第一元祐中拜簽書樞密院事罷為端明殿學士出知鄭州徙河陽卒紹聖中坐黨論追貶雷州别駕有大名集柳絮銀毬拋出翠烟深聚散髙低不自禁飄去長教迎暖日飛來深院怯春隂全芳備祖和公齊臨替有感見寄孤宦邊城遇衆賢及瓜能不動依然風號古木葉堆地雲攪遙山水拍天籬菊開時寒有信賔鴻過後暑無權古今惜别君須念乘暇何妨倒酒船瀛奎律髓駕幸太學享餘精意煥龍章就促鑾輿視上庠億萬圜觀人作堵三千迎拜士成行虛心訪道資洪業異禮尊儒冠百王四海嚮風知自勸足應愚魯亦升堂中州題詠集揚州感舊懷古隱隱蕪城枕碧流繁華曾是帝王州一聲水調滿明月十里春風半畫樓白鳥不離圖上去江雲長在鑑中遊廢興屈指千年事何異行人寄傳郵揚州府志陪孫之翰太博登成都樓齪齪古之人傷心廣陵廢遂弦蕪城歌半夜一揮涕蕙紈隨草衰藻黼歸塵翳魂石斂丘封歌堂從水逝薰光杳沈滅吞恨徒千歲我懷吳蜀國禍亂若符契目覽臺殿墟心感君王世干戈日馳逐狼虎爭吞噬山河寶天塹城闕巍地腋霸力不久炎倐忽如焚剃空餘萬雉城岌倚寒雲際麋鹿玩蘋隂狐狸棲棘衛江漢含嗚咽岷峨抱迢遞荒村烟火遙落日寒風厲因知朝市人自古悲興替全蜀藝文志霧山在卭州霧山環合自雲川戶有青溪種玉田萬樹桃花不知處幾人曾得問秦年方輿勝覽王俊民俊民字康侯萊州掖縣人嘉祐六年進士第一句寒窗一夜雪紛紛來朔風之子動歸興輕袂飄如蓬問子何所如家在濟水東問子何所學上庠教化宫齊東野語世俗所謂王魁之事殊不經且不見于傳記雜說疑無此事後見虞初志所集養生必用方戒人不可妄服金虎碧霞丹云狀元王俊民為應天府發解官得狂疾於貢院中嘗對一石碑呼呌不已碑中若有應之者亦若康侯之奮怒也病甚不省取書冊中交股刀自裁及寸左右抱持之遂免出試院未久疾勢亦已平復豫與康侯有鄉曲之舊童稚共筆硯傳聞可駭亟自汶拏舟抵彭城康侯亦起居飲食如故但愔愔不樂歲暮豫北歸康侯有詩送豫云云豫既去徐醫以為有涎以碧霞金虎丹吐之積久為寒中洞泄而死康侯父知舒州太湖縣遣一道士來作醮書符傳道冥中語云五十年前打殺謝吳留不結案有妄人托夏噩姓名作王魁傳欲市利於少年狹邪輩其事皆不然喬孝本孝本嘉祐中福州簽判題三山郡圃㑹稽亭元給事綘建元侯選勝重經營地取圍心正且平揆日募工踰再浹創亭合樂落初成面開西向緣忠孝榜揭新封紀寵榮隱隱湖山藏故國漫漫煙水隔都城低迷壘嶂回峯抱繚繞芳叢列豔迎臺上臨風共瀟灑花間夢蝶助凄清枕流小檻歌前沼散綺幽軒接後甍舊景周環如有待夕陽偏照似多情縈紆碧沚通潮浦左右修篁拂畫楹自昔甘棠雖足愛㑹稽從此擅佳名淳熙三山志孔文仲文仲字經父臨江新喻人嘉祐六年進士哲宗朝官中書舍人後入黨籍與弟武仲平仲有清江三孔集早行客興謂已旦出視見落月瘦馬入荒陂霜花重如雪海風吹萬里兩耳凍幾脫歲宴已苦寒近北尤凛冽況當清曉行遡此原野闊笠飛帶繞頭指直不得結農家烟火微炙手粗可熱豈能迂我留而就茍且活仰頭視四宇夜氣亦漸豁苦心待正晝白日想不缺宋文鑑朱伯虎伯虎字才元華亭人嘉祐六年進士官江東運判題佘山普照寺聰道人月軒愛月開軒絶頂閒屼然巍創壓層巒翦除羣卉當簷盡添得清光滿檻看亂石雲堆秋色冷老松風入夜聲寒十年夢寐江鄉景杖屨終期日倚䦨松江府志曽宰宰字子翊鞏第五弟嘉祐六年進士官舒州司户參軍湘潭縣主簿舒州寄王介甫官居隱几望灊山不似茅簷舊日閒顧我塵沙添白髮憐君道路失朱顔江涵秋老鱸魚美岸入春風荻筍斑此味總佳吾不樂惟思一馬返鄉關李壁王荆文公詩注豫居撫州訪遺文於其孫極止得此詩許將將字沖元福州閩人嘉祐八年進士第一神宗朝纍遷知制誥翰林學士紹聖初拜尚書左丞中書侍郎徽宗朝進門下侍郎加觀文殿學士告老為佑神觀使卒贈開府儀同三司諡文定成都運司西園亭詩和章質夫雲峯樓重樓起城隂乘髙望西極列峯橫青天飛雪千里積疑是空素山冬夏海中白莫怪頻東向上有思歸客水閣飛閣出方池修曲見空莽低臨化塢近平覺春波長返景澄餘暉夕隂帶浮爽從容觀魚樂不減遊濠上成都文類沈括括字存中錢唐人嘉祐八年進士編校昭文館書籍為館閣校勘熙寧中遷翰林學士龍圖閣待制坐事謫均州團練副使徙秀州復光祿少卿分司南京居潤州有長興集夢溪筆談方輿勝覽沈存中宅在潤州朱方門外存中嘗夢至一處小山花如覆錦喬木覆其上山下有水夢中川樂之後守宣城有道人無外者為言京口山之勝郡人有地求售以錢三十萬得之又六年坐邊議謫官廬于潯陽元祐初道京口登所買地即夢中所遊處遂築室焉名曰夢溪延州詩二郎山下雪紛紛旋卓穹廬學塞人化盡素衣冬未老石煙都似洛陽塵夢溪筆談鄜州延州境內有石油舊說髙奴縣出脂水即此也生于水際沙石土人以雉尾裛之乃采入缶中頗似淳漆燃之如麻但烟甚濃所霑幄幕皆黑豫疑其烟可用試掃其煤以為墨黑光如漆松墨不及也遂大為之其識文為延州石液者是也嘗茶誰把嫩香名雀舌定來北客未曾嘗不知靈草天然異一夜風吹一寸長夢溪筆談茶牙謂之雀舌麥顆言其至嫩也今茶之美者新牙一發便長寸餘其細如針惟牙長者為上品以其質幹土力皆有餘故也北人不識誤為品題如雀舌麥顆極下材耳陳丞相故宅丞相旌旗久不歸虛堂寧止嘆伊威緑槐樓閣山蟬響青草池塘野燕飛夢溪筆談丞相陳秀公治第於潤州極為閎壯池館綿亘數百步完成公已疾甚唯肩輿一登西樓而已潤州甘露寺丞相高齊半草萊舊時風月滿亭臺地從日月生時見天到江山盡處回三國是非春夢斷六朝城闕野花開心隨潮水漫漫去流遍煙村半日來歸計住山人少說山多空只年年憶薜蘿不是自心應不信眼前歸計又蹉跎以上宋文鑑開元樂詞鸛鵲樓頭日暖蓬萊殿裏花香草緑烟迷步輦天高日近龍牀樓上正臨宫外人閒不見仙家寒食輕烟薄霧滿城明月梨花按舞驪山影裏回鑾渭水光中玉笛一天明月翠華滿陌東風殿後春旗蔟仗樓前御隊穿花一片紅雲閙處外人遙認官家侯鯖録裕陵賞愛此詞漢東樓野草黏天雨未休客心自冷不關秋塞西便是猿啼處滿目傷心悔上樓方輿勝覽光化道中遇雨望逺初翻葉隨風已結隂雨篷宜倦枕鄉夢入寒衾莎笠侵鄖俗溪山動越吟烟波千里去誰識魏牟心錦繡萬花谷鞦韆香入熏爐禁火天芙蓉深苑鬬鞦韆身輕幾欲隨風去卻恨恩深不得仙後村千家詩在當塗作豹塘春水緑泱泱謝市烟深柳線長捲幔夕陽留不住好風將雨過橫塘輿地紀勝秀州秋日草滿池塘霜送梅林疏野色近樓臺天圍故越侵雲盡潮上孤城帶月回客夢冷隨風葉斷愁心低逐雁聲來流年又喜經重九可意黃花是處開至元嘉禾志仙都山苔封輦路上青山鶴馭遼天去不還惟有銀河秋月夜鼎湖烟浪到人間仙都山志蘇小小墓古木寒鴉噪夕陽六朝遺恨草茫茫水如香篆船如葉咫尺西樓不見郎嘉興府志補江南曲新秋拂水無行跡夜夜隨潮過江北西風卷雨上半天渡口微吟含曉碧城頭鼓響日腳垂天際籠煙鎖山色高樓索莫臨長陌黃竹一聲無北客時平田苦少人耕惟有蘆花滿江白宋藝圃集遊花山寺經旬飄雨喜新晴病馬衝泥取次行老態只應隨日至春心無意與花爭山川滿目浮烟合樓閣侵天暮靄橫嗟我有身無處用强攜樽酒入崢嶸鎮江府志袁默默無錫人嘉祐八年進士與剛中適甫遊惠山雨過山前翠欲飛水雲髙下正含暉魚跳細浪千花碎蟬倚清隂一嘒微沈李浮瓜吟齒盡清風明月滿船歸超然不負尋幽興拂得荷香在葛衣惠山集蘇唐卿唐卿官寺丞宰費縣善小篆嘉祐中嘗書歐陽文忠公醉翁亭記刻石於費之縣齊記後有倡和詩唐卿既篆歐公侍郎滁州琅琊山醉翁亭記上石訖思莫能致之滁上因斧官之隙地衆材堪梁棟者枝其榱桷構堂於廨舍西偏高三仞植記於中楹若屏然圖悠久也因成長句五十六字兼寄獻歐公侍郎醉翁亭記醉翁堂逺取琅琊即費鄉高世雄文刋翠琰老山孤幹負虹梁左鄰鼇海三神島西倚儒宫數仞牆雖愧篆工非墨寶英辭終與借輝光篆書醉翁亭記石刻襲敦敦鄉貢進士和滁守南遷記醉狂篆刋移近舞雩鄉當年寓興臨山水今日希風構棟梁吏部喪文辭避席陽冰閣筆讓循牆東沂從此遺聲迹迥掩桐廬翰墨光范公希文守桐廬嘗作嚴先生祠堂記邵先生篆以刋石光絶一時篆書醉翁亭記石刻邵忱忱鄉貢進士和歐公頃歲守滁陽題記蒼顔入醉鄉賢宰特將刋古篆舊碑不免棄山梁舊碑乃陳知明所書軒楹别構如安屏筆札難通似面牆異日智仙來輦去退䝉從此謝聲光退䝉乃知明字篆書醉翁亭記石刻史辭辭武昌人和昔日歐公鎮永陽構亭直在水雲鄉醉翁嘯傲曾為記賢宰風流别架梁老筆健遒刋琬琰晴嵐滴瀝照門牆更吟新詠深堂祕相伴崑山片玉光篆書醉翁亭記石刻張頌頌為登州防禦判官和重惜歐公滁記好模刋翠琰費堂新文華起焰衝星斗篆法通靈動鬼神觀妙每多師道客仰高常有慕賢人璨然輝目如辰象不朽宜為萬世人篆書醉翁亭記石刻宋詩紀事卷二十二
