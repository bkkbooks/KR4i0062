body:
  text: 宋詩紀事卷三十四錢塘厲鶚撰任伯雨伯雨字德翁眉山人舉進士元符中除左正言崇寧初以黨論謫儋州移道州遇赦提點明道宫紹興初贈諫議大夫淳熙中諡忠敏宿西軒茅簷不動晚風微獨對爐煙枕半欹唯有多情沙上月依然青瑣照人時焚香有感掃地焚香開竹扉輕煙郁郁間朝暉郤思昔日延和殿對罷曾攜滿袖歸以上前賢小集拾遺獨坐得喪榮枯事悠悠過耳風此身猶是幻何物不為空酒聖心常醉詩窮語更工小軒搔首坐斜日滿窗紅瀛奎律髓句身投魑魅家何在澤被昆蟲罪未除貶昌化和張才叔贈詩梁溪漫志林積積元祐中左中散大夫知福建路題州宅艤閣濟川須用楫罔水戒行舟四海風波路安眠是勝遊淳熙三山志徐大正大正字得之甌寧人元祐中築室北山下名間軒秦少遊為之記蘇子瞻為賦詩人以北山學士呼之題釣臺光武初從血戰回故人長短尚論材中宵若起唐虞興未必先生戀釣臺建寧府志得之嘗赴省試過釣臺賦詩東坡見之遂與定交邢居實居實字惇夫河南原武人恕子早卒有呻吟集合璧事類前集邢惇夫有文早夭東坡云敦夫自為童所與交皆諸公長者百不一見遂與草木共盡山谷云謝師復年未二十文章不類少年語方行萬里出門而車軸折甚矣敦夫似吾師復也且有絶句云詩到隨州更老成江山為助筆縱橫眼看白璧埋黃壤何況人間父子情敦夫父名恕字和叔從伊川先生學元祐初除御史後謫隨州王直方詩話惇夫自少便多憔悴感慨之意其秋懷詩云髙歌感人心心悲將奈何棗陽道中云有意問山神此生復來否已而果卒于漢東雪浪齊日記恕子年十四賦明妃引子瞻見而稱之由是知名病羸早夭王直方編其遺草為呻吟集李伯時畫黃知命騎驢圖為賦長歌長安城頭烏欲棲長安道上行人稀浮雲捲盡暮天碧但有明月流清輝君獨騎驢向何處頭上倒著白接䍦長吟搔首望明月不學山翁醉似泥到得城中燈火鬧小兒拍手攔街笑道旁觀者那得知相逢疑是商山皓龍眠居士畫無比搖毫弄筆長風起酒酣閉目望窮途紙上軒昻無乃似君不學長安遊俠誇年少臂鷹挾彈章臺道君不能提攜長劒取靈武指揮猛士驅貔虎胡為腳踏梁宋塵終日飄飄無定所武陵桃源春欲暮白水青山起煙霧竹杖芒鞋歸去來頭巾好挂三花樹王直方詩話雙井黃知命初自江南來與彭城陳履常俱謁法雲禪師于城南夜歸過龍眠李伯時知命衣白衫騎驢緣道搖頭而歌履常負杖挾囊于後一市大驚以為異人伯時因畫為圖敦夫作長歌云云敦夫時年未二十也寄陳履常十年客京洛衣袂多黃塵所交盡才彥唯子情相親㑹合能幾日歡樂何遽央春風東北來飄我西南翔驪駒巳在門白日行且晚停觴不能飲將去更復返把腕捋髭鬚悲啼類兒女人生非鹿豕安得常羣聚朝别河上梁暮涉關山道匹馬逐飛蓬離恨如春草去去日已逺行行淚橫臆昨日同袍友今朝離鄉客來時城南陌始見梅花白回首漢江頭黃梅巳堪摘杖策登髙城極目迥千里落日下青山但見白雲起逺望豈當歸長歌涕如雨歸心如明月幽夢過潁汝抱䣛長相思故人安可見忽枉數行書倣佛如對面紛紜輦轂下冠蓋爭馳逐吹噓多賢豪肯復念幽獨空齊聽夜雨深竹聞子規此情不可道此心君詎知雨後出城馬上作既雨天氣佳微雲淡如掃欲尋天際鐘騎馬河邊草紫椹飽黃鸝人家夏蠶老田婦踏繅車隔籬語音好嗟我一何愚讀書浪枯槁不及此中人中年客長道秋風三疊寄秦少遊秋風夕起兮白露為霜草木憔悴兮竊獨悲此衆芳明月皎皎兮照空房晝日苦短兮夜未央有美一人兮天一方欲往從之路渺茫登山無車兮涉水無航願言思子兮使我心傷秋風淅淅兮雲冥冥鴟梟晝號兮蟋蟀夜鳴嵗月徂邁兮忽如流星少壯幾時兮老冉冉其相仍展轉反側兮從夜徹明悵獨處此兮誰適為情長歌激烈兮涕泣交零願言思子兮使我心怦秋風浩蕩兮天宇髙羣山逶迤兮溪谷寂寥登髙而望逺兮不自聊駕言適野兮誰與遊遨空原無人兮四顧蕭條猿狖與伍兮麋鹿為曹浮雲千里兮歸路遙願言思子兮使我心勞以上宋文鑑明妃引十四嵗作漢宫有女顔如玉淺畫愁眉逺山緑披香殿裡夜吹笙未央宫中朝理曲絳紗蒙籠雙蠟燭簫鼓聲傳春漏促玉輦三更别院歸夜深月照黃金屋莓苔滿院無行迹總為君王未相識天上天仙骨格别人間畫工畫不得嫣然一笑金輿側玉貌三千斂顔色羅幃繡户掩香風一朝返嫁單于國金鳳羅衣為誰縷長袖弓彎不堪舞一别昭陽舊院花淚灑胭脂作紅雨回頭不見雲間闕黃河半渡新冰滑馬蹄巳踏遼羯塵天邊尚挂長門月黃沙不似長安道薄暮微雲映衰草羌人馬上鳴悲笳緑鬢紅顔為君老西風蕭蕭易水寒啼痕不斷幾䦨干年年看盡南飛鴈一去天涯竟不還少年將軍健如虎日夕撞鐘槌大鼓寶刀生澀旌旗卷漢宫嫁盡嬋娟女寂寞邊城日將暮三尺角弓調白羽安得壯士霍嫖姚縛取呼韓作編户合璧事類前集秋晚目送閒雲盡日愁寒來著破舊貂裘憑誰說與西風道留取黃花點綴秋後村千家詩句微意平生在江海塵冠今日為君彈寄陳後山後山詩注任淵葛敏修敏修字聖功廬陵人從山谷學登元祐進士宰確山元符閒上書願附黨籍南華竹軒不用山僧供帳迎世閒無此竹風清獨拳一手支頤臥偷眼看雲生未生能改齊漫録山谷南遷還至南華竹軒令侍史誦詩板戒勿言姓名久之有一絶云云徐視之曰果吾學子葛敏修也李才甫才甫莆田人江西泊舟後作江水冥冥沙石隂一舸行盡春巳深浪花緣蔓曵錦帶短蘆刺水抽玉簪飢魚未池波面筒小舫正橫溪上風清輝濯盡逺山碧白鳥飛入蒼煙叢山谷外集自注云太和小舫板上塵土中得此詩蘇邁邁字伯逹軾長子官安化令夜坐聯句清風來無邊明月翳復吐坡松聲滿虛空竹影侵半户邁暗枝有驚鵲壞壁鳴飢鼠坡露葉耿髙梧風螢落空廡微涼感團扇古意歌白紵樂哉今夕逰獲此陪杖屨邁傳家詩律細巳自過宗武短詩膝上成聊以感懷祖坡蘇文忠公集句葉隨流水知何處牛帶寒鴉過别村江鄰幾雜志蘇伯達東坡長子豪邁雖不及其父而學問語言亦勝他人子也少年作詩云云先生見之笑曰此村長官詩後東坡貶惠州伯達求潮之安化令以便饋親果卒于官熟顆無風時自脫半腮迎日鬬先紅林檎東坡志林陳復常復常潁州教授紀雪中事掠地衝風敵萬人蔽天密雪幾微塵漫山塞壑疑無地投隙穿帷巧致身映雪讀書今巳老閉門髙臥不緣貧遙知更上湖邊寺一笑潛回萬寶春侯鯖録元祐六年汝隂久雪一日天未明東坡來召議事曰某一夕不寐念潁人之饑欲出百餘石造餅救之老妻謂某曰子昨來陳見傅欽之言簽判在陳賑濟有功何不問其賑濟之法某遂相召余笑謝曰巳修之矣今細民之困不過食與火耳義倉之積榖數千石可以支散以救下民作院有炭數萬稱依原價賣之二事可濟下民坡曰吾事濟矣遂草放積榖賑濟奏檄上臺寺陳聞之有詩蘇過過字叔黨軾季子仕為權通判中山府家潁昌營湖隂水竹數畝名曰小斜川自號斜川居士有斜川集送曇秀詩三年避地少經過十日論詩喜琢磨自欲灰心老南嶽猶能繭足慰東坡來時野寺無魚鼓去後閒門有雀羅從此期師真似月斷雲時復挂星河東坡題跋曇秀來惠州見余余病巳絶不作詩兒子過粗能搜句時有可觀此篇殆咄咄逼老人矣特為書之以滿行槖賦鼠鬚筆太倉失陳紅狹兔得餘腐既興丞相嘆又彂廷尉怒磔肉餧餓貓粉髯雜霜兔插架刀矟健落紙龍蛇騖物理未易知時來即所遇穿墉何卑微託此得佳譽苕溪漁隱叢話雪沈沈五侯居碧瓦映華梲獸炭麒麟紅銀瓶黃封揭春風繞幄帳醉面生綺纈賜宴明光宫玉色迷金闕誰憐蓽門士破壁穿飛屑事文類聚前集金陵上吳開府兩絶句時平無事清吟好衛霍貪功未是竒爭似一篇人膾炙四方傳誦卧龍詩自注開府帥襄陽時嘗遊隆中為諸葛孔明賦詩有翻覆看俱好之句為世稱誦故云廟堂陶鑄人材盡流落江淮老病身又踏槐花隨舉子思量鄧禹是何人式古堂書考劉發發元祐中華亭主簿贈鼓琴文照大師寶琴何所得所得甚幽微聊借絲桐韻還超智慧機霜風悲玉軫江月入珠徽向此諸緣盡人間孰是非普照寺續古録王雍雍文正公旦之姪元祐中通判濠州題三學山五色琉璃白晝寒當年佛腳印栴檀藕絲織出三衣妙貝葉經傳一偈難夜看聖燈紅菡萏曉驚飛石碧琅玕更聞鸚鵡因緣塔八十山僧試說看方輿勝覽在蜀金堂縣東北有佛迹石理堅潤瑩白如玉非世間追琢所能又有神燈寺有碧玉佛龕藕絲袈裟錦字多心經貝葉金字涅槃經寺前檜柏皆隋唐故物又有飛石乃自雲頂山飛來又有鸚鵡塔乃鸚鵡能念佛死遂瘞于塔王雍有詩高茂華茂華字秀實吕居仁稱其人物高逺有出塵之姿入元祐黨籍城東寄王越州五年不出青門道邂逅尋春此一回忽憶秦川貴公子桃花落盡合歸來許彥周詩話句中途留眼占星聚一宿披顔覺霧收和吕居仁詩話紫微周燾燾字次元濂溪先生次子元祐進士為貴池令官至寶文閣待制暑雪軒崇臺窮石照氣味樂偷閒南陸朱明馭西闌白雪山茶甌回舌本麈尾落談間欲綴風煙句彌髙不可攀成都文類逰天竺觀激水拳石耆婆色兩青竹龍驅水轉山鳴夜來不見跳珠碎疑是簷間滴雨聲咸淳臨安志王灃暑雪軒望處疑蓬島天長碧海閒雲霞收玉宇煙浪湧銀山茶入清談裏風生兩腋間詩成似西嶺高嶮不容攀成都文類田望暑雪軒聖福軒重敞偶來心地閒因談丁士冢知是武擔山人在冰壺裏天垂玉壘間賡歌白雪句巴客强追攀成都文類孫俟暑雪軒地僻宜逃暑官卑幸頗閒虛傳力士擔始信蜀妃山嶺雪青霄畔城煙密樹間清談容款接妙句獨難攀成都文類周沔沔元祐中溧水丞句螢火不知人巳去夜深猶傍竹窗明題無想寺韓熙載讀書臺景定建康志米芾芾字元章吳人一云襄陽人以母侍宣仁后藩邸恩補校書郎太常博士出知無為軍踰年召為書畫博士擢禮部員外郎大觀二年罷知淮陽軍有寶晉英光集吳江垂虹亭作斷雲一片洞庭帆玉破鱸魚金破柑好作新詩寄桑苧垂虹秋色滿東南除書學博士初朝謁呈時宰半生湖海看青山慣佩笭箵攬轡艱曉起初馳朱雀路霜華慙綴紫宸班百寮卑處瞻丹陛五色光中望玉顔浪說書名落人世非公那解徹天關甘露作呈夷曠欲雨氣不透庭梧有栖煙回首望北固雲藏淨名天呼童速具輿憑高覽山川隱見豈不好開霽景固全須臾剛風流湛湛清露圓歸途知有伴華月上丹淵甘露寺并序甘露寺壁有張僧繇四菩薩吳道子行腳僧元符末一旦為火所焚六朝遺物掃地李衛公祠手植檜亦焚蕩寺故重重金碧參差多景樓背山面江為天下甲觀五城十二樓不過也今所存唯衛公鐵塔米老庵三間作詩悼之云色改重重構春歸户户嵐槎浮龍委骨畫失獸遺耽神護衛公塔天留米老庵柏梁終厭勝㑹副越人談以上寶晉英光集楊誠齊詩話潤州大火惟存李衛公塔米元章庵元章喜題云云有輕薄子于塔庵二字上添注爺娘二字元章見之大罵蓋元章母嘗乳哺宫中故云題嗣濮王畫蘆鴈王名宗漢字獻甫安懿王幼子偃蹇汀眠鴈蕭梢風觸蘆京塵方滿眼速為喚花奴野趣分弱水風花翦鑑湖塵中不作惡為有鄴公圖畫繼答劉巨濟劉郎收畫早甚卑折枝花草首徐熙十年之後始聞道取吾韓戴為神竒邇來白首進道奧學者信有髓與皮始知十襲但遮壁牛馬便可裹弊帷峩峩太平老寺主白紗帽首無冠蕤武士後立肅大劒宫女傍侍顰修眉神清眸子知寡