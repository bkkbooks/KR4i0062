為亭萬樹山風裏鐘聲下界聽次韵玉巖應詔天書逺下事徴求鄉里同推馬少遊世事巳非三不可年華卻是一宜休豈緣薄祿貽身纍只為當時分主憂笻杖芒鞋留我伴佇聞談笑即封侯擲餌求魚計亦難長鯨搖曵海波寬狂風有待三秋起健翮須教萬里摶直以逸民朝聖主不隨計吏上春官庖刀休用援尸祝巾笥寧封貢禹冠憶玉巖阿閣曽看紫鳯棲暮年江國擁旌麾孤雲南北夲無定浮世悲歡那可期鶴頂丹砂埋藥竈鴨頭緑水浸春陂待公踏遍紅塵地景物歸來似舊時秋風燕雀正關關忽見籬邊菊又斑寒雁自知霜露重海鷗長伴水雲閒百年往事丹心裏千古聲名直道間此意屬公須慷慨晚雲成雨便歸山瀲水志林宋史藝文志李朴集二十卷逸不傳今輯得詩數首乞巧處處香筵拂綺羅為傳神女渡天河休嫌天上佳期少已恨人閒巧態多齚舌自應工嫵媚方心誰更苦鐫磨見孫樵栁子厚乞巧文獨收至拙為吾事笑指雙針一縷過瀛奎律髓江公望公望字民表睦州人舉進士建中靖國初由太常博士拜左司諌以直龍圖閣出知夀州入黨籍編管南安軍赦還卒建炎中贈右諫議大夫句春光吳地減山色上林深題艮嶽劉後村跋云江公題艮嶽句比之鄧肅花石綱詩彼刻露而此含蓄矣趙暘暘字乂若其先本杭人徙鄭州及汴中紹聖元年進士纍官直龍圖閣提舉江州太平觀過江寓信州玉山家焉題劉資仁韓幹飲馬圖韓幹所畫天間圖縣官日給三品芻不嘶不鳴肥如鳧時時步作康莊衢飲之曲江戲短蕪沙軟風輕樂于于豈知渥窪真龍駒垂頭戢耳困鹽車圉人太僕反歋􅟧瘦骨硉矹甘為奴不須驤首顧長途局促騎足何時無聲畫集奉和姚仲美臘梅陽和都未見芳菲初喜寒苞發故枝絶色敻無朱粉態真香寧許燕鶯知凝愁金谷登樓日斂黛溫泉賜浴時寫作新聲傳玉笛誰人持向月中吹瀛奎律髓徐迪迪繁昌人紹聖元年進士北園和邑宰蔡確韻簷影䕃遊魚江聲顫崖竹雲帆天外去龍剎空中矗霞明晚渡紅草暖晴沙緑澄波見歸鳥紛靄迷飛鶩有時雪浪吹玉馬爭追逐青霄皓月滿琉璃瑩顛目謝傅昔出宰天葩動驚俗一讀梁閒詩清風感佳木太平府志范沖沖字元長祖禹長子紹聖元年進士建炎中官翰林學士守衢州坐與趙鼎有連落職贈了空長老幾回飛錫入紅塵一任隨緣自在身琢句不妨明日用援琴誰與聽陽春揚眉瞬目如相委捧腹狂歌即是真湯餅藜羮奉朝夕自憐擔板小乘人衢州府志遊爛柯山青霞洞天石梁傑出望南洲登覽從公破旅愁棊罷未應消一日人歸無奈巳千秋塵纓自喜臨流濯車轄仍逢好事投莫怪神仙近如許當年此地絶深幽爛柯山洞志吕頤浩頤浩字元直其先樂陵人徙齊州紹聖元年進士髙宗朝拜少保尚書左僕射同中書門下平章事罷為鎮南軍節度使提舉洞霄宫卒贈太師封秦國公諡忠穆次韻張全真參政退老堂東郊卜築傍溪流菡萏香中繫小舟脫去簮紳歸畎畝悟來漁釣勝公侯青雲舊好何妨厚白雪新詩為寵留又指湘潭問行路一堂風月阻同逰瀛奎律髓陳暘暘字晉之福州人紹聖元年舉賢良方正能直言極諫科徽宗朝除太常丞歷禮部侍郎顯謨閣待制提舉洞霄宫有樂書二十卷建中靖國初進禮書陳祥道用之其兄也缺題行義當年帝所聞聲名久矣動簮紳文場秉筆淵源厚師席談經業履醇白髮忽驚蒿里暮青山難問若溪春兩京模範垂芳逺多少生徒淚滿巾式古堂書考吳幵幵字正仲滁州人紹聖丁丑中宏詞科靖康中官翰林承㫖使金被留仕僞楚建炎後安置永州移韶州有優古堂詩話靖康傳信録金人欲廢趙氏立張邦昌令吳幵莫儔傳道意㫖往返數四京師人謂之捷疾鬼擬梅軒五月霏霏雨不開若邪溪畔摘楞梅朱丸忽向靈窗見疑是雲根越嶺來誰家蜜漬借微酸小摘曾聞飣玉盤爭似江南風致在瓶紅初向緑隂看能改齊漫録京師中太一宫道士房有楮結子如楊梅徽宗車駕臨幸觀之名曰擬梅軒越中楊梅最佳土人謂之楞梅又北人以梅汁漬楮益以蜜名假楊梅故正仲及之葛勝仲勝仲字魯卿丹陽人書思子紹聖四年進士元符庚辰中宏詞科纍遷國子司業終華文閣待制知湖州卒諡文康有丹陽集題觀音院德雲堂弱水無風到海山慈容親禮紫栴檀亭亭寶剎淩雲近湛湛清池潄玉寒橘瘦暗飄紅萬顆竹迷曾蒔緑千竿藕花不是南朝夢真有殘香透畫闌吳郡志妙行堂妙行堂前聳碧鮮壺中軒外疊㠝岏山門靜對青霄潤佛殿寬圍碧玉寒躡屐喜隨談理客饋漿驚見字民官開山老侃存遺像試問何如釋道安武康縣志蔣璿璿明州人紹聖四年進士和潘良貴題明州三江亭韻安仁不放二毛侵爽氣淩虛玉萬尋談笑薄施三昧手登臨誰㑹五湖心倦逰方戢沖天翼高賦難賡擲地金怪得朝雲飛畫棟夜來曾聽老龍吟延祐四明志胡直孺直孺字少汲奉新人紹聖四年進士靖康閒知南京為金所執不屈久之得歸髙宗朝擢龍圖閣直學士知隆興府進兵部尚書有西山老人集孫仲益序云公少工詩語出驚人魯直一見擊節歎賞他文稱是筆力雄贍如行雲流水自然成文同官倡和用山字韻章句飄飄續小山古風蕭瑟筆追還海鵬共擊三千里鐵馬同歸十二間功業㑹看鐘鼎上聲華已在縉紳閒他年記憶憐衰老為報西川引一班桐江詩話少汲宣和閒在河朔作漕日同官陳亨伯輩倡和山字韻詩少汲最後成人皆歎服苕溪漁隱曰元豐閒王平甫有海鵬未舉三千里天馬須歸十二間之句甚為一時所稱道鶚按此詩當屬少汲送春冷酸梅子漸生仁鶯老花飛跡巳陳一夜南風搖斗柄明朝煙柳不關春能改齊漫録春日風雲吹絮栁飛花睡起鉤簾日半斜四海隨人雙燕子相逢處處作生涯墨莊漫録贈劉邦直夢魂南北昧平生邂逅相逢意巳傾楚國山川千疊逺隋堤煙雨一帆輕我無健筆翻三峽君有長才肅五兵同是行人更分手不堪風樹作離聲詩人玉屑山谷云少汲後生中豪士也讀書作文殊不塵埃使之不倦雖競爽者未易追也同是行人更分手佳句也邂逅相逢意巳傾巳道了劉三十一矣胡安國安國字康侯建寧崇安人入太學以伊川友朱長文及潁川靳裁之為師紹聖四年舉進士第三高宗朝歷官寶文閣直學士卒詔贈四官諡文定有武夷集舟入荆江東赴建康長沙渺渺接天浮萬古朝宗日夜流洲在尚傳鸚鵡賦臺高應見鳳凰逰路經赤壁懷公瑾水到柴桑憶仲謀白日幸無雲物蔽好看澄㬌對高秋濂洛風雅嚴陵釣臺歸隱桐江知幾春靜看浮世一鷗輕此心在世原無著誤說持竿是釣名釣臺集題崔白喧晴圖黑頭禽笑白頭禽頭白初因計慮深棲向栁條尤不穩從風斜折更關心式古堂畫考翁彥國彥國字端朝彥約弟紹聖四年進士纍官至御史中丞靖康之難為江淮荆浙制置轉運使充經制使領兵入援貽書切責張邦昌高宗即位兼江南東西路經制使卒贈少保西巖寺澗行詰曲似乘槎流水飄裾亂曉霞紫翠堆中蕭寺隱隔溪煙樹兩三家翰墨大全周仲仁偶題雪竇和尚親書偈卷道人詩句從梁得老筆崢嶸自一家誰㑹林閒相見事莫都錯看亂飄花紹聖四年志雅堂雜抄葛次仲次仲字亞卿江隂人勝仲之兄兄弟皆為大司成有集句詩三卷崑山慧聚寺集句全吳臨巨溟皮日休青山天一隅李頎靜境林麓好陸龜䝉勝槩凌方壺李白泓泓野泉潔韋應物曖曖烟谷虛韋應物攀雲造禪扄韋應物躋險築幽居謝靈運道人刺猛虎李白復來剃榛蕪杜甫咄嗟檀施開杜甫以有此屋廬韓愈側疊萬古石李白功就豈斯須賈島磊砢成廣殿陸龜䝉鬼工不可圖皮日休有窮者孟郊韓愈過此亦躊躇孟郊賦詩留巖屏李白詞律響瓊琚錢起我訪岑寂境陸龜䝉幸與髙士俱韋應物時升翠微上李白涼閣對紅蕖韋應物岸幘偃東齊韋應物果藥雜紛敷韋應物上方風景清白居易華敞綽有餘白居易高窗瞰逺郊韋應物萬壑明晴初齊巳賞愛未能去韋應物頳霞照桑榆宋孝武老僧道機熟柳宗元閒持貝葉書栁宗元秉心識本源杜甫高談出有無李白茗酌待幽客李白頓令煩抱舒韋應物儒道雖異門孟浩然意合不為殊李白抖擻垢穢衣白居易惟有牟尼珠杜甫餘生願休止賈島投䇿謝歸塗錢起崑山雜詠宋詩紀事卷三十四
