body:
  text: 宋詩紀事巻二十七錢塘厲鶚撰郭祥正祥正字功父當塗人舉進士元豐中知端州元祐初階至朝請大夫請老歸家于青山下有青山集文獻通考張浮休評郭祥正詩如大排筵席二十四味終日揖讓而適口者少竹坡詩話賀方囘嘗作青玉案詞有梅子黄時雨之句人皆服其工士大夫謂之賀梅子郭功父有示耿天隲一詩王荆公嘗爲之書其尾云廟前古木藏訓狐豪氣英風亦何有方囘晩倅姑孰與功父游甚歡方囘寡髮功父指其髻謂曰此眞賀梅子也方囘乃将其鬚曰君可謂郭訓狐功父髯而鬍故有此語一聯云謝家莊上遯齋閑覽功父曾題人山居無多景只有黄鸝三兩聲荆公命工繪爲圖自題其上云此是功父題山居詩處即遣人以金酒鍾幷圖遺之明皇十眉圖明皇逸事傳十眉正是唐家零落時霓裳曲調雖依舊阿蠻終不似楊妃畫工貌得非無意欲使流傳警來世翠翹紅粉尚爭春隱約香風起仙袂六龍眞馭竟何之泰陵荒草長狐狸猶將妙筆勸尊酒醉覺人間萬事非金山行金山杳在滄溟中雪崖冰柱浮仙宫乾坤扶持自今古日月彷彿懸西東我泛靈槎出塵世搜索異境窺神功一朝登臨重歎息四時想像何其雄巻簾夜閣挂北斗大鯨駕浪吹長空舟摧岸斷豈足數往往霹靂搥蛟龍寒蟾八月蕩瑶海秋光上下磨青銅鳥飛不盡暮天碧漁歌忽斷蘆花風王直方云二語大爲荆公所賞蓬萊久聞未曾往壯觀絕致遥應同潮生潮落夜還曉物與數會誰能窮百年形影浪自苦便欲此地安微躬白雲南來入長望又起歸興隨征鴻苕溪漁隱叢話功甫金山行造語豪壯鳳凰臺次李太白韻高臺不見鳳凰游浩浩長江入海流舞罷青蛾同去國戰殘白骨尚盈丘風揺落日催行櫂湖擁新沙換故洲結綺臨春無處覓年年荒草向人愁娛書堂詩話郭功甫嘗與王荆公登金陵鳯凰臺追次李太白韻援筆立成一座盡傾訪隱者一徑沿崖踏蒼壁半塢寒雲抱泉石山翁酒熟不出門殘花滿地無人跡以上青山集寄東坡先生自朱崖量移合浦君恩浩蕩似陽春海外移來住海濵莫向沙邊弄明月夜深無數採珠人困學紀聞東坡文章好譏刺文與可戒以詩云北客若來休問事西湖雖好莫吟詩晩年郭功父寄詩云云李公麟公麟字伯時舒城人第進士厯泗州錄事參軍用陸佃薦爲中書門下後省刪定官御史檢法元符三年病痺致仕歸老龍眠山蔡寛夫詩史韓幹畫馬多分其騣爲三莫曉何意唯白樂天春深學士家詩云鳳書裁五色馬鬛翦三花唐學士例借飛龍廏馬則應是時國馬皆如此也李伯時喜學韓幹畫每不知三騣之意常難於下筆有得樂天詩者先爲誦之而不言所出伯時請之力乃使爲畫數馬始以集示之云次韻鄧謹思初入試院敕使書囊問隊行聚星深館粲諸英雲隨襟袖來蓬㠀香散房櫳宿化城振鷺充庭天有幕珊瑚入網海無聲範模一世尊先覺況此提平慰後生同文館倡和詩小詩幷畫巻奉送汾叟同年機宜奉議赴熙河幕府畫出離筵已愴神那堪眞别渭城春渭城栁色休相惱西出陽關有故人聲畫集春社出郊千尋古櫟笑聲中此日春風屬社公開眼已憐花壓㡌放懷聊喜酒治聾攜刀割肉餘風在卜瓦傳神俚俗同聞説已栽桃李徑隔溪遥認淺深紅事文類聚前集吕希純希純字子進公著次子登第爲太常博士哲宗朝厯寶文閣侍制知亳州謫道州安置後入黨籍絕句夢寢西山結草廬逝將臨水詠游魚何人見卵求時夜更著閒言問藐姑紫微詩話崇寧間談命術者多言叔祖待制與曾内翰子開皆宰相命也或有占紫姑者代書村童書於紙云待曾吕相方發然皆不驗叔祖有詩云云元夕何處元宵好迎鑾冊府西鞘聲雲外起扇影日邊低祕禁威容肅名流步武齊舜瞳囘左顧眞欲過金閨何處元宵好雙林宴坐僧戒圓三五夜心耀百千燈茅舍門常掩繩牀几謾憑世間娛樂事一念不曾興瀛奎律髓林迥迥羅源人熙寧中惠安簿同黄祕敎遊連江玉泉泉山好景微權尹訟庭稀曉馬破雲去夜船乘月歸妓歌珠不斷人醉玉相依薄宦自拘者咄哉多是非青瑣高議題林子默隱居先生平昔命何非萬巻詩書一布衣囘首長安成底事吳山蒼翠幾時歸泉州府志俞充充熙寧中虞鄕令王官谷十詠存四貽溪表聖山居記云谷之名本以王官廢壘在其側司空氏易之爲貽溪溪舊不蓄魚及表聖居之石竇泉隙魚皆充牣見於説魚篇今亦無魚濯纓溪流上清心共澄澈人存魚自躍人亡魚亦竭此意雖冥冥可與仁者説遺音竟誰繼十里閒風月休休亭本濯纓亭爲俠軍所焚復構之易名休休洗耳謝市朝構亭得餘址三徑草長深一毫塵不起支肘看青山引鶴聽流水獨有愛君心時時擬綸旨司空氏舊居王官谷舊皆司空氏别業自表聖沒轉易不常孤鶴去不還雲間犬空吠猶聞溪鳥衙表聖詩云溪鳥待排衙尚有里人愛表聖多以金帛施於閭里巖花無開落表聖云小峯西翕有石蘚故老目爲杏花世事幾興廢我乘幽興來靜邀秋月對石硯表聖云西谷路有石如硯人謂之秦王硯嘗讀表聖詩云是秦王成憫時著密史表聖所著密史深救時病對此潛經營新雨淨如洗亂苔生復平表聖詩云硯石苔平失應誤山中客浪近翰墨名王官谷集仇伯玉訪王官谷休休亭飄香山徑踏殘花來訪仙鄕隱處家當日廟堂延至計未應懷璧老煙霞山鵶營巢欲哺兒晴杏拆早先離披盤囘一徑穿碧篠谷口數家耕水湄王官谷集王翰司空侍郎故居西風策馬問王官松徑縈紆上百盤泉響夜潭穿石竇峯高天柱矗雲端一鳴共許才華舊三詔方知節操寒花落鳥啼人不見休休亭上倚闌干王官谷集陳易易莆田人熙寧中隱居石門時號陳聘君荅有需禪師年來多病愛棲禪寶鑑慵將照醜妍卻憶南湖孤頂月定囘金磬落巖前興化府志楊時時字中立將樂人熙寧九年進士游二程之門厯知瀏陽餘杭蕭山三縣召爲祕書郎欽宗朝兼國子祭酒高宗朝除工部侍郎兼侍讀以龍圖閣直學士提舉洞霄宫卒諡文靖學者稱龜山先生有集望湖樓斜日侵簾上玉鉤簷花飛動錦紋浮湖光寫出千峯秀天影融成十里秋翠鷸翻風窺淺水片雲隨意入滄洲畱連更待東窗月注目晴空獨倚樓觀梅贈胡康矦欲驅殘臘變春風惟有寒梅作選鋒莫把疎英輕鬭雪好藏清豔月明中藏春峽爲隱士呉儀作山銜幽徑碧如環一壑風煙自往還不是武陵流水出殘紅那得到人間含雲寺書事蜨夢輕揚一室空夢囘誰識此身同窗前月冷松隂碎一枕溪聲半夜風以上龜山集求仲弓仲弓字德夫黃巖人熙寧九年特科與王荆公爲文字交仕終樂平令靈龜潭江湖雖濶多罾網幽澗清虚且勉旃待我功成買雙鶴歸來伴汝一千年赤城志陳覺民覺民字達野仙遊人熙寧九年進士元祐間知建陽縣累遷宗正丞厯知漳建二州移知福州言者承安惇意劾罷尋起知泉州遷本路提刑復以右文殿修撰知廣州卒武夷山昇眞洞口接天門靈草丹桃日日春聽説列仙來瑞世三朝德業在斯民方輿勝覽章聖出自武夷事見楊大年家集神考哲廟亦武夷眞君應出故有三朝德業之句事見氏族編寄米元章汩汩塵埃閱歲華青山相見認空花清淮風月元無價憑仗詩翁爲我賒長淮千古自流東六月城頭日日風天際玉潢無少處夜山圍在月明中珊瑚網姚孳孳字舜徒慈谿人熙寧九年進士累除提舉成都府常平事後以直龍圖閣知䕫州事卒碧波亭在簡州東溪賴簡池臺兩蜀誇東溪别是一仙家令人郤憶康王谷坐看珠簾濺雨花錦繡萬花谷李格非格非字文叔濟南人舉進士元祐末爲國子博士紹聖初爲禮部郎提點京東刑獄以黨籍罷長女能詩嫁趙明誠即易安也有集過臨淄擊鼓吹竽七百年臨淄城闕尚依然如今只有耕耘者曾得當時九府錢後村詩話文叔詩文高雅條暢有義味在晁秦之上賀幸太學日月天囘十二章詔移清蹕幸膠庠六龍穩轉橋門曲多士横穿錦仗行俎豆威儀瞻闕里東西風敎自周王太平誰謂初無象四海形容在一堂汴京遺蹟志葉濤濤字致遠處州龍泉人熙寧進士仕至中書舍人龍圖閣待制入元祐黨籍望舊廬有感重來舊屋誰爲主江令蕭條歎獨存已媿問人纔識路郤悲無栁可知門舟車到處成家宅歲月惟驚長子孫孤客濫巾非得已故交零落與誰論江令尋宅詩云見桐猶識井看栁尚知門宋文鑑張介介字吉甫番陽人句應是子規啼不到致令我父未歸家能改齋漫録番陽張吉甫方娠時父去客東西川不還張君自爲兒時已愴然有感其言語食息未嘗不在蜀也與尚書彭公器資同學作詩云云聞者皆憐之既長走蜀父初無還意乃歸省母復至涪閬往迓者三其父遂行以熙寧十年三月至自蜀鄕人迎謁太息或爲感泣一時名士賦詩以紀其事錢景諶景諶景臻從兄舉進士居毗陵熙寧末從張景憲辟知瀛州至朝請郎洞霄宫清夜宿瑶宫雲開天柱峯千巖空洞月萬籟古壇松仙馭聞鳴鶴琅輿想六龍朝元步虛罷祥吹引林中洞霄詩集杜默默字師雄濮州人熙寧末特奏名仕新淦尉王直方詩話石守道作三豪詩謂曼卿豪於詩永叔豪於文杜默豪於歌故詩云師雄二十二筆距猛如鷹玉川月蝕句氣欲相憑陵而歐公亦有詩云南山有鳴鳳其音和且清鳴於有道國出則天下平杜默東土秀能吟鳳凰聲作詩幾百篇長歌仍短行謂豪於歌者有送守道詩云聖人門前大蟲學海波中老龍及推倒楊朱墨翟扶起仲尼周公之句句一片靈臺挂明月萬丈詞焰飛長虹乞取一勺鳳沼水活取久旱泥蟠龍上歐陽青瑣高議倚風莫恨唐工部後裔寧知不解詩東平郡宴賦海棠蔡寛夫詩史蟾輝吐光育萬種我公得此爲心胸老桂根株撼不折我公得此爲清節孤輪碾空週復圓我公得此爲機權餘光燭物施洪惠我公得此爲經濟隱居詩話李文定廸八月十五日生杜默作中秋月詩以獻其中有句云云雖造語粗淺然亦豪爽也寥正一正一字明畧號竹林居士安陸人元豐二年進士元祐中召試館職除祕書省正字出知常州紹聖間入黨籍貶監玉山稅有竹林集郡齋讀書志廖明畧元祐中召試館職蘇子瞻在翰林見其所對䇿大奇之俄除正字時黄秦晁張皆子瞻門下士號四學士子瞻待之厚每來必命侍妾朝雲取密雲龍家人以此知之一日子瞻又取密雲龍家人謂是四學士窺之乃明畧來謝也汝墳驛題壁阿憐二十頗有餘秀眉豐頰冰瓊膚無端欲作商人婦更枉方尋海畔夫阿梅笄歲得同歡懊惱情深解夢蘭鶯語輕清花裏活栁條弱嫩掌中看墨莊漫録明畧與唐州二營妓往來情好甚篤其一小字憐憐其一名梅時憐憐爲大賈所納明畧道過汝墳有感作詩方尋海畔夫用海上有逐臭之夫事譏之也答張十八畫玉人風味夙相親骨法多奇巫峽神何幸丹青煩右相坐令虛室四時春聲畫集和補之梅花蕙蘭芳草久暌離偶洩春光此一枝自許輕盈羞粉白何人閒麗得鄰窺寒欺薄酒魂消夜月入重簾夢破時幸有暗香襟袖暖江南歸信不應遲梅花鼓吹蔡肈肈字天啟丹陽人元豐二年進士徽宗朝厯官戸部郎兼修國史中書舍人以顯謨閣待制知明州奪職提舉洞霄宫會赦復知睦州卒有丹陽集王直方詩話夏畸道言蔡天啟初見荆公坐間偶言及盧仝月蝕詩人鮮有誦得者天啟誦之終篇遂爲荆公所知鍾山有馬甚惡蹄齧不可石林詩話王荆公在近一日兩校牽至庭下告公請鬻之天啟時在坐曰安有不可調之馬第久不騎驕耳即起捉其騣一躍而上不用銜勒馳數十里而還公大壯之即作集句詩贈之蔡子勇成癖能騎生馬駒復有生著青衫騎惡馬日行百里尚嫌遲心原落落堪爲將卻是君王未備知士大夫自是盛傳荆公以將材許之云敬用无咎學士年兄長韻上呈子方太僕兩河郡縣淪西方西人思漢今未忘果園蕪沒白草芳靈州乃赫連勃勃果園旃裘戲馬誰家郎車箱峽口澗谷長旄頭倒挂囘穹蒼王師西出討橘狂六花蔟壘來堂堂前鋒鋭頭臂兩槍伏姦謹索收生羌天聲隱轔搖姑臧竒兵繚臂斷饋糧決河有聲如壞岡城頭擊鐘聲殷牀萬甲幾欲漂無旁雖有伉健誰騰驤一夫不敢陵彼隍馬首欲東促歸裝緘胸有策鬚眉揚歸來恍恍若有亡劬勞累日何由償戰鞍挂屋尋書囊目隨飛鴻思帝鄕彭城老將官横行幕中市駿收驌驦射堂兩部奏清商應弦破鏑如蜂房劉渭州射爲天下第一笑談斥土羈名王畫圖遣奏朝明光詔書畱典眞乘黃錦韉玉勒春風香平池老栁高雲涼神駿在目豪吟觴跨下􅉜蹀驚鳧翔皇居九衢天中央我時項背聊相望西城九月天隕霜夜談關塞評文章微言竊比惠與莊和詩禿筆覺我忙祝君韜養壽且祥功名有來成堵牆勿驚寒暑敗肉漿韔弓箙矢用則張同文館倡和詩題畫授李伯時鴻雁歸時水拍天平崗老木尚寒煙付君餘地安漁艇乞我寒江聽雨眠汎舟橫塘遇雨平野風煙入夢思殷勤作畫更題詩扁舟臥聽橫塘雨恰遇江南歸雁時墨莊漫録天啟乆官京師日有藪澤之思常于尺素作平岡老木極有清思因授李伯時令于餘地加遠水歸雁扁舟以載天啟題詩云云伯時嬾不能竟他日王漁之取去以示宗子令戩即取筆㸃染如詩中意天啟見之愛其佳後天啟汎舟宿横塘遇雨閉篷而臥夜分不寢聞歸雁聲因復爲詩云云從孫元忠乞貓廚廩空虛䑕亦飢終宵䶧齧近秋帷腐儒生計唯黃巻乞取銜蟬與䕶持墨莊漫録送錢齊玥倅蘇州二首一尉東南屈指中雍容車騎舊兒童郎君扇枕家中晩侍史焚香省戸空十里浮梁晴臥蝀一江春水淨磨銅三年官滿東呉去爲具扁舟破浪風洞庭飛雨打湘弦燕寢凝香思𣺌然四者難幷知我老七言俱賦爲君妍雜花遶徑迎籃轝春鳥喧洲起畫船聞道山公方啟事重看一鶚在秋天除夜宿垂虹亭東南勝境未忘情老去扁舟復此行小邑歲除無市井下田水落見農耕雪消西嶺層棱出春到重湖鱗甲生橋下霜蛟貪睡美爲槌千鼓作雷聲以上呉郡志題李世南畫扇野水潺潺平落澗秋風瑟瑟細吹林逢人抱甕知村近隔屋聞鐘覺寺深宋文鑑再至學省平生擾擾復膠膠學省重來歲又交騎馬醉遭官長罵讀書慚被學生嘲何爲眷戀五斗米便可經營一把茅好買江干千箇竹待看煙雨長春梢合璧事類後集過邢惇夫墓下作人物于今歎渺然孤墳宿草已生煙日暮行人道傍歇應逢年少共談𤣥詩人玉屑申王畫馬圖天寶諸王愛名馬千金爭致華軒下當時不獨玉花驄飛電流雲絶瀟灑兩坊岐薛寧與申憑陵内廏多清新肉騣汗血盡龍種紫袍玉帶眞天人驪山射獵包原隰御前急召穿圍入揚鞭一蹙破霜蹄萬騎如風不能及雁飛走驚弦開翠華按轡從天囘五家錦繡徧山谷百里舄珥遺塵埃青騾蜀棧西超忽高隼濃娥散荆棘苜蓿連天鳥自飛五陵佳氣春蕭瑟苕溪漁隱叢話東坡集有申王畫馬圖詩乃蔡天啟作氣格有類東坡世因悞收入其後姑蘇居世英家刊東坡前後集遂刪去題李伯時照夜白馬圖天上房星不下來連山芻粟飽駑駘龍姿逸駕飛騰盡賴爾毫端力挽囘苕溪漁隱叢話題朱之純谷陽園陸機異時宅故物無復迹悠悠谷水陽野水凄餘碧我觀豪士賦文字豈不白一爲功名誤末路眞可惜至今風雨夜哀鶴鳴不息千秋得吾人淨眼照阡陌結茅風煙際一悟世網窄古今一丘貉貴賤百年客閉門橙橘香隱几冰凍釋我慙升斗禄矯首望八極人生勞佚間此殆天所檄鵬翔赤霄動鯨噴碧海坼爲爾具扁舟送此齒髪迫至元嘉禾志送洞元法師歸茅山絳節飄飄下紫清更參隱訣制頽齡若逢方丈龎眉叟來受囊中赤甲經一菴疇昔共嶔崟古木垂隂歲月深恐是三生房次律要隨藤杖去重尋題三茅風雨圖筆間雲氣生毫末紙上松聲聽有無收得三茅風雨樣高堂六月是冰壺以上茅山志立春至焦山歲爲兹山一再登籃輿乗興驀溝塍春生江海交流處人在藤蘿最上層畫鷁搶沙眠百賈華鯨吼旦集千僧道人邀上東巖宿坐看冰輪半夜升京口三山志岊山龍池在宜興有秃角白龍穴其中將雨則見南山鼕鼕天作鼓號召諸龍盡行雨惟有禿角最先到潑墨雲中雪鱗舞名勝志冬日遊甘露寺漕河膠舟水流咽水關著鍵行者歇大江伏槎臥長劒萬頃溼銀寒不結蓬萊諸仙亦避寒海門冥冥凍欲折朔風吹晩雁叫空蓬巻松杉崖石裂道人丈室最高處地爐蒲團穩坐熱我來乗閒不問道方牀相對無言説鎮江府志句城響濤頭入山昏雨腳斜栁間黃鳥路波底白鷗天斷篷帆影天斜入夾鏡波光水倒流松江日雪浪齋記疊嶂巧分丁字水臘梅遲見二年花唐溪詩話天啟紹聖元符間爲中書舍人嘗與元祐諸公遊遂遭斥逐嘗守睦州到任謝表有曰城譙閴寂一葉落而知秋㠀嶼縈迴二水合而成字復有語云云人謂能狀桐廬郡景物鶚按此二句有全詩見唐杜牧之集未知孰是華鎮鎮字安仁會稽人元豐二年進士官至朝奉大夫嘗作會稽覽古詩子初平亦登進士爲太常博士有越中考古録會稽覽古詩鐵門限王中令裔孫智永善隷草爲世所重求者弗違戸外之人如市所居限頻爲之毁以鐵固之時號鐵門限眞草千字文十九年成一千通栁誠懸稱其書得家法世傳右軍蘭亭眞蹟弟子辨才尢加寶祕貞觀中求之不得至使蕭翼設奇而取之山中父老尚能道其事鐵限僧坊迹未移千通眞草了無遺蘭亭墨蹟何由見秖説蕭郎奉使時秦望山秦始皇東巡登高厯覽刻石紀功故曰秦望秦人兩世盡東游輦輅曾臨到上頭睫在眼前終不見不知登望竟何求樵風涇鄭巨君𢎞采薪若耶山中得仙人遺箭歸之而獲便風之報千載之下朝暮不渝碧山重疊水溶溶南北朝來旦暮風巖壑會稽眞勝絕樵蘇猶是漢三公城山其山中卑四高宛如城堞呉伐越次查浦句踐保此拒呉又名越王城有佛眼泉洗馬池泉中産嘉魚越拒吳時呉意越之乏水以鹽魚爲饋越取雙魚答之遂解圍去兵家制勝舊多門贈答雍容亦解紛緩報一雙文錦鯉坐歸十萬水犀軍雙筍石在上虞縣釣臺山高百餘丈若人冕而對峙者其巔有異花每杜鵑啼時開若霞錦神宗崩三年不榮高宗崩花忽變白孝宗崩三年若枯既而復茂千尺相高卓翠珉雨餘雲外露嶙峋鼎湖龍去蒼髯斷三載叢花不記春放馬澗在新昌縣支道林放馬之所或譏道人養馬不韻荅曰貧道賞其神駿春草茸茸澗水清路人猶記昔時名金羈縱後雙蹄逸想見風前蹀􅉜聲虞國墅在餘姚羅壁山襟帶溪山大勢具體金谷郗太宰徧遊諸境棲情於此每至良辰攜子遊憩後以司空臨郡遂卜居之山列翠屛圍碧落水流鳴管繞平田郗家池館蘿蕪沒金谷形容自𣺌一作宛然燕竹越人以其燕來時出筍因以爲名竹箭黄芽欲老時杏梁日暖燕初歸他林未聳千竿翠此地先抽一握肥孟橋橋南漢孟嘗宅也溪上還珠太守家小橋斜跨碧流沙清風不共門牆改長與寒泉起浪花以上會稽志傅崧卿云詞格清麗興寄深遠足以垂觀來者陳瓘瓘字瑩中號了翁沙縣人偁子元豐二年進士徽宗朝厯右司諫權給事中崇寧中以黨籍除名編隷台州移楚州卒靖康中贈諫議大夫紹興中賜諡忠肅有了齋集呉江作中郎亭榭據江鄕雅稱詩翁賦卒章蓴菜鱸魚好時節秋風斜日舊煙光一杯有味功名小萬事無心歲月長安得便抛塵網去釣舟閒繫畫闌旁中呉紀聞陳文惠公畱題松陵詩其末有秋風斜日鱸魚鄕之句屯田郎林肇爲呉江日作亭江上因以鱸鄕名之了翁初至呉江簿賦詩云云筮仕之初已無戀官職之意矣寄覺範長沙大士游方興盡囘家山風月絕纖埃杖頭多少閒田地挑取華嚴入嶺來苕溪漁隱叢話自合浦還清湘寄虛中弟行徹天涯萬里山月明方照海珠還瘴鄕來往渾閒事聊爲清湘一破顏桂林府志蘇文饒往昌國意頗憚之送以詩已聞舟楫具那得苦畱君雨過霜風急帆飛雪浪分長途方䇿足暇日正論文功業他年事風波豈足云文饒自京師還欲往昌國而風作不可渡絕句戲之欲衝高浪卻沈吟酒近瀛州嬾得斟莫道顛風無好意爲君吹過遠歸心以上定海縣志沈偕偕字君與湖州人元豐二年進士齊東野語呉興東林沈偕東老之子家饒於財少遊京師入上庠好狎游時蔡奴聲價甲於都下沈欲訪之乃呼一賣珠人於其門首茶肆中議價再三不售撒其珠于屋上賣珠者窘甚沈笑曰第随我來依汝所索還錢蔡于簾中窺見令取視之珠也大驚惟恐其不來後數日乃詣之其家喜相報曰前日撒珠郎至矣接之甚至一日攜上樊樓樓乃京師酒肆之甲飲徒常千餘人沈徧語在坐皆令極量盡歡至夜盡爲還所直而去于是豪侈之聲滿三輔既而擢第盡買國子監書以歸遺賈耘老蟹黃秔稻熟墜西風肥入江南十月雄橫跪蹣跚鉗齒白圓臍吸脇斗膏紅韲須園老香研柚羮藉庖丁細擘蔥分寄横塘溪上客持螯莫放酒杯空齊東野語賈耘老隱苕城南横塘上沈以詩遺之蟹得詩不樂和韻詆之沈得報怒曰吾聞賈多與郡將往還預政言人短長曾爲人所訟吾以長上推之乃鄙我若此復用韻報之有團雌還卻勝尖雄之句賈晚娶眞氏人謂賈秀才取眞縣君以爲笑沈所指團雌為此賈尋悔之而戱語已傳播矣周鍔鍔字亷彥鄞人元豐二年進士初調桐城尉不赴豐稷范祖禹薦知南雄忤時相入元祐黨籍退休西湖有集寄題錢公輔衆樂亭雙虹倒影上簷楹碧水澄空一鏡明野草閒花無限趣短藜幽榜不勝情已知風月隨人意聊爲湖山載酒行卻訝錦囊賡夢草坐令詩思繞寰瀛延祐四明志佛蹟巖在慈谿縣東北大蓬山靈山名大蓬香水靄薝蔔龍祇久覆䕶雲物翳深谷拂衣向劫中神斧斷蒼玉至今天人尊靈跡印金粟頗聞開士讖飛錫隱巖麓坐令湖海閒香供走川陸巍巍䖍報地色相儼金屋緬想舊巾瓶猶能慰心目籃輿訪蓮社一笑欣自足撫事動幽尋疇能念榮辱松爐䙚如見餘力付棊局更覺夢中身翛然百無欲寧波府志題全氏萬金樓幾年江上夢黃鶴意悠悠百尺獨臨水萬金難買秋杵聲喧藥市闌影浸漁舟應有湖中客分身向此遊甬上耆舊集龔原原字深之處州遂昌人第進士徽宗朝厯兵部侍郎寶文閣待制奪職居和州嘗入元祐黨籍贈王筌并序筌字子眞富鄭公客元豐中賜號沖照處士元符三年從劉先生受上清籙華陽洞便門一夕忽開自左慈得進洞宫旋閉且千載矣華陽新報洞門開應為髙人受籙來試問玉門砂遠近未饒元放是仙才茅山志陳偁偁字君舉沙縣人世卿子以父任補太廟齋郎調蔡州通判屢知泉尉惠三州以朝議大夫致仕卒題泉州萬安橋跨海爲橋布石牢那知直下壓靈鼇基連㠀嶼規模壯勢􅎒淵潭氣象豪鐵馬著行横絕漠玉鯨張鬛露寒濤縑圖已幸天顔照應得元豐史筆裦方輿勝覽泉州萬安橋一名洛陽橋嘉祐間太守蔡君謨勸州民成此橋元豐初運使王公嘗進畫本天子嘉賞故卒章及此宋詩紀事巻二十七
