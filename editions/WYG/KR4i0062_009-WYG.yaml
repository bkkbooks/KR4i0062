body:
  text: 宋詩紀事巻九錢塘厲鶚撰蘇耆耆字國老易簡子大中祥符間以父任仕至工部郎中直集賢院題虎丘虎踞標靈跡危樓杳靄間劒池沈石壁金地湧秋山塔映松軒斷雲迷蘚逕斑磬隨靈籟盡鶴伴老僧閒有句慚先哲無辭愈厚顔我來聊寫望頓覺離人寰虎丘志王初初宋初人有歌詩一巻文獻通考陳氏曰初有延平天慶觀詩當是祥符後人青帝青帝邀春隔歳還月娥孀獨夜漫漫韓憑舞羽身猶在素女商弦調未殘終古蘭巖棲偶鶴從來玉谷有離鸞幾時幽恨飄然斷共待天池一水乾書秋千里南雲度塞鴻秋雲無跡淡平空人間玉嶺清霄月天上銀河白晝風潘賦登山魂易斷楚歌遺佩怨何窮往來未得如張翰欲鱠霜鯨碧海東自和書秋隴首斜飛避弋鴻頽雲蕭索見層空漢宫夜結雙莖露閶闔涼生六幕風湘女怨弦愁不禁鄂君香被夢難窮江邊兩槳連歌渡驚散遊魚蓮葉東春日詠梅花靚妝纔罷粉痕新迢遞風回散玉塵若遣有情應悵望已兼殘雪又兼春卽夕風幌涼生白袷衣星榆纔亂絳河低月明休近相思樹恐有韓憑一處棲舟次汴堤曲岸蘭叢鴈飛起野客維舟碧煙裏竿頭五兩轉天風白日楊花滿流水以上宋藝圃集任玠玠字温如蜀人大中祥符末以凌公策薦入京進龍圖紀聖詩一千韻酬以汝州團練推官三讓乞授一子官題黃休復茅亭聚散榮枯一夢中西歸親友半成空唯餘大隠茅亭客垂白論交有古風茅亭客話魯宗道宗道字貫之亳州譙人舉進士為海鹽令天禧元年擢右正言神宗卽位累拜右諫議大夫參知政事遷禮部侍郎卒贈兵部尚書諡簡肅登黃山三十六峯凝翠靄數千餘仞鎖嵐煙軒皇去後無消息白鹿青牛何處眠蓮花源花開十丈照峯頭露褪紅衣爛不收太乙真人多逸興穩眠一葉汎中流以上黃山志賈昌朝昌朝字子明獲鹿人天禧初召試賜同進士出身慶歴間拜同中書門下平章事英宗卽位加左僕射進封魏國公卒諡文元有集題文潞公曲水園鶚按此詩風月堂詩話作晁迥畫船載酒及芳辰丞相園林潩水濵虎節麟符抛不得卻將清景付閒人石林詩話曲水園在許昌城北有大竹三十餘畝潩河貫其中以入西湖最為佳處初為本州民所有文潞公為守買得之潞公自許移鎮北門而文元為代一日挈家往遊題詩壁間云云遂走使持寄北門潞公得之大喜即以地券歸賈氏文元亦不辭而受後文元居京師亦不復至園今荒廢竹亦殘毁過半矣凌霄花披雲似有凌雲志向日寧無捧日心珍重青松好依託直從平地起千尋全芳備祖王贄贄字至之廬陵太和人天禧三年進士慶厯中官殿中侍御史歴户部侍郎致仕過吳江吳江秋水灌平湖水濶煙深恨有餘因想季鷹當日事歸來未必為蓴鱸中吴紀聞蘇紳紳字儀父晉江人天禧三年進士仁宗朝累官史館修撰擢知制誥翰林侍讀學士集賢殿修撰出知河陽卒金山寺九派江流涌化城登臨潛覺骨毛清僧依玉鑑光中住人踏金鼇背上行鍾阜雲開春雨霽海門雷吼夜潮生因思絶頂髙秋夜四面雲濤浸月明鎮江府志王逵逵濮陽人天禧三年進士官刑部郎中句下臨廣陌三條濶斜倚危樓百尺髙詩話總龜福唐有老嫗當壚有舉子謂曰吾能與爾致數十千乃令嫗作酒帘題句云云太守王祠部逵見之大喜呼嫗與錢五千乃王公咏酒旗詩平生最得意者鄭修修吳郡人天禧三年進士玉簪花玉色瓷盆緑柄深夜涼移向小窗陰兒童莫訝心難展未展心時正似簪全芳備祖余弼題慧悟禪師上方禪師天禧中居錢塘月輪山孤峯牢落幾何年臺殿于今插半天巳是精藍誇絶徼更將寶塔在危顛煙霞色任陰晴變鐘磬聲隨上下傳珍重老僧無别境一生幽趣只山川咸淳臨安志曹汝弼汝弼字夢得其先青州人南唐時徙歙之休寜祥符天禧間髙蹈有聲與魏野潘閬林逋善有海寧集再寄披雲峯誠上人江城從别後聞説在松間度日長扃户終年不下山静為詩所役閒免事相關應喜雲邊客冥搜鬢未斑喜友人過隠居忽向新春裏閒過隠士家旋收松上雪來煮雨前茶禽換新歌曲梅妝隔歳花應慚非遁者難久在煙霞贈披雲峯岳長老禪外掩松扃閒眠度歳陰雨侵香篆濕苔長屐痕深水在銅瓶冷雲歸玉磬沈前山有靈藥時策杖藜尋以上瀛奎律髓宋綬綬字公垂趙州平棘人以外祖楊徽之遺恩授太常寺太祝真宗召試學士院為集賢校理仁宗朝歴兵部尚書參知政事卒贈司徒兼侍中諡宣獻有文館記事外制禁林甲乙祕殿遺札七集上元以修史促成書特免扈從因賦屬官不得陪春豫結客何妨事夜遊還勝南宫假宗伯黃扉深鎖暗登樓蔡寛夫詩史故事春試進士皆在南省中東廂刑部有樓甚寛壯旁視宣徳門直抵州橋鎖院每以正月五日至元夕例未引試考官往往竊登樓以望御路燈火之盛宋宣獻公在翰林時上元以修史促成書特免扈從嘗賦詩云云葢謂此也至嘉祐中歐陽文忠公知舉梅聖俞作莫登樓詩諸公相與唱和自是遂為禮闈一盛事送何水部蒙出牧袁州梧楸初謝楚天涼新見腰間換印囊漁浦霧濃沈疊鼓湓江風急下危檣帝城雲表瞻龍首故國星邊認劒光退食齋中多燕喜暖泉春釀泛瑤觴袁州府志句竒材劒客當前隊麗賦騷人託後車皇朝類苑江涵帝子翬飛閣山際真君鶴馭天優古堂詩話豫章事實王子安序之詳矣題咏此邦者往往採之晏元獻云望斗氣沈龍巳化置芻人去榻猶懸陶雍州云劒待張華時巳晚榻延徐孺禮應疎此二聯全是龍光射牛斗之墟徐孺下陳蕃之榻也宋綬公垂云云不襲陳跡甚可佳也憶昔唐家扃禁地粉壁曲龍聞曩記承明意義今頓還永與鑾坡為故事蔡寛夫詩史學士舊院與宣徽院相鄰玉堂兩壁有巨然畫山董羽畫水宋宣獻為學士時燕穆之復寫六幅山水屏寄之遂置于中間宣獻詩云云唐翰林壁畫海曲龍山故引用之薛奎奎字宿藝絳州正平人進士及第累官龍圖閣待制權知開封府仁宗朝授樞密直學士知益州召拜參知政事罷為資政殿學士卒贈兵部尚書諡簡肅有集詩話總龜薛簡肅公尹開封以嚴為治謂之薛出油其後牧成都歳豐人樂作春遊好十首自號薛春遊欲換前稱也寄金繩院正因大師僧中憶藝本超羣釋氏蒙求見討論儒行合為文暢侣詩名雅作貫休孫心燈久已傳宗意命服仍嘗錫帝恩宴坐栴檀消篆字眼前闤闠任囂喧成都文類龐籍籍字醇之單州武成人舉進士仁宗時為侍御史歴天章閣待制元昊反為陜西安撫使召拜樞密使同中書門下平章事加觀文殿大學士以太子太保致仕封潁國公薨贈司空諡莊敏有清風集子元英朝散大夫著文昌雜録司馬温公序畧公性喜詩雖相府機務之繁邊庭軍旅之急未嘗一日置凡所以怡神養志及逢時值事一寓之於詩潁公同戊子生陳巳貴東軒筆録陳文惠與龐龐尚為小官嘗戲龐曰君乃小戊子耳後潁公大拜文惠致書賀曰今日大戊子卻為小戊子矣潁公笑之記異冬至子時陽已生道隨陽長物將萌星辰賜告銘心骨願以寛章輔至平南窗紀談莊敏公帥延安日因冬至奉祠家廟齋居中夜恍忽間見天象成文云龎某後十年作相當以仁佐天下凡十三字駐視久之方滅公因作詩記之句田園貧宰相圖史富書生退老作歴代吟譜陳執中執中字昭譽南昌人真宗朝以父恕任祕書省正字上建儲議擢右正言皇祐初累官吏部尚書同中書門下平章事拜司徒岐國公卒贈太師兼侍中諡曰恭東軒筆録陳恭公初罷政事判亳州年六十九遇生日族親往往獻老人星圖以為壽獨其姪世修獻范蠡五湖圖且賛曰賢哉陶朱霸越平吳名遂身退扁舟五湖恭公喜甚即日上表納節明年累表求退遂以司徒致仕御溝栁一度春來一度新翠光長得照龍津君王自愛天然色恨殺昭陽學舞人東軒筆録陳恭公以衞尉寺丞知梧州驛遞上疏以乞立儲貳真宗嘉其敢言翊日臨朝袖其疏以示熱政歎奬久之召為右正言然為王冀公所忌一日真宗賦御溝栁詩宣示宰相兩省皆和進恭公因進詩云云惠安縣齋咏梅去年邊上見梅花醉眼淹留未到家今日嶺南攀折得忽驚身又在天涯泉州府志夏竦竦字子喬江州德安人以父死事補官真宗朝舉賢良除光禄丞仁宗朝累擢知制誥拜同中書門下平章事封英國公後改封鄭卒贈太師中書令諡文莊有集江州琵琶亭年光過眼如車轂職事羈人似馬銜若遇琵琶應大笑何須涕泣滿青衫中山詩話知杭州到任寄執政造化平分荷大鈞腰間新佩玉麒麟南湖不住栽桃李擬伴沙禽過十春題睢陽海鴈橋邊春水深畧無塵土到花陰忘機不管人知否自有沙鷗信此心以上湘山野録詠藏擫舞拂跳珠復吐丸遮藏巧技百千般主公端坐無由見卻被傍人冷眼看墨客揮犀丁晉公與夏英公㑹宴齋宫伶人有雜手技號藏擫者在焉丁顧夏曰古無咏藏擫詩内翰可作一首即席獻詩云云登通州狼山侍父監通州狼山鹽場作時年十七渡口人稀黯翠煙登臨嘗怯夕陽天殘雲右倚維揚樹逺水南回建業船山引亂猨啼古寺電驅甘雨過閒田季鷹死後無歸客江上鱸魚不直錢澠水燕談應廷試殿上衮衣明日月硯中旗影動龍蛇縱橫禮樂三千字獨對丹墀日未斜青箱雜記夏竦試制科廷對出楊徽之見其年少遽邀與語曰老夫他則不知唯喜吟咏願丐賢良一篇以卜他日之志夏忻然為書此作再徙西都詠青雀寄張昇諫院弱羽傷弓尚未完孤飛誰敢擬鴛鸞明珠自有千金價莫為遊人作彈丸古今詩話上元應制魚龍曼衍六街呈金鎖通宵啓玉京冉冉遊塵生輦道遲遲春箭入歌聲寶坊月皎龍燈淡紫館風微鶴燄平宴罷南端天欲曉廻瞻河漢尚盈盈詩話總龜國清寺穿松渡雙澗宫殿五峯圍小院分寒水虛樓半落暉葉從金地下雲向玉京飛欲問西來意誰傳智者衣桐栢觀鳥道寒藤結洞門蒼蘚深樓臺在山畔松檜出雲心土暖春長在峯高月易沈羽衣祠太乙香冷石壇陰以上天台山志句山勢蜂腰斷溪流燕尾分東軒筆録夏鄭公竦以父歿王事得三班差使然自少好讀書工為詩一日攜所業伺宰相李文靖沆退朝拜于馬首而獻之文靖讀其句深愛之翊日袖其詩呈真宗及敘死事之後乞與換文資遂改潤州金壇主簿野花無主傍人行嘉祐雜志張瓌瓌字唐公洎之孫舉進士召試學士院賜第累擢知制誥進翰林侍讀學士出知濠州寄題徑山懷郎簡侍郎天地一洲渚北平南攲危幽并深以厚江浙清且竒武林頗幽秀川滙仍山卑應接殫天巧類非人力為徑山最佳處有巖稱玉芝居防俗士駕地乃賢人宜郎公留名徳平時為羽儀引年歸故里不復衣朝衣留侯黃石心白傅香山期結宇名勝外日與塵事違泉石景物狀盡在諸賢詩伊余來東藩濫持使者麾平生愛山水弗憚命駕之當候秋風髙逺造巖下扉澣濯纓上塵散步松間綦未能繼高躅聊用慰所思宋文鑑畢田田長沙人真宗朝以吏部郎兼王府侍講奏蠲臨湘七都科調里人德之因祀焉曽撰湘中故事朱陵洞水簾洞門千尺挂飛流玉碎珠簾冷噴秋今古不知誰巻得緑蘿為帶月為鉤凝碧亭在南岳石橋上四面山屏疊萬重古嵐濃翠鎖寒空清秋獨倚危闌立身在琉璃世界中石霜寺石霜寺在溜陽縣南八十里有崇勝禪院昔普㑹禪師居衆千餘名其堂曰枯木蓋取其宴寂也亷使丞相裴公嘗親枉大斾詣之留玉環象笏於此迄今存焉石上泉華噴猛霜境竒因此闢禪坊使君環笏留何用枯朩千餘滿一堂香水湘中别記云在縣郭内其水甚香昔年嘗貢此水民多困弊齊末因罷以板覆之上起塔至今存湘鄉本謂之湘香蓋由此而名坎上浮圖已拂天椒蘭餘馥尚依然九重無復修常貢空有香名與邑傳以上湘中故事穆修脩字伯長鄆州汶陽人真宗東封詔舉齊魯經行之士預選賜進士出身調海州理掾忤監郡坐削籍𨽻池州遇赦敘潁州文學參軍卒自五代文敝至修始獨為古文有穆參軍集五朝名臣言行録公登進士第後為潁州文學參軍人稱之曰穆參軍家有唐本韓栁集乃丐于所親得金用工鏤板印數百帙攜入京師相國寺設肆鬻之有儒生數輩至肆輒取閲公奪取怒謂曰先輩能讀一篇不失一句當以一部相送遂終年不售時學者方從事聲律未知古文伯長始為之倡其後尹洙師魯始從之學古文又傳其春秋學江南寒食江城水國春光饒清明上巳多招要花陰連絡青草岸栁色掩映紅闌橋歌調嘔啞雜吳俗髻鬟疎削傳南朝誰憐北客歸未去楚魄湘魂唯暗消燈黯黯有時當永恨依依何處照閒眠静臨客枕愁寒雨逺出漁篷耿暝煙纖影乍攲還自立冷花時結不成圓銷魂猶憶江樓夜曽對離觴賦短篇和茅秀才江墅幽居好江墅幽居好溪山數里長徑通茶塢緑門帶橘園香藉石還勝榻聴松不讓簧閒遊驚里巷自作隠淪裝以上穆參軍集張觀觀字思正絳縣人中服勤辭學科為祕書郎仁宗朝歴官同知樞密院事以觀文殿學士知許州卒贈吏部尚書諡文孝句保心如止水為行見真書歴代吟譜張思正平生未嘗草書因自為詩薛田田字希稷河中河東人舉進士歴益州轉運使累擢龍圖閣待制樞密直學士知益州遷右諫議大夫知同州成都書事一百韻并序金躔奧壤玉壘名區風物尚饒曠古稱最僕守兹職任五年再至初則木牛流焉馳八使以均財次則皁蓋朱轓奉一麾而作鎮歴覽勝異慷慨興懐古人曰非感發不可以言詩非聲詩不可以導志故言成志激流為美談偶因公退輒作成都書事七言一百韻止陳乎益都事蹟罔暇以外景加諸庶幾謬發於斐然詎敢芳揚於作者詩曰混茫丕變造西阡物像熙熙被一川易覺錦城銷白日難歌蜀道上青天雲敷牧野耕桑雨栁拂旗亭市井煙院鎖玉溪留好景坊題金馬促繁弦風流鋪席堆紅豆瀟灑門庭映碧鮮表狀屢言同穎穗敕書頻奬竝生蓮旋科杞樹吹香稻剰種豌巢沃晚田仁宅不隳由政立議闈無取任情遷民知禮遜蠶叢後俗尚奢華邃古先遶郭波濤來浩浩歸朝歧路去綿綿乍回黑水將成道潛到青羊恐遇仙靚女各攻翻様繡袨商兼制砑綾牋壚邊泛蟻張帬幄江上鳴鼉蔟綵船石筍崚嶒衙對峙琴臺恢濶寺相連羣葩豔裏珍禽語百草香中瑞獸眠喜趣必臻尤佇望勝遊争倦更遷延早荷葉底蹲鴟伏椶樹梢頭亂蜨穿鹺發牢盆渾棄鹵鐵資圜法免肧鉛豐饒物態寜殊越美麗姝姬酷類燕西海號雄彰傳紀南康辭健積銘鐫良工手技髙容學妙隠丹方祕不傳倚劒靈關凌絶頂夢刀孤壘削危巔金華巷陌遺三品石鏡伽藍露一拳信落荆州隨鼓枻檢頒芝闕聴搖鞭若量内地寒暄異且在遐陬水陸全渝舞舊云傳藥府巴談誰曰繫言詮九苞綰就佳人髻三鬧裝成子弟韉欲辨坤維尋地理纔臨益部認郊廛文翁室暗封苔蘚葛亮祠荒享豆籩貨出軍儲推賑濟轉行交子頌輕便氣蒸蒟蒻根鬚潤日罩楩楠樹影圓藥寺風光蟲蟄外花潭遨樂鵙鳴前聚源待擬求鳧氏貯怨那能雪杜鵑叢植森榮還蓊蔚夾流湍迅迥潺湲鮮明機杼知無算細碎錐刀不啻千合伴鴉鬟齊窈窕對陪霓袖競翩翾五門冷映岷峨雪千里爰疏灌堋泉茂盛八紘宜得最髙腴十道比俱偏袁滋不到生無分段相重來宿有緣款召相如登苑驟遷太白步花甎葳蕤草木時為瑞竒秀江山代産賢曉後細風紅灼灼夜中微雨碧芊芊錦亭燄燭明歌障繡閣香毬熨煖氊寶塔徘徊停隼旟觀街雜㳫擁輜軿酴醿引架家家郁躑躅攀條處處妍重愛魯儒提徳柄威降曹將董戎旃歡謠少負賨人勇長講多經楚客禪似蔟綺羅偏煥耀如流車馬倍喧闐搘機顯綽名堪録題柱芬芳事莫捐李特鋒鋩徒恃險張儀規畫自持顛鷹揚器業成悠久烏合姦雄敗轉旋漫向鼎分澄霸道却當龜化驗都鄽强貪楚滅悲傾轍廣洽堯詢喜慕羶側弁猖狂抛玉斚歸鞍酩酊墮金鈿氛埃屏息雲常覆稼穡繁滋澤靡愆睿聖宵衣垂乃睠貴臣馳驛每傳宣石牛邁路加歆饗江瀆隆區助潔蠲避暑亭臺珍簟設縱開池沼釣絲牽遮蠻帶礪長能固捍蜀金湯遠益堅何武甲科曽繼踵嚴真卜兆䍐差肩儲書競甲諸家集博識咸修百氏箋紙碓暮舂臨岸滸水樽春注􅎒河壖華嚴像閣涼堪愛淨衆松溪僻可憐學射崔嵬橫罨靄放生寛廣媚漪漣蘚庭嫩筍青篸篸風檻新荷綠扇扇守戍貔貅千萬騎采葑簪笏兩三員清江瀉勢方流巽大面盤形正壓乾電掃谷風藏虎嘯雷瞋官樹灑龍涎郃占逖應星舒彩欒噀端聆火撲然令範式驅民􅆙􅆙咨謀疇倚道平平性寒甘蔗猱偷齧體膩芭蕉蠹莫沿誌讀備興重掩巻史看唐幸嬾終篇雕盤姹女呈酥作水巷癡童颺紙鳶初下城頭迷鄠杜暫來犀浦誤伊瀍變秦言語生皆㑹戀土情懐死不悛結厦斧斤宗簡易入神丹雘厲精專栁隄夜月珠簾捲花市春風繡幕搴十縣版圖分户籍一城牌肆係民編受辛滋味饒薑蒜劇饌盤飱足鮪鱣月季冒霜秋肻挫荔枝衝瘴夏宜然幾番叢箐鳴虛籟是箇園林噪嬾蟬蠢物乗時先養育菁英屆候别陶甄地丁葉嫩和嵐採天蓼牙新入粉煎平代啓闈聞繼岌監軍憑軾見劉焉蕙蘭馥裛幽蹊畔菱芡交鋪曲島邊繒網晚晴誇蹴踘畫繩寒食戲鞦韆氤氲紫霧濛都邑縹緲丹霞聚偓佺螭伏自然銷劒戟螻翻幾度起戈鋋宦遊止歎音塵闕鄉飲何驚歳月遄靈壽桃枝竒共結金砂銀礫貴相聯埋輪昔按均輸命叱馭今分太守權徒為行春飛皁蓋詎能許國報青錢政經旋考尤多僻民瘼深求尚未痊雖愧袴襦非叔度日期毫墨有馮涓僶遵亷察思從訓克謹操修敢好畋南市醉過攅幟隊西樓歡坐列瓊筵煩囂謹畏傷淳厚惠黜周防近巧諞重禄省心宜致宼薄材莊貌若臨淵扶危頗異巢居幕勸善還同矢在弦叨蒞一麾康遠俗等閒光景又三年成都文類王隨隨字子正河南人舉進士累擢知制誥遷龍圖閣直學士仁宗景祐中拜門下侍郎同中書門下平章事昭文館大學士罷除彰信軍節度使判河陽卒贈中書令諡章惠題棲霞山房虛窗殘燭明攲枕旅懐清永夜起松籟半天疑雨聲吟餘閒景象道勝小榮名鐘罷星河曙悠悠迴斾旌金陵梵刹志臨終作畫堂燈欲滅彈指向誰説去住本尋常春風埽殘雪青箱雜記句好客幾嫌州路僻愛山長上郡樓髙探春水村煙暝早山館夜寒多旅店掃徑苔痕破開扉竹影分中庭録吟窗雜一聲啼鳥禁門静滿地落花春日長宫詞桑斧劙春色漁歌唱夕陽歴代吟譜掌禹錫禹錫字唐卿郾城人中進士第歴官直祕閣英宗卽位遷太子賔客以工部侍郎致仕卒嘗預修皇祐方域圖志及校正類篇本草圖經句風定落花深一寸日高啼鳥度千聲曉鶯林外千聲囀芳草堦前一尺長過庭録掌禹錫博通子史百家作證類本草而訥于為文時賢頗以此鄙之嘗作詩云云歐公謂忽作人言王洙洙字原叔應天宋城人舉進士官直龍圖閣同判太常寺坐事黜知濠州徙襄州召還累遷翰林學士改侍讀兼侍講學士卒諡曰文題峴山石幢襄陽南出大路奔小山曰峴名特尊山形卑墮不峻極屹若巨首臨江濆大山半宫不成霍絶水闕左非為亹砠巔贔屓戴危石箕踞曼衍羅芳蓀漢流長騖濵其足東望瀰迤皆平原槎頭下瞰罟罶集蔡洲近眺田園蕃何物兹山匪秀出得使今古聞聴喧自昔羊公好登覽山名直為賢者存鹿門望楚鎮區境鳯林冠蓋延山樊丹巖翠壁互幽勝日月虧蔽煙嵐屯公胡遺彼而樂此談者未始聊診論吾謂聖達竟超豁高覽便欲周乾坤孔登泰山小天下阮升廣武歎豎昏㑹稽探穴禹書出之罘望海雲濤翻此中風景亦虛逺極目見盡江山源東吳未定勞機䇿置酒嘯詠紓憂煩數顧温甫恤躬後誓將百歲游精魂對公盛徳與山永正唯湛輩如公言今兹去公僅千載凛然英氣猶軒軒我來追古一長息舊迹廢毁成悲呑民豪占山童其木嘉植不得容本根利取薪蘇積稇絭粥之陶旊供燒燔羊公無廟忽不祀但縱淫鬼歆牲蘩中庭有碑卽墮淚至今觀者懐仁恩於民何誅不足問非民忘徳由官惽下教里邑復祠宇敘諸祭典躋之元思仁愛樹恭所茇禁止樵伐修壖垣且欲王命得守固謄言狀事馳九閽書聞天子蒙報可金石款刻垂後昆使民永念古遺愛朂爾風化常丕敦襄陽府志吕夷簡夷簡字坦夫先世萊州人祖龜祥知壽州遂家焉大理寺丞蒙亨之子宰相蒙正之猶子第進士慶厯初拜司空平章軍國重事封許國公薨贈太師中書令諡文靖有集陳直齋云吕文靖詩清潤和雅天花寺賀家湖上天花寺一一軒窗向水開不用閉門防俗客愛閒能有幾人來老學菴筆記江南立春灰律何時應江春昨夜來細風先動栁殘雪不藏梅餘冷迷清管微和發凍醅閉門無客到樽俎為誰開宋文鑑重遊雁山往來遊海嶠上徹最高層雲外疑無路山中忽見僧虎蹲臨澗石猿掛半巖藤何日抛龜紐孤峯上再登雁山志句梅無驛使飄零盡草怨王孫取次生早春人為子推初禁火花愁青女再飛霜寒食楊文公談苑范雍雍字伯純世居河東父徳隆葬河陽因家焉舉進士為洛陽簿天聖中累官樞密副使元昊叛拜鎮武軍節度使知延州左遷户部侍郎復吏部侍郎知河南遷禮部尚書卒諡忠獻紀西夏事七百里山界飛沙與亂雲虜騎擇虛至戍兵常忌分嘯聚類宿鳥奔敗如驚麕難稽守邊謠應敵若絲棼承平廢邊事備預久已亡萬卒不知戰兩城皆復隍輕敵謂小醜視地固大荒願因狂狡判從此葺兵防劇賊稱中塞中塞賊之勁悍者也驅馳甲鎧精昔惟矜突騎今亦教攻城伏險多邀擊驅羸每玩兵拘俘詢虜事肉盡一無聲儒林公議夏寇旣敗官軍劉平石元孫陷没延事州㡬至不守雍日告朝廷益兵復為詩以言賊凡數十章其傳播者云云蓋為前屢得賊中諜者雖臠其肉且盡終無一言故雍詩有云初朝廷輕視元昊邊臣奏請不甚允從至是方罪樞臣而逐之王竒竒字漢謀贛縣人真宗時官至殿中侍御史旅中有感一作秋興澤國來遊豈厭重羈孤懐感自無窮鴈聲不到歌樓上秋色偏欺客路中宿寺夢回蓮葉雨渡江衣冷荻花風誰憐未得青雲志琴劒年年西復東詩林萬選續縣令題雁詩隻隻銜蘆背曉霜晝隨鴛鷺立寒塘晚來漁櫂驚飛去書破遙天字一行贛州府志王竒少為縣掾史令題雁詩一聨于屏風竒密續後二句令竒之因激使學後游京師居李文靖沆客位真宗臨奠見屏間秋興詩召對稱㫖特許殿試賜第竒作詩云不拜春官為座主親逢天子作門生官至殿中侍御史楊偕偕字次公中部人舉進士歴翰林侍讀學士左司郎中出知越州改杭州召為右諫議大夫以工部侍郎致仕郡舍偶書偃息鈴齋度歳華著書人盡笑聱牙斯文自信驚天地吾道誰知繫國家獨愛杉篁寒不變更憐江海濶無涯因思朝市争名地何似優游刺史衙宋文鑑宋詩紀事巻九
