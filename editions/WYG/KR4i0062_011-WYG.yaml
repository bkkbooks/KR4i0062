body:
  text: 宋詩紀事巻十一錢塘厲鶚撰宋庠庠字公序初名郊字伯庠安州安陸人徙開封之雍邱天聖二年舉進士第一入翰林為學士厯檢校太尉平章事樞宻使封莒國公以司空致仕卒贈太尉兼侍中謚元憲有集西清詩話二宋俱為晏元獻門下士兄弟雖甚貴顯為文必手抄寄公求雕潤嘗見景文寄公書曰莒公兄赴鎮圃田同逰西池作詩云長揚獵罷寒熊吼太乙波閒瑞鵠飛語意警絶因作一聨云白雪久殘梁複道黄頭閒守漢樓船仍注空字扵閒字之旁批云二字未定更望指示晏公書其尾曰空優扵閒且見雖有船不御之意又字好語健盖前輩務求博約情實肫至盖如此也答葉道卿紙尾勤勤問姓名禁林依舊玷華纓莫驚書錄題臣向便是當時劉更生西清詩話宋郊字伯庠在翰林有指其姓名傅以他説者因請更名庠嘗移書葉道卿清臣目為同年葉戲答云清臣宋郊榜第六人登第徧閲小錄無宋庠者不知何許人庠答詩云云展江亭成留題緑鴨東陂已可憐更因雲竇注新泉鑿開魚鳥忘情地展盡江湖極目天向夕舊灘都浸月遏空新樹便留煙使君直欲稱漁叟願得閒州不記年西清詩話許昌西湖展江亭成宋元憲留題有鑿開魚鳥忘情地展盡江湖極目天之句皆以為曠古未有此詩然本於五代馬殷據潭州時時建明月圃命幕客徐仲雅賦詩云鑿開青帝春風圃移下姮娥夜月樓用古句摹擬詞人類如此但有勝與否耳落花一夜春風拂苑墻歸來何處剰凄凉漢臯佩冷臨江失金谷樓危到地香淚臉補痕煩獺髓舞臺收影費鸞腸南朝樂府休賡曲桃葉桃根盡可傷侯鯖錄宋莒公兄弟少作落花詩為時膾炙莊惠后挽詞媯幄柔明訓堯闈保䕶賢别居長樂寢讓給水衡錢謹疾方加膳收神亟去仙宸襟増服紀追報煥終天昔帝推嬪則吾君頼母慈陪陵漢家葬異室閟宫祠霧暗星軒隠天愁月御移翟車参享路無復廟中期莊獻太后挽詞寶慈垂母訓一紀御璿除地有占沙舊天仍補石餘軒星淪夕緯翟輅去宸居異日金縢啟方知復辟書自注太后上仙後於巾箱中得復辟詔書旰昃身無憚寒暄疾有加災生織女柰魂斷濯龍車廞翣浮晨旭邊簫咽暝霞唯留長樂注刋美在皇家以上合璧事類前集季秋曉出題山光寺旦夕人語喧汎舟北城曲十里望禪刹飄若塵外躅是日秋宇髙清輝澹晨旭林風唱殘蜩澤稗下飢鵠野實迎露黄川蕪傲霜綠循涯得微徑捨楫步幽麓佛寺訝靚深僧廬互重複山氣導真想天香洗煩欲嗟余秉微尚邱壑返初服失計蹈塵嚻虛名玷纓轂妄排金馬門謬草紫泥牘器偏固自傾綆短良難續何言一麾出尚参九州牧恩深無後疵顔靦有餘恧孔訓懲憚改羲爻許頻復朅來清浄區兾脱泥塗辱醉象或可調藩羝悔前觸萬緣自我空至道非外朂聊謹三載期吾得事棲伏揚州府志宋祁祁字子京天聖二年與兄庠同舉進士奏名第一章獻太后以為弟不可先兄乃擢庠第一而寘祁第十時號大小宋累遷知制誥工部尚書翰林學士承㫖卒謚景文有集東軒筆錄子京博學能文章天資藴藉好游宴以矜持自喜晚年知成都府帶唐書於本任刋修每宴罷盥潄畢開寢門垂簾燃二椽燭媵婢夾侍和墨伸紙遠近觀者皆知尚書修唐書矣望之如神仙焉多内寵後庭曵羅綺者甚衆嘗宴於錦江偶微寒命取半臂諸婢各送一枚凡十餘枚皆至子京視之茫然恐有厚薄之嫌竟不敢服忍冷而歸九日食餻飈館輕霜拂曙袍糗餈花飲鬬分曹劉郎不敢題餻字虚負詩中一世豪聞見後録劉夢得作九日詩欲用餻字以五經中無之輟不復為宋子京以為不然故子京詩云云糗餌粉餈餻類也出周禮詩豪樂天目夢得云玉堂作粉署重來憶舊逰蟠桃開盡海山秋寧知不是神仙骨上到鼇山更上頭東軒筆録嘉祐中翰林諸公皆入政府時包拯為三司使宋祁守鄭州二公久著人望而不見用京師諺語曰撥隊為参政成羣作副樞虧他包省主悶殺宋尚書明年包亦為樞宻副使而以翰林承㫖召景文景文以詩寄梁丞相畧云梁園賦罷相如至宣室釐殘賈誼歸盖謂差除兩府足方被召也為承㫖又作詩云云清明日集西園日日西園春思催攜觴結客上髙臺正緣從事青州至更許書生洛下來早葉已成花半落新巢未定燕千廽芳辰物物皆堪愛併作髙陽倒載媒時州醖既美又命座客賦詩故有第二聫中山立秋峯雲曉影破孱顔萬里風生結早寒人在兜零烟外走嵗從鶗鴂口中殘槽聲併滴添新酎笥月兼輪掩故紈白髮光陰誠可惜五年搔首問長安八月望夜無月有感素波涼暈淡曽城怊悵三年此夜情獨捲練帷成黙坐暗蟲相命作秋聲閏正月二十五日送客尋春集裴氏園尋春選客共流連雨罷春郊物物妍黄抹柳梢初徧後紫黏花蕚未開前朋衿自為交驩惨醉斝誰能辨聖賢猶頼斜陽催跋馬不然離恨損絲弦七月二十七日客雁歸何處寒螿鳴不休兼之清夜永副以長年愁家令有移帶中郎餘白頭此懷誠自感何頼怨髙秋十日宴江瀆亭節去歡猶在賔來賞更延悠揚初短日凄𦂳乍寒天霽沼元非漲秋花自少妍蟻留新獻酎蕙續不殘烟口鰋衝餘藻游龜避折蓮流芳真可惜從此遂凋年以上古今嵗時雜詠過摩訶池十頃隋家舊鑿池池平樹盡但回隄清塵滿道君知否半是當年濁水泥池邊不見帛闌船麥壠連雲樹繞天百嵗興衰已如此争教東海不為田余既到郡有詔仍修唐書寄局中諸僚一章通奏領州麾詔許殘書得自隨吾黨成章真小子官中事了是癡兒昏眸視久花爭亂倦手搔餘雪半垂所願弟兄皆傑筆劉生當見汗青期司馬相如琴臺故臺千古恨猶對舊家山半夜鸞鳯去他年駟馬還死憂封禪晚生愛茂陵閒唯有飄飄氣仍存天地間江瀆亭一翬掀翅壓溪隅吏事初閒此燕居斷岸有時通畧彴輕風盡日戰栟櫚雲鴻送目揮弦後手板看山拄頰餘芰碧蒲青來更數江人多識使君旟九日藥市作陽九協嘉神期入始多暇五藥㑹廣廛遊肩閙相駕靈品羅賈區仙芬冒闉舍擷露來山阿斸煙去巖罅係道雜提携盈襜更薦藉乗時物無賤投乏利能射癰苓互作主參薺交相假曹植謹贋令韓康無二價西南嵗多癘卑濕連春夏佳劑止刀圭千金厚相謝刺史主求瘼萬室繫吾化顧頼惡石功捫衿重慚唶将歸遠假西南守三逢梅柳新衰令宦情薄老惜嵗華頻郫釀工銷日巴禽巧喚春離家何所恨雁後作歸人覽蜀宫故城作國破江山老人亡岸谷摧鴛飛今日屋鹿聚向時臺故苑猶飛雪荒池但刼灰頳遺糊處壤闔記數殘枚恨月窺林下悲風覓隴來依城狐獨速失厦燕裴回廢社纔存樹陰垣自上苔有情惟杜宇長為故王哀集海雲鴻慶院地勝祠仍古春餘物徧華山雲時抱石佛雨不萎花嶺挾樓梯峻巖牽殿墄斜淙谿雜環佩怪蔓走龍蛇供坐僧飛鉢香園客戲沙吾逰真草草深意屬青霞以上成都文類秋夜西風已飄上林葉北斗直挂建章城人間底事最堪恨絡緯啼時無婦驚老學庵筆記咏漢史朱游朱雲小字英氣凛生風濵死危言悟帝聰殿檻不修旌直諫安昌依舊漢三公韻語陽秋題三泉龍洞蚪洞聳雲峯緣虚一棧通雲披䨇壁敞樹補半巖空穊竹森煙纛飛泉曵玉虹重蘿不肻晝陰壑自然風嶺斷天斜碧崖傾日倒紅浮丘邈難遇留恨翠微中能改齋漫録三泉龍洞以山為門深數十步復見天日及山水之秀盖自然而成非人力也宋景文公賦詩蛙越國車前矜勇甚子陽井底太驕生乗時不羡雲溟樂口作儀同鼔吹聲蜨撲粉曽過宋玉墻一身生計託流芳不須長結東風願秋菊春蘭各有香以上合璧事類别集吳中友人惠蟹秋水江南紫蟹生寄來千里佐吳羮楚人欲使衷留甲齊客何妨死願烹下筯未休資快嚼持螯有味㪚朝酲定知不作蟛蜞悞曽厠西都博士名蟹畧臘後晚望寒日繫難定鳴笳弄已休凍崖初辨馬昏谷自量牛漢樹臨關宻胡泉入塞流登髙能賦未風物古堯州送越州陸學士梅天霞破候旗乾鄉樹依然越絶閒挾䇿當年逢掖去懷章此日繡衣還亭餘内史浮觴水路入仙人取箭山牛酒盛誇先墅宴不妨春詔得親班答勸農李淵宗嘉州江行見寄嘉月嘉州路軻峩按部船山圍杜宇國江入夜郎天霽引溪流望涼供水閣眠愧君舟楫急遂欲濟長川贈清逸魏處士奕世依巖石襃恩下帝庭姓名髙士傳父子少微星池溜遥通澗家林近帶坰分明詔書意天極賜鴻冥瀛奎律髓此魏野之子閑也亦能詩世其隠長安道中悵然作三輔古風煙征驂悵未前山園蓬顆外自注賈山議始皇侈葬言後世不得蓬顆蔽冡宮室黍離邊樹老經唐日碑殘刻漢年便須真隕涕不待雍門弦寒食假中作九門煙樹蔽春㕓小雨初晴潑火前草色引開盤馬地簫聲催暖賣􅄳天縈絲早絮輕無著弄䄂和風細可憐鼇署侍臣貪出沐珉糜珠餡愧頒宣擬杜子美峽中意天入虚樓倚百層四方遥謝此登臨驚風借壑為寒籟落日容雲作暝陰峴井北抛王粲宅楚衣南逐女嬃砧十年不識長安道九籥宸開紫氣深春宴行樂家園園芿初乾小雨泥飲壺游屐况親携身輕早蜨千囬舞技癢新禽百種啼乗飲草茵侵坐輭畏風桃綬向林低陽暉自有留人意銜照髙樓未遽西原注芿人去聲把酒歌管嘈嘈月露前且将身世付酡然漫誇鼷鼠機頭箭不識醯雞甕外天青史有人譏巧宦黄金無術治流年君看醉趣兼醒趣始覺靈均更可憐落花墜素翻紅各自傷青樓煙雨忍相忘将飛更作廽風舞已落猶成半面妝滄海客歸珠迸淚章臺人去骨遺香可能無意傳䨇蜨盡付芳心與蜜房以上瀛奎律髓瀛奎律髓夏英公守安州景文兄弟以布衣游學席上各賦落花詩英公以為有台輔器後元憲狀元景文甲科同榜天下以為二宋希夷峽仙館三峯下年華百嵗中夢休孤蜨往蛻在一蟬空蘂笈微言袐霄辰浩氣通丹遺䑛後鼎林遣御餘風布霧沈荒白飡霞委暗紅蛾眉有歸約飛步與誰同華嶽全集寄大固山嘉祐院長吉上人上人曽逰京師得宋公以下一百四十五人所書般若經建臺以貯之名髙身愈隠孤錫倚巖扄園布黄金地臺藏白馬經庵雲吞暝燭澗月㵼虚瓶坐想谿橋路莓苔又㡬青台州府志句色映堋雲爛聲迎羽月遲六一詩話天聖二年省試采侯詩宋尚書祁最擅塲其句云云尤為京師傳誦當時舉子目公為宋采侯碧雲謾有三年信明月空為兩地愁優古堂詩話雲齋廣錄云二宋以文章齊名天下子京守蜀日作詩三百首名曰猥藁有句云云後卒不入兩府人以為詩䜟予以子京用何遜與胡興安夜别詩念此一筵笑分為兩地愁廣録之論不知所自也蟹美持螯日鱸香抑鮓天芥隠筆記曉日侵簾押春寒到被池侯鯖錄青帝回風還習習黄人捧日故遲遲困學紀聞虺蔓相結盤虯梢久回曲紛若未結繩繁如巳綸綍咏藤誰言漢樸學正似楚枝官以上哲匠金桴吳感感字應之吳郡人天聖二年省試第一九年又中書判拔萃科仕至殿中丞如歸亭五柳門南派水東水邊亭上興無窮半窗山色來雲外一枕荷香帶雨中繡被夜歌青翰檝綠波春颺紫莖風塵曹未竊江湖號攜手䦨干早晚同吳江縣志呂造造晉江人言子天聖二年進士刺桐城閩海雲霞繞刺桐往年城郭為誰封鷓鴣啼困悲前事荳䓻香銷減舊容泉南雜記泉州築城時環城皆植刺桐故號桐城吕造詩云云胡宿宿字武平常州晉陵人天聖二年進士厯兩浙轉運使召修起居注知制誥翰林學士拜樞宻副使罷知杭州以太子少卿致仕薨贈太子太傅謚文恭有集太湖石海岱鉛松妄得名洞庭山腳失寒瓊潄成一朶孤雲勢費盡千年白浪聲誰向機邊逢織女直疑巖下見初平年來賞物多成病日遶蒼苔幾徧行宿秀峯寺在靈巖山夕鐘初斷海鯨音投宿香園半翠岑氷簟浸牀消客夢水簾澄月伴僧吟雄風拂衽清涼極珍樹交柯翠翳深一夜漢陰機事息草堂虚論破煩襟彭山贈貫之彭山隔重湖落日見孤塔揚舲入空曠煙樹㪚鵝鴨山中老臞仙萬頃纎芥納乗風落珠唾暝色遠相答平生爾汝分磁鐡契已狎萬緣一笑空箇處無剰法方舟過谷隠風雨寒霎霎黎明帶星歸尚及齋鼓踏臨岐戒後㑹梅熟新秧插期我㪚縑楮莫忘鷗盟歃送楊中允宰常熟丹舸傍江潯嘔啞遠艫音新科持片玉能政引孤琴美進宮坊秩榮歸里閈心名参天下雋歌著邑中黔地志連香徑家園帶武林呉山幾屏秀楚水一篙深晚鼓停餘疊秋帆卧半陰平時接方驥後夜望横参陶菊何妨醉江毫且剰吟悠悠河上别千里鬱朋簪送顯忠上人歸吳郡秋風隨處起振錫不留行卻背嵩雲去迎看淮月生禪通少林黙詩得杼山清㡬夕巖窗下忘眠聽瀑聲以上吳郡志過桐廬兩岸山花中有溪山花紅白徧髙低靈源忽若乘槎到仙洞還同採藥迷二月辛夷猶未落五更鴉臼最先啼茶煙漁火遥堪畫一片人家在水西塞上漢家神箭定天山煙火相望萬里閒契利請盟金匕酒将軍歸卧玉門關雲沈老上妖氛斷雪照回中探騎閒五餌已行王道勝絶無刁斗至闐顔飛将曽從嫖姚立戰功邊庭猶畏紫髯翁雕戈夜綂千廬㑹緹騎秋畋五柞宫後殿拜恩金印重北堂開宴玉壺空從來敵國威名大麾下多稱黑矟公以上瀛奎律髓次韻朱沈春雨之什蒼野迷雲黯不歸遠風吹雨入巖扉石牀潤極琴絲緩水閣寒多酒力微夕夢将成還滴滴春心欲斷正霏霏憂花惜月長如此争得東陽病骨肥淮南王貪鑄金錢盗寫符何曽七國戒前車長生不待爐中藥鴻寶誰收篋内書碧井牀空天影在小山人去桂叢踈雲中雞犬無消息麥秀漸漸徧故墟早夏井轄投多思不禁宻垂珠箔晝沈沈睡驚燕語頻移枕病起蛛絲半在琴雨徑亂花埋宿豔月軒修竹轉涼陰一春酒費知多少探盡囊中換賦金以上宋藝圃集芙蓉湖小湖香豔戰芙蓉碧葉田田擁釣篷嵐氣欲飛山隔岸秋光不定水揺空翩翻雪鳥争投浦潑剌霜鱗對擲風正是滄浪濯纓日一竿多謝紫溪翁咸淳毘陵志函谷關天開函谷壯關中萬古驚塵向此空望氣竟能知老子棄繻何不識終童謾持白馬先生論未抵鳴雞下客功符命已歸如掌地一丸曽誤隗生東河南府志津亭津亭歌闋戒棠舟五兩風來不暫留西北浮雲連魏闕東南初日滿秦樓層城𣺌𣺌人傷别芳草萋萋客倦逰平樂舊懽收不得更憑飛夢到瀛洲沖虚觀五粒青松䕶翠苔石門岑寂斷纎埃水浮花片知仙路風遞鸞聲認嘯臺桐井曉寒千乳斂茗園春嫩一旗開馳煙未勒山庭字可是英靈許再來淮南發運趙邢州被詔歸闕天臺封詔紫泥馨馬首前瞻北斗城人在函關先望氣帝於京兆最知名一區東第趨晨近數刻西廂接晝榮正是兩宮裁化日百金䨇璧拜虞卿以上顧氏積書巖選憶廣福寺牡丹十日春風隔翠岑袛因繁朶自成陰尊前可要人頺玉樹底遥知地側金花界三千春𣺌𣺌銅槃十二夜沈沈雕盤分篸何由得空作西州擁鼻唫常州府志尹洙洙字師魯河南人天聖二年進士知伊陽縣召試為館閣校勘累遷右司諫知渭州兼領涇原路經畧公事坐貶卒有河南集聞見録本朝古文柳開仲塗穆修伯長首為之倡尹洙師魯兄弟繼其後歐陽文忠早工偶儷之文及官河南始得師魯乃出韓退之文學之盖公與師魯文雖不同公為古文則居師魯後也皇雅十篇天監受命也自梁至於周兵難不息宋受命統一萬方焉天監下民亂靡有定甚武且仁祚厥真聖仁實懷徠武以執競匪䖍匪劉極我天命自昔外禪曰經曰營令以挾制政以陰傾帝初治兵志勤于征奄受神器匪謀而成淮潞弗䖍卒汚叛跡戎路戒嚴皇威有赫彼寇詿民吾勇其百殄厥渠魁貸其反側帝朝法宮左右宗公忮夫悍士以雍以容爾居爾室爾工爾農既息既養惟天子功天監四章章八句西師征蜀也主用西師岷梁弗賔匪曰負固實交晉人予訓予誓念我将臣正厥有罪無庸傷民矯矯虎士載摧其壁吁嗟孟侯亦果其䇿迎師而降靡抗鋒鏑豈獨身謀完是宗國蜀都既平将臣失律此衆悍驕彼民危慄堂塗呌呶合萬為一匪懷則威帝心是恤帝曰将臣予嘉乃庸廢命毒民爾弗有終邦典用疑惟罪惟功靡殛而削協于厥中帝曰孟侯受封于楚斿旂琱戈備物異數俾爾族姻及乃文武服在王庭靡不有序蜀民呼歌天子威靈保我者封暴我者刑匪功是私匪弱是陵天子惠民疇敢不承西師六章章八句耆武受俘也命将伐南海平金陵俘二王以獻耆武定功惟時二方淮服其又海南遂荒孰孱而盭孰暴而昌自底不惠乃終滅亡帝戒二俘同即爾誅予惟民無辜休息是圖時其戢矣寧威獨夫帝嗟汙邦久罹于兵或暴下以征或敷虐以刑予命中興協于國經民服德音室家以寧耆武三章二章八句一章六句憲古令守臣也削其附庸以强帝室焉帝懷永圖治古是憲四方守臣惟屏惟翰在昔艱難弗惠訓典跨都連城髙牙以建有士有民肆乃征繕以息以容終焉叛渙凡今帥臣維厥聞見匪革亂原曷清多難帝告庶邦式是典彜元侯顯父戚臣宗支正乃封圻予一人是毗凡曰附城罔爾俾之畜兵厚賦靡爾得私毋凶而國作福作威天子有命疇敢不祗子孫承承惟萬世規憲古二章章十六句大鹵王師討晉罪也冀州之强粤惟大鹵俗忮而專地扼而固協彼幽都蕩揺邊圉三垂既夷凶威弗阻帝御六師百萬貔虎翦其附庸至于城下鋒鏑始交梯衝如舞蠢爾孱王請附降虜我士奮揚願究吾武皇帝曰吁念彼黎庶匪鯨匪鯢復為王土晉郊既平九區以寜陳功太廟告假威靈在昔武王于商觀兵惟吾藝祖亦勤于征匪貸晉罪俟厥貫盈聖作聖繼巍巍相承皇矣二后功莫與京大鹵二章一章二十二句一章十四句帝耤修故典也躬耕以勸農焉帝耤于郊典儀是陳務農以訓供祀以勤勤祀在誠匪勤于人訓農以實匪訓以文帝慎二物乃躬乃親公侯卿士暨厥庶民于甸有制飭哉惟寅帝賚髙年式宴且喜種種黄髪族立而議我生艱難暴亂以繼耳狃金鼓目狎戎器皇其我圖親講農事有子有孫力田孝弟鼓舞至仁薰焉如醉帝耤二章章十四句庶工任賢也帝咨庶工疇其輔予俊又以登厥勞乃圖匪忘舊勲非賢勿俞巍巍衮台盛德以居任賢伊何昌言是庸勉告爾猷罔恤乃躬豈無狷辭怫于予衷予不爾疵爾無面從始時從官戎容揚揚今帝左右儒冠煌煌朝廷以尊文物典章得人之盛奕世重光庶工三章章八句帝制北方請盟也帝制萬方罔有弗賔蠢爾化外羈而弗臣威格三方稽顙獻琛單于革心願交使人帝謀公卿列侯庶校咸曰彼心暴戾陰狡既擾我疆復利我寶無若厲兵襲其還道皇曰有衆予實念兹戰無必勝矧其歸師借曰大獲疇能盡之益俾餘醜毒吾朔陲乃俞其盟北州以綏在漢世宗抗威速攻暴農算商經用弗充中土震騷漢南始空降及後世猶稱厥功於穆聖考德無與偕匪勤于兵北人遂來逮是三紀遠俗以懷生民休息嗚呼仁哉帝制五章四章八句一章十句皇治慎刑也帝仁于用刑在位者以寛恤為治焉皇底其治欽哉惟刑在疑而宥罔察為明愛怒弗肆孰為重輕毋一弗辜惟典之平前世理官倚法以刻匪彼為讎盖曰任職今之決獄務正其辟鑒于前人繄我仁德皇德在仁寖而成風公侯卿士靡不率從麛卵萌生咸保厥終不鄙不天樂哉融融皇治二章章八句太平封祀告成功也噫噫太平無象兮世烏得而知惟盛德可迹兮其封祀之儀東岱宗兮西汾脽禮上靈兮賔地祇皇有征兮吾民以嬉皇有祈兮吾民是私天敷佑兮俾皇之釐永世億寧兮無疆之基太平一章八句以上河南集曾易占易占字不疑致堯次子天聖二年進士知信州玉山縣坐法失官題洪州僧寺今朝才是雪泥乾日薄雲移又作寒家山千里何時到溪上梅花正好看能改齋漫錄謝伯初伯初字景山晉江人天聖二年進士許州法曹六一詩話天聖景祐間景山以詩知名余謫夷陵時景山方為許州法曹以長韻見竒頗多佳句余荅云参軍春思亂如雲白髪題詩愁送春盖景山詩有多情未老已白髮野思到春如亂雲之句故余以戲之也又如自種黄花添野景旋移髙竹聽秋聲園林換葉梅初熟池館無人燕學飛之類皆無媿扵唐諸賢而仕宦不偶終以困窮而卒寄歐陽永叔謫夷陵江流作險似瞿塘滿峽猿聲斷旅腸萬里可堪人謫宦經年應合鬢成霜長官衫色江波綠學士文章蜀錦張異域化為儒雅俗遠民爭識校讎郎才如夢得多為累情似安仁久悼亡下國難留金馬客新詩傳與竹枝娘典辭懸待修青史諫草當來集皁囊莫謂明時暫遷謫便将纓足濯滄浪六一詩話許昌公宇書懷呈歐陽永叔韓子華王介甫十年趨競浪求營因得閒曹减宦情亂種黄花看野景旋移髙竹聽秋聲驅馳賤事猶干祿約勒清狂為近名早晚持竿釣鱸鱖䨇溪煙雨一舟横宋文鑑句移家尚恐青山淺隠几唯知白日長劉諷都官致仕古今詩話葉清臣清臣字道卿長洲人天聖二年進士厯翰林侍讀學士權三司使出知河陽卒贈諫議大夫有集逰攝山棲霞寺仙峯多靈草近在東北維僧紹昔捨宅總持嘗作碑髙風一緬邈廢宇亦陵遲清泉潄白石霏霧蒙紫芝松蘿日蕭寂猿鳥自追隨遊人尠或詣隠者誰與期支郎篤清尚千里孤雲飛覽古玩青簡尋幽窮翠微顧予荷㦸守出宿簡書違憑師訪陳迹賸作攝山詩景定建康志大慈寺在天台縣寺門巽隅號佛隴為智顗法師宴坐處佛隴山沈茂草平林閒猶作誦經聲一心三觀休分别秋静山髙海月明天台山志先照寺一徑涼飈響萬松青霞紫霧祕靈蹤寒生列洞前溪雨聲到諸天午夜鐘山頂月髙猶駕鶴潭陰雲起舊降龍出塵境界無多遠已上金庭第七重四朝詩余靖靖字安道韶州曲江人天聖二年進士累除右正言知制誥出知古州經畧廣西南路安撫使儂賊平遷工部侍郎英宗朝拜工部尚書卒贈刑部尚書諡曰襄有武溪集山寺獨宿柴車走縣封窮途秋耿耿急雨帶溪聲殘燈背窗影驅馳下士身凄涼旅人景山寒夢不成愁多知夜永留題澄虚亭湖光湛寒碧簾影拂莓苔魚戲應同樂鷗閒亦自來雨餘輕靄合竹外雜花開久欲留詩去慚無綺靡才晚至松門僧舍懷寄李太祝日暮倦行役解鞍初息肩霧昏臨水寺風勁欲霜天蓼浦初聞雁人家半在船思君已惆悵黄葉更翩翩馬當呼鷗不至偶成呈同行諸官昔年曽汎馬當灣團飯喚鷗篙檝閒今日江邊飛不下應知人世足機關送靈谷山人萬樹秋風一路蟬渡頭重檥木蘭船自慚蹙頞非竒骨擬問清朝躍馬年以上武溪集曽公亮公亮字明仲㑹子天聖二年進士嘉祐中拜吏部侍郎同中書門下平章事熙寧二年進昭文館大學士累封魯國公旋以太保致仕卒贈太師中書令諡宣靖宿甘露僧舍枕中雲氣千峯近牀底松聲萬壑哀要看銀山拍天浪開窗放入大江來鎮江府志黄孝先孝先字子思浦城人天聖二年進士為宿州司理以薦遷大理丞知咸陽縣終太常博士余嘗守官咸陽縣廨之後臨渭河汀嶼中連嵗中有孤雁來棲於葭葦中今嵗冬深不復至矣或已在矰弋或去而之他皆不可知也感而為詩題亭壁天寒霜落雁來棲嵗晚川空雁不歸江海一身多少事清風明月我霑衣侯鯖錄弔宿州妓張温卿人生第一莫多情眼看仙花結不成為報兩京才子道好將詩句弔温卿句恩同花上露留得不多時能改齋漫錄宿州妓張玉姐字温卿色藝冠一時沈子山為獄掾最所鍾愛罷官途次南京念之不忘為剔銀燈一闋云一夜隋河風勁霜混水天如鏡古栁長堤寒烟不起波上月無流影那堪嬾聽踈星外離鴻相應須信道情多足病酒未到愁腸還醒數叠蘭衾餘香未減甚時枕鴛重竝教伊須更將盟誓後言約定其後明道中張子野黄子思相繼為掾尤賞之偶陳師之求古以光祿卿來掌𣙜酤温卿遂托其家僅二年而亡才十九嵗子思以詩弔之云云先是子思有愛姬宜哥客死舟中遺言𦵏堤下冀他日過此得一見以慰孤魂子思從之作詩納棺中其斷章云云二人皆𦵏宿州之東日者未知裴令貴世人爭笑禰生狂詠懐風簾燕引五六子露井榴開三四花春明退朝錄孫甫甫字之翰陽翟人舉進士歴右正言遷天章閣待制河北轉運使有集成都運司園亭詩和章質夫小亭蕭森玊谿南小亭屹相向使華雙軺車禪境二方丈固將物理齊室隘志自廣松竹周四簷足以備幽賞西園小閣連雪峯憑䦨憙幽玩紅接海棠洲緑對篔簹岸有時開尊罍波影浸几案何須架長虹然後沖雲漢成都文類句衰病自憐無酒趣塵容猶賴有詩情乞茶厯代吟譜周元明同胡武平遊南園爛漫花時錦繡張無端下馬繫垂楊山亭水閣笙歌地合與行人作醉鄉呉郡志張方平方平字安道宋城人舉茂才異等為校書郎英宗朝累遷禮部尚書出知鄆州神宗即位拜參知政事致仕薨贈司空謚文定有樂全先生集冷齋夜話張文定慶厯中嘗為滁州遊瑯琊山藏院俛仰久之呼左右取梯升梁得經函發之得楞伽經餘半巻未冩忽悟前身盖知藏僧也冩楞伽經未畢而化因續書殘軸筆蹟宛然如昔因號二生經後以此經授東坡為序其事代冩此經刻於浮玉山龍逰寺呉江道中寄王君貺侍郎畫船浮震澤煙水接秋空一霎過雲雨滿帆開岸風酒旗蓮蕩裏僧刹橘洲中何似并州路塵髙馬隊雄蘇子曕寄鐵藤杖隨書初見一枝藤入手方知鍜錬精遠寄只緣憐我老閒攜常似共君行静軒獨倚身同痩小圃頻遊腳為輕何日歸舟上新洛拄來河岸笑相迎題歌風臺落魄劉郎作帝歸樽前感慨大風詩淮陰反接英彭族更欲多求猛士為題沛縣漢髙祖廟中酒踈狂不治生中陽有土不歸耕偶因世亂成功業更向翁前與仲爭以上樂全先生集石林詩話安道未第時貧甚衣食殆不給然意氣豪邁未嘗少貶與劉潛李冠石曼卿往來山東諸郡任氣使酒見者皆傾下之沛縣有漢髙祖廟并歌風臺前後題詩甚多無不推功頌德獨安道詩云云盖自少已不凡矣送蘇子由監筠州酒稅可憐萍梗飄蓬客自歎匏𤓰老病身從此空齋挂塵榻不知重掃待何人苕溪漁隠叢話東坡言元豐三年家弟子由謫官筠州安道口占此詩為别巳而涕下安道平生未嘗出涕向人也王琪琪字君玉華陽人徙舒舉進士調江都主簿歴官知制誥加樞密直學士耆舊續聞翰林學士彭乗不訓其子文學参軍范宗翰學士責之曰王氏之琪珪玘琰器盡璠璵韓氏之綜絳縝維才皆經緯非䕃而得由學而然緗素雜記西清詩話言王君玉謂人曰詩家不妨間用俗語尤見工夫雪止未消者俗謂之待伴嘗有雪詩待伴不禁鴛瓦冷羞明常怯玉鉤斜待伴羞明皆俗語而採拾入句了無痕纇此㸃瓦礫為黄金手也鍾山語錄或歌王琪詩句荆公曰琪詩時有竒句然雕鐫不自在石林詩話晏元獻守南都王君玉時巳館閣挍勘公特請於朝以為府僉判朝廷不得巳使帶館職自君玉始賔主相得日以賦詩飲酒為樂佳時勝日未嘗輙廢也嘗遇中秋陰晦齋厨夙為備公適無命既至夜君玉密使人伺公曰巳寢矣君玉亟為詩以入曰只在浮雲最深處試憑弦管一吹開公枕上得詩大喜即索衣起逕召客治具大合樂至夜分果月出遂樂飲逹旦前輩風流固不凡然幕府有佳客亦自如人意也堯山堂外紀王琪張亢同在晏元獻幕張肥大王以太牢目之王痩小張以彌猴目之一日有米綱至八百里村水淺當剥載張往督王曰所謂八百里駁也張曰未若三千年精矣琪嘗嘲亢曰張亢觸藩成八字亢應聲曰王琪望月呌三聲題揚州九曲池越調誰家曲當年亦九成哀音已亡國廢沼尚留名儀鳯終沈影鳴蛙秖沸聲凄凉不可問落日背蕪城復齋謾錄晏元獻赴杭州道過維揚憇大明寺瞑目徐行使侍史誦壁間詩戒其勿言姓名終篇者無幾又誦一詩云云問之乃江都尉王琪所作召至同飲又同步池上時春晚巳有落花晏云每得句或彌年未嘗强對且如無可柰何花落去至今未能也王應聲曰何不云似曽相識燕歸來晏大喜由此薦為館職未知杭州復苕溪漁隠叢話昭陵諸臣傳元獻齋所記誤也金陵賞心亭千里秦淮在玉壺江山清麗壯吳都昔人已化遼天鶴舊畫難尋卧雪圖冉冉流年去京國蕭蕭華髪老江湖殘蟬不㑹登臨意又噪西風入座隅湘山野錄賞心亭丁晉公出鎮日重建秦淮絶致清在軒楹取所寳周昉袁安卧雪圖張於亭之屏凡經十四守雖極愛而不敢輙覬偶一帥竊去以布畫鴈掩之君玉復守是郡登亭留詩云云詩與江山相表裏為貿畫者之蕭斧也題招隠寺蒼崖何蟠回嘗為隠君宅宋戴顒善琴隠居此山孰謂人琴亡松風正蕭瑟花閒雪英舞衛公玉蘂詩在焉鹿去嵓泉冽山有鹿跑泉唐蒋防為之銘經聲草堂廻天香中夜發月落山氣深清猿嘯亦絶如何人外迹輕為世網别玉蘂辨證聞盗紅梅種遺晏同叔館娃宮北發精神粉痩瓊寒露蘂新園吏無端偷折去鳯城從此有雙身石湖梅譜承平時紅梅獨盛於姑蘇晏元獻公始移植西岡圃中一貴逰賂園吏得一枝分接由是都下有二本王君玉時守吳郡聞盗花種事以詩遺公當時罕得如此秋日白鷺亭向夕有感一云向夕風晦有作白鷺敞西軒檐宇窮爽塏千峯若連環翠色不可解是時天宇曠六幕無纖靄金斗熨秋江素練横衣帶乾坤清且斂氣象朝昏改蘆花作雪風飛舞來滄海九宵汀鷺起萬里檣烏快月上三山頭烏没横塘外蒼茫洲渚寒錯落星斗大開樽屏絲竹披襟向簫籟余生本江湖偃蹇欣所㑹清興雖自發苦嗜亦吾累魚龍憑夜濤四面忽滂湃安得然犀燈煌煌發水怪清輝殿觀唐明皇山水石字歌皇家四葉恢聖功天臨日燭清華戎漢條静治洽柔教老心稽古開神聰有唐英主稱好文仙毫灑落驅風雲壯哉山水有竒字煥乎八法存翠珉自從棄置咸陽道蘚駮煙滋委宫草天開神贊㑹休辰甄收再作皇居寶如何淪棄三百春迎逢睿鑒來紫宸奎鉤粲粲光華動羣玉森森氣象新丹籞春妍瑞靄深文梁藻棟結芳林鴻翔鳯翥徑方丈杯流泉湧䝉親臨鯫臣榮幸從金輿鉤婉魂驚拭目初多慚攬筆非清藻惟慶千齡際帝圖答永叔問月斑斑踈雨寒無定皎皎圓蟾望欲䦨應在浮雲儘深處更憑絲竹一催看以上宋文鑑絶句香溪春老誤尋芳只有愁雲暎夕陽今日重來已如此何須更問海生桑正月初弦二月賖小園春事已如麻强誇力健因移石不減公忙為種花後村詩話句疾風甚雨青春老痩馬疲牛緑雨深優古堂詩話隴鴈半驚秋似水征人相顧月如霜聞角話西清詩露槿東西照風荷向背愁凉吹易成團扇恨夕陽偏結小窗愁後村詩話余良肱良肱字康臣洪州分寧人天聖四年進士調荆南司理参軍厯三司判官光祿卿知宣州提舉玉隆觀曰璐按汴京遺蹟志載宋登科記天聖三年四年停貢舉而余良肱史作四年進士未知孰是和蔣穎叔涇溪畫舸夷猶紫翠閒暮雲如埽月如環三山六刺須臾過恰似嚴陵七里灘寧國府志韓琦琦字穉圭安陽人天聖中進士第二厯同中書門下平章事集賢殿大學士累封魏國公薨贈尚書令諡忠獻徽宗論定䇿勲贈魏郡王有安陽集迂叟詩話韓魏公罷相守北京新進多凌侮之魏公鬱鬱不得志嘗為詩云風定曉枝蝴蜨閙雨匀春圃桔橰閒時人稱其微婉古堂自為記皇朝類苑韓魏公知定州因作閲刻於石後人又畫魏公像於堂上宋子京知定州作樂歌十闋其一曰聽説中山好韓家閲古堂畫圗真宰相刻石好文章魏公聞之不喜和邃卿學士雪霽登祕閣曉來延閣步層梯春色周圍一望低殘雪半留珠殿冷非煙長䕶綺窗西幽情自逐歸鴻斷芳意還應遠樹迷金匱有書猶未見祕封香篆鎻芝泥九日水閣池館隳摧古榭荒此延嘉客㑹重陽雖慚老圃秋容淡且看黄花晚節香酒味已醇新過熱蟹螯先實不須霜年來飲興衰難强漫有髙吟力尚狂皇朝類苑魏公在北門重陽宴諸曹於後園有詩一聨云不羞老圃秋容淡且看黄花晚節香公居常謂保初節易保晚節難故晚節事尤著所立特完又作喜雪詩一聨云危石盖深鹽虎陷老枝擎重玉龍寒人謂公身雖在外自任以天下之重如此和御製賞花釣魚詩花蔟香亭萬朶開琱輿髙自九天來輕陰閣雨留天仗寒色凝春送夀杯仙吹徹雲終縹緲恩魚逢餌㡬徘徊曽参二十年前㑹今備台司得再陪李壁王荆文公詩注公既進詩或言於上曰韓琦譏切陛下上愕然問之對曰琦二十年而得一再侍宴此正譏陛下飲宴無度也上大笑和春卿學士栁枝詞章臺風曉起新眠寒食輕陰未雨天無限青絲拂遊騎一生芳意負金鞭以上安陽集早夏脱幘吏休後凴軒風快餘瀑泉増瀨急新葉補林疎暑初天未熱觀閣進新涼果熟愁枝重荷生覺渚香十里溪源注北塘貯成寛碧澹泱泱新蒲弱荇参差綠去鶩來鳬斷續行一䌫輕波搖鷁舸滿罾斜日曬魚梁使君思拙無清夢髙栁陰成草自長吳禮部詩話韓魏公手書早夏三詩備蕭㪚閒適之趣安陽集所無包拯拯字希仁廬州合肥人天聖五年進士厯官龍圖閣直學士御史中丞知開封府權三司使樞密副使遷禮部侍郎辭不受卒諡孝肅書端州郡齋壁清心為治本直道是身謀秀幹終成棟精鋼不作鉤倉充䑕雀喜草盡狐愁史冊有遺訓母貽來者羞廬州府志吳奎奎字長文濰州北海人第進士神宗朝厯官樞密副使参知政事以資政殿大學士出知青州卒贈兵部尚書諡文肅雲門留運上人房雲門入雲深樹密山轉幽溪亭修竹裏激激玉泉流仁智所遐想古今為勝遊我乗休沐至窮覽浩難周金碧樓殿午寒香松桂秋清風連髙興飄越不可收禪師索題詩投筆事冥搜欲速馳思遠頃刻厯九州象外有真物惝恍難為求徒勞陳熟言羞澀為爾留汎五雲溪由鑑湖歸樵風漾歸舟飄然一葉輕曲岸超忽遠四山回抱明幽禽淡容與荷芰相低傾田野多收穫村叟時逢迎歡言無物役得我遊覧情日腳暮雲起湖面寒煙生秋光湛空碧彷彿見重城候吏津亭外稍聞笳鼓聲以上雲門集句奚車一牛駕朝馬兩人騎使北詩話總龜趙抃抃字閲道衢州西安人進士及第厯官龍圖閣直學士知成都神宗朝擢参知政事以資政殿大學士出知外郡加太子少保致政卒贈太子少師諡清獻有集石林詩話趙清獻以清德服一世平生蓄雷氏琴一張鶴與白龜各一所向與之俱始除帥成都蜀風素侈公單車就道以琴鶴龜自隨蜀人安其政治聲籍甚元豐間既罷政事守越再移蜀公時老矣過泗州渡淮前巳放鶴至是復以龜投淮中乃入見先帝問云聞卿前以匹馬入蜀所攜獨琴鶴㢘者固如是乎公頓首謝故其詩有馬尋舊路知歸去龜送長淮不再來自紀其實也暖風薄袂歌雲散輕雲舞䄂低簾踈蕩樓閣塵暗逐輪蹄絮亂垂楊道香流種藥畦春窗惱春思一枕杜鵑啼芳草翠密馴文雉叢深隠畫輪離披金谷曉寂寞茂陵春古渡班荆客長堤走馬人芊芊似袍緑一雨一番新杜鵑響亂書窗外人驚夢枕中江城啼曉月澤國愬春風栁道盤飡綠桃園蹀􅉜紅年年來此地留恨任西東寒食郊園即事城郭青煙散郊園䴡日長鬭雞紅錦翅遊騎紫絲韁有蜨俱含粉無人不惜芳儘􅂸花下飲歸去醉成鄉和何節判觀水澄江抵練長極目路蒼茫煙芷差差綠風荷柄柄香西流終古恨南浦鎮時忙擬待傳辭意離人在楚鄉題戲綵堂我憇堂中樂可知優游踰月竟忘歸老萊不及吾兒少且著朱衣勝綵衣以上趙清獻公集蓉塘詩話宋趙㞦崪温州時其父清獻公致仕家居㞦迎以就養作堂名戲綵公題詩堂中云寄張山人時再領成都不同参政初時入謂呂餘慶也學尚書兩次來謂張乖崖到日先生應笑我白頭猶自走塵埃澠水燕談治平初龍圖閣直學士趙公抃鎮成都有張山人者數至李道士舍一日語李曰龍圖公促治裝行當入覲且參大政矣趙聞而異之未㡬果應召命乃參政柄及鎮青社熙寧五年張遺書云當來相見公大喜久之無驗至秋公奉詔再領成都方悟曰山人言來乃吾當往也將行先寄張云云王陶陶字樂道京兆萬年人天聖五年進士神宗朝厯簽書樞密宣撫陜西還為侍讀學士知蔡州卒贈吏部尚書諡文恪有竇復者世居鎮戎能道邊事君不見鎮戎德順弓箭手耕種官田自防守相團置堡禦蕃軍下視賊庭殊不有殺羊取骨然艾炙試卜賊兵知入寇都校招呼入堡居堡外重圍百里餘牆低城小不難破賊箭如棚城上過堡中不及數十人且鬭且罵且欣欣登陴斫門謂平取應弦死傷已無數窗間走箭射酋豪一箭已聞哭聲舉争將錦囊裹賊屍鳴金收衆唯恐遲不唯城堡依然固吾衆不傷毫與釐自從干戈動西鄙覆軍殺将曽無恥朝廷未省遺邊功何事此勲不能紀安得天兵百萬衆盡如此輩堅且勇宋文鑑龔宗元宗元字㑹之崑山人天聖五年進士厯都官員外郎有武丘居士遺槀吳郡志中隠堂在大酒巷都官員外郎分司南京龔宗元所居取樂天詩大隠住朝市小隠入丘樊不如作中隠隠在留司間乃作中隠堂與屯田員外郎程適太子中允陳之竒遊從極文酒之樂皆耆德碩儒挂冠而歸者吳人謂之三老六月吟曦輪獵野枯杉松火焚泰華雲如峯天地爐中赤煙起江湖喣沬烹魚龍生獰渇獸辱焦斷峻翮無聲落晴漢饑民逃生不逃熱血迸背皮流若汗玉宇清宮徹羅綺渴嚼氷壺森貝齒炎風隔斷真珠簾池口金龍吐寒水象牀珍簟凝流波瓊樓待月微酣歌王孫晝夜縱娛樂不知苦熱還如何夜宴作魄侵堦夜三刻蜀錦堆香花院窄風動簾旌玳􅈘寒露垂蟲網珍珠白美人正席羅弦管綺幄雲屏爐麝煖只愁金壺漏水空不怕鸞觴琥珀滿勸君莫負秉燭遊曽見古人傷晝短贈處士林逋髙􅌃遺塵蛻含華傲素園璜溪頻下釣蕙帳不驚猿養浩時清嘯忘機只寓言幾回生蜨翅明月在西軒送陳君子之四明短亭祖帳接平川栁拂回波繫畫船漸向落暉分繡袖忍聽離曲怨鵾弦雲連稽嶺應懐古路近光源好訪仙那更憑髙望天際江堤煙重草綿綿𢷬砧詞星游耿耿寒煙浮白龍銜月臨霜樓誰家砧弄細腰杵一聲𢷬破江城秋䨇桐老翠墮金井髙低冷逐西風𦂳静如秋籟暗穿雲天末驚鴻斷斜影哀音散落愁人耳何處離情先喚起長信宫中葉滿堦洞庭湖上波平水萬里征夫眠未成揺風𢷬月何丁丁楚關秦嶺有歸客一枕夜長無限情以上中吳紀聞丘濬濬字道源黟縣人天聖五年進士為句容令厯官至殿中丞後在池州一日起盥沐索筆為詩端坐而逝衆謂尸解有洛陽貴尚錄古今詩話丘濬十嵗謁陳州太守令對弱栁絲絲搓綠線對云春雲片片掲新綿翰府名談丘寺丞失意徧遊諸郡至山陽郡守屢召之夜飲翌日作詩曰醜卻天下美人面正得世間男子心郡守它日再為文字之飲以謝之又至五羊贈太守詩云堦上腥臊堆蜆子口中濃血吐㯽榔又云風腥蠻市合日上瘴雲紅守見之不懌淵聖皇帝要錄靖康中金人圍京城朝廷急於命將有郭京者自云用六甲法可以擒敵朝廷錫以金帛使自募兵有賣線皃京授以將命又有劉無忌乃賣藥道人常倒植泥中乞錢亦作統制官盖取丘濬詩有郭京楊式劉無忌皆在東南卧白雲之讖郭京出前軍為金兵一掃而空城遂陷寺中聞射因成十嵗時作殿宇時聞燕雀鳴虚庭盡日少人行孤吟獨坐情何限時喜風傳中鵠聲古今詩話至儀真太守召看牡丹何事化工情愈重偏教此卉太妖妍王孫欲種無餘地顔巷安貧欠買錢曉檻競開香世界夜闌誰結醉因緣須知村落桑麻處田叟饑耕婦不眠贈五羊太守碧晴蠻婢頭蒙布黑面羌人耳帶環㡬處樓臺皆枕水四周城郭半圍山以上翰府名談秩滿寄茅山道友鳴鳯相邀覽德輝松蘿從此與心違孤峯萬仭月正照古屋數間人未歸欲助唐虞開有道深慚巢許勸㤀機明朝又引輕帆去紫术年年空自肥新安志詠錢塘南屏髙瞰府城西畫舸千艘共醉迷四柱臺邊烟是幕百花橋畔葑連隄龍檀咽路迎轝隼綺繡登山汙粉題暮色沈沈郛郭閉寶燈輝映梵天低咸淳臨安志吳育育字春卿建安人天聖五年進士累官樞密副使參知政事尋以資政殿大學士尚書左丞知河中府徙河南卒贈吏部尚書諡正肅有集題峴山石幢羊公千載得清吟芳跡雖遥契昔心更與峴山為故事凛然風格照來今襄陽府志王含章含章處州守題仙都府三年為郡仰靈蹤咫尺無因到此中長是徘徊看圖畫果然崷崒在虚空雲歸湖頂塵難染鶴立松梢路莫通春過碧溪人玩少古壇牢落雨濛濛仙都山志孫抃抃字夢得眉山人天聖中進士累遷知制誥翰林學士承㫖拜參知政事諡文懿有集郡齋讀書志孫抃六世祖長孺喜藏書貯以樓蜀人號書樓孫家端午日皇后閤帖子詞蟠桃映砌晨烟薄紫桂凌霄晝露晞窈窕漢宫三十六齊將綵縷祝坤闈萬功寶笈千齡藥又賜金盤五色𤓰從此仙源昇福遠綿綿不獨頌周家古今嵗時雜詠彭應求應求廬陵人渠陽推官思永之父宿崇聖院公程無暇日暫得宿清幽始覺空門客不生浮世愁温泉喧古洞晚磬度危樓徹曉都忘寐心疑在沃洲濓溪先生宋詩紀事巻十一
