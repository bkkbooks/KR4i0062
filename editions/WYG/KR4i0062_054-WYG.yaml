body:
  text: 宋詩紀事巻五十四錢塘厲鶚撰胡朝穎朝穎字達卿淳安人乾道八年進士官提刑有靜軒集風鈴風不能調碎玉聲宫商濫奏竟難名誰家稚女敲方響一曲從頭學不成旅夜書懐十日春光九日陰故闗千里未歸心遥憐兒女寒窗底指㸃燈花語夜深以上前賢小集拾遺小金山天光雲影碧相涵百頃玻璃一望閒緑水遶門迷客渡白雲終日伴僧閑疎鐘破曉潛虯動老木成隂倦鳥還喚取頭陀磨石壁為渠題作小金山淳安縣志王孝巖孝巖吳興人乾道八年進士淳熙閒處州推官舫齋孝巖建我本湖漘一漫郎生來住處波茫茫時尋畫舸破烟水菰蒲滿路荷花香一川窈窕詫紅蓼兩岸蘆葦明秋霜船頭鷗鳥日來徃溪上風月相迎将一行作吏便相失合眼靈運春池塘紛紛雁鶩實可厭紙尾姓字隨低昂簿書終是俗人甚江湖到了難相忘公餘頼有數椽在疎櫺兩行如船裝不知風波世路險穏著萬斛隨風檣人生短篷何日近向來苕霅今括蒼江山轉柁千萬里故人兩地遥相望誰能為我幻竹葉頃刻泛宅歸滄浪秖憑平生氣湖海隨所寓處為艅艎夜寒滿載明月窗北風打頭人不忙動來况自不如靜悔吝不到虚舟傍胸襟五湖與三江是中莫測誰望洋直湏喚取李郭輩相與共泛無何鄉處州府志陳傅良傅良字君舉溫州瑞安人乾道八年進士寧宗朝累遷中書舎人除寳謨閣待制卒諡文節有止齋集止齋即事教子時開巻逢人強整襟最貧看晚節多病得初心地僻茭蓮好山低竹樹深寄聲同燕社明日又秋砧題仙巖梅雨潭衮衮羣山俱入海堂堂背水若重闉怒號懸瀑從天下傑立蒼崖夾道陳晉宋至今堪屈指東南如此豈無人結廬作對吾何敢聊向漁樵寄此身癸丑冬車駕過宫畱相還朝一聲警蹕接天齊馳道無塵馬不嘶月御順行隨日轂乾端和氣帀坤倪三槐相繼歸公衮細柳還湏聽将鼙老矣尚能歌二聖不應專羙在浯溪以上止齊集劉爚爚字晦伯建陽人受學晦翁東萊之門乾道八年第進士寧宗朝累遷國子司業奏乞罷偽學之禁擢權工部尚書兼太子右庶子卒贈光禄大夫諡文簡有雲莊外集金國賀正旦使人到闕錫宴紫宸殿榆關玉塞靜無塵嘉定于今第四春兩國交馳通好使八方同作太平人翠鼉鼓奏娛嘉客白獸樽浮賞諫臣聖壽從兹天共逺年年玉帛㑹楓宸瑞慶聖節集英殿宴皇家卜世過周唐天啟真人應運翔抱日預占恭邸夢飛龍曾報皖山祥翠雲影外來金母紅霧香中擁玉皇樂府賦工無以祝願将金鑑代珠囊東宫鶴駕通宵入問安龍墀清曉狎朝班天顔喜見重輪月春色先回萬歲山皇帝閣春帖子東風昨夜入簾帷便覺深宫漏影遲一曲涼州花盡放不湏更作報春詩以上雲荘外集李大異大異字伯珍隆興府新建人乾道八年進士仕至諫議大夫知建康府曾兄惠然見臨篤敘世契示以先哲遺墨稽首敬觀因題其後嘉泰壬戌七夕前三日家傳文獻六經香袖有驪珠日月光喬木陰陰人已逺秪應故笏在甘棠鐵網珊瑚姚宋佐宋佐字輔之郴州人乾道八年進士為靜江府敎授梅月吟梅花得月太清生月到梅花越様眀梅月蕭疎兩竒絶有人踏月繞花行詩人玉屑丁逢逢晉陵人乾道進士官至寶謨閣待制知郴州次袁尚書巫山十二峯二十五韻半雨半晴山弄姿溼雲吹風不成癡蘼蕪漸徧楚宫碧蒲萄未漲巴江遲西南大尹初渉境山川效職加瑰竒翠屏窺窗故娟妙松巒暎柁相參差浮雲擊汰睨青壁靈君一去今安之吟情浩蕩隘宇宙萬景敢云驕莫隨當年楚境半天下孱王醉夢方昏疲珊珊玉佩赤帝女星髾羽蓋蜺旌旗錫符賜䇿豈無意侍臣託諷褰幬帷尹今文采繼騷雅夢得詩魂羞竹枝吾行一百八盤上鑽天但覺雲天低荒荒野驛虎豹怒陰陰嶺樹猨猱嬉危登險陟倦三伏口呿背浹嗟胡為豈知舟行有竒觀山靈祕惜畱歸時青簾白舫夙巳具芒鞵布韈将從兹胷中丘壑未塵土頭上歲月從驅馳雖無勝具逐支許尚有樂趣同周施何當投劾便歸去登船打鼓清江湄更催尺一喚公覲同看二六浮脩眉常山蛇陣想魚復建溪龍焙傾蟇頤攤錢晝浪看三老杖藜晩岸尋名緇昔人汶嶺寄書帖更歌蜀道先吁嘻未若尹外岳牧中丞疑愛春江之赴滄海清明秋月之挂峨嵋盡驅三峡波濤筆第入思齊訪落詩全蜀藝文志到郴眼界山逾碧腰輿歩轉高未疑禦魑魅自笑尹鼯猱末路成三折衰年感二毛次山雖漫仕安敢遽辭勞郴州文志蔡幼學幼學字行之瑞安人乾道進士寧宗朝累官權兵部尚書兼太子詹事卒諡文懿有育德堂集田圍野水萍無主晴風草自香庭陰新似染物色去如忙岸樹魚依緑畦花蜨鬬黄家園向來夢靜數四年強東甌詩集廖德明德明字子晦南劒人受業朱子之門登乾道進士歴官吏部左選郎官奉祠有槎溪集鬱林郡城荒烟漠漠雙江上往事悠悠野戍孤春到偏臨青草渡夢中猶記白鷗湖粤西詩載石孝友孝友字次仲南昌人乾道進士以詞名有金谷遺音釣臺桐江波上一羊裘釣得聲名隘九州天子曷嘗遺故舊先生不肎事王侯釣臺集張貴謨貴謨字子智遂昌人乾道中進士光宗朝除吏部郞中使金轉朝散大夫嘉泰中直敷文閣知靜江府題睢陽五老圖駟馬鮮能容白髪萬釘終不潤黄壚烏鞾席㡌紅塵裏幻出睢陽五老圖鐵網珊瑚王炎炎字晦叔婺源人乾道進士始令臨湘慶元中官著作佐郞出守湖州有雙溪集題徐參議所藏唐人浴兒圖右相嘗慚呼畫師技癢仍復拈毛錐逼真誰作此贋本亦有妙意生妍姿中庭燕坐必主婦綠雲髙髻香羅衣嫣然嬪妾左右侍前浴能言丹鳳雛娉婷及筓女公子素腕擁項相攜扶兩兩為朋四髫齔乳盧隨逐為諧嬉掌中看珠二少艾捧顋郤立鴉鬟奴屏閒擁膝袖玉筍疑是夢闌顰翠眉側身背面按箏者冰肌綽約不自持牀前跪起各姝麗為兒理髮抆淚洟有犬斕斑受摩撫與人習熟無猜疑梳妝淡薄服製古如見永徽貞觀時若非侯家及主第人物無此羙且都荆釵布襦小家子生子不如山下麑題姜堯章舊遊詩巻出郭栽花渉小園歸調琴譜輯詩編少年豪健今揫斂休羨騎鯨李謫仙以上雙溪集林淳淳三山人乾道八年以嘉議郞為涇縣令修復古塘民多稱之琴溪湛湛長溪水飛橋逺近通客喧墟市合仙去釣臺空欲辨磨崖字忽聞遵渚鴻僧無贊公趣誰與論崖中寧國府志滕珂珂南郡人宣城縣丞謁梅都官墓百年詩老卧空山猶憶當時語帯酸嬴得兒童喚夫子可憐名位秖都官手編新史唐文備骨立殘碑漢籒漫落日牛羊上丘隴草埋翁仲獨峩冠宛陵集附李石石字知幾資陽人乾道中以薦任太學博士出為成都倅有方舟集文獻通考李石紹興末為學官乾道中為郞歷麾節以論罷趙丞相雄其鄉人也素不善石石是以晚益困其自序云宋魋魯倉今猶古也瞿唐峽我行江南上峽來繫舟夜泊雲雨臺行到西川一萬里杜鵑聲急桃花開到夔門呈王待制手挈東風上水關鳳書迎日看新班五湖家世烏衣巷三峽樓臺赤甲山畫㦸門開春晝永臥龍帳穩海波閑安危大計湏公等天定應知即賜環以上全蜀藝文志禮殿漢人祀周公為先師故鍾㑹記云周公禮殿范蜀公鎮云屋制甚古非近世所為秦漢以來有也内翰王素云其屋制絶異今制後之葺者惜其古不敢改作蜀侯作頖錦水湄先聖先師同此室巍然夫子據此座殿以周公名自昔聖人兩兩如一家均是周人先後出東家想見中夜夢猶與古孫同衮舄斯文授受乃關天不為漢唐加損益我時來視俎豆事重是漢人斤斧迹漢宫制度九天上散落人閒此其一多因豐屋起戎心獨此數椽綿歲歷規摹􅰕嵲東魯似氣象縹緲西岷敵竹松猶是斯干詩風雨方知隆棟吉雖然漢獻來至今閱時巳多駒過隙中閒豈無鳥鼠慮妙斲不知難輒易工師不揆亂如麻敢向殿門言匠石詩書譬彼尚闕文後學如何補遺逸祖龍非意竊登牀科斗有心求壊壁舊章僅在命如絲誰勒吾詩勝丹浹成都文類句畱船買魚作寒節元遺山詩注錢竽竽字仲韶端禮姪乾道閒直祕閣出守處州少微閣在處州治後郡守關景暉建米芾書額少微閣應少微星㸃㸃雲閒分外明過雨曉來添練水好山晴後見蓮城昔年人物不常有近世英豪多閒生顧我把麾慚坐隱落霞孤鶩看題名括蒼彚紀林憲憲字景思吳興人乾道中特科監南嶽廟參政賀子忱愛其才以孫女妻之因寓居天台賀亡挈其孥居城西之蕭寺有雪巢小集梅礀詩話鄉人雪巢林憲景思紹淳中前輩後居天台少從侍郞徐敦立度游度得句法于魏昌世衍實後山陳公嫡派也梁溪尤公延之序其詩言景思喜哦初不鍛錬而落筆立就渾然天成無一語蹈襲唐人之精于詩者不是過楊公廷秀亦云景思之詩似唐人尤楊二公少所許可其論景思詩如出一口非溢羙也近世三衢鄭景龍編宋百家詩續選摘出羣花飛盡楊花飛楊花飛盡無可飛天空霜無影等句謂其超出詩人準繩之外亦非虗語文獻通考陳氏曰景思人高尚詩清澹五言四韻古句尤佳殆逼陶謝讀陶詩作吾觀淵明詩了不在言賦有如太和氣周行不停駐時與春為風融和物華布未嘗見用力萬物榮處處時與秋為月浩然無㸃注江山滋清絶宇宙靡纖汚乃知淵明詩本不在詩故邂逅吐所有氣象隨所寓乞食不為拙華軒不為慕歸來不為高折腰不為沮羲皇平歩超無懐真雅素簡談豈能盡學者謾馳歩獨有無弦琴明明一斑露劉後村詩話梅花野梅空山中正為照人開如何緑窗底珠暎帶蒼苔頗似古君子無人自不諧竹徑酒初醒一信清香來全芳備祖寓天台水南春雨暗前山春雲行逺林月落雞犬靜誰聞梁父吟巍巍兮髙山泠泠兮好音誰聞梁父吟唯恐山不深台州兜率寺春江潑天明蕭寺踞山塢荒堦下鳥雀古木颯風雨徐行石苔花徙倚望江渚日暮山更寒簷頭鈴自語寺門矙南江江勢浩相嚮風雲互吞吐山色豁林莽潮頭捲飛烟白雨挾春漲中夜鵝鶩喧誰家海船上以上赤城詩集句柔櫓晩潮上寒燈深樹中汲水延晚花推窗數新竹天空霜無影誠齋詩話王從從字正夫文正公五世孫乾道中添差台州倅知信州有三近齋餘錄次韻張彥晉秋日地迥高樓目天寒故國心江鷗無萬里雲木自千尋門掩斜陽下人歸落葉深風前悵何許入耳越鄉吟前賢小集拾遺句涼風回逺笛暝色帶歸舟塵心依水淨歸鬢與山青一畨風雨催寒食千里鶯花想故園身閑更得憑陵酒花早殊非愛惜春以上誠齋詩話王素素乾道中漢中郡守重修山河堰畫隼精明破曉暾恰逢寒食過江村輕烟飛絮漢中道白葦黄茅渭上屯人力萬工支水派天心兩邑漑川原柳營一飽源頭看夜雨新肥拍岸㾗陕西通志滕㢗㢗乾道閒人桂林西湖再開呈張經畧維隱然重望壓邊城號令風行玉帳兵詩思江山真得助威聲草木盡知名要令萬頃窺黄憲不把千畦付麴生坐使勝遊還舊觀追隨那得勝公榮桂勝梁竤題陸賈大夫廟劉郎辛苦逐秦鹿尚欲長鞭及馬腹蠻夷大長夢不驚海邊椎髻乘黄屋江淮貔貅始閑暇忍使驅令渡篁竹陸生手持尺二組喚起老子同分肉詩書尚曉罵儒翁豈憂傑驁難拘束築壇再拜受王印雄辨泠泠聽不足當時未有北人輔畱寓年深染汙俗乍聞髙論耳目清如掩笙篁奏冰玉境中勝處應更履更泝餘皇到山麓大夫何獨粤人重漢廷公卿俱竦服陳平竒計湏深念張子全身甘辟糓此外侯王希識字帶礪功存半誅戮惟君坐使将相歡燕喜優游劉氏福年少終軍學髙歩空有英稱命難續乃知智者應世閒妙似庖丁奏刀熟往事浮雲變滅盡越水悠悠浸山緑荒祠寂寞傍僧居日暮飢鴉噪喬木我來三歎重遲留為酌寒泉薦秋菊夷堅志乾道間梁竤入都檥舟廟下夜夢一客自稱陸大夫云我抑鬱于此千餘歲矣君幸見過願留一詩遂題詩于壁而去單夔夔錢塘人乾道中以奉議郎知湖州官至侍從次楊咸亨江郊亭新成二十三韻瞿塘一門江水傾羣趨激射隨奔鯨舟車冠蓋湊蜀道孰問張丈連殷兄相逢來往問地主太守詎敢㤀将迎白崖候館乆茅蕝近即野處披榛荆屏修啟剔作廬舎夙戒里旅遲留行有如授館及郊勞舉國定制誰先鳴錢唐鄙人何所似抵掌自視鴻毛輕食焉抑畏墮偷懦汎觀彼已同虚盈山蹊水滸肆登賞靡嗜傑閣誇崢嶸朋從簪盍得衆雋塵譚冰釋欣初晴鼎新質我築斯館棟宇不貴朱連甍入門便足庇風雨揭榜郤借江郊名時哉蓮幕有嘉客落筆能令風雨驚聯篇累牘溢我目粲在麗藻舒我情人生晤合良快意胡為四美嗟難并日光天際發豐蔀此去可並依離明直排閶闔出灩澦肅肅東首歌宵征循崖履坦夐無阻為君留取能詩聲此榜與詩儻不朽此館想同江水清我來歲月媿銷縮整纓輯履圖歸程遺名肎復計身後謹慮第虞槃水擎始終感慨遇僚友遂事且喜相湏成勉旃功業早期就發軔自是天衢亨四川摠志鄭鑑鑑字自明連江人淳熙元年太學釋褐授國子學正召試除校書郞累遷太子侍講終宣敎郞知台州香爐山在連江縣峙立交輝紫翠閒疎簾半巻鎮長閑神仙似有祈年術一縷青煙起博山淳熙三山志詹騤騤㑹稽人淳熙二年進士第一遊雲門輕裘肥馬春三月到此經遊花正紅欲覓上方幽隱處老僧笑指白雲中雲門志畧陳孔碩孔碩字膚仲號北山候官人淳熙初進士紹熙中邵武宰終祕閣修撰知惠州有北山集絶句臘雪逢春次第消等閑著腳上溪橋柳條畢竟如兒女一夜東風眼便嬌全芳備祖寄題劉潛夫于蒍于齋聞昔子元子愛歌于蒍于遺風今有繼此意古為徒犢價踰刀劒原飴變堇荼聞弦知豈弟聯袂此懽呼近事先苞篚何人問牧芻聚星亭㵎好容我受廛無後村詩話余曩宰建安扁便齋曰于蒍于北山陳公寄詩云云林夢英夢英字伯虎閩清人徙撫州游陸象山之門登淳熙二年進士歷祕書丞學者稱山房先生金石臺雲作巖扉風自關清陰半壑樹中閒傍廂更著茅亭好放入西南一面山江西通志碧㵎書堂臨川遇鄒君示我銅陵辨相邀游其閒百聞湏一踐自從雙耳聾巳辦兩足繭武夷乃招隠仙都輒䇿蹇遥睇麻源村夢思勞輾轉今披碧㵎記華岡訂訛舛疑信吁莫論是非爭之褊但欣泉石竒堂成書可輦晁侯雲夢胸妙處參墳典家有萬竹坡琳琅閟營翦徘徊康樂舊此興尤不淺人生貴自得假物非至善山川侈遭逢所託各偕顯嚴光釣越灘叔子登楚峴氣象不低摧吾徒志當勉相思邀未到烟霞自舒巻唯應原上月共照人孤狷撫州府志孫應時應時字季和自號燭湖居士餘姚人從學朱子之門淳熙乙未第進士知常熟縣移判邵武軍未上而卒有集嚴子陵簿書流汗走君房那得狂奴故意降努力諸公了臺閣不煩魚雁到桐江困學紀聞歸舟晚泊日落風更起江頭船不行凄涼大夫宅蕭瑟故王城一醉重樓晩千秋萬古情愁邊寒角動夜久意難平益昌僧寺靜境軒落照久未夕斷雲低不飛孤舟上水急歸鳥度山微蕭颯天涯鬢淋浪醉後衣憑闌一笑去客夢轉頭非武擔山小飲不成醉清談多所欣秋聲搖落日野色盪寒雲心事長千里腰圍更幾分西風叢桂發倚檻得相聞武擔西臺西臺在何許秋草暮雲閒十畝有餘竹一窗無數山望逺足離思憂時多苦顔相看終惜醉更挈酒缾還新灘見桃杏書事今晨明客眼桃杏照江紅鳥哢蒼山曲人聲翠竹中獨遊空逺思一笑負春風便想荆州道簪花醉渚宫陳仲弓清濁無心陳仲弓圓機聊救漢諸公末流不料兒孫誤千古黄初佐命功以上吳禮部詩話登仙木在四明山漢劉綱妻樊夫人登此木上昇劉樊蟬蛻此登仙老木當年巳插天玉骨半枯猶秀潤蒼皮新長更榮鮮蟠桃待熟三千歲銅狄重摩五百年化鶴未歸山寂寂徘徊誰與問因縁姚江逸詩吕定定字仲安新昌人歷殿前都指麾龍虎上將軍有說劍集登彭城樓項王臺上白雲秋亞父墳前草樹稠山色不隨人事改水聲長近戍城流空餘夜月龍神廟無復春風燕子樓楚漢興亡俱土壤不湏懐古重夷猶登越王臺海上荒臺草樹平登臨不盡古人情白雲萬里懐親舎紅日中天望帝京百粤山川秋歷落三城樓閣晚崢嶸醉來徙倚䦨干曲聽徹西風畫角聲以上四朝詩項安世安世字平父括蒼人徙家江陵淳熙二年進士除祕書正字遷校書郞寧宗朝以偽學黨罷開禧中以直龍圖閣為湖廣轉運判官有平庵悔槀永州日日長沙岸看雲秪念家如何永州夢偏愛在長沙欸乃曲靄迺出深樹湘山日落時若非堯女哭即是楚臣啼次韻羅郢州送别江上相留不肎留渡江沿岸郤回頭漢江東去人西去不見髙城始是愁櫧州路口小雨三十年前過此時一雙青髻綰青絲如今舊雨猶相記秪傍星星白處吹春日隄上高高下下十五里白白紅紅千樹花總在疎籬斷垣裏背隄臨水小人家吹㡌臺千山揺落萬林空數點黄花酒盞中半破接䍦誰耐管巳將身世付西風抛毬綵毬丹柱倚春風寒食清明罷繡工漠北將軍貪蹋鞠豈知兵法在吳宫糟蠏和潘德父大戴笑汝無穴空雙螯小戴笑汝有筐如子臯太元笑汝長郭索入穴慚蟺升慚猱知心但有畢吏部臥起與汝同酒糟後來愛者蘇長公亦秪許汝中山醪固知合向一丘老安得上與三辰翺長公貌喜心未敬雖羨微生尤惡饕我疑吳儂修稻怨和秫醢汝償民膏雖然因此得長醉痛貶未必非深裦又疑畢叟妒劉掾曾以螟蛉輕二豪故回左手就箕踞持蟹藉糟成兩高以上後村詩話釣臺辣闒山頭破草亭秪湏此地了生平﨑嶇狹世纔伸足又被劉郎賣作名君房足下竟成諛秪是韓歆巳破除豈有江湖釣竿手與君臺閣奉文書方輿勝覧雨夜夜窗疎雨不堪聽獨坐寒齋萬感生今夜故人江上宿如何禁得打篷聲後村千家詩羅㸃㸃字春伯撫州崇仁人淳熙二年進士光宗朝累遷試兵部尚書寧宗朝拜端明殿學士簽書樞宻院事卒贈太保諡文恭鶚按宋史作淳熙三年誤今訂正巴山喜雨在崇仁縣南漢豫章守欒巴隱此唐改臨川山淑元不冠椎兩髽縈青綰綠如堆鴉䰐鬖逺望毛髪古日日惟聞餐暮霞吾家公逺更清絶帶眼不穿衣不結好風吹袂任飄颻夜夜惟聞弄明月餐霞弄月固不惡不道農田布龜灼令君盛服道民苦偃然祖裼猶不怍敬持此意款浮丘浮丘乃與合同憂急呼風馬駕雲車二仙方覺裸裎羞旋加冠巾更束帶一見浮丘望塵拜便將凶歲變豐年談笑之閒作霶霈油然雖出南北峯開端實自浮丘翁浮丘詩家老仙伯故知憂國願年豐邦人一飽誰所賜父應詔子兄詔弟若還此雨後五日將見索汝枯魚肆撫州府志陳造造字唐卿髙郵人淳熙二年進士調繁昌尉尋宰定海倅房陵至淮浙安撫使參議晩號江湖長翁有集百花樓樓中香飄百和濃樓上錦纈翻東風玉樽美酒清若空吳姬妝面相映紅人生一笑不易得是間一醉千金直元龍百尺君勿論芳時且可金杯側都梁淮汴朝宗地孤埤秖眼前譙樓西日淡戍鼓北風傳破竹非無計澆𤓰亦自賢客愁渾幾許撫劒倚吳天關塞凄涼處青徐指顧邊如何漢正朔不盡禹山川將畧輕三㨗天威重萬全諸公不愒日老子判畱年題趙秀才壁日日危亭凭曲欄幾層蒼翠擁烟鬟連朝策馬衝雲去盡是亭中望處山泛湖荷面跳珠小濺衣酒邊團扇巳停揮溼雲収盡人閒暑郤度西山載雨歸以上江湖長翁集任希夷希夷字伯起號斯庵伯雨四世孫家邵武淳熙二年進士寧宗朝累遷禮部尚書兼給事中進端明殿學士遷簽書樞密院兼參知政事提舉洞霄宫卒贈少師諡宣獻鶚按宋史作淳熙三年誤今訂正郊壇齋宫帝籍傍連繭館桑禁林喬木晝陰涼郤從射殿臨江閣中有通衢夾苑牆後省紫薇花清曉開軒俯鳯池小山經雨日增輝琉璃葉底珊瑚榦立出池邊是紫薇檢院即事禁路風清飛早鴉官卑難望紫宸衙了無公事鉤簾坐一本冬青落細花左司史侍班虎旅分行鐵作撾殿前拜舞一聲譁輔臣對罷無公事日照金鋪扇影斜徳夀宫即事金爵觚棱曉色開三朝喜氣一時回聖人先御紅鸞扇天子龍輿萬騎來霜曉君王出問安寶香傳輦䕶朝寒五雲深處三宫宴九奏聲中二聖歡宴歸還駕七香車一夕天開六出花瑞色先凝紫宸殿春光重到玉皇家萬年觴舉慶重華百辟需雲始拜嘉壽宴開時先雪宴天花舞罷帶宫花宗祀慶成合宫三歲縟儀収太室先期肇自周玉瓚黄流躬祼鬯大圭元冕薦嘉羞靈臺畢舉三千禮鑾路安行十二斿導從郤歸齋殿去詰朝牡璧對天休紫宸朝罷御端門天宇澄清景氣溫丹鳳樓中黄繖立金雞竿上綵旗翻萬人聳聽風雷號四海均霑雨露恩湏信卑宫勤肆禮君王雅意在元元宴玉津園江樓風靜潮痕減江空夕照多星星波上艇隱隱岸邊莎風光連北闕景物傍西湖禁籞濤江上兹樓天下無虛齋畱御榻小徑近層崖再拜觀奎畫渾疑侍玉階參天宫柏翠布地禁花紅臺沼如文囿規摹有汴風以上咸淳臨安志海棠紅妝翠袖一番新又向園林作好春郤笑華清誇睡足至今羅韈久無塵後村千家詩題陳亞之集後如彼流泉必有源陳家詩律自專門后山得法因鹽鐵不減唐時杜審言陳副使集劉裦裦字伯寵崇安人淳熙五年進士除司門郞中官至朝請郞知西全州自號梅山老人有梅山詩集題小漿去日春蠶吐素絲歸時秋菊剝金衣沙鷗不入鴛鴻侣依舊滄浪遶釣磯詩人玉屑伯寵武夷文士嘗宦于朝以臺評而歸有句云云怨而不怒之辭也葉適適字正則號水心居士永嘉人淳熙五年進士寧宗朝歷權吏部侍郞寶文閣待制知建康府沿江制置使兼制江淮終寶文閣學士卒諡忠定有水心集吳子良林下偶談水心詩早巳精嚴晩尤髙逺如驛梅吹凍蘂柁雨送春聲綠圍齊長柳紅糝半含桃聽雞催謁駕立馬待紬書野影晨迷樹天文夜照城曬書天象切浴硯海光翻地深湘渚浪天逺桂陽城置杜集中何以辨乃若遣臘冰千筯句春桞一絲燐迷王弼宅蒿長孟郊墳門邀百客醉囊諱一錢存又特其細者趙振文在城北廂兩月無日不游馬塍作歌美之請知振文者同賦馬塍東西花百里錦雲繡霧參差起長安大車喧廣陌問以馬塍云未識酴醿縛籬金沙牆薜荔樓閣山茶房高花何啻千金直著價不到宜深藏青鞵翩翩烏鶴袖嚴勞引前金蔣後隨園摘蘂煎凍酥小分移牀獻春酒陳通苖傅昔弄兵此地寂寞狐貍行聖人有道賁草木我輩栽花樂太平知君巳于苕水住盡日櫓聲揺上渚無際滄波蓼自分有情碧落鷗偏聚追逐風光天漫許抛擲身世人應怒君不見南宫載寶回何如趙子穿花去贈杜㓜高杜子五兄弟詞林俱上頭規模古樂府接續後春秋竒崛令誰賞羈棲浪自愁故園如鏡水日日抱村流送潘徳久每攜瘦竹身長隱忽引文藤令頗嚴聞道將軍如郤縠不妨幕府有陶潛江當闊處水新漲春到極頭花倍添未有羽書吟自好全提白下入詩匳永嘉橘枝詞蜜滿房中金作皮人家短日挂疎籬判霜翦露裝船去不唱楊枝唱橘枝以上水心集前日入寺觀牡丹不覺已謝惜其穠豔故以詩悼之牡丹乗春芳風雨苦相妒朝來小庭中零落巳無數魂銷梓澤園腸斷馬嵬路盡日向欄干躊躕不能去珊瑚網趙振文和葉水心馬塍歌昔年家住長安里春風盡日香塵起紛紛車馬過綺陌買花人多少人識王侯第宅連苑牆粲若瓊蘂敷丹房花窠近取馬塍本曲欄髙檻深密藏主歡對客小舉袖擊鼓吹簫滿前後真珠一斛聘國姝琥珀千杯酌天酒幾年農噐不鑄兵雨耕雲穫歌且行種花土腴無水旱園税十倍田租平拏音來近菰蒲住演漾迴溪通枉渚霜晴沙淺橘林明日暮水渾魚網聚東門故侯應自許霸陵醉尉寧湏怒何當學稼隨老農荷鉏驅犢田中去咸淳臨安志白巽東屯行雨足稻畦春水滿插秧未半青短短馬塵追逐下闗頭北望東屯轉山坂一川洗盡峽中想逺浦疎林分氣象溝塍漫漫堰源低灘瀨泠泠石磯響中田築塲亦有廬翬飛夏屋何渠渠李氏之子今地主少陵祠堂疑故居名勝志陸務觀高齋記云少陵居夔三徙居皆名高齋其詩次水門者白帝城之高齋也依藥餌者瀼西之高齋也見一川者東屯之高齋也東屯李氏居巳數世上距少陵纔三易主大歴初故劵猶在白巽東屯行云云宋詩紀事巻五十四
