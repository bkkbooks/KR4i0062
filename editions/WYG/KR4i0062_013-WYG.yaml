body:
  text: 宋詩紀事巻十三錢塘厲鶚撰元絳絳字厚之錢唐人天聖八年進士神宗朝累官翰林學士拜參知政事出知亳州改潁州致仕卒贈太子少師諡章簡有玉堂集石林詩話元厚之知荆南夢至仙府三人者聨名書旁有告之曰君三人蓋兄弟也覺而思之莫知所謂未㡬入為學士韓持國維揚元素繪先己在院一日書名三人名皆從絞絲始悟夢兄弟之意己而持國元素外補厚之京尹後三年復與元素還職而鄧文約綰相繼為直院則三人之名又皆從絞絲許大夫選作四翰林詩紀其事厚之和云聨名適似三株樹傳玩驚看五朶雲亦一時之異也詔修兩朝國史開局日賜筵史院和首相呉公席上韻殿帷昕對罷省戸雨隂餘詔賜堯尊酒人探禹穴書䕫龍方客右班馬蓋徒歟徑醉俄歸弁雲西見日車揮麈後録郡守章公岵五日開宴會九老於廣化寺次韻五日佳辰郡政閒延賔談笑豁幽關閶門歌舞尊罍上林屋烟霞指顧間德應華星臨潁尾年拘皓髮下商顔昌花美酒疎鐘永坐見斜暉隠半山中呉紀聞徐師閔字聖徒仕至朝議大夫退老于家日治園亭以文酒自娯樂時太子少保元公絳正議大夫程公師孟朝議大夫閭丘公孝終亦以安居歸老因相與繼會昌洛中故事作九老會章岵為郡守大置酒合樂會諸老於廣化寺又有朝請大夫王珫承議郎通判蘓温與焉王賦詩為倡諸公屬而和之以為呉門盛事題鼓山元公亭誰書吾姓揭亭顔棟宇飛騰氣象完谷口秋風吹鬢髮海東朝日上䦨干地髙頓覺羣山小天近須知六合寛三到巖扉殊不厭異時長向畫圖看淳熙三山志在禁林時有懐荆南舊遊去年曾醉海棠叢聞說新枝發舊紅昨夜夢回花下飲不知身在玉堂中海棠譜趙潛叔殉節詩轉戰譙門日欲晡空拳猶自把戈鈇身垂虎口方安坐命在鴻毛更疾呼柱下杲卿存斷節袴中杵臼得遺孤空餘三尺英雄氣不媿山西士大夫後村詩話皇祐中儂賊犯康州闔郡潰去惟守臣趙師旦死之妻方産子棄之草間亂後訪之尚呱呱然元公挽之云云元豐辛酉冬予解組歸吳明年過故同年朱光禄舊居周覽園榭感事作詩以詒伯原白頭重到故人家境是人非起嘆嗟三徑未荒陶令菊四時長放庾郎花林風光動藏鶯葉溪浪痕生宿鷺沙肯構有材移病久會慿詩酒傲烟霞蘇州府志句仙驥籋雲穿仗下佛花吹雨布天流石林詩話元豐中久旱裕陵禁中齋禱甚力一夕夢有僧乗馬馳空中口吐雲霧覺而大雨翌日命中貴人物色於相國寺五百羅漢中至第十三尊略彷彿即迎入内觀之正所夢也元參政厚之喜雨句云云蓋記此事刁約約字景純潤州人衎之子天聖八年進士嘉祐中以兵部員外郎集賢校理知越州使契丹戲作押燕移離畢看房賀䟦支餞行三匹裂密賜十貔貍夢溪筆談刁景純使契丹戲作云云移離畢官名如中國執政賀䟦支如執衣防閣匹裂小木罌以色綾木為之如黄漆貔貍形如鼠而大穴居食榖粱北人為珍膳味如豚肉而脆遊五洩山西源窮盡到東源直注層崖五磴泉真境無由追汗漫勝游聊得弄潺湲風生虎嘯層崖底月上猿啼古木巔只待歸來林下去好同靈一此安禪諸暨縣志朱公綽公綽吳人天聖八年進士曾為鹽官令與宋子京唱酬牡丹詩仁帥安全蜀祥葩育至和地寒開既晚春曙力終多翠帟遮蜂蝶朱䦨隔綺羅殷懃慿驛使光景易蹉跎成都文類句諫草焚來應見史橐金散盡只畱詩劉諷都官致仕古今詩話蔡襄襄字君謨其先自光州固始入閩家仙遊又遷莆田遂為莆田人天聖八年進士累官龍圖閣學士知開封府徙知泉州召為翰林學士乞為杭州拜端明殿學士以往治平四年卒乾道中諡忠惠有集苕溪漁隱叢話余觀東坡荔枝歎注謂大小龍茶始于晉公而成于蔡君謨歐陽永叔聞君謨進小龍團歎曰君謨士人也何至作此事今年閩中監司乞進鬭茶許之故其詩云武夷溪邊粟粒芽前丁後蔡相籠加争新買寵各出意今年鬭品充官茶四賢一不肖詩中朝鸞鵠何儀儀慷慨大體能者誰之人起家用儒業馳騁古今無所遺當年得從諫官列天庭一露胸中竒失身受責甘如薺沃然華實相葳蕤漢文不見賈生久詔書曉落東南涯歸來俯首文石陛尹以京兆天子毗名都翼翼郡國首里區百萬多占辭豪宗貴倖矜意氣半言主上承其頤昂昂孤立中不倚傳經决訟無牽羈老姦黠吏束其手衆口和附歌且怡日朝黄幄邇天問帝前大畫當今宜文陳疏舉時密啓此語多祕世莫知傳者籍籍十得一一者已足為良醫一麾出守蕃君國惜此智慮無所施吾君睿明廣視聽四招俊乂隆邦基廷臣諫列復箝口安得長喙號丹墀晝歌夕寢心如疚咄哉汝憂非汝為右范仲淹南方之強君子居卓然安道襟韻孤詞科判等屢得雋呀然鼔焰天地罏三年待詔處京邑斗粟不足榮妻孥耳聞心慮朝家事螭頭北奏帝曰都校書計課當序進麗賦集仙來顯塗誥墨未乾尋已奪不奪不為君子儒前日希文坐言事手題敇教東南趨希文鯁亮素少與失勢誰復能相扶嶄然安道生頭角氣虹萬丈横天衢臣靖胸中有至語舉嗌不避蕭斧誅使臣仲淹在廷列日獻陛下之嘉謨刺史榮官雖重任奈何一郡巻不舒言非由位固當罪隨漕扁舟盡室俱炎陬此去數千里橐中狼藉唯蠧書髙冠長佩叢闕下千百其羣訶爾愚吾知萬世更萬世懍懔英風激懦夫右余靖君子道合久以成小人利合久以傾世道下衰交以利遂使周雅稱嚶鳴煌煌大都足軒冕綽有風采為名卿髙名重位蓋當世退朝歸舍賔已盈脅肩諂笑不知病指天報遇如要盟一朝勢奪德未改萬鈞已與毫釐輕畏威諛上亦隨毁矧復鼔舌加其評逶迆隂拱質氣厚兩耳塞豆心無營嗚呼古人不可見今人誰與明章章節義尹師魯飭躬佩道為華榮希文被寵激人怒君獨欣慕如平生抗書轂下自論劾惟善與惡宜彚征削官竄逐惟適楚一語不挂離騷經當年亦有大臣逐朋邪隱縮無主名希文若果事姦險何此吉士同其聲髙堂本欲悟人主豈獨區區交友情右尹洙先民至論推天常補袞扶世為儒方圜冠博帶不知本樗櫟安可施青黄帝圖日盛人世出今吾永叔誠有望虚心學古貴適用異端莫得窺其牆子年五月范京兆服天子命臨鄱陽二賢拜疏贖其寵勢若止沸反揚湯敕令百執無越位諫垣何以敢封囊哀求激憤亦復奮強食不得下喉吭位卑無路自聞道日視雲闕髙蒼茫裁書數幅責司諫落筆騄驥騰康莊刃迎縷析解綂要其間大意可得詳書曰希文有本末學古通今氣果剛始從理官來祕閣不五六歲為天章上心倚若左右手日備顧問鄰清光茍爾希文實邪佞曷不開口賦否臧隂觀被遣始醜詆摧枯拉朽奚為強倘曰希文實賢士因言被責庸何傷漢殺王章與長倩當時豈曰誅賢良惟時諫官亦結舌不曰可諫曰罪當遂令百世覽前史往往心憤涕泗滂斯言感切固已重讀者不得令激昻肯圖反我為怨府袖書乞憐天子㫄謫官一邑固分耳恨不剖腹呈琳琅我嗟時輩識君淺但推藻翰高文場斯人滿腹有儒術使之得地能弛張皇家太平幾百歲正當鑑古修紀綱賢才進用忠言録祖述聖德垂無疆右歐陽修人禀天地中和生氣之正者為誠明誠明所鍾皆賢傑從容中道無攲傾嘉言讜論范京兆激姦糾謬揚王庭積羽沈舟毁銷骨正人無徒姦者朋主知膠固未遐棄兩轓五馬猶專城歐陽祕閣官職卑欲雪忠良無路岐累幅長書抉幽憤一責司諫心無疑人謂髙君如撻市出見搢紳無靣皮髙君搆書奏天子游言容色仍怡怡反謂希文謀疎濶投彼南方誠為宜永叔忤意竄西蜀不免一中讒巧辭汲黯嘗糾公孫詐𢎞于上前多謝之上待公孫禮益厚當時史館猶刺譏司諫不能自引咎復將已過揚當時四公稱賢爾不肖讒言易入天難欺朝家若有觀風使此語請與風人詩右髙若訥澠水燕談景祐中范文正公知開封左右言公朋黨黜知饒州余靖安道論救坐貶尹師魯洙言臣與仲淹義兼師友當從坐貶監郢州税歐陽永叔移書責司諫髙若訥若訥怒繳其書降授夷陵縣蔡君謨作四賢一不肖詩四賢謂希文安道師魯永叔不肖謂若訥也布在都下人争傳冩鬻書者市之頗獲厚利遊鼔山題靈源洞郡樓瞻東方嵐光瑩人目乗舟逐早潮十里登南麓雲深翳前路樹暗迷幽谷朝雞亂木魚晏日明金屋靈泉注石竇清吹出篁竹飛毫劃峭壁勢力忽驚觸捫蘿躋上峯太空延眺矚孤青浮海山長白挂天瀑况逢肥遯人性尚自幽獨西景復向城淹㽞未云足上元應制髙列千峯寳炬森端門方喜翠華臨宸遊不為三元夜樂事還同萬衆心天上清光㽞此夕人間和氣閣春隂要知盡慶華封祝四十餘年惠愛深夢中作天際烏雲含雨重樓前紅日照山明嵩陽居士今何在青眼看人萬里情書小閣壁上綽約新嬌生眼底侵尋舊事上眉尖問君别後愁多少得似春潮夜夜添嘉禾郡偶書盡道瑶池瓊樹新仙源尋到不逢人陳王也作驚鴻賦未必當時見洛神宿漁梁驛庭樹疎疎河漢低瓦溝霜白月平西寒鴉不奈單棲苦落泊驚飛到曉啼㽞别舊居花檻别意起中夕出門風吹衣側月光艷薄餘花香氣㣲清尊歳相向欲去心有違殘葩勿盡放主人行亦歸以上蔡忠惠公集寒食遊西湖知福州作山前雨氣曉才收水際風光翠欲流盡處旌旗停曲岸滿潭鉦鼓競飛舟浮來烟㠀疑相就引去沙禽好自由歸騎不令歌吹歇萬枝燈燭度花樓淳熙三山志王素素字仲儀旦季子賜進士出身擢知諫院出知成都府復尹開封熙寧初入為通進銀臺司轉工部尚書卒諡懿敏述夢似去華胥國裏來雲霞深處見樓臺月光冷射雞窗急驚覺遊仙夢一迴詩話總龜公任御史日嘗夢中至玉京黄闕殿上有紺服翠冠者曰吾東門侍郎公則西門侍郎也昔以奏牘玉帝前語傷鯁訐遂謫于世公夢迴題此彭思永思永字季長廬陵人舉進士累擢天章閣待制河北都轉運使治平中召為御史中丞熙寧中以戸部侍郎致仕卒絶句爭利争名日日新滿城冠盖九逵塵一聲雞唱千門曉誰是髙眠無事人過庭録趙師民師民字周翰青州臨淄人第進士官天平軍節度推官歴天章閣侍講刑部郎中判宗正丞有集張耒明道雜志先君嘗從趙周翰授易與周翰稍密先君嘗與客語周翰作詩極有風味是温飛卿韓致光之流而世以朴儒處之非也向來向來情思已陳陳旅恨無端不及春潘子形容傷白髮沈郎文字暗丹脣明道雜志句露臺枉惜千金費卻把銅山賜幸臣風月堂詩話趙周翰詠漢文帝云云可與李義山不問蒼生問鬼神之句並驅争先麥天晨氣潤槐夏午風清委地露花啼曉恨拂隄烟栁弄春容厯代吟譜霜女遺靈長著素玉妃餘恨結成酸梅明道雜志范師道師道字貫之長洲人仲淹姪天聖九年進士知廣德縣擢侍御史以論事忤宰相劉沆出知常州復召為起居舍人同知諫院出知福州復入為三司鹽鐡副使終直龍圖閣知明州有集曰璐按宋登科記天聖九年停貢舉㧞萃四人師道當是中㧞萃科題隱圃贈蔣希魯勇退人難事明公識慮長波濤濟舟楫霜雪見松篁林下開前圃花閒出亞槍二疏良宴會老杜好篇章道向清來勝機于静處忘當除印如斗試一較閒忙中吳紀聞天平山天地萬物閒或有竒勝迹見賞能㡬人不知今與昔呉門多好山天平為峻極旦暮常白雲表裏皆珍石烟嵐十里光松桂四時色我因一縱遊煩襟為開釋感古懐君子翻然長太息樂天賞雲泉詩章何歴歴垂今數百年繼者漠然寂閒遇希文來䨇旌守鄉國行春三讓原吟哦盡所得子美天與才尋幽多採摭賦詩五十言平地黄金擲三賢固有名山資亦輝赫此去還㡬年不逢好事客呉郡志滕渉渉天聖中諫議大夫游泰山靈巖寺山半舊招提捫蘿躡石梯佳名標四絶勝境出三齊殿古烟霞窟庭深檜栢蹊嶽靈分地界雲險接天倪香篆清風褭松廊翠巘低飛塵無路入幽鳥隔巖啼破夢泉聲急飄凉竹韻凄㣲陽生頂上殘月落峯西暫到猶塵慮長居信覺迷致君功業就向卜此幽棲靈巖詩集孔道輔道輔字原魯宣聖四十五世孫舉進士天聖閒為右正言累官御史中丞出知鄆州卒贈尚書闕里夫子廟秦火自焚寧害聖金絲堂壁閟家書典墳啓發皆天意非謂共王好治居山東通志唐介介字子方江陵人擢進士第為殿中侍御史劾宰相文彦博貶春州别駕神宗朝拜參知政事與王安石争論不勝憤疽發背卒贈禮部尚書諡質肅謫官渡淮風欲覆舟而作聖宋非狂楚清淮異汨羅平生仗忠信今日任風波舟楫顚危甚黿鼉出沒多斜陽幸無事沽酒聽漁歌合璧事類前集碧落洞余生本孤拙所志在雲石薄宦偶纒鎖未遂林泉適邇來備臺選幸一當言責狂愚抵罪辜遽從邊徼謫區區數千里車馬倦行役湞陽頗善地解轡喜安席官散無所事度日多閒隙太守蘓宣甫邀我訪竒跡西山有石室疑是靈仙窟翛然烟徑入谺若天門闢中瀉一溪清傍暎千峯碧萬穴滴瑶乳兩崖張翠帟爽氣來先秋昏嵐生未夕不知造化意何為置窮僻周生說到難斯文不虚摭怪容誠莫狀勝踐今始獲暫巳瑩耳目久覺生虚白拂拭纓上塵回頭謝朝客雖非吾土樂聊以慰竒隻聖恩未放還屢遊君莫惜廣東通志李師中師中字誠之應天府楚丘人舉進士神宗朝歴官天章閣待制河東都轉運使知泰州貶和州團練副使安置徙單州復分司南京提舉太極觀卒有集贈御史唐介貶英州别駕進退格孤忠自許衆不與特立敢言人所難去國一身輕似葉髙名千古重如山並遊英俊顔何厚未死姦諛骨已寒天為吾皇扶社稷肯教夫子不生還東軒筆録唐介始彈張堯佐諌官皆上疏及彈文彦博則呉奎畏縮不前當時謂拽動陣腳及唐争論于上前遂并及奎之背約執政又黜奎而文潞公益不自安遂罷政事時李師中送介詩有並遊英俊顔何厚未死姦諛骨已寒之句為奎發也韓魏公席上作願得貔貅十萬兵西戎巢穴一時平歸來不用封侯印只問君王乞愛卿后山詩話魏公為陕西安撫開府長安李待制師中過之席閒使為官妓賈愛卿賦偶題燕子知時節還從舊宇歸新人方按曲不許傍簾飛東臯雜録李誠之才致髙妙守邉有威信熙寧初荆公用事議論不合退居汶上題詩云云客有寫眞者見予因以詩贈之嗟予少也賤到老尚無功方寸浮名外流年兩鬢中對鏡猶慙愧圖寫若為客聲畫集詠松半依嵓岫倚雲端獨上亭亭耐歳寒一事頗為清節累秦時曽作大夫官鶴林玉露麥積山在天水縣東狀如麥積為秦地林泉之冠有隗囂避暑宫魏乙弗后墓路入青松翠靄閒斜陽倒影下溪灣此中猿鶴休相顧謝傅東歸自有山方輿勝覧和李明叔理定道中幽居日日數歸程已寫華嚴兩帙經門外初寒江氣白嶺頭多雨燒痕青曾逢飯顆嘲山笠應載鴟夷笑井缾客土相思多引望天涯風景似新亭桂林府志魏瓘瓘字用之歙州婺源人父羽奏補校書郎累官集賢院學士廣東安撫使進龍圖閣直學士吏部侍郎致仕卒感懐羸羸霜髮一衰翁蹤跡年來類斷蓬萬里逺歸䨇闕下一身閒在衆人中螭頭賜對恩雖厚雉堞論功事已空淮上有山歸未得獨揮清涕灑春風湘山野録魏瓘侍郎知廣州日大築子城儂智髙亂民逃于中獲生者衆朝廷嘉之自以論功久不報故作是詩文潞公采詩進呈加龍圖閣學士尹天府句誰言嶺外無霜雪何事秋來亦滿頭五羊書事野録湘山熊知至知至字意誠建陽人天聖中五舉不第歸隠鼇峯有集贈王山人閒拄瘦笻枝衣冠半異時入城人不識賣藥俗長疑飲酒難逢醉餐松自止飢華峯千嶂裏常與白雲期翰墨大全句樓臺上下火照火車馬往來人看人觀燈萬姓統譜趙槩槩字叔平南京虞城人第進士累擢龍圖閣學士知鄆州拜參知政事熙寧初轉吏部尚書以太子少師致仕薨贈太子太師諡康靖澠水燕談歐文忠公與趙少師槩同在中書及告老趙自南京訪文忠于潁上所居之西堂曰會老仍賦詩以志盛事時翰林吕學士公著方牧潁特置酒于堂宴二公文忠親作口號有金馬玉堂三學士清風明月兩閒人之句挽老蘓先生侍從推詞伯君王問子虚早通金匱學晩就曲臺書露泣時難駐琴亡韻亦疎臧孫知有後里閈待髙車蘇集附録郭稹稹字仲㣲開封祥符人舉進士歴龍圖閣學士權知開封府康定中嘗與王堯臣張觀李若谷宋庠等修崇文總目和樞宻侍郎因看海棠憶禁苑此花最盛朱闌明􅆺照横塘芳樹交加枕短牆傳得東君深意態染成西蜀好風光破紅枝上仍施粉繁翠隂中旋撲香應為無詩怨工部至今含淚作紅妝海棠譜陸經經字子履越州人仁宗朝集賢殿修撰有寓山集孔平仲談苑陸經多與人寫碑銘頗得濡潤人有問子履近日所寫幾何對曰近日所寫甚少總在街上喝道行裏陸經學士坐謫流落歐陽魏道輔續東軒筆録文忠公憐其貧毎與人作碑誌必先約令陸子履書欲以濡潤助之也由是子履書名亦自此而盛周平原序云公與歐陽文忠公周旋館閣詩文往復相與至厚惜不幸陷于朋黨屢起屢仆晚遇裕陵方嚮于用則己老矣贈丁元珍中允宰剡塵土官曹㡬處閒君今作邑好開顔落帆直上剡溪口入境先登天姥山魚鳥半和風俗處雲霞多雜簿書間雪晴須去尋安道莫作經宵興盡還剡録晩泛秀水落日進扁舟沿迴碧玉流未能追白鳥貪共數游儵翠璧玲瓏倒青天表裏浮誰湔世閒熱灑出洞庭秋袁州府志句薄有田園歸去好苦無官况莫來休為山陽令作瑣高議青周鏞鏞仁宗時人五洩山路入蒼烟九過溪細穿嵒曲到招提天分五􅘇寒傾北地秀諸峯翠插西鑿徑破崖來木杪駕泉鳴竹落榱題當年老黙無消息猶有祠堂一杖藜越詠曾諤諤諸曁令五洩山五洩髙寒插太清銀河垂地落天聲玉虹貫日晴空見驄馬翻瓢白晝傾作賦曾聞誇鴈蕩乗槎應可到蓬瀛何當一叱乖龍起手挽商霖洗甲兵越詠郭亢五洩山不到此山三十年重來風物自依然兩源秋色排千嶂五級泉聲落半天絶唱傳聞諸老句幽棲猶想黙師禪迴頭迥與塵寰别何必蓬萊始是仙越詠張唐卿唐卿景祐元年進士第一句一舉首登龍虎榜十年身到鳳凰池古今詩話張唐卿進士第一人登科期集興國寺題句于壁有人續云君看姚曄并梁固不得朝官未可知後果終于京官楊察察字隠甫成都人景祐元年進士歴官知制誥翰林學士權御史中丞端明殿學士户部侍郎三司使卒贈禮部尚書有集别信州席上作十二天辰數今宵席客盈位如星占野人若月分卿極醉巫山側聨吟嶰管清他年為舜牧協力濟蒼生東軒筆録楊侍郎謫信州及召還有士子十二人送于境上察即席賦詩皆用十二事而引諭精切士子無能屬和者鄭伯玉伯玉字寳臣莆田人景祐元年進士撫州觀察推官韓魏公薦為殿中侍御史有錦囊集和王太傅游國清塘寒日一觀眺四天雲色稀水風迎棹起沙鳥背人飛玉縷鱸新膾金膏蟹正肥斜陽促歸斾那得戀漁磯莆陽文獻何郯郯字聖從成都人景祐元年進士累遷殿中侍御史歴龍圖閣學士出知外郡熙寧中以尚書右丞致仕卒有廬江文集邵氏聞見録文潞公知成都喜行樂有飛語至京師御史何郯字聖從蜀人上遣察之張少愚謂公曰無足慮因迎謁聖從于漢州有妓善舞聖從喜之問其姓曰楊聖從曰所謂楊臺栁也少愚取妓帕題詩云蜀國佳人號細腰東臺御史惜妖嬈從今喚作楊臺栁舞盡春風萬萬條數日聖從至成都頗嚴重潞公一日宴聖從迎妓歌前詞以勸酒聖從毎為之醉竟無所問益州學聖訓堂詩益為藩捍西南隅物衆地大稱名都擇守來頒兹土政治人頗與他邦殊差跌一有戾條教便宜皆得行黥誅羣姦帖息不敢動無復弄兵覬穿窬任威或謂一時事立政恐非長世圖豈無達識䆒是否重在改作徒嗟呼仲翁文翁字裔孫有偉度敢決不以常文拘當官勇欲除弊法伊憂内惻仁心孚視人無異逺方意威行惠政還相須始時歳荒力賑救坐使餓殍成完膚既而為俗思根本其在立學陳師謨大開儒庠務誨導秀民聳慕紛來趨遂言謂署鴻生職使演經傳傳諸徒奏函一上聞法座詔劄即日來諧俞詔云信汝辦治蜀緩任威罰先文儒公心感激侈上賜刻在金石尊神謨覆之大廈牓美稱日久傳著期無渝邦人承風為盛事觀者塡道來于于吁嗟多士其聼命勿即邪徑安夷塗師無訿聖生率教信尚姬孔尊唐虞施之鄉邦勵雅俗仁誼得以相持扶漢皇初始盛文學起自蜀國行中區本朝教化視三代建元安可為齊驅吾君訓辭諭萬里義均盤誥兹宣敷吾守教本樹一國學盛洙泗相涵濡臣謀君從協大義聖哲倡和眞同符欲歌盛節示萬古才不逮志嗟其愚成都文類程師孟師孟字公闢吳人景祐元年進士累官知廣州召為給事中充直賢殿修撰判都水監出知越州青州授光禄大夫致仕寒食遊九仙烏石二山城中無事喜尋山千里提封並海寛賔客相從筵既冷士民同出食猶寒芳園病葉堆何限古院閒花落幾般誰道異鄉多感慨登臨遲郤十年官淳熙三山志楓橋寺門對雲山畫不如師今一念六年居邇來寺好尤瀟灑張繼畱題内翰書自注今禹玉王内翰丁太夫人憂親寫是詩故不題名遊楓橋偶成晩泊橋邊寺迎風坐一軒好山平隔岸流水漫過門朱舫朝天路青林對郭村主人頭似雪怪我到多番以上呉郡志遊玉尺山寺永日清隂喜獨來野僧題石作吟臺無詩可比顏光禄毎憶登臨郤自回福州府志次韻元厚之少保畱題朱伯原祕校園亭碧瓦春城十萬家可憐夫子獨堪嗟園林猶有前朝木冠蓋難尋故主花園乃錢氏所創亭瞰夕陽鄰古刹池通野水見晴沙天然操尚無塵滓合住蓬莱弄綵霞蘇州府志丁寶臣寶臣字元珍常州晉陵人景祐元年進士歴祕閣校理同知太常禮院出倅永州和永叔新晴獨游東山芳辰百五前選勝到林泉萬樹緑初染羣花紅未然隂巖猶貯雪暖谷自生烟婦汲溪頭水人耕草際田日中林影直風静鳥聲圓健令多情甚尋春最占先瀛奎律髓五洩山路縁蘿蔦䕃杉松翠碧丹崖不計重天作錦屏環十里僧開珠屋面千峯花閒越鳥鉤輈語溪外秦人彷彿逢早晚車騶到林下籃輿暇日待追從越詠題翠麓亭諦看軒窗面翠㣲暫來登此已忘機地連佛寺樓臺古泉落山田稻蟹肥曉徑忽穿清氣入夜船多載白雲歸世人誰識紅塵外終老功名未拂衣惠山古今考柳永永字耆卿初名三變崇安人景祐元年進士為屯田員外郎以樂章擅名有兄三復三接皆工文號柳氏三絶藝苑雌黄柳三變喜作小詞薄於操行當時有薦其才者上曰得非塡詞栁三變乎曰然上曰且去填詞由是不得志日與儇子縱逰倡館酒樓閒無復檢率自稱云奉聖㫖填詞栁三變獨醒雜志柳耆卿風流俊邁聞于一時既死塟于棗陽縣花山逺近之人毎遇清明日多載酒肴飲于耆卿墓側謂之弔栁㑹十二年太平鎮方輿勝覽范蜀公甞曰仁宗四在翰苑十餘載不能出一語歌詠乃于耆卿詞見之仁宗嘗曰此人任從風前月下淺斟低唱豈可令仕宦遂流落不偶卒于襄陽死之日家無餘財羣妓合金塟之于南門外毎春月上冡謂之弔栁七贈内臣孫可久故侯幽隠直城東草樹扶蘇一畝宫曾珥貂璫為近侍卻餘絛褐作閒翁高吟擁鼻詩懐壯雅論盱衡道氣充厭盡繁華天上樂始將蹤蹟學冥鴻青箱雜記中峯寺攀蘿躡石落崔嵬千萬峯中梵室開僧向半空為世界眼看平地起風雷猿偷曉果升松去竹逼清流入檻來旬月經遊殊不厭欲歸回首更遲迴建寧府志鬻海歌為曉峯鹽場官作鬻海歌憫亭戸也䰞海之民何所營婦無蠶織夫無耕衣食之源太寥落牢盆鬻就汝輸征年年春夏潮盈浦潮退刮泥成㠀嶼風乾日曝鹹味加始灌潮波㙧成滷滷濃鹹淡未得閑採樵深入無窮山豹蹤虎跡不敢避朝陽出去夕陽還船載肩擎未遑歇投入巨竈炎炎熱晨燒暮爍堆積髙才得波濤變成雪自從瀦滷至飛霜無非假貸充餱糧秤入官中得㣲直一緡往往十緡償周而復始無休息官租未了私租逼驅妻逐子課工程雖作人形俱菜色䰞海之民何苦辛安得母富子不貧本朝一物不失所願廣皇仁到海濵甲兵淨洗征輸輟君有餘財罷鹽鐡太平相業爾惟鹽化作夏商周時節大德昌國州志句分得天一角織成山四圍題會景亭會稽志馬遵遵字仲塗樂平人景祐元年進士由臺諫轉吏部員外郎直龍圖閣卒隱居詩話馬遵謫守宣州及其去也郡僚軍民争欲駐㽞至以鐡鎖絶江遵于餞筵倚醉令官妓剝榧實而食眷眷若㽞連狀夜使人絶鎖解舟以水沃櫓牙使之不鳴逮曉舟去逺矣再入臺作連蹇多年心欲灰厭為俗吏走塵埃豈知黄紙新書下還送青氊舊物來武騎強為終不意河南難問媿無才一麾早晩江湖去相與持螯共酒杯饒州府志吕璹璹字季玉晉江人景祐元年進士歴官光禄卿威惠廟陳元光父子有功于閩而史闕焉當年平賊立殊勲時不旌賢事忍聞唐史無人修列傳漳江有廟祀將軍清源文獻仲訥訥字樸翁定陶人景祐元年進士歴尚書屯田員外郎有集負暄閒眠茅簷晴日暖於春一枕鈞天樂事新滿眼繁華皆得意午眠安穩卻無人宋文鑑送唐子方力犯雷霆衆共危逺投魑魅獨為宜忠州學業真無負髙廟神靈固有知自倚聖明容直道未甘憔悴死荒陲滿朝卿相多公議莫把文章作楚辭事文類聚前集楊諤諤梓州人景祐元年進士和燕龍圖海棠西漢欺盧橘東陽愛海棠許昌竒此遇子美欠先揚杜宇三春節蠶叢一國香燕脂點亂雨生色麗斜陽富豔東君主暄妍白帝方錦樓移水色玉壘換山光風格林檎細腰支郁李長天生笑容質時様舞衣裳少吐深深染全開淡淡妝烟媒䕶緑蔕風陣損朱房旋失因臨水閒飄弗過牆佩亡愁殺甫簪脫即連姜蝶舞菱花照鶯啼罨畫堂仙如弄玉少墜似緑珠常不見還成悔相思幾欲狂春深濯錦水日晩浣紗坊臥對移簾押吟看近筆牀池清滿園倒鳥起一枝昻紫燕銜泥急黄蜂趁蜜忙化工眞用意銷得與攜觴海棠譜句願前明主席一問洛陽人省試宣室受釐行人問宫殿耕者得珠璣題驪山詩話中山草不驚皇轍山能䕶帝輿省試蒲車温公詩話吳中復中復字仲庶興國永興人進士及第累官殿中侍御史歷龍圖閣直學士出知成都遊海雲寺唱和詩并序成都風俗歲以三月二十一日遊城東海雲寺摸石於池中以為求子之祥太守出郊建髙旟鳴笳鼓作馳騎之戲大讌賓從以主民樂觀者夾道百重飛蓋蔽山野讙謳嬉笑之聲雖田野閒如市井其盛如此渤海吳公下車期月簡肅無事從俗髙會于海雲酒既中顧謂寮屬曰一觴一詠古人之樂事也首作七言詩以寫勝賞席客亦有以詩獻者更相酬和得一十三篇乃命幕下吏會稽王霽為之序錦里風光勝别州海雲寺枕碧江頭連郊瑞麥青黄秀遶路鳴泉深淺流彩石池邊成故事茂林坡上憶前遊自注予昔陪樞密田公遊此緑樽好伴衰翁醉十日殘春不少畱歲華紀麗譜三月二十一日出大東門宴海雲山鴻慶寺登衆春閣觀摸石蓋開元二十三年靈智禪師以是日歸寂邦人敬之入山遊禮因而成俗山有小池士女探石其中以占求子之祥成都西園十詠存三首西樓信美他鄉地登臨有故樓清風破大暑明月轉髙秋朝暮岷山秀東西錦水流賓朋逢好景把酒為遲畱方物亭草木蟲魚部披尋自古無飛沈天產異生植土風殊物色隨心匠形容記繪圖虛亭玩眞意浩思滿江湖流杯亭結客乗公暇流觴逐浩歌亂峯晴倒影曲水宛逥波小海逢元已蘭亭記永和西州行樂事應比晉賢多以上成都文類江左謂海棠為川紅靚妝濃淡蘂蒙茸髙下池臺細細風卻恨韶華偏蜀土更無顏色似川紅尋香只恐三春暮把酒欣逢一笑同子美詩才猶閣筆至今寂寞錦城中海棠譜寄題錢公輔衆樂亭賢侯新葺水雲鄉虛閣崢嶸緑渺茫波面長橋歩明月人家疎影帶殘陽風中白鳥侵烟去雨後紅蕖擁袖香從此郡圖添故事歲時遺愛似甘棠延祐四明志覽齊山陳鴻斷碑翠琰何年沈朽壤羡師尋訪得其餘應同湘水斷碑字難辨韓陵片石書汨沒身名眞夢幻變遷時序易丘墟收藏且作山中物莫問陳鴻紀事初齊山詩集陳薦薦字彥升邢州沙河人舉進士神宗朝累官龍圖閣直學士河北都轉運使進資政殿學士提舉崇福宫卒贈光禄大夫子房廟博浪沙頭觸副車潛游東夏識眞符風雲知略移秦鼎星斗功名啟漢圖商老已來寧少海赤松還約訪仙都雍容進退全天道凛凛髙風萬古無燕子樓僕射新阡狐遊侍兒猶住水邊樓風清玉簟慵攲枕月好珠簾嬾上鉤寒夢覺來滄海濶新詩吟罷紫蘭秋樂天才思如春雨斷送殘花一夕休桐江詩話陳舍人彥升有彭城八詠為人所稱多以燕子樓為絶倡殊不知子房廟詩最為警絶彦升髙祖廟詩云塵静山川狂鹿走雷驚天地老龍飛范增墓詩云忿失壯圖撞玉斗豈知天命與金刀皆佳句也八詠今不傳于世惜哉劉述述字孝叔湖州人景祐三年進士歴荆州湖南北京西路轉運使神宗立召為侍御史忤王安石謫江州提舉崇禧觀卒紹興初贈祕閣修撰仙巖洞禱雨令諸暨時作英英洞口雲觸石纔一縷須臾徧空山霈然作霖雨會稽志五洩山翠屏千疊水潺湲一簇青鵷杳靄間惜是晩年逢此景悔將前眼看他山瀑飛蘿磴終難畫龍蟄嵓雲只暫閒薄宦勞人無計住明朝歸去又塵寰越詠題竹閣竹閣寒相倚雲窗晚共開閒身方外去幽鳥静中來聲響風隨籜隂移石上苔遲畱更清夜待月露盈杯嚴州府志葛密密字子發江隂人宫弟官太常博士近造浮屠之悟空者覩君謨省主給事畱題詩板列楣棟間粲然可誦因摭方袍之意成拙句以寄昔年詩板著蓮宫筆力雄豪墨彩豐不日三階平國政山僧應待碧紗籠蔡忠惠公集附元積中積中錢唐人景祐初黄巖令熙寧初為司封郎中直史館知桂州軍有江湖堂詩集題桐柏觀九峯巍絶亂雲屯石室瓊臺舊址存山險密盤之字徑洞深髙闢丙方門碧桃花爛春溪暖紫玉簫沈月榭昏未覺仙家光景晚人閒歸去見來孫赤城志董淵長樂令靈峯院龍龕山和蔡君謨礧硌彌沙界谽谺古洞天門鄰金布地橋枕玉鳴泉庭鶴歸迷主龕龍去失年掃雲嫌俗駕題壁詫詩仙勝景無今古居人有後先不知遊者馭誰見海為田蔡忠惠公集附劉嗣隆嗣隆仁宗朝以尚書職方員外郎知袁州宜春臺一簇亭臺畫亦難公餘到此幾盤桓山髙不似城中景樹密尤宜雨後看風送江聲穿郡郭日推雲影下峯巒當時吏部曾遊否何事無文石上刋袁州府志宋詩紀事巻十三
