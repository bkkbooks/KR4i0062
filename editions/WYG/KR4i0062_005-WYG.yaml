body:
  text: 宋詩紀事巻五錢塘厲鶚撰陳從易從易字簡夫晉江人端拱二年進士歷祕書省著作郎直史館知廣州仁宗朝擢知制誥除龍圖閣直學士知杭州有泉山集小孤山山稱孤獨字庿塐女郎形過客雖知誤行人但乞靈春明退朝錄句千重浪裏平安過百尺竿頭穩下來王文穆罷相寛夫詩史蔡梅詢詢字昌言宣城人端拱二年進士累擢翰林侍讀學士歷給事中知審官院出知許州有許昌集寄吕許公十五年前忝一麾公餘嘗得預言詩玉階闕歩為霖早雲路風波得志遲浴鳯池深春蕩蕩觀魚臺古草離離重來故老休相問請揭紗籠有舊碑侯鯖錄梅詢侍讀嘗從真宗東封因卜命于岳神夢三牛鬬于庭有稱相公通謁者雖異之而不曉其兆既而得濠梁州廨有三石牛後吕許公夷簡以殿中丞來倅詢見之疑若所夢謁者于是委遇至厚不數年許公大拜梅為發運使按部至濠上作詩寄之送楊可及第還鄉君恩兼喜拜維桑路入家山道更光春色殿前初脱白秋風隴上見焚黃偏留名紙呼前輩喜著藍袍到故鄉科第孝思俱已遂卻經劒棧莫凄凉合璧事類别集武林山十詠水臺盤在下天竺鶴髪山中人疏泉鑿幽石如憑青玉案分遞白雲液泠泠濺雕俎瑟瑟穿吟席醉坐三伏中煩襟自消釋翻經臺靈運曾此臺冥心住幽寂重譯葉上書深藏林中跡遺文傳竹素野蔓侵苔碧登覽殊未休蒼山日將夕靈隱寺千峯凌紫烟中有梵宫闕靈眄極幽棲塵心自超越松黃發春靄桂實墜秋月爭得謝世人兹焉老華髮北高峯墖高墖列逺岑亭亭幾百載鈴聲荅夜風輪影落滄海閒雲伴危級斜日平烟彩欲下生暮愁千山閉輕靄蓮花峯巨石如芙蕖天然匪雕飾盤礴峯頂邊嬋娟秋江側渉川試誰採作礪當自惜坐與榮辱同正心未嘗易龍泓洞矯矯淵下龍潛神在靈府雲卧雖有時泥沙可長處陰崖寒氣腥峭壁灼痕古何當救旱暵奮起為霖雨冷泉亭古竇鳴幽泉蒼崖結靈宇六月期客遊披襟苦徂暑開窗弄清淺吹鬢疑風雨不見白使君烟蘿為誰語呼猿洞古澗飛白猿寂歷不知處風激石上泉僧疑月中樹微茫認松雪髣髴橫樵路空望增爾思蒼蒼奈烟霧煉丹井仙翁道未泯棲神在巖石酌彼山下泉窮年煉金液洞陰春始綠苔甃秋涵碧緬慕不可期凭闌望鳧舄飛來峯竺慧指此峯飛來自靈鷲猿鳥曾未知烟嵐尚依舊興亡漫千古天地豈關紐祗恐舟壑移他年卻西走以上咸淳臨安志呉興道中野闊多桑柘湖平溉沃田採蓮花様女載酒葉兒船黃犢青山下垂楊古道邊行行頻北望戀闕意懸懸送夏子喬招討西夏丹墀曾獨繹絲綸御札親題第一人鶯喜上遷張筆力馬諳西討仗威靈亞夫金鼓從天降韓信旌旗背水陳耆致爾功還奏闕圖形仍許上麒麟以上許昌梅公年譜附句千重漢圍合一夜楚歌聲陰陵楊文公談苑吳簡言簡言字若訥長汀人端拱二年進士累官祠部郎中題巫山神女廟惆悵巫娥事不平當時一夢是虚成只因宋玉閒脣吻流盡巴江洗不清汀州府志是夕夢神女來見曰君詩雅正當以順風相謝明日解纜果然古成之成之字亞奭惠州河源人五季末避地家增城中端拱二年進士召試除祕書省校書郎張詠帥蜀辟知綿竹縣卒于官廣東通志宋初干戈甫息嶺嶠文風未振毎取士合一路以一人薦衆推成之雍熙改元充秋賦督府勸駕詩云寰中有道逢千載嶺外觀光只一人蓋紀實也憶羅浮憶昔羅浮最上峯當年曾得寄仙蹤凭闌月色出滄海攲枕秋聲入古松採藥静尋幽澗洗寄書閒仗白雲封紅塵一下拘名利不聽山間午夜鐘惠州府志楊正倫正倫舉進士與陳堯佐同時華清宫休罪明皇與貴妃大都衰盛兩隨時惟餘一派溫泉水不逐人心冷暖移皇朝類苑孫何何字漢公汝陽人父鏞知荆門軍遂家焉登淳化三年進士第一歷官兩浙轉運使加起居舎人景德初判太常禮院知制誥賜金紫掌三班院卒有集涑水紀聞孫何丁謂舉進士第未有時名王禹偁見其文大賞之贈詩云三百年來文不振直從韓柳到孫丁如今便好令修史二子文章似六經二人由此時名大振歷代吟譜孫何嘗作兩晉名賢贊并詩三十篇王禹偁延譽之曰丁謂與孫何便可白衣修撰汎吳江晚灘如雪起沙鷗咫尺姑蘇亦勝遊逸勢瀉歸滄海逺冷聲分作太湖秋葑田幾處連僧寺橘岸誰家對驛樓魯望不存無可語片帆中夜渡清流吳江縣志桐栢觀玉壇三級接秋空此是仙家第幾重羽客有時來駕鶴王人無歲不投龍微吟海月生嵓桂長嘯天風起澗松司馬先生何處去篆碑猶有白雲封天台山志句欲謁元戎無介紹薛能詩版在鵰堂補續高僧傳太平興國末年曹彬出領節制閉閣謝客孫何自京師來久不得見以詩自誚云誰如張璪工松石擬裂鮫綃畫作圖詠吳興譜宣和盡趙湘湘字叔靈衢州西安人淳化三年進士清獻公之祖春夕偶作一夕衡門獨自開雨陰深巷少塵埃酒醒風傍池邊起坐久月從花上來何處夜歌初欲斷四鄰春夢未知回因思此興無人共時復孤吟歩綠苔宋文鑑方廣寺石橋白石峯猶在橫橋一徑微多年無客過落日有雲歸水淨苔生髮山寒樹著衣如何方廣寺千古去人稀方輿勝覽剡中齊唐郎中所居古柳垂溪水當門繫雪舟開樽延白鳥掃樹帶清秋閣上看華頂窗中見沃洲尋常投刺少來即是詩流剡錄贈水墨巒上人講餘題小筆深院竹修修試墨應磨歲思山忽寫秋静曾窮鶴趣高亦近詩流更擬緣清思和雲狀沃洲贈張處士應問秋雲學得閒飄然如不在人間青籐篋裏詩多怪紫栗枝邊藥更瘢江客對棊曾賭鶴野僧分屐借登山仍聞昨日來城市又抱孤琴踏月還以上瀛奎律髓秋夜集李式西齋澤國秋光淡詩家夜㑹清雨餘逢月色風静得琴聲小徑幽蟲絶寒階落葉并嘗茶不擬睡自起遶池行文翰類選别邪溪諸叔又散邪溪㑹斜陽在古原出門逢落葉去路有啼猨短髪不堪照新詩誰與論如何為逺别風雪㝛孤村雲門集遊爛柯山仙人與王質相㑹偶多時落日千年事空山一局棊樹高明月在風動白雲移未得酬身計閒來學採芝爛柯山洞志張士遜士遜字順之號退傅陰城人淳化三年舉進士眞宗朝拜禮部尚書同中書門下平章事仁宗朝拜太傅封鄧國公薨贈太師中書令諡文懿青箱雜記張退傅士遜趙少保叔平概張樞相昇皆壽八十六陳丞相堯佐夀八十二杜丞相衍壽八十一富丞相弼壽八十文惠致政寄退傅詩曰青雲岐路遊將徧白髪光隂得最多晩春遊金明抵暮入宜秋門閽兵捧門牌請官位因書一闋閒遊靈沼送春回關吏何須苦見猜八十哀翁無品秩昔曾三到鳯池來湘山野錄題西菴寺宰邵武作西菴深入西山裏算得當年少客遊密密石叢盤小徑涓涓雲竇瀉寒流松皆有節誰青蓋僧盡無心也白頭欲刷粉牌書姓字調卑官冗不堪留遊寶蓋巖身為冠冕留心是雲泉客每到雲泉中便擬忘歸跡況兹寶蓋巖天造清涼宅税車官道邊誰知願言適公牒至建寧縣道洛陽村而山路險峭穹絶不可名狀題二韻於村寺金谷花時醉幾場舊遊無日不思量誰知萬水千山裏枉被人言過洛陽以上青箱雜記寄陳希元赭案當年並命時蒹葭衰佩倚瓊枝皇恩乞與桑榆老鴻自高冥鳯在池倦遊雜錄知邵武縣禱雨有應任滿作詩紀事乞靈曾爇一爐烟言下滂沱救旱田今日解龜留數字要教來者更恭䖍詩律武庫遊峽山飛來寺峽寺一停橈新秋暑乍消幽懷徒易釋肥遯固難招翠擬千峯活紅分數葉凋優遊虚歲月何以報清朝禺峽山志錢昆昆字裕之吳越廢王倧之子歸宋中淳化三年進士仕至祕書監有集十國春秋昆性嗜蟹常求補外職曰但得有蟹無通判處足慰素願也題淮陰侯廟築臺拜日恩雖厚躡足封時慮已深隆準皁知同鳥喙將軍應起五湖心青箱雜記遊鐵岸晴紅烟綠襯虚亭公退因來得野情落日東風嬾歸去擬將薄禄換溪聲中州題詠集吕言言晉江人淳化三年進士官侍御史廣東轉運使寄九日山僧目極閩南道雲山隔幾層深秋城外寺白日定中僧野蔓穿松甲幽泉潄石棱遙思茶話夕敲破玉池冰清源文獻謝濤濤字濟之其先陽夏人父從禮為鹽官令卒于官兩世葬富陽因家焉登淳化三年進士歷官太子賔客夢中作讀史一絶百年竒特幾張紙千古英雄一窖塵惟有炳然周孔教至今仁義洽生民中吳紀聞高紳紳廣州鈐轄使遊峽山飛來寺古寺清江上維舟夕照前山根盤到海塔影直侵天蘿月空禪石霜鐘落客船秋風嬾回首送目入雲烟禺峽山志郭震震字希聲成都人有漁舟集淳化四年作朝出東門遊東門好春色青青原上草莫放征馬食文獻通考震于淳化四年忽作此詩詣闕上書言蜀利病未幾李順之亂作矣紙窗偏宜酥壁稱閒情白似溪雲薄似冰不是野人嫌月色免教風弄讀書燈青瑣後集㝛漁家幾代生涯傍海涯兩三閒屋蓋蘆花燈前笑説歸來夜明月隨船送到家漁者江柳弄風顰翠黛山光著雨濕臙脂卻收短櫂拈長笛一葉舟中仰靣吹雲聚散虚空去復還野人閒處倚笻看不知身是無根物蔽月遮星作萬端以上宋文鑑題龍華山在廣都縣有段文昌别業昔年曾到此山迴百鳥聲中酒一杯最好寺邊開眼處段文昌有讀書臺唐詩紀事路振振字子發永州祁陽人唐相巖四世孫淳化中舉進士歷官左司諫知制誥充同修起居注有集贈安邑簿伍彬歸隱老終秋鬢白歸隱舊峯前庭樹鳥頻啄山房人尚眠寒巖落桂子野水過茶烟已結勞生念䖍心向竺乾雅言系述伐棘篇伐棘何所山之巔秋風颾颾棘子丹折根破柢堅且頑斸夫趦趄汗汚顔攢鋒束芒趨道還􅀢之森森繚長藩暮冬號風雪暗天漏寒不鳴守犬眠主人堂上多金錢東陵暴客來窺垣舉手觸鋒身隕顚千矛萬㦸爭後先襟袖結裂不可揎蹠破指傷流血殷神離氣沮走蹁躚數尺之牆弗復攀索頭小醜騷河壖朔方屯師連七年木波馬領沙塡塡氣脈不絶如喉咽官軍虎怒思吼軒强弩一發山河穿將不叶謀空即安翫養蟻寇成兇顚推芻挽粟徒喧喧邊臣無心靖國艱為余諷此伐棘篇宋文鑑題惠泉師壁漢公嘗説惠泉師解講楞嚴解賦詩今日我來師已去草堂風雨立多時補續高僧傳孫何遊南臺聞惠泉髙槩叩其門一見如舊識饋勞加厚後二年何為進士舉首同年路振官彭門何盛稱泉好義甚篤振下車詣焉師已去浙矣振歎慕留詩壁間句鶚案皇朝類苑作陳堯佐君恩來萬里客路出千山潮州徵還吟窗雜錄危拱辰拱辰字輝卿南城人淳化進士官至光禄卿題初月十五歲作未審初三夜嫦娥怨阿誰懶開十分鏡祗畫一邊眉江西詩話王嵒嵒淳化中隱居蜀川有集陳氏書録解題洪邁編唐人絶句萬首可謂博矣而多有本朝詩在其中如李九齡郭震滕白王初王嵒之屬是也回舊山庾家樓上謝家池處處風烟少舊知明日落花誰共醉野猿溪鳥恨歸遲貧女難把菱花照素顏試臨春水採花看木蘭船上遊春子笑指荆釵下逺灘以上萬首唐人絶句殘冬客次資陽江淡雲殘雪蔟江天䇿蹇遲回客興䦨持盋老僧來咒水倚船商女待搬灘沙翹白鷺非眞靜竹映繁梅奈苦寒阮籍莫嗟岐路異舊山溪畔有漁竿全蜀藝文志田霖霖淳化間人燕口洞燕口龍泓氣象清錢眞此處有遺靈仙兄去後師猶在女弟回時洞已扃雲片尚如披素練泉聲長似誦黃庭碧桃花發菖蒲紫留與人間作畫屏詩話總龜女眞錢氏二姊妺依陶隱居誦黃庭經即茅山燕洞也至今有紫菖蒲碧桃焉其姊披白練衣得道入洞及女弟至則户已扃矣淳化五年田霖作詩題之賈黃中黃中字媧民南皮人六歲舉童子科十五舉進士太宗召試中書知制誥充翰林學士淳化二年參知政事至道初拜禮部侍郎兼祕書監卒贈禮部尚書有集宋史本傳黃中㓜聰慧方五歲父玭每旦令正立展書巻比之謂之等身書課其誦讀孔平仲談苑太宗時宋白賈黃中李至吕䝉正蘇易簡五人同拜翰林學士承㫖扈䝉贈詩云五鳯齊飛入翰林其後皆為名臣伏覩禁林盛事謹賦一章璇題飛白御毫新三體瓊章妙入神特賜禁林為盛事只緣明主重名臣青編輝暎輕前古丹地深嚴隔世塵金籙禎祥非是寶玉堂名號此方貞玉堂之名從來未著格令今聖君親書玉堂之署四字為千古不朽之事自此名始貞矣恩榮誰比烟霄客文彩長懸日月輪為報鼇宫主人道蓬萊全勝昔時春黄中以近離署故不覺有此健羡之句翰苑羣書桂林還珠洞赫赫威聲震百蠻肻攜筐筥溷谿山無人為起文淵問端的珠還薏苡還顧氏積書巖選王欽若欽若字定國臨江軍新喻人進士甲科召試知制誥歷官翰林學士拜樞密使檢校太傅同中書門下平章事進司徒封冀國公卒贈太師中書令諡文穆西清詩話王文穆欽若未第時寒窘依幕府家時章聖以壽王尹開封府一日晚過其舎左右不虞王至亟取紙屏障風王顧屏閒一聯云龍帶晚烟離洞府雁拖秋色入衡陽大加賞愛曰此語落落有貴氣何人詩也對曰某門客王欽若上遽召之一見欽若如夙素其後信任頗專致位上相風雲之㑹實基於此焉送天柱馮先生鬱蕭空殿倚雲霓玉氣珠輝冠紫微暫到帝城朝斗㑹卻思巖竇負琴歸日奔内景乾坤静泉潄清音杞菊肥卻到水鄉深邃住晴巒掩映蔟春暉洞霄詩集句九重天闕夢掉臂黃雞白酒鄰舎恩詩律武庫晉陶侃少時家貧有友人見訪無以致誠其鄰人頗賢謂侃曰子門有長者軒車何不延之以論當世事侃曰貧不能備酒醴鄰人密於牆頭度以濁酒隻雞遂成終日之樂本朝王冀公欽若過其廟題詩云云用此事也胡旦旦字周父濵州渤海人舉進士第一眞宗朝歷祠部郎中祕書監有集句明年春色裏領取一行歸澠水燕談胡旦少有俊才尚氣凌物隨計之秋郡守坐中聞雁賦詩云云明年果魁天下終以忤物不登顯位滕白白太宗時為工部郎中世稱滕工部有集題汶川村居種茶巖接紅霞塢灌稻泉生白石根皤腹老翁眉似雪海棠花下戲兒孫合璧事類前集觀稻稻穗登塲穀滿車家家雞犬更桑麻漫栽木槿成籬落已得清陰又得花週遭圩岸繚山城一眼圩田翠不分行到秋苗初熟處翠茸錦上織黃雲全芳備祖錢昭度昭度字九齡吳越忠懿王俶從弟偓之子仕至西頭供奉官有詩集楊文公談苑錢氏諸子封守惟濟供奉昭度並有佳句贈白校書袖裏青鋒秋水寒誰疑雙燕是金丸出門風雨知何去空有霜髭在玉盤洞微志郭平振武舊將分配錢唐給官屋居之屋在修文坊舊為白校書尤賃燒丹藥未欲往而官吏丁疎因逐之乃破爐而去白因召丁疎同飲謂疎曰大藥為吾子所破有小戯術醒酒乃取盤一靣置于膝上以指敲腕出五色彈子兩枚化為雙燕而飛白曰僕射髭甚繁可減些言未畢二燕化為二小劒長五寸餘鋒刃如雨交舞于疎之頤頷間髭落如雪疎懼甚白呼劒下盤中依前成二丸納于左右腕而去錢昭度贈白詩云云懷具區平生愛具區島嶼交陂湖竹雨籠鸂鶒花烟溼鷓鴣神仙疑有宅魚鼈自為都何事勞長想機雲本是吳呉郡志春陰語燕初飛隴麥青春雲將雨滯行人雲間若有金烏賣應被豪家占得春後村千家詩野墅夏晚一抹生紅畫杏腮半園沈綠鎖桐材黃蜂衙退海潮上白蟻戰酣山雨來睡思幾家金帶枕酒香何處玉交杯太陽西落波東去惆悵無人喚得回瀛奎律髓句西北髙樓在東南王氣銷金陵東北風吹大庾嶺西南日映小寒天梅花人間路到三峯盡天下秋隨一葉來秋日華山以上皇朝類苑長憶錢塘江上望酒樓人散雨千絲青箱雜記船中聞雁洞庭夜牀下有蛬長信秋蔡寛夫詩史磻溪重得吕維嶽再生申吕申公生日許彥周詩話范唐公唐公文正公仲淹之祖贈祕書監贈華山陳希夷缺首二句曽逢毛女話何事應見巨靈開此山濃睡過春花滿地静林中夜月當闗紛紛詔下忽東去忍使蒲輪倦徃還過庭録王著著字知微成都人太宗朝官翰林侍書行殿中侍御史曰琯按書史㑹要云别有翰林學士王著自是一人禁林讌㑹之什文明天子重詞臣聖製褒揚日月新宸翰特頒仙署額皇風先發玉堂春虯龍逸勢誠難伏鸞鶴廻翔信得真齊武任誇非入妙漢章雖巧未通神匪唯衒耀鼇宫客兼是輝華鳯閣人幸接英儒同讚詠輒書狂斐繼清塵翰苑羣書曾璉鴻溝和吕聖功韻王霸興亡幾劫塵鴻溝依舊鎖寒雲不將帝業追三代祇把河山割半分故壘已隨流水盡歸鴉空帶夕陽曛西風立馬頻回首那忍猿聲隔岸聞滎澤縣志吕文仲文仲官翰林侍讀右正言禁林讌㑹之什青蔥溫樹非塵境鼇岫金鑾近日邊石壁天章垂雨露璇題宸翰動雲煙西垣賈馬徵辭客東觀蓬瀛集列仙讌喜馳顔飛玉斚鏗鏘奮藻擘花牋唐虞盛化髙千古葵藿傾心祝萬年自顧薄才誠有媿不知何以奉羣賢翰苑羣書吕祐之祐之太宗朝官起居舎人知制誥禁林讌㑹之什髙㑹蓬瀛振德音崇賢同慶湛恩深瑞融雲露飛宸翰榮下煙霄飾禁林鳯藻瓌竒清擊石龍文模琢麗雕金辭臣喜適逢時願睿眷殊敦好士心華照北門張組繡祕逾東序敵球琳玉堂宴罷尤知幸御牓天章豈易尋翰苑羣書楊允元允元官光禄寺丞直集賢院寄館中諸公鶚按澠水燕談作揚億詩聞説宫花滿鬢紅上林絲管侍重瞳蓬萊咫尺無由到始信仙凡迥不同古今詩話楊允元為光禄寺丞三月後苑曲宴末得貼職不得與以詩寄館中諸公太宗聞之即日直集賢院與晚宴潘閬閬字逍遙大名人嘗居錢塘太宗召對賜進士第王繼恩與之善繼恩下獄捕閬弗得咸平初來京尹收繫之眞宗釋其罪以為滁州參軍後卒于泗上小説中謂閬坐盧多遜黨追捕非也有詩集皇朝類苑好事者以閬遨遊浙江詠潮著名以輕綃寫其形容謂之潘閬詠潮圖宋尚書贈詩曰宋朝歸聖主潘閬是詩人王元之亦贈詩曰江城賣藥常將鶴古寺看碑不下驢其為名公所激賞如此歲暮自桐廬歸錢塘久客見華髪孤櫂桐廬歸新月無朗照落日有餘暉漁浦風水急龍山烟火微時聞沙上雁一一皆南飛中山詩話潘閬詩有唐人風格僕謂此詩不減劉長卿過華山髙愛三峯揷太虚昂頭吟望倒騎驢㫄人大笑從他笑終擬移家向此居圖畫見聞錄長安許道寧嘗畫潘閬倒騎驢圖題資福院石井炎炎畏日樹將焚卻恨都無一㸃雲强跨蹇驢來到得皆疑渴殺老參軍能改齋漫錄閬移太平州參軍過信州鉛山縣作蘇黃門䟦云此詩頗有風味不在石曼卿蘇子美下曹娥廟曹娥廟前秋草平曹娥廟裏秋月明扁舟一夜炯無寐近聽潮聲似哭聲㑹稽志曉泊嶀浦寄剡縣劉貺員外曉汎剡溪水晚見剡溪山徘徊駐行櫂待月思再還漁唱深潭上鳥棲髙樹閒應當金石交念我無暫閒剡錄九華山將齊華嶽猶多六若並巫山又欠三好是雨餘江上望白雲堆裏發濃藍方輿勝覽贈林處士雲翦烏紗霜翦衣存神養氣語還稀人人盡喚孫思邈只恐身輕白鳥飛㝛靈隱寺繞寺千千萬萬峯滿天風雪打杉松地爐火煖黃昏睡更有何人似我慵以上咸淳臨安志秋日題瑯邪山寺巖下多幽景且無塵事喧鐘聲晴徹郭山色曉當門深洞藏泉脈懸崖露樹根更期來此㝛絶頂聽寒猿渭上秋夕閒望秋色滿秦川登臨渭水邊殘陽初過雨何地不鳴蟬極浦涵明月孤帆沒逺烟漁人空老盡誰似太公賢夏日㝛西禪院此地絶炎蒸深疑到不能夜涼知有雨院静若無僧枕潤連雲石窗明照佛燈浮生多賤骨時日恐難勝以上瀛奎律髓望湖樓望湖樓上立竟日嬾思還聽水分他界看雲過别山孤舟依岸静獨鳥向人閒回首重門閉蛙聲夕照閒西湖遊覽志句清宵無好夢白日有閒愁髪任莖莖白詩須字字清長喜詩無病不憂家更貧何須三呌絶已恨一聲多峽中聞猿生前是客曾投巻死後何人與撰碑哭髙舍人莫嗟黒髪從頭白終見黄河到底清寄張永吟以上厯代譜土牀安睡穩紙被轉身鳴客舍作話劉後村詩窺魚白鳥明殘照抱石幽雲㸃半山南昌秋屏閣方輿勝覽湯悦悦本殷文圭子陳州西華人仕南唐為司空知左右史事入宋避宣祖廟諱改姓湯太宗錄之館中俾修太平御覽等書鼎臣學士侍郎以東觀庭梅昔翰苑之豪末今復半枯向時同僚零落都盡素髪垂領兹唯二人感舊傷懷發於吟詠惠然好我不能無言輒次來韻攀和憶見萌芽日還憐合抱時舊歡如夢想物態暗遷移素豔今無幾朱顔亦自衰樹將人共老何暇更悲絲唐音戊籖李度度河南洛陽人官虞部員外郎句醉輕浮世事老重故鄉人宋史文苑傳度周顯德中舉進士工于詩有句云云時翰林學士申文炳知貢舉王朴錄其句薦之即擢第三累官知歙州坐事左遷度嘗以詩刻石石本傳入禁中太宗見之謂宰相曰度今安在即召對便殿擢為虞部員外郎直史館賜緋郭忠恕忠恕字恕先洛陽人七歲能文舉童子及第周廣順中為宗正丞兼國子書學博士宋太宗即位授國子主簿宣和畫譜忠恕作篆𨽻凌轢晉魏喜畫樓觀臺榭皆髙古謫官江都逾旬失其所在後閲數歲與陳摶㑹于華山而後不復聞蓋亦仙去矣句為逢末劫歸依佛不就新恩叙理官困學紀聞建隆初詔五代時命官投狀叙理復命之郭恕先詩云云飛龍在天利見大人而猶不屈其志如此陳摶摶字圖南自號扶搖子亳州真源人後唐長興中舉進士不第隱居華山雲臺觀年近百歳周世宗召至闕下賜號白雲先生宋太宗再召見待以賔禮賜號希夷先生放還山化形于張超谷有髙陽集釣潭集歸隱十年蹤跡走紅塵回首青山入夢頻紫陌縱榮爭及睡朱門雖富不如貧愁聞劒㦸扶危主悶聽笙歌聒醉人攜取琴書歸舊隱野花啼鳥一般春卲伯温學易辨惑云搏隱居華陰山自晉以後每聞一朝革命顰蹙數日人有問者瞪目不答一日乘驢遊華陰市聞太祖登極大笑問其故曰天下自此定矣遁迹之初作此詩云云豈淺丈夫哉詠毛女曽折松枝為寶櫛又編栗葉作羅襦有時問著秦宫事笑撚仙花望太虚翰府名談辭上歸進詩草澤吾皇詔圖南摶姓陳三峯千載客四海一閒人世態從來薄詩情自得眞乞全麞鹿性何處不稱臣澠水燕談太平興國初召赴闕賜號希夷久之辭歸作石刻詩并序因攀奉縣尹尚書水南小酌回捨轡特叩松扃謁髙公茶話移時偶書二十八字道門弟子圖南上我謂浮榮眞是幻醉來捨轡謁髙公因聆𤣥論冥冥理轉覺塵寰一夢中老學菴筆記卭州天慶觀石刻希夷詩云云末書太歲丁酉蓋蜀孟㫤時當石晉天福中也文與可䟦云髙公者此觀都威儀何昌一也希夷從之學鎖鼻術贈張乖厓自吳入蜀是尋常歌舞筵中救火忙乞得金陵養閒散也須多謝鬢邊瘡古今詩話張忠定公少謁華山陳圖南圖南贈詩一絶始皆不喻其意後忠定更鎮杭益晚年發瘡于鬢移守金陵遂薨悉如其言西峯為愛西峯好吟頭盡日昻巖花紅作陣溪水綠成行㡬夜礙新月半山無夕陽寄言嘉遯客此處是仙鄉詩人玉屑題石水澗銀河灑落翠光冷一派迴環淡晚暉幾恨卻為頑石礙琉璃滑處玉花飛宋藝圃集楊朴朴字契元鄭州人少與畢士安同學士安薦之太宗以布衣召見賦莎衣詩辭官而歸有東里集蒙齋筆談朴性癖嘗騎驢往來鄭圃每欲作詩即伏草間冥搜得句則躍而出遇之者皆驚村居感興一壺村酒膠牙酸十數胡皴徹骨乾隨著四婆帬子後杖頭挑去賽蠶官劉後村䟦楊通老移居圖一㡌而跣者荷藥瓢書巻先行一髫而牧者負布囊驅三羊繼之一女子蓬首挾琴一童子肩猫一童子背一小兒一奴荷薦席筠籃帛槌之屬又繼之處士㡌帶執巻騎驢一奴負琴又繼之細君抱一兒騎牛别一兒坐母前持箠曵繩殿其後處士攢眉凝思若覔句然雖妻子奴婢生生服用之具極天下之酸寒藍縷然猶畜二琴手不釋巻其迂闊野逸之態每一展玩使人意消舊題云楊通老移居圖本朝處士魏野有亭榭林逋無妻子惟楊朴最貧而有累恐是畫朴但朴字契元不字通老明日翻故紙得朴集洛人臧逋為序有朴絶句云云放翁䟦云四婆即處士之配蘇嶠季真家有處士夫妻像野逸如生凡集所載與巻内物色皆合騎牛者四婆作詩送朴赴召者也七夕未㑹牽牛意若何須邀織女弄金梭年年乞與人間巧不道人間巧已多後村千家詩莎衣輭綠柔藍著勝衣倚船吟釣正相宜蒹葭影裏和烟卧菡萏香中帶雨披狂脱酒家春醉後亂堆漁舍晚晴時直饒紫綬金章貴未肯輕輕博換伊瀛奎律髓此詩對御所賦天下傳誦絶句昨夜西風爛漫秋今朝東岸獨垂鉤紫袍不識莎衣客曾對君王十二旒桐江詩話楊朴契元一日秋晴釣于道旁溪中值漕臺陳文惠出從者呵之契元竟不顧文惠怒攝至郵亭中詰之契元丏紙筆供狀乃作絶句云云文惠謝遣之句就客飲時擔酒去見魚遊處撥萍開拄杖瀛奎律髓葛守忠守忠太平興國中使臣荅陳摶華嶽三峯客幽居不記年烟霞為活計雲水作家緣種藥茅庭畔栽松澗壑邊暫離仙洞去可應帝王宣華嶽全集伍彬彬郴陽人初事馬氏王師下湖湘授官為安邑簿秩滿歸隱題全義分水嶺前賢功及物禹後杳難儔不及古今色平分南北流寒衝山影岸清繞荻花洲盡是朝宗去潺湲早晚休句稚子出看莎徑沒漁翁來報竹橋流夏日喜雨言系述以上雅凌景陽景陽淳化中鎮國軍節度使海棠名園封植幾經春露溼煙梢畫不真多謝許昌傳雅什蜀都曾未識詩人海棠譜宋詩紀事巻五
