body:
  text: 宋詩紀事巻七十一錢塘厲鶚撰葉紹翁紹翁字嗣宗建安人有靖逸小集四朝聞見錄西湖秋晩愛山不買城中地畏客長撐屋後船荷葉無多秋事晩又隨鷗鷺過殘年秋日遊龍井引道煩雙鶴攜囊倩一僮竹光杯影裏人語水聲中不雨雲常溼無霜葉自紅我來何所事端為聽松風出北關一里脫衣命僕浣塵埃籬落人家未見梅出得城門能幾步船頭便有白鷗來嘉興界平野無山盡見天九分蘆葦一分烟悠悠綠水分枝港撐出南鄰放鴨船九日呈慎直院秋風吹客客思家破帽從渠自在斜腸斷故山歸未得借人籬落種黄花賦葛天民栽葦葉礙漁舟入叢分水國寛低回藏鷺渚髣髴釣魚竿蕩戸和萍送溪翁當竹看所憐如許節不耐雪霜寒西溪一條横木過前溪村女齊登采葉梯獨立衡門春雨細白雞飛上樹梢啼以上靖逸小集猫圖醉薄荷撲蟬蛾主人家奈鼠何隨隱漫錄漢武帝殿號長秋花寂寂臺名思子草茫茫尚無人世團圞樂枉認蓬萊作帝鄉齊東野語黄榮仲江上晩眺十里滄波自在流滿天風月下蘆洲待攜六幅生綃去畫出江南水墨秋後村千家詩王君良江行暮雲含雨意江路轉凄清秋泊扁舟處時聞孤雁聲莫愁秋欲老只是客關情不信他鄉恨吟邊分外生後村千家詩劉翼翼字躔父福唐人有心游摘稾林鬳齋序云躔父與予同事樂軒先生鄙夷場屋之技獨力于詩晩而傲世自樂盡去繩墨法度自為樂軒一家之言如娑羅林中最後說法六師諸魔聞者益懼矣伯言見和拙作以漢隷書之謝以七韻李潮善八分求歌杜陵叟有人和我詩半紙餘科斗風雲生其懷劒㦸出其手石經中郎蔡新樣元和柳元常文不傳退之書何有待我農隙時載筆隨君後袖手眼亦明聊與之飲酒山寺聽雨問道論詩也一宗燒柴煨芋佛家風要知眞樂人間少聽雨空山破寺中以上心游摘稾周端臣端臣字彥良號葵窗御前應制内人燒香圖花底燒香深閉門宫鴉棲了已黄昏君王未識無人妒雖不承恩卻感恩詩家鼎臠落梅條脫空嗟萼綠華俗塵誰見駐香車數聲畫角單于塞一曲山香阿母家墮砌尚疑妝後粉㸃衣猶認唾時花别來埋沒春風靣幾度虚窗歎月華買木犀花􅂸卻杖頭沽酒物湖邊博得木犀花西風可是無拘束一路吹香直到家以上後村千家詩古斷腸曲條風窗戸柳陰陰雲碧春衫䕶水沈花裏小䦨人不到流鶯啼起去年心依舊斜陽燕子樓共誰把酒話閒愁韋娘去後西風老爛漫黄花滿院秋詩林萬選裦親崇壽敎寺萬竹蒼寒擁寺門寺碑金字御書存榮華肎信當年事儀制空留後世恩影閣有聲塵網暗殯宫無月土花昏見梅不敢輕扳折恐是春風水際魂西湖遊覽志寺在清波門外方家峪俗稱劉娘子寺宋紹興十八年劉貴妃建妃臨安人入宫為紅霞帔得幸累遷才人婕妤婉容尋進貴妃専掌御前文字工書畫上用奉華堂印父懋因金人南侵獻錢二萬緡以助軍費高宗嘉之遂令建寺以為功德有泉自鳳凰山而下注為方池命曰鳳凰泉于湖張孝祥書刻内有松雪亭觀音洞筆架池偃松交枝檜壁間陳公儲畫龍甚奇周端臣詩云云題葉靖逸東菴一菴自隱古城邊不是山林不市廛落月半窗霜滿屋卧聽宰相去朝天宋藝圃集施文焴金陵作紫盖東南久寂寥石城烟霧壓岧嶤登臺倦客懷千古宿内閒人夢六朝御苑雲浮曽拾翠舊橋月落尚吹簫諸公不說新亭事目斷空江半日潮景定建康志鄧夢杰夢杰旴江人賡梅山壁閒韻媿我身名墮褐冠無因安得到仙壇子眞雖隱名難隱萬古高風凜凜寒梅仙事實張榘榘南徐人題雨花臺莫說南朝勝槩繁秖今近郭已江村臺荒浪紀曼花墜事往空餘古意存甌缺正緣輕納景鼎分誰謂不如孫滔滔千載興亡恨盡付凭欄對月樽景定建康志徐獻可獻可永嘉人官至泉州守書齋十日書齋九日扃春晴何處不閒行瓶花落盡無人管留得殘枝葉自生東甌詩集聞九成九成餘杭人洞霄山隱齋餘杭之山天柱峯下有石洞蟠蒼龍齋居無塵山四合仙人宴坐空翠中夜捫北斗罡氣接晨吸東日精光通醉淩高風駕白鶴笑視黄庭驅玉童人閒自有赤松子方外或友洪崖公丹泉吹陰曉霧碧野果變色秋山紅獻酬且盡琉璃鍾笑談便是蓬萊宫肎如金粟衰病翁㪚花丈室談虛空洞霄詩集徐千里茉莉炎州綠女雪為肌十二朱䦨月未移香逼簟紋眠不得為渠醒到打鐘時後村千家詩饒良輔良輔字昌朝號竹溪竹徑步月素月流空天不夜清輝散入疎林下下有幽人獨往來杖藜縹緲誰能畫詩家鼎臠朱承祖鶴林寺鶴林古竹院馬素舊松關草合門前路雲埋寺後山花神千載去僧話片時閒滿壁瑰奇句慙窺豹一斑鶴林寺志鄭雲林海棠貪詩閒費一生心水際雲崖到處尋可惜春光吾老矣海棠烟雨閉門深全芳備祖范仁仲題梅仙山說到神仙事渺茫壽春亘古此靈場松邊白隱千年鶴嶺外紅拖幾夕陽霞馭月寒時弄影斗壇風冷夜聞香先生不必眞人號自與乾坤共久長梅仙事實蔣夢炎寒食不暖不寒寒食天小橋楊柳未飛綿三分春有一分在十日晴無兩日全桐角喚囘前嶂曉子規啼破隔江烟麻帬素髻誰家女哭向墦閒送紙錢後村千家詩馬知節知節字介卿環溪人曰璐按宋史馬正恵知節字子元祥符人此字介卿環溪人見宋刋詩家鼎臠所選俱南渡人詩蓋與正恵同姓名者枯梅斧斤戕不死半蘚半枯槎寂寞幽巖下一枝三四花詩家鼎臠阮南溪梨花繽紛紫雪浮鬚細冷淡清姿奪玉光剛笑何郎曾傅粉絶憐荀令愛熏香合璧事類别集吕防防臨川令題梅壇封事悠悠即挂冠蒼煙古木鎖空壇當時不識蓬萊客秖作南昌一尉看梅仙事實王安之安之字叔安號藥窗寄友憶昔青燈夜坐牕吟猨聲裏早梅香一從去櫂衝寒雪幾度凭䦨到夕陽秋思漸于蟬外覺别愁空入雁邊長梧桐解得離人意不遣西風葉盡黄詩家鼎臠張異異新昌人題梅壇上疏歸來日已西山中旋製薜蘿衣謀身豈為金丹祕去國應知火祚移風露滿林蟬幾蛻松杉遶屋鶴孤飛瓣香僕僕非公願自有忠誠天地知梅仙事實賈仲頴仲頴永嘉人句燈花寒影裏詩句雨聲中盡開窗戸容秋月徧倚䦨干看晩山後村詩話葛逸虎丘呈元機上人樓觀倚雲端烟收陸海寛蒼厓留劒跡古木見龍蟠石徑青苔滿霜林木葉乾凭䦨千里豁爽氣逼人寒虎丘志富嚴游虎丘繚繞禪關鎖翠微游人到此便忘歸古今不盡春風恨一劒清泉浸落暉虎丘志謝子才柳嫩葉吹風不自持淺黄微綠映清池玉人未識分離恨折向堂前學畫眉後村千家詩宋自適自適字正父金華人號清隱早行西郊雲起白漫漫近樹遙峯欲辨難山下幾多迷路者人間方夢大槐安梅磵詩話柳絲絲烟雨弄輕柔偏稱黄鸝與白鷗纔著一蟬嘶晩日西風容易便成秋全芳備祖句江湖多少盟鷗地莫近平津閣畔行送愿父弟山題䟦眞西路德章盱貽旅舍道旁草屋兩三家見客擂麻旋㸃茶漸近中原語音好不知淮水是天涯詩人玉屑王顯世顯世字子亦南安人官寧都令有容安稾烏駐道中蹲鴟用事謝黄獨木奴弄色陵烏椑落日人行桑柘裏西風雁過稻梁時故山秋晩正如此遊子天寒何所之一笑沙禽忽驚去水邊的皪早横枝詩家鼎臠尤煓煓袤諸孫理宗朝官臨安府倅浙東提刑題蘇端明書乳泉賦後萬籟既寂一氣孔神吸彼沆瀣沃此肺膺至陽之精天一所生欽哉此詞展也大成式古堂書考喻汝楫征夫白骨茫茫散不收朔風吹雪度𤓰洲殘陽欲落未落處照盡行人今古愁詩人玉屑丁木木字子植天台人次揚州何安撫節機韻送别邦江路梅花作暮愁關情何水部回首古揚州雁影明寒水冰凘澀去舟想應今夜宿霜月滿𤓰洲詩家鼎臠葉元素元素字唐卿號苔磯絶句家住夕陽江上村一灣流水䕶柴門種來松樹高于屋借與春禽養子孫後村千家詩呉吉甫句眞水黄芽長香風玉杵鳴不為三窟計永伴一輪明漕試搗藥兔長生詩困學紀聞李杜杜號棗坡過廢寺溪沙横漲水痕平閒扣雲關壁半傾殿上土花人不到斷甎支睡聽蟬鳴詩林萬選高鵬飛鵬飛字南仲餘姚人有林湖遺稾湖上好景難逢奈老何十年此地絶經過山如得意晩猶碧雨亦知愁秋更多造化從渠旋磨蟻功名笑汝撲燈蛾湖邊直欲呼船去更共漁人挂綠蓑林湖遺稾李龏龏字和父號雪林笠澤人家呉興三滙之交效元白歌詩不樂仕進年登耄期有潄石吟梅花衲翦綃集佩楚軒客談和父自作墓誌云孰生予孰死予予不自知為文之徒詩之徒今瘞于斯孰知伯道之無兒未幾死趙文曜為誌葬之何道兩山閒樹梅百株趙德符題碣曰宋詩人雪林李君之墓梅花集句林蘿深處過溪橋眼底青山映寂寥眞態生香難畫得一枝春瘦雪初消林逋蘇養正又可正平吹殺梅花影裏燈凄涼一似觀堂僧滿山明月東風夜茶煮西嵒瀑布冰張鎡花衲周文璞羅鄴貫休梅公無渡河屈平沈湘不足慕公無渡河兮公苦渡行搔短髪提壺漿玉白蘭芳不相顧驚波不在黯黮閒顏色錯漠生風烟其下無底旁無邊何用將身自棄捐李賀用王叡飛李咸温卿齊已盧仝白居昜王建重宿呉林居園亭逢雪小隱西亭為客開舊題詩句沒蒼苔銀河風急驚沙度酒作凌凘火作灰許渾鄭谷李咸用姚合寒食一年唯此兩三辰落拓東風不藉春歌酒家家花處處何曽紫陌有閒人熊孺登綃李山甫以上翦集白居昜羅鄴盧梅坡春日紅芳滿眼鬬風流誰信春來有客愁惆悵不干桃李事故山烟雨憶松楸閔雨百萬人家井水黄江南大半田無秧乖龍豈是為霖物貪弄明珠簸日光以上後村千家詩季履道履道號澄江龜山濁酒三秋館青燈半夜花故人渾在目幽夢暫還家淮近風偏惡山高月易斜新霜何處雁片影落平沙詩林萬選葉杲杲字謙夫永嘉人官史館檢閱東山堂何處著詩癯巖邊有隱廬雲生春樹合魚響夜潭虚住久無他姓山空應讀書平分謝池月吾亦百年居東甌詩集方景絢景絢字武子莆陽人擢第終于郡掾題壁明月照齊州玉龍棲欲起壯士腸夜迴寒衾潑秋水劉後村題䟦何洪洪號梅境淳安人溪居冬夜茅屋瀕溪只數椽䕶籬黄犬枕莎眠柴門不掩松梢月恐有山陰泛雪船青溪詩集車瑾瑾字元瑜黄巖人號敬齋馬家山在黄巖縣山頭紅日生山下螘蛙爭朝市誰能問煙雲我自耕胡牀調紫蕨黄獨煮香秔無意隨園綺逃名更得名台州府志朱輔虎丘自許胷中著一丘飽于世路合休休未陪靖節逺公社且與景常元慧游四野凍雲催雪到五湖春浪蹴天浮不將拾翠相隨去碾罷新茶即泛舟虎丘志宋詩紀事巻七十一
