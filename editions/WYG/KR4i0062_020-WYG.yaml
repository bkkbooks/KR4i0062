body:
  text: 宋詩紀事巻二十錢塘厲鶚撰傅堯俞堯俞字欽之鄆州湏城人徙孟州濟源未冠舉至和四年進士英宗朝累遷起居舍人同知諫院哲宗朝拜中書門下侍郎卒贈銀青光祿大夫諡獻簡紹聖中以元祐黨籍奪諡有集讀書吾屋雖諠卑頗不甚蕪穢置席屋中閒坐卧羣書内横風吹急雨入屋灑我背展巻殊未知心與古人㑹有客自外來笑我苦癡昧何致雨侵衣屢問我不對必欲窮所因起荅客亦退聊復得此心霑溼寜足悔宋文鑑李清臣清臣字邦直魏人韓魏公妻以兄子舉進士治平二年舉制科歴尚書右丞徽宗朝拜門下侍郎出知大名府卒入黨籍有淇水集墨莊漫錄李邦直有與韓魏公書云前書戲問玉梳金箆者侍白髮翁幾欲淡死矣玉梳金箆邦直之侍姬也或問命名之意邦直笑曰此俗云和尚置梳箆耳投韓太祝公子乗閒卧綘㡡白衣老吏慢寒儒不知夢見周公否曽說當時吐哺無青瑣髙議韓魏公知中山李清臣謁見其姪吏報曰太祝方寢清臣為絶句云云魏公見之曰吾知此人乆矣遂有東牀之選題江干初雪圗此身何補一毫芒三辱清時政事堂病骨未為山下土尚尋遺墨話存亡石林詩話沂山龍祠祈雨有應作南山髙崚嶒北山亦崷崪坐看南山雲出沒行如驅歸巖呼始覺山中有靈物鬱鬱其焚蘭覃覃其擊鼓祝屢歌巫屢舞我民無罪神所憐一夜雷風三尺雨嶺木兮蒼蒼溪泉兮央央雲散諸峯互明滅東阡西陌農事忙廟閉山空音響絶苕溪漁隱叢話南遷作居近城南樓歩月時散䇿小市早收燈空山晚吹笛兒呼翁可歸恐我意慘戚從來堅道念老去倦形役皇天卒相予休以南荒謫宴坐及此時聊觀鼻端白絶句八尺方牀織白藤含風漪裏睡瞢騰若無萬里還家夢便是三湘退院僧以上後村詩話送劉貢父倅海陵吾儕客京師晨夕厭讙聒僦舍八九椽鬱溽増煩渇有如轍中魚噞喁不可活百鳥趨髙門䟃􅑗互揮喝論辯若難裁氣焰歘相奪所喪或捐軀所得未易撮我聞江湖閒連山翠如抹山下走滄波山巔富松栝鳧鴨亂菰蒲魚黿聚坡堨世事劇飛電人生真漂沫誰其違樂遊而此就顰額君直祕書閣日趨黄金闥忽思雲水行飄然詎能遏朝出都門東襟胷迥披豁放舟下淮楚天地頓空闊莫苦道路難暑令怳已末君看日月疾俯仰換裘葛無謂監州㣲孔孟猶短褐時來發光華春陽奮枯枿惟君飽才術流輩服穎脱早作歸朝期豈學弦與筈揚州府志蔡挺挺字子正宋城人舉進士神宗朝歴樞宻副使判南京留司御史臺卒贈工部尚書諡敏肅以南都種山藥法送介甫并序蒙見索南都種山藥法并以生頭百十莖送上因成小詩青青正是中分天區種何妨試玉延即見引䰅緣夏木定知如蹠薦冬筵俗傳種時以足按之即如人足潤還御水冰霜結䕃迨堯雲雨露偏自裹自題還自媿揠苖應笑宋人然王荆文公詩自注皇子生獻詩昨夜薫風入舜韶君王方避正衙朝陽暉已得前星助隂沴潛随夜雨銷耆舊續聞熙寜六年有司言四月一日當日蝕上為徹樂避正殿一夕㣲雨明日不見日食是日有皇子之慶百官入賀蔡子正為樞副因獻此詩其序事切當時無能過之者章望之望之字表民浦城人郇公得象之姪以䕃為校書郎監杭州茶庫移病去歐陽修韓綘等薦之除知烏程縣固辭以光祿寺丞致仕有集夏晝一日常百刻轉若車輪忙千日十萬刻百年能幾長達人齊古今一生甚㣲茫夏日豈為永而足以較量人世不足惜行善乃自彰無及閒暇時般樂為滛荒夷齊餓人者顔閔非公王其人品孰亞周氏與虞唐亦用仁義積豈今身未亡冨貴無可恃莫與公道強夜思晝以力四序皆流光示君夏晝誦愓愓其自傷宋文鑑蘇洵洵字明允眉州眉山人至和中歐陽修薦除校書郎以霸州文安縣主簿與姚闢同修太常因革禮書成而卒有嘉祐集雲興于山雲興于山霧霧為霧匪山不仁天實不顧山川我享為我百訴豈不畏天哀此下土斑斑鳲鳩榖榖晨號天乎未雨余不告勞誰為山川不如羽毛我客至止我客至止我迎于門來升我堂來飲我樽羞鼈不時詈我不勤求我何多請辭不能客謂主人惟子我然求子之多責子之深期子于賢以上嘉祐集淨因大覺璉師以閻立本畫水官見遺報以詩水官騎蒼龍龍行欲上天手攀時且住浩若乗風船不知幾何長足尾猶在淵下有二從臣左右乗魚黿矍鑠相顧視風舉衣袂翻女子侍君側白頰垂雙鬟手執雉尾扇容如未開蓮從者八九人非鬼非戎蠻出水未成列先登揚旗旜長刀擁旁牌白羽注強拳雖服甲與裳狀貌猶鯨鱣水獸不得從仰面以手攀空虚走雷霆雨雹晦九川風師黑虎囊面目昏塵烟翼從三神人萬里朝天關我從大覺師得此詭怪篇畫者古閻子于今三百年見者誰不愛予者誠以難在我猶在子此理寜非禪報之以好詞何必畫在前聲畫集九日和韓魏公晚嵗登門最不才蕭蕭華髪映金罍不堪丞相筵東閣閒伴諸儒老曲臺佳節已從愁裏過壯心偶傍醉中來暮歸衝雨寒無睡自把新詩百徧開瀛奎律髄詩話謂韓魏公九日飲執政老泉以布衣與坐今味閒伴諸儒老曲臺之句即是修太常禮之時非布衣也涵虚閣在南昌東湖國子博士李寅建幽居少塵事瀟灑似江村苔蘚深三徑衣冠盛一門嶺雲時聚散湖水自清渾世徳書芳史傳家有令孫南昌府志胡歸仁歸仁至和中成都人所為詩自號安定八體集句一第知何日無端意不移欲為青桂主誰與白雲期傍架齊書帙翻瓢作酒巵文明終有托休把運行推白沙溪繞白雲堆但有何人把酒杯專慕聖賢知志氣可憐談笑出塵埃碧山終日思無盡清世難羣好自猜風滿老松門晝掩可憐髙尚掞天才蔡寛夫詩話亦自精宻但所取多唐末五代人詩無復佳話耳李宗易宗易字簡夫宛丘人歴官尚書屯田員外郎知光化軍事仕至太常少卿有詩集閒居有感進退荷君恩孤懐豈易論以閒銷日月何力報乾坤架上書千巻花前酒一尊相持兩成癖此外盡忘言静居大都心足身還足秪恐身閒心未閒但得心閒随處樂不湏朝市與雲山以上宋文鑑題峴山石幢叔子祠荒嵗已深異時賢守重登臨峴山岑寂瞻風㮣漢水靈長想徳音奉詔始聞新締葺有知那復歎湮沈又刋翠琰留南夏先後功名照古今襄陽府志張伯玉伯玉字公達建安人第進士嘗為蘇州郡從事范文正公舉以應賢良方正能直言極諫科嘉祐中為御史出知太平府後選司封郎中有蓬萊集鐵圍山叢談張端公伯玉仁廟朝人也名重當時號張百杯又曰張百篇言一飲酒百杯一掃詩百篇故也明月泉至今千丈松猶伴數巖雪不見纖塵飛寒泉湛明月墨客揮犀張端公過姑孰見李太白十詠歎美乆之周流泉石閒後見一水清激詢地人曰此名明月泉公曰太白不題此泉將留以待我也贈陳虞卿東呉王孫歸挂冠玉絲紅鱠滿雕盤狂吟但覺日月乆醉舞不知天地寛小圃移花山客痩夜窗𢷬藥橘童寒新書近日成多少且告先生旋借看中呉紀聞虎丘東客從來過虎丘橘花渡口維扁舟闔閭宫殿不可見但對古塔寒颼飀憶昔夫差全勝日水犀十萬横呉鉤楚山既掘荆人冡越嶺仍將句踐囚豈謂西施能破國誰知麋鹿上臺遊唯有呉王在時月夜深閒照劒池頭呉郡志遙題錢公輔衆樂亭句章太守錢君倚湖上新為衆樂亭花木豈徒遊子愛笙歌長與郡人聽坐來高韻天風起飲罷餘香夕雨零安得凭闌縱吟筆玉觴遙對數峯青延祐四明志張鑄鑄官京東轉運使與葛提舉提司坑冶是新差職比催綱勝一階若發薦章求腳色下官蹤跡轉沈埋趙槩見聞雜錄張鑄以京東轉運使坐公事降通判太平州葛洪為提舉坑冶取鑄腳色欲發薦狀鑄與詩云云梅堯臣堯臣字聖俞宣城人詢從子以䕃補齋郎嘉祐初召試賜進士擢國子直講歴尚書都官員外郎卒有宛陵集宋子京筆記余每見舊所作文章憎之必欲燒棄梅堯臣曰公文進矣僕之詩亦然歐公詩話聖俞子美齊名一時詩體特異子美筆力豪俊以超邁横絶為竒聖俞覃思精㣲以深逺閒淡為意各極其長雖善論者不能優劣歸田錄梅聖俞以詩知名三十年終不得一館職晚年與修唐書書成未奏而卒其初受敕也語其妻刁氏曰吾之修書可謂猢猻入布袋矣刁氏對曰君于仕宦亦何異鮎魚上竹竿耶聞者皆以為善對韻語陽秋張芸叟評梅聖俞詩云如深山道人草衣捆屨王公大人見之屈膝苕溪漁隠叢話舊説梅聖俞日課一詩寒暑未嘗易也敖陶孫詩評梅聖俞如關河放溜瞬息無聲寄馬遵三更醉下陵陽峯仙舟江上去無蹤槎牙鐵鎖漫横絶櫓溼不驚潭底龍斷腸呉姬指如筍欲剝玉榧將何從短翎水鴨飛不逺那經細雨山重重卻顧舊埒病驄馬塵沙歴盡空龍鍾隱居詩話馬遵謫守宣州及其去也郡僚軍民爭欲駐留至以鐵鎖絶江遵于餞筵倚醉令官妓剝榧實而食眷眷若留連狀及以所乗驄寄聖俞家郡人皆不疑其去也遵夜使人絶鎖解舟以水沃櫓牙使之不鳴逮曉舟去逺矣舟中與家人飲月出斷岸口影照别舸背且獨與婦飲頗勝俗客對月漸上我席暝色亦少退豈必在秉燭此景亦可愛西清詩話晏元獻守汝隂梅聖俞往見之將行公置酒潁河上因言古人章句中全用平聲製字穩貼如枯桑知天風是也恨未見側字詩聖俞既引舟遂作五側體寄公云云花娘歌花娘十二能歌舞籍甚聲名居樂府荏苒其閒十四年朝為行雲暮為雨格髙氣俊能動人人能動之無幾許前嵗適從江國來時因讌席相㣲語雖有幽情未得傅暗結慇懃度寒暑去春從客出東城舟中接膝心已傾自從稍稍有期約五月蓮航並釣行曲隄别浦無人處始笑鴛鴦浪得名爾後頓逢殊燕婉各恨從來相見晚月下星前不暫離暫離已抵銀河遠青鳥傳音日幾回雞鳴歸去暮還來經秋度臘無纖失愛極情專易得猜前年南圃尋芳卉小忿不勝投袂起官司乗釁作威凌督促倉皇出閭里瀟瀟風雨滿長溪一舸飄然逐流水忽逢小吏向城東泣淚寄言心欲死願郎日日致青雲妾已長甘在泥滓更悲恩義不得終世事難憑何若此郎聞此語痛莫禁天地無窮恨不巳我今為爾偶成章便欲緘之托雙鯉莫打鴨莫打鴨打鴨驚鴛鴦鴛鴦新自南州落不比孤洲老禿鶬秃鶬尚有獨飛去何況鴛鴦羽翼長侯鯖錄宣城守吕士龍好緣㣲罪杖營妓後樂籍中得一客娼妙麗善歌有聲于江南士龍眷之一日復欲杖營妓并麗華麗華曰不避杖但恐新到某人不安耳士龍笑而從之麗華短肥故聖俞作莫打鴨以解之京師逢賣梅花驛使前時走馬回北人初識越人梅清香莫把酴醿比只欠溪邉月下杯苕溪漁隱叢話東坡云此梅二丈絶句吾雖後輩猶及與之周旋覽其親書詩如見其抵掌談笑也采石月下贈功甫采石月下訪謫仙夜披錦袍坐釣船醉中愛月江底懸以手弄月身翻然不應暴落飢蛟涎便當騎鯨上青天青山有冢人謾傳郤來人閒知幾年在昔熟識汾陽王納官貰死義難忘今觀郭裔竒俊郎眉目真似工文章死生往復如康莊樹穴探環知姓羊苕溪漁隱叢話聖俞贈功甫云云余謂李白從永王璘之辟璘敗當誅郭子儀請解官以贖其罪有詔長流夜郎聖俞用此事尤為親切若非姓郭亦難用矣功甫母夢李白而生功甫少有詩名聖俞嘗曰天才如此真太白後身也陳恭公挽詞二首位至三公有恩加錫諡無再調金鉉鼎屢刻玉麟符已歎鸞同穴還悲鳯少雛擁塗看鹵簿誰為畢三虞公在中書日朝廷百事叢王官多不喜天子以為忠富貴人閒少恩榮歿後隆若非笳鼓咽寂莫奈秋風東軒筆錄陳恭公事仁宗兩為相悉心盡瘁百度振舉然性嚴重語言簡直與人少周旋接賔客以至親戚骨月未嘗從容談笑尤靳恩澤士大夫多怨之唯仁宗嘗曰不昧我者唯陳執中耳及終也韓維張洞諡之曰榮靈仁宗特賜曰恭薨後月餘夫人謝氏繼卒一子纔七嵗諸姪俱之官葬日門下之士唯解賔王至墓所世人嗟悼之梅堯臣作挽詞兩首具載其事劉丞相挽詞二首處外諸侯重居朝聖主知祅逢庚子日夢異戊丁時歸椁江山遠凝笳道路悲欲傳千古迹佐世本無為古今皆可見富貴不常存歌者未離席弔賔俄在門朱輪空返轍淥酒尚盈尊人事固如此令名貽後昆東軒筆錄劉丞相沆鎮陳州日鄭獬經由丞相為啓宴于外庭使妓樂迎引至通衢有朱衣樂人誤㫖公性卞急遽杖于馬前既而即席酒數行而公得疾舁還府衙而終先是張侍讀環夢公馬前有一朱衣人被血而立至是果有此變梅堯臣為公挽詞詩二首具載其事春雪朔風三日暗吹沙蛟龍巻沫噴成花花飛萬里奪曉月白日爛堆愁女媧大明廣庭踏朝賀雉尾不掃黏官鞾宫中才人承聖顔承觴稱夀呼南山三公免責百姓喜斗酒十千誰復慳以上宛陵集六一詩話蘇子瞻學士嘗于淯井監得西南夷人所賣蠻布弓衣其文織成梅聖俞春雪詩此詩在聖俞集中未為絶唱而異域之人貴重如此子瞻以余尤知梅聖俞者得之因以見遺余家舊畜琴一張乃寳歴二年雷㑹所斲其聲清越如擊金石遂以此布更為琴囊二物真余家之寳玩也書竄詩皇祐辛卯冬十月十九日御史唐子方危言初造膝曰朝有巨奸臣介所憤嫉願條一二事臣職敢妄率宰相文彦博邪行世莫匹曩時守成都委曲媚貴暱銀璫插左貂窮臘使馳驛邦媛將夸侈中賫金十鎰為我寄使君竒文織纖宻遂傾西蜀巧日夜急鞭抶紅經緯金縷排料鬬八七比比雙蓮華篝燈戴心出幾日成一端持行如鬼疾明年觀上元被服穩稱質燦然驚上目遽爾有薄詰既聞所從來佞對似未失且云奉至尊于妾豈能必遂回天子顔百事容丏乞臣今得粗陳狡獪彼非一偷威與賣利次第推甲乙是惟隂猾雄仁斷宜首黜必欲致太平在列無如弼弼亦昧平生況臣不阿屈臣言天下公奚敢身自䘏君旁有側目喑啞横詆叱指言為罔上廢汝還蓬蓽是時白此心尚不避斧鑕雖令禦魑魅甘且同飴蜜既知弗可懼復以強詞窒帝聲亦大厲論奏不容畢介也容甚閒猛士膽為慄立貶嶺外春速欲為異物内外官洶洶陛下何未悉即敢救者誰襄執左右筆謂此儻不容盛美有所咈平明中執法懐疏又堅述介言或似狂百豈無一實恐傷四海和幸勿苦倉卒亟許遷英山衢路猶嗟咄翊日宣白麻稱快口盈溢阿附連諫官去若懐絮蝨其閒因獲利竊笑等蚌鷸英州五千里瘦馬行䭿䭿毒蛇噴曉霧晝與嵐氣沒妻孥不同途風浪過蛟窟存亡未可知旅館愁傷骨飢僕時後先隨猨拾橡栗粤林多蔽天黄柑雜丹橘萬室同釀酤撫遠無禁律醉去不湏錢醒來弄鳴瑟山水仍竒怪已可消憂鬱莫作楚大夫懐沙自沈汨西漢梅子真出為呉市卒市卒且不慙況兹别秉秩東軒筆錄張堯佐以進士擢第累官至屯田員外郎知開州㑹其姪女有寵于仁宗冊為修媛堯佐遂驟遷擢一日中除宣徽節度景靈羣牧四使是時御史唐介上疏引天寳楊國忠為戒不報又與諫官包拯呉奎等七人論列殿上既而中丞御史留百官列班以廷諫卒奪堯佐宣徽使知河陽唐謂同列曰是欲與以宣徽而假河陽為名耳我曹豈可中已耶同列依違不前唐獨爭之不能奪仁宗諭曰差除自是中書介遂極言宰相文彦博以燈籠錦媚貴妃而致位宰相今又以宣徽使結堯佐請逐彦博而相富弼又言諫官觀望挾奸而言渉宫掖語甚切直仁宗怒亟召兩府以疏示之介猶諍不已樞宻副使梁適叱介使下殿介諍愈切仁宗大怒玉音甚厲衆恐禍出不測是時蔡襄修起居注立殿陛即進曰介誠狂直然納諫容言人主之美德必望全貸遂貶春州别駕翊日御史中丞王舉政救解之改為英州别駕始上怒未巳兩府竊議曰若重貶介則彦博不安彦博去即吾屬遞遷矣既而果如其料當是時梅堯臣作書竄詩云云始堯臣作此詩不敢示人及歐陽修編其集時有嫌避又削出此詩是以少人知故全錄焉贈王英英山陽女子大字書不學常流事梳洗親傳筆法中郎孫妙畫蠶頭魯公體隱居詩話楚州有官妓王英英喜筆札學顔魯公體蔡襄頃教以筆法晚年作大字甚佳梅堯臣贈之詩云云英英貌甚陋故有不事梳洗之句中郎孫君謨也詠老人泉泉中有老人隱見不可常蘇子居其閒飲水樂未央泉中必有魚與子日倘佯泉中茍無魚子持玩滄浪嵗月不知老家有雛鳯凰百鳥戢羽翼不敢呈文章去為伸尼歎出為盛時祥方今天子聖毋滯此泉旁苕溪漁隱叢話東坡言先君與梅二丈遊時軾與子由甚少未有知者梅公獨知之家有老人泉公作詩云云聖俞歿今四十年矣南遷至合浦見其門人歐陽晦夫出其詩槀數十幅其遺晦夫詩云我家無梧桐安得久留鳯晦夫年六十六尚少余一嵗然白髮蒼顔畧相似困窮亦不相遠執手大笑曰聖俞所謂鳯者豈例皆窮如此乎句不見分香妾空餘鬬鴨闌趙韓王故宅竹隂過晚雨林表見殘虹納涼鬢約寒鵶碧衣輕舞蜨黄㑹東堂斜陽鳥外落新月樹端生泛江綠草旋抽心青梅猶帶蕚暮春五更千里夢殘月一聲雞夢後寄永叔雨過短亭雲斷續鶯啼髙栁路西東送趙徐州有客過顔巷無貧似阮家和希深見過曉漲林煙重春歸野水平廣福閣好峯隨處改幽逕獨行迷山行晩雲連雨黒秋水帶沙渾朱家曲山形無地接寺界與波分金山衣霑寒食雨花發故宫牆送人永寕迸筍過幽草吹香到别家春日東齋懸蟲低復上鬭雀墮還飛秋日家居風雨幽林静雲烟古寺深遊嵩避雨野色逼人寒嵐光添酒綠牛首山寺霜氣冷侵被月光斜入扉省中初直對山憐去鳥隔樹識遊人泛西湖長楊静響千重瓦太液寒生幾寸波雨南嶺禽過北嶺呌高田水入低田流經田家野鳧眠岸有閒意老樹著花無醜枝東溪花寒蛺蜨猶相守水冷鴛鴦不暫分寄王學士吟窗雜錄張獻民獻民宣城主簿嘗與梅聖俞倡和朝陽洞撇衣秉火捫石入路硬磽确黑如漆窮深不見瞿硎生洞中依舊石藏室夕陽巖屹嵲欲到倚山腳涵雲洩雨摩半空向晚呀然射頽照疊石爛爛參差紅以上寜國府志呉季野季野與梅聖俞同時倡和遊山門寺望文脊山宣城百山閒文脊尤竒峯㧞出飛鳥上圖畫難為容聞昔有幽人捫蘿追赤松遺形此石室孤坐鹿裘重人去邈不返洞壑空藏龍側行蒼崖烟俯仰求靈蹤逝者追可得甘棄萬戸封安能乆塵土傾倒相迎逢寜國府志柳紳紳官著作佐郎仙都山獨出諸峯表周圍一丈圎千尋雄鎮地萬仞上擎天湖浪動星際荷花生日邉終當駕雲鶴絶頂㑹神仙仙都山志陳若拙若拙處州守題仙都山發地更擎天根盤數畝烟化工成突兀轍迹似雕鐫峭㧞殊無倚孤髙衆莫肩軒轅從此去知復幾千年仙都山志曽鞏鞏字子固建昌南豐人易占長子嘉祐二年進士調太平州司法參軍召為集賢校理出知福明等州神宗朝加史館修撰中書舍人卒有元豐類稾續稾外集麻姑山送南城尉羅君麻姑之路摩青天蒼苔白石松風寒峭壁直上無攀援懸磴十歩九屈盤上有錦繡百頃之平田山中遺民耕紫烟又有白玉萬仞之飛泉噴崖直瀉蛟龍淵豐堂廣殿何言言階腳插入斗牛閒樛枝古木不計年空嗟枵然卧道邉幽花自嬋娟林深為誰妍但見塵銷境静翔白鶴吟清猿雛禽乳鹿往往噑荒顛卻視來徑如緣絙千重萬疊窮巖巒下有荆呉粟粒之羣山又有甌閩一髮之平川奕棊縱横遠近布菽麥魚鱗參差髙下分岡原千竒萬異可意得筆墨秃盡誰能傳丈夫舒巻要宏達世路俯仰多拘牽偶來到此醒心目便足洗耳辭嚻喧羅夫子一日逺補東南官愛此層崖峻壑之秀發開軒把酒可縱觀喜此披霧插漢之夐起出門舉足得往還羅夫子一尉東南方屈盤此邦之人衣食足問境年年桴鼓閒几案剸裁得休暇山水登躡遺紛煩我行送之思故國引領南望心常懸金山寺塵外岧嶤鷲嶺宫架虚排險出青紅林光巧轉滄波上海色遙涵白日東夜静神龍聽呪食秋涼蒼鶻起摶風連荆控蜀長江水盡在迴廊顧盼中錢塘上元夜祥符寺陪咨臣郎中丈燕席月明如晝露華濃錦帳名郎笑語同金地夜寒消美酒玉人春困倚東風紅雲燈火浮滄海碧水樓臺浸逺空白髮蹉跎歡意少強顔猶入少年叢鮑山在濟南城東三十里世傳鮑叔牙管仲分金處下有鮑城蓋叔牙食邑雲中一㸃鮑山青東望能令兩眼明若道人心似矛戟山中那得叔牙城聖夀院昌山主静軒一峯瀟灑背城隂碧瓦新堂地布金花落禪衣松砌冷日臨經帙紙窗深幽棲鳥得林中樂燕坐人存世外心應是白蓮香火社不妨籃轝客追尋凝香齋在濟南郡舊名西齋文定公取韋應物燕寝凝清香之句更名每覺西齋景最幽不知官是古諸侯一尊風月身無事千里耕桑嵗有秋雲水醒心鳴好鳥玉砂清耳潄寒流沈心細細紬黄巻疑在香爐最上頭多景樓欲收嘉景此樓中倚徙闌干四望通雲亂水光浮紫翠天含山氣入青紅一川鐘唄淮南月萬里帆檣海外風老去衣襟塵土在秪將心目羨冥鴻金線泉玉甃常浮顥氣鮮金絲不定路南泉雲依美藻爭成縷月照寒溪巧上弦已繞渚花紅灼灼更縈沙竹翠娟娟無風到底塵埃盡界破冰綃一片天能改齋漫錄齊州城西張諌議園亭有金線泉石甃方池廣袤丈餘泉亂發其下東注城壕中澄澈見底池心南北有金線一道隱起水面曽南豐有詩霧凇園林初日静無風霧凇開花處處同記得集英深殿裏舞人齊插玉瓏鬆墨莊漫錄東北冬月寒甚夜氣塞空如霧著于林木凝結如珠玉見睍乃消齊魯謂之霧凇諺云霧凇重霧凇窮漢置飯甕豐年之兆也曽子固在齊州詩云云北歸江海多年似轉蓬白頭歸拜未央宫堵牆學士爭相問何處塵埃瘦老翁以上元豐類稾將行陪貳車觀燈行歌紅粉滿城歡猶作常時五馬看忽憶使君身是客一時揮淚逐金鞍赴齊州淮南蒙召鬢毛斑乞得東秦慰病顔曉整輕鞍汶陽北卻衝㣲雨看青山以上合璧事類後集曽布布字子宣鞏弟與兄同年登第熙寧初除崇政殿説書元豐初累官户部尚書哲宗朝擢同知樞宻院事徽宗即位以定䇿功拜尚書右僕射崇寜初出知潤州連遭貶竄復提舉嵩山崇福宫卒贈觀文殿大學士諡文肅入黨籍能改齋漫錄曽子宣以亥年亥月亥日亥時生章子厚毎以四亥公呼之表海亭表海風流舊所聞青冥飛觀一畨新山河十二名空在簪履三千迹已陳極目烟嵐九霄近滿川樓閣萬家春由來興廢南柯夢且喜登臨屬後人東臯雜錄青社表海亭取太公表東海之義元祐初曽子宣為守鼎新之有詩云云布作髙陽臺衆樂園成被命與金陵易地兄弟待罪侍從對更方面實為私門之慶走筆寄子開弟樓臺丹碧照天涯塞北江南未足誇千里烟波方種栁萬株桃李未開花一麾同下西清路兩鎮髙迎上將牙回首林塘莫留戀風光還屬阿連家瀛奎律髄此事古今希有將吏交迎送于途誠盛事也後子宣相子開當制尤為盛事又其後居京口先後一日卒惜子宣為小人之相靈泉寺一掬寒泉照眼明冰霜凛凜坐中清生芻想見當時客華屋空留後世名曉日淨涵金碧影秋風暗動佩環聲他年卜築南山下白首何人共濯纓撫州府志曽孝寛孝寛字公綽公亮子以䕃仕熙寜中累官簽書樞宻院事吏部尚書卒贈右光祿大夫史院席上奉和首相呉公元韻御府朌醇釀君恩錫餕餘賜筵遵故事紬史重新書燕飲難偕此風流不偉歟素飱非所職媿附相君車揮麈後錄馬端端官太常博士通判延州軍州事司馬晉州待制哀辭石刻在夏縣司馬公祠堂志古流難合談髙道自明風波直恩分公為羣牧倅當曹之遷也人以公始嘗堅辭其辟當自為辨公惻然謝曰今日正宜從其行也卒不以辨識者韙之鍼石盡交情公與人交必盡規諫始若不勝其言退則敦義彌篤讓節蒙知厚公在鳯翔日被召知諫院公辭之自是深簡上心華班絶綺榮公生平特立至為侍從皆出宸選賤生懐感遇當路假晶熒端辱公以八使慰薦遂蒙改官累次青油幕端在益昌及岐下皆預賔席中閒白玉京吏文容議緩端在幕府毎奉公議特被優假邦事䘏言輕戊寅年端輒奏疏言事公時在京師嘗見憫孤直自此嗟流梗何期苦見兵是嵗别公出宰郾城明年移倅邊郡塞垣心易動漳浦信彌驚今春得三堂信知公屬疾玉蘂悲無驗金臺望忽傾嵗闌雲慘淡天迥淚縱横世有真忠亮今亡至直清舊僚知葬日投此弔佳城嘉祐元年十月三十日著作佐郎管句河東路機宜文字雷憲書求古錄祖世英世英字穎仲浦城人第進士通判融州三學院在新城縣郭文舉捨宅為寺洞庭之山天下竒岡巒百轉盤青螭金堂玉室白雲鎻中有仙客來棲遲方睛秀骨郭文舉孤劒青鞵出巖戸朅來此地訪禪翁共掃松花談太古拏雲忽駕升天行西歸隻履埋巖坰聲流影散遽如許故山惟有松風清道師懐古興不淺堂宇横陳迎翠巘悠悠遐想山阿人水帶雲衣猶在眼涼飈五月吹浮埃蕉旗竹篲搖空階我來箕踞發長嘯月光飛射雲樓開寸心浩蕩逸天外欲去復住聊徘徊永懐西山五色藥服之羽化登蓬萊杭州府志宋詩紀事巻二十
