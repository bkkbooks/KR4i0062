  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0062_WYG_098-1a, image: WYG1485/WYG1485-0816a.png}
body:
  text: 宋詩紀事巻九十八錢塘厲鶚撰欽宗皇帝帝諱桓徽宗皇帝長子大觀五年立為皇太子宣和七年詔嗣位改元靖康在位二年金人圍汴脅上皇及帝北行康王即位于南京遙上尊號曰孝慈淵聖皇帝紹興三十一年帝崩問至上尊諡曰恭文順徳仁孝皇帝廟號欽宗降筆星袍玉帶落邊塵幾見東風作好春因過江南省宗廟眼前誰是舊京人齊東野語向嘗于貴家觀降仙叩其姓名不荅忽作薛稷體大書一詩云云捧箕者大驚知為淵聖降也馬巫父巫父弋陽人玉華山地仙胡天放降仙作詩絶句玉樓雲淡曉光浮中有飛仙駕鶴游下界此時方睡熟誰尋紫氣問青牛志雅堂雜鈔三茅真人三茅真人胡天放降仙作詩絶句深深門巷老翁家自洗銅瓶浸杏花喚起承平當日夢令人轉憶舊京華志雅堂雜鈔鄭文選文選胡天放降仙作詩九洞拖露摶風海嶠來觚棱寂寂自樓臺春光不比承平日淚眼看花薦一杯志雅堂雜鈔張君有君有眉山書房吏人胡天放降仙作詩蘭渚光轉東風弄暖天永和人物尚依然誰憐紉佩淒涼客倚䇿愁吟楚澤邊志雅堂雜鈔方武裘武裘莆人劉潛夫之友胡天放降仙求賦自稱大陽洞主詠筆貌出中山肯欲仙何人拔頴縳尖圓拙夫堪笑堆成冢豪客曽聞掃似椽窗下玉蜍涵夜月几間雪繭湧春泉當時定逺成何事輕擲毛錐恐未然志雅堂雜鈔王大圭大圭江寧人胡天放降仙作詩絶句六朝盛事總成塵結綺樓前草自春一曲後庭何處覓空留月伴倚闌人志雅堂雜鈔卟仙詠萍㸃㸃青青浮野塘不容明月照滄浪風吹雨逐沙泥上燕子銜來遶畫梁全芳備祖吉州紫姑詠手笑折櫻桃力不禁時攀楊栁弄春隂管弦曲裏傳聲慢星月樓前斂拜深繡幕偷回雙舞袖綠窗閒整小眉心秋來幾度挑羅韈為憶相思放却針夷堅支志鄧氏紫姑詠衣領二首小翦雲羅雪色明香煤隨意作真行新詩便是班昭戒勝却閒書座右銘時樣新裁鬬色衣不將綵線縷花枝殷勤只要詩仙句繡出分明一段竒桃花武陵溪上舊時花兩岸晴紅爛彩霞試問劉郎緣底事花開時節未還家以上夷堅志斜橋紫姑詠艣寒巖雪壓松枝折班班剝盡青虯血運斤巧匠斲削成劒脊半開魚尾裂五湖仙子多竒致欲駕神舟探仙穴碧雲不動曉山橫數聲搖落江天月齊東野語紹興斜橋客邸有請紫姑者命艣為題賦詩云云紫姑神句簾巻滕王閣盆翻白帝城詠雨許彦周詩話周瑤英瑤英芙蓉城女仙别王子高久事屏帷不暫閒今朝離思尚闌珊臨行惟有相思淚滴在羅衣一半斑王梅溪蘇詩注王子高傳無名女仙三絶句栁條金嫩不勝鴉青粉牆頭道韞家燕子未來春寂寞小窗和雨夢梨花松影侵壇琳觀静桃花流水石橋寒東風吹過雙蝴蜨人倚危樓第幾闌屈曲闌干月半規藕花香澹水漪漪分明一夜文姬夢只有青團扇子知癸辛雜識董無益所記友人姚天澤亦喜此宋詩紀事巻九十八
