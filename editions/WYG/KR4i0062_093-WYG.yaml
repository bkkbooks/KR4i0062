花全芳備祖僧鑒僧鑒淳祐中住雪竇寺有雪竇雜詠錦鏡池一鑑涵虚碧萬象悉其中重綠浮輕綠深紅閒淺紅入山亭荒蕪行盡處幽亭聊暫止帶雨策孤笻登髙從此始以上四明山志法照表忠觀錢王古廟鎖莓苔華表秋深鶴不來昨夜石壇風露重凌霄花落鳳僊開東甌詩集斯植斯植字建中號芳庭住南嶽寺有采芝集水石山居静極青山裏松花滿石牀春風思華岳夜雨夢瀟湘人影歸林薄猨聲出㵎長心如無别事同此閉閒房送靈耀之姑蘇一身唯在道清苦獨知君世路終成别山光不共分晚天寒欲雨春樹夜生雲此去他鄉寺猨聲各自聞堤上楊柳垂絲拂畫船杏花零落斷橋邊半山烟雨東風惡更向西亭聽杜鵑湖上晚望繞隄楊柳暗漁舟二月風光淡似秋幾度笙歌人散後夕陽依舊滿紅樓上竺寺古寺寒橋路鐘聲静忽聞數峯平處合一水衆溪分老樹烟蘿雨殘燈石塔雲閑心寄幽寂似覺逺塵紛雪中寄巖泉吟罷新詩秖自看曉風吹恨上闌干夜來雪滿前山路誰對梅花説歲寒以上采芝集可齋詠萍盆池本不種青萍春杪無根也自生人道一宵生九葉不知誰數得分明全芳備祖道璨道璨字無文姓陶氏南渡時饒州薦福寺僧有柳塘外集題水墨草蟲蜻蜓低傍豆花飛絡緯無聲抱竹枝憶得西湖烟雨裏小園清曉獨行時柳塘外集題景蘇堂竹一葉復一葉也道幾翻覆一㸃復一㸃書墨要接續親見長公來一節不肎曲見竹如見公北麓能不俗回首熙豐閒幾人媿此竹呉禮部詩話東坡自黄移汝别子由于髙安過瑞昌亭子山題字崖石㸃墨竹葉上至今環山之竹葉葉有墨㸃景定中王景琰主瑞昌簿移植廳事扁其堂曰景蘇蓋簿廳東坡夜㝛處也一時多賦詩道璨云云語雖直致而意佳北麓景琰號也僧愚僧愚號虚堂劒池石壁千尋勢嶮巇下臨寒玉浸蟾輝古今多少凭闌者親見干将到底稀小呉軒結茅初不為孤峯秖愛登臨眼底空風淡雲收見天末始知呉在一毫中以上虎丘志法成山居雪壓喬林同一色清光上下含虚碧采樵人立渡頭寒極目圓蟾為誰白四朝詩僧璉僧璉字不器紅梅嬌朱淺淺透烟光痩倚疎簷半出牆雅有風情勝桃李巧含春思避冰霜融明醉臉籠輕暈斂掩仙姿蹙嫩黄旦暮風英墮行袂依微如著袖中香後村千家詩止翁無弦琴月作金徽風作弦清音不在指端傳有時彈罷無生曲露滴松梢鶴未眠四朝詩雲峯徳師上堂别衆澹然無累水雲僧去住分明葉樣輕十字街頭休作夢五湖依舊一枝藤隨隱漫錄雲峯德師住撫之廣夀途遇時貴避不及有違言即上堂别衆云云祖欽祖欽號雪巖住袁州仰山絶句千里相尋慰寂寥未嫌風雪路迢迢廬山雖好且休去更撥寒爐話一宵隨隱漫錄必萬孟享仰瞻聖駕輕塵不動馬蹄催警蹕聲中聖輦來漢代威儀周禮樂太平天子拜香回隨隱漫錄文頠文頠號棄菴題硯空山頑質世偏須禪客元慙綺色枯幾吐烟光供染翰石田隻字可留無棄菴老人文頠咸淳元年三月朔書谷水談林右端硯其背上半勒偈大字下半勒記小字記云先師禪觀之餘游戲藝苑一生不受䞋施知交唯以楮墨贈遺此硯是白衣時故物相隨最乆一日忽作偈書片紙置硯下即檢詩稾盡焚之詰朝遂示疾七日而化因摹勒遺語手書于研石藏之塔中云次年九月二十二日門人行朗記自彰自彰號濮溪遊洞霄得鄉友道士鄧君徳清話因成古語亂山倚伏龍蛇蟠蒼藤古朩門徑寒蘂宫潭潭列萬礎碧樓朱户參雲端吾聞上界足官府謫下名山作仙侣我來尋仙訪泉石落日浮雲隨杖屨道士鄧君吾故人汲泉煮茗慰酸辛笑談未厭樵柯爛回首人閒五百春洞霄詩集淨珪淨珪號借菴寓宿洞霄當年許郭棲真地暇日尋幽獨往來九轉還丹藏箬底千年遺迹寄巖隈巍巍玉殿圍青嶂寂寂瑤壇鎖綠苔假榻壺天追勝集尚憐歸興更徘徊洞霄詩集昭緝廣福寺偶題涓涓碧水細通池小雨廉纖未作泥深炷爐香濃著火何須騎馬聽朝雞烏青志宗瑩天衣故寺園廟深關春寂寂雨杉風檜翠蕭蕭山中舊事無人説碎疊唐碑補石橋東甌詩集清壹清壹宋季仙居僧寄無著逢人稱宿臘元解少人知俗濁唯貪隱禪髙不礙詩水邊秋杖屨石上雪須眉雞犬添鄰曲還同賦紫芝寄萬先輩歸從衡岳此身清老校羣書眼倍明白屋有田供伏臘青雲無夢到公卿頻挑野菜招僧至少著深衣入郭行早歲自嗟行役逺失将詩律問先生以上呉禮部詩話瑩徹新鶯歌新鶯傍簷曉更悲孤音清吟囀柔枝口邊血出語未盡豈是怨恨人不知不食枯桑椹不銜苦李花偶然弄樞機宛轉凌烟霞衆雛飛鳴何跼促自覘遊鱗啄枯朩𤣥猨何事朝夜啼白鷺長在汀洲宿黑鵰黄鶴豈不髙金籠玉鉤傷羽毛三江七澤去不得風烟日暮生波濤飛去來莫上髙城頭莫下空園裏城頭飢烏食腥羶空園燕雀爭泥滓願為結舌含白雲五月六日一聲不可聞合璧事類别集本粹别毛滄洲風雨三更夢江湖萬里心青燈正愁絶可惜不能琴詩家鼎臠放船數幅蒲帆破曉烟一篙春水漲平川誰家池館多楊柳時送飛花到客船詩林萬選自南自南宋末人廣潤寺新寮客不赴齋招冥心坐寂寥青山若厭看白首也難消鷺起衝荷葉蟲行蝕菊苖何年稱老㝛來住此閒寮瀛奎律髓徳豐徳豐三山人重陽戰盡今秋見太平西風多作北風聲不吹烏帽吹氊帽籬下黄花笑不成山房隨筆希坦希坦號率菴宋末居九華山李昭象讀書臺在碧雲峯下昭象字化文唐末避黄巢亂入九華山廢興生死妄安名山水何曾改舊清孰謂堂空人已往溪聲還作讀書聲九華山志炳同炳同字野翁新昌張氏子居明州仗錫寺句老來非厭客静裏欲書經四明山志野翁宋亡之日避跡仗錫閉户書法華經有句云云一時遺老家則堂文本心黄東發舒閬風周伯弼咸與之游子温子温字仲言號日觀又號知非子華亭人宋季止杭之瑪瑙寺珊瑚網云日觀善草書喜畫蒲萄須梗枝葉皆草書法也世號温蒲萄時貴慕其畫贄金求之一筆不與逢佳士遽命紙筆雅好著恢帽短衣囊錢果猖翔街陌探囊投市中兒問識温相公否由是進止輒擁小兒呼温相公時有賓肖羅漢醉則維筆竿杪草聖芬媚時人遂有長竿醉草賔羅漢短褐佯狂温相公之句温性嗜酒然楊總統飲之酒不一霑脣毎見則曰掘墳賊掘墳賊自題畫蒲萄曾向流沙取梵書草龍珠帳滿征途輕包短策難将帶記得西風月上初徐伯齡蟫精雋了慧了慧字岳重武林九友㑹住寶覺寺春日田園雜興月泉第三十三名平疇水遶徑微分小圃雲深景不繁此處農桑雖是僻多情鶯燕不嫌村倦眠芳草閒黄犢静對幽花倒綠樽見説弓旌方四出欲更名姓揜衡門月泉吟社原評田園對起已占地步頷聯得闔闢之妙餘佳僧朋詠魚籃觀音徒整春風兩鬢垂子規啼徧落花枝龍門上客家家是錦鯉提來賣與誰禪藻集吳僧以下無名釋子絶句看了青燈夢不成東風輥雪落寒聲半生客裏無窮恨告訴梅花説到明錦繡萬花谷薦福寺僧絶句江南江北水雲鄉千頃蘆花未著霜好景不将零碎賣一時分付謝三郎梁溪漫志紹興末江西一僧忘其名住饒州薦福寺寺傍舊多隙地寖為人侵漁僧自度力不能制乃謂其徒曰寺有主者所以主張是寺也坐視地為他人有而不能直焉用主者為吾甚媿之今當去矣即陞座鳴鼓集衆高吟云云遂閉目不語衆愕眙視之已逝矣福州僧絶句當初只欲轉頭銜轉得頭銜轉不堪何似仁王髙閣上倚欄閑唱望江南劉後村詩話福州仁王寺有僧喜唱望江南一日忽題壁曰不嫌夫壻醜亦勿厭深村但得一回嫁全勝不出門或曰此僧欲出世矣言于當路延主一刹未乆若有不樂者又題云云李内翰元善毎稱此二絶倦遊輒曰吾欲唱望江南矣蜀僧賦湖中漁翁籃裏無魚欠酒錢酒家門外繫漁船幾回欲脫蓑衣當又恐明朝是雨天西湖志餘宋詩紀事巻九十三
