body:
  text: 宋詩紀事巻四十錢塘厲鶚撰李保保政和中醫學博士題朱翼中北山酒經并序大隠先生朱翼中壯年勇退著書釀酒僑居西湖上而老焉屢朝廷大典醫學求深于道術者為之官師乃起公為博士與余為同僚明年翼中坐東坡詩貶達州又明年以宫祠還未至余一旦夢翼中相過且誦詩云投老南遷愧轉蓬會令淨土變夷風由來只許杯中物萬事從渠醉眼中明日理書帙得翼中北山酒經法而讀之葢有禦魑魅于煙嵐轉炎荒為淨土之語與夢頗契余甚異乃作此詩以志之他時見翼中當以是問之其果夢乎非耶政和七年正月二十五日也赤子含徳天所均日漸月化滋澆淳惟帝哀矜憫下民為作醪醴發其真炊香釀玉為物春投醹酴米授之神成此羙禄功非人酣適安在味甘辛一醉竟與羲皇鄰薰然盈腹皆慈仁陶冶窮愁孰知貧頌徳不獨有伯倫先生作經賢聖分獨醒正似非全身徳全不許世人聞夢中作詩語所親不願萬戸誤國恩乞取醉鄉作封君續北山酒經蓋嶼嶼政和中崑山令讀沖邈翠微集聖宋吟哦只九僧詩成往往比陽春翠微閣上今朝見格老辭清又一人中呉紀聞元勛勛字不伐陽翟人政和閒知寧國縣事山門靈巖諸山深窟宅石門限塵寰空洞初不礙風扉敞雲闗高廣幾何許百夫可回環誰託遺蹟在冥濛煙霧閒羽駕此來往朝昏想清班西風翠屏近藤蘿莫容攀因循再閱嵗闕見亦以艱忻兹固殊特獨冠江南山少陵惜未到我語憑誰删寧國府志呉沆沆字徳逺撫州崇仁人政和中與弟澥各獻所著書澥得免觧沆抵廟諱罷歸隠居環溪號無莫居士有環溪詩話和友人趨寧化聞君早晚趨寧化尚有新詩别故人試問幾程端可到還憂半載不相親傷心嵗律崢嶸暮解事梅花摘索新去去冰霜頻莫厭庭闈和氣即如春環溪詩話春遊吟鳥語煙光裏人行草色中池邊各分散花下復相逢環溪詩話李待制云此所謂詩中有畫首夏積雨有餘潤游雲無定陰燕飛華屋靜鶯囀碧窗深環溪詩話此詩殊有富貴氣象句聖主思文徳元臣獻武功一言深悟意五利且和戎沈給事云是使事天地包羞日山河匿怨中給事云太逼儒生别有淚不是哭窮途給事云作詩當如此氛祲埋金闕塵沙暝梓宫古來嘗膽事泣血望羣公給事云好語環溪詩話呉濤濤字徳劭崇仁人沆之伯兄在官阬日作時乖事轉拙端居徒含情不似堦前草春來隨意生絶句遊子春衫已試單桃花飛盡野梅酸怪來一夜蛙聲歇又作春風十日寒環溪詩話予伯兄徳劭作詩磨磋圓淨都無病處方休在官阬日小詩并一絶句最為含蓄有氣象呉洸洸字徳強崇仁人沆之仲兄暮春回文嬌聲囀處藏鸚小美睡濃時落日斜橋拂桞溪深漲水眼驚春雨亂飛花環溪詩話仲兄詩從蘇黄中入句日長人靜聞風佩乆雨堂空生水衣簷飛謝女雪徑埽沈郎錢和發青亭寫處定移牆上影捲來如寄隴頭春墨梅朱脣不駐曉妝薄玉頰頻啼夜雨翻緑萼梅花覺青春半山將白晝隂夢過一年還是魘心更萬事竟成灰環溪詩話徐端崇端崇字崇之璹子政和閒隠居禦兒春渚紀聞東坡帥杭曰與徐璹全父坐雙檜堂公指二檜曰二疏辭漢去璹應聲曰大老入周來公為擊節乆之繼而其子崇之亦復少年俊偉落筆千字有人得山谷道人清江詞示之崇之曰山谷當今作者所知漁父止此耶或請為賦援筆立就識者竒之其末云魯邦司寇陳義高三閭大夫心徒勞相逢一笑無言說去宿蘆花又明月識者竒之為蟁所擾得一絶句空堂夜合勢如雲溝壑寧知過去身滿腹經營盡膏血那知通夕不眠人春渚紀聞時蔡京引用小人賦外横斂崇之此詩殆託以規諷云方元脩元脩字時敏桐廬人元英先生之後殿中侍御史蒙之子政和初審察監大觀庫後通判濬州奉同程致道著作次鮑溶冬成答客韻送趙叔問奉議歸南都清秋不相借白髮日更多塵埃困煩促原野懐經過聊當倚滴潤資以生吾禾豈不念離羣驚鵲寧釋窠王孫别都去澹若依松蘿暫别亦復難賡詩飲無何我行聊爾爾渺邈踰江河賸須闕佳句相我滄浪歌宋文鑑翁挺挺字士特崇安人彦約子政和中以季父彦國恩補官調宜章尉朝臣交薦改授少府監終尚書考功員外郎號五峯居士有集讀許太史祭黄長睿文祕書丹旐返旅殯尚丹陽海路三山逺江流萬古長交情惟太史傳業冀諸郎誰與銘泉壤臨文淚數行東觀餘論附曽續續字元嗣政和閒人贈吕居仁吕家三相盛天朝流澤于今有鳯毛世業中微誰料理卻收才具入風騷紫微詩話曾繹繹字仲成還家塗中疎林殘嶺起昬鴉臘盡行人喜近家江北江南春信早傍籬穿竹見梅花墨莊漫録左緯緯字經臣黄巖人政和中以詩鳴有委羽居士集石公弼䟦云經臣之詩六義之雋也委羽山委羽不知何處是倩人扶上木蘭橈欲尋去路花梢密爭認行雲酒浪搖流水忽隨山腳轉洞天疑把杖頭挑逡巡不覺東風晩殆有仙人弄玉簫石新婦山煙蘿為髻霧為巾獨立江邊經幾春無故被人呼作婦不知誰是畫眉人以上赤城志許少伊被召迢送至白沙不及短棹無尋處嚴城欲閉門水邊人獨自沙上月黄昏詩人玉屑此二十字可謂道盡惜别之情至今使人黯然魂消春晩池上桞依依桞邊人掩扉蜨隨花片落燕拂水紋飛試數交遊看方驚笑語稀一年春又盡倚杖對斜暉後村千家詩臨海崇教寺只把山為界紅塵自此分竹窗吟聽雪苔石坐看雲意靜詩先到心清道自聞深慙王許輩猿鶴舊同羣輿地紀勝梅花幾度尋春信空歸及暮鴉試搖枝上雪恐有夜來花望月穿深塢迎風立淺沙若同桃李發誰肻到山家送别騎馬出門三月暮楊花無賴雪漫天客情惟有夜難過宿處先尋無杜鵑以上詩林萬選天台道中亂山深處是仙家海變桑田日未斜為有慈親倚門望卻愁溪上見桃花天台山志句一别又經無數日百年能得幾多時赤城集委羽居士集黄裳序政和癸已陳瓘䟦稱其招友句云荆溪林下偶談陳了翁喜左經臣此句以為非特辭意清逺可玩味也老於世幻逝景迅速讀之能無警乎然此乃古人已道之句戴叔倫寄朱山人云此别又萬里少年能幾時杜荀鶴送人遊江南云能禁幾度别即到白頭時但經臣語尤婉而不迫爾巢禽先覺曉穴蟻未知霜落葉荆溪林下偶談孫邦邦杭州人宣和元年進士官郎中唐氏林亭在新城華屋沈沈野外居茂林清䕃繞門閭移花植果心無事抱子弄孫歡有餘閒過西疇觀刈穫嬾尋南郭命巾車問君為圃嗟予晩便擬歸休學二疏咸淳臨安志何宏中宏中字定逺先世居鴈門宣和元年武舉廷對第二調滑州韋城尉後為河東河北統制有成真通理二集齊東野語定逺為韋城尉汴京被圍獨韋城不下後為兩路統制接應副使以糧盡被禽金人憐其忠授之以官定逺投牒于地曰我嘗以此物誘人出死力若輩乃欲以此嚇我耶囚西京獄乆之免為黄冠自號通理先生起紫微殿遷徽宗東華君御容以事之後病歿臨終作馬革盛屍每恨遲西山餓死亦何辭姓名不到中興歴自有皇天后土知齊東野語程俱毛隨俱字致道開化人以外祖鄧潤甫䕃入仕宣和二年賜上舍出身高宗朝擢中書舍人兼侍講罷提舉江州太平觀除徽猷閣待制卒有北山集石林葉氏曰致道詩章兼得唐中葉以後名士衆體穹窿葬事回邑有感生别萬里餘會面終有期死别不轉眸一朝千古非白日光在天𤣥隂閟泉扉盈盈閨中秀土化成枯骴冠笄共甘苦謂見素髮垂那知生死變不待桑䕃移室有病時茵篋有嫁時衣了了眼中事閒妝靜容儀垂楊手曾折為我當春稀迅流無迴波落英無還枝空房閴無迹新墳草離離傷心北門道同來不同歸善權洞嘗聞包山境中有林屋天旁通號地脈岳瀆潛鉤連兹山豈其類澒洞皆中穿二巖岌山足琤淙激奔泉牛羊走大石吐受無窮年金堂下石液雪積如烹煎從來米鹽稱浪播里俗傳一洞啓山腹穹窿亦聨緜誰題九斗字大篆仍深鐫中藏丈五石屹若龍騰淵回頭問主人謂仲嘉我輩定不凡云何逐官牒常得我所耽向來共幽討九鎖藏芝巖而我自林屋翩然游皖灊洪崖儻可俯不在南山南詠勸酒胡簿領青州掾風流麴秀才長煩拍浮手持贈合歡杯屢舞回風急傳籌白羽催深慙偃師氏端為破愁來墨莊漫録飲席刻木為人而鋭其下置之盤中左右敧側僛僛然如舞狀乆之力盡乃倒視其傳籌所至酬之以杯謂之勸酒胡或有不作傳籌但倒而指者當飲程致道詩云云和張敏叔遊滄浪亭醉倒春風載酒人蒼髯猶想見長身試尋遺址名空在卻笑張羅事已陳稍置曲欄穿徑竹别開高閣俯汀蘋拏舟更欲陪清賞要看毫端藻繪春南園王子池臺迹已荒年來華構壓高岡長林不礙千山月老榦猶含九夏霜便覺平泉冠東洛還依綠水記南塘蝸廬卻喜通幽徑岸幘時來一嘯長葺蝸廬呉下四海無廬著此翁故營松竹儘囊空明知計出栢馬下正擬身全木雁中東郭易成生草舍南村先怯巻茅風向來豪氣今如此敢與元龍較長雄九日寫懐節物驚心兩鬢華東籬雖繞未開花百年強半仕三已五畝就荒天一涯豈有白衣來剝啄亦從烏㡌自攲斜真成獨坐空搔首門桞蕭蕭噪暮鴉龍尾硯同毛彥時隨聯句歙水清以駛歙山文且堅程誰持玉斧琢製此月様圓想當結繩後要使鳥跡傳雕鎪見骨格豈與瓦礫全毛坡陁百氏圃澄泓九經淵墨海不復見柯嵓那可肩星稀涵緯象眉緑生春妍程規模異鎔鐵濡寫殊懐鉛正當秋穎發此霜松煙毛一從毛楮游幾作蟲魚箋徴辭想妃子搵首懐張顛寧同李生瘞聊續胡公鐫程常疑老蚌㱿浸潤成膏研毛堅逾鵝池鑄質射銅臺埏紛紛況多偽渇雀同梔鞭程琳坳隠多水十手寄所宣池光瀲墨色雲氣開毫聯翔鸞及垂露逸勢徒飛騫毛誰云過珪璧或用磨戈鋋吾今欲焚棄負耒歸園田程以上北山集遊大滌太湖隠吏疎且頑手板拄頰看西山筆牀茶竈向何許往來洞庭林屋閒側聞餘杭隱大滌故整煙艇尋苕川相從喜得二妙士金庭老客南昌仙早行不憚踏曉月逸思自覺奔春泉岡迴㵎轉若無路但見老翠漫秋煙中峯一柱萬山表勢與太華爭擎天神仙古洞絶壁下蓬萊别館青雲閒天壇無人石室冷借問白鶴何時還人生但為形體累會當去之如蜕蟬金庭客南昌仙他時待我乗八景舉手少别三千年洞霄詩集胡珵珵字徳輝晉陵人宣和三年進士紹興初史館校勘出守嚴州有蒼梧集楊誠齋序云陳少陽上書徳輝視其草投畀蒼梧召用為郎又以參政李公泰發之客見惡於秦丞相坐廢飢寒困窮以死天慶觀觀畫龍道人龍中來醉與神物會寫兹蜿蜒質日月為冥晦崩飜江海姿素壁起濤瀨呼吸見雌雄抉石疑可碎蕭森殿隂古衆真儼飛斾注觀恐騰躍夜半失像繪飛光者明珠靈祕一何怪爛爛照甍棟那得乆在外偷兒伺酣睡不怕嬰鱗害願言慎所託未用期一快梁溪漫志吾州天慶觀龍姑蘇道士李懐仁所畫懐仁者酒豪不羈嘗呼龍松江之上狎而觀之遂畫龍入神品過毘陵天慶觀大醉索墨漿數斗曳苕帚裂巾袂濡墨號呼奮躑斯須龍成觀者失聲辟易懼將搏也懐仁後不知所終而好事者每呼畫工就龍模寫工運筆之際輒眩暈欲仆竟不能成觀者駭異郡人胡徳輝因與客論近世名畫曰予每至畫龍處輒諦玩彌時不能休乃賦古風云云遊秀峯寺攝身下蓬萊放浪雲水迹非無簡書畏心賞寄泉石亭亭雲閒塔勝地聞自昔梯空上青冥如鳥著兩翼化城出天半寳甃坦如席環山劃中斷裂地開震澤峩峩東西峯觀闕倚空碧千尋采香逕劒臥漣漪直當年館娃宫六月避暑夕琴臺延薰風萬女曳阿錫牛耳爭齊盟烏喙已薦食百家甬東村託足歸無宅焉知陵谷變大厦響千舄矧兹風塵際樓殿踊山脊安隠大火中顯允象教力興予浩劫歎萬法本空寂楓橋朝辭海涌千人石暮宿楓橋半夜鐘明日館娃宫裏去洞庭呼起一帆風滄浪亭昔聞滄浪亭未到滄浪水先賢眇遺跡壯觀亦何侈飛橋跨木末巨浸折湖壘糟牀行萬甕繚牆周數里廢興固在天庶用觀物理緬懐嘉祐世周道平如砥相君賢相君子美東南美如何一網盡禍豈在故紙青蠅變白黑作俑兹焉始所有醉翁文垂耀信百世無忘角弓詠嘉樹猶仰止同來二三子感歎咸興起縹瓷醉新汲毁譽均一洗恕逢醒狂翁一别垂二紀雋哉老益壯論事方切齒我欲裂絳幔推著明光裏安得上天風吹落君王耳以上呉郡志張致逺致逺字子猷南劒州沙縣人宣和三年進士高宗朝歴戸部侍郎給事中出知廣州以顯謨閣待制致仕題明月樓明月樓前可萬家鳯山菴下日初斜風流耆舊消沈盡空睇寒江耿暮霞能改齋漫録廖尚書剛用中嘗夢中作詩其末句云家住五湖明月樓其後公薨葬於沙縣二十五里交溪鳯山之下其子遂建樓以明月目之張給事致逺賦詩胡寅寅字明仲安國弟淳之子初生棄不舉安國收育之舉宣和三年進士高宗朝歴官禮部侍郎兼侍講直學士忤秦檜以徽猷閣直學士奉祠致仕坐通李光落職新州安置檜死復元官卒諡文忠學者稱致堂先生有斐然集紙帳細皺巻寒波輕明籠白霧何以相徘徊歳晩正凝冱枕敧一尺竹被展幾幅布賢哉楮先生不以貧不顧夜玉圍紅綃羞澀強自賦書生説富貴志士安貧素風驚銀海潮春在明月庫先生睡方濃不覺糟牀注翰墨大全和趙宣冠月裾雲佩綠霞百年將此送生涯愁心别後無詩草病眼燈前有醉花落筆擅場聊寫意背山臨水遂成家也須南畝多栽秫休似東陵只種𤓰瀛奎律髓劉一止一止字行簡湖州歸安人宣和三年進士紹興初召試除祕書省校書郎歴給事中進敷文閣待制致仕有苕溪集識舟亭渺渺歸帆江北渚脈脈相望那得語舟中賈客嬋娟女朝樂瀟湘暮荆楚我欲招之問計然浮名唾去如飄煙買魚沽酒嘯儔侣搥鼓弄笛殘彫年㝛溪口溪聲來天邊風水共豪縱夜氣劇奔馬侵曉不能控書生有清癖詠雪寧忍凍胡為枕寒流故遣不成夢和巒嶅二子寒食少天色五字霧雨昏不醒東風曉能酸我食日不足寧憂三日寒人言二月時霏雨生樹杪天色何時無要問寒食少里語春雨樹頭生聞杭州亂飢來命餉寒索衣官家養兵如養兒時平軍健乆玩弛轅門笑歌驕莫隨往時金陵囚刺史今者杭州漕臣死稽天烈焰窮朝昏千丈紅霞炫江水鄰州之兵如此兵嗚呼世難何時平睡足齋此地誰令著此翁角巾敧倒鬢如蓬興高絶壁松聲外夢破寒花啅雀中睡債幾時償賽足書淫前日洗除空故人若問安心法一酌村酤薦晚菘次韻宋希仲侍郎見貽今日宦游此作客毎逢佳處欲忘年頗將幻境觀塵世始信臞儒是列仙野色分橋山帶邑晚雲藏寺水黏天公身未屬煙波管莫向津頭買釣船冥冥寒食雨冥冥寒食雨客意向誰親泉亂如爭壑花寒欲傍人生涯長刺促老氣尚輪囷不負年年債清詩斷送春訪石林山行不用瘦藤扶度石穿雲意自徐夜過西巖投㝛處滿身風露竹扶疎過梅溪省妻父臧翊善墳感歎寂寞松岡鎖暮煙平生忠信事茫然臧孫有後真虚語伯道無兒可問天以上苕溪集李質質字文伯參知政事昌齡曽孫為内侍梁師成所引授右列睿思殿應制揮麈後錄質少不檢文其身賜號錦體謫仙後隨從北狩艮岳百詠奉詔同曹組作存十八首艮嶽勢連坤軸近乾岡地首東維鎮八方江不風波山不險子孫千億壽無疆極目亭千里飛鴻坐上看山川風月在憑欄不知地占最高處但覺恢恢天宇寛跨雲亭地高天近怯憑欄下視浮雲咫尺間只怪輕雷起嵓際不知飛雨過山前散綺亭斷虹飛雨過天涯碧落浮雲不復遮明日隂晴真可卜倚欄來此看餘霞蟠桃嶺不到瑤臺白玉京海中仙果但聞名何人為報西王母嶺上如今種已成三秀堂窗戸深沈晝不開鳯凰時下九層臺月明夜靜聞環佩知有霓旌羽扇來書館蓮燭詞臣在外庭青錢學士已登瀛回廊屈曲隨巖阜挾策何妨取次行林華苑連雲複道映樓臺茂苑竒花日日開但得如春天一笑芳菲何必曉風吹和容㕔白羽流星一㸃明上林飛雁幾回驚弓開月到天心滿風外惟聞中的聲潄瓊軒淺碧分江入衆山山深無處不潺湲開軒最近寒溪口噴薄松風響佩環嵓春堂桂影亭亭漾碧溪尋芳曾被暗香迷碧桃開後晴風暖花外幽禽自在啼鑑湖水天澄澈瑩寒光一片平波六月涼移得㑹稽三百里不教全屬賀知章蘆渚萬葉梢梢秋意初斜風細雨憶江湖誰知雪壓波澄後更與宫中作畫圖松谷雲藏煙鎖晝蒼蒼得地何須作棟梁聞道九龍扶輦過一山風又作笙簧蠟梅屏冶葉倡條不受覊翠筠輕束最繁枝未能隔絶蜂相見一一花房似蜜脾紫硯壁沒水攀蘿琢馬肝齎持堅潤出風湍潛藩每恨端谿逺疊作山中峭絶看濯龍峽山束蒼煙細路通噴泉飛雨灑晴空真龍豈許尋常見故作雲閒飲㵎虹柳岸牽風拂水弄春柔三月花飛滿御樓不似津亭供悵望一生長得繫龍舟揮麈後錄元符末掖庭訛言祟出有茅山道士劉混康者以法籙符水為人祈禳且善捕逐鬼物上聞得出入禁中頗有驗崇恩尤敬事之寵遇無比至於即其鄉里建置道宫甲于宇内祐陵登極之初皇嗣未廣混康言京城東北隅地叶堪輿儻形勢加以少高當有多男之祥始命為數仞岡阜已而後宫占熊不絶上甚以為喜繇是崇信道教土木之工興矣一時佞倖因而逢迎遂竭國力而經營之是為艮嶽宣和壬寅歳始告成御製為記命睿思殿應制李質曹組共作百詠華宫記畧政和初天子命作壽山艮僧祖秀陽岳於禁城之東陬詔閹人董其役工已落成上命之曰陽華宫大抵衆山環列于其中得平蕪數十頃以治園圃以闢宫門於西入徑廣于馳道左右皆大石林立僅百餘株以神運昭功敷慶萬壽峯而名之獨神運峯廣百圍錫爵盤固侯居道之中束石為亭以庇之高五十尺御製記文親書建三丈碑附於石之東南陬其餘巨石並與賜名惟神運峯前巨石以金飾其字餘皆青黛而已此所以第其甲乙者又有大石二枚配神運峯作亭庇之寘于寰春堂者曰玉京獨秀太平嵒寘于萼綠華堂者曰慶雲萬態竒峯括天下之勝藏古今之美於斯盡矣靖康元年閏十一月大梁陷都人相與排牆避虜於夀山艮嶽之巔時大雪新霽丘壑林塘宛若畫本祖秀周覽累日咨嗟驚愕信天下之傑觀而天造有未盡也明年春復遊陽華宫而民廢之矣曹緯緯字元象一字彥文潁昌人有俊才釋褐即物故自齊山借舟汎湖還家十里平湖漫不流晚風吹浪打行舟定知歸得侵燈火家在菰蘆最盡頭宋文鑑客有遺予畫梅者淡墨暈成因命之梅影憶昔神遊姑射山夢中栩栩片時還冰膚不許尋常見故隠輕雲薄霧閒聲畫集雁雲飛水㝛過炎涼回想來時道路長夜月照驚惟弔影朔風吹斷不成行人閒無處逃矰繳歳晩何曾飽稻粱儻以能鳴免烹死繫書猶可到衡陽後村千家詩次韻曹好謙負春作計尋芳不屬貧可憐風物自良辰飛花有意能留客啼鳥多情觧喚人涉世乍驚翻手薄論交多語白頭新十年異縣傷流落來往山州枉過春春日憶西湖簡家弟元寵天涯孤客意堪哀病眼逢春只強開閉戸不知花老去捲簾方覺燕歸來風休潩水光如拭雨霽箕山翠作堆遙想西湖圖畫裏幾多車馬踏青回以上詩林萬選曹組組字元寵潁昌人緯弟宣和三年進士召試中書換武階兼閤門宣贊舍人仍給事殿中官止副使有箕潁集艮嶽百詠奉詔同李質作存十八首介亭雲棧横空入翠煙躋攀端可躡飛仙介然獨出諸山上磊磊排衙石滿前璿波亭水影搖暉動碧虚日華凌亂上金鋪安知不是鮫人寳往往淵中得美珠飛岑亭微雲將雨洗層巒石磴莓苔路屈盤正是江南最佳處仰看蒼翠俯澄瀾噰噰亭聖主從來不射生池邊羣雁恣飛鳴成行卻入雲霄去全似人間好弟兄八仙館蟠桃初熟玉京春圓屋如規戸牖新盡是瑤池高會客豈容塵世飲中人蕭閒館書草吹來種種香好風移韻入松篁丹臺紫府無塵事偏覺壺中日月長梅池玉鈿匀㸃鑑新磨香逐風來水上多應為横斜詩句好故教疎影寫平波絳霄樓翼瓦飛甍跨閬風捲簾滄海日曈曨佳時自有羣仙到笑語雲霞縹緲中萬松嶺蒼蒼森列萬株松終日無風亦自風白鶴來時清露下月明天籟滿秋空萼綠華堂綠萼承趺正蘂輕清香續續度簷楹天教不雜閒桃李賜與神仙物外名清虚洞天玉闗金鎖一重重只見桃源路暗通行到水雲空洞處恍如身世在壺中躡雲臺萬本琅玕密不開林深明碧鎖高臺更無一㸃遊塵到但覺雲隨步步來汎雪廳月團攜下九重天來試人閒第一泉正在水聲山色裏六花浮動紫甌圓景龍江潤通河漢碧涵空影倒山光曉翠重聞説巨魚時駭浪只應風雨是神龍雪香徑夾徑梨花玉作英年年寒食半隂晴要看雪色無邊際十二樓前月正明百花屏衆香芬馥著人衣雲母光寒露未晞圍得春風勝繡幕紛紛紅紫鬭芳菲飛來峯突兀初驚倚碧空翠嵐仍與瑞煙重呉儂莫作西來認真是蓬萊第一峯敷春門帝力無私萬國通尚思寒谷待春風欲將和氣均天下都在熙熙造化中以上揮塵後錄輦下寒食海棠時節又清明塵斂煙收雨乍晴幾處青帘沽酒市一竿紅日賣花聲綵毬時向梭門過繡轂遙隨輦路行日暮人人醉歸去熙熙春物見昇平事文類聚前集鴛鴦蘋洲花嶼接江湖頭白成雙得自如春晩有時描一對日長銷盡繡工夫翡翠窺魚潛立小荷圓照水飛鳴更碧鮮鬭草人歸尋墜翼綺窗將去補花鈿以上前賢小集拾遺夜歸曲飢烏啞啞啼暮寒回風急雪飄朱闌瑣窗繡闥豔紅獸畫幕金泥接彩鸞呉妝秀色攅眉綠能唱襄陽大隄曲酒酣横管咽孤吹吹裂柯亭傲霜竹逺空寒雲渾不動老狐應過黄河凍暗回微暖入江梅何處荒榛挂么鳯歸來穏跨青連錢貂茸擁鼻行翩翩籠紗蜜炬照飛霰十二玉樓人未眠古今詩統邵彪彪字希文鎮江人宣和三年進士歴國子監丞知楚州丹陽懐古故里詩人去湖山最寂寥草深張祜宅花暗許渾橋鳯髓何時續蓬萍觸處飄鴻冥杳難及霜鬢兩蕭蕭鎮江府志范宗尹宗尹字覺民襄陽鄧城人宣和三年上舍登第高宗朝歴尚書右僕射同中書門下平章事退居台州雞肋編范覺民作相方三十二歳肥白如冠玉旦起與襄頭帶巾必皆攬鏡時謂之三照相公遊大有空明洞在黄巖委羽山暫到山中禮法壇空明雲氣逼人寒當年孤鶴知何處遙想天風墜羽翰台州府志張邵邵字才彥烏江人宣和三年上舍登第建炎初以直龍圖假禮部尚書使金通問欲降之不屈徙于會寧府和議成及洪皓朱弁南歸升祕閣修撰敷文閣待制知池州奉祠卒有輶軒倡和集待制張公行實公在會寧士多從之授書生徒斷木書于其上捧誦既過削去復書中圓如瓠而首尾尖目之曰木橄欖葢其俗兒童誦習率以此句蘇氊乆絶寢衣想姜被忽分挾纊香謝樞密王公論惠綿衾待制張公行實張嵲嵲字巨山襄陽人宣和三年上舍中第紹興中官司勲員外郎擢中書舍人升實錄院修撰有集劉後村詩話巨山陳簡齋之表姪詩法似之夷陵呉越相持地江山直險固昔聞焚夷陵今兹但遺堵山逺欲連天江寛疑浸樹左顧渚宫塗右眺襄陽路野迥無居人荒村但豺虎依依念鄉井愴愴悲墳墓月淡江風寒雲深楚山暮佇立小踟蹰蒼蒼歸鳥去防江大漠與呉越天南天北頭虜尤涉吾地飲馬長淮流飲馬猶尚可莫使學操舟後村詩話語意高簡意味幽逺絶句犖确南山路叢筠冒水生寒梅銷落盡猶有數花明十日濃隂飛細雨清川初漲水平沙幽人閉戸春已半開徧山南山北花故園墳樹想青蔥寒食風光淚眼中自痛不如傖父子紙錢猶挂樹頭風一行疎樹對柴門又見荒煙上晩村日日牆隂觀日影人生消得幾朝昏日炙櫻桃已半紅更薰花氣滿襟風路傍謁舍蹲遺獸應有荒墳在麥中以上後村詩語馬擴擴字子充中嘉王榜武舉宣和四年與趙良嗣使金議割燕山特除武翼大夫忠州刺史兼閤門宣贊舍人紹興初為湖南宣撫司參議官有茅齋自叙使金和趙良嗣未見燕銘勒故山耳聞殊議骨毛寒願君共事烹身語易取皇家萬世安茅齋自叙句未敢此時非趙括已愁他日類田豐三朝北盟會編紹興二年曹成執湖南安撫使向子諲據道州宣撫司參議官馬擴遣使臣張布齎剳子招成成受招安乃放出子諲參謀范直方曰曹成不可招保之使赴行在馬曰彼既不願逺出促之是使散而為亂也宣撫使呉敏惑直方之議馬以詩獻敏云云遂拂袖歸又數日敏以資學宫祠之命到城成即復亂湖廣被其害直方得郡而去王次翁次翁字慶曾濟南人禮部别頭試第一南渡知處州附秦檜屢遷至參知政事奉祠居明州聞馬擴辭職作徙薪曲突論無憑太尉山中混耦耕頭額爛焦曾采錄參謀先已享專城近來出處事何如先輩風流掃地無忽有子充驚末俗一言未契便長驅三朝北盟會編傅墨卿墨卿字國華山隂人以大父恩補官宣和四年使高麗有功賜同進士出身進龍圖閣學士提舉杭州洞霄宫句百鍊鑑從天上鑄五時花向帳前施端午帖子五筆容齋曹勛勛字功顯陽翟人組之子宣和五年賜同進士出身紹興中僑居天台以韋太后北還迎鑾功官至昭信軍節度使孝宗朝加太尉開府儀同三司卒贈少保諡忠靖有松隠文集夷堅志紹興中曹勛使金好事者戲作小詞其後闋曰單于若問君家世説與教知便是紅窗迥底兒謂勛父元寵昔以此曲著名也乾道聖徳頌并序臣恭惟皇帝陛下膺上聖之期繼中興之統紹登四載恭勤百為廼乾道改元政事具舉營戍罷屯黎民於變時雍廷臣小大率職致淮北之蝗入境自斃秋成之積歳登大有是皆陛下聖徳昭著雖黄童白叟所不待言而知臣以草莽之賤迫桑榆之年際遇四朝叨塵二府豈不知清明之時方深貪戀大懼榮祿浮實莫允清議故控露忱悃仰瀆天聰特䝉賜俞已幸晩境安處閒退日聽康衢熙熙之謠顧老臣不當以翰墨輒塵宸扆然抃蹈之餘有不能自已者謹擬元和之作極思選言撰成乾道聖徳頌昧死上進雖朱能形容聖徳之萬一庶少伸臣子歸美之誠其辭曰維聖有作紹隆興運天經地義宗堯越舜風俗惇厚日星明潤冰天桂海咸祗成訓皇矣藝祖肈開宗祊用集大命再造羣生卜世卜年周室與京徳懋聖孫區宇再寧龍潛出震握符御極恭儉慈仁已隆燕翼勵精治具羣工惟辟斯皇聖徳以受方國躬秉要道化成斯民問寢侍膳克勤日新刑于四海率土興仁至矣聖孝悦安嚴親猾夏餘種乆失我重稍恢雄略盡還尊奉復修絳樂亟續騫貢布昭聖武式皇鉅宋洪宣景命爰振皇綱詔令諭㫖粉澤八荒宸奎逸彩龍鳯騫翔煥乎聖文彬彬日彰誕敷武節克柔強鷙風靜邊柝煙沈晩燧穡夫力田塞馬垂轡巍巍聖功允格康濟光啟元良鶴禁建儲遴擇端方贊翊詩書濬哲文思日親睿謨於赫聖明有開令圖當天執籙了無玩好貴異獻輸蕩然一埽力敦嘉靖詢謀政要丕鑠聖斷坐臻是奥從容總攬用體乾剛文武一道督以經常王化溥博景風丕祥格天聖治時雍時康咫尺威顏豁達方寸日角珠庭金聲玉振穆穆皇皇天儀明潤洪惟聖表萬㝢朝覲乃武乃文止戈好生華夏蠻貊底於丕平罔或反汗克斷惟明長䇿遠馭奕奕天聲寳緒重光密荅純祐既恊皇極昭報方茂堯父舜子撫封增舊行復九有亘萬萬壽大哉乾元萬物資之赫赫明世吾君繼之熾昌隆祚惟皇造之億萬斯年惟皇保之獨不見獨不見誰相憶花影上珠簾明月穿窗隙翡翠暗無光蒼苔㸃行跡鸞鑑挂珊瑚寳靨銷金碧彷彿聞簫韶夢想見顏色為我報新人好好承恩澤君看後庭花芳菲能幾日楊花曲春光誰占得楊花獨自知未到傳消息將歸送别離隨風飛更急入户舞還低大有撩人處妝臺惱畫眉以上松隱集沈晦晦字元用錢塘人遘孫宣和六年廷對第一歴知建康府高宗朝進徽猷閣直學士出守衢州提舉太平興國宫上方山居月斜樹影穿窗入雨過山泉繞舍鳴野寺中宵人不睡蒲團布衲悟前生天畔羣山一草亭半溪煙雨花冥冥老翁投老得此景日與溪山同醉醒此生真與世相忘投老生涯寄上方洗足闗門枕書睡連山松檜雨浪浪括蒼彚紀邵棠棠字仲甘號西坡南康軍都昌人宣和六年進士道經柘溪靜林寺青山萬疊倚晴空中有招提一逕通老衲不闗塵世事黄花紅葉共秋風詩林萬選萬松嶺老僧佛屋三閒破冷開半通雲氣半蒼苔行人莫問僧年紀嶺上喬松是手栽杭州府志王洋洋字元渤山陽人御史資深子以省試第二名中宣和六年甲科官博士歴典三郡晩守鄱陽洪忠宣以使金歸人無敢過其居洋獨候舍坐免去有東牟集琵琶洲塞外風煙能記否天涯淪落自心知眼中風物參差是只欠江州司馬詩容齋三筆吾州餘千縣東干越亭有琵琶洲在下唐劉長卿張祜輩皆留題王洋一絶句云云真佳句也李長民長民揚州人正民之弟南渡寓家海鹽題鹿苑寺一擊軒我聽風篁是梵音如何俗耳等閒聞自來擊處無人會千古知心只此君海鹽縣圖經祖秀實秀實字去華浦城人弱冠釋褐第一除國子博士高宗朝拜禮部郎中寄呉晞逺官路聲名二十年江鄉舊仰貳車賢推將事業歸塵外收得功夫到酒邊解榻幾聞招隠士炷香終日對韋編公朝況是登耆哲早晩蒲輪穏著鞭萬姓統譜呉駿字晞逺中元豐八年進士調潞州上黨簿太宰張商英首加薦引知䖍化縣通判永州未幾告老祖秀實以詩寄之云綦崇禮崇禮字叔厚高宻人徙北海登上舍第高宗朝拜翰林學士退居台州有北海集題石梁瀑布林麓隂森徑曲盤漸驚危步入重巒地分寳刹臨空翠天設飛梁跨急湍霜暗雲蒸山氣肅雪翻雷輥水聲寒我來不作多求想試出神光徧現看天台勝紀宋詩紀事巻四十
