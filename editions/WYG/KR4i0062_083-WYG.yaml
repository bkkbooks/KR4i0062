body:
  text: 宋詩紀事巻八十三錢塘厲鶚撰陶崇訪僧歸雲菴閒過選佛場歸雲翠如潑入門偶有言啟頰師便喝掩耳煨芋爐但把火深撥呼童酌玉虹注之栴檀鉢噓灰然微紅横鐺水煎活茶酣登甲亭䨇眸爲之豁鳥啼空山幽翔集來朩末風月一何佳團圞共批抹悠然澹忘歸于兹得解脫粤西詩載朱子恭昭義驛霜林紅葉襯梧花路轉崖根百尺斜霽日斷雲成徙倚湘南秋盡未還家桂林府志裴廸題來賢亭常侍江東第一流子孫今不泯先猷築亭意在來賢者誰慕清風爲少畱徐鉉别傳鉉世居攝山之陽圍池甚盛宅有來賢亭宋裴廸詩云云黄軫延慶寺寶刹標奇處烟蘿響亂流地靈僧得住山好客多遊燈影連金像鐘聲散石樓風雷等閑作咫尺是龍湫赤城詩集鄭國華何志熙合題昌州牛尾驛龍尾道中退朝客雕鞍寶馬黄金勒誰憐遠使足馳驅夜半孤村牛尾驛鄭國華畱題十年去國眞悠悠秖今便可行歸休平生意氣羞牛後去踏金鼇頂上遊何志熙續三韻全蜀藝文志鄧諌從題巫山瞻華亭崚嶒玉削三千丈翠潑嵐光冷相向風㑹太古雲氣長變化溟濛紛萬象陰晴一日具四時天籟壑深虚自響神仙娟妙擢羣參錦繡鋪張獻奇狀蟠根積鐵匯百川龍矯蛟翻饒跌宕勢連三楚此開國故壘荒宫帶溪瀼樓臺井邑老風烟環佩清聞駐仙仗竹林風味便讀易久與江山爲輩行鳴弦餘暇豁心眼戲著飛䦨雲雨上爽明自可達壅蔽野獲又多勞草創政和民氣長似春景迥心平過于掌征鴻明滅志何杳黄鵠追隨意尤放當年李杜經行處太史銀鉤刻青嶂寶刀珠瑟出耕墾曲水纖腰迷草莽牢盆古𨽻雜秦篆飛動閑摹永平樣珊瑚交柯迥不蝕髣髴將軍勛業壯英雄繁盛隨流水時有竹枝賡牧唱孔泉文物起騷經國色明妃守孤尚我家蛾眉紫翠間爲愛奇峯甘蒟醬秋風野水憶絲蓴擊汰夷猶理煙榜四川總志鄧宗度黄山雜詠十四歳作桃花峯劉阮辭世塵桃花誰復主無計殢春風一夜零紅雨祥符寺雲水最饒處輪蹄無到時夜蟾生佛面春雪印僧眉黄山志潘朝英善濟寺在臨海縣金鼇山春潮暮落海門山百艇齊飛牡蠣灘分得魚蝦歸野市滿江鷗鷺夕陽閑倦客登臨力巳疲高僧故索小窗詩江山最好君知否春去秋來烟雨時台州府志汪士深昭亭祠靈祠俯江國棟宇依層巒千峯遠岧嶤二水渺迴環昭明肅清境髣髴聞和鑾藹藹集嘉祉芬芬奠椒蘭精神一以展遐眺憑飛闌昔賢有高躅寄墨青雲間瓊瑶刻蒼翠筆勢廻翔鸞高峯一回首日落天風寒寧國府志霍權題景吕堂佞人巧求售富貴一息頃千古名不磨寸心猶耿耿偉哉正惠孫疾惡何勇猛平生歴宦途南臺與東省初著獬豸冠排擊首權倖姦雄始萌蘖憤切巳骨鯁一片忠義心皦皦從簿領涵養老益壯大節堅晩景若人久云亡冰魂嗟巳冷羡慕徒馳神反身盍三省寧國府志周光嶽長沙江上南風起白蘋長沙城郭異咸秦故鄕猶自嫌卑溼何況當時賦鵩人湖廣總志樊圃圃奉化主簿詠慈氏院杜鵑蟠屈如鳯山僧取巧蟠珍叢九苞占盡千葩紅倚闌精彩欲飛動百鳥不敢啼春風延祐四明志呉致堯五蓋山紫蓋修連延五峯似隨軒何如惠我民飛雪遍岡原郴州文志饒南强禪峯寺禪山喬木飽蒼烟柿葉能來老鄭䖍樓閣暮寒風鐵定與僧翦燭對牀眠杭州府志徐師仁登瑞巖山攜笻登絶巘朝爽薄危闌乘勝移杯斝憑高憶羽翰泉聲穿石響樹色入秋寒對酒頻長望心同渤海寛福州府志呉宣德題西巖院幽村分野徑勝地絶浮埃殿閉烟霞靜門臨水石開日斜山影背泉落雨聲來故里經年别祇園首重回翰墨大全孫文叔絶句宫柳垂垂拂苑牆啼鶯驚夢暗心傷起來羞見空中絮也得隨風入御牀廣羣芳譜徐蘭臯流杯池在潭州城北五代楚王馬希範所鑿爲上巳宴遊地梵王宫闕馬王宫惟有樓臺帶舊風屬玉不知人事改䨇䨇飛入藕花叢長沙府志呉師正桃源洞天台春暖蘭苕馨海橊吐血黄鳥鳴風晴雨霽洞天曉畫屏有路遊人行劉郞阮郞剡溪客結伴窮幽絶人跡洞口遥聞潄玉聲時有飄英點溪碧捫蘿涉水前攀緣瞥見勝景層崖巓夭桃瓊草蔓深谷飛流傑閣凌青烟潭上金橋跨龍背綽約䨇鸞飮潭水初疑帝子别瀟湘珠佩珊珊來玉趾瓌姿瑋態躊躕久熟視人間未嘗有羅幔深沉邀客畱胡麻爲飯椒漿酒問卽于此何當還壺中景好非塵寰客驚遽返覓鄉里子孫在在皆重元年華瞬息歎浮世往事分明如夢寐相與重尋舊路悲亂山稠疊烟霞蔽我來躡屐求遺蹤松隂坐久曾不逢野僧相引下山㝛落霞斜日林梢紅天台山志文天祐天祐九江人送人往湖南雁拖秋月洞庭邊客路凄涼野菊天雲隔酒尊横北海風吹詩史落西川夜深鬼火千山雪春後梅花一樹烟爲我祝融峯上看朝暾赤處禮蓬仙洞庭君山詩集黄山聽琴歲晏抱琴入室處榾柮燒殘聽風雨有客五弦彈太古埽空恩怨不兒女汙樽抔飮擊土鼓如與羲軒相對語又如重華坐舜臯萬物長養不苦窳聞君澹然太古音感君悠悠太古心古意古意誰能識古人古人何處尋黄山志甄圭閒居深塢人稀到重門晝亦關白雲秋舍靜明月夜窗閒徑掩花開落簾通燕往還窮居聊自適卻憶謝東山越詠孫邁游齊山寺尋陳鴻斷碑萬木森天繞寺籬一聲孤磬徹江湄樓邊已失陳鴻記亭上猶存杜牧詩細雨乍經巖澑響嫩苔長積石橋危知予好古心常切僧與前山覓斷碑池州府志張天啟岳陽樓天入平湖遠樓深納霽華青山藏福地碧樹記人家水落魚龍蟄風高雁鶩斜古來形勝地何事憶長沙湖廣通志楊詢遊齊山寺金刹岧嶤挂斷霓㠀雲沮洳暗窗扉江風曉定釣人出山月夜明禪客歸徑畔芭蕉曾有喻庭前柏樹本無機我來重見當時叟紙帳松房綻衲衣齊山詩集朱嚴伯嚴伯樂清人號可以翁書延福寺壁䨇瀑飛來古寺西月蘿烟草久湮迷自從我輩經行後便覺他山索價低老去合爲三徑計就中聊借一枝棲石崖大有穿磨所從與新詩著處題東甌詩集王申寶林寺千載寶林寺清幽每往還兩潮巖上井一塔寺中山門對荒城冷鄰分古縣閑道人高處坐役役笑塵寰越吟蕭磬桂州吟拾江邊金翠羽醉騎海上玉麟腰清談試茗遊冰井至樂觀魚出檻橋淵鑒類函張仁鵝湖春色平湖漾晴綠狎鷗自相逐歸艇小于盂輕帆曬蒲幅青萍恣漂流白魚跳尺玉柳線牽人衣香林雨新沐汀尾沙禽鳴人家暎修竹步履隨春風席地傾􅌬醁玩樂當何如回首炎威促柘上遺詩蘇莊寄鶴林辛上人苦憶長廊清磬音復懷贊公栴檀林陽坡佳朩鳥相喚澗戸曉行藤竹陰日晴山路筍蕨晩雨足野塘蒲稗深短褐兀然聊戱劇滄江鷗鷺本無心鶴林寺志趙曾頀曾頀南安主簿游延福寺行行出西郊稍覺囂塵遠風景旣巳殊磽确頗忘倦南安古雄州今亦壯哉縣九日一佳景居然在郊甸地高瞰川原林杪露堂殿晉朝松百章存者才一見歲月不我畱寒暑幾更變當年秦隱君軒冕非所羡閒關剡溪來至此獲勝踐結盧巢其巓穴石爲之硯城市不到足公卿䍐窺面邂逅有至交相從情繾綣緬懷興元年致位在台鉉扶持公道開不絶幾如綫一言才見疏斥逐遽遭譴天教流落餘乃遂山林願當年築室處遺址了難辨獨有高士峯千載猨鶴怨南安縣志張國衡水簾洞在仙居披雲山洞口鮫綃薄山心玉蘂浮殘雲挂疎影新月下空鉤白鶴仙人去蒼苔石磴幽奇蹤看不倦旬日爲淹畱台州府志趙清源天台石梁何處覓靈蹤天台第一峯雲深唯見寺夜靜忽聞鐘卓錫隨飛鶴談元起蟄龍石橋如有約跨月坐從容天台山志王清叔長淮晩望目斷長淮𣺌莽中孤城突兀倚層空寒砧幾許遞秋信漁笛一聲横晩風龍吐晴雲嵐氣白鴉翻落日水天紅扁舟今夜㝛何許赤壁斷磯蘆葦叢中都志陳睍游曉覺寺在長興縣肩輿行到竹邊村竹裏僧房盡閉門小洞頗聞三里近殘僧僅有一人存旋沽薄酒欺寒力未怯春泥踏雨痕笑覓梅花伴歸去斷橋流水月黄昏湖州府志唐公佐三洲巖峒裏光陰經幾春峒前蒼木垂千尋不知空谷當年事誰識龐眉處士心殘月照人吞遠徼晩風吹夢入幽岑我來須訪神仙宅好聽雲端環佩音肈慶府志陳蹇叔送新茶李聖喻郎中頭綱别樣建溪春小璧蒼龍浪得名細瀉谷簾珠顆露打成寒食杏花餳鷓班椀面雲縈字兔褐甌心雪作泓不侍清風生兩腋清風先向舌端生淵鑑類函方九功菊花露冷江蘋雁度時蕭蕭黃菊滿疎籬寒枝帶雨開仍豔晩節凌霜賞未遲移傍小簷承綺席縱觀深夜倒金巵摘來冉冉香盈把共泛西風醉莫辭廣羣芳譜章詡詡昌化人靜觀堂在昌化縣覽溪上杖策下層巓來憩雲外莊簷低繞頽垣澹泊在一堂山高戸牖虛風清長夏涼翳翳動林影瀲瀲浮溪光心遠與世隔獨有文史香汲井恣嚥潄蒔藥助體强園中橘爲奴沼内芰可裳蒼官青不老籬下明秋芳陶情在庻物養性歸琴觴矯首起遐觀是中有濠梁杭州府志趙仲藏福勝院千騎踏清霜東游古道場雲籠山骨秀風引水聲長曉日依稀暖寒花取次香後隨吹管急空谷荅宫商杭州府志汪起莘黃山歌黃山高哉巋然爲江東之巨鎭兮壁立于兩浙之上游摩天戞日以直上陽支陰派盤數州四海不知雨根本行人但見雲飛浮嘗試芒鞵竹杖造乎其間兮一溪桃杏紅爛漫萬壑松柏寒颼飅懸崖絶磴可望不可到古朩倒挂險更遒上有靈泉千萬道如銀河爭瀉而競注兮砯雷濺雪隱見穿林幽中有青鸞黄鶴千萬對雄倡雌和迭舞而交鳴兮深林自適復有數點白雪之猨猴山中自昔無厯日花開葉落成春秋殘陰脫穎不知其所從來兮但見夫澗谷之間桃花如笠松花如纛竹葉如扇蓮葉如舟菖蒲九節餵白鹿靈芝三秀眠青牛人間三月春巳暮洞中花卉春長畱奇香異氣逐風去散落塵世誰能酬黄山高哉雲際一峯尚可畫雲外一峯畫不得霜繒鋪了掉首休丹砂一峯燭天爭日月九龍一峯拔地張旗旈天都一峯傑出于三十六峯兮星斗森羅挂珠殿日月對展揺瓊樓中有一人兮龍冠而鳳裘左容成兮右浮邱我時收卻釣竿樵具作一束投諸曹院溪中流浴余身兮湯泉風余袂兮帶所搜三字疑訛鼓隱隱兮管啾啾水晶盤兮白玉甌帝酌我兮勞我左右爲余兮凝眸指余以南峯石壁記授余以紅鉛黑汞大丹頭黄山高哉余將攬秀巢雲鍊氣于其下坐令萬物不生疵癘兮禾黍盈疇黄山志趙璩送張達道還茅山賸借紅塵一日閑有勞妙語徹幽關豈知隱几如南郭也媿移文向北山有意清風憐我住無心孤月伴君還三茅若問今消息爲報逍遙大地間茅山志程炎炎涇縣隱士有烟水集和趙守獨遊水西寺吟月歌風酒力微獨尋幽壑叩禪扉泊隄小艇迎人渡入水閑雲伴鶴飛梅落半含冰雪思石寒長覆薜蘿衣水西景物還如舊恨不相從倒載歸寧國府志朱升之相湖在仙居縣世路羊腸淹客遊塵纓來此濯清流半窗修竹翠含雨一片澄湖冷浸秋地僻莓苔侵石几機忘鷗鷺近漁舟夜涼酒醒未能睡詩句欲成搔白頭台州府志范良龔良龔呉門人妙庭觀在富陽縣相傳爲董䨇成故宅山下多董姓天聖中道士鑿地得丹鼎銅槃我昔遨游周八極玉京金闕俱經歷翩然騎鳳下瑶池始與䨇成獲相識䨇成侍宴王母傍道貎方瞳照人碧玉笙吹徹奉瓊觴范子從傍丏餘瀝東方曼倩謂余言汝亦名存地仙籍鳳城南望好溪山此是元君故仙宅琉璃槃上存金鼎鼎内丹砂如琥珀汝能服食早歸來與子同是逍遥客我時貪醉蟠桃春不記當年說仙蹟一朝酒醒人世非盤碎丹飛杳難覓香風堂上久徘徊蘇李題詩挂空壁自注觀有太白東坡詩孤雲野鶴謾興怨我獨摩挲問金狄世人勸我䑛丹鼎我亦何嘗苦營役丈夫自有大還丹得道不分今與昔杭州府志吕紘黄犢嶺在臨平山唐隱士邱丹遺迹疇昔聞高隱紅塵隔遠林閑乗黄犢出踏破白雲深杭州府志蔡中道張公洞天上騾蹤竟不迴洞門深閉密封苔神光夜燭燒丹竈淑氣晴薰講易臺碧草春肥仙去遠紫芝雲暖鶴歸來清游喜挾三茅客杖履凌空霧雨開宋藝圃集黄彥輝古寺古寺雲深去路賒來分僧鉢共生涯依稀池草成春夢容易江梅老歲華長鋏悲彈三尺雪短檠寒落五更花夜來風雨催歸急爲報河陽令尹家宋藝圃集楊養晦寒雲千疊山在新昌縣南三十里松竹陰森䕶上方老仙蓬髮一簪霜客來攲枕松風裏歸夢不知山水長越詠劉說道㝛武夷觀度溪造靈境臺殿隱山曲虛堂畱白雲今夕得同㝛扁舟計巳具清曉泛春綠玉女峯嘉名實世想奇態明天造亭亭照綠水獨立爲誰好日日看遊人遊人還自老以上建寧府志宋詩紀事巻八十三
