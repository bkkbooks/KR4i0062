body:
  text: 宋詩紀事巻七十五錢塘厲鶚撰文及翁及翁字時學號本心綿州人登進士第歴官參知政事和賈魏公大雪遺潛安撫侍郎身逰廊庿意山林六出花開一片心平地尺書叨載史瞻天班賀齒諸任屢豐嵗事嘗如昔太素風光直到今收斂神功放晴景白河半夜掃層隂咸淳臨安志山中夜坐悠悠天地間草朩獻竒怪投老一蒲團山中大自在天地閒集陳存存咸淳中官侍郎和太師平章魏國賈公大雪遺潛侍郎之作先臘催開萬玉林人心悦處即天心山河洞徹重瞳逺宮闕髙寒一柱任瑞應崆峒知有日塵清洄曲在斯今神功變化無留迹便放陽春捲積隂咸淳臨安志曹元發元發咸淳閒官侍郎和太師平章魏國賈公大雪遺潛侍郎乾坤滿眼盡琪林擎玉詩傅魏國心寫琰已増天府重掌冰匪媿地官任三千界内清無際數十年來瑞獨今喜雪未幾還喜雨老農歌舞愛春隂咸淳臨安志曹邍邍字擇可號松山御前應制又為賈師憲之客寄豫章詩社諸君子向來心事劍能知曽結仙人汗漫期南浦看花春載酒西園刻燭夜吟詩凄涼風月隨殘夢零落江湖似㫁棊千里洪崖秋水隔暮雲無處說相思詩林萬選南徐懷古呈吳履齋匹馬來逢塞草秋淮雲一片隔神州黄昏燈火西津渡白晝風烟北固樓猶有斷碑知晉宋誰將遺石問孫劉天荒地老英雄盡落日長江萬古愁詩家鼎臠何夢桂夢桂字巖叟初名應祈字申甫嚴之淳安人咸淳乙丑廷對第三人授台州軍事判官歴仕至大理寺大鄉引疾去至元累徵不起築室小西源有潛齋集擬古杞國天柱傾哀我鞠子疚蒼鵝飛冲天妖星大如斗簾下玉牀移山摧失鼇負河南弔遺黎原野骨未朽北邙望孤陵古朩呌猨狖朔風吹塵沙天寒薄翠䄂南雲山萬重去去莫回首寄王南叟歌盡驪駒落日寒相思無處問平安客愁白髪三千丈世路青泥百八盤夜月梅花頻入夢秋風菰米强加餐髙山如故絲弦在嬾向旁人取次彈哭橋陵百年弓劍入橋陵豈料三泉化劫塵空有魚燈照荒土忍將玉軸問遺民蒼梧日落啼丹雀金粟雲深臥石麟寒食家家上丘冢六宗盂飯屬何人弔維揚瓊花䨇鶴揚州問故家一樽后土弔瓊花人間驚破霓裳舞天上徵回玉女車死蘖記曽霑雨露落英誓不汚泥沙後庭玉樹今誰主猶得䑓城葬麗華己邜春過西湖和諸公白髪星星紗㡌烏怕隨年少過西湖清明上冢行人少寒食開門宮使無半世行藏隨杖屨百年悲樂寄樽壺歸來第五橋邉路半樹殘陽噪畢逋題川無竭寄傲窗南山有路滑如苔多少人從半嶺回不是老僧空傲世世人自不上山來以上潛齋集贈畱中齋歸昆明灰劫化塵緇夣覺功名黍一炊鍾子未甘南操改庾公空作北朝悲歸來眼底呉山在别後心期浙水知白髪門生羞未死青衫留得裹遺尸庻齋老學叢談何探花夢桂畱中齋知舉日及第畱歸贈詩云云按畱夢炎宋大魁䧏元黄公紹公紹字直翁邵武人咸淳元年進士隠居樵溪有在軒集競渡櫂歌望湖天望湖天緑楊深處鼓鼘鼘好是年年三二月湖邉日日看划船鬬輕橈鬬輕橈雪中花巻櫂聲揺天與玻璃三萬頃儘教看得幾呉舠櫂如飛櫂如飛水中萬鼓起潛螭最是玉蓮堂上好躍來奪錦看呉兒建雲斿建雲斿土風到處總相猶朝了霍山朝岳帝十分打扮是杭州蹋青青蹋青青西泠橋畔草連汀撲得龍船兒一對畫䦨倚徧看遊人在軒集夢粱録二月初八日錢塘門外霍山路有神曰祠山真君誕聖之辰其日龍舟六隻戲于湖中其舟俱装十太尉七聖二郎神神鬼快行錦體浪子黄胖雜以鮮色旗傘花籃閙竿鼓吹之類其餘皆簪大花捲腳㡌子紅録戲衫執棹行舟帥守出城徃一清堂彈壓令立標竿于湖中挂錦綵銀椀官楮有一小節級披黄衫頂青巾戴大花揷孔雀尾乘小舟抵湖堂横節杖聲喏取指揮以舟回朝諸龍舟小綵旗招之俱鳴鑼擊鼓分兩勢划棹旋轉逺列成行再以旗招之龍舟並進者二义以旗招之其龍舟逺列成行而先進者得㨗取標賞聲喏而退餘者以錢酒支犒也史䝉卿䝉卿字景正鄞人司封郎中彌鞏之孫咸淳元年進士江隂軍教授宋亡不仕自號靜清處士感事宮花攅曉日仙鶴下雲端自是傷心極那能著眼看風沙兩宮恨烟草八陵寒一掬孤臣淚秋霖對不乾有感途窮那免哭哭罷一髙歌白日催年急青山閲世多浮生從潦倒遺恨不消磨何許南來雁殷勤掠暝過以上呉禮部詩話史唐卿唐卿與兄䝉卿同登咸淳元年進士鳯鳴洞何年雷斧鑿山裂千尺蒼崖㵼飛雪青天半夜玉簫寒喚醒幽人弄明月甬上耆舊集汪宗臣宗臣字公輔婺源人咸淳二年兩中亞選入元不仕有紫巖集稼穡稼穡病多雨蕪菁種待晴壘空驚燕去池浄襯鷗明野碓鳴秋杵風簷響夜筝山中凉意早蚊蚋已無聲十一月宿於潛蜂迷蜜甕朩絲香蟻泛花甆碧玉漿縣僻人稀寒日晩古松樛翠出危墻以上新安文獻志范師孔師孔字學大崇安人咸淳丁卯恩薦充講書有畫餅稾髙樓髙樓髙登天美人美如玉美人坐髙樓更彈天上曲飛聲落人間誰不注耳目安知妾此心長恐晝夜促莫羡髙樓髙莫羡美女美樓頭瞻明月樓下看流水月明圓易缺水流去如駛獨愛山中蘭幽香抱枝死武夷山㡬與溪山絶世縁重來猨鳥只依然懸崖野瀑飄成雪近午嵐霏暗盡天水尚未䟽須識禹山如深入定逢仙洞中石鼎烹雲處此夜還來借榻眠以上四朝詩鮑夀孫夀孫字子夀新安人咸淳丁卯領江東漕舉句我無孤雁句君有倚樓詩一樽浮大白千里䇿飛黄但喜親庭健何悲客路長少日從游今老矣殘冬話别各凄然方回桐江集陳文龍文龍字志忠一字君賁興化軍人咸淳四年廷對第一累遷参知政事元兵至杭文龍乞歸飬益王立于福州復拜参知政事充閩廣宣撫使即興化軍開閫元兵攻城通判曹澄孫䧏俘至杭餓死訃聞行朝諡忠肅三桞軒雜識陳文龍度宗朝狀元也徳祐末歸守本州北兵入閩不屈生縛之至杭病卒于杭之貓兒橋巷初文龍入太學累試不利太學守土之神岳侯也一夕夢神請交代意必老死于太學常悒悒不樂既而赴廷對第一仕宦日顯前夢不復記矣及守郷州又夢神通書閲書前面曰交代後書年月至元心甚慢之未幾國亡城䧟家殘身俘至杭幽于太學之側元兵俘至合沙詩寄仲子斗壘孤危勢不支書生守志定難移自經溝瀆非吾志臣死封疆是此時須信纍囚堪釁鼓未聞烈士樹䧏旗一門百指淪胥盡唯有丹衷天地知興化府志李瓘瓘興化軍人咸淳戊辰進士挂冠詩人言學古思入官我謂學易而官難平生透出夢覺關本來面目只儒酸吾親不俟若為懽不如歸去臥林間殿前三䇿罄忠肝多謝皇恩天地寛戲衫䣃了白衣還扁舟飛過子陵灘前修亦有逋與摶聖世許之俱寛閒何物种放太厚顏山鬼移文伐其姦此行無復出閩山休音息影谷之盤今朝釃酒酹雩壇便向錢塘門挂冠古杭雜記詩集度宗戊辰龍飛狀元興化陳文龍同郡李瓘太學貫道齋上舍係第三甲正奏名于唱名之後乞以本身官致仕恩例盡以回贈父母上書畢辭先聖及三魁同舍出錢塘門脱緑袍挂于門之上泛舟而去時三魁同舎皆送别瓘有詩云云童潮潮彭澤人咸淳進士官工部尚書小孤山長江萬里來一砥中流峙巨浸没根深孤峰插漢起倒回三峽流獨據九江水真是海門關波濤險莫比西江詩話汪薦薦一名韶字東羙黟人咸淳四年進士演雅布榖不稼不穡巧婦無褐無衣提壺不可挹酒絡緯匪來貿絲後村題䟦句秋風駝臥棘春雨燕巢林後村題䟦汪君此句感時傷事有足悲感胡次焱次焱字濟鼎號梅巖婺源人咸淳四年進士授湖口縣主簿改貴池縣尉徳祐乙亥㣲服歸教授鄉里以終媒問嫠媒問嫠汝何傷汝為國秀時辛苦事蠶桑僴瑟順為正婉娩禮自將笥中有練帬衣上無明璫貧女古難嫁賣犬辦資装中年得夫壻憧憧拜姑嫜肅容采蘋藻洗手供羮湯良人正少年相期家道昌良緣天所妒夫壻奄云亡自從夫壻亡十年守空房素帷代錦幬苫席易牙牀孤眠耿夜半單立黯昏黄煢煢影徘徊鞅鞅情彷徨皓月照孤衾暴雨頽垣牆獨寐誰呼喚獨語誰交相如凌空失翼如渉川無梁嫠來吾語女琴瑟貴更張汝篋既單薄汝門復凄涼汝寒何以衣汝飢何以糧紡績終難給舂汲勞欲僵死者不復起生者宜自詳鄰有美丈夫顒顒更昻昻牛羊量用谷金玉堆滿堂畫梁青瑣闥珠簾􅉊毺廂琱户金彈丸寳鞍青絲韁旌旗明晩霞劔㦸磨秋霜奴𨽻厭綺紈犬貓棄餦餭門下粲珠履庭前沸笙簧出則専城居入則侍明光一呼千夫諾一指萬夫張一笑生羽翼一怒起鋒芒吾慕者蹇脩與汝解佩纕以此窈窕婦配彼駔儈郎花樹戲蛺蜨蓮浦浴鴛鴦無煩賦藕花且喜華枯楊何妨鸞舞鏡應被鳯求凰人無百嵗人倐忽如風狂莫將泡影身徒置冰炭腸死後留名節身朽魂茫茫生前受富貴志得意洋洋人生行樂爾二者試裁量蔬食不日給孰與飫膏粱荆釵不自謀孰與雲霞裳年滔滔不反貎駸駸巳蒼敗棊湏換局作戲且逢塲文君慕相如恢女唤江郎有髪可重結有耳何自戕試問東夷子何如聲伯孃信書不如無未必有共姜鬼妻變人婦毋作老死孀嫠答媒嫠荅媒妾自憐妾家貧如洗妾貎妝不妍中年方擇配幸逢夫壻賢藍橋凝仙㑹紅葉開良緣俯以奉箕帚仰焉供豆籩粤從定六禮穩圖偕百年渠疑有家願倐罹中道捐城崩哭呦呦竹斑淚濺濺空房照明月幽隴凄寒煙禽鳥喧墓門魄降魂翩翩蛜蝛滿窗户心結目涓涓寮室昔華屋埋玉今荒阡恨不即同穴何忍續斷弦翻思合巹初参透老婆禪如魚水游泳如蔦蘿纒綿奈何死生濶泛泛水中船綢繆為夫婦反覆如市廛徒眙陽華醜寧免桞絮顚妾頗親筆硯亦嘗閲簡編女不踐二庭婦不再移天陶嬰寡鵠吟衛妻孤燕篇或刑耳自誓或斷髪自全或劓鼻偃蹇或毁面迎邅吾足幸可刖吾臂不可牽卓卓節操立表表鳯孤騫藐茲未亡人有意奉周全媒雖憫妾寡媒適重妾愆妾命春葉薄妾心頑石堅栖栖謀尺布豈不羡罽氊皇皇圖斗粟豈不思葷羶胝手任舂汲孰與奴婢千鞠躬跧衡茅孰與疏綺便枯荄欣回春缺月喜再圓世誰不此樂妾意獨不然理義自有閑物欲常無厭三少穢難洗五嫁醜莫鐫浮榮瞥似電遺臭流如川媒言頗喋喋媒意遽拳拳之死矢靡他斯言當眞詮文姬殊妖媚易安亦嬋娟失身再事人彤管無取焉節義日以頽文章何足詮王母有差事青鳥信頻傳毋乃墮人慾反以汙天仙嫦娥豈不嫁空抱老金蟾所以廣寒宮萬古清鍳懸寧貧任勞漉寧賤受磨研寧凍如寒蠅寧餓如飢鳶終不以快樂而易此憂煎井底水不汲山頭石不遷再拜謝媒妁歸來䨇淚漣什襲藏破鏡他年㑹黄泉新安文獻志右嫠媒荅問宋卿先生胡公次焱濟鼎之所作也先生登宋咸淳四年第授迪功郎江州湖口縣主簿以母老改授池州貴池尉徳祐乙亥天兵將至池州都統制張林潛納款請以城䧏先生奉母亡歸教授鄉里或勸之仕先生賦是詩以見意大德十年以夀終于家後三十二年復為至元之三年文自黄竹入郡其孫師中適在郡中出是詩俾文書之嗚呼讀桞子河間傳知邪之得以敗正讀先生是詩知正之所以勝邪天理之在人心猶日月之在天也可以缺蝕而不可以䘮其光明若先生之心孰得而缺蝕之哉雖與日月爭光可也鄉後學程文謹記粱棟棟字隆吉其先湘州人後遷居鎮江登咸淳四年進士選寳應簿調錢塘仁和尉宋亡弟柱字中砥入茅山從老氏學棟徃依焉乙已無疾卒有梁隆吉詩鈔四禽言脱卻布袴貧家能有幾尺布寒機剪盡無可裁可人不來亷叔度脱郤布袴不如歸去錦官宮殿迷烟樹天津橋上兩三聲呌破中原無住處不如歸去提葫蘆今年酒賤頻頻沽衆人皆醉我亦醉哀哉誰問醒三閭提葫蘆行不得也哥哥湖南湖北秋水多九疑山前叫虞舜奈此乾坤無路何行不得也哥哥山房隨筆云寓意甚逺諸作不及金陵廢宮六代俄然又一唐青山坐閱幾興亡心知江左非王業口說中原是帝鄉落日有時登北固春風吹夢過錢塘荆墳檜宅依然在留與烏衣話短長金陵三遷有感憔悴城南短李紳多情烏㡌染黄塵讀書不了平生事閲世空存後死身落日江山宜喚酒西風天地正愁人任他蜂蜨黄花老明月園林是小春送李北山歸建康人生無百年胡為在逺道遊子歸故鄉王孫怨芳草有田歸去來無田歸亦好以上梁隆吉詩鈔登大茅峯杖藜絶頂窮追㝷青山世路爭嶇嶔碧雲遮㫁天外眼春風吹老人間心大君上天寳劍化小龍入海明珠沉無人更守元帝鼎有客欲問秦皇金巔崖誰念受辛苦古洞未易潛幽深神光不破幽暗惱山鬼空作離騷吟我來俯仰一慷慨山川良昔人民今安得長松撐日月華陽世界收層隂長嘯一聲下山去草朩為我留清音至正金陵新志至正直記遺編宋末士人梁隆吉有詩名以其弟中砥柱為黄冠師三茅山嘗徃還一日登大茅峯題壁賦長句有黄冠訴于句容縣以為訕謗朝廷行省聞之都省收梁于獄禮部免罪放還嘗觀其詩集云云其意亦可悲矣哀毘陵德祐元年元兵攻常州城破知州事姯訔統制王安節等死之荆溪水腥泊船早落日無人行古道髑髏有眼不識春東風吹出青青草荒基猶認是人家敗柵曽將當城堡當時壓境兵百萬不脱鞾尖堪蹴倒短兵相接逾四旬毒手尊拳日攻討内儲外援兩消沈一縷人心堅自保孤臣守土輕性命赤子效死塗肝腦朝廷有爵媿降附幽壤無恩澤枯槁願箋司命録英雄收拾忠魂昇穹昊毘陵忠義録送存書記一聲兩聲松子落一片兩片楓葉飛夕陽在山新月上道人相伴一僧歸清河書畫舫句千枝守紅死一㸃反魂啼雪中見山茶癡兒嬌勿啼不久當澄霽暴雨家貧忽暴富菜種一十七癡兒不解事問我何從得於義苟有違吾寧飢不食賦蔬至正直記遺編莫崙崙字子山號兩山江都人寓家丹徒咸淳四年進士入元不仕癸辛雜識梁棟隆吉鎮江人登第授尉與莫子山甚稔一日有客訪子山畱飲偶不及棟棟憾之遂告子山作詩有譏訕語官捕子山入獄久之得脱而歸未㡬病死余挽之詩云奏邸獄成杯酒裏烏䑓禍起一詩閒紀其實也頗有泉石湛囦静語莫子山暇日山行過一寺之勝因誦唐人絶句以快喜之云終日昏昏醉夢間忽聞春盡强登山因過竹院逢僧話又得浮生半日閑及叩其主僧庸僧也與語畧不相入屢欲舎去僧意以為檀施苛留作午供鬰鬰久之殆不自堪因索筆以前語錯綜其詞書于壁曰又得浮生半日閑忽聞春盡强登山因過竹院逢僧話終日昏昏醉夢間傷丁氏故基題一絶于太虚堂疎雨斑斑灑葉舟前山喚客作清游芳華消歇春歸後野草荒田一片愁山房隨筆張鎮孫鎮孫字鼎卿南海人咸淳七年進士第一通判婺州謝恩詩當宁宵衣務得賢草茅何足副詳延天人要語垂清問仁敬陳言上奏篇媿乏謀猷禆乙覧忽驚姓字首臚傳乾坤大德知難報誓秉孤忠鐵石堅䨇槐嵗鈔林一龍一龍字景雲永嘉人咸淳辛未進士官至史館檢閲時稱為石室先生山中夜坐寒灘逺嘶月遺響到巖壁悠悠千古心悄悄一巻易燈微夜氣分星冷山露滴危坐獨何為人間睡方黑十四夜觀月張氏樓只隔中秋一夕間蟾光應未少清寒時人不㑹盈虚意不到團圓不肎看以上東甌詩集厲元吉元吉字无咎號半村餘姚人咸淳辛未進士仕為烏程尉德祐末歸隱從山至元中訪求前宋故臣元吉遯跡湖海白首始歸有半村集黄宗羲云半村出尉烏程謝疊山送之詩云十二街頭三尺雪駿馬健行如跛鼈生懐故人厲半村拂䄂前行何勇决疊山居士强欲吟凍筆如椎硯欲裂京國青衫十載交欲言不言情哽咽願君勿作繞指柔願君勿作在鑛鐵甘雨幽遐冤草甦清風宇宙貪泉竭循良寜困聖明時玊燭先華待調爕疊山詩文零落無㡬余從厲氏子孫見其墨跡如新雨過漠漠輕雲過野墻新楓矮柏色蒼蒼平田鸛迹畱殘雨深塢鸝聲帶夕陽句免冠思脱三塗難吐舌甘從五鼎烹吐鐵逸詩以上姚江趙溍溍字元晉號氷壺忠靖公葵之子咸淳中沿江制置使知建寧府北兵至其弟淮被執死于𤓰洲溍自京口遷金陵棄家南徙不返死葬海㫄山上焦山丹石無光古刹存蘆沙漁鼓闕朝昏江淮門户天分合日月軒窗海吐吞沙足半沈曽瘞鶴雲腰中㫁闕呼猨丁寧為我留佳處茅屋三間䕶竹根焦山刻石云頑石為山出色冰壺欲援東坡故事為我佳處留茅菴因說偈言請師作證咸淳壬申九月林景怡景怡字德和號曉山温州平陽人霽山之兄曉起天雞弄喔咿殘星在斜漢整衣出幽扉山城漏初斷㣲㣲水風生冉冉田露散此時遊葛天淡然空百羡海色上寒梢漸識梅花面天地間集林景熙景熙字德陽號霽山温州平陽人咸淳辛未上舍釋褐授泉州教授歴禮部架閣轉從政郎宋亡不出與王脩竹鄭樸翁胡天放輩尋嵗晏之盟徃來呉越庚戌卒于家有白石樵唱徐沁金華游録注云嘉朩揚喇勒智發陵事諸書紀載歳月不同按元史世祖至元二十一年九月丙申以江南總攝嘉朩揚喇勒智發宋陵冢所収金銀寳噐修天衣寺又按宋文憲書穆陵遺骼事及丘文莊續資治通鑑皆云至元二十一年甲申僧嗣占妙髙上言欲毀宋㑹稽諸陵江南總統嘉朩揚喇勒智與丞相僧格表裏為奸明年乙酉正月奏請如三僧言蓋其謀始于甲申而成于乙酉與周草窗宻癸辛雜識年月正同是時㑹稽唐玉潛珏永嘉林景熈德陽鄭宗仁樸翁與臯羽咸主王監簿家協謀收掩陵骨故别玉潛作冬青樹引以紀其事而景熈荅臯羽詩亦有夜夢繞句越落日冬青枝豈非諸公共事之明徴乎彭山季本以臯羽引中有白衣種年星在尾之句謂與羅雲溪有開唐義士傳嵗次戊寅之說相合善乎彭瑋解之曰星在尾者寅月也此即乙酉正月耳雜録云當發陵時林景熈故鶚案鄭明德遂昌為乞者背竹籮挾竹夾遇物夾投籮中潛鑄金牌繫腰間賄西僧求得高孝兩陵骨貯兩函葬東嘉故夢中作詩有雙匣親傳竺國經之句六陵遺骨癸辛雜識輟耕録俱云葬蘭亭若云高孝兩陵林攜葬東嘉則詩中所云水到蘭亭轉嗚咽不知真帖落誰家又何謂耶當以周草窗陶南村所紀為是而景熈則共事之人也夢中詩係唐玉潛作云景熈作者非啇婦吟寓思君之意良人滄海上孤㠶渺何之十年音信隔安否不得知長憶相送處缺月隨我歸月缺有圓夜人去無回期回期儻終有白首寧怨遲寒蛬苦相弔青燈鍳孤幃妾身不出幃妾夢萬里馳鄭宗仁㑹宿山中宗仁樸翁也號初心平陽焦下人太學釋褐出身仕至國子學正挑燈懷舊夢移席近春泉共話忽深夜相看非少年斗垂天末樹燐出雨餘田亦有茅簷下飯牛人未眠獨夜客鬢雙蓬老拾遺一燈明滅酒醒時百年回首忽成夢萬竅有聲皆是詩殘夜月枝烏未稳故鄉水草雁多飢裌衣初試新霜冷欲折黄花寄所思寄林編修名干之字能一平陽人大雅凋零尚此翁醉鄉一笑寄無功衣冠洛社浮雲散弓劍橋山落照空東魯有詩藏古壁西湖無樹挽春風巾車莫過青華北城角吹愁送暮鴻曉意僧鐘覺曙鳥紛飛弄林光宿雲漸離石我起開秋房南山忽入几相對各老蒼我老幾何年山曽見鴻荒流泉送日月危石支興亡問山山無言啼猨起前岡秋夜片月相隨過竹居風生荷葉酒醒初窗扉半掩秋蟲急猶有殘燈守故書新春衰顏憑酒潤故國得春新兵革兒童長風霜天地仁草心懸落日桞眼看行人擾擾紅塵者知誰效角巾荅鄭卽翁初陽䝉霧出林遲貧病雖兼氣不衰老愛歸田追靖節狂思入海訪安期春風門巷楊花後舊國山河杜宇時一種閒愁無著處酒醒重讀寄來詩山窗新糊有故朝封事槀閲之有感偶伴孤雲宿嶺東四山欲雪地爐紅何人一紙防秋疏郤與山窗障北風酬謝臯父見寄入山采芝薇豺虎據我丘入海尋蓬萊鯨鯢掀我舟山海兩有礙獨立凝逺愁美人渺天西瑤音寄青羽自言招客星寒川釣煙雨風雅一手提學士屨滿戸行行古臺上仰天哭所思餘哀散林朩此意誰能知夜夢繞句越落日冬青枝重過虎林虎林山在錢塘舊治北半里亦曰武林今為郡稱漠漠江湖夢蕭蕭禾黍秋清笳吹落日白髪過西州池涸神龍逝山空老鳯愁唯餘關外水寂莫自東流故宮驚風吹雨過歴歴大槐蹤王氣銷南渡僧坊聚北宗烟深凝碧樹草沒景陽鐘愁見花甎月荒秋咽亂蛩飛來峯在武林何年移竺國秀色發棱層清極不知夏虛中欲悟僧樹幽嵐氣重泉落乳花凝猶憶烹茶處閒來語葛藤京口月夕書懷山風吹酒醒秋入夜燈凉萬事已華髪百年多異鄉逺城江氣白髙樹月痕蒼忽憶凭樓處淮天雁叫霜宋武帝居今為夀丘寺青衣夢破滿林烟一擲乾坤亦偶然僧屋翠㣲看月上江山猶似永初年石翁嫗在丹陽束艾楚俗愚鑄金秦民怖何年斲雲根偶立此翁嫗千春衣莓苔偕老食風露世人輕結髪覆水或旦暮乃習無情緣永與天壤固停舟一訪古久欲祛此錮父老向我言曽是梁朝墓衣冠化黄土古丘亦成路當年殉金棺茲物獨如故閲世如過客興亡了不悟時借牛礪角敲火戲童豎立春郊行次唐玉潛越州人道人清事飯溪蔬無酒閒愁已破除五夜雪聲梅角底一春煙景竹笻初園林芳信愁醒蜨田野豐年入夢魚冰下流泉清老耳東風先已到郊居夢回夢回荒館月籠秋何處碪聲喚客愁深夜無風蓮葉響水寒更有未眠鷗冬青花冬青一名女貞朩一名萬年枝漢宫嘗植後世因之宋諸陵亦多植此朩冬青花花時一日腸九折隔江風雨清影空五月深山䕶㣲雪石根雲氣龍所蔵尋常螻蟻不敢穴移來此種非人間曽識萬年觴底月蜀魂飛繞百鳥臣夜半一聲山竹裂送春蜀魄聲聲訴緑隂誰家門巷落花深㳺絲不繫春暉住愁絶天涯寸草心以上白石樵唱邵桂子桂子字德芳淳安人咸淳七年進士教授處州棄官寓家松江有雪舟脞槀孫亨貞知名次韻方虛谷遷居家住千峯落照邊移家三泖白鷗前東鄰舊日秦侯隱西路新巢衞叟還當日釣游頻入夢何時婚嫁送歸田㑹須共跨青溪鶴㸃易寒窗伴老仙嚴州府志蔬屋詩為曹雲西作草菜可食總名曰蔬品題有譜樹藝有書衡縱町疃周繞屋廬繚以樊垣經以濵渠晨出抱甕夕歸荷鉏有蔓必薅有蝗必驅風披雨沐日烜露濡穉甲怒生嘉苖蔚敷芥薑杞菊韭薤蒜葫薇蕨藜藿𤓰瓞匏瓠楮雞桑鵝籜龍椶魚馬齒鹿角䑕尾虎鬚薯蕷蔓菁杜蘅蘼蕪茵陳莪蘿芄蘭茹藘赤莧銀茄翠荇墨苽酸漿辣蔊甘薺苦荼庖人調胹園丁拮据錡釜鬻煠筐筥貯儲椒橙内交鹺醢效劬以芼以湘可茹可葅惟昔仲尼爪祭齋如飲水曲肱其樂只且召南蘋藻韓奕筍蒲知味羡黄咬根歎胡葵蓼飫顒蔥韭厭徐火芋明瓚山菌接輿庾郎三種石生一盂劉參玉版蘇傳冰壺巢字元修鮒姓豆盧菘羔抱孫蹲鴟將雛絲滑露葵練浄土酥野薺餛飩水苔脯膴餅炊菠薐鮓釀葖蘆胡麻饙餾罌粟醍醐萍虀西晉蓴羮東呉芹擷泥坊藤采豐湖沼沚有蘩江漢有蔞岡有常枲洲有接余雁門天花黄河蘑菇大宛苜蓿太華芙渠環滁野䔩盤谷山茹地饒所產天茁此徒菲葑是采口腹以娯落英未莎初篁未箊霜根旋挑露葉半舒烹泉石鼎飬火地爐色炫匕箸香浮柈杅氣含土膏味逾天廚肥生華池響鳴輔車啇顏飢觧文園渴甦前招麴生後引酪奴饌非羶葷餉非苞苴園無羊踏壤有䑕餘彼哉肉食俎列豢芻心炙椎牛項臠割猪春羔秋麛冬鱻夏胊猩脣豹胎麋臡蟹胥緇帬解鼈銀絲鱠鱸羊尾􅎒肪錦襖脱膚山殽雉兎澤羞雁鳧北饌潼酪南烹鼃蜍嗜䑕則鴟甘帶則蛆乃笑鄭老爛蒸瓠􅕧乃笑坡翁夢餐雞蘇屬厭饕餮飽死侏儒語以蔬味能知否乎予雅嗜之日不可無乃顏茲屋羞供是須寧蔬而癯母肉而腴易牙司味敢告膳夫餞魏州判鵬舉松下吟哦幾唱酬郤攜螃蟹餞監州穩挑書擔去環碧頻寄詩筒來雪舟異姓弟兄千里月故山泉石一天秋葛峯隱者如相問為道𤓰侯已白頭以上雪舟脞槀孫鋭鋭字頴叔呉江人咸淳七年舉于鄉宋亡隱居平望之桑磐村有耕閑先生集漁父詞平湖千頃浪花飛春後銀魚霜更肥菱葉飯蘆花衣酒酣載月忙呼歸石湖别墅山水遙通西渡頭亂雲零落樹還稠先生唱罷村田樂戴月披蓑理釣舟荻塘桞影日出烟銷春晝遲桞條無力萬絲垂韶光新染鵝黄色偏愛東風款款吹以上耕閒先生集龔潗潗字深父高郵人徙吳官司農卿宋亡隨例北行至莘縣不食卒子璛入元為江浙儒學副提舉有存悔齋集劍池橋粱久就傾圯方文霑公大禪師挺出新意刋石伐朩以遞汲且併陳樓悉改舊觀試下轉語請師舉似石侍者肎一㸃頭不涓涓劔池泉削崖出石乳流傳嵗千百評列品三五輿梁見何時樓與姓俱古坐令丘壑觀凛作巖牆懼霑公大勇猛咄嗟見未覩攲傾變畧彴岞崿移朽腐連筒稱深汲惠澤徧下土幽㝷稳登眺清意逼肺腑何須鐡作限只爾天可補傳聞橋下雲已作前山雨虎丘志宋詩紀事巻七十五
