body:
  text: 宋詩紀事巻六錢塘厲鶚撰楊億億字大年建州浦城人七歲善屬文雍熙初年十一召試詩賦授祕書省正字淳化中命試翰林賜進士第眞宗朝歷官知制誥天禧中拜工部侍郎翰林學士兼史館修撰卒贈禮部尚書諡曰文有括蒼武夷潁陰韓城退居汝陽蓬山辭榮冠鼇等集及内外制刀筆詩林廣記三朝正史云楊億祖文逸為偽唐玉山令億將生文逸夢一道士自稱懷玉山人未幾億生有紫毛被體七尺餘經月乃落筠錢惟儒林公議楊億在兩禁變文章之體劉演軰皆從而斆之時號楊劉三公以新詩更相屬和極一時之麗億復編叙之題曰西崑酬唱集當時佻薄者謂之西崑體其他賦頌章奏雖頗傷于雕摘然五代以來蕪鄙之氣由兹盡矣陳從易頗好古深擯億之文章億亦陋之天禧中從易試别頭進䇿問時文之弊曰或下里如㑹稡或叢脞如急就億黨見者深嫉之詩格而丹陽集咸平景徳中錢惟演劉筠首變楊文公與之鼎立號江東三虎謂之西崑體大率效李義山之為豐富藻麗不作枯瘠語古今詩話楊大年錢文僖晏元獻劉子儀為詩皆宗李義山號西崑體後進效之多竊取義山語嘗御賜百官宴優人有裝為義山者衣服敗裂告人曰為諸館職撏撦至此聞者大噱然大年詠漢武詩云力通青海求龍種死諱文成食馬肝待詔先生齒編貝忍令乞米向長安義山不能過也漢武蓬萊銀闕浪漫漫弱水回風欲到難光照竹宫勞夜拜露漙金掌費朝餐力通青海求龍種死諱文成食馬肝待詔先生齒編貝那教索米向長安無題合歡蠲忿亦休論夢蝶翩翩逐怨魂秪待傾城終未笑不曾亡國自無言風翻林葉迷歸燕露䙚荷池觸戲鴛湘水東流何日竭烟篁千古見啼㾗淚錦字梭停掩夜機白頭吟苦怨新知誰聞隴水回腸後更聽巴猿拭袂時漢殿微涼金屋閉魏宫清曉玉壺敧多情不待悲秋意秪是傷春鬢已絲洞户洞户飛甍接綺寮一春幽恨寄蘭苕書題枉是藏三歲壺矢誰同賽百嬌水國風霜凋社橘仙山雲霧隔江潮東城劒騎何曾出秪為離愁髀肉銷霜月月夕露為霜心知厭燭房吟殘猶擁鼻望極自回腸鬢減前秋綠衣消外國香星津誰待報織素未成章劉校理屬疾北窗風勁雪雲繁移疾端居避世喧載酒誰過揚子宅張羅休署翟公門多才最許飄飄氣少别還銷黯黯魂促爾徘徊憶眞賞逺天新月照黃昏懷舊居武夷山穴近吾廬鬬鴨䦨摧菌閣虚千匹歳儲妨種橘百金春事廢觀魚北山烟霧迷歸轍南陌風塵化客裾堂上金絲應已歇豈惟蘭菊舊叢疎因人話建溪舊居聽話吾廬憶翠微石層懸瀑濺巖扉風和林籟披襟久月射溪光擊汰歸露畹荒涼迷草帶雨牆陰濕長苔衣終年已結南枝戀更羡髙鴻避弋飛以上西崑酬唱集宣召赴龍圖閣觀太宗御書應制五年十月非烟蔥蔚蒼龍闕紫府深沉大帝居羣玉中天開䇿府神龜溫洛薦圖書珠宫岑寂經行處金簡熒煌拭目初曾是先朝受恩者因探禹穴涕漣如偶書朱輪逺守未成歡薄宦令人意漸闌郡閣政清慵按吏鄉園路近欲休官梅花遶檻驚春早布水當簷覺夏寒已是三年不聞問何如歸去把魚竿留題黃山院禾黍離離一逕通遊人攬轡即過從趁齋幽鳥聞疎磬出定髙僧見偃松夜静龕燈凝古殿雨餘巖溜迸前峯昔年曾此題名處素壁攲斜翠蘚重坐中朱博士言今荆南張諌議典襄陽日常留意一妓公頗畏内終不得近及移郡荆渚泣别郵亭乃為歌詞流布巴郢予感其事賡而成詩駸駸五馬江陵去寂寂雙蛾漢水頭一曲歌終眉黛斂十分酒盡淚珠流陽春郢客傳新唱暮雨髙唐夢昔遊瓊樹無人敢親近章臺京兆不勝愁武夷山靈嶽標眞牒孤峯入紫氛藤蘿暗仙穴猿鳥駭人羣古道千年在懸流萬壑分漢壇秋蘚駁誰似武夷君以上武夷新集詠傀儡鮑老當筵笑郭郎笑他舞袖太郎當若敎鮑老當筵舞轉更郎當舞袖長後山詩話貽館閣聞帶宫花滿鬢紅上林弦管侍重瞳蓬萊咫尺無由到始信仙凡迥不同渑水燕談楊文公初為光禄丞太宗頗愛其才一日後苑賞花釣魚宴詞臣不得預以詩貽諸館閣云云諸公以詩進呈上詰有司所以不召以未貼職例不得預即命直史院免謝令預晚宴時以為榮夜懷獨倚青桐聽鼓聲參旗歷落上三更涼風巻雨忽中斷明月背雲還倒行賴有清吟消意馬豈無美酒破愁城是非人世何須較方外吾師阮歩兵詩林萬選贈張季常疊巘參差翠繞門雕梁賀燕自成羣割雞日夕期嘉客種竹寒暄對此君且向東臯輸黍稷便應北闕降𤣥纁子真漫説耕巖石不奈聲名四逺聞萬姓綂譜季常名彜憲三與計偕不利絶意功名放懷林壑與文公世親文公自括蒼解印趨朝兩造其居贈之詩昇山寺層巒連近郭占勝有招提㝛霧昏金像飛泉濺石梯鐘聲空郭荅塔影亂雲齊千騎時來此尋幽獨杖藜建寧府志句關榆漸落邊鴻度勸到劉郎酒十分送劉綜學士出鎮并門詩話總龜錢惟演惟演字希聖吳越忠懿王俶之子少補牙門將歸宋累遷翰林學士樞密使罷為鎭國軍節度觀察留後改保大軍節度使知河陽入朝加同中書門下平章事坐事落職為崇信軍節度歸鎭卒諡曰思改諡文僖有擁旄集伊川集苕溪漁隱叢話歐公花品序云予居府中時嘗謁思公見一小屏立後細書序滿其上思公指之曰欲作花品此是牡丹名几九十餘種然予所見而今人多稱者纔三十許不知思公何從而得之多也東坡云惟演為西都留守如置驛貢洛花識者鄙之此宫妾愛君之意也故于荔枝嘆亦云洛陽相君忠孝家可憐亦進姚黄花蓋為思公惜之也宣曲二十二韻絳縷初分後銀鐶未解時已障紈扇笑惟捧玉壺悲乞巧長生殿迎風太液池雕屏涵火齊寶帳隔琉璃欲買詞人賦空傳狎客詩蔗漿消内熱瓊蘂療朝飢綺蔕桃初熟紅心草欲披凌波渡羅韈向日翳華芝素臉分丹柰香津滴紫梨龍梭隨振素獺髓補凝脂蓬餌重陽節金針七夕期玉膏嘗滵溢翠蓋逐葳蕤弦急哀隨指歌長恨入眉青鸞惟有舞赤鳯可能疑下蔡迷還易平陽破未知髻高釵自墜腰細佩長垂出恐嚴鐘晩歸嫌鈿幰遲轆轤驚晩夢鸚鵡漏春思魂怨惟愁斷腸柔已自危璧璫螢影度瓊户蘚花滋掩鼻讒難訴披圖悔豈追秪應金帶枕聊為達微辭赤日漏淺風微夜未勝雨雲無迹火雲凝簟鋪寒水頻移枕帳巻輕烟更背燈沃頂幾思金掌露滌煩誰借玉壺冰蘭臺知有披襟處宋玉多才獨自登明皇山上湯泉架玉梁雲中複道拂瑤光絲囊暗結三危露翠幰時遺百和香枉是金雞親便坐更抛珠被掩方牀悤悤一曲涼州罷萬里橋邊見夕陽無題誤語成疑意已傷春山低斂翠眉長鄂君繡被朝猶掩荀令熏爐冷自香有恨豈因燕鳯去無言寧為息侯亡合歡不驗丁香結秪得凄涼對燭房耿耿寒燈照醉羅看朱成碧意如何虎頭辟惡無妨枕犀角涼心更待磨惟有幽蘭啼月露可將尺素許雲波山屏六曲歸來夜秪恐重投折齒梭淚家在河陽路入秦樓頭相望秪酸辛江南滿目新亭宴塞外傷心故國春仙掌倚天頻滴露方諸待月自涵津荆王未辨連城價腸斷區區抱璧人始皇天極周環百二都六王鍾鐻接流蘇金椎漫築甘泉道匕首還隨督亢圖已覺副車驚博浪更攜連弩望蓬壺不將寸土封諸子劉項由來是匹夫方虛谷云督亢之亢作平聲作仄聲用亦可初秋屬疾蜜脾初滿若榴紅秋意如侵玉井桐薤簟自憑南郭几縠巾猶卧北窗風雲迷候雁辭遥塞露溼飛螢起暗叢病已不須傳七發粉箋香墨寄詩筒寄靈仙觀舒職方學士方瞳𤣥鬢粉闈郎綘闕齋心奉紫皇徵士高懷雲在嶺騷人秋思水周堂閒園露草開三徑靈宇華燈燭九光知有美田堪種玉幾時春渚逐歸艎與客啟明越溪微霰灑寒梅家近嚴陵古釣臺夢欲成魚通夕去書曾憑犬隔秋回干時不為侏儒米樂聖猶銜叔夜杯帝右豈無楊得意漢宫須薦長卿才此夕曲瓊斜挂影沈沈火齊屏風六曲深春瘦已寛連理帶夜長誰有辟寒金珠抛月浦空涵淚琴怨蘭臺漫寄心碧玉可能攀貴德阮郎追騎更駸駸致齋太乙宫齋潔奉惟馨瑶臺獨自升樓迷五里霧壇燭九枝燈珠館來青雀璇題射玉繩疎鐘平野闊古栢夕霏凝鶴扇真窺月仙衣可縷冰春茶泛雲液曉飯薦蘭蒸鍊藥疑洪井藏書類羽陵回瞻太帝室飛檻更長憑戊申年七夕玉露金河顥氣涼辛夷車轉桂旗香嫦娥可是多猜忌不駐瓊輪放夜長以上西崑酬唱集對竹思鶴留守西洛日作瘦玉蕭蕭伊水頭風宜清夜露宜秋更教仙驥傍邊立盡是人間第一流能改齋漫録句高為天一柱秀作海三峯㓜時父俶使賦逺山東都事畧置酒軍中樂聞笳塞上情送劉綜學士出鎮并門詩話總龜日上故陵烟漠漠春歸空苑水潺潺西洛懐古楊文公談苑雪意未成雲著地秋聲不斷雁連天奉使塗中客亭厭見名長短村酒那能辨聖賢又㝛舎孤烟起行衣夢雨涼送僧遊楚平檻曉波吳㮄渡遶城春樹越禽飛章衢州神宫古栢啼烏起齋室虚簾㝛霧通太乙宫以上詩話總龜劉筠筠字子儀大名人咸平元年進士累遷御史中丞知制誥翰林承㫖兼龍圖閣直學士卒有册府應言榮遇禁林肥川中司汝陰三入玉堂七集侯鯖錄劉子儀三入翰林頗不懌詩云蟠桃三竊成何味上盡鼇峯迹轉孤移疾不出朝士問候者繼至詢之云虛熱上攻石中立用滑稽在坐云只消一服清涼散意謂兩府始得青涼傘也南朝華林酒滿勸長星青漆樓高未稱情麝壁燈迴偏照畫雀航波漲欲浮城鐘聲但恐嚴妝晚衣帶那知敵國輕千古風流佳麗地盡供哀思與蘭成休沐端居有懷希聖少卿學士䡾䡾風簷乳燕翔浴蘭衣綌簟流黃雲容倏變千峯險草色相沿百帶長旋製紫荷供橐筆暗移神蔡忍搘牀思君秪欲傾家釀待漏同誰賦柏梁代意華池阿閣不相容濁水清塵恨莫窮明月自新班女扇行雲無柰楚王風乳鶯啼曉銷蘭炷媚蜨傷春失蕙叢縱使多才如子建秪能援筆賦驚鴻漢武漢武天臺接絳河半涵非霧鬱嵯峨桑田欲看他年變瓠子先成此日歌夏鼎幾遷空象物秦橋未就已沈波相如作賦徒能諷卻助飄飄逸氣多館中新蟬庭中嘉樹發華滋可要螳螂共此時翼薄乍舒宫女鬢蜕輕全解羽人尸風來玉女烏先轉露下金莖鶴未知日永聲長兼夜思肻容潘岳到秋悲鶴碧樹陰濃釦砌平華亭歸夢曉頻驚仙經若未標奇相琴操何因寄恨聲養氣自憐雞善勝全身卻許雁能鳴芝田玉水春雲伴可得乘軒是所榮無題走馬章臺冐雨歸後門猶嘆滯前期荷心出水終無定蘿蔓從風莫自持複帳麝輕難辟惡曲房蠶嬾不成絲漸漸隴麥藏鳴雉更恨如臯一箭遲又贈荷花一絶粉白朱紅翡翠翹漢宫等級不相饒風波若未乖前約一死何辭更抱橋淚雍門琴罷已浪浪更上牛山半夕陽楚澤雲迷千里目蘇門歌斷九迴腸寒梅帶雨飄離席尺素停燈作報章湘水未乾終未盡豈徒萬㸃寄疎篁前檻十二韻垂柳陰森院遊絲曠蕩春蘅臯誰駐馬羅韈自生塵四姓良家子三年賦客鄰折腰行太緩連瑣語何頻倭墮雲爭媚便娟月鬬新滅瘢難辨玉約指不勝銀電笑投壺勝江澄擣練勻東南勞鶴望西北限牛津寶唾凝蘭氣鳴簧咽絳脣籠禽思隴樹洞犬謝秦人詠絮才無對聞琴意始真長安足輕薄愼勿走瓊輪宣曲八月收民算三千異典章天機從此淺國豔或非良玉户銅為沓羅幬象作牀驪姬初悔泣飛燕近專房蓮小纔承歩梅新競試妝盡知春可樂終歎夜何長取酒臨卭逺吞聲息國亡難銷守宫血易斷舞鸞腸百草兼花鬭雙鉤映燭藏金人須手鑄虎圏更身當歩輦回長樂飛除接未央琳珉飾歡館藻繡裛周牆厭火雙魚尾鳴弦小雁行雲甍澄顥氣綺井激回光路有斯須隔憂難頃刻忘新聲來樂府别寢近温湯虹跨層臺晩螢飛下苑涼錦帷迎七夕蓬餌薦重陽九畹蘭承露三江橘帶霜方資裂繒笑可要蕩舟狂並釣池魚小重衾穴鳯翔珊瑚分碧樹火齊列清防背枕生幽怨登樓多逺傷下陳無自媿人彘劇豺狼陸游渭南文集䟦云祥符中嘗下詔禁文體浮豔議者謂是時館中作宣曲詩宣曲見東方朔傳其詩盛傳都下而劉楊方幸或謂頗指宫掖又二妃皆蜀人詩中有取酒臨卭逺之句賴天子愛才士皆置而不問獨下詔諷切而已不然亦殆哉宋玉楚國驕荒日已深山川朝暮劇登臨曾傷積毁亡師道秪託微詞蕩主心江草東西多恨色峽雲髙下結層陰潘郎千載聞遺韻又説經秋思不任送客不及青門祖帳曙烟微片席乗流鳥共飛曲岸馬嘶風嫋嫋短亭人散柳依依灞橋目斷猶回望楚水魂銷為送歸秪自河梁傳怨曲洛塵千古化征衣無題曾許千金荅浣紗越溪浪淺不通槎曉樓簾捲還凝霧外院牆低卻映花滿目離愁頻駐馬一春幽夢秪驚鴉柔桑蔽日南城路懊惱羅敷自有家懷舊居毛竹千叢蔽野亭曉猿驚後亂峯青漢庭已奏三千牘周室仍繙十二經紫殿深沈頻視草緇幃寂莫自飛螢振衣本為蒼生起肻向荀家秪聚星戊申年七夕伯勞東翥燕西飛又報黃姑織女期天帝聘錢還得否晉人求富是虚詞自注道書牽牛娶織女取天帝錢二萬備禮久不還被驅在營室華寢星陳夜未央橫河奕奕度神光一年暫得停機杼不柰秋蟲促織忙以上西崑酬唱集舟行淮上遇水暴漲作行行極目天無柱𣺌𣺌橫流浪有花客子方思舟下碇陰蚪自喜海為家村遙樹列清江薺岸闊平分觸氏蝸鳶嘯風髙誠可畏此情難喻坎中蛙儒林公議丁謂當國恣行威福筠在翰林守正守不阿附謂深嫉之筠乃求出為郡授諫議大夫廬江筠拜章求兼集賢院學士謂沮之不與召入翰林别同僚一辭鑾署守英藩兩見廬峯媚翠尊政懦每憐民若子歳豐還喜稻成孫離愁且飲閒人酒密對須求長者言入奉清朝同一徳晨趨豈歎鬢霜繁儒林公議題林逸士肥上新屋壁久厭侯鯖盡室來卜居鄰近釣魚臺舊山鶴怨無錢買新竹僧同借宅栽載酒誰從揚子學棹舟空訪戴逵回抽毫有汚東陽壁但惜明時老澗才瀛奎律髓句雨勢宫城闊秋聲禁苑多詩人玉屑極目關河髙倚漢順風鵰鶚逺凌秋詩話總龜劉綜學士出鎮并門兩制館閣皆以詩餞其行因進呈章聖深䆒詩雅時方競尚崑體磔裂彫篆親以御筆選其平淡者得八聨後綜寫為御選句圖立石于晉祠李宗諤宗諤字昌武昉子第進士真宗朝為學士歴右諫議大夫有集南朝仙華玉壽曉沈沈三閣齊雲複道深平昔金鋪空廢苑於今瓊樹有遺音珠簾映寢方成夢麝壁飄香未稱心惆悵雷塘能幾日吟魂醉魄已相尋代意霧鸞曉影忽參差雲雨陽臺役夢思自是膠弦無續日不同珪月有圓時洞房斗帳承新愛河漢星橋隔後期綺榭凝塵斷消息抒情空擬四愁詩館中新蟬雨過新聲出院牆烟輕餘韻度回塘短亭疎柳臨官道平野西風更夕陽八斗陳思饒賦詠二毛潘岳易悲涼感時偏動騷人思不問天涯與帝鄉以上西崑酬唱集絶句戴了宫花賦了詩不容重見赭黃衣無憀獨出金門去恰似當年下第歸國老談苑李宗諤以京秩帶館職不預賞花釣魚故事因賦詩云云太宗覽之大喜特詔御宴即日改官送何水部䝉出牧袁州三省郎曹素髪垂兩朝頻賜五時衣一麾又守江城去千騎方從澤國歸釃酒河梁秋草闊卸舟湖岸暝烟微宜陽郡客多才子誰伴山公醉夕暉袁州府志送士龍兄銅魚四明守竹馬十年兄操袂河梁别鳴橈澤國行登樓知日近傍海見潮生郡政應多暇新詩幾首成式古堂書考句一溪曉綠浮鸂鷘萬樹春紅呌杜鵑春郊金鑾後記人爭寫玉署新碑帝自書贈蘇承㫖楊文公談苑陳越越字損之開封尉氏人咸平中舉賢良方正歷著作佐郎直史館官至左正言休沐端居有懷希聖少卿學士玉甃銀牀蔭碧桐北窗珍簟水紋融衣裁練布如王導扇執蒲葵學謝公瓊屑半和仙掌露蘭苕輕泛楚臺風若非冰雪神仙骨相樂誰同一笑中西崑酬唱集句擁路東方騎懸腰左顧龜送李秦州皇朝類苑李維維字仲方肥鄉人平章沆之弟雍熙二年進士真宗初召試中書擢知制誥翰林學士歷刑部尚書相州觀察使出知陳州卒有集休沐端居有懷希聖少卿學士銀闕琳房視草餘龍門岑寂斷軒車彩毫閒試金壺墨青案時看玉字書王儉風流希謝傅子雲詞賦敵相如瓊枝不見蕭齋晚蕙草烟微度綺疏西崑酬唱集直夜繚垣嶤闕慶雲深畫燭熏爐對擁衾三殿夜籤傳漏箭九秋霜籟入風琴階前槁葉驚寒雨天際孤鴻荅迥砧攲枕便成魚鳥夢豈知名路有機心寄田錫舎人當年心計此心知忽忽逢人亦自疑枉是憂公生白髪有何長畧謝清時林僧已怪抽身晩朝侣猶嫌到闕遲多喜通規識幽抱路遙無處寄相思歸越東舊隱别秦中知已客亭楊柳葉初殘歌咽秋空慘别顔吟愛好峯歸越路醉衝寒雨出秦關烟蘿庭户重棲倚漁浦人家舊往還縱使功名無分得免教心在怨尤閒再㑹傅逸人分到知心意不輕幾年曾是愴離情微風吹雨雁初下落葉滿階蟲正鳴燈静苦嫌論劒畧簟涼頻喜轉琴聲從來共約雲泉老肻向人閒占好名郊居寄朝中知已年來流水壞平田客徑窮愁自可憐汀葦亂搖寒夜雨沙鷗閒弄夕陽天狂嫌濁酒難成醉冷笑清詩不直錢碧落故人知我否幾回相憶上漁船霜月銀牀葉暗飄霜月夜迢迢寒極犀難辟憂多酒漫消荀爐殘更換湘瑟罷仍調誰道河流淺盈盈萬里遙以上四朝詩句故宫芳草在往事暮江流渚宫亭謫去賈生身健否秋來潘岳鬢如絲寄洪湛苑楊文公談秋聲和暮角膏雨逐行軒送劉綜學士出鎮并門詩話總龜清朝納禄猶强健白首還家正太平送工部侍郎朱昻致仕歸荆南談澠水燕丁謂謂字謂之更字公言蘇州長洲人淳化三年進士累遷知制誥天禧中拜同中書門下平章事封晉公乾興中坐擅改永定陵貶崖州司户參軍更赦徙道州明道末召還卒於光州有集高齋詩話吕獻可嘗云丁謂詩有天門九重開終當掉臂入王元之讀之曰入公門猶鞠躬如也天門豈可掉臂入乎此人不忠後果如其言洪駒父詩話潘子真為予言晉公詩綠柳垂手舞黃鳥緩聲歌樂府有大垂手小垂手前緩聲後緩聲故丁謂用之其屬對律切如此代意玦帶珊瑚佩解瓊楚雲無定好傷情臨卭已誤通琴意金谷難尋辨玉聲微警單棲盤露重密含幽思畹蘭平明珠百琲將何當悵望輕軀病欲成又贈荷花一絶夢散高唐夜正遥楚天何處不無憀秋風似㑹荆王意露渚烟汀養細腰以上西崑酬唱集山居原注雷化以南山多凌零藿香芬芳襲人動或數里洞口清香徹海濵四時芬馥四時春山多綠桂憐同氣谷有幽蘭譲後塵草解忘憂憂底事花能含笑笑何人自注海南有含笑花爭如彼美欽天壤長薦芳香奉百神宋文鑑歸田錄丁晉公在珠崖有詩僅百篇號知命集其警句有云草解忘憂憂㡳事花名含笑笑何人詠泉州刺桐聞得鄉人説刺桐葉先花發始年豐我今到此憂民切只愛青青不愛紅有感今到崖州事可嗟夢中常若在京華程途何啻一萬里户口都無三百家夜聽猿啼孤樹逺曉看潮上瘴煙斜吏人不見中朝禮麋鹿時時到縣衙過武陵甘泉寺留題翠影人疎度波光瑟瑟凝帝家金掌露仙署玉壺冰曉井侵星汲宵廚向月澄豈惟蠲肺渴灌頂助三乘以上方輿勝覽以詩送宣賜進奉紅綃封龍字茶與璉禪師密緘龍焙火前春翠字紅綃熨眼新名品至高誰合得雙林樹下上乘人羅湖野錄途中盛暑南遷時作山木無陰驛路長海風吹熱透蕉裳渴思西漢金莖露困憶南朝石歩廊江上綸竿輸散誕林閒冠褐負清涼下程欲選披襟處滿眼頳桐兼佛桑事文類聚前集遊東山數峯回抱隔烟林一蔟招提十里深秪合歩行尋石徑不宜呵喝入松陰遥分畫手援毫意暗起詩人得句心梅嶺笙歌上高處孤猿幽鳥減清音煎茶開緘試雨前須汲逺山泉自遶風爐立誰聽石碾眠輕微緣入麝猛沸卻如蟬羅細烹還好鐺新味更全花隨僧箸破雲逐客甌圓痛惜藏書篋堅留待雪天睡醒思滿啜吟困憶重煎秪此消塵慮何須作酒仙公舎春日綠楊垂線草鋪茵觸處烟光舉眼新一品也須妨白髪千金莫惜買青春鶯聲圓滑堪清耳花豔鮮明欲照身獨向此時為俗吏風流知是不如人以上瀛奎律髓句梅花過嶺路桃葉渡江船送章南安珊瑚新筆架雲母舊屏風和錢易泣珠泉客通闗市種玉仙人寄版圖送章明州楚子夢雲鈴閣密郢人歌雪射堂開送陳荆南千金家累非良寶一品官高是强名為侍中時作九萬里鵬重出海一千年鶴再歸巢自崖召還寄友人以上皇朝類苑背裝花屈膝白打大亷斯進前行兩歩蹺去立多時蹴踘龜詩話總鷹鶻騰雙眼龍蛇繞四肢躡來行數歩蹺後立多時蹴踘話溫公詩鶯驚鳯輦穿花去魚畏龍顏上釣遲賞花釣魚應制田錄歸刁衎衎字元賔昇州人仕南唐為集賢校理歸宋授太常寺太祝真宗朝累遷直祕閣兵部郎中有集代意蕙時芳夕九回腸斂袂東窗待曉光秦嶺樹高迷隴塞楚天雲淡隔瀟湘病餘公幹情多詠秋晚安仁鬢足霜休道鮫人落珠淚微波還擬託陳王西崑酬唱集任隨隨仕太常丞直集賢院漢武殊庭深恨隔仙曹桂館蜚亷事轉勞銀闕尚沈滄海闊井榦空拂絳河高萯陽弋獵侵多稼朔塞旌旗照不毛苦信憑虚王母説東方三度竊蟠桃西崑酬唱集劉隲隲官工部員外郎直集賢院館中新蟬搖落何須宋玉悲齊亭遺恨苦霑衣池中菡蓞香全減井上梧桐葉乍飛風促筝聲隨斷續日移甎影自光輝宜秋門外饒芳樹結駟那堪送客歸西崑酬唱集張詠詠字復之濮州鄄城人太平興國五年進士歷樞密直學士出知益州眞宗初入為御史中丞出知杭州再知益州進禮部尚書卒諡忠定自號乖崖有乖崖集蔡寛夫詩史乖崖少喜任俠學擊劒尤樂聞神仙事性極清介居無妾媵不事服玩朝衣之外燕處惟紗㡌早縧一黃土布裘而已至今人傳其畫像皆作此飾西清詩話張乖崖少與逸人傅霖同學公既顯達求霖三十年不可得作憶霖詩云寄語巢由莫相笑此生終不羡輕肥晚年守宛丘有被褐騎驢叩門大呼曰語尚書青州傅霖閽吏走白公曰傅先生天下士汝何人敢呼姓名霖笑曰别子一世尚爾童心是豈知世間有我哉公問何昔隱今出霖曰子將去矣來報子耳公曰詠亦自知之霖曰知復何言後一月公薨館中新蟬脱塵還與比仙遊露腹何妨近品流嫩㱿半遺紅藥地細聲偏傍綠楊樓詩家取象吟難盡畫格偷眞意不休正好儒林擬緌紼憑君無苦預悲愁西崑酬唱集寄陳圖南性愚不肻林泉住强要清流擬致君今日星馳劒南去回頭慙媿華山雲青箱雜記公布衣時素善陳摶嘗因夜話謂摶曰某欲分先生華山一半住得無摶曰餘人則不可先輩則可及旦取别以宣毫十枝白雲臺墨一劑蜀箋一角贈公謂摶曰㑹得先生意取某入閙處去後尹蜀乘傳過華隂寄詩云云荅傅逸人蕭蕭疎葦對門牆見説新秋鱠味長何事輕抛來帝里至今魂夢繞寒塘以上乖崖集贈官妓小英歌天教摶百花作小英明如花住近桃花坊北靣門庭掩映如仙家美人宜稱言不得龍腦熏衣香入骨維揚輭縠如雲英亳郡輕紗似蟬翼我疑天上婺女星之精偷入筵中名小英又疑王母侍兒初失意謫向人閒為飲妓不然何得膚如紅玉初碾成眼似秋波雙臉橫舞態因風欲飛去歌聲遏雲長且清有時歌罷下香砌幾人魂魄遙相驚人㸔小英心已足我見小英心未足為我高歌送一杯我今贈汝新翻曲青箱雜記句小桃遮不得深雪放教青庭竹每思舊隱歸何許或問前程笑指空維揚書懐苕溪漁隱叢話乖崖詩句清詞古與郊㠀相先後舒雅雅字子正歙人南唐時隨計金陵韓熙載知貢舉擢為第一歸宋累遷職方員外郎咸平末出守舒州秩滿乞致仕就掌靈仙觀大中祥符二年直昭文館卒馬令南唐書雅以所學謁韓熈載熙載一見如疇昔館給之雅性巧黠應荅如流待之為忘年之交出入臥内曾無間然熙載性嬾不拘禮法常與雅易服燕戲猱雜侍婢入末念酸以為笑樂或云熙載所著格言半雅之辭持獨弦琴俾緗素雜記韓熙載弊衣履作瞽者舒雅執板挽之隨房歌鼔求丏以足日膳旦暮亦不禁其出入荅内翰學士清貴無過近侍臣多情猶憶舊交親金蓮燭下裁詩句麟角峯前寄隱淪和氣忽飄燕谷暖好風徐起謝庭春緘藏便是山家寶留與兒孫世不貧西崑酬唱集荅錢少卿蓬萊閣下舊鄰居偶别俄驚四載餘每見寒葭思倚玉忽臨秋水得雙魚人間貴賤誰能及物外優閒我自如聞説歸艎向春渚深知不與道情疎荅劉學士往歳别京畿棲山與衆違君心似松栢雁足寄珠璣學道情難篤燒丹力尚微雲中雞犬在祗候主人歸以上四朝詩錢惟濟惟濟字巖夫惟演弟歸宋歷恩州刺史加司空保静軍觀察留後卒諡宣惠有玉季集夜讌清讌夜何其南亭露欲稀蹁躚霞袖舞瀲灩羽觴飛鏤楶搖花落金璫照月輝瑶光未西落休賦醉言歸西崑酬唱集句鳯簫通碧落星石辨靈源故主第庭下焚香連㝛霧林間鳴佩起棲鸞太乙宫醮以上皇朝類苑晁迥迥字明逺澶州清豐人徙家彭門太平興國五年進士擢右正言直史館知制誥為翰林學士承㫖天禧中判西京留司御史臺以太子少保致仕加少傅卒贈太子太保諡文元有翰林集道院集屬疾和錢希聖精騖成勤瘁頤貞俟有瘳吟生南越思慈結北堂憂粲枕甘為蜨豐廚厭炙牛𤣥元知寡欲平子尚多愁夕鳥侵階啄宵螢入樹流玉書能静覽柱史倦閒投忽賦行雲什堪聽擊壤謳期君整朝佩仙署在瀛洲西崑酬唱集遊文潞公曲水園夭桃穠李豔芳辰丞相園林潩水濵虎節麟符抛不得卻將佳景付遊人風月堂詩話晁伋為予言文潞公出鎮長安吾祖文元公知許昌遊公曲水園留詩云云公得詩甚喜乃作書并封園劵與文元曰可便作園中主人也伋字仲思文元五世孫遊虎丘并序余罷掌賦東陽歸次蘇臺時故人王士龍飲餞乎閶門且曰虎丘山寺吳中勝概不避數里可能遊乎余沛然愜心請與偕往由枝派乘水輿長嘯清風目窮幽趣棹工叢力葉舟如飛拂白英以半開縈紅樹以傍出簉詣幽境夐無纖塵相與披烟蘿凌磴道杳疑天外作為佛宫俯臨劒池呀若斷岸磊砢崷崒不能形容肆凝覽以更周惜頹景之西匿一觴一詠柅興而還遂裁八章以表嘉㑹時淳化四載自序餞别閶門復少留故人邀我浣離愁旋沽美醖乘漁艇急棹斜陽到虎丘千古劒池呀怪石一方金地抱清流歸時眷戀情無限不得從容秉燭遊吳郡志送何水部蒙出牧袁州條教屬惟良乗秋始辦裝朱轓重按部白首尚為郎督課民期富從儒道益光更資談博物千載楚萍鄉袁州府志句夙駕都門曉涼風苑樹秋送劉綜學士出鎮并門壺野史玉崔遵度遵度字堅白江陵人徙淄州太平興國八年進士咸平中為左司諫直史館仁宗為壽春郡王與張士遜命為王友東宫建遷左諭徳卒官遵度善琴得其深趣嘗自著琴箋有文集屬疾和錢希聖李白羮初美相如渴漸瘳八甎非性嬾三昧減心憂筆宛多披鳯自注公新集號筆宛詞鋒勝解牛舊山疑鶴怨畏日想雲愁廣内勞揮翰通中羡枕流使星方屢䧏客轄未容投好奏倪寛議何須莊舄謳朝衣熏歇不侍史待仙洲西崑酬唱集劉秉秉官左諫議大夫樞密直學士曰琯按晁以道清風軒記作張秉戊申年七夕紅蕖爛漫碧池香羅綺三千侍漢皇阿母暫來成底事茂陵宫樹已蒼蒼香堦寶砌静無塵遙指星河再拜人若把離情今夕説世間生死最傷神珠箔風輕月似鉤還將錦繡結高樓堪傷乞巧年年事未識君王已白頭西崑酬唱集薛映映字景陽蜀人進士及第歴右諫議大夫知杭州仁宗朝官禮部尚書集賢院學士分司南京卒贈右僕射諡文恭戊申年七夕銀河耿耿露漙漙綵縷金針玉佩環天媛貪忙為靈匹幾時留巧與人間西崑酬唱集曲水亭在下天竺水臺盤一曰流杯亭臺盤疏石渠激流環四靣夏屋有餘清羽觴隨意轉賔告醉言歸主稱情未倦雖非褉飲辰豈謝蘭亭讌杭州府志句黃鵠晨霞傍樓起頭陀秋草繞碑荒送人之鄂州朝類苑皇宋詩紀事巻六
