body:
  text: 宋詩紀事巻二十三錢塘厲鶚撰范祖禹祖禹字淳父鎮之從孫嘉祐八年進士甲科哲宗朝累擢右諫議大夫遷給事中拜翰林學士出知陕州貶謫以終有范太史集資山在資陽縣治平中宰龍水作資山巖谷多神仙鸞車鳯馬隨飛煙神女蕭蕭來暮雨浮丘徃徃下雲軿龍水縣齋作縣門倚巖石終日對青峯初仕借為宰讀書過三冬忘機狎鷗鳥觀稼親老農訟庭可羅雀銅印苔蘚封月夜船行入資州憶昨臥碧山蒼蒼叢桂間白雲為屏石為枕緑蘿長挂明月閒忽乘輕舟泛江水山月隨人還在此白鷺驚飛宿靄間青山倒臥蒼波底此時孤櫂發中流川后停波聽櫂謳不學子猷中夜返欲乘明月向資州資州路東津寺山行無晨暮日暝崖谷昏哀猿落客涙永路驚旅魂憑陵髙山巔俯視大江奔迴環島嶼合縈轉洲渚屯行雲赴楚天飛鳥下蜀門地遐怪物聚寺古深殿存憶昔李氏末煙塵暗中原姦雄競草竊割據窮海根干戈百年後見此敗屋垣我來屬清秋登覽無俗喧山深虎豹歸水靜蛟鼉騫臨風獨嘯吒浩蕩欲飛翻以上范太史集李方叔送長沙猫頭筍作詩為貺穿雲斸石逺林空來涉烟波萬萬重實比梧桐能食鳯籜翻風雨便成龍一枝不許塵鞍挂千畝終留渭水封陋巷菜羮知不忝君王玉食願時供李廌師友談記孔武仲武仲字常父嘉祐八年進士元祐中歴官禮部侍郎出知洪宣二州坐黨籍奪職居池州卒鄂州緑柳隂隂蔽武昌汀洲如畫引帆檣一江見底自秋色千里無風正夕陽暫别勝游渾老大追思前事只凄凉賢豪況有遺蹤在欲買溪山作漫郎張秉叔出紫雲回鑾圖以示坐客因為賦之開元太平無兵戎真人味道希夷中人間之樂已饒足唯有青霄未追逐坐中誰似葉先生以氣為糧常辟糓朝登員嶠夕崑崙只與神游不要人忽逢邀攜看月去縹緲虛空生紫雲蟾宫竟不容乆住仙樂飄飄送回去歸来宫漏未移更甲帳明釭宛如故汾水悲歌仙不成梨園空没有遺聲紅塵如海漲朝市從此無人游玉京以上三孔清江集郭附附字明仲呉郡人嘉祐八年進士知洪州新建縣後以朝奉大夫致仕呉郡志明仲致仕後幅巾䇿杖窮山林詩酒之適十八年東南高士皆願從游楓橋師子山雲漠漠越來溪水悠悠鐘到客船未曉月和漁火俱愁咫尺横塘古塔連綿芳草長洲一老翛然自在時時來繫扁舟呉郡志周邠邠字開祖錢唐人嘉祐八年進士元豐中為溧水令仕至朝請大夫輕車都尉蘇軾倅杭多與酬倡所謂周長官者是也新月落照西山夜色浮彎彎寒挂碧雲頭寶匳新様横眉黛珠箔斜懸半額鉤丹桂一枝初淺露金波千里未圓流嬋娟三五纔成魄㪚滿清光四百州合璧事類前集訪慧山錢道人不遇登山穿破亂雲堆不見高人眼倦開門掩水聲閒白日路無車跡長蒼苔牆頭五柳空搖曵池上雙鳧自徃来卻櫂扁舟自回去過江思上子陵臺咸淳毘陵志湖中聞有美堂上歌笑聲寄蘇公堂上歌聲想遏雲主人休整碧紗帬妝殘粉落臙脂暈飲劇杯深琥珀紋簪屣定知高楚客笑談應好卻秦軍莫辭上馬玉山倒已是遲留至夜分聞蘇公獨游淨慈謁本長老以詩奉寄仍邀遊靈隱放歸騶騎獨尋山直入青蘿翠靄間謝客杖藜方自適阮公蠟屐許誰攀何愁白髮能添老須信黄金不買閒應向林泉真得趣徜徉終日未經還以上咸淳臨安志曹輔輔字子方華州人登嘉祐八年乙科官提㸃廣南西路刑獄福建轉運使朝奉郎守司勲郎中號靜常先生困學紀聞攻媿跋曹子方書以為祐陵時上書論時事靖康至樞筦愚謂有兩曹輔其一字子方與蘇黄游若論事為樞筦者字載徳龜山為銘合為一人非也次韻无咎戲贈兼呈同舍諸公少年落魄走四方看山聽水興難忘深林誰復知孤芳十載江湖稱漫郎紫溪風月幽思長緑水如鏡煙蒼蒼追隨豪雋多清狂春風爛醉胥山堂下瞰羣峯聳如槍呉儂棹歌笛靈羌攀蘿捫壁疲獲臧經旬選勝行齎糧客兒經臺倚高岡共臥明月吟胡牀投身忽落崑崙傍征西萬馬隨騰驤官軍夜半填賊隍食盡師老催歸裝將軍數竒漫鷹揚斬捕不能酬失亡曲突徙薪語莫償幕中病客非智囊扁舟夷猶憶呉鄉晁矦平日丈人行生駒今始見驌驦伯樂一盼過老商恐是禀質蒼龍房尤工呉語放降王叔敖抵掌對燭光秋英落盡金鈿黄玉甕浮春醅潑香九天廣樂來新涼笑談聊此共一觴天街六翮將翺翔正值羿彀遊中央我老委翅無復望洞庭橘熟千林霜行當拂衣解銀章買取百花洲畔莊世外日月何曾忙翛然一室生吉祥車馬還能過我牆夜具茗飲與柘漿更看君詩雲錦張同文舘倡和詩上祖擇之龍學此生飄泊任乾坤南北東西豈更論萬里欲封防墓土十年重到李膺門少驚人事時千變盡付羇愁酒一樽主上思賢厚風俗如公終未老丘園祖龍學集附題白氏莊白序字聖均自言白侍郎之後有莊在樊川浮雲萬態變朝昬疊嶂尋常翠滿門錦里先生多勝事香山居士有賢孫春風樓閣聞棊響晚雨池塘見屐㾗寄謝世間無此樂起予歸興憶江村陕西通志松江亭塵路長迷眼江亭一散襟始驚天地闊更覺水雲深㸃㸃鷖鷴影疎疎橘柚林扁舟他日興誰共此登臨呉江縣志遊劉道人巖故老能將舊事傳仙翁蹤迹向依然方知物外壺中景隱隱烟霞有洞天粤西詩載陳軒軒字元輿建陽人嘉祐八年進士元豐間知汀州元祐中為中書舍人至龍圖閣學士題志添禪師車輪馬足走塵烟競看成都萬炬然獨我踏開亭下雪伴師同坐一菴禪補續高僧傳汎青溪曉煙如練曵平津一櫂東風兩岸春島鷺沙鷗休戀我北堂歸有白頭親嚴州府志題蓬萊觀白鵝乘去人何在青鳥飛來信已遙若使何郎有仙骨也須同引鳯凰簫汀州府志寧化劉氏女生不茹葷美而慧以不嫁自誓父母許石城何氏子卜吉聚族徃送之甫越境白鵝從天下乘之飛去衆共剏祠郡以狀聞賜為蓬萊觀守陳軒題詩觀中馬黙黙字處厚單州成武人第進士調臨濮尉知項城縣治平中以薦為監察御史神宗朝累官戸部侍郎寶文閣待制告老提舉鴻慶宫卒入元祐黨籍孔平仲談苑馬黙為臺官彈奏輕薄劉貢父曰既云馬黙不合驢鳴思郭真人郭也三峯秀文章似性淳汶陽初識面謂我舊相親題詩叙游隱於今經幾春有家歸未得西望涕霑巾陶朱新録王臨臨字大觀大名成安人舉進士治平中歴户部副使以寶文閣待制知廣州府徙河中卒題司空表聖王官谷夫君乆逐夜舟移依舊巖扃鎖翠微位至文昌還避世身甘幽谷是知機清風未泯隨流水遺像空存伴落暉百有餘年同俯仰白雲猶繞故亭飛熙寧壬子六月二十日書王官谷集潘興嗣興嗣字延之慎修之孫丁謂之甥家新建以廕授將作監主簿初調徳化尉投劾去築室豫章城南自號清逸居士熙寧初召為筠州推官辭不就有文集及詩話補遺戲郭功甫休恨古人不見我猶喜江東獨有君盡怪阿戎從㓜異人疑太白是前生雲間鸞鳯人間現天上麒麟地上行詩律暮年誰可敵筆端談笑埽千兵潘子真詩話袁世弼南昌人宦游當途時功甫尚未冠也世弼愛其才薦於梅聖俞自爾有聲功父嘗謂吾大父清逸云數載汲引梅二丈力也蒿埋三尺不敢忘其賜功甫既壯頗恃其才下筆曽不經意論者或惜其造語無刻厲之功清逸云如功甫豈易得但置作者中便覺有優劣耳清逸嘗有詩戲之云云題濓溪鱗鱗負郭田漸次郊原口其中得清曠貴結林泉友一溪東南來瀲灎翠波走清響動靈粹寒光生戸牖峩峩雙劒峯隱隱插牛斗疎雲互明晦嵐翠相妍醜恍疑座中客即是闗門叟為歌紫芝曲更擊秦人缶窅然忘得喪形骸與天偶君懷康濟術休光動林藪得非仁知樂夙分已天有捉鼻固未免安能混真守日暮車馬徒橋横莫回首廬山紀事滕王閣春日晩眺重疊西屏對面開巍城穹閣信雄哉眼中孤鶩雲邊没望裏長江檻外來蛺蝶圖成春未晩柘枝筵動客多才休論今古興亡事時倒金尊醉一回秦山洞秦人當日避風煙自種桑麻老洞天緑竹横溪雞犬靜不知門外漢山川以上江西通志胡宗炎宗炎字彦聖宿子舉進士徽宗朝官至直龍圖閣知潁昌府句飛禽避軒蓋殘果落莓苔娯書堂詩話此二句歐陽公深賞之修守亳與宋史本傳宗炎為詩藻思清婉歐陽客游郡圃或誦其詩修賞味不已以為有鮑謝風致李中師中師字君錫開封尹奉别堯夫先生承見留數刻漬梅酒磨沈水飲别聊書代謝磨湯漬酒重分攜景霽風和二月時莫忘天津别君處黄梅庭下半離披擊壤集附陳大雅大雅張表臣外祖絶筆胡柳陂中過令人念戰功兵交千騎沒血渫一川紅朱氏皆豚犬唐家盡虎龍壯圖成慷慨擲劒向西風珊瑚鉤詩話外祖陳公大雅為人剛果文章似之再舉不第能詩為趙清獻所知踰八十乃死死翌日復蘇索筆題詩云云題畢乃逝味其言豈葛從周王彥章之徒歟陳知黙句平地風煙横白鳥半山雲木巻蒼藤雲埋山麓藏秋雨葉脫林梢帯晩風王直方詩話田承君云歐陽公晩年最喜陳知黙詩至云修方且欲學之陳詩不多但見兩聨張洵䝉亭倡和長句嘉祐中經畧呉公及即伏波巖之左以為亭名䝉漕使李公師中記之而鑱於巖之崖亭乆埋廢記亦湮滅紹聖改元龍圖閣胡公宗回帥桂林憲使梁公出其家藏蒙亭記以觀由是知其亭之詳胡公斥基而新之遂為殊偉之雄觀桂林山水冠衡湘䝉亭正在灕水旁清流洄洑眩波光高崖古木爭蒼蒼下有菱荷滿横塘面面風來面面香新詩一詠酒一觴爽氣渾如秋氣涼酒䦨巖下踞胡牀汲泉煮茗沈煙長從容談笑聲琅琅水光山色増輝芒東山蘭亭各一方風流兼追謝與王回頭塵事皆茫茫為計不若行樂良恨我到此情難忘遙指白雲思故鄉粤西詩載尚用之和韻江亭勝概冠三湘仁智所樂皆其旁翠岫俯映青蘿光上有喬木摩穹蒼亭下川蕸覆銀塘水面風來笑語香騷人相值喜飛觴雄辯清談五月涼飲餘相與坐方牀論文日暮興何長佳篇疾讀韻琅琅真疑星斗煥光芒格高調古説竒方況復筆法追二王事業無窮歎茫茫丹鉛㸃勘䇿非良與公致道心可忘浩歌直造無何鄉粤西詩載吕源和韻九溪灕水接瀟湘萬壑千嵓羅水旁七星高聳生輝光連天一色皆蒼蒼倚江景物似錢塘況有萬户新醅香古洞相對笑舉觴文淵遺迹徒悲涼安得石枕與藤牀夢想昔人風味長滿車薏苡勝琳琅流傳千載事微芒男兒生即志四方將軍異代猶封王感時撫事心茫茫顧我豈有籌䇿良報國志願不敢忘此身未暇歸江鄉粤西詩載李彥和韻桂江繚繞通湖湘佳山四插江之旁嵐光滴翠漾波光岸頭秀木皆青蒼誰人築室枕西塘新荷敲風柄柄香君嘗招我來攜觴登臨樂臆生清涼倐思伏波離空牀且及尊前飲興長紛劇雄辯聲何琅客傳俗事江亭芒蠻歌蜑曲笑遐方應無夢怪楚襄王但驚歲月去茫茫報國宜多為畫良功名未白何時忘此心疇敢憶家鄉粤西詩載葉宗嚮和韻我行幾許踰沅湘直抵八桂灕水旁千山倒影搖溪光秀色不借草木蒼茲亭構勝俯回塘野花風遞羅綺香嵓前伏波航羽觴一洗塵思生清涼疑有仙人白玉牀壺中景迥日月長步此仙籟音琅琅世間名利真毫芒此景不獨冠南方恨不築室輕侯王回首塵迹空渺茫瞥去未必計非良其如樽酒情難忘恍然一夢五雲鄉粤西詩載崔唐臣唐臣閩人書刺末集賢仙客問生涯買得漁舟度歲華案有黄庭尊有酒少風波處便為家避暑録話唐臣與蘇子容吕晉叔同學相好二公先登第唐臣遂罷舉乆不相聞嘉祐中二公在舘下一日忽見艤舟汴岸坐於船窗者唐臣也亟就見之邀與歸不可問其别後事曰初倒篋中有錢百千以其半買此舟徃來江湖閒意所欲徃則從之以其半居貨閒取其贏以自給粗足即已差愈於應舉覓官時也二公相顧太息而去翌日自局中還唐臣有畱刺乃攜酒具舟徃謁之則舟已不知所在矣歸視其刺末有細字小詩云云訖不復再見章友直友直字伯益得象族子嘉祐中與楊南仲篆石經於太學除將作主簿不就書史㑹要章氏煎友直之女工篆書傳其家學友直執筆自高壁直落至地如引繩而煎亦能如其父以篆筆盡棋盤筆筆匀正縱横如一和祖擇之咏震山巖彭徵君釣臺唐宜春彭構雲隱處巖因更號震山居臺上猶存舊釣磯一𣲖滄浪真隱處澄清尚可濯塵衣祖龍學集附陳烈烈字季慈候官人少以鄉薦詣闕不第與陳襄周希孟鄭穆稱海濵四先生嘉祐中以薦除國子直講元祐中詔為本州教授卒題福唐津亭溪山龍虎蟠溪水鼓角喧中有鄉夢破六月夜衾寒風雨生殘樹蛟螭喜怒瀾殷勤祝舟子移櫂過前灘皇朝類苑陳烈嘗與蔡君謨同硯席時君謨出鎮福唐束吏治民毫髮不容一日烈徃見之維舟亭下聞其嚴察不徃謁但留詩云云吏不敢隱録詩呈公自是少霽威棱題燈富家一椀燈太倉一粒粟貧家一椀燈父子相聚哭風流太守知不知唯恨笙歌無妙曲淳熙三山志元豐中劉待制瑾為守元夕不問貧富每户科燈十盞陳先生以詩題鼓門大燈籠云云瑾聞而謝之蔡準準仙遊人京之父官郎中來賢巖在大滌洞秀峯之前東坡倅杭同準等七人來遊賦詩故號來賢大滌洞沈沈天柱風嶪嶪人世悲落花巖松無易葉朝夕樵風生雲鶴閒情愜何當采玉芝仙蹤從此躡洞霄詩集彭汝礪汝礪字器資鄱陽人治平二年進士第一元豐初提㸃京西刑獄哲宗朝再選中書舍人進權吏部尚書言者謂附㑹劉摯出知江州有鄱陽集寄君時四章章四句我脂我車陟彼高岡母也吾懷匪居或忘我帆我舟汎彼大江母也吾憂食匪或遑我池有魚亦可以羮何必鮪及魴叔兮其歸哉我田有菽茍可以食何必稻與粱叔兮其歸哉送宗文先輩夫子聲名二十年塵埃嘆息欲華顛相如舊有凌雲賦靖節今無種秫田南國寂寥歸見鴈北風悲壯屢聞蟬思量世事真如幻合置窮愁頓酒邊二月已亥曉出代祀高禖塵沙騎馬聽溪流淡薄春風卻似秋坐憶洞庭波萬頃灘聲長在釣魚舟塵土冥冥二月風寥寥天外有歸鴻松隂想見芝山路隔浦溪花岸岸紅泊真州新河亭鬢毛垂雪欲􅆴􅆴道路風波老不堪繫纜短亭聊自慰青山數㸃見江南燕姬有女夭夭稱細娘真珠絡臂面塗黄南人見怪疑為瘴墨吏矜誇是佛裝張舜民使遼録婦人以黄物塗面謂之佛裝雞肋編北方士族女子冬月以括蔞塗面謂之佛裝但加傅而不洗至春暖方滌去乆不為風日所侵故潔白如玉也燕一雙掠水燕來初萬㸃飛花社雨餘辛苦成巢君勿笑從來吾亦愛吾廬湖湘道中見梅花滴葉開花妙入神酥盤憶看北堂春瀟湘此日堪腸斷隨處幽香著莫人以上鄱陽集舒亶亶字信道明州慈谿人治平二年進士試禮部第一神宗朝為御史中丞徽宗朝累除龍圖閣待制有集村居水遶陂田竹遶籬榆錢落盡槿花稀夕陽牛背無人臥帶得寒鴉兩兩歸墨莊漫録題慶安寺門前屏障遶潺湲付與林僧夜定還松蓋作雲遮十里竹龍行雨出千山白公香火蓮開後謝氏池塘草夢閒我亦鳯凰臺上客圖閒卻笑未能閒陳郁話腴和馬粹老四明雜詩百粤喧華外三江指顧中耕桑遺俗在草木故城空即鄮郭也近澤知田美俗重近澤田多魚驗海豐由來形勢地越絶控遼東箔蠶迎豆熟俗有蠶豆江雪伴梅消抵虎螯經夏里語八月蝤蛑可抵虎跳沙蛤趂潮里語有跳沙蛤酒罌雙印貴俗重雙印酒藥肆萬金饒謂馮樓也未覺西風逺三溪好采樵慈溪小溪藍溪也巷陌隨橋曲閭閻占水窮郡樓孤嶺對古謂鎮明樓市港兩潮通閘在城東隅春暖雞鳴㠗在慈谿秋寒鴨信風江湖所呼家家人富足擊壤與吾同稻飯雪翻白魚羮金鬭黄鮚埼千蚌熟在奉化花嶼一村香在慈谿海近春蒸溼湖靈夜放光廣徳湖每現光采北窗休寄傲大隱即吾鄉大隱山乃楊適先生所居四明圖經以上乾道詠蔗瑤池宴罷王母還九芝飛入三仙山空餘綘節留人間雲封露洗無時閒節旄落盡何斕斑野翁提攜出茅菅呉刀戛戛鳴雙環截斷寒水何潺潺相如賦就空上林倦遊渴病長相侵劉伶愛酒真荒淫狂來欲倒滄溟深此時一嚼輕千金壚邊何用文君琴五斗一石安足斟坐想毛髮生清隂蕭瑟甘滋欲誰讓樝棃橘柚紛殊壯冷氣相射杯盤上顧郎不見休惆悵佳境到時還不妄詩成雖媿陽春唱全勝乞與將軍杖合璧事類别集和石尉早梅霜林盡處碧溪傍小露檀心媚夕陽天下三春無正色人間一味有真香相思誰向風前寄更晩那辭雪後芳朝夕催人頭欲白故園正在水雲卿瀛奎律髓湖心寺吹落清香縹緲風樓臺彷彿水邊紅人間誰是丹青手畫取春湖細雨中崇福寺龕燈隱隱夜初分落果猿啼枕上聞客夢欲成成不得一窗殘月半牀雲題太白峯千峯下視盡兒孫仙事寥寥不可聞長作人間三月雨請看膚寸嶺頭雲以上延祐四明志句春禽得意千般語澗草無名百種香墨莊漫録游師雄師雄字景叔京兆武功人治平二年進士授儀州司户參軍趙卨帥延安辟為屬朝廷使與邊臣措置破洮州擒鬼章為陕西轉運副使除直龍圖閣攝帥熙河移知陕州卒有集賀岷州守种誼破鬼章二首王師一舉疾於雷頃刻俄聞破敵迴且喜將門還出將檻車生致鬼章來圍合洮州敵未知煙雲初㪚見旌旗忽驚漢將從天下始恨羌酋送死遲陜西通志孫升升字君孚高郵人治平二年進士元祐中歴侍御史中書舍人天章閣待制知應天府紹聖中謫汀州安置卒名入黨籍劉延世嘗從升游録其言論為孫公談圃送鄭待制閎中歸閩清曉都門祖帳開路人相與歎賢哉流塵幾翳看山眼落日休停别酒杯何待諸生留北闕自存遺直在東臺連江四老嗟誰在白首今朝只獨來孫公談圃鄭待制穆字閎中福州人與劉彝陳襄皆以徳行為世所重號四先生鄭歸閩公有詩送之穆傳元祐五年穆為祭酒以寶文閣待宋史鄭制請老給事中范祖禹言古者大夫七十而致仕有不得請則賜之几杖祭酒居師資之地正宜處老成願毌聽其去不報太學之士千餘人以狀詣宰相請留亦不從於是公卿大夫各為詩賦贈行空學出祖汴東門外都人觀者如堵歎未嘗見索劉述之新釀稍覺香熏鼻還思酒入脣盈缸止三斗可撥甕頭春孫公談圃句玉筍千官㪚珠簾一夜空宣仁后挽詞來書占喜鵲落日聽鳴蛬峽口送人若與蛟龍爭角黍應同漁父啜糟醨屈原宅睡須山鳥喚酒聽竹枝斟述懷窮搜詩句熟老練世情通長陽道中白雲每逐晨光出紅鶴長隨暮靄還袁州道中梁臺歌吹餘衰草湓浦琵琶悵晩風自南京和彭九江慈竹筍抽疑夏籜木犀花發認春香在汀州作孫公談圃公嘗學詩於孫莘老嘗曰近世作詩無復有唐人風余嘗得公詩今畧誦數聫云云在汀州避謗不作詩有一聫道盡汀州景物練毖毖延平人治平二年進士元祐初知旌徳縣雅負清操民閒凡飲酒清者輒稱練長官鳧山廟雲煙深處路縈紆元是真人舊隱居我亦放情丘壑者官閒時得命籃輿寧國府志羅適適字正之台州寧海人治平二年進士官提㸃兩浙京西刑獄有赤城集送致政太師文潞公曽將故老較量看五福如公信是難潞國封來多有歲太師以上更無官應留妙算安神器必得人才薦將壇他日宋家青史上始終臣節雪霜寒瀛奎律髓試筆金門禿筆積如山黄閣磨煤夜不乾試借薦賢書稾看應無一字及孤寒前賢小集拾遺過逺橋長憶西橋避暑時天風六月襲人肌水隨地脈來無盡雲過山頭去不知拂面稚松應偃葢當年遊子巳龎眉憑師莫動溪邊石留與東歸題好詩台州府志孔平仲平仲字毅父治平二年進士元祐中提㸃京西刑獄坐黨籍安置英州徽宗即位召為户部員外郎遷金部郎中出使陜西帥鄜延環慶奉祠卒孔平仲談苑院中有雙鵲栖於玉堂之後海棠樹每學士㑹食必徘徊翔集或鳴噪必有大詔令或宣召之事因謂之靈鵲故晁翰林詩云卻聞靈鵲心應喜并予詩云靈鵲先依玉樹栖葢謂此也泛漣水漣漪二十里清淡得我性微風不復搖天水相與淨秋容入崖柳晩色依漁艇髣髴㑹稽遊南湖似明鏡出城駐馬河之西送車皆已返郊原人漸少風物秋將晩身如獨鳥輕意與青山逺寄内試説途中景方知别後心行人日暮少風雪亂山深以上清江三孔集藥名體鄙性常山野尤甘草舍中鉤簾隂巻柏障壁坐防風客土依雲實流泉駕木通行當歸去矣已逼白頭翁此地龍舒骨池隍獸血餘木香多野橘石乳最宜魚古瓦松杉冷旱天麻麥踈題詩非杜若牋膩粉難書苕溪漁隱叢話句斜拖闕角龍千尺淡抹牆腰月半棱舘中咏雪夜話冷齋葛閎閎治平三年以職方郎中知台州顯孝南山寺在臨海縣六時香火集宗雷日上雲收紫翠開應笑守麾公暇少二年官滿一曽來台州府志常秩秩字夷甫潁州汝隂人屏居里巷以經術稱屢授以官不受神宗即位三使徃聘始詣闕拜右正言判國子監進寶文閣待制卒贈右諫議大夫句凍殺汝隂常處士也來騎馬聽朝雞石林詩話常待制秩居汝隂與王回深父皆有盛名於嘉祐治平之間屢召不至雖歐陽文忠公亦重推禮之其詩所謂笑殺潁川常處士十年騎馬聽朝雞者是也熙寧初荆公當國力致之遂起判國子監太常禮院聲譽稍減於前嘗一日大雪趨朝與百官待漏於仗舍秩已來寒甚不可忍喟然若有所恨者乃舉文忠詩以自嘲云云許安世安世襄邑人顗之世父治平四年進士第一為都官員外郎卒於黄州詠史天下有誅賞固非君所私太宗泣君集意恐勞臣疑至公一以廢智術相維持哀哉功名士汲汲尚趨時許彥周詩話張景修景修字敏叔常州人治平四年進士元祐末浮梁令兩為憲漕五領郡符大觀中遷祠部郎中詩幾千篇號張祠部集寄葉原闕自湖南憲請宫祠歸葉夢得大父也聞説年來請洞霄江湖奉使乆勤勞有神仙處閒方得用老成時退更高借宅但須新種竹尋仙想見舊栽桃浮梁居士塵埃甚鬚鬢而今也二毛石林燕語送朱天錫童子黄金滿籝富有餘一經教子金不如君家有兒不肯娯口誦七經隨巻舒渥注從來産龍駒鸑鷟乃是真鳯雛一朝過我父子俱自稱窮苦世為儒雪窗夜暎孫康書春隴晝荷兒寛鉏翻然西入天子都出門慷慨曵長裾神童之科今有無談經射策皆壯夫古來取士凡數塗但願一一令吹竽甘羅相秦理不誣世人看取掌中珠折腰未便賦歸歟待君釋褐還鄉閭中呉紀聞初景修為浮梁縣令作此詩天錫既到闕忘取本州公據為禮部所卻因擊登聞鼔繳景修詩為證神宗大稱賞之翌日以語宰相王珪而恨四方有遺材即令召對珪言不欲以一詩召人恐長浮競不若俟其秩滿然後擢用之遂止令中書籍記姓名比罷官而神宗已升遐矣景修歴事三朝每登對上必問聞卿作朱童子詩試為舉似由此詩名益著貧居茅檐月有千錢税稻飯年無一粒租生事蕭條人問我水芭蕉與石菖蒲中呉紀聞睡香花曽向廬山睡裏聞香風占斷世間春竊花莫撲枝頭蜨驚覺南窗半夢人能改齋漫録廬山瑞香花天聖中始傳張祠部以瑞為睡其詩云云游九鎻九鎻山中多隱仙洞門終古掩雲煙茶生東塢偏迎日松老西巖不記年翠箬乆藏千歲藥碧池終納半山泉蒼崖縱使秦驅得未信能移一柱天洞霄詩集更高亭在浮梁縣稚子山妻伴老翁重陽尋徧菊花叢明年把酒知何處卻憶高亭是夢中饒州府志句洗竹放教風自在傍溪看得月分明題集清軒紀聞中呉蔣槩槩字康叔江西龍泉人治平閒進士登權州北門壯士未酬志乘秋感慨多幽燕新種落秦漢舊山河塞月沈青冢邊聲起白波如何得萬騎玉壘夜經過詩話總龜徐積積字仲車楚州山陽人治平四年進士授楚州教授事母極孝政和中賜諡節孝處士有集苕溪漁隱叢話東坡云仲車古之獨行也於陵仲子不能過然其詩文則怪而放如玉川子此一反也耳聵甚畫地為字乃始通語終日面壁坐不與人接而四方事無不周知其詳雖新且密無不先知此二反也淮之水示門人馬存淮之水淮之水春風吹春風洗青於藍緑染指魚不來鷗不起瀲瀲灔灔天盡頭秪見孤帆不見舟殘陽欲落未落處盡是人閒今古愁今古愁可柰何莫使騷人聞櫂歌吾曹盡是浩歌客笑聲酒面春風和愛愛歌呉越佳人古云好破家亡國可勝道昨日閒觀愛愛歌坐中歎息無如何愛愛本是娼家女金魂玉魄沈塵土歌舞呉中第一人緑鬢雙鬟纔十五耳聞目見是何事不謂其人乃如許操心危兮勵志深半夜窗前淚如雨假饒一笑得千金何如嫁作良人婦桃李不為當路花芙蓉開向秋風渚忽然一日逢張氏便約終身不相棄山不磨兮海可枯生唯一兮死難二有如樗櫟叢中木忽然化作瀟湘竹又如黄鳥春風時遷喬林兮出幽谷文君走馬來成都弄玉吹簫從幾曲不聞馬上琵琶聲忽作山頭望夫哭去年春風還滿房昨夜明月還滿牀行人一去不復返不念闗山歧路長前年猶惜縷金衣今年不畫深臙脂今年今日萬事已鮫鮹翡翠春如泥一女二夫兮妾之所羞不求所事兮志將何求蛾眉皓齒兮妾之所憂不如無生兮庶幾無尤喓喓草蟲趯趯阜螽靡不有初鮮克有終鴛鴦于飛兮畢之羅之人間所恨兮何休時深山人跡不到處病鸞斂翼巢空枝麗情集楊愛愛錢唐娼女也垂髫喜歌舞初學胡琴數曲遂通他調七月七日泛舟西湖採荷香為金陵少年張逞所調相攜潛遁旅于京師逾年逞為父捕去愛留巷中好事者百計圖之不可得念逞之勤感疾而死貧女扇妾有一尺絹以為身上衣自織青溪蒲團團手中持朝攜麥隴去暮汲井泉歸無人不看妾不使見蛾眉釣者有人口誦浮雲曲手把瀟湘一竿竹荻花洲上作茅庵坐看江頭浪如屋以上節孝先生集章楶楶字質夫浦城人得象之姪治平四年進士甲科哲宗朝歴集賢殿修撰知渭州進端明殿學士徽宗立拜同知樞密院事授資政殿學士中太乙宫使卒諡莊簡運司園亭詩并序存三首成都轉運司園亭葢偽蜀時權臣故宅也清曠幽靜隨處皆有可樂者輒為十詩粗記領畧以備他日遺忘庶幾讀其詩足以省憶髣髴云爾西園古木鬱參天蒼苔下封路幽光無時歇醜石終朝踞水竹散清潤煙雲變晨暮何必憶山林直有山林趣玉谿堂堂因水得名方沼當其後漪瀾蕩榱桷窗户挹花柳蟲魚不避人鷗鷺若相友午枕夏簟涼此樂亦奚有小亭花邊二小亭雙跨清渠上規模雖甚隘幽僻良可賞信依佳木隂未羡大厦廣不足延賔朋攜笻常獨徃以上成都文類楊怡成都運司園亭詩和章質夫西園池臺密相望曽是故矦宅賞心知幾人喬木已百尺低花拂烏㡌古蘚駮蒼石欲問昔豪華秋風埽無迹小亭方亭惟四柱對峙花竹閒下有雪嶺水淙流日潺潺宛如雙綵舸纜向春波灣欲起江湖心而柰風濤艱以上成都文類鄒極極字適中宜黄人治平四年進士擢度支員外郎除江西提刑丁外艱服除丐祠得洪州玉隆觀自號一翁有宜川集石䂬潺湲亭宜黄縣南二十里石梁數十丈横空跨於兩崖曰石䂬危亭跨幽澗澗水日潺湲響與鼓鐘應靜無車馬喧布金因利物潄玉自澄源練引千尋逺珠輕萬斛繁倚空横石壁夾岸帶山樊漲駭天河決湍流地軸翻僧棲真夢覺客至滌塵煩不盡登臨意忘言媿有言撫州府志江公著公著字晦叔睦州建徳人治平四年進士歴提㸃湖南刑獄京西轉運使乆旱微雨作雲葉紛紛雨腳匀亂花柔草長精神雷車卻碾前山過不灑原頭陌上塵能改齋漫録江公著初任洛陽尉作乆旱微雨詩司馬文正公見之修刺謁江且為稱薦由是知名胡時中時中字伯正永州人治平中進士清明行憶昔父母康健時清明攜我上丘壠如今清明我獨來卻將小兒拜先冡凝情東風淚滿衣江山雖是昔人非兒兒問我悲何事此意他年汝自知前賢小集拾遺陳繹繹字和叔開封人舉進士神宗朝歴祕書監集賢學士知廣州貶建昌軍碧溪軒在建昌軍夀昌寺蕭疎華薄隱山村清淺浮桁帶郭門竹倚䦨干水邊寺興來題作碧溪軒輿地紀勝羅尚友尚友字明善萍鄉人治平四年進士授鄂州軍事推官句人閒酒客兼詩客天上文星與將星謁閤門使蕭注令賦袁州府志毛漸漸字正仲衢州江山人治平四年進士哲宗朝歴陜西轉運使攝涇原帥進直龍圖閣待制桃源洞洞門流水日潺湲桃塢依然枕水邊春色年年花自好遊人誰復遇嬋娟天台山志鄭俠俠字介夫福州福清人治平四年進士神宗朝調光州司法參軍入京監安上門坐上書詆王安石吕恵卿謫英州編管徽宗即位除監潭州南嶽廟卒自號一拂居士入黨籍有西塘集苞苴行苞苴來苞苴去封書裹信不得住君不見箕山之下有仁人室無杯器以手捧水不願風瓢挂高樹煙雨樓仙人居處即鼇宫更作層樓峭倚空羣岫西來煙漠漠大江南去雨濛濛花鑣柳䇿熙怡裏耘笠漁蓑笑語中别有夜楹千里月凭䦨清興與誰同以上西塘集和王荆公何處難忘酒何處難緘口熙寧政失中四方三面戰十室九家空見佞眸如水聞忠耳似聾君門深萬里焉得此言通翠屏筆談曽肇肈字子開易占子布弟牟阜嘉祐二年宰六年肇治平四年皆舉進士初調黄巖尉用薦擢崇文校書累遷國史編修官元祐初擢起居舍人徽宗即位遷翰林學士安置汀州歸潤州卒諡文昭入黨籍有曲阜集西掖集題王晉卿所藏鄭䖍著色山水圖曾訪江南鳥爪仙悞隨塵網落人間紅泉碧澗春風裏尚記麻源谷口山上王荆公墓天上龍胡斷人間鵩鳥來未應淮水竭所惜泰山頽華屋今非昔佳城閉不開白頭門下士悵望有餘哀海陵春雨知泰州時作公事無多使客稀兩時衙退吏人歸沈煙一炷春隂重畫角三聲晩照微桑雉未馴慚報政海鷗相近信忘機只將宴坐收心念嬾向人間問是非靈夀同年兄再以杞屑分恵復成小詩以代善謔埸屋十年長鈴齋一笑歡微言師水䪥交分托金蘭腹飽仙人杖心存姹女丹他時玉京路同綴侍宸官寄吕南公主人第一河南守之子無雙江夏才㑹見吹噓上雲漢可能憔悴隱蒿萊風騷寓興埀金薤翰墨傳家富玉杯傾葢相知勝白首扁舟臨别重徘徊滁州瑯琊山茶仙亭山僧獨好事為我結茅茨茶仙榜亭中頗宗樊川詩題多景樓屈曲危樓倚半空詩情無限景無窮江聲逆順潮來徃山色有無煙淡濃風月滿樓供一醉乾坤萬里豁雙瞳片雲迴逐斜陽去知落淮山第幾重以上曲阜集邇英閣侍講筵作哲宗元祐中二閣從容訪古今諸儒葵藿但傾心君臣相對疑賔主誰識昭陵用意深邇英閣前槐後竹雙槐極高而柯葉拂地狀如龍蛇或謂之鳯尾槐鳯尾扶疎槐影寒龍吟蕭瑟竹聲乾漢皇恭黙尊儒學不似公孫見不冠以上墨莊漫録句鼎湖弓劒仙遊逺渭水衣冠輦路新階除翠色迷宫草殿閣清隂老禁槐庚溪詩話元祐間東坡與曽子開同居兩省扈從車駕赴宣光殿子開有詩其畧云云語亦佳何平仲平仲合州人聞周茂叔中年有嗣以詩賀之慶門崇構已多時五百年方是此期樹長瓊枝生較晩珠根驪頷得來遲桓温貴骨天然别韋相傳經道不衰衡岳維高湘水闊共知長與福為基濓溪集附劉恕恕字道原筠州人渙子舉進士英宗朝司馬光編次資治通鑑薦為局僚官至祕書丞卒題靈山寺早晩報衙蜂擾擾友朋相和鳥闗闗餘香滿袖花驚眼空翠霑巾雨暝山西江詩話費琦呈謝通判殿丞寵示遊山之作夫君落筆盡珠璣不比相如意思違從此洛陽須紙貴夜來新有愛山詩濓溪集附宋詩紀事巻二十三
