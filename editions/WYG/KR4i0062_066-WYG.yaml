夢夜瀟湘題胡月山吟屋蘇公隄上路日日課新吟流水行花影斜陽卧柳隂斷橋春聼樂矮屋夜鳴琴皎皎山門月如君一片心呉江道上夜半扁舟出洞庭客帆初挂早潮平社風纔過海鷹至嵐霧未收江鵠鳴呉岫亂雲擎古塔楚臯寒葉擁荒城垂虹橋外連天水無限别離生杜蘅后土廟塵擁妝臺翡翠翹瓊花開盡玉魂銷崑崙山上天風落二十四橋吹洞簫江南謡柳絮飛時話别離梅花開後待郎歸梅花開後無消息更待眀年柳絮飛秋夜遊東墅雲壓髙空雁陣低江城歴厯草離離樓臺秋淡玉簫逺簾幙夜寒銅漏遲眀月鷺鷥菱葉浦西風蟋蟀豆花籬一尊酒盡銀河落猶有殘鐘出古祠閨情閒拈花片貼紗窗繡幙斜飛燕子䨇細數歸期相次近倚樓日日望春江呉山雪霽九天宫闕春風滿陸地樓臺夜月寒鐵笛一聲吹雁落片雲不到玉䦨干馬塍道上閒拖痩竹笻獨歩馬塍東鳥影青山外春愁碧樹中麥潮風化蜨櫻熟雨生蟲莫過溪頭去溪頭多落紅小樓寒空漠漠起愁雲玉笛吹殘正斷魂寂寞小樓簾半巻雁烟蛬雨又黄昏登西樓懐湯損之楊柳飄飄春思長綠楊流水遶宫牆碧雲望斷空回首一半䦨干無夕陽以上西麓詩稾句石屋雨來春樹暗海門潮起暮雲髙方虚谷桐江集云予淳祐中偶至靈隱冷泉時京尹盡去楣間詩板僅存者二其一云云此四眀陳允平詩盖許渾體也鄭霖霖字景説天台人淳祐中知平江府淳祐已酉月正人日春雨堂宴三學同舍即事十年隨牒訪三髙不覺星星上鬢毛尚憶齏鹽形夜夢聊因椒柏薦春醪文眀再㑹知何日臭味相投屬我曺總是虞庠舊培植致君當不媿夔臯吴郡志附王學可學可字亞夫襄陽人參知政事之望孫淳祐間臨安府倅洞霄宫天柱峯髙萬壑分故畱九鎖限塵氛泉飛窗牖長為雨日上岡巒半是雲洞擘隂崖通逺岫石生暗暈作竒紋聖朝每為民祈福絶笑求仙漢代君洞霄詩集石橋天巧何年路千峯亂入雲瀑飛䨇澗合崖斷一橋分樹色春猶凍猨聲夜或聞靈蹤如可見煮茗共爐熏天台山志題蘇端眀書乳泉賦後蘇公早聞道文章乃其戲乳泉出重海作賦聊記異玉池嚥中夜挈瓶非小智氣者水之生此語可深味式古堂書考李彭老彭老字商隱號篔房淳祐中沿江制置司屬官元夕斜陽盡處蕩輕烟輦路東風入管弦五夜好春隨歩暖一年眀月打頭圓香塵掠粉翻羅帶蜜炬籠綃鬬玉鈿人影漸稀花露冷踏歌聲徹曉雲邉武林舊事弔賈秋壑故居瑤房錦榭曲相通能㡬番春事已空惆悵舊時吹笛處壞窗風雨剥青紅齊東野語景定三年正月詔以魏國公賈似道有再造功命有司建第宅家廟賈固辭遂以集芳園及緡錢百萬賜之園故思陵舊物古木夀藤多南渡以前所植者積翠四抱仰不見日架廊疉磴幽渺逶迤極其營度之巧猶以為未也則隧地通道抗以石梁傍透湖濵架百餘楹飛樓層臺涼亭燠館華卉精妙前揖孤山後據葛嶺兩山暎帶一水横陳各隨地勢以構架焉堂榭之有名曰蟠翠古松雪香古梅翠巖竒石倚繡雜花挹露海棠玉蘂瓊花茶䕷清勝假山巳上集芳舊物髙宗扁西湖一曲竒勛理宗御書秋壑遂初客堂度宗御書初陽精舍山之坳曰無邉風月見天地心水之濵曰琳琅歩歸舟旱船通名之曰後樂園又以為未足則于第之左數百歩瞰湖作别墅曰光漾閣春雨觀養樂堂嘉生堂千頭木奴生意瀟然生物之府通名之曰養樂園又于西陵之外樹竹千挺架樓臨之曰秋水觀第一春梅塢剡船亭則通謂之水竹院落焉近世以詩弔之者甚衆李彭老一絶云云程洙洙珌族弟淳祐十年進士景定初為上元簿徳祐乙亥建康守將以城降元洙不屈死有南窗稾秋晚懐友長亭一樽酒猶記别時斟碧草思前夢黄花見此心闗河秋北望天地日西沈遙想山中桂何人月下吟新安文獻志曾淵子淵子字廣㣲南豐人宰六世孫鈺之子淳祐十年進士累官右正言監察御史權戸部尚書浙西制置使拜同知樞密院事罷知雷州端宗在碙州自雷来覲拜參知政事廣西宣諭使元兵至走安南卒九日登翰苑臺在筠州新昌縣翰苑臺邊拂舊題嵗華荏苒壯心違看萸喜得親猶健對菊猶慚令未歸秋水一江鷗共痩雲山千里雁初飛宦情有暇無風雨把酒相酬此㑹稀瑞州府志客安南見進奉使回口占安南莫道是天涯嵗嵗人從薊北回江北江南親故滿三年不寄一書来四朝詩陳必復必復字旡咎閩人淳祐十年進士有山居存稾山居接砌斜通徑縁籬矮結牆地卑蝸篆屋山暖蜜分房過雨林亭静落花春晝長幽居差省事猶有課詩忙客枕客枕偏饒睡春歸尚擁綿屋深燈易暈漏短夢難圓棲鳥警涼夜鬧蛙喧雨天一聲柔㯭過何處上溪船贈張駉自號牧隱乍見語相合苦吟心更親老于琴得趣隱與牧為鄰一夜巖花雨十年江樹春所交半湖海恨晚識斯人宿龍山精舍偶貪禪宇静襆被到深林夜榻僧同話寒簷客自吟窗眀疑積雪樹黑怪常隂猶恨悤悤出丁寧約重尋舟中效東坡用韻底事京塵踏輭紅又隨征棹過呉淞人家半在桑柘住春水忽迷蘆葦叢赤蟹白魚今稍稍紅櫻紫筍已悤悤船窗盡日看山色多少好山供眼中以上山居存藁蕭立之立之字斯立寧都人淳祐庚戌進士知南城縣厯南昌推官辰州判遭世亂歸隱蕭田有集仲子士贇為李白詩分類補注行于世桃源桃源花發㡬番春聞説漁郎此問津秦帝漫勞方士遣神仙已是避秦人全芳備祖杜鵑思歸言語苦悲辛啼老江南緑樹春莫倚巴西君故土巴西風景近愁人秋日野店聊為一枕謀五更歸夢入鄉愁溪流清淺春鉏曉籬落荒涼絡緯秋以上梅磵詩話落梅玉龍戰退鹿胎乾好在晴沙野水看舞翠夢回仙袂逺射鵰人去露崖寒連環骨冷香猶暖如意㾗輕補未完誰在髙樓吹笛處輕衫當戸獨凭䦨小窻清記陳杰杰字夀夫分寧人淳祐十年進士制置司屬官有自堂存藳題梅壇毛慶甫雲悅樓白衣蒼狗無猜物翻手悲歡變古今輸與道人長快活看渠起滅不闗心梅仙事實王時彦時彦蜀人題梅壇毛慶甫雲悦樓一生活計一身閒日與白雲相往還五百年間知此味華山去後到梅山梅仙事實朱渙渙字行父號約山大理寺丞守衡州題梅壇毛慶甫雲悦樓和衣髙卧白雲堆門倩雲封不妄開留向山中自娱悦莫教一片出山来梅仙事實姚勉勉字述之髙安人寳祐癸丑廷對第一除校書郎兼太子舍人有雪坡集余評事惠龍團獸炭香瓔鳧實且許以百丈山楮衾而未至青禽銜雲落蓬壺風簷快讀光眉鬚百朋珍貺羅庭隅一一皆可當清娱建溪龍焙香雲腴香瓔巧製來東吴鬅鬙獸炭竒形模辟邪天禄獅熊貙王家舄種君家鳧晴沙暖抱眀月珠雅意下照仙人癯矮窗醉兀詩情孤蒲團松拂燒紅爐蝸廬積凍春潜驅侍兒金珞香玉膚月鐺煮雪煎春酥窗前笑玩嬌黄雛能言直可貢上都其波及晉皆君餘獨欠一幅横雲鋪王孫醉擁紅􅉊毺楮生長揖非吾徒藤牀紙帳恰此須能供梅花清夢無新晴曉歩晴曉芳蹊潤幽情得自怡霧黏行草蜨風舞罥花絲竹静聞鄰話林虚度客棊意行無伴侶池上只鶯知放生池納凉晚歸湖面輕烟起前山漸不分鐘聲連寺荅人語隔船聞吟客衣生月歸僧笠帶雲及城門未掩燈火已紛紛題西湖竹閣寺二首入門纔見萬琅玕便覺玲瓏日影寒峯勢近環簷外立湖光更好竹中看烟霞古淡僧容痩風露清髙鶴夢殘已占兩亭涼坐足再須登閣倚䦨干千古清風白樂天昔時曽此飽談禪自從西閣無吟迹唯有東坡嗣舊傳来往祗應湖上寺聼聞誤説海中仙我來再拜祠堂下笑摘巖花薦井泉以上雪坡集時少章少章字天彛金華人寳祐癸丑進士官史館檢閱冬狩行北庭十月百獸肥夜植虎落朝打圍倒榛伏棘一千里疊鼔欲渡繩林西西風吹塵黯如霧賀蘭花驄踏風去老麞鈹交作兒啼横飛一矢貫兩麛將軍十指撮矢笑四合周阹皆絶叫牛酒過山酺爾曺今年㧞城如㧞毛金華詩粹孫炳炎炳炎字起晦餘姚人寶祐癸丑進士權吏部郎出知饒州除軍器監題元實弟姚山别業别業倚嶙峋幽居寓目新閒花繁覆砌静燕語通人野翠生窗晩林香入戸春願因張老祝持以奉芳辰四眀山志林泳泳字太淵號弓寮希逸長子寳祐元年進士出宰安溪有集岳武穆王墓天意只如此將軍足可傷忠無身報主寃有骨封王苔雨樓牆暗花風廟路香沈思百年事揮淚灑斜陽武林舊事郭燻燻東陽人挽内子山嵬嵬兮日西望吾佀兮不歸惆悵兮階前物換兮人非春去兮花殘春歸兮芳菲老不可以再壯君胡為而先馳石洞遺芳集章雪崖雪崖平江人問道于朱子偶作掩闗作夏計長日獨清坐戎葵競自花安榴粲成朶時芳詎容歇幽賞無不可㣲風忽吹來諒亦深知我車若水腳氣集宋詩紀事巻六十六
