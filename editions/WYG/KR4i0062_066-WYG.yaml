body:
  text: 宋詩紀事巻六十六錢塘厲鶚撰徐儼夫儼夫字公望平陽人淳祐元年進士第一官至禮部侍郎直鉤和韻一曲湖邉一釣磯桃花風定柳綿飛漁人豈識濠梁趣秪解沙頭盡醉歸東甌詩集王應麟應麟字伯厚其先汴人後居鄞淳祐元年進士寳祐四年中博學宏詞科度宗時官禮部尚書兼給事中入元始卒有深寧集唐開成年墓誌石元至元二十七年城中握蘭橋㫄民家築室穿土得誌石一片其文乃唐開成四年太原王夫人之墓誌謂其曾祖王元涪在元宗時拜諫議大夫左庶子慕巢由之志辭疾不就前宋尚書王應麟為詩以紀其事鴻濛肇開闢變嬗㡬成毁寥寥斷竹歌瓦堲剏姚姒周墳典以族詎認青烏子公琴記咎繇邢山稱重里葛淯失之矯璠璵過于侈焉知宫夾墓莫識龜言水銅槃字十六銘自比干始延陵有孔子烏虖半辭止漢甎猶簡樸石章侈華靡無媿惟有道媚俗多虛美七松談士良何以懲不軌載筆鮮南董襲浮謬臧否豈悟冢中人三百年不死婦名弗出閫古未有碑誄諡見春秋初誌起典午氏簪蒿隱士妻芳刻垂千祀楊髙託不朽習之文中理或犯葵丘禁息國事何恥蛾眉為黄土磨滅更誰紀宰如比何人雒邑之士女逸民儒仲裔氷雪濯紈綺采儷古鄞州儉勤終暮齒口問㡬何年頗與銅人似雖微黄絹辭亦質而不俚丘夷池又平蓬顆今廛市聚廬寒劫灰餘光輝泥滓或行松柏下勢榮朝菌爾隆碣牛礪角翁仲卧荆杞蘭艾均一塵玉珉同一燬孤竹夢茫然柳下壟孰是片石幸有傳詩以貽彤史王尚書遺藳澤民廟唐大歴間眀州刺史呉謙築九里堰民徳而祀之城西有祠臨水涘翠松列植路如砥問之耆老此為誰唐大歴中呉刺史刺史為民開陂湖故蹟猶傳堰九里年年簫鼔報豐穰決渠為雨潤澤羙遺愛有橋名懐恩姓名不載太史氏昔漢呉公治第一列傳寂寂名無紀刺史豈其苖裔歟眀州政亦河南比堂上大書荆公詩蘭菊春秋百世祀地誌祗稱王長官有功于民盖一揆吾聞是邦多賢守裴王碑字顔與李惟侯盛徳著人心彼石可焚祠弗圯廣徳湖為鴻隙陂召棠欒社誰敢毁秔稌充羡侯之賜廟食長存如此水延祐四明志錢端琮端琮淳安人淳祐元年進士暮春園林深處緑成堆更著松隂一徑苔煙欲過牆風約轉水將争港石衝回斷雲收雨鳩呼婦嫩麥盈隄雉應媒獨有殘紅春不管等閒飛入酒巵來四朝詩馮去非去非字可遷號深居南康都昌人椅子淳祐元年進士幹辦淮東轉運司寳祐四年召為宗學諭江上清秋不可柰先自嬾登樓一雁叫寒水數峯生逺愁乾坤消劔氣江海笑詩流不解人間事眠鷗儘自由所思雁自飛飛水自流西風不寄小銀鉤斜陽何處横孤簟十二闌干一樣愁以上詩家鼎臠金陵鳯凰臺許大乾坤裏那無一鳯鳴臺攲紅日晚梧拂翠雲生瑣瑣六朝夢悠悠千古情寒潮如有恨時打石頭城景定建康志偶成春風吹送笑談香玉漏銀燈破夜涼歸去東華聽宫漏杏花落盡六更長愚見紀忘云宋時内樓五更絶梆鼔交作謂之蝦蟇更禁門方開百官隨入所謂六更也馮去非詩云云句茶疎縁睡少全芳備祖曾谹谹字宏父題鳯山書院暮春浴罷振春衣正是流觴修禊時世事藏機應落落人情忘我總熙熙醉能辭醉原非醉詩到無詩乃是詩偉矣蘭亭衆君子不將文字立藩籬禊帖綜聞宏父跋云宏父剏鳯山書院于廬陵去郡城逺不二三里深得林泉之勝雖夏旱冬涸滂流自如稍東即泉所發源地鑿石引水以為池號流杯池置亭其上友人維揚倅朱行父間拉十數親友緬蹈前躅因刋禊圗并考訂所以親為小詩贅於後時淳祐改元嵗次辛丑斗柄揷亥上澣甲子日也董史史字良史號閑中老叟有皇宋書録三巻淳祐壬寅自序題米元章書蹟拓本書家寳晉殆猶龍妙用通神五指中墨海波瀾無定勢元雲夭矯欲隨空格髙韻勝存人品腳闊頭空笑俗工建紹聖人精鑒賞奪真移在玉屏風皇宋書録髙宋裒集米芾墨跡為十巻元章劇跡咸萃焉史家藏拓本嘗妄贊其後俞文豹文豹字文蔚括蒼人著吹劔録淳祐三年自序徐進齋得古銅香爐具象鼻眼博古圗謂之象鬲屬余賦之雖不足言詩聊記曾見在象數前鍾鼻眼出囂塵外鑄形模傳香到手親曾見全勝人看博古圗願得身遊海外天蓬萊頂上覓沈箋為君喚起槐安夢細讀南華内外篇自注泉州守王庭珪香譜云箋次于沈出占城國吹釼録王平子平子呉郡人尤工小詞題雪獵圗烽火一息三千年漢家将軍畫凌煙胡兒不識征戰事龍沙萬頃今桑田麗譙聲裏梅花月雲暗雪深風色惡長嘶一騎驄蟬聨狼㡌氊裘寒矍鑠韝鷹走犬登平岡狂狐剔眼夢飛揚貫鵰落雁真戱劇高鳥畧盡良弓藏鳯鳴居士眼雙碧少年讀書勇無敵但知横行翰墨場豈料一禽終不獲向來百非今已無筆端有口聊自娯故将胷中磊落事寫作人間雪獵圗吹劔録盧鉞鉞字威仲永福人淳祐四年進士官太學博士咸淳中以顯謨閣學士知隆興府官至侍郎吴興舟中笠澤髙風寒凛凜苕溪凝雪白皚皚扁舟我獨乗歸興自是不因安道來後村干家詩和太師平章魏國賈公大雪遺潛侍郎之作底用封書禱梵林瑞霙先臘感由心豫知農畝宜禾稼復喜邊儲足輦任民樂齊宫誇往昔㨗歌周戍屬斯今燮調妙造推元老治象陽眀無伏隂咸徳臨安志陳合合字維善長樂人淳祐四年進士官知樞密院終資政殿學士諡文惠題陳經國龜峯詞後西晉風流自一家憶君魂夢到梅花梅花深處無人跡眀月一枝霜外斜龜峯詞有所齋諸兄為之跋安用復著贊語漫書癸卯冬所作懐舊一絶繫于後陳合維善龜峯詞汪立信立信字誠甫號紫源先世新安人自浮梁徙六安淳祐七年進士歴官端眀殿學士江淮招討使元兵至建康扼吭死之贈少傅金陵懐古勝地尚存龍虎氣荒臺已失鳯凰蹤六朝文物山川古霸氣終歸指顧中新安文獻志葉隆禮隆禮號漁林嘉興人淳祐七年進士官建康府西㕔通判改國子監簿烟雨樓和朱南杰韻傍家亭館占湖東寂寞為鄰祗陸公竹樹一隄如有礙乾坤萬象自無窮櫂歌逺入秋波緑塔影中分晚照紅尊酒待遊烟雨候畫圗著我笠蓑翁至元嘉禾志馬廷鸞廷鸞字翔仲號碧梧饒州樂平人淳祐七年進士度宗朝厯官參知政事兼同知樞密院事拜右丞相以觀文殿大學士提舉洞霄宫瀛國公即位召不至自罷相歸又十七年卒贈程楚翁汗竹丹鉛側空花粉黛中尚懐丞相亮肎署大夫雄有客來今雨誇予邁古風幽情傾不竭𣺌𣺌碧雲東新安文獻志程瑞瑞字希鳯號梧岡饒州人幼與同郡馬廷鸞相友隱居自娯馬登政府未嘗以仕進干之詠梅清淺溪橋水髙低籬外枝這些風骨異瘦盡古今詩中洲野録陳鑒之鑒之字剛父閩縣人淳祐七年進士有東齋小集過呉江垂虹四年别淼淼来夢境今晨整芒屨柳風吹鬢影春光徹重淵蛟困緑波靜逺帆有無處小立為徐領浩歌翁自得白髮亂垂頸一室世誰知三萬六千頃平生卜鄰意此際味差永翁肎平分歟吾其辦漁艇晚登京口倅廳富覽窮途逢偉觀小閣江萬里薄暮岸幅巾寒烟四山起天河注平淮斗柄卧蘆葦欲返還少畱燈青客船尾京口江閣和友人韻良辰仍我􅒰斗酒大江邊小閣納萬里一帆來九天世塵黄鵠外詩興白鷗前地勝吾衰矣長懐李謫仙題鄭承事所作蕙蘭蘭如君子蕙如士此評吾得之涪翁有餘不足姑勿論畢竟清幽氣類同有感霖雨何人記子桑朱門車馬漲塵黄百年友誼須英槩畫虎何妨效季良同劉叔泰放歩湖邉入靈芝寺坐依光良乆叔泰誦坡仙好把西湖比西子之句予因賦古風一首劉郎喚我出勝處意所便清寒柳桃風濃淡杉檜烟僧廬自生香歩遶古佛前依光偶不扃坐數禽聨翩平林度清磬遥隄蔟歸船湖山露真態鷗點溶溶天形容㡬吟筆剛道妝抹妍莫作西子看正如姑射仙相知喜值予微笑生清漣探梅驢蹇飇寒獵帽帬吟肩山聳酒微醺彎彎竹徑霏霏雪小小溪橋淡淡雲忽邂逅時真得侣向空濛處細飄芬回天力量知誰似笑挽春来首策勲與客夜飲蠟燭有花客請賦之圓蒲促坐話情真蠟炬能花似有神畢竟蜂鬚膏馥在酒邉依舊十分春同潘孔時飲總宜園孔時出寳晉數帖呼道人吹簫次日有詩予用韻答之六橋秋新宜醉吟舉杯共聽巖鶴音危亭三面立老竹寳晉數帖清人心涼蟬不敢喧夕曛洞簫聲遶山腰雲搖揺歸艇水紋裂山紫天青河漢白想君獨立對空闊一鷺毛寒藕花月題村學圃田父龍鍾雪色髯送兒来學尚腰䥥先生莫厭村醪薄醴酒雖釀有楚鉗以上東齋小集湯漢漢字伯紀安仁人江東提刑趙汝謄薦于朝免解差充象山書院堂長赴禮部别院試正奏名授上饒簿淳祐中差充史館校勘度宗朝仕至刑部侍郎權工部尚書提舉玉隆宫以端眀殿學士致仕卒諡文清有集寄劉後村唐朝空自貴宏詞科目何嘗得退之掌制徒聞誇子厚殘篇僅見命敦詩堪嗟實録無完傳太息淮西有後碑寄語莆田紫薇老文章蓋世例如斯後村詩話自儆六言春秋責備賢者造物計校好人一點莫留餘滓十分成就全身困學紀聞黄㽦㽦字子耕分寧人山谷諸孫從朱文公學登淳祐進士累遷軍器監丞匄外知台州終袁州守有齋漫稾葉水心墓誌云子耕詩詞如徑幽薄超髙丘宇宙寄曠風露綽約人謂非子耕所能魯直遺墨散落收拾未盡爾題桃源台州郡圃本自深村老圃来偶分符竹到天台漫山幸可容桃李莫待劉郎去後栽赤城志常楙楙字長孺海鹽人淳祐中進士度宗朝累官浙東安撫使徳祐初拜㕘知政事宋亡里居卒題平江集仙宫松菊新来入夢頻公餘乗興得尋真紅塵物外常清境白日壺中不老春柏子灰寒烟寂寂桃花風煗水粼粼逍遥羽士閒如許媿我浮名役此身海鹽縣圗經劉克莊克莊字潛夫號後村莆田人以䕃仕淳祐中賜同進士出身官龍圗閣直學士卒諡文定有後村集題孺子亭孺子亭前揷酒旗遊人那解薦江蘺白鷗欲下還飛起曽見當年解榻時題忠勇廟士各全軀命惟侯視死輕張廵鬚盡怒先軫面如生短刃猶梟宼空弮尚背城新祠簫鼔盛人敬此神眀隨隱漫録紹定庚寅春汀寇入譙趙守竄殿司禆将胡斌領弱卒二百巷戰矢盡刀折易雙鐵鞭所殺尤衆死焉坐執雙鞭屢日不僵民頼其力多獲竄免守臣王埜聞于朝贈武節大夫贈廟額忠勇秋風黄葉蕭蕭忽滿街獨騎瘦馬豫章臺莫将宋玉心中事吹上潘郎鬢畔来周漢國公主挽詞孝謹親顔悦温恭婦徳修鵲橋方紀節鸞扇忽驚秋魯筆王姬卒湘弦帝子愁願言寛聖抱况返蘂宫遊賜館恩通内妃塋詔卜鄰来應自仙佛去尚戀君親望送龍綃溼封崇鶴表新不能秉彤管羞媿作詞臣庶齋老學叢談理宗聖學髙眀尤工于文周漢國公主薨誌銘詔楊平齋撰挽詩以劉後村為第一落梅一片能教一斷腸可堪平砌更堆牆飄如遷客来過嶺墜似騷人去赴湘亂點莓苔多莫數偶黏衣袖乆猶香東風謬掌花權柄卻忌孤髙不主張病後訪梅夢得因桃數左遷長源為柳忤當權幸然不識桃兼柳也被梅花累十年以上後村集瀛奎律髓寳慶初史彌逺廢立之際錢唐書肆陳起宗之能詩凡江湖詩人皆與之善宗之刋江湖集以售劉潛夫南岳稾與焉宗之詩有云秋雨梧桐皇子府春風楊柳相公橋哀濟邸而誚彌逺本改劉屏山句也或嫁為敖􅋯菴器之所作言者併潛夫梅詩論列劈江湖集板二人皆坐罪初彌逺議下大理逮治鄭丞相清之在瑣闈白彌逺中輟而宗之坐流配于是詔禁士大夫作詩如孫花翁季蕃之徒改業為長短句紹定癸已彌逺死詩禁始開潛夫為病後訪梅絶句云云此可備梅花大公案也齊人少翁招魂歌夜月抱秋衾支枕玉鸞小豔骨泣紅蕪茂陵三十老卧聞秦王女兒吹鳯簫淚入星河