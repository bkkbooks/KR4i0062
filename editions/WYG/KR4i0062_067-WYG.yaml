body:
  text: 宋詩紀事巻六十七錢塘厲鶚撰危昭徳昭徳字子恭邵武軍人寳祐元年進士厯官起居舍人殿中侍御史權工部侍郎兼同修國史實録院致仕有春山集春晚晴天楊柳絲千緒淡月梨花玉一庭又是東風去時莭數聲啼鳥不堪聼後村千家詩王翔龍翔龍四眀人寳祐元年進士遊澤山在慈谿獨俯空堂夜無人境自寛高風河影動斜月竹身寒湖海秋聲闊山林客夢安坐来更㡬點北斗已䦨干延祐四眀志樂雷發雷發字聲逺舂陵人寳祐元年特科第一有雪磯叢稾寄姚雪篷使君時姚貶衡州湘鱗六六寄相思疎柳新蟬想别時今夜各聽三楚雁秋風又老一年詩梅花且補離騷闕薏苡應為史筆知翦竹疑峯新製笛待衝霜月訪桓伊寄許介之惹得詩名徧九州酒徒棊伴半公侯離騷甘隱魚鱗屋樂府多傳鳷鵲樓醉葉㡬窠藏菊徑蠹荷三畆䕶漁舟中原應有樓蘭國空鎻呉鉤到白頭送丁少卿自桂帥移鎮西蜀瓊海収兵玉帳閒又移齋艦泝涪灣三邉形勢全憑蜀四路封疆半是山魏將舊聞侵劔閣漢兵今欲巻函闗時㑹有三京之役細傾瑞露論西事想在元戎指顧間舜祠送桂林友人堯山分手舜山逢呼酒旗亭兩鬢蓬客思且須論契闊詩交應不計窮通兒曺富貴秋烟外前輩風流落葉中眀日吟船又何處渡江衣冷荻花風讀繫年録紹興八年以後事婁敬金繒滿去輈便看雷雨潤遐陬諸賢自抗排雲議宰相方深偃月謀湘國乍聞悲鵩鳥秣陵還聽唱符鳩九原晏老今知否搔首青編恨未休秋日村路兒童籬落帶斜陽豆莢薑芽社内香一路稻花誰是主紅蜻蜓伴緑螳螂題昭州田廷亮書稾後少海無波鶴禁虚滿朝閉口養曺蜍白袍烏帽和寧外卻有山人請建儲以上雪磯叢稾游紫霞洞歌猗歟竒哉紫霞之洞真天開千變萬化不可述怳如幻出方壺與蓬莱湘妃兩姝不敢到悵望蒼梧雲縹緲邇来三千三百年班龍空卧金花草我採姹女江華濵是為三十六帝之外臣右提緑玉杖左攜紫金經長歌天上謡一呼開仙扃列炬照深窈懸身事幽討羣仙喜我来驚笑欲絶倒何侯撫我項偉遠拍我肩緑華贈我金條脱安期分我虹景丹借問此何地指言太虛天翠霞紫雲張寳幄懸黎結緑盤瓔珞萬疊蒼苔荒石田誰呼青龍耕紫烟虎獄銅牆未徧識擬開寳藏紅雲笈嗟我水際披蓑翁應是籛鏗釣神龍仙人仙人何多事驚眩世俗變靈異或跣巨足垂天雲或叩短趾畱沙潯或見姑射處子身粉霞紅綬藕絲帬或見普陀大士形或簪楊柳垂寳瓔或插鏤象管或結火齊珍或琢縣圃玉或布祇園金洞中之深不知㡬百里但見縈紆曲折一里一澗水人言有路通桂林乗興欲尋日華君吾聞洞中大小洞天三十六帝遣列真分治局上界官司應更多定知此地應誰屬猗歟奇哉紫霞之洞真天開我上㑹稽探禹穴復浮滄海登天台巖谷豈無竒視此何塵埃摩挲崖石題惡句記我杖屨敲雲来黄涪翁元漫叟目力一生空宇宙澹巖陽華有何奇枉費詩篇刻石竇九嶷山志嚴椿齡乙夘禱雨梅壇大隱清名格帝閽眞人新寵粲王言南昌補吏官雖小北極通班道更尊諫疏不容強漢室仙風聊復傲呉門我来物色朝元處山遶星壇水遶村梅仙事實王洧洧號仙麓閩人曾為浙帥參西湖十景蘇隄春曉孤山夜月趁疎鐘畫舫參差柳岸風鶯夢乍醒人未起金鴉飛上五雲東段橋殘雪望湖亭外半青山跨水修梁影亦寒待伴㾗邉分草色鶴驚凍玉啄䦨干雷峯夕照塔影初収日色昏隔墻人語近甘園南山遊徧分歸路半入殘塘半暗門麴院風荷避暑人歸自冷泉歩頭雲錦晚凉天愛渠香陣随人遠行過高橋方買船平湖秋萬頃寒光一席鋪冰輪行處片雲無鷲峯遥度西風冷桂子紛紛㸃玉壺栁浪聞鶯如簧巧囀最高枝苑樹青搖萬縷絲玉輦不來春又老聲聲訴與落花知花港觀魚斷汊惟餘舊姓傳倚䦨投餌説當年沙鷗曽見人興廢近日遊人又玉泉南屏晩鐘涑水崖碑半緑苔春遊誰向此山来晚烟深處蒲牢響僧自城中應供回三潭印月塔邉分占宿湖船寳鑑開匳水接天横玉叫雲何處起潭心驚覺老龍眠兩峯插雲浮屠對峙絶攀躋積翠浮空霽靄迷試向鳯凰山上望南峯天近北峯低以上咸淳臨安志寳祐丙辰余奉漕檄經從得識九鎻山面目咸淳乙丑嵗除前五日以帥檄遵奉朝㫖四縣疎決回塗重游時積雪初霽瓊瑤境界恍非人世得七言一章録呈菊巖龔先生九鎖山寒玉作圍紅塵世事可曾知峯廻似覺前無路身到因思舊有詩雲掩巖扉龍蟄冷月眀華表鶴歸遲梅花笑我真迂闊踏雪重游臘盡時洞霄詩集文天祥天祥字宋瑞一字履善吉安人寳祐四年進士第一度宗朝累遷直學士院知贑州徳祐初除右丞相兼樞密使元兵至奉使軍前被拘亡入真州泛海至温州益王立拜右丞相以都督出江西兵敗被執囚於燕京四年不屈死柴市有指南吟嘯等集敬和道山堂慶瞻御書韻墨灑天奎映籒紅斯堂殿閣與俱隆方壺圓嶠神仙宅温洛榮河造化工列聖文章千載重諸孫聲氣一時同著庭更有邦人筆稽首承休學二忠著作之庭乃胡忠簡公書周文忠公立游青原鐘魚閒日月竹樹老風烟一徑溪聲滿四山天影圓無言都是趣有想便成縁夢破啼猨雨開元六百年空庭横螮蝀斷碣偃龍蛇活火參禪筍真泉透佛茶晚鐘何處雨春水滿城花夜影燈前客江西七祖家以上文山集南華山北行近千里迴復迷西東行行望南華忽忽如夢中佛化知幾塵患乃與吾同有形終歸滅不滅惟真空笑看曺溪水門前坐春風金陵驛草舍離宫轉夕暉孤雲飄泊復何依山河風景元無異城郭人民半已非滿地蘆花和我老舊家燕子傍誰飛從今别卻江南日化作啼鵑帶血歸以上指南録遇異人指示作五言八句誰知真患難悟此大光眀雲散天仍在風休水自清功名㡬滅性忠孝太勞生此意如能㑹神仙亦可成上元懐舊禁門三五金吾夜回首青春忽二毛池上昔陪王母宴斗中今直貴人牢風生江海龍游逺月滿闗山鶴唳高夢到鈞天燈火鬧依然彩筆照宫袍以上吟嘯集理宗度宗在燕京獄中先帝弓劒逺永懐侍芳茵今朝漢社稷為話涕霑巾誤國權臣似道䘮邦之政不一而足其羈北使開邉釁則兵連禍結之始也哀哉蒼生倚大臣北風破南極開邉一何多至死難塞責京城當宁陷玉座兩宫棄紫㣲北城悲笳發失涕萬人揮陵寢五陵花滿眼霜露在草根冥冥子規叫重是古帝魂以上文山集杜邳州哭母小祥九月七日我有母聖善鸞飛星一周去年哭海上今年哭邳州遙想仲季間木主布筵几我躬已不閱祀事付支子使我早淪落如此終天何及今畢親喪于分亦已多母嘗教我忠我不違母志及泉㑹相見鬼神共懽喜過淮北征垂半年依依只南土今辰渡淮河始覺非故宇故鄉已無家三年一羇旅龍朔在何方乃我妻子所昔也無奈何忽已置念慮今行日云近使我淚如雨我為綱常謀有身不得顧妻兮莫望夫子兮莫望父天長與地乆此恨極千古来生業縁在骨肉當如故亂離歌六首有妻有妻出糟糠自少結髮不下堂亂離中道逢虎狼鳯飛翩翩失其凰將雛二三去何方何虞國破家又亡不忍舍君羅襦裳天長地乆逺茫茫牛女夜夜遥相望嗚呼一歌兮歌正長悲風北来起彷徨有妺有妹家流離良人去後攜諸兒北風吹沙塞草萋窮猨慘淡將安歸去年哭母南海湄三男一女同歔欷惟汝不在割我肌汝家零落母不知母知豈有瞑目時嗚呼再歌兮歌孔悲鶺鴒在原我何為有女有女婉清揚大者學帖臨鍾王小者讀字聲琅琅朔風吹衣白日黄一雙素璧委道旁雁兒雁兒秋無粱隨母此去誰人將嗚呼三歌兮歌愈傷非為女兒淚淋浪有子有子風骨殊釋氏抱送徐卿雛四月八日摩尼珠榴花犀錢落繡襦蘭湯百沸香似酥欻隨飛藿飄泥塗汝兄十三騎鯨魚汝今三嵗知在無嗚呼四歌兮歌以吁燈前老影眀月孤有妾有妾今何如大者手將玉蟾蜍次者親抱汗血駒晨妝靚服臨西湖英英雁蕩飄璚琚風花亂墜鳥鳴呼金鏡沆瀣浮汙渠天摧地裂龍虎徂美人塵土何代無嗚呼五歌兮歌鬱紆為爾迎風立斯須我生我生何不辰孤根不識桃李春天寒日短空愁人北風吹隨鐵馬塵初憐骨肉鍾竒禍如今骨肉更憐我汝在空能嬰我懐我死誰當收我骸人生百年何醜好黄粱得喪俱草草嗚呼六歌兮勿復道出門一笑天地老收柳女信痛割腸胃人誰無妻兒骨肉之情但今日事到這裏于義當死乃是命也奈何奈何塗中有三詩今録至言至于此淚下如雨之一讀此三詩便知老兄悲痛真切之情事至于此為奈何兄事秖待千二哥至造物自有安排周一可将此詩呈嫂氏歸之天命仍語靚妝璚英不曾旋得毋怨毋怨徐妳以下皆可道達吾此意當此天翻地亂人人流落天數奈何奈何一可令柳女環女好做人爹爹管不得淚下哽咽哽咽賢一此詩本仍可納之干二哥五妹兄天祥家書逹百鐵網珊瑚張翥跋云右文信公遺墨前參知政事本齋王公所藏公殁已乆家人理筐匳書尺叢積顧是紙損爛将裂以拭巵匜公之子季境適至識為信公書咄唶驚異亟命装池以完嗚呼豈非有神物守䕶之歟不然英靈之氣不泯而致之歟先賢尺牘人尚皆藏弆之矧信公之精忠偉烈震耀古今翰墨光芒垂示臣子者乎不惟王氏寳之百世而下固夫人之所同寳也史官河東張翥書羅椅椅字子逺號磵谷廬陵人饒䨇峯高第寳祐四年登第以秉義郎為江陵教改潭州及宰贛之信豐遷提轄𣙜貨度宗升遐失于入臨論罷呉江雪霽圗天上清流雪片人間名勝呉淞兩賢相厄已甚頼得斜陽半峯詩家鼎臠次劉孟元見贄韻坐久不知夜飢鼯窺瓦檠詩徒吟樂國酒不打愁城白雪夫君句黄花老我情商量能住否賸欲飲公榮翰墨大全寄危驪塘贈以古鑑百尺樓頭山雨長夢提白髮濯滄浪從渠金帶花成蔟何處魚羮飯不香語妙囊中了今古騷成肘後繫瀟湘山寒嵗晩蘭苖盛欲當包茅獻草堂詩林萬選幼輿折齒歌秋衫未成錦機語棠梨半花鳯一羽象牀雪綜小龍梭細穴銀光口氷縷西鄰郎君東海歸芙蓉半白杏雨肥十二䦨邉説幽怨勸織南浦鴛鴦飛匿蘭含蕙無消息春醒彤霞漾玉色小龍呼出風雨聲奔騰觸裂䨇白石白石國城三十六女子軍来兩城覆鸞歌猨嘯強激昻百戸風来如箭鏃章臺公子真豪縱復以㣲言相感動郎君切莫更癡心忍作甘心可人痛乾坤清氣呉琳琳字禹玉號存吾潛之子寳祐四年進士倅婺州題鹿田西寺壁為從吏隱招提宿相望城中隔㡬塵雲暗雨来疑是晚山深寒在不知春鋤松得石添幽徑接竹通泉隔近鄰此去又尋三洞約初平應怪我来頻呉禮部詩話唐天麟天麟嘉興人寳祐四年進士烟雨樓百尺樓高足賞心我來猶記舊登臨四時天色有晴雨一片湖光無古今逺塔連隂知寺隱小舟穿柳覺春深凭䦨多少斜陽景分付漁歌替晚吟至元嘉禾志陳著著字子㣲號本堂鄞人寳祐四年進士仕為著作郎出知嘉興忤賈似道改臨安通判有本堂集題勝國院在奉化縣轉路便幽深曾来不用尋寺依仙石腳僧識老巖心是處鬼無墓此山松自林滔滔未涯事分付一蟬吟延祐四眀志陸夢發夢發字太初歙人寶祐四年進士官太府寺丞徳祐乙亥殁于上海有烏衣集梅花城中忙失探梅期初見僧窗一兩枝猶喜相逢那恨晚故應更好半開時今冬不雪何闗事值伴孤芳郤欠伊月落山空正幽獨慰存無酒且新詩梅花鼔吹薛嵎嵎字仲止一字賔日永嘉人寳祐四年進士終長溪簿有雲泉集趙東閣曰雲泉詩本用唐體物與理稱自成一家嵗暮書懐園林春又近老態更無懽添嵗兒童喜照貧燈火寒直心嗟道喪多事識才難已種梅千樹從今爛漫看寄宋希仁兄弟咫尺不相見閉門唯苦吟聽殘寒夜雨灰盡壮年心身外一貧在燈前百慮深所欣交友義白首到如今省試舟中闕下春光近囊金又一空霜風吹敗絮星斗隔疎篷世道誰能挽妻孥見未同青燈對黄册銷盡㡬英雄漁村生涯小小落溪灣妻子知時不説難畢竟直鉤為計拙晚来無酒可銷寒松風隆首座住雲際禪院山門開望海鐘鼓動魚龍人具慈悲相秋生寂寞容隨身惟一鉢留偈别䨇松後夜橋西月支笻失所從自君之出矣自君之出矣抱此離恨情春蠶不作絲纏綿過一生以上雲泉集陸秀夫秀夫字君實楚州鹽城人寳祐四年進士累擢宗正少卿兼權起居舍人元兵入臨安益王立于福州進端眀殿學士同簽樞密院事崖山破負王赴海死鶴林寺嵗月未可盡朝昏屢不眠窗前多古木牀上半殘編放犢飲溪水助僧耕種田寺門乆斷掃分食媿農賢鎮江府志句曽聞海上鐵斗膽猶見雲中金甲神挽張郢州世傑山房隨筆謝枋得枋得字君直號疊山信州弋陽人寳祐四年進士咸淳中為江東提刑江西招諭使景炎帝以枋得為江東制置使即弋陽起義兵軍潰隱于閩元徵聘累辭不就後福建行省魏天祐廹脅至燕不食死門人誄之曰文節先生有疊山集北行别人雪中松柏愈青青扶植綱常在此行天下豈無龔勝潔人間何獨伯夷清義髙便覺生堪捨禮重方知死甚輕南八男兒終不屈皇天上帝眼分眀求紙衾避世知無地危身只信天寧持龔夬一作勝扇不著挺之綿養性真同道知心有宿縁紙衾加惠絮晴日卧雲邉春日聞杜宇杜鵑日日勸人歸一片歸心誰得知望帝有神如可問謂予何日是歸期慶全菴桃花尋得桃源好避秦桃紅又見一年春花飛莫遣隨流水怕有漁郎来問津以上疊山集武夷山中十年無夢得還家獨立青峯野水涯天地寂寥山雨歇㡬生修得到梅花天地間集菖蒲歌有石竒峭天琢成有草夭夭冬夏青人言菖蒲非一種上品九節通仙靈異根不帶塵埃氣孤操愛結泉石盟明窗浄几有宿契花林草砌無交情夜深不嫌清露重晨光疑有白雲生嫩如秦時童女登蓬瀛手攜緑玉杖徐行痩如天台山上聖賢僧休糧絶粒孤鶴形動如五百義士從田横英氣凜凜摩青冥清如三千弟子立孔庭回琴點瑟天機鳴堂前不入紅粉意席上常聽詩書聲怪石篠蕩皆充貢此物舜廟當共登神農多智入本草靈均蔽賢遺騷經幽人耽翫發仙興方士服餌延修齡綵鸞紫鳯琪花苑青虯玉麟芙蓉城上界真人好清淨見此靈苖當大驚我欲攜之朝上帝太清瑶草不敢專芳馨玉皇一笑留香案賜與有道者長生人間千花萬草盡榮豔未必敢與此草爭高名宋遺民集柴隨亨隨亨字剛中號瞻岵居士寳祐四年進士知建昌軍事宋亡與其兄望弟元亨元彪隱于櫸林九磜之閒人稱柴氏四隱題白雲菴散䇿入禪扉愁城酒解圍泥黄肥客屨雲淡䕶僧衣心事溪相照吟情雨帶歸未盟泉石隱林鶴背人飛江行即事讀罷騷經手自抄紉蘭歸計勝誅茅新蠶食葉將成繭舊燕銜泥旋補巢菜老花隨黄麥落草長色與緑楊交一春過盡三之二閒倚東風憶孟郊錢唐寒食絮花如雪草如茵寒食清眀處處春惆悵錢唐門外路今年人哭去年人以上柴氏四隠集舒岳祥岳祥字舜侯台州寧海人寳祐四年進士官奉化尉終承直郎宋亡不仕有篆畦稾蜨軒稾竹梧里稾蓀墅稾學者稱閬風先生古意客從南方来遺我薫風琴薫風未易致且奏易水吟高浪忽起立四顧變愁隂征馬立躊蹰旁人淚霑襟壯士不畏死怒髮豎森森長揖辭四座秦闗無阻深燕客視秦王已若罝中禽一朝事不成易水有悲音請君且勿彈此曲傷人心一春四十日天氣未佳花事行復已矣太息成吟積翠林塘十畝隂雨中不覺晩寒侵江山萬里登樓眼宇宙千年隱几心有客不来還日暮掩書無語自春深倚䦨欲數排簷竹故故飛花點客襟以上赤城詩集天門山烟樹連天逺漁樵兩地分仙舟滄海路僧錫石橋雲落日人行少空村犬吠聞誰知隱淪者絶迹在人羣石臺紀遊蒼山面長溪勢若飲奔馬層臺跨其脊萬古絶蕭灑登臨惟兹時朋從未云寡迢迢厯榛莽靡靡眺原野白雲與翠霞夐在履舄下窮秋向搖落霜菊摘盈把賞心孰與同幽抱欣已寫邈矣千載期名山俟来者以上台州府志楊白花楊白花懊惱隨風渡江水將心莫託少年郎少年一行輕萬里楊條插地便生根花性飄揚似夢塵恨不築城高萬丈花飛莫放出重門珠簾繡柱香雲䕶秖有黄鶯知去路宋藝圃集唐元齡元齡新建人寳祐進士樂安令鬱林寺一徑通深窈叢林獨蔚然神仙棲佛屋香火當僧田䍐見催租吏誰談文字禪呉儂来拜朔僂指滿三千西江詩話潘希白希白字懐古號漁莊永嘉人寳祐中登第幹辦臨安府節制司公事徳祐中起為史館檢校不赴送蔣朴之維揚隋家天子愛揚州四十離宫取次遊荆棘久迷秦隴路柳絲空拂汴河流君才清似庾開府世事難于孫仲謀莫為青山怯騎馬卻將風景付閒愁入南溪沙頭落月照篷低杜宇誰家樹底啼舟子不知人未起載將殘夢上南溪以上東甌詩集史季溫季溫字子威眉山人舉進士寳祐中官祕書少監逰鼓山上到瓊峯第㡬間御風騎氣渺人寰天高陡覺星辰近地迥偏饒日月閒去海茫茫疑十里望州隱隱見三山武夷榜墨千年在任使重厓蘚字斑鼔山志朱杰杰字子俊金華人寳祐中豐城令遊九鎻山九天虎豹不守闗瑶京夜半墮塵寰化為青山故曲折中有玉殿開仙班白龍天来三百丈飛沫直下琉璃灣神仙可望不可接桃花伴我歸人間洞霄詩集侯畐畐字道子樂清人以武舉仕寳祐閒為海州通判李松夀據山東突出漣泗鏖城下死之賜廟旌忠諡節毅有霜崖集暮雨暮雨生寒衣袂薄楚鄉客子正傷情扁舟莫向蘆邉宿夜半西風有雁聲東甌詩集曾極極字景建臨川布衣文定公弟宰之後以詩語訕謗謫道州卒有舂陵小雅金陵百詠寄蔡西山時在道州貶所四海朱夫子徵君獨典刑青雲伯夷傳白首太𤣥經有客憐孤憤無人問獨醒瑶琴空鎖匣絃絶不堪聽後村詩話往舂陵作挟䇿行行訪楚囚也勝流落嶠南州鬢絲半是呉蠶吐襟血全因蜀鳥流徑窄不妨隨繭栗路長那更聽鉤輈家山千里雲千疊十口生離兩地愁鶴林玉露渡江以来詩禍殆絶唯寳祐間中興江湖集出劉潛夫詩云不是朱三能䟦扈秖縁鄭五欠經綸又云東風謬掌花權柄卻忌孤髙不主張敖器之云梧桐秋雨何王府楊柳春風彼相橋曽景建云九十日春晴景少一千年事亂時多當國者見而惡之並行貶斥景建謫舂陵死焉往舂陵詩云云送曾泉州隱然風節動朝行屢叩龍墀貢皁嚢未促相如歸蜀道翻令汲黯去淮陽使藩自足榮莱服邃殿誰當補舜裳急召諸賢固根本璽書早晚出眀光濂洛風雅和謝康樂華子岡韻隱仙無定在館宇非一山華子出商洛巢雲俯渴泉嬴顚劉蹶際師生自為賢頗哀區中人峯頂起新阡決絶目下事駕鴻淩紫烟身隱焉用文滅跡托空筌雲仍散洲渚世漁業相傳笭箵挂虎落舴艋當門前蹇予厭世慮企石聽潺湲山空月眀時足音自跫然遊華子岡紅泉碧㵎去城纔半驛深谷自逶迤藤絡崩厓石松垂倒地枝寒山束毛髮碧澗照須眉霜氣全消歇空存太傅祠以上撫州府志金陵百詠存二十九首覆舟山在城北五里晉北郊壇宋藥園壘樂遊苑冰井甘露亭皆在此山六代興亡貉一丘繁華夢逐水東流操蛇神原注列子注山海之神皆操蛇向山前笑三百年前㡬覆舟秦淮在縣南三里始皇時望氣者云金陵有天子氣使朱衣鑿山為瀆以斷地脈改金陵為秣陵晉陽秋秦開故曰秦淮或云淮水發源屈曲不類人工鑿斷山根役萬人祖龍癡絶更東巡石城㡬度更新主贏得淮流尚繫秦西浦張碩遇杜蘭香處珠璫錯落江臯佩羅韈輕盈洛浦妝欲採蘋花擲春信停橈難覓杜蘭香桃葉渡一名南浦渡金陵覽古在秦淮口桃葉者晉王獻之愛妾名也獻之詩云桃葉復桃葉渡江不用檝但渡無所苦我自迎接汝言不用檝者謂横波急也獻之歌此送之帬腰芳草抱長隄南浦年年怨别離水送横波山斂翠一如桃葉渡江時臙脂井陳末後主與張麗華孔貴嬪投景陽井以避隋兵舊傳云欄有石脈以帛拭之作臙脂色又名辱井在法華寺或云白蓮閣下有小池面方丈餘或云在保寧寺覽輝閣側寒泉玉甃没春蕪石染臙脂潤不枯杏怨桃羞嬌欲墮猶將紅淚灑黄奴射殿有七十間旁多槐竹鶴蓋隂隂覆苑墻更添蒼雪助清涼高皇儉徳規模逺不作南朝石歩廊李賀詩春熱張鶴盖兎目宫槐小蘇子瞻竹詩蒼雪紛紛落夏簟丁公言詩困憶南朝石歩廊古龍屏風宣和舊物高宗攜之渡江後壊爛宫官惜之翦裁背成屏風立殿上乗雲逰霧過江東繪事當年笑葉公可恨横空千丈勢剪裁今入小屏風新亭在城南十五里金陵覽古在江寧縣十里洛陽四山圍伊洛瀍澗在中建康亦四山圍秦淮直瀆在中故云風景不殊舉目有山河之異李白云山似洛陽多許渾云秖有青山似洛中謂此也蔡薿作天津橋亦以此青山四合遶天津風景依然似洛濵江左于今成樂土新亭垂淚亦無人賞心亭下臨秦淮盡觀覽之勝丁晉公謂建嘗以周昉所畫袁安卧雪圗張于屏後太守易去續志又云丁始典金陵陛辭之日真宗出八幅袁安卧雪圗付丁謂曰卿到金陵可選一絶景處張此圖謂遂張于賞心亭柱上有蘓子瞻題名猶存柱上題名客姓蘇江山清絶冠呉都六花飛舞凭䦨處一本天生卧雪圗同泰寺在臺城内梁武帝窮竭帑藏造大佛寺閣七層為天大所禁布薩闗齋涕泗揮大通基在昔人非此身終屬侯丞相誰辦金錢贖帝歸宋興寺劉裕故居也晉至昌眀祚已終讖文猶有兩昏童桓元偷得宮中璽卻屬新河伐荻翁八功徳水在蔣山悟真菴後按梅摯亭記梁天監中有胡僧曇隱寓錫于此山中乏水時有龐眉叟相謂曰予山龍也知師飲渴措之無難俄而一沼沸成後有西僧繼至云本域八池已失其一似竭彼盈此也其泉一清二冷三香四柔五甘六浄七不饁八蠲疴故名八功徳水自梁以後常取給數斗供厨替八珍穿松潄石瑩心神中涵百衲烟霞色不染齊梁歌舞塵謝廟兒輩能軍國未危更令朱序助聲威秦人若有全師集雲母車盛晉鼎歸蒋帝廟白馬千年繫廟門爐煙浮動衮龍昏闔棺謾説榮枯定青骨猶當履至尊呉大帝陵老瞞虎裂横中州何物生兒作仲謀四十帝中功第一壊陵無主使人愁卞將軍墓握節顔公拳透爪歸元先軫面如生晉陵發掘今無主獨有忠魂只冶城張麗華墓在賞心亭天井中間有光氣如匹練掬之如水銀漸流散伴侣聲沈王氣銷香魂血涴有誰招蓬科三尺光塵在猶作臺城花月妖臺城紫蓋横天整復斜興亡接翅似昏鴉舊時石闕摩雲處荻屋荆扉一兩家李氏宫本朝修李氏宫掘地得水銀数十斛乃宫娥棄粉膩所積也事見湘山野録埋愁無地柰君何可是黄壚飲恨多玉鏡臺前棄脂水深泉流永尚盈科華林園羽葆来臨鼓吹停華林暢飲倒長瓶萬年天子瞢騰眼錯認長星作酒星昇元閣鐸今之昇元閣非古基矣石柱二見屹立右軍教塲中昇元閣一名瓦棺閣乃梁朝建高二百四十尺摩挲石柱蘚痕斑亡國如鴻去不還無復切雲三百尺秖傳風鐸在人間孫陵鵝眼錢六代初終㡬變遷孫陵無樹起寒煙青蚨細薄如榆荚猶是當年買笑錢澄心堂紙王直方詩話澄心堂紙江南李後主所製劉貢父詩當時百金售一幅澄心堂中千萬軸楮生玉面霧深藏未肎横陳翰墨場一幅䧏牋何用許價高縁寫宋文章徳慶堂字李主所書南唐但餘此物李主筆法有鐡鉤鎻森然筆勢聚干將氣軋鍾王未肎降惆悵當年鐵鉤鎖可能無意鎖長江三段石上元縣南三十里有段石岡丹陽記云有大碣石長二丈折為三段紀呉功徳其文東觀令華覈作其字大篆或又云皇象書也今移在府中凜然皇象法書存重屋應無野火焚割據英雄餘一念斷碑千載尚三分校官碑在溧陽縣官㕔風摧雨剝校官碑集古先生竟不知同是光和千嵗刻未容苦縣獨稱竒石歩道中有石麒麟數十地悴天荒丘隴平難從野老問衰興蒼烟落日低迷處折足麒麟記壊陵鳯州柳鳯州柳蜀主與江南結婚求得其種鳯州出手柳酒蜀主函封遣使時芳根元自鳯州移柔荑􅌬醁今安在唯有青絲拂地垂青松路王介甫手種松致君堯舜事何難投老鍾山賦考槃愁殺天津橋上客杜鵑聲裏兩眉攢以上方輿勝覽翰墨大全羅磵谷謝景建惠金陵百詠書云黍苗離離麥秀芃芃弔古宫于荒畦撫頺城于野草僕悲馬懐之歎至百詠極矣不知景建是何肺腑能辦此等惱人言語于千載之下耶宋詩紀事巻六十七
