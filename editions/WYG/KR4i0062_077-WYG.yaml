body:
  text: 宋詩紀事巻七十七錢塘厲鶚撰曹棐棐官著作郎登南山塔平生登塔與登樓亂盡鄉心送盡愁試上南山山下塔依前懷古復悲秋咸淳臨安志李敷敷臨安縣令雙林院雙林高寺秀峰環我欲題為小徑山炎月一遊神骨爽天風相送出松關咸淳臨安志李邦美題句容酒肆壁青帬白面閧挑菜茅舍竹籬疎見梅春事隔年無信息一聲啼鳥唤將來山房隨筆趙萬年萬年南渡時從武科備戎行于襄陽屢郤敵人有禆幄集程機宜宅喫豆粥豆紅米白間青蔬髣髴來從香積厨異日大官還飽飫不應忘郤在蕪蔞偶成一心憂國不憂家掠面黄塵帶晩沙郵傳不通音問隔家人夜夜卜燈花以上曹氏歴代詩選王執禮執禮號竹寮金華人遊玉仙洞題碧雲石崖在臨安志已從鹿巖遊更入龍洞去横足螃蠏行連臂猨猱度徑滑鏗蠟屐隂屋然樺炬振䇿扶顚隮捫蘿猛攀附塗險㡬欲窮境勝思有遇谽谺通石竇參差流石乳形開趣彌深興集理自裕便將遺世紛且復滋幽歩紆徐窮冥搜淹留廹頽暮題詩識蒼壁聊冩心跡素重遊豈無期恐忘來時路錢王太廟數間老屋半塵埃宗社雖存沒草萊尚有遺民呼太廟可堪游鹿上荒臺花開陌路空餘恨麥被陵陂不盡哀三節還鄉平日志化為杜宇定歸來錦溪㣲雲淡日半昏明初換春衫歩履輕行到小橋幽絶處高吟詩句荅溪聲以上咸淳臨安志周芝田芝田浙人彈琴膝上横陳玉一枝此音唯獨此心知夜深斷送鶴先睡彈到空山月落時句淋漓滿腹蔵春雨突兀半拳生曉雲石上兩竹草香花落後雲黒雨來時以上山房隨筆盛雪巢偶作臯䕫不著書周召不決科端坐廣堂上四海臻泰和吾道固如是後來文藝多嗒然空山中獨抱明良歌呉禮部詩話陳柏柏字茂卿號南塘懷友攜書入空山㡬若與世絶俯仰一室間頗見古人别良朋令人思思君意彌切食芹差自甘那得共君啜呉禮部詩話趙聞禮聞禮字立之號釣月見絶妙好詞句西風昨夜摧黄葉秋亦無心在菊花全芳備祖張樞樞號雲窗游大滌一曲朱䦨百尺餘仙人自是愛樓居松風不動千山靜月滿天壇人歩虛洞霄詩集林次麟曲竹出臨平山相傳唐丘隱士丹成羽化植杖于此其竹皆曲直節棱棱是此君耳孫郤以曲為名首陽山下知難種只可斜封向管城咸淳臨安志樓楚材句晚歸烟樹立猶見曉向雪汀飛若無鷺有時移向西堂去一座青山逐手來屏風方囘桐江集張偉偉號芝田馬塍水拍田塍路半斜悄無人跡過農家春風自謂専桃李也有工夫到菜花薦菊泉一名寒泉近來湖上風光改古蹟三賢亦就遷獨有菊泉能定力嵗寒堅守此山前以上咸淳臨安志李介山梅雨潭靈源分左界千仭落飛泉散作一空雨長如四月天挂嵒寒練直濺席水珠圓湫石龍應在山扉浮翠烟仙嵒寺志俞琰琰字玉吾長洲人咸淳末應舉無成入元隱林屋山以讀易自娯有林屋山人集書齋夜話席上腐談焦山寺夜坐偶作夜宿焦山寺月明聞櫂歌蜀江到呉盡海舶過淮多風浪翻龍窟霜林露鳥窠詩成忽有酒不飲欲如何客裏送春擠排落絮隨風去分付殘花趁雨飛自笑鶴身歸未得郤從客裏送春歸贈華陽道院琴士商碧山來徃晴巒縹緲中滿身空翠濕衣濃相尋欲聼蓬萊曲還在華陽第幾峯以上林屋山人集海䐑生以鰕為目來從水母宮堆槃凝凍結停筯便消融瑩𦂳玻瓈白斒斕瑪瑙紅酒邉嘗此味牙頰響秋風書齋夜話鄭震震更名起字叔起號菊山連江人所南翁其子也有倦遊槀清雋集宿虎丘到晚歸不去因而此宿休雲深千古寺月冷一天秋崖裂池如束天虛塔欲浮最宜初日上高處看雲收餘杭道上五年茲路上頻徃又頻還嵗月孤松老風霜苦竹斑溪流天目水雲出洞霄山馬上因閒眺蜉蝣宇宙間歸去歸去豈不好平田帶淺林春猨鳴雪澗晴日轉雲岑世久無鳴犢時當學展禽吾生今老矣梁甫豈能吟荆南别賈制書東歸來時秋雨滿江樓歸日春風度客舟回首荆南天一角月明吹笛下揚州卜居久欲謀歸力不任浮雲蹤跡謾巢林功名未入屠龍手貧賤常懐買鶴心月下開門㣲雨過樓頭聞笛二更深世間萬事俱陳迹空倚西風閲古今以上清雋集王夢應夢應字聖與一字静得長沙攸縣人咸淳十年進士調廬陵尉元兵陷臨安起兵勤王兵敗奔永新卒鄧光薦文丞相督府忠義傳呉希奭陳子全王夢應皆攸縣士人自通于同督府與趙璠相應景炎即位事聞承制授官各有差東歸一櫂仍為别他鄉復避兵客隨風雨老春著鼓鼙輕宇宙關何事艱危得此生門前一溪水幾日到江城甲申元日上日仍漂寄尊前客又非鄉心眠聼雨病骨晩添衣街鼓春將動簾燈寒未歸梅花經一雪㡬片不曽飛呈李書史火龍騎日雪飛空勁草亭亭不見風臣亮南陽今未老一鉏雲碎日猶紅以上四朝詩陳觀觀字國秀奉化人咸淳十年進士調新城尉有蚓竅集題甄氏訪山亭水流花落日生雲日静風暄草欲薰老去風流猶未減一丘一壑要平分雨後西山翡翠堆結亭直欲近巖隈從今記取溪頭路一日須來一百迴四朝詩熊鉌鉌字位辛初名禾字去非世居建陽之鼇峯咸淳十年進士授寧武州司户參軍有勿軒集遊武夷山我來武夷山逺意超千古嘗疑混沌開疏鑿未經禹峽山猶古梁洪濤莽回互行舟留大壑營巢餘斷樹垠崖波濤痕隱隱皆可覩陶然上古民要服固深阻秦威何桓桓薄海猶廣土六合皆湧沸一枝豈寧處嘗言十三君隱隱避秦侣一日厭塵寰泠然遂高舉上山娯賔雲下山滿豺虎神仙何𣺌茫虹橋想虛語桃源亦其類好事自誇詡風氣日已開蛇斷出真主遂令閩山陬盡入職方宇漢志名始彰祠堂用魚脯流傳世代久琳宮粲衣羽至今此山名號為神仙府恭惟我遯翁辭闢厥功溥于焉卜精廬溪山九曲五圗書盡在是斯地儼鄒魯我以負笈生來茲有年數自慚仁智心未覩高深趣斯遊亦何意㑹心覬真遇侃侃平生友惠然肎來顧攜手敦夙好抗志企遐慕招我山中遊茲逰適予素巍巍大隱屏屹屹天一柱前瞻晩對亭考槃固其所何當同心人相與薙榛莽長松期嵗寒脩竹倚日暮我自愛此山躊蹰不忍去𢷬衣曲北望悠悠音信少空房逺念心常早流螢煜煜夜稍青塞雁嗈嗈寒已到細絲清水練方新在椸半溼日中明隔籬翁嫗寐不熟月落尚聞砧杵聲將軍錦帳環歌舞百戰尚遲歸寸土老農肩米肉成瘡思婦裁衣淚如雨以上勿軒集曽子良子良字仲材號平山南豐人徙金谿咸淳進士仕為淳安令宋亡隱陶塘輓知臨安府兼浙西制置使曽公淵子德祐思良弼江西出大臣報忠昭漢議靖獻有殷仁皦日五朝老清風百世人幾時歸衮繡秋草臥麒麟永紹傳賢啟慈元拱女堯鼇山猶贔屭鵬海極扶揺宮殿春旗曉簾帷社飯朝龍髯攀不及鸞馭去何遙立海終風黑洗光雙日紅餘波濺渤澥仙仗岌崆峒宗廟神靈在公師禮數崇平生精履屐尚覺小臣忠返輤榮歸寢帷堂哭設衣神情如夢叶滄海悵心違百世功言立千年城郭非任安猶未死哀淚不堪揮忠義集呉龍翰龍翰字式賢號古梅歙人咸淳鄉貢後以薦授編校國史院實録院文字至元丙子鄉校請充教授尋棄去有古梅吟槀程訥齋元鳯云閲呉君詩槀句老而意新咀之雋永殊非茍作樂府妾心江岸石千古無變更郎心江上水倐忽風波生製衣寄夫壻妾有冰雪段中間連理枝不忍翦教斷方虚谷云式賢詩有驚人語如樂府諸萹尤予所深喜者重陽客中愁裏重陽近他鄉酒易沽秋風詩鬢短寒夜客燈孤筍笠月穿破荷衣霜打枯有懷吟不就端不為催租晩舟過臨平烟鐘唤起夕陽愁淼淼臨平春事幽唯有風蒲愛吟客岸邊撩亂綰行舟嚴灘對月憶雪壺六弟共君看月此徘徊今夜月明君不來安得清光刀翦破為分一半到泉臺題荆公讀書堂六籍紛紛盡可奴翻騰字說乃葘畬可知山半青燈夜只讀商君一巻書以上古梅吟槀登金陵鍾山絶頂萬仞鍾山著屐登中原今隔幾崚嶒自憐不及天邊雁嵗逐春風到八陵新安文獻志汪涯涯字萬頃漢陽人事母孝宣撫賈似道請為客當作露布獻㨗涯瞋目曰啗人以利而退其師又兒弄主上似道大怒撾殺之其母曰汝以直死我則不辱可以下報先君矣亦自沈江帆江㠶去去可腸斷千古萬古越王臺掃空黄葉晚風定飛盡碧鳥青天回半生無成坐筆硯萬事不理問尊罍年年看梅今白首已矣英雄畱七哀江行江陵白魚如斫玉挂㠶獨去風日寒封題兩甕寄白髪兒涯不是作魚官秋光蕩漾滿行色鄰舟吹笛不堪聞洞庭濯足一尊酒夫君不來空白雲以上谷音髙晞逺晞逺字照菴通州人咸淳德祐間通判平江府心逺堂種竹期十年栽橘盈千頭雖云多逺慮無乃為身謀高人絶塵累俟德居此丘泰宇無畦畛虛空有天游仁義尚蘧廬道德成安流結茅依翠㣲極目際平疇白雲度寥廓黄鵠下滄洲百世此周覽我志尚可求祗應柴桑翁眞趣共悠悠四朝詩曹良史良史字之才號梅南錢唐人咸淳故老與周草窗游有詩詞三摘俞宗大序云曹君故宮詞十九首與夫拜景靈游湖曲登北城悼今思古所謂哀而不傷怨而不怒忠厚而悱惻者也句雲生畫佛壁葉落病僧房閒來閉門處認得讀書聲牆圍敗屋知無主風響荒林似有人深樹月昏神火出㫁烟雪霽獵人回方虛谷䟦曹君良史錢唐人衣冠佳盛湖傲山酣則有咸淳詩摘兵火變遷江淮奔走則有梅南詩摘句如雲生畫佛壁云云展轉征旗戰鼓十年間筆力益老矣錢頴頴號菊友賦翁仲魏明帝景初元年徙長安銅人承露盤盤折聲聞數十里重不可致畱于覇城大發卒鑄銅人二號翁仲列坐司馬門外武皇騎龍朝帝后露溼銅仙古苔繡景初命名翁與仲無復衣冠仍漢舊桓圭大劍高嵳峩不動如山嚴鎮守豈知屹立司馬門九鼎暗移司馬手變遷陵谷亦何易洛陽塵埃一回首因嗟寵辱非可常世間何者為長久君不見後來荆棘埋銅駞坐想失身横隴畝隨隱漫録秋胡子郎恩葉薄妾冰清郎說黄金妾不譍若使偶然通一笑半生誰信守孤燈詩林萬選家之巽之巽字志行宋季臨安府倅定林寺二首王荆公讀書處功名良苦賦歸歟兩鬢霜花百念枯鍾鼎樓臺渾一夢數間茅屋亦浮屠十載浮雲㡬變更歸來鍾阜碧嶙峋早知山色無今古只與青山作主人景定建康志福勝院在臨安縣福全山三過山中寺勞生有底忙梵書蟲蠧紙佛界燕巢梁曉日光明藏野花知見香豐碑如㑹意讀罷更彷徨咸淳臨安志劉敏求敏求字好古號松菊老人㤗和人長于詩宋末累舉不第題滕王閣閣中環佩知何處游子再來春欲暮鶯啼紅樹桞揺風疑是當年舊歌舞古來興廢君莫嗟君看紅日西山斜西山不改舊顔色換盡行人與落霞南昌府志劉光光字元輝生宋季有曉窗吟巻句仙館無人春寂寂一林紅日鍊櫻丹曉來多謝梁間燕盡把春愁舉似人山翁何事衝寒徃知有梅花在隔溪方回桐江集韋竒竒字學易號若溪居安次子二十五嵗殀題倪文昌玉湖書院齊齋老子今安在一去人間餘卅載白衣蒼狗㡬干回惟有西山長不改呉興勝概誇玉湖鵝溪一幅𤣥暉圖天光上下渺無極寒玉倒浸清冰壺晴波萬頃瑩如洗一巻石向波心起先生具眼此結廬收拾溪山入詩裏漁人艇子時徃還笭箵擲下前溪灣一聲欸乃水天碧回頭卻羡沙烏閒樓高望極情思逺前揖衡山後蒼弁陌頭楊柳㡬春風當年曽識齊齋面我今懷古心悠悠古人不見今人愁夕陽收盡暝烟浮扁舟載月歸來休梅磵詩話俞演演字則大臨安人句殘燈吟夜雨破榻臥秋山方回桐江集徐子美子美號芝石武林人句杯行曲水春如昨字入昭陵土亦香蘭亭集方回桐江俞君錫君錫字仲疇苕溪人有竹屋詩槀句洗瓢魚隱石埽葉蜨移家荒店難尋酒長途半趁船蛬聲依壞砌樹影倒寒池方回桐江集江石卿石卿有得一文槀句太傅數日别劉公一紙書方回桐江集汪崇亮崇亮有白雲漫槀青溪主客歌野王手奏淮淝㨗門户歸來有旌節伸眉一笑紫髯秋䄂中猶挾柯亭月山隂主人載雪舟掀篷繫䌫青溪頭平生耳熱欠一識若為牽挽行雲留一聲横玉西風裏蘆花不動鷗飛起馬蹄依舊入青山桞梢不動天如水方回桐江集方至至號天慵分水人句缺多圓少人如月盛極衰來物易秋方回桐江集曽澈澈盱江人鮑輗過盱江遇一童子眉目疎朗語必援古今驚問逆旅主人子也明年載訪死矣得其詩一首于其同舎生九齡行我生九齡氣食牛喑嗚頓挫無匹儔白雲無根起天末一身萬事同悠悠低頭拱手事先覺談笑未了成仇讐一譽不足勝百毁言語起滅如浮漚聖賢可與知者道麟鳯豈在山中遊蘧然夢覺大槐國江花昨夜生凉秋谷音孫璉璉字器之大庾人家貧嗜書善吟詠不應舉躬耕織屨以為食夀百歳述懷坐倦秋樹根攝衣歩前邱横河澹如練破月西南流獨持一尊酒悠然發清謳俯仰無不足吾生焉所求谷音薛美美號獨菴永嘉人薛瓜廬吾宗人也吾不得而見之得見其詩斯可矣太息而題于巻杪結廬兄弟近長安弊郤儒冠竟不彈自茹芝來輕漢召肎將𤓰去博唐官貧多樂事清無盡手冩新詩墨未乾史筆須評隱君傳姓名應作古人看𤓰廬詩附詠桞一撮嬌黄染不成蔵鴉未穩早藏鶯行人自謂傷離别枉折無情贈有情全芳備祖許庚庚字伯先號萬松武林人句花盡辜啼鳥麻深没過人硯潤浮殘墨琴乾響斷弦方回桐江集黄瀠瀠昭武人句橋影不隨流水去漁歌偏帶夕陽來當年不作南行客他日應無北狩人題鄭介夫祠方回桐江集戚明瑞明瑞字子雲檇李人讀書㑹稽五雲山句舊夢不堪游螘國生涯只合在漁舟鵂鶹歡喜舞南風望帝花飛春尚寒方回桐江集王儀儀字仲履題婺源江氏琅玕閣詩仙長倚玉䦨干句脱塵凢妙不難六月雪霜侵几研一生煙火隔心肝鳯凰管徧風旋應翡翠窗深露不乾記得月明扶醉上骨輕毛豎怯清寒偶作五月蘋花思渺然緑波憶蕩浦西船寧穿布韈青鞵底不醉琵琶緑繭弦山郭鶯啼春又暮蕭齋人静澹無煙一言滿慰三年别借枕風前對榻眠以上呉禮部詩話李商記化蜨事碧梧翠竹名家兒今作栩栩蝴蜨飛山川阻深網羅密君從何處化飛歸癸辛雜識楊昊字明之娶江氏少艾連嵗得子明之客死之明日有蝴蜨大如掌徊翔于江氏旁竟日乃去及聞訃聚族而哭其蜨復來繞江氏飲食起居不置也蓋明之未能割戀于少妻稚子故化蜨以歸耳李商作詩記之王庭庭金華人賈似道幕官似道敗自殺明堂侍祠唱徹嚴更鳯鑰開侍祠濟濟列崇陔小臣亦忝廊西獻惟秉温恭對越來玉佩珊珊出禁扉金蓮分炬散芳菲祠班咫尺臨黄道惹得天香滿䄂歸咸淳臨安志宋詩紀事巻七十七
