body:
  text: 宋詩紀事巻八十五錢塘厲鶚撰令畤令畤字徳麟太祖次子燕王徳昭元孫元祐中簽書潁州公事坐與蘇軾交通罰金入黨籍紹興初襲封安定郡王同知行在大宗正事薨贈開府儀同三司有侯鯖録王直方詩話東坡作秋陽賦云趙王之孫有賢公子宅于不土之里而詠無言之詩盖畤字也坡云且教人别處使不得藝祖下徳字惟字從錦繡萬花谷趙氏玉牒派字世字令字子字伯字師字希字與字孟字由字太宗下元字允字宗字仲字士字不字善字汝字崇字必字良字友字魏王廷美下徳字承字克字叔字之字公字彦字夫字時字若字嗣字次字同官李仲益贈張思仲家歌人團茶予題其封色映宫姝粉香傳漢殿春團團明月魄却贈月中人次教授陳復常韻坎凜中年坐廢人老來貂鼎視埃塵鐵霜帶面唯憂國機穽當前不為身發廩巳康諸縣命蠲逋一洗幾年貧歸來又掃寛民奏慙愧毫端爾許春初到長安來往長安未定居暫將僧舎當吾廬空中説法憑鈴語枕上朝饑聽朩魚因果分明休問佛行藏自信罷占書眼前一物真堪羨百尺長楊水滿渠以上侯鯖録跋太白醉草六言雖自九天分派不與萬李同林歩處雷驚電繞空餘翰墨窺尋春渚紀聞云此徳麟跋薳所藏其實自謂也冬日居山亂山深處過嚴凝僻静門鄰物外僧送客踏穿松徑雪煮茶敲破石池冰朝垂簾幙寒慵巻夜鎻樓臺静嬾登只待春來歸上國杖藜吟出白雲層詩林萬選句我識之無常縮舌君能競病且低顔和劉景文録侯鯖令鑠令鑠字伯堅太祖五世孫第進士官至太僕子瞻和予致齋詩有端向甕閒尋吏部老來唯欲醉為鄉之句因送薄酒兼成斐章冀發笑也古人醉以酒盖亦有所寓一飲百憂忘陶陶朝復暮公欲醉為鄉甕閒尋吏部惜取青銅錢濁醪安足酤敢竊好事名聊資子雲具巧手斧鼻端此情知有素子瞻辭免起居之命令鑠復用前韻一首以勉之登州與儀曹到官如旅寓螭陛鳳凰池翺翺未云暮冰雪照人清黄色盈中部譬如千日釀一宿陋清酤載筆無多時公真濟時具歎息賀徳基猶知我尸素鐵網珊瑚鮮于伯機㳺髙亭山廣嚴院記云院僧出東坡趙令鑠唱和真迹王明清題云英宗潜龍日居穆清宅與宗屬淄恭憲王㳺從最厚慶厯八年戊子兩家各生子同年月日時其後英宗入繼大統所誕即神宗既即天位以是日為同天節恭憲所育乃太僕伯堅也為本朝登進士第之冠易文階最先子孫蕃衍世科相望聲華焜燿以至于今五行之説其可不信哉僧云伯堅子孫今居臨平貧不能自振此巻近年以粟易之令衿令衿太祖五世孫號超然居士官左朝散大夫主管台州崇道觀李伯紀丞相挽詩道大終為累功髙反被疑恨無長日月寶此大蓍龜鼓咽空山暮風酸落木悲弔喪哀不及頼有哭公詩梁溪集附子覺子覺字彦先號雪齋太祖六世孫令衿之子為嚴倅時放翁為郡守誠齋以詩寄放翁有幕中何幸有詩人之句謂子覺也有雪齋集負暄野録近世言墨法盖推吾鄉雪齋趙彦先子覺彦先乃故安定郡王超然居士令衿表之之子也其墨法本無師承但自少時篤好製造招延良工叅合衆技遂造其妙中興三廟咸見貴重名播遐邇衿善製墨子子覺孫伯康皆傳墨史宗室趙令其膠法銘曰超然清芬如在書懐栁影槐隂緑遶㕔日長細得話詩情迎風紫燕忽䨇去隔雨黄鸝又一聲筆墨生涯成冷淡筍蔬盤饌易經營世間微利真刀密有底驅馳取重輕瀛奎律髄子櫟子櫟字夢授太祖六世孫元祐六年進士紹興中至寶文閣直學士卒句夜棋三百子曉髪一千梳髪為干戈白心于社稷丹雞肋編伯琳伯琳太祖七世孫官右選句為嫌陶令醉來伴屈原醒趙與虤書堂詩話予曾伯祖伯琳官至右選平生喜為詩五月菊句云云人所傳誦伯晟伯晟大祖七世孫淳熙中上元令㳺攝山棲霞寺棲霞境界何清壯嶽立五峰如列障三徴不復見髙人千刻尚能瞻寶相摩空老木韻秋聲雲屋天巖滿意行夜闌風定月將午門外呦呦聞鹿聲景定建康志師􅋷師􅋷字從善太祖入世孫伯驌子舉進士累遷司農卿知臨安府進兵部尚書與祠卒自號無著居士又號東墻瓊花香得坤靈秀氣全蘂珠團外蜨翩翩親曾后土祠前看不是人間聚八仙全芳備祖師俠師俠號坦菴太祖八世孫梅花南山如佳人迥立不可親而况得道者其間梅子真全芳備祖師恕師恕太祖八世孫月巖睠此巖壑勝領客共登臨危棧臨不測巇途厯􅏟嶔俯仰極髙低上下窮幽深來登空明山千崖正沈沈下瞰青羅江古木鬱蕭森清風萬里來層雲盪孤襟有客可共賦有酒可自斟此景豈易得此樂豈易尋吾生今老矣遁迹歸窮岑一櫂下瀟湘此别意難任别後無相忘詩成寄郵音粤西詩載師秀師秀字紫芝號靈秀永嘉人太祖八世孫紹熙庚戌進士浮沉州縣改秩而卒有天樂堂集清苑齋集四靈之四詩人玉屑天樂冷泉夜坐詩云樓鐘晴更響池水夜如深後改更為聽改如為觀病起詩云朝客偶知承送藥野僧相保為持經後改承作親改為作密二聫改此四字精神頓異真如光弼入子儀軍矣小山問句法于趙紫芝荅曰但能梅磵詩話杜飽喫梅花數斗胸次玲瓏自能作詩戴石屏云雖一時戲語亦可傳也靈隠寺衆境碧沈沈前峰月正臨樓鐘晴聽響池水夜觀深清浄非人世虚無見佛心却尋來處宿風起古松林絶句數日秋風欺病夫盡吹黄葉下庭蕪林疎放得遥山出又被雲遮一半無姑蘇臺作何人可與話登臨徙倚危䦨日向沈千古蒼茫青史夢一年迢遞故鄉心天無雨雪梅花早地有波濤鴈影深為是夫差舊臺榭愁來不敢越人吟絶句黄梅時節家家雨青草池塘處處蛙約客不來過夜半閒敲棋子落燈花栁溪詩話意雖腐而語新薛師石𤓰廬不作封侯念悠然逺世紛唯應種𤓰日猶被讀書分野水多於地春山半是雲吾生嫌已老學圃不如君巖居僧開扉坐石層終日少人登一鳥過寒木幾花揺翠藤茗煎冰下水香炷佛前燈吾亦逃名者何因似此僧孤山寒食三月芳菲在水邊旅人消困亦隨縁晴舒蜨羽初勻粉雨壓楊花未放綿有句自題閑處壁無錢難買貴時船最憐隠者髙眠地日日春風是管弦鴈山寶冠寺行向石䦨立清寒不可云流來橋下水疑是洞中雲欲住逢年盡因吟過夜分蕩隂無絶頂一鴈不曾聞呈蔣肖韓薛師石中夜清寒入緼袍一杯山茗當香醪禽翻竹葉霜初下人立梅花月正髙無欲自然心似水有營何止事如毛春來擬約蕭閑伴同上天台看海濤以上清苑齋集句柘空淮繭白梅近楚秧青送謝耘㳺淮娛書堂詩話希逢希逢太祖九世孫九日舟中倦客逢萸節生涯寄葉舟窮途危不顧飛櫂去難留舊菊重陽日寒蘆兩岸秋多情唯破㡌猶戀老人頭後村千家詩希淦希淦號定山太祖九世孫半山寺有感一水波澄接御溝近城宫栁㺯春柔烏衣巷裏人何在白鷺洲前水自流千古風流歌舞地六朝興廢帝王州今番不負看山約他日重來説舊㳺詩林萬選希㯝希㯝字誼父汴人太祖九世孫有抱拙小藁江湖偉觀華屋巋然占上方一樽同此寄相羊江潮翻海暮天濶湖水拍隄春草長莽莽越山凝紫翠揺揺蘇栁間青黄歸鴻影裏䦨干晩回首中州入𣺌茫送李鶴田東㳺後還鄉劍傍梅花鶴夢醒東㳺吟骨帶秋清台山路杳神仙迹楚國書來母子情半榻煙霞應有約一笻風雪且兼程丁寧及早催行李莫待西湖草色平過臨平市井蕭條景物非居人猶號永和隄春山十里斜陽樹漠漠殘紅杜宇啼以上抱拙小藁臨平記宋理宗紹定三年冬十月築永和塘捍臨平湖許應和有記希邁希邁字端行號西里永嘉人太祖九世孫有西里詩藁酬陳校書見寄日長松院静孤坐對殘編久雨波平岸山髙燒接天春酲茶可解酒病藥難痊獨喜君親政南中客共傳前賢小集拾遺琴泉精舍寄友客來僧已去古屋静蕭蕭敲石引松火對花懸酒瓢窗櫺寒背日柱礎潤通潮君肯過幽寂水程終隔橋王生山水歌范寛山頭李成樹百年二老皆仙去如今尺素留人間縱有千金無博處後人筆底工一家聲價隨可喧中華王君二妙聚一手參以吟思㳺天涯萬里江山纔數幅東抹西塗意先足蒼梢巨石相叅差風雨煙雲在羈束近時目賤耳反真畫圖重舊不重新名家翰墨未必貴塵漬贋本翻為真君提健筆來海外山若玉簮江若帶朝昏變態焉可窮筆未鋪張心已㑹嶺南㳺者多詩人見君作畫應憐君求我新詩寫君畫終使李范聲名分以上東甌詩集希􅒷一作􅀈希􅒷字清中號十洲太祖九世孫四明人寶慶二年進士隨隠漫録趙君入仕四十年虚静恬淡寂寞無為除南雄守不赴後别親友理家事端坐而逝遺偈云六十二年皮袋放下了無罣礙青天明月一輪萬古逍遥自在絶句手執黄庭上石臺竹隂掃月徧蒼苔欲從此處即仙去玉立清風待鶴來隨隠漫録希混希混太祖九世孫岑公洞自有煙雲䕶石扉更䦨曉色近清暉嵒前老檜吟風處似請仙翁化鶴歸名勝志䕫州岑公洞在大江之南廣六十餘丈深四十餘丈石嵒盤結若華盖左右方池有泉涌出嵒簷遇盛夏注水如簾真神仙窟也圖經云岑公名道願江陵人隋末避地隠此百餘歳肌膚若冰雪積二十年尸觧去至唐宋間加以沖妙大師虚鑒真人之號唐刺史馬冉詩南溪有仙磵咫尺非人間泠泠松下風日暮空蒼山趙希混有詩與檳與檳太祖十世孫題白鶴嵒六丁開兩壁不知始何年中間一空洞可張幾客筵我來拂石坐傾耳聽潺湲古榕蔽天罅飛瀑穿峽懸四時宿雨露亭午歛虹煙昔人避山㓂飲溜枕苔眠興懐内訌日鼎鼎百餘年名勝志福寧縣西南白鶴嵒石磴崚嶒盤空而上海上諸山皆入延眺嶺之南飛泉百丈遥望如銀河倒瀉是名南山漈宋趙與檳有詩與訔與訔字中父號菊坡秀安僖王四世孫居湖州寶祐初知平江府孟頫其子也宿半塘寺夜宿半塘寺惟聞塔上鈴老僧行道影童子誦經聲竹密風猶勁窗幽月愈明瓦爐香斷處一榻灑然清吳興藝文補與籌與􅊸字徳淵號節齋太祖十世孫居湖州嘉定十三年進士理宗朝厯官吏部尚書兼知臨安府終淮浙發運使知平江府致仕太湖倦客滄浪意扁舟汗漫㳺雲歸林屋晩木落洞庭秋此地真堪老中原恨未休可知侯萬户不似橘千頭全芳備祖與杼與杼號見山太祖十世孫㳺大滌九鎖閟仙闗長歌入翠巒青松飛雨盖修竹動琅玕雪霽千巖瘦雲深六洞寒客來塵慮息一笑倚䦨干洞霄詩集與滂與滂字肖范號蔗境四明人太祖十世孫淳祐中為閩安鎮官登浙江樓兩岸共明月䦨干霄漢間風流浙江水砥柱海門山晝夜湖消長利名人徃還不如沙上鷺玉立一身閒花院拆了千秋院宇空無人楊栁自春風薔薇性野難拘束却過鄰家屋上紅以上詩林萬選牽牛花西風樵子谷藤蔓絡柴闗名在星河上花開曉露間秋空同碧色曉日轉紅顔若挂青松頂翛然不可攀全芳備祖與東與東字賓暘嚴陵人太祖十世孫宗學上舎寶祐丙辰進士厯任贑州教兩浙運幹㑹子庫檢察司農寺排岸班改奉議有魯齋小槀方萬里序君詩瘦而不枯勁而不燥如趙章泉評君詩以為唐唯有一孟東野宋唯有一陳無巳然後知君之志慕貞曜後山之為人甘于厄窮静退而無求者也次韻方萬里雨夜雪意芋火房隂處翛然類嬾殘雨欺梅影瘦風助竹聲寒擁袂衣全薄哦詩字欲安兒童疑有雪頻起穴窗看次韻方萬里寒甚送酒連日寒殊甚衰年無一能硯呵磨墨凍瓶曬插花氷浮世無根絮餘生有髪僧蘇門如可即端合事孫登以上瀛奎律髓孟堅孟堅字子固號彞齋太祖十一世孫其先以安定郡王從髙宗南渡家于嘉禾之廣陳寶慶二年進士厯官朝散大夫嚴州守景定初遷翰林學士宋亡不仕齊東野語子固襟度蕭爽有六朝諸賢風氣時比之米南宫而子固亦自以為不歉也酷嗜法書多藏三代以來金石名迹東西薄㳺必挾所有以自隨一舟横陳僅留一席為偃息之地隨意左右取之撫摩吟諷至忘寢食所至識不識望之知為米家書畫船也偶客輦下㑹菖蒲節余偕一時好事者邀子固各攜所藏買舟湖上相與評賞飲酣子固脱帽以酒晞髪箕踞歌離騷旁若無人薄暮入西泠掠孤山檥櫂茂樹間指林麓最幽處瞪目絶呌曰此真洪谷子董北苑得意筆也鄰舟數十皆驚駭絶歎以為真謫仙人姚桐夀樂郊私語子固入本朝不樂仕進隠居州之廣陳鎮時載一小舟泊蓼汀葦岸看夕陽賦曉月為事縣令宣城梅黻到船訪公公飛櫂而去梅曰昔人所謂名可聞而身不可見殆謂先生歟公從弟子昂自苕中來訪公閉門不納夫人勸之始令從後門入坐定第問弁山笠澤近來佳否子昻云佳公曰弟奈山澤佳何子昻退使人濯其坐具里中康節菴畫墨梅求詩因述本末以示之逃禪祖花光得其韻度之清麗閒菴紹逃禪得其蕭散之布置回視玉面而鼠鬚已見工夫較精緻枝枝例作鹿角曲生意由來端若爾所傳正統諒末節舍此的傳皆偽耳僧定花工枝則麁夢良意到工則未女中卻有鮑夫人能守師繩不輕墜可憐聞名不識面云有江西畢公濟季衡麁醜惡拙祖弊到雪篷觴濫矣所恨二王無臣法多少東鄰擬西子是中有趣豈不傳要以眼力求其㫖踼鬚止七萼則三㸃眼名椒梢鼠尾枝分三疊墨濃淡花有正背多般蘂夫君固巳悟筌蹄重説偈言吾亦贅誰家屏障得君畫更以吾詩跋其底康不領此詩又有許梅谷者仍求又賦長律濃寫花枝淡寫梢鱗皴老榦墨微焦筆分三踼攅成瓣珠暈一圓工㸃椒糝綴蜂鬚凝笑靨稳拖鼠尾施長條盡吹心側風初急猶把枝埋雪半銷松竹襯時明掩映水波浮處見飄颻黄昏時候朦朧月深淺溪山長短橋鬧裏相挨如有意静中背立見無聊筆端的皪明非畫軸上縱横不是描頓覺坐來春盎盎因思行過雨瀟瀟從頭總是楊湯法􅂸下工夫豈一朝王翠巖寫竹求詩亦與古畫畫物無定形隨物賦形皆廹真其次師述有師繩如印印泥隨前人尚疑屋下重作屋叅以新意意乃足晉魏而來幾百年羲獻斷弦誰解續何况髙束李杜編江湖競買新詩讀願君種取渭川一千畆飽飯逍遥歩捫腹風晴煙雨盡入君心胷吐出毫端自森肅員大夫來子章何碌碌竹墨蘭圖仍賦六月衡湘暑氣蒸幽香一噴冰人清曾將移入浙西種一歳纔花一兩莖自題水仙圖自欣分得櫧山邑地近錢清易買花堆案文書雖鞅掌簮缾金玉且奢華酒邊巳愛香風度燭下猶憐舞影斜礬弟梅兄來次第攙春熱鬧令君家以上鐵網珊瑚法忍寺門夜泊秋泊禪扉夜清吟入興頻風生水鱗甲雲放月精神小夢迷香樹新涼透葛巾舊題尋不見吹徧壁間塵柘上遺詩孟淳孟淳字子真號竹所又號虚閒野叟子固之弟題髙房山夜山圖二首月底江山如書一好樓中几席與秋清剡藤不到髙人手一段風流可得成江行山立月盤桓有客無言樓上看清興肯隨城漏盡夜深風露恐髙寒鐵網珊瑚士掞士掞字才孺太宗五世孫官直祕閣登天清閣夕陽低盡巳西紅百尺樓髙萬里風白髪年年何處得只應多在倚䦨中墨莊漫録不敏不敏太宗六世孫官保義郎寄蘇盼奴事載蘇小娟詩當時名妓鎮東吳不好黄金只好書借問錢塘蘇小小風流還似大蘇無武林紀事不譾不譾字師厚太宗六世孫慶元中昭武假守句信史賖青簡封章窒皂囊揮麈餘話跋王仲言學問該博遂初尤丈欲收寘史館不果仲言又嘗剴切上封事不譾因不自揆以拙句殿諸公後云云善應善應字彦逺太宗七世孫汝愚父寓居崇徳洲錢市題寧師西閣飄泊南來幾歳寒追談往事漫心酸雲烟暮隔中原望歸折梅花忍淚看次韻李長卿一别芳洲不計年舊時攀折栁依然故人似欲撩詩興賸折梅花向酒邊至元嘉禾志善贛善贛太宗七世孫題岑公洞真人邈何之恍忽不可見洞居獨嵌空壁留明珠濺藤蘿含冥濛竹柏鬭蔥蒨至幽合人心逺翠落江面野老乗籃輿使君肆清燕日影砌下倒雲容坐間變大木巖欲傾䆳壑路微轉峥嶸施屏風㸃綴成彩絢雖云急行樂勝賞殆亦徧欲歸重盤旋拂石看古篆名勝志善堅善堅字徳固袁州人太宗七世孫乾道二年進士判婺州官至户部尚書化成巖低帽白蕉衫跨馬北巖路為我撤炎歊時有清風度杖䇿躡㳺屐捫蘿窮幽趣怪石鳴瘦笻狹徑窘危歩雲間啟深洞玲瓏天巧露僧居羅上下鐘聲荅晨暮長嘯排翠靄圍棊驚振鷺陶寫屏絲竹恐為風景汙拂蘚題蒼崖縱横醉中句兹㳺豈易得載酒莫辭屢江西通志善沛善沛字濟世太宗七世孫淳熙二年進士終南康守對雪兒笑真珠滿盤碎女疑荷葉雨中來道人心下無些事三箇柴頭品字煨名勝志善倫善倫字季思太宗七世孫多景樓壯觀東南二百州景於多處更多愁江流千古英雄淚山掩諸公富貴羞北府如今唯有酒中原在望忍登樓西風戰艦今何在且辦年年使客舟梅磵詩話全篇警拔江湖間多稱之或以為劉改之詩誤矣善扛善扛字文鼎號解林居士太宗七世孫春詞碧落初明月未收露華香滴杏梢頭玉䦨干外東風輭人在重雲第幾樓詩家鼎臠善䚮善䚮號復齋太宗七世孫㳺大滌黄簾有影金燈暗碧殿無人玉磬清我亦三生羽衣客夢魂久巳到瑶京洞霄詩集善璙善璙太宗七世孫家南海餞陳帀峰之亷泉桃源𣺌何處夢短到家難不辦一邱費猶為九品官鶴嫌新俸薄鷗訝舊盟寒附翼攀鱗事書生不敢干四朝詩汝愚汝愚字子直太宗子漢恭憲王元佐七世孫居饒州之餘干縣擢進士第一光宗朝累除同知樞密院事寧宗朝權叅知政事拜光禄大夫右丞相為韓侂胄所忌責授寧逺軍節度副使永州安置至衡州暴薨後贈太師追封沂國公諡忠定配享寧宗廟庭送汪尚書大猷歸鄞尚書天官貴持經侍幃幄青㝠欲無際白首非故約連檣動南浦父老望巖壑下車入里門執手問歡樂十年幾風雨寒雞呌屋角勤勞畢吾分帝賚出寵渥殊適奉香火禁直連六閣遂令宣室思從今問晦朔寧波府志同林擇之姚宏甫㳺皷山在閩縣幾年奔走壓塵埃此日登臨亦快哉江月不隨流水去天風直送海濤來故人契闊情何厚禪客飄零事已灰堪歎人生秪如此虚䦨獨倚更徘徊鼓山志致爽軒濃隂夾道水流渠吹盡殘花不復餘唯有范家三畆竹青青依舊色侵書全蜀藝文志汝談汝談字履常號南塘太宗八世孫居餘杭淳熙十一年進士累官至西外宗正理宗時厯給事中權刑部尚書卒諡文懿後村詩話本朝全盛時宗室貴顯而負詩名者有徳麟近歳有南塘兄弟詩工而命窮者有紫芝仲白而南塘遂為一代騷人之宗環錦亭臨安俞氏園與子鄉鄰信有年故王遺事到今傳爽鳩邑改風煙在散騎園分水竹偏髙架插書供夜讀滿堂戲綵敵春妍相如可是區區者戲筆題詩亦偶然咸淳臨安志翠蛟亭和鞏栗齋韻幽亭枕蒼峽雲竇通曲水百折如建瓴㶁㶁鳴不止客來一抽鑰白霧噀巖底儵翕千文蛟拏空翠濤起天開混沌竅日洗盤古髓諒匪畜池鱗多應化雷尾憑陵氣易壯怖蕩辭難侈術假金洞光景逾瑶臺泚誰云㳺方外巧異緇塵裏坡仙頗年數覿面猶尺咫采句貴自然鞏言良是巳珍題豁靈界篆出蕃君里物生亦倚數有形必有靡道人亦多事浮念何時死余生嗜泉藪痼疾牽硯几太息動静機于何寄真理醉倒和滄浪煩君更詳此洞霄詩集汝諿汝諿太宗八世孫居餘杭慶元五年進士題翠蛟亭百丈寒蛟下翠庭幽人相對覺風生䦨干小倚飛觴處一曲松風亂雨聲洞霄詩集汝鐩汝鐩字明翁袁州人太宗八世孫嘉泰二年進士曾官漕帥有野谷詩集劉後村跋云明翁詩兼衆體而又徧行吳越百粤之地眼力益髙筆力益放巻中歌行跌宕頓挫剸蛟縳虎手也及斂為五七言則又妥帖麗密若唐人鍜鍊之作小水寺披霧入野寺寒林響西風誰遣僧出迎山鳥為我通染衣松露香照眼巖花紅聊此息塵慮歸騎毋悤悤訪隠者不遇兩腋乗西風送我上髙岑竹根一泉通石徑萬木森中有隠者居敗屋莓苔侵山空人不見雲滿挂壁琴兩鶴出候我逢迎啄衣襟應酬久頗厭走避不可尋誰伴山下去明月升髙林去婦詞入得良人門自誓終此身掃室擁箕帚進盥躬盤巾采桑趨壠首薦蘋潔澗濱十年盡婦道唯恐堂上嗔上和下睦本無事一旦小姑恣萋菲浸潤既深貝錦成不棄不出譛不巳良人繾綣心自知父母之命安敢違舉頭天邊指缺月暫缺須有團圓時君不聞章臺長條依舊垂樂昌半鏡還復歸舟中繋䌫停征櫂斜陽古渡頭風霜先逺客天地獨扁舟水鳥衝開浪汀鴻占斷秋在家貧亦好何用出林邱送彦東還湘湘南多爽處羨子片帆還秋影清涵水煙痕淡著山蘭風香楚佩竹淚冷湘斑見説誅茅地江頭只數間劉簿約㳺廖園名園新整頓尊酒約追隨春晩花飛少牆髙蜨度遲注湯童煖酒拍案客争棊寂寞秋千索無人盡日垂舟中離家俄十日千里獨衰翁篷響過雲雨帆開逆水風新沙增岸脚小港隠蘆叢客思難消遣黄昏月一弓題合江亭石鼓山頭一小亭乾坤萬里眼䨇明雖因刺史能尋勝不遇昌黎豈得名衡嶽雲開天洗碧蒸江湘合水争清書巖莫辨當時事空積塵泥野草生自注昌黎題合江亭寄刺史鄒君詩末有願書巖石上勿使塵泥涴之句懐亨父兩年隻影瀟湘去料想塵埃白髪侵久雨千山秋得意西風一鴈客闗心或于夢裏陪談笑每向人前問信音憶昔賡詩巖桂下花開今日歎孤斟以上野谷集汝湜汝湜號澹軒太宗八世孫居餘杭嘉定元年進士敬和陳南渠先生九鎖歩虚詞并引藏按九鎖為天闗雲飛鸞通真龍唫洞微雲璈朝元凌虚今存二首竊聞天秉陽徳而九為老陽故仙道宗陽而取數皆九内景含氣以九為節金丹大還九轉為寶其在于人爰有九宫上應列㝛是為九曜圜則九重豈非陽數之極而仙真所居者乎天柱洞天外環九鎖神造靈設仰模璇霄此固五帝真㳺列仙窟宅之地也山秀水清鉤綿奇絶飛舉之士疇昔接踵而我曾外祖寢虚先生即陳留良實以童年傳道洞微隠迹吳山修煉内丹心樂此地時與髙人幽士徜徉往來浴冷泉而白雲生寢石牀而丹氣炳靈異之迹不可具述故舅氏南渠居士猶踵清風守一髙蹈暇日因即九鎖聲之歩虚用標靈境以告來者汝湜辛酉仲秋因獲陪侍杖屨撫松拂石即景長吟輙爾和韻用汚清唱之末寄之名山用識于他日也天闗鎖雲墉髙嵯峨七蕤銜銅環有象非有質真儔得躋攀九天著通籍保我玉鍊顔英英青旄節悠悠欵靈闗龍吟鎖矯首東方宫變化何由尋神用妙難擬飇電赤森森雨施不為功雲從本無心人寰謾懐想戞鉢希雷吟題洞霄洞府日月閑風景自清楚九闗啟天鑰容我朝帝所清縁宿仙館夢破石泉雨明朝得羊珠試向張華語以上洞霄詩集汝讜汝讜字蹈中號嬾菴汝談之弟以祖䕃補承務郎登嘉定元年進士累遷司農丞知温州題㑹春苑草荒故苑幾春風尚想花開春樹紅欲問當時馬王事寂寥殘照野亭中後村詩話翠蛟亭和鞏豐韻衆峰抱蒼龍蟠屈翠蛟水放之兩崖間奔洶不得止濤瀾生席上雷電轉石底恍疑天柱揺將拔隂洞起蘇公雄氣壓詩骨得仙髓指揮驅鯤鯨赫變動其尾紛紛下土人蟻垤自封侈驟觀目精眩筆墜汗流泚坐令空谷嘯聲徹霄漢裏君來松根吟仙者相去咫老蛟破鎖去餘怒猶未巳決開澗千文散作霧五里今年溪湖乾草莽生意靡寸泉落山苗靈鑰起垂死遺吾雲子飯報汝青玉几野人尋泉竇筒壊方復理泓然山巔池冬夏常若此洞霄詩集汝回汝回字幾道永嘉人太宗八世孫嘉定七年進士終主管進奏院凌霄花嫋嫋枯藤淺淺葩夤縁直上照殘霞老