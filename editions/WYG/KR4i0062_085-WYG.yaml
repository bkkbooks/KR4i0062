詩賞劄云效休文之八詠知類農歌拔毛遂于衆中允髙匠目矧謝池僅止五字而魯語尤戒多為首而録全思則過半恭惟執事䨇桐政美五栁門深續雅道于一綫之餘亦言其興尋吟盟于千里之外夫豈無人乃采艱辛之辭特置次癸之列月泉分貺雲壑懐慙某夢斷鈞天心㳺樂地視元頴可為至寶奚有于今裁白苧而製深衣于焉學古必拆必拆杭人太宗十世孫白雲社月泉吟社第三十名自署愛雲仙友前題一段佳山水芳時事正一作事妍犢耕青燒雨鶴卧碧桃烟社老邀嘗煮鄰僧伴摘鮮莫嫌陶令拙農圃得餘年評缺月泉吟社愛雲仙友回詩賞劄云田園歸隠夙欽彭澤之髙風筆硯久荒難得石湖之秀句不慙鄙劣冐爾擬騷誤辱甄收敢言奔殿敬惟執事山林富貴軒冕錙銖釣月耕雲詎輸製錦傍花隨栁雅稱調琴可見知幾之老成居然逺世而肥遯遹憑佳興用拂清人餌絲枲釣江湖貨元頴貿珠璧此意古矣其利溥哉某溝壑餘生泥塗下士有懐農圃靡就犂鉏兹效顰唐士之五言恰輳足周南之一轂僅逃孫外免媿盧前自謂狂吟思復青氊而逺矣或云駝榜㑹歌白苧以邀之必橦必橦東嘉人太宗十世孫題梅山一隠吳門訪北山深憐漢鼎尚多艱片言儻得回天聽未必仙名滿世間梅仙事實必漣必漣字仲連崇安人太宗十世孫有倚梅吟稾濯足小橋坐濯足澗狹水流急源頭夜雨多落花漾紅濕崇安縣志䶵之䶵之字子雍魏王廷美五世孫少學于陳無已有句法春日拂牀攲枕畫初長好夢驚回燕語忙深竹有花人不見直應風轉得幽香墨莊漫録句風生閶闔春來早月到蓬萊夜未中大觀初代府尹宋喬年上元應制耆舊續聞公碩公碩浚儀人魏王六世孫餘杭令慶元四年五月再㳺洞霄宫舊時曾此覓仙縁一别于今四十年白髪重來嗟老矣青山九鎖故依然肩輿直入松間路洗耳還聽澗底泉幽興未䦨吟未就半峯斜日下平川洞霄詩集彦端彦端字徳莊魏王廷美七世孫乾道淳熙間以直寶文閣知建寧府終左司郎官有介菴集夀皇太子九月四日日日龍樓問寢時雞人未動漏聲遲前星一㸃朝天帝只有清臺太史知子晉吹笙未是仙阿丕横槊少全篇小吟青著梅梢句一日東風四海傳大安宫裏漆園椿子榦孫枝葉葉新今日四株髙下碧相承一樣八千春光堯初御六龍天上直維參大火躔天意分明昌宋徳誕辰三世總丁年西湖志餘淳熙中孝宗及皇太子朝上皇于徳夀宫周益公詩云一丁扶火徳三合鞏皇基盖髙宗生于大觀丁亥孝宗生于建炎丁未光宗生于紹興丁夘故也隂陽家以亥夘未為三合夀張守堂堂天上張公子龍劍分光自斗牛海上忽歸槎萬里雲間未放月中秋才為漢殿無䨇手恩到閩中第一州亦有人言識仙骨不知何日是封留以上聖宋名臣獻夀集夀皇孫前星炳煥領孫星環拱中天日兩輪四葉重光同聖世千秋佳節近生辰本支秀茂旦復旦典學熙明新又新喜入威顔天一笑夀觴分賜一枝春合璧事類前集崇安道中風栁踈無力秋花冷不香客情隨去燕涼思起嗁螿地入閩山隘天連越樹長年年𢷬衣石為爾感征裳詩林萬選玉真臺在徳興縣治後彦端為令時作春色無窮巷農鄉有太和病嗟聞道晩貧喜得閑多徑草徐供歩鄰花䕶屢過層臺宜抗榭誰為買烟波饒州府志彦假彦假字顯父魏王七世孫居閩慶元二年進士翠蛟亭和鞏栗齋韻天下名洞天有山必有水餘杭山水窟神仙所棲止仙人乗雲去玉蛟留潭底至今雷雨夕蛟睡時驚起爪劈巖石裂石罅滳乳髓涓涓泉流出半垂白鳳尾風來琴筑響月照纓絡侈曲折納深池徹底清且泚築亭當澗衝木石相表裏翠壁潤含烟層峯去天咫道人幻出奇指顧猶未巳忽驅蛟走鬬瞬息八百里怒氣挾奔霆草木為披靡兒童驚震掉面若槁灰死達人本大觀談笑自隠几須臾羣動息静坐窮物理水石本無心相激一至此洞霄詩集䈣夫䈣夫字仲禮居鄞魏王八世孫觀文殿學士彦逾子紹熙四年進士寶慶初直祕閣為湖南憲題化成巖塵世有仙境清絶不可言寒江露沙迹曉嶂埋雲根暇日推吏案呵道穿僧門來飲巖下水何必擕芳尊袁州府志立夫立夫字徳成樂清人魏王八世孫開禧元年進士官至刑部尚書臘日偶書近日斗侵寅南天雪不成梅梢動生意禽鳥弄春聲鬢逐年華換身資藥力輕聽傳呉蜀事對酒不能傾東甌詩集潜夫潜夫字景夀號鶴所黄巖人魏王八世孫嘉定十六年進士寶慶初監澉浦鎮税弦風亭怪他蟹舎蠔房地不是吟情住亦難數尺短牆圍晝寂半鉤疎箔障春寒水生草滿蛙鳴合日薄花隂鶴夢安底處青衫病司馬浩歌東望取琴彈澉水志庚夫庚夫字仲白寓居興化軍魏王八世孫舉進士不第以宗子取應得右選趙紫芝為晩唐詩名冠四靈而仲白亞紫芝劉後村擇百篇為山中集并誌其墓劉後村跋仲白于古體寓其髙逺于大篇發其精博于短章窮其要妙歳除即事連夜縫紉辦今朝杵臼頻買花簮穉女送米贈窮鄰宦薄唯名在年華與鬢新桃符詩句好恐動往來人瀛奎律髓讀曾茶山詩集茶山八十二癯仙千首新詩手自編吟到瘴烟因避㓂貴登從橐只棲禪新于月出初三夜淡比湯煎第一泉咄咄逼人門弟子劍南巳見祖燈傳梅磵詩話紹興末曾茶山卜居于越得禹迹寺東偏空舎十許間居之手種竹盈庭日讀書賦詩其中公平生清約不營尺寸之産所至寓僧舎蕭然不蔽風雨公詩有曰手自栽培千箇竹身常枕藉一牀書盖寓居時所賦也公年雖髙吟詠猶不輟莆田趙仲白讀公詩集有詩云云盖山隂陸務觀實從公學詩陸有劍南集行于世故末句及之落魄落魄蕉衫戴道冠菖蒲滿案浸清寒有錢即買丹砂鍊無病猶將素問看連日㳺山僧共住頻年乞米鶴同飡世間不朽非鍾鼎曾與髙人静處觀詩家鼎臠句鶴殘籬外筍鼠䑛墨中膠稍得詩句日從窗眼寫墨丸夜入枕頭收寄僧貴耳集密夫密夫號竹溪魏王八世孫晉江人紹定二年進士三脱麫筍蕈初萌杞藥纎然松自煮供親嚴聞人食肉何曾鄙自是山林滋味甜山家清供瑻夫瑻夫號巖雲魏王八世孫寄林可山好春虛度三之一滿架荼䕷取次開有客相看無可設數枝帶雨摘將來山家清供時伐時伐魏王九世孫種蘭深林瘦徑傲朝昏牙髪消疎氣骨存九畹誰移炎海角半庭新補冷雲痕浦翁認葉非漳種墨客知花是楚魂從此國香春不斷光風滿地長兒孫後村千家詩時瓈時瓈魏王九世孫丹陽令題陳少陽先生上書稾後虜騎昔長驅髙屋建瓴水權姦誤國家和議甘骩骳遂令九廟尊冒没在棘枳帶甲百餘萬一嘯自披靡堂堂諫議公屹若頽波砥叩閽斥時宰不惜用一死此死不足道聞者自興起一朩支大厦于時不可爾使早定大計何物摩闕壘可憐紹興間賻贈官其子我得覩遺稾感慨寧已矣千載凛如生作者書于紙盡忠録附時儋時儋號竹所魏王九世孫西禪餞董溪翁西浦風寒水自流迢迢行李又歸休今宵古寺吟邊酒明日長江客裏舟溪路梅花催雪興旗亭竹色伴雲愁還家更為明時出莫向漁磯老釣鈎詩林萬選時煥時煥字元晦晉江人魏王九世孫嘉定十二年進士官廣東運判九日山送客頻來因送客擕酒訪仙靈歸去成何事重來媿此亭天寛野水白松潤石崖青倚杖思今古寒鷗落逺汀南安縣志若槸若槸字自木號霽山崇安人魏王十世孫咸淳十年進士武夷茶石乳霑餘潤雲根石髓流玉甌浮動處神入洞天㳺髙元濬茶乗即事雲散春山出人閑白晝長禽聲荅空谷樹影畫斜陽種果秋期實澆花趁晩涼行藏天巳定隨分且徜徉遇樵川林時中建水樵川隔幾重相逢孰意大江東客行芳草斜陽外春在柔桑小麥中細雨疎田流水碧殘霞擁樹逺林紅浮生聚散渾無定有酒何訪一笑同暮春香透蜂房蜨夢殘一簾新雨又春䦨栁腰瘦得難禁舞今夜東風莫更寒以上崇安縣志宋詩紀事巻八十五
