body:
  text: 宋詩紀事巻八十六錢塘厲鶚撰錢俶俶字文徳吳越武肅王鏐孫文穆王元瓘子大將胡進思等廢忠遜王倧立之建隆元年授天下兵馬大元帥太平興國三年詔俶來朝納土歸京師封許王徙封鄧王薨追封秦國王諡忠懿有詩數百首號政本集宫中作廊廡周遭翠幙遮禁林深處絶喧譁界開日影憐窗紙穿破苔痕惡筍芽西第晩宜供露茗小池寒欲結冰花謝公未是深沈量猶把輸贏局上誇汝帖李煜煜字重光初名從嘉南唐元宗李璟第六子諸兄早亡以次為嗣在偽位十有五年歸宋封違命侯授左千牛衛上將軍太宗登極改封隴西公太平興國三年薨追封吳王以王禮葬洛京之北邙山有集五朝故事李後主時建康市中染肆之旁多題曰天水碧尋而皇家蕩平之悉前兆也天水碧因煜之内人染碧夕露于中庭為露所染其色特好遂名之石林燕語太祖嘗因曲宴使煜誦其得意詩遂舉詠扇揖讓月在手動揺風滿懐以對太祖曰好一箇翰林學士李煜若以作詩工夫治國事西清詩話藝祖言豈為吾虜也送鄧王二十弟牧宣城且維輕舸更遲遲别酒重傾惜解擕浩浪侵愁光蕩漾亂山凝恨色髙低君馳檜檝情何極我凭䦨干日向西咫尺煙江幾多地不須懐抱重凄凄馬令南唐書王名從益出鎮宣州後主率近臣餞綺霞閣賦詩自為序其畧云秋山滴翠暮壑澄空愛公此行暢乎遐覽漁父詞浪花有意千里雪桃花無言一隊春一壺酒一竿鱗世上如儂有幾人一棹春風一葉舟一輪繭縷一輕鉤花滿渚酒滿甌萬頃波中得自由古今詩話悼周后又見桐花發舊枝一樓煙雨暮凄凄凭䦨惆悵人誰㑹不覺潸然淚眼低層城無復見嬌姿佳節纒哀不自持空有當年舊煙月芙蓉池上哭蛾眉嘗與周后移植梅花于瑶光殿之西及花時而后巳殂因成詩見意殷勤移植地曲檻小欄邊共約重芳日還憂不盛妍阻風開歩障乗月溉寒泉誰料花前後蛾眉却不全失却烟花主東君自不知清香更何用猶發去年枝書靈筵手巾浮生苦憔悴壯歳失嬋娟汗手遺香漬痕眉染黛烟書琵琶背侁自肩如削難勝數縷絛天香留鳳尾餘煖在檀槽馬令南唐書後主昭惠后周氏大司徒宗之女甫十九歳歸于王宫通書史善音律尤工琵琶元宗賞其藝取所御琵琶時謂之燒槽者賜焉後主即位册為國后後主嘗演念家山破后復作邀醉舞恨來遲新破皆行于時季子仲宣后尤鍾愛忽暴疾卒后病遂亟以元宗所賜琵琶及嘗臂玉環親遺後主沐浴正妝自内含玉殂于瑶光殿之西室享年二十九後主哀苦骨立杖而後起每于花朝月夕無不傷懐觸物寓意多為詩云云悼㓜子瑞保永念難消釋孤懐痛自嗟雨深秋寂寞愁引病增加咽絶風前思昏朦眼上花空王應念我窮子正迷家馬令南唐書宣城公仲宣後主子也小字瑞保三歳讀孝經若成誦然聞奏樂輙審音調宫中燕侍頗合禮度出見士大夫改容顧揖如成人禮乾徳二年卒年四歳始封宣城公追贈岐王諡懐獻時昭惠病劇後主恐重傷其意黙坐飲泣因為詩以寫志吟咏數四左右為之泣下宣城公挽辭珠碎眼前珍花凋世外春未銷心裏恨又失掌中身玉笥猶殘藥香匳已染塵前哀將後感無淚可霑巾豔質同芳樹浮危道畧同正悲春落實又苦雨傷叢穠麗今何在飄零事巳空沈沈無問處千載謝東風馬令南唐書昭惠先病聞仲宣死哀苦增劇遂至于殂故後主并其母子悼之歸宋渡江作江南江北舊家鄉三十年來夢一場吳苑宫闈今冷落廣陵臺殿已荒涼雲籠逺岫愁千片雨打歸舟淚萬行兄弟四人三百口不堪閒坐細思量病中感懐憔悴年來甚蕭條益自傷風威侵病骨雨氣咽愁腸夜鼎唯煎藥朝髭半染霜前緣竟何似誰與問空王以上馬令南唐書詠柳書黄羅扇賜慶奴風情漸老見春羞到處銷魂感舊游多謝長條似相識強垂烟態拂人頭邵博聞見後録南唐李侯撮襟書宫人慶奴扇云云蓉塘詩話茶所雜録云此後主歸命後所作病中書事病身堅固道情深宴坐清香思自任月照静居唯擣藥門扃幽院只來禽庸醫嬾聽詞何取小婢將行力未禁頼向空門知氣味不然煩惱萬塗侵方虚谷云李後主號能詩詞集中多有病詩憔悴衰颯似貧士大夫宜其亡也秋鶯殘鶯何事不知秋横過幽林尚獨㳺老舌百般傾耳聽深黄一㸃入烟流棲遲背世同悲魯瀏亮如笙碎在緱莫更留連好歸去露華凄冷蓼花愁以上唐音戊籖題金樓子後并序梁孝元謂王仲宣昔在荆州著書數十篇荆州壊盡焚其書今在者一篇知名之士咸重之見虎一毛不知其斑後西魏破江陵帝亦盡焚其書曰文武之道今夜盡矣何荆州壊焚書二語先後一轍也詩以慨之牙籖萬軸裹紅綃王粲書同付火燒不是祖龍留面目遺篇那得到今朝楓窗小牘云此詩同書藏内庫今朝字誤作金朝徽庿惡而抺之後竟如䜟入金句鶯狂應有恨蜨舞已無多老學菴筆記後主作此未幾亡國人生不滿百剛作千年畫野客叢書鬢從近日添新白菊是去年依舊黄任淵陳后山詩注李從善從善字子師元宗第七子封韓王入宋改封楚國公陸㳺南唐書韓王從善因留京師後主手疏求歸國太祖不許後主素友愛每憑髙北望泣下霑襟由是歳時㳺燕多罷不講常製却登髙文揮麈後録王景彞故第在京師太子巷初開寶間江南後主遣其弟從善入貢留不遣建宅以賜故都人猶以太子目之也薔薇一首十八韻呈東海侍郎徐鉉緑影覆幽池芳菲四月時管弦朝夕興組繡百千枝盛引牆看徧髙煩架屢移露輕濡綵筆蠭誤拂吟髭日照玲瓏幔風揺翡翠帷早紅飄蘚地狂蔓挂蛛絲嫩刺牽衣細新條窣草垂晩香難暫捨嬌態自相窺深淺分前後榮華互盛衰尊前留客久月下欲歸遲何處繁臨砌誰家密映籬綘羅房燦爛碧玉葉參差分得殷勤種開來逺近知晶熒歌袖袂柔弱舞腰支膏麝誰將比庭萱自合嗤勻妝低水鑑泣淚滴煙􅠨畫擬憑梁廣名還亞楚姬寄君十八韻詩拙媿新奇全唐詩李從謙從謙元宗第九子後主母弟也風采峭整喜為律詩動有規誨封吉王宋改封鄂國公觀棊竹林二君子盡日竟沈吟相對終無語争先各有心恃強斯有失守分固無侵若算機籌處滄滄海未深馬令南唐書後主燕閒與侍臣奕從謙時數歳侍側命賦觀棊詩云云歎賞久之孟昶昶字保元後蜀髙祖第三子嗣偽位三十二年宋師破成都納降歸于汴京封開府儀同三司檢校太師兼中書令秦國公乾徳三年薨冊贈尚書令追封楚王諡恭孝避暑摩訶池上作冰肌玉骨清無汗水殿風來暗香滿簾開明月獨窺人欹枕釵横雲鬢亂起來瓊户寂無聲時見疎星渡河漢屈指西風幾時來不道流年暗中換漫叟詩話錢唐有一老尼能誦後主詩云云忘東坡洞仙歌序云僕七歳見眉州老尼姓宋其名自言嘗隨其師入蜀主孟昶宫中一日大熱蜀主與花蘂夫人夜起避暑摩訶池上作此詞具能記之句新年納餘慶嘉節號長春蜀檮杌蜀未亡前一年歳除日昶令學士幸夤遜題桃符版于寢門以其詞非工昶命筆自題云云蜀平朝廷以吕餘慶知成都長春乃太祖誕聖節名也其符合如此宋詩紀事巻八十六
