body:
  text: 宋詩紀事巻九十六錢塘厲鶚撰南鄭殿丞句青鳥幾傳王母信白鵝曽換右軍書楊文公談苑太學生和張乖崖四窗滅盡讀書燈窗外唯聞步鐸聲辜負江山好明月閒來此地趁虚名晁氏客語李善寧子貧家壁椒氣從何得燈光鑿處分拖涎來藻飾唯有篆愁君清異録臨川李善寧之子十歳能即席賦詩親友嘗以貧家壁試之畧不構思拖涎指蝸牛也蜀州録事參軍句秋光都似宦情薄山色不如歸興濃夢溪筆談張忠定知成都有録事參軍投牒乞致仕仍獻一詩云云忠定稱賞還牒禮為上客楊黎州句山川百蠻國雨露九天書赦至胡越自為迢遞國參商元是别離星寄逺剛腸欺竹葉衰鬢怯蘆花自詠人歸漢后黃金屋燕在盧家白玉堂春晝楊文公談苑陳彭年甥題黃敕背彭年頭腦太冬烘眼似朱砂鬢似蓬紕繆幸叨三字内荒唐仍在四人中取他權勢欺明主落却親情賣至公千百孤寒齊下淚斯言無路達堯聰江南野録陳彭年大中祥符間同知貢舉省牓出有甥不預選怒入其第㑹彭年未來于几上得黄敕乃題其背云云彭年怒抱敕入奏章聖見而不悦然釋其罪錢唐尉謝杭州守王公當年同試大明宫文字雖同命不同我作尉曹君作相東君元没兩般風揮麈餘話王文穆欽若以故相來守杭州錢唐一老尉蒼頭華髮矣文穆初甚不樂詢其履歴乃同年生惻然哀之遂封章于朝詔特改京秩尉以詩謝之幕僚贈魏野怪得名稱野元來性不羣借冠來謁我倒屣起迎君温公續詩話野少時未知名嘗題河上寺柱云數聲離岸櫓幾㸃别州山時有幕僚本江南文士也見之大驚邀與相見贈詩云云仍為之延譽由是人始重之高士贈种放接得山人號舍人朱衣前引到蓬門莫嫌野䔩無多味我是三追處士孫池北偶談种放賜告西歸有一高士隠居三世以野䔩一盤詩一章贈之江上漁父句十年江上無人問兩手今朝一度义春渚紀聞闗子東云范希文常于江上見一漁父意其隠者也問姓名不對留詩一絶而去記其兩句葛通議葛通議丹陽人侍郎立方之曽祖失其名句藻思舊傳青管夢哲科新試碧雞才乍依平仲蓮花幕更下温郎玉鏡臺韻語陽秋蔡君謨娶余祖姑清源君巳而赴漳南幕余曽祖通議贈詩云云可謂佳句矣李殿丞李殿丞氾水人餞魏主簿廣席上作今日不知明日事人情反覆似車輪我今自是飄萍客更向長亭作主人聞見前録李殿丞與主簿素相好嘉祐中李攝河南倅檄廣權幕官相從益歡監司以燕㑹數俱罷歸故官廣先去李餞之云云曹南院幕客獻曹南院賢守新成蓋代功臨危方始見英雄三都谷路全師入十萬胡塵一戰空殺氣尚疑横塞外捷音相繼徧寰中君王看降如綸命旌節前驅馬首紅後山詩話曹南院為秦帥唃氏方興舉國入寇公自出禦之戰于三都谷大敗之唃氏遂衰其府幕獻云云蓮池生題龍眠畫鬼章牽錦膊驄漢武愛名馬將軍出西征蹀血幾百萬侯者七十人區區僅得之登歌告神明後來龍眠子心通大宛城落筆動九州俊氣横四溟迢迢歴萬里矯首瞻彤庭不假貳師力汲黯何庸争重譯自朝貢天王今聖明式古堂書考縣尉荅舉人索米五貫九百五十俸省錢請作足錢用妻兒尚未厭糟糠僮僕豈免遭飢凍贖典贖解不曽休喫酒喫肉何曽夢為報江南癡秀才更來謁索覓甚甕夢溪筆談嘗有一名公初任縣尉有舉人投書索米戲為一詩荅之熙寧中例増選人俸錢不復有五貫九百俸者此實養廉隅之本也洪浩父寄子太學何蕃且一歸十年甘旨誤庭闈休辭客路三千逺須念人生七十稀腰下雖無蘇子印篋中幸有老萊衣歸時定約春前後免使高堂賦式微蓉塘詩話餘杭進士洪浩熙寧中游太學十年不歸其父作詩寄浩浩得詩即日歸養陜府知縣戲書僧房窗紙爾非慧逺我非陶何事窗間酒一瓢僧野避人聊自醉臥看風竹影蕭蕭王暐道山清話范堯夫帥陜府有屬縣知縣因入村至一僧寺少憩旣飯步行廊廡間見一僧房頗雅潔閴無人聲案上有酒一瓢知縣者戲書一絶于窗紙云云不知其僧俗家先有事在縣理屈作罪明日其僧乃􅎒取窗字黏于狀前訴于府且曰我有施主某人昨日攜酒至房中值某不在房知縣旣至施主走避酒為知縣所飲不辭但有數銀杯知縣旣醉不知下落銀杯但有鐫識今施主迫某取之乞追施主某人與㕔吏某人鞫之堯夫曰爾為僧法當飲乎杖而逐之且曰果有失物令主者自來理㑹持其告以示子姪輩曰爾觀此安得守官處不自重即命火焚之對僚屬中未嘗言及後知縣者聞之乃修書致謝堯夫曰不記有此事自無可謝還其書楊尚書與高氏子十數年來聾耳慣可將社酒便能醫一心更願青盲了免見高家小馬兒墨客揮犀楊某尚書以耳聾致政居鄠縣别業同里高氏有二子小字大馬小馬一日里中社小馬攜酒就楊公曰此社酒可治聾願得侍杯枸之餘瀝取牋書與之云云王晉卿客續囀春鶯詩幾年流落向天涯萬里歸來兩鬢華翠袖香殘空浥淚青樓雲渺定誰家佳人已屬沙吒利義士今無古押衙回首音塵兩沈絶春鶯休囀沁園花西清詩話王晉卿貶均州姬侍盡逐有一歌者號囀春鶯色藝兩絶不知流落何許後三年内徙汝隂道過許昌市旁小樓聞泣聲晉卿問乃囀春鶯也恨不可復得因賦佳人已屬沙吒利一聯客有足成章云云太學生續徽宗詩選飯朝來不喜餐御廚空費八珍盤人間有味都嘗徧只許江梅一點酸陳郁話腴徽廟一日幸來夫人閣偶灑翰于小白團扇書七言十四字而天思稍倦顧在側璫曰汝有能吟之客可令續之乃薦鄰里太學生卽宣入内侍省恭讀宸製不知指意乞為取㫖或續句呈或就書扇左上曰朝來不喜餐必惡阻也當以此為詞以續于扇續進上大喜㑹將䇿士生于未奏名徑使造庭賜以第焉鄭州書生絶句照影空濛山色裏背人撲漉水禽飛梅花落盡春寒在細雨斜風點客衣夷堅志云政和中兵部侍郎王宷坐降天神誣罔伏誅初寀好延道流説丹竈神仙事兄寛守鄭州宷往省鄭有書生能詩慕寀名行巻來謁内有詩云云宷大稱賞即與定交書生能招紫姑神每下時與人音容相接攜之至京師習其術十得七八外間喧傳浸淫達于中禁時林靈素方得志朝士多欲宷親幸以傾林吏部尚書劉昺譽薦尤至有㫖賜對内殿徽宗為之前席約某日即禁宇邀天神林遣人通意欲與共功寀拒之林忿且懼或為言王侍郎何所能特出於鄭州一秀才耳林因請間言于上謂宷父昔在西邊嘗與夏人有密約叛國旣而未成宷將嗣其謀為令刺客變服為道士伺車駕焚香候神時將肆不軌初無上真降格之事上疑焉及某日宷與書生詣東華林先語閽卒止生于外拘係之獨宷得入左右供役皆小黃門宷知墮林計而無䇿可脱閲三晝夜寂無影響乃執宷并書生付極刑成郎中舉蒙詩一牀兩好世間無好女如何得好夫高捲珠簾明點燭試教菩薩看麻胡高齋漫録毘陵成郎中宣和中為省官貌不揚而多髭再娶之夕岳母陋之曰我女如菩薩乃嫁一麻胡命成作舉蒙詩成乃操筆大書云云賈舍人題壁愁見干戈起四溟恨無才術濟生靈不如痛飲中山酒直到太平方始醒陶朱新録靖康間有賈舍人者甚儒雅無金帛子女之蓄嘗題一絶于壁云范姓題黃姑織女祠高飇初至月埋輪烏鵲橋邊綽約身聞道佳期唯一夕因何朝暮對斯人中吳紀聞崑山縣東三十里地名黃姑古老相傳云常有織女牽牛星降于此地織女以金箆劃河水涌溢牽牛因不得渡今廟之西有水名百沸河鄉人異之為之立祠祠中列二像建炎兵火時士大夫多避地東岡有范姓者經從祠下題壁間云云鄉人遂去牽牛像今獨織女存焉每至七夕人皆合錢為青苗㑹所收之多寡持杯珓問之無毫釐不驗劉君劉君失名周少隠嘗從學為詩路中遇雪四野同雲漫不收停驂一望思悠悠乍疎還密如人事易聚難消似客愁倍費橐金歸酒醆苦添風色上征裘驛亭今夕定無寐淅瀝寒聲未肯休庚溪詩話沈某臞菴清江繞檻白鷗飛坐看潮痕上釣磯松菊未荒元亮徑芰荷先製屈平衣窗前楓葉曉初落亭下鱸魚秋正肥安得從君理蓑笠櫂歌相趁入烟霏吴郡志余知閣絶句三首幾年魂繞浙城西十里荷花漾錦陂踏徧兩峯三竺路又隨青嶂入雲棲洛邑名園歌舞沈亂鴉啼破幾深林何人學得香山老千載精廬有梵音千里旌旗擁六飛投簪欲上釣魚磯無端忽被閒雲引迴耀峯前掩竹扉雲棲寺志寺近掘地得斷碑題曰宋隨龍余知閣宅界旁有石隠隠有詩蓋䕶蹕南來因家于此後捨宅為寺也東都故老客臨安懐舊都曽見宜秋輦路門大書黃榜許游行漢家寛大風流在老去西湖樂太平清波雜志歳自元宵後都人即辦上池遨遊之盛惟恐負于春色當二月末宜秋門下揭黃牓云三月一日三省同奉聖㫖開金明池許士庶游行御史臺不得彈奏迨南渡故老客臨安泛西湖懐舊都作詩云云燀向見人每舉此詩因志于此以補夢華之遺東京夢華録三月一日州西順天門外開金明池瓊林苑每日教習車駕上池儀範雖禁從士庶許縱賞御史臺有榜不得彈劾池在順天門街北周圍約九里三十步池西直徑七里許入池門内南岸西去百餘步有西北臨水殿車駕臨幸觀争標錫宴于此往日旋以綵幄政和間用土朩工造成矣又西去數百步乃仙橋南北約數百步橋面三虹朱漆欄楯下排雁柱中央隆起謂之駱駞虹若飛虹之狀橋盡處五殿正在池之中心四岸石甃向背大殿中坐各設御幄不禁游人殿上下囘廊皆關撲錢物飲食伎藝人作場句肆羅列左右遊人還往荷蓋相望橋之南立櫺星門門裏對立綵樓每争標作樂列妓女于其上門相對街南有甎石甃砌高臺上有樓觀廣百丈許曰寶津樓樓前至池門闊百餘丈下瞰仙橋水殿車駕臨幸觀騎射百戲于此錢唐士人寄友江漲橋邊花發時故人曽共著征衣請君莫唱橋南曲花已飄零人不歸酬友認得吳家心字香玉窗春夢紫羅囊餘薰未歇人何許洗破征衣更斷腸能改齋漫録近有士人嘗于錢唐江漲橋為狹邪之游後朝廷復收河南士人陷而不返其友作詩寄之且附以龍涎香士人在河南得詩酬之太學士人絶句萬鴿飛翔繞帝都朝昏收放費工夫何如養取雲邊雁沙漠能傳二聖書古杭雜記詩集高宗紹興間宫中養飛鴿每日羣飛于外太學士人作詩以諷其詩流入大内高宗惻然自是宫中不復畜鴿錢塘軍人弄潮詩弄罷江潮晚入城紅旗颭颭白旗輕不因㑹喫翻頭浪争得天街鼓樂迎夢粱録八月潮怒勝于常時十八日帥座出郊教習水軍杭人有無賴之徒以大綵旗小青涼傘紅緑小傘兒各繫色繡段子滿竿伺潮出海門百十為羣執旗泅水以迓子胥向有前輩作詩云云左君題秦檜賜宅格天閣在人何在偃月堂深恨亦深不見洛陽圖白髮但知郿塢積黃金直言動便遭羅織舉目寧知有照臨炙手附炎俱不見可憐泥滓滿牆陰容齋三筆云左君天台士人頗有才最善謔居西湖上好事請謁人或畏其口後竟終于布衣淳熙太學生誚陳賈周公大聖猶遭謗伊洛名賢亦被譏堪歎古今兩陳賈如何專把聖賢非李心傳道命録淳熙十五年監察御史陳賈論道學欺世盜名乞加擯斥時太學諸生為之語云云洞庭漁父絶句八十滄州一老翁蘆花江上水連空世間多少乗除事良夜月明收釣筒夷堅志卓彦恭嘗過洞庭月下有小漁舟過其旁卓呼問有魚否應曰無魚有詩卓喜曰願聞一篇可乎其人鼓枻高吟曰常省元書園契上趙尚書乾坤到處是吾亭機械從來未必真覆雨翻雲成底事清風明月冷看人蘭亭禊事今非晉桃洞神仙也笑秦園是主人身是客問君還有幾年身夷堅志江西趙尚書宅與常省元相接百計取之而不可得一日常作一詩書契送之云云趙得詩不敢受券卽日還之化州郡守化州羅川帶郭古南州陵水環城小庾樓雲淡青林無過雁雨晴丹荔集鳴鳩叨榮銅竹三經夏勸課農桑屢有秋好趁湍流下吳㑹章臺無栁繫歸舟方輿勝覽高安太守判幸元龍求免役詩後松垣筆力破滄溟欲援任濤免税丁一段風流好公案錦江重寫入圖經豫章詩話任濤筠州人唐咸通中進士與鄭谷俱稱十哲常侍李隲見其詩有露團沙鶴起人臥釣船流之句特與免役鄉民訟之隲判云江西界内有詩似濤者並與免役宋高安幸元龍字震甫號松垣嘉泰間進士有氣節以詩援任濤例求免税丁太守判云云震甫通判鄂州上書雪濟邸冤屏廢而卒開禧朝士獻韓平原生日本是神仙服日華而今癯瘁為王家槐龍影轉朝方退閒却南園一院花後村詩話開禧宗子題客邸策蹇衝風怯曉寒也隨舉子到長安路人莫作親王看姓趙如今不似韓西湖志餘侂胄當軸黜陟朝紳權移人主時有天族就試南宫者題詩客邸云云開禧牧童歌朝出耕田暮飯牛林泉風月共悠悠九重雖竊阿衡貴争得功名到白頭昨非菴日纂侂胄過南園山莊趙師􅋷偕行至東郊别墅宛然鄉井見林薄中一牧童歌云云趙呵曰平章在此誰敢唐突跡牧童至草廬屏上有詩云玉津園内行天討怨血空啼杜宇紅後韓為史誅于玉津園韓院判詠迎春黃胖脚踏虚空手弄春一人頭上兩安身忽然綫斷兒童手骨肉都為陌上塵龎元英談藪韓侂胄暮年以冬月攜家㳺西湖畫船花輿徧覽南北二山之勝末乃宴于南園族子院判與焉席間有獻牽絲傀儡為土偶負小兒者名為迎春黃胖韓顧族子汝名能詩可詠之即承命作絶句云云韓大不樂不終宴而歸未幾禍作齋舍生題韓侂胄甲第掀天聲勢秖冰山廣廈空餘十萬間若使早知明哲計肯將富貴博清閒花栁依然弄晚風才郎袖手去無蹤不知郿塢金多少争似盧門席不重白獺髓韓侂胄平原甲第即瑞石北阜為第開禧末罪逐後改為寺監齋舍生有題二絶于壁云云嘉定太學生題三賢堂和靖東坡白樂天幾年秋菊薦寒泉如今往事都休問且為官司趁酒錢鶴林玉露嘉定時于西湖三賢堂賣酒太學生題詩府尹聞之愧而止邦俊失其姓題王司理持平堂淑問皋陶晞在泮奉公不撓幕中參仰思弼教刑明五深念求情法以三虞詡為卿宜有自于公比徳蓋無慙圄空草茂庭柯緑行詠甘棠踵召南詩律武庫適安散人題趙千里夜潮圖寂寞江頭夜風急怒濤捲起千堆雪一輪兔魄騰巨光激起金蚪高萬尺沙頭宿雁理羽衣忽聞潮聲不知歸縱橫亂影向天末一一點破秋光飛誰人輕用造化筆寫出此景不遺一眼明絹素見天巧長江大海來小室静對真成聴潮聲我亦詩腸如雷鳴捲巻不知身所在猶覺眼底風濤生式古堂畫考明葉進昇云趙千里夜潮圖巻末多宋嘉定人題詠皆不著姓名名山樵子題趙千里夜潮圖款書嘉定三禩首夏望後三日八月錢塘江上水風静波平清澈底夜半潮聲帶月來沙頭眠雁還驚起何人一幅鵝溪絹畫出長江千萬里莫道波聲静不聞請君默坐聊傾耳式古堂畫考太學生送袁侍郎天眷頻年惜挂冠誰令今日遠長安舉幡莫遂諸生願祖帳應多行路難去草豈知因害稼彈烏何事却驚鸞韓非老子還同傳憑仗時人品藻看白獺髓嘉定間金人交攻廷臣有以和戰守三䇿為言者是時胡榘侍郎専主和議四明袁燮侍郎與胡公廷争専主戰守仍以笏擊胡公額遂下侍從臺諌集議後袁君以此辭歸太學諸生作詩以送之槱曰璐按負暄野録二巻嘉定中名槱者所著失其姓元大德三年茅雲山鈔本賦孫生春膏紙膏潤滋松雨孤高表竹君夜碪寒擣玉春几瑩鋪雲越地雖呈瑞吳天乃策勳莫言名晚出端可大斯文負暄野録吳人取越竹以梅天水淋曝令稍乾反覆硾之使浮茸去盡筋骨瑩徹是為春膏其色如蠟其光可鑑故吳箋近出遂與蜀産抗衡吳門孫生造春膏紙尤造其妙余嘗賦詩云云太學藴道齋生絶句朝來池上有新事火急報教同舍知昨夜雨餘春水滿白鷗飛下立多時鶴林玉露太學藴道齋有小池忽一鷗飛來容與甚久一同舍生題詩云云讀者賞其藴藉朝士和徐淵子九日呼兒為我整烏紗不是無心學孟嘉要摘金英滿頭插明朝還是過時花鶴林玉露川官題都下僦樓朝看貝葉牢籠佛夜禮星辰取奉天呼召歸來聞好語初三初四亦欣然貴耳集一川官在都乞差遣留三四年題一詩在僦樓之壁初三初四二僕也因此詩傳播京下遂得缺而去北來人題襄陽光孝寺壁干戈未定欲何之一事無成兩鬢絲蹤跡大綱王粲傳情懐小樣杜陵詩脊令信斷雲千里烏鵲驚飛月一枝安得中山千日酒陶然直到太平時貴耳集辛夘嵗北來人數百輩暫寓于襄陽府光孝寺有一人題詩于壁云云太學生刺賈似道昨夜江頭長碧波滿船都載相公鹺雖然要作調羮用未必調羮用許多西湖志餘似道令人販鹽百艘至臨安賣之太學生有詩仙村人月泉第四名春日田園雜興芳草東郊外疎籬野老家平疇一尺水小圃百般花青箬閒耕雨紅帬鬭采茶村村寒食近插栁徧檐牙原評頷聨十字一毫不費力自與黏泥體者不同餘見雜興東湖散人月泉第四十三名同上物色天成畫不如東風又到野人廬蜜蠭辛苦供常課科斗縱橫學古書小雨杏花村問酒淡烟楊栁巷巾車汀洲水暖蘆芽長更買扁舟伴老漁原評前聨得詠物之工後聨句法亦好末見雜興感興吟桐江月泉第四十八名同上兒結蓑衣婦浣紗暖風疎雨䟎桑麻金桃接種連花蘂紫竹移根帶筍芽椎鼓踏歌朝祭社賣薪挑菜晚回家前村犬吠無他事不是摉鹽定𣙜茶原評此詩無一字不佳末語雖似過直若使采詩觀風亦足以戒聞者九仙人寓杭月泉第五十五名同上軒裳一夢斷塵寰桑柘陰陰静掩闗種秫已非彭澤縣采薇何必首陽山因憐社鼓剛催老轉覺儒冠不負閒君看浣花堂上燕芹泥雖好亦知還原評前聨就事映帶田園次聨韻度迥别末尤有趣桑柘區金華月泉第五十六名同上粟爵𤓰官嬾覬覦生涯雲水與烟腴晚風一笛麥秧隴春雨半鋤桑柘區可是樊遲宜請學肯教陶亮歎將蕪斜陽芳草闗情處更把新詩弔石湖原評起四字絶佳二聨分明見田園惜尾句弔字太過栁州月泉社中人第五十七名同上東風生意鬧農圃正宜勤稻種開包曬苗衣譜畝分疇西曉耕雨舍北暮鋤雲莫待荒三徑歸與陶令君原評二聨見田園分明第四句最好曬字欠工草堂後人古杭月泉第五十八名同上桑眼已開芳晝長西疇東墅足相羊麥風初暖燕争壘林雨初晴蛙滿塘野老新衣逢社喜山妻椎髻為蠶忙紛紛遊騎看花去誰識吾家舊草堂原評第二句入田園快便前聨絶好後半篇意順君瑞桐江月泉第五十九名同上白粉牆頭紅杏花竹槍籬下種絲𤓰廚烟乍熟抽心菜篝火新乾捲葉茶草地雨長應易墾秧田水足不須車白頭翁嫗閒無事對坐花陰到日斜原評此真雜興詩起頭便見作手青山白雲人居杭月泉第六十名同上昨夜東風雨一犂曉晴鄰巷共熙熙遮門賸喜有桑柘輸國不憂無繭絲小婦餉耕因廢織老夫觀社忽成詩眼前物物是生意却恨淵明歸計遲原評頷聨語意深頸聨尤儁以上月泉吟社番陽布衣書中山驛壁回頭四十五年非無賴秋光滿客衣可惜吳中蓴菜好陸機張翰不同歸谷音云番陽布衣有書中山驛壁云回首萬里歳晚何言云云番陽布衣題瀟湘漁父絶句高枕形骸外空江何限情落葉不成調半夜起秋聲谷音云崔璆晚泊湘江淡烟微月有客歌而過之追問居與名置其釣竿長嘯而去閩清野人絶句偶與雲水㑹不與雲水同雲散水流去杳然天地空谷音云僧惠了行閩清谷中三日到一空舍稍憩有一人荷鋤來便向壁熟睡僧旣尋路還他日再往巳焚其舍惟斫樹白而書之嘲王隨以下俱無姓名誰謂調元地翻成養病坊但見僧盈室寧憂火掩房江鄰幾雜志王隨作相病已甚好釋氏時有獻嘲者云題公館壁猛風拔大樹其樹根已露上有寄生草青青猶未寤法藏碎金丁晉公清真香歌四兩元參二兩松麝香半分蜜和同丸如芡子金爐爇還似千花噴曉風河南陳氏香譜題闗西驛舍弧星熒熒照寒野漢馬蕭蕭五陵下廟堂不肯用竒謀天子徒勞聘賢者萬里危機入燕薊八方殺氣衝靈夏逢時還似不逢時已矣吾生真茍且中山詩話景祐中羌人叛詔遺士獻方畧率皆得官或題云云景祐中添張祐詩天章故國三千里學士深宫二十年殿院一聲河滿子龍圖雙淚落君前洓水紀聞景祐四年鎖㕔人最盛開封府投牒者至數百人國子監及諸州者不在焉是時陳堯佐為宰相韓億為樞密副使旣而解榜出堯佐子博古為解元億子孫四人皆無落者衆作河滿子以嘲之先是天章閣待制范仲淹坐言事左遷饒州王官待制王宗道因奏事自陳為王府官二十年不遷詔改龍圖閣學士權三司使王博文言于上曰臣老且死不復得望兩府之門因涕下上憐之數日遂為樞密副使當時輕薄者取張祐詩益其文以嘲之題麻姑壇記五百年來别恨多東征重得見青蛾擘麟方擬窮懽喜不奈閒人背癢何隠居詩話云皇祐中江西有一事與蔡經事正類或題麻姑壇記以嘲之獻韓魏公是非莫問門前路得失須憑塞上翁引取碧油紅斾去鄴王臺畔醉春風幕府燕閒録韓魏公初罷相出鎮長安或獻詩云云即請守相州石刻詩雨滴空階曉無心換夕香井桐花落盡一半在銀牀許彦周詩話嘉祐中河濵漁者網得小石石上刻一小詩不知誰作嘲同州三春花發惟樗樹二月鶯啼是老鴉江鄰幾雜志和蔡君謨題壁韻長垂玉筯殘妝臉肯為金釵露指尖萬斛閒愁何日盡一分真態更難添郁氏書畫題跋記東坡云僕在錢唐一日謁陳述古邀余飲堂前小閣中壁上小書一絶君謨真迹也又有人和云云二詩皆可觀後詩不知誰作也贈日本僧寂照禮天台山滄波泛瓶錫幾月到天朝鄉信日邊斷歸程海面遙秋泉吟裏落霜葉定中飄為愛華風住扶桑夢自消王氏談録題寢宫詩農桑不擾歳常登邊將無功吏不能四十二年如夢過東風吹淚灑昭陵復齋漫録此詩題于寢宫不著姓名宜表而出之村舍題壁詩人間無漏仙兀兀三杯醉世上無眼禪昏昏一枕睡雖然没交涉其奈畧相似相似尚如此何況真箇是苕溪漁隠叢話東坡云余官鳯翔見村邸壁上書數句余愛而誦之絶句訓釋詩書日月明紛紛法令下朝廷不知心本縁何事苦勸君王用肉刑每愧先生道絶倫古來歸美是忠臣門人李漢真堪罪何用垂編示後人侯鯖録介甫熙寧初首被選擢得君之専前古未有罷政歸金陵作日録七十巻前朝舊徳大臣及當時名士不附己者詆毁至無一完人者其間論法度有不便于民者皆歸于上可以垂耀于後世者悉巳有之故建中靖國之初諌官陳瓘極力論其壻蔡卞之惡曰安石臨終戒其家焚之悔其作也卞留之至紹聖間作尚書右丞盡編之裕陵國史中遂行之瓘所謂遵私史而壓宗局是也士大夫忠憤者有詩云云句細草行縢路垂楊席帽風明道雜志嘲張師雄昨夜陰山賊吼風帳中驚起蜜翁翁平明不待全師出連著皮裘入土空隠居詩話昨夜陰山吼賊風帳中驚起紫髯翁平明不待全師出連把金鞭打鐵驄不知何人之詩頗為邊人傳誦有張師雄者居洛中好以甘言悦人晚年尤甚洛人目為蜜翁翁㑹官於塞外一夕傳敵騎犯邊師雄倉惶震恐衣皮裘兩重伏于土穴中秦人呼土窟為土空無名子因改前詩以嘲之云士人詩西出潼闗客路迷一葫蘆酒一篇詩葫蘆酒盡興未盡坐看春山春盡時范元實詩眼題相國寺壁終歳荒蕪湖浦焦貧女戴笠落柘條阿儂去家京洛遙驚心寇盜來攻剽楓窗小牘荆公柄國時有人題詩寺壁人皆以為夫出憂荒亂也及荆公罷相子瞻召還諸公飲蘇寺中以此詩問之蘇曰于貧女句可以得其人矣終嵗十二月也十二月為青字荒蕪田有草也草田為苗字湖浦焦水去也水旁去為法字女戴笠為安字柘落木條剰石字阿儂是吴言合吳言為誤字去家京洛為國寇盜為賊民蓋言青苗法安石誤國賊民也題扇上畫小兒迷藏誰翦輕紈織巧絲春深庭院作兒嬉路郎有意嘲輕脱只有迷藏不入詩過庭録無名子從魯直學大進題扇云云蓋路徳延小兒詩不及迷藏也嘲王禹玉丞相太師因被子孫煎身後無名只有錢喏喏佞翻王介甫竒竒歆殺宋昭宣嘗言井口難為戲獨坐中書不記年東府自來無土地便應正授不須權王直方詩話王禹玉丞相旣亡有無名子作詩嘲之云云其家經府指言張山人作府中追張山人至曰你怎生作詩嘲他大臣張曰某自來多作十六十七字詩著題詩某吟不得府尹笑而遣之回文四首紅窗小立低聲怨永日春寒斗帳空中酒落花飛絮亂曉鶯啼破夢悤悤同誰更倚閒窗繡落日紅扉小院深東復西流分水嶺恨兼愁續斷弦琴寒信風飄霜葉黃冷燈殘月照空牀看君寄憶回文錦字字縈愁寫斷腸前堂畫燭殘凝淚半夜清香舊惹衾烟鎖竹枝寒宿鳥水沈天色霽橫參苕溪漁隠叢話回文三首春晚落花餘碧草夜涼低月半枯桐人隨逺雁邊城暮雨映疎簾繡閣空紅手素絲千字錦故人新曲九迴腸風吹絮雪愁縈骨淚灑縑書恨見郎羞看一首回文錦錦似文君别恨深頭白自吟悲賦客斷腸愁是斷弦琴苕溪漁隠叢話東坡後集有題織錦圖上回文三首淮海集載東坡跋云余少時見一江南本其後有人題詩十餘首皆竒絶今記其三首然則此詩非東坡所作也少游又云子瞻記江南所題詩本不全嘗見之記其五絶今以補子瞻之遺即叢話前集所載回文詩五首是也世以為少游所作亦非也黃山三十六峯高倚天瑤臺金闕貯神仙嵩陽若與黃山比猶少靈砂一道泉苕溪漁隠叢話圖經載黃山舊名黟山東峯下有硃砂湯泉熱可點茗春時即色微紅昔人詩云宣聖墓靈光殿古生秋草曲阜城荒噪晚鴉惟有孔林殘照裏至今猶屬仲尼家山東通志臨江驛舍二詩李白當年謫夜郎中原不復漢文章納官贖罪何人在壯士悲歌淚兩行晉公功業冠皇唐吏部文章日月光千載斷碑人膾炙不知世有段文昌侯鯖録紹聖中貶東坡毁上清宫碑令蔡京别撰有人過驛題二詩不書姓名沿流館中詩簾巻窗穿户不扃隙塵風葉亂縱橫幽人睡足誰呼覺攲枕牀前有月明東坡跋云紹聖中有人得此詩于沿流館中不知何人詩也今録之以益箧笥之藏宫詞二首迎春燕子尾纖纖拂栁穿花掠翠簷聞道蘂宫三十六美人争為捲珠簾蓬萊風促水紋斑月甃風廊數百間雲外蹕聲穿嶺去行宫蔟馬望驪山西清詩話崇寧中題廣陵驛朩槿花朝炊不及黔暮車不生角故應庭下花無人見開落風月堂詩話戲題林靈素畫像當日先生在市廛世人那識是真仙只因學得飛昇後雞犬相隨也上天竹坡詩話道士林靈素以方術顯于時有附之而得美官者頗多至今有驕色或作詩云云政和癸巳刻石詩萬里區區學宦游江南江北幾時休朝來作别殷勤語為謝多情黃栗留金陵祈澤山志題宗室存道畫鴛鴦浦漵圖睡足鴛鴦各欲飛水花攲岸兩三枝多情公子因乗興寫出江春日暖時宣和畫譜宗室仲僩字存道長于宫邸不以塵俗累其意雅好繪畫雖寒暑不捨每嵗都城士大夫有園圃者花開時必縱人游觀仲僩或載酒行樂初無縁飾汎然于遊人中以筆簏粉墨自隨偶遇興來見高屏素壁隨意作畫或求則未必應也嘗于華陽郡主王憲家杜亭間作鴛鴦浦漵頃刻而就至于設色唯輕淡點綴而巳觀者無不賞激有人題詩云云題太行山石壁太行千里連芳草獨酌一杯天地小醉臥花間人不知黃鶯啼破春山曉陶朱新録題嵩山峻極中院法堂壁一團茅草亂蓬蓬驀地燒天驀地空争似滿爐煨􅨄榾慢騰騰地熱烘烘許彦周詩話宣和癸夘僕遊嵩山峻極中院法堂後簷壁間有詩云云其傍𨽻書四字云勿毁此詩寺僧指示曰此四字司馬相公親書也靖康初洛陽城陷作藝祖憲章誰口道迎門户户有人開清晨山後九州没日落河頭萬騎來地近蓬蒿堆白骨巷無人跡長蒼苔可憐司馬碑猶臥誰念伊公一笛哀三朝北盟㑹編題汴京天清寺壁靖康間空餘緑綺琴嬾把新聲寫不見臨邛人誰是知音者庚溪詩話題台州金鼇峯祥符寺壁黃帽當年駕舳艫東浮鯨海出三吳中興事業風波惡好作君王坐右圖雲麓漫抄高宗建炎三年十二月航海東來曽幸此寺御坐一竹椅寺僧今别造以黃蒙之有人題壁云云紹興丁丑詩何處難忘酒南宫放榜時有才如杜牧無勢似章持不取通經士先收執政兒此時無一盞何以展愁眉清波雜志紹興丁丑章持魁南省時有詩嘲朱希真少室山人久挂冠不知何事到長安如今縱插梅花醉未必王侯著眼看二老堂詩話朱希真洛陽人以浙東提刑致仕居嘉禾秦丞相欲令希真教秦伯陽作詩遂落致仕除鴻臚少卿蓋久廢之官也或作詩云云蓋希真舊有鷓鴣天云自是清都山水郎天教嬾慢帶疎狂曽批給露支風敕累奏留雲借月章詩萬首醉千場幾曽著眼看侯王玉樓金闕慵歸去且插梅花醉幾場故以此譏之題闗中驛壁鼙鼓轟轟聲徹天中原廬井半蕭然鶯花不管興亡事妝㸃春光似昔年庚溪詩話紹興庚申辛酉河南闗陜之地暫復有自闗中驛舍見題二絶云云題劉武僖題名後一入侯門海樣深漫留名字惱行人夜來髣髴高唐夢猶恐行人意未真清波雜志劉武僖自柯山赴召記嵗月于仰高亭上末云侍兒意真代書後有人題云云題崇安分水驛壁江南三月已聞蟬麥熟梅黃繭作綿料得故園烟雨裏輕寒猶作勒花天庚溪詩話句一色樓臺三十里就中何處覓孤山南渡題西湖波雜志清題嚴陵釣臺范蠡忘名載西子介推逃蹟累山樊先生政爾無多事聊把漁竿坐水村庚溪詩話題陽羨溪亭壁碧雲亭上碧雲飛竟日迴環面翠微梅萼破香知臘盡栁梢含緑認春歸風前古澗琴三疊雪後群峯玉一圍遙想上人清太甚水精宫裏説禪機庚溪詩話題溧陽郵亭壁十年棄微官歸來事却埽扁舟訪安期要覓如𤓰棗不知膏粱珍惡食亦自好田園苦無多生理但草草濁酒時一尊孤斟從醉倒庚溪詩話句大柄如歸手蟁蝱莫浪飛嚴陵士人詠扇句話庚溪詩句行滿三千我四千功成八百我九百庚溪詩話陳桷待制紹興中嘗從諸大將為謀議官頗好修養之方且自以為得道嘗題其所居曰神仙多是大羅客我比大羅超一格有輕薄續其後云寒亭在荆州玉泉山朔風凛凜雪漫漫未是寒亭分外寒六月火雲天不雨請君來此凭闌干方輿勝覽上太師公相四首并序某頓首百拜上啟切以道欲興周嵩岳遂生于申伯運將啟漢昴星爰降於酇侯眷我聖朝起兹人傑偶垂弧之盛旦屬偃革之昌期天祐賢生時為國賀恭惟太師公相明堂一柱滄海六鼇儲二水之英姿稟三山之秀氣抗義不屈同杵臼之立孤仗節言旋邁子卿之出使大講一時之利爰交二國之歡反隗馭於慈寧天顔有喜收太阿於密宥兵柄難搖興禮樂而牖俗于中和設庠序而域民於禮義是宜集開國承家之統口加地進律之恩錫甲第以安居駐屬車之臨幸凡兹偉觀足為美談某舊出陶鎔逺瞻牆仞攀鱗附驥際休運之半千滌硯薰毫頌大功之數十仰祈椿算愧凟鈞嚴某下情無任悚懼之至詩曰地靈人傑産忠良瑞靄龍蟠虎踞鄉天欲中興神降岳世將嘉靖弼生商和羮早報梅花信壽酒先飛柏葉觴笑指山南成帶礪龎眉與國等綿長交歡鄰國獨推誠不顧流言斷必行直欲生靈躋壽域聊將干舞解平城坐扶國祚齊箕翼立挽天河洗甲兵和議一成夷夏福蒼生擊壤永昇平談笑能令國勢彊一時忠義凜秋霜挽回隗馭臨長樂直把鴻勳紀太常問寢東朝宫殿曉來庭北使塞垣長輔成孝悌光寰宇竹帛仍傳萬世芳手扶日月補圓穹錫第庸旌再造功樂奏鈞天迎騎擁詩歌湛露宴堂豐屬車臨幸龍顔喜拔宅飛昇帝眷隆燕雀非惟依托計華夷億兆賴帡幪播芳大全舒州下寨驛中詩北堂無老信來稀十載秋風雁自飛今日滿頭生白髪千山鄉路為誰歸侯鯖録王性之云余以永感之人讀之垂涕題驛壁記得離家日尊親囑付言逢橋須下馬過渡莫争船雨宿宜防夜雞鳴更相天若能依此語行路免迍邅侯鯖録宗希鵬舉言見一驛壁上有詩云云此征途藥石也余愛之每以示子孫陶公醉石五字高吟酒一瓢廬山千古想風標至今門外青青栁不為東風肯折腰周必大廬山後録句啼月杜鵑喉舌冷宿花蝴蜨夢魂香優古堂詩話黃季涔嘗言一士人詩云云油汚衣一㸃清油汚白衣斑斑駮駮使人疑縱饒洗徧千江水争似當初不汚時容齋三筆予甫十嵗時過衢州白沙渡見岸上酒店敗壁間有題詩兩絶其名曰犬落水油汚衣犬詩太俗不足傳獨後一篇殊有理致是時甚愛其語今六十餘年尚歴歴不忘嘲京仲遠一在廬陵一豫章文忠文穆兩相望大家飛上梧桐樹自有旁人説短長四朝聞見録歐陽子諡文忠京丞相鏜以善事韓平原亦諡文忠後以公論謂不宜以諡歐陽者諡鏜改文穆無名子作詩云云嘲趙師􅋷詩堪笑明廷鵷鷺甘作村莊犬雞一旦冰山失勢湯燖鑊煮刀刲古杭雜記詩集韓侂胄作南園于吳山有所謂村莊者竹籬茅舍宛然田家氣象侂胄游其間甚喜曰狀得絶似但欠雞鳴犬吠耳旣出忽聞莊中雞犬聲令人視之則府尹趙師􅋷也時有詩云云感開禧事自古和戎有大權未聞函首可安邊生靈肝腦空塗地祖父魂讎共戴天晁錯巳誅終叛漢於期未遣尚存燕廟堂自謂萬全策却恐防胡未必然齊東野語開禧北伐侂胄旣誅王柟葉時請通謝于金函侂胄首以往識者殊不謂然有為詩云云題壁白塔橋邊賣地經長亭短驛甚分明如何秖説臨安路不較中原有幾程古杭雜記驛路有白塔橋印賣朝京里程圖士大夫往臨安必買以披閲有人題壁云云題太和樓壁太和酒樓三百間大槽晝夜聲潺潺千夫承糟萬夫甕有酒如海糟如山銅鍋鎔盡龍山雪金波湧出西湖月星宫瓊漿天下無九醞仙方誰漏泄皇都春色滿錢塘蘇小當壚酒倍香席分珠履三千客後列金釵十二行一座行觴歌一曲樓東聲斷樓西續就中茜袖擁紅牙春蔥不露人如玉今年和氣光華夷遊人不醉終不歸金貂玉麈寧論價對月逢花能幾時有箇酒仙人不識幅巾大袖豪無敵醉後題詩自不知但見龍蛇滿東壁武林舊事和樂樓昇暘宫南庫和豐樓武林園南上庫中和樓銀甕子中庫春風樓北庫太和樓東庫西樓金文西庫太平樓豐樂樓南外庫北外庫西溪庫巳上並官庫屬户部㸃檢所毎庫設法官妓數十人各有金銀酒器千兩以供飲客登樓之用每庫有祗直者數人名曰下番飲客登樓則以名牌㸃喚侑樽謂之㸃花牌元夕諸妓皆併番互移他庫夜賣各戴杏花冠兒危坐花架然名倡皆深藏邃閣未易招呼往往皆學舍士夫所據外人未易登也歸州竹枝詞人鮓甕頭波放顛兩岸青山青插天篙師力盡客破膽茅屋老翁方醉眠以上前賢小集拾遺弔梅聖俞墓贏得兒童叫夫子可憐名位只都官娛書堂詩話梅聖俞因劉原甫戯言之讖竟終于都官葬在宣城俗呼為梅夫子墓弔之者有句云云禽言二首剛道故鄉如許好其如遊子不歸何自從五栁先生死空染千山淚血多子規蠶蠒方成四月初鳥能早計巧相呼誰知機杼聲纔息已有王官來索租著新脱故娛書堂詩話家有誦禽言二詩句意皆工惜失姓名興化沙溪驛題壁沙溪秖是舊沙溪今日重來路欲迷獨有暮鴉知我意白雲深處盡情啼荆溪林下偶談釣臺生涯千頃水雲寛舒巻乾坤一釣竿夢裏偶然伸隻脚渠知天子是何官鶴林玉露題項羽廟嬴秦久矣酷斯民羽入闗中又火秦父老莫嗟遺廟毁咸陽三月是何人古杭雜記項羽廟在臨安近郡三衢十八里樟戴市市人失火延及斯廟人有詩云題岳陽飛吟亭吕仙遺蹟覓官千里赴神京鍾老相傳蓋更傾未必無心唐事業金丹一粒誤先生鶴林玉露云余酷愛其旨趣蓋夫子告沮溺之意也書真西山生祠壁舉世知公不愛名湘人苦欲置丹青西天又出一活佛南極今成兩壽星幾百年方鍾間氣八千春願祝修齡不須更作生祠記四海蒼生口是銘湖南新聞真西山帥長沙郡人為立生祠一夕有人大書一詩于壁間云云題采石蛾眉山一㠀烽烟斡怒流然犀捉月兩悠悠蛾眉中劃三千丈不著人間半㸃愁前賢小集拾遺荅陳蒙索賦梅花影搖溪脚月猶冷香滿枝頭雪未乾只為傳家太清白致令生子亦辛酸蓉塘詩話宋國學正陳蒙輕財尚義家世清白一日有布衣持紙扇來謁上書云出韻不駐思蒙以酸字為韻令賦梅花輒應聲云云蒙大悦厚贈之規史相前身元是覺闍黎業障紛華總不迷到此更須睁著眼好將慧力運金鎞西湖志餘史彌逺丞相浩之子鄞人也初浩與覺長老善問曰和尚與我孰好覺見其羅綺爛盈粉黛環列漫曰丞相富貴好老僧何敢比也旣自省曰此一念差終當墮落泥滓一日浩坐㕔上見覺突入中堂茶頃報後院弄璋浩黙然知為覺也遂以覺為小名及長名之曰彌逺彌逺當寧宗朝韓侂胄以用兵起釁彌逺遂上疏力詆帝嘉之尋又贊廢濟王立理宗理宗徳之寵任日劇相兩朝二十六年權震海内時人作詩規之云云徳興邑廨石刻詩二首仕宦之身天涯海畔行商之身南州北縣不如田舍長拘見面門無官府身即强健麻麥徧地猪羊滿圏不知金貴唯聞粟賤夏新絹衣秋新米飯安穩眠睡直千直萬我田我地我桑我梓只知百里不知千里我飢有糧我渴有水百里之官得人生死孤兒寡婦一張白紙入著縣門冤者有理上官不嗔民即歡欣上官不富民免辛苦生我父母養我明府苗稼萋萋曷東曷西父母之鄉天子馬蹄㳺宦紀聞淳祐中詩合抱長材臥壑深於今惟恨不空林誰知廣廈千斤斧斲盡人間孝子心癸辛雜識淳祐庚戌春創新寺于西湖之積慶山改九里松舊路輪奐極其靡麗旣而給賜貴妃閻氏為功徳院且賜山圍田畝建造之初内司分司分遣吏卒市木于郡縣旁縁為奸望青採斫鞭笞追逮雞犬為之不寧雖勲臣舊輔之墓皆不得而自保或作詩諷之其後恩数加隆雖御前五山亦所不逮嘲鄭安晚光範門前雪尺圍火雲燒蓋晚風吹堪嗟淳祐重來日不似端平初相時里巷誰同司馬哭番夷肯為孔明悲青山化作黃金塢可惜角巾歸去遲癸辛雜識鄭清之字徳源號青山又號安晚為穆陵舊學端平初相聲譽翕然及淳祐再相巳髦及之政事多出其姪孫太原之手公論不與辛亥冬祈雪得雷電大作而清之薨于位時有詩云淳祐癸丑詩南省觀圖喪一名補闈又試萬人英兩重門閾如天險十有七人倒地橫誰設秦阬來貢院枉教唐士夢登瀛雲山萬里家何在月白風清鬼哭聲湖海新聞宋淳祐癸丑臨安試監補者天下無慮數萬蹂踐而死者十有七人省試亦喪一人當時有詩云云句空使蜀人思董永恨無漢劒斬丁公宋季三朝政要寶祐四年董槐罷相時丁大全為監察御史奏槐章未下先調臨安府隅兵百餘人圍其第以臺牒驅迫出之時有詩云云題衢州驛舍千夫荷擔在山阿膏血如何有許多不若扁舟竟歸去休從清獻墓前過蓉塘詩話趙清獻公墓在衢州城東北四十五里景定間林存為潭州帥罷歸道衢調千夫荷擔經墓旁疲甚因相與語趙清獻公一琴一鶴那有許耶或聞之題詩驛舍云江右旅邸題壁有約未歸蠶結局小軒空度牡丹春夜來揀盡鴛鴦繭留織春衫寄逺人偑韋齋輯聞絶句收拾乾坤一擔擔上肩容易下肩難勸君高著擎天手多少傍人冷眼看古杭雜記理宗庚申賈似道初入相時有人作詩云云逆旅題壁詩山行險而修老我驂且羸獨驅六月暑躡此千仞梯世故不貸人牽去復挽歸茗盌參世味甘苦常相持白雲抱溪石令人心愧之豈無趺坐處逸固不療飢大呌天上人涼風為吹衣詩人玉屑嘲賈似道三分天下二分亡猶把山川寸寸量縱使一丘添一畝也應不似舊封疆古杭雜記理宗朝嘗欲行推回田畝之令有言而未果至賈似道當國卒行之有人作詩云云佩韋齋輯聞云棄淮棄蜀棄荆襄却把江南寸寸量量得畝頭多一尺尺頭能有幾多長與此小異詠蜨缺七字一叢浮動戲蘭芽裁成碧玉搔頭樣畫作黃金便面花閒過樓臺飛盡日又因風雨宿誰家兒童愛把襜褕撲驚起雙雙貼綵霞深雪偶談余曩憩吳山偶吳僧舉似四韻歳久忘其首句亦忘為誰氏所作刺賈似道厚我藩垣長彼貪不然銜璧小邦男廟堂從諫真如轉竟用先生策第三錢塘遺事咸淳間汪紫原立信于襄危之際以書抵賈相陳三策一謂内地何用乎多兵宜盡抽之以過江可得六十萬或百里或二百里置一屯皆設都統七千里江面纔三四十屯設兩大藩府以總攝之緩急上下流相應二謂久拘使者在京湖何益不如遣使偕行啗緩其師期三謂若此兩説不可行惟有准備投拜賈得書大怒諷臺諫罷紫原歸金陵不數月北兵渡江九江以下皆失守時人有詩云云題蕪湖夢日亭樓船犀甲下荆州蜂目將軍駐碧油虎帳覺來驚日墮龍媒嘶去逐星流姦萌問鼎終何在計落遺鞭始可羞幽草亂花荒故壘無人能作晉春秋梅磵詩話代意懊惱鴦鴦未白頭却尋遺翠失芳洲離魂暗逐明珠佩逺目偏傷紫桂樓湘水渺瀰歸别渚隴雲容與澹新秋菖花若有重開日得見菖花亦自羞書西湖雷峯雲講主草書雲師一生耽作草銀鐵蟠空覷天巧老來逸氣未全平筆底鋒鋩猶獨掃開闗勇士争赴敵劒戟弓戈奮相繚睡龍没起求頷珠劃朩抓嵒紛怒爪風雷喧豗撼坤軸飛電交橫印清沼忽然天宇變空澄千丈孤峯立寒峭張顛驚號智永泣剥筋椎骨為君飽恨子不習草書訣九轉枯腸秖自攪雲師雲師汝誠能春蚓秋蛇幾時了何如認取主人翁破衲蒙頭紙窗曉以上詩永譏賈平章戎馬掀天動地來襄陽城下哭聲哀平章束手全無䇿却把科場惱秀才西湖志餘御史陳伯大奏立士籍似道毅然行之凡應舉及免舉人州縣給籍一通親書年貌世系及所𨽻業于籍首執以赴舉過省參對筆跡異同以防偽濫時人有詩譏之云云山丹花亭下佳人錦繡衣滿身纓絡綴明璣晚來銷歇無尋處花已飄零露巳稀煙紅露緑曉風香燕舞鶯啼春日長誰道使君貧月老繡屏錦帳咽笙簧人間花木眼曽經未識斯花狀與名丹却青山暮春色續他紅樹墜時英望仙花風捲朱簾挂玉鉤綵雲開處望仙儔妍姿不逐春風去日照斜暉上小樓玉手爐花習習東風二月餘此花宜近玉庭除美人雲鬢不宜插獻與觀音作手爐散水花盈枝㸃綴雪花鮮環映清流分外妍應是東君歸騎速不知墜下玉絲鞭孩兒花纖穠初見似嬌癡鼓舞春風三月時何事自開還自落可憐造化亦兒嬉含笑花薄薄沈熏骨英英玉煉烟惱人風味别斗帳夢中閒以上全芳備祖絶句天目山前水齧磯天心地脈露危機西周浸冷觚棱月未必遷岐説果非古杭雜記度宗甲戌天目山崩京城騷動時有建遷蹕之議者未幾宋鼎移有人作詩云云和湯仲友弔賈秋壑故居榮華富貴等浮花膂力難勝國爪牙漢世但知光擁立唐朝誰識杞姦邪綺羅化作春風蜨弦管翻成夜雨蛙縱有清漳人去也碧天難挽紫雲車西湖志餘刺賈秋壑詩深院無人草已荒漆屏金字尚煇煌底知事去身宜去豈料人亡國亦亡理考發身端有自鄭人應夢果何祥臥龍不肯留渠住空使晴光滿畫牆事到窮時計亦窮此行難倚鄂州功木棉菴上千年恨秋壑堂中一夢空石砌苔稠猨步月松庭葉落鳥呼風客來未用多惆悵試向吳山望故宫山房隨筆賈秋壑敗師亡國後有人刺以詩云云題賈似道養樂園老壑曽居葛嶺西遊人誰敢問蘇隄勢將覆餗不回首事到出師方噬臍廢圃更無人作主敗垣惟有客留題算來秖是孤山好依舊梅花伴月低山房隨筆古碑文詩乾淳老人氣岳岳破冠穿履行帶索撐腸拄肚書萬巻臨風欲言牙齒落谷音云揭大中云或漁于潭得片石字十數行率磨沒僅識得二十八字意幽人憤世之作不合于時故沈之以俟知者棲雲閣詩倚天危閣貼重岡細路縈紆石磴長曲磵碧流疏宿雨夾山紅葉助斜陽白鶴觀題壁仙人未必皆仙去還在人間人不知手把白髦從兩鹿相逢聊問姓名誰裴公亭裴相亭成未退身空煩舞袖與歌塵至今亭上蕭蕭竹似對西風怨主人以上四朝詩宋詩紀事巻九十六
