body:
  text: 宋詩紀事巻五十錢塘厲鶚撰陸永仲永仲字維之一名凝之字子才餘杭人隠大滌洞天之石室因以石室稱之有石室集四朝聞見録光堯嘗幸大滌憲聖亦侍進主觀者問以山中詩客以維之對進其行巻光堯讀之太息曰布衣入翰林可也憲聖曰山林隐士不要人知要他出山卻是苦他遂止西湖志餘永仲少與計偕入汴羣法徒邀令雜坐命道人相之道人指永仲曰秀才問以科第曰且還山及别道人以粒丹授之曰緩急用之永仲下第循汴而歸怒濤大作以丹投之風浪恬息岸有呼永仲姓名者則道人也遂出家隐大滌山洞霄宫天柱峯前古洞霄我生來此避塵囂半牀明月琴三弄四座青山酒一瓢當戸老松如對立隔花啼鳥似相招斷金一去無消息唯有寒梅共寂寥洞霄詩集絶筆岳南之館白雲端鳯笛龍簫徹廣寒一鶴曉飛沖碧落羣仙笑倚玉闌干咸淳臨安志駱適正西園席上記事花隨春盡覓無痕尚續餘歡侑素尊一曲未終人已去西園燈火欲黃昏清波雜志煇居建康春晩赴張徳共㑹於西園呼妓侑酒酒酣忽有傳府命呼其人時張安國開府方兩日其人臨去求自解之説衆但以實告况社中二客不至必留鈴齋翌日詢之如所料焉歌者既去坐客駱適正即席賦詩云云劉博文博文字元素宣城人栁眼青眼初垂已可知精神渾在豔陽時只因嫁得東君後兩淚相看是别離竹坡詩話元素内子朱賢善事其夫一日元素與客飲分韻得栁眼詩成坐客皆不悦後數日而其妻亡盖詩讖也劉棐棐字仲忱咸陽父老壺漿迓義旗秦亡誰復為秦悲不曾被虐曾䝉徳十二金人各淚垂玉殿珠樓二世中楚人一炬逐煙空卻縁火是秦人火只與焚書一樣紅墨莊漫録詩律殊有風致類唐人題詠他詩亦稱是劉敬觀滄浪亭石感而有作蘇君在朝人不知蘇君既沒人悲之流風遺書見稱道髙文大句争提撕壁間草𨽻亦不置剥苔椎土無棄遺乃知死不與人共利害而後不為時所疑滄浪亭空卉木老古石蒼蒼顔色好無脛猶疑千里來致身忽在都門道帝都王侯好事多相看自悔取不早君不見呉興長史春襴衫閉門抱恨長枯槁呉郡志薛揚祖揚祖字元祖鄞人歴知漳州召為大理丞與張樞密話舊作羸軀苦善病日與藥裹親藉彼參苓功扶此憂患身思君若飢渴相憐同病人余身本蒲栁寧竢秋風晨君誠松栢姿何患不長春容面一若丹鬢髪一若銀來日安可期往事曷足陳不能罄君罍奚以浣我塵吹笙將鼓瑟慚余非嘉賔甬上耆舊集薛居實居實字去華鄞人朋龜子歴官淮東安撫使直祕閣有集皇太后挽歌夾日光先業寒星聚夜臺慈名千古重哀詔九天來地底雞人少雲中鶴使催宫門芳草徧從此不須開老妓自稱汴京宫人泣而贈之薄妝自敘老深宫一曲悲歌聽不終黑髮尚霑梁苑雪素衣還帶上林風殘春栁葉蕭條緑破國桃花冷落紅收拾琵琶蹙眉黛教人同在淚痕中以上甬上耆舊集仲昻昻字明舉紹興中廣漢人題西門外筰橋下觀音院雨砌風亭長緑苔壁間題字半塵埃城南蕭寺無人跡幾度曾因送客來全蜀藝文志何錫汝錫汝紹興閒人玉虹泉在羅田縣東五十里詩刻石上百尺雲巖佛閣前晚鐘疎葉思悠然岸邊酌酒和清露石上題詩染翠煙半嶺泉鳴通古澗數峯秋盡隔寒川西風似欲吹人起去逐騎鯨汗漫仙湖廣總志劉望之望之蜀人自號觀堂新都驛逺平軒霜晴木落送歸鞍袖手㣲吟此慰顔賸欲憑欄招白鳥更煩翦樹出青山晚悲薄禄非三釜賴許清詩見一斑自注軒有外氏周次元帥蜀時詩看到逺平纔得恨我寧僵卧尺椽閒沱江尚勝三年謫終慙萬里馴極知行路澀可忍在家貧嵗晚沱江緑雲深錦樹新相思肎如月夜夜只隨人發成都落拓平生載酒行如今憔悴鬢絲生無金得買青樓笑空負閒愁出錦城以上成都文類紹興中作一紙盟書換戰塵萬方呼舞卻霑巾崇陵訪沈空遺恨郢國憐懐尚有人收拾金繒煩廟算安排鐘鼎頌宗臣小儒何敢知機事終望君王赦奉春桯史紹興中和議成蜀士劉望之作詩云云時語禁未大嚴無以為風者望之它詩多謟秦檜所謂奉春不知指何人也白麟合江探梅艇子飄揺喚不回半溪清影漾疎梅有人隔岸頻招手和月和霜翦取來成都文類任續續紹興閒人還珠洞呈桂林帥呂叔恭山林自空閴遊人事幽討岫幌與雲闗來蹟可堪掃艮離矗孤峯玉簮倚天杪桂水流灕碧洄伏皆縈繞豁谺巖穴深虯龍雙夭矯坤倪露幽祕造化殚竒巧勝槩絶塵寰髣髴蓬萊島悠悠世俗情是非苦膠擾水中蠏何罪徒勞卹心悄人厄困無妄礫石埋深窈風月幾年恨山光慘蘿蔦星郎太嶽孫長城隐南表戎旃整且暇髙情恣登眺郊坰擁小隊一見顔色愀舊觀俄頃復洞戸天重曉傷心日月過人世幾番老山川不相似嵗月依然好吕巖標强名往事人能道孟公漫驚坐子夏冠非小桃符録餘慶邲勝成濮兆冥數今乃驗常幸定誰考哦詩記貞石則有若樽醥桂勝强彦文彦文溧陽丞句空有青山自龍虎可堪荒冢更衣冠金陵道中逺山初見疑無路曲徑徐行漸有村船中燈火十年話枕上江湖萬里心清波别志李璜璜字徳劭江都人流寓四明有檗菴集樓大防序云徳劭少負雋才耻從進士舉後寓四明蕭散骯髒以終其身不娶無子晚從宏智禅師于言下有省冩照自題其上云分明便是龎居士又卻無人賣罩籬不可謂無所得然亦可哀也已以二貓送張子賢家家入雪白於霜更有攲鞍似鬧裝便請爐邊义手坐從他䑕子自跳梁銜蝉毛色白勝酥搦絮堆綿亦不如老病毗邪須減口從今休歎食無魚墨莊漫録唐悊悊字端仲淮海張邦基之表舅賦漢建安時侯印闗中金印豈秦闗想見風流漢已還大饗似書譙縣石蘭亭寧數會稽山空餘此日歸囊橐曾是當年雜佩環萬户況將取如斗此章何足繫腰間題宗室趙大年橫巻為張邦基作聞君新得小山川畫手來從郜雍賢不學農夫焉用稼若為王子豈知田我真壠上躬耕客親見人間小隐天始識何年京樣熟菊籬寧似景龍邊菊籬景龍門下景也墨莊漫録米南宫謂大年作畫清麗雪景類王維汀渚水鳥有江湖意予嘗得大年所作橫巻歸田圖竹籬茅舍煙林蔽虧遥岑逺水咫尺千里葭蕪鷗鷺宛若江鄉表舅唐端仲題詩云云裴相如相如號豹隐餘杭人遊洞霄宫人間三十六洞天各有邃道通神仙兹山九鎖路曲折中間五洞棲雲煙東遊大滌望天柱西登石室觀飛泉窮幽討勝足未倦明月忽墮青崖顛山中道士借一榻夜半猨鶴驚人眠明朝又復出山去白雲回首空悽然洞霄詩集龔明之明之字熙仲崑山人祖母李病且革明之禱于天乞減五齡以益李壽灼頂聞腦中有爆裂聲不為動李病尋愈竟五年卒明之以特恩廷試授髙州文學年老敕監潭州衡嶽致仕超授宣教郎著中呉紀聞芝華亭誰道休祥繫上穹民心元自與天通政平訟理為真瑞何必金芝産梵宫玉峯詩纂蘇籀籀字仲滋轍之孫遲之子官至監丞南渡居婺州有雙溪集蘼蕪葉葉秋聲中霏霏蚤英䔩介特有如松繁華匪慙菊勃蔚襲軒墀薰霑滿衣服情人擢纖指拾蘂動盈匊蘼蕪見離騷苓藿入譜録遊鼓山自注孫子安見招呼船起柁乗潮平掠窗飄箔疎雨傾潄石枕流東道主櫛風沐雨吾曹行百尋懸瀑㵼紳佩兩邊喬木翔枅甍乞漿滿甌牛乳粥縱橫下筯駝蹄羮躋摩頂踵歴磴術牽挽葛藟披荆榛荒浪攙差復奄靄巀薛贔屭仍棱層嘷煙嘯雨猨鶴宅絶山航海樵漁能草衣穴處避世士木食澗飲安禅僧芝房雲閣無盡藏月屏風幌長明燈笑看闤闠一蟻垤揮斥氛祲投蠻藤經行石竇解縢屩飲灌匏杓談淄澠莫嗔踏碎蒼苔色莫嫌汲濁陰井清膏肓泉石有裁鑒騰踔巖崿試股肱要識石鼓真面目立置枕几非繪繒風吹楊葉此山下欲問故老知誰譍市朝一夢争奪際山海蕭散堪伏膺和巻中韓子蒼梅花先開媚晴昊孤豔斷魂時繞樹沈煙度凌寒檀暈披參橫明月觀雪細影娥池結實冥冥雨君看雀啅枝以上雙溪集蘇簡簡字伯業籀弟有山堂集次韻張正民遊智者寺養拙何所詣白晝門常闗剝啄有好懐遶郭橫秋山佛刹在山麓清浄非人間曳杖得晤語幽尋為歡顔寺同喬木古僧與白雲閒一鳥不復鳴流泉自潺湲山林作勝踐世事羊腸艱金華詩粹呉璋璋沆子環溪夜坐江天閒晚已斜陽静倚柴門對草堂葉落轉枝翻鶻影星飛橫水帶螢光㣲風得雋驅殘暑新月出竒生嫩涼坐覺秋容轉清爽一聲漁笛在滄浪句惜别有情空執手贈行無緒不成章閒中坐作蜘蛛隐夢裏逃成燕雀禪奕棊但以忘憂耳縱酒無如作病何以上環溪詩話胡仔仔字元任舜陟子仕為晉陵令卜居呉興號苕溪漁隐著有叢話苕溪絶句三間水閣賈耘老一首佳詞沈會宗無限當時好風月如今總屬績溪翁苕溪漁隐叢話賈耘老舊有水閣在苕溪之上景物清曠東坡作守時屢過之題詩畫竹於壁間沈㑹宗又為賦小詞其後水閣屢易主今已摧毁久矣遺址正與予小閣相近同在一岸景物悉如會宗之詞故予嘗有句云云春寒小院春寒閉寂寥杏花枝上雨瀟瀟午窗歸夢無人喚銀葉龍涎香漸消苕溪漁隐叢話西清詩話云長沙徐仲雅宫詞曰内人曉起怯春寒輕揭珠簾看牡丹一把栁絲收不盡和風搭在玉闌干其富貴瀟灑可愛余嘗作春寒絶句云云聊效其體也對月用促句換韻格青坡瓈色瑩長空爛銀盤挂屋山東晚涼徐度一襟風天分風月相管領對之技癢誰能忍吟哦自恨詩才窘埽寛露坐發興新浮蛆琰琰抛青春不妨舉醆成三人題苕溪漁隐圖余卜居苕溪上日以漁釣自適因自稱曰苕溪漁隠臨流有屋數椽亦以此命名僧了宗善墨戲落筆頗瀟灑為余作苕溪漁隠圖覽景攄懐時有鄙句皆題之左方云溪邊短短長長栁波上來來去去船鷗鳥近人渾不畏一雙飛下鏡中天秋雲漠漠煙蒼蒼蘆花初白蓮葉黃釣船盡日來往處南村北村秔稲香巻起綸竿撇櫂歸短篷斜掩宿漁磯日髙春睡無人喚撩亂楊花繞夢飛和人七夕乞巧筵開玉露秋一鉤涼月挂西樓人間百巧方無奈寄語天孫好罷休以上苕溪漁隐叢話左鄯題湘中郵亭壁疊疊山腰繫冷雲疎疎雨腳弄黃昏松聲更帶溪聲急不是行人也斷魂苕溪漁隐叢話賴鑄鑄字成之號竹莊送鄭居之窗前落葉正蕭蕭夜雨寒燈共寂寥君是居人余是客明朝相候合江橋詩家鼎臠龔相相字聖任處州遂昌人兵部侍郎原之孫知華亭縣遂家呉中濡須塢在巢縣東南南北安危限兩闗迅流一去幾時還凄涼千古干戈地春水方生鷗自閒方輿勝覽邵博博字公濟伯温子有西山集題智永上人瀟湘夜雨圖曾擬扁舟湘水西夜窗聽雨數歸期歸來偶對髙人畫卻憶當年夜雨時畫繼題相如琴臺長卿本豪傑禮外安可處手弹南風琴心謂東鄰女雜身傭保中初不忌笑侮大者固已立下此皆可補三賦争日星一書起今古其餘不自祕輙為人所取兒曹爾何知杯酒那可汙故臺已丘墟勝絶誰敢據我來訪遺跡低回不忍去詩成欲呌君雲車隔煙霧成都文類雲安下巖偶成輕波颭鴨頭小艇翔燕尾風沙三十程雲水一千里雪盡晚寒輕日長春睡美汀蕪翹碧茅岸樹裹紅蘂江浮清鏡中山入翠屏裏蜀鳥已驚心巴猨猶側耳竹節數名灘桃花驗新水谷鶯歌尚慵檣燕舞何喜落日浪鎔金殘花風翦綺斯遊興最多了不知行止全蜀藝文志王汶汶字希道一字道原汝陰人回之子有詩集雪溪王銍序之寄韓澗泉在困多促促長懐特棲者崔嵬玉山岑其誰秣余馬朝隨澗雲浮暮逐澗泉㵼光儀儼神交晤言冀心冩食魚不知肥采菊不盈把願垂白日影照我蔀屋下送應顯夫之上饒細雨杏花斑飛飛燕子還人隨煙櫂去門對釣磯閒曉月偏驚夢春雲不離山定知多好句音問盍相闗以上前賢小集拾遺張子文墨梅二絶筆端喚醒玉梅魂滿袖春風不見痕未許巻簾新月上卻教煙雨惱黃昏憶昨江湖倒載歸暗香夾路雨霏㣲誰人貌得春風景逺看如煙近卻非次韻秦會之題墨梅南枝春色弄㣲温記得清香撲酒尊今日相逢隔煙霧揚州殘夢足銷魂以上聲畫集陸士規黃陵廟東風吹草緑離離路入黃陵古廟西帝子不知春又去亂山無主鷓鴣啼鶴林玉露陸士規布衣工詩秦檜喜之嘗挾秦書干臨川守餽遺不滿意升堂嫚罵守懼以書白秦自解秦怒陸甚陸請見不出然猶令其子小相者見之問其近作陸誦黃陵廟一絶小相入誦之秦吟賞再四即接見待之如初周必大必大字子充一字洪道廬陵人紹興二十一年進士中宏詞科權中書舍人孝宗朝歴右丞相拜少保進益國公寧宗朝以少傅致仕卒贈太師諡文忠有平園集鶚按宋史必大紹興二十年進士据咸淳臨安志紹興二十一年趙逵榜無二十年榜宋史誤也今訂正賞心亭醵會晉人誇新亭暇日輙髙會中間伯仁輩未免楚囚對江山猶古昔人物已曖昧東郊今保釐翠華記行在佳麗壓淮楚迢逓盛冠盖兹樓貫城雉于邁無小大令威雖不歸靈光故無礙煙雲互明滅川郭相映帶當年烏衣遊此日思勝槩從容值休沐登臨多慷慨幽懐忽軒豁細故絶芥蔕已尋詩社盟更訂飲朋戒嘉賔滿坐上好詩來天外舟移白鷺逺目送飛鳥快方種淵明秫麄免監河貸一醉儻可期與君時倒載遊茅山道中口占須徧遊乃成章千峯溧陽來勢若西南奔遥拱三茅峯不敢廹至尊三茅如軒懸次序儼弟昆正西闢夷途羣仙之所門至今下泊宫往往弭旗旛過池州作千古風流杜牧之詩材猶及杜筠兒向來稍喜唐風集原注荀鶴詩集名唐風集今悟樊川是父師二老堂詩話池陽集載牧之守郡時有妾懐姙而出之以嫁州人杜筠後生子即荀鶴也髙宗皇帝挽詞社稷興中否干戈静四溟生年同藝祖慶壽似慈寧人憶庚庚兆天傾九九齡向來懐夏禹今祔越山青太極乾元父清都大帝宫宴酣忘御駿仙去任遺弓音遏堯仁逺旻號舜孝隆孤臣臺閣舊淚血灑春風會同年楊謹仲周孟覺賞芍藥嘗櫻桃次謹仲韻清晨自掃落花廳小甕新篘竹葉青簮盍莫辭過陋巷臚傳相與記彤廷階翻紅藥曾重見僕兩直西掖敕賜朱櫻亦屢經老去飄零無此夢詩來吟咏有餘馨題九華化成峯攀蘿度險㨗猱猨石角鉤衣屨盡穿莫訝逺尋金地藏也曾徐歩玉階前贈棲賢寺藏主可昇與予同庚我比同年百不能只餘霜鬢媿師兄殷勤覓句無言説共撥寒灰聽水聲以上省齋文槀元宵煮浮圓子前輩似未嘗賦此坐間成四韻今夕知何夕團圓事事同湯官循舊味竈婢詫新功星燦烏雲裏珠浮濁水中嵗時編雜詠附此説家風訪誠齋楊監全勝賀監家賜湖豈比賜書華回環自闢三三徑頃刻能開七七花門外有田供伏臘望中無處不煙霞卻慙下客非摩詰無畫無詩只謾誇以上平園續槀鶴林玉露慶元間周益公以宰相退休誠齋以祕書監退休益公嘗訪誠齋於南溪之上留詩云云誠齋和云相國來臨處士家山間草木也光華髙軒行李能過李小隊尋花到浣花留贈新詩光奪月端令老子氣成霞未論藏去傳詒厥拈向田夫野老誇好事者繪以為圖蕭徳藻徳藻字東夫閩人紹興二十一年進士嘗令烏程後遂家焉所居屏山自號千巖老人有千巖擇稾楊誠齋序近世詩人若范石湖之清新尤梁溪之平澹陸放翁之敷腴蕭千巖之工致皆余所畏也采蓮曲清曉去采蓮蓮花帶露鮮溪長須急槳不是趁前船相隨不覺逺直到暮煙中恐嗔歸得晚今日打頭風後村詩話古梅二首湘妃危立凍蛟脊海月冷挂珊瑚枝醜怪驚人能嫵媚斷魂只有曉寒知百千年蘚著枯樹三兩㸃春供老枝絶壁笛聲那得到只愁斜日凍蜂知詠虞美人草魯公死後一坏荒誰與竿頭薦一觴妾願得生墳土上日翻舞袖向君王以上全芳備祖吕公洞復此經過三十年唯應巖谷故依然城南老樹朽為土簷外稚松青拂天枕上功名秖擾擾指端變化又𤣥𤣥刀圭乞與起衰病稽首秋空一劒仙賔退録次韻傅惟肖竹根蟋蟀太多事喚得秋來籬落閒又過暑天如許久未償詩債若為顔肝腸與世苦相反巖壑嗔人不早還八月放船飛樣去蘆花叢外數青山登岳陽樓不作蒼茫去真成浪蕩遊三年夜郎客一柁洞庭秋得句鷺飛處看山天盡頭猶嫌未竒絶更上岳陽樓以上瀛奎律髓句乾坤生長我貧病怨尤誰秋浩蕩中遥指㸃一螺許是定王城稚子推窗窺過雁數峯乗隙入西窗秋陽直為田家計饒得漁村一抹紅後村詩話查籥籥字元章海陵人紹興辛未進士乾道中户部郎中總領四川財賦司題臥龍山山顛祠貌儼丹青千載懐人為一登隠隠故營連白帝茫茫恨水向西陵石根蘭芷香無價雲頂松杉翠作層人事天機古難料詩成試語定中僧全蜀藝文志萬州湖灘寄王夔州十朋滿目暮山平逺一池雲錦清酣忽有鐘聲林際直疑夢到江南王梅溪集附郭知運知運字次張鹽官人弱冠登紹興二十一年進士秦檜强與為姻知運勿樂訖停昏焉仕至荆州守倦求禄仕自號息菴老人卜居雙廟之西有猥稾題雙廟唐祚中不振羣胡恣姦驕君徳弗克終治亂在一朝渠魁睥神器四海俱動揺向來為厲階其迹已冰消中興功孰甚張許冠百僚堂堂二公烈千古名不凋義膽極華岳忠肝齊斗杓平生慕節義卜居祠匪遥丹青就湮鬱古屋風蕭蕭英靈如可問激懦討惛妖咸淳臨安志林桷桷字子長一字景安長溪人紹興二十一年進士秦熺之壻官右司郎中有橫堂小集太白五松書院翰林最愛五松山嘗説千年未擬還而我抗塵良自媿來遊秖得片時閒池州府志方汝疆汝疆字南夫繁昌人紹興二十一年進士江上晚行疎雲薄日冷呉江江色蘆花共渺茫四五㸃山煙靄淡兩三枝槳水雲長遊魚避網驚㣲浪幽鷺窺汀下夕陽興罷歸來更回首滿身明月踏溪霜舟行平林漠漠暝煙齊竹樹蕭森望眼迷相喚幾聲何處雁斷霞明處一行低以上太平府志陳居仁居仁字安行莆田人家明州紹興二十一年進士孝宗朝累官中書舍人華文殿直學士提舉太平興國宫卒諡文懿西湖感舊蘇公隄畔采蓮船蘸碧樓臺動管弦山色湖光宛如昔心情不似十年前咸淳臨安志史正志正志字志道江都人紹興二十一年進士累除司農丞孝宗朝仕至右文殿修撰知靖江府歸老姑蘇號呉門老圃新亭龍盤虎踞阻江流割據由來起仲謀從此但誇佳麗地不知西北有神州忽枉王人六轡馳新亭有酒便同持坐中不作南冠歎江左夷吾是素期景定建康志宋翔翔字子飛建陽人紹興二十一年進士官湖南安撫參議有梅谷集紹興樂府時韋太后歸慈寧宫天意回皇母歸戢烽燧敞宫闈朝陽赫奕明鞠衣惟皇之孝惟母之慈陳仙仗薦壽巵從之冢后與庶妃奏之一作以九成與咸池㳫珍瑞駢福祺山陬水裔咸熙熙惟天之相與帝之宜千萬年無窮期建陽縣志程大昌大昌字泰之休寧人紹興二十一年進士孝宗朝官至權吏部尚書龍圖閣直學士卒諡文簡有集宿直後出玉堂留詩示周子充抖擻身章卻冒塵褭蹏顧影也逡巡鑾坡寓宿非其地蓮燭操文自有真闕直由來同古語位髙兼復見今人迎潮有諾無輕爽季老當年不諉貧玉堂雜記淳熙丙申八月庚辰徳壽宫遣大璫張去為至都堂傳旨立翟貴妃為今上皇后明日午後執政奏事皇后歸姓謝氏乙酉晚快行家來宣鎖院是日侍講刑部侍郎程泰之已宿直呼馬而出予至内前適與之遇泰之揚鞭云留詩案上矣和劉侍郎夔九日登女郎臺霜枝凋翠雁橫秋莫倚危樓動旅愁菊有清香樽有酒茱萸不插也風流能改齋漫録次韻陸務觀海棠喚回殘睡强矜持淺破朱脣倚笛吹千古妖妍磨不盡長隨春色上花枝海棠譜句戯作風枝斜再惱玉堂宿題洪内翰侍兒翠翹畫竹圖繪寳鑑劉知過知過字與機天台人未冠領鄉薦紹興二十一年中特科監南嶽廟與弟知變俱以文名尤工于詩參政賀允中題其詩曰江東天籟春日濃起香塵十里晴晚來煙雨忽斜橫花開花落清明候山北山南杜宇聲追念舊遊渾似夢退思良計不如耕人中喜有彌天釋時吐清文慰此情台州府志秦熺熺字伯陽本檜妻兄王㬇孽子檜乞養為後紹興二十一年進士累官翰林學士知樞密院事進少師致仕齊東野語熺本王氏子檜素不悦檜畏内妾嘗孕其妻逐之生子為仙遊林氏子曰一飛以檜故仕至侍郎兼給事中曹泳嘗勸檜還一飛未果而檜死送舅氏知湖州暫别甘泉豹尾中隼旟仍駐水晶宫文昌地禁論詩少燕寢凝香簿領空可但龔黃宜共理便應顔謝與同風飽聞回老榴皮事試問溪頭鶴髪翁雲麓漫鈔説者謂吕仙嘗到湖之東林訪沈東老留詩既而登東林寺于壁間以榴皮自畫其像人初不知及秦伯陽送舅氏王亨道知湖州詩出觀者如堵林之竒之竒字少頴福州候官人紹興二十一年進士尉長汀召為校書郎以病除大宗正丞提舉本路市舶再任本路參議官終朝奉郎有拙齋集新晴山月曰琯按宋文鑑作文同髙松漏疎月落影如畫地徘徊愛其下夜久不能寐怯風池荷巻病雨山果墜誰伴余苦吟滿林啼絡緯江月圖冥冥一月輪不知水與天獨于顥氣中仰見素璧圓超然狂道士起視清夜闌自拈白玉笛吹此江月寒想當萬籟息逸響流空煙我從江海來形留意先還何當買漁篷追此水月仙早春偶題寒風淅瀝鳴枯葦小鴨熏殘猶未起更教細雨結輕寒坐聽蕭蕭打窗紙石盆春蒲已抽翠雕斛栽花未生紫擁爐閉閣賦幽香未怕春冰生硯水以上拙齋集黃巨澄巨澄餘姚人紹興二十一年進士官吏部侍郎登四明山會稽東南秀四明名更佳蜿蜒三百里慘淡青蓮花伊昔天地初山川始萌芽六丁運神斧斲削如人家四牖遺古制玲瓏吐雲霞側聞劉樊徒于此鍊丹砂耕烟種青櫺結實大如𤓰揮手謝衆士身登鳯凰車至今石窗底青天守龍蛇玉女四五人緑鬢垂鬖髿時來聽潺湲意態静不譁我夜闖其旁月黑星如麻顧慙無靈氣悵望空咨嗟姚江逸詩宋詩紀事巻五十
