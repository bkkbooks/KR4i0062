body:
  text: 宋詩紀事巻七十六錢塘厲鶚撰馮坦坦字伯田號秀石普州安岳人兩魁浙漕咸淳辛未推恩任渝之江津夾漕務西總之龍灣酒庫絶句山腰一抹雲雲起知何處急渡小橋尋天風忽吹去鸕鷀源樵歌綺羅巷陌總成塵誰識擔柴老買臣自笑賣柴元似舊買柴換郤舊時人句飄風驚日月落葉滿乾坤呈呉履齋井在丹誰煉碑殘墨欲枯廬山白鶴觀因聼敲竹雨便碎賞花心鷗趁湍流下魚蔵石罅閒洞廬澗水每向宋清求善藥閒從詹尹卜新年燈影照殘孤枕夢雨聲滴碎兩年心除夕集以上方回桐江劉應鳯應鳯字堯舉號書臺安福人咸淳中登第授建康軍簽判入元不仕王炎午吾汶槀云堯舉聞文山再執北行有句云天㽞中子墳孤竹誰向西山飯伯夷予問其下句曰伯夷久不死必有飯之者矣案堯舉與炎午均為未識文山之心者然其志亦可尚矣聞文文山北行喚得嵐鄉昨夢回東風萬里上金臺出關曽觧婆娑否枝北枝南一種梅四朝詩龔孟䕫孟䕫字龍友臨川人咸淳對䇿中第仕終儒林郎送孟和卿平陽尋母杜羔念母心最苦豈意一朝逢澤潞母驚兒貎似乃翁兒抱母啼淚如雨五十孺慕朱壽昌刺血冩經毛髪蒼閒關同州晩相見迎侍親輿歸故鄕人生百年一彈指母恩未報情曷巳團圞尊前舞綵衣大勝世間朱與紫子行萬里渉風沙誓不見母不還家兒今髪落母應老道傍看者還咨嗟臨川孟氏號雍睦家世來此澶淵族婆娑老慕紫荆花料想春風依舊緑四朝詩李謹思謹思字明道號飬吾餘干人咸淳中試禮部釋褐第一入元卒題文丞相吟嘯集南人不識兩膝貴曲摺百態卑且勞斯人䕶膝不䕶頭故以頸血霑君刀蟠胷孤憤擘不碎殺氣千丈纒旌旄援桴親鼓盡南海背水更用蜑丁鏖俘來吮血語神語咄咄向與天争豪湏臾赤日減顏色𤣥雲莽莽風颼颼或言巨靈收拾付真宰讀罷拊臆生長號又言豐隆列缺對愁絶疾指玉鞭鞭六鼇雨瓢倒翻水怪舞斗樞横軋天籟號憐伊肝膽苦復苦亦見曩昔眞離騷刼灰滿地莫挂眼蓬萊雖逺容輕舠長驅癘鬼尚堪戰儘閒未許飛仙遨乃言興廢在爾不吾與吾死吾主吾焉逃魯叟聞言拍手笑斯人六經為骨為皮毛斯人捲取六經去空將􅎓本傳兒曹呉禮部詩話補疎齋題鵝湖客來誰與期微鍾度山椒松風如起予間以笙與簫逸響諒斯存幽蹤莽難招天下同文集贈李節婦猝猝多羝屈幽幽獨雉經借渠施粉黛聊與照丹青孤槥何年寄重泉底處扃有人能縮地不隔短長亭郭天錫詩文雜記謝疊山字君直妻李節婦以君直故與二子繫金陵獄一將官欲納之李紿曰爾能脱我械繫乃可議此將以為然禱上下釋其獄李即具湯沭約翼日出是夕伺二子熟寐解衣帶自經死槀葬城東壕二子放還後數年子定之復徃裹骨歸葬飬吾李先生謹思贈云云寄進士熊退齋猶存火後書䍐識巻中字無筆補𤣥經有金酬載記漫漫歳月馳忽忽春秋閟欲辨已忘言涕淚空垂泗殉義若殉財避名如避箭况當喜懼交肎與寵辱踐百年元亮心一日宣明面朱門轍跡多山路㣲如綫四朝詩董師謙師謙號南江三山人咸淳辛未别院省試魁仕為平江府教官錢塘懷古歴歴庚申事分明在眼前講和如有弊飛渡定無船北使三千里眞州十四年釀成亡國恨一部福華編玉牀揺帝座青蓋出都城巷哭千家淚燕歌四面聲乾坤遽如許風雪可憐生清曉宮門外猶聼打六更衣帶一條水靴尖三百州市朝陳迹在圖籍别人收南渡衣冠盡西湖歌舞休久知事當爾曽記五更頭行人指新寺云此舊宮城坐殿幾朝帝開山何處僧日邊行塔影天外送鐘聲王氣元無了何消鑿秣陵翰墨大全俞德鄰德鄰字宗大號太玉山人永嘉人徙居京口舉咸淳癸酉進士入元不仕有佩韋齋集佩韋齋輯聞過釣臺行色苦迢遞人烟渺淒涼泊舟值嚴瀬濯纓感滄浪赤符識龍鬬白水瞻鳯翔涼風協元德落星隱寒芒桑溟忽變易草朩猶芬芳嗟予遘屯蹇垂老悲興亡溪湍兀小艇嵐氣昏戰場安得釣臺釣尚友狂奴狂題白廷玉所藏白馬圖八尺龍駒蹄削玉霜毛雪鬛超凡俗驕嘶顧影食場苖朝暮逍遥在空谷詔書欻下徵騏驎香街紫陌驚行人金環壓轡出天廐不數駓駱驪騮駰三品豆芻飽終日終日不鳴鳴輒黜何如不縶亦不維騰霧籋雲全玉質秋日客中楓落秋江塞雁賔客懐依舊憶鱸蓴百年三萬六千日半世東西南北人滿目空村争虎豹何時髙閣繪麒麟由來管葛皆天意霄漢泥塗任此身書齋寂寂書齋萬慮空恍然赤甲古城東鳥呼幽夢日方午花惱醉吟春正中軍將送茶驚諫議門生載酒過揚雄飛詩識字皆為累閒殺江頭獨釣翁登六和塔僧舎倚松北浮圖界竹西江通嚴瀬逺雲壓越山低槐里三原隔襄城七聖迷臨風悲徃事月落凍烏啼老病老病幽棲覺嬾吟眼觀時態獨關心古今不冺春秋筆天地難欺暮夜金幸有别腸堪貯酒未愁短髪不勝簪柴門一閉從春盡桃李飛花葉又隂淮安天慶觀夜坐邉城寂寞歳將䦨濁酒頻斟醉不歡一㸃青燈霜月白野鳧風起石窗寒以上佩韋齋集宋慶之慶之字元積一字希仁永嘉人咸淳進士有飲冰詩集劉後村䟦云含蓄有餘思要是世間好詩戍婦詞君去無還期妾思無已時軍中無女子誰為補征衣後村題䟦開爐日賦筋力已非舊逢寒亦自憐風霜在簷外妻子語燈前紙被添新絮茶甌煮細泉雖云方寸地春意一陶然項園即事時節飛花盡幽林亦自香閒來看新水獨立又斜陽簷角鳥鳴霽樹根魚就凉一春風雨過逰事極相妨寓武昌報恩寺孟宗祠下竹依然借得空房竹樹邊貧寺少逢僧過夏逺鄉多是客經年倩人汲水時煎茗就佛分燈夜照眠家信不來心欲斷明朝又買漢陽船以上東甌詩集句城中豈云隘我見無夷途所以龐德公車不向此驅斜陽挂林杪野花續春餘和陶數年何處客昨夜獨歸船喜弟歸飄泊知何處艱難亦到僧送僧更長初過雁蟄後稍無蛬旅夜多年翁仲在寒食子孫稀廢墓以上村題䟦呉錫疇錫疇字元倫休寧人儆諸孫咸淳間南康守葉閶聘為白鹿洞書院堂長不赴有蘭臯集春望春事今如此憑髙興未䦨半簾踈雨過一院落花閒草色迷幽徑禽聲出晩山東風能育物不改鬢毛斑春日韶光大半去悤悤幾許幽情遞不通燕未成家寒食雨人如中酒落花風一窗草逆濓溪老五畝園私涑水翁無賦招魂難獨笑且排春句荅春工方岳䟦云予嘗于何人巻中見左史公稱說著梅花定說君之旬不知其竹洲後人也意王愷之珊瑚扶疎二尺美止此矣比呉君過予崖下出其寳則三四尺六七株如燕未成家寒食雨人如中酒落花風者尚多也子其秘之毋使豆粥韭韲為帳下兒所賣彼愷輩那得與君争長寳祐甲寅十月既望秋崖方岳拜手林和靖墓遺槀曽無封禪文鶴歸何處認孤墳清風千載梅花共說著梅花定說君山中雜言小小柴門􅅖竹開幽深不慣有人來頗嫌老鶴無情思啄損庭前一徑苔山居寂寥與世如隔是非不到榮辱兩忘因憶秋崖工部嘗教以我愛山居好十首追次其韻聊冩窮山之趣存四首我愛山居好蔬畦閒蒔花筧泉歸㸑舎篝火乞鄰家茁嫩貓頭笋焙芳雀舌茶野人曽拜號何用給黄麻我愛山居好荒磯一釣竿白鷗春水濶黄犢緑坡寛徑菊香秋晩溪梅報嵗寒人間幽意足詩思倚䦨干我愛山居好枌榆老故丘好峯當户立逺水䕶田流鼓響移秧日耞鳴穫稻秋年豐身老健一飽外無求楊花為見春風不久歸顚狂上下弄晴暉只饒天與無拘束入幕穿簾任意飛以上蘭臯集汪若楫若楫字作舟休寧人官宣城令咸淳間為紫陽書院山長有秀山集絶句萬朩驚秋各自殘蛬聲扶砌訴新寒西風不是吹黄落要放青山與客看新安文獻志尤冰寮冰寮錫山人袤曽孫咸淳中官新安别駕有扣角吟句三條椽下歸空榻百尺樓中透逺峰晩鐘蟻返愁尋穴鴉歸喜見巢落葉方囘桐江集宋自遜自遜字謙父金華人自適弟號壺山居士瀛奎律髓慶元嘉定以來乃有詩人為謁客者干求一二要路之書謂之濶匾副以詩篇動獲干萬緡如壺山宋謙父一謁賈似道獲楮幣二十萬以造華居是也錢塘湖山此曹什伯為羣阮梅峯秀實林可山洪孫花翁季蕃髙菊磵九萬徃徃雌黄士大夫口吻可畏五月菊東籬千古屬重陽此本偏宜夏日長㑹得淵明髙臥意故來同占北窗涼後村于家詩一室一室冷如冰梅花相對清殘年日易晩夾雪雨難晴身計繭干緒世紛棊一枰麴生差解事談笑破愁城瀛奎律髓阮秀實秀實號梅峯興化軍人早見知于趙昌甫僑居呉門游賈秋壑之門最久人號阮怪咸淳初攝蕪湖茶局孟享仰瞻聖駕紫烟斂翠碧天長桞䕃旌旗午尚霜一朶彩雲擎瑞日光華盡在舜衣裳景靈宮恭謝駕回丞相以下皆簪花宮花宻暎㡌簷新誤蜨疑蜂逐去塵自是近臣偏得賜繡鞍扶上不勝春以上隨隠漫録鄧克中景靈宮恭謝駕回丞相以下皆簪花輦路春風錦繡張裁紅剪緑鬬芬芳黄羅傘底瞻天表萬疊明霞捧太陽随隠漫録歐陽慶甫慶甫咸淳中道州處士白魯井石刻詩地僻人稀能㡬家清泉潄玉石攲斜客來訪我慙無具洗甑炊香更㸃茶永州府志牟巘巘字獻之其先蜀人徙居湖州端明學士子才之子擢進士官至大理少卿宋亡時獻之已退不任事與子應龍一門父子自為師友討論經學以義理相切磨應龍遂以文章大家見推于東南獻之有陵陽集東坡九日尊俎蕭然有懷宜興高安諸子姪和淵明貧士七首余今嵗重九有酒無肴而長兒在宜興諸兒蘇杭溧陽因輒繼和驚飇舉落葉意氣何軒軒秋高百卉盡寂寞但空園何異富與貴變滅隨雲烟緬褱陶彭澤平生極幾研朗吟貧士詩相對如晤言今人之所恥古人以為賢翁媪共白髪蕭然老江干大兒荆溪游折腰豈為官諸兒走異縣亦各營一餐别多㑹面少端復坐飢寒諸㓜且眼前笑語開我顏勿問賢與愚懷抱俱相關好惡皆不察鑿垣植蒿蓬而比庭前菊鋤灌少人工此物抱至潔有似楚兩龔㽞香待嚴凛意與烈士同糞土笑伯始金錢鄙鄧通千載一元亮舎此安將從送婁伯高游吳桃花水暖清明前長堤桞色青如烟男兒年少重意氣春風買醉吳江船西湖三月春更好笙歌錦繡神仙島紫燕樓深翠黛閒碧羅天净楊花老興亡徃事置勿論千金不惜酹歌尊酒酣莫作後庭曲㳺人思斷江南魂去去知君訪陳迹呉山呉水青歴歴花殘鈿碎館娃空春草年年為誰碧君行正樂我為愁白髪送君思舊逰平生漫浪無似我努力功名須黑頭贈厲白雲上人雙徑聞鐘罷而今但熟眠事湏紅日上身在白雲邉古貎應違俗高吟不礙禪爐頭煨芋火相對各欣然和雨中但聼四簷滴眞成萬事休空村就誰飯高樹繫吾舟那忍田翁笑還憐朩偶流老人渾忘事畧記酉年秋四安道中所見蒼涼初日破林霏㡬度言歸不得歸兀兀籃輿續殘夢門前兒女挽人衣以上陵陽集家鉉翁鉉翁號則堂眉州人以廕補官賜進士出身歴端明殿學士簽書樞宻院事元兵至杭以參知政事介丞相呉堅等充祈請從畱燕宋亡守志不仕改館河間至成宗即位放還賜號處士以夀終寄江南故人曽向錢唐住聞鵑憶蜀鄉不知今夕夢到蜀到錢唐天地間集寄洞霄道友清溪翁漢家中郎年七十霜鬢垂垂人不識冬深破屨踏層冰暑到露頭走赤日窮堅老壯本分事百年未死為形役洞天九鎖鬰嵯峨古來相傳神仙宅我嘗結茅天柱前屐齒蒼苔印行跡刧火洞然城郭非清境不壞還如昔安期羡門我輩人圓嶠方壺一咫尺夢魂㡬度如相逢别來已久知相憶願分仙家九轉丹服之身輕生羽翼周遊八表任去來跳出隂陽寒暑域洞霄詩集九日登瀛臺此地無山喜有臺南瞻北眺兩宜哉衰翁無事日傾倒佳客何人時一來孤鶴飛鳴知我在征鴻嘹唳為誰哀老來萬事如歸宿不為憂愁强把杯河間府志李珏珏字元暉號鶴田又號廬陵民吉水人年十二通書經詔試館職除秘書省正字批差充幹辦御前翰林司主管御覧書籍除閤門宣贊舎人宋亡後不出年八十九而終有雜著四集錢塘百詠行于世劉詵桂隠集題李鶴田穆陵大事記後云宋自穆陵升遐元氣盡矣時欑宫屬官李珏記其本末頗詳橋山劒舄歴歴如見異代覧之亦為淒然因用鶴田先生昔陵下元夕韻以識感慨云陵寢嵬峩十二䦨西興吹角浙江寒老臣無限遺弓淚寫與人間異代看南郊紀事嚴更頻報夜何其萬甲聲傳逺近隨梔子燈前紅炯炯大安輦上赴壇時武林舊事題汪水雲湖山類槀天地事如許英雄鬢已斑淚添東海水愁壓北邙山湖山類槀附雪中寄友石角雲層道路難黑風三日晝漫漫吟笻直指西湖柳合與梅花共此寒皇元風雅題王右丞輞川圖園圖親畫早流傳已是人間五百年凝碧池頭秋句在當年㡬負此林泉珊瑚網題崇元觀舟維楊桞岸來拜晋英靈碑古龍紋暗劔寒蛟血腥江春半篙緑山曉一樓青燈火旌陽殿鐘聲過客聼四朝詩句此水自當兵十萬昔人曽有客三千梅磵詩話江隂乃春申舊封浮逺堂瞰江對淮為一郡佳境李鶴田一聯云云人多傳誦陳世崇世崇字伯仁崇仁人一作臨川郁子隨父入宫禁仍充東宮講堂説書兼兩宮撰述後任皇城司檢法賈似道忌之遂歸于鄉入元著隨隱漫録多述宋季事題曽氏諸帖南豐而後艇齋君忠義詞章萃一門手澤流芳凌劫火欽承猶得到來孫鐡網珊瑚呂三餘三餘號雪屋賀陳隨隱以布衣除東宮掌書青宮樓觀近堯階班列屏風閒坐開人羡杜閒生杜甫天教蘇頲繼蘇瓌馬歸禁苑行邊桞鶴伴平山隱處梅我恨長鑱斸黄獨老年無計䇿衰頽隨隱漫録桞桂孫桂孫號月磵賀陳隨隱以布衣除東宫掌書鏤玉裁冰字字竒少年親結九重知君臣際遇榮千載父子推敲冠一時罍進楚蘭春奏雅瓶分陶菊夜聯詩五雲樓近開黄道金紫連班進赤墀隨隱漫録劉彥朝彥朝字雷厓贈陳隨隱坎止流行只任天吟廬新􅅖紫薇邊夜窗低過宮花月曉巷深横御桞烟五字肎同餘子說一燈親自乃翁傳雖然不作功名念卻恐功名逼少年隨隱漫録張彝彜號溪居贈陳隨隱歸江西醖藉中涵廊廟姿詩文都好見宸批只䝉四字君王寵蟣蝨㣲臣不用題隨隱漫録呉石翁石翁字一齋贈陳隨隱大隱君家小隱君得名大半忌人聞秋窗吟共緱山月曉榻眠分華嶽雲鶯欲引雛先出谷馬纔生驥便離羣新詩卻要多拈出突過郎罷張我軍隨隱漫録杜汝能汝能字叔謙號北山太后諸孫居西湖之麴院有能詩聲秋日寂寥籬戸入泉聲不見山容亦自清數日雨晴秋草長絲𤓰沿上瓦牆生全芳備祖贈陳隨隱父子名相繼如君又出竒乾坤鍾秀氣湖海誦新詩放鶴春風逺横琴夜月遲未應隨大隱閒過聖明時隨隱漫録黄力叙力叙號梅堂江西人贈陳隨隱歸江西詩在天地間風清月明處若為深閉門而可覓佳句夫君小元龍豪氣隘區宇青春發詩材秀茁長膏雨流水與行雲吾不見滯住乗月滌吟毫玉椀三危露超詣自透脱悟在觀劔舞入宮畫蛾眉胡為衆女妒君詩亦何憾千載一時遇向也詩道昌吟聲喧禁籞應制沉香亭龍巾曽拭唾今焉詩道厄短笻䇿江路悲嘯梁父吟侘傺離騷賦浮雲時巻舒睨此知出處此其随之義大隱㑹境趣天地梅又春風𦂳雪飛絮一笠灞橋驢吟詩向臨汝得句從人傳傳今亦傳古要知是家傳審言以傳甫傳之而又傳衣鉢傳宗武隨隱漫録黄鵬飛鵬飛字桂隱莆田人送陳隨隱游廬山天下廬山第一竒西風楚楚送行時晦菴白鹿書猶在非是游山只愛詩曽從圖畫識廬山山好誰知畫亦難畫好不如詩好讀就煩詩筆畫來看虞德觀德觀亡其名蜀郡人句我因國破家何在君為脣亡齒亦寒虞集道園遺槀云從兄德觀父與集同出榮州府君宋亡隱居不仕而殁集來呉門得兄遺蹟有句云云不知為誰作也宋詩紀事巻七十六
