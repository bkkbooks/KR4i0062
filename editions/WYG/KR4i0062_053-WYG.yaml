body:
  text: 宋詩紀事巻五十三錢塘厲鶚撰陳讜讜字仲甫莆田人隆興元年進士累官兵部侍郎乞補外以集英殿修撰知寧國府再乞致仕封清源郡侯過溪南韓氏宅曽覽溪南勝重來四十年樹如人老矣山共水依然香玉紛堆案晴虹對跨川吾廬今咫尺乘興且盤旋莆陽文獻句竹密不知雲欲雨山髙盡見水朝宗四朝聞見錄莆陽陳讜文人也刻金字于靈壁石以壽韓侂胄至稱曰我王韓敗遂為言者所彈陳留題吳山三茅觀梅亭句云云繼是猶未有和者方有開有開字躬明淳安人隆興元年進士嘗官淮西運判有溪堂集方仙翁祠真仙祠觀鎖晴嵐下瞰平疇十里寛譜牒尚遺唐篆額風儀仍是漢衣冠紫芝白兔靈如昨石碣丹湖事不刋千載仍孫牛馬走敬瞻遺像仰髙寒青溪詩集張良臣良臣字武子汴人避㓂來鄞因家焉隆興元年進士官止監左藏庫有雪窗小集樓大防書集後云武子閉門讀書室無一物性嗜詩不輕作或終歳無一語故所作必絶人春詞後主搴香復倚春潘嬙梳洗最輕盈南朝破後無詞客燕子桃花古石城曉行千山萬山星斗落一聲兩聲鐘磬清路入小橋和夢過豆花深處草蟲鳴賦柳暗旗亭不忍㸔臨江愁殺晋衣冠傷心明月揚州路十里珠簾蕙草寒示長蘆仁禪師叢叢竹雀閙人家農事春來漸有涯品字柴頭煨正煖不知風雪到梅花梅市道中連雨疎篷不耐闗脩眉如失更晴慳越王故國無人問艇子穿花自往還西湖晚歸帖帖平湖印晚天踏歌遊女臂相牽鳳城半掩人爭路猶有胡琴落後船留題吳興投老庵白鷺悠悠去不還渚雲汀草一生閑暮年不入西州路空倚梅花説住山九日書吕季慈室上池入寺見承平影落南州迹易陳手把黄花看新雁風烟愁殺舊京人感舊三十六陂春水綠四十九年人事非揚子江頭永嘉後吳儂蕩槳北人稀過西溪罨畫層波蕙草荒冷雲客雁兩回皇梅花到得吹成雪盡是清愁不是香遣家書家住鄱陽小洞天經年烹鯉尚茫然㡬回鵲喜無消息吹殺燈花獨自眠小破小破燕支鈿早梅雪雲平淡越江遲青山歳晚行人少鴨鴨羣飛淺草時以上雪窗小集上雪竇山奉慈院迢迢嶺外雪雲明猶憶塵中見偉人沙上豈無新到雁附來莫厭尺書頻延祐四明志長松丹井九轉丹砂煉得成飄飄仙袂入青冥一泓寒水留真汞千歳長松産茯苓雲門志畧句客向愁中都老盡祗留平楚伴銷凝樓攻媿集䟦張縯縯字季長蜀之唐安人隆興元年進士官大理少卿奉陪安撫大卿登八陣臺覽觀忠武侯諸葛公遺像偶成長句白帝城西魚復浦十月江平見津滸當年累石紛成行此地卧龍經講武轅門外建嚴中權自注陣有壁壘一門東出列陣相承存後伍自注八陣相承又列數陣于後何人蛇勢識常山未數魚麗矜鄭拒懸知精神貫金石尚想號令嚴鉦鼔老兵料敵應疑生川后澄波其敢侮向令赤伏有餘符下睨皇州真指取云何遺跡司神明獨靳豊功被寰宇髙城置酒共臨眺往事興懐増歎撫巍然王佐三代前信矣名言照千古全蜀藝文志題沔州諸葛武侯廟赤伏終休運前營落大星皇王空禮樂江漢閟英靈斷壟牛羊入空山草木青經時須此牧清淚灑泉扄陕西通志黄度度字文叔新昌人隆興元年進士寧宗朝累官禮部尚書以煥章閣學士知隆興府青溪閣江家舊宅枕溪頭誰向溪灣著小樓無柰當年亡國恨潮生潮落㡬時休景定建康志楊方方字子直長汀人自號淡軒老叟隆興元年進士嘗受學于朱子之門仕至直寳謨閣廣西提刑趙南塘䟦云公暮年詩精清簡逺與俗異畛淳熈辛丑自武寧丞攝靖安作毛竹山頭雲雨昏靖安橋下小谿渾髙陂約水歸田急不管湍聲入縣門堂上官人似野人村甿相見可相親開門坐對臨溪樹故是水邊林下身對縣誰家數畆園竹亭茅宇雜花繁同官不可無兼局通管溪南水竹村題武寧丞㕔暮年叢薄寄鷦鷯搔首廵簷歳月銷留與後人還要否一軒松竹冷蕭蕭館中簡張約齋書生賦分合窮愁官與休辰不肎休清曉犯寒開省戸誰家見雪似瀛洲爛銀宫闕雲中見素柰園林月下遊説與南湖張祕閣速來同直道山頭以上後村詩話傅伯壽伯壽字景仁晉江人隆興元年進士紹熙中官浙西提刑一段竒軒在西湖淨相院門外紅塵走利名庵中白髪任浮生羡師法窟能深入厭我詩壇已屢盟𣺌渺水光簾萬疊離離梅影雪三更何人薦取真消息試鼔瑤琴一再行咸淳臨安志一眺石一眺人間萬事非海鷗山鳥便忘機林端髣髴見帆影知有扁舟天際歸南安縣志張抑一段竒軒雲山爛漫本難名收拾閑情付此生出處自知無上䇿往來聊欲試同盟門多賢轍人便静琴鎖師堂歳幾更六月岸巾來借榻頻遊應不禁船行咸淳臨安志傅伯成伯成字景初其先濟原人祖忠肅公察父自得避地居泉州為晉江人隆興元年與兄伯壽同舉進士理宗朝官至寳文閣學士提舉佑神觀卒贈開府儀同三司諡忠簡有竹隠集素馨花自注素馨南漢宫女名昔日雲鬟鎖翠屏秖今烟冢伴荒城香魂斷絶無人問空有幽花獨擅名全芳備祖許及之及之字深甫温州永嘉人隆興元年進士寧宗朝歴官參知政事知樞密院事有北征紀行詩集廢冢石人猶自立蒿萊拂讀殘碑字字哀鄰冢已澆寒食酒野風分送紙錢來東甌詩集孫逢吉逢吉字從之龍泉人隆興元年進士寧宗朝歴祕書監兼吏部侍郎出知太平州丏祠卒諡獻簡茅亭在泉州陳洪進宴游之地今廢陳氏當年為勝概吾徒今日作良游時遷代謝皆如此細雨燈花莫浪愁方輿勝覽程㢠迥字可乆寧陵人家于沙隨隆興元年進士仕為徳興丞調上饒令迥深于經學學者稱沙隨先生有南齋小集題玉真書院在徳興縣玉真山麓邑人吳紹古建陸九淵有經徳堂扁呉侯所築居密近玉真麓翳葳祕幽竒千載空喬木一朝敞虚境劃見神仙躅挂杖步危磴逺寄千里目鶴憑子晉笙鳧舉王喬足信是隠君子名入丹青錄冥搜得佳句隠然可騷僕早聞雲錦溪鳴榔到巖谷寄我輞川圖居然媚幽獨何當櫂輕舠飛鳥送遐瞩饒州府志自題眄怡齋乞得膠膠擾擾身霜筠露菊便相親勸君莫厭羮藜藿違已由來更病人六月松風萬籟寒笙竽頻到枕屏間夜深夢繞匡廬阜瀑布濺珠過藥䦨葵花已過菊花開萬里西風拂面來問字今朝㡬人至細㸔屐齒破蒼苔团學紀聞吳鎰鎰字仲權崇仁人曽弟登隆興元年乙科累官司封郎中極言罷歸有雲巖集崇仙觀二首浮丘仙袂風中挹子晉吹笙月下聞翠葢霓裳君過我尻輿神馬我從君人生塵土不可耐天上髙寒定自嘉但約麻姑擘麟脯莫㝷句漏問丹砂撫州府志送客香山寺十里香山寺三年到㡬回不嫌送客逺端是愛山來老木依山往閑雲為我開歸鞍意未足城鼔莫相催郴州文志陸游游字務觀越州山隂人佃之孫宰之子以䕃補登仕郎隆興初賜進士出身范成大帥蜀為參議官人譏其頽放因自號放翁累知嚴州嘉泰初詔同修國史兼祕書監升寳章閣待制致仕卒有渭南集劒南集直齋陳氏云游幼為曽吉父所賞識詩為中興之冠他文亦佳而詩最冨至萬餘篇古今未有四朝聞見録陸公早退居往來雲門若耶韓侂胄固欲其出落致仕除次對公勉為之出韓喜附已至出所愛四夫人擘阮琴起舞索公為詞有飛上錦裀紅皺之語公臨終以詩示其家云王師剋復中原日家祭母忘告乃翁公之心方暴白于易簀之時矣臨安春雨初霽世味年來薄似紗誰令騎馬客京華小樓一夜聽春雨深巷明朝賣杏花矮紙斜行閒作草晴窗細乳戲分茶素衣莫起風塵歎猶及清明可到家後村詩話放翁少時調官臨安得句云小樓一夜聽春雨深巷明朝賣杏花傳入禁中思陵稱賞由是知名陳阜卿先生為兩浙轉運司考試官時秦丞相孫以右文殿修撰來就試直欲首送阜卿得予文巻擢置第一秦氏大怒予明年既顯黜先生亦㡬陷危機偶秦公薨遂已予晚歳料理故篋得先生手帖追感平昔作長句以識其事不知衰涕之集也冀北當年浩莫分斯人一顧每空羣國家科第與風漢天下英雄惟使君後進何人知大老横流無地寄斯文自憐衰鈍辜真賞猶竊虚名海内聞恩封渭南伯唐詩人趙嘏為渭南尉當時謂之趙渭南後來将以予為陸渭南乎戲作長句老向人間乆倦遊君恩乞與渭川秋虚名定作陳驚坐好句真慙趙倚樓棧豆十年霑病馬烟波萬里著浮鷗就封他日輕裘去應過三峯處處留示兒死去元知萬事空但悲不見九州同王師北定中原日家祭無忘告乃翁以上劒南集絶句碧玉當年未破𤓰學成歌舞入侯家如今顦顇篷窗底飛上青天妒落花懐成都舊游二首金鞭朱彈憶春游萬里橋邊罨畫樓夢倩曉風吹不斷書憑春雁寄無由鏡中顔鬢今如此席上賔朋好在否篋有吳牋三百箇擬将細字冩春愁裘馬清狂錦水濵是繁華地作閒人金壺投箭消長日紅袖傳杯領好春幽鳥語隨歌處拍落花鋪作舞時茵悠然自適君知否身與浮名孰重輕齊東野語陸放翁在蜀日有所盼嘗賦詩云云出蜀後每懐舊遊多見之賦詠云云沈園二絶慶元己未作夢斷香銷四十年沈園栁老不飛綿此身行作稽山土猶弔遺蹤一悵然城上斜陽畫角哀沈園無復舊池臺傷心橋下春波綠曽是驚鴻照影來禹蹟寺南有沈氏小園四十年前嘗題小詞一闋壁間偶復一到而園已三易主讀之悵然紹熙壬子作楓葉初丹槲葉黄河陽愁鬢怯新霜林亭感舊空囘首泉路憑誰説斷腸壊壁醉題塵漠漠斷雲幽夢事茫茫年來妄念消除盡回向蒲龕一炷香歳暮夜夢遊沈氏園兩絶開禧乙丑作路近城南已怕行沈家園裏更傷情香穿客袖梅花在綠蘸寺橋春水生城南小陌又逢春只見梅花不見人玉骨乆成泉下土墨痕猶鎻壁間塵齊東野語陸務觀初娶唐氏于其母夫人為姑姪伉儷相得而弗獲于其姑既出而未忍絶之則為別舘時時往焉姑知而掩之雖先知挈去然事不得隠竟絶之唐後改適同郡宗子士程嘗以春日出游相遇于禹蹟寺南之沈氏園唐以語趙遣致酒餚翁悵然乆之為賦釵頭鳯一詞題園壁間實紹興乙亥歳也翁居鑑湖之三山晩嵗每入城必登寺眺望不能勝情未乆唐氏死嘗作詩共五首云紀夢白首歸修汗簡書每因囊粟歎侏儒不知月給千壺酒得似蓮花博士無趙章泉梅課云嘉泰壬戌九月陸放翁夢一故人相語曰我為蓮花博士鏡湖新置官也我去矣君能暫為之乎月得酒千壺亦不惡也遂以詩紀之云云致爽軒在永康軍黄塵赤日汗霑裾竹裏煎茶喜有餘堪笑放翁窮意巧就君池舘讀君書方輿勝覽感姚将軍事題青城山上清宫壁造物因豪傑意将使有為功名未足言或作出世資姚公勇冠軍百戰起西陲天方覆中原殆非一木支脫身五十年世人識公誰但驚山澤間有此熊豹姿我亦志方外白頭未逢師年來幸廢放儻遂與世辭從公遊五岳稽首餐靈芝金骨換綠髓欻然雲外飛庶齋老學叢談姚将軍靖康初以戰敗亡命建炎中下詔求之不可得後五十年乃從吕洞賔劉髙尚往來名山有見之者放翁感其事作詩感趙宗印事我夢游太華雲開千仞青擘山瀉黄河萬古仰巨靈往者禍亂初氛浸干太寕豈無卧雲龍一起奔風霆時事方錯繆三秦盡羶腥山河消王氣原野失天刑将軍散髮去短劒斸茯苓定知三峯上爛醉今未醒庶齋老學叢談靖康建炎間闗中竒士趙宗印提義兵出戰有衆數千所向輒下敵不敢當㑹王師敗于富平宗印知事不濟大慟于王景畧廟盡以金帛散其下披髪入華山不知所終放翁感其事作詩云云韓幹馬唐人畫馬如相馬口口不在驪與黄天機入神即揮灑氣脫毫素先騰驤昔年曽畫穆王游八極八龍之駿雲五色後來又寫越影超光脫丹碧後來又寫漢武窮渥洼復見神駒來漢家勢走滅沒開風沙壯哉此馬健且雄玉花徧身雲滿鬉首如渴烏眼如電皎如疋練横睛空使之陷陣當破敵萬馬不敢先秋風如何解鞍脫其馽縱爾俶儻如游龍君不見四海罷征戰九夷盡梯航方将郤爾宛水之西歸爾華山之陽幸逢韓供奉冩爾神杜拾遺歌爾良贈爾支道林愛爾神駿懸髙堂珊瑚網句積憤有時歌易水孤忠無路哭昭陵娱書堂詩話唐制有冤者哭昭陵下李洞䇿夜獻簾詩云公道此時如不得昭陵痛哭一生休陸務觀亦有句云云虞儔儔字壽老寕國人隆興初入太學舉進士以太常少卿使金累官兵部侍郎奉祠卒有尊白堂集過千秋嶺輕隂漠漠雨斑斑嶺上風來一解顔已是去天纔尺五郤令緩步有躋攀飛泉百道縈羅帶列岫千峯擁翠鬟應是北堂春正滿㡬廻回首望家山寧國府志馬之純之純字師文金華人隆興進士慶元間主管江東轉運司文字著金陵百詠世號野亭先生孫光祖有名元武湖萬頃冥茫水拍隄當時于此習舟師長江天險雖堪恃鬭艦人謀可勿施莫使黑龍離舊窟且教元武入新詞如何又作蓬瀛景時節來遊看水嬉東冶亭舊時秖說東西冶今日轉為長短亭無柰梅花臨水白可堪柳色向人青十分瀲灩苦難把三疊凄涼誰忍聽不道離愁堆滿屋往來車馬放敎停以上景定建康志郭明復明復成都人印子隆興癸未登科仕為宗丞題琵琶亭并序白樂天流落湓浦作琵琶行其放懐適意視憂患死生禍福得喪為何物非深于道者能之乎賈傅謫長沙抑鬱致死陸相竄南賔屏絶人事至從狗竇中度食飲兩公猶有累乎世未能如樂天逍遙自得也予過九江維舟琵琶亭下為賦此章時淳熙己亥中元日香山居士頭欲白秋風吹作湓城客眼看世事等虛空雲夢胸中無一物舉觴獨醉天為家詩成萬象遭梳爬不管時人皆欲殺夜深江上聽琵琶賈胡老婦兒女語淚溼青衫如著雨此公豈作少狂夢與世浮沈聊爾汝我來後公三百年潯陽至今無管弦自注公詩有潯陽小處無音樂之句長安不見遺音寂依舊康廬翠埽天容齋三筆賈誼自長沙召還後為梁王傅乃卒前所云少誤矣題三峽堂三峽堂前五月風吳檣蜀柁古來通山如肺附重相掩水似環連去不窮躍馬孤城憐倔強卧龍八陣想英雄憑䦨千載興亡事何異邯鄲一枕中大人按部過雲安下巖留題命同賦道人昔日來開山山鬼悔泣門不闗一時梵宇借嵓麓千載絶景歸人間松蘿鬱勃樹旌纛水泉丁東鳴佩環兩蘇寂寞涪翁死杖屨誰與同躋攀以上全蜀藝文志陳翊翊字君正甲申仲冬侍親由行在所還毘陵舟泊村渚日暮成孤泊棲遲得小安雪融沙觜露雲拂㕍翎寒過櫓冰痕轉通村水汊寛詩情如廢井賸覺起波瀾前賢小集拾遺黄然然豫章人隆興中官右朝請郎知台州涪翁亭在蜀嘉陵清音妙絶東坡老方響名髙太史公水遶鳥飛談笑外江連洪雅畫圖中方輿勝覽張維維字仲欽延平人隆興中通判建康府事乾道中廣西經畧安撫使留守舍人張公安國聞維築亭為題其榜曰朝陽既去而亭成復為賦詩次韻日邊清切以文鳴立對朝陽欲問程筆落春生變寒谷詩來將喜破愁城簷前水到乘槎便天際山横與檻平準擬公歸道過此小留觴詠集簪纓景定建康志題張公洞年來行樂與民同探穴追蹤太史公幽洞初開名易著蒼崖新刻句難工風驅俗駕松扉外雲鎖仙丹石室中付與山僧司管鑰勿敎勝地草蒙茂桂勝蔡勘勘字定夫莆田人襄之後乾道二年進士除祕書省正字知江隂軍題盱眙自古東南第一山于今無異玉門闗亂雲衰草蒼茫外赤縣神州指顧間擊楫何人酬壯志凭䦨終日慘愁顔中原父老應遺恨秪見氊車歳往還錦繡萬花谷徐似道似道字淵子號竹隠黄巖人乾道二年進士歴官權直學士院遷祕書少監終提點江西刑獄有竹隠集貴耳集淵子嘗為少蓬朝聞彈疏坐以小舟載菖蒲數盆翩然而去道間爭望若神仙九日衰容不似秋容好坐上誰憐老孟嘉牢裹烏紗莫吹郤免敎白髪見黄花鶴林玉露偶題老去功名不挂懐髙眠之外秖清齋偶因種竹便多事風葉掃餘還滿階詩家鼎臠買硯俸餘擬辦買山錢郤買端州古硯甎依舊被渠驅使在買山之事定何年鶴林玉露劉改之賀徐直院啟云以載鶴之船載書入覲之清標如此移買山之錢買硯平生之雅好可知用其詩語也廬山得蟹不到廬山辜負目不食螃蟹辜負腹亦知二者古難并到得九江吾事足廬山偃蹇坐吾前螃蟹郭索來酒邊持螯把酒與山對世無此樂三百年時人愛畫陶靖節菊籬東遶手親折何如更畫我持螯共對廬山作三絶貴耳集蓴羹千里蓴絲未下鹽北遊誰復話江南可憐一筯秋風味錯被旁人舌本參送春圓蒲相將結僧夏荷葉蒲茸綠相亞浮花浪葉自飄零小院廻廊正瀟灑葉如青幄花成茵細腰起舞來送春紙光如銀墨如漆落筆四座驚有神輕衫短㡌付餘子花前醉倒輸閑人以上全芳備祖舟行大官連檣十萬艘小官僅得一葉如漁舠其中何所有白髪翁媪并兒曹赤腳婢三後執㸑蒼頭奴子前操篙元真筆牀間茶竈吏部酒杯兼蟹螯書緘一箱半魚蠹詩束百軸成牛腰平鋪稾秸薦貓犬賸買棗粟供猨猱新花鬱屈作萎木清酒搖蕩成濁醪篷低日覺巾角折竈近時聞羹釡轑髙驤正難望鷁首緩進豈敢爭龍標全家窟拘歎踡跼長物屏當隨週遭桑樞駟馬各是累人肝薇蕨俱成饕不須彼此更相笑未必鬱林之石賢胡椒後村詩話虞仲房司馬遊園約予不赴因次其韻祕書行處有歌鐘身在名園錦繡叢試問髙吟梁苑雪何如共快楚臺風人鷗不去機方息魚我相忘樂未窮待得芙蓉濯雲錦弄花翻水與君同赤城詩集自笑黄昏茅店帶星入清曉竹輿蒙露行客路三千年五十對人猶是説歸耕東甌詩集句胸中着雲夢皮裏有陽秋自作先生傳誰為故吏碑挽錢觀鬲上村坊酒眉尖野店茶天寒不知翠袖薄日煖但覺玉烟生水仙花索醉寧傾問字酒忍飢不取作碑錢駒入隙來元不礙蠅穿紙出定何妨紙閣北風萬籟自宫徵寒日一軒真袴襦以上後村詩話婁機機字彦發嘉興人乾道二年進士寜宗朝累官禮部尚書兼給事中權同知樞宻院事兼太子賔客進參知政事提舉洞霄宫日哦軒髙軒多暇日宴寢獨怡神風俗無今古雲山自主賔灘平分燕尾松老半龍鱗徙倚清隂下吟懐媿昔人杭州府志羅願願字端良號存齋汝楫子以䕃補承務郎中乾道二年進士守鄂州有小集題興善寺碧玉軒木犀在新城縣老照軒前翠已空忽驚嘉樹碧玲瓏幽芳自出禪枝外圓相長標法窟中過客莫辭三宿戀道人已費十年功要須共結團圞坐賞盡清秋靣靣風送邕州吳使君題輿纔赴日邊程便擁油幢鎮列城地望素髙唐五管人才今似漢三明時清市駿非無意歳晏逄花好寄聲太學英名湖海氣此行持論要平平以上鄂州小集黄希希字夢得宜黄人乾道二年進士終永新令有補注杜詩未竣而卒子鶴續成之題石䂬注見鄒極詩誰賦阿房未霽虹秖誇複道峭淩空那知海石驅來處都在巖花晏坐中鯨背逺衝千嶂雨鼈頭髙占一天風漫郎更有中興頌倩把蒼崖仔細礱撫州府志周孚孚字信道濟南人寓家京口乾道二年進士終真州教官辛稼軒刋其集曰蠹齋鉛刀編贈蕭光祖之子固絶俗少年甘寂寥田園一蟁睫書巻百牛腰雪徑晴猶凍烟江晚不潮箇中勤著語老耳待聞韶宋公佐席上分韻得樓字誰謂子青眼不嫌予白頭共穿康樂屐來醉仲宣樓風定江猶怒雲髙雨欲休西山多爽氣吾忍賦悲秋寄辛㓜安我屋與君室濟河南北州相逄楚天晚郤㸔蜀江流老境渾能迥妖氛竟未収何時一廛地歸種故園秋次韻朱得裕見贈予病初起葢世功名黍一炊驚心歳月轂雙馳五漿先饋那須爾二豎相陵少避之種種鬢毛吾欲老翩翩書札子能竒黄花無語秋將暮莫惜元談與解頤以上蠹齋鉛刀編薛澄澄鄞人乾道二年進士效朱公叔絶交詩東山有梟不祥其名惡木是息惡聲是鳴食不棄腐飲不擇精宜飛求伏以晦為明凶殘滿志嗜欲惟攖伸頸招鳯使鳯自驚豈有鳯口而和梟聲柰何伊人弗審物情請從此別各自謀生甬上耆舊集許開開字仲啟丹徒人乾道二年進士官中奉大夫提舉武夷沖祐觀有志隠類稾水仙花定州紅花瓷塊石藝靈苖芳苞茁水仙厥名為玊霄適從閩越來綠綬擁翠條十花冒其顛一一振鷺翹粉蕤間黄白清香從風飄囘首天台山更識膽瓶蕉全芳備祖洞霄宫珠宫梁柱太平年福地從知接洞天曲檻一峯飛怪石幽亭三峽迸流泉驪龍睡重時方旱白鶴歸來客欲仙殿上紅雲西日暎此身如在玉皇前洞霄詩集謝深甫深甫字子肅臨海人乾道二年進士累官知樞宻院兼參知政事拜右丞相以少傅致仕理宗朝以孫女為皇后追封魯王諡惠正有東江集天台道中溪繞青山路繞溪山長溪曲路髙低晴灘淺澀舟如盪危磴棱層石作梯晩照荒村飛鳥入秋風落葉敗蟬嘶碧雲四合長天暮轉使鄉闗望眼迷台州府志王枏枏字木叔永嘉人乾道二年進士累官監進奏院坐僞學罷知江隂軍遷大理丞歴吏部郎中祕書少監知贑州有合齋集南康泊舟欲遊廬山值雪春風浩蕩江湖客咫尺廬山風雨急門前老樹最闗情一夜相思頭盡白東甌詩集倪思思字正甫歸安人乾道二年進士寧宗朝累官禮部尚書以寳謨閣直學士知福州卒諡文節有齊齋甲乙稾翰林前後稾延平港灘長幾贑石三百里險過瞿唐十八灘幸有溪旁平穏路何須欲速冐驚湍方輿勝覽慈感寺東軒水花風葉暮蕭然靄靄雲山帯瞑烟竚立東軒未能去更看明月湧晴天湖州府志周洎洎字子及天台人乾道二年進士國子監主簿拜卞忠貞墓在金陵冶城晉鼎臲卼姦人窺孰謀國者如兒嬉陷穽弗設延虎貔虓闞搏噬嬰者摧羣公奔潰不敢誰卞公力疾起督師謂事迫矣奚生為以肉餧虎吁可悲公則死矣二子隨偉哉忠孝萃一時維公忠義天所資向來謀國如蓍龜不用吾言至于斯為社稷死則死之冶城之麓江之湄荒冢突兀餘豐碑半生讀史長歔欷拜公之墳涕霑頤死者可作吾誰歸嗟哉江左固多士往往所欠惟一死元規兒軰何足罪王公偪仄石頭裏氣息奄奄有如泉下鬼蘇武之節不如是視公胡不顙有泚男子之死一言耳死而不亡公父子景定建康志楊甲甲字鼎卿乾道二年進士仕不顯遊長松寺宿石門僧舍以石門霜露白為韻得露字疾風吹輕衣駕我雲脊路人間一囘首驚絶不敢顧鳥投虚無底渺渺不知處蜂窠蟻立垤與世同所騖試看一蒼莽誰有不平慮尚憐野僧屋佛面荒苔蠹斷崖劃呀吻洶洶崩石怒我來得竒觀拄杖叩巖樹青山有驕色斯客不能句平生二三子慰我一相遇娟娟松間月幽夕亦可度夜闌更小語風逼遺響去酌君無多酒繼以木蘭露登安福浮圖以髙標跨蒼穹為韻得跨字誰能於虚空千仞擢修架層梯髙寥寥可歴不可跨疑從地上涌幻手聊一化飛龍送千柱雷雨天一借巍巍大勝妙突兀此其亞道人豈澄觀佛事了閑暇指揮三百尺斤斧隨叱咤當時奮赤手意濶已遭罵後來見竒特世眼一驚詫塹山作平地海濶梁可駕哀哉耳目陋未信猶疑嚇淩髙更回首落日在雲罅蒼蒼野浮樹漠漠水分汊悲涼豪傑窟野冢理王伯百年眼前是俛仰閲榮謝惟當快飲酒醉聽風鈴夜朱真人祠一濯巖下溪再拜巖中庭清風蕭然來吹我衣上腥仙人芙蓉冠乘月下雲軿山空雜佩響夜静朝百靈似聞客欲去小語猶丁寜肅肅上松栢急以兩耳聽寂寥古壇外但挂斗與星天明恐是夢恍惚遺心形去飲石上水再讀幽人銘青山無行迹霧雨松冥冥寒食㳺學射山疾風吹沙天茫茫日落未落原野黄山空無人石碌碌路長馬飢石齧足荒苔古林翳雲族何人刳嵓縛層屋當時萬騎填山谷至今拾寳多遺鏃故國山川愁逺目人世悲歡風雨速浚髙舉手天為蹙手攀嵓樹叩雲木何人唱我凄涼曲興亡一眼冥冥綠野水平蕪飛雁鶩靈泉山中野色山圍盡風烟更可憐客情牛鐸外農事藕花前聚汲松根井寛愁石底泉雲安須斗水詩興亦超然勝地仙靈宅微官也謫居焚香他日夢隠几向來書小睡便山雨長齋稱野蔬逄人問無恙滿意說樵漁以上成都文類曽懐懐字欽道晉江人孝寛曽孫建炎初為金壇簿知真州乾道初賜同進士出身參知政事拜右丞相封魯國公奉祠卒恭和御製玉津園宴射名園佳氣靄非烟冠佩朝宗似百川五品並令陪宴射四鍭端欲序賔賢恩涵春意魚翻藻威入秋聲雁落弦竣事更容窺典雅宸章應陋柏梁篇夢粱録城南玉津園在嘉㑹門外四里紹興四年北使來賀天申節遂宴射其中孝廟常臨幸命皇太子宰執親王侍從五品以上官及管軍官講宴射禮孝廟御製詩宰臣曾懐恭和云云鄭僑僑字惠叔興化人乾道五年進士第一簽書鎮南軍節度判官光宗朝權吏部尚書寜宗朝拜參知政事以觀文殿學士致仕題夾漈草堂杪秋㝷逺山幽懐鬱沖沖草堂跨層崖夕陽山影空髙人辭天祿結交杖藜翁游氛暗九土歳晚余曷從泠泠夾漈水謖謖長松風思之不可見淚落秋雲中莆陽文獻王希吕希吕字仲行宿州人渡江居嘉興乾道五年登進士累除中書舍人給事中轉吏部尚書以端明殿學士知紹興府入直學士院作玉堂晝永暑風微簌簌飛花落小池徙倚幽欄憑問訊夏鶯飛出萬年枝玉堂雜紀學士院東閣窗下甃小池乆無雨則涸傍植金沙月桂之屬又有海棠郁李玉繡毬各一株西偏植金橘逼城根枝不能大花開時滿院結實雖小而甘浙中未易得也王仲行詩云云湖山十詠存四首瑟瑟輕冰拆御溝溝邊柳色弄春柔數聲啼鳥破幽夢斷送西湖㝷舊游石罅微泉咽淺沙沙頭細草換年華疎籬酒斾管春事倚馬短檐梅著花雨挾東風作嫩寒短牆圍水柳藏烟游人不出西湖靜白鷺飛來在畫船露葵抱蘂未全開翠竹隂涼蔽緑苔貪看青林飛白鳥丁丁啄木又驚回咸淳臨安志本覺寺三過堂門外驚風吹細沙入門水氣湛清華呼童試向林間看巖桂應開第二花嘉興府志熙寧間有文長老住寺中東坡三過之故名王希吕有詩陸埈埈字子髙本髙郵人建炎初徙海鹽乾道五年進士知和州官至尚書有益齋集醜梨醜梨出崇徳之東貌雖惡而味絶勝聞嘗進御因賦灰貌疑清古霜津溢脆甜面嫌湯後白心慰邑中黔羙實鍾寒谷珍嘗近御匳彼姝徒冠玊爭得似無鹽至元嘉禾志曽丰丰字幼度撫州樂安人乾道五年進士官徳慶太守恬于仕進築室曰撙齋有緣督集賀皇太子生日運轉黄河舊波澄少海清菊籬浮喜色蘭殿沸歡聲岐嶷親王羡聰明左右驚英姿涵玉裕冊禮建金旌入省龍樓曉歸休鶴禁晴講筵心㑹道賔苑禮通情誕日愉謠滿儲庭瑞彩盈兩宫筵具渥六佾舞儀輕靜念孤蹤逺曾叨四友榮尚稽陪角綺遙祝壽籛鏗登滕王閣故閣崢嶸已劫灰又看新閣上煙煤斷碑無日不濃墨古砌雖秋猶淺苔江闊鳥疑飛不過風輕帆敢趁先開天髙眼迥詩囊小收拾不多空一來以上緣督集嚴子陵周家刑不上大夫法固不足禮有餘何人不願立朝路未老誰肎甘田廬秦阬學士寘勿論漢嫚大臣眡如奴逸民不出朝士去前有兩生後二疏世祖聰明失之察待臣少禮多以法當時祿位列三公危似千金懸一髪先生識帝貧賤時富貴何妨與共之云胡君房留不住無乃平日窺其微龍顔之疏顧豈忍烏喙所伏那可知初來髙蹈疑矯世從後逆覩信知㡬退身不勇公孫賀明泣危機終自墮先生明甚勇如之天地萬物莫吾挫將星羣立客星孤羣恐難調孤易禍帝座旁邊睡熟閒夢魂已在桐江卧將星耿耿亘今明不比客星明更大釣臺集疎山在金谿縣草徑蜿蜒十里閑雲闗若在畫圖看萬松密翠地無影一水長清天自寒撫州府志句不可以風霜後葉何傷于月雨餘雲陳郁話腴曽撙齋遭論歸賦自省詩中一聨云云託物寄情得坡之意王藺藺字謙仲廬江人乾道五年進士歴官禮部尚書樞宻使卒諡獻肅有軒山集中塔悟空禪院有引予前年自江西召還以十二月六日抵修門雨後微雪宿接待院今得罪去國復以是日雪中來明日過皐亭見福公長老言及相與歎息因留三絶紹熈改元軒山居士王藺重到招提恰兩年北窗風雪擁衾眠客來休説邯鄲夢世事端知不偶然富貴危機豈獨今且從麋鹿逐山林秖慙莫報君恩重敢廢惓惓畎畆心臯亭回首輭紅塵晴日僧房暖似春禪老眈眈如卧虎相逄一笑問來因三首見臯亭塔院石刻蕭之敏之敏潯陽人官御史滴翠樓并序乾道五年三月十八日遇堪村逆旅主人徐季登飲予小樓之上且求樓名予曰亂山滴翠衣裘溼此東坡昌化之詩也請以滴翠名之可乎季登曰唯唯賦兩絶以志之一溪流水漾殘春上有髙樓碧瓦新溪路晝隂元不雨郤愁空翠溼衣巾咸淳臨安志楊簡簡字敬仲慈谿人乾道五年進士寧宗朝累官將作少監出知温州以寳謨閣學士致仕卒諡文元學者稱慈湖先生有慈湖甲稾絶句淨几横琴曉寒梅花落在弦間我欲清吟無句轉煩門外青山鶴林玉露云句意清圓足覘其所養題仙山院黙齋漸漸疎鐘動深深一徑開炎光隔林麓清興遶崔嵬擬作臨流賦應湏倩雨催小窗宜挂起且放竹風來富陽縣志黄景說景説字巖老號白石閩人乾道五年進士嘉定中直祕閣知靜江府有白石丁槀鶴林玊露姜白石黄巖老學詩于蕭千巖巖老亦號白石詩亦工時人號雙白石云梨嶺遇雨黑風吹雨又黄昏雞犬數聲何處村身在嶺雲飛處溼不闗別淚濺成痕詩人玉屑陸九齡九齡字子壽撫州金谿人乾道五年進士官全州教授卒寳慶中贈朝奉直祕閣賜諡文逹與僧淨璋自從相見白雲閒離別嘗多㑹聚難兩度逄迎當汝水數年隔闊是曹山客來濯足傍僧怪病不烹茶侍者閑不是故人尋舊隠祇應終日閉禪闗瀛奎律髓陸九韶九韶字子美九齡弟築室梭山講學其中號梭山老圃有文集月石金谿縣南翠雲山有巖竇正圓如月曰月石玉兔愛佳泉飲泉化為石規圓立山趾萬古終不息應厭舊星躔盈稀多缺夕自從寄兹蹤表表無晦蝕光彩雖暫埋體素得不易神物豈終潛早晚照九域試茗泉在翠雲山邂逅成山行往往有異景竒怪爭呈露獨不見試茗逶迤即道周泓澄得幽井淆之不可濁凝然如自省龜蒙於越來儻亦煮石鼎豈為渴者甘醉夢當一警以上撫州府志陸九淵九淵字子靜九韶弟乾道八年進士調靖安簿累官著作丞光宗即位除知荆門軍務卒諡文安嘗結精舍于貴溪之象山學者稱象山先生有集疎山在金谿西南村靜蛙聲幽林芳鳥語警山礬分皓葩隴麥搖青穎離懐付西江歸心薄東嶺忽忘飢歉憂翻令發深省子規柳院竹亭茅店雲蕪風樹烟溪聽徹殘陽月下不論巴蜀東西以上象山集馬先覺先覺字少伊崑山人乾道初進士累遷兵部架閣號得閑居士有慚筆集喜樂功成招范至能入詩社燕國將軍善主盟新封詩將一軍驚范家老子登壇後鼓出胸中十萬兵慧聚寺神濟善醫能知人死生既享髙壽臨終甚了了作詩哭之端的西來了世緣有身寧肎自謀安殷勤療病肱三折去住無心指一彈貝葉翻餘清磬在梵香飄斷暮鐘殘秪今雙樹婆娑影空鎖靈山片月寒崑山雜詠王時㑹時㑹明州奉化人乾道中進士徐鳧巖絶壑攙空雲與平横飛寒瀑萬年聲杖藜過盡人閒險獨向千山頂上行雪竇寺志陳蒙㳺雲門枝䇿耶溪寺風流憶晉唐門深雲未散梁古帖猶香晩翠千峯逺春深一澗長徘徊松影下覓句向斜陽雲門志畧范偃偃字公武乾道中知晉陵縣題慧聚寺次孟郊張祜韻散䇿欲薄暮疎鐘猶殷牀風烟函古趣巖壑生幽香仰首逼象緯俯視眇川光向來非突兀㡬成虎豹場飛閣臨無地具區平可吞髙巖聳怪石老木纒雲根人散魚蝦市帆歸葭葦村每來豁塵慮不妨頻欵門崑山雜詠王寧寧常州人乾道中進士和樓守浮逺堂留題乆去鄉闗始一來竹輿行樂亦佳哉還尋童子釣游處又趁史君旌騎廻風物于人隨意好江山如畫得天開向來紀勝歸名筆喜為重鑱置石崖咸淳毘陵志彭正建正建乾道中以詩名絶句天與蓮峯作逸民舊時相識㡬人存家書千里嬾開眼僦屋兩間長閉門萬姓統譜宋詩紀事巻五十三
