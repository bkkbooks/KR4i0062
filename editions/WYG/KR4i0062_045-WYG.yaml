body:
  text: 宋詩紀事巻四十五錢塘厲鶚撰陳淵淵字知默初名漸字幾叟南劒州沙縣人瓘之従孫紹興五年賜進士出身累遷右正言終宗正少卿有默堂集錢清堰待潮江潮來去自有時扁舟閣淺心如飛岸容霜竹青照眼春信梅花香撲衣天寒鄞江道路阻嵗晏錢清風俗非故園回首二千里落日看盡行雲歸題綠波亭南浦江波綠陽關栁色青夕陽千古恨分付短長亭寄内明月向人圓愛之不能睡坐久風露寒忽忽心如醉念君一適我所遇無歡意況乃久别離相思到夢寐我生百不堪謬學屠龍技于今半世人升斗亦未遂賴有室中友素懷隠居志肻與梁伯鸞扁舟共東逝天姥寺浮雲作秋陰細雨如朝霧放形山水間意適無艱步忽遇古招提空翠森回互倚杖聽泉鳴悠然不能去季修舍舟趨諸暨謁劉元成獨泛錢清江有懷其人人遠牛羊暮春深草樹滋野橋低映水浦岸曲縈籬風雨江湖思乾坤杖履疑論心竟誰是短棹欲何之邑中諸公見和再用前韻看盡愁人萬點紅曉來雙鬢白于茸他時儻記江南夢畫我黄梅細雨中錢唐江潮頭駕月衝殘夢水色浮空送峭寒十幅輕蒲連夜發不知身到海門山以上默堂集題善山院拄頤長劒上凌煙自古功名亦偶然鍾鼎山林俱不惡一瓢可飲盡吾年延平府志秦梓梓字楚材檜弟歷知台秀袁太平常湖六州除翰林學士出知宣州再移湖州進資政殿學士致仕溧陽貞女祠史氏之女生寒門白璧粲粲貞義存上無所天漂為業春風三十報母恩斬奢芟尚白日昏子胥脫身閒道奔遠來困窮乞于此分以壺漿救虛餒子胥還吳雪讐恥貞女可憐身已死一飯之德古必償遺以千金投瀨沚謫仙高才解幽沈奕奕穹碑照江水有客停舟臨古祠涼飇動木興遐思蕉黄茘丹幾千古焄蒿悽愴若見之更憐抉目人已去姑蘇臺上草萋萋貞烈集鄭樵樵字漁仲莆田人居夾漈山中自稱溪西逸民紹興中以薦召對給札歸鈔所著通志書成入為樞密院編修官有夾漈遺稾北山巖西風洩洩片雲閒一夜寒泉臥北山倚杖巖頭秋獨望稀疎煙壠是人間興化府志黄公度公度字師憲莆田人紹興八年進士第一簽書平海軍節度判官累仕考功員外郎有知稼翁集悲秋萬里西風入晩扉高齋悵望獨移時迢迢别浦帆雙去漠漠平蕪天四垂雨意欲晴山鳥樂寒聲初到井梧知丈夫感慨關時事不學楚人兒女悲知稼翁集包孝肅清心堂千里有餘刃一堂聊賞心庭虚延遠吹簷敞受繁陰休吏簾初下忘懐機自沈人間足塵土無路到清襟肈慶府志分水嶺嗚咽流泉萬仞峯㫁腸従此各西東誰知不作多時别依舊相逢滄海中肈慶府志黄公度為祕書省正字貽書臺官言者謂其譏訕時政罷為主管台州崇道觀過分水嶺有詩云云及公歸莆趙丞相鼎謫居潮陽讒者傅會其說謂公此詩指趙而言將不久復偕還中都也秦檜怒令通判肈慶府題嵩臺二絶四山如畫古端州州在西江欲盡頭漫道江山解留客老夫歸思甚東流松菊壺山手自栽二年羈宦客嵩臺無端卻被東風誤又作恩平一夢回廣東通志陳俊卿俊卿字應求莆田人中紹興八年進士累遷尚書右僕射同中書門下平章事兼樞密使淳熈二年除少保判建康府以少師魏國公致仕卒贈太保諡正獻有集共樂堂在興化軍治西州峯之顛為城中登眺勝處共樂堂前花木深登臨當暑豁塵襟紅垂茘子千家熟翠擁篔簹十畝陰老退已尋居士服清歡時伴醉翁吟憑闌四望豐年稼差慰平生憂國心方輿勝覽哭林艾軒出為嶺嶠澄清使歸作甘泉侍従臣百擔有書行李重十金無產橐中貧經旬把臂言猶在昨日題詩墨尚新清曉訪君呼不起寢門一慟淚霑巾合璧事類續集題夾漈草堂流水三閒屋公曾半席分帝嘗招此老天未喪斯文人去留青竹山空只白雲升堂時想像金石恍猶聞蕭陽文獻方翥翥字次雲莆陽人紹興八年進士調閩清尉召對除祕書省正字補外卒翥與鹽官施廷先遊傳楊龜山之學林艾軒亦定交焉癸酉冬赴部除夜宿信州客舍隔屋青燈一點明臥聽簷雨落三更無因作得還鄉夢門外兒童爆竹聲讀老子且柅流沙青犢車蔥蔥佳氣滿城閭白頭不解家人語枉學司空城旦書呈柔立兄雞犬還家自識村重營生理長兒孫時平戰地逢華屋嵗久他鄉是故園别後塵埃如我老歸來耆舊幾人存雁行疇昔従遊者莫話凋零恐㫁魂以上林鬳齋續集寺中别林謙之兼寄諸鄭遊従忘朝晡尊酒輕招呼笑語恣玩狎翻覆雲雨疎我友數君子古心相與娛每見輒賔敬衣裳儼而趨惡石寓規誡美疢疾佞諛深山足風雨零落梅花株亭亭巖上松霜姿一何孤感茲各努力勿以嵗事徂莆陽文獻句秋明河漢外月近斗牛㫄楊誠齋詩話林謙之嘗稱其友方次雲句山寒一杯酒嵗晚兩窮人和鄭處易溪邊贈别可惜聽泉夜還當殘月時游石泉林鬳齋續集龔茂良茂良字實之興化軍人紹興八年進士孝宗朝累除敷文閣待制禮部侍郎尋拜參知政事安置英州卒後復官諡莊敏有静泰堂集靈源菴遲回不忍去復作抱衾留斷續雲間雨蕭騷木末秋勞生那有此漸老欲相投最愛千山暮鍾鳴處處幽莆陽文獻王之望之望字瞻叔穀城人紹興八年進士孝宗朝附湯思退拜參知政事兼同知樞密院事罷為資政殿學士知溫州有漢濵集浯溪中興頌碑蜀日既衰洛日亡前星靈武騰光芒元功百戰兩京復萬里阿瞞歸故鄉干戈紛紛徧四海浯碑已立湘江㫄太師艱難喜初定作此大字龍鸞翔紙摹縑搨四百載家家傳寶踰琳琅唐文中世未變古燕許偶儷為班揚次山之文可也簡此頌未追周魯商祿山滔天等窮澆春秋之法誅無將騁兵二字斥邊將此語豈足懲姦強末篇三章頗辭費筆力不復能鏗鏘磨崖勒銘亦何有反復自贊乃爾詳向來各人過許與舉世附和無雌黄淮西仆碑無墨客惜哉不得逢鍾王房公湖在漢州又名西湖房琯上元間為牧始鑿湖治平間韓標序云今亭館皆非房公時事金雁橋南二頃湖房公遺墨未湮蕪人遊杜牧晩晴賦境對王維别墅圖經始園林心自巧折衝廊廟術何迂常時只作幽人計留得陳濤四萬夫以上方輿勝覽過石城滄浪渡口莫愁鄉萬頃寒烟落木霜珍重使君留客意一樽芳酒對斜陽江上危亭思黯然追遊陳迹欲經年别來西望應相憶郢樹荆門共一川湖廣總志陳長方長方字齊之號唯室福州長樂人徙居吳中紹興八年進士終宣敎郎江陰軍敎授有唯室集題定武本蘭亭昭陵一入見無従鐫石猶將膺本供八法典刑今在此華山天外立三峯不須苦恨厭家雞自是鹽車後月題弄筆數行書紙背莫敎人喚庾安西此甥此舅兩風流翰墨相傳不誤投大似曹溪付衣鉢臨池他日看銀鉤蘭亭續考䟦吾友胡少明敎官以王文正家所得蘭亭惠其甥王立之定武石刻屢經牧守私易此本信非近年橅榻失真者所能髣髴也紹興乙卯上元日閩人陳長方齊之題于笠澤寓舍葛立方立方字常之丹陽人徙吳興勝仲之子紹興八年進士隆興間官至吏部侍郎有西疇筆耕韻語陽秋歸愚集避地傷春洛陽宫闕半成灰草草花枝濺淚開國色天香消息斷妝臺誰奉紫金杯石門連日動征鼙花栁無情自繞溪回首故園今好在杜鵑花落子規啼新城道中已去日邊逺宜春程尚賒呼童秣征馬帶月趁啼鴉橋㫁復掲水路窮還渡沙誰能飾廚傳裹飯野人家以上歸愚集喜子邲登第吾家五世十三人競擷丹枝撼月輪慶歷賢科開後裔隆興儒業繼前塵泥金帖報家庭喜燒尾筵開帝里春従此傳芳應未艾桂香早已襲天倫余居吳興泛金溪上暇日率同志拏小舟載魚鼈蝦蠏命五比丘誦寶勝佛名若十二因緣法作梵唄捨之溪中坐中有請作詩以紀事者余輒為書云漁師竟日漁水族作斤賣小捐使鬼兄滿載獲鱗介鯤鯨未易羅所得亦殊態青蛙盡公私朱鮪兼小大霜鱸尚貫針土負或黏塊輪囷積文螺郭索走蒼蠏溼沬相呴濡自分煮薑芥豈知惻隠人規作江湖貸因呼小青翰收留舞澎湃趺坐延黑衣號佛指清瀨經飛流水篇流水長者事見金光明經梵起魚山唄傾盆帯寒藻圉圉看于邁驚疑或依蒲喜躍或生喝快若鷹辭韝歡如囚破械定非校人池恐是餘不派願汝藉佛力永脫鉤網債口腹聊爾耳香餌莫渠愛以上韻語陽秋李燾燾字仁父號巽巖眉州丹棱人唐宗室曹王臯之後紹興八年進士孝宗朝歷官祕閣修撰同修國史拜禮部侍郎除敷文閣學士致仕卒贈太師諡文簡従何使君父子遊墨池分韻得名字成都縣治前有洗墨池揚雄草太𤣥經處蜀學擅天下馬王先得名簧如巧言語于道蓋小成子雲最後出振策思遐征斯文大一綂欻使聖域清富貴盡在我紱冕非所榮㫄皇天祿閣聊亦觀我生懷哉不能歸舊宅荒荆榛寂寞竟誰顧正路今莫行使君蓬萊仙弭節歸赤城門無俗賔客家有賢父兄慨念此耆老不登漢公卿臨池一尊酒尚友千載英拜呼嚴與李月旦共細評區區可無憾彼重適我輕朅來成都市塵土汙冠纓古人不可見見此眼自明請為懷古詩玉振而金聲成都文類客懷寂寞三秋節凄涼萬里風關河盡形勝人物幾英雄秦葉隨流水周禾滿故宫此心懸象闕夢繞浙西東久客厭塵土幽居懐翠㣲只餘清夜夢長作故山歸菊已開三逕松應長十圍晨鐘忽驚覺猶有露霑衣曹氏歷代詩選登金山金山何處好四顧不相連窗迥前無地波澄下有天堂留三楚客門泊五湖船暝色關詩思江籠兩岸烟金山志畧陳巖肖巖肖字子象東陽人紹興八年以任子中詞科仕至兵部侍郎著庚溪詩話洗行直榦解新籜低枝蔽舊叢芟繁留嫩綠引月更添風庚溪詩話范正國正國嘗為太和通判重經快閣時紹興庚申間燬獨跨牛菴存僑寓窮滄海心棲快閣閒煙雲浮四座几席對千山䦨檻何由見神明悵未還興崇應有待高躅付誰攀快閣紀存王逵逵壯節王公之孫佾之子送田諤兩地音塵隔死生十年常效執珪吟羨君已作遼東鶴顧我空存魏闕心日下旣蒙新眷遇海邊休忘舊知音儻憐萬里親庭在為向雲山處處尋蘆浦筆記王復字景仁淄川人高宗詔知徐州尼雅滿㓂徐公領兵閉城拒守城䧟不屈為所殺凡闔門百口俱遇害時建炎三年正月二十是九日也天子震悼特贈資政殿學士謚壯節先公長子佾以太僕丞從高宗過淮陽紹興八年和好成奏乞訪先臣遺骸優詔許之行至泗州馬上得疾暴卒佾子逵留淄川南北隔絶紹興十年承宣使田諤扈従顯仁太后回鑾逵以詩送諤云云詩至而佾卒已一嵗矣聞者哀之洪适适初名造後更今名字景伯皓長子紹興十二年中博學宏詞科孝宗朝歷尚書右僕射同中書門下平章事兼樞密使提舉太平興國宫卒諡文惠有盤洲集寧國寺幾日山南北端期汗漫遊水痕秋雨過竹色曉烟收宦海何時了僧房為少留卻尋歸去路餘興漫回眸曉發泰安驛在臨海秋夢不能曉起行山徑迷小車驚宿鷺列炬誤鳴雞冷怯霜華重光瞻斗柄低金庭有佳處芳桂想幽棲題三瑞堂久矣馳魂夢今登三瑞堂故山有喬木近事話甘棠展驥慚充位占熊憶問祥白雲留不住極目是吾鄉以上盤洲集方輿勝覽洪公弼為寧海主簿時建以荷花桃實竹幹有連理之瑞已而生适故适以貳車行縣題詩云云書懷早嵗那知世事艱中原北望氣如山樓船夜雪𤓰洲渡鐵馬秋風大散關塞上長城空自許鏡中衰鬢已先斑出師一表真名世千載誰堪伯仲間詩林萬選洪遵遵字景嚴皓仲子與兄适同中博學宏詞科賜進士出身歷徽猷閣直學士出知平江府孝宗朝召除翰林學士承旨拜同知樞密院事江東安撫使資政殿學士提舉洞霄宫卒諡文安有小隠集丁香花來自丁香國還應世所稀叢生盛花葉亂結罥巾衣冷豔璚為色低枝翠作圍蔓連疑鎖骨時見玉塵飛全芳備祖洪邁黄介許子紹邁字景盧鄱陽人皓季子紹興乙丑中博學宏詞科孝宗朝累遷中書舍人兼侍讀直學士院拜翰林學士進煥章閣學士知紹興府以端明殿學士致仕卒贈光祿大夫諡文敏有野處類稾容齋五筆夷堅志萬首唐人絶句行于世四朝聞見錄洪邁歸鄱陽與兄丞相适酬唱觴于林壑甚適偶得史氏璚花種之别墅名曰璚野樓曰璚樓圃曰璚圃秋日漫興江湖久客日思家坐覺微霜上鬢華節序又催秋後雁風光爭發雨前花倦遊已夢莊生蜨不飲何憂廣客蛇怪底朝來衣袖薄一川白露下蒹葭一夕西風木葉飛畫梁落月淡餘輝銀燈夜照還家夢金剪親裁寄逺衣霜信早隨新雁至素書深訝故人稀無因為謝東曹掾鱸熟蓴香莫便歸野處類槖鎖院同葉晦叔作兼簡謝景思紹興十九年晦叔為福建帥屬予嘗因春補諸生白于府主邀與同考校鎖㝛貢院兩旬沈沈廣厦清如水市聲人聲不到耳一閒十日豈天賜慙媿紛紛白袍子相逢更得金玉人久矣眼中無此士連牀夜語不成寐往往雞聲忽驚起是中差樂真難名昔者相過安得此但憐時節不相謀正墮清明寒食裏梨花已空海棠謝外閒物色知餘幾只恐風雨摧折之負此一春吾過矣謝公尋山飽閒暇應笑腐儒黏故紙錦囊得句應已多萬一相思頻寄似容齋三筆車駕㝛戒幸玉津園命下大雨將曉有晴意已而天宇豁然至晩歸邁進一詩歌詠其實五更猶自雨如麻無限都人仰翠華翻手作雲方悵望舉頭見日共驚嗟天公的有施生妙帝力堪同造物誇上苑春光無盡藏可須羯鼓更催花容齋五筆和朱子淵賦石柏海底靈根石效奇山經地志不曾知凝紅幻岀珠千顆染紫裝成玉一枝鶴骨龍姿隨質見鸞棲鳳㝛與香宜元戎高唱真難和媿我年來筆力衰夷堅志寄題兄景伯清閟堂台州通判廳昔聞王子猷借宅亦種竹此君固可喜人亦清不俗伯氏貧而癯一飯不飽肉堂前自經始䕶此無盡綠一官嵗強半餘日如轉燭待其長稚子而已牽歸轂何由享嘉䕃償我志願足應煩彼邦人日報平安福赤城志王龜齡王嘉叟木蘊之同過小園用郡圃植花韻節到中和暖尚賒東風隨後起芳華自慙翳翳松三逕相對蕭蕭馬五花老去醉鄉為日月年來痼疾在烟霞午橋别墅歸公手早定淮西取白麻文翰類選泛舟遊武夷九曲武夷之山如畫圖中有玉洞藏仙都一溪穿空舞澎湃九曲度盡方盤紆細看直疑路中㫁已轉始覺川平鋪諸峯削成鳥亦怖危磴豈復人能踰機巖學館第傳授鼓樓石牀知有無坐令丹梯化一鶴又喚立筍成三姑遊人來觀但借問道士指說猶驚呼神君曾孫在何許想見幔亭空藥爐千崖萬壑心賞倦正喜松風清坐隅歸舟瞥然箭脫手醉目眩我雙明珠武夷山志秀川館聨句并序鄱陽洪邁景盧還自衡岳道宜春買舟東下永嘉方雲翼景南置酒秀川館餞之邵武黄介景達開封向􅡶巨源歷陽許子紹季韶與焉坐中屬聨送行且強景盧同之人賦十許韻賔主皆醉不復續惟巨源止酒不開涓滴獨又唱出八十字以成章且書之明日以遺景盧云紹興二十七年九月乙亥景南序江聲牀搖寒山色窗拗綠方歸舟著沙邊客夢遶鄉曲洪簪盍豁秋悲筵開従夜卜黄黄花散疎籬蒼竹圍破屋向詩豪爭擊銅談劇屢消燭許借君五言城洗我愁萬斛方主人意無窮客子去敢速洪杯寛怯鯨吞詞澀媿貂續黄注瓦亦傾銀聯珠仍綴玉向天迥月明洲霜清風隕木許飛齊水擊鵬揮退日斜鵩方臭味漆投膠芬芳蘭閒菊洪味甘一臠嘗話勝十年讀黄未用賦驪駒方看舉鴻鵠向行當歲九遷勿憚晝三宿許妙語子蟬嫣孤蹤吾鹿獨方一老上星辰三君進鳧鶩洪平生仰髙山此夕霑賸馥黄飛龍十九章金馬三千牘向儻非論石渠定是讐天祿許筆健翻狂瀾辯雄噴飛瀑方抄傳疲小胥侍立倦更僕洪力舉六鼇連肘運千秃方庖廚洗玉盤萍豆鄙金谷向豈無麟脯羞亦有熊蹯熟同上不須羅羶葷安用窮水陸許搜尋到蹲鴟飪飣兼苜蓿方但畏酒樽空寧知更漏促黄勸頻難固辭意厚敢虚辱許一一罄缾罍紛紛吐茵蓐方茶甘旋汲江火活乍然竹向聊烹顧渚吳更試蒙山蜀洪清風生玉川石鼎壓師服黄忍醉興方新語離情轉篤洪明朝轉船頭西風飽帆腹黄去櫓響嘔啞歸車聲轣轆墨突諒難黔曹裝行復促便揚武林鑣勿戀番江築聖神攬權綱賢俊登肅穆向君恩晉接三臣職坤用六方夷路合騰驤上心資啟沃許吾道竟何憂斯文欣有屬洪執政猶股肱天官乃眉目當堦紅藥翻規地青蒲伏遙知此數途歷徧財一蹙長吟美且箴細酌壽而祝端期千一逢毋諱再三瀆德進朝廷尊河潤京師福前修庶拍肩能事當繼躅君無廢此篇隨車編巻軸向袁州府志句天上長留滕六在人間㑹有葛三來困學紀聞野處雪句葛三事出太平廣記葛仙翁第三子向􅡶􅡶字巨源開封人有葵齋雜稾従吳傳朋遊芝山登五老亭以駕言出遊分韻賦詩得駕字兹山何巍巍氣欲等嵩華従公二三子勝日飽閒暇躋攀謝車輿自辦兩不借捫蘿覓幽磴行椒得孤榭側送夕陽移俯視髙鳥下登臨記曩昔嵗月驚代謝卻數一周星復命千里駕身従泛梗流事與浮雲化朅來共一尊似為天所赦明發還問塗合離足悲叱題吳傅朋遊絲書先生著名節百世追延陵我評先生賢不以能書稱功成磨蒼崖盛德頌日昇勿書凌雲榜華顚踏高層以上容齋三筆方雲翼雲翼字景南永嘉人題寶積寺暫脫塵闉馬足埃僧窗高臥白雲堆青山影裏春酲解黄鳥聲邊午夢回坐嬾且推書册去吟清時喚茗甌來要知門外無車轍十日新生一逕苔袁州府志李端民端民字平叔和元微之春遊韻寄洪景伯東閣經年别窮愁客路難望塵驚岳峙懐舊各雲散茵醉恩逾厚檣攲興未殘馮唐嗟已老范叔敢言寒玉燭調魁柄陽春在筆端應憐埽門役白首滯江干容齋五筆葉南仲紹興乙丑仲春遊崧臺作斗峯遙憶舊崧臺為勸農耕特地來短李高名光翠壁偽劉陳迹沒蒼苔洞天日永風埃淨巖壑雲收霽色開好景最宜供宴樂操觚欲賦媿非材崧臺石室志胡憲憲字原仲文定公従子紹興中貢入太學賜進士出身授左迪功郎添差福州敎授以母老求監南嶽廟歸起為福建路安撫司屬官復請祠秦檜方用事家居不出檜死以大理司直召未行改祕書正字既至病不能朝詔改秩與祠歸卒學者稱籍溪先生荅朱元晦幽人偏愛青山好為是青山青不老山中出雲雨太虚一洗塵埃山更好濂洛風雅朱子䟦云右衡山胡子詩也初紹興庚辰某卧病山間親友仕于朝者以書見招某戲以兩詩代書報之曰先生去上芸香閣閣老新峩豸角冠留取幽人臥空谷一川風月要人看甕牖前頭列畫屏晚來相對静儀刑浮雲一任閒舒巻萬古青山只麽青或傳以語胡子子謂其學者張欽夫曰吾未識此人然觀此詩知其庶幾能有進矣特其言有體而無用故吾為是詩以箴之庶其聞之而有發也明年胡子卒又四年某始見欽夫而後獲聞之恨不及見胡子而卒讀其目也因叙其本末而書之于䇿以無㤀胡子之意云胡宏宏字仁仲文定仲子幼事楊時侯仲良卒傳其父之學紹興中以廕補右承務郎卒學者稱五峯先生有集題上峯寺百年身似客浩蕩世閒遊入望青山好夢魂偏我留我家巫山十二峯浮江直過巴陵東瀟湘水與蒼梧通環遶衡嶽青冥中扁舟白雲不可度杖藜蠟屐乗春風山光浮動可攬結雲舒霞巻飛煙虹深巖大壑翠巘巘足力已到心無窮羣峯迤邐勢不競上盡祝融五千仞祝融峯高天更髙太空人世如牛毛風雲萬變一瞬息紅塵奔走真徒勞西林寺廓然堂有懐超然峯頭秋氣清廓然堂延秋月明我乗清秋弄明月中有所感思冥冥峯勢淩蒼穹上有烟林封去天不盈尺路㫁心忡忡虛名過耳如松風以上五峯集李侗侗字愿中南劒州劒浦人従羅仲素遊學者稱延平先生諡文靖有語錄行世和静菴山居勝如城市宅花木擁簷前一雨曉來過羣峯翠色鮮採荆烹白石接竹引清泉車馬長無跡逍遙樂葛天延平府志李繒繒字參仲號鐘山婺源人所著有論語西銘解義等書朱子尊稱之曉步曉步閒隨蛺蜨行村南村北雨新晴山花野草自幽意布穀一聲春水生新安文獻志張元幹元幹字仲宗長樂人向伯恭之甥紹興中坐送胡邦衡詞得罪除名有蘆川歸來集苕溪漁隠叢話余宣和間居泗上于王周士處見張仲宗詩一巻因備錄之後三十年于錢唐與仲宗同館穀初方識之因戲謂仲宗曰三十年前已識公于詩巻中仲宗請余舉其詩渠皆不能記反従余求之夜㝛宗公丈室求詩甚勤為賦五字林表登層閣秋聲聽暮鐘鴉鳴苦竹寺雨闇亂雲峯屢乞留新句重來訪舊蹤松門䍐車馬似喜老夫逢次韻晁伯南飲彥達官舍心逺堂今夕知何夕真成累十觴爐薰飄月影蜜炬剪花香政孏還詩債無従發酒狂故人憐久客舞袖要須長以上蘆川歸來集瀟湘圖落日孤烟過洞庭黄陵祠畔白蘋汀欲知萬里蒼梧眼淚盡君山一㸃青艇齋詩話鄭汝諧汝諧字舜舉青田人紹興中進士官吏部侍郎徽猷閣待制致仕有東谷集題盱眙第一山忍恥包羞事北庭奚奴得意管逢迎燕山有石無人勒卻向都梁記姓名齊東野語南北通和時聘使往來㫄午于道凡過盱眙例遊第一山酌玻瓈泉題詩石壁以紀嵗月遂成故事鐫刻題石幾滿紹興癸丑國信使鄭汝諧一詩可謂知言矣題石門洞每移征棹並雲根便覺幽懐謝世喧皓色飛來天際雪紅塵不到水邊門破荒康樂名猶在紀勝元章字不存但有好山容老子何須更訪武陵源括蒼彚紀蘇雲卿雲卿廣漢人與張魏公浚為布衣交紹興閒結廬南昌之東湖灌園織屨自給人稱曰蘇翁浚為相訪知所在馳書函金幣屬洪州帥漕禮致之翁力辭不可期以詰朝上謁比遣使迎之則扃戸閴然排闥入則書幣不啟家具如故翁已遁矣還張德逺書幣題詩蔬圃壁閒多年别作一番風誰料聲名達帝聰自有時人求富貴莫將富貴汙蘇公四朝詩米友仁友仁一名尹仁字元暉自稱嬾拙老人襄陽人芾之子紹興中擢工部侍郎終敷文閣待制畫繼云米友仁元章之子幼年山谷贈詩曰我有元暉古印章印刓不忍與諸郎虎兒筆力能扛鼎敎字元暉阿章遂字元暉宣和中為大名少尹所作山水草草而成不失天真風氣每自題曰墨戲被遇光堯既貴甚自祕重衆嘲之云解作無根樹能描懵懂雲如今供御也不肻與閒人題禊帖圖契朴琱推聖智萬古奔沈餘末伎蘭亭醉墨更無加始信功名皆儻爾庾翼兒郎豈不黠自是家雞慙野雉退之强聒六藝疎見處纔能到姿媚相公有官那得取不與官家深自袐卻因同好露心胸謾使蕭郎誇末計摸金不必曹阿瞞温韜家有昭陵器披沙只恐取黄金剔軸誰能收故紙天章寶塔髙嵯峨永表文皇好文藝至今油蠟傳未休善本何辭萬金弃蘆浦筆記題定武本蘭亭翰墨風流冠古今鵝池誰不賞山陰此詩雖向昭陵朽刻石猶能直萬金紹興十六年嵗次丙寅嬾拙翁米元暉在行朝天慶觀東私居之北窗䟦蘭亭續考自題大姚村圖廣文當日官雖冷可柰才名振世何他日君家須炙手而今聊復雀堪羅老年尚喜管城子更愛好山江上青武林秋高曉欲雨正若此畫雲冥冥紹興戊午李春十一月書于大姚五湖田舎自題山水霄壤千千萬萬山東南勝地熟躋攀古人作語詠不得我寓無聲縑楮間紹興己未除守瑯琊待次平江寓居大姚村妹家戲作寓意編按米氏襄陽人而宋史以為呉人觀海岳撰樂圃墓表云予昔居郡與先生遊今觀畫䟦則米老父子皆嘗居吳故其女嫁大姚其實非呉産也題董源夏山圖崇山過新雨蒼翠濃欲滴林深不通人溪迴有吟客日落古道空天青暮雲碧何處一聲蟬幽棲仍自得題自畫横披與翟伯壽山中宰相有仙骨獨愛嶺頭生白雲壁張此畫定驚倒先請喚人扶著君以上清河書畫舫司馬端衡端衡溫公後人與米元暉同時題自畫杜詩意圖潺潺石澗溜峯迥石路轉足可娛瞻聽其中如有屋便是醉翁亭郁氏書畫題䟦記呉芾芾字明可自號湖山居士台州仙居人紹興中進士孝宗朝歷官禮部侍郎終龍圖閣直學士卒諡康肅有湖山集見市上有賣海棠者悵然有感連年蹤跡滯江鄉長憶吾廬萬海棠想得春來增絶麗無因歸去賞芬芳偶然擔上逢人賣猶記樽前為爾狂何日故園修舊約賸燒銀燭照紅妝海棠譜和胡經仲即事世事憑誰論羇懐只自諳風烟悲蜀魄桑柘老吳蠶晩步惜殘照春衫怯曉嵐日來鼙鼓近牢落愈無堪赤城詩集北望二首延福池臺荆棘深上皇無復更登臨寂寥崇觀當年事愁絶關河萬里心漠漠黄雲塞草稀年年空說翠華歸孤臣淚盡仍嘗膽白首江湖雁北飛台州府志熊克克字子復建陽人紹興進士累除起居郎兼直學士院壽芮祕書三首帝調玉燭召春還仙袂同時度九關萬品欲霑何處得東風今起道家山歸來未對小延英便向蓬萊作主人要督仙宫讐玉籍卻收衆妙入經綸册府都無未見書毫端萬斛瀉明珠若為池上星辰履謾與瀛洲作畫圖翰墨大全沈樞樞字持要一作持正徳清人紹興間登第歷官太子詹事百福寺孝豐縣東南築室最高處軒窗八面通鑿山流乳液開戸納薫風巾履隨涼設茶𤓰與客同我來資解慍不羨楚王雄湖州府志仲并并字彌性江都人紹興中進士歷光祿寺丞淮東安撫司參議有浮山集句政恐崖州如有北卻應未肻受讒夫困學紀聞仲彌性詠韋執誼不看嶺南圖詩誅姦諛之蕭斧也唐文若文若字立夫眉山人庚之子第進士仕至直敷文閣知溫州遷中書舍人孝宗朝參贊張浚都督府軍事卒登金山江流出岷蜀萬折東南傾兹山若巨舫勢欲扼滄溟天髙象敎尊海岳朝百靈雲水渺四極下上涵日星朱甍倚霄漢倒影魚龍驚重遊十年舊挂席鷗鳥驚維揚魏公幕回首劒㦸明行都望北固鐵甕高崢嶸孤舟繫烟月六尺僧窗横印師支逺儔静對如風鈴曠懐憐此翁得法世慮平塵勞霜鬢秃風月冰壺清乞詩寫崖壁指月雙浮萍金山志畧陳世守世守字端厚崑山人紹興壬申五月臥病東禪之北窗惟庭柯相對手植綠橘枇杷皆森然出屋枇杷已著子橘獨十年不花各賦一詩枇杷昔所嗜不問甘與酸黄泥裹餘核散擲籬落閒春風拆句萌樸􅈪如榛菅一株獨長成蒼然盛屋山去年小試花瓏瓏犯冰寒化成黄金彈同登桃李盤大釣播羣物斡流不作難樹老人何堪挽鏡覓朱顔頷髭爾許長大笑攲巾冠綠橘生西山得自髥翁家云此接活根是嵗當著花俛仰乃十霜垂蠹紛相遮芳意竟寂寞枯枝謾槎牙風土諒非宜翁言豈余夸㑹令反故山高深謝汚邪石液滋舊根山英擢新葩黄團挂霜實大如崆峒𤓰當有四老人來駐七香車崑山雜詠湖集鶚按二首又見范成大石宋詩紀事巻四十五
