body:
  text: 宋詩紀事巻二十五錢塘厲鶚撰晁端友端友字君成迥四世孫无咎之父第進士為杭州新城令有新城集葉石林云外祖晁君成善詩蘇子瞻所謂清厚靜深如其為人者也黄庭堅撰晁君成墓志銘晁氏世載逺矣而中微有諱迥者事某陵為翰林學士承㫖以太子少保致仕諡文元生執政開封晁氏始顯君成曾王父諱廸贈刑部侍郎王父諱宗簡贈吏部尚書父諱仲偃庫部員外郎刑部視文元母弟十也君成夫人楊氏生一男則補之以元豐甲子月乙酉葬君成于濟州任城之呂原宿濟州西門外旅館寒林殘日欲棲烏壁裏青燈乍有無小雨愔愔人不寐臥聼羸馬齧殘芻合璧事類續集馬處厚席上探得早梅嶺梅何處早雪裡看芳菲北陸寒猶在南枝春已歸曉妝初見妒殘角未成飛引我江頭夢清香憶滿衣瀛奎律髄甘露寺寺有石如臥羊謂之很石北固山頭寺風煙昔縱觀臥亭秋石很環舍海濤寒越舶樓前聚江楓戸外丹最宜清夜月虚閣憶盤桓早行馬上鷄初唱天涯星未稀驚風時墜笠零露暗霑衣山下踈鐘發林梢獨鳥飛逺峰煙靄澹迤邐見朝暉以上文翰類選齊廓廓字公廓會稽人舉進士第歴三司度支判開封府岀為江淮轉運使積官至光禄卿祕書監卒寳林寺峯勢聳如龜簷牙照錦翬路盤危磴岀僧觸㫁雲歸萬井分塵界干巖列翠圍浮生任多事到此合忘機越詠如歸亭翬飛綺構成賔至得佳名岫列千螺岀江涵匹練平吟㸔客帆度坐見釣舟横獨倚雕䦨外令人心骨清呉江縣志李奉世句珠鞍昔御㤙猶在玉輦親扶事已非石林詩話神宗皇帝天性儉約奉慈夀宮尤盡孝道慈聖太后嘗以乘輿服物未備因同天節作珠子鞍轡為夀神宗一御干禁中後藏去不復用一日與兩宮幸後苑賞花慈聖輦至神宗即降歩親扶慈聖岀輦屢卻不從聞者太息慈聖上仙李奉世時為侍郎進挽詩云云葢記此二事神宗覧之泣下談苑作王存但小異耳今曰璐按二句孔平仲兩存之李行中行中字無悔夲霅川人徙居松江高尚不仕獨以詩酒自娯晩治園亭號醉眠東坡居士與之遊賦佳人齅梅圖蠺眉鴉髻縷金衣折得梅花第幾枝齅盡餘香不回面思量何事立多時中呉紀聞云意尚深逺自詠醉眠亭簷低檻曲莫嫌隘地僻草深宜畫眠代枕暮憑溪上石當簾時看屋頭􅃄倦逰拂壁畫山逕貪醉解衣還酒錢一水近通西浦路客来猶可棹漁船寄韓憲仲廷評野徑荒亭草没腰一眠聊以永今朝放懐不管人閒事破夢時聞夜半潮冰柱劉义詩未厭金龜李白酒難招知君有意尋安道咫尺何時動畫橈以上至元嘉禾志韓宗文題李無悔醉眠亭得酒休論飲淂仙醉中遺物為神全世閒反覆無窮事吏部難㤀抱甕眠松江府志蘇梲題李無悔醉眠亭趁陽渴鹿背清泉之子名亭取性便適意中閒卻無事期君忘醉亦忘眠松江府志晁端佐題李無悔醉眠亭蕭洒松陵江上亭醉来一夢遨雲屏生前笑語君湏惜世事紛紛不用醒至元嘉禾志關景山景山字彦瞻景仁弟舉進士題李無悔醉眠亭杜老顛狂尋酒伴經旬岀走只空牀輸君縱飲還高臥長有生涯在醉鄉至元嘉禾志毋沆沆太常少卿逰王官谷不汚唐家亂蕭然表聖居泉聲與山色相得共清虚熙寕戊申嵗冬至虞鄉縣令俞充書王官谷集王覿覿字明叟如臯人第進士哲宗朝擢右正言進司諫徽宗朝遷御史中丞改翰林學士安置臨江軍卒入黨籍望日與諸公會于大慈聞海雲山茶合江梅花開遂相邀同賞雖無歌舞實有清歡因成拙詩奉呈野寺山茶昨夜開江亭初報一枝梅旋邀坐上逍遥客同醉花前㶑灎杯秀色霜濃方潤澤暗香風靜更徘徊仙姿莫遣常情妒不帶東山妓女来成都文類胡宗師和王公覿賞海雲山茶合江梅花錦水黄金宻印開東南時望滯鹽梅得随劒外同為客幸逐花前醉倒杯白玉蘂高枝瘦碧燕支萼嫩葉低徊綺羅不識清詩骨湏趁春風摸石来成都文類徐彦孚和王公覿賞海雲山茶合江梅花萬蘂山茶傍臘開一番春信入江梅追逰共按黄金轡縱賞還傾白玉杯濃豔迎風香㫁續疎枝横月影徘徊隼旟不負登臨興更約攜朋載酒来成都文類呉師孟師孟字醇翁成都人成都記呉師孟張商英張唐英善書天覺喜草而不工東坡戯之所謂脱帽風流餘長史是也和王公覿賞海雲山茶合江梅花何處珍叢最早開海雲山茗合江梅忽傳詩帥邀膚使不用歌姬侍宴杯曉豔鮮明同綺靡晩妝清淡奉徘徊此時文酒風流事豈似臨江放蕩来成都運司園亭詩和章質夫翠錦亭東閣治䑓政西堂備燕飲介于二堂閒華構饒花品紅紫鎮長春四時如活錦公暇一䋲牀上有通中枕茅菴結茅為圜屋環堵不可牖齋居如雁堂廣長纔六肘深藏子猷竹不植陶潜栁勿起滅定心宴坐空諸有以上成都文類徐介介陽翟人官屯田過杜工部墓水與汨羅接天心深有存逺移工部死来伴大夫魂流落同千古風騷共一源江山不受弔寒日下西原王得臣塵史熙寕初調官泊報慈寺陽翟徐秀才岀其父屯田詩清苦平淡有古人風其過杜工部墓一首云云胡璞璞字器之南平人熙寕三年進士經采石渡抗議金鑾反見讐一抔蟬蜕此江頭當時醉弄波閒月今作寒光萬里流輿地紀勝蘇子曕見之疑唐人作嘆賞不已陸佃佃字農師越州山隂人熙寕三年擢甲科徽宗朝仕至吏部尚書拜尚書右丞罷知亳州卒入黨籍有陶山集送人之潤州丹青太守舊名卿騎竹兒童夹道迎醉尹笙歌添酒病謫仙風月苦詩情江湖天地農桑早水竹人家枕簟清白首懐君心未已夢魂猶繞鳳皇城詩林萬選贈别呉興太守中父學士蓬山仙子任天真乞領南麾奏疏頻金鎻闕邊辭黼座水晶宮裡約朱輪公庭事簡煩丞掾齋閣詩多泣鬼神莫為行春戀苕霅鑾坡揮筆待詞臣瀛奎律髄句棠棣行中排宰相梧桐名下識韓家能改齋漫録韓子華兄弟皆為宰相門有梧桐京師人以桐木韓家呼之以别魏公也子華下世陸農師作挽章云云盖紀實也鄧忠臣忠臣字謹思長沙人熙寕三年進士仕至考功郞坐元祐黨廢有玉池集考校同文館戲贈子方兼呈文潜次无咎韻五年坎􅇄哀南方江湖魏闕兩相忘洞蘿巖桂搴孤芳月潭風渚儔漁郎單閼孟夏草木長望都楼觀鬰蒼蒼忠臣癸亥六月以家艱去國丁卯四月還省誰令焚芰辭楚狂復来上君白玉堂黄門㦸曜羽林槍未央引籍班胡羌雲屯錦膞馬斯臧大官日膳瓊為糧追随威鳳嗚高岡豈敢偃息復在牀投鈴歸休下殿傍衛士傳詔来如驤館閶闔外西城隍書橐廹遽不及裝籲俊士集要言揚得弓勿問何人亡趙璧既入秦城償穎脱喜見錐岀囊同人于野不擇鄉峩峩羽翮整顔行金閑玉勒皆驌驦伯喈懐牘望金商天啓魁梧竒偉值子房文潜家令数術應帝王无咎三英粲粲日爭光我輒與之較雌黄芳菲滿室蘭生香坐堂月久秋氣凉將軍思歸歌撫觴子方倚梧目送雁南翔想見葭菼水中央洞庭河漢遥相望香楓葉老赤染霜感㮣少日七歩章長安城西約鄭莊予與子方无咎文潜天啓嘗有此約牽率不徃有底忙人生可意乃吉祥快馬劃過小苑牆入門爛醉銀瓶漿秦筝趙瑟喜高張同文館倡和詩邯鄆道中夜行阻風欲㵼懸河雨先號拔樹風問津厖吠處覓路電光中徒御憂羣盗兒童笑拙翁當知歩兵哭初不為途窮瀛奎律髄蔡京京字元長興化軍仙逰人熙寕三年進士歴尚書右僕射轉司空累封魯國公加太師徽宗朝凡四入相靖康中再被貶死于潭州清波雜志蔡京死潭州数日不得殮槀葬漏澤園以青布條裹尸初宣和年閒京師染坊有名太師青者兹其讖也題保和殿壁瓊瑶錯落宻成林檜竹交加午有隂㤙許塵凡時縱歩不知身在五雲深侍宴保和殿命賡補成篇保和新殿麗秋暉㤙許塵凡到綺闈雅興酒酣添逸興玉真軒内見安妃見安妃像玉真軒内暖如春只見丹青未見人月裏嫦娥終有恨鑑中姑射未應真碧湖雜記東都宣政間禁中有保和殿殿西南廡有玉真軒軒内有玉華閣即安妃妝閣也妃姓劉氏入宮進位貴妃林靈素以左道得幸謂上為長生帝君妃為九華玉真安妃每降神别置妃位畫妃像其中每祀像妃方寢而覺有酒容是時羣臣唯蔡元長最承㤙遇嘗賦詩題殿壁云云侍宴于保和殿上令妃見京先有詩命京賡補成篇湏㬰命京入軒見妃像京又有詩云云已而至閣妃出見京勸酬至再日暮而退與范謙叔飲西園一日趨朝四日閒荒園薄酒願交驩三峰崛起無平地二𣲖爭流有激湍極目榛蕪唯野蔓忘憂魚鳥自波瀾滿船載得圭璋重更掬珠璣洗眼㸔墨莊漫録范致虚謙叔與蔡元長相忤久處閒散宣和初自唐州方城召還提舉寳籙宮未幾執政時元長以五日一造朝居西第乃與謙叔釋憾一日觴于西園主禮勤渥元長作詩見意三峰二𣲖指王黼林靈素梁師成􅒰方盛也恭和御製巳亥十一月十三日南郊祭天齋宮即事賜詩雪晴至日日初南帝舉明禋祀事嚴萬瓦溝中寒色在一輪空外曉光暹雲和龍軫開冰轍風暖鸞旗拂凍簷共喜天心扶聖德珠璣更誤寵㤙霑題神霄宮下馬神霄第一囬晴空宮殿九秋開月中桂子看時落雲外仙軿特地来以上揮塵餘話詔賜南園贈親黨八年帷幄竟何為更賜南園寵太師堪笑當時王學士功名未有便吟詩中吴紀聞南園乃廣陵王舊圃中有流杯旋螺亭亞于滄浪之景王黄州為長洲時無日不攜客醉飲嘗賦詩云他年我若功成後乞取南園作醉鄉今園中大堂遂以醉鄉名之大觀末蔡京罷相欲東還詔以其園賜之京即以詩贈親黨云云黄州之詩不過寓意耳京遽以無功名誚之黄州雖終為黜臣其名與天地同不朽矣寄子攸老嬾身心不自由封書寄與淚横流百年信誓當深念三伏征途盍少休目送旌旗如昨夢心存關塞起新愁緇衣堂下清風滿早早歸来醉一甌獨醒雜志燕山招納之舉多岀于蔡攸王師敗于白溝河元長以詩寄攸云云稍傳入禁中徽宗命京進呈上閲畢曰三伏征途不若改作六月王師觀此則是舉非惟當時人知其非雖其父亦知之矣别寵姬為愛桃花三樹紅年年歳歳惹東風如今去逐他人手誰復尊前念老翁揮塵後録蔡元長既南遷中路有㫖取所寵姬慕容邢武者三人以金人指名来索也元長作詩以别云句龍燭影中猶是臘鳳簫聲裏已吹春春帖子話西清詩蔡卞卞字元度與兄京同年登第王安石妻以女因從之學元豐中以薦為國子直講徽宗朝累擢知樞宻院加觀文殿學士拜昭慶軍節度使政和末謁歸上冢道死紹興初追貶單州團練副使贈華陽法師師到華惕洞仙花㡬度開祇應常救物卻遣世人来茅山志汪泌東湖共樂堂臨海城東湖氣象清且竒無風緑色淨十頃澄琉璃中有共樂堂今其名者誰或人荅我問太守下車時訪民所疾苦民曰水最危其水或暴至城壊民流屍公謀得上䇿疊石金城基外遣數百家室屋鱗參差水至無所障適與漂溺期又欲隄其東苦乏土石資開湖足取用隄勢横虹霓湖光占空濶物從鑑中窺紫翠前後山環列如屏幃結堂就虚曠與俗同遊嬉太守宴堂上逰人歌水湄歌云從公来除患補瘡痍況有此壯觀不樂復何為有如登春臺人心舉熙熙從事能文者作辭書之碑庻㡬不朽功上徹堯軒墀台州府志台之東湖地初為水軍營熙寕四年郡守錢暄始開為湖中有共樂堂流杯亭諸勝汪泌有詩錢暄暄字載陽惟演子以父䕃累官駕部郞中知台州拜寳文閣待制卒子景臻尚秦魯國大長公主題東湖共樂堂疏就湖山秀氣濃花林茂列景爭雄管弦交奏客懽合臺榭競登人喜同環障鷺行飛早晚平波魚陣掠西東荒蕪芟去成佳致換得汀洲月與風台州府志熙寕四年暄守台州累石修城以水至漂溢鑿湖以受衆水凡一萬六千歩有共樂堂流杯亭在湖心詩云云晁端禮端禮字次膺熙寕六年進士兩為縣令忤上官坐廢晚以承事郎為大晟府協律有閒適集能改齋漫録政和閒大晟樂成蔡元長以次膺薦詔乘驛赴闕次膺至都會禁中嘉蓮生遂屬詞以進名並蒂芙蓉上覧之稱善除大晟府協律郎不克受而卒絶句去日玉刀封㫁恨見来金斗熨愁眉黄昏飲散歌䦨後懊惱水邊楼上時侯鯖録次膺薄㳺南京嘗作詞云花前月下堪垂涙水邊楼上總關心後過其家已與客飲復作詩云云句尋常自是司空慣咫尺寧憂丞相嗔漫叟詩話次膺即席贈妓句雅不減張祜骰子裹手之作晁端受瑯琊翠㣲亭曉風吹落秋泉聲夜雨洗岀秋山色上有樓臺深翠微可惜丹青圖不得滁陽志晁端彦端彦字美叔官祕書監龍湫觀瀑萬丈龍湫水飛流翠壁開始疑河漢落翻若海潮来飄灑四時雪喧聞萬壑雷廬山吾未到氣象勝天台雁山志晏㡬道㡬道字叔原號小山殊幼子監潁昌許田鎮能文章尤工樂府有臨淄公風子溥字慧開靖康初官河北與妻玉牒趙氏死難與鄭介夫小白長紅又滿枝築毬場外獨支頤春風自是人閒客張主繁華得㡬時侯鯖録熙寧中鄭俠上書事作下獄悉治平時徃還厚善者晏叔原皆在數中俠家搜得叔原與俠詩裕陵稱之即令釋岀戲作示内生計唯兹椀般擎豈憚勞造雖從假合成不自埏陶阮杓非同調顔瓢庻共操朝盛負餘米暮貯藉殘糟幸免墦閒乞終甘澤畔逃挑宜筇作杖捧稱葛為袍儻受桑閒餉何堪井上螬綽然真自許嘑爾未應饕世久輕原憲人方逐子敖願君同此器珍重到霜毛墨莊漫録叔原聚書甚多每有􅁶徙其妻厭之謂叔原有類乞兒搬漆椀叔原作詩云云題司馬長卿畫像犢鼻生涯一酒壚當年嗤笑欲何如窮通不屬兒曹意只有真人愛子虚觀畫目送飛雁手提白魚眼看飛雁手攜魚似是當年綺季徒仰羡知㡬避繒繳俯嗟貪餌失江湖人閒感緒聞詩語塵外高蹤見畫圖三嘆繪毫精寫意慕冥傷涸兩躊躇公儀招觀畫初約看花花已盡重親閒客客應歡真花既不能長豔畫在霜紈更好㸔以上聲畫集七夕雲幙無波斗柄移鵲慵烏慢得橋遲若教精衛填河漢一水還應有盡時合璧事類前集賀鑄鑄字方囬衛州人孝惠皇后族孫娶宗女受右班殿直元祐中李清臣奏換通直郎通判泗州太平州卒有慶湖遺老集王直方詩話方回言學詩于前輩得八句云平淡不渉于流俗竒古不鄰于怪癖題詠不窘于物義敘事不病于聲律比興深者通物理用事工者如已岀格見于成篇渾然不可鐫氣岀于言外浩然不可屈盡心于詩守而勿失賀鬼頭老學菴筆記賀方回狀貌竒醜俗謂之喜校書朱黄未嘗去手詩文皆高不獨工長短句也有二子曰房曰廩於文房從方廩從回蓋寓父字於二子名也望夫石亭亭思婦石下閲㡬人代蕩子長不歸山椒久相待㣲雲䕃髮彩初月輝蛾黛秋雨疊苔衣春風舞蘿帶宛如姑射子矯首塵冥外陳迹遂無窮佳期後莫再脱如魯秋氏妄結桑下愛玉質委淵沙悠悠復安在苕溪漁隠叢話方回因此詩以得名交逰閒無不愛之客有攜寇莱公真挂于驛舍傍題云今作閻羅王慨然有作凛凛英風萬世孤忽瞻容貌涕洟俱遺謀不媿生張説異事猶煩鬼董狐黑白已分歸節義丹青長在懾奸諛不煩揺扇蒼蠅去一片寒冰挂座隅和彭城王生悼歌人盼盼盼盼馬氏善書染死葬南臺即鳳皇原也東園花下記相逄倩盼偷囬一笑濃書簏尚緘香豆䓻鏡匳初失玉芙蓉歌䦨燕子樓前月魂㫁鳳皇原上鐘寄語虞卿謾多賦九原無路逹魚封茅塘馬上壯圖忽忽負當年囬羨農兒過我賢水落陂塘秋日薄仰眠牛背看青天題定林寺破冰泉脈潄籬根壊衲遥疑挂樹猨蠟屐舊痕尋不見東風先為我開門以上慶湖遺老集詩人玉屑王荆公見此詩大相歎賞由此知名鄔柄柄字德久晉陵人鑑湖先生未老挂冠以詩卜居于姑蘇毘陵兩郡依韻奉和清監風流賀季真先生端是昔人身如何未老催歸去要臥烟霞兩郡春慶湖遺老集附王雱雱字元澤安石子未冠舉進士歴官龍圖閣學士早死趙槩見聞雜録王雱丞相之次子有心疾娶龎氏不睦丞相離而嫁之時侯叔獻死其妻幃箔不修丞相表其事而斥去時人語曰王太祝生前嫁婦侯工部死後休妻鍾山絶句當年睥睨此山阿欲著紅樓貯綺羅今日重来無一事卻騎羸馬下陂陀許彦周詩話此王雱訐直不為荆公所喜然詩實可傳關山篇萬馬度關山關山三尺雪馬盡雪亦乾沙飛石更裂歸来三五騎旌旗暎雲滅不見去時人空流磧中血絶句一䨇燕子語簾前病客無憀盡日眠開徧杏花人不到滿庭春雨緑如烟霏㣲細雨不成泥料峭輕寒透裌衣處處園林皆有主欲尋何地看春歸以上後村詩話翠雲寺寺古無鄰家千山抱虚碧門開猨鳥路殿鎻烟霞積老木森回溪飛湍自淙激曾無車馬到絶境聞今昔逍遥賢大夫肻此攜佳客鳴騶清曉来歸時日常仄不使訟庭空誰能傲泉石撫州府志袁點㸃字師與無錫人熙寕初太學直講呈東坡先生青葢美人回鳳帶繡衣男子返雲車上天一笑渾無事從此人間樂有餘玉照新志東坡南遷北歸次毘陵時久旱得兩有里人袁㸃呈一絶云云坡見大喜為之重寫且以手簡褎之今袁氏刻石藏之于家藍奎奎字秉文潮州程鄉人第進士官郡博士句嬾思身外無窮事願讀人間未見書廣東通志周諝諝字希聖尤溪人熙寕六年進士知新會縣不肻奉行新法求歸著孟子觧義禮記説門人稱周夫子寄子弟浪有虚名落世間自慙無實骨毛寒未年三十力先倦纔得一官心已䦨卜宅擬尋栽藥圃買田宜近釣魚灘他年子弟重相見藜杖蓑衣筍籜冠谿山餘話周述述遂昌人熙寕癸丑進士官太常卿呉臯東作屏山草堂四首之一天設名區擁翠屏草堂風度晩鷄聲年来不作繁華夢飯犢郊原學耦耕處州府志關澥澥字子容景仁子熙寕六年進士餘杭令絶句野艇歸時蒲葉雨繰車鳴處楝花風江南舊日經行地盡在于今醉夢中寺官官小未朝參紅日半竿春睡酣為報鄰鷄莫驚起且容殘夢到江南春渚紀聞闋氏詩律精深姸妙世守家法此子容詩世傳以為東坡先生作非也遊九鎻山下寒流咽細泉曉林浮日自生烟九峯宻鎖疑無路五洞潛通别有天羽客依山多得道昔人渉海漫求仙我来要學棲真事願借孤雲一榻眠洞霄詩集曾旼旼字彦和龍溪人熙寕六年進士監潤州倉曹嘗纂潤州類集次韻趙仲美表弟西齋自遣知滁州作謫守凄凉臥郡齋夫君失意偶同来海邊故國𣺌何許城上新樓空幾回寕羨一囊供鶴料會看千里躍龍媒清吟未免縈機慮只恐飛觴便見猜自注云唐幕官俸謂之鶴料今嵗敕頭所得止此仲美省試下第故云墨莊漫録遊九鎖山勢盤紆是㡬重溪行亂石水溶溶東西路口分䨇洞蒼翠羣中起一峯石上仙翁留去跡壁閒羽客有吟蹤夜分不是紅塵境清夢囬時曉殿鐘洞霄詩集龔程程字信民宗元子熙寕六年進士歴西安丞桐廬令中呉紀聞信民嘗憤聖道不明排異端之學家不置釋老像祭祀未嘗焚紙錢儒家甚宗之讀書攻苦食淡手未嘗釋巻記問精確鄉人號為有腳書㕑題壁月度疎櫺起更慵坐聼澄照五更鐘郤思湖上西風急吹送山前萬箇松中呉紀聞常安民安民字希古邛州人熙寕六年進士元祐初為宗正丞除監察御史謫監滁州鹽酒務改通判鄆州入黨籍題醒心亭我愛昌黎湖上句醉来直上醒心亭宿酲不待山風觧臥讀殘碑已自醒錦繡萬花谷孫諤諤字元忠睢陽人熙寕六年進士累官右正言以直龍圖知廣德軍徽宗朝遷左司諫卒入元祐黨籍資聖院在遂寕小溪四山藏一寺方丈壓諸峯回首坐禪處白雲深㡬重全蜀藝文志劉涇涇字巨濟簡州陽安人熙寕六年進士王安石薦為經學所檢討歴國子監丞知處虢真坊四州元符末上書召對除職方郎中卒有前溪集鄧椿畫繼云涇為米元章畫友善作林石槎竹筆墨狂逸體製拔俗和米元章龍真行祕府右軍書一巻有龍形真字印故作秦火蕩焚天地赤孔堂壊後無餘壁不知科斗六書文化作龍蛇二王跡集賢他日作仙久官姓篆章存歴歴自憐黄眼未親逢一段因依徒奪魄元章揮灑早驚動祕篋墨皇曾敬識孤標未要後生知劣許下官論莫逆好竒舉世不多得神物尤来終變易神鋒䨇合會有時真璽一飛無處覔頗聞祕箧作訛語别有擾龍招異客不如乾没歸去来勝在箇家遭水厄米芾書史元章好古過人書畫驚世起余作歌天下愛竒人没量竒不諛人竒解相竒人竒物方合璧乞與世閒人物様六朝唐盛始兼得訪古知名巳蕭爽人亡物喪付衰夢注想後来逢好尚元章心自鑒秋月一路仍行九霄上家時菜色無斗粟書畫竒竒世人望譬如大海沈百寳爾輩乗風得之浪二王褚陸巳天作老顧如来更天匠其餘緹襲凡㡬重但見光明爛垂象珍犀瑞錦扶蘭茝龍躍鸞驚訶魍魎金仙詎敢觸以手雪子玉人聊置掌余家僻素最沈著退舍還師覺難傍世人徃徃力能幹未免目蝦終惚恍緘機偽謬各臣妾未覩堂堂筆中王袖閒澀縮氣如線淨几明窓謾瞻仰從来所有萬錢價不即臭帤當火葬傾心妙絶豈求勝妄意臨摹湏殺謗端居自號書一品好事如封繪三藏諸郎青出即䕶持未肻充飢謬為駔書史載薛道祖詩云寕罄動破千金資是也余衰二物擬高閣子可専之世無兩書来詩徃但悠悠塵土欺人正惆悵米芾畫史題韓溪在陕蜀路閒蕭酇侯追淮隂侯處豪傑相從意氣中憐才傾倒獨蕭公後来可是無竒客東閣投名尚不通許彦周詩話巃崆巖蒼巖如堂石如踞橋梁如繩水如布不有樵夫踏破雲世閒那得知其處天王寺金碧為家定化城書牀南偃畧相迎人閒蜨夢正深黒天上木魚初發明半里好風招隠士一枝枯竹助閒行已慙懐紱無高致可更標門著姓名以上括蒼彚紀遊麻姑山謝公好登山折屐第三谷麻姑乃不到頗負登山足寒杉鳴古璫澗道瀉淙玉筇竹白接䍦吾將追徃躅溪行爱宛轉石坐憐皴蒼白雲起目前如鶴兩翼張蜕我衣上塵駕之以翺翔欲攬恍不接身在意飄揚石鼔埋入地荆璧飛上天嗚呼魯公碑風雨三百年愛字不爱石磨滅安得傳不敢手觸之謂是甘棠篇麻姑集朱服服字行中烏程人熙寕六年進士哲宗朝歴中書舍人禮部侍郎徽宗朝加集賢殿修撰知廣州黜知袁州再貶蘄州安置子彧有萍洲可談董斯張呉興備志萍洲老圃彧自號也在黄州蓋其僑寓之地事見齊安志或字無或過廬州昔年呉魏交兵地今日承平會府開沃壤欲包淮甸盡堅城猶抱蜀山廻栁塘春水藏舟浦蘭若秋風敎弩臺獨有無情原上草青青還入燒痕来方輿勝覧九日一見黄花只自羞蕭然短髮不禁秋誰人為整烏紗帽獨倚西風滿眼愁後村千家詩句西清邇英閣宻勿侍經筵晝漏逾三鼓宸居近五甎多聞資學殖清問發真筌元豐盛事合璧事類後集孤臣正泣龍鬚草遊子空簪鳳尾花朱彧萍洲可談先公崇寕元年帥廣正月遊蒲澗見遊人簮鳯尾花作口號一聨云云葢以被遇先朝自傷流落後監司乃指此句為罪其誣注云契勘正月十二日哲宗皇帝已大祥豈是孤臣正泣之時鞠獄竟無他意讒口可畏如此宋史夲傳服知廣州哲宗既祥服賦詩有孤臣正泣龍鬚草之句為部使者所上黜知袁州葛書思書思字進叔宻之子熙寕六年進士官朝奉郎卒特諡清孝喜子勝仲登第廣場筆陣数千人喜汝穿楊箭鏃親慶緒綿長時幸會文科興復事還新昔年繼榜熙寕歳今寓同登紹聖春從此莫教書種斷孫曽應復值昌辰韻語陽秋丁注注字葆光呉興人熙寕六年進士知永州有丁永州集永慶寺二覧亭插迥飛簷聳凌虚疊砌危四天欄下揖萬象掌中窺目力不到處雲容無盡時塵塵看勝事凭檻幾人知赤城志宋詩紀事巻二十五
