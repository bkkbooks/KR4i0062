body:
  text: 宋詩紀事巻四十八錢塘厲鶚撰朱子諱熹字元晦一字仲晦世為徽州婺源人父韋齋先生松宦逰建陽之考亭遂家焉紹興十八年中王佐榜進士寧宗朝歴官寳文閣待制偽學禁起落職奉祠卒累贈寳謨閣直學士諡曰文理宗朝贈太師追封徽國公從祀孔子廟庭曾結草堂于建陽蘆峰之雲谷扁以晦菴亦號雲谷老人既又創竹林精舍更號滄洲病叟最後因筮遇遯之同人更名遯翁有文集齋居感興二十首并序存十首余讀陳子昂感寓詩愛其詞㫖幽邃音節豪宕非當世詞人所及如丹砂空青金膏水碧雖近乏世用而實物外難得自然之竒寳欲效其體作數十篇顧以思致平凡筆力萎弱竟不能就然亦恨其不精于理而自託于仙佛之間以為髙也齋居無事偶書所見得二十篇雖不能探㣲索眇追迹前言然皆切于日用之實故言亦近而易知既以自警且以貽諸同志云崑崙大無外旁薄下深廣隂陽無停機寒暑自来徃皇犧古神聖妙契一俯仰不待窺馬圖人文已宣朗渾然一理貫昭晰非象罔珍重無極翁為我重指掌人心妙不測出入乘氣機凝冰亦焦火淵淪復天飛至人秉元化動静體無違珠藏澤自媚玉韞山含暉神光燭九垓懸思徹萬㣲塵編將寥落歎息將安歸静觀靈臺妙萬化此從出云胡自蕪穢反受衆形役厚味紛朶頤妍姿坐傾國崩奔不自悟馳騖靡終畢君看穆天子萬里窮轍跡不有祈招詩徐方御宸極涇舟膠楚澤周綱巳陵夷況復王風降故宫黍離離至聖作春秋哀傷實在兹祥麟一以踣反袂空漣洏漂淪又百年僭侯荷爵珪王章乆巳喪何復嗟歎為馬公述孔業託始有餘悲拳拳信忠厚無乃迷先㡬東京失其御刑臣弄天綱西園植姦穢五族沈忠良青青千里草乘時起陸梁當塗轉凶悖炎精遂無光桓桓左將軍仗鉞西南疆伏龍一奮躍鳯雛亦飛翔祀漢配彼天出師驚四方天意竟莫回王圖不偏昌晉史自帝魏後賢盍更張世無魯連子千載徒悲傷晉陽啟唐祚王明紹巢封垂統已如此繼體宜昏風麀聚瀆天倫牝晨司禍凶乾綱一以墜天樞遂崇崇滛毒穢宸極虐焰燔蒼穹向非狄張徒誰辦取日功云何歐陽子秉筆迷至公唐經亂周紀凡例孰此容侃侃范太史受説伊川翁春秋二三䇿萬古開羣䝉放勛始欽明南面亦恭已大哉精一傳萬世立人紀猗歟歎日躋穆穆歌敬止戒獒光武烈待旦起周禮恭惟千載心秋月照寒水魯叟何常師刪述存聖軌顔生躬四勿曾子日三省中庸首謹獨衣錦思尚絅偉哉鄒孟氏雄辨極馳騁操存一言要為爾挈裘領丹青著明法今古埀煥炳何事千載餘無人踐斯境飄颻學仙侣遺世在雲山盜啟元命秘竊當生死關金鼎蟠龍虎三年養神丹刀圭一入口白日生羽翰我欲往從之脱屣諒非難但恐逆天道偷生詎能安西方論緣業卑卑喻羣愚流傳世代乆梯接淩空虚顧盼指心性名言超有無捷徑一以開靡然世争趨號空不踐實躓彼榛棘塗誰哉繼三聖為我焚其書以上大全集贈上封諸老夜宿上封寺翛然塵慮清月明殘雪裏泉溜隔松聲楮衲今如許綈袍那復情爐紅虚室煖聊得話生平醉下祝融峰我来萬里駕長風絕壑層雲許盪胷濁酒三杯豪氣發朗吟飛下祝融峰路出上背仰見上封寺遂登絕頂聯句同張敬夫林擇之我尋西園路徑上上封寺竹輿不留行及此秋容霽磴危霜葉滑林空山果墜崇蘭供清芳深壑遞幽吹不知山益髙但覺冷侵袂路囬屹隂崖突兀聳蒼翠故應祝融尊羣峰拱而峙金碧雖在眼勇往詎容憇絶頂極遐觀腳力聊一試昔逰冰雪中未盡登臨意兹来天宇肅舉目淨纖翳逺邇無遁形髙低同一視永惟元化功清濁分萬類運行有機緘浩蕩見根柢此理復何窮臨風但三喟自上封登祝融峰絕頂聯句衡岳千仞起祝融一峰髙羣出畏突兀奔走如曹逃我来雪月中歴覽快所遭捫天滑青壁俯壑崩銀濤所恨無十犗一掣了六鼇遄歸青蓮宫坐對白玉毫重閣一徙倚霜風利如刀平生山水心真作貨食饕明朝更清徹再往豈憚勞中宵撫世故劇如千蝟毛嬉游亦何益歳月今滔滔起望東北雲茫然首空搔以上南岳倡酬集寄劉珙胡憲一絕先生去上芸香閣胡閣老新峩獬豸冠劉除御史留取幽人臥空谷一川風雨要人看翠屏筆談九日登天湖分歸字韻去歳瀟湘重九時滿城寒雨客思歸故山此日還佳節黄菊清樽更晩暉短髪無多休落㡌長風不斷且吹衣相看下視人寰小祇合從今老翠㣲詩林萬選次陸子静韻德義風流夙所欽别離三載更關心偶扶藜杖過寒谷又枉籃輿度逺岑舊學商量加邃密新知培養轉深沉只愁説到無言處不信人間有古今庻齋老學叢談晦菴象山二先生不惟以書往復辨論無極鵝湖倡和尤見㫖趣象山詩云墟墓生哀宗廟欽斯人千古最靈心涓流積至滄溟水拳石崇成太華岑簡易工夫終乆大攴離事業竟浮沉欲知自下升髙處真偽先湏辨古今晦菴次韻云云枕屏秋景山寒夕飇急木落洞庭波幾疊雲屏好一生秋夢多逺逰篇十九歳作舉坐且停杯聼我歌逺逰逺逰何所至咫尺視九州九州何茫茫環海以為疆上有孤鳯翔下有神駒驤孰能不憚逺為我逰其方為子奉尊酒擊鋏歌慨慷送子臨大路寒日為無光悲風来逺壑執手空徊徨問子何所之行矣戒關梁世路百險艱出門始憂傷東征憂暘谷西逰畏羊腸南轅犯癘毒北駕風裂裳願子馳堅車躐險摧其剛峩峩既不支瑣瑣誰能當朝登南極道暮宿臨太行睥睨即萬里超忽淩八荒無為蹩躠者終日守空堂虞帝廟樂歌皇胡為兮山之幽翳長薄兮俯清流渺冀州兮何有眷兹土兮淹留皇之仁兮如在子我民兮不窮以愛沛皇澤兮横流暢威靈兮無外潔尊兮肥俎九歌兮韶舞嗟莫報兮皇之祜皇欲下兮儼相羊烈風雷兮暮雨以上濓洛風雅挽沈菊山愛菊平生不愛錢此君原是菊花仙正當地下修文日恰值人間落㡌天生與唐詩同一脈死隨陶令葬千年如今忍向西郊哭東野無兒更可憐杭州府志沈菊山袁州宜春人由進士知錢唐嘗植菊數百夲以自樂晩節益堅適以九月九日殁朱文公挽之云云月波臺潺湲流水注囬塘中作平臺受晩涼四面不通車馬跡一樽聊飲芰荷香韓公無復吟花島楚客何妨賦葯房少待湏㬰更清徹月華零露洗匡牀衢州府志月波臺在開化縣金錢山北宋山長江天然建朱子過訪作此遺之德興縣葉元愷家題蔥湯麥飯両相宜蔥煖丹田麥療飢莫道儒家風味薄隔鄰猶有未炊時大全集補遺張祁祁字晉彦烏江人邵弟號總得居士以子安國魁多士秦檜羅織下獄檜死獲免官至淮南漕運判官荅人覓茶内家新賜密雲龍只到調元六七公賴有家山供小草猶堪詩老薦春風清波雜志渡湘江春過瀟湘渡真觀八景圖雲藏岳麓寺江入洞庭湖晴日花爭發豊年酒易沽長沙十萬户游女似京都瀛奎律髓題靈仙觀樓殿起山巔無塵地自偏松廊暗雲霧粉壁豔神仙名姓藏丹府衣冠訪洞天㓜輿丘壑質定合老松泉安慶府志田如鼇如鼇號癡叟贑州人紹興中左宣教郎知道州題司馬端衡米元暉詩意巻萬頃長江水接天中有峰巒聳蒼緑青霄影蘸白蟾蜍浩浩澄波晃寒玉少陵詩名冠古今一生苦吟吟不足端衡寫作無聲詩留與拙堂伴幽獨郁氏書畫題䟦記如鼇䟦云司馬君實米元章德行文采皆夲朝第一等人恨余生晩不見前輩今觀二公墨妙追想終日為之慨然二公非畫師何乃精絕至是豈鳯雛驥子其天資超詣種種自不同乎紹興十八年九月廿六日沈少南儲福宫玉真公主像儲福宫在蜀天倉峰下有唐睿宗女玉真公主及明皇像乃公主修真之地有天峰閣望青城山三十六峯如列屏焉割盡齊封奉魯元更開沁水占名園何如帝子空山外落日騎驢芳草原方輿勝覽胡叔豹儲福宫棄形如遺但飬神阿兄爛醉棃園春人百撼之耳不聞何物女子乃獨醒徑来空山臥白雲不見漁陽胡馬塵方輿勝覧歐陽鈇鈇字伯威號寓菴廬陵人少與周益公同場屋連戰不利篤意于詩有脞辭集絕句戀樹殘紅溼不飛楊花雪落水生衣年来百念成灰冷無語送春春自歸桑麻得雨更青蔥芍藥留春結晩紅怪得鳥聲如許好此身還在亂山中為憐紅杏亞枝斜看到斜陽送亂鴉又是一春窮不死天教留眼看鶯花蓬忩臥聼疎疎雨卻是芭蕉夜半聲烟浪蔽天天倚蓋畧容一點白鷗明示二子先君以官貧我乃遺以安但願両兒健扶持一翁孱何湏待門生悠然柴桑閒游愚堂聞説名園尚脩竹花壓頽垣筍穿屋雨痕半掩壁間題飢鼠跳梁狐晝啼前人已為後人笑後人更使誰人悼嗚呼全盛㡬時柰衰何古来興廢何其多以上詩人玉屑禾山秋興生計嗟烏有誰人問子虛西風五更雨南雁數行書衰朽兒童笑飄流歲月餘秋深新病起吾志在吾廬夜起集萬感胡為淹此留詩成䕫子國人在仲宣樓絡緯聲中淚芭蕉雨裏愁遥知屢門倚應念有方游以上詩林萬選句細雨雙飛鷺寒蓑獨釣船誰知花過半纔與酒相尋故人驚㑹面新恨説從頭天上張公子人間陸士龍夢回千里外燈轉一窗深月白元猨哭更殘絡緯悲語離遽如許話舊復何時風色似傳花信到夕陽微放栁梢明巷南巷北人招飲一雨一晴花耐看有客過門湖海士隔籬呼酒咄嗟閒夢回金馬玉堂上文在冰甌雪椀中青山如故情非故芳草喚愁詩遣愁擾擾征人相顧語蕭蕭落木不勝秋千里歸來人事改十年猶幸此身存詩人玉屑楊誠齋䟦云鳥啼花落欣然㑹心處酌大白嚥伯威詩欲馭風騎氣也晁公休公休公武之兄夏日過莊嚴寺僧索詩為留絕句拉舍弟同賦十里溪橋梵宇新那知陌上漲紅塵老僧苦要題名姓不道林泉皆故人病起支離倚瘦笻幅巾芒屩竹隂中聞蟬未有驚人句且受禪牀一榻風成都文類晁公武公武字子止鉅野人沖之之子秦檜辟為四川總領財賦司幹辦公事乾道中以敷文閣直學士為臨安府少尹有郡齋讀書志昭德文集夏日過莊嚴寺僧索詩為留絕句笑脱塵衫撲輭紅杖藜徙倚水光中最憐林葉深深處遮盡斜陽不礙風出門散策烟棲樹歸路扶輿月蜕雲十里江村入圖畫野橋沙路杳難分成都文類逰焦山江勢東傾劇建瓴中流巖壑隱禪扃逰僧誰渡降龍鉢過客争摸瘞鶴銘脩竹捎雲淩北固桃花吹浪漲南溟上人勸賦斯山境乞與㣲吟勒翠屏京口三山志登金山東游尋勝即登臨浮玉知名冠古今萬壑波濤喧海口千年巖岫據江心雨篷烟棹征帆逺曉磬昏鐘佛屋深詩客分留風景在憑君一為發長吟金山志畧晁公遡公遡字子西公武之弟有嵩山集秋江秋江水清不勝緑還與漢江顔色同望中白鳥忽飛去落日丹楓相映紅詠瓶中梅折得寒香日暮歸銅瓶添水養横枝書忩一夜月初滿郤似小溪清淺時感事征衣消盡洛陽塵泣向東風拭淚痕不及青春歸有信一年一到樂遊園有感不見罘罳闕于今已十春素衣不忍棄為有洛陽塵以上嵩山集合江舟中作雲氣昏江樹春流沒釣磯如何連夜漲似欲送人歸亂石水聲急片帆風力㣲舟師且停櫓白鷺正雙飛成都文類呉説説字傅朋錢唐人廣陵王逢原之外孫官至郎中樓大防云錢唐呉傅朋游絲字前無古人酬次李辰甫所寄三首近知盡室入烟霞兒女甘貧慣食鮭方外何人差可友歳䦨底處定為家江城潮盛漫秋鹵驛道風髙捲霽沙子拾墮樵歸未得能無借地種桃花桐花竹實幾時生桑野秋枯繭未成肎信飢寒能累道唯餘寂寞許尋盟年顔巳媿神仙事江海難忘故舊情何日徃来同井徑清談清坐到天明扁舟東下初乘興明月南飛竟失羣田父語言時近道世人嘲笑尚論文九山歛氣横寒野一塢朝陽聚暖雲勝處借人教暫看後来何必問靈氛見真蹟詩帖題仙都山佳處從来説鼎湖兹游直欲到清都參天玉筍千尋許墮地金蓮十丈無江觀便思眠一柱海山今喜識方壺直湏買取鵝溪絹要畫滄洲水墨圖仙都山志呉環環髙宗呉后姪以待制帥襄陽歴少師致仕贈永安郡王句飽看七寳山頭月慣聼三茅觀裏鐘瀛奎律髓曾慥慥字端伯晉江人孝寛曾孫丞相懐之從兄官尚書郎直寳文閣奉祠閒居銀峰集百家類説凡六百二十餘種自號至游居士白帝城白帝城頭路逶迤一徑遥髙堂臨峽尾暴水沒山腰隔㟁漁施網横江鐡貫橋神妃翻覆手願賜雨連宵全蜀藝文志題蘇養直詞翰軸後元祐文章絕代無為主盟者眉山蘇舊聞宗匠為詩匠今見東湖説後湖原注徐師川號東湖居士寂寞香山老居士浩蕩烟波古釣徒瀾翻翰墨驚人眼一段清冰在玉壺鐡網珊瑚郭章章字仲逹崑山人少入太學以守城恩拜官被知已薦居帥幕乆之官至通直郎歸省賦别同舍菽水年来屬未涯羞騎款段出京華漲塵回旋風頭緊綺照支離日腳斜掠過短莎驚脱兔踏翻紅葉閙歸鴉不堪囬首孤雲外望斷淮山始是家也知隨俗調歸䇿郤憶當年重出關豈是長居戸限上可能無意馬蹄間中原百甓知誰運今日分隂敢自閒儻有寸功禆社稷歸来恰好試衣斑中呉紀聞方豐之豐之字德亨莆田人監豐國鎮及與吕紫薇交游陸放翁序其詩歴﨑道中漠漠春隂接海低濛濛晩雨傍山飛半攲古埭無人過時有村童䕶鴨歸後村詩話章淵淵字伯淵惇之後用䕃入仕不就卜居長興之若溪有槁簡贅筆子夜呉歌并序齊梁以来江南樂府詞多采方言用之穩帖不覺為俗語呉中下里之曲有云消梨應郎心上冷甘蔗應郎心上甜又云羅帬十二褶小妻也是妾皆有類樂府詞余因為子夜呉歌二章云消梨得能冷甘蔗復能甜總應郎心上為儂素比縑桃根復桃葉羅帬十二褶阿郎歡自濃小妻也是妾槁簡贅筆妙庭觀桃花流水小橋斜古觀臨溪翠竹遮聞道雙成有遺跡欲求金鼎看丹砂杭州府志曾協協南豐人肈孫以詞賦魁胄監終于知永州有雲莊集芭蕉炎蒸誰解喚清涼扇影揺揺上竹忩準擬小軒添睡美夢成風雨夜翻江全芳備祖康執權執權官待制奉祠寓居永嘉戲為妓山氏作昔日緹縈亦如許盡道生男不如女河陽滿縣皆春風忍使梨花偏帶雨庚溪詩話永嘉籍妓中有山姓者頗慧䴡康時命之侑尊一日妓之父以事繋縣當坐罪妓涕泣歴求救于士大夫康憫之戲為一絕云云明日妓詣縣投狀乞代父罪且連此詩于狀前邑宰笑而釋之曾季貍季貍字裘父號艇齋南豐人文定公弟宰之孫大理司直畮之子再舉進士不第師事韓子蒼吕居仁又與朱晦翁張南軒書問往復郡守張孝祥樞密劉珙薦皆不起有艇齋雜著陸放翁序文辭簡逺讀之者遺聲利冥得喪如見東郭順子悠然意消然可傳之作尚不止此遺珠棄璧識者興歎屬郡博士趙去華訪其遺集以補之秦女行并序靖康間有女子為金人所掠自稱秦學士女在道中題詩云眼前雖有還鄉路馬上曾無放我情讀之者悽然余少時常欲紀其事因循數十年不克為之壬辰歳九月因讀蔡琰胡笳十八拍慨然有感于心乃為之追賦其事號秦女行云妾家家世居淮海郎罷聲名傳海内自從貶死古藤州門戸凋零三十載可憐生長深閨裏耳濡目染知文字亦嘗強學謝女詩未敢女中稱博士年長以来逢世亂黄頭鮮卑来入漢妾身亦復墮兵間往事不堪囬首看飄然一身向邊垂被驅不異犬與雞奔馳萬里向沙漠天長地乆無還期北風蕭蕭易水寒雪花席地經燕山千杯濁酒安能醉一曲琵琶不忍彈吞聲飲恨從誰訴偶然信口題詩句眼前有路可還鄉馬上無人容我去詩成吟罷只茫然豈意漢地能流傳當時情緒亦可想至今聞者猶悲酸憶昔中郎有女子亦陷虜中垂一紀暮年不料逢阿瞞厚幣贖之歸故里惜哉此女不得如終竟老死留穹廬空教詩語傳悽惻不減胡笳十八拍梅磵詩話金沙寺古寺同真率君家更秩筵酒杯無算飲橘樹不論錢勝日攜佳客曾来是去年莫嫌頻至此直為主人賢宿正覺寺古寺荒涼甚秋風更颯然殿焚猶有礎僧老不知年但可扶藜至無因假榻眠鐘魚乆寂寞誰施一囊錢疎山道中在金谿縣西南村深谷鳥近人鳴暮靄収時雨又晴極目春山隨處好筍輿穿盡緑隂行江南九月未飛霜木葉蕭蕭巳半黄行徧疎山山下路滿山惟有桂花香雲谷山城東三十五里有山曰芙巨荀伯子臨川記云巖内有石人坐盤石上體塵則風潤則雨晴則瑩潔今曰東巖嶺其東南為靈谷諸峯連抱如障多石其上祀三仙曰隱真觀有謝靈運墨池舊聞伯子記巳得靈谷名隱然望此州竒勝稱山靈懸崖瀉瀑布如髙屋建瓴喬松數十丈下有千嵗苓仄足行鳥道勢欲摶青冥仙事雖渺茫幽討未忘情髙秋八月後擇勝来經行黄冠三両人淡然亦忘形烟霞到几席爽氣来戸庭瘦筇閑指點老瓦同注傾慙非換鵝手不敢臨黄庭或可聯石鼎未必讓彌明重陽無十日黄菊漸向榮佳哉此天氣一笑未易營但願腳力健年年此尋盟以上撫州府志韓元吉元吉字无咎號南澗許昌人維四世孫寓居信州隆興閒官吏部尚書有南澗甲乙稾朱子云韓旡咎詩作著者儘和平有中原之舊無南方啁唽之音黄玉林云南澗名家文獻政事文學為一代冠冕玩鞭亭黄鬚鮮卑勇無策自馳巴馬来窺賊賊奴但怪日繞營起看飛塵已無迹寳鞭不惜棄道旁坐令老嫗知興亡百年社禝有天意姦鋒逆燄徒鴟張孤城遺跡森在目平湖無復春草緑郤對青山憶謝公父老猶嫌人姓木邉兵巳重朝士輕中原有路何由行柙中虎兕不可制江左夷吾浪得名方輿勝覽雨中聞伯恭至湖上莫嫌鞭馬踏春泥茶鼎詩囊偶共攜山色雨深看亦好湖光烟接望還迷連天花絮飛將盡夾道蒲荷長欲齊官事得閒湏洗眼蓬壺只在帝城西送陸務觀福建提倉觥船相對百分空京口追隨似夢中落紙雲烟君似舊盈巾霜雪我成翁春来茗葉還争白臘盡梅梢盡放紅領畧溪山湏妙語小迂旌節上淩風元注僕為建安宰作淩風亭以上瀛奎律髓題北齊校書圖并序齊文宣天保七年詔樊遜校定羣書供皇太子遜與諸羣秀髙乾和馬敬德許散愁韓同寳傅懐德顧道之季道子鮑長暄景孫及梁王主簿王九元水曹參軍周子深等十一人借邢子才魏収諸家本共刋定祕府紕繆于是五經諸史殆無遺闕此圖之所以作也黄太史所謂士大夫十二員今范明州謂逸其半者皆是矣至唐巳隔周隋二代不知何自得其形容髣髴邪髙氏起索虜以兵力奮然敦尚儒風立石經興黌序定尚書于涼風堂質經義于春宫意當時文士歆豔之故相傳于圖畫哉流及後裔文林之館既興御覽之書既作無愁之聲已播于天下不捄其亡故余感而賦齊髙校讐誰作圖一時紬書亦名儒網羅巻軸三千餘俗傳非真類迂愚雌黄是正定不無虛文末學徒區區豈識治道通唐虞文林髙館希石渠後来御覽嗟何書修文偃武事益誣轉頭鄴城已丘墟峨冠廣袖長眉鬚丹青寫此猶不渝髙鬟侍女曵紅裾両騅帕鞍立奚奴罷琴渉筆傾酒壺蘭臺供擬信樂歟不知畫手安用摹無乃逞巧聊自娯千年視之一欷歔君不見文皇學士十八人謀猷事業皆功臣瀛州舊圖應更真請君尋觀為拂塵硯北雜志隆興甲申歳閏月遊焦山荒村日晴雪猶積繋纜焦公山下石江翻斷崖石破碎瘞鶴千年有遺跡瘦藤百級躋上方浮玊南北江中央檣竿如林出烟浦酒船逺與帆低昻老鴟盤風舞江面殺氣淮南望中見神龍只合水底眠為洗乾坤起雷電觀音巖前竹十尋大士不死知此心醉歸更喚殷七七賸種好花開鶴林鎮江府志雲洞在信州西揮䇿度絕壑撐空見樓臺丹崖幾千仞中有佛寺開老僧如逺公譍門走蒿萊下馬問所適褰衣指崔嵬飛䦨倚石磴曠蕩無纖埃坐乆意頗惬爽氣生樽罍仙棺是何人蜕骨藏莓苔舉酒一酌之慨然興我懐丹砂固未就白鶴何時来不若生前樂長嘯銜此杯廣信府志髙元之元之字端叔武烈王瓊之七世孫南渡家明州五上禮部不第人號萬竹先生有茶甘甲乙稾題雪竇飛雪亭危亭上拂烟霧光蒼崖深到蛟螭穴天河飛来破山翠寒入疎林風自發翻珠錯玊無時歇巖前散作千秋雪寒聲蕭蕭凛毛髪白雲朶朶翔空滅飛流濺沫入毫端天與一詩為題絕延祐四明志大小晦山大晦出小晦過盡山峰翠寒雲抱幽谷枯卉老壖瀨沿流路偪側當道屋破碎郤立重囬首瀑布瀉雲背甬上耆舊集句灑忩蠶食葉入竹蟹行沙娯書堂詩話四明髙端叔博學能詩鄉里所推重嘗有雪詩一聯云云竟坎􅇄不仕樓攻媿挽之云弟子皆藍綬先生竟白袍曾逮逮字仲躬幾季子仕終敷文閣待制有習菴集清樾軒在信州廣敎寺即文清所居開軒在獨園繞屋得清樾不知何年樹殆為今日設忩扉落林影時復亂風月喧聲了不聞幽弄極可悅玊溪僧所廬無似許明潔頗疑三昧手斷取從三浙禪房花木深此語信佳絕何以落其成爐烹薦茗雪廣信府志王鈇鈇字承可秦檜舅氏王夲觀復之子檜薦于朝除樞屬仕至貳卿墨梅前身姑射冰相似今代潘妃玊不如坐對真成在江國淡烟㣲雨暗扶疎聲畫集絕句津頭短短長長柳陌上朱朱白白花一段風烟三百里杜鵑愁絕客思家錦繡萬花谷李牧牧字子牧次韻曾端伯晚過青山怪底塵勞破青山在眼中竹橋低跨水林磬小鳴風半嶺暮雲碧一村霜葉紅禪枝棲衆鳥囬首意無窮前賢小集拾遺刁麟游麟游南徐人失其名以字傳賦竹馬小兒騎竹作驊騮猶是東西意未休我已童心無一在十年渾付水東流竹坡詩話南徐刁氏子字麟游十嵗時作竹馬詩後十嵗卒客有志其墓者以比李長吉張堯臣堯臣陳留人入南渡寄洞霄道士王竹菴一笑相逢巳隔秋人間多事苦相留亂雲有路通仙境清夢何因訪昔遊白日無情傷老大青山此地可藏修與君宿有誅茅約為卜来賢一室幽洞霄詩集何昞昞號唯齋贈竹菴王先生巾盂肎復聼齋鐘隱處何妨作退翁一榻但留詩軸伴萬緣都付酒杯空松顛舞月歸巢鶴竹下敲門採藥童風定雲眠人不到倚䦨凝目看飛鴻洞霄詩集朱謙之朱買臣廟貧賤難堪俗眼低區區何事便雲泥㑹稽乞得無他念秖為歸来詫故妻談藪嚴州夀昌縣道旁有朱買臣廟其地有朱池村朱謙之詩云云姚述堯述堯錢唐人有蕭臺公餘詞句蔟蔟魚鹽喧古市聲聲弦誦徧儒家過青田覽方輿勝顧發發字休文崑山人待潮顧浦宿耕者張欽舍海近雲氣昏禹跡開茫茫晴林列障邏什伍屯千岡頃遭七年旱驟見九秋黄腰鎌喜復悲泥水新圃場縣侯初下教官賦無豐荒錯揮製錦刀戲作編氓創身上催租瘢短褐愁蓋藏課為五邑最薦飛十剡章逡巡掌邦計跬歩封侯王江淮十萬師待飼正頡吭禾麥今已登婦子戒勿嘗行俟天雨粟飽食均四方崑山雜詠宋詩紀事巻四十八
