body:
  text: 宋詩紀事巻九十九錢塘厲鶚撰福州社神投蔡君謨逺入青青疊疊峯峯前真宰讀書宫半巖冷落高宗雨一枕凄涼吉甫風烟鎖豹眠閒霧露井凋鳯宿舊梧桐九龍山下英雄氣盡屬君家世胄中墨莊漫録蔡君謨作福守日有一書生投詩來謁君謨異之尋令人伺其所歸至一山下忽不見四顧無人唯一社屋爾意其社神也金華神别吳生羅韈香消九九秋淚痕空對月明流塵埃不見金華路滿目西風總是愁崔伯易金華神記汴人有吳生者以娶宗女得官于三班嘉祐中罷高郵迺寓其家于治所而獨與兄子南適錢塘道出晉陵艤舟于望亭堰下是夜月明風高生乃危坐舷上久之忽有緋衣披髪持刃炬自竹林間出者後引一女子冠玉鳯冠曳蛟綃文錦之衣顔色甚麗而年十八九耳生見而驚俄頃至岸側回叱緋衣者曰可去矣無久留也于是滅炬泣拜去女子即登舟面生坐謂生曰見向來緋衣者乎此君之夙仇也而索君且數十年矣乃今方得之第以我故得免不然今夕君當死其手生聞益驚駭不自安女子笑曰君怯耶即以金縷衣置肩上生稍安乃問曰若神歟其鬼耶女子曰我非人亦非鬼蓋金華神也過去生中嘗與君為姻好故相救耳遂相與入舟中取酒共飲其言笑諧謔悉如常人然生誡曰毋高聲恐兄子知之女子曰我聲特君可聞他人雖厲聲亦不能聞也至明起謂生曰舟檝巳有曉色勢不能久留當與君子訣矣君後十年遊華山日多置朱粉于路隅梧桐下揚之雖然君今不可終此行恐復有不濟也因索筆題詩一章書巳輙復流涕歔欷而去明日思其言遂回棹不復南去謝中舍詠落花流水難窮目斜陽易斷腸誰同砑光帽一曲舞山香東坡志林寇元弼言徐州通判李陶有子年十七八素不善作詩忽詠落花詩云云父驚問之若有物憑附者自云是謝中舍問砑光帽事云西王母宴羣仙有舞者帶砑光帽帽上簪花舞山香一曲曲未終花皆落去無名神降于鄭洚家吟詩忽然湖上片雲飛不覺舟中雨濕衣折得蓮花渾忘却空將荷葉蓋頭歸陸游避暑漫抄淮漘龍女贈張孝和落帆且泊小沙灘霜月無波淮上寒若向江湖得消息為傳風水到長安詩話總龜張孝和闗中人淳化壬辰游淮南被酒入淮漘龍女祠忽簾中有婦人邀而置酒贈詩一絶孝和告去回顧唯古祠敗舍而巳散花天女夢中戲秦少游不知水宿分風浦何似秋眠借竹軒聞道詩詞妙天下廬山對眼可無言冷齋夜話秦少游南遷宿廬山宫亭湖庿下登岸縱望久之歸臥舟中聞風聲側枕視微波月影縱横追憶昔常宿雲老借竹軒見西湖月色如此遂夢美人自言維摩詰散花天女也以維摩詰像來求贊少游愛其畫黙念曰非道子不能作此天女以詩戲少游云云夢中宫女抛毬曲侍燕黃昏曉未休玉階夜色月如流朝來自覺承恩最笑倩傍人認繡毬隋家宫殿鎖清秋曽見嬋娟颺繡毬金鑰玉簫俱寂寂一天明月照高樓此首見侯鯖録堪恨隋家幾帝王舞裀揉盡繡鴛鴦如今重到抛毬處不是金爐舊日香沈括夢溪筆談福州士人李慎言字希古嘗夢至一處水殿中觀宫女戲毬山陽蔡繩為之傳敘其事甚詳有抛毬曲十餘詞皆清麗今獨記兩闋西華寶懿夫人遺王子霞靈臺本清風花草相葳蕤宫深藏白日金堂吐華輝彈棊玉局寒鬭草珠露晞閬苑多美人形飛心不移醉眼憑春風惟有胡蜨知如何忽相失負我雲際期而今才鬢脚迤􅆔秋婦絲紫情祕消息行雲住無時世間苦寂寥空此隨盛衰玉照新志王綸字子霞其家嘗冇神降自稱西華寶懿夫人年二十餘絶色也其形或見有詩以遺子霞燕華君贈王綸君為秋桐我為春風春風㑹使秋桐變秋桐不識春風面中山詩話海陵人王綸女輒為神所憑自稱燕華君字善數品形製不相犯吟雪詩云何事月娥欺不在亂飄瑞葉落人間説云天上有瑞木花六出他詩句詞意飄逸類非世俗可較題金山云濤頭風巻雪山脚石蟠虯嘗謂綸為清非孺子贈詩云云居數嵗神舍女女懵然無知嫁為廣陵吕氏妻湘妃題廟中碧杜紅蘅縹緲香冰絲彈月弄新涼峯巒向曉渾相似九處堪疑九㫁腸許彦周詩話有客泊廟前夜半偶不寐見輿衞入廟中置酒鼓琴心悸不敢窺殆明方散隠隠絶水浮空去因入廟見詩四句墨色猶未乾玉源靈源桃源三夫人中秋月金風時拂袂氣象更分明不是月華别都縁秋氣清一輪方極滿羣籟正無聲曉魄沈烟外人間萬事驚玉源夫人高秋渾似水萬里正圓明玉兔步虛碧冰輪輾太清廣寒宫有路桂子落無聲吾館無弦彈棲烏莫要驚靈源夫人金吹掃天幕無雲方瑩然九秋今夕半萬里一輪圓皓彩盈虛碧清光射玉川瑤尊休惜醉幽意正綿綿桃源夫人詩話總龜陳純字元朴莆田人因遊桃源中秋遇玉源靈源桃源三夫人玉源令純舉中秋月詩純言一聨云莫辭終夕看動是隔年期桃源曰意雖佳但不見中秋作七月十五夜亦可三夫人因作詩云云純有和桃源之作石恪鬼送雷殿直衡陽去此正三千一路程途甚坦然深邃門牆三楚外清風池館五峯前西邊市井來商客東岸汀洲蔟釣船公退只應無别事朱陵後洞看神仙雅言雜載恪西蜀人善畫尤長于山水禽魚亦攻歌詩開寶中王師下西蜀遣名畫入京恪在其數宣于相圃寺畫壁工畢乞歸出京道卒雍熙元年殿直雷承昊奉命之衡陽與恪遇于公舍達曉分攜為詩送承昊行數里方思恪巳卒及到任風物一如詩言盧多遜鬼題壁南斗微茫北斗明喜聞窗下讀書聲孤魂千里不歸去辜負洛陽花滿城澠水燕談多遜謫死朱崖旅殯海上後其子全扶柩歸葬江陵佛舍壁上有詩云云晁簡鬼贈梁固死生離别最堪悲相對無言淚滿衣歎我已歸泉下去羨君新向月中歸長鞭乍見騰夷路折翼終難繼迅飛珍重故人當聖代早持鈞軸入黃扉詩話總龜晁奉禮簡故宫保内翰之次子也與梁固少小硯席之至善大中祥符二年固狀元及第授青州倅時奉禮榮侍在闕下是年冬末梁方之任去青兩驛夜夢晁來相謁手攜白扇上有七言詩一首云云覽詩起執手悲泣而别倐然滅乃急走僕録所得詩入京師訪其安否宫保開讀之大慟曰品格真吾兒作夢之夕乃簡亡之日也韶州西軒鬼題壁吾儕今日㑹嘉賔滿酌洪鍾酒數廵狼藉薰風不知曉荔枝又是一番新青瑣高議治平二年長沙趙琪郎中作廣東提刑公宇在韶州西軒有荔枝數本非常繁實盛夏方熟琪將召刺史燕賞一夕皆空皮核滿地琪深訝之乃開西軒軒之西壁有詩一絶云云視餘方知荔枝為鬼所竊耳二廣人多傳異之夢中少年侑酒歌人生開口笑難逢富貴榮華總是空惟有隋隄千樹栁滔滔依舊水流東陶朱新録吏部侍郎陳彦修有侍姬曰小姐氣羸多病睡則多異夢宣和間一夕夢少年挾升酒樓少年執板歌以侑酒覺猶能記云聶昌鬼題壁星流一箭五心摧電掣雙眸兩臂開車馬踐時頭似粉烏鳶啄處骨如灰父兄有感空垂淚子弟無知不舉哀回首臨川歸未得冥中空築望鄉臺豫章詩話聶昌字賁逺元名賁字逺山靖康中登政府出知絳州遇害紹興中張殊自北歸過絳驛見壁間有血書一詩時以為聶之精魂所作趙汝言鬼絶句彈指紅塵二十年歸來瀛海浩無邊夢魂相遇因隨念珍重前生兄弟縁暌車志趙汝言字允之死巳數年有遺女住子淳熙乙未冬住子暴疾其兄謙之憐其幼孤念之甚至夢至一所高闕長廊金碧輝煥汝言在其間題詩于壁云云顧語曰住子巳無恙以兄念至縁因念結故得暫相遇耳謙之慟哭而覺史彌逺鬼示子婦冥路茫茫萬里雲妻孥無復舊為羣旱知泡影須臾事悔把恩讎抵死分西湖志餘彌逺死巳久一夕其家聞叩門聲曰丞相歸舉家駴匿比入門燈轎紛紜升堂即席子婦皆出羅拜訊慰平生歴歴囑家事索紙筆題詩云云統制吳源鬼示柳春疋馬南歸望古城半林殘雨夕陽明雲邊岫接秦山色樹裏河流漢水聲墜淚有碑苔色古攔街無曲酒旗横那堪回首成陳迹笳鼓西風愴客情荆門紀畧源赴援襄陽戰殁後襄為元有道路始通州人柳春過襄陽宿於荒村夜間偶步見一武士仗劒披甲從者數百人其威凛肅春驚見避武士呼曰君不識我耶吾里人吳源也兵救襄城死于王事上帝嘉吾忠義命為神矣君歸幸白于吾家若不信可示以鐵券按劒朗吟云云遂擲鐵券而没春歸訪其家白之並出所投鐵券鄉里始知源之盡節云巴峽鬼絶句秋徑填黃葉懸崖露草根猨聲一叫斷客旅數重魂詩話總龜建隆初有人行巴峽夜泊江涘忽聞詠詩云云及曉訪之但空山䆳林有脚迹長二尺許東平鬼題竹間墓前古朩號秋風墓尾幽人萬慮空惟有詩魂銷不得夜深來訪竹溪翁竹坡詩話東平王興周為余言東平人有居竹間自號竹溪翁者一夕有鬼題詩竹間云云周公埠鬼上羅令白雲分兩片秋月正揚輝惆悵江頭暮無船不可歸饒州府志羅必元咸淳中為餘干令有客被賊謀死于周公埠其魂以狀告無字照之有詩云云必元曰此必姓段名明者捕得服罪樊若水女鬼寄夫楚水平如練雙雙白鳥飛金陵幾多地一去不言歸李昌齡樂善録鍾輻年少負才傲物樊若水愛其才以女妻之女亦才質雙盛輻登第方得意買一妾自侍命曰青箱所在狂放久不歸一日過城邑令延留飲于樓上輻醉臥忽夢其妻以一詩怨責翌日歸至采石妾忽暴死及抵家樊已死數月矣李季萼鬼季萼字英華開封李長卿女縉雲人傳其詩有英華集三巻春日述懐園林蔟蔟日暉暉白蜨黄蜂自在飛公子醉眠芳草岸風移花片㸃春衣句醒酒清風搖竹去催詩小雨過山來耆舊續聞元豐中縉雲令開封李長卿女慧性過人姿度不凡染疾而逝殯于邑之仙巖寺三峯閣李公罷因舁歸宣和庚子青溪冦起焚燎無遺惟三峯閣獨存主簿以為廨舍濟南王傅慶及内表曹頴偕來館曹于㕔治之東一夕有女子打扃而至與語皆出塵氣詰其姓氏曰開封李長卿女季萼其名英華其字辟穀有年身輕如羽知子鰥居故來相慰唱和殆無虚日曹有親陳觀察挽之從軍將就道英華與訣曰妾與君之縁斷矣子宿縁寡淺塵業未償他日當有兵難敬授靈香一瓣有急當爇以告當陰有所䕶不然亦無如之何也曹公勇為朔方之行不意獲譴麾下追惟英華之言欲取所遺香爇之軍行無宿火卒正法柳氏鬼别陶氏子仲冬二七是良時江下無縁與子期今日臨歧一杯酒共君千里遠相離異聞總録嘉興令陶彖有子得疾竒甚形色語笑非復平日彖患之㑹天竺辨才法師元浄適以事至彖素聞其名即詣謁具狀告曰兒始得疾時一女子自外來相調笑久之俱去稍行至水濵且言曰仲冬之月二七之期月盈之夕車馬來迎今去妖期逼矣未知所處願賜哀憐浄許諾杖䇿從至其家除地為壇設觀音菩薩像取楊枝霑水灑而呪之三繞壇而去是夕兒寢安然明日浄結跏趺坐引兒問曰汝居何地而來至此荅曰㑹稽之東卞山之陽是吾之家古木蒼蒼又問姓誰氏荅曰吳王山下無人處幾度臨風引舞腰浄曰汝栁氏乎辴然而笑浄曰汝無始已來迷巳逐物為物所轉溺于淫邪流浪千刼不自解脱入魔趣中横生灾害延及無辜汝今當知魔即法界我今為汝宣説有楞嚴祕密神呪汝當諦聴痛自悔恨洗旣往過愆返本來清浄覺性于是號泣不復有云是夕謂兒曰辨才之功汝父之䖍無以加吾將去矣後二日復來曰久與子游情不遽捨願一舉觴為别因相對引滿作詩云云遂去不復見李媛鬼題餘杭步伍亭壁夜臺夜復夜東山東復東當時九龍月今日白楊風春渚紀聞蓮兄子碩送客餘杭步伍亭就觀壁後得淡墨書數行筆跡道媚後題云李媛書似非世人所作亭後有數十荒冢疑鬼憑附而書宫人玉真鬼贈李生皓齒明眸掩路塵落花流水幾經春人間天上歸無處且作陽臺夢裏人元好問續夷堅志大定中廣寧士人李惟清元直者與鬼婦故宋宫人玉真者遇玉真為歌二詞喬氏望仙鬼題帊蕭蕭風起月痕斜露重雲鬟壓玉珈望斷行雲凝立久手彈珠淚濕梅花異聞總録潭州有清浄覺地宋咸淳間游士胡天俊寓焉月夜撫琴梅樹下遙見美女迤邐近前胡執其手斂衽而去曰後夜月明當赴子約翌日友人拉入城游飲忘歸者兩宿大悔失期亟歸于樹下得一白羅帊上有詩云云明日以帊示人趙冰壺駭曰吾亡妾杭人喬氏名望仙貴妃姪女也去年暴亡殯梅樹後正其筆蹟也宫人衞芳華鬼聚景園湖上園亭好重來憶舊游徵歌調玉樹閲舞按梁州徑狹花迎輦池深柳拂舟昔人皆已没誰與話風流西湖游覽志餘延祐初永嘉滕穆僑居臨安月夜游聚景園遇一美人自言衞芳華故宋理宗朝宫人即命侍女翹翹設茵席酒果歌朩蘭花一闋又賦詩云云自是白畫亦見生遂攜歸寓所下第後美人留翹翹使守舊宅而身隨生歸里凡三載生復赴浙試美人請與生往訪翹翹至則翹翹迎拜于路左矣美人忽下淚云縁盡當奉辭是夜鐘鳴急起與生分袂贈玉指環一枚而别寶應女鬼絶句長橋直下有蘭舟破月衝烟任意游金玉滿堂何所用争如年少去來休仇池筆記秦少游云寶應民有以嫁娶㑹客者酒半客一人徑起出門主人追之客若醉甚將赴水者主人急持之客曰婦人以詩招我其詞云云倉皇就之不知其為水也然客亦竟無它事碧瀾堂女鬼絶句水天日暮風無力斷雲影裏蘆花色折得荷花水上游兩鬢蕭蕭玉釵直異聞記安吉碧瀾堂素有竒怪有士晁紫芝嘗與客游眺于彼迫暮共見水面一好女子衣服楚楚手捧蓮葉足履萍草而來晁料其鬼物急叱之女子且行且吟吟畢由東岸而去蜀雙竹齋女鬼二絶句舊時衣服盡雲霞不到迎仙不是家今日樓臺渾不識只餘古朩記宣華小雨廉纖梅子黃晚雲收盡月侵廊樹陰把酒不成醉説著無情更斷腸成都文類近李西美帥成都士人陳甲館于雙竹齋月夜有危髻古裳衣婦人數輩語笑花圃中甲殊不顧有甚麗者誦詩云云忽不見今府第故蜀宫豈當時宫女尚有鬼耶按蜀檮杌宣華故苑名城西蘭若女鬼題窗間西湖著眼事應非倚檻臨流弔落暉昔日燕鶯曽共語今宵鸞鳯歎孤飛死生有分愁侵骨聚散無縁淚濕衣寄語吳郎休負我為君消瘦十分肌西湖志餘宋時有吳生寓城西蘭若夜半聞叩扉聲啟視乃一處子容服雅淡問其從來以比鄰荅之强留入室遂止宿焉居數月寺僧視生容止稍疑之詰問百端乃以實告僧驚歎曰昨一官員有女才色豔麗充選内庭病卒權殯西廊三年矣曩嘗出蠱行客汝遇得非是乎不亟去禍且及矣生猶未忍至夜于窗間得一詩墨色慘淡不類人書生始懼翌日遂行燈檠怪絶句郎行久不歸妾心傷亦苦低迷羅箔風泣向西窗雨雲齋廣録宋潛為甘陵廵檢故人趙當訓其子弟忽見美婦人立燈下唱云云遂滅燈趨趙就寢曰妾本東方人鬻身彭城郡今郎觀光上國孤眠暗室故來相伴後諸生怪趙精神恍愡具告其父潛往覘焉見一婦人宋大呼遽入以手抱之乃一燈檠耳遂焚之畫上麗人荅翟望歌苕之榮兮春日陂遲濕汀蘋以建址兮冒卿雲以為帷吹浩香以渡漢兮示秀色與華姿居誰與復兮挽明月以揚輝悵谿風兮聊詠言于兹曹勛松隠文集翟望喜讀騷經楚些亦寓詞蘅杜間每水邊沙外屬思幽放一夕夢麗人莊容獨秀翳脩竹而立隔溪語望云云歌畢致一笑而逝望寤亟書于紙心惝怳者累日後思天清寺之菊坡謁僧琴㑹僧出因憩北軒有一姬先在焉容色鮮麗疑若素識因質名氏不自知體之前也姬笑曰妾有外姒約我㑹此偶故渝爽然室有酒肴能少駐否望欣然從之稍情洽望被酒諷苕之榮以自喜姬曰溪風之隔殆不然矣望復叩以他辭宛不蒙荅姬先出門莫知所適望裵􅏆見軒壁挂玉女觀泉圖心以為畫之靈遇作靈遇賦蔡京鶉怪訴蔡京食君廩中粟作君羮中肉一羮數百命下箸猶未足羮肉何足論生死猶轉轂勸君宜勿食禍福相倚伏庚溪詩話蔡元長京旣貴享用侈靡喜食鶉每預蓄養之烹殺過當一夕夢鶉數千訴于前其一前致詞云云觀此可為饕餮而暴天物之戒宋詩紀事巻九十九
