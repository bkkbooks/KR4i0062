body:
  text: 宋詩紀事卷四十三錢塘厲鶚撰朱辨辨字少章徽州婺源人建炎初授修武郎借吉州團練使副王倫使金通問被拘凡十九年紹興十三年始與洪皓張邵南歸易宣教郎直祕閣主管佑神觀卒有聘遊集輶軒唱和集曲洧舊聞風月堂詩話行世宋史本傳辨留金王倫先歸以辨奉送徽宗大行之文為獻其辭有曰歎馬角之未生魂消雪窖攀龍髯而莫逮淚灑冰天帝讀之感泣北人以松皮為菜豫初不知味虞侍郎分餉一小把因飯素授廚人與園蔬雜進珍美可喜因作一詩吾老似出家晚悟愧根鈍滋旨卻羶葷禪恱要親近偉哉十八公兹道亦精進舍身充刀几割體絶嗔恨鱗皴老龍皮鳴齒溢芳潤流膏為伏龜千歲未須問便堪奴筍蕨詎肻友芝菌跏趺得一飽萬事皆可擯侍郎文懿後落落衆推俊淡然世味薄內典得所信香廚留淨供頻食不言頓宴然默不語草木雷音震得法於此公骨髓傳心印應憐持節人餉此為問訊欲將無上味為我洗塵坌食之不敢餘感激在方寸豫以年事漸髙氣海不能熟生暖冷旅中又無藥物遂用火攻之䇿灼艾凡二百壯吟呻之際得詩二十韻不作漳濱臥年侵氣血衰據鞍思少壯攬鏡歎清羸有病方求艾無營莫問蓍心知出下策理勝遇中醫陽燧神逾速銅仙術盡施論功鄙炮製取穴辨毫釐火帝恩光異炎官績用奇書螢比差似珠蟻迫方知忖物嗟炮鱉觀形笑灼龜煙微初炙手氣烈漸鑽皮閉目書徒展支頭枕屢移發狂還自哂賈勇僅能支宋鷁追風日吳牛喘月時忠言勞緩頰善謔為開眉服氣工夫遠燒丹嵗月遲衛生防後患伐性釋前疑展轉那成夢呻吟且當詩因心念民瘼出位歎身卑欲已七年病當從百世師保身將保國未可廢針規元夕有感朔雪餘千里東風遍九州關河中土異燈火上元愁緑蟻嘗新釀青貂戀故裘紫姑無問卜世事正悠悠炕寢三十韻風土南北殊習尚非一躅出疆雖仗節入國暫同俗淹留歲再殘朔雲滿崖谷禦冬貂裘敝一炕且跧伏西山石為薪黝色驚射目方熾絶可邇將盡還自續飛飛湧𤣥雲焰焰積紅玉稍疑雷出地又似風薄木誰容鼠棲冰信是龍銜燭陽曦助喘息未害搖空腹惠氣生袴襦仍工展拳足豈惟脫膚鱗兼復平體粟負暄那用詫執熱定思沃收功在歲寒較德比時燠雖餘炙手焰寧有爛額酷矧當凝沍晨炎帝獨回轂𤣥冥真退聽祝融端可録嗟豫亦何者萬里歌黃鵠偃仰對窗扉姸暖謝衾褥壯懷羞竈媚晚悟笑突曲因思墮指人暴露苦皸瘃頻年未解甲蹈此鋒刃毒遙知革輅中旴食安豆粥陪臣將命來意懇誠亦篤有奇不能吐何術止南牧君心想更切臣罪何由贖此身雖自溫此志轉煩促論武貴止戈天必從人欲安得四海春永作蒼生福聊擬少陵翁秋風賦茅屋客懷兵氣常時見客懷何日開形骸病自瘦鬢髮老相催已負秦庭哭終期漢節回風雷識我意一雨洗氛埃白髮白髮使車前煙波思渺然霜清穫稻日風急授衣天客館但愁坐釣舟誰醉眠乘槎㑹有便真到斗牛邊劉善長出示李伯時畫馬圖俯首舉尾拳一蹄掣韁欲嗅驕不嘶奚官聳肩兩足垂意貌自與造父齊雞目麟鬐鳳凰臆玉山禾遠未容食籋雲追電有餘地置之畫圖人豈識精神權奇孰可班當在白兔青龍閒君知此馬從何來龍眠胸中十二間謝崔致君餉天花三年北饌飽羶葷佳蔬頗憶南州味地菜方為九夏珍天花忽從五臺至崔矦胸中散千卷金甌名相傳雲裔愛山亦如謝康樂得此攜歸豈容易應憐使館久寂寥分餉明明見深意堆盤初見瑤草瘦鳴齒稍覺瓊枝脆樹雞溼爛慚叩門桑蛾青黃漫趨市赤城菌子立萬釘今日因君不知貴乖龍耳僅免一割沙門業已通三世偃戈息民未有術雖復加飱秖增愧雲山此去縱不遠口腹何容更相纍報君此詩永為好捧腹一笑萬事置送春風煙節物眼中稀三月人猶戀褚衣結就客愁雲片段喚回鄉夢雨霏微小桃山下花初見弱柳沙頭絮未飛把酒送春無别語羡君才到便成歸攄抱客滯殊方久山圍絶塞深秋風入橫笛夜月傍霑襟造膝他時語捐軀此日心飛霜滿明鏡髮短不勝簪李任道編録濟陽公文章與僕鄙製合為一集且以雲館二星名之僕何人也乃使與公抗衡獨不慮公是非者紛紜於異日乎因作詩題於集後俾知吾心者不吾過也庚申六月丙辰江東朱辨書絶域山川飽所經客蓬歲晚任飄零詞源未得窺三峽使節何容比二星蘿蔦施松慙弱質蒹葭倚玉怪殊形齊名李杜吾安敢千載公言有汗青濟陽公謂宇文叔通叔通受官而少章以死自守恥用叔通見比故此詩以不敢齊名自託至於書年為庚申與稱江東朱辨者蓋亦有深意云以上中州集句平生所愛曾莫倦天遣花王慰吾願姚黃三月開洛陽曾觀一尺春風面謝范祖平朝散惠姚花曲洧舊聞陳東東字少陽鎮江丹陽人以貢入太學欽宗時率其徒伏闕上書論蔡京王黼等誤國姦狀又上書請留李綱髙宗即位召至行在上書乞罷黃潛善汪伯彥㑹布衣歐陽徹亦上書言事潛善遽以語激怒髙宗與徹同死于市越三年髙宗感悟贈東承事郎紹興四年加朝奉郎祕閣修撰有盡忠録戴埴鼠璞靖康中孫覿論太學生陳東誘衆伏闕為亂建炎中黃潛善輩置東極刑覿潛善不足道也張魏公亦奏胡珵筆削東書欲使布衣挾進退大臣之權幾至召亂遂以諷諭狂生規搖國是將珵追勒編置或謂魏公乃潛善客珵則李綱客也因借此去之公為一代人物宗主亦復有此失高宗特以靖康之閧為懼不欲伏闕卻不以言罪人他日贈東官祭東墓贍其家而官其後以生前布衣為身後法從于東亦無憾嘗曰朕即位聽用非人至今痛恨之贈官推恩未足稱朕悔過之意死者不可復生追痛無已聖心惻怛如此豫深為魏公惜之與虞章舜卿二表弟季明游兼勝亭有作野曠湖山遠林深松竹幽舊題看壁立前事逐萍浮荏苒荒三徑依稀度九秋故人應念我雅㑹莫遲留與士繇遊金山翌日分袂早别金山恰曉鐘離帆分破一江風瓜洲渡口波聲遠後夜相思明月中以上盡忠録句飛亷囚下酆都獄急使飛雪作水流潺潺東方出日還照耀坐令和氣生人寰大雪在太學作梅澗詩話歐陽徹徹字德明撫州崇仁人建炎初徒步走行在伏闕上書請誅汪黃等與陳東俱死于市紹興中贈祕閣修撰有飄然先生集秋試下第有感籬菊金英噴異香杜門岑寂獨持觴風掀脫葉橫斜舞雲襯平林淺淡黃塞管有情增哽咽野花無緒伴凄涼不禁景物撩秋眼剩與新篇付錦囊重遊寥陽洞有感尋真曾到寥陽殿小立廊腰花影轉飛瓊仙子下瑤臺綽約雲鬟眼波剪水沈煙斷一簾秋醉睡海棠紅玉軟武陵歸去探年華揚州夢覺江波遠重來風物恰依然愛日融融素煙卷洞門寂歷鎖長春異木槎丫插天半霞衣冉冉媚東風緑瑣窗前重識面酒酣春筍理琵琶曲終依約含幽怨人閒名利幾時休馬蹄不駐空留戀桃花流水古猶今回首碧雲人不見戲促朝宗酒約雨收雲海湧金盆簾卷香絲破篆紋雙陸無心酬白璧十千有約醉紅裙哦詩誤許聯師服載酒真當過子雲待遣秋娘呈妙舞春衫已把水沈熏臨溪弱柳柳弄嬌黃暖律催臨溪約略笑殘梅鴨頭春水回環緑龜甲屏山掩映開媚日依依籠霧閣搖風裊裊拂煙桅柔絲恨不同攀折獨立江臯首重回曉發吳城山風掃陽矦雪陳平雨催摩詰畫圖成氣吞浦漵重林盡秋著江湖去鳥明厚祿故人無一字長年三老伴餘生㑹須滿意開懷抱到眼廬山不世情以上飄然先生集曲端端字平甫一字師尹鎮戎軍人建炎初纍官威武大將軍涇州防禦使為張浚所忌誣以反下恭州獄糊其口熁之以火乾渴求飲豫以酒九竅流血死三朝北盟㑹編張浚既失全陜退保蜀中復欲用曲端王庶曰不可富平之戰宣撫與曲端有勝負之約今日宣撫以何面目見端吳玠亦懼端之嚴明乃書曲端謀反四字於手心浚雖有殺端之意而未有罪庶等曰曲端作詩題柱有指斥乘輿之意曰不向關中興事業卻來江上泛漁舟此其罪也浚乃送端萬州羈管復令恭州取勘康隨先在鳳翔遭端決背一百浚以康隨為提㸃刑獄公事端聞之曰吾其死也呼天者數聲端有馬名鐵象日馳四百里惜之過於子息連呼鐵象可惜者又數聲既死不旬日鐵象亦斃蜀中作破碎江山不足論何時重到渭南村一聲長嘯東風裏多少未歸人斷魂賓退録鶴林玉露曲端在陜西甚有威望張魏公宣撫擢用之金人萬戶羅索與薩里哈等冦邠州端擊敗之至白店原又大敗之薩里哈乘高望師懼而號哭金人因目之為啼哭郎君後以端恃功驕恣廢不用又懼其得士心竟殺之自端之死衆心稍離金人再戰于富平我師詐張端旗以懼敵羅索知端已死撫掌笑曰何紿我也于是盡鋭力攻我師敗績自是陜西非我有矣宋淳熙間高廟配享洪景盧舉此為魏公罪迄不得侑食昔孔明斬馬謖巳為失計魏公襲其事幾于自壞萬里長城至于詐張端旗大為拙謀徒足以召敵人之笑沮我師之氣耳端亦知書嘗作詩云破碎山河不足論幾時重到渭南村昔人詩欲挂衣冠神武門先尋水竹渭南村即此事也嶽飛飛字鵬舉相州湯陰人宣和閒應真定宣撫募纍立戰功南渡歷少保河南北諸路招討使進樞密副使封武昌郡開國公罷為萬壽觀使為秦檜所陷殞大理寺獄淳熙六年賜諡武穆嘉定四年追封鄂王淳祐六年改諡忠武有集題鄱陽龍居寺巍石山前寺林泉勝境幽紫金諸佛相白雪老僧頭潭水寒生月松風夜帶秋我來屬龍語為雨濟民憂池州翠微亭經年塵土滿征衣特特尋芳上翠微好水好山看不足馬蹄催趁月明歸以上嶽武穆王集題青泥市寺壁雄氣堂堂貫斗牛誓將真節報君讎斬除頑惡還車駕不問登壇萬戶侯賓退録紹興癸丑嶽武穆提兵平䖍吉羣盜道出新淦題詩青泥市蕭寺壁間淳熙間林令梓欲摹刻于石㑹罷去不果今寺廢壁亡矣其孫類家集惜未有告之者雩都華嚴院手持竹杖訪黃龍舊穴空遺虎子蹤雲鎖斷崖無覓處半山松竹撼秋風贑州府志題池州翠光亭愛此倚欄干誰同寓目閒輕陰弄晴日秀色隱空山島樹蕭騷外征帆杳靄間豫雖江上老心羡白雲關清河書畫舫毛國英國英衢州人投嶽侯鐵鎖沈沈截碧江風旗獵獵駐危檣禹門縱使高千尺放過蛟龍也不妨娛書堂詩話毛國英澤民之從子也以詩自鳴嘗經嶽侯駐兵之地江禁方嚴國英投詩云云侯曰詩人也委舟以渡之李易易字順之江都人建炎二年髙宗駐蹕維揚策進士為第一授簽書江陰軍判官紹興元年為太常博士轉工部員外郎為太常少卿遷中書舍人改直祕閣知揚州官至敷文閣待制提舉江州太平觀卒于秀州貴門卜築亂後亦擇居筮山山輒許居民百餘家喜甚手欲舞云久聞公名此幸殆天與感兹鄭重意時節共雞黍剡川非沃野地僻民更窶趁時務擷茗餘力工搗楮寡婦念遺秉汚池憐數罟我欲教耦耕盡力循南畝桃杏種連山深居可長處東鄰有節士酒酣乃發語公昔起布衣髙誼掩前古親擢類平津決見逢真主兩宫佇六飛萬乘思一舉交侵正倔强蜂起益㫄午浩然公獨歸偶出寧有補默塞復何言長歎汗如雨剡溪幽居勝絶剡溪邊巢枝度半年燕回銜落絮魚涌接飛泉丹鼎山頭氣茶爐竹外煙幽居已成趣佳致若為傳以上剡録竹西懷古淮南昔繁麗富庶天下稱管弦十萬戶夜夜聞喧騰不徒竹西寺歌吹相豪矜一朝烽火急廛市為溝塍風月無歡場睥睨皆射堋荒荒野月白照地如寒冰自從畫江守嵗嵗輸金繒蕭條閭井閒水旱又頻仍我來經故里日暮此一登隋唐倏已往遺跡幾廢興江山極蒼莽望之涕沾膺揚州府志俞處俊處俊字師郝新淦人登建炎龍飛乙科未及仕而卒傷春黏天芳草緑蒙茸久客傷心望不窮山色自隨人遠近鶯聲只在水西東搜春千林欲暗稻秧雨三月尚寒花信風九節老笻應不惜步隨流水看殘紅以上合璧事類前集句叫月子規喉舌冷宿花蝴蝶夢魂香獨醒雜志胡銓銓字邦衡廬陵人建炎二年進士甲科紹興五年以賢良方正薦除樞密院編修官抗疏詆和議纍謫吉陽軍孝宗朝歷權中書舍人兼國子祭酒權兵部侍郎以資政殿學士致仕卒諡忠簡有淡菴集鶴林玉露胡淡菴十年貶海外比歸飲於湘潭胡氏園題詩云君恩許歸此一醉傍有梨頰生微渦謂侍妓黎倩也後朱文公見之題絶句云十年浮海一身輕歸對梨渦郤有情世上無如人欲險幾人到此誤平生州編管人胡銓移吉瀛奎律髓紹興十八年新陽軍編管先是廣東經略使王鈇問知新州張棣曰胡銓何故未過海銓嘗賦詞云欲駕巾車歸去有豺狼當轍棣奏銓倡和毁謗而有是命棣選使臣游崇部封送小項洞過海銓徒步赴貶人皆憐之至雷州守臣王躍捕游崇私茗械治厚餉銓躍後亦得罪雷州和朱彧秀才詩時欲渡海何人著眼覻征驂賴有新詩作指南螺髻層層明晚照蜃樓隱隱倚晴嵐仲連蹈海徒虛語魯叟乘桴亦謾談爭似淡菴乘興往銀山千疊酒微酣淡菴集到瓊州和李參政落網從前一念斜崖州前定復何嗟萬山行盡逢黎母雙井渾疑似若邪行止非人十年夢廢興有命一浮家此行所得誠多矣更願從今泛北槎貶朱崖行臨高道中買愁村古未有對馬上口占北往長思聞喜縣南來怕入買愁村區區萬里天涯路野草荒煙正斷魂以上方輿勝覽題自畫瀟湘夜雨圖一片瀟湘落筆端騷人千古帶愁看不堪秋著楓林港雨濶煙深夜釣寒梅澗詩話題畫扇誰向生綃白團扇畫將羈客據征鞍南遷萬里知前定壁上崖州莫怕看陳郁話腴胡淡菴於福州僉㕔分扇得一扇畫古木閒一人騎驢向西南行及有新興之行方知為先兆也登南恩望海臺君恩寬逐客萬里聽歸來未上凌煙閣先登望海臺山為翠浪涌湖拓碧天開目斷飛雲處終身愧老萊豫章詩話時孝宗登極起為祕書少監將歸朝作句盈尺子魚來丙穴一瓶女酒敵新興夷堅志胡邦衡獲罪來福州黃思憲致子魚紅酒為餉胡報以詩以子對女丙對新為工新興酒閩人重之陳宗古宗古字述之侯官人建炎二年進士終朝奉郎遊大滌山洞天三十六竒邃此無儔笙鶴有時下神仙何處遊巖花自照水谷鳥不啼秋盡日松陰底閒聽寒澗流洞霄詩集鄧柞柞字成林沙縣人建炎二年進士纍官知隆興府江西安撫使有焦桐集題白蓮院古樹紛紛千嶂雨遠寺鳴鐘迷處所一水東流浮落花隔雲應有秦人住海風不斷長松路萬籟寒生蒼玉麈此去江南山更深桄榔葉暗猿啼苦南安縣志陳剛中剛中字彥柔閩清人祥道從子建炎二年進士紹興閒任太府丞應詔上封事胡銓貶韶州剛中作啓事賀之忤秦檜謫定遠縣卒陽關詞客舍休悲柳色新東西南北一般春若知四海皆兄弟何處相逢非故人北窗炙輠石材庿題柱疏爵新剛應論功舊石材能形文母夢還訝佞人來海市為誰出衡雲豈自開乞靈如見告逐客幾時回鶴林玉露寺丞南行時吉州江濱有石材庿隆祐太后避金兵泊舟廟下夢神告以兵至即發舟指章貢金兵追至造口不及而還寺丞題詩廟柱云云卒不如願悲夫飛來峯寒峯插天出玲瓏萬菡萏微風起松際怪石勢搖撼上有百尺松幽花綴紅糝野猿忽躍去滴下露千㸃回首冷泉亭天鏡光瀲瀲游姬修眉青嬌童兩髦髧平生山水癖如人嗜昌歜對此一壺酒玉色翻醉臉路逢老祝髮絳袍金光閃兹山信自佳恨為緇塵染置之且復醉天竺鼓紞紞咸淳臨安志阮閲閲字閎休舒城人宣和中知郴州建炎初知袁州有詩話總龜松菊集郴江百詠並序存六首郴古桂陽郡陳迹故事盡載圖史亦間見于名人才士歌詠如杜子美寄聶令入郴州韓退之郴江柳子厚登北樓沈佺期望仙山戴叔倫過郴州之類是也山川寺觀之勝城郭臺榭之壯未經品題者尚多亦可惜爾余官于郴三年常欲補其闕愧無大筆雅思可為然因暇日時強作一二小詩遂積至於百篇雖不敢比迹前輩使未嘗到湖湘者觀之亦可知郴在荆楚自是一佳郡也宣和甲辰二月中和日舒城阮閲序東樓危城雉堞對東山誰創高樓十二欄獨鶴不來松已老春風動處日三竿山陰堂修竹蒼蒼似剡川浮觴可繼永和年不知誰有羲之筆欲寫蘭亭第二篇碧虛亭笻竹枝彎屐齒搖登臨身覺在煙霄千峯險似三川峽一水深如八月潮湖亭城外高堂俯碧灣山如螺黛水如環有時鼓棹來尋勝直到斜陽未欲還蘇仙觀寂寂星壇長緑苔井邊橘老又重栽城頭依舊東樓在未見當時鶴再來東山藜杖芒鞋過水東紅裙寂寞酒尊空郡人見我應相笑不似山公與謝公以上郴州文志宣風道上馬蹄西去夕陽催濃淡寒山翠作堆北鴈無情怕秋熱帶將寒信過江來題春波亭數葉荷衣一短藜春波亭上倚斜暉無人㑹得詩中畫憑盡䦨干又獨歸以上袁州府志胡嶧嶧字仲達崑山人建炎初任安逺尉有如村稿遊慧聚寺政欲相攜紫翠閒不堪風雨徑催還何時更上月華閣細認仙山是假山玉峯詩纂黃大輿大輿字載萬南渡初蜀人號岷山耦耕嘗輯梅苑華亭山房象山客游厭城市僧房見巖壑偉石羅衆峯寒砂結層堮為谷既窈窕置嶺復綿邈溪源互相注花草紛已錯空聞先王夢徒觀楚臣作行雲在俯仰北渚應酬酢天機契如幻意匠起冥漠周流屬多豫寤寐欣所託有懷山中人從爾芳杜若成都文類王銍銍字性之汝陰人自稱汝陰老民南渡寓居剡中建炎初為樞密院編修官有雪溪集追和周昉琴阮美人圖龍眠李亮工家藏周昉畫美人琴阮圖兼有宫禁富貴氣象旁有竹馬小兒欲折檻前柳者亮工官長沙而黃魯直謫宜州過見之嘆愛彌日大書一詩於黃素上曰周昉富貴女衣飾新舊兼髻重髮根急薄妝無意添琴阮相與娛聽弦不觀手敷腴竹馬郎跨馬要折柳此畫後歸禁中胡馬驚塵流落何許而詩亦世不傳獨僕舊見之位置猶可想像也病中追和其詩當令善工試圖之耳丹青有神藝周郎獨能兼圖畫絶世人真態不可添卻憐如畫者相與落誰手想像猶可言雨重春籠柳雪後渡西溪雪後孤村一段煙晴光遠照玉山川酒旗隔步招閒客獨上西溪渡口船上方松閒清月佛前鐙菴在孤峯更上層犬吠一聲秋意靜敲門知有夜歸僧以上雪溪集王文孺臞菴全家髙隱白雲關事不縈懷夢亦閒欸乃交撐漁市散隔江城郭是人間山村家依溪口破殘村身伴渡頭零落雲更向空山拾黃葉姓名那有世人聞墨莊漫録雲門寺青山春又到白髮策烏藤已是他鄉客還同寄住僧瘦松黏凍雪流水帶寒冰更覺蒼崖路雲深不可登越咏周芑芑字秀實錢唐人邦彥弟邦式之子南渡初廬陵倅贈劉美中尚書劉郎校書天祿閣太白下觀光照灼心知漢祀厄中天夜半瞻星涕零落獨醒雜志宣和中太白見甚髙尚書劉公才邵時在中祕見而歎曰是兵象也國家其有外患乎因與僚友同觀憂形于色未幾金犯畿甸後周芑秀實來倅廬陵贈詩云云鄭昺昺字彥明南渡初人題閻立本十八學士圖閻公十八學士圖當時妙筆分錙銖惜哉名姓不題别但可以意推形模十二匹馬一匹驢五士無馬應直廬五鞍施狨乃禁從長孫房杜王魏徒一人醉起小史扶一人缺伸若挽弧一人觀鵝憑闌立一人運筆無乃虞樹下樂工鳴瑟竽八士環列按四隅笑談散漫若飲徹盤盂杯勺一物無坐中題筆清而癯似是率更閒論書其中一著道士服又一道士倚枯株三人傍樹各相語一人繫帶行徐徐後有一人豐而鬍獨吟芭蕉立踟蹰一時登瀛客若是貞觀治效真不誣書林我昔曽曳裾三局腕脫幾百儒雄文大筆亦何有餐錢但日糜公廚邦家治亂一無補正論出口遭非辜時危玊石一焚掃覽畫思古為嗟吁獨醒雜志豫嘗得登瀛圖本規模布置氣象曠雅每思創始者必非俗筆又有石本皆書名氏後有李丞相伯紀贊跋乃欽廟在東宫得閻立本此畫親為題識以賜詹事李詩二本絶不同嘗見鄭昺所賦長句云云考其所序列意鄭必為畫本賦之然長孫王魏元不在其中不知鄭詩何為反之耶按翰林盛事記開元中張燕公等十八人為集賢學士於東都含象亭圖寫其貌意二本必居其一而後人皆以為貞觀學士耳李宏宏字彥恢宣州人宣和初以左丞直郎署涇縣建炎中吕好問知宣州得士四人詹友端周紫芝王相如與宏也紹興初李光為守復檄署縣纍遷轉運使遊金泉觀昔時謝女升天處此日遺蹤尚宛然蟬蛻舊衣留石室龍飛勝地涌金泉碑書故事封蒼蘚殿寫真容鎖翠煙薄暮松巔聽鶴唳凌空髣佛是神仙四川總志許顗顗字彥周建炎中襄邑人有詩話夢中作閒花亂草春春有秋鴻社燕年年歸青天露下麥苗溼古道月寒人迹稀彥周詩話宣和巳亥僕在洪州宿城北鄭和叔家夜夢行大路中寒沙沒足其傍皆田苗丘隴一婦人皂衣素裳行田閒曰此中無沙易行僕從之不能登婦人援僕手登焉月明如晝彌望皆野田麥苗婦人求詩僕藉草坐有矮甎臺一上有紙筆僕題詩四句云云拍筆甎上有聲驚覺宛然記憶是嵗大病後亦無他故秋雨零雨不出動隔旬門前秋草長于人江湖浩渺欲無岸錦石最小猶生雲微陽片月何曾見只有莓苔昏筆硯田家黍穗未暇悲茅屋且為螢火飛宋藝圃集秦湛湛字處度少游子句大勝商山老同居一木奴詩說雋永秦處度為韓膺胄作枝巢詩建炎閒在㑹稽先得兩句以語伋未知成篇不蔡向建炎中承議郎提舉兩浙常平事題隱真宫福地流傳號隱真麻姑曾款蔡翁門臼舂雲子自堪飽井溢丹泉便可吞山露五峯疑指爪溪盤百疊想裙痕我來既躡靈蹤後知是仙家第幾孫赤城志聞人偲偲天台寧海尉淨因院建炎兵火獨存紀事湖海浮家二十年重來春色尚依然杏花籬落噴紅霧楊柳林塘護緑煙草暖邦人出游地鳩鳴刺史勸耕天覺場獨在三災外試問支郎第幾禪至元嘉禾志張瓊瓊官舒州守雨中自萬壽宫歸草草登臨未擬回煙昏雨溼賦歸哉山寒未放遷鶯出地勝先聞駕鶴來老去春光都是夢懶邊心事總如灰歸尋藥裹扶筋力準擬東風得屢陪安慶府志顔岐岐字夷仲復子建炎中纍官至門下侍郎句念昔從學日同升夫子堂萬姓統譜顔夷仲嘗從滎陽吕公學吕居仁為濟陰主簿時夷仲適在曹南贈居仁詩云云夫子蓋謂滎陽公也居仁罷官歸作詩留别夷仲云昔日同升夫子堂如今俱是鬢蒼浪蓋用其語也李方敬秋蝶粉蝶爾何知秋深尚戲飛憐渠迷節物猶若弄春暉露葉今非昔霜叢疇可依籬邊菊無幾薄命寄餘菲合璧事類别集陳石齊葵花俗名一丈紅恐是牡丹重換紫又疑芍藥再翻紅嬌饒不辨桑閒女蔽芾深迷苧下翁合璧事類别集徐月溪麗春花照眼裝新就扶頭酒半醒妖姿隨變化薄命易飄零合璧事類别集唐觀南郊仗回傳警千門寂南郊綵仗回但驚龍再見誰識日雙開德澤施雲雨恩光變燼灰閲兵貔虎振聽樂鳳凰來合璧事類外集陳貫道貫道字致一閩人題嚴陵釣臺足加帝腹似癡頑詎肻折腰求好官明主莫將臣子待故人只作友朋看庚溪詩話云自出新意程宿送葉善卷致仕歸吳衛尉新除蓋次公便拋簪紱向江東秋鱸正與蓴絲美夜鶴休驚蕙帳空滿腹詩書元未試㑹心林壑許誰同自憐華髮無歸處慚愧冥冥物外鴻吳郡志唐耜耜南渡初人題巫山神女廟楚澤隱巫山翠壁開鴻濛萬流束長峽怒浪日簸舂朝暉淡高唐嵒阿閟彤宫罘罳散煙霧榮光繞長虹恭聞雲華君少陰體沖融受道紫清闕飛化凌三空徜徉江海上千騎馳蒼龍羽節回天津央央弭層峯悽惻下土人昏墊無所容寶書授神禹百靈倏奔從蛟螭委鞭䇿山川奠西東九州免為魚遂成萬世功嗟余晚聞道蓬心蔽倥侗維舟垂崖邊再拜望遺蹤嶙峋山頭石雲衣尚溶溶縹眇玉瑛臺如在指顧中童律不可問至言誰擊蒙仰首天壇下松柏悲回風名勝志令狐慶譽慶譽南渡初人題雲安下嵒地遠塵寰絶㸃埃懸崖屈曲寄層臺山頭玉溜隨檐滴嵒下金容就石開寺影不妨流水過松香長逐好風來遍游未盡無窮景為報舟人且莫催名勝志宋詩紀事卷四十三
