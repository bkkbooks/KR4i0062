body:
  text: 宋詩紀事卷六十三錢塘厲鶚撰黃幹幹字直卿號勉齋閩縣人受業朱子之門以子妻之寧宗朝補將仕郎歷知漢陽軍主管武夷沖祐觀復知安慶府主管亳州明道宫致仕卒諡文肅有集答曾伯玉借長編白露下百草迅商薄秋林幽人起長歎感此節物深攬衣自徘徊撫劍還悲吟丈夫各有志莫作兒女心涉遠當疾趨畏影須就隂願言理輕車去上南山岑訪髙簽判故居逺樹分髙下平洲接有無短亭低密竹小艇隱寒蘆轉浪魚深入斜陽鴉亂呼自慚貴公子未老賦歸歟侍文公飲浮翠亭用劉叔通韻涼風振幽壑隂雲翳前山髙情厲清秋適意林莽間煙橫萬家井水淨雙溪灣徙倚暮忘歸人境相與間遊子獨何為千里方言還陪此杖屨遊忘彼道路艱心期更他日依巖結柴關過翠微古寺殘僧少孤村碧樹圍明朝山下路愁絶望煙歸以上勉齋集陳淳淳字安卿龍溪人受業朱子之門嘉定中以特奏恩授安溪簿有北溪字義題江郎廟三石參天作柱擎自從開闢便峥嶸何為末俗好竒怪盡道江郎魄化成四朝詩輔廣廣字漢卿號潛齋父達本河朔人南渡居秀州之崇德縣從吕成公遊後登朱子之門自祠官歸隱以著書為已任有六經注釋四書問答等藏於家題資福院平緑軒名區與利壠羊腸盡攀躋誰能為芳草四曠成幽棲春風一憑闌秀色無髙低山遙不作障水近何妨堤只恐金氣寒黃枯變碧萋坐令羣目驚有似七聖迷人心無天遊六鑿相攘擠但于平處觀衆有何端倪日月互賔送景物隨乖暌彼昏如執著惟君試金箆至元嘉禾志蔡元定元定字季通建陽人從朱子遊尤袤楊萬里薦於朝以疾辭韓托胄設偽學之禁為言者所詆謫道州卒後贈迪功郎賜諡文節學者尊之曰西山先生自勵詩數間茅屋環流水布被藜羮飽暖餘不在利中生計較肯于名上著功夫窗前野馬間來往天際浮雲自卷舒窮達始知皆有命不妨隨分老樵漁武夷山志蔡淵淵字伯靜號節齋元定長子仲弟未歸嵗晚有懷明月照席寒生我愁百端冉冉嵗云徂遊人不顧還相送荷花碧相望楓葉丹髙樓日千回散步東林隈攀條復攬秀日暮空徘徊金杯白玉臺猶能對寒梅寄書豈不早三月千里道敢怨歸軒遲但念堂中老春風萱草生更樹堂前庭詩家鼎臠蔡沈沈字仲默元定子少遊朱子之門從父謫道州護喪還隱居九峰卒諡文正逰西山柴荆相依倚緑篠自蒙密秋蘭澗中花山果路邊實沿岡引霜藤臨流坐寒石日暮隂崖開雲收逺山出踈籬尚存菊荒庭舊垂橘絲桐想虛堂簡策見靜室俯仰今幾時漫然已陳迹摩挲蒼苔痕屐齒不可識建寧府志贈琴士翁明逺膠漆本無意絲桐非有情因緣醉翁指發此無窮聲蕭蕭秋風引葉落渭水濵喧喧陽春歌花明錦江城離鸞月徊徊别鶴雲冥冥清冷灑毛髮震蕩驚雷霆曲度神莫測調髙妙難名時方多艱虞掩耳誰為聽無為恩怨兒女語敵場勇士軒昻行詩家鼎臠武夷山天柱峰才既非時用性本愛岑寂決策名山遊幽隱遂成癖春風百花紅秋月千嶂碧煙霞結綢繆猿鳥自疇昔乘間撫深曠噴薄鳴鐵笛笑挹天柱峰髙寒幾千尺大隱屏昔余隱屏東扁舟夾雙龍浩歌碧雲裏萬壑生清風羣仙幔亭宴玉女雙鬢蓬夕景落寒巖照耀金芙蓉昔余隱屏北飄然度巖側誰知神仙居自與塵世隔瑶草冬更青琪花雪爭白橫玉吹寒空萬里天一色以上武夷山志章才邵才邵字希古崇安人以父蔭補官嘗守臨賀辰陽晚嵗與朱子遊世稱為篤實君子過清逺峽嵓頭風急樹攲斜溪畔漁樵十數家老盡往來名利客年年秋水映蘆花錦繡萬花谷釣臺短棹夷猶七里灘人亡依舊水光寒漢家名節君知否盡在君家一釣竿釣臺集劉子寰子寰字圻父號篁㟳建陽人居麻沙早登朱文公之門有篁㟳集杜若欽州五月土如炊滿山杜若芳菲菲素英緑葉紛可喜徑烈不避炎歊威採之盈掬薦蔬食臧獲失笑庖人譏君不見屈平夕餐賦秋菊魂兮無南盍來歸又不見坡公服食得枲耳扣角自嘆從前非伊豫假祿二千石窮比二子猶庶幾餐花嚼蘂有真樂一飽何必謀甘肥尚餘升合漬生蜜從他薏苡生珠璣全芳備祖金鳯花天霜凋九陵梧桐日枯稿鳳德何其衰驚飛下幽草九苞空髣佛衆彩各自好黃中獨含章見晚更傾倒託根幔亭峰弱質深自保便翾金翅短淡泊乃幾道俗眼迷是非人間迹如掃合璧事類别集劉炎炎字潛夫號撝堂學於朱子王剛仲惠詩醉筆聊和君不見山澤之癯蒙野服如彼隰桑還自沃又不見侯門公子貴且驕飽豢膏粱猶未足人生貴賤不難分唯有聖賢無等倫朝為塗人暮為禹窮崖斷壑看回春君方妙齡􅎒不住萬里飛黃又騰去王良造父不得施耳側風聲未為遽我思古人愛其宇青蘋堂兮杜若廡芰荷可裳菊可餐肯介纎埃與塵土是中非聲亦非色安得與君一憑軾鵾鵬變化不可量要指天地為一息悠悠此道誰能將從知可玩不可望慎勿隨風學飄絮春光駘蕩成飛揚濓洛風雅楊與立與立字子權浦城人受業朱子之門嘗知遂昌縣因家蘭溪學者稱船山先生幽居柴門閴寂少人過盡日觀書口自哦餘地不妨栽竹木放教啼鳥往來多濓洛風雅林用中用中字擇之號東屏古田人從遊朱晦庵之門偶偕晦翁走潭州訪守張敬夫因有南嶽之遊著倡酬詩百四十餘首敬夫用晦翁定王臺韻賦詩同次韻寂寞番君後光華帝子來千年餘故國萬事只空臺日月東西見湖山表裏開從知爽鳩樂莫作雍門哀後洞山口晚賦西嶺更西路雲嵐最窈深水流千澗底樹合四時隂幽絶無僧住間來有客吟山行三十里鐘磬忽傳心贈上封諸老上封臺觀靜夕霽景偏清月下聞禪語風中有磬聲龍池留古迹鴈塔寄餘情借問房前樹東窗忽偃生以上南嶽倡酬集方士繇士繇字伯謨號逺菴莆田人豐之之子從朱子遊稱髙弟有集升山即事一徑西風裏間房客未歸砌苔侵野屐林葉上秋衣黃卷經心懶青綸入夢稀還書報妻子莫厭故山薇詩林萬選崇安分水道中溪流清淺路橫斜日暮牛羊自識家梅葉隂隂桃李盡春光已到白桐花詩家鼎臠武夷山丹崖石氣凝髙秋碧溪上引天河流金堂石室不可到玉棺莓苔生古愁仙人昔乘紫雲去白馬搖鞭在何處茫茫塵世那得知幔亭空記當年事君不見茂陵松柏已蕭疏乾魚猶祭同亭祠莆陽文獻章康康字季思浦城人居吳隱居不仕人稱曰聘君從學於朱晦菴淳祐中卒有集破山寺名山久相望今日為著屐到寺第一義古松足蟠屈一一龍蛇形風雷氣蕭瑟瓔珞檜兩株皆數百年物佛燈耿青熒像設暗金碧雲廊極徘徊老屋共崒兀僧房小盤薄西原訪泉石于其最幽絶似可便築室因而思古人多有愛山癖要之亦何為一賞事已畢上方不及登尚或俟他日無非會心處妙同箭鋒直山靈謂何如移文茲不必作詩留山中併可告來轍破山寺志程先先字傅之休寧人與子永竒俱從朱子學有東隱集和人感秋韻疾風拔枯楠天作破瓦色古殿無飛塵過者見瑟瑟秋風憶昔遊吳甸新知結項容松江楓落後貌得洞庭峰秋山新安文獻志程永竒永竒字次卿新安人嘗登朱子之門有格齋集題耕隱卷山下巢雲夢亦清隴頭耕雨緑蓑輕時人共指龐居士為借農書一到城新安文獻志劉淮淮字叔通號溪翁建陽人朱文公之髙弟朱子跋云叔通之詩不為雕刻纂組之工而平易從容不費力處乃有餘味韓家府嘉定初作寶蓮山下韓家府鬱鬱沈沈深幾許主人飛頭去和虜緑户雕牆鎖風雨九世卿家一朝覆太師之誅魏公辱後車不信有前車突兀眼前看此屋四朝聞見録韓托胄居太廟三茅之旁後山為閲古堂為閲古泉舊名青衣有青衣童見泉上故名為流觴曲水泉自青衣下注于池凡有十二折旁砌以瑪瑙泉流而下瀦于閲古堂渾涵數畝有桃坡十有二級夜宴則殿巖用紅燈數百出于桃坡之後以燭之其雲巖之最竒者曰雲岫托胄居之既久嵗纍月積剔竒抉勝窈窕渟深疑為洞天福地之居不類其為在天衢咫尺舊皆寧夀觀中地也韓敗有旨盡給還寧夀復為禁地建陽劉淮賦詩云云平逺臺海天漠漠水雲寬開到梨花正自寒卻擁重裘上平逺愁心千疊倚闌干詩家鼎臠劉仙倫仙倫一名擬字叔擬廬陵人有招山小集得蟹無酒水鄉秋晚得白蟹望斷碧雲無酒家此意凄涼何所似淵明醒眼對黃花西林路入廬陵西復西翠煙深處著招提山僧幾輩雪垂領水鳥數聲雲滿溪莫對青山談世事且循粉壁看留題禪房夜臥衣裳冷夢破鐘聲落月低旴江驛舍中有婦人書一憶字筆勢頗姿媚遊子明王相之皆題詩其後率豫同賦陽臺雨歇行雲杳天闊鴻稀春悄悄鸂鷘孤眠怨芳草夜夜相思何日了妾非無聲不敢啼妾非無淚不敢垂柔情欺損青黛眉夢魂暗逐胡蝶飛春風著人鎖窗緑緑窗書字寄心曲細看香翰婉且柔中有間愁三萬斛向隅棄筆惆悵時此情默默誰得知無緣相見空相憶不如當日休相識以騎驢鍾馗送秦先之髯翁矍鑠老據鞍曾入大內見阿瞞幞頭垂腳藍綬敝不知班簿為何官天寒嵗晚日云暮霜風吹驢耳卓竪老臧負笠衣裳單反袂掩目趾穿屨蓽門我恐難留君收卷送似秦將軍將軍文事有武備眉骨自是凌煙人汝當訶護謹厥職勿但縮頭徒桂壁將軍來嵗在殿巖豐汝牲醪作除夕贈嶽周伯昔年捶鼓事邊庭公相身為國重輕四海幾人思武穆百年今日見儀刑筆頭風月三千字齒頰冰霜十萬兵天亦知人有遺恨定應分付與中興題嶽陽樓八月書空鴈字聨嶽陽樓上俯晴川水聲軒帝鈞天樂山色玉皇香案煙大舶駕風來島外孤雲銜日落吟邊東南無此登臨地遣我飄飄意欲仙以上招山小集嶽珂桯史云余兄周伯喜誦之劉植植字成道永嘉人號漁屋安上曾孫過彭澤井邑已非舊柴桑里尚存春風三畝宅落日數家村隔樹聞雞犬編民半子孫頽然孤隴上寒菊繞松根東甌詩集劉翰翰字武子長沙人吳雲壑居父之客有小山集翠屏曲小亭簾幕垂隂隂梅香入枕春生屏西窗月落翠被冷鳥聲殘夢東風醒三年不喚清溪渡夢裏瀼西春水路江頭女兒雙翠眉能唱劉郎芳草句種梅凄涼池館欲棲鴉彩筆無心賦落霞惆悵後庭風味薄自鉏明月種梅花石頭城離離芳草滿吳宫緑到臺城舊苑東一夜空江煙水冷石頭明月鴈聲中鴻門宴江東遙遙八千騎大戰小戰七十二劉郎曉鞭天馬來蹴踏長安開帝里子嬰已降隆準公君王置酒鴻門東張良已去玉斗碎三月火照咸陽紅繡衣歸來日將夜可惜雄心天不借當時已失范增謀尚引長戈到垓下刁斗乍急營壘驚夜深旗尾秋風橫玉帳佳人不成夢月明四面聞歌聲拔劒相看淚如雨我作楚歌君楚舞明朝寶馬一聲嘶江北江東皆漢土吳門行吳歌婉婉清如水西風曉自閶門起雙橈艇子采菱來翠荇緑蘋香十里芙蓉影落已知秋濺溼羅衣眉黛愁回身蕩槳入門去明月家家秋水流立秋日乳鴉啼散玉屏空一枕新涼一扇風睡起秋風無覓處滿街梧葉月明中客去送客歸來月滿簷梅花微笑隔疏簾酒醒今夜銀屏冷沈水熏爐旋旋添以上小山集劉應時應時字良佐慈溪人有頤菴集旅舍草市欲黃昏吾行恰到門僕夫思憩息燈火喜溫存一夜催花雨數家臨水村征途雖得句默坐與誰論早行登輿睡思尚昏昏斗柄銜山月在門雞犬未鳴潮半落草蟲聲在豆花村曹直夫水石短軸奔流出峽響如雷筆力浮天亦壯哉吳蜀興亡千古恨白鷗時逐浪花來雪夜迎春寒色愈嚴凝小閣爐殘冷欲冰寂寞黃昏愁吊影雪窗怕上短檠燈以上頤菴集李翔髙翔髙號羽軒句春愁自是無重數又被東風揭繡簾貴耳集李羽軒善為絶句盧蒲江甚愛之有句云云老子興不淺也劉學箕學箕字習之屏山先生子翬之孫七者翁玶之子有方是間居士小稿劉叔通云居士詩摩香山之壘詞拍稼軒之肩不如歸去禽言不如歸去愁緑怨紅春欲暮汝勸行人歸行人勸汝住鳴聲不住良苦辛啼得血流無用處不如歸去吾今歸千聲萬聲爾何為環洲江氏園欲覽環洲勝維舟步石磯踏青隨野色穿翠任春霏地迥知山逺村灣覺水圍東風輕薄甚桃李亂荆扉以上方是間居士小稿武衍衍字朝宗汴人有適安藏拙餘稿方惠嵒跋云東坡見齊安朱廣文小詩云官間廳事冷胡蝶上階飛謂其可入畫圖適安此卷絶句摹寫景物吟詠情致多有可筆於丹青者惜不遇坡之品題宫詞補遺牡丹春籞正穠華有旨今年不賞花翦落金槃三百朵內批分賜近臣家開元廣寒詞桂華珠殿水精樓柘袖籠香乙夜遊飛下銀橋人不覺月明三十六宫秋聞角呈宗諭方蕙巖曉角吹愁客夢寒一聲聲落畫屏間吳兒可殺無風味老卻梅花只當間栁枝詞靈和殿裏最風流三月飛花滿御樓換得玉人眉樣巧一春渾不下簾鉤秋夕清泛弄月吹簫過石湖冷香搖蕩碧芙蕖貪尋舊日鷗邊宿露溼船頭數軸書春日湖上飛鷁鳴鑣鼓吹喧繁華應勝渡江前吟梅處士今還在肯住孤山爾許年長橋月夕捲來滄海黃銀浪飛出層雲白玉團千古垂虹竒絶處獨憑三百赤闌干老宫人侍輦看花上苑春太皇宣索鳳笙頻如今猶記當時曲對譜間教小內人寶髻無光玉貌昏銜悲空感舊承恩君王愛問先朝事時許車兒到殿門湖亭席上贈商素一曲春風已擅場淺顰低囀更傳觴令人憶殺香山老舊日玲瓏也姓商貴遊鈿車轣轆碾芳塵步障香移一片春花下玉盤行禁臠御前宣勸到湖濵清明湖上榆火初傳禁漏殘滿城和氣在湖山接天楊栁風煙裏照水桃花圖畫間舊路人穿新路去長橋船出斷橋還吾皇應喜民胥樂嵗許西門入夜關飲湖亭寒食梨花月新晴楊栁風愁消山色裏興極酒杯中緑髮日夜變青春今古同忍教行樂地容易夕陽紅以上適安藏拙餘稿戴敏敏字敏才號東皋子台州黃巖人石屏之父有東皋集小園小園無事日徘徊頻報家僮送酒來惜樹不磨修月斧愛花須築避風臺引些渠水添池滿移箇柴門傍竹開多謝有情雙白鷺暫時飛去又飛回初夏遊張園乳鴨池塘水淺深熟梅天氣半晴隂東園載酒西園醉摘盡枇杷一樹金以上東皋集句人行躑躅紅邊路日落秭規啼處山劉後村詩話桑世昌世昌字澤卿淮海人居天台陸放翁諸甥著蘭亭博議回文類集莫菴詩集句翠添鄰塹竹紅照屋山花葉水心題跋君詩尤工其即事句蓋著色畫也王大受大受字仲可鄱陽人有拙齋詩集四朝聞見録水心先生葉適題王大受拙齋詩稿云紹熙四年光宗疾不能朝重華諫者傾朝謗者盈市憲聖后兄子琚最賢大受因琚奏孝宗陛下惟一子不審處利害恣國人騰口取名於家計大不便且羣臣以父子禮故諍不敢址陛下何不出手詔云皇帝體不安朕所深知卿且勿言須秋涼朕自擇日與皇帝相見也孝宗喜其䇿會宴駕不果用攻愧樓公憤其前與族兄鏞有間且毁其文力言之于史相期以必竄大受史遂命去大受袍笏編置邵武琚之子鋼以稿上于朝而削大受姓名遊鹿苑寺鷲峰逰屐少我獨住多時僧護翻經石猿攀礙月枝地寒春到晚山逺夢歸遲尚被浮名誤吾心信自癡詩林萬選水樂洞歷騁寒空六六天更來洗耳聽春泉迅湍激石浮清磬樹溜行沙寫素弦路口林亭三四面洞中日月幾千年何人獨得開收律譜入宫商與世傳咸淳臨安志句君不見牛竒章與李衛公二人平生不相容門前冠蓋互咿軋惟有愛石心則同題李季章石林録四朝聞見徐照照字道暉一字靈暉號山民永嘉人有芳蘭軒集四靈之一葉水心志徐山民墓云山民有詩數百琢思尤竒皆橫絶欻起冰懸雪跨使讀者變踔憀栗肯首吟歎不能自己然無異語皆人所知也人不能道爾文獻通考陳氏云徐照徐璣翁卷趙師秀四人號永嘉四靈皆晚唐體也惟師秀嘗登科改官亦不顯汝回云唐風不競派沿江西永嘉四靈趙東閣乃始以開元元和作者自期治擇淬鍊字字玉響雜之姚賈中人不能辨也梅澗詩話永嘉徐照題子陵釣臺詩云梅福神仙者新知是婦翁子陵為梅公壻傳記不載詩必有所本石門瀑布一派從天下曾經李白看千年流不盡六月地常寒灑木跳微沫衝崖作怒湍人言深碧處常有老龍盤江心寺兩寺今為一僧多外國人流來天際水􅎒斷世間塵鴉宿腥林徑龍歸損塔輪卻疑成片石曾坐謝公身楊栁嫩葉因風不自持淺黃微緑映清池玉人未識分離苦折向堂前學畫眉贈徐璣一舸寒江上梅花共别離不來相送處愁有獨歸時去夢千峯逺為官三嵗期思君何可見新集見君詩題桃花夫人廟一樹桃花發桃花即是君空祠臨野水何處覓行雲事迹樵人説爐香過客焚雨添碑上蘚難讀古詩文以上芳蘭軒集徐璣璣字文淵一字致中號靈淵永嘉人官長泰令有泉山集二薇亭集四靈之二初夏遊謝公巖又取紗衣換天時起細風清隂花落後長日鳥啼中水國乘舟樂巖扉有路通州民多到此猶自憶髯公吾廬蓬户閉還開深居稱不才移荷憐故土買石帶新苔藥信仙方服衣從古樣裁本無官可棄何用賦歸來投楊誠齋名髙身又貴自住小村深清得門如水貧惟帶有金養生非藥餌常語是規針四海為儒者相逢問信音以上二薇亭集翁卷卷字續古一字靈舒永嘉人有西巖集葦碧軒集四靈之三寄逺秋氣日凄清秋衣殊未成在家猶不樂行路若為情幾處看山色暮天聞雁聲思君有幽夢夜夜出江城石門菴山到極深處石門為洞名嵐蒸空壁壞雪映小齋清果落羣猿拾林昏一虎行山僧何所得髙坐若無情冬日登富覽亭未委海潮水往來何不間輕煙分近郭積雪蓋遙山漁舸汀鴻外僧廊島樹間晚寒難獨立吟竟小詩還夢回一枕莊生夢回來日未衙自煎沙井水更煮嶽僧茶宿雨消花氣驚雷長荻芽故山滄海角遙念在春華以上葦碧軒集野望一天秋色冷晴灣無數峯巒逺近間自上山來看野水郤於水底見青山詩家鼎臠句梅花分地落井氣隔簾生曉對千年流不盡六月地常寒瀑布一階春草碧幾片落花輕春日分石同僧坐看松見鶴來逰寺移花連舊土買石帶新苔吾廬貴耳集鶚按四靈詩派中趙紫芝師秀號靈秀入宗室戴復古復古字式之號石屏嘗登陸放翁之門以詩鳴江湖間有石屏集姚雪篷跋式之詩天然不費斧鑿處大似髙三十五輩晚唐諸子當讓一面方萬里跋石屏詩清健輕快自成一家峯巒重瞿佑歸田詩話戴式之嘗見夕照映山疊得句云夕陽山外山自以為竒欲以塵世夢中夢對之而不愜意後行村中春雨方霽行潦縱橫得春水渡傍渡之句以對上下始相稱然須實歷此境方見其竒妙湘中遇翁靈舒天台山與雁山鄰只隔中間一片雲一片雲邊不相識三千里外卻逢君白紵歌雪為緯玉為經一織三滌手織成一片冰清如夷齊可以為衣陟彼西山于以采薇思家用后山韻湖海三年客妻孥四壁居飢寒應不免疾病又何如日夜思歸切平生作計踈愁來仍酒醒不忍讀家書淮村兵後小桃無主自開花煙草茫茫帶晚鴉幾處敗垣圍故井向來一一是人家題釣臺萬事無心一釣竿三公不換此江山平生誤識劉文叔惹起虛名滿世間娛書堂詩話嚴子陵釣臺題詠尚矣天台戴式之一絶亦新意可喜新安寒食不擬今年到歙州要知行止豈人謀一百五日客懷惡三十六峯春雨愁老矣此身猶道路凄其歸夢繞松楸花瓢仙子無由見千里江山負逺逰逰九鎖天柱峯頭一振衣雲開巖路雨晴時登臨欲訪神仙事紀實都無漢晉碑拍手數聲龍井躍篝燈一覽洞天竒林間安得棲身處欲煉金丹餌玉芝毗陵天慶觀畫龍呈王使君姑蘇道士天酒星醉筆寫出雙龍形墨迹縱橫奪造化蜿蜒滿壁令人驚一龍翻身出雲表口吞八極滄溟小手弄寶珠珠欲飛握手掌中拳五爪一龍排山山為開頭角與石爭崔嵬波濤怒起接雲氣不向九霄行雨來萬物焦枯天作旱兩龍壁隱寧非懶真龍不用只畫圖猛拍欄干寄三歎烏鹽角行鳳簫鼉鼓龍鬚笛夜宴華堂醉春色豔歌妙舞蕩人心但有歡娛别無益何如村落捲桐吹能使時人知稼穡村南村北聲相續青郊雨後耕黃犢一聲催得大麥黃一聲喚得新秧緑人言此角只兒戲孰識古人吹角意田家作勞多怨咨故遣聲音召和氣吹此角起東作吹此角田家樂此角上與鄒子之律同宫商合鍾吕形甚朴聲甚古一吹寒谷生禾黍袁州化成巖李衛公謫居之地一巖端坐挹千峯三兩亭臺勝槩中江水驟生連夜雨松聲吹下半天風因思世故吾頭白獨步林皋夕照紅欲吐草茅憂國志誰能喚起贊皇公括蒼石門瀑布少泊石門觀瀑布明知是水卻疑非亂拋玉雪從天下散作雲煙到地飛夜聽蕭蕭洗塵夢風吹細細溼人衣謝公蠟屐經行處聞有留題在翠微以上石屏集句詩談天下事愁到酒樽前秋懷鶯啼花雨歇燕立栁風微晚春詩骨梅花瘦歸心江水流歲暮客愁茅店雨詩思栁橋春春日黃花一杯酒白髮幾重陽九日以上貴耳集馮取洽取洽字熙之號雙溪翁延平人送劉篁㟳來似孤雲出岫間去如髙月耿難攀若為化作修修竹長伴先生篁㟳山詩人玉屑自題交遊風月樓平揖雙峯俯霽虹近窺喬木欲相雄一溪流水一溪月八面疏櫺八面風取用自然無盡藏髙寒如在太虛空落成恰值三秋半為我吹開白兔宫詩人玉屑一溪流水一聯詩林皆以為秀傑之句劉正之正之字子正臨江人送别趙紫芝夫君落落天馬姿聲名早與賀白馳錦囊千首不療飢非詩窮人窮乃竒憶昔聞君未識面獨傳句法誇清健朅來白下一相逢傾蓋論心曾幾見劃然起柁春江流我亦江頭尋去舟人生相聚會有别江水江花無盡愁萬事不如歸去好石田茅屋生春草如君自是玉堂仙輕車緩轡長安道春日遲遲栁依依攀柔條兮送君歸翰墨大全上官良史良史字偉長號閬風山人尋嚴丹丘東潭居二首愛子東溪幽抱被來同宿山家無膏火然薪代明燭間窗何所有古書三五束鳥棲月上時還見簷前竹山齋櫺牖疏水月連春霧今夕定何夕清心欣所遇如從天姥遊似得招提趣幽夢出雲時匆匆山鳥曙河梁值雨有懷嚴羽葦岸逢殘雨河橋對暮流倚鞭一悵望客思暫夷猶楓葉滿江色夕陽終古愁遙憐君亦苦不共故園秋以上詩家鼎臠晚泊渺渺復迢迢楓林帶野橋沙寒初上月浦暗已回潮霜葦多先折江花或後凋今宵何處雁相伴宿蘭橈後村千家詩蘇泂泂字召叟山隂人丞相頌四世孫有冷然齋集除夕呈主人臘節梅花外椒盤淚眼邊山川非故國笳鼓咽新年機事鷗偏覺家書雁不傳細箋今夕恨萬一故人憐錢塘渡百年鬢髮春風晚十二闌干落照微多事錢塘江上水送人離别送人歸以上詩林萬選金陵朱雀街頭觀闕紅角門東畔是春風人家一樣垂楊栁種入宫牆自不同詩家鼎臠嚴羽羽字丹丘一字儀卿邵武人自號滄浪逋客有滄浪吟滄浪詩話論詩如論禪漢魏晉與盛唐之詩則第一義也大歷以還之詩則小乘禪也晚唐之詩則聲聞辟支果也盛唐諸人惟在興趣羚羊挂角無迹可求故其妙處透徹玲瓏不可湊泊如空中之音相中之色水中之月鏡中之象言有盡而意無窮近代諸公乃作竒特解會遂以文字為詩以才學為詩以議論為詩夫豈不工終非古人之詩也蓋於一唱三歎之音有所歉焉國初之詩尚沿襲唐人王黃州學白樂天楊文公劉中山學李商隱盛文肅學韋蘇州歐陽公學韓退之古詩梅聖俞學唐人平淡處至東坡山谷始自出己意以為詩唐人之風變矣山谷用工尤為深刻其後法席盛行海內稱為江西宗派近世趙紫芝翁靈舒輩獨喜賈島姚合之詩稍梢復就清苦之氣江湖詩人多效其體一時自謂之唐宗不知止入聲聞辟支之果豈盛唐諸公大乘正法眼者哉答友人湘江南去少人行瘴雨蠻煙白草生誰念梁園舊詞客桄榔樹下獨聞鶯閨怨昨夜中秋月含愁顧影頻空留可憐影不見可憐人懊儂歌君子如白日願得垂末光妾心如螢火安得久照郎船在下江口逆風不得上結束作男兒與郎牽百丈朝亦出門啼暮亦出門啼蛛網挂風裏搖思無定時喜友人相訪擬韋蘇州朝朝竹林院閉户讀殘書几閣晨風入荒郊寒露餘故人步屧至清坐喜踟蹰輟卷還留興潄泉同飯蔬霏雪録嚴滄浪之于詩刻意古作卓然不為流俗所染五言如閨怨等云云廬陵客館雨霽登樓言懷寄友終日坐兀兀邈然無少欣登樓一周覽始見萬山羣微雨洗殘暑青天卷浮雲襟懷兩廓落朗若見夫君見君君何在顧影還獨笑吏非金門遊隱異滄浪調江明秋月白山空夜猿嘯徒事百卷文未返一竿釣留滯豈勝愁非君誰與謀水寒終赴海鴈逺暫賔秋舉世不可語猶當傲巢由贈君三尺劒永駕五湖舟山居即事稍欣入林深已覺煩慮屏霜果垂秋山歸禽度風嶺紛紛葉易積漠漠雲欲盛澗户寂無人松蘿窅然暝唯聞山鳥啼月上柴門靜終嵗寡持醪延歡聊煮茗羣書北窗下帙亂誰能整還山吟留别城南諸公日暮望寒山悵然歸思發如何山中客屢看城頭月城頭月明女蘿秋石磴潺湲寫碧流巖猿久别應惆悵澗鳥相呼亦共愁城南故人與我好令我忘卻歸山道昨夜西風夢到家忽驚千嶂芝花老朝來舟子促辭君回首空江語尚聞别後莫嗟難見面相思只望嶺頭雲懷南昌舊遊昨在南昌府清逰不可窮杯行江色裏棹進月明中樓笛吹晴雪菱歌漾晚風坐來懷舊迹萬里亦飄蓬訪益上人蘭若獨尋青蓮宇行過白沙灘一徑入松雪數峯生暮寒山僧喜客至林閣供人看吟罷拂衣去鐘聲雲外殘客中别劉表叔季髙悠悠逺别半生悲白日相逢又語離海內風塵驚不定天邊消息到何時洞庭旅鴈春歸盡瓜步寒潮夜落遲惆悵孤舟從此去江湖未敢定前期和上官偉長蕪城晚眺平蕪古堞暮蕭條歸思憑髙黯未消京口寒煙鴉外滅歷陽秋色雁邊遙清江水落長疑雨暗浦風多欲上潮惆悵此時頻極目江南江北路迢迢以上滄浪吟嚴仁仁字次山號樵溪邵武人有欸乃集塞下曲漠漠孤城落照間黃榆白葦滿關山千枝羌笛連雲起知是邊方牧馬還詩林萬選平遠樓湘中病客思歸日城上髙樓獨倚時半樹夕陽鴉集早一江秋色雁來遲詩家鼎臠嚴參參字少魯自號三休居士與丹丘次山齊名世號三嚴梅衣染龍涎與麝臍裁雲剪月作冰肌小瓶雪水無多子只篸橫斜一兩枝後村千家詩看雪天逺正難窮樓髙不堪倚醉夢入江南楊花數千里詩家鼎臠嚴肅肅字伯復號鳳山落花片片落花飛隨風去不歸如何臨欲别不得傍君衣詩家鼎臠羅之紀之紀字國張髙安人嘉定中孝感尉句吾道非耶真可恥此君豈是折腰人西江詩話之紀尉孝感攝邑雲夢上官不為禮之紀因雪壓竹賦詩云云遂棄官歸蕭彥育彥育號梅坡楊誠齋有句跋其詩卷云西昌有客學南昌蓋西昌人也西湖雜咏花心亭上坐滿眼是湖光只為便幽趣能來倚夕陽水邊春寺靜栁下小舟藏不待清明近鶯花已自忙梁家渡逺水環沙翠作灣紅塵飛不入青山涼風一枕秋宵夢夢繞千巖萬壑間清明日早出太平門江頭楊栁暗藏鴉江上鵝兒浴淺沙早起一風如此惡路旁落盡刺桐花以上詩人玉屑吳錡錡字信可永福人鄱陽張世南與定交僅百日而卒世南悲悼之録其一詩遊永福方廣巖曽訪神仙巖洞來人言偉觀似天台藤蘿足下猿猱嘯鐘鼓聲邊日月開燈續佛光凝紫翠雲將蜃氣作樓臺最憐貫石神龍尾猶帶天東雨露回遊宦紀聞胡時可稼軒命賦滕王閣滕王髙閣臨江渚帝子不來春已暮鶯啼紅樹栁搖風猶似當年舊歌舞隨隱漫録辛稼軒觴客滕王閣詩人胡時可通謁閣人辭焉呵詈愈甚辛使前曰既稱詩人先賦滕王閣有佳句則預坐即題首句衆大笑再書云云乃相與宴而厚賙之彭止止字應期崇安人自號漫者有刻鵠集題辛稼軒齋中棊子聲乾案接塵午窗詩夢暖於春清風不動階前竹誰道今朝有故人建寧府志彭止詩筆甚髙嘗謁辛棄疾值其畫寢題一絶于齋而去稼軒覺遣人追之延留纍月左次魏跋誠齋論髙廟配享書稿後次伯子韻鑾坡蓬監兩封書道院東西各付渠乾道聖人無固必是非付與直哉魚鶴林玉露史文卿文卿字景望鄞人種梅呼童耕雲種瑤樹斗挂青冥下風露隔林野鶴不知寒為我飛來復飛去素與梅花自有緣又移幾本種庭前鏡中一半間風月不屬王郎載雪船秋詞寫就秋詞雁影稀背燈無語獨眠遲畫闌點滴芭蕉雨一夜將愁向阿誰枯梅樛枝半著古苔痕萬斛寒香一點春總為古今吟不盡十分清瘦似詩人以上前賢小集拾遺黃洪絶句龍舟大半沒西湖此是先皇節儉圖三十六年安靜裏棹歌一曲在康衢四朝聞見録張巨濟字宏圖福清人嘉泰間上書寧宗以慈懿櫕陵今在湖曲若陛下遊幸則未免張樂此豈履霜露之義寧皇感悟其言旋轉一秩由此湖山遂無清蹕之聲御鷁至沈于波臣非特儉德也黃洪詩云云武林舊事茂陵在御略無遊幸之事西湖離宫别館不復增修黃洪詩云云余良弼良弼順昌人教子詩白髮無憑吾老矣青春不再汝知乎年將弱冠非童子學不成名豈丈夫幸有明窗并淨几何勞鑿壁與編蒲功成欲自殊頭角記取韓公訓阿符萬姓統譜良弼子大雅與遊敬仲同時從朱子遊深得求放心之旨兩捧鄉書良弼有教子詩云云宋詩紀事卷六十三
