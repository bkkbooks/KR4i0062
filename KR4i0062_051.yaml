body:
  text: 宋詩紀事巻五十一錢塘厲鶚撰張孝祥孝祥字安國歴陽烏江人紹興二十四年廷試第一孝宗朝累遷中書舍人直學士院領建康留守尋以荆南湖北路安撫使請祠進顯謨閣直學士致仕卒有于湖集題定山寺時年十六嵗蹇驢夜入定山寺古屋貯月松風清正聞挂塔一鈴語不見撞鐘千指迎題夏氏莊平湖漠漠雨霏霏壓水人家燕子飛欲向湖東問春色杏花無數㸃春衣以上于湖殘槀賀郊祀慶成漢統千齡接虞衡七政齊徳馨天自蠁容備古猶稽輿衞鉤陳北衣冠觀闕西雨先清道蹕寒避禮神圭方士朝仙仗宫垣挾御隄廟芝楹疊璧帝樂字連奎虚次尤祗慄懐親極慘悽珠旒依玉色蘭炬映璇題兩相初扶翼崇壇六降隮髙靈森欲墮諸福應如攜燎夜壇三燭淩霜甲萬犀宗燔申寳酌祕檢䕶金泥奉引星辰爛旋歸錦繡迷端門臨五鳯歩輦駐雙霓日照雲裳委風含綵筤低和聲翔四表嘉澤浸羣黎盛事真寥廓㣲生荷奬提侍祠叨執爵著籍繆通閨異寵何其報孤忠誓不暌裁詩獨愁晚猶得並鳧鷖椰子酒榼矮胡生南方託家碧山崖採擇供貢篚扶持上天街媿此愿慤姿欲售久未諧道傍麴先生風味固自佳逢渠即傾盖輸冩能開懐刮削出光采規繩去攲窊金玉豈足貴膠漆真吾儕客來有佳招二士往必偕婆娑止坐隅供饋煩金釵矮胡雖木强醇徳真無涯虚心實其腹居然外形骸微物幸見用棄置理則乖毛穎有封國陶匏薦禋柴大藥起世痾炮燔及根荄願子自洗濯勿受塵埃薶暇日肯相從醉經坐髙齋舟行大雨戲作呈張立之及同行諸公我船千斛初甚遲上灘下灘風薄之百夫撐挽纔得過水淺舟大行無期同來賔客笑鈍滯一葉自買如鳧鷖瞥波急槳亂藻荇瞬息不見飇車馳忽然昨夜雷雨作墨雲頹山風巻壑龍門春漲魚鼈亂牛渚宵明鬼神惡篷翻䌫斷泊不得客只一身無處著長年呌客强驚起一浪先掀半船水嚢衣漂盡到巾屨終夜奔茫沙石裏我時酣寢殊不覺但怪颼颼風到耳起來呼酒自勞苦水滿涼生差可喜向來笑者今卻悲人生淹迷那能知明朝轉舵我船快喚客同船莫嫌隘以上合璧事類外集贈滕使君千騎東方白玉鑣十眉環坐紫檀槽安南都䕶來鼇禁建武將軍握豹韜瘴雨蠻煙驚鼓角朔雲邊雪滿旌旄夕烽不到甘泉殿尺一徴還近赭袍贈甘法曹北岳仙人汗漫遊斯文曾到海邊州誰憐詩禮甘公子牢落青衫到白頭以上合璧事類後集可賦軒在西湖寳林院光明獵獵上烏巾不那西湖爛漫春借我繩牀對脩竹為君一洗輭紅塵咸淳臨安志東坡繫船著西日曵杖到東坡暗井蛙成部荒祠鳥作窠老仙騎鶴去稚子飯牛歌興廢何須問斯文自不磨方輿勝覽玉淵亭靈源直上與天通借路來從五老峯試向闌干敲拄杖為君喚起玉淵龍方輿勝覽亭在廬山棲賢寺門外澗中白石不以數計如臥羊故曰玉淵張安國書二字仍作詩萬杉寺老榦參天一萬株廬山佳處著浮圖秖今買斷山中景破費神龍百斛珠桯史王阮偕張紫㣲遊廬山萬杉寺紫㣲大書二章阮憮然曰先生氣吞虹霓今少卑之何也别去兩旬而得湖陰之訃紫㣲于此絶筆題蔡濟所摹御府米帖生前官職但執㦸身後一字萬金直當時雷電下收拾世間不復有遺逸整整十巻字尤溼光采激射海為立平生我亦有書癖對此戃怳心若失口呿汗下屢太息十日把玩不得食作牋天公拜稽首乞我此老生時一雙手為君痛飲百斛酒墨池如江筆如帚一掃萬字不停肘後村詩話浯溪中興頌在永州祁陽縣繡綳兒啼思塞酥重牀燎香驅羣胡黃帬錦韈無尋處一夜驚眠揺帳柱朔方天子神為謀三郎歸來長慶樓樓前拜舞作竒祟中興之功不贖罪日光玉潔十丈碑蛟龍盤拏與天齊北望神京淚雙落只今何人老文學浯溪集元風洞在桂林七星山陰風襲人凛如冰雪山入烏蠻連越嶲天開斗野對珠宫應憐桂海長炎熱乞與清涼萬竅風桂林府志張堅堅鎮江人紹興二十四年進士鶴廟松聞采茯苓者傷其根遂枯其半誰種飛仙百丈梯風摧雨折昔人非憑誰寄語楊員外留取孫枝待令威茅山志虞允文允文字彬甫隆州仁壽人紹興二十四年進士累除中書舍人直學士院被命犒師立功采石乾道中歴左丞相同中書門下平章事兼樞密使封雍國公以少保宣撫四川卒贈太傅諡忠肅有集鶚按咸淳臨安志紹興二十四年張孝祥榜無二十三年榜宋史誤也今訂正過瀘江亭映水林巒影顛倒濟川舟檝勢峥嶸東行萬里欲乗興更待一篙春水生全蜀藝文志錢良臣良臣字友魏華亭人紹興二十四年進士孝宗朝拜參知政事罷知鎮江顧野王讀書堆伊昔邊烽備不虞太平移作梵王居而今江表全無事借我三椽更讀書松江府志梁安世安世字次張括蒼人紹興二十四年進士淳熙中桂林轉運使有逺堂集石芥擷根山石貯瓶罌桂後緘題見者頳風味莫嫌無醞藉杯柈也解作聰明願言噴嚏傳心事搔首躊蹰散宿酲最是徂徠明道地至今姦膽亦魂驚蘆浦筆記秦碑一紙并古詩呈王梅溪太守公生博物好竒古勸我搜求秦望碑我來稽陰且三載夢寐絶頂雲俱馳事非近代問父老鼻祖已來猶不知或云其山多虎狼囦湫罅井蟠蛟螭魍魎木客忌人到陰霾賊霧迷羊歧樵夫懸磴懼失勢一落萬丈誰能支吾意此如鍾乳穴民昔畏擾相譸欺曩時山東之罘石磅砰入海無津涯固知秦人游戲餘非民之利寧一時暇日登臨雲門寺僧曰若耶溪上竒山曰何山勢最峻丹鶴夜宿天孫枝南望天台西錢唐下視峯岫如羣兒李斯篆書真刻本昔人避亂此見之裹糧遂偕墨工往扳崖貫木如鹿麋舉觴酹酒山之神千古呵䕶煩神司銷鑠僅存三尺許龜趺就鑿山石為剜苔剔蘚随手剥面節背角摧霜皮老龍脱甲蛇解蜕鋪紙拭墨漫披離收藏入袖恍若失遐想往昔還嗟咨我聞太古功徳盛鋪冩不盡乾坤儀詩書紙上自不朽金石還有磨滅期秦皇不慕仁義業直謂堯舜猶瑕疵焚書欲盖前代美寧聞伏生傳有頤後生不廢丞相書歌頌雖在皆浮辭惜哉此紙無一畫欲記存亡人應嗤他年好事繼追訪姑願首尾觀吾詩雲門集雙溪春霖漲合兩溪平雪浪中浮桑柘青南市喚船撐未到一番簔笠滿津亭金華府志句蕃馬歩銜青苜蓿羌兒臥唱白銅鞮吹劒録何異異字同叔號月湖崇仁人紹興二十四年進士累擢監察御史遷右正言寧宗朝歴刑部侍郎權工部尚書以寳謨閣學士致仕一犁春雨圖負郭先疇二頃餘飽看雨後著耕夫輭紅塵裏家山夢卻就君家閲畫圖詩家鼎臠題李國博東園東園吟思玉蟾清園客開門古意生冰硯雲燈深洞宇春花秋草舊宫城人藏密樹尋聲見鷺下寒池照影驚三十分司泉石主馬蹄塵外得聞名章少機建小閣用陳伯强韻樓居草草假三間便覺星辰手可攀最喜坐中先得月不妨睡處也看山林疎啼鳥秋弹曲天濶飛鴻曉捲班對鏡清吟無限好典衣舊債幾時還以上瀛奎律髓句天近風轉清地髙日難晚賔退録何月湖尚書少時登髙峯壇有句云云林黃中侍郎見之即知其異日必貴且壽范端臣端臣字元卿蘭溪人浚從子紹興二十四年進士累官中書舍人右史有文集題小三洞石磴短策將我影照盡山前溪夤縁入風磴歴覽窮攀躋不須翦梧桐自倚青冥梯金華府志范成大琉璃河又名劉李河在涿州北三十里極清泚茂林環之尤多鴛鴦千百為羣烟林蔥蒨帶回塘橋眼驚人失睡鄉健起褰帷揩病眼琉璃河上看鴛鴦此河大中祥符間路振乗軺録亦謂琉璃河惟嘉祐中宋敏求入番録乃謂之六里河灰洞在涿北燕南之間兩旁皆髙岡無風而路極狹塵土坌積咫尺不辨人物塞北風沙漲帽簷路經灰洞十分添據鞍莫問塵多少馬耳冥濛不見光會同館燕山客館也授館之明日守吏㣲言有議留使人者萬里孤臣致命秋此身何止一漚浮提攜漢節同生死休問羝羊解乳不遼人館本朝使已謂之會同館挽王提刑彦光喻蜀三年戍還呉萬里船雲歸雙節後雪白短檠前百世春秋傳一墟陽羨田浮生如此了何必更淩煙日者悲離索公乎又杳冥門人辨韓集子舍得韋經此去念築室空來聞過庭路遥人不見千古泣松銘中呉紀聞王葆字彦光崑山人擢宣和甲辰第紹興中除監察御史出知漢州移浙東提刑歸鄉卒其學長于春秋著集傳十五巻備論兩巻姪彦嘉登第彦光監裁甚精今參政周公初登第愛其博洽納之為壻尋即榮遇參政范公挽詩云丁酉重九藥市呈坐客莫向登臨怨落暉自縁羇宦阻歸期年來厭把三邊酒此去休哦萬里詩烏帽不辭敲短髮黃花終是欠東籬若無合坐揮毫健誰嗣西風楚客悲以上石湖詩集澄懐録范石湖云淳熙巳亥重九與客自閶門汎舟徑橫塘宿霧一白垂垂欲雨至綵雲橋氛翳豁然晴日滿空風景閒美無不與人意會四郊刈熟露積如繚垣田家婦子著新衣畧有節物挂帆遡越來溪潦收淵澄如行玻瓈地上菱花雖痩尚可采擷檥櫂石湖扣柴荆坐千巖觀下菊叢中大金錢一種已爛漫穠香正午薰入酒杯不待轟飲已有醉意其傍丹桂二畝皆盛開多欒枝芳氣尤不可耐攜壺度石梁登姑蘇後臺躋攀勇往謝去巾輿笻杖石稜草滑皆若飛歩山頂正平有坳堂蘚石可列坐相傳為呉故宫閒臺别館所在其前湖光接松陵獨見孤塔之尖少北墨㸃一螺為崑山其後西山競秀縈青叢碧與洞庭林屋相賔大約目力踰百里具登髙臨逺之勝始余使金是日過燕山館嘗賦水調首句云萬里漢家使後每自和桂林云萬里漢都䕶成都云萬里橋邊客明年徘徊藥市中頗歎倦遊不復再賦但有詩云云今年幸甚獲歸故園偕鄰曲二三子醻酢佳節于鄉山之上乃復用舊韻首句云萬里呉船泊歸訪菊籬秋致爽軒在永康軍夕陽塵外漲郊墟六六峯頭夢覺餘竹色喚人來下馬亂蝉深處有圖書方輿勝覽馬大同大同字會叔嚴州人紹興二十四年進士歴官戸部侍郎提刑少卿嚴陵馬大同以職事循行過九疑謁舜祠下而祠宇圮甚顧瞻慨歎乃留錢百千屬邑尉鄒安道為之繕葺因賦小詩聊序一時之勝云淳熙癸卯冬至前一日帝徳于今祀萬年如何遺像託疎椽憑誰為假丹青手付與梅仙十萬錢九疑山志甄龍友龍友字雲卿永嘉人遷樂清紹興二十四年進士官至國子監簿觀洞庭風定澄空氣渾然恍疑太極未分前秖因有浪知為水若遇無風即是天舊説君山張帝樂新聞老木識飛仙而今大洞黃庭客又看題詩紀嵗年東甌詩集徐夢莘夢莘字商老臨江人紹興二十四年進士紹熙中為荆湖北路安撫司參議官著三朝北盟會編除直祕閣江西鄉人同仕廣右者十有二李蹊成叔郭有憑充誠潘脩文叔李石韞玉徐夢莘商老王璪李文張坦明仲蔡詵子羽陳公璟師宋魏沐董父王思詠詠之孟浩養正淳熙重光赤奮若仲秋中澣講鄉會于湘南樓過彈子嵓吾儕生江南逺近且鄰鄉一官皆為貧餬口走四方遇合良獨難動如參與商誰知自有時朋盍聚炎荒外臺參計畫幕府佐紀綱出宰得壯縣司教涖郡庠曹掾勝三語簿領真仇香不止似人喜頓覺吾輩張合坐尊序齒避席敬行觴嵓洞縱登覽杖屨倍徜徉棊矢以相娯嘯歌情意長舉酒起祝規愛我藥石良古人尚植立君子道其常平生學忠孝餘力從文章臨節不可奪當官有何强窮乃見節義老當志彌剛鴻鵠在寥廓騏驥終騰驤願言各勉旃富貴無相忘桂勝楊萬里萬里字廷秀吉水人紹興二十四年進士光宗朝歴祕書監出為江東轉運副使再召皆辭寧宗朝以寳謨閣學士致仕卒諡文節有誠齋集周益公題跋誠齋大篇短章七歩而成一字不改皆掃千軍倒三峽穿天心透月脇之語至于狀物姿態冩人情意則鋪叙纎悉曲盡其妙筆端有口句中有眼困學紀聞誠齋讀貞觀政要云拔士新豐逆旅中懐賢鴨緑水波東酒傾一斗鳶肩客醋設三杯羊鼻公羊鼻公謂魏鄭公見龍城録觀太平寺畫水長句太平古寺劫灰餘夕陽惟照一塔孤得得來看還不樂竹莖荒處破殿虚偶逢老僧聽僧話道是壁間留古畫徐生絶筆今百年祖師相傳妙天下壁如雪色一丈許徐生畫水纔盈堵橫看側看只麽是分明是畫不是水中有清濟一線波橫貫萬里濁浪之黃河雷奔電巻儘渠猛獨清元自不隨他波痕盡處忽掀怒攪動一河秋水暮分明是水不是畫老眼向來元自誤佛廬化作金柁樓銀山雪堆風打頭是身飄然在中流奪得太一蓮葉舟僧言此畫難再覓官歸江西卻相憶并州剪刀剪不得鵝溪匹絹官莫惜貌取秋濤懸坐側費蓘梁溪漫志吾州太平寺郡人徐友畫清濟貫河一筆紆遶長數十丈不斷卻立而觀濤瀾洶湧目為之眩仰首近之凛然若飛流之濺于靣也楊誠齋為太守為賦長句游豐湖三處西湖一色秋錢塘潁水更羅浮東坡元是西湖長不到羅浮便得休梁溪漫志杭潁皆有西湖東坡連鎮二州故表謝云入參兩禁每玷北扉之榮出典二邦輙為西湖之長晚謫惠州州有豐湖亦名西湖淳熙中楊祕監使廣東過之賦詩云云寄陸放翁君居東浙我江西鏡裏新添幾縷絲花落六回疎信息月明千里兩相思不應李杜翻鯨海更羨夔龍集鳯池道是樊川輕薄殺猶將萬户比千詩鶴林玉露放翁晚年為韓平原作南園記除從官楊誠齋寄詩云云盖切磋之也然南園記唯勉以忠獻之事業實無諛辭題牧牛亭秦太師墓函闗只有一穰侯瀛館寧無再帝丘天極八重心未死台星三㸃坼方休只看壁後新亭策恐作移中屬國羞今日牛羊上丘壟不知丞相更瞋不自注秦暮年起大獄必殺張徳逺胡邦衡等五十餘人不知諸公殺盡將欲何為奏垂上而卒故有新亭之句然初節似蘇子卿而晚謬桯史金陵牧牛亭秦氏之邱隴在焉楊誠齋嘗題詩壁間云云檜墓前隊碑宸翰在焉有其額而無其辭臥一石草間曰當時將以求文莫之肯為檜在金連蘭縱之逃歸不知何以似子卿也明發南屏新晴在在野花香過雨迢迢沙路長兩度立朝今結局一生行客老還鄉猶嫌數騎傳書札賸喜千峯入肺腸到得前頭上船處莫將白髮照滄浪以上誠齋集鶴林玉露孝宗朝誠齋為祕書監論髙宗配享出守髙安其去國時詩云云可謂無幾㣲見于顔面矣過楚州淮陰侯廟鴻溝秖道萬夫雄雲夢何銷武士功九死不分天下鼎一生還負室前鐘古來犬斃愁無蓋此後禽空悔作弓兵火荒餘非舊廟三間破屋兩株松桯史音節悲壯倫擬抑揚徧壁間殆無繼者惠廸廸字楙吉宜興人紹興二十四年進士官大理司直改國子博士婆餅焦夢破一聲婆餅焦呉音未穏帶春嬌不禁風力遥飛去卻引餘音過别條前賢小集拾遺句小屋牽蘿補髙軒偃蓋過孫覿惠公墓誌云楙吉少時治一室讀書其中予過賦小詩楙吉和荅云云予讀之驚歎王十朋毛虞卿十朋字龜齡樂清人紹興二十七年進士第一孝宗朝累遷起居舍人侍御史改吏部侍郎厯四郡守以龍圖閣學士致仕卒諡忠文有梅溪集劉珙序云公平居無所嗜好顧喜為詩渾厚質直懇惻條暢如其為人會稽秦頌徳碑丞相李斯篆世傳在秦望山莫知所在教授莫君好竒嗜古搜訪尤力有言碑在何山者莫以語某何山見于圖經在秦望東南疑其真秦望也某欣然欲往職有所拘以告會稽梁尉慨然而行登山果見之碑石僅存字磨滅已盡墨片紙而還作古風長韻具記始末因次其韻且記吾三人好事之癖亦以示後人也姬嬴遺蹟存者稀世傳石鼓稽山碑石鼓揄揚得韓子文與二雅争驅馳秦碑誇大頌功徳埋沒草莽無人知或言山頂石猶在上有虎豹龍蛇螭神藏鬼䕶荆棘蔽崖懸磴絶登無岐廣文好竒探禹穴梅仙好事尋僧支我賛其行要親覩勿受世俗流傳欺望秦秦望兩嶄絶何山壁立東南涯豐碑屹植最髙處不知磨滅從何時剔苔掃墨了無有糢糊片紙亦足竒濃雲霮䨴黯將雨古木槎枒蟠老枝歸來走筆出險語訶叱政斯同小兒詩成得得寫寄我辭嚴意偉法退之我聞秦人滅六國酷若犬磔臨海麋先王法為秦所負負秦況有秦有司五經灰飛儒濺血堯舜周孔何能為上蔡獵師妙小篆奴視俗體徒肥皮東封泰山南入越大書深刻光陸離沙邱風腥人事變鬼飢族赤誰嗟咨漢興萬事一掃去惟有篆刻餘刑儀磨厓欲作不朽計其如歴數不及期蚩尤五兵闕漆器人物美惡能相疵我雖過秦愛遺畫南山入望頻支頤不須嶧陽訪棗刻不用史遷觀雄辭虚堂黙坐對此紙閉眼暗想君勿嗤要知秦碑沒字本卻類周雅無辭詩悼張安國舍人天上張公子少年觀國光髙名一枝桂遺愛六州棠出世纔成佛修文遽作郎長沙屈賈誼宣室竟凄涼悼亡燕寢焚香老病身細君相對坐如賔而今一榻維摩室唯與無言法喜親偕老相期未及期回頭人事已成非逢春尚擬風光轉過眼忽驚花片飛東屯少陵别業古東屯一飯遺忠畎畝存我輩月叨官九斗須知粒粒是君恩方輿勝覽東屯有青苗陂杜詩云東屯稻田一百頃北有澗水通青苗晴浴狎鷗分處處雨隨神女下朝朝又云東屯復瀼西一種住青溪東屯之田可得百許頃稻米為蜀第一郡給諸官俸廪以髙下為差帥漕月得九斗故王詩云云初至泉州示七邑宰九重天子愛民深令尹宜懐惻隠心今日黃堂一杯酒使君端為庶民斟十日同知宗提舶游九日山延福寺十日同登九日山山中好處畧躋攀桑田改變松猶在車馬往來僧自閑昨日風應吹紫帽今朝菊已帶衰顔登臨稍愜南來意好逐飛飛倦鳥還和韻題秦隠君系故居山中髙韻欲逃名不謂名隨隠處成鑿石一泓詩數首也曾攻破五言城夜聽雙瀑同劉方叔毛虞卿聨句夜聽雙瀑喧遥聞疑雨來澗壑生清風襟宇捐纎埃龜齡飛鳴撼半空暗想飄瓊瑰前觀阻步屧側耳成徘徊虞卿蕭然山館間此興何悠哉子晉不復見月白空簫臺方叔以上梅溪集王孝子詩臣子大節孝與忠父母仇讐天下同賢哉會稽王孝子感慨有古烈士風松楸一夕盜破冢親獲䑕輩聞之公有司守法貸其命孝子銜恨無終窮誰謂書生膽如許貌若尫羸中甚武手斬㐫人提髑髏請死伸冤詣公府君不見齊襄内行世所羞春秋賢之縁復讐又不見子胥鞭屍報父怨太史為之作佳傳君今枕戈志已伸更須移孝為忠臣他年當作傅介子誓斬樓蘭雪國耻梅磵詩話王公衮吉老會稽山陰人紹興甲戌登進士第仕至左司郎中盜劫其母墓成獄盜不死吉老手殺之詣州自言兄宣子請納所居官以贖其罪時梅溪王公十朋為簽幕賦詩以美之呉已正已正溫州人句舉頭不忍看王十回面猶欣見李三二老堂詩話紹興二十七年御筵進士四百二十六人溫州王十朋為之首其鄉人呉已正綴末特奏狀元之後則福州李三英例賜出身附名正奏之後已正有詩云云何徳獻徳獻官饒州提㸃送王龜齡自饒州遷夔州饒人遮道挽留公易轎由間道而去斷橋􅎒鐙亦堪憐始信林間别有天微見兵機第一義朱轓暫席廣文氊梅溪文集附趙十朋十朋台之黃巖人紹興間隠士絶句四枚豚犬教知書二頃良田儘有餘魯酒三杯棊一局客來渾不問親疎見王梅溪集後梅溪和之云薄有田園種斗升兩兒傳授讀書燈客來一局三杯酒王十朋如趙十朋姜大吕大吕字渭叟王梅溪之友懐王龜齡左原消息杳無聞令我愁懐似亂雲多病廢詩兼廢酒青春孤我亦孤君要同學問文章樂無奈東西南北分況是一簷殘雨後落花飛絮兩紛紛王梅溪集附劉鎮鎮字方叔紹興間人登戊辰科與王梅溪十朋游有待評集梅溪為序今不傳書王龜齡述恨詩後山北山南春雨足漠漠柔桑秀如沃儂家荆婦幾時歸西疇獨自驅黃犢王詩有剰栽桑柘教妻蠶之句溪集附梅唐立夫以日者命狀寄王龜齡試把流年子細看休將蠖屈比鵬摶渠家大有回天力不易區區作好官王梅溪集附孫皜皜字子尚開封人紹興間家于會稽與王十朋友善往浙西别王龜齡中原回首尚胡塵世事徒驚日月新羇旅不堪頻作别壯懐雖在已甘貧南來求友傳三益西去論心有幾人别後夢魂何處是秖應來往慎江濵王梅溪文集附王秬秬字嘉叟安中孫寓居泉南紹興間官至刑部侍郎題王龜齡詹事祠堂當時孤論偶相同終始知心每媿公纔見安車延綺季遽嗟石室祀文翁百年公議分明在一餉紛華究竟空白髮舊交衰甚矣尚能留面對髙風自注始予與龜齡别嘗謂吾輩會合不可常但令常留面目異時可復相見龜齡再三擊節後一見必誦此言貴耳集句栁色知春淺鐘聲覺寺深避虎連村静分魚一市腥後村詩話聞人符符嘉興人紹興二十七年進士餘杭尉題清習閣清曉捲書坐開簾揖逺峯膩雲留宿潤膏雨沐春容世味生來薄詩愁晚更濃溪山看未足還聽暮樓鐘咸淳臨安志劉清之清之字子澄臨江人紹興二十七年進士累官知衡州洞霄宫髙山鎖斷紅塵路石柱干霄藏洞府老蛟據窟不可窺千古流泉替渠舞真墟容我輙躋板心曠方知白日閑飛仙一去忽已逺坐對松梢雲往還洞霄詩集洞庭湖天孫嵗晚會湘靈倒㵼銀河合洞庭上下天光唯一白中間山色不多青荆潭萬里收塵滓宇宙連宵失晦明莫道人間少仙境詩思酒魄一時醒岳陽紀勝遊洪陽洞朝來拔腳塵埃底共訪人間小有天喚醒幾年朱墨夢胸中邱壑故依然李南金南金字晉卿自號三谿冰雪翁樂平人紹興二十七年進士光化軍教授江頭吟兒時盛氣髙于山不信壯士有飢寒如今一杯零落酒風雨蝕盡征袍單側立崑奴面鐵色楚客不言未吹笛闗山有月無人聲自是江頭渚花發渚花春少未得妍凝立青山圍水天杜鵑故態不識事盡情呌入青楓煙壯士未握邊頭槊旄頭如月幾時落如今世界不愛賢看取清風白雲角嗚呼一歌兮歌已怨壺中無酒可續嚥鶴林玉露云詞旨清婉可愛茶聲砌蟲唧唧萬蝉催忽有千車捆載來聽得松風并澗水急呼縹色緑瓷杯登第後畫師以冠裳冩真戲題落魄江湖十二年布衫濶袖裹風煙如今各樣新裝束典卻清狂賣卻顛鶴林玉露云一時戲語亦自有味喻良能良能義烏人紹興二十七年進士補廣徳尉累遷工部郎官出知處州奉祠歸卒有香山集秋曉野歩幽居邇郊原出戸目已瞭閑攜一枝竹散步及秋曉寒煙引輕素澹澹縈木杪矯首矚層穹轉盼失飛鳥野潦浄荒陂驚飇泛枯篠世態徒營營此心殊了了佳處誰與論聊用付清醥三月二十四日再朝永祐陵扁舟投曉出重城春浪初肥緑滿汀竹裏幾聲泥滑滑河邊十里草青青人家桃葉驚飛燕水面楊花入翠萍漸近昭陵佳氣集五雲松柏喜重經以上義烏縣志謝諤諤字昌國臨江軍新喻人紹興二十七年進士孝宗朝累官監察御史光宗朝除御史中丞權工部尚書請祠歸卒初居縣南竹坡名其燕坐曰艮齋人稱艮齋先生清常寺佛廬塵不到客枕夢頻驚淅淅山風響纎纎隙月明煙雲春漸暖鐘磬曉逾清蹤跡奔馳裏飄浮媿此生鼇溪數板小橋橫晚晴兩行古木弄春榮不知多少夜來雨水到岸頭渾欲平玉山觀㣲明燈火夜堂幽聽徹絲桐萬慮休骨冷魂清眠不得竹風蕭瑟滿庭秋以上撫州府志沈清臣清臣字正卿鹽官人紹興二十七年進士上書貶封州放還終祕閣修撰有晦巖集遊道場山松篁十里緑成谿短短籃輿入翠㣲回首青山已陳迹隴頭猶見白雲飛湖州府志京鏜鏜字仲逺豫章人紹興二十七年進士寧宗朝拜左丞相卒贈太保諡莊定有松坡集曹操疑冢疑冢多留七十餘謀身自謂永無虞不知三馬同槽夢曾為兒孫逺慮無中州題詠集呉儆儆字益恭初名偁避秀邸諱改名紹興二十七年第進士歴朝散郎廣南西路安撫使主管台州崇道觀卒諡文肅有竹洲集汪叔耕見訪不數日别去惡語為贈兼簡子用子美二友負釁得老窮埽軌事幽屏跫然羅雀門有客頎而整悲歡十年别尊酒清夜永妙句時驚人盈軸肎傾廩三日語未休霜寒夢歸省臨流分别袂波光照孤影重念吾故人雪屋青燈冷天晴風日佳何日過鼪徑石鼎然豆萁冰葅煮湯餅寓郡城客舍熱不可寐與程彦舉坐語逹旦淡月㣲雲對倚樓無聲河漢自西流髙城忽起梅花弄散作晴空萬里秋以上竹洲集梁克家克家字叔子晉江人紹興三十年進士第一累遷中書舍人孝宗朝拜右丞相封儀國公卒贈少師諡文靖知福州時嘗修三山志賦九月梅花老菊枯殘九月霜誰将先煖入東堂不因造物于人厚肯放南枝特地香九鼎燮調端有待百花羞澀敢言芳看來冰玉輝相應好取龍吟播樂章梅磵詩話梁鄭公克家未第時為潮州揭陽宰館客寓縣治東齋齋前有梅一株忽于九月中盛開嶺外梅著花固早于江浙間必至冬方有之邑人殊以為異邑士多賦詩往往謟令君梁公亦賦一篇云云明年廷對魁天下孝宗朝拜相次陳休應烹茗廓然亭見送韻已行更為玉泉留好景煩公傑句收紫帽峯前雙鷺下幾多清興滿滄洲南安縣志沈瀛瀛字子壽湖州人號竹齋紹興三十年進士葉水心云子壽少入太學仕宦四十餘年絀于王官再入郡三佐帥幕其生平業嗜文字若性命在身非外物也石人在徳清縣南戴巷邑人呼為石人頭檢㸃行程嵗嵗同石人頭畔且從容向來奉口溪邊月此夜乾元寺裏鐘湖州府志王質質字景文號雪山鄆州人寓居興國軍紹興三十年進士孝宗朝為樞密院編修官出判荆南府奉祠山居有雪山集紹陶集何處難忘酒何處難忘酒英雄太屈蟠時違聊置畚運至即登壇梁甫吟聲苦干將寳氣寒此時無一盞拍碎玉闌干貴耳集東流道中山髙樹多日出遲食時霧露且雰霏馬蹏已踏兩郵舍人家漸開雙竹扉冬青帀地野蜂亂蕎麥滿園山雀飛明朝大江載吾去萬里天風吹客衣瀛奎律髓居句曲山辭通明林屋兮峨嵋岱宗羅浮兮繚之幅員既長兮無極杳煙壑兮雲陂谷髙雲深兮矧昭陽穹廬之翻覆萬春千秋兮句曲東麓兮南岡桂椒蕭艾兮同香湛汧溪兮永碧岌茵山兮長蒼紹陶録蓋經經字徳常華亭人紹興三十年進士官户部侍郎游大滌洞天暇日尋幽入洞霄攀蘿捫石自忘勞地環九鎖仙都閟山倚一峯天柱髙夜静仙人吹鳯笛月明帝子下雲旄佩環寂寂中庭曉時有胎禽唳九臯洞霄詩集王信信字誠之處州麗水人紹興三十年進士孝宗朝歴官中書舍人給事中出知紹興府有是齋集詠揚州后土祠瓊花愛竒造物翦瓊瑰為鎮靈祠特地栽事紀揚州千古勝名傳天下萬花魁何人折卻依然在是處移將不肯開謾説八仙模樣似八仙那得有香來處州府志髙文虎文虎字炳如餘姚人紹興三十年進士寧宗朝歴中書舍人翰林學士集髙亭山亭十月晏溫朝倚檻一聲婆餅焦舌澀力㣲寒氣早不成清亮卻成嬌入剡詠桂花溶溶漠漠秋光澹耿耿寥寥夜色清不是靈根涵爽氣如何醞得此香成以上剡録林外外字豈塵晉江人紹興三十年進士官興化令有孏窠類稾題西湖酒家壁藥爐丹竈舊生涯白雲深處是吾家江城戀酒不歸去老卻碧桃無限花齊東野語林外詞翰瀟爽詼譎不羈飲酒無算在上庠暇日獨遊西湖幽寂處得小旗亭飲焉外美風姿角巾羽氅飄飄然神仙中人也豫市虎皮錢篋數枚藏腰間毎出其一入酒家保傾倒使視其數酬酒直即藏去酒且盡復出一篋傾倒如初逮暮所飲幾斗餘不醉而篋中錢若循環無窮者肆人皆驚異之都下甚傳其酒家肆有神仙至云曰璐按庚溪詩話亦載此詩以為必神仙語不知為外詩也陶宗儀又以為龍川藍喬作只數字不同西溪叢話則以為終南仵磐監青州酒税題酒樓所作一詩互異如此向豐之豐之向后裔句人情甚似呉江冷世路真如蜀道難湖海新聞豐之才調極髙貧窘則甚有句云云誠齋楊少監竒之胡澄和葉樞相芍藥鶗鴂一聲春已歸蜨蜂無計戀花時筆頭挽得春光住卻是先生芍藥詩四朝詩鍾炤之炤之字彦昭樂平人句霖作商巖雨薰來舜殿風夷堅志鍾炤之長于詞賦紹興巳夘春夜讀書窗下聞有哦句于外云云至秋試以膏澤為豐年詩鍾押豐字韻用此兩句入第五聮考官稱歎竟置髙第謝處厚紀事誰把杭州曲子謳荷花十里桂三秋那知卉木無情物牽動長江萬里愁劉一清錢塘遺事孫何帥錢唐栁耆卿作望海潮詞贈之有三秋桂子十里荷花之句此詞流播金主亮聞之欣然起投鞭渡江之志謝處厚詩云云予謂此詞雖牽動長江之愁然湖山之清麗使士大夫流連于歌舞嬉游之樂遂忘中原是則深可恨耳林宋偉宋偉字力叟號橘園題忠毅姚公廟赤心許國自平時見敵捐軀更不疑權忌臯庸皆遁走同時死難只青獅青獅乃姚馬名毎親飼之若通其語言時取斗酒投大盆中與馬同飲曰吾與汝同力報國竟與馬同死農父犂田出寳刀銅花浸血冷侵毛神鋒凛凜衝星斗未許豐城劒氣髙耕者得姚所用大刀重六十斤嵗嵗烝嘗九月期西風笳鼓萬人悲山邊走馬神旗閃遥望君侯復下來軍民毎當重九侯生日集祠下祭酹往往見飛騎來遶山謂太尉來降兩日經行舊戰場卻來祠下謁堂堂偷生諸將今何在萬古英靈獨耿光梅磵詩話紹興辛已之冬金主亮傾國入㓂如林之族充塞淮甸尉子橋之戰大將王權先遁統領姚興獨以所部四百騎當金六十萬自辰至午凡十戰斃數百人全相謂曰使更數人如此吾曹何可當權不遣一卒援部將戴臯亦玩視不救興竟沒于陣朝廷憫其忠厚加恤典諡以忠毅立廟淮甸迨今血食橘園林宋偉力叟題四絶于廟婁乾徳潺湲閣在袁州仰山廟右廡下一𣲖冷冷遶檻清塵襟洗滌自涼生夜深好夢纔驚破疑是半天風雨聲方輿勝覽鄒杞杞廬山人游洞霄宫天柱古名山形勢友列嶽神人巢其巔咳唾半天落白晝見雲旗清夜聞笙鶴花源或流虹仙禽猶擣藥長歌不可見清風灑寥廓洞霄詩集㓂元徳登岳陽樓城頭雲氣壓層樓城下江聲送客舟天岳一峯青卓玉洞庭千頃逺涵秋繁華今古饒中土形勢東南有此州我欲浮家凌浩渺不妨吟釣伴沙鷗岳陽樓詩集劉度度紹興中祕書省校書郎挽郭彦鄒孝友追前輩雍容具典刑人榮老萊服天隕少㣲星玉潤聮三傑金籝擅一經平生墊巾操不媿伯恭銘石洞遺芳集陳良祐良祐紹興中樞密院編修官挽郭丈彦鄒誰起相如疾空悲武子亡平生有髙志屬意在諸郎夢斷駒過隙風髙雁折行莫陪千乗送妙選媿東牀石洞遺芳集左璵璵字次琰黃巖人緯子紹興中特科題馬世功豁野堂歡言赴幽期作意理烟艇曵纜松篁陰未覺心地迥捨舟登爽塏㣲步水雲浄扶輿登斯堂遐眺方一騁開軒納野色秋思浩千頃心隨片雲逺目送孤鴻影坐久襟宇寛萬事詎容省永願陪清游棲身白鷗境黃巖英氣馮楫楫字濟川紹興中知邛州龍門逺禅師法嗣自詠公事餘閑喜坐禅少曾將脇到牀眠雖然現出宰官相長老之名四海傳五燈㑹元陸升之升之山陰人皇后閣春帖子内仗朝初退朝曦滿翠屏硯池渾不凍端為冩蘭亭桑世昌蘭亭考憲聖慈烈呉太后居中宫時嘗臨蘭亭山陰陸升之代劉珙春帖子云云刻石呉琚家王嵎嵎字季夷北海人紹淳間名士寓居呉興陸務觀與之厚善有北海集登更好堂同景思少卿表丈韻萬里同行一痩笻撥雲問水有先容更窮天姥投南路已過台山第幾重自此又隨雙澗月何妨曾聽五峯鐘卻從更好堂前望滿眼詩材思不供呉興藝文補宋詩紀事巻五十一
