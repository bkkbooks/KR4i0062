body:
  text: 宋詩紀事巻五十二錢塘厲鶚撰吕及之及之字周輔成都人梅林分韻得愛字并序紹興庚辰十二月既望縉雲馮時行從諸朋舊凡十有五人携酒具出西梅林林木王建梅苑樹老其大可庇一畆中閒風雨剝裂仆地上屈盤如龍孫枝叢生直上尤怪古者凡三四酒行以舊時愛酒陶彭澤今作梅花樹下僧為韻分題賦詩客既占韻立者倚樹行者環繞仰者承薌頫者拾英吟態不一皆可圖畫是行也余被命造朝行事薄遽重以大府衣冠謁報主人饋勞酬對犇馳形神為之俱敝諸公導以斯游江流如碧玉平野秀潤竹塢桑疇連延彌望十十五五籬落雞犬比閭相親不愁不嗟余散䇿其間葢不知向之疲薾厭苦所在也昔人謀于野則獲閑暇清曠有爽于精神思慮游不可廢如此哉又况所與游皆西州名俊憙事者耶詩成次第不以長少以所得韻之後先聨成軸客有十五韻止十四吕義父別以詩字為韻又有首眩詩不成者缺樹字一韻余過沈犀樊允南監鎮稅語允南補之諸公又屬時行為之序十五人者成都楊仲約施子一吕周輔義父智父澤父宇文徳濟吕黙夫杜少訥房仕成楊舜舉綿竹李無變潼川于伯永正法寳印老縉雲馮當可去城十里南郊外突兀老梅餘十軰玉雪為骨冰為魂氣象不與凡木對我來窮冬煙雨晦把酒從公對公酹人言此實升廟堂埋没荒村今㡬嵗清芬不為無人改捐棄何如本根在瑰章妙語今得公國色天香真有待歸路從公巾倒戴俗物汚人非所愛我公行向日邊歸此段風流入圖繪成都文類馮時行時行字當可巴縣人紹興中官奉禮郎以斥和議坐廢隆興初提㸃成都刑獄有縉雲集重陽登翠圍亭亭廢十年竹柏蓊然殊蔽逺眼命寺僧芟除翦伐屏翳豁開林巒杳靄殆丹山之絶勝處也與同游分韻賦詩以老杜開林出逺山為韻得逺字林樾失洗沐叢灌老偃蹇坐令軒豁地雍穆成奥閫千年李峨眉孤調絶攀挽徑欲剗君山笑㸔湘水逺我來此亭上造化閲舒巻何堪浩蕩意鬱鬱仰若俛蘭蕙生當門尚爾付鍤畚大材廊廟具顧此何衮衮石角礪霜斧一斬三百本圖事欲大快不復計小損天地英氣歸川原勝魂返鏡開水灔灔龍轉山蜿蜿卧虹踏歸市融雲䕶春墾晴光蕩芳酌中筵舞蹲蹲黄花壓客㡌胡牀秋風穩萬象競參揖相見一何晚通塞有時運明晦理相反干戈天地閉撫事切深悃痛澆磈磊胸不復效老阮和嘉州通判賈元升見贈山城烏鵲喜佳句來春風浣手三過讀㪚我磈磊胸當年過秦論千載猶為雄今觀妙好辭蹀躞追前蹤文章信有種字字含徴宫少城初識面輭語開沖融秋月耿髙懐春冰瑩清衷俱墮人事海煩促難舂容況乃燕雀卑未易參鸞鴻別來邛筰外一笑誰與同羡君對賢牧快飲如渴虹何當欵齋閣餘瀝借衰紅所幸九河潤宻邇千乘封臭味譬草木我軰情所鍾夢隨沫若水下與九頂通更願洗老眼見君攀翔龍中秋飲張仁甫家探韻得玉字數日及中秋迎月試新醁清暉困屏翳頑隂費驅逐廣座迷樽俎髙堂燦燈燭未用䘏一𤯝何妨縱百沃見人如見月張家呼小玉至日至日寒無頼今朝愁柰何兩宫黄屋逺二老白頭多聖主今嘗膽皇天忍薦瘥乾坤為囬首慷慨一悲歌自行在解維宿長安閘下回望天竺諸山依依在目微臣去國撫事感傷因成此詩歸家豈不好去國意如何主聖憂思切時危習俗訛山髙更囘首天闊阻悲歌一寸丹誠地餘生感憤多和子應游萬州岑公洞泉細或疑雨巖深微見天暫來如可老長往不難仙石髓層層落松聲樹樹傳欲歸重回首明月傍船舷以上縉雲集梅林分韻得梅字霜朝馬蹏無纖埃錦城城西江之隈金蘭合沓俱朋來白沙鱗鱗江水洄梅花傍江髙崔嵬人言猶是王建栽豪華過眼浮雲哉下馬酌酒聊徘徊飛英送香來酒杯酒酣疾呼竹籬開走尋屋角如龍梅龍梅雖多此其魁睡龍屈盤肘承胲風皴雨皵封蒼苔孫枝迸出誰肧胎天公撫摩春為回慎勿變化隨風雷年年開花照尊罍我欲結茅買芋煨與梅周旋送衰頽成都文類張積馮先生訪梅于成都西郊同游十五人分韻哦詩而積不與翊日先生分僧字屬積作之春回九地陽潛升南枝破臘如酥凝疎籬度香竹稍短寒沙倒影溪流澄魁然老株忽駭目雪鱗矯矯雙龍騰天公一叱困仆地掀髯弄爪髙曲肱長林望斷千百株奮首直欲青雲淩黎明太守和羮手十里往看車呼登西江破曉郊路淨盍簪者誰金蘭朋懽笑藉草飛大白行厨載酒多于澠風花飄搖落杯面潄齒澆胷如嚼冰湘流之清峴山瘦千古邂逅一笑興郤踏東風急回首侵夜霜月寒生棱入門未坐亟相詫曰今見之生未曽成都勝事多西蜀我欲問津雲水僧先生功成早匄身未老重來倚醉藤成都文類于格格字伯永潼川人梅林分韻得彭字庭柯卧蒼虯閲世如耼彭朔風破檀蘂零露滋玉英江空人響絶影落千丈清今代文章籙縉雲主齊盟躍馬覘春色觴客江上亭三嗅韻勝華霜霰飽曽經及時剝其實可用佐大烹幸因猶軒使錫貢充廣庭王明儻予燭和羮登簋鉶成都文類施晋卿晋卿字子一成都人紹興進士梅林分韻得下字郊原宿雨餘雪重雲垂野春信初動搖欲往豈無駕使君早著鞭問路逢耕者深尋烟雨村共作詩酒社庭荒六老樹氣象自儼雅一笑呼酒來大盆注老瓦最後看枯株何意當大廈夭矯待風雲有年天實假須知羮鼎調嘉實係用捨我欲壽使君罇罍更傾瀉明朝得楚騷健甚無屈賈君今有賜環詔落九天下蜀江雪浪來棹趁船人把留滯以諸生斯文要陶冶惟應郢中歌倡絶和自寡更聞督熊兒夜賦燭餘灺它年㸔無雙聲譽出江夏郤笑昌黎公阿買字能冩成都文類李流謙流謙字無變綿竹人梅林分韻得時字巾冠墮城府桔橰無停時胷脾貯黄埃非復林壑姿涎流方外勝秦人望軒羲萬金買閑日駕言一舒眉冒踏衆俊塲更從百代師食魚得河魴熊蹯佐其滋靉靉烟雨村霜條出冰㽔烏鵲噪寒暝玉立山差差置尊扶疎下老榦虯蛟馳落葉不動塵初無犀駭雞羞我木石資鬬公瓊琚詞深酌起自勸滕莒吾封圻公行對宣温雲霧生攀躋能來玩墟落疋馬郤蓋麾胸蟠萬螮蝀區寰眇毫絲以兹接羣動白羽坐指撝笑彼豢外者組紱為之鞿它年駟馬還梅花當十圍識此黄公壚下車挽客衣未覺邈山河一醉也大竒成都文類樊漢廣漢廣字允南沈犀監稅沈黎使君與客飲王建梅林分韻作詩過沈犀以詩相示闕樹字令漢廣補之牆頭冉冉新陽露忽作玲瓏玉千樹老蛟偃蹇獨避人巻回飛雪江臯暮何處鳴禽來好音四月枝垂起黄霧摧折霜餘初不懼笑看春光等閒度百年夢幻欲無言吹落吹開豈風故時來薦鼎真偶爾小住疎籬非不遇我知天地絶茫茫無為展轉獨多慮為花悽斷郤回頭爾亦微酸苦難茹成都文類楊大光大光字仲約成都人梅林分韻得陶字蟠根寄荒絶擢榦空橚槮鄉來聞妙語翦拂到兒曹垂老猶叵堪開落幾徒勞不謂勤杖屨惠然排蓬蒿尚能領諸生相就醉澄醪真頼旁輝暎併覺標韻髙酒䦨興未已分韻看揮毫籍湜俱可人冥搜争過褒乃知天地間一等為賢豪横飛與陸沈亦各係所遭再煩起窮邊國柄行當操盡期如此花曉夕幸甄陶得備和羮用寕不出伊咎百年幾春風勿令心忉忉成都文類吕凝之凝之字默夫成都人梅林分韻得花字出郭豈憚逺滿城無此花新枝開玉雪老樹卧龍蛇臨水互蔥蒨傍籬忽横斜詩聲寫竒怪畫本出槎枒老子晋彭澤諸公賈長沙不尋龍李盟來嗅露霜華杖屨穿茅舍壺觴倩酒家饑餐香馥郁醉藉影參差月白雁成字江清魚可义風流一時勝野意十倍加秪恐天上去迹陳錦江涯歸來馬蹄疾驚飛滿林鴉成都文類吕商隠商隠字義父成都人梅林分韻得作字一樹知獨秀十里方出郭江流浩清冷露氣凝凄薄胡為此行色疲馬外踴躍元冥正擅令植物困搖落喜見南北枝粲然秀冰壑千林色輝映百畆香旁礴首破春風荒獨傲清雪虐坐令芳信傳芬菲到羣萼如一君子信茹連俱有託相期飲此意浩蕩放杯酌更應䕶攀折嘉實須若若終收調鼎功傅巖真可作持問縉雲老一尊笑相酢成都文類吕宜之宜之字澤父成都人梅林分韻得詩字寒梅如髙人冰雪凛風期霜威淩萬木孤芳綴疎枝古來歳寒心肎與時節移家家浣溪南横斜映笆籬老樹更崛竒矯矯蛟龍姿中有調鼎味㡬年江之湄征衫十年寒霜蹄快追隨先生羊叔子到處英名垂對花有妙語豪氣無百巵興來屬湛輩同出舂容詩成都文類題文州安静堂峽束秋空一線青萬山深處長官㕔此堂虚曠無餘物面面為開碧玉屏方輿勝覽辛棄疾棄疾字㓜安號稼軒濟南歴城人耿京聚兵山東節制忠義軍馬留掌書記紹興三十二年令奉表南歸髙宗召見授承務郎寧宗朝累官浙東安撫使加龍圖閣待制進樞宻都承㫖卒徳祐初以謝枋得請贈少師諡忠敏歸潛志黨懐英辛棄疾少同舍屬金國初亂辛率數千騎南渡顯于宋黨在北擢第入翰林二公皆有榮寵後辛退閑有鷓鴣天詞云壮歳旌旗擁萬夫錦韉突騎渡江初燕兵夜捉銀胡彔漢箭朝飛金僕姑思往事歎今吾春風不染白髭鬚都将萬字平戎䇿換得東郊種樹書武夷玉女峯玉女峯前一櫂歌烟鬟霧髻動清波游人去後楓林夜月滿空山可奈何方輿勝覽元日老病忘時節空齋曉尚眠児童喚翁起今日是新年送別湖南部曲青衫匹馬萬人呼幕府當年急急符媿我明珠成薏苡負君赤手縛於莬觀書到老眼如鏡論事驚人膽滿軀萬里雲霄送君去不妨風雨破吾廬後村詩話幔亭峯山上風吹仙鶴聲山前人望翠雲屏蓬萊枉覓瑤池路不道人間有幔亭建寜府志尹穡穡字少稷兖州人僑居玉山紹興三十二年與陸游同賜進士出身孝宗朝累官殿中侍御史右諫議大夫以言者劾罷後村詩話少稷及接吕居仁曾吉甫議論在山中讀書二十年名論極重晚為大坡因符離之敗攻張魏公父子以附和議遂為公議所貶甚可惜也庸醫行南街醫工門如市争傳和扁生後世膏肓可為死可起瓦屑蓬根盡珍劑歳月轉乆術轉疎十醫九死一活無北市醫工色漸動大字書牌要驚衆偏收棄藥與遺方仙草神丹亦無用實者為虚熱為寒㡬因顛倒能全安君不見形神枵然卧一室醫方争工藥無必左手檢方右顧金丙手雖殊皆劒㦸後村詩話似諷當時主和戰者句景龍只是當時路不見金錢打著人靖康元夕異日是非憂史謬終身寒餓羡錢愚後村詩話黄銖銖字子厚號穀城翁建安人少師事劉屏山與朱子為同門友有穀城集其母孫夫人道絢號沖虚居士能文有詞鐵笛亭一聲蒼壁裂再奏蛟龍悲事往迹猶在山空人不歸詩家鼎臠梅花玉簫吹徹北樓寒野月崢嶸動萬山一夜霜清不成夢起來春意滿人間秋日曉日初浮萬里暉西風搖蕩送秋歸冥鴻直上三千丈社燕春鶯不敢飛以上詩人玉屑送仲晦靡靡歳時晏亂山紅葉稀端居已無悰况與親故違駕言臨廣路惜此須臾期祖燕未云洽雞鳴促再馳晨装儼然隊天澹風凄凄迤邐征人行悵惘離言悲令徳本髙世誠思開聖㣲虎豹文采異㡬年丹詔垂眷兹皇華寄那得淹遐隮君王乆延佇去矣翔天墀顧我抱幽獨已為清世遺冥鴻聿髙舉蜩鷽何由追縈縈西郊道晻晻朝陽暉出處自殊迹操袪胡不怡明當逐雲月依舊東岡陂翰墨大全楊杞杞字元卿廬陵人絶句三間茅屋獨家村風雨蕭蕭可斷魂舊日相如猶有壁如今無壁更無門詩人玉屑楊誠齋云先太中貧嘗作茅屋三間而未有門扉于元卿求之元卿送扉侑以此詩鄭裕裕紹興間莆田人一經堂詩宋進士方萬留意經術朱文公扁其堂曰一經在興化郡治束廂莆之甲姓實維大方紫囊錦帳閥閲膏粱有子盈之乃其最良心志乎道視之如忘慱究六藝并包五常東家尼父北窻羲皇日相討論兼收並藏五經在笥一經名堂謙以自牧雖晦而光實浮于名雖抑而揚伊昔孟氏排墨與楊斯攵羽翼吾道棟梁豈特詩書獨稱其長諸儒之説于孟何傷吾子命名既擇而詳通而貫之輝涵汪茫剖破藩籬無門無旁黙契韶濩能宫能商正䝉析滯起廢鍼肓以一知萬名實孔彰人知同好絺句繪章𤣥酒太羮子獨先嘗經術之門驥騁康荘典謨之文鳯鳴朝陽學報天子業纘星郎以經名家非子誰當興元府志呉曽曽字虎臣崇仁人髙宗朝以獻書得官累遷至吏部郎中出知嚴州致仕卒有得閑文集能改齋漫錄羅山兒時聞羅山窟穴居神仙念之毎欲往終為俗累牽兹晨復何夕風日媚晴暄偶與二三子徑來踐前言﨑嶇涉岡澗峭蒨凌雲烟崖斷或如瀉坡平俄若川有泉自何來但覺聲涓涓縈紆若蛇走往注山腹田徘徊一濯足入袖風翩翩俄登最髙嶺中觀屋數椽嶙峋老石像摩挲不記年桃花破叢菅一笈為嫣然石屏與翠壁擁從相後先物色恣觀覽萬界滿眼前適問同遊人兹為第㡬天不然何秀㧞不與衆峯連長安在何許無乃落日邊十年若搶攘戰血腥戈鋋誰知塵外客一壑能自專兹遊恐難再遲留不能旋如何林間月弄影明娟娟催歸猶恨早正恐陵谷遷撫州府志謝完璧村景即事緑徧山原白滿川子規聲裏雨如烟鄉村四月閑人少纔了蠶桑又插田西溪叢語徐珩珩字公飾醉歌得誰釀法乃爾佳連引數杯極口誇須臾忘物亦忘我是非榮辱不可加兒童相随拍手笑阿翁醉也扶歸家平生故人趙半刺遣騎折送園中花插花飲酒不待勸夜如何其月欲斜倒著接䍦自起舞笛聲趁拍鼓三撾陶陶兀兀意有得小姬在傍雙髻了驅令磨墨具紙筆滿幅大草飛龍蛇婦云汝醉當止矣明日酒醒不媿耶和虞智父登金陵青谿閣葉脫林梢處處秋壮懐易感更登樓日斜鍾阜烟凝碧霜落秦淮水慢流人似仲宣思故國詩如杜老到夔州十年前作金陵夢重撫闌干説舊遊以上前賢小集拾遺陳元老元老福安人有城山集寒食至後百五日春光無火晨金鈿沽酒妾羅韈弄毬人鶯語如留意花枝不賣貧東園舊桃李紅白盡成塵合璧事類前集胡清清崑山士人壓雲軒在崑山誰建危亭壓翠㣲畫簷直與暮雲齊有時一片巖隈起帶與老僧山下歸賦軒旁小栢栽傍巖隈未足看謂言斤斧莫無端他時直入掄材手不獨青青保歳寒中吳紀聞後有一文人作浙漕因到山中見詩大喜尋訪其人厚禮以待之既憐其貧遂給官田胡由此致富薛循祖循祖鄞人掌機宜文字有吷音題采藥圖江上竒峯雨後多千層飛瀑灑青蘿扶笻亦覺溪橋滑尚有幽人采藥過甬上耆舊集潘矩矩字方仲㑹稽人安吉尉獻沈詹事昔年單騎赴筠州覓得歌姬共逺遊去日正宜供夜直歸來渾未識春愁禪人尚有香囊媿道士猶懐炭婦羞鐵石心腸延壽藥不風流處也風流龎元英談藪沈詹事持正以坐秦丞相論恢復貶筠州沈方售一妾年十七八携與俱行處筠州凡七年既歸呼妾父母以女歸之猶處子也時人以比張忠定公詠吉安尉潘矩方仲獻詩云云厲徳斯徳斯字直方餘姚人送曹泳貶新州斷尾雄雞不畏犧憑依掇禍復奚疑八千里路新州瘴歸骨中原是㡬時談藪曹泳侍郎妻碩人厲氏餘姚大族女方泳盛時郷里奔走恐後獨碩人之兄厲徳斯不然泳怒帥越時徳斯為里正泳風邑官脅治百端竟不屈㑹之甫殂乃遣介致書于泳啟封乃樹倒猢猻散賦一篇及泳貶徳斯以詩送之云云耿時舉時舉字徳基居太學不第而卒曰琯按吳郡志作耿元鼎賦姑蘇西樓西樓一曲舊笙歌千古當樓面翠峩花發花殘香徑雨月生月落洞庭波地雄鼓角秋聲壮天㢠䦨干夕照多四百年來無妙手要㸔風物似元和中吳紀聞紹興中郡守王㬇重建郡治西樓時賦詩者甚衆獨耿為擅場何元泰元泰紹興間人祕閣修撰陳少陽先生挽辭在昔虞庠日嘗陪陳少陽詞傾三峽水忠烈九秋霜藥石塵丹扆琅玕寳皁囊後來門下士多有紫薇郎盡忠録附馬俌俌紹興間人過子美草堂棲遲九月錦水行獨過草堂西出城村樹苒苒秋照白浪花漪漪江水明溪邊三重結茅屋松蘿翳疎晚雨清往來沽酒且有客胡為奔走不自停四海紛然霾曀多我憂豈但白馬盟藜藿未足飽我腹况又一頃供耕耘只今騎驢望八極終日飄飄浪如許可堪顔色太癯生憂愁盡入篇章苦信眉一笑古復作郤似韓宣適東魯此生蕩漾胡能留兩脚風塵奚所休此道滄浪付一漚喚之千古與爾謀吾亦往矣作春秋成都文類曽伋伋字彦思南豐人紹興末以大理寺丞出知袁州慶元間居海昌題張許雙廟國憑節義壮洪基激厲頺風屬聖時曽屈帝尊親降輦髙宗嘗幸其廟可因祈福幸公祠杭州府志葉祖義祖義字子由婺州人登科為杭州教授句醉來黒漆屏風上草冩盧㒰月蝕詩夷堅志子由少㳺太學天資滑稽嘗曰世間有不分曉事吾以一聨詠之木待問待問字藴之永嘉人洪容齋之壻隆興元年進士第一仕至煥章閣待制禮部尚書千里思君行千里輕所歴妾馳千里心匪石春房酌酒意悤悤愁不在離愁在憶鴛鴦瓦上昏無色鸚鵡杯中塵更積燈前獨坐製君衣淚溼翦刀裁不得郊寺紅委牆隂花寂寂翠滋亭角草纖纖風翻書葉常交案雨壓爐烟不過簾以上東甌詩集吕祖謙祖謙字伯恭尚書右丞好問之孫倉部郎大器之子上世文靖公夷簡居壽州至右丞從駕南渡始居金華祖謙登隆興元年進士復中博學宏詞科累除直祕閣著作郎國史院編修卒理宗朝賜諡曰成爵開封伯從祀孔子廟庭有東萊太史集西興道中鳧鶩迎船自有情隨波故起綠鱗鱗野花照水開無主誰信春歸一兩旬賀車駕幸祕書省麟臺髙柳識雕輿共記中興幸省初黄道再傳天子蹕青編重入史臣書需雲下際君恩盛晨露髙張樂節舒若寫鴻猷參大雅定非周鼓頌畋漁春日短短菰蒲綠未齊汀洲水暖雁行低柳隂小艇無人管自送流花下別溪野步石梁俯清流苔髪明可數茅檐春晝長寂寂亭隂午鳥啼花徑深風絮浩無主幽人不可覿棊聲時出戸王龜齡詹事挽章諸老收聲盡佳城又到公蒼天那可問吾道竟成窮旌巻莆田雨簫横霅浦風今年襟上淚三哭萬夫雄芮祭酒劉太史皆於今歳下世與同舘游張氏園分韻得日字出日厭囂塵入門倦佔畢駕言城北園滯思頓消釋方池環修篁廣陌衛行栗先雪梅已苞後霜草猶茁上躋極髙明旁穿復深宻主人真喜事秀句屢盈帙招呼文字飲及此三餘日山林與鍾鼎零茂本非匹斯遊豈偶然書板記甲乙寄章冠之章侯平生一詩囊酬風酢月徧四方浩歌姑孰酒淋浪醉呼太白同舉觴遂登浮玉臨淼茫江濤挾筆益怒張沙頭倚檣樂未央興闌忽上秋浦航門前槐花日夜黄閉門琢詩聲繞梁白袍紛紛渠自忙飄然邂逅非所望自言乆厭世鎖韁合眼已夢廬山蒼君材甚碩氣方剛身雖欲隠文則彰江湖故人半朝行左推右挽摩天翔而我戢翼甘摧藏不能與俗相迎将徑當行前掃山房俟君功成還故鄉郤駕柴車迎路傍以上東萊吕太史集樓鑰鑰字大防鄞人异孫隆興元年進士累官中書舍人給事中寧宗朝歴翰林學士同知樞宻院事進參知政事卒贈少師諡宣獻有攻媿集送王仲言倅海陵遂初陳迹遽凄涼擊節青箱極薦揚談笑于儂情易厚典刑使我意差強重屏唐畫論中主古殿遺文話阿章舊事從今向誰問尺書時許到淮鄉揮塵三録明清晚識遂初尤延之先生一見傾葢若平生懽公任文昌一日忽問云天臨殿在于何時邪明清云自昔以來葢未有之紹聖初朱元章為令畿邑之雍丘遊治下古寺寺僧指方丈云頃章聖幸亳社千乘萬騎經從嘗愒宿于中元章即命彩餙建䲭嚴其羽衛自書榜之曰天臨殿時吕升卿為提㸃開封府縣鎮公事以謂下邑不白朝廷擅創殿立名将按治之蔡元長作内相營捄獲免聞有自製殿贊恨未見之尤即從袖問出文書乃元章所書贊也云才方得之公可謂博物洽聞矣翊日入省形言稱道于稠人廣衆中焉樓大防作夕郎出示其近得周文榘所畫重屏圖祐陵親題白樂天詩于上有衣㡌中央而坐者指以相問云此何人邪明清云頃歳大父牧九江于廬山圓通寺橅江南李中主像藏于家今此繪容即其人文榘丹青之妙在當日列神品葢畫一時之景也亟走介往㑹稽取舊収李像以呈其面貌冠服無毫髮之少異因為䟦其後樓深以賞激繼而明清丏外得請以詩送行後一篇云云䟦山谷書范滂傳帖宜人初謂宜于人菜肚老人竟不振承天院記顧何罪一斥致死南海濵賢哉別駕眷遷客不恤罪罟深相親哀哀不容處城闉夜遣二子從夫君一日携紙匄竒畫引筆行墨生烟雲南方無書可尋問默冩此傳終全文補亡三篋比安世偶熟此巻非張巡巖巖汝南范孟博清裁千載無比倫坡翁侍母曽啟問百謫九死氣自伸別駕去官公亦已身雖既衰筆有神我聞此書乆欲見摹本尚爾況其真輟君清俸登堅珉可立懦夫羞佞臣桯史余若著倅宜州日因山谷謫居是邦慨然為之經理舍舘遂遣二子滋滸從之游時黨禁甚嚴士大夫例削札掃迹惟若著敬遇不怠率以夜遣二子奉几杖執諸生禮一日携紙求書山谷問以所欲拱而對曰先生今日舉動無媿東都黨錮諸賢願冩范孟博一傳許之遂黙誦大書盡巻二子相頋愕服山谷顧曰漢書固非能盡記也如此等傳豈可不熟聞者敬嘆若著滿秩持歸上饒家居寳藏之再世散逸歸東武周氏又歸忠定家其六世孫伯山僅傳摹本其子子壽鑄為四明制属攜之笈中之官白醉閣陶内翰清異録首載開元時髙太素隠商山起六逍遙舘各製一銘其三曰冬日初出銘曰折膠墮指夢想炙背金鑼騰空映簷白醉余愛其言取以名閣陳進道惠示大篇次韻處世難獨醒時作暎檐醉年少足裘馬安知老夫味天梳與日㡌且復供酒事謫居幸三適得此更慙媿向來六逍遙特書見清異君家老希夷相求諒同氣曲身成直身朝寒俄失記醉中知其天不飲乃同意書生暫竒温難語純綿麗西山資國寺野溪清淺度危橋徑䇿枯筇上紫霄曉霧暗蒸山寺雨松風深隠海門潮浮杯水漲人何在洗鉢池清意已消又上樂亭臺上看雲山萬疊更逍遙題雪竇錦鏡橋亭雨溪赴壑若奔虯此地端能􅎒衆流三板放開千丈雪一匳照破四山秋㡬年空自存公案今日重新指路頭珍重老師成勝事清名當與此山留題蘇文忠武昌西山贈鄧聖求詩蹟次韻黨論一興誰可回賢路荆棘爭先栽竄留多能擅筆墨囚拘或可為鹽梅雪堂先生萬人傑論議磊落心崔嵬向來羅織脫一死至今詩話存烏臺凭髙望逺極宏放眼界四海空無埃黄岡蹋徧興未盡絶江浪破琉璃堆鄧郎神交信如在石為窊尊勝金罍鄧侯先曾訪遺跡銘文深刻山之隈山空地僻分埋沒二公前後搜莓苔元祐一洗人間怨天地清寜公道開玉堂同念舊游勝筆端萬物挫欲摧時哉難得復易失弟兄逺過崖與雷北歸天涯望陽羡買田不及歸去來我為長歌弔此老慟哭未抵長歌哀題楊妃上馬圖金鞍欲上故徐徐想見華清被寵初後日延秋門下路不應有暇作躊蹰以上攻媿集林光朝光朝字謙之興化軍莆田人隆興元年進士累官國子祭酒兼太子左諭徳除中書舍人兼侍講以集英殿修撰知婺州卒諡文節有艾軒集奉題游洋張明府流香亭時以薦章數下涉秋月馬首且欲西矣因以寄意云封題青李數緋桃處分園林意自豪旋出篇章陪樂府更憑花木續離騷酴醿架下攜春榼薝蔔林中滴夜槽郤是秋風生馬耳未應老大笑牛刀哭徐刪定徳襄修文巷裏暮春前欲上旗亭問客船忽有短牋無寄處漁梁郤在淚㾗邊以上艾軒集袁樞樞字機仲建安人隆興元年進士累官權工部侍郎國子祭酒寧宗朝擢右文殿修撰知江陵府奉祠歸武夷九詠存五仁智堂此身本無累動靜隨所寓結廬在巖谷自適山水趣朝來挹雲氣日夕沐風露坐觀天地心詎忘仁智慮寒棲館巖前風入松谷口泉潄石冩之五弦琴聲在函丈席竹間有餘地營館招羽客靜夜縆髙弦待月寒林隙晚對亭落日鬱蒼烟空山轉寒碧石屏倚天立端峭一千尺無言獨與對足以終日夕何用向時流抵掌恣談劇釣磯投轄出東溟持竿歸九曲溪翁來問訊笑失雙鬢綠潭邊舊釣石瑩滑磨青玉竟日謾垂綸忘機看鷗浴茶竈摘茗蛻仙巖汲水潛虯穴旋然石上竈輕汎甌中雪清風已生腋芳味猶在舌何時櫂孤舟來此分餘啜武夷山志鄭伯英伯英字景元伯熊弟隆興元年進士擢秀州判官有歸愚翁集和清卿雪溪泛舟晚登華葢亭滿江風雨釀清愁坐嘯烟波一葉舟目送飛花千里去身隨空碧一鷗浮兜羅世界成遊戲欸乃聲中自唱酬試問剡溪回棹客可能乘興上南樓東甌詩集王阮阮字南卿徳安人隆興元年進士仕至撫州守歸隠廬山有義豐集劉後村䟦義豐詩髙處逼陵陽茶山廬山萬杉寺昭陵龍去奎文在萬歳靈杉守百神四十二年真雨露山川草木至今春重過萬杉寺題碑隂碧紗籠底墨才乾白玉樓中骨已寒淚盡當時聯騎客黄花時節獨來㸔桯史王阮嘗從張紫微學詩紫微罷荆州偕游廬山有萬杉寺本仁皇所建奎章在焉紫㣲大書二詩別去兩旬而聞湖隂之訃阮是時亦自有二十八字紫微大擊節以為不及既而復過是寺又題碑隂云云亦紆徐有味題四羊圖三百維羣世不見乃以四羊為一圖人言此圖出韋偃不知韋偃有意無巖巖參天一古木下有輕荑滿郊綠雪髯隠約黑昏中沙肋微茫筆端足昔聞韋侯畫馬工杜陵長歌歌古松孰知畫羊更如此世間絶藝誰能窮蘄春太守好事者珍藏有此希世畫嗟予得此雙眼明此一轉語乆難下三羊遊戲芳草茵一羊輒登枯木根安得添我作牧人為公鞭此一敗羣以上義豐文集袁説友説友字起巖建安人隆興元年進士除秘書丞歴寳文閣學士嘉泰中同知樞宻院參知政事為四川安撫時輯漢以下迄宋淳熙蜀中詩文釐為五十巻目曰成都文類巫山十二峯二十五韻平生磊塊山林姿一丘一壑貪成癡寸峯拳石瞥眼過張皇攫覓惟憂遲東南佳山多秀麗就中所欠雄與竒飽聞巫山冠巴峽竒峯十二相參差昔年圖畫嘗一見欲見此山無路之扁舟西泝上三峽千巖萬壑爭追隨終朝應接已不暇心目洞駭俱忘疲驀然鐘鼔髙唐上峯巒二六排旌旗一峯霞彩㢠在望一峯展翠開屏帷望霞峯翠屏峯無心出岫雲吐色偃葢平巒松並枝朝雲峯松巒峯仙蹤鶴駕羽衣近壇石瑤臺閶闔低集仙峯聚鶴峯淨壇峯上昇峯白雲一起鳯凰下清泉四合蛟龍嬉起雲峯聖泉峯栖鳯峯登龍峯羣峯角立變態異一一大巧乾坤為外堪擊拊試聲律中含造化分四時天下名山亦多矣未有列岫竒如兹九華一景固天巧惜與江流相背馳南北兩峯喧衆口妝抹郤恨同西施何如此峯何限好行行列列横江湄烟雲漠漠出寸碧風雨時時横黛眉舟人漁子漫回首騷士墨客勞支頤我來穿水入天去貂裘章甫生塵緇昻頭見此大竒特躋攀不上空嗟嘻吾将欲訪三島登九嶷上蓬萊道山之壁絶泰華終南之嵋飛鳧去舃嘯滄海郤來巫峽温前詩全蜀藝文志題米敷文瀟湘圖巻水際天低岸逺山腰霧巻雲舒擬喚松江小艇歸來好趁蓴鱸郁氏書畫題跋記李嘉謀次袁尚書巫山十二峯二十五韻道人愛山出天姿自謂計黠人嫌癡獨游名山看不足毎得勝處行為遲誰人能知物外賞世上自有壺中竒一行作吏困汨沒便與好景相參差脫兔投林今適願窮猨得木吾何之芒鞋竹杖恣來往烟蓑雨笠長相随青山愈好足力盡此意未止駑駘疲路逢行人説大尹正見諭蜀揚舲旗好賢招邀每虚席問俗疾苦時褰帷才華落落清廟器詩筆粲粲珊瑚枝胷吞楚澤八九盡氣壓巫峽羣山低大峯連娟爭媚嫵蒼壁徙倚共游嬉巴東巴峽古所重作雲作雨今胡為有情飛鳶送迎客無數棹歌來往時昔日圖畫曽見者何意忽此今逢兹邇來豐碑在人口已與流水爭東馳政用中和得大體智出毫末非全施不獨英聲流上國已有詩巻傳江湄狼烟長閑士鼔腹耕隴不見愁生眉都門髣髴記分袖蜀道修阻常支頤持謁見公敢論舊撫髀顧我清無緇樽俎頻開閑共語歌謳聊與民同嘻忽然晨日在東壁但見山月來峨嵋行吟何獨壯三峽在處山靈未乞詩全蜀藝文志毋丘恪次袁尚書巫山十二峯二十五韻縑素巧貌溪山姿寳藏昔笑虎頭癡何人夜半胠篋去信為羽化無疑遲魏明不惜萬夫力鑿山累土誇神竒景陽突起芳林苑穀城文石光參差葉公好龍廣射虎大方安能不笑之至人于物特寓目逺象過眼心弗隨我公看山正如此肎趨無窮腳力疲胷中五嶽鎮地軸眼底三辰昭旂旗擢由漢庭寵分鉞來撫蜀郡初褰帷巫山一覽窺妙處寫入長歌賡竹枝坐令十二峯増重已覺氣壓髙華低太室少室敢軰行小孤大孤何兒嬉岱宗日觀峻徒爾崑崙天柱髙安為出雲作雨均有是泥金鏤玉彼一時所謂造化一尤物不在九華真在兹中山前言恐遂廢公之妙論已四馳半語尤在大公正蟠胷經濟㸔設施要令利澤均四海無論山崖與水湄秪今蒼生方屬望休戚在公顰伸眉願公更為天下重所養自養觀諸頤量陂誰復能澄撓徳表居然無磷緇巖石巍巍具瞻在孰不歎仰聲噫嘻又何必東望瀛南望嶷北有天後之劒嶺西有雲表之峩嵋與君髙名並不朽配以今日巫山詩全蜀藝文志閭丘泳次袁尚書巫山十二峯二十五韻舟行觀山無定姿篷底兀坐真兒癡層崖複嶺正雜遝平岡横阜俄逶迤晴嵐參天固競秀深崖挺石尤多竒遙岑浮眉綠㸃點飛瀑懸劒鋒差差飽聞巫山妙天下今誦公詩如見之蓬仙來應人間世妙齡便有聲名隨日談經術輔主聖乆領國計嗤駑疲共推經邦濟川楫暫建分陜元戎旗百城聽令仰賜履三邊制勝如籌帷長江髙唐神女峽萬里崑崙分一枝峯巒森立入霄漢塔廟選勝居髙低響山猨啼聲若嘯迎櫂鴉舞來如嬉金母介畀神靈職孰云朝暮陽臺為琅函蕊笈發天祕贊禹治水唐虞時英辭一洗千載陋寫之琬琰宜自兹人思傳本快先睹蔡邕石經車馬馳北暢威名被沙漠西奠夷落連黔施帝遣雲軿鎮南極祠宫姑寓江之湄湘君時過鼓瑤瑟宓妃豈復揚蛾眉金闕已侔坐少廣丹經孰授踰期頤野人塵客麁知學素守亦復湼不緇朅來乘軺職飛輓兩見祈榖歌噫嘻疲民﨑嶇上轉粟舊業荒落南窺疑勞生屢已度劒棧清游頗念登峨嵋從今嵩髙雅頌手那數韓子南山詩全蜀藝文志黄人傑人傑字叔萬旴江人次袁尚書巫山十二峯二十五韻文昌老仙絶俗姿愛山成癖非兒癡胷中況自有丘壑攬結瑰異常恐遲坤維謀畧出分閫江山致助爭出竒㝷幽選勝上巫峽斷崖怪石懸參差十二峯前弭征棹枝藤直上窮所之雲烟變態千萬状過眼神動驚天隨人疑躋攀脚力盡公自樂此良不疲瑤華真妃似夙駕風馬晝下揚旛旗層巒好處起蒼壁丹霞望門開赤帷登壇定可拾瑤翠却老未應無玉枝仰天一笑睨寥廓俯視培塿丘陵低頗疑遊龍出飛躍恍若栖鳯猶娱嬉喬松跨鶴逺近集雲雨濟人朝暮為壇維野翠有餘潤泉拖脩帛無窮時一經盼睞便改觀陽臺價重當由兹惜哉牙纛不乆駐鷁首未轉檣烏馳輕縑素練欲摹冩畫師難着五色施筆端機杼始潛運悠然寄興滄洲湄章成密簡繡衣使繡衣翰墨今白眉珠酬玉唱兩相尚三歎盡解騷人頤好刋蒼珉示千古磨而不磷湼不緇紛紛我軰小巫耳健讀數過徒噫嘻待從兩公奠西極安南嶷收闗河百二之險劖岷峨萬仞之嵋大書有宋中興頌東還更和巫山詩全蜀藝文志項寅賔寅賔字彦周崑山人與范石湖倡和和范至能元日獻歲身留外思家恨滿中桃符禳厲鬼椒酒勸山童出謁憑羸馬題詩附去鴻青春應時節斗柄夜搖東和鄭逢辰元宵韻憶昔先皇賞露臺鼇山半影落蓬萊羣方欲識龍顔喜雙闔時瞻雉尾開十里天香濛碧霧六宫韶樂隠新雷神仙舊事渾如夢只有春風每歳催以上崑山雜詠鍾孝國孝國字觀光崑山人千里翁蓄陶酒尊係以筠籠形狀勃窣某酒後以短項翁目之不謂誤中遂成佳號彦平功成二兄皆有裦詠可使韓子蒼縮肩短項之句北面矣某不揆鄙拙勉強續貂幸諸丈斤斧之少陵先生時不偶老瓦盆中醉林莽江湖散人名益窮魚㱿傾尊不論斗孤風異行同襟期食鮭未必富三九淩烟功名舉世事不直兩公一杯酒㑹稽夫子有古心嗜好𦕈追千載友陶尊中産同蒼筠短項不肎鍾罍羣章綬黄篾羞緇塵肺腸桑落心崑崙始知其中殊陋貌一㸃不受泥沙渾時從往古窮元微坐隅兀側長相隨送子醉郷謝膠擾回頭轉覺人間小崑山雜詠樂備備字功成一字順之其先自淮海徙崑山與范成大馬先覺結詩社官至軍器監簿比同彦平謁希顔千里千里留醉短項翁彦平有作鄙拙者亦不能已勉強亂道幸笑覽君不見便腹邊先生齁齁晝眠貯五經又不見長頭賈都尉喋喋問事聒人耳兩人挾䇿煩天機俱亡其羊廼其理不如此翁不知書肩髙頤隠形侏儒胷中無物秖嗜酒酒至輒盡寜留餘有時花㡌賔客前清辨傾倒如流泉不辭伴客竟佳夕第恐吻燥舌本乾主人從今莫言窮有此自足當萬鍾但令時與聖賢對勿學鄙士中空空我昔已自聞其風向來一笑欣相逢他時訪戴不必見竟須奓戸呼此翁崑山雜詠姚申之申之字崧卿崑山人隆興元年進士寓居全吳江上一雨通宵翦韭畦波棱生甲晚菘齊朝來赤脚語言好醒酒杯羮有宿齏幅巾蕭散一枝笻身在水雲千頃中抹野亂山隨意碧褭林霜葉可憐紅崑山雜詠宋詩紀事巻五十二
