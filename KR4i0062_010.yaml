body:
  text: 宋詩紀事卷十錢塘厲鶚撰李淑淑字獻臣徐州豐人少傅若谷子年十二獻文行在真宗賜童子出身授校書郎景祐初知制誥除翰林學士纍官户部侍郎出知河中府卒贈尚書右丞有李公詩苑類格及别集題周恭帝陵弄楯牽車挽鼓催不知門外倒戈回荒墳斷隴才三尺猶認房陵半仗來東軒筆録淑在翰林奉詔撰陳文惠公神道碑李為人高亢少許可文章尤尚竒澀碑成殊不稱文惠之功烈文章但云平生能為二韻小詩而已文惠子述古等懇乞改去二韻等字答以已經進呈不可刋削述古極銜之㑹李出知鄭州奉時祀于恭陵作詩云云述古諷寺僧刻石俄有以詩上聞者學士葉清臣等言本朝以揖遜得天下而淑誣以干戈仁宗亦深惡之遂落李所居職題滑州廨滑守如今是世官阿戎出守自金鑾郡人莫訝留題别孫息期同住此看青箱雜記李復圭三世皆知滑州天聖中其祖康靖公若谷知慶厯中其父邯鄲公淑又知後八年復圭又知前此邯鄲公嘗迎侍康靖題詩于州廨云云後復圭刻石記其事曰仰承遺訓允契冥兆兹亦異也朱巽巽揚州天長人真宗朝官至工部侍郎守雍州子壽昌因母劉被出棄官尋至同州得焉以孝聞天下句塞垣古木含秋色祖帳行塵起夕陽送劉綜學士出守并門詩話總龜成鋭鋭許州臨潁人應制科高第嘗以詩獻王丞相隨句綵檻應無分春風不借恩野菊詩話總龜林坰坰福州羅源人真宗朝特奏名有南華集詠瑞檜古殿當年欲葺時槎牙高檜礙簷榱人間斤斧難容手天上風雷為轉枝烟色併來春益重月華饒得夜相宜吾皇一駐鑾輿賞從此聲名四海知陳郁話腴真廟朝寢殿側有古檜秀茂不羣名御愛檜然橫礙殿簷真皇意欲去之一夕風雷轉摺其枝因以為瑞題詠者多唯羅源林坰唐律稱㫖賜號南華翁詩名由此大顯李畋畋蜀人與任介郭震為莫逆交仕至尚書郎送鈐轄館使王公郤縠詩書奕世傳西人歌德别戎旃三朝功業標勳府四稔恩綏播蜀川耦射隔花聞破帖分題臨沼間中筵歸朝聖㫖俞僉望畿內封侯養重權成都文類程戡戡字勝之陽翟人舉進士仁宗朝擢再知益州纍官户部侍郎樞密副使尋拜鄜延路經略安撫使英宗即位召還道卒贈太尉諡康穆送鈐轄館使王公歸騎翩翩去路賖鬱蔥佳氣望天涯艱危劒閣三千里惠愛刀州十萬家龍尾道邊瞻日彩鹿頭關外别春華金明扈從宸遊處休憶連年泛浣花成都文類靳宗送鈐轄館使王公再任坤維報政成紫泥恩詔下神京搖鞭有客添歸興折栁何人不愴情杜宇江山經鳥道海棠池館憶龜城尊前執手難收淚投分從來比弟兄成都文類王景送鈐轄館使王公四稔總兵鈐輕裘叔子慙抗棱遐徼伏敦信逺民諳赴召薰風布離襟臘酒酣吾皇思將帥有意在江南成都文類解程送鈐轄館使王公武帳推恩詔十行雍容鳴玉覲清光四年愛日民謠浹五月炎風驛路長劒閣煙雲迷去斾栁營笳鼓慘離觴浣花紙貴傳新集留得詩名繼許昌成都文類黃垍送鈐轄館使王公四年軍法表巴邛歸騎俄乘紫漢風家緒舊傳三棨貴將材元藴萬人雄錦城離思雲容斂山國行章斾影紅到日定知新渥重主寮今是黑頭公成都文類姚渙送鈐轄館使王公家傳勳力世能賢四載坤維領帥權南詔酋豪彌款附西州士庶賴蕃宣輸忠感慨由誠府接下恩勤自意筌月夕過從多命席花時酬唱旋成編雅歌餘暇軍容肅陟狀升聞帝願延馳驛遽趨三召節執圭俄覲九重天漢廷儀衛咸祗若蜀郡名僚共黯然賜對定應留晷刻疇庸當便進班聯聖神倚注期蕃錫宥密崇高待九遷下客塵勞遇知已願言攀附跂英躔成都文類田瑜送鈐轄館使王公閫外膺宸寄坤維握虎兵真純逾璞玉方重敵長城肯構詩名著承家將略明四年凝茂績一節促歸程水際旌旗影風前鼓吹聲西州懷惠愛北闕被恩榮護衛親嚴近雍容侍穆清分攜暫銷黯良㑹在神京成都文類高惟幾惟幾官殿丞送鈐轄館使王公遊宦俱為關外人與君五看海棠春園林選勝聯鑣遍風月相思命駕頻大斾先時辭蜀道短轅何日見京塵子牟又起離羣恨欲操行袪重愴神成都文類海棠故國庸岷外孤根楚苑中使梅休妒白仙杏已饒紅旋恐陽城破尋憂下蔡空幾時夢巫峽獨立怨春風海棠譜張靖送鈐轄館使王公保塞昔年嘗閉壘甘陵今嵗又勞師將軍鎮蜀功多少不見干戈出虎皮玉勒嘶風出錦城山光野色助離情行行莫倦神華逺芳草連雲伴去程成都文類范諷諷字補之齊州人舉進士第纍官翰林侍讀學士給事中知兖州遷光祿卿儒林公議范諷性疏誕嘗忤外計求監舒州靈仙觀莊獻太后臨朝聞其俊邁召拜諫官好朋飲高歌噭呼或不冠幘禮法之士深疾之顔太初作東州逸黨詩以譏之題鼎州甘泉寺平仲酌泉回北望謂之禮佛向南行烟嵐翠鎖門前路轉使高僧厭寵榮湘山野録鼎州甘泉寺介官道之側嘉泉也便于潄酌行客未有不舍車而留者始寇萊公南遷日題于東檻曰平仲酌泉經此回望北闕黯然而行未幾丁晉公又過之題于西檻曰謂之酌泉禮佛而去後范補之安撫湖南留詩于寺云題濟南城西張寺丞園亭園林再到身猶健官職全拋夢乍醒惟有南山與君眼相逢不改舊時青能改齊漫録石延年延年字曼卿一字安仁其先幽州人家宋城真宗録三舉進士為三班奉職歷太子中允同判登聞鼓院有集歐公詩話曼卿卒後其故人有見之者云恍惚如夢中言我今為鬼仙也所主芙蓉城欲呼故人往遊不得忿然騎一素騾去如飛其後又云降于亳州一舉子家又呼舉子去不得因留詩一篇與之余亦略記其一聨云鶯聲不逐春光老花影長隨日腳流神仙事怪不可知其詩頗類曼卿平生語舉子不能道也歸迅逸不可言詩林廣記石曼卿詩如飢鷹乍隱居詩話石延年長韻律詩善敘事其他無大好處籌筆驛銅雀臺留侯廟詩為一集之冠五言小詩如海雲含雨重江樹帶蟬疏平蕪逺更緑斜日寒無輝者幾矣桐江詩話曼卿一日春初見階砌初生之草其屈如鉤而顔色未變因得一句云草屈金鉤緑未回遂作早春詩一篇旬日方成曰簷垂冰筯晴先滴草屈金鉤緑未回其不逮先得之句逺甚肋集曼卿以天聖四年來令金鄉故詩為此雞邑人作者如題張氏園亭詩云樂意相關禽對語生香不斷樹交花尤為佳句也文獻通考張浮休評曼卿詩如飢雁夜歸巖冰秋拆俊爽有餘不可尋繹題孫可久别墅南北霑河潤幽深在禁城疊山資逺意讓俸買閒名閉户斷蛛網折花移鳥聲誰人識高趣朝隱石渠生青箱雜記仁宗朝內臣孫可久賦性恬淡年踰五十即乞致仕都下有居第堂北有小園城南有别墅每良辰美景以小車載酒優遊自適曼卿過其居題詩云云平陽代意一篇寄師魯十年一夢花空委依舊山河損桃李雁聲北去燕西飛高樓日日春風裏眉比石州山對起嬌波淚落妝如洗汾河不斷天南流天色無情淡如水澠水燕談石曼卿天聖寶元間以歌詩豪于一時死後故人關詠夢曼卿曰生平作詩多矣獨常自以為平陽代意一首最為得意而世人罕稱之能令豫此詩盛傳于世在永言耳詠覺增廣其詞隱度以迷神引聲韻于是天下爭歌之他日復夢曼卿來謝下第偶成集句一生不得文章力欲上青雲未有因聖主不勞千里詔嫦娥何惜一枝春鳳皇詔下雖霑命豺虎叢中也立身啼得血流無用處著朱騎馬是何人年去年來來去忙為他人作嫁衣裳仰天大笑出門去獨對春風舞一場西清詩話曹太尉西師仁者雖無敵王師尚有征獨乘金廏馬都領鐵林兵肅氣關河暮屯烟部落晴旗光秋燒合甲色夜江橫士喜擊中鼓敵疑聞後鉦無私乃時雨不殺是天聲濯濯前誰拒堂堂彼自傾寒踰博望塞春宴隗囂城外使戎心伏旁資帝道平公還如畫像為贊學班生金鄉張氏園亭亭館連城敵謝家四時園色鬭明霞窗迎西渭封侯竹地接東陵隱士瓜樂意相關禽對語生香不斷樹交花縱遊㑹約無留事醉待參橫月落斜以上宋文鑑籌筆驛漢室虧皇象坤乾未即寧姦臣與逆子搖嶽復翻溟權表分江域曹袁鬬夏坰虎奔咸逐逐龍臥獨冥冥從衆非無術欺孤乃不經惟思恢正道直起復炎靈管樂韜方略關徐駭觀聽一言俄遇主三顧已忘形南既清蠻土東期赤魏庭出師功自著治國志誰銘歷劒兵如水臨秦策若瓴舉聲將潰虜橫勢欲逾涇仲達恥巾幗辛毗嚴壁扃可煩親細務遽見墮長星戰地悲陵谷來賢賞德刑意中流水逺愁外逺山青想像音徽在侵尋毛骨醒遲留慕英氣沈歎撫青萍中山詩話石曼卿獨行京師一豪士揖之曰公幸過我同入委巷抵大第歌舞歡醉丏書為揮籌筆驛數詩以金帛數百千贈之他日遇諸塗又遺以白金數兩謂曰詩中意中流水逺愁外逺山青最為佳句蜀中綿州石曼卿為諸葛武蘆浦筆記右驛在侯賦也寶元二年大書以遺朱復之後二年朱為四明節度推官遂刻石于㕔事春陰寒食少天色春風多栁花倚樓心目亂不覺見棲鴉前賢小集拾遺瀑布飛勢挂嶽頂無時向此傾玉虹垂地色銀漢落天聲萬丈寒雲濕千巖暑氣清滄浪不足羡就此濯塵纓詩林萬選燈回鱗抱雙蒂倒鳳吐丹榮冰宇寒生暈風疏動有聲燼垂金藕細影透玉荷清斗帳依東壁誰人夢不成合璧事類外集南朝南朝人物盡清賢不是風流即放言三百年間卻堪笑絶無人可定中原後村詩話送人逰杭激激霜風吹黑貂男兒醉别氣飄飄五湖載酒期吳客六代成詩倍楚橋水樹漸青含晚意江雲初白向春嬌前秋亦擬錢唐去共看龍山八月潮咸淳臨安志古松宋趙師旻刻石在四明府治直氣森森恥屈盤鐵衣生澀紫鱗乾影搖千尺龍蛇動聲撼半天風雨寒蒼蘚靜緣離石上絲蘿高附入雲端報言帝室掄材者便作明堂一柱看至正四明續志句行人晚更急歸鳥夕無行天寒河影淡山凍瀑聲微水盡天不盡人在天盡頭草白有時榮髮白不再好人生不如春髮白不如草弋下失冥鴻網細遺巨鯤風徑香逾遠天寒色更鮮秋天買不斷無意學金錢洛渚微波常映步漢宫香水不濡肌獨步世無吳苑豔渾身天與漢宫香恥生湯武干戈域寧死唐虞揖遜區中散向人疏懶甚步兵因酒過差多以上後村詩話狄遵度遵度字元規侍郎棐之子長沙人以父任為襄城簿早卒有集遁齊閒覽狄遵度幼而聰慧弱冠為文詞氣豪友邁有韓栁之風其為歌詩每以子美為法既而人有往湘中者乃為文使之耒陽弔子美之墳數日忽夢子美與之反覆諷誦其平生所為詩十餘篇皆世所未聞者及覺倣佛可記才十餘字佳城篇續夢中作時年十六佳城鬱鬱頽寒烟孤雛乳獸號荒阡夜臥北斗寒挂枕霜拱木落雁連天浮雲西去伴落日行客東逝隨長川乾坤未毁吾尚在肯與蟪蛄論大年侯鯖録遵度慕杜子美韓退之句法一夕夢子美自誦其逸詩既覺猶記其兩句云夜臥北斗寒挂枕木落霜拱雁連天遵度因足成之數月夢溪筆談狄遵度夢中句有丘墓閒意不卒和渙之深秋月夜書事洞庭葉下涼颼颼凍天頑白凝不流圓月擬缺不忍缺輕露欲浮終未浮憶吹朱籟鳳軿上更采紫芝雲嶠陬玉樓天半幾千尺珠樹玲瓏懸上頭宋文鑑詠芭蕉植蕉低簷前雙叢對含雨葉閒求丹心一日視百俯胸中數寸赤不惜為君吐心盡腹亦空況復霜雪苦非無後凋意柔脆不足禦全芳備祖魏野臧奎陳越野字仲先號草堂居士蜀人後居陜州東郊真宗西祀聞其名遣中使召之野閉户踰垣而遁天禧三年卒贈祕書省著作郎有草堂集巨鹿東觀集澠水燕談上聞野居有幽致遣人圖之故野有句云幽居帝畫看玉壺野史魏野字仲先其詩固無飄逸俊邁之氣但平朴而常不事虛語爾如贈寇萊公云有官居鼎鼐無地起樓臺及謝寇萊公見訪云驚回一覺遊仙夢村巷傳呼宰相來夢溪筆談野以詩著當世顯人多與之遊北都有妓女美色而舉止生梗人謂之生張八野贈詩有君為北道生張八我是西州熟魏三之句晨興夜長久待得晨興耽枕僮猶喚不譍燒葉爐中無宿火讀書窗下有殘燈臨階短髮梳和月傍岸衰容洗帶冰料得巢禽翻怪訝尋常日午起慵能六一詩話此詩本是燒葉爐中無宿火或有嫌燒葉之語為貧寒太甚改葉字為藥字不惟壞此一句併下句減氣味矣閒居書事無才動聖君養拙住西村臨事知閒貴澄心覺道尊成家書滿屋添口鶴生孫仍喜多時雨經春免灌園謝寇萊公見訪晝睡方濃向竹齊柴門日午尚慵開驚回一覺遊仙夢村巷傳呼宰相來書友人屋壁曰琯按集作書俞逸人屋壁起結句小異今從方氏達人輕祿位居處傍林泉洗硯魚吞墨烹茶鶴避烟閒惟歌聖代老不恨流年靜想閒來者還應我最偏瀛奎律髓真宗祀汾陰遣使召之題此詩壁間遁去使還以詩奏上曰野不來矣先是上嘗圖种放所居野居亦有幽致又令圖之春日述懷春暖出茅亭攜筇傍水行易諳馴鹿性難辨鬬雞情妻喜栽花活兒誇鬬草贏翻嫌我慵拙不解强謀生冬日書事十月天不暖前村到豈能閒聞啄木鳥疑是打門僧壞砌平山雪空堂照瀑冰晚來因出户方始暫攜藤題普濟院河上似江邊寺臨河掩關百年人自老一閣意常閒野闊連天碧苔多遍地斑數聲離岸櫓幾點别州山寒食花藏縣重陽菊繞灣懸崖分鳥道隔水似塵寰雨急和僧語雲高共鶴攀磬聲喧水檻幡影落波瀾雁去歸汾曲槎來犯斗間冷齊如有暇到此屢開顔暮秋閒望水閣閒登覽郊原欲刈禾壞簷巢燕少積雨病蟬多砧隔寒溪搗鐘隨曉吹過扁舟何日去江上負烟蓑夏夜與臧奎陳越會宿河亭聯句三十韻雨破畏日沈月出酷暑歇野衙中河亭上靜與山不别良朋俱逺來文㑹一何悅越箕踞巾舄閒玩好琴樽列野煩禮厭拘攣陳言誓擺脫奎揮麈影參差飯菜香馥烈越酒令時解嚴談鋒久不缺野樂天無荒淫飽德異叨餮奎高談聞謔浪正義排詭譎抗俗絶依違評文無詆訐野輿論鄙譸張奴學賤剽竊奎徵引角競出聯唱更相發越較善合權衡馳義同軌轍野萬物情難逃千古疑皆決奎聖道約扶持淫辭謀劓刖越風鑒定妍媸天機藏巧拙野是物有廢興惟道無本末奎義路自坦夷世途終兀臬越烈士死光輝常徒生汨沒野逸義小風雲直筆輕斧鉞奎孟軻心不動陶潛腰恥折越疲倦僕屢更輝映燭頻跋野浩歌不成調狂舞寧赴節奎氣候隨斗占分野為星别越蛬韻時斷續漁燈乍明滅野河聲疑地震電影若天裂奎飄風奪輕紈零露透疏葛越酒海傾屢空詩源浩不竭野咸平己亥嵗二年時六月奎此㑹是何人其名野奎越越以上巨鹿東觀集貽王魏公旦人間宰相惟三載君在中書十四年西祀東封俱巳了好來平地作神仙蒙齊筆談天禧末王魏公求退不許野寄以詩魏公亟袖以聞遂得謝題壁絶句誰人把我狂詩句寫向添蘇繡户中閒暇若將紅袖拂還應勝得碧紗籠續湘山野録魏處士貌寢性敏志節高尚鳯閣舍人孫僅與野敦縞素之舊尹京兆日寄野詩說府中之事野和之其末有見說添蘇亞蘇小隨軒應是珮珊珊之句添蘇長安名姬也孫頗愛之一日謂添蘇曰魏處士詩中以爾方蘇小如何添蘇曰處士詩名藹于天下著鄙薄在其間是蘇小之不如矣又何方之乎孫大喜以野所和詩贈之添蘇以未見野深懷企慕求善筆札者大署其詩于堂壁夸鬻于人未幾野抵長安好事者密召過添蘇家不言姓氏添蘇見野風貌魯質固不前席野忽舉頭見壁所題添蘇曰魏處士見譽之作野殊不答乃索筆于其側别紀一絶添蘇知是野大加禮遇清明無花無酒過清明興味蕭然似野僧昨日鄰翁乞新火曉窗分與讀書燈合璧事類前集尋隱者不遇尋真誤入蓬萊島香風不動松花老採芝何處未歸來白雲滿地無人掃古今詩話句千林蠹如盡一腹餒何妨庚溪詩話仲先詠啄木鳥句司馬溫公頗稱之吉凶終在我翻覆謾勞君竹杯珓同上棊退難饒客琴生卻問兒雁急長天外帆遲落照中五色中偏貴千花後獨尊菊以上後村詩話林逋逋字君復錢塘人隱西湖之孤山真宗聞其名詔長吏嵗時勞問卒賜諡和靖先生有集歸田録逋工于書善為詩如梅花詩云疏影橫斜水清淺暗香浮動月黃昏評者謂前世詠梅者多矣未有此句也及其臨終為句云茂陵他日求遺稿猶喜曽無封禪書尤為人稱誦自逋之卒湖山寂寥未有繼者恙范文正公亦過其青箱雜記逋景祐初尚無廬贈逋詩曰巢由不願仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此山村冬暮衡茅林麓下春氣巳微茫雪竹低寒翠風梅落晚香樵期多獨往茶事不全忙雙鷺有時起橫飛過野塘宿洞霄宫大滌山相向華陽路暗通風霜唐碣朽草木漢祠空劒石苔花碧丹池水氣紅幽人天柱側茅屋灑松風秋山不可盡秋思亦無垠碧澗流紅葉青林點白雲涼陰一鳥下落日亂蟬分此夜芭蕉雨何人枕上聞西湖混元神巧本無形匠出西湖作畫屏春水淨于僧眼碧晚山濃似佛頭青欒櫨粉堵搖魚影蘭杜烟叢閣鷺翎往往鳴榔與橫笛斜風細雨不堪聽湖上初春偶作梅花開盡臘亦盡晴暖便如寒食天春色半歸湖岸寺人家多上郭門船文禽相並映短草翠瀲欲生浮嫩烟幾處酒旗山影下細風時已弄繁弦酬晝師西湖春望笛聲風暖野梅香湖上憑闌日漸長一樣樓臺圍佛寺十分烟雨蔟漁鄉鷗橫殘葑多成陳栁映危橋未著行終約吾師指芳草靜吟閒步岸華陽梅花衆芳搖落獨暄妍占盡風情向小園疏影橫斜水清淺暗香浮動月黃昏霜禽欲下先偷眼粉蝶如知合斷魂幸有微吟可相狎不須檀板共金尊吟懷長恨負芳時為見梅花輒入詩雪後園林才半樹水邊籬落忽橫枝人憐紅豔多應俗天與清香似有私堪笑羌人亦風味解將聲調角中吹詩話總龜黃山谷云歐陽文忠公極賞林和靖疏影橫斜水清淺暗香浮動月黃昏之句而不知和靖别有詠梅一聨云雪後園林才半樹水邊籬落忽橫枝似勝前句文章大概亦如女色好惡止繫于人詠蝶細眉雙聳敵秋毫荏苒芳園日幾遭清露宿花應自得暖風和絮欲爭高情人歿久魂猶在傲吏齊來夢亦勞閒掩遺編苦堪恨不并香草入離騷深雪偶談精緻不減唐人頃得宛陵葛生所茹筆每用之如麾百勝之師橫行於紙墨間所向無不如意惜其久且弊作詩以録其功神鋒雖缺力終存架琢珊瑚缺䇿勳日暮閒窗何所似灞陵憔悴故將軍以上和靖詩集茗溪漁隱叢話殊有憫勞念舊之意制誥李舍人以松扇二柄并詩為遺亦次來韻編松為箑寄山中兼得紫薇詩一通入手涼生殊自慰可煩長聽隱居風孤山雪中寫望片山兼水繞晴雪復漫漫一徑何人到中林盡日看逺分樵載昨蓋切重斜壓葦叢乾樓閣嚴城寺疏鐘動晚寒孤山從上人林臺寫望林表秋山白鳥飛此中幽致世還稀誰家岸口人烟晚坐見漁舟兩兩歸送史殿省典封川炎方將命選朝倫治行何嘗下古人擁斾肯辭臨逺郡登艫還喜奉慈親水連芳草江南地烟隔寒梅嶺上春若過中塗值歸雁慰懷能與致音塵春日齊中偶成空階重疊上垣衣白晝初長社燕歸落盡梅棠人臥病春風時復動齊扉江村銷夏録載五詩真迹跋云殿直丁君自沂適閩檥舟惠顧晤語未幾且以拙詩為索病中援筆勉書數章少塞好事之意耳時皇上登寶位嵗夏五月孤山北齊手書林逋記句隱非秦甲子病有晉春秋水天雲黑白霜野樹青紅風回時帶笛烟逺忽藏村後村詩話五言尤難工林和靖一生苦吟自摘出十三聯今惟五聨見集中如句云云皆不在焉唐異異字子正朱長文琴史唐處士子正才藝甚高肥遁不出李西臺建中時謂善書而子正之筆實左右之江東林逋亦稱墨妙一見而歎曰唐公之筆老而彌壯崔諭德時謂善琴而子正之音嘗唱和焉高平范公從而師之嘗貽之書曰崔公既沒琴不在兹乎二妙之外尤嗜風雅探幽索竒不知老之將至意淳語真不為憤惋文正公嘗稱其如此閒居書事幽居經宿雨屐齒遍林塘一徑無過客千峯自夕陽晝禽多獨語夏木有餘涼招隱書慵寄時清誰肯忘宋文鑑韓退退字知止絳州人絶句山下跨雪精上便不論程嗅地打不動笑天休始行溫公續詩話韓退處士絳州人放誕不拘浪跡秦晉間以詩自名嘗跨一白驢有詩云云好著寬袖鶴氅醉則鶴舞石曼卿贈詩曰醉狂𤣥鶴舞閒臥白驢號黃亢亢字清臣浦城人有東溪集宋史新編亢年十五以文謁翰林學士章得象得象竒之遊錢唐以詩贈處士林逋逋尤激賞時王隨知杭州奏禁西湖為放生池亢作詩數百言士人爭傳之臨水人生朝復暮水波流不駐去年昨日水今日到何處惆悵雨殘花嫣紅隨水去花落水東流識盡人生事一作趣宋文鑑荆溪林下偶談文鑑載黃亢臨水詩云去年昨日水今日到何處蓋蹈襲杜牧題安州浮雲樓寄湖州張郎中云當時樓下水今日到何處令狐揆揆字子先安陸人句借書離近郭冒雪渡寒溪王得臣麈史令狐子先安陸鄉先生也筮仕齊安理掾嵗滿還里卜築溳溪之南耕釣之外著書彈琴而巳時入城至集賢張君房之第借書布衣林逸善繪事乃擬摩詰寫浩然故事以為令狐秋掾雪中渡鄖溪圖其序略曰張侯畜書萬卷掾嘗就閲或假輟以歸兼出入跨羸馬頂戴華陽紗巾著墨慘布裰繫絛小童攜書簏負琴以隨冬中復來假書時值微雪飄灑景物蕭索掾渡溪以歸常服外加以皂繒暖帽委轡長吟曰借書離近郭冒雪渡寒溪聞者毛骨寒聳是知至人操履倬越風韻體裁乃與天地四時之氣相參焉先生諱揆云高言言字明道汴人呈友人昨夜陰風透膽寒地爐無火酒瓶乾男兒慷慨平生事時復挑燈把劒看青瑣高議段全全與丁謂同時人稱段推官句斜搊花腳面闊大打亷搋上官融友㑹談叢段全薄有才思不拘細行歷幕席浪别陜右務嘲誚取悅于人雷掾丁謂好蹴踘既貴後亦為之全撰鞠詩二十韻以獻內有句云云稱為中的張仲威仲威官舒州守設醮靈仙觀瑞氣蔥蔥雨露邊璧門金闕倚層巔青霓絳節嚴中夜緑蓋丹輿㑹九天香染舊泥封寶洞聲傳鳴鶴湛靈泉分明步入烟霄上何必餐霞駐少年宋藝圃集廖齊永州有感下馬連聲叩竹門主人何事感遺恩回頭泣向兒童道重見甘棠舊子孫青瑣後集廖齊父爽直嘗為永州刺史齊後遊零陵于民間見父題壁感而成詩周序經少陵墓在鞏縣杜陵詩客墓遙倚北邙巔斷碣居人識高名信史傳猿聲悲落照樹色翳寒烟唯有文章在輝光夜燭天河南府志宋詩紀事卷十
