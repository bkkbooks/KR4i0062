body:
  text: 宋詩紀事卷六十九錢塘厲鶚撰歐良良南城人官司戶劉後村序其詩句璧固君所奇鏡亦妾所惜乍可返君璧妾鏡不可得雜興紅黃冬樹葉紫翠夕陽山後村題跋黃升升字叔暘號玉林胡季直云玉林蚤棄科舉雅意讀書閒從吟咏自適游受齊嘗稱其詩為晴空冰柱樓秋房聞其與魏菊莊友善併以泉石清士目之游金精山在贑州寧都縣道書三十五福地漢女仙張麗英生有異質長沙王吳芮强委禽焉麗英乘雲空中語人曰吾金仙之精降治此山言訖沖天而去曳履江城北逍遙訪仙鄉掃卻千里恨愛此六月涼雲根埋宿雨木末酣斜陽峭崖列嵒竇老樹攀穹蒼地坼三關暗天開一隙光青霄麗太白應此金之芒雙桃幾日熟冷笑癡吳王洞開人已去剛風舞霓裳仙凡本相近此理自可量學詩未學仙凡骨生慚惶金精風月吳汝式汝式字伯成旴江人有雲卧詩集游石仙分韻得觀字閒攏兩袖秋步入沖寂觀古樹老雲中仙居毁巖半是時零雨高葉脫西風亂怪禽走何忙澀水流不漫那知張郎仙譎幻敢懸斷雷書貯紅崖愚下浪傳贊符碑儻長靈鬼物豈歌喚尚云劒埋山安得急推斷冷翁亦張徒精氣不如散死坐豫樟空鑿竅競窺看何不葬山原不然棄江畔烏鳶與螻蟻豈食吾一貫獨流天地閒萬古亘光燦神仙固渺茫此事良可惋忍哉偷兒狂更搗泥腹爛我來擬少休亭壓不敢玩黃冠三四人拙野只欲竄延坐無好言令我住涼館飯餘且從觀逸興薄霄漢琴鳴著高彈奕勝出奇算嘯咏壺隱樓撫事發長歎大書同人名聊欲記遊玩陰霾淰輕寒日色倏昏晏倩人買村醪煮芋疊肴案清坐二更深一睡各鼻鼾曉來登巖頭棘路解羈絆劃開天蓋寬遠景過飛翰幽叢摘新查窺險身發汗居然束歸裝重下西巖畔我思古之人豈只局窮閈觀海登泰山深高世閒冠斯巖雖荒榛樂事實昭煥人心本然同今古未容判終當駕風雲高蹈無畔岸作詩示兒童兹游吾豈憚雲卧詩集李顯卿溪行枯朩扶疏夾道旁野梅倒影浸寒塘朝陽不到溪灣處留得橫橋一板霜後村千家詩陳天錫絶句舍南舍北雪猶存山外斜陽不到門一夜冷香清入夢野梅千樹月明村東臯雜録劉祖尹祖尹字怡堂義烏人題石壁精舍結廬投老瞰羣峯隱隱松杉曲徑通剩種池邊千纛竹近營林下一巢風攲眠盡絶春來夢趺坐閒看月墮空檢點吾生婚嫁了子孫無事惱衰翁義烏縣志劉仕龍仕龍字時甫祖尹子知廉州知廉州條上邊事落職主管台州崇道觀賦感人生百年中窮通無定跡譬如風前花榮謝亦頃刻當時牧牛豎尊貴誰與敵憔悴種瓜翁乃是封侯客丈夫茍得時糞土成拱璧一朝恩寵衰黃金失顔色古今諒皆然我獨何歎息義烏縣志曹既明過林和靖舊址短棹不歸雙鶴去一丘烟草寄山陰水邊疏影黃昏月無限風騷在客心有懷湖山留題惠因院湖山平生鄰松竹亦瓜葛深期說情話跬步成契闊豈無朝夕思或以塵纍奪何當淡相從長年席不割冷泉亭朱簷日轉軒窗上碧嶂雲低草樹香山影倒沈波底月夜闌相對瀉寒光與同舍待浴靈芝寺中一雨洗秋色湖山增眼明翻翻水中荷作此凄涼聲我輩本憔悴客飯千里程願言滌塵土冠蓋臨華京夜宿浙江亭夜半潮聲撼客牀卧聽柔櫓鬧空江驚回倦枕鄉關夢海日烘山上曉窗以上咸淳臨安志吳珩龍興寺在昌化縣千頃山松檜陰中六月清異花靈草不知名客從瓊液山頭過人在水晶宫上行千尺翠嵐分月色一軒寒籟動秋聲登臨不厭躋攀峻貪看雲從舄下生梵安院在昌化縣石筍山山腰小徑細如繩山鳥關關喜弄晴黃菊有情留客醉白雲無事伴人行野流合處堪分字草藥枯來欲問名回首渡頭詩思逸漁舟一笛晚風清以上咸淳臨安志黃文雷文雷字希聲旴江人有看雲小集晚立獨游得荒蹊晚意與心㑹水聲遠才聞山色靜可對鳥語林塘邊犬吠籬落外柴門未須關月在東峯背西域圖大哉天地間品類不可齊誰為好事人貌此縣度西松花瑣碎沙草肥是閒可牧羊千蹄可憐羣鹿正走險或爾剝割衣其皮啜湩樹樺尚有理穴𩕳插齒吁何為吾聞中原全盛時重譯四走朝京師懷方象胥飭乃事幻人詭伎何能奇還君此畫雙涕洟願賦周官王㑹詩二橋圖翔龍下卷江東土孫郎初得橋家女橋家本是重曹瞞隻雞斗酒空酸楚襟情正用留阿瑜尚得人前稱肺腑百年王氣竟銷沈妙寫丹青嬌欲語香閨搦管記何書並蒂芙蓉按花譜那知不是未嫁時本末無從勘彤史詞人多事管閒愁銅雀紛紛底歌舞儘强被髮向黃壚只與東阿傳洛浦昭君行并序自石季倫始賦昭君曲以後作者寖多不容措手每恨沿襲之誤作漢初和親意著詠非也又按竟寧元年呼韓邪既壻漢氏其年五月宫車晏駕矣因併著之不惟袪詞人之失亦以解昭君於地下云君不見未央前殿羅九賓漢皇南靣呼韓臣無人作歌繼大雅至今遺恨悲昭君內殿春閒鬬馮傅掖庭新花隔烟霧嫖姚枉奪燕支山玉顔竟上氊車去人生流落那得知不應畫史嫌蛾眉癡心只恐琵琶語歸夢空隨鴻雁飛穹廬隨分薄梳洗世閒禍福還相倚上流厭人能幾時後來燕啄皇孫死野狐落中高臺傾宫人斜邊曲畤平千秋萬嵗總如此誰似青冢年年青往年因讀嶽王傳嘗為之賦今過東林睹其遺像感而申頌之欲壞長城豈自由江人重唱白符鳩熏天富貴還須盡從古忠良類若讎獄吏但能書牘背相公終欲割鴻溝書生志念閒無用長想朱雲地下遊冬郊冬郊見初晴空林夕陽暖歸牛無人驅欲涉行轉緩新稿明屋山失喜雀爭喚絶勝門外人流冗及嵗亂以上看雲小集胡仲參仲參字希道清源人有竹莊小稿晚雨勃姑鴉舅叫樓西春色陰晴景不齊濃墨四垂收不起明邊一片夕陽低雪晴泛湖雪後湖清淺令人心眼開林疏知寺近冰合礙舟回寒色欺吟鬢斜陽入酒杯山行已清絶況復是尋梅過永春縣距城才百里世路便難平碣石唐人墓桃源晉地名危譙依嶽勢荒市帶溪聲往日罹兵火頽垣蔓草生寒夜作生計尚茫茫微吟思故鄉羈愁消不盡寒夜未為長門掩梅花月禽翻竹葉霜挑燈裁錦字明發有歸航和伯氏春雨中韻兩隄楊柳拂新亭怪底遊人懶踏青手撚梨花成小立半窗湖水雨冥冥以上竹莊小稿陳伯山伯山號東湖寓客同廖繼道游洞霄勝日事幽尋乘興從所適西風飄杖屨偶作洞霄客穿雲渡澗岡捫蘿轉空碧七人今何在九鎖峯巒密黃冠喜我輩傾懷論宿昔汲泉煮山苗異氣穿几席區區名利人到此塵機息洞霄詩集程以南以南理宗朝官祕閣校理苕溪晚泊一笑苕溪上微茫駐日曛鷺沙行個字魚浪出圓紋晚色三家市秋容幾樹雲行藏知有分莫誦北山文湖州府志杜東東字晦之號月渚緑珠以色危身豈不知甘心死别不生離樓前甲士紛如雪正是花飛玉碎時平山堂平山堂下水雲重孤笛凄涼淡月中不見龍蛇飛素壁只餘狐兔戍離宫仙翁己去風流盡世事俱隨夢幻空廣武無人同此意慨然止有淚臨風以上詩家鼎臠何宋英題六和塔下秀江亭吳國山迎越國山江流吳越兩山間兩山相對各無語江自奔波山自閒風帆烟棹知多少東去西來何日了江潮淘盡古今人只有青山長不老咸淳臨安志薛師魯師魯鄞人官郡判苦雪六出夫何甚經旬散野堂喜心翻作厭瑞物恐為殃嵗晚思薪火天寒望太陽荒村風雪裏賴有隔年糧甬上耆舊集陳俞雨後過瑪瑙寺借屋傍精廬無事數來往披草通泉流刻樹記筍長微風四山落小立領松響詎名息諸緣暫喜脫塵網咸淳臨安志潘中父題釣臺焚坑禍作逃園綺明哲保身寧餓死溺冠漫罵又一秦織畚鼓刀恬不恥子房託疾封留歸齊魯大臣那可比此意寥寥二百載阿諛往往居帝師中興天幸有光武下士謙恭冠千古布衣本以道義交不問故人登九五朅來過我路幾程征衫猶作戰血腥睡餘伸腳稍加腹安得細事關天星歸歟宜審苞桑戒勿念潔身增感慨君持大柄理乾坤我把絲綸老湍瀨釣臺集李時途中遇雪天寒鴉欲棲客路尚遲遲泥滑寒驢澀風斜破帽攲雲藏山斷絶梅苦雪禁持客裏愁無著愁邊卻有詩後村千家詩吳季先季先臨川人遊梅壇有感小立仙壇挹斗箕著身高處覺天低南昌吏隱清風在喚醒時人一枕迷梅仙事實陳亦梅梅花江郊車馬滿斜輝爭赴城南未掩扉要識梅花無盡藏人人襟袖帶香歸全芳備祖聞人祥正宫詞集句春風院院落花堆花氣濃熏入酒杯日午殿頭宣索鱠小舟撐出柳陰來王建鄭獬花蘂夫人徐師川珠簾約住牡丹風金殿香消翠綺櫳應作巫陽春夢句日高猶睡緑窗中宋景文白居易李商隱晏叔原珠箔輕明拂玉墀漢宫仙掌露淋漓金叉墜鬢分行立等候官家未出時李商隱人文潞公花蘂夫歐陽公學畫蛾眉獨出羣越羅巴錦不勝春承恩數上南薰殿無奈宫中妒殺人潘閬千張曙後村家詩杜甫李白黃祖潤祖潤官戶曹有和劉潛夫百梅絶句梅花天籟消沈斗柄斜繞枝忽起護巢鴉素娥青女新梳洗來鬬寒梅半夜花林間翠羽啄枯槎邂逅孤笻次水涯飛過小溪留數語殷勤報有隔橋花後村題跋黃鑄鑄字亦顔號乙山曰璐按絶妙好詞作晞顏贄見洪師風烟入暝少人行獨鶴來依帝子城華表柱頭霜月冷獨贏清夢到鐘聲詩家鼎臠趙愚齊客中清明紅塵烏帽寄他鄉欲語春愁帕斷腸惆悵清明歸未得借人門戶插垂楊梅澗詩話陳琰琰字粲山題二陸祠塵暗香殘二俊祠可憐詞藻妙當時聨鑣入洛成何事一段凄涼鶴不知梅澗詩話郭君舉天聰洞混沌何年鑿天聰亦强名我疑龍窟宅人說鬼經營梯向巖邊接雲從洞裏生此行頑健甚腳力十分輕雁山志龔桂馨題桃花源碧樹花開醉晚春靈槎幾度泛天津可憐太守仙緣薄不是衣冠不屬秦桃花源集金子潛子潛休寧人潭州司戶雲巖丹崖何突兀與客共躋攀一嘯九天闊斷雲千古閒杖行龍虎背袖拂斗牛間願言覓刀圭乘風弄羽翰齊雲山志王月浦荷花雨餘無事倚䦨干媚水荷花粉未乾十萬瓊珠天不惜緑盤擎出與人看瓊花蕃釐觀裏瓊花樹天地中閒第一花此種從何探源委東風無處著繁華千鬚蔟蝶團清馥九萼聨珠異衆葩幾見朱衣和露翦金瓶先進帝王家以上全芳備祖程元嶽元嶽字申甫歙人理宗朝官工部侍郎雲巖直上雲巖絶頂峯始知塵世有仙蹤懸崖蘚潤經年雨滿地花飄昨夜風日月往來蒼翠杪烟霞舒卷畫圖中瑤臺禮罷笙簫歇萬壑松聲自羽宫齊雲山志薛師石師石字景石永嘉人有瓜廬詩東閣趙汝回序云瓜廬翁每與四靈聚吟獨主古淡融狹為廣夷鏤為素神悟意到自然清空荆山劉植跋云瓜廬耕釣于㑹昌湖上多肥遁之辭舒性情之正得象外之趣酌繩尺之嚴瓜廬近來有新趣買得薛能園疏壤延瓜蔓深鋤去草根花前長載酒月下只開門最識田家樂辛勤更不言漁父詞鄰家船上小姑兒相問如何是别離雙墜髻一彎眉愛看紅鱗比目魚春融水暖百花開獨棹扁舟過釣臺鷗與鷺莫相猜不是逃名不肯來題南塘薛圃門對南塘水亂流竹根橘柢自成洲中間老子隱名姓只聽漁歌今白頭送葉宰赴豐城君往為官處江西冦已平獄閒空劒氣堂靜響琴聲有法催常稅無私得衆情時方急賢路名定逹公卿大龍湫昔聞天下士衡嶽稱崇丘又聞天下水江漢為巨流古有山海經歷歷敘九州李唐三百載詩書無一留及觀酈道元此地亦不收不知諾矩那何事能窮搜我來𤣥妙境萬丈懸清湫石壁去無極百里彌道周雲氣冒羣岫龍宫深以幽輕輿巖壑底竟日涉溪游陰晴異瞻矚遠近難搜摟飄如飛素練粲若散琳璆風掀一潭雨佛坐四時秋喧呼勢益驟洶湧聲彌遒變化有如此溥博誰與儔吾謂神龍力豈繄人鬼謀稽首荷元遇久坐勞雙眸一杯卻嵐暑旋步轟雷稠以無淡世慮歘起杞人憂何當騎天狼滿引射斗牛以上瓜廬詩句半洞容千佛諸峯共一雲游雁山泉涌龍頻躍山靈鳥不來石橋瓜廬詩王汶跋李炎子炎子號竹溪定王臺長安輦土築高臺帝子規模亦壯哉世事幾經羊胛熟邊愁多趁鴈聲來城頭煙樹旌旗合柳外雲山水墨開萬里乾坤歸老眼不堪西望正風埃詩林萬選徐寶之寶之理宗時貢士句炊熟風瓢動吟歸雪硯枯盡日飛花急隔溪芳草深後村題跋黃大受大受字德容南豐人有露香拾稿鄭安晚跋云黃君詩如行㵎谷秋空月曉松竹策策有聲再世屈于右階㑹有知者其勿督過一丁字油口夜飲醉卧一室及覺三鼓矣秋夜新冷雨溼蟲鳴展轉不能成寐於是浩然有歸志一榻翛然著醉儂沈沈清夜大槐宫夢回作惡酒氣重枕上不眠歸興濃點滴落階添悶雨凄清繞壁訴寒蟲計行良未成端緒何處高樓撞曉鐘寧化白水磜雪瀑從天下餘流亦建瓴雙崖逼秋氣九地殷雷聲虎穴山川險蛟涎草朩腥負鹺由此徑異日不堪行枝江九日簡周宰日車不照出郊車門外天陰雲尚粗青州未有居士供白衣知是誰家奴江山有恨橫饑眼萸菊無情對卧壺贏得閒關吟苦句定無人敢喚催租以上露香拾稿葛起耕起耕字君顧丹陽人有檜庭吟稿記夢綺寮縹眇敞虛明鵠峙鸞停護碧城珠蘂一枝春共瘦玉環雙佩月同清曾題洛賦緘新意卻拊湘弦寄遠情十二䦨干風細細覺來依約記棊聲次子泉韻月轉庭花玉一䦨寶叉不卸待郎看丁香擬結相思夢無奈東風作社寒樓上樓上何人吹玉簫數聲和月伴春宵斷腸喚起江南夢愁絶寒梅酒半銷宫詞銀漏疏風透玉屏碧梧枝上雨三更依稀似寫華清恨雲冷香消夢不成以上檜庭吟稿陳子豫秋思柳岸風條頓老橘林露葉猶香門對一天秋色人行十里斜陽詩家鼎臠薛泳泳字叔似一字沂叔天台人游洞霄宫羣山皆玉立中有一峯危天近秋容薄松深夜月遲洞因尋藥入席為聽泉移此趣無人㑹臨風酒一巵洞霄詩集句柳斷橋方出烟深寺欲浮新堤小泛歸心如病葉一片落江城早秋歸興深雪偶談馬宋英宋英溫州人以畫名游淨慈寺寫古松于壁因題磨出一錠兩錠墨掃出千年萬年樹月明烏鵲誤飛來踏枝不著空歸去圖繪寶鑑丁大全丞相賞其詩畫急命索之人忌其能閟不令出卒不遇楊潛題釣臺遐想當年隱富春生涯只寄一絲綸幸逢白水為真主肯向青山訪故人試問勒功依日月何如占象動星辰回頭四七皆陳迹獨有先生迹未陳釣臺集黃宜山題竹閣移自孤山占北山荒涼老屋萬琅玕櫻桃楊柳空花夢千古清風滿閣寒題和靖墓墳邊疏影尚橫斜鶴老苔荒處士家獨立東風難著語只攜樽酒酹梅花以上咸淳臨安志李仁本仁本號裕齊桂殿秋辭飛翠蓋走籃輿亂山千疊為先驅洞天迎目深且窈滿耳天風吹步虛洞霄詩集陳元鑑元鑑號東㵎金陵懷古英雄戰守幾春秋虎踞龍盤古石頭北固只憑江水在中原長對夕陽愁曹劉漫有經營志王謝空遺富貴羞舉目便懷千古恨鳳凰臺上不須游詩家鼎臠沈說說字惟肖龍泉人有庸齊小集紙衾繭靣新乾帶露揉春回斗帳伴吟愁殘年已辦蒙頭過風雪從教打戍樓溪樓心遠俗塵隔樓高野興多稻花黃雀雨山影白鷗波灘澀推船上橋危挽客過日斜闌倚遍無句奈愁何馮公嶺曉上馮公嶺艱難見客情雨和殘葉落身逐亂雲行野店山腰出秋泉石罅生若將世途比此路更為平晚春白頭何計是生涯日日尊前卧落花緑滿池塘無一夢夜來風雨過誰家以上庸齊小集魯應龍應龍字子謙嘉禾人有閒窗括異志題飛星石錦石雙飛下翠微忽看移入小巖扉靈光夜靜歸山徑翠影秋寒上佛衣滇海始知鯨欲動零陵不獨燕能飛只今五色曽何補自採奇峯築釣磯閒窗括異志陳山觀音殿曩年忽有兩石從半山鬬墜而下一從殿後壁滾入大士座下一墜殿之西屋瓦無損不知從何而入今二石尚存留題者甚多余乙卯嵗到祠下嘗賦于壁以記其事云李堅題宜興沖寂觀玉兔朝天去不回空餘露井薦晨杯屋鈴不語明如掌無復凌波逸士來咸淳毗陵志沖寂觀在縣西北六十里唐周長官所居井有白兔升天拾為觀南唐隱者許堅至此浴滆湖履波而逝李堅詩云云邵梅溪梅溪錢唐人曹娥江客舟艤盡江頭月忍聽寒潮聲哽噎那知江上無情波總是曹娥眼中血娥江題詠宋詩紀事卷六十九
