名子刺賈似道八十四巻花蕊夫人奉詔詩不以勾延慶錦里耆舊傳互勘八十六巻李煜歸宋渡江詩不以馬令南唐書㕘証八十七巻永安馹題柱詩不引後山集本序而稱名媛璣囊又華春娘寄外詩不知為唐薛濤十離之一陸放翁妾詩不知為劍南集七律之半皆失於考證然全書網羅賅備自序稱閲書三千八百一十二家今江南浙江所採遺書中經其簽題自某處鈔至某處以及經其㸃勘題識者往往而是則其用力亦云勤矣考有宋一代之詩話者終以是書為淵海非胡仔諸家所能比較短長也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀宋詩紀事原序宋承五季衰敝後大興文敎雅道克振其詩與唐在合離閒而詩人之盛視唐且過之前明諸公剽擬唐人太甚凡遇宋人集槩置不問迄今流傳者僅數百家即名公鉅手亦多散逸無存江湖林藪之士誰復發其幽光者良可歎也予自乙巳後薄游䢴溝嘗與汪君祓江欲效計有功搜括而甄録之㑹祓江以事罷去遂中輟幸馬君嶰谷半槎兄弟相與商𣙜以為宋人詩考訂尚有未當如胡元任不知鄭文寶仲賢為一人注蘇詩者不知歐陽闢非文忠之族方萬里不知薛道祖非昻之子以至阮閎休所紀三李定王伯厚所紀兩曹輔之類非博稽深訂烏能集事因訪求積巻兼之閱市借人厯二十年之久披覽既多頗加汰擇計所抄撮凡三千八百一十二家畧具出處大槩綴以評論本事咸著於編其於有宋知人論世之學不為無小補矣部帙既繁恐歸覆瓿念與二君用力之勤不忍棄去暇日釐為百巻目曰宋詩紀事鏤板而傳之庶幾後之君子有以益我紕漏云時乾隆十一年嵗在柔兆攝提格陽月望樊榭厲鶚太鴻序
