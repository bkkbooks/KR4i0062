body:
  text: 宋詩紀事總目詩文評類卷一太祖皇帝太宗皇帝真宗皇帝仁宗皇帝神宗皇帝徽宗皇帝髙宗皇帝孝宗皇帝光宗皇帝理宗皇帝度宗皇帝瀛國公憲聖慈烈吳皇后恭聖仁烈楊皇后鄆王楷卷二范質王溥趙普李昉王易簡陶穀曹翰張昭符彥卿盧多遜李濤楊昭儉趙逢王著許仲宣蘇德祥趙文度郭從義何承裕賈玭李鑄師頏李若拙梁周翰韓浦周渭宋白安鴻漸畢士安李九齡柴成務孫光憲王紳歐陽詹耿仙芝談用之栁開張觀劉能王嗣宗劉兼李至黃台吕端范杲楊徽之卞震孟貫竇儀卷三幸夤遜徐鉉吳淑秦南運張洎張佖邵拙劉吉龔穎潘慎修羅穎孟歸唐黃夷簡錢惟治張在傅霖陶彞張齊賢吕蒙正李虛已曹衍何蒙韓丕田鍚王旦李沆蘇易簡樂史向敏中宋湜戚綸劉昌言李巽李建中趙昌言臧丙鄭起馬去非王承衎陳文皓穎贄宋溫舒李頌盧嶽許道寧陳省華夏侯嘉正卷四姚鉉歐陽程王禹稱羅處約鄭文寶曽致堯寇準李含章何承矩王操潘若沖王周錢熙陳彭年劉師道陳世卿錢若水孫冕焦宗古朱嚴李拱趙復陳詁胡則陳堯叟曾會盛度陳堯佐劉少逸孫周翰張秉卷五陳從易梅詢吳簡言古成之楊正倫孫何趙湘張士遜錢昆吕言謝濤高紳郭震路振危拱辰王嵒田霖賈黃中王欽若胡旦滕白錢昭度范唐公王著曾璉吕文仲吕祐之楊允元潘閬湯悅李度郭忠恕陳摶楊朴葛守忠伍彬凌景陽卷六西崑體楊億錢惟演劉筠李宗諤陳越李維丁謂刁衎任隨劉隲張詠舒雅錢惟濟朝迥崔遵度劉秉薛映卷七孫僅李慶孫錢易李堪陳堯咨邵煥李永鄭戩許式王曙許洞王曾陳亞章得象李冠王貽永李迪晏殊晏穎張及郎簡鮑當江任黃覺周啓明戚維孫元方錢丕盛元青陽楷髙覿卷八杜衍畢世長馮平王渙朱貫曹修古曹修睦葛宫蕭貫程琳司馬池燕肅蔣堂蔡齊黃鑑謝絳范仲淹滕宗諒王益詹中正田況种放黃康弼李湛龍昌期蘇為賈同方仲荀陳綱趙宗萬卷九蘇耆王初任玠魯宗道賈昌朝王贄蘇紳王逵鄭修余弼曹汝弼宋綬薛奎龐籍陳執中夏竦張瓌畢田穆修張觀薛田王隨掌禹錫王洙吕夷簡范雍王奇楊偕卷十李淑朱巽成鋭林坰李畋程戡靳宗王景解程黃垍姚渙田瑜髙惟幾張靖范諷石延年狄遵度魏野臧奎陳越林逋唐異韓退黃亢令狐揆髙言段全張仲威廖齊周序卷十一宋庠宋祁吳感吕造胡宿尹洙曾易占謝伯初葉清臣余靖曾公亮黃孝先孫甫周元明張方平王琪余良肱韓琦包拯吳奎趙抃王陶龔宗元丘濬吳育王含章孫抃彭應求卷十二阮逸張維唐詢王拱辰歐陽修顏太初章傪葉綱何永錫陶伯宗梅摯富弼文彥博席汝言王尚恭劉几馮行已趙丙王謹言楚建中張燾張問劉槩張望劉沆陳希亮魏兼畢京曹經陸軫魯交齊唐張先李之才孫復石介卷十三元絳刁約朱公綽蔡襄王素彭思永趙師民范師道滕涉孔道輔唐介李師中魏瓘熊知至趙槩郭稹陸經周鏞曾諤郭亢張唐卿楊察鄭伯玉何剡程師孟丁寶臣栁永馬遵吕璹仲訥楊諤吳中復陳薦劉述葛密元積中董淵劉嗣隆卷十四蘇舜欽江休復李絢王益柔張羣鮮于侁吕溱范鎮蘇緘司馬光石揚休吕公著吕公弼趙衆張徵吳充宋敏求薛利和栁應辰邵必裴若訥卷十五李大臨周孟陽閻詢林億張宗永雷簡夫元居中蘇頌王安石栁瑾陳洙毛維瞻王圭石象之石聲之黃庶向宗道韓欽聖句龍緯賈宗諒卷十六蘇寀吕夏卿陳襄連庠李觀許當石蒼舒胡恢姚嗣宗俞汝尚賈黯季康伯張去惑王介劉敞劉攽裴煜錢顗劉彞胡楚材楊蟠孫永袁陟謝景初卷十七強至句士良陳舜俞王存韓絳韓維韓縝邵亢張掞丁偃郟修輔張師錫楊備張俞蘇麟王沖霍交任大中邢夢臣白贄石景立劉孝孫張球郭從周郟僑陳翥卷十八馮京沈遘祖無擇沈遜陳詵蕭亢宗張徽羅誘閻珣宋攄陳闡張公庠盧秉孫覺李育錢公輔馮浩吕誨趙君錫姚闢范純仁王辟疆王霽馮介楊希元張湍薛繗楊咸章楊損之任傑楊武仲吕陶葛琳周敦頤郭獬王吉周圻安昌期趙抗揚卷十九楊繪謝景溫吕大防李覯張唐英裴大亮鄭炎鄭獬滕元發陳汝義韋驤蒲宗孟錢藻李先吳處厚李常馬雲顧臨胡瑗王疇陳洎蘇舜元陳侁管師復卷二十傅堯俞李清臣蔡挺章望之蘇洵胡歸仁李宗易張伯玉張鑄梅堯臣張獻民吳季野栁紳陳若拙曾鞏曾布曾孝寬馬端祖世英卷二十一蘇軾蘇轍蘇隨方仲謀黃履蔣之翰蔣之奇丁隲呂惠卿許廣淵王韶張載林希馮山趙衮鄧潤甫田開趙挺之范百祿楊壽祺李時亮卷二十二王觀李渤郟亶王回呂大鈞黃通劉輝豐稷朱長文胡宗愈章惇張芻陸伸徐徽蔡確楊傑劉祕李顒關景仁李定邵雍張嵎曹確程珦程皓顏復劉摯王巖叟王俊民喬孝本孔文仲朱伯虎曾宰許將沈括袁默蘇唐卿龔敦邵忱史辭張頌卷二十三范祖禹孔武仲郭附周邠曹輔陳軒馬默王臨潘興嗣胡宗炎李中師陳大雅陳知默張洵尚用之呂源李彥葉宗嚮崔唐臣章友直陳烈蔡準彭汝礪舒亶遊師雄孫升練毖羅適孔平仲葛閎常秩許安世張景修蔣槩徐積章楶楊怡鄒極江公著胡時中陳繹羅尚友毛漸鄭俠曾肇何平仲劉恕費琦卷二十四周延雋王詵章峴蔡覿滿執中馬道薛唐蕭介夫錢忠錢信王安禮王安國沈遼王欽臣安燾韓忠彥許遵沈立張舜民陶弼王令文同錢協劉淑王仲敏崔靜葉祖洽卷二十五朝端友齊廓李奉世李行中韓宗文蘇梲朝端佐關景山毋沆王覿胡宗師徐彥孚吳師孟徐介胡璞陸佃鄧忠臣蔡京蔡卞汪泌錢暄朝端禮朝端受朝端彥晏幾道賀鑄塢柄王雱袁點藍奎周諝周述關澥曾旻龔程常安民孫諤劉涇朱服葛書思丁注卷二十六蔣之美吳栻劉次莊崔嶧呂大臨孔宗翰畢仲遊邢恕秦觀張亶張耒劉純臣張芝魯有開陳師錫程建用楊咨吕南公李復圭楊適李新李孝博張師正王世寧劉叔贛張唐民李之純梁燾劉奉世周商李師德李階吳安持畢仲愈孔舜思王延禧卷二十七郭祥正李公麟吕希純林迥俞充仇伯玉王翰陳易楊時求仲弓陳覺民姚孳李格非葉濤張介錢景諶杜默廖正一蔡肇華鎮陳瓘沈偕周鍔龔原陳稱卷二十八李昭玘劉弇劉跂黃裳朝説之朝補之余幹耿南仲栁子文商倚李之儀趙德儒王鞏楊天惠劉拯張商英吳與鄒浩遊酢鍾胄仵盤陳輔周邦彥翟嗣宗陳傳魏泰邵緝王無咎劉誼趙彥若周壽徐嘉言趙大成卷二十九杜常劉吉甫陳一向黃夷仲楊損彭次雲彭淵材張繹張勵錢祈父李彥弼張吉甫王仲修趙汝礪曾孝宗王仲甫苗時中毛滂蔡載盛次仲陳律樓異強淵明薛昻陳祐朱京俞紫芝饒竦龍太初王邦憲王復李願王忠玉朱光庭吳雍卷三十劉季孫賈收舒煥顏幾袁轂許仲蔚何去非何頏之邵迎王祐朱炎劉賓朱適侯穆陳智夫劉郛胡志道胡份李士舉郭瑄葉集之李膺仲王山王崇王禹錫李孝伯唐默黃嗣徽方澤張軫卷三十一吕川張頌徐璹薛紹彭王谹蔣擴吕由庚鄭景望鄭周卿楊萬畢史驤令狐挺魯千之許元祐周辨閻欽受閻伯才張冕元溥徐範朝元忠徐評周式查許國王觀國陳古王潤之王子思陳逺曾晦之蘇文饒傅子容鄭猶宋翰傅翼史沆李沖元房偉馬彞栁伯達何泳范祥蔡若水王子韶閻伯敏陳純饒師道閻孝忠查仲本卷三十二許景衡魯百能李豸劉延世王履喻陟王純臣鄭至道王公亮范子正范致虛趙宗印劉燾郭三益馬存孫發太史章張􅘏宗澤朱之純歐陽闢楊朏秦覯鮑慎由周行已周之深鄭居中崔鶠黃葆光朝詠之岑象求程頤司馬槱司馬棫趙鼎臣馬玿梁君貺吳則禮仰欣林放范純粹林旦蘇元老冤亭卞蔡安持李周卷三十三江西派黃庭堅陳師道潘大臨謝逸洪朋洪芻徐俯林敏修洪炎汪革李錞韓駒李彭朝沖之江端友楊符謝薖夏倪林敏功王直方髙荷呂本中卷三十四任伯雨林積徐大正邢居實葛敏修李才甫蘇邁陳復常蘇過劉發王雍髙茂華周燾王澧田望孫俟周沔米芾孔夷李孝先許覺之劉珵劉韐曾紆余爽畢漸李朴江公望趙暘徐迪范沖呂頤浩陳暘吳幵葛勝仲蔣璿胡直孺胡安國翁彥國周仲仁葛次仲卷三十五陳汝錫葉夢得劉安上寇國寶周知微姚舜明王元甫黃大臨黃叔達劉光李元膺李釡張勸安惇向子諲石􅐂曾誠田晝邵伯溫姚舜陟呂希哲楊道孚李甲劉定劉彥祖張鏌申屠炯封萬里陳肅張懷翁緯林子來楊槱陶應岑碩章造胡融郭挺程之邵卷三十六張守蔡佃曾開朱勝非李鞉李彌大唐庚蔡薿趙鼎梅執禮成無玷廖剛吳倜龔況史徽李光李邴方惟深王寀汪藻王雲徐文卷三十七曾幾程堂翟汝文張擴蔡居厚宋肇宋京徐遹蔣存仁葛繁王睿栁交侯彭老李夷行潘良正江贄鄧春卿周彥質陳虛中陳恬江暐周子雍王置王安中馮熙載王漢卷三十八毛友盧襄宇文虛中吳敏李邦彥劉才邵賈安宅王珩倪濤章夏余安行張正已白子儀楊齊孫覿胡舜陟左譽景敦復沈汝諧李彌遜李元亮趙企王震鄭滋莫儔談知柔趙野辛次膺翁彥約羅汝楫李綱李正民胡松年汪思溫楊景陳公輔陳與義李乘洪興祖謝彥黃伯思杜子民卷三十九姚孝錫張綱朱粹胡景裕何栗潘良貴沈與求洪皓劉無極秦檜葉廷圭翁采郭印傅嵩卿王珉何大圭薛朋龜鄭瑴張浚郭奕王庭圭滕茂實宋之才朱松朱橰張叔夜謝舉廉尹焞喻汝礪傅察王仲嶷朱載上朱翌王庭秀朱筠楊友夔何鑄卷四十李保蓋嶼元勛吳沆吳濤吳洸徐端崇方元修翁挺曾續曾繹左緯孫邦何宏中程俱毛隨胡珵張致逺胡寅劉一止李質曹緯曹組邵彪范宗尹張邵張嵲馬擴王次翁傅墨卿曹勛沈晦邵棠王洋李長民祖秀實綦崇禮卷四十一王晞韓張闡王之道詹度蔡柟陸元光鄭強程瑀李芬黃次山趙良嗣劉佖李處權吳可趙季西章憲連南夫許安仁周邦范周范公稱燕照鄰范仲溫陸宰崔子方田亘張茂宗李先輔蘇庠張彥智薛然楊軒鄭鋼卷四十二陳序方千里錢惟嶽胡致隆羅從彥熊蕃何麒董瞿老杜柬之李祁張師中徐欣周李朝載之劉旦祖德恭翟望李怤朝貫之朝謙之章縡范季隨吕知止許彥國葉大年李逺陳君嚮李若水毛寶富直柔鄧肅曾如驥何迂叟王以寧熊彥詩司馬朴季炳余淳禮顏博文宋齊愈張澄賀允中李儔上官仲恭吕渭老卷四十三朱辨陳東歐陽徹曲端嶽飛毛國英李易俞處俊胡銓陳宗古鄧柞陳剛中阮閲胡嶧黃大輿王銍周芑鄭昺李宏許顗秦湛蔡向聞人偲張瓊顏岐李方敬陳石齋徐月溪唐觀陳貫道程宿唐耜令狐慶譽卷四十四何薳何藗張圖南鄭魁莊綽薑光彥周莘康與之李唐張九成施德操楊璇刁文叔陳棠鄭仲熊鄭剛中王伯庠陳栖筠謝伋陳用中陳述董穎髙登劉儀鳳李衡薛靖孫雄飛楊願汪應辰湯莘叟孫起卿吳詠魯訔沈作哲鄭若谷關注朱敦儒孫松壽王灼卷四十五陳淵秦梓鄭樵黃公度陳俊卿方翥龔茂良王之望陳長方葛立方李燾陳巖肖范正國王逵洪適洪遵洪邁黃子介許紹向􅡶方雲翼李端民葉南仲胡憲胡宏李侗李繒張元幹鄭汝諧蘇雲卿米友仁司馬端衡吳芾熊克沈樞仲并唐文若陳世守卷四十六周紫芝關耆孫劉僩陳鵬飛唐仲友折彥質何耕李彚鄭昌齡吳岡頓起范浚馬純吕願中蔣璨丁宣胡升程元祜張表臣鄭望之何稱蒙與義李彌正徐作程敦厚曾惇向滈陳仲平葉黯張昌郭浩陳渙李若川司馬伋陳克姚寬姚宏錢端禮劉岑李茂之劉韞劉子翬陳晉錫卷四十七楊由義李浩陳知柔魏杞李庚劉珙留正史浩王淮莫濟鄭耕老湯思退林仰鄒定汪大猷楊偰王剛中楊汝南黃徹鄭伯熊周麟之董德元尤袤雍有容陳天麟葉衡石才孺莫汲芮曄芮輝卷四十八朱子張祁田如鼇沈少