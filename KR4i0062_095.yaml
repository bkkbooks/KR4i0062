body:
  text: 宋詩紀事卷九十五錢塘厲鶚撰髙麗國王王徽徽字燭幽顯宗詢第三子慶厯七年即位在位三十七年諡仁孝王廟號文宗東國通鑑文宗時家給人足時號太平宋朝每錫褎賞之命遼氏歲講慶夀之禮記夢惡業因緣近契丹一年朝貢幾多般移身忽到中華地可惜中宵漏滴殘石林詩話韓繳如繳如髙麗使副别葉館伴泣涕汍瀾欲别離此生無復再來期謾將寶玉陳深意莫忘思人見物時石林詩話髙麗自太宗後久不入貢元豐初忽遣使來朝神宗令張誠一館伴問復朝之意云其國因契丹誅求狼藉不能堪國王嘗誦華嚴經祈生中國一夕夢至京師見城邑宫闕宏麗之甚覺而慕之乃為詩以記余大觀閒館伴髙麗人使者頗修謹詳雅余撫之既厚每相感餞行自占雲館而别其副韓繳如馬上忽使人持一大玉帶贈余云此實故物其家世傳以為寶今以為獻且于笏上自書一詩相别朴寅亮寅亮元豐中髙麗使臣與金第李絳孫盧柳金化珍等途中唱和七十餘篇自編為西上雜詠絳孫為序鄭麟趾髙麗史朴寅亮字代天竹州人或云平州人纍遷右副承宣轉禮部侍郎文宗三十四年與户部尚書柳洪奉使如宋有金覲者亦在是行宋人見寅亮及覲所著尺牘表狀題詠稱歎不置至刋二人詩文號小華集句塔影到淮沈浪底磬聲浮月落雲間門前客櫂洪濤急竹下僧棊白日閒泗洲龜山寺厯代吟譜澠水燕談云高麗海外諸夷中最好儒學祖宗以來數有賔客貢士登第者自天聖後十年不通中國熙寧四年始復遣使修貢因泉州黃慎者為向道將由四明登岸比至為海風飄至通州謝太守云望斗極以乘槎初離下國指桃源而迷路誤到仙鄉詞甚切當使臣御事民官侍郎金第與行朴寅亮詩尤精如泗州龜山寺詩云門前客櫂洪濤急竹下僧棊白日間等句中土人亦稱之寅亮為其國詞臣以罪廢之復與金第使中國魏繼延繼延為進奉副使句千仞綵山擎日起一聲天樂漏雲來補夢溪筆談朴景綽景綽為主簿髙麗史朴景仁寅亮子初名景綽字令裕力學登科纍官尚書左僕射參知政事修國史致仕卒年六十七諡章簡句勝事年年傳習久盛觀全屬逺方賔補夢溪筆談元祐六年高麗使人入貢上元節于闕前賜酒魏繼延朴景綽皆賦觀燈詩時有佳句李資諒資諒髙麗仁州人官中書侍郎平章事睿謀殿賜宴恭和御製鹿鳴嘉㑹宴賢良仙樂洋洋出洞房天上賜花頭上豔盤中宣橘袖中香黃河再報千年瑞緑醑輕浮萬夀觴今日陪臣參盛際願歌天保永無忘髙麗史李子淵傳資諒奉使如宋徽宗御睿謀殿召一行人賜宴作詩示之資諒即製進大加稱賞無名子春帖子雪痕尚在三雲陛月腳初升五鳳樓百辟稱觴千萬夀衮龍衣上瑞光浮徐競宣和奉使髙麗圖經廣化門王府之偏門也榜周易繇辭五字仍有春帖子云咸寧節致語口號當時瑞色照宫林和氣濃濃破積隂香火千家祈國夀笙歌三部樂賔心興酣日影移珠箔舞罷花枝倒玉簪須盡清歡州酉美景從容莫訴酒杯深宣和奉使髙麗圖經王俁以八月十七日生謂之咸寧節其日大㑹公族貴臣近侍干長慶殿中國賈人之在館者亦遣官為館伴用華夷三部樂亦有致語其口號云云宋詩紀事卷九十五
