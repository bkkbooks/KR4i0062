body:
  text: 宋詩紀事巻五十七錢塘厲鶚撰張栻栻字敬夫廣漢人浚子以䕃補官孝宗朝歴左司員外郎除祕閣修撰歴知江陵府荆湖北路安撫使卒嘉定中諡曰宣從祀大成殿有南軒集謁陶唐帝廟詞宋淳熙四年静江守臣張某既新陶唐帝祠以二月甲子率官屬祗謁祠下再拜稽首退而歌曰溪交流兮谷幽山作屏兮曽立木偃蹇兮枝相樛皇胡為兮于此留藹冠佩兮充庭潔芳馨兮載陳純衣兮在御東風吹兮物為春皇之仁兮其天四時序兮何言出門兮四顧渺宇宙兮茫然胡文定公碧泉書堂在崇安縣籍溪入門認碧溪循流識深源念我昔此來及今七寒暄人事經㡬變寒花故猶存堂堂武夷公道義世所尊永袖霖雨手琴書賁丘園當時經行地尚想笑語温愛此亭下水炯若玻瓈盆晴看浪花湧静見潛鱗翻朝昏遞日月俯仰信乾坤因之發深感倚檻更無言三月七日城南書院偶成積雨欣始霽清和在兹時林葉既敷榮禽聲亦融怡鳴泉永不窮湖風起淪漪西山巻餘雲逾覺秀色滋層林叢綠間愛彼松柏姿青青初不改似與幽人期坐久還起來隄邉足逶迤游魚傍我行野鶴向我飛敢忘昔賢志亦復詠而歸寄言山中友和我和平詩朱子䟦云乆聞敬夫城南景物之勝常恨未得往游其間今讀此詩便覺風篁水月去人不逺題榕溪閣昔山谷南遷維舟榕下後人為作榕溪閣寒溪澹容與老木枝相樛其誰合二美名此景物幽太史昔南騖於焉曽少休想當下榻時請與耳目謀品題信要領亦有翰墨留我來訪遺址密竹鳴鉤輈稍令舊觀復還與佳客遊樹影散香篆水光泛茶甌市聲不到耳永日風颼颼所忻簿書隙有此足夷猶平生丘壑願如痼不可瘳雖知等喧寂終覺静裏優更思濯滄浪榕根浮小舟故太子詹事王公挽詩十朋大節元無玷中心本不欺排姦力扛鼎憂國鬢成絲方喜三旌召俄興一鑑悲西風吹淚眼吾豈哭吾私睿主龍飛日如公舊學臣忠言闗國計清節映廷紳嵗月身多外江湖澤在民當年遺直歎千古更如新題城南曰璐按此首本集不載城頭望西山秋意巳如許雲影度江來霏霏半空雨東渚團團淩風桂宛在水之東月色穿林影卻下碧波中麗澤長哦伐木篇佇立以望子日暮飛鳥歸門前長春水濯清亭芙蓉豈不好濯濯清漣漪采去不盈把悵惆暮忘饑西嶼繫舟西岸邉幅巾自來去島嶼花木深蟬鳴不知處采菱舟散䇿下亭阿水清魚可數卻上采菱舟乗風過南浦以上南軒集鶴林玉露云六詩平淡簡逺徳人之言也馬上口占向來一雪壓霾昏曉跨征鞍傍水村七十二峯皆玉立巍然更覺祝融尊方廣寺睡覺僧舍孤衾寄此情莊生夢破梵鐘聲浮漚蹤跡原無定惆悵西風一夜清十六日下山各賦二篇存一歸袂随雲起籃輿趁雪明山僧可留客世故卻闗情小倚枯藤杖聊聽絕㵎聲如何山下客一笑巳來迎以上南岳倡酬集書花光墨梅一枝巳清妍交枝更媚嫵見之已愁絶那復隔烟雨錢唐千頃春想見西津渡他日到南屏莫忘孤山意題王介甫遊鍾山圖後林影溪光静自如蕭疎短鬢獨騎驢可能胷次都無事擬向山中更著書以上聲畫集劉芮芮字子駒東平人官永州決曹掾有順寧集敬夫寄斜川詩敘往年之約殊不知芮今病矣非如昔時獨心心不忘耳勉和一章以敘謝意病著不任事淹臥心自休經時不出門況復斜川遊每覿節物換怳驚時序流少年喜追逐聚散水上鷗沈舟枯木畔風帆春樹丘我病正爾許懐念老朋儔有酒不能飲徒有獻與酬故人酌佳日亦復我念否佳章寫懐抱一讀寛百憂吾君念逺民歸計未易求式古堂書考薛季宣季宣字士龍永嘉人起荆南帥辟書薦為大理寺主簿歴大理正出知常州有浪語集遊竹陵善權洞萬古英臺面雲泉響佩環練衣歸洞府澗水倒流入水洞中香雨落人間蜨舞疑山魄花開想玉顔㡬如禪觀適遊魶獻澄灣寺故祝英臺宅唐昭義帥李蠙嘗見白龍出水洞而為雷雨今小水洞存鱯魚四足左右蝸蠻戰晨昏燕蝠爭九星寧曲照三洞獨何營世事嗟興喪人情見死生阿誰能種玉還爾石田耕山有三洞九斗壇故更寺觀者不一再有李後主斷還僧寺批札石記語極可笑大水洞有石田數十町竒絶觀岳侯石像萬死何如獄吏尊威名蓋世古難存二桃豈是功高賜一舸不容身退論㡬為飲江思道濟謬因圖像削王敦沈碑千古蛟川恨留與無窮客斷魂以上浪語集王彥和彥和崇徳人題扇天邉一線征鴻没山色淺深墨未勻别浦漁舟待歸去夕陽渡口兩三人嘉興府志彦和書此于中貴人扇上光堯見之稱賞令盡進所作賜金帛游次公次公字子明建安人號西池定夫諸孫禮部侍郎操之子范石湖帥桂林日參内幕有唱酬詩巻漁父竹裏茅茨竹外溪粼粼白日䕶漁磯想應日日來垂釣石上蓑衣不帯歸詩人玉屑畫虎圖平生射虎裴將軍馬獰如龍弓百鈞手撚白羽旁無人注虎使虎不敢奔須臾叢薄斕斑出人馬不知俱辟易矢如蓬蒿弓減力將軍得歸㡬敗績徐行爪牙無不露眈眈垂頭若微顧尾翦霜風林葉飛倏忽山頭日光暮包家畫出眞於菟我尚不敢編其鬚昔人作詩譏畫圖吁嗟畫圖今亦無合璧事類別集耒陽道中山頭磴石危梯險山下荒田野草悲更著秋風吹兩鬢不消㡬日盡成絲詩家鼎臠潘畤畤字徳鄜良貴之兄子李莊簡光之壻也孝宗朝官至尚書左司郎中嚴先生祠古屋巓巖上荒祠落葉中乞靈無俗駕垂世有高風鳥語谷相荅魚游溪若空徘徊欲忘去船背夕陽紅釣臺集張鎡鎡字功甫號約齋西秦人居臨安循王諸孫官奉議郎直祕閣有南湖集誠齋詩話功甫詩斷橋斜取路古寺未闗門絶似晩唐人詠金林檎花云梨花風骨杏花妝寫物之工如此子歸自金陵功父送末章云何時重來桂隐軒為我醉倒春風前看人喚作詩中仙看人喚作飲中仙此詩超然矣楊誠齋贊功甫像云香火齋祓伊蒲文物一何佛也襟帶詩書歩武璚琚又何儒也門有朱履坐有桃李一何佳公子也冰茹雪食凋碎月魄又何窮詩客也約齋子方内歟方外歟風流歟窮愁歟老夫不知君其問之白鷗謝李仁父送茯苓岷峨山中千歳松枝虯幹直摩青空雪霜剝落中不槁膏液下與靈泉通龜跧鳧伏自磊砢金堅玉凍仍豐融篝燈夜取喜得雋煮鼎朝聽如吟風杵成坐上香霏雪更和乳酪收全功當知至味本無味子若服之夀無窮巽巖脊梁硬如鐡冠峩切雲佩明月百好都随春夢空大業獨傳鴻寳訣中宵咀嚼不揺頭玉池生肥咽不輟憐我百慮形早衰裹贈扶持意何切丹砂著根謾爾傳脂澤釀黍計已拙由來妙道初不煩此法莫從兒軰說徑思舉袂揖浮丘下視塵世眞一决朱顔留得亦何為追逐同堅歳寒節全芳備祖游九鎖山九鎖非凡境烟雲路不分山寒長帯雨洞古不收雲夜宿聽林鶴晨炊摘野芹黄冠皆好事添炷石爐熏涼蟬亂叫朝暮雨獨鶴不迷前後山芎葉煮湯勝茗椀栗花然火照松闗洞霄詩集釣臺綘衣騎日扶桑上三精九縣開靈貺趙梁雍代跡俱空馮呉冦鄧勲相望客星何處潛光芒䨇臺疊巘摩穹蒼釣絲千丈捲烟雨俯瞰一碧玻璃江羊裘坐稳無心動蒲輪纁幣知何用故人聊為小周旋君房謬欲相推送寥寥嵗月今㡬秋山寒松吹多颼飀春來日暖花氣發極浦浪轉魚龍遊先生有臺人共高虛庭忍見生蓬蒿斷碑敗壁蠹荒蘚灌木野鳥捐枯巢一朝鐘梵交雲際簷楹改觀輝杉桂非闗好事取時名此中恥但稱能吏卻經祠下羅清樽試歌此詩當招魂先生出兮佩蘭蓀明璣耀旗駕瑶璠黄麟道前翠虯奔先生去兮山雲屯玉妃金童從繽紛吹簫鼓瑟聲冥冥目斷暮靄棲遥林釣臺集宿呉江塔院宿雲蔽空溪冥濛我船曉繫紅蓼叢破程約渉一舍外逺目未快千山供岸旁小店換馬去氊裘障冷披䝉茸須臾巾蓋不容展莽莽暗霧逢逢風偕行客輿屢掀簸適値官騎來憧憧弓刀負帯競硉矹驙駟騮驖騅騟驄爭前迭進歩殊窘迫暮始望橋垂虹石塘百丈捍駭浪間有灘磧紛漁筒鴉群黒白混鷗起颿影亂㸃還波中筆牀茶竈住此地得句未必慚龜䝉浮圖老屋且投宿觧擔正聽黄昏鐘紗籠炙燈照佛古藺席布榻便吾慵怳驚足履未游地逸興恐失難重逢案邉紙盡莫翻冩不覺紅日㸔生東百城烟水句燕子初歸曾識面牡丹未放巳知名桐江續集一櫂徑穿花十里滿城無此好風光玉照堂觀梅曾覿覿字純甫號海野老農汴人紹興中以寄班祇候與龍大淵同為建王内知客孝宗受禪以潛邸舊人除權知閤門事淳熙中除開府儀同三司加少保醴泉觀使老學菴筆記曾覿字純甫偶歸正官蕭鷓巴來謁旣退復一客至其所狎也因問曰蕭鷓巴可對何人客曰正可對曾鶉脯覿以為嫚巳大怒與之絶玉環山在太平縣西南楚門港中原名木榴山避錢王諱改焉天寳風塵暗兩京禍從妃子笑中生玉環兩字真堪惜好與青山改別名台州府志題楊補之雪梅巻筆端造化出天巧寫出江南雪壓枝誰道春歸無覓處横斜全似越溪時式古堂畫考龍大淵大淵紹興中與曾覿同爲建王内知客孝宗受禪自左武大夫除樞密副都承旨知閣門事出為江東總管齊東野語思陵妙悟八法留神古雅當干戈俶擾之際訪求法書名畫不遺餘力又于𣙜場購北方遺失之物故紹興内府所藏不減宣政惜乎鍳定諸人如曹勛龍大淵張儉鄭藻平琰黄冕魏茂實任原等人品不高目力苦短凡經前軰品題者盡皆拆去故今御府所藏多無題識其源委授受嵗月考訂邈不可求為可恨耳遊九鎖峯巒九鎖路縈盤翠色霑衣作晚寒日暮神仙歸洞府雨餘星斗下天壇人生何用千鍾貴老去須求一室安㑹得谷神元不死世間何事可相干洞霄詩集彭九萬九萬字好古崇安人淳熙閒國學立禮齋長淩波辭歲芳兮婉冉悲江空兮蘭枻歸人嬋媛兮胡來遲憺風魂兮佩誰思素衣兮儼黄裏玉襦兮䝉翠被明波渟渟兮渺愁予舍香懐春兮中心苦昔遺襟兮令契闊佇佳期兮窅脩絶幻塵緣兮謇中憂時既晏兮不可留汎雲軿兮水裔糺予瑟兮難理人笑歸兮路蒼茫湘有臯兮春綵起萬姓統譜楊炎正炎正字濟翁廬陵人鶚按炎正工詞有西樵語業一巻毛氏汲古閣刊本誤作楊炎號止濟翁予見舊鈔本作楊炎正濟翁是炎正其名濟翁其字也今考武林舊事有楊炎正詩全芳備祖有楊濟翁詩即是一人毛氏之誤可見矣錢唐迎酒歌錢唐妓女顔如玉一一紅妝新結束問渠結束何所為八月皇都酒新熟酒新熟浮蛆香十三庫中誰最强臨安大尹索酒嘗舊有故事須迎將翠翹金鳳烏雲髻彫鞍玉勒三千騎金鞭爭道萬人看香塵冉冉沙河市琉璃杯深琥珀濃新翻曲調聲摩空使君一笑賜金帛今年酒賽真珠紅畫樓突兀臨官道處處繡旗誇酒好五陵年少事豪華一斗十千誰復校黄公壚下謾徜徉何曽見此大隄倡惜無顔公三十萬往醉金釵十二行武林舊事行都官酒庫毎歳清明前開煮中秋前賣新先期諸庫呈様㸃檢所所以呈府旣中擇日開沽以白布三丈餘揭竹竿頂題曰某庫選到酒匠某人醖造上等醲辣無比高酒三五人扶之而行以鼔樂妓女雜枝前導聨鑣穿市觀者如堵酒匠則紫衣新巾乗馬從之以府中所賞綵帛錢㑹銀椀䭾負馬前謂之迎酒楊炎正詩云云桂花翠圍侍女擁紅幢霞臉調朱笑額黄共醉東君千日酒更翻西母九霞觴人間天上高低影月下風前自在香輸與廣寒宫裏客年年綠鬢賞秋光全芳備祖蘧老寄龍涎香瘴海驪龍供素沫蠻村茉莉挹清滋微參鼻觀猶疑似全在爐烟未發時翰墨大全龎謙孺謙孺字佑甫籍之曾孫南渡居呉興有白蘋集奉使過汴京作蒼龍觀闕東風外黄道星辰北斗邉月照九衢平似水胡兒吹笛内門前詩人玉屑郊居九日樹夾門方正谿侵岸欲隤水搖雲影動風抑鳥聲回籬缺舟常過底空客不來故人經嵗月又見菊花開前賢小集拾遺時瀾瀾號南堂從學吕成公之門從先生明哲道中呈伯廣炳道燕子楊花各自飛雨乾溪路綠初肥無人㑹得風雩意可是千年瑟竟希濂洛風雅王子俊子俊字才臣號格齋廬陵人周益公楊誠齋之客以薦官成都帥幕有三松集代漕使讌賀帥平蠻轉官樂語紫橐仙人雲錦裳碧油幢下受降羌三邉外掃烟塵静一札中含雨露香天上卽歸扶日轂尊前莫惜醉霞觴主賔情分今如許飲罷相攜入帝鄉三松集賀彥澤新得子君不見白居易五十八歳方得嗣當時立名曰阿崔香綳繡𥜗胎髪膩又不見元微之五十八嵗方生兒當時立名曰道保可望成家得力時西鄰有親曰彥澤天與明珠堪愛惜今年年方四十三甲庚少似唐元白葛仙溪前燕子樓燕子未老人風流一年一度作湯餅但願年年逄麥秋翰墨大全句大兒阻飢頗廢書小兒忍寒粟生膚婦縱有褌無一襦不敢緣此相庸奴題貧樂圗和徐思叔韻來梓梓字子儀四朝聞見錄來子儀與周洪道實布衣交洪道為樞使子儀入都訪洪道館于嘉㑹門外表忠觀置酒極歡示以近詩子儀盡巻笑曰周樞使詩也非周洪道詩也洪道問所以子儀曰昔徐師川少工詩晚為樞府詩寖不逮昔人以為向來徐師川詩後自是徐樞使詩洪道笑而容之子猷訪戴圖四山搖玉夜光浮一舸玻璃凝不流若使過門相見了千年風致一時休杜甫遊春典盡春衣不肎歸熊兒扶道瀼溪西傷時懐抱深于海掠眼風光醉似泥以上前賢小集拾遺沈約之挽張于湖氣概凌雲孰敢先中興事業冠英躔朝廷議論一言定翰墨風流四海傳恰跨鼇頭升紫闥忽騎箕尾上青天竹林笑傲今陳迹撫櫬江臯涕泫然錦繡萬花谷施士衡士衡字徳求湖州人嘗為宣州簽幕有同庵集挽張于湖十年帥鉞倦馳驅適意方謀一壑居賈誼有才終太傅薛收無夀處中書傷心風月江山在過隙光隂夢幻虛紅紫飄零春色盡後凋松柏獨蕭疎錦繡萬姜特立特立字邦傑麗水人靖康中父綬死難補承信郎孝宗召為太子春坊光宗即位除知閤門事累官浙東馬歩軍副總管慶逺軍節度使有梅山槀續槀和陸放翁見寄遥知三徑長荒苔觧組東歸亦快哉津岸紛紛羣吏去船頭衮衮好山來平時佳客應相過勝日清尊想屢開若許詩篇數還往直須共挽古風回和陸郎中放翁午庭風雨撼高槐一洗城頭十丈埃老子坐間尋句好故人門外寄詩來勁鋒久服穿楊妙鈍思深慚擊鉢催清佩左符君未可要聴吟思發春雷寄汪尚書大猷五十年間歎闊疎相忘兩地復江湖書來筆底驚强健詩去吟邉想歩趨好對青山看歌舞莫嫌紅粉笑髭鬚鳳毛巳有哦松韻尚記金華舊範模冬夜不寐宵柝迢迢警睡魔静思甘分老林坡忍胞向有嵇康嬾扣角曾無寗戚歌不起妄心思世事秖將閒意飬天和時人休説長生術學著長生事轉多李仲永墨梅寫竹如草書患俗不患清畫梅如相馬以骨不以形墨君曩有文夫子蟬腹蛇跗具生意當時一派屬蘓公雨葉風枝畧相似花光道人執天機信手掃出孤山姿陳元幻卻西施面此妙俗人那能知近時賞愛楊補之補之嫵媚不足奇李生于梅卻有得髙處自與前人敵倒暈疎花出苦心暝雲暗谷藏春色我一見之三歎息意足不暇形模索君若欲求之㸃畫胡不去看江頭千樹白漁舍新成旋規漁舍傍溪山山轉溪廻翠竹間閒看羽觴行詰曲戲拈竿線弄潺湲浮家不入分風浦歸棹休尋落照灣漫説五湖烟浪好㡬人險處得心閒以上梅山續槀方孝能孝能福州司理福唐元夕街頭如畫火山紅酒面生鱗錦障風佳客醉醒春色裏新妝歌舞月明中薄薄春衫新縷金樽前風細怯輕隂酒香隐約生紅粉正與桃花共淺深燈外風搖沽酒斾月中人數買花錢少年心緒如飛絮争逐遺香拾墜鈿淳熙三山志張履信履信字思順號遊初鄱陽人侍郎南仲之子嘗監京口鎭官至連江守飛來峯飛來何處峯木杪夜千尺愁猨喚不譍月色同一白冷泉亭水石一䦨干僧歸四山静攜琴譜㵎泉月浸夜深冷翠微亭朝朝烏北出夜夜烏南歸所謀在一食所息在一枝人生竟何得與烏同此機身世忽過慮泉石良自怡月上飛來峯更誰登翠微以上咸淳臨安志訪丹陽玉乳泉巳變昏黒因賦詩淳熙十三年觀音寺裏泉經品今日唯存玉乳名定是年來無陸子甘香收入栁枝缾游宦紀聞徐逸逸字無競號抱獨子天台人仇逺稗史徐抱獨少與朱文公為友公提舉浙東日過其家然燈夜話至鐘鳴而别公嘗托無競作謝恩表書云可放筆力稍低使人見之無假手之議也其推奬如此晝眠治平寺在西湖北山頻年游覽不暫寘野艇往來無水程雨休最好是鷗浴風静更清聞鶴聲酒家新熟欠前債僧榻借眼餘宿酲崧高泰華未挂眼鬢影蕭颯難為情咸淳臨安志孤山咸平處士風流逺招得梅花枝上魂疎影暗香如昨日不知人世㡬黄昏全芳備祖蔡開開字子明崇徳人淳熙閒進士官至漕憲弟闢字子正慶元閒進士官至國子祭酒題資福院平綠軒瞰水地仍敞開窗望不迷良疇連逺近秀野混髙低曉起烟千樹春耕雨一犁道人深樂此壊衲且幽棲至元嘉禾志觀音資福院在崇徳院西南一里西廡有軒瞰流扁平綠陳炳退菴蔡開畏齋武林莫若拙輔廣潛齋王用亨釣臺江表祖張掞敬齋長樂王益祥南豐曽揆苕水莫柯陸徳輿魯齋皆有詩李安期安期字泰伯卲武人以詩游江湖間一日謁四川茶馬使王淮淮將以賢良薦因奕爭道遂拂衣而去賦白鷺漁父家風不設罾錦鱗為飯水為羮銀袍秪當蓑衣著自在江湖過一生邵武府志盧蹈蹈字衷父青社人寓犍為郡夾江縣佳士也絶句客懐耿耿自難寛老傍京塵更鮮歡逺夢巳回窗不曉杏花同度五更寒放翁題䟦應廓廊閩縣令七夕烏鵲成橋架碧空人間天上此歡同仙查逐浪浮銀漢青鳥傳音到帝宫牛女佳期情不斷古今遺恨意難窮綵樓乞巧知多少直至更䦨漏欲終淳熙三山志王佐才佐才字吕輔崇安人少游邑庠范汝為叛總義兵禦賊建陽以功補承信郎後為吉州水軍統領與賊魁殊死戰中流舟壊而沒吉人廟祀之荅秦兵部求墨竹夜到茅亭近竹籬影隨寒月下苔墀吟餘未嬾蕭疎興曽寫離披一兩枝贈徐子虛畫魚我嘗放意游江湖喜從釣叟觀眞魚有時臨溪行復坐秋水無風魚自如鮮鱗滑鬛隨上下回旋戲躍形皆殊兩兩相逢若對語聚頭戢戢揺䨇鬚忽然散漫背游去一半掉尾潛菰蒲往來得所弄晴色員波觸動生浮珠困依垂楊看不足盡日忘歸誰與俱自從北走塵土窟十年不復瞻蓴鱸憑誰畫出江湖趣東海今聞徐子虛毫端奪得生時意京師好事争傳摹寫成䨇幅輒遺我展舒活動驚堂隅窮搜前古少奇筆此本秖恐人閒無任敎涸轍强濡沫對面相忘千里書以上聲畫集陳國材國材廬陵人句紅日晚天三四雁碧波春水一䨇鷗鶴林玉露云周益公楊誠齋盛稱之周郔郔呉江縣尉見陸游入蜀記三髙亭懐范石湖蓴脆鱸肥酒細傾浩歌悲壯欲誰聽沈迷簿領頭將白彈壓江山眼自青魚躍紫鱗衝葦岸鷗翻白雪下沙汀西風散髪危亭上醉倚豐碑照日星百城煙水邵經國經國永嘉人上樓參政聞道先生欲挂冠先生㡬日出長安去時莫待淋頭雨歸日須防徹骨寒巳遂平生多少志莫令末路去留難二疏畢竟成何事留取他年作畫看吹劔録樓攻媿既參大政屢欲丐閑至繪二疏以見意邵經國作詩云云傅大詢大詢字公謀宜春人鶴林玉露傅公謀尤工作酸文嘗作無遮榜語云紅旗渡口凄凉芳草夕陽天白紙山頭慘淡落花寒食節賀雨為分宜宰許及之作獅子闗前半篆烟二龍飛下卓篙泉銀河掣電連宵雨緑野翻雲四月天便覺春生花一縣㑹看秋熟米三錢何時卓魯登黄閣都與寰區作有年袁州府志劉鄂鄂字國相讀許右丞翰所作陳少陽先生哀詞并州更作桑乾客道逄舍者來爭席掀髯對坐有鉅人開口劇談如舊識試問客子從何方興言扼腕微有傷吾祖昔遑䘏緯計屢以直論干君王䜛諛弄國賢者避禍福相乗呼吸異懸知必有代庖責被髮纓冠赴東市大明既争日月光真與天地同乆長嗟子之生後長者卻識前軰奚其詳大臣罔上擅行戮揚以浮言蓋私曲誅姦發徳示後世右丞之文端可復中興名門凡㡬門聖朝報稱非少恩芄蘭袖出承命帖猶幸及識公之孫春秋愛賢許之宥十世已往未為厚况今公議方大明叩天大呌君無後故人夢想規大賢仰止高山思執鞭典刑方及見故物倏爾長別良依然土田未足為君勸官爵未足酬君願行矣志意勿倦遊歸而視之有家傳盡忠録附楊輔世輔世字昌英廬陵人誠齋之族南溪碧玉寒塘瑩不流紅蕖影裏立沙鷗便敎不作南溪看當得西湖十里秋詩人玉屑游開開字子蒙建安人定夫從孫和劉叔通昨夜劉郎叩角歌朔雲寒雪滿山阿文章無用乃如此富貴不來争柰何邴鄭向嘗依北海晁張今復事東坡吹噓合有飛騰便未用溪頭買釣蓑朱子語類云詩須不費力方好此等詩使蘓黄見之定當賞音丁世昌世昌字少明號竹坡黄巖人次虞仲房司馬送秋韻自入秋光能㡬時無端又賦別秋詩夜長月冷蟲鳴急天闊風高雁過遲三徑黄花存舊節半欄紅葉墮殘枝徃來畢竟乗除法何用年年宋玉悲黄巖英氣聞人滋滋字茂徳嘉興人嘗為勅局刪定官陸游老學菴筆記嘉興聞人茂徳老儒也喜留客食不過蔬豆而巳郡人求館客者多就謀之多舊書喜借人自言作門客牙充書籍行開豆腐羮店子少時嘗與之同在勅局為刪定官談經義衮衮不倦發明尤多尤䆳於小學云早秋游靈巖凭䦨山翠溼濛濛佛閣依然水殿風欲採蓮花何處所年年金井落梧桐檇李詩擊王用亨用亨字子安自開封徙崇徳淳熙閒進士分敎襄陽平綠軒在資福院禪窗虛敞瞰西南野色溪光接畫簷雲去碧天無閒斷一眉依約見山尖檇李詩繫宋詩紀事巻五十七
