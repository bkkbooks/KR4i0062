body:
  text: 宋詩紀事巻七十三錢塘厲鶚撰王栢栢字會之金華人初號長嘯後更號魯齋受業何北山之門郡守蔡抗楊棟台守趙景緯相繼聘主麗澤上蔡兩書院四方從學者日衆咸淳十年卒賜諡文獻有集催雨人世如居甑驕陽不可鉏未聞芻作狗安得夢維魚賦斂民生槁干戈國計虛安危關一飽雨意莫躊躇題定武蘭亭副本玉華末命昭陵土蘭亭神蹟埋千古率更搨本入堅珉鹽帝歸裝投定武薛家翻刻愚貴游舊石宣和龕御府邊塵橫空飛渡河中原荆棘穴豺虎維揚蒼茫駕南轅百年文物不堪補紛紛好事競新模傾攲醜俗無遺矩如今薛本亦罕見髣髴典刑猶媚嫵淸歡盛會何足傳右軍它帖以千數託言此筆不可再慨然陳迹興懷語今昔相視無已時手掩塵編對秋雨八詠樓樓壓重城萬井低星從天闕下分輝傷心風月詩應瘦滿眼桑麻春又肥山到東南皆屹立水流西北竟何歸倚闌莫問齊梁事斷石凄涼臥落暉以上魯齋集王仁仁字剛仲號立齋劉撝堂何北山之門人冬日雜興庭際幽蘭手自種託根不與春華共苒苒同風數竿竹襟期元作幽人供如何江湖浪征逐芳信卻因鴻翼送多慚獨處歳將晩尚想淸聲形曉夢濂洛風雅饒魯魯字伯輿又字仲元自號雙峯餘干人從黄幹李畚學累薦召不起卒門人私諡曰文元琵琶洲潯陽江上譜無傳化作沙汀越水邊一段遺音人不識夜深幽咽下灘泉饒州府志陳藻藻字元潔福唐人林網山之高弟有樂軒集劉后村序云樂軒七十五迺卒年出于其師而窮猶甚于其師城中無片瓦僑居福淸縣之橫塘開門授徒不足自給至浮游江湖崎嶇嶺海積鏹得百千歸買田數畝輒爲人奪去今讀其文講學明理浩乎自得不汲汲于希世求合螢窗雪案猶宗廟百官也菜羮脫粟猶堂食萬錢也入則課妻子耕織勤生務本有拾穗之歌焉出則與諸生弦誦登山臨水有舞雩之詠焉寄劉八六度封書向小孤一度逢人寄書無劉郎嗔我無短吟素書百紙難論心我愛劉郎可無詩劉郎愛客還笞兒我爲父執倍其年見我呼兄挾渠賢撥棄勿復陳對君吟此身憶昔在桂堂瘧鬼罹我殃世情疎客病移我君家牀兒女不辭勞僕妾何憚忙秋風黄葉飛明燈藥爐傍我身何日殞此念何時忘丘嫂晩歳歸敬我如小郎他年山下結吾廬朝暮往來摩白鬚我抱子君抱孫卻使相叙爲弟昆題劉氏翠微亭舊屋紅蕖外新亭綠樹傍江晴孤棹見雨近衆山藏學圃未成趣催詩何太忙他年多橘柚此地一瀟湘福州城北吳氏新樓之作千山匼帀繞三山盡屬危樓一覻間雲漢星辰隨道遠鄰家花朩不容慳憑闌要取西湖盡落葉尤宜朔吹寒況是先生莊列輩眼高人境幾層看融州除夜臘月牂柯三十日相思覓句上譙樓遙知今夜柴爐㑹說我無家更遠遊春日獨上譙樓日一迴春風桃李滿城開狂夫欲語無人聽呼取閒雲共酒杯以上樂軒集林尚仁尚仁字潤叟長樂人有端隱吟稾陳必復序云林君詩專以姚合賈島爲法而精妥深潤則過之適越畱别江亭飲罷起離愁何事西風又遠遊潮信欲來人欲去夕陽紅蓼滿汀洲春日未逢知己媿蹉跎又見春風長徑莎杜宇一聲詩思減楊花三月客愁多從人乞米貧如舊借吏抄書字半訛嬾說江湖十年事近來平地亦風波春晩春事又無幾陰晴苦不齊久貧交味薄多病語聲低落絮行風徑歸雲度晩溪故鄉二千里日夜子規啼以上端隱吟稾嚴粲粲字坦叔邵武人登第官淸湘令有華谷集風雨宿湖心渺渺平湖四接天孤舟曾繫夜來船折鞭又入風塵去卻憶秋篷聽雨眠秋入秋入白蘋風浪生癡雲未放楚天晴靑山湖外知何處中有斜陽一段明二水聞角少日鄉關不解愁閒聽畫角起譙樓西風依舊闌干月獨自瀟湘萬里愁寄張輯不見吾張輯新詩何處吟身畱江介遠秋入夜涼深燈影還家夢蛬聲倦客心歸來及佳節細把菊花斟宿石潭寺寄黄炳昨夜湖心共泊船一天星露宿寒煙朝來極目無洲渚知採蘋花何處邊午憩僧房黄塵吹不到禪房窗紙風翻葉葉涼觸熱行來牽晝夢孤篷聽雨下瀟湘以上華各集秋風門與姑山對溪邊有故廬别來三徑菊閒卻一樓書水碓長腰米村船巨口魚秋風歸去好畱滯意何如兵火後還鄉萬屋烟消餘塔身還家何處訪情親舊時巷陌今誰問卻問新移來住人以上詩人玉屑句風池行落葉梅磵詩話止一句爲鄭安晩稱賞次日有中舍之除陳景沂景沂天台人號肥遯著全芳備祖風雨風雨瀟瀟夕春寒燈較昏茅簷數椽屋荻浦幾家村網到江鱗活沽來市酒渾烘衾供結局一覺眇乾坤全芳備祖林洪洪字龍發號可山泉州人有西湖衣鉢梅磵詩話泉南林洪字龍發號可山肄業杭泮粗有詩名理宗朝上書言事自稱和靖七世孫冒杭貫取鄉薦刋中興以來諸公詩號大雅復古集亦以巳作附於後時有無名子作詩嘲之曰和靖當年不娶妻只畱一鶴一童兒可山認作孤山種正是𤓰皮搭李皮蓋俗語以强認親族者爲𤓰皮搭李樹云西湖煙生楊柳一痕月雨弄荷花數點秋此景此時摹不盡畫船歸去有漁舟後村千家詩釣臺三聘殷勤起富春如何一宿便辭君早知閑腳無伸處只合靑山臥白雲釣臺集陳昉昉字叔方號節齋溫州平陽人以父任入官累除吏部尚書端明殿學士卒諡淸惠宫詞桂影婆娑玉殿涼風傳花漏夜聲長内人亦有思仙者月下吹簫引鳯皇後村千家詩寒食湖上花瘦水肥三月天畫橈雙動朩蘭船人家盡換新榆火唯有垂楊帶舊烟咸淳臨安志洪燾燾於潛人咨夔子以朝奉大夫祕閣修撰兩浙轉運副使兼知臨安府除戸部侍郎咸淳四年除吏部尚書咸淳戊辰餘月下澣去郡歸里因訪菊巖龔先生用平舟楊公韻題蓬山堂泉石人生嚻塵中幾若駒過隙安得坐此山枕流復潄石洞霄詩集張藴藴字仁溥揚州人官幹辦行在諸司糧料院有斗野支稾江湖偉觀隄柳朝朝送酒船一闌山色越㠶烟蓬萊雲氣東溟外閶闔星辰北斗邊突兀向來無此屋登臨當日有諸賢夕陽過雁慵回首吟入關河萬里天西湖淸明芳天新霽惠風和輭綠平隄凝不波桃李無言看客慣樓臺如畫占山多游裙匝路塡車馬翠榜開筵鬬綺羅寂寂寒烟生水面白鷗奈此月明何酥兼味醍醐外分身乳酪中江南鳴穉犢塞上寄飛鴻乾雨看如幻生鹽訝漸融臘殘猶有待煎取牡丹紅食蠣次韻芸隱相黏成什伯峯聳若山王史南人呼明駝爲山王攻處須犀鐵持來出蟹湯梅花霜後味竹葉酒邊香坐憶游閩樂今年始得嘗重游大滌洞天㵎水泠泠石髮新松花香靚翠崖深雲生不没仙人跡丹化猶啼擣藥禽洗眼人多求聖水醒心吾獨愛淸吟杖藜更欲過新洞無柰春空又作霠霅川次鶴田韻苕霅雙流合帆檣萬里通連山黄獨雪一鴈白蘋風酒戸春醅淺魚村晩市同舊游蕉鹿外未老巳成翁秋思暑退涼生體氣佳巻簾聽雨感年華西風葉葉梧桐冷開徧庭前白鶴花垂虹四岸俱無只有天烟檣如雨落鷗前不知笠澤翁何許波上淸風一萬年憶著前遊十四年三高祠下夕陽船無錢買得鱸魚鱠吟就橘花香裏眠惠山石苔滑汰屋連斜第二泉邊古佛家一壑松風聽不了卻畱僧坐自煎茶毘陵天慶觀龍殿陰壁老懷仁筆頭角崢嶸春起蟄有時麾斥惠山雲行雨歸來半身溼金山江身臺殿切空雲夜月魚龍影不分八十老僧相引說潮痕不上郭公墳以上斗野支槀翠蛟亭呈孫元素鍊師二首道人鎖蛟天柱半客來縱蛟作奇觀飛風動地鞫晴雷雄拏怒攫石欲開明珠萬斛撒成雨忽趁流雲入銀浦仙田種玉耕春烟潤流九里無凶年問蛟飛去何時還道人仰笑意自閑月中攜手聽潺湲剡剡星虹白日寒山香一曲落雲端乗虯道士排空去怒雨聲揺碧玉巒洞霄詩集劉霆午霆午淸江人題梅仙壇吏隱淸風幾百年長松脩竹滿壇前漢皇若聽三書諫未必先生便肎仙梅仙事實張弋弋字彥發河陽人有秋江烟草丁晦夫跋張君彦發湖海豪士不喜爲舉子業專意於詩每以賈島爲法所著僅成帙淸深閑雅宛有唐人風致舊名奕字韓伯世爲孟之河陽人貴耳集張韓伯名弋又名奕頎然而長面帶燕趙色口中亦作北語許定夫館于麾下欲命官不受後死于建業定夫葬之蔣山下題曰大宋詩人張奕墓春晩萬事今吾飛絮輕此身如燕又巢成暗思庾信家邊竹綠籜新添有幾莖楚州落帆停鼓鸛湖頭兩度因循到楚州柳下人家曾識面笑求新句寫䊋樓豫章别紫芝吟苦事俱廢拙深貧未除年來如旅燕秋至卽移居古道行黄葉空囊貯素書一生江海恨惟子最知予子山寺迢遞前朝寺經過遂一遊白雲鴉樹曉黄葉鳳臺秋僧舉開山話人消在世愁殿廊經劫火巳費十年修以上秋江烟草寄秋塘五湖風雪分頭去千里淮山信腳行渉世眞成妄男子談詩長憶老先生塘邊𤓰茹須頻灌郭外田疇粗可耕莫倚瘦笻吟白髮浪傳詩句入都城貴耳集蕭泰來泰來字則陽號小山臨江人山則之弟理宗朝爲御史附謝丞相爲右司李伯玉所劾有小山集題梅壇毛慶甫雲悅樓樓立梅峯最上頭日隨元氣與沈浮道心快活雲心似飛去飛來得自由梅仙事實句官卑豈願乗肥馬食儉惟知取瘦羊臘祭謁告作磵詩話梅黄靜齋桃花雨後桃花作片飛風前柳絮點人衣春歸不用怨風雨無雨無風春亦歸全芳備祖張至龍至龍字季靈建安人有雪林刪餘宿靈巖樹杪鐘樓出半層佛牀黠鼠弄殘燈五更石上僧猶定頭滿淸霜喚不譍齊雲寺雨疎分點下畧彴界橫塘接竹通生水搴蘿補壞牆字塗窗眼黑香染佛衣黄未晩螢先出蕭然兩畫廊宿易沖道院松髮經寒亂不梳夜來風減屋茅疎吟邊凍指僵如鐵袖裏枯笻畫雪書擬韓偓體一聲阿鵲顫鸞雙學調新詞未得腔拜了夜香郎喚睡旋收鍼線背銀釭古别離扶上花驄酒半醺望沈鞭影暗銷魂離情恐被行人覺背拂菱花補淚痕以上雪林刪餘吳公敏泊舟潭影靜沈沈維舟傍竹林鄕心寄孤雁寒信起疎砧犬吠人家近燈明樹影侵客愁元不寐夜雨更蛬吟後村千家詩姚寅寅號雪坡派出關西名將後居湖州東林養蠶行南村老婆頭欲雪曉傍牆陰採桑葉我行其野偶見之試問春蠶何日結老婆斂手復低眉未足四眠那得知自從紙上埽靑子朝夕餧飼如嬰兒只今上筐十日許食葉如風響如雨夜深人靜不敢眠自遶牀頭逐飢鼠又聞野祟能相侵典衣買紙燒蠶神一家心在陰雨裏只恐葉溼繅難勻明朝滿蔟收銀繭軋軋車聲快如剪小姑促湯娘剝紕嬉嬉始覺雙眉展繅成白雪不敢閒錦上織成雙鳳團天寒尺寸不得著盡與乃翁輸縣官君不見長安女兒嫩如水十指不動衣羅綺我曹辛苦徒爾耳依舊績麻冬日裏吹劒録投戴岷隱分敎重席先生間世才相逢靑眼必須開手遮紅日汗如雨不是雪中乗興來梅礀詩詁劉文晦種梅佳人天一方歳暮音書絶一枝持贈君猶帶去年雪後村千家詩利登登字履道號碧㵎金川人有骳稾梅川莫令君拉蒼山諸詩友用予松風首句爲韻招予游金精至而盗作不果游走佛巖有感此行爲山來至此事巳非雲火四地動御風誰與期剝牀漸及膚欲去迷所之蒼黄走㵎谷勝遊翻在斯石梯盤七折頓豁萬里奇擁巖千脩篁中著寒泉飛天壤有此景惜哉前不知逃難乃邂逅自愧還自悲山風送萬里開闢知誰爲亦有如我徒慷慨來登兹罹難本因此不悔乃扳窺天亦無如何更供愛日暉平生江海眼此志良未癡忽憶家山遠寒鳥鳴相依母子各一方而皆窘賊圍欲歸莽無從痛毒霑我衣田家小雨初晴歳事新一犂江上趁初春豆畦種罷無人守縛得黄茅更似人癸巳十一月二十五日辭家雪甚作愴然有懷歳暮游子歸余始爲行客朔風萬里長吹雪犯巾幘臨行不言苦不忍母心惻乾坤迫短景寒日易傾仄冰池綠骨巉凍車瓊網澀一寒忍巳熟浪出還自責撫劒睨前岡雲重楚天黑早起見雪折竹風高曉夢驚寒鴉一陣噪冬靑起來檐外無行處昨夜三更猶有星以上骳橐張澮川寒食江城吹笛晩風斜城郭人稀噪亂鴉火冷烟靑寒食過家家門巷掃桐花後村千家詩馬子嚴子嚴字莊父號古洲建安人烏林行荆州兒曹不足恃何物老瞞欺一世兵書浪語十三篇不料烏林出奇計隆準雲孫驅伏龍紫髯强援要江東戈船植羽蔽寒日雪浪崩崖驚晚風行閒一卒如兒戲持火絶江人不意灰銷漢賊終老心功入喬家少年壻君不見華容道傍春草生魂銷不聽車馬聲哀猨夜啼霜月冷空餘野燐沙邊明詩人玉屑此詩辭意精深不減張王樂府惜世無知者録遺後人共評之宋伯仁伯仁字器之苕川人有雪巖集馬塍稾戲作靑梅黄盡雨無多柳影重重午日過忽聽隔籬人語笑採蓮船子上新河寓西馬塍嘉熙丁酉五月寓京遭爇僑房西馬塍十畝荒林屋數間門通小艇水彎環人行遠路多嫌僻我得安居卻稱閒尊酒相忘霜後菊一時難盡雨中山何年脫下浮名事只與田翁賸往還羊角埂晩行葛帬蒲履帽烏紗迤邐乗涼到水涯數寺晩鐘聲未歇滿身凉月看荷花以上馬塍槀秋晚西風吹破墨貂裘多少江山惜倦游紅葉巳霜天欲鴈綠蓑初雨客吟秋後村千家詩魏慶之慶之字醇父號菊莊建安人與玉林黄昇友善有詩人玉屑過玉林一歩離家是出塵幾重山色幾重雲沙溪淸淺橋邊路折得梅花又見君梅磵詩話張廣漢宿梅仙壇夜宿梅壇境山寒萬籟空無才供吏隱有夢憶仙翁石齒含殘雪松髯奮急風竈烟如可䑛跨鶴問鴻濛梅仙事實徐集孫集孫字義夫建安人有竹所吟稾智果寺觀東坡墨蹟參寥泉煮茗評詩歳月深堂堂遺像篆烟沈數間老屋關興廢一段淸名無古今碑斷亂雲封字腳亭荒落葉覆泉心斜陽影裏夷猶處仰止高風不敢吟水樂洞路穿巖竇折羊腸處處亭臺御墨香流水不隨人事去尚餘絲竹舊宫商重拜和靖先生墓秋聲爾許悲懷古若爲思菊老泉堪薦山孤草亦萎高風畱塑鶴殘雨暗荒碑依舊梅千樹無花香似詩湖西納涼小艇撐過第一橋酌泉橋下擲詩瓢來遊道院分荷供擬拉吟僧遣鶴招暮靄直從漁笛起月華高過塔燈遙且於靜處偷淸福人海驚人湧似潮玉岑一抹斜陽挂淺林細聽山鳥說春心千年古寺多奇迹讀了豐碑看玉岑以上竹所吟槀徐用亨用亨括蒼人偶作誰把先生號冷官令名深媿馥秋蘭孟公豈是陳驚坐子夏元非杜小冠涇渭合流雖若混雲泥夐絶不相干寄言世上多風鑑一笑何妨改眼看吹劒録吾鄉潘元龜授婺州敎授鄰居徐用亨亦呼敎授因作詩云云劉遂初閤皁山作春山靈草百花香誰識仙家日月長滿院莓苔綠陰帀棊聲何處隔宫牆詩人玉屑沈中行中行號野逸游九鎖青山倚天分九峯或踞虎豹蟠蛟龍奔霆白晝鞭玉虹鐵花冰激靑濛濛中有浩劫元皇宫彷彿崑閬雙衡嵩洞門誰掣烟霞封玉鼠石燕巢嵌空列炬仰見仙人蹤枰棊布子局未終冥懷欲喚洪崖翁共翳紫鳳驂飛鴻一笑弱水三萬里他年相見方壺中洞霄詩集劉應子應子號錦山游九鎖大滌仙山不易尋仙人樓閣倚林坰地環九鎖溪爲路殿合諸峯石作屏落日烟嵐呈紫翠淸秋朩石寫丹靑我生素負元龍氣東望滄溟醉眼醒洞霄詩集宋詩紀事巻七十三
