body:
  text: 宋詩紀事卷四十四錢塘厲鶚撰何薳薳字子遠號韓青老農浦城人去非之子東都遺老入南渡尚存著春渚紀聞章序臣得銅雀硯屬余作詩阿瞞示姦雄挾漢令天下惜時無英豪磔裂異肩踝終令盜壞土埏作三臺瓦雖云當塗高會有食槽馬人愚瓦何罪淪蟄翳梧檟錫花封雨苔鴛彩晦雲罅當時丹油法銅雀瓦用鉛丹雜胡桃油搗治火之取其雨過即乾實非謀諸野因之好奇士探琢助揮寫歸參端歙材堅澤未渠亞章侯捐百金訪獲從吾詫興亡何足論徒足增忿罵但嗟瓦礫微亦以材用捨徒令瓴甓餘當擅瓊瑰價士患德不備不憂老田舍春渚紀聞何藗藗字子薦薳從兄寓居餘杭與友張圖南伯鵬俱早世薳集二人遺句名南金録句不便翠分旁牖去卻緣清甚畏人知賦藏筠軒紀聞春渚張圖南圖南字伯鵬餘杭人句坐中競病分明久驢上推敲兀未裁春渚紀聞圖南督豫分韻詩未就有詩云云用事精穩如老作者惜乎天不少假之年以觀其所止也鄭魁賦林叔睿端硯仙翁種玉芝耕得紫玻璃磨出海鯨血鑿成天馬蹄潤應通月窟洗合就雲溪常恐魍魎奪山行亦自攜春渚紀聞永嘉林叔睿所藏端硯馬蹄樣深紫色厚寸許面徑七八寸下鄭魁銘詩隸字甚奇末句所寄旨哉莊綽綽字季裕清源人官鄂州守有雞肋編程致道云季裕著本草蒙求三卷甚工洪析仲軒渠録莊季裕年未甚老而體極癯瘠本呼為細腰宫院子建炎三年七月寓長洲白馬澗張氏舍題壁昔年隨牒作邊侯愁望長安向戌樓今日衰頽來澤國又看烽火照長洲雞肋編和吳正仲觀李廷圭墨賴召陳元典籍傳肻教邊腹擅便便竟誇削本真餘事卻笑磨人得永年三友不居毛穎後五車仍在楮生前秖愁公子從醫説火煅生分不直錢雞肋編吳幵正仲家蓄唐以來諸李所製墨無出廷圭之右者其堅利可以削木王彥若墨説云趙韓王從太祖至洛行宫見架上一篋取視皆李氏父子墨也因盡以賜王後王之子婦蓐中血運危甚醫求古墨為藥因取一枚投烈火中研末酒服即愈諸子欲各備産乳之用乃盡取墨煅而分之自是李氏墨世益少得薑光彥光彥字仲謙號松菴淄州人巳酉中秋任才仲陳去非會飲嶽陽樓上酒半酣高談大笑行草間出誠一時俊遊也為賦之嶽陽樓髙幾千尺俯視洞庭方酒酣萬頃波光天上下兩山秋色月東南興來鸞鵠隨行草夜永魚龍駭笑談我欲煩公釣鼇手盡移雲水到松菴嶽州府志周莘莘字尹潛錢唐人邠之孫為嶽陽決曹掾與陳去非為友野泊對月有感可憐江月亂中明應識逋逃病客情斗柄闌干洞庭野角聲凄斷嶽陽城酒添客淚愁仍濺浪卷歸心暗自驚欲問行朝近消息眼中羣盜尚縱橫瀛奎律髓康與之與之字伯可渡江初以詞受知髙宗官郎中有順菴樂府鶴林玉露建炎中大駕駐維揚伯可上中興十䇿名聲甚著後秦檜當國乃附會求進擢為臺郎值慈寧歸養兩宫燕樂伯可專應制為歌詞諛豔粉飾于是聲名掃地世但以比栁耆卿輩矣檜死伯可亦貶五羊題宣和御畫扇玉輦宸遊事已空尚餘奎藻繪春風年年花鳥無窮恨盡在蒼梧夕照中桯史康與之在高皇朝以詩章應制與左璫狎適睿思殿有徽祖御畫扇上時持玩流涕璫偶下值竊攜至家而康適來留之燕飲漫出以示康紿璫入取肴核輒泚筆几間書一絶于上有頃璫出見之大恐而康已醉無可奈何明日伺間叩頭請死上大怒亟取視之天威頓霽但一慟而已僻居巷僻過從少柴門盡日關鶯聲常在桞雲影不離山有道難言闕雖貧未厭間川原煙四暝春思有無間鷺春暗汀洲杜若香風標公子白霓裳碧天片雪忽飛去何處人家水滿塘琵琶夜深琵琶聲似裂一曲霓裳一庭月曲終人影在西階困倚東風步搖折可惜簾幕重重下玉鉤隔簾春在栁梢頭東風著意相料理吹去楊花不自由以上前賢小集拾遺題清江慧力寺天涯芳草盡緑路旁栁絮爭飛啼鳥一聲春曉落花滿地人歸江上濃陰曉未開瘦笻支我上蒼苔春寒前日去已盡今日又從何處來詩人玉屑招真詞并記自姑蘇出齊門沿而北望山如巨鼇常熟縣之虞山也邑去江不及程陂湖畝澮之積自南至者傾馳會于江江河既應則迅瀾倒流二水相制移時而不能去山無奇谷惟荒墟白草醜石陂陀迤邐而西有修林橫抹隱見于兩山之間其中為招真菴元祐中道人申氏海陵徐處士弟子也松林森茂庭宇簡寂如隱君子之居通州道士喻抱元增治之舊名竹陵自是更以招真請記于僕乃歌招真之詞以系之曰白鶴巢兮丹井空蓬山杳兮煙霞濛陵谷變兮今古木葉下兮秋風飛仙去兮朝太微黃冠野服兮以遊以嬉餐霞臥月兮世不我違與世滌映兮天門可馳蒼龍嘷兮雲漫扉石泉冽兮山芋肥俯仰宇宙兮日月蔽虧靈秀回薄兮野芳呈姿山中之樂兮萬化莫移仙人不來兮隱者曷追蘇州府志李唐唐字希古河陽三城人徽宗朝補入畫院建炎間太尉邵宏淵薦之授成忠郎畫院待詔賜金帶圖繪寶鑑李唐年近八十善畫人物山水筆意不凡尤工畫牛高宗雅重之嘗題其長夏江寺卷云李唐可比唐李思訓如杭得幸高宗余家畫繼補遺建炎南渡李唐有唐畫胡笳十八拍高宗親書劉商辭留空絹俾唐圖寫亦見高宗雅愛唐畫也題畫雲裏煙村雨裏灘看之容易作之難早知不入時人眼多買燕脂畫牡丹郁氏書畫題跋記錢唐宋杞云唐初至杭無有知者貨楮畫以自給日甚困有中使識其筆曰待詔作也唐因投謁中使奏聞而唐之畫杭人即貴之嘗有詩云云張九成九成字子韶號無垢居士開封人徙家錢塘紹興二年進士第一歷宗正少卿兼侍講權刑部侍郎纍謫南安軍起知溫州丏祠卒贈太師封崇國公諡文忠有橫浦集心傳録日新録論語詩南安寶戒院作苦無人事擾間居贏得終年學著書今日欣然出門去秋風吹意滿芙蕖橫浦心傳録菩提寺髙僧居物外有户晝常扃海濶知天大泉甘識地靈一簾春月靜數點别山青便卜歸歟計移文休勒銘詩林萬選遺樊茂實硯詩刻硯後端溪石硯天下奇紫光夜半吐虹霓不隨凡石追時好真與日月爭光輝韜藏久矣不亂用唯恐翰墨汗染之樊子文章有餘地汪汪萬頃誰能窺贈君此硯無輕棄經史妙處其發揮飛流濺沫遍天下要使咳唾皆珠璣遊宦紀聞施德操德操字彥執鹽官人與張九成子韶楊璇子平號三先生著北窗炙輠廣福禪院在鹽官有雪峯禪師手鑿井何處登臨眼最明雪峯佳處一川平潮從海月生時上峯在雲天盡處橫幢蓋神扶喬木影風雷井閉古泉聲靈蹤鑿盡翻惆悵何日闕山報道成咸淳臨安志楊璇璇字子平鹽官人與施德操同時里人號德操為持正先生璇為謹獨先生東山廣福院在鹽官院有葛仙翁井檥棹青山下來尋薊子家人魚皆靜樂水木亦清華松老已成蓋菊寒殊未花何須覓句漏此地有丹砂咸淳臨安志西山廣福院在海寧紫微山地勢連滄海名山號紫微景間僧坐久路僻客來稀峽影清相照河流石自圍塵喧都不到安得此忘歸海寧縣志刁文叔文叔不知其名張橫浦子韶之友春日旅中來時江梅散玉蘂歸去牟麥如人深桃花只解逞顏色惟有垂栁知客心橫浦心傳録云思致尤遠不止工也陳棠棠字德召紹興二年進士官祕書少監晚步晚步沙頭倚小晴南山正與暮雲橫棲鴉啼處野煙合飛鳥去邊孤月生樹暗風微花氣度溪深雨漲水痕平夜闌衣溼迷歸路髣佛前村燈火明前賢小集拾遺鄭仲熊仲熊字行可衢州西安人紹興二年進士纍官權參知政事忤秦檜落職孝宗即位復端明殿學士桂花天公憐我太岑寂每嵗殷勤兩度開收拾落英將底用博山香裏薦清杯全芳備祖鄭剛中剛中字亨仲婺州金華人紹興二年進士纍除祕書少監出為四川宣撫使為秦檜所忌罷謫桂陽軍徙封州卒檜死復原官諡忠愍有北山集老學菴筆記蜀人任子淵好謔鄭宣撫剛中自蜀詔歸其實秦檜欲害之鄭公有惠政衆皆太息或曰鄭不來矣子淵對曰秦少恩哉人稱其敢言方萬里跋北山文簡古詩峭健在封州詩尤佳修修窗前蘆修修窗前蘆孤瘦倚青玉心虛知夜涼風葉亂相觸使我入幽夢如在江湖宿方兹困炎曦愛爾眼中緑奈何柔脆姿行犯秋霜肅霏霏霜露中菱荷等摧覆大抵無徑節不及嵗寒竹過越江見人家臨水竹可愛何人此地得幽居水竹中間宅一區無盡江山千萬里有情花木兩三株應無俗客來驚犬時有扁舟過賣魚我欲他時成卜築更添幾架古人書寒意嶺南霜不結風徑是霜時日落晚花瘦山空流水悲棲鴉尋樹早凍蟻下窗遲季子家何在衣單知不知辛未元夜輕寒擁山城逺緑生春草迎神樂元夜笑語聞蠻獠惟有團圓月報我時節好寸燈豈為孤巵酒未為少微醺短檠旁人靜茅屋小以上北山集范達夫硯范郎紫玉餘半圭翻手作雲雨雹隨龍蛇起陸孔翠飛雲收雨霽千首詩硯箋王伯庠伯庠字伯禮鄞人參政次翁之子紹興二年進士官至夔州路安撫和潘良貴題明州三江亭韻使君不受二毛侵杖履逍遙得勝尋撥遣簿書聊永日登臨山水亦何心殘梅隨雪垂垂白弱栁搖春淡淡金倚矚大江供一笑幾多襦袴在謳吟延祐四明志陳栖筠和潘良貴題明州三江亭韻紅塵一點不相侵下瞰澄江幾萬尋地接海潮分鼎足簷飛鳳翼峙天心三山有路雲垂幕午夜無風月涌金欲識龔黃報新政滿城爭唱使君吟延祐四明志贈泊宅翁方勺學道悠悠未見功敢云凡質有仙風他年一鉢江湖去先向苕溪訪葛洪金華府志謝伋伋字景思上蔡人參政克家之子官至太常少卿紹興初侍父寓居黃巖自號藥寮居士有藥寮叢稿妙庭觀蕭蕭六轡天邊路雲竹風松正嵗寒欲洗衰顔換凡骨應須九轉大還丹雲軿一去遠難追丹鼎埋光固不疑承露仙人辭漢後幾重深杳隔瑤池杭州府志陳用中用中字彥才永嘉人戲作賦命安能比巨公偶然年月與時同只因日上爭些子笑向連江作醉翁竹坡詩話紹興初有退相寓永嘉獨陳用中彥才雖鄰不謁及再相有薦之者止就部注邑連江戲作小詩云云蓋其所生年月時適與時宰同但日差異耳陳述述紹興初知袁州化成巖出郭二三里覽勝適願言羣山接天際一水經巖根參差崖上屋蕭間松下門真趣自往古聊可開清尊袁州府志董穎穎字仲達德興人紹興初從汪彥章徐師川遊有霜傑集江上萬頃滄江萬頃秋鏡天飛雪一雙鷗摩挲數尺沙邊栁待汝成隂繫客舟前賢小集拾遺句雲壑釀成千嶂雨風蘋吹老一川秋夷堅志高登登字彥先漳浦人宣和間為太學生與陳東等上書乞斬六賊不報紹興二年廷對極言授富川簿轉古縣令以不肻祠秦檜父胡舜陟誣奏下靜江獄會舜陟以他事下獄死乃得白編管容州卒有東溪集思歸忽忽已秋杪言歸欣有期接物想吾廬青蘂繁東籬流匙白雲子蘸甲黃鵝兒對此憶羈旅多應歌式微喜慰倚門心愁銷舉案眉稚子鬧簷隙繞膝牽人衣歸心念如許兼程猶苦遲明朝秋色裏烏帽風披披冒寒行風雨有感號風撼枯枿凍雨凝路塵乾坤祕日月八荒同一雲遙知沙漠寒黯黮愁殺人天涯望不極流淚滿衣巾水漲謝邑宰送米心知一字不堪煮矻矻窮年黃卷中食粥由來未為拙儲瓶況乃嗟屢空令君好賢嫓韓愈賤子受賜慚盧同春水從教繞舍北癡兒不復啼門東中秋對月繡江再見中秋月嵗去月圓人尚缺相望千里共嬋娟苦恨亭亭照離别今夕一樽誰與同孟光舉案對梁鴻衆雛立侍儼成列以此持杯夀乃翁乃翁看月揩病目手足傾頽頭髮秃但願團欒三十秋不計東西與南北以上東溪集劉儀鳳儀鳳字韶美普州人紹興二年進士孝宗朝纍遷祕書少監兵部侍郎斥歸復起知漢州果州詠范志元誰家遊冶郎闖首窺幽闥但見臉如花不知心是鐵一夕變其軀雪姿映雲髮昔為桃李顔今作松篁節方輿勝覽純陽山在合州石照縣北唐女冠范志元得道處天寶間天使任安者至山中慕之而志元變為男子劉儀鳯有詩自歸州陸行至夔州戶口村無幾犁鉏力不堪林荒樗櫟夀月黑虎狼貪幽絶雲眠穩清間谷飲甘故山深未極壤斷蓋茅菴曠野無人宿危亭犯雨過嶺雲堆贔屓剎海現兜羅酒觸秋懷壯天留暮色多不勝行役苦裁入竹枝歌顧氏積書巖選李衡衡字彥平號樂菴江都人紹興二年進士纍遷監察御史出知溫婺台三州召除起居郎祕閣修撰致仕居崑山慧聚寺作盡日用登陟跏趺聊對牀巖空炫層碧草細涵幽香弔古漫秋思開尊巳月光隨身有竿木作戲且逢場天面無纖靄平川灝氣吞搘笻臨閣道拂石憩雲根栁映山前路煙搖水北村醉歸風滿袖斜月在蓬門樂菴初成老子平生百不足菴成那平管食無肉終朝閉戶只讀書四面開窗都見竹以上玉峯詩纂薛靖靖鄞人紹興二年進士望金山一柱支空立濤聲春寺聞消來巴地雪飛到潤州雲寂寞江山色縱橫盜賊羣不堪形勝裏北望涕紛紜薛氏世風集孫雄飛雄飛字翬之吳郡人紹興二年進士祕書省正字靈隱寺蓮峯堂堂開金色界梵客為鉤簾山影碧侵座水聲清繞簷粉雲埋石腳珠露泫松髯終擬攜孤笛憑闌喚玉蟾咸淳臨安志楊願願字謹仲清江人紹興二年進士歷簽書樞密院事兼參知政事罷提舉太平觀伏承駒父祕校惠示見和鄙句七言四韻二首降歎之餘因成二絶往謝冷官廳事客來稀衆緑陰陰結夏帷忽得君詩愜人意陶家風到北窗時只今侍讀周夫子屢説君詩似杜詩速把冠塵盡彈卻玉堂宵直伴王維願數見侍讀侍郎周公盛稱駒父詩有句法故後篇及之周益公題跋汪應辰應辰字聖錫玉山人紹興五年進士第一孝宗朝歷吏部尚書翰林學士出知平江府卒諡文定有集挽宣撫吳郡王節義家傳久艱難始見忠一心惟徇國百戰竟平戎環列周廬肅官儀道路同細看麟閣上誰得似初終太傅元功首汾陽異姓王恩榮兼二美聲迹遠相望名載風雲會神遊水月鄉維師空贈典無復見鷹揚分韻送胡丈歸建康先生高臥武夷巔一旦趨朝豈偶然報國自期如皎日歸田曾不待來年懷鉛共笑揚雄老鞭馬今輸祖逖先册府風流久寥落送行始復有詩篇以上汪文定公集湯莘叟莘叟字起莘寧化人紹興五年進士終饒州推官馬上吟宿雨洗山新緑嫩曉風吹杏淺紅乾沙頭路暖日初上行客揚鞭不覺寒句葛巾簪下無多髮茅舍門前有好山幽居府志以上汀州孫起卿起卿吳郡人紹興五年進士江纂墓碑家有古冢碑近自田家獲藏之五六年未甚見省録古苔侵文理封結殆莫識偶然嗟其窮一一為磨剔始若漫無文細尋適可讀文云晉江纂長夜垂兹刻貞石殊不用塊然但埏埴合葬無别銘背面書反覆一字不涉華本枝記明白二父遂兼書于逌乃宗嫡自注志云養父諶本父逌也考諸晉史篇真是小出入字畫亦嶮徑然不類鐫斫漢魏尚豐碑兹獨何褊迫豈時丁喪亂不暇治品式于時義熙季處次實庚戌五胡剖中華典午竄南極茍簡理宜爾寧詒不孝責審訂昭昭然疑去喜自適歷年七百餘瞥爾駒過隙名節茍不傳埃化先庀石置兹當眼前用代銘几席吳郡志江纂江逌子也木瀆孫起卿頃于天平山下地名上沙獲墓碑乃以大方甎刻之字畫俱存與石無異起卿為賦詩吳詠詠字永言仙居人芾從兄紹興五年進士仕西安令有西安集殊聖寺和孟戎幕韻院靜僧疑少門幽客自稀山寒雲近屋徑狹石侵衣松鬛蒼髯古薑芽紫筍肥騷人詩戰罷踏月夜深歸台州府志魯訔訔字季卿號冷齋海鹽人紹興五年進士仕至太府卿注杜詩行于世樂郊私語杜少陵集自遊龍門至過洞庭詩目次第為此州先正魯季卿編定大都一循少陵生平行迹可以見其詩法升降隨其年自少而壯而老愈入于細而化也春詞疊穎叢條翠欲流午陰濃處聽鳴鳩兒童賭罷榆錢去狼藉春風漫不收詩林萬選沈作哲作哲字明逺吳興人丞相該之姪紹興五年進士嘗為江右漕屬作哀扇工歌忤洪帥魏良臣道弼據深文劾之奪三官有寓山集哀扇工歌黃州竹扇名字著織扇供官困追捕史君開府未浹旬欲戴綸巾揮白羽新模巧製旋剪裁百中無一中程度犀革鐫柄出蟲魚麝煤熏紙生煙霧蕺山老姥羞翰墨漢宫佳人掩紈素衙內白取知何名帳下雄拏不知數供輸不辦箠楚頻一朝赴水將誰訴史君崇重了不聞嗚呼何以慰黎庶聞道園家賣菜翁又説江南打魚戶號令亟下須所無官不與錢期限遽歸來痛哭辭妻兒宿昔投繯挂枯樹一雙婉婉良家子吏兵奪取名為顧弟兄號叫鄰里驚兩家吞聲喪其嫗死者巳矣可奈何冤魂成羣空號呼去聲殺人縱欲勢位尊貪殘無道天所怒邦人蓄憤不敢言君其拊馬章臺路清波别志鶚按韋居安梅澗詩話云哀扇工詩不傳今從清波别志檢得無名子哀扇工歌一首當即是沈詩佚其姓名爾陳直齋云哀扇工詩罵而非諷今讀之良然仍以還沈鄭若谷若谷鄞人紹興五年進士和潘良貴題明州三江亭韻遠望登高萬象侵元戎端不為花尋未誇駕鶴蓬山路應壯斬鯨遼海心小艇鱸肥盤膾玉危闌客醉碗揮金中流擊楫雄圖逺回笑三閭澤畔吟延祐四明志關注注字子東景仁子澥弟紹興五年進士教授湖州至太常博士自號香巖居士有關博士集記夢玄衣仙子從雙鬟緩節長歌一解顔滿引銅杯效鯨吸低回紅袖作弓彎舞留月殿春風冷樂奏鈞天曉夢還行聽新聲太平樂先傳五拍到人間墨莊漫録宣和二年睦冦方臘起幫源浙西震恐關注子東在錢塘避地攜家於無錫之梁溪明年臘就擒子東貧未能歸僑寓毗陵郡崇安寺古柏院中一日忽夢臨水有軒主人延客年可五十儀觀甚偉玄衣而美須髯揖坐使兩女子以銅杯酌酒謂子東曰自來歌曲新聲先奏天曹然後散落人間他日東南休兵有樂府曰為太平樂汝先聽其聲遂使兩女子舞主人扺掌節巳而恍然而覺猶能記其五拍子東以詩紀之云云松聲夢破松聲枕上聞睡魔夜半戰吟魂初疑夜雨連江岸乍覺寒潮上海門招引好風來古寺追隨月色下前村晚行欲向聲來處鬱鬱蒼波盡日奔南窗紀談句鐘聲互起東西岸漁火遙分遠近村春渚紀聞此余友關子東西湖夜歸所作非身到西湖不知此語形容之妙夜長何時旦苦寒不成寐強行父唐子西先生文録聞子柬一日寓辟雍朔風大作因得句云云以問唐先生云詩律雖不到對亦似不穩先生云正要如此一似藥要存性也朱敦儒敦儒字希真洛陽人以薦起紹興五年賜進士出身為祕書省正字兼兵部郎官遷兩浙東路提點刑獄上疏乞歸居嘉禾晚除鴻臚少卿有巖壑老人詩文一卷又有獵較集二老堂詩話希真詩詞獨步一世秦丞相晚用其子某為刪定官欲令希真教秦伯陽作詩遂落致仕除鴻臚少卿蓋久廢之官也蜀人武橫作詩嘲之未幾秦丞相薨希真亦遭臺評高宗曰朕用明橐薦以隱逸命官置在館閣豈有始恬退而晚奔競耶其實希真老愛其子而畏避竄逐不敢不起識者憐之小盡行避地廣中作藤州三月作小盡梧州三月作大盡哀哉官歷今不頒憶昔升平淚成陳我今何異桃源人落葉為秋花作春但恨未能與世隔時聞喪亂空傷神竹坡詩話絶句輕陰小雨晚難收栁瘦梅窮卻似秋可恨水仙花不語無人共我説春愁春怨梨花雨送海棠風不借胭脂作小紅幾日無人吹玉笛鴛鴦飛入館娃宫以上後村詩話絶句青羅包髻白行纏不是凡人不是仙家在洛陽城裏住臥吹銅笛過伊川澄懷録陸放翁云朱希真居嘉禾與朋儕詣之聞笛聲自煙波間起頃之棹小舟而至則與俱歸室中懸琴築阮咸之類簷間有珍禽皆目所未覩室中籃缶貯果實脯醢客至挑取以奉客其詩云云句過時不語鶯解事怕客深藏魚見機人間萬事老無味天下四時秋最愁翦茅編鶴屋篩米聚雞糧燈昏鼠窺硯雨急犬穿籬後村詩話孫松壽松壽字嵓老郫縣人紹興五年類試進士嘗為漢嘉守除直祕閣觀古魚鳧城在溫江縣北十五里有小院野寺依修竹魚鳧迹半存髙城歸野壠故國靄荒村古意憑誰問行人謾苦論眼前興廢事煙水又黃昏賦成都碧雞坊李氏石君原注事見成都古今記中蓋湖石之最大而奇者著名舊矣造化小兒斫山骨幾年流落蛟龍窟太湖一碧浸玻璃瀾吞浪吐窮奔突瑰奇未許困泥沙漂出江臯空傲兀清寒偃蹇如髙人肻向蓬蒿念埋沒曩聞上苑饒奇珍千形萬狀髙嶙峋當年搜索困山海氊包席裹車轔轔規模豈但肖五嶽氣象直欲凌三神一朝邊馬窺城下倒隨矢石荒荆榛憐君分落幽人手不逐爾輩汙塵垢首陽寂寞伯夷清瀟湘冷落三閭瘦李侯胸中飽雲夢得君不用斯瓊玖館之舊隱與周旋竹士松賔三益友相看一洗名利心眉宇更清元德秀君今幾世德未衰霜寒玉立癯而壽咄嗟世眼多嗜好玩形忘理十八九奇章所蓄森琅玕名標甲乙空紛然到溉奇礓高崒嵂一擲徒為負進錢石君於汝非不厚較其所得無何有願公世濟此君為不朽以上成都文類王灼灼字晦叔遂寧人嘗佐總幕有頤堂先生集贈王道成龍鍾健兒須如棘幼事秦府持鞭靮戰塵撲面心已灰徑上三峯弄泉石乾坤變化五百年人間未識地行仙布囊落魄荆州市丹經祕法為君傳散盡千金何所有腹中氣作蛟龍吼功成直欲投紫霄尚愛岷峨山下酒年來我亦厭樊籠乞取微言為指蹤君不見葉縣雙鳧緱嶺鶴古來度世多吾宗夷堅志王道成先生者夔州人射利江湖間為賈客政和六年忽遇異人傳內丹之妙遂破家從王鼎學道遨遊東西二蜀鼎亦時見荆南市中不與人交一談無能識其誰何者身長七尺廣目美髯狀貌如四十許人荆南父老自兒童時蓋已見之一日與道成飲自通姓名曰吾洛陽人唐武德初事秦王為御者奔走兵間後得仙法隱華嶽山中以至於今酒酣别去不知所往道成本愚民不能從其詞訪大業武德中事且驗其是否紹興六年道成王灼晦叔於金川講巖盟之好為作古風一篇與之此篇見頤堂集中不終言道成之究竟也銅馬歌并序郫城村民鑿古墓遂得一銅馬高三尺許制作精妙前簡池守景季淵取以歸中宵風雨輒聞嘶聲怪之不敢留移送佛寺紹興丙子豫以事至成都黃伯淵見索作銅馬歌君不見武皇逸志凌九垓追風躡影思龍媒魯班門外立銅馬天廏萬匹皆塵埃又不見伏波將軍破交賊歸來殿前獻馬式據鞍習氣殊未衰想見老子真矍鑠兩京翻覆知幾秋只有山河供客愁孤煙落日蠶叢國出此神物于荒丘千年黃壤誰作主猶把歸心泣風雨但恐一朝去無蹤有似豐城寶劒化雙龍以上頤堂集宋詩紀事卷四十四
