body:
  text: 宋詩紀事巻七十錢塘厲鶚撰謝耘耘字耕道天台人送石深之歸沃洲嬾踏紅塵地結廬巖壑間酒催清夜别身伴白雲還賀老湖邊月支公屋外山沃洲吟不盡天與老翁閒東志畧句路深容馬窄樓小插花多貴耳集謝耕道自號謝一犂有犂春圖諸公喜于納交善滑稽三十年閒天下詩人未有不至其室詩軸不知幾牛腰巾高二尺餘方口大面行于市孰不曰謝一犂因是名滿京洛壁閒寫詩中有一聨云云事繼母極孝母九十七八該慶典初封人榮之呉浚浚字允文旴江人有集重過瑞金江水瘦灘聲健天寒霜意新犬牙舟過石魚貫路行人到眼心應識回頭跡易陳時平刀劒息失喜問遺民客中斷雁嘯雲天雨霜客中何事不凄涼玉梅約住東風信更讓黄花半月香春日畫堂簾箔碧籠蔥午夢糢糊燕語中微雨嫩晴天似醉鬧紅吹上海棠風以上呉允文集張濡濡號松窗遊大滌山危樓拱翠出層空畫棟朱闌縹緲中客散月明風露下一匳天棘伴絲桐洞霄詩集韓準準號鶴山九月梨花粉膩迷春月滿枝誤隨秋日弄芳菲料應潛作春宵夢剛被西風不放歸詩林萬選陳叔堅叔堅字堅甫號遯齋送素上人遊方不是無衣鉢師心酷愛山自言行腳好卻厭住菴閒野水寒林外孤雲夕照間清遊何處寺須寄好碑還詩家鼎臠葉善夫芹溪小隱在建陽芹溪處士古人風寶劒塵埋未化龍舊隱至今名不朽扁題原出紫陽翁建寧府志仇從簡從簡號芋田句雪翻夜鉢裁成玉春化寒酥剪作金詠酥黄芋清供山家周彥夫天津橋二首下車聊復問何如尚憶重來四紀餘鐘阜秦淮俱好在秖憐雙鬢自蕭疎聨鑣去作蔣山遊路轉天津遶御溝忽作故都禾黍恨洛陽宫殿鎖千秋景定建康志黄文度文度號小園白藕白藕花前一信風颯然吹雨到梧桐可憐一段凄涼意併入西窗客夢中詩林萬選劉清軒句可笑呉癡忘越憾卻誇范蠡作三高陳郁話腴嘗見有人彈范蠡文云呉江三高即越之范蠡晉張季鷹唐陸魯望也范蠡越則謀臣呉為敵國假扁舟五湖之名居笠澤三高之首況當無邊勝地之上著此不共戴天之讐其視菰菜蓴羮敝屣名爵筆牀茶竈短棹江湖者豈容與之並駕臨風聨鑣釣雪耶劉清軒云云見譏固已深矣薛琦琦鄞人題荆浩畫青山白雲巻渺渺山上山隱隱樹邊樹雞犬不聞聲居人在何處甬上耆舊集李檝檝號碧山有約楊柳垂隄水遶門可人清景近黄昏明朝有約誰先到手掐花梢記月痕詩林萬選王輝輝古汴人楊柳枝密密陰陰漢將營春風吹斷皷鼙聲少年不說封侯事柘彈銅丸落曉鶯詩家鼎臠史繩祖繩祖字慶長曽遊魏鶴山之門著學齋佔畢紅莧易稱紅莧美柔英夬決窮陰日旅辰不以色紅為貴尚何因赤莧有仙人圖經明州赤莧山土傳赤莧仙人所種學齋佔畢周伯仁伯仁字及之南昌人句照天不夜梨花月落地無聲柳絮風春雪桃源手聽易寓言杜鵑花輕剪梢頭薄薄羅子規湔血恨難磨園林莫道香飛盡嫩綠枝頭不用多全芳備祖曾蘭墅西湖夜景閒窗放入四山青古篆無烟氣自清風不鳴條花著露一湖春月萬蛙聲咸淳臨安志李軏畫楊妃扇頗憶前身是謫仙硯煩親捧玉堂前如今再閱嬋娟靣不覺人閒五百年翰墨大全王公煒梅花枯霜翦盡千林葉纔放江頭第一春瘦影看來天愛畫孤根生處地無塵夜郎嵗晩逢羈客谷口寒雲見似人絶是精神吟不盡好枝和月插紗巾後村千家詩葉豈潛豈潛字潛仲金華人佐廣西漕幕蟬柳邊曉立看蟲蛻化作風餐露宿身林靜畫長吟不絶騷騷清苦似詩人鱖魚漁翁今度笭箵富政是桃花水膩時網得文鱗如墨錦貫來楊柳是金絲以上後村千家詩黄登登字瀛父號南溪有適意集山中曉行上到山巔曉色分眼看殘月待朝昕望迷四顧渾如海立欲移時秖是雲隱隱樓臺平地見行行鐘磬半天聞舉頭頓覺青霄近我欲乗風謁帝君後村千家詩黄師參師參字子魯號魯菴過廬陵昔年棲迹處今訪不知門華屋半塵土故人餘子孫少畱誰共語欲去轉銷魂落日江樓遠江山空復存李鹹谷歌李鹹谷真詩人無枝可棲雲水身去年縣官為架屋纔有數枝堪寄宿朝厨無烟吟正高癡兒叫怒吟轉豪人閒六月盡絺服獨著春衫涼自足黄雞白酒東家畱西家欲畱還住休鑿池養魚未盈掌有客過門須舉網網收魚盡鏡匳空菜羮作供尤春風谷之山窈復深誰其友之紫芝民谷之水清且泚誰其似之巢父耳再拜號君鹹谷子白頭結交從此始以上詩家鼎臠潘亥亥字幼明號秋巖檉子寄趙紫芝長安獨跨驢一别二年餘朝士不能薦承明空有廬窗虚桐影薄櫂冷桂花初莫怪無書札心親迹任疎前賢小集拾遺社日聽得東風急吹乾小徑泥雨多花放早水滿燕飛低貧女不知緯幽人只此棲依依懷去嵗摘茗白壇西東甌詩集葉茵茵字景文笠澤人有順適堂吟稾偶成春來晴復陰因物悟浮生杜宇鄉心重楊花世事輕知非蘧伯玉覺是晉淵明此意誰人㑹騎牛訪耦耕蘇隄南北山圍翡翠隄隄邊綠漲輭琉璃參差臺榭無餘地雜踏輪蹄了四時楊柳又多前日樹梅花秖少近人詩停篙不看春風靣閒伴漁翁理釣絲山行青山不識我姓字我亦不識青山名飛來白鳥似相識對我對山三兩聲室人墓下楚愴埋香地卿須念稾砧齊眉中道訣同穴百年心刀尺凝餘澤松梧帶老陰可能如饁婦相對白頭吟有所思仰天有所思心逺目苦短西風驅殘雲千里月華滿元夕夢想傳柑宴村醪可試沽漫酬元夕爾不復去年吾舊事思清汴幽情卜紫姑六分春已一秉燭步通衢香匳體千里相思兩寂寥東陽應減舊時腰書中喜有歸來字攜傍紅窗把筆描以上順適堂吟稾潘鄭臺一作鄖臺詠梔子花未說司花刻玉工已知名與佛相同可憐結了薰風子依舊身歸色界中全芳備祖周吟軒蒿野蔬山芋慣寒酸羮綠虀黄頓頓餐及到新年立春日卻無生菜上春盤全芳備祖李濤濤字養源臨川人有蒙泉詩稾登高丘而望逺海登高丘望逺海萬里長城今安在坐使神州竟陸沈夷甫諸人合葅醢望逺海登高丘知我者謂我心憂不知我者謂我何求歸枕蓬萊潄弱水大觀天地真蜉蝣蒙泉詩稾黄深源深源字益長三山人秋日寄懷友人幾度裁書無雁休思君天闊水悠悠自從席上飛花後又見江頭落木秋背壁一燈憐瘦影誰家雙杵動新愁不知今夜西風裏人倚月明何處樓詩家鼎臠周承勛承勛字希稷官瑞州新昌尉題度門院在瑞州才入度門寺先觀覺範詩昔人吟不盡今日到方知地僻寒來早山高月上遲池邊老修竹曽映董生幃自注龔龍圖端書堂在焉宿玉龍宫夜爇松明火朝焚柏子香舉家來萬壽佳節遇重陽雨止雲穿日風高天欲霜吾廬籬下菊應怪未還鄉以上娯書堂詩話鄧林林字性之號四清社友臨江人有皇荂曲蕭小山跋云皇荂曲詩古如洞庭樂其思幽律如嶰谷箾其和宣絶如喬朩嚶其音冶玉兒金蓮華上俞尼子永壽神仙羅繡綺苑中荆荻布令嚴玉像支離瓦官寺六宫鴨㔅起淫風太白便應縣妲已此身肯許兜鍪夫猛為東昏判一死到今羞殺賣降人去作練兒梁姓臣朱彥和文如玉海動時流曾以書棊伏隱侯武德閣前消幾語卻令梁氏缺金甌任蠻奴千里旌旗已渡江蠻奴苦諫喚蕭郎卻持官裏黄金去望拜韓擒石子岡石崇梓澤神仙第一居爭豪不惜碎珊瑚荆州使客知何罪未必亡身為綠珠送衡山琴畫張道士滿天風月澹蕭條三尺孤桐古調高不敢問君聽别操請彈二十五離騷滿空煙雨澹糢糊三尺霜縑老墨枯不敢問君求别景請描七十二峯圖九里松松是山靈一手栽堯天長就棟梁材龍髯怒起春風急似怪游人喝道來以上皇荂曲鄭爚爚字君瑞句月似故人能赴約鷺如小友可忘年和劉後村詩話後村王默默字識之梅花知已林和靖論心何水曹平生懷玉雪獨立占風騷月落香方覺天寒韻更高搜吟吟未就清夢滿江臯詩林萬選張仲節仲節建安人有玉㵎稾句蝴蜨似知春夢熟穿花飛度畫屏東閨思後村題跋呉鋼鋼琚之子官臨安京倅崇壽寺在西湖方家峪高宗朝劉妃建坳徑石􅀈齖梅枝礙竹斜舊封妃子院殘照覺王家亭砌旋風葉巖流出洞花飽參塵世味得似野僧茶天申萬壽圓覺寺在西湖之九里松高孝兩朝皆臨幸梵室香飄隔竹聞壁間肆筆爛奎文山深翠輦經行處猶卧從龍數點雲以上咸淳臨安志姜補之補之字伯玉雪夜問梅一年春事五更初夢覺寒香乍有無門外不知深淺雪秖應消瘦玉肌膚前賢小集拾遺方菊田絶句數葉芭蕉數葉秋燈長雨乆不眠愁靈溪寺裏夜曾聽又聽靈溪溪水流全芳備祖全大用海棠少陵不賦海棠詩留待風流相國詞聞種錦窩三百本春風纔起蜀人思全芳備祖姚顯顯霅川人遊九鎖山九鎖碧陰涼行人古道長四山松雨過一路稻雲香怪瀑驚危磴殘蟬亂夕陽長安金屋好夢不到山房洞霄詩集徐珏珏號耕巖遊洞霄凡世纖塵不敢侵瑤關自鎖白雲深地靈佳朩有仙意山靜啼禽多好音五洞暗通蓬島路九峯密拱石壇陰步虚聲了幽人暇一穟爐香三弄琴洞霄詩集蕭汛之讀秦紀築了連雲萬里城春風弦管醉中聽凄涼六籍寒灰裏宿得咸陽火一星梅磵詩話徐介軒桂花翠葉金花小膽瓶輕拈款齅不勝情從敎失陷沈烟裏驀地薰心夢也清謝幼謙酴醿香雪支離半墜風柔條無奈不成叢阿蠻如許風流骨打困秋千細雨中全芳備祖郭忠謨溪居鑿破青山骨初營數畝丘泉分幽竇乳峽束大江流漁唱來花徑山光落釣舟沙鷗驚笑語片片起滄洲後村千家詩黄今是漁父詞青烟何處淡孤洲有客經年業一鉤芳草渡頭新貰酒碧雲天際已歸舟宋藝圃集呉陵陵字昭武盱眙郡樓風物凄涼天地秋憑高不盡古今愁關河北望三千里淮泗東來第一州日暮邊聲傳畫角早寒霜氣襲重裘干戈澒洞何時靜王粲長吟獨倚樓詩林萬選甘邦俊題梅壇火德中微否未傾朝陽一疏鳳先鳴如公忠論能旋聽彼莽姦謀未易成萬古仙名香宇宙幾人遺臭腐公卿至今風吼松聲怒似為先生訴不平梅仙事實任拙齋酴醿一年春事到荼䕷香雪紛紛又撲衣盡把檀心好看取與留春住莫敎歸全芳備祖呉明老明老建陽人小園解后錄明老剛介有志操詩文雖不純意趣亦殊可采偶成西風颯颯動長林斗酒沽來伴月斟慷慨未應憂短褐悲歌元不為秋砧誰云塞馬年年健自是君門浩浩深世祖丰神似高帝楚囚珍重莫霑襟詩人玉屑陳疇題釣臺故人已了中興事贏得溪頭伴釣竿喚起先生同一笑青山自在白雲閒釣臺集謝堯仁詠芍藥花蓓大如拳花面或徑尺紫者棲紫鸞黄者浴黄鵠或似扶桑枝推上一輪赤或似玻瓈盆稍久擎無力又有似平叔愛矜素粉白又有似蜀人喜染天水碧或似包綠錦未放丹砂坼或似浴青囊未放沈麝發應須和露翦莫使見顏色庶幾精神全免笑花無骨全芳備祖徐安國安國號春渚大滌洞大滌山藏碧玉函神龍䕶穴虎馴巖華陽邃道通仙處始見元同骨不凡洞霄詩集妙庭觀玉笙聲絶瑤池杳桂殿風生幾度寒空使時人慕雞犬埽除槃鼎舐遺丹杭州府志王堅梅壇曽向梅窗覓隱仙誰知結屋此山顚讀書堂下三更月燒藥爐中幾度煙鸞影已隨天上去虹光空盼世閒傳疾邪一疏吾能抗隱世高名媿獨賢後村千家詩孫抗題隱山南華洞峭徑入蒼烟他山盡一拳上盤朱鳥翼中寓漆園仙清可攜壺賞涼堪枕石眠九疑生接境曽此按薰弦桂林府志鄭夢周漁父披卻蓑衣翁自漁青荷包飯柳穿魚歸時坐在短篷底白占一溪雲水居後村千家詩李春伯鷺鷥春暗汀洲杜若香風標公子白霓裳碧天片雪忽飛去何處人家水滿塘後村千家詩宋詩紀事巻七十
