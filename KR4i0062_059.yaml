body:
  text: 宋詩紀事卷五十九錢塘厲鶚撰鄭域域字中卿號松窗三山人慶元中曾隨張貴謨使金著燕谷剽聞二卷官幹辦行在諸軍糧料院玉蘂花維揚后土廟瓊花安業唐昌宫玉蘂判然二物本不同喚作一般良未是瓊花雪白輕壓枝大率形模八仙耳山溪野路多見之樵斧摧殘如獮剃比之玉蘂似實非金粟冰絲那有此花鬚中有碧膽瓶别出玲瓏髙半指清馨靜夜衝九天招隱瑤臺女仙子乘風躍馬汗漫遊偷折繁香分月姊紫莖柘葉荼䕷條少到尋常人眼底翰林內苑集賢閣雨露承天近尺咫後人不識天上花又把山礬輕比擬葉酸而澀供染黃不著霜縑偏入紙江鄉老少知此名鄭􅙢瑒音無正字方言土諺隨舌訛鳥馬成焉固應爾山丹團欒綘蘂發枝閒鉛鼎成丹七返還乞與幽人伴幽壑不妨相對兩朱顔以上全芳備祖黃楊巖暮秋訪幽隱謝屐淩崩空行到山根門還與平地同舉手抉層雲下視無高峯疏藤挂赤虯枯苔糝青茸回首三神山縹眇滄海東指㸃笑語高吹聲半天中安得大鵬背載我遊無窮延平府志林㟽㟽三山人右科首選慶元中以閣門舍人守潮州題觀稼亭在潮州西北一里湖山下唐貞元閒御史中丞李宿建咫尺移文喚即譍此亭便可配韓亭溪流橫過一灣碧山色平分兩岸青落日鐘聲鳴逺樹半空塔影倒寒汀雲烟滿目皆親種留與邦人作畫屏廣東通志吕祖儉祖儉字子約成公弟用父䕃入官為太府丞疏論韓托胄安置韶州改吉州量移筠州卒理宗朝賜諡曰忠有大愚叟集泛舟至竹洲沈煥叔晦所居朝光拍天浮竹洲隱然一面城之幽中有高士披素裘我欲從之恐淹留探囊百金辦扁舟又煩我友著意修微風一動生波頭飛棹來往倦則休兀兀坐曹如繫囚吏餘秪有萬斛愁一生安坐無幾求今日棲遲如置郵脫帽露頂固狂流俯首折腰亦可羞誓將入海登之罘棄置人間繞指柔蒼然暮色下羊牛出處語默兩悠悠九原可起栁栁州燕坐相與未始遊至正四明續志題史子仁碧沚相家小有四明山更葺桃源渺莽閒四靣樓臺相映發一川烟水自灣環中川纍石勢嵯峩城外遙岑聳翠螺舊說夕陽無限好此中更得夕陽多寧波府志子仁名守之心非叔父彌逺所為著升聞録以寓規諫避勢逺嫌退處月湖與慈湖諸公講肄為樂寧宗御書碧沚字賜之吕祖异祖异東萊人呈洞霄孫元素匹馬先來破曉雲千章喬木翠繽紛山圍道院窗窗見泉出丹池處處分酒好便能澆磈磊飯香何必御羶葷明朝又踏紅塵去多羡烟霞總屬君洞霄詩集張震震字東父號無隱居士蜀之益寧人慶元中知湖州除福建提刑遂寧府作春苖半沒脛社酒期滿腹肩輿太守醉燈火歸騎趣唯有漢月明依然照山曲方輿勝覽錢鍪鍪慶元間衡州守趙忠定汝愚謫永州至衡道病鍪窘之暴薨天下聞而寃之次袁尚書巫山十二峯二十五韻文昌仙伯天人姿愛山尋勝如書癡忽摩台符歷參井麾幢泝峽春遲遲山林川后總效職萬壑千巖俱獻奇就中巫山絶雄勝插天紫翠相參差神妃來下佩聲逺駐此名地相安之峯旋地轉自前後屹立萬馬如追隨兩山有川幻天巧禹功到此神應疲仰天照眼如匹練舟行掣電翻雲旗迅帆競惜峯巒過艅艎望眼裳褰帷懸崖下有欲落石古木上有參天枝龍登鶴聚仙既集雲升雨暗天如低從來三峽號至險高牙穩泛相遊嬉揚旌一覽天下勝詞源倒峽知優為嘗聞奇觀天亦惜遇賢輒與因其時少陵寓此雖窮寂妙語驚人多在兹雕鐫萬象發天閟衙官屈宋聲爭馳公今曵履星辰上調元妙手行將施天教來作東道主歡聲和氣生江湄公來頓覺雪山重青城增氣連峨眉首驅巫陽入新句一洗前作堪解頤英詞從此遍蜀道迥出塵表無纖緇嘗憂此地難久駐轉首絶景成嗟嘻直欲使拂素練圖翠嶷寫松巒起雲之狀模翠屛栖鳳之嵋終朝誦公有聲畫卻來看此無聲詩全蜀藝文志趙蕃蕃字昌父暘之曾孫其先鄭州人南渡寓信州之玉山用䕃入仕監衡州安仁贍軍酒庫理宗立除太社令不拜轉承議郎直祕閣致仕卒諡文節有章泉集劉漫塘志墓云先生在太和便座有齊榜曰思隱蓋當筮仕之初巳有山林之思在官清苦唯以賦詠自娛以是受知于吉之鄉先生楊公萬里贈詩有云西昌主簿如禪僧日飱秋菊嚼春冰又云勸渠未要思舊隱且與西昌作好春又贊云貌恭氣和無日下推敲之勢神清骨聳非山頭瘦苦之容一笑詩成萬象春風劉後村跋云近嵗詩人唯趙章泉五言有陶阮意挽趙丞相汝愚五王不解去三思石顯端能殺望之未到浯溪讀唐頌巳留衡嶽伴湘纍生前免見焚書禍死後重刊黨籍碑滿地蒺藜誰敢哭漫留楚些作哀辭方輿勝覽答施榮甫昨韻村中好客希今吟臨水送將歸笑談未了風吹斷何日重來款竹扉詩家鼎臠上巳朝來一雨快隂晴東郊百鳥間關鳴受風栁條不自惜蘸水桃花可憐生不見山隂蘭亭集況乃長安麗人行東西南北俱為客且送江頭返照明瀛奎律體哭蔡西山鵑叫春林復遞詩雁回霜月忽傳悲蘭枯蕙死迷三楚雨暗雲昏礙九疑早歲力辭公府檄暮年名與黨人碑嗚呼季子延陵墓不待鑱辭行可知栁溪詩話朱晦菴書西山墓碣云嗚呼有宋蔡季通父之墓效夫子之書延陵墓也當時哭詩推此篇為首句青雲道逺龍媒老白雪詞高鬼膽寒贈阮梅峯韓㴲㴲字仲止元吉之子有髙節從仕不久即歸信上嘉定中卒有㵎泉集書姜白石昔遊詩後平生未踏洞庭野亦不曽登南嶽峯因君談舊游恍如常相從江淮歷歷轉湘浦裘馬意氣傳邉烽吾嘗泛大江秖見匡廬松乘風醉臥帆影底高浪直濺嵐光濃日暮泊船時是時方嚴冬雪花壓船船背重纜搖柁鼓聲如鐘當年意淺語不到無句可寫波濤舂君詩乃如許景物不易供盡歸一毫端狀此如飛龍人間勝處貴著眼雖有此興無由逢錢唐山水亦自好奈何薄宦難從容南高北高一千丈潮頭日夜鳴靈蹤應有隱者為識賞青鞋布襪扶杖筇君無詫彼我愧此急還詩卷心徒忪白石道人詩集附懷古近城人語雜深山人語少重露滴烟嵐野水見魚鳥稻粱豐稔外耕鑿願溫飽所以桃源人不與外人道少壯既奚為老矣復難强紫芝未必仙采之亦可餉耆耄八九十道可無俯仰所以商山人辭漢寧獨往戴石屏哭㵎泉詩云雅志不同俗休官二十年隱居溪上宅清酌㵎中泉慷慨商時事凄涼絶筆篇三篇遺槀在當並史書傳自注聞時事驚心得疾而死作所以桃源人所以商山人所以鹿門人三詩蓋絶筆也七月水石雲山裏歸來巳九秋隔城如淺近鄰寺始深幽慧逺逢修靜文淵說少游徑荒殊不掃風葉上牽牛雨多極凉冷焉知三伏雨巳作九秋風木葉凉應脫禾苖潤必豐地偏山吐月橋斷水浮空雞犬鄰家外魚蝦小市中晚雨可愛燈火凉秋夜空山雨到簷吹聲初甚少落勢近頻添籬菊叢叢潤畦蔬種種霑沈思仍靜聽香鼎伴書籤以上瀛奎律髓余儔儔字季倫號癡齊鄱陽人有蛙吹集題韓仲止壁謁入久不出兀坐如枯荄蒼頭前致詞問我何因來士節久凋喪人情易嫌猜本無性命憂不去安待哉游宦紀聞余癡齊吾鄉詩人也章泉雅愛之作書使訪韓仲止及門候謁甚久猶未出余題詩壁間拂䄂去仲丘見詩使人追之不返范模模字叔笵豐城人有竹林類槀哭趙忠定日月開黃道乾坤奠渾儀斯人今巳矣吾道竟何之玉鉉憂思苦金縢感慨遲仆碑今復立恨不見封彜鼂董青冥上䕫龍紫極邉五龍方夾日九虎巳當天夷險丹心直安危白髮卷弔湘人不去何用解膠弦南昌府志姜䕫䕫字堯章鄱陽人蕭東夫識之于年少客游妻以兄子因寓居吳興之武康與白石洞天為鄰自號白石道人慶元中曾上書乞正太常雅樂得免解訖不第而卒有白石詩集題嚴州鳥石寺諸老凋零極可哀尚留名姓壓崔嵬劉郎可是疏文墨幾㸃胭脂涴緑苔鶴林玉露嚴州烏石寺在高山之上有嶽武穆飛張循王俊劉太尉光世題名劉不能書令侍兒意真代書姜堯章詩云云姑蘇懷古夜暗歸雲繞柁牙江涵星影鷺眠沙行人悵望蘇臺栁曾與吳王掃落花送朝天續集歸誠齊時在金陵翰墨場中老斫輪真能一筆掃千軍年年花月無閒日處處江山怕見君箭在的中非爾力風行水上自成文先生秖可三千首回施江東日暮雲鶴林玉露姜堯章學詩于蕭千巖琢句精工有姑蘇懷古詩云云楊誠齊喜誦之嘗以詩送江束集歸誠齊云云誠齊大稱賞謂其冢嗣伯子曰吾與汝勿如姜堯章也報之以詩云尤蕭范陸四詩翁此後誰當第一功新拜南湖為上將近差白石作先鋒可憐公等皆癡絶不見詞人到老窮謝遣管城儂已晚酒泉端欲乞疏封南湖謂張功父也除夜自石湖歸苕溪細草穿沙雪半銷吳宫烟冷水迢迢梅花竹裡無人見一夜吹香過石橋美人臺上昔歡娛今日臺空望五湖殘雪未融青草死苦無麋鹿過姑蘇黃帽傳呼睡不成投篙細細激流冰分明舊泊江南岸舟尾春風颭客燈千門列炬散林鴉兒女相思未到家應是不眠非守嵗小窗春色入燈花三生定是陸天隨只向吳淞作客歸巳拚新年舟上過倩人和雪洗征衣沙尾風回一櫂寒椒花今夕不登盤百年草草都如此自琢春詞剪燭看笠澤茫茫雁影微玉峯重疊護雲衣長橋寂寞春寒夜秖有詩人一舸歸桑閒篝火卻宜蠶風土相傳我未諳但得明年少行役秖裁白苧作春衫少小知名翰墨場十年心事秖凄凉舊時曾作梅花賦研墨于今亦自香環玦隨波冷未銷古苔留雪卧牆腰誰家玉笛吹春怨看見鵝黃上桞條文獻通考直齊陳氏曰楊誠齊賞此十絶以為有裁雲縫月之妙思敲金戛玉之奇聲過垂虹自譜新詞韻最嬌小紅低唱我吹簫曲終過盡松陵路回首烟波十四橋以上白石詩集硯北雜志小紅順陽公青衣也有色藝順陽公之請老姜堯章詣之一日授簡徴新聲堯章製暗香疏影二曲公使二妓習之音節清婉公尋以小紅贈之其夕大雪過垂虹賦詩云云順陽公即范石湖嘉泰壬戌上元日訪全老于淨林廣福院觀沈傅師碑隆茂宗畫贈詩深衣跨羸驂杳杳春山路入寺君未知閒看移桂樹沈碑含秀潤隆畫出神竒道人那得此老子乃耽之龍井年時六月海揚塵遙見青山起白雲聞有高僧來誦咒巖前拋珓問龍君以上咸淳臨安志燈詞燈巳䦨珊月氣寒舞兒往往夜深還秖應不盡婆娑意更向街心弄影看南陌東城盡舞兒畫金刺繡滿羅衣也知愛惜春游夜舞落銀蟾不肯歸武林舊事都城自舊嵗冬孟駕回巳有乘肩小女鼓吹舞綰者數十隊以供貴邸豪家幕次之玩而天街茶肆漸巳羅列燈毬等求售謂之燈市三橋等處客邸最盛舞者往來最多每夕樓燈初上則簫鼓巳紛然自獻于下酒邉一笑所費殊不多往往至四鼓乃還姜白石有詩云云沙河雲合無行處惆悵來遊路巳迷卻入靜坊燈火空門門相似列蛾眉遊人歸後天街靜坊陌人家未閉門簾裏垂燈照樽俎坐中嬉笑覺春溫武林舊事邸第好事者如清河張府蔣御藥家閒設雅戲烟火花邉水際燈燭燦然游人士女縱觀則迎門酌酒而去又有幽坊靜巷好事之家多設琉璃五色泡燈更自雅潔靚妝笑語望之如神仙白石詩云云珠絡琉璃到地垂鳳頭銜帶玉交枝君王不賞無人進天竺堂深夜雨時武林舊事西湖諸寺惟三竺張燈最盛往往有宫禁所賜貴璫所遺者都人好竒亦往觀焉白石詩云云貴客鉤簾看御街市中珍品一時來簾前花架無行路不得金錢不肯回武林舊事元夕節物婦人皆戴珠翠閙蛾玉梅雪栁菩隄葉燈毬銷金合蟬貂袖項帕而衣多尚白蓋月下所宜也節食所尚則乳糖圎子䭔􅀈科斗粉豉湯水晶膾韭餅及南北珍果并皂兒糕宜利少澄沙糰子滴酥鮑螺酪麵玉消膏琥珀餳輕餳生熟灌藕諸色龍纒蜜煎蜜果糖􅏨蔞煎七寶薑豉十般糖之䫫皆用鏤鍮裝花盤架車兒蔟插飛蛾紅燈綵盝歌叫喧闐幕次往往使之吟叫倍酬其直白石亦有詩云云自題畫像鶴氅如烟羽扇風賦情芳草緑隂中黑頭辦了人閒事來看凌霜數㸃紅硯北雜志句小山不能雲大山半為天瞿佑歸田詩話姜堯章句造語竒特屋角紅梅樹花前白石生愛日齊叢鈔姜堯章居苕溪上與白石洞天為鄰潘德久字之曰白石道人有句云云白石生見神仙傳中黃丈人弟子也嵗煮白石為糧時號白石生堯章用此三字蓋有據蘇石石慶元中溧陽令句所幸小紅方嫁了不然啼損馬塍花硯北雜志堯章每喜自度曲吹洞簫小紅輒歌而和之堯章後以疾歿故蘇石挽之云云宋時花藥皆出東西馬塍西馬塍皆名人葬處白石歿後葬此葛天民天民字無懷山隂人有小集癸辛雜識葛無懷初為僧名義銛字朴翁其後返初服居西湖上一時所交皆勝士有二侍姬一曰如夢一曰如幻絶句夜雨漲波高二尺失卻搗衣平正石天明水落石依然老夫一夜空相憶看山我本田夫作比丘也知騎馬勝騎牛如今馬上看山色不似騎牛得自由訪端叔提幹月趁潮頭上山隨柁尾行大江中夜滿雙櫓半空鳴雁冷來無幾鷗清睡不成平生師友地此夕最關情西湖泛舟入靈隱山晴嵐漠漠水溶溶落葉遮船翠蓋重秋色盡為漁者占山光多向道人濃雲連合抱前村樹礀繞飛來小朵峰送罷夕陽迎素月樓臺高下自鳴鐘孤山後寫望憑高每歎昔人非空有峯峯礙落暉大雅風流誰舉似長安秋草又衰微寒花負約開猶懶幽鳥忘機趁不飛來往半生堪記處西村燈火夜船歸即事寒食少逢天氣佳十日九日雨如麻新巢初見燕生子小巷巳無人賣花六月一日與堯章泛湖六月西湖帶雨山小舟終日傍鷗閒風烟如許關情久賔主相推下語難幾㸃送君歸大雅一凉今夜滿長安江湖逺思知多少歸去風前各倚䦨荷葉浦中急雨捎荷分外竒珠璣狼藉錦紛披下塘六月關心處西塞扁舟入手時卻傍青蘆深處宿還思白石去年詩平生浩蕩烟波趣月淡風微秖自知正月二十七日雨中過蘇隄一隄楊桞占春風桞外羣山細雨中人苦未晴渾不到秖宜老眼看空濛清明訪白石不值花薺懸燈桞插簷老懷那復似餳甜畫船巳載先生去燕子無人自入簾以上無懷小集絶句二十四友金谷宴千三百里錦帆遊人間無此春風樂樂極人間無此愁貴耳集云朴翁絶唱嘗北梨每到邉頭感物華新梨嘗到野人家甘酸尚帶中原味腸斷春前不見花山家清供船子釣灘澤國茫茫水接天孰云無法與人傳見成風月難回避盡在華亭一釣船松江府志周文璞文璞字晉仙號方泉又號野齊又號山楹陽榖人有方泉先生集貴耳集野齊周晉仙嘗語余曰花閒集秖有五字絶佳細雨溼流光景意俱微妙野齊灌口二郎歌聼歐陽琴行金銅塔歌不減賀白姜堯章金銅佛塔歌白石招我入書齊使我速禮金塗塔我疑此塔非世有白石云是錢王禁中物上作如來捨身相飢鷹餓虎紛相向拈起靈山受記時龍天帝釋應惆悵形模逺自流沙至鑄出今回更精緻錢王納土歸京師流落多在西湖寺錢王本是英雄人白蓮花現國主身蛇鄉虎落狗腳朕何如紅袍玉帶稱功臣天封坼開即退聼兩浙不聞笳鼓競歸來佛子作護持太師尚父尚書令一枚傳到白石生生今但有能詩聲同袍秦外銛師兄哦詩禮塔作佛事同喫地爐山芋羹何曾薰陸綺牀供但見相輪銅緑明哦詩禮塔猶未畢蘆葉低飛山雨溼南華陽洞稽首游名山駕言入華陽南洞極祕怪松草泉水香曲几妙𨽻畫殘碣刋靈章俯首試一窺冷風襲綃裳守菴敬愛客暖我紫术湯遺我鵝眼錢云是洞所藏往有尋幽徒入見黃金牆侈心或已起幾受奇鬼戕身儻獲㑹遇敢恨飛蓬霜更丏一片土小築安閒房朝披神芝圖暮試飢飯方金牛洞凌競下危梯俯傴入深穴回身避雲霧偃靣視日月藥苖護谽谺竹節截嶭孽安知幽蹊下有此大竒絶金牛鏟光景仙諜尚可閲岡頭春巳半枸杞如㸃血便恐顛風興橫吹石崖裂道中望茅山有感危亭對名嶽畢景扶鉤䦨白鷺伺察過低昻若弓彎去嵗負笈遊最佳元符間櫟林帶修竹派流清珊珊離留叫晝靜洞天生春寒偉哉老宗師作屋雲雨端竟為殺蟲蟻不活升龍鸞遺體但解蛻故宫亦燒殘今創巳半舊萬柱扶元壇遂以兩不借一笻履巑岏入宅問玉斧采芝投金環墨沼篆結字丹臺氣成盤將謂便隱遁遽亦羅間關夷甫麈尾墮荀令香爐閒再拜望奇秀恍然神觀還如見大仙伯初髮緑映山兩君控鶴從俱著漢小冠俗纍當復馳煮藥鼎欲翻吳中秋日郊原落葉巳離離尚有孤花闖短籬小醉不成憐病後苦吟未了說愁時鬬雞走狗袁絲喜臨水登山宋玉悲豆角巳收無别事待同野老赴襟期歸憩仁王寺重到招提未覺遲鉢單初副夾衣時僧房齊院門門閉梅子枇杷樹樹垂蟻䕃經牀求託化龍纒佛座學慈悲長年無事閒來此坐對空山諷小詩山居書事荼䕷架倒無人架全似老夫狂醉時昨夜一畨溪雨橫又漂苔蘚到花枝歐陽琴歌嗚呼箇是文忠琴嗚呼此琴今尚存堂中圗書散失盡留得七弦傳子孫六字自書書在腹古錦梅花留不得嗣孫賢者能忍貧不向豪家博珠玉初鼓如撼昭陵松鞏原流水青溶溶三宗龍衮在帝左留把鈞天賜與公再鼓似播清潁水秖將潄流肯洗耳曾蘇兩生招不來自寫新聲付兒子堯囚山舜放野自兹以下不平苦與君所得歸女謗此日一洗清萬古小儒昔誦五季傳頗訝春秋體微變今來再聼七弦琴南薰遺製喜復見浮雲流盡白日逃何用廣陵與離騷譜成秖度歐公曲秋聲賦共廬山髙琴有公題晨起閉門不與俗人交元晏春秋日日抄清曉偶然隨鶴出野風吹折白櫻桃訪梅幽花墜在石根傍幾欲攜將近草堂草草一尊聊爾爾跨驢歸去月荒凉山樂官山樂官爾誰魂逃河入海俱奔奔伶倫梨園何可論山樂官豫欲爾兮無言如有言為豫歌雲門大滌洞嵌空才入泉潏潏隔凡倒懸若錐立道士云是閭丘公入向華陽便門出題鍾山往在秦淮問六朝江樓秖有女吹簫昭陽太極無行路幾處鵝黃上栁條夀星寺聞子規莫向空山惱病僧暮雲臺殿異鄉人多時不識巴江路守著濃花哭過春以上方泉先生詩集題洞霄宫久知靈境無緣到今被春風引得來上帝殿頭聞雨過仙人石面缺花開便燒沈水禮三拜快引流霞釂一杯落日斷霞催去緊掉巾秖等白鴉回洞霄詩集潘柳柳字德久永嘉人舉進士不第用父賞授右職為閣門舍人福建兵鈐有轉菴集葉水心序德久十五六詩律巳就永嘉言詩者皆本德久讀書評文得古人深處劉後村跋元祐間最為本朝文章盛時惟賀方回劉季孫不緣師友頡頏其間雖坡谷亦深嘉屢歎其後有劉翰武子潘柳德久尤為項平菴葉水心賞重送友人游金陵酒盡談餘意轉新北風一舸下寒津遙知白下登樓處正缺黃初著句人往事生來多嵗月舊遊疏似曉星辰半山斜日荒凉寺更有殘碑待拂塵出郭酤酒三家市題詩十里塘薄雲鷗外影空翠馬頭香出郭知無事尋僧有底忙終當成野逸小築近滄浪嵗暮懷舊白髮將朱顔一去幾時返懷哉不能寐展轉復展轉雀噪曉窗白雞鳴芳嵗晚梅花眼中春故情千里逺還自錢塘道中江上青山落照邉江頭歸客木蘭船春鷗自共潮回去一㸃飛來是柳綿自滁陽回至烏衣鎮行人元不恨長途下馬旗亭酒可沽回首琅邪山不見西風吹起豆田烏以上前賢小集拾遺姜堯章自號白石道人贈之以詩世間官職似摴蒱采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼書姜白石昔游詩後我行半天下未能到瀟湘君詩如圖畫歷歷記所嘗起我逺游興其如鬢巳霜何以舒此懷轉軫彈清商以上白石道人集附鷺銀潢何限鵲查查看得槁成度寶車如許風標無用處年年分占水葓花詩家鼎臠麗春花梁苑花銷去黃臺早自薰不同鶯子粟别是石榴裙婀娜才勝掌參差莫夢雲王郎尋水竹駐履幾殷勤合璧事䫫別集題釣臺蟬冠未必似羊裘出處當時巳熟籌但得諸公依日月不妨老子臥林丘英雄陳迹千年在香火空山萬木秋自笑黃塵吹鬢客愛來祠下繫孤舟上龜山寺菜花開處認遺基荒屋殘僧未忍離寺付丙丁應有數岸分南北最堪悲金鈴塔上如相語鐡佛風前亦皺眉野匠不知行客意競磨濃墨打殘碑以上瀛奎律體遇舊有感人間百寒暑正似須臾期當年同袍子一見雪滿頤不惟形容改亦復聲音移坐定問姓字始省從師時見此發永歎勞生果何為不如多飲酒滿腹同鴟夷客舍急雨鳴空壁輕寒上薄幃愁多空被酒夢短不成歸暗想桃花落遙憐燕子飛偷兒欺客寢夜靜卷春衣霅上簡婁舜章雞頭旋煮蓮新拗蔟鳳排花鱠更鮮清夜故人欣客到小船載酒大船邉平江道中不載圗書載酒杯姑蘇臺下小徘徊東風不識人心老擺柳吹花一併來以上東毆詩集沈繼祖繼祖富川人慶元中御史有栀林集寄題新昌簿㕔緑隂亭洛下追收黃耳信林間聞創緑隂亭千章古樹虛簾接四月清風羽扇停兄弟頭顱時感歎江湖嵗月久飄零對牀夜話知他日幽賞何如得細聽瑞州府志王遂遂字去非一字穎叔金壇人嘉泰二年進士理宗朝歷江西安撫使權工部尚書卒諡正肅題蘇端明書天慶觀乳泉賦後陵陽李心傳云此軸蓋蘇公元符北歸所書天一生兮上浮羽人俟兮丹丘遡儋耳兮東注夾崑崙兮倒流式古堂書考曹豳豳字西士號東甽溫州瑞安人嘉泰二年進士擢祕書丞倉部郎纍遷知福州寶章閣待制致仕卒諡文恭暮春門外無人問落花緑隂冉冉遍天涯林鶯啼到無聲處春草池塘獨聽蛙後村千家詩題括蒼馮公嶺二首平蕪千里緑迢迢水宿山行好耐勞最是愁人最奇崛馮公之巘浙江潮村南村北梧桐樹山後山前白菜花莫向杜鵑啼處宿楚鄉寒食客思家梅礀詩話楊栁春至風花各自榮就中楊栁最多情自從初學宫腰舞直至飄綿不老成詩林萬選詠緣竿伎又被鑼聲送上竿者番難似舊時難勸君著腳須教穩多少旁人冷眼看齊東野語趙南仲以誅李全之功見于趙清臣史揆每左右之遂留于朝其後恢復事起遂分委以邉面赴鎮日朝紳置酒以餞適有呈緣竿伎者曹賦詩云云師果不競劉鎮鎮字叔安南海人嘉泰二年進士學者稱隨如先生有隨如百詠刋于三山贈隱者夫子生東野經年不到城愛吟無俗趣貪畫得閒名荒徑侵山影虛堂出燕聲我慙為謫吏泉石負幽情後村千家詩鄭鄖夢鄖夢建安人游洋州崇法院曉色熹微麥隴間杖藜徐步扣禪關兩澆水足東西堰一抹雲收南北山世路飽諳驚嵗晚佛巖燕坐覺身閒故園早辦歸來計莫待星霜滿鬢斑陜西通志載此詩跋云建安先生得句法于石湖范公早以文章名世今觀是詩如藍田之珍荆山之璞不假雕琢而自為至寶僧正顯刻之精藍當山水清絶處乃復著此澄淡簡潔之語使讀之當有蕭然脫去世網之意者矣嘉泰癸亥四月既望洋州教授張縯跋龔頤正頤正本名敦頤光宗受禪改今名字飬正相之子嘉泰中國史院檢討官著芥隱筆記及元祐黨籍列傳譜述續釋常談泰伯廟迎享送神辭三章翼翼兮新宫蘭櫋兮枅桂氛總總兮髙靈下隊君視八紘兮昔何殊于棄屣今復何有兮一席之壝惠我吳人兮曷日以弭吁嗟君來兮我心則喜君來不來兮我忘食事迎神登歌兮堂上屢舞兮堂下君來享兮清酤溪毛陸離兮筐筥鯽鱸芳鮮兮亦有肥羜君不來兮使我心苦享神車兮載旃舟兮揚帆鼓咽咽兮君當還君肯來兮尚盤桓我心煢煢兮其無端君不我留兮下土囂福我吳人兮無疾與患千秋萬嵗兮歌至德以何言送神吳郡志張逹明逹明嘉泰中知吳江縣題吳江甘泉在石塘第四橋下陸羽茶經品為第四張又新品為東南第六橋下四㮬水人間六品泉松陵無魯望山茗為誰煎吳江縣志朱軧軧字叔止翌之姪嘉泰閒知南劔州題汪浮溪先生墓名髙從昔毁相隨未免羣兒著力擠一日狼心萌偃月十年豹霧隱愚溪不逄華旦開昌運終抱沈埋返故棲巳矣九原寧可作蕭蕭古木亂蟬嘶游宦紀聞宋詩紀事卷五十九
