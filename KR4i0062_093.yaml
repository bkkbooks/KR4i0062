body:
  text: 宋詩紀事卷九十三錢塘厲鶚撰宗杲宗杲字曇晦宣城奚氏子住臨安徑山與張子韶為友觸秦檜怒流衡州後放還示寂孝宗賜號大慧禪師寄無垢居士上苑玉池方解凍人間楊柳又垂春山堂盡日焚香坐常憶毗邪杜口人徑山志曉瑩曉瑩江西僧紹興中撰羅湖野録南昌道中東遊心渺渺趼足步遲遲馬驛黃茅路人家白竹籬歸雲橫斷嶺落日映荒陂何處可容足長哦招隱詩宋高僧詩選有規有規南渡初吳中詩僧為人性坦率其徒謂之規外方絶句讀書已覺眉稜重就枕方欣骨節和睡起不知天早晚西窗殘日巳無多徐度卻掃編此詩葉左丞大愛之僧空空號東山送僧上徑山呈妙喜老子大士昨來聞出世阿師今日又登途杖頭儻有間田地寄我山頭一紙書徑山志守璋守璋鹽官王氏子紹興中住臨安天申萬夀圓覺寺賜號文慧大師有柿園集晚春草深煙景重林茂夕陽微不雨花猶落無風絮自飛西湖遊覽志高宗嘗親書此詩天石天石福州候官水西石松寺僧栽松作偃蓋覆巖石歲寒傲霜雪深根蟠茯苓千古飽風月補續高僧傳紹興十年天石栽松三本于石上自刻石云一與寺門作名實二與山林作標致三與遊人作隂涼題詩云云寺初名石嵩後名石松以此道全秋曉飄飄楓葉草萋萋雲壓天邊雁陳低何處水村人起早櫓聲搖月過橋西宋高僧詩選道舉臞菴為王文孺作竹裏蓬茅掩棘扉主人詩瘦帶寬圍種成苜蓿先生飯製就芙蓉隱者衣柳絮春江魚婢至荻花秋渚雁奴歸小溪短艇能容我先向溪隈築釣磯吳郡志普聞普聞有詩論絶句水濶天長雁影孤眠沙鷗鷺倚黃蘆半收小雨西風冷藜杖相將入畫圖詩論紹隆紹隆和州含山人得法于圓悟紹興中住持虎丘槿花朱槿移栽釋夢中老僧非是愛花紅朝開暮落關何事秖要人知色是空全芳備祖德止德止號清谷工書畫嘗畫廬山尋真觀二壁朱文公題其上浯溪圖夷塗勿拋控拋控馬多失挹水勿極量極量器多溢安史起天寶轉戰竟奔北辭臣獻頌詩要垂萬世則一字堪白首大書仍深刻誰作浯溪圖千里在咫尺飛湍如有聲旁滙浸層碧巉絶半巖間髣佛見鳥迹不覺加手磨真恐苔蘚沒國姓前後異天運古今一向來文武才坐籌或操筆種種皆可稱俯仰重歎息願君寶此圖置之丹粉壁昔人如可作想像壯胸臆浯溪集若芬若芬字仲石婺州人為上竺書記善畫自號芙蓉峯主句不是老僧親寫曉來誰報平安自題畫竹上天竺志淳藏主淳藏主臨川化度寺僧山居屋架數椽臨水石門通一徑挂藤蘿自緣此處宜投老饒得溪雲早晚過隨身只有過頭杖飽腹唯憑折腳鐺幾度遣間何處好水聲山色裏邊行羅湖野録惟嶽神移泉在福州東山巖頭瀑布瀉寒煙井底澄清浸月圓性水直空周法界神從何處更移泉淳熙三山志仲皎仲皎字如晦居剡之明心寺參竟禪學尤精篇章所交皆文士于寺立倚閣又于星子峯前築白塔結廬以居曰間間菴與汝隂王銍相酬答有梅花賦及諸詩傳于世嘯猿亭在東白山褚伯玉嘗隱此放意在林表飄然更自由挂煙羣朩冷啼月一山秋裊裊清風裏凄凄碧澗頭三聲融妙聽行客若為愁山居無地卓錐生計難且空雙手到林間猥隨碧水瞻明月堅訂白雲賖好山巖石空邊依草舍藤蘿低處著松關年來老去知何許合向人間占斷間東西二道場為一禪師二禪師道場勝境東西白髙僧一二禪只知行道處不記在山年澗月平分照林花各自妍披雲尋舊址猶在絳峯邊疏山軒竹外泉聲急松心夜色寒人間推曠絶只自倚闌干齊雲閣在西白山南齊褚伯玉建山雲吹斷路頭開此處疑寄月脅來怪底行人看碧落笑談容易作風雷菴居啼切孤猿曉更哀柴門半掩白雲來山童問我歸何晚昨夜梅花一半開詠牡丹玉稜金線曉妝寒妙入天工不可干老去只知空境界淺紅深緑夢中看以上剡録靜林寺古松古松古松生古道枝不生葉皮生草行人不見樹栽時樹見行人幾回老宋髙僧詩選歸雲亭一從飛出岫舒卷意何長作雨遍天下乘風歸帝鄉無心憐灑落到處自清涼縹眇來空碧吟邊帶夕陽越詠晞顔晞顔字聖徒號雪溪奉化僧補續髙僧傳晞顔文藻髙妙後進愛慕嘗步菜畦見墾掘殺傷之多遂不復茹蔬惟買海苔三百六十斤日取一斤供粥晚住桃源厲氏菴專志念佛普和寺朱樓紺殿半江村石壁深藏佛影昏最好夜深潮水滿櫓聲搖月到柴門宋高僧詩選憶佛軒并序自古有言人生百歲七十者稀豫年十六祝髮叨預僧列今幸七十處世非久朝夕人耳平居非不誦經稱佛恨未精專遂取首楞嚴勢至章若人憶佛念佛見前當來必定見佛之語命小軒曰憶佛庶幾以為臨終見佛先容耳且作偈以繫于左三椽老屋許安貧佳處無如憶佛真萬事了知猶墮甑百年唯此可書紳巖間靜寄蒲團夜松下聊供茗碗春閉户不忘常憶佛願常終似影隨身平日叢林見祖師還如憶佛在今時但安谷底三椽地不挂胸中一縷絲幽徑落花浮澗水小窗斜日下松枝寂然真境知誰見唯有金容入夢思樂邦文類肱禪師肱禪師溫州江心寺僧題雁蕩龍鼻水雨足雲收得暫間漫將頭角寄空山鼻端一滴無多子引得人人到此間羅湖野録志南絶句古朩隂中繫短篷杖藜扶我過橋東霑衣欲溼杏花雨吹面不寒楊柳風娛書堂詩話僧志南能詩朱文公嘗跋其卷云南詩清麗有餘格力間暇無蔬筍氣如霑衣云云余深愛之可觀可觀字宜翁號竹菴華亭戚氏子得法于車溪卿法師淳熙中示寂九日入院作胸中一寸灰已冷頭上千莖雪未消老步只宜平地去不知何事又登髙蓉塘詩話乾道七年丞相魏公杞出守姑蘇請僧可觀主北禪師院入院之辰正值重九指座云云魏公擊節不巳志芝志芝住廬山歸宗寺普請罷書偈茶芽蔍䔩初離焙筍角狼忙又吐泥山舍一年春事辦得間誰管板頭低廬山紀事北野釣臺自過羊裘七里灘尋思欲見故人難殷勤借問溪邊叟近日誰來把釣竿釣臺集志文西閣在孤山楊柳蒹葭覆水濵徘徊南望倚闌頻年光似鳥翩翩過世事如棊局局新嵐積逺山秋氣象月生髙閣夜精神驚飛一陳鳧鷖起蓮葉舟中把釣人咸淳臨安志本正本正號月湖半顛賦吳門上元村翁看了上元歸正是西樓月落時誇道官街好燈火不知渾爾點膏脂山房隨筆僧本正賦吳門上元微聞於郡守吳退菴遂命住虎丘寺寶印寶印字坦叔龍遊李氏子世居峨眉之麓從中峯密印禪師得悟淳熙中敕住徑山紹熙元年示寂諡曰慈辨塔曰智光菴曰别峯梅林分韻得澤字江路歲崢嶸酸風更蕭瑟發興訪梅花主盟得詩伯孤房有餘妍初不帶脂澤香度竹籬短影搖溪水碧同時飲中仙著我林下客春槽沸滴紅滿坐喧舉白澆胸獨茗碗臭味曾不隔公今日邊去陛下正前席請看枝頭春中有和羮實反騷試與題不礙心鐵石成都文類洞霄宫窈窕門前九鎖山琮琤石角千尋水白雲影裏閲羣仙風斷朩犀香未已我從青城大面來羽衣駕鶴欣相陪五峯去此在咫尺肯惜杖屨時徘徊洞霄詩集惟茂惟茂吳門僧住天台山四面峯巒翠入雲一溪流水潄山根老僧只恐山移去日午先教掩寺門容齋隨筆彥強彥強住剡中法臺寺山中老矣毋能役巖分草草緣放渠藜六尺銷得屋三椽雪盡收茶早雲晴拾菌鮮有時臨近澗揎手弄潺湲剡録義傳姑蘇懷古西南山水佳清遊何款款白雲無定蹤飛入長洲苑空臺誰與登麋鹿去人遠啼月城頭烏風悲易凄斷爛開朩芙蓉寒塘弄清淺憑虛一徘徊西飛日何短靈巖寺志剎書記天柱雉兒行當年江上揚風舲淮西望極排空青今登天柱賞潛皖元是吾家翡翠屏禪叢一室因棲寄選勝尋幽辨真偽虛廊揩蘚讀殘碑三百年前刋異事此山開闢至唐初乾元中作金仙居彭門大師曰惠崇裁基創始成茅廬牛頭道成將雄鎮浮世勞生未知信乘間石上誦蓮文非謂疏慵效精進空山白晝接清宵壞衲披肩度寂寥玲瓏宛轉斷人慮七軸圓音震海潮竒哉有物名緣會錦繡毛衣勝綵繪常伴山雞與鷓鴣優遊飲啄煙霞外山梁疇昔歎時哉此日祇園應世來昂頭斂翼傍禪石下風側聽忘驚猜醍醐灑盡燒心火暮去朝來無不可宜成永向佛菩提春燕秋鴻豈知我俄聞荒草蛻其身夢魂夜告生為人幽竒溪石驗端的右脅遺翎迹尚新妙齡自厭居民俗祝髮依師隱林麓他經雖授了難通唯有芬陀利精熟師因嘆息省前緣法種慈熏豈偶然立名定體標殊特靈休表示為佳傳間行宴坐何超脫古鑑無塵罷揮拂登髙臨逺快幽情滿目風光舊時物几席巾瓶侍服勤間閴孜孜十九春西原危坐順圓寂戒珠數粒輝香薪真源始覺初無礙月轉遼空水歸海千聖徒中孰後生一片靈臺長不昧回觀輪裏漫啁啾暖日和風戲未休恩冤追逐蕩不返六道三途豈自由君不見潘安誇射賦洞爾胸兮穿爾嗉又不見退之詠獵詩馬前五色墮離披雲間哮擊懼鷹隼草中竄伏憂狐狸魯恭去後無消息更有仁恩霑動植桑下馴遊哺影時未必兒童能隱惻浮屠窣堵鎮盤岡纍聞繼夕騰禪光聖賢因地亦如此方寸凡情未可量蜀川鸚鵡持經法舍利精熒滿金匣至今忌日慘巖巒羣類悲鳴繞層塔近歲濡須釋子家松枝雀化皆稱嗟纖毫不動幾寒暑翻然只恐臨蒼霞賢王國士稱竒絶巨石豐碑爭頌説妙墨髙文燦斗星陵遷谷變相磨滅也知靈識盡超冥證出斯禽事顯明無言嗜欲沈迷者請看天柱雉兒行夷堅志舒州皖公山天柱寺廊下有巨碑云唐時崇惠禪師卓菴山中前有磐石每日對之誦法華經一野雉來傾聽略不動足如是三年不以寒暑輒廢一旦不至試于草間求之巳立化矣為用僧法茶毗之夜夢雉來告云以聽經之故得免禽身今託生山下農家作男子師不相忘後三日願訪我及期而往果見嬰兒相顧而笑左脅下尚存翎痕師謂其父曰善視之到十歲後教從我出家父如所戒師名之曰定體且呼為靈休侍者又九歲坐亡于西原瘞塔故在天柱寺及菴基也剎書記作雉兒行一篇宣揚其事黟僧善祐傳之故書于此以廣釋證惟謹惟謹號雪菴永嘉人乾淳間僧舟泊括蒼溪口茅店在山下檥舟茅店邊鐘鳴何處寺日落滿溪船攲枕雁初到離家月又圓向來曾過此夜泊石門前東甌詩集道謙道謙崇安遊氏子結菴于仙洲山送道友二三尺雪山藏路一兩點花春到梅將此贈君持不去請君收拾早歸來詩林萬選善建題寶山廣嚴院垂手紅塵古所難近天尺五啓禪關玉繩低轉簷楹外宫漏微傳几席間雲響度聲何處笛翠稜當户越州山夢回露滴松梢冷月在三茅萬境間咸淳臨安志惠明惠明華亭普照寺僧與濟顛同時潦倒猖狂人莫能測談災福輒驗亦能詩人號明顛手影戲三尺生綃作戲臺全憑十指逞詼諧有時明月燈窗下一笑還從掌握來夷堅志詠菖蒲根下塵泥一點無性便泉石愛情孤當時不惹湘江恨葉葉如何有淚珠補續髙僧傳永頤永頤字山老仁和唐棲寺僧有雲泉集初秋憶湖上諸山山中夏日足幽娛葛帔藤牀誦寶書白拂惹雲黏几案清香緣竹上空虛草堂夜月秋花近水閣晨霞夕霓疏遙憶錢塘舊朝寺繞湖鐘梵早涼初西峯日暮手攜一束書秋風獨來此松深夜月清水冷芙蓉死懶于簷下讀兩眼懸秋水時看澗鼠來食我山茶子天竺秋日翠滴千竿溼砌苔曲廊花朩小叢開吳僧愛覓間吟處偷向花邊竹裏來唐棲寺唐棲寺前溪水流客帆來往舊杭州津亭樹老無人記得見幾回僧白頭防風王廟萬國方尊禹防風殞殿趨應憐舞干戚獨不礙唐虞祭豆侵田鼠靈幡觸井烏椒漿春奠罷簫鼓舞村巫月夜遊冷泉亭地靈泉上寺松壑定深清獨聽子規呌況逢山月明樹藏春洞黑石擁夜泉鳴日出喧車馬終非隱者情以上雲泉集道濟道濟