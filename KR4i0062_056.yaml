body:
  text: 宋詩紀事卷五十六錢塘厲鶚撰裘萬頃萬頃字元量新建人淳熙十四年進士嘉定初除吏部架閣遷大理司直力丐外任敕差江西撫幹卒有竹齊詩集歸興新築書堂壁未乾馬蹄催我上長安兒時秪道為官好老去方知行路難千里關山千里念一番風雨一番寒何如靜坐茅齊下翠竹蒼松仔細看娛書堂詩話裘元量性恬退不樂仕以薦者召為司直在朝嘗賦歸興云云閒居閒居最與性相便勤即翻書懶即眠終日閉門真省事有時靣壁似耽禪大椿歲籥祈親夀斷簡生涯聼子傳待問洪崖覓丹訣白雲深處引寒泉以上竹齊詩集危稹稹字逢吉號巽齊又號驪塘撫州臨川人淳熙十四年進士歷屯田郎官出知潮州又知漳州忤部使者請祠歸有巽齊小集借詩話于應祥弟有不許㸃抹之約作詩戲之我有讀書癖每喜以筆界抹黃飾句眼施朱表事派此手定權衡衆理析畎澮歷歷粲可觀開卷如畫繪知君篤友于因從借詩話過手有約言不許一筆壞自語落我耳便覺意生械明朝試靜觀議論頗澎湃讀到㑹意處時時欲犯戒將舉手復止火側禁搔疥技癢無所施悶懷時一噫只可捲還君如此讀不快千駟容可輕君抱亦不隘昨問雞林人尚有此編賣典衣須一收吾炙當痛嘬經從豐城謁于房州于令侍姬歌舞進酒蛾眉對酒舞凉伊舞身還逐歌聲齊卷花萬假忽進酒鬪髙蛺蝶飛來低春日即事麥風翻隴潑濃緑花露摘枝黏老紅小立樓頭檢春事一絲暖日墜青蟲郭公郭公郭公聞爾失國春秋時何事到此猶悲啼郭公前言亡國故當時秪緣臣子誤百年社稷不得歸而今家住柘岡西滿目春風都是恨聲聲說與齊侯知郭亡矣君勉之以上巽齊小集送柴中行出守章貢力為君王乞得州補天未了石還收人才自係國輕重吾道亦關公去留殿角才辭槐影日船頭便轉荻花秋競誇祖帳東門外誰識眉攢杜甫愁豫章詩話宋史夲傳嘉定中番陽柴中行去國稹作詩送之忤宰相出知潮州王居安居安字資道台州黃巖人淳熙十四年進士纍遷右司諫兼崇政殿說書權工部侍郎帥隆興府升龍圖閣直學士卒贈少保有方巖集吳子良序云公之文明白夷暢絶類其胸襟詩尤圓妥曠逺嘗有句云髙下水痕元自定後先花信不須催公于出處去就此二語可以占矣僧居簡北礀詩集云方巖王侍郎江西破賊歸小舟迫窄自笑曰今為摺疊侍郎矣送劉改之不識劉郎莫便語酒酣耳熱未全疏士當窮困能無慊我自斟量愧不如橫槊賦詩俱有分輕裘緩帶特其餘當今四野無塵土宜有竒英在草廬瀛奎律髓潘德久有龍眠三馬而失其一俾豫賦詩三馬往往皆龍駒精神肯與凡馬俱忽不見者其前驅定應飛上天之衢君得其二巳有餘我欲與君分此圖駑才患多不患無四十萬匹將何如龍眠已往不可呼愈少愈貴宜寶儲赤城詩集句秪教人種菜莫誤客看花題園扉後村詩話郭綽綽嵊縣人淳熙十四年進士枕流軒在安吉州嚴真觀招提避雨寄孤眠夜靜溪聲到枕邊引得五湖清入夢拍天波浪一漁船西吳里語王溉溉官太府少卿兼知臨安府除權兵部侍郎淳熙丙午遊大滌山山合羣峯路屈盤溪行九折勢蜿蜒雲根長伴仙人迹元蓋潛通大滌天玉殿香銷人寂寂石壇花落草芊芊黃冠解識尋幽興為洗寒鐺煮碧泉洞霄詩集徐僑僑字崇甫號毅齊婺州義烏人淳熙十四年進士理宗朝仕至工部侍郎寶謨閣待制奉祠卒諡文清有集毅齊即事自吾齊外付諸兒除郤詩書總不知苔色上侵間坐處鳥聲來和獨吟時十分秋色重陽近一味新凉老者宜調得身心能自慊止吾所止復何疑濓洛風雅陳峴峴字夀南溫州平陽人淳熙十四年中博學宏辭科賜進士出身官中書舍人直學士院依緑亭修林平治久荒埃招領春風一笑回淨掃莓苔分徑岸賸添桃李結亭臺粵西詩載林宗放宗放字問禮宣城人淳熙丁未進士通判廣州乞祠歸陪郡守游西園倒影扶闌印碧溪玻瓈盤上玉東西落紅那得愁如海舉白難逃醉似泥郎宿髙明香霧起客星華耀燭花低波心夜半魚龍舞都轉天風入鼓鼙宛雅鄭克巳克已字仁叔青田人淳煕中進士仕至福建提刑司幹官水國水國烟霞客春來始定居老逢人事懶貧覺舊交疏隙影窺蟾滴藝香散篋書西湖風月好不到一年餘送中書王舍人使北細馬縷金鞍文星使可汗袖中天詔重帳外節旄寒烽火燕城急塵沙朔野寬安邊存大體何必斬樓蘭浙江十六夜對月急槳寒天闊長江得月遲最憐新缺後全勝未圓時夜雪潮千丈秋風桂一枝潛蛟易翻動怨笛莫驚吹青衫青衫著破禁中羅楚澤吳江幾度過仕宦宛如杯水淡朝廷空有故人多漁村疏竹明風斾烟浦斜陽起暮歌欲買田園歸海上此身無奈客愁何以上前賢小集拾遺旅中遇故人雲薄清溪水天寒黃葉風鄉關三載别客路一尊同舊事如昨日問年俱老翁相看今夕意淚冷菊花叢詩家鼎臠繆瑜瑜字珍叟龍南人淳熙進士官進賢令有崆峒詩集遇灾感應詩并序辛酉歲錢唐火灾延燒居民以七萬計惟吳山上一老翁家獨全翁平時誦經樂施火起之夕以老憊不能去遣兒與婦令亟走竟不忍相捨離處烈熖之中全家昏然熟寐至于蒲萄架亦不焚灼夫善積于平日之閒而孝感于一念之頃其為神物護持如此行道之人相與言者必曰蒲萄架因詩之以為世人好善者之勸云鬱攸屬者潛煽灾蜚廉縱風相與偕林林生齒七萬户連甍接棟燒成灰如何老翁一區宅閒不以寸獨不㶼玉石俱焚勢應爾豈有幻術能然哉聞之翁乃好善者平時事佛經卷開有餘必以濟貧乏不以利欲縈其懷倉卒遂䝉鬼神護萬目注視咸驚猜厥初巨焰爇天起左顧右盻如燔柴翁知無地可脫免委身甘作燼與煨麾兒與婦令亟走誓死不去無違乖全家酣寢越信宿如聞大浪聲喧豗及其夢覺火亦息依然一室當崔嵬微如蒲萄不熏灼而况梁棟與桷榱蒼蒼表善有如此餘自作孽何足哀作詩志往勸來者勿以斯語同優俳咸淳臨安志句有客去遊丞相閣無人來問孝廉船調官後村詩話云豫初筮仕江西有老選人繆瑜來訪有句一聯云云李壁壁字季章燾子用父任入官後登進士第寧宗朝纍遷權禮部尚書直學士院同知樞密院事歷資政殿學士致仕卒諡文懿有雁湖集使北作天連海岱壓中州暖翠浮嵐夜不收如此山河落人手西風殘照懶回頭四朝聞見録開禧初韓平原欲興兵遣張嗣古覘敵張還大拂韓㫖復遣李壁壁還與張巽辭階是進政府壁使北有詩云云玉堂留題雲影沈沈玉一方倚闌人意似濠梁獨憐雪裏山茶樹也向春風伴海棠咸淳臨安志酬曾景建新有千絲明曉鏡舊無一畫贊宵衣間吟此外唯須飲老覺人閒萬事非後村詩話青雲亭平林野水帶孤城倦客登臨太瘦生過眼千花競紅紫可憐霜鬢轉分明撫州府志句一杯漫道愁能遣幾度醒來錯喚君悼亡憂時鐵石孤忠在閲世風花老眼空送楊子直知吉州後村詩話董居誼居誼字仁夫臨川人淳熙進士歷官四川制置使奉祠歸有集戚姑山重上危樓意豁然倚闌檢㸃舊山川身離城郭塵囂裏眼到雲天杳靄邊秖恐老松添嵗月長教修竹障風烟回思燈火書窗下僂指如今六十年撫州府志盛璲璲字溫如豐城人領淳熙中鄉薦以平山寇功授奉節郎創書院于盛家洲朱文公嘗過訪贈以詩朱元晦過訪蒼松翠竹映斜暉野菊花開過客稀葉底黃蟲作寒繭雨餘蝴蝶滿園飛梅花樹下三閒屋挂壁枯桐盡日間有客過門彈一曲斷雲殘雪滿空山皇華紀聞李泳泳字子永號蘭澤廬陵人淳熙中嘗為溧水令又為坑冶司幹官與兄洪子大漳子清弟浙子秀泉子召著李氏華萼集題甘將軍廟卷雪樓卷雪樓前萬里江亂峯卓立森旗槍上有甘公古祠宇節制洪流掌風雨甘公一去踰千年至今忠氣猶凛然我來再拜攬塵跡斜陽白鳥橫蒼烟夷堅志大江富池縣有甘寧將軍廟殿宇雄偉行舟過之者必具牲醴祗謁李子永嘗自西下舟次散花洲有神鴉飛立檣竿即遇便風晡時抵岸青蛇箭激而來至舟尾不見是夕檥泊明日賽神其前大樓七閒尤偉壯郡守周少隱采東坡詞語扁為卷雪子永作詩云云初題梁閒本云英威凛然如有人掣其肘乃改為忠氣王亘亘字伯通福州人淳熙閒知南恩州十洲圖山川如幻閣長秋一島飛來伴九洲不礙漁樵雙槳過何妨羅綺四時遊雲疑泰革分張去水憶蓬瀛散漫浮禁苑未知湖海樂生綃寫取獻中州延祐四明志次胡淡菴題挹翠軒韻西山排闥來周遭自環翠俗眼少見之一覽忘世味平生三徑心盍早賦歸計縱落塵土居不與草木敝公餘事幽尋清風拂衣袂最喜軒中人所挹多爽氣蓬蒿天地寬萬境發詩思白雲未能間時出過窗几簷花聽夜雨池草生春媚山靈若相知好風為裂眥餘光雖力挽回次那得致肇慶府志韓彥古彥古字子師延安人蘄王世忠之子淳熙中知平江府終敷文閣待制户部尚書大智院明月巢在富陽縣清風去無塵白雲來無心一笑玉溪上落花流水深杭州府志黃敏德敏德號存菴淳熙中句容令入洞霄九鎖路閒緑蘿垂地白日暗落葉滿徑行人稀青童走入報迎客驚罷先生一局棊舞翠亭觀泉坐來毛骨覺蕭然百尺飛流下碧天杯酒未終身世換盡移三峽到尊前以上洞霄詩集程九萬九萬字鵬飛池州人淳熙閒知武康縣有賢名慶元中守歷陽有集重建東堂前令毛滂建宦遊偶落雲水鄉恥以貪墨為吏商三年寄傲南窗月一瓣為炷東堂香翛然清風揖佳客好古博雅真揚揚舊題湔祓古寺壁濁酒呼索鄰家牆淋漓醉墨鸞鳯舞警語峭厲淩水霜大碑小碣共檢校次第安置堂中央朅來弦歌有餘暇逸興賸欲希韓湘證道寺追和毛澤民韻二載塵勞薄宦身雙峯幾憶舊家鄰甫能再上陽城考更有一年孤負春以上武康縣志葛郛郛立方長子淳熙中以朝奉郎判鎮江留友人良友久閒闊春事遽如許勞君下鷗沙一葉繫春渚昨夢墮前山再見欣欲舞聊呼花底杯酒面點紅雨狂歌謝貫珠清論雜揮麈驪駒未可歌妙句須君吐韻語陽秋杜旟旟字伯高金華人嘗登吕成公之門淳熙開禧閒兩以制科薦有橋齊集白頭吟長安春風萬楊柳新人妖妍舊人醜貧賤相從富貴移舊時犢鼻今存否長門作賦價千金不知家有白頭吟金華雜識句君勿笑新亭相對泣郤勝蘭亭暮春集題蘭亭序村詩話後劉孝韙孝韙字正夫乾淳閒以門䕃仕纍官直祕閣提舉兩浙常平除直徽猷閣題佘山宣妙寺水定浮春岫鴉盤落逺林上方鐘送夕隱几興何深松江府志吳億億字大年蘄春人仕至靜江倅有溪園集磨崖中興頌借問江頭人釣魚為言靈武事何如磨崖豈是當時意兩字噫嘻金鏡書浯溪集錢聞詩聞詩字子言成都人淳熙中知南康軍有廬山雜著題米元暉瀟湘圖太湖水入霅溪寒疊嶂連山幾萬般此景古今無盡藏總歸懶拙一毫端郁氏書畫題跋記錢聞禮聞禮嘉興人第進士簡寂觀先生舊隱在廬山幽谷千年竹萬竿偃松拂盡煎茶石苦筍撐開禮斗壇方輿勝覽章甫甫字冠之鄱陽人居真州有易足居士自鳴集貴耳集冠之多從于湖交游飄蕩不受拘羈淳熙閒淮有三士舒之張用晦和之張進卿真之章甫冠之也寄荆南故人餘生自拚一虛舟未害尋詩慰客愁梅欲飄零猶醖藉柳才依約已風流關心弟妹無黃犬入夢江湖有白鷗别後故人相念否東風應憶仲宣樓貴耳集湖上吟誰家短笛吹楊栁何處扁舟唱采菱湖水欲平風作惡秋雲太薄雨無憑近人白鷺麾方去隔岸青山喚不譍好景滿前難著語夜歸茅屋望疏燈前賢小集拾遺林升升淳熙時士人題臨安邸山外青山樓外樓西湖歌舞幾時休暖風熏得遊人醉直把杭州作汴州西湖志餘俞國寶國寶臨川人淳熙太學生有醒菴遺珠集武林舊事淳熙間德夀三殿遊幸湖山一日御舟經斷橋旁有小酒肆頗雅潔中飾素屏書風入松一詞于上光堯駐目稱賞久之宣問何人所作乃太學生俞國寶醉筆也其詞云一春長費賞花錢日日醉湖邊玉驄慣識西湖路驕斯過沽酒樓前紅杏香中歌舞緑楊影裏鞦韆東風十里麗人天花壓鬢雲偏畫船載取春歸去餘情在湖水湖烟明日再攜殘酒來尋陌上花鈿上笑曰此調甚好但末句未免儒酸因為改定云明日重扶殘醉則迥不同矣即日命解褐山茶花近東溪居士家好攜樽酒款攜茶玉皇收拾還天上便恐筠陽無此花全芳備祖許尚尚華亭人號和光老人生淳熙間有華亭百詠華亭百詠存十首陸機茸在谷水東吳陸遜生二孫常于此遊獵今名桑陸又名吳王獵場二陸為童日馳驅屢忘歸至今桑柘響禽鳥尚驚飛三女岡三殮知無有香魂計巳銷頻來吟楚些嵗久若為招征北將軍墓即陸禕墓在崑山有碑村人疲于官吏征索遂碎其碑﨑嶇尋古隧衰草隱寒原欲讀將軍事豐碑秪半存顧亭林旦暮潮流急東西徑路斜無從質疑字共屬野王家白龍洞在橫雲山頂下通澱山湖每風雨夜有龍出入洞中呼吸湖中水山椒寄此身洞門風雨夜電火逐霜鱗俞塘府東五里往來之舟皆可揚帆諺云雖有珠千斛不賣俞塘北延袤三鄉外東流與海通河神屢加惠帆借往來風普照寺晋陸機捨宅為寺高門收畫㦸即此見精藍施豫恩雖在緇流絶不談陸瑁養魚池即西湖也今為放生池誰得陶朱術修治一水寬皇恩浹魚鱉不復敢垂竿唳鶴灘湖之東南隅養鶴人何在湖邉水尚清喚回中夜夢灘上戛然聲湖光亭風月堂之西日暮蝦鬚卷亭中雅燕開微風起蘋末波影動尊罍以上華亭百詠陳善善字敬甫號秋塘淳熙閒豪士有雪篷夜話句不知筋力衰多少但覺新來懶上樓吹劒録春風一日歸深院巫峽千山鎖暮雲書貴家扇聞說平生輔漢卿武夷山下啜殘羮送輔漢卿過考亭集以上貴耳童敏德敏德臨川人生乾淳閒不仕湖州題顔魯公祠堂挂帆一縱疾于鳥長興夜發吳興曉杖藜上訪魯公祠一見目明心皎皎未說邦人懷使君且為前古惜忠臣德宗更用盧杞相出當斯位誠艱辛生逆龍鱗死虎口要與乃兄同不朽狂童希烈何足罪姦邪嫉忠假渠手乃知成仁或殺身保身不必皆哲人此公安得世復有洗空凡馬須騏驎容齊三筆云語意超拔許玠玠字介之襄邑人有東溪詩槀曰璐按劉後村云端平以來與江西曽無疑金華杜叔高九華葉子真同聘召之士有衡陽許介之蓋介之南渡寓家衡陽晚年始被召也染絲上春機錦江之水來蜀西女紅染絲上春機可憐欲織未織時思君意緒如亂絲亂絲尚可理妾愁渺無際寒窗軋軋千萬梭斷魂隨梭暗來去蕩子醉花月妾辜鸞鏡妝寒蛬只解趣機杼爭郤情如刀劒傷織成回紋詩寄與白玉郎願郎勿棄置上有雙鴛鴦覷看雙鴛鴦忍教孤妾守空房梅礀詩話漢宫春夜虛輪絢采千門外窗眼滲光金箔碎渴烏滴水續銅壺簷馬呼風搖玉佩宫車聲斷翠箔幽珠簾間郤珊瑚鉤眉山兩㸃亦何有中鎖萬斛相思愁蜀羅蜜炬光明滅紅淚難濺守宫血遙夜春寒聽曉鐘角聲滿地梨花雪詩家鼎臠趙希辨讀書附志云周益公嘗親寫許介之漢宫春夜朱陵洞詞古離别出塞曲四篇而跋之吳琚琚字居父號雲壑汴人憲聖太后之姪太寧郡王益之子歷尚書郎部使者直學士慶元閒以鎮安節度使留守建康遷少保卒諡忠惠有雲壑集佩楚軒客談吳琚節使蓄雷琴號九霄環佩七書史㑹要吳居父太寧郡王益之子世稱吳郡王性寡嗜好日臨古帖以自娛字畫類米芾以詞翰被遇孝宗大字極工續光宗詠安榴細疊輕綃色倍醲晚霞猶在緑隂中光宗春歸百卉今無幾獨立清微殿閣風琚四朝聞見録孝宗崇憲聖母弟恩故稱琚兄弟曰哥光宗體孝宗之意故稱琚兄弟曰舅琚尤被聖眷後苑安榴盛開先皇以黃團扇自題聖作二句命琚足成上稱歎久之劉光祖光祖字德修號後溪簡州陽安人登進士第寧宗朝遷起居郎右文殿修撰終顯謨閣直學士提舉嵩山崇福宫諡文節有鶴林集鶴林寺竹院逢僧話山門掃地迎英雄猶有迹般若太無情玉樹春隂密琅玕晚暑清半年來往屢只合送行旌鶴林寺志龔準準知江隂軍題天慶觀碧玉堂張安國書扁清曉叩元關憂時鬢巳斑何如閒道士隔竹看君山咸淳毗陵志任璡璡字國器黃巖人淳熙中上舍釋褐授校書郎山居嵗暮讀罷羲文先後天蕭然一室裊寒烟山中嵗月那知得但見梅花又一年黃巖英氣何坦坦東陽人淳熙閒官沿海制置司幹辦公事乞蜂兒棐于郭德誼二首味甘宣郡蜂雛蜜韻勝雍城駱乳酥一㸃生春流齒頰十年飛夢繞江湖銀甲彈開香粉墜金盤堆起乳花圓乞君東閣長生供夀我北堂難老仙乞釀于郭伯瞻洗盞試邀從事醵臥罍忽報步兵廚良辰不與清樽共今夜儻羞明日無未論一缸分雪乳巳拚千日醉雲腴宜黃漫尉今狂甚聽我酣歌入五湖以上石洞遺芳集吳有定九鯉湖昔聞九仙靈今登九仙地裊裊一爐香寥寥千載事九鯉湖志葉時時字秀發仁和人晚居嘉興淳熙中進士官終龍圖閣學士有竹野詩集還桑澤卿蘭亭考書法光芒晉永和後來摹寫不勝多考論又得桑夫子蘭渚風流轉不磨欈李詩繫傅子平子平淳熙中鳯州守絶句珍珠不見小槽紅遐想柔荑剝嫩蔥唯有萬條羅帶緑年年依舊舞春風鳯縣志鳯之為州當秦蜀之衝以手柳酒三絶名世風塵一起號為邊鄙者四十餘年淳熙初鳯州守傅子平詩云云宋詩紀事卷五十六
