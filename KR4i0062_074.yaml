body:
  text: 宋詩紀事卷七十四錢塘厲鶚撰吳會會號北山訪别嚴儀卿寄郭招甫言將遠行邁來宿故人家愛爾時相顧回舟日欲斜論心付杯酒别路正梅花不待江湖去今朝鬢巳華詩林萬選黃君瑞題草堂寺草堂禪寺北山陲想見鳴騶入谷時猿鶴如懷海鹽令魚龍猶護紹興碑排巖樹老秋來早上殿僧稀曉散遲我亦于今抗塵土臨風慙讀孔璋移四川總志儲泳泳字文卿號華谷雲間人著華谷袪疑説題隱者所居盡日掩柴門何人得見君秖因喧寂異似有聖凡分瀑近夜疑雨山深晴亦雲傳聞九霄翮落羽正紛紛後村千家詩秋夕懷友樓高不敢眺愁思滿滄洲有夢隔千里無書過一秋晴風吹野樹落日照寒流客裏添蕭瑟何時得共遊詩家鼎臠遊東臯園登漣漪閣傑閣接平川秋光淡遠煙窗開園外景影占水中天野色歸吟事征帆過客船危闌人倚徙縹眇十洲仙至元嘉禾志潘嶼嶼四明人客中九日破帽西風急寒窗敗葉飛重陽今日是三徑幾時歸擔上多黃菊門前少白衣吟情淡如水一雁叫斜暉詩家鼎臠顏員嶠古詩庭梧驚秋風葉葉凋萎紅行人何不歸委魂逐孤鴻去日良巳賖客身轉飄蓬千里各一涯關山月明中兩臂恨不羽飛逐君西東全芳備祖楊巽齋巽齋失其名牽牛花靑靑柔蔓繞修篁刷翠成花著處芳應是折從河鼓手天孫斜插鬢雲傍茉莉麝腦龍涎韻不侔薰風移種自南州誰家浴罷臨妝女愛把間花插滿頭以上全芳備祖蔣梅邊梔子淸淨法身如雪瑩肯來林下現孤芳對花六月無炎暑省爇銅匜幾炷香全芳備祖湛道山荼䕷雨後溪流半沒沙粉牆賣酒是誰家客中不覺春深淺開了荼䕷一架花一春多雨少晴光眼底靑春去意忙巳恨點衣紅作陳絶憐滿架雪生香全芳備祖朱正中正中號力菴洛陽橋觀水點點風帆底處還似無似有海門山白鷗卻怕潮頭惡間臥汀花野草間梅礀詩話徐橘隱秋日紅蓼黃花取次秋籬笆處處碧牽牛風煙入眼俱成趣秖恨田家歲薄收全芳備祖虞詔詔號可齋絶句短長亭外柳依依念我思歸未得歸粉蝶不知行客恨也隨飛絮點征衣荷花晚來一棹鑑湖東隊隊峰巒入短篷一色藕花三十里淡糚濃抹錦雲中以上全芳備祖周登登號月窗泛舟西湖湖邊無日欠春風金碧樓臺面面同白鳥慣隨船上下畫橋分斷水西東百年樂事浮雲外一段傷心落照中老盡風流無問處藕花今是幾番紅詩林萬選陳熙熙號月泉樂淸人病起病起不知老山妻笑長卿一貧眠古屋多雨落春城掃案藥香在開窗樹葉生因思行樂地前月是淸明東甌詩集江奎茉莉靈種傳聞出越裳何人提挈上蠻航他年我若修花史列作人間第一香玉簪雖無艷態驚羣目幸有淸香壓九秋應是仙娥宴歸去醉來掉下玉搔頭以上全芳備祖鍾穎遊九鎖大滌通華陽仙家碧雲上飛泉舞蒼蛟絶壁浮翠浪泉石有聲詩雲煙無盡藏落日靑山多臨風一長望洞霄詩集翁元廣漁父吳江楓落荻花秋漁子飄然一葉舟柔櫓數聲沈晚浦寒燈幾點泊蒼洲瀟瀟細雨篷初閉漠漠輕煙網乍收何日功名如范蠡五湖風雨伴沙鷗後村千家詩題臨江茶閣門外黃塵沒馬韉溪山對此獨翛然一杯春露暫留客兩腋淸風幾欲仙可但喚回槐國夢不妨更舉趙州禪憑闌得句未易寫盡日孤煙白鳥邊詩林萬選林逋山牽牛圓似流泉碧翦紗牆頭藤蔓自交加天孫滴下相思淚長向秋深結此花全芳備祖程鏜鏜鄱陽人遊大滌洞松風吹客衣縹眇凌絶頂古洞不見日篝燈入幽暝蒼苔暈石花奔泉弄雲影仙遊願初遂秋山魂未省我生有宿約結屋天柱頂洞霄詩集彭昌詩昌詩號雅林遊金精山陳千峯索和仙去時移境尚同巖花開落為誰容歌沈石鼓泉空響局冷紋枰霧半封山上丹桃無核種甑頭靑䭀自機舂翠眉不是人間儷笑殺王孫不再逢金精風月徐覲覲字庚生永嘉人秣陵秋望諸史六朝事同為遠望空幾年無王氣今日但西風客舍秦淮上行宫夕照中數株霜後葉猶傍壞陵紅東甌詩集丁南南號鶴林歸安人居烏墩宴沈知丞園曲徑方塘百畝園更無煩暑礙風煙當春庭院花如錦入夜樓臺月滿天鄴架插書金屋底秦箏度曲緑衣前主人愛客歸休早銀燭髙燒酒似泉烏靑文獻陳葺芷絶句夢回歷歷雨聲中窗影分明曉色紅出戶方知是黃葉更無一片在梧桐全芳備祖程登庸題唐顯孝饒娥墓悠悠古憤倚中流飽閲川陵四百秋水際叢祠猶昨日人間壞土幾荒邱故鄉愛説饒饒姓往事空傳柳柳州滿目夕陽凝睇久桐花飛落釣魚舟饒州府志饒娥饒人饒姓娥名父醉漁溺死娥求尸不得哭三日耳鼻流血氣盡伏死明日尸出黿魚浮死萬數鄙民葬之鄱水西橫道上事詳柳子厚碑記宋程登庸詩云云胡平仲平仲號虎溪遊金精山人去壇空幾歷年塵埃難沒漢山川竇門深入壺中地環壁遙開甕外天致雨土龍如解化隨時朩鶴亦能仙要知萬劫長生處古篆惟存石鼓篇金精風月黃初菴遊靈鷲寺屋畔危岑聳佛靑客歸僧定掩雲扃洞猿窣窣循牆過几上偷翻貝葉經咸淳臨安志董將題真如院怪石在鹽官縣兹山翠成堆峭骨乃如許化工妙融結石罅走靑乳當年女媧氏煉此不及補嵒嵒至于今丈室枕其股我來手摩挲松陰日亭午初疑道士羊亦類將軍虎坐久飢腸鳴試作先生煮咸淳臨安志黃極極字舜舉豐城人秋日渡江雁落平沙一雨收淡煙斜日荻花洲憑誰與作王摩詰為寫江南水墨秋南昌府志林季謙客中立春鬢絲無力受風幡把酒聽歌意不歡千里同風亦同俗客懷終作異鄉看春寒梢零數竹緑翛翛春半餘寒苦似秋故紙叢中雙倦眼樵靑催喚酪蒼頭元夕燒燈城市又新年璧月樓臺萬管弦獨有廣文窮相眼一篝燈火照殘編扇分無紅粉轉歌喉入手輕紈意自秋不見乘鸞月邊女一雙胡蝶自風流以上後村千家詩林稹稹號丹山冷泉一泓淸可浸詩脾冷暖年來只自知流向西湖載歌舞回頭不是在山時武林舊事林逢子逢子字德遇見劉後村送赴省諸友詩鏡香亭緑楊深處兩三家幾度憑闌聽吠蛙雲錦巳空煙水濶空教人憶舊時花嘉興府志上官辰辰號古崱遊大滌山山蟠鼇足雲千丈溪折羊腸路九回神骨肯穿秦斧鑿古壇曾見漢樓臺秋山風雨銀河下月夜笙簫玉佩來山自靑靑泉自潔百年蹤迹幾蒼苔洞霄詩集趙戣戣字成德休寧人三請漕貢試南宫不利遂隱居徜徉池園以自娛號其詩文曰吟嘯白杜鵑花雲樹重重和淚冷故宫遺廟有知音秦吳萬里皆芳草染到山花恨最深廣羣芳譜趙克非克非字志仁永嘉人號荷畔老漁又號尋樂翁上冢步入巾峯去冥濛一徑深重泉千古恨寸草百年心花發空林色嵐生古壁陰徘徊歸向夜薄露溼衣襟東甌詩集俞煜煜號省齋餘杭人遊大滌山萬山低伏天柱起鬱鬱琳宫鎖幽邃泉聲瀉入松風寒山光滴破雲根翠仙人不歸白日暮箬下還丹已千歲天髙遼鶴不可呼夢魂夜落靑山外洞霄詩集倪龍輔龍輔字魯玉號梅村宫怨翠袖無香鏡有塵一枝紅瘦不藏春十年不識君王面始信嬋娟解誤人詩林萬選陳月潭桃花雙槳春風款款移斜陽平半落芳池不妨暫向橋邊駐更為桃花了一詩全芳備祖雷震村晚草滿寒塘水滿陂山銜落日浸寒漪牧童歸去橫牛背短笛無腔信口吹宋藝圃集洪漸漸字陸翁號苽巖淳安人舟泊港口月浸蘆花水浸天漁翁醉後正堪眠夜深何處孤猿咽不管江邊有客船靑溪詩集施真卿西湖一曲新腔紫玉簫護晴簾幕窣蘭橈柳迷遠近花張錦小泊危紅第六橋後村千家詩鍾訧題梅壇萬松護嶺與天齊中有真人舊隱棲井冷尚留丹汞暖壇高近拜斗星低回思漢室成惆悵浪費今人為品題我欲從之無路去同升不似許仙雞梅仙事實林楚良題黃氏小園多少名園錢甃地金鈴撼雀護千花君家無此豪華事七尺慈孫導母車詩人玉屑陳庚生庚生樂淸人善畫賀家湖風流誰似賀知章乞得平湖任草荒今日藕花三百畝折來依舊屬君王東甌詩集程嘉量題溫州江心寺東西兩寺絶塵囂齋飯全憑早晚潮解事江流更分斷為君題作小金焦江心寺志高彥竹彥竹號野泉永嘉人送胡彥龍過金陵金陵往事巳成虛江水淸淸只見魚遺廟空存元帝像故家多有二王書秋風出塞調生馬夜月吟淮跨蹇驢借問新亭諸老淚而今煙景復何如東甌詩集宋詩紀事卷七十四
