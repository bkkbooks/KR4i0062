隱驪龍春暖抱珠眠山中宰相陶𢎞景洞裏真人葛稚川一度相思一惆悵水寒煙淡落花前感懷呈所知十年流落賦歸鴻誰傍昏衢駕燭龍竹屋亂煙思梓澤酒家疏雨夢臨邛千年别恨調琴懶一片年光覽鏡慵早晚休歌白石爛放教歸去臥羣峯秋宿湘江遇雨江上陰雲鎖夢魂江邉深夜舞劉琨秋風萬里芙蓉國暮雨千家薜荔村鄉思不堪悲橘柚旅遊誰肯重王孫漁人相見不相問長笛一聲歸島門以上全唐詩栁開開字仲塗大名人初慕韓愈栁宗元為古文名肩愈字希元後改焉開寶六年進士第歷官環邠曹代欣滄六州終如京使自號東郊野夫又曰補亡先生有河東集諷虞嬪詩并序湘水導全州城下北走州之境又獨能産筠竹成紋古書今俗通謂舜二妃溺于沅湘揮淚為竹斑者此也復東西望九疑山才可百數里州岸佛寺旁有妃廟因諷妃事作七言十九句詩一章刻石留于妃廟中惟堯則天舜弗復誕妃罔極恩膏育遏密無聞血盈目南巡胡為淚染竹父輕夫重當何淑沅湘岸筠煙莓覆凝紋疊斑殷郁郁猿緣鼯號鉤輈宿朋悽助惋聲幾哭賸疑下憂禹湮瀆功充民戴荷百祿重暉並曜難停轂元居不寧逝如逐悲啼負寃生莫卜卒顛沈瀾逺昌族謳訟肇私歸永福柔陰慘刻咎深速前睇九山排矗矗到今雲顏愁可掬栁河東集塞上曲鳴髇直上一千尺天靜無風聲更乾碧眼羌人三百騎盡提金勒向雲看倦遊雜録馮太傅端嘗書此詩顧坐客曰此可畫于屏障楚南樓洗盡蠻煙几案空登臨直見楚山雄坐當鴻鵠髙飛處身在乾坤灝氣中木落有情瞻北闕霜輕無夢入西風憑闌自是蓬瀛客獨對瀟湘興未窮顧氏積書嵒選張觀觀開寶中左司諫過衡山留贈廖融未向漆園為傲吏定應明代作徵君傳家奕世無金玉樂道經年有典墳帶雨小舟橫别浦隔花幽犬吠深雲到頭終為蒼生起休戀耕煙楚水濵郡閣雅談劉能能開寶中官左補闕句窗外秋聲湘瑟怨檻前竹色楚帆飛懶向九嶷歧路望渡頭雲雨正霏霏奉詔九嶷留題祁陽縣白沙驛亭零陵總記王嗣宗嗣宗字希阮汾州人開寶八年進士第一太宗朝纍官淮南轉運使真宗朝為樞密副使以大同軍節度知許州徙知陜州召還以左屯衛上將軍檢校太尉致仕卒贈侍中諡景莊玉照新志開寶八年廷考王嗣宗與陳識齊納卷藝祖命二人角力以爭之而嗣宗勝焉遂居第一以識為第二守邠土邠舊有狐王庿相傳行營雜録王嗣宗能為人禍福嵗時享祀祈禱不敢少怠嗣宗至郡集諸邑獵户得百餘人以甲兵圍廟薰灌其穴殺百餘狐其妖遂息嗣宗後帥長安處士种放者朝廷所尊禮每帥守至輒面數之嗣宗不服以言拒之放責數嗣宗聲色俱厲嗣宗怒以手批其頰先是真宗有敕書令放有章奏即附驛欲詣闕即乘驛放遂乘驛訴于上前上特于嵩山之陽置書院以處之後嗣宗去郡有人贈詩曰終南處士威風減渭北狐妖窟穴空嗣宗大喜歸告其子孫曰吾死更勿為碑志但石刻此詩置于墓旁吾其榮矣題關右寺壁欲挂衣冠神武門先尋水竹渭南村卻將舊斬樓蘭劒買得黃牛教子孫東坡跋云余舊見此詩于關右寺壁上愛之不知其何人作也蔡寬夫詩話云是王嗣宗詩劉兼兼長安人官榮州刺史詩一卷胡震亨云雲間朱氏得宋刻唐百家詩兼集中有長春節詩為宋太祖誕節其人蓋五代人而入宋者秋夕書事搖落江天萬木空雁行斜戛塞垣風征閨搗月離愁逺舊館眠雲旅夢通郢客豈能陪下里臯禽爭肯戀樊籠此心曠蕩誰相會盡在南華十卷中咸陽懷古髙秋咸鎬起霜風秦漢荒陵樹葉紅七國鬭雞方賈勇中原逐鹿更爭雄南山漠漠雲常在渭水悠悠事旋空立馬舉鞭遙望處阿房遺址夕陽東江樓望鄉寄內獨上江樓望故鄉淚襟霜笛共凄涼雲生隴首秋初早月在天心夜正長魂夢只能隨蛺蝶烽煙無計學鴛鴦蜀箋都有三千幅總寫離情寄孟光長春節聖朝佳節遇長春跪奉金爐祝又焚寶藏發來天地秀兵戈銷後帝皇尊太平基址千年永混一車書萬古存更有馨香滿芳檻和風遲日在蘭蓀以上唐音戊籤李至至字言幾真定人舉進士太平興國中為翰林學士拜參知政事兼祕書監判國子監真宗朝拜工部尚書知河南府卒贈侍中伏蒙承旨學士特贈寵招慙非嘉客陪列仙于丹地觀盛事於玉堂御題禁署之名勢如飛動聖制大風之作鏗若宫商一時併耀于蓬瀛三體互成于真草昔太宗之優待學士日預論思明皇之寵尚集賢時聞臨幸以今況昔異代同榮至謬亞冢卿獲司中祕啖牛心而不稱陪麈尾以何闕二字銜樂聖之杯且乏娛賔之賦嗟嘆不足歌詠輒興雖勞燥吻之冥搜終類擊轅之陋唱仰塵髙鑒聊杼下情吏部侍郎兼祕書監李至上昔陪羣彥在鼇山今日重來赴玳筵才向玉堂觀聖札又離瑤席覩宸篇二南絶唱人驚駭三體神蹤鳳折旋坐久庭柯移午影飲酣宫吹遞香煙吟求視草箋分寫醉假通中枕暫眠俗客不知仙禁近髙歌共樂太平年翰苑羣書呈修史錢侍郎桃花犬歌宫中有犬桃花名絳繒圍頸懸金鈴先皇為愛馴且異指顧之間知上意珠簾未卷扇未開桃花搖尾常先至夜靜不離香砌眠朝飢秖傍御牀餧彩雲路熟不勞牽瑤草風微有時吠無何軒后鑄鼎成忽遺弓劒棄寰瀛迢迢松闕伊川上逺逐龍輴十數程兩眥漣漣似流淚骨見寒毛頓憔悴萬人見者俱傷心微物感恩猶若是韓盧備獵何足嘉西旅充庭豈為瑞聞君奉詔修實録一字為褒應不曲白魚赤雁且勿書願君書此懲浮俗古今詩話淳化中合州貢桃花犬甚小而性急常馴擾于御牀之側每坐朝犬必先吠人乃肅然太宗不豫此犬不食及上仙號呼涕泗瘦瘠章聖諭以奉陵即搖尾飲食如故詔造大鐵籠施素裀置鹵簿中行路見者流涕李至作歌以寄史官錢若水宋史錢若水傳太宗畜犬甚馴常在乘輿左右及崩鳴號不食因送永熙陵李至嘗詠其事欲若水書之以戒浮俗若水不從黃台台歙人遷宣城宋初任屯田員外郎題歙州問政山聶道士所居千尋練帶新安水萬仞花屏問政山自少雲霞居物外不多塵土到人間壺懸仙島吞舟罷碗浸星宫沈水間寶籙篋垂金縷帶絳囊縧鎖玉連環靜張棊勢鋪還打默考仙經補又刪牀並葛鞋雙兔伏窗橫柳几老龍跧溪童乞火朝敲竹山鬼聽琴夜撼􅗚草暗碧潭思句曲松昏紫氣度深關龜成淺甲毛猶緑鶴化幽翎頂更殷阮洞神仙分藥去蔡家兄弟寄書還黃精苗倒眠青鹿紅杏枝低挂白鷴容易煮茶供客用辛勤栽果與猿攀常尋靈穴通三島擬過流沙化百蠻新隱漸開侵月窟舊林猶恍枕沙灣手疏俗禮慵非傲肘護靈方祕不慳海上使頻青鳥黠篋中藏久白驢頑笻枝健拄菖蒲節筍櫛髙簪玳瑁斑花氣熏心香馥馥澗聲冷耳響潺潺髙墳自掩浮生骨短晷難窮不死顏早晚重逢蕭塢客願隨芝蓋出塵寰苕溪漁隱叢話方輿勝覽唐有于方外者自荆南掌書記棄妻從太白山道士學養氣之術後弟德晦為歙州刺史方外來訪之德晦為築臺于此號問政山房縣人聶師道少師方外後入吳為國師號問政先生吕端端字易直幽州安次人以蔭補千牛備身在周為直史館歸宋遷太常丞淳化四年拜參知政事擢户部侍郎同中書門下平章事真宗即位除太子太保卒贈司空諡曰正贈李公憶昔僦居明德坊官資俱是校書郎青衫共直昭文館白首同登政事堂佐國廟謨君已展避賢榮路我猶妨主恩至重何時報老眼相看淚兩行青箱雜記李昉吕端同薦文館各登台輔吕公贈詩云云送英公大師歸終南衡嶽煙蘿紫閣雲名髙湖外晚遊秦清詞古學儒生業圓笠方袍釋子身竹杖拄歸山裏寺篆書留與世間人我疑簪組成為縛空仰吾師去路塵夢英大師詩碑范杲杲字師回魯公質之姪太宗朝仕至右諫議大夫知濠州召為史館修撰卒寄宣義大師英公西遊久不得師書覩物相思展篆圖情厚未忘蓮社約分深曾伴橘洲居青雲作陳宜長臥白酒資吟莫破除見説近來揮彩筆字皆飛動有功夫夢英大師詩碑句千里版圖來浙右一聲金鼓下河東澠水燕談藝祖收河東杲叩馬進詩云云增秩賜章服楊徽之徽之字仲猷浦城人南唐時間道至汴中周顯德二年進士入宋除著作佐郎知全州太平興國初轉庫部員外郎判南曹詔編文苑英華真宗即位歷禮部侍郎樞密直學士兼祕書監咸平二年特置翰林侍讀學士命徽之與夏侯嶠吕文仲為之卒贈兵部尚書有集禁林宴會之什星移嵗律應青陽得奉羣英集玉堂龍鳳雙飛觀御札雲霞五色詠天章禁林漸覺清風暖仙界元知白日長詔出紫泥封去潤朝回蓮燭賜來香二篇稱奬恩尤重萬國傳聞道更光何幸微才逢盛事願因史册紀餘芳翰苑羣書嘉州作俗遇臘辰持藥獻吏逢荷月隔花參耆宿因來問封部竹籬西畔是雲南方輿勝覽漢陽晚泊傍橋吟望漢陽城山遍樓臺徹上層犬吠竹籬沽酒客鶴隨苔岸洗衣僧疏鐘未徹聞寒漏斜月初沈見逺燈夜靜鄰船問行計曉帆相與向巴陵寒食寄鄭起侍郎清明時節出郊原寂寂山城栁映門水隔淡煙修竹寺路經疏雨落花村天寒酒薄難成醉地迥樓髙易斷魂回首故山千里外别離心緒向誰言贈談先生古觀重重繞翠微杉松深處掩雙扉雲生萬壑投龍去海隔三山放鶴歸花洞宴遊春日永石壇朝禮曙星稀每聽髙論長生理擬向塵中便拂衣以上瀛奎律髓句犬吠竹籬沽酒客鶴隨苔岸洗衣僧江行天寒酒薄難成醉地迥樓髙易斷魂寒食戍樓煙自直戰地雨長腥塞上偶題嵓石雲生筆間繞庭松露濕衣僧舍新霜染楓葉皓月借蘆花湘江舟行廢宅寒塘水荒墳宿草煙哭江為青帝已教春不老素娥何惜月長圓浮花水入瞿塘峽帶雨雲歸越雋州嘉陽川春歸萬年樹月滿九重城元夜開盡菊花秋色老落殘桐葉雨聲寒宿東林澠水燕談楊侍讀徽之太宗聞其詩名盡索所著得數百篇奏御仍獻詩以謝卒章曰十年牢落今何幸叨遇君王問姓名上和之以詩謂宰臣曰真儒雅之士操履無玷拜禮部侍郎選集中十聮寫于御屏梁周翰詩曰誰似金華楊學士十聮詩在御屏風古今詩話僧文瑩云必以天池皓露滌筆于冰甌雪碗中方與楊公此詩神骨相副卞震震成都人蜀進士為渝州判蜀平入宋仍舊職句雨壁長秋菌風枝落病蟬即事老笻搘瘦影寒木憑吟身又詩債到春無處避離愁因醉暫時無春日偶題茶香解睡磨鐺煮山色牽懷著屐登以上雅言系述空囊萬里客斜月一牀寒歷代吟譜孟貫貫閩人句掃葉林風後拾薪山雨前寄張山人草堂詩話總龜閩嶺孟貫為性疏野不以名宦為意喜篇章大諫楊徽之稱之竇儀儀字可象薊州漁陽人晉天福中進士歷漢周二朝仕至兵部侍郎入宋拜翰林學士加禮部尚書卒贈右僕射宋史本傳竇儀父禹鈞儀弟儼侃稱僖皆相繼登科馮道與禹鈞有舊嘗贈詩有靈椿一株老丹桂五枝芳之句當時號竇氏五龍整肅每對五朝名臣言行録儀為性嚴重家法客坐即二侍郎三起居四參政五補闕皆侍立焉過邠州留題多少樊籠不敢開強拘物性要相陪何時得似邠州守德政臨民鶴自來萬姓統譜龍鐲字琢成乾德初任邠州守有仁政一日羣鶴翔于公庭州民繪來鶴圖以頌其德時學士竇儀以使過邠留題云云宋詩紀事卷二
