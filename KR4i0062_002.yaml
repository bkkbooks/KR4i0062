body:
  text: 宋詩紀事卷二錢塘厲鶚撰范質質字文素大名宗城人後唐長興四年進士晉天福中為翰林學士周廣順初拜中書侍郎同中書門下平章事太祖受禪加兼侍中乾德初封魯國公三年罷為太子太傅卒有集聞見前録魯公舉進士和凝為主文愛其文賦凝自以第十三登第謂魯公曰君之文宜冠多士屈居十三者欲君傳老夫衣鉢耳魯公以為榮至先後為相有獻詩者云從此廟堂添故事登庸衣鉢亦相傳周祖舉兵向闕京師亂魯公隱於民間一日坐封丘巷茶肆中有人貌怪陋前揖曰相公無慮時暑中公所執扇偶書大暑去酷吏清風來故人詩二句其人曰世之酷吏寃獄何止如大暑也公他日當深究此弊因攜其扇去公惘然久之後至祅廟見一土偶短鬼貌肖茶肆見者扇亦在其手中公心異焉誡兒姪八百字昨得謝課書希於京秩之中更與遷轉余以諸兒姪輩生長以來未諳外事艱難損益懵然莫辨因抒古詩一章曉之去年初釋褐一命到蓬丘自注謂謝課青袍春草色白紵棄如仇適會龍飛慶王澤天下流爾得六品階無乃太為優凡登進士第四選升校讐歷官十五考敘階與爾儔如何志未滿意欲凌雲遊若言品位卑寄書來我求省之再三歎不覺淚盈眸吾家本寒素門地寡公侯先子有令德樂道尚優遊生逢世多僻委任信沈浮仕宦不喜達吏隱同莊周積善有餘慶清白為貽謀伊余奉家訓孜孜務進修夙夜事勤肅言行思悔尤出門擇交友防慎畏薰蕕省躬常懼玷恐掇庭闈羞童年志於學不惰為箕裘二十中甲科頳尾化為虯自注二十三進士及第今舉成數三十入翰苑步武向瀛州四十登宰輔貂冠侍冕旒備位行一紀將何助帝猷既非救旱雨豈是濟川舟天子未遐棄日益素餐憂黃河潤千里草木皆浸漬吾宗凡九人繼踵升官次門內無白丁森森朱緑紫鵷行洎內職亞尹州從事府掾監省官髙低皆清美悉由僥幸升不因資考至朝廷懸爵秩命之曰公器才者祿及身功者賞於世非才及非功安得霑厚利寒衣內府帛飢食太倉米不蠶復不穡未嘗勤四體雖然一家榮豈塞衆人議顒顒十目窺齪齪千人指借問爾與吾如何不自愧戒爾學立身莫若先孝弟怡怡奉親長不敢生驕易戰戰復兢兢造次必於是戒爾學干祿莫若勤道藝嘗聞諸格言學而優則仕不患人不知惟患學不至戒爾逺恥辱恭則近乎禮自卑而尊人先彼而後已相鼠與茅鴟宜鑒詩人刺自注左傳茅鴟刺不恭也戒爾勿曠放曠放非端士周孔垂名教齊梁尚清議南朝稱八達千載穢青史戒爾勿嗜酒狂藥非佳味能移謹厚性化為凶暴類古今傾敗者歷歷皆可記戒爾勿多言多言衆所忌茍不慎樞機災危從此始是非毁譽間適足為身纍舉世重交遊擬結金蘭契忿怨從是生風波當時起所以君子心汪汪淡如水舉世好承奉昻昻增意氣不知承奉者以爾為玩戲所以古人疾籧篨與戚施舉世重任俠俗呼為義士為人赴急難往往陷刑死所以馬援書殷勤戒諸子舉世賤清素奉身好華侈肥馬衣輕裘揚揚過閭里雖得市童憐還為識者鄙我本羇旅臣遭逢堯舜理位重才不充戚戚懷憂畏深淵與薄冰蹈之唯恐墜爾曹當憫我勿使增罪戾閉門斂蹤迹縮首避名勢名勢不久居畢竟何足恃物盛必有衰有隆還有替速成不堅牢亟走多顛躓灼灼園中花早發還先萎遲遲澗畔松鬱鬱含晚翠賦命有疾徐青雲難力致寄語謝諸郎躁進徒為耳宋文鑑王溥溥字齊物并州祁人漢乾祐中進士為祕書郎周廣順初拜端明殿學士恭帝嗣位官右僕射宋初進位司空加太子太師封祁國公卒贈侍中諡康獻有集石林詩話五代王仁裕知貢舉王丞相溥為狀元時年二十六後六年遂相周世宗猶及本朝以太子太保罷歸班年才四十二前此所未有也初溥拜相仁裕致仕無恙以詩和之云一戰文場拔趙旗便調金鼎佐無為白麻驟降恩何極黃髮初聞喜可知跋敕案前人到少䇿沙隄上馬歸遲立班始得遙相見親洽爭知未貴時謝進士張翼投詩兩軸清河詩客本賢良惠我新吟六十章格調宛同羅給事功夫深似賈司倉登山始覺天髙廣到海方知浪渺茫好去蟾宫是歸路明年應折桂枝香洛陽搢紳舊聞記詠牡丹棗花至小能成實桑葉雖柔解吐絲堪笑牡丹如斗大不成一事又空枝歷代吟譜趙普普字則平幽州薊人占籍洛陽周顯德初永興軍節度從事宋乾德中拜門下侍郎平章事太平興國中及端拱初凡三入相薨以佐命功追封真定王諡忠獻配饗太祖廟庭有集雪中駕幸敝廬恭紀貞元重數莢滕六劇霏葩漠漠初濡砌皚皚欲聚沙閭閻銀作界宫闕玉為家調鼎慙鹽撒霑溫覺絮加瑞凝三殿瓦欣動五雲車冰柱撑茅屋瓊枝擁翠華微行停蹕警冷漏靜街譁具野曽無隗磻溪豈問牙公然門駐輦那信室盤蝸積素堪麟畫飛黃想兔罝一庭看素練十道趣宣麻戎索籌先後雄才辨等差神威殷地軸御指落天花袁臥甘朝穩裴功敢夜誇雪山行獻琯早晚列星槎陸氏善鳴集鶚按此詩出近人陸氏次雲選本不知其何所據且殷字是宣祖廟諱普不應犯姑存之以俟考李昉昉字明逺深州饒陽人漢乾祐中舉進士周顯德中仕至翰林學士入宋歷翰林侍讀學士拜中書侍郎平章事以特進司空致仕卒贈司空諡文正有集贈賈黃中賈以七嵗應童子舉七嵗神童古所難賈家門户有衣冠十人科第排頭上五部經書誦舌端見榜不知名字貴登筵未識管弦歡從今穩上青雲去萬里誰能測羽翰聞見前録寄孟賓于幼攜書劒別湘潭金榜標名第十三昔日聲塵喧洛下近年詩價滿江南長為邑令情終屈縱處曹郎志未甘莫學馮唐便休去明君晚事未為慚馬令南唐書賓于歸南唐為塗陽令黷貨當死時李昉事皇朝為翰林學士乃賓于同年進士聞賓于縲紲以詩遺之後主見詩貸之復其官仙客胎化仙禽性本殊何人攜爾到京都因加美號為仙客稱向間庭伴野夫警露秋聲雲外逺翹沙晴影月中孤青田萬里終歸去暫處雞羣莫歎吁青箱雜記昉所畜五禽名五客仙客鶴雪客鷺間客白鷴隴客南客孔雀西客鸚鵡有詩云御書飛白玉堂之署四字頒賜禁苑今懸桂已畢輒述惡詩一章用歌盛事玉堂四字重千金宸翰親揮賜禁林地望轉從今日貴君恩無似此時深宴回上苑花初發麻就中宵月未沈衣惹御香拖瑞錦筆宣皇澤灑春霖院門不許間人入承旨學士舉舊事置鈴索於院門間人不許輒入仙境寧教外事侵我直承明踰二紀臨川實動羡魚心昉頃在禁林前後出處凡二十有五載不逢今日之盛事者有七新學士謝恩日賜襲衣金帶寶鞍名馬一也十月朔改賜新樣錦袍二也特定草麻例物三也改賜內庫法酒四也月俸並給見錢五也特給親事官隨從六也新學士謝恩後就院賜宴設雖為舊事而無此時供帳之盛七也凡此七事並前例特出異恩以見聖君待文臣之優厚也臨川之羡其在兹乎翰苑羣書贈襄陽妓峴山亭畔紅妝女小筆香箋善賦詩顔貌共推傾國色篇章皆是斷腸辭便牽魂夢從今日得見嬋娟在幾時千里關河萬重意夜深無睡暗尋思能改齋漫録禁林春直疏簾搖曳日輝輝直閣深嚴半掩扉一院有花春晝永八方無事詔書稀樹頭百囀鶯鶯語梁上新來燕燕飛豈合此身居此地妨賢尸祿自知非瀛奎律髓句奠玉五回朝上帝御樓三度納降王昌陵挽詩代吟譜歷水光先見月露氣早知秋古今詩話王易簡易簡字國寶萬年人梁乾化中進士官右拾遺後唐拜中書舍人周廣順初歷禮刑兵三部尚書入宋召加少傅卒宋史本傳後唐明宗即位易簡退居華陰作小隱詩二十首以見志好事者多傳誦拜拾遺辭官歸隱作汨沒朝班愧不才誰能低折向塵埃青山得去且歸去官職有來還自來歷代吟譜陶穀穀字秀實邠州新平人本唐彥謙之孫避晉諱改焉仕晉知制誥倉部郎中仕漢為給事中仕周至兵部侍郎翰林承旨入宋加户部尚書贈右僕射有清異録行世畫墁録太祖嘗謂陶穀一雙鬼眼使江南韓熙緗素雜記周世宗時陶尚書穀奉載遣家妓奉盤匜及旦有書謝云巫山之麗質初臨霞侵鳥道洛浦之妖姬自至月滿鴻溝舉朝不能會其詞熙載因召家妓訊之云是夕適浣濯焉國老談苑陶穀又嘗奉使兩浙獻詩二十韻於錢俶其末云此生頭已白無路掃王門時穀官是承郎職為學士奉命小邦獻詩已是失體復有掃門之句何辱命之甚也題玉堂壁官職須由生處有文章不管用時無堪笑斡林陶學士年年依樣畫葫蘆續湘山野録國初陶尚書以朝廷眷待詞臣不厚乞罷禁林太祖曰此官職甚難作依樣葫蘆且作且作不許罷復不進用因題玉堂云云駕幸見之愈不悅卒不大用東軒筆録陶穀意希大用俾其黨因事薦引言穀在詞禁宣力實多太祖笑曰翰林草制皆檢前人舊本改換詞語所謂依樣葫蘆耳寄贈夢英大師是箇碑文念得全聰明靈性自天然離吳別楚三千里入洛遊梁二十年負藝已聞喧世界髙眠長見臥雲煙相逢與我情何厚問佛方知宿有緣夢英大師詩碑書史會要釋夢英號臥雲叟南嶽人與郭忠恕同時習篆皆宗李陽冰有所書偏傍字源及集十八體書刻石于長安文廟曹翰翰大名人周世宗時仕至德州刺史入宋歷威塞軍節度使判潁州坐事削官終左千牛衛上將軍卒贈太尉淳化中賜諡武毅內宴奉詔作三十年前學六韜英名嘗得預時髦曾因國難披金甲不為家貧賣寶刀臂健尚嫌弓力軟眼明猶識陳雲髙庭前昨夜秋風起羞睹盤花舊戰袍青箱雜記曹翰嘗平江南有功後歸環衛數年不調一日內宴賦詩翰以武人不預乃自陳曰臣少亦學詩亦乞應詔太宗笑而許之曰卿武人宜以刀字為韻翰援筆立進太宗覽之惻然即自環衛驟遷數級張昭昭字潛夫濮州范縣人歷仕唐晉漢周四朝至兵部尚書恭帝封舒國公宋初拜吏部尚書進封鄭國公致仕封陳國公卒有嘉善集夜吟竇鞏集追思夷門題處已三稔矣悽然感興書之往嵗記時梁苑夜今宵題處洛城秋浮生瞥電人何在懷舊傷心淚迸流三徑竹風鄰笛怨一庭霜月井梧愁妻兒未會豫惆悵只怪燈前不舉頭北海王嵩跋云余家藏和峴所校五竇詩世少其本和所跋甲子嵗乾德二年也祕監尹公者尹拙也致政大夫者吏部尚書致仕張昭也昭字潛夫題鞏詩一篇稱潛夫者即昭也刑部員外郎兼太常和者即峴也符彥卿彥卿字冠侯陳州宛邱人後唐中書令存審之子仕為慶州刺史入晉歷武寧軍節度同平章事漢乾祐中加中書令封魏國公周世宗改封魏王歸宋加守太師移鳳翔節度知汴州作全軍十萬擁雄師正是酬恩報國時汴水波濤喧鼓角隋隄楊栁拂旌旗前驅紅斾關西將環坐青蛾趙國姬為報長安冠蓋道粗官到底是男兒劉斧青瑣髙議大丞相李公昉嘗言當日目外鎮為麁官符彥卿知汴州有詩云云公之詩意蓋有憾之詞爾盧多遜多遜懷州河內人周顯德中舉進士纍官集賢殿修撰入宋知制誥為翰林學士歷中書侍郎平章事坐事謫崖州蓉塘詩話丁晉公謂曰盧相多遜在朝行將歷代帝王年歷功臣事迹天下州郡圖志理體事務沿革典故括成一百二十絶詩以備應對由是太祖太宗每所顧問無不知者以至踐清途登鈞席皆此力耳新月應制太液池邊看月時好風吹動萬年枝誰家玉匣開新鏡露出清光些子兒後山詩話太祖夜幸後池對新月置酒召使賦詩請韻曰些子兒其詩云云太祖大喜盡以坐間飲食器賜之李濤濤字信臣京兆萬年人唐郇王瑋十一世孫避地湖南馬殷署衡陽令後唐天成初舉進士仕晉為中書舍人仕漢拜中書侍郎平章事周封莒國公入宋拜兵部尚書卒贈右僕射春社日寄李學士社翁今日沒心情為乏治聾酒一瓶惱亂玉堂將欲遍依稀巡到第三廳李文正公談録吾為翰林學士月給內醖兵部李相濤好滑稽嘗因春社寄此詩蓋俗傳社日酒喫治耳聾兵部小字社翁每於班行呼其名字云句溪聲長在耳山色不離門掃地樹留影拂牀琴有聲落日長安道秋槐滿地花唐托言楊昭儉昭儉字仲寶京兆長安人後唐長興中進士殿中侍御史事晉為翰林學士周改御史中丞宋開寶初以工部尚書致仕太宗即位加禮部尚書卒贈夢英大師紀贈歌詩數百人序師多藝各求新未言篆𨽻飛龍鳳且説風騷感鬼神琴有古聲清耳目鶴無凡態惹埃塵英公所學還如此不錯承恩近紫宸夢英大師詩碑趙逢逢字常夫媯州懷戎人漢乾祐中擢甲科授祕書郎周顯德中水部郎中知制誥入宋拜中書舍人乾德初充樞密直學士開寶中卒懷夢英大師林巒影裏有清賢與我相知二十年書札愛工精玉篆利名拋捨住金田吟容賈島稱詩匠醉許劉伶作酒仙别後近聞棲華嶽亂雲應得恣情眠夢英大師詩碑王著著字成象單州單父人漢乾祐中進士仕周為金部郎中知制誥宋初加中書舍人翰林學士卒贈夢英大師到處聞人乞篆蹤學來年久有深功墨池闊類湘江水筆冢髙齊太華峯金錫罷飛新解虎鐵盂收掌舊降龍知師吟戀煙村景不肯回頭望九重夢英大師詩碑許仲宣仲宣字希粲青州人漢乾祐中進士宋初授太子中允太宗朝知河南府清洛喜英公大師相訪方袍紫染出彤庭久在林泉養性靈無事撓心長見醉有名傳世不曾醒多年别我頭先白此日逢師眼倍青記得上都相會否夜飛杯篆老君經夢英大師詩碑蘇德祥德祥宋初官右補闕內供奉贈南嶽宣義大師英公學就書聞在道林幾年辛苦用身心九霄雨露酬知早百首風騷立意深青白野雲間裏臥古今碑碣醉中尋因何負此多般藝可惜教師鬢雪侵夢英大師詩碑趙文度文度宋初官鎮國軍節度使贈夢英大師攜笻何日别長沙鳳篆功夫世所嘉秦嶺夜吟殘海月章臺春講雨天花淨瓶逺貯湘潭水片衲晴披嶽面霞聖主有恩酬絶藝簾前師號紫袈裟夢英大師詩碑郭從義從義其先沙陀部人父紹古事後唐武皇賜姓李氏從義補內職晉天福初復姓郭歷事四朝周世宗時以功加檢校太師兼中書令宋初為河中尹護國軍節度使致仕卒贈夢英大師雲水僧來説我師換鵝書札轉髙奇揮毫傳下千年事貞石曾留幾處碑混俗市鄽人莫識和光蹤迹鶴應知蓮花結社須容我不似陶潛愛酒巵夢英大師詩碑何承裕承裕宋初官侍御史寄宣義英公書札精奇已換鵝仍聞依舊臥煙蘿詩成萬首猶嫌少酒飲千鍾不怕多鄉寺夜開雲夢月石房寒鎖洞庭波知師收拾南歸去為憶漁人唱楚歌夢英大師詩碑賈玭玭宋初官尚書兵部郎中寄贈宣義大師篆寫千文邁古今感陶承旨撰碑陰兩朝雨露書中得滿篋詩章物外尋衡嶽水雲長挂夢帝城煙月不關心西遊去後無消息想共陳摶一處吟夢英大師詩碑李鑄鑄宋初官檢校禮部尚書守太常卿致仕贈英公大師僧門奇士有英公篆𨽻髙能世莫窮五色彩毫傳夢寐三乘真諦達虛空賜衣深染函關上寵號光呼奈苑中幸對風情添逸趣好陪清話在蓮宫夢英大師詩碑師頏頏宋初官翰林學士尚書刑部郎中知制誥史館修撰贈宣義大師英公禪得元機筆得精孤雲光彩甚分明毫端落紙堪為寶海內無人不重名山約終歸雙履在髭因涼剃一刀輕何妨換取鵝羣了却與迷徒指化城夢英大師詩碑李若拙若拙宋初官左諫議大夫贈宣義大師英公昔嵗髙名動九重衡山别後碧雲空紫袍親授龍墀上白足頻登虎殿中小篆每輕秦相法𨽻書猶鄙晉臣功多才多藝如師少當世羣賢盡嚮風夢英大師詩碑梁周翰周翰字元裦管城人周廣順二年進士開寶中為太子中允太平興國中知蘇州召為翰林學士終工部侍郎有集禁林宴會之什寶書驚絶耀天章飛白親題賜玉堂瑞彩上騰流素月朗河下注映丹牆鶴盤吳嶼雙翎健鵲顧雕陵巨翼長遊霧半收懸組練輕雲斜拂駐鸞皇墨池併獲三奇寶翠琰俱生五色光陪宴禁林知有幸叩頭遙祝萬年觴翰苑羣書句百花將盡牡丹坼十雨初晴太液春玉壺野史韓浦浦一作溥長安人唐相休之後少俊敏善屬文宋初舉進士官司門郎中東都事略溥博學多知唐朝氏族與人談娓娓可聽號為近世肉譜縉紳頗推之以蜀箋寄弟洎十樣蠻箋出益州寄來新自浣溪頭老兄得此渾無用助爾添修五鳳樓楊文公談苑韓浦與弟洎皆有辭藻洎語人曰吾兄為文譬如繩樞草舍聊避風雨豫之為文是造五鳳樓手浦以蜀箋寄之云云奉揚英公大師詩匠悟解真空始壯年兩朝供奉近爐煙故鄉夢斷三湘逺應制詩高四海傳晴望野雲生紫閣夜吟蘭燭滴花箋應愁內殿徵書至恐向東林負昔緣夢英大師詩碑周渭渭字得臣昭州恭城人建隆初召試賜同進士出身歷官兩浙東西路轉運使遷侍御史加職方員外郎贈道士吳崇嶽楮為冠子布為裳吞得丹霞夀最長混俗性靈常樂道出塵風格早休糧枕中經妙誰傳與肘後方新自寫將百尺松梢幾飛步鶴棲枝上禮虛皇郡閣雅談吳崇嶽泉州龍興觀道士辟榖多年嘗登松梢禮拜處松枝可六七十尺福建漕使周渭贈以詩太平興國中詔入京宋白白字太素一字素臣開封人建隆二年進士太宗擢為左拾遺權出知兖州改翰林學士與李昉等奉詔纂文苑英華太平御覽歷刑部尚書致仕卒贈左僕射諡文安有廣平集贈麻仲英宣毫歙墨川箋紙寄與麻家小秀才七嵗能文天骨異前生已折桂枝來皇朝類苑麻仲英幼有俊才七嵗能詩侍父官鄜州宋翰林白方謫鄜州而召之坐中賦詩十篇宋大稱賞翌日宋以浣溪箋李廷圭墨諸葛氏筆遺之仍贈以詩云云中酒中酒事俱妨偷眠就黑房靜嫌鸚鵡鬧渴憶荔枝香病與慵相續心和夢尚狂從今改