body:
  text: 宋詩紀事卷三十三錢塘厲鶚撰黃庭堅庭堅字魯直洪州分寧人庶子舉進士為葉縣尉厯祕書丞紹聖初坐修神宗實録失實貶涪州别駕黔州安置建中靖國初召還知太平州復除名編管宜州卒自號山谷老人有豫章集精華録雲麓漫鈔吕居仁作江西詩社宗𣲖圖其略云古文衰于漢末先秦古書存者為學士大夫剽竊之資五言之妙與三百篇離騷爭烈可也自李杜之出後莫能及韓栁孟郊張籍諸人自出機杼别成一家元和之末無足論者衰至唐末極矣然樂府長短句有一倡三歎之致國朝文物大備穆伯長尹師魯始為古文盛于歐陽氏歌詩至于豫章始大出而力振之後學者同作並和盡發千古之祕亡餘蘊矣録其名字曰江西宗沠其源流皆出豫章也宗派之祖曰山谷其次陳師道無已潘大臨邠老謝逸無逸洪朋龜父洪芻駒父饒節德操乃如璧也祖可正平徐俯師川林敏修子仁洪炎玉父汪革信民李錞希聲韓駒子蒼李彭商老朝沖之叔用江端友子我楊符信祖謝薖幼槃夏倪均父林敏功潘大觀王直方立之善權巽中高荷子勉凡二十五人居仁其一也議者以謂陳無已為詩高古使其不死未必甘為宗派若徐師川則固嘗不平曰吾乃居行間乎韓子蒼云我自學古人均父又以在下為恥不知居仁當時果以優劣銓次姑記姓名而紛紛如此以是知執太史之筆者戛戛乎難哉又不知諸公之詩其後人品藻與居仁所見又何如也三十七卷續派十三文獻通考江西詩派一百卷直方詩話山谷舊所作詩文名以焦尾敝帚王秦少遊云每覽此編輒悵然終日殆忘食事邈然有二漢之風今交遊中以文墨稱者未見其比所謂珠玉在旁覺我形穢也謀鬼神無一點西清詩話山谷詩妙脫蹊徑言塵俗氣所恨務高一似參曹洞下禪尚墮在玄妙窟裏苕溪漁隱叢話元祐文章稱蘇黃時二公爭名互相譏誚東坡嘗云魯直詩文如蛑蝤江瑤桂格韻髙絶盤餐盡廢然不可多食多則發風動氣山谷亦云蓋有文章妙一世而詩句不逮古人者此指東坡而言也任天社云山谷詩律妙一世用意未易窺測然置字下語皆有所從來張巨山云山谷古律詩酷學少陵雄健太過遂流而入于險怪要其病在太著意欲道古今人所未道語耳其文専學西漢惜才力褊局不能汪洋恣肆如其紀事立言頗有類處敖陶孫詩評黃山谷如陶𢎞景抵召入宫析理談玄而松風之韻故在劉後村詩話國初詩人如潘閬魏野規規晚唐格調楊劉則又専為崑體蘇梅二子稍變以平淡豪傑而和之者尚寡至六一公巍然為大家數學者宗焉然二公亦各極其天才筆力之所至而已非必鍛鍊勤苦而成也豫章稍後出會粹百家句律之長究極厯代體製之變搜討古書穿穴異聞作為古律自成一家雖隻字半句不輕出遂為本朝詩家宗祖詩林廣記豫章先生傳贊云山谷自黔州以後句法尤高筆勢放縱實天下之竒作自宋興以來一人而已東坡云讀魯直詩如見魯仲連李太白不敢復論鄙事雖若不適用然不為無補于世題竹石牧牛圖野次小崢嶸幽篁相依緑阿童三尺箠御此老觳觫石吾甚愛之勿遣牛礪角牛礪角尚可牛鬬殘我竹陵陽室中語一日因坐客論魯直詩體製新巧客舉魯直此詩云石吾甚愛之勿使牛礪角牛礪角尚可牛鬬殘我竹如此體製甚新公徐云獨漉水中泥水濁不見月不見月尚可水深行人沒蓋是李太白獨漉篇也山谷亦效此語意耳記夢衆真絶妙擁靈君曉然夢之非紛紜窗中逺山是眉黛席上榴花皆舞裙借問琵琶得聞否靈君色莊妓搖手兩客爭棊爛斧柯一兒壞局君不呵杏梁歸燕空語多奈此雲窗霧閣何洪駒父詩話余嘗問山谷云此記一段事也嘗從一貴宗室攜妓遊僧寺酒闌諸妓皆散入僧房中主人不怪也故有曉然夢之非紛紜之句宗室公壽挽詞昔在熙寧日葮莩接貴遊題詩奉先寺橫笛寶津樓天網恢中夏賓筵禁列侯但聞劉子政頭白更清修二老堂詩話意深語到可見宗室前肆後拘氣象觀伯時畫馬禮部試院作儀鸞供帳叨蝨行翰林溼薪爆竹聲風簾官燭淚縱橫木穿石盤未渠透坐窗不遨令人瘦貧馬百菣逢一豆眼明見此玉花驄徑思著鞭隨詩翁城西野桃尋小紅苕溪漁隱叢話此格禁臠謂之促句換韻其法三句一換韻三疊而止此格甚新人少用之題畫屏六言胡蝶雙飛得意偶然畢命網羅羣蟻爭收墜翼䇿勛歸去南柯桯史黨禍既起山谷居黔有以屏圖遺之者繪雙蝶翾舞罥于蛛絲而隊蟻憧憧其間題六言于上云云崇寧間又遷于宜圖偶為人攜入京鬻于相國寺肆蔡客得之以示元長元長大怒將指為怨望重其貶會以訃奏僅免水仙花淤泥解作白蓮藕糞壤能開黃玉花可惜國香天不管隨緣流落小民家墨莊漫録山谷在荆州時鄰居一女子間靜妍美綽有態度年方笄也山谷殊嘆惜之其家蓋閭閻細民未幾嫁同里而夫亦庸俗貧下非其偶也山谷因和荆南太守馬琙中玉水仙花詩云云蓋有感而作後數年此女生二子其夫鬻于郡人田氏家憔悴頓挫無復故態然猶有餘妍乃以國香名之青奴穠李四弦風掃席昭華三弄月侵牀我無紅袖堪娛夜正要青奴一味涼以上山谷內集侍兒小名録拾遺東坡寄栁子玉云聞道牀前唯竹几夫人應不解卿卿又送竹几與謝秀才云留我同行木上座贈君無語竹夫人山谷云竹夫人乃涼寢竹器憩臂休膝非夫人之職而冬夏青青竹之所長名曰青奴作詩云云穠李昭華貴人家兩女奴也題花光為曾公衮作水邊梅梅蘂觸人意冒寒開雪花遙憐水風晚片片點汀沙題石牛洞石上鬱鬱窈窈天香宅諸峯排霄帝不隔六時謁天開關鑰我身金華牧羊客羊眠草間我世間高真衆靈思我還石盆之中有甘露青牛駕我山谷路以上山谷外集方輿勝覽懷寧縣山谷寺西北有石牛洞其狀如牛唐李翺諸賢題詠甚多李伯時畫黃魯直坐石牛上魯直因自號山谷道人仍題詩石上云云牧童騎牛遠遠過前村吹笛風斜隔隴聞多少長安名利客機關用盡不如君桐江詩話世傳山谷七歲作絶句疊送香羅淺色衣著來香氣入書帷到家慈母驚相問為説王孫脫贈時趙德麟侯鯖録魯直入宫教余兄弟伯父五開府酒餘脫淺色香羅襖衣之魯直作詩周昉美人琴阮圖周昉富貴女衣飾新舊兼髻重髮根急薄粧無意添琴阮相與娛聽絲不停手敷腴竹馬郎跨馬要折栁墨莊漫録龍眠李亮工家藏周昉畫美人琴阮圖殊有宫禁富貴氣旁有竹馬小兒欲折檻前栁者亮工官長沙時山谷謫宜州過而見之歎愛彌日大書一詩於黃素上此詩不見今集觀祕閣蘇子美題壁詩仁祖康四海本朝盛文章蘇郎如虎豹孤嘯翰墨場風流映海岱峻鋒不可當學書窺法窟當代見崔張銀鉤刻琬琰蠆尾回縑緗擢登羣玉府高閣目生光春風吹曉雨禁直夢滄浪人聲市朝遠簾影花竹涼秋荷湔筆硯怨句挾風霜不甘老天祿誠欲升未央小臣膽如斗侏儒俸一囊請提師十萬奉辭問犬羊歸鞍飲月支伏背笞中行人事喜乖忤南遷得夜航此時調玉燭日行中道黃柄臣似牛李傾奪謀未臧薄酒圍邯鄲老龜禍枯桑兼官百郡邸報賽用歲常招延青雲士共醉椒糈觴俗客避白眼徴歌舞紅裳謗書動宸極牢戶繫桁楊一網收冠蓋九衢人走藏庖丁提刀立滿意無四旁論罪等叨餮囚衣禦方良姑蘇麋鹿疃風月有書堂永無湔祓期山鬼共幽篁萬戶封侯骨今成狐岡邇來四十年我亦校書郎雄文終膾炙妙墨見垣牆高山仰豪氣崢嶸乃不亡張侯開詩卷詞章尚軒昻草書十餘紙雨漏古屋廊誠知千里馬不服萬乘箱遂令駕鼓車此豈用其長事往飛鳥過九原色莽蒼敢告大鈞手才難幸扶將中吳紀聞答王道濟寺丞觀許道寧山水圖往逢醉許在長安蠻溪大硯磨松煙忽呼絹素翻硯水久不下筆或經年一日踏門撼門鈕巾帽敧斜猶索酒舉杯意氣欲翻盆倒臥虛樽將八九醉拈枯筆嘗墨色勢若山崩不停手數尺江山萬里遙滿堂風物冷蕭蕭山僧歸寺童子後漁伯欲渡行人招先君笑指溪上宅鸕鷀白鷺如相識許生再拜謝不能乃是天機非筆力自陳精力初未衰八幅生絹作四時早師李成最得意什襲自藏人已知貴人取去棄牆角流落幾姓今知誰大梁畫肆閲水墨四圖宛然當物色自言早過許史門常賣一聲偶然得雨雪涔涔滿寺庭四圖冷落讓丹靑往來睥睨誰比數十萬酬之觀者驚客還次第閲冬夏坐見歲序寒崢嶸王丞來觀歎嘖嘖亦如我昔初見日新詩雌黃初得實信知君家有摩詰我持此圖二十年眼見緑髮皆華顚許生縮手入黃泉衆史弄筆摩青天君家枯松出老翟頗似破屏有骨骼一時所棄願愛惜不誣方將有人識聲畫集此詩正夲有二篇互有不同今録其後篇絶句黃葉委庭觀九州小蟲催女獻工裘金錢滿地無人費百斛明珠薏苡秋王直方詩話少遊嘗以真字題月團新碾瀹花瓷一絶于邢敦夫扇上山谷見之乃于扇背復作小草題此詩皆自所作詩也少遊後見之云逼我太甚題大年小景二絶水色煙光上下寒忘機鷗鳥恣飛還我來頻作江湖夢對此身疑在故山輕鷗白鷺定吾友翠柏幽篁是可人海角逢春知幾度臥遊到處總傷神苕溪漁隱叢話余家有大年畫小景二幅山谷親書兩絶句其上今豫章所刻集及他本皆無宿錢塘尉廨平湖繞舍山無盜官事長間俸有金安得終身為禦寇不辭兒女作吳音合璧事類别集題東丁水古人題作東丁水自古東丁直到今我為改名方響洞要知山水有清音老學菴筆記漢嘉城西北山麓有一石洞泉出其間良久一滴淸如金石山谷詩云贈宗室大年揮毫不作小池塘蘆荻江邊落鴈行雖有珠簾籠翡翠不忘煙雨罩鴛鴦王直方詩話大年喜微行而善畫小景山谷蓋有所譏也山礬北嶺山礬取次開淸風正用此時來平生習氣雖料理愛著幽香未擬回苕溪漁隱叢話山谷云江南野中有一種小白花木高數尺春開極香野人謂之鄭花王荆公嘗欲作詩而陋其名豫請名曰山礬野人採鄭花以染黃不借礬而成色故名山礬海岸孤絶處普陀山譯者以為小白花豫疑即此花耳不然何以觀音老人端坐不去耶句春將國豔熏花骨日借黃金縷水紋題野寺壁人玉屑詩人得交遊是風月天開圖畫即江山石林燕語清鑑風流歸賀八飛揚跋扈付朱三苕溪漁隱叢話陳師道師道字無已一字履常彭城人號后山居士元祐中以蘇軾傅堯俞孫覺薦授徐州教授紹聖初厯祕書省正字扈從南郊不屑服趙挺之衣以寒疾卒有集朱文公語録黃山谷詩云閉門覓句陳無已對客揮毫秦少遊陳無已平時出行覺有詩思便急歸擁被臥而思之呻吟如病者或纍日而後起真是閉門覓句者也詩林廣記或言后山之詩非一過可了近于枯淡彼其用意直追騷雅不求合於世俗亦惟恃有東坡山谷之知也自此兩公外政使舉世無領解者渠亦安暇恤哉文獻通考石林葉氏曰世言陳無已每登覽得句即急歸臥一榻以被蒙首惡聞人聲謂之吟榻家人知之即貓犬皆逐去嬰兒稚子亦抱寄鄰家徐待詩成乃敢復常敖陶孫詩評陳后山如九皋獨唳深林孤芳沖寂自妍不求賞識後村詩話後山樹立甚高其議論不以一字假借人然自言其詩師豫章公或曰黃陳齊名何師之有余曰射較一鏃奕角一著惟詩亦然后山地位去豫章不遠故能師之妾薄命為曾南豐作主家十二樓一身當三千古來妾薄命事主不盡年起舞為主壽相送南陽阡忍著主衣裳為人作春妍有聲當徹天有淚當徹泉死者恐無知妾身長自憐葉落風不起山空花自紅捐世不待老惠妾無其終一死尚可忍百歲何當窮天地豈不寬妾身自不容死者如有知殺身以相從向來歌舞地夜雨鳴寒蛬詩林廣記謝疊山云元豐間曽鞏修史薦后山有道德有史才乞自布衣召入史館命未下而曽去后山感其知已不願出他人門下故作妾薄命鞏南豐人歐陽公之客后山尊之號曰南豐先生丞相溫公挽詞恭默思良弼詩書正百工事多違謝傅天遽奪楊公一代風流盡三師禮數崇若無天下議美惡併成空詩林廣記謝疊山云時哲宗諒陰見上帝賚良弼非偶然也周公位冢宰正百工以詩書治天下與熙豐變法者不同蓋熙豐新法與溫公所志所學皆相反也百姓歸周老三年待魯儒俗方隨日化身已要人扶玉几雖來晚明堂訖授圖心知死諸葛終不羡曹蜍詩林廣記黃山谷見此詩俗方隨日化身已要人扶之句嘆曰陳三直不可及蓋天不憖遺老悲盡于此矣少學真成已中年託著書輟耕扶日月起廢極吹噓得志寧論晚成功不願餘一為天下慟不敢愛吾廬詩林廣記任天社云輟耕扶日月起廢極吹噓言公既執政士大夫得罪於熙豐者極力薦引而用之日月吹噓字雖不對而事勢氣象實相等此詩人之妙也嘲秦覯長鋏歸來夜帳空衡陽回雁耳偏聰若為借與東風看無限珠璣咳唾中王直方詩話少章登第後方娶後山作此詩時猶未娶故多戲句帳空聞雁之語皆戲其獨宿無寐也絶句書當快意讀易盡客有可人期不來世事相違每如此好懷百歲幾回開復齊漫録云此無已得意詩也寄外舅郭大夫巴蜀通歸使妻孥得定居深知報消息不忍問何如身健無妨遠情親未肯踈功名欺老病淚盡數行書詩人玉屑趙章泉先生嘗云學詩者莫不以杜為師然能如其師者鮮矣句或有似之而篇之全似者絶難得陳后山寄外舅郭大夫詩乃全篇之似杜者也後戴式之亦有思家用陳韻又全篇之似陳者也曾南豐先生挽詞早棄人間事真從地下遊丘原無起日江漢有東流身世從違裏功言取次休不應須禮樂始作後生仇精爽回長夜衣冠出廣庭勳庸留琬琰形象付丹靑道喪餘篇翰人亡更典刑侯芭才一足白首太玄經珊瑚鉤詩話此二詩后山感南豐之薦引未遂而遽亡故其詞深切端硯原注寇十一惠端溪四山下龍淵鬱積中州清淑氣金聲玉骨石為容河江屈流雲作使滑如女膚色馬肝探頷適遭龍伯睡轆轤挽出萬人賀千歲之藏一朝致書生活計亦酸寒斷甎半瓦寧求備似憐陶瓦磨竈煤輟贈不減前人志小放歌行春風永巷閉娉婷長使靑樓誤得名不惜卷簾通一顧怕君著眼未分明當年不惜嫁娉婷傅白施朱作後生説與旁人須早計隨宜梳洗莫傾城詩話總龜山谷云無己他日作詩極高古至于此篇則顧影徘徊炫耀太甚賦宗室士暕高軒過圖滕王蛺蝶江都馬一紙千金不當價異材天縱非力能畫工不是甘為下今代風流數大年含毫落筆開山川忽忘朽老壓塵底卻怪鳧鴻墮目前邇來八二復秀出萬里山河才咫尺眼邊爭得有突兀復似天地初開闢明窗寫出高軒過便逐愈湜聞吟哦晚知書畫真有益卻悔歲月來無多宮禁修嚴絶過訪時於僻寺聊稅鞅秀潤如行琮璧間清明似引星辰上憂悲愈怢百不平河擘太華東南傾平生秀句寰區滿掇拾棄置成丹靑平湖遠岫開精神陡覺文字生淸新未許二豪今角立也知旁有衛夫人王直方詩話無己謂余曰近宗子節使使余作一詩挂名其間得百千以為女子嫁資可乎余曰詩未成則錢不可緩詩已成則錢不可來數日無己卒士暕贈以百縑寄曹州朝大夫墮絮隨風化作塵黃樓桃李不成春只今容有名駒子困倚闌干一欠伸以上後山詩集菊坡叢話陳后山此詩自注云周昉畫美人有背立欠伸者最為妍絶東坡所賦麗人行也任天社云此篇言徐州風物後山嘗有詞并序云朝大夫增飾披雲初欲壓黃樓而張馬二子皆當年樽下世所謂英英盼盼者盼卒英嫁而盼之子瑩頗有家風而曹妓未有顯者黃樓不可勝也作南鄉子歌之曰風絮落東鄰點綴繁枝旋化塵關鎖玉樓巢燕子冥冥桃李摧殘不見春流轉到如今翡翠生兒綴作衾花樣腰身官樣立婷婷困倚闌干一欠伸蓋前云風絮以屬英塵化以屬盼名駒子以屬瑩瑩母馬氏也句昔日剜瘡今補肉百孔千瘡容一罅拆東補西裳作帶人窮令智短百巧千窮只短檠起倒不供聊應俗經事長一智稱家豐儉不求餘卒行好步不兩得巧手莫為無麵餅巧息婦做不得無麵餺飥不應逺水救近渴留渴須遠井遠水不救近渴瓶懸瓽間終一碎瓦罐終須井上破急行寧小緩急行趕過慢行遲早作千年調一生也作千年調人作千年調鬼見拍手笑拙勤終不補將勤補拙斧斫仍手摩大斧斫了手摩娑驚雞透籬犬升屋雞飛狗上屋割白鷺股何作難鷺鷥腿上割股薦賢仍賭命雞肋編陳無已詩亦多用一時俚語如昔日云云而東坡亦有三杯軟飽後一枕黑甜餘皆世俗語如賭命軟飽猶可解而黑甜後世不知其為睡矣如詩之串夷載路書云弔由靈安知非當時之常談也潘大臨大臨字邠老齊安人有柯山集次弟大觀字仲達亦入江西派其詩不傳後村詩話東坡文潛先後謫黃州皆與邠老遊其詩自云師老杜然有空意無實力余舊讀之病其深蕪話邠老得句法于東坡頃與洪駒父潘子真詩徐師川洎豫友善山谷嘗稱之曰天下異才也春日書懷舟楫淩漳水風濤接蠡湖龍媒戒跬步驪頷脫微軀樂土供遊戲深文苦縶拘胸中雖磈磊牆外或歌呼老去嵇康懶歸來寧子愚千鍾真臭腐十畝借膏腴春雨何曾密園花竟自都小橋藏細栁方沼出新蒲酒熟拈巾漉經傳帶雨鉏行盤隨所有坐客幾時無日轉槐陰暮門通鳥迹迂仰頭看哺鷇引手出將雛撫事盆繅繭勞生戶轉樞形骸浮大塊毛髮燎洪爐世論幾膠柱人心盡好竽屠龍非至計射雉屈良圖借箸方隆漢推枰已滅吳從渠畫麟閣吾自著潛夫答王立之惠書歸自江南即定居漫勞親友問何如剛腸肯為藜羮轉病骨聊憑竹杖扶南圃土腴千樹橘東湖春水百金魚明年生計應堪説待倩君侯買異書以上宋文鑑吳熙老所藏風雨圖我遊匡山夏將杪赤日青天萬山繞忽然風雨動地來震氣乘雷離電繞一川煙靄失東西萬里乾坤錯昏曉香爐高峯危欲墮石門細路人心𠞰江翻那聞得計魚木拔豈有安巢鳥須臾雲過雨腳收依舊晴暉著叢篠羣山厯厯在眼前恰似憑高日方曉誰將此景入畫圖數幅生綃盤礴了吳丞此畫絶代無張公此詩古來少讀詩觀畫興未窮北窗風涼退自公使君意消三伏中未可鞭箠催青銅熙老在羅田催科不用鞭箠而辦贈張聖言畫柯山圖我昔騎鯨遊九州上扣天闕望冕旒羣公侍旁好顔色將順帝旨成剛柔抱持日月不自獻蒙茸塵土歸家丘結茅竹間今休已炎暑避舍淸飈留屋頭清溪鳴晝夜當戶古木蔽馬牛蒼頭廬兒從高蓋傳呼不到門巷幽兩公忘言兒袖手驅除睡魔須茶甌誰傳此意到旁郡解衣盤礴煩張侯張侯落筆妙天下未墜學士之風流欻見柯山入畫圖丹靑知君百不憂黃公不肯直南省一麾已具東南舟請君援筆待公至畫我迎公竹隂裏以上聲畫集江間作白鳥沒飛煙微風逆上船江從樊口轉山自武昌連日月懸終古乾坤别逝川羅浮南斗外黔府古河邊西山連虎穴赤壁隱龍宫形勝三分國波流萬世功沙明拳宿鷺天濶退飛鴻最羡魚竿客歸船雨打篷苕溪漁隱叢話浯溪中興頌公泛浯溪春水船繫船啼鳥青崖邊次山作頌今幾年當時治亂春風前明皇聰明真晚謬乾坤付與哥奴手骨肉何傷九廟焚蜀山騎騾不回首天下寧知再有唐皇帝紫袍迎上皇神氣倉皇吾敢惜兒不終孝聽五郎父子幾何不豺虎君臣寧能責強虜南內凄涼誰得知人間稱家作端午平生不識顔真卿去年不答高將軍老來讀碑淚霑臆公詩與碑當並行不賞邊功寧有許不殺奏章猶未語雨淋日炙字未訛千秋萬歲所鑒多浯溪集句八字山頭鴈武昌江上魚江口漫録能改齋詩束牛腰藏舊稿書訛馬尾辨新讎贈賀方回老學菴筆記滿城風雨近重陽梁溪漫志謝無逸嘗從潘邠老求近作邠老答曰秋來景物件件是佳句恨為俗氛所蔽昨日清臥聞攪林風雨聲欣然起題其壁云云忽催租人至遂敗意止此一句奉寄謝逸逸字無逸臨川人屢舉不第以詩文自娛有溪堂集冷齋夜話無逸詩老鳳垂頭噤不語枯木槎牙噪春鳥貪夫蟻旋磨冷官魚上竹山寒石髮瘦水落溪毛凋等句大為山谷稱賞曰朝張流也後村詩話紫薇評無逸詩似康樂幼槃詩似元暉按康樂一字百鍊乃出冶元暉尤麗密無逸輕快有餘而欠工緻幼槃差苦思其合元暉者亦少然弟兄在政宣間科舉之外有𡵨路可進身韓子蒼諸人或自鬻其技至貴顯二謝乃老死布衣其高節亦不可及亡友潘邠老有滿城風雨近重陽之句今去重陽四日而風雨大作遂用邠老之句廣為三絶滿城風雨近重陽無奈黃花惱意香雪浪翻天迷赤壁令人西望憶潘郎滿城風雨近重陽不見修文地下郎想得武昌門外栁垂垂老葉半靑黃滿城風雨近重陽安得斯人共一觴欲問小馮今健否雲中孤雁不成行晚春蒲芽荇帶繞淸池錦纜牽船水拍隄好是寒煙疏雨裏遠峯青處子規啼門前楊栁暗沙汀雨溼東風未放晴點點落花春事晚青青芳草暮愁生夏日竹風煙靜午隂涼飯罷呼童啓北窗試拂橫牀供晝寢且容幽夢繞清江以上合璧事類前集寄隱士先生骨相不封侯卜居但得林塘幽家藏玉唾幾千卷手校韋編三十秋相知四海孰青眼高臥一菴今白頭襄陽耆舊節獨苦只有龎公不入州送董元達讀書不作儒生酸躍馬西入金城關塞垣苦寒風氣惡歸來面皺鬚眉斑先皇召見延和殿議論慷慨天開顏謗書盈篋不復辨脫身來看江南山長江滚滚蛟龍怒扁舟此去何當還大梁城裏定相見玉川破屋應數間豫章别李元中宣德舊聞諸李隱龍眠伯時已老元中少一行作吏各天涯故人落落疏星曉西山影裏識君面碧照暮江眸子瞭向來聞道渺多岐只今領略歸玄妙老鳳垂頭噤不語古木查牙噪春鳥身在幕府心江湖左胥右律但坐嘯第愁一葉釣魚舟不容堂堂七尺表我今歸臥靈谷雲君應紫禁鶯花繞相思有夢到茅齋細雨青燈坐林杪以上宋文鑑題王方之大裘軒小人拙生事三冬臥無帳忍寒東窗底坐待朝曦上徐徐晨光熙稍稍血氣暢薰然四體和恍若醉春釀此法祕勿傳不易車百輛君胡得此法開軒亦東向蘇公名大裘意豈在萬丈但觀名軒心人人如挾纊齊東野語社日雨栁垂垂葉風溪細細紋清歡惟煮茗美味秖羮芹飲不遭田父歸無遺細君東皋農事作舉趾待耕耘瀛奎律髓南湖絶句在臨川地近魏夫人仙壇平湖奩鏡靜無塵地接西壇共一雲安得御風如列子更邀明月訪元君野情蕭散不便書老大無心賦子虛待借南湖雙艓子緑荷隂裏看遊魚碧瓦朱甍午影涼軟風翻袂送秋香荷花也似知秋近故斂羞容避夕陽擬峴臺在撫州城東隅守裴某建曾文定公為記耿耿抱孤韻寂寂扄柴扉束書臥環堵交遊車馬稀風流佳公子妙年秉天機邀豫步層雲目送孤鴻飛山影漾清流翠色侵人衣漁浦晚煙暝霽氛蒙夕暉靜言思叔子悵然憺忘歸坐有庖丁手奏刀心術微萬象含筆端縑素聊一揮古來勝達士歘如朝露晞吾人各勉力毋為鄒湛譏廣壽寺學道護心城養生戒眉斧靜知世味薄老愜野僧語散步給孤園邀我會心侣塵清不眯眼境靜可冰暑蓮社宗遠公竹溪仰巢父此道不異世今人豈愧古當念貧時交重勿棄如土以上撫州府志句閻浮檀水心無染優鉢曇花體自香合璧事類後集狂隨栁絮有時見舞入梨花何處尋江天春晚暖風細相逐賣花人過橋豫章詩話謝無逸作胡蝶詩三百首人號謝胡蝶有句云云洪朋朋字龜父南昌人黃山谷之甥曽舉進士不第與其弟芻駒父炎玉父羽鴻父俱有才名時人號四洪王直方詩話洪龜父常有詩云琅玕嚴佛界山谷改云琅璫鳴佛屋龜父前後作詩唯有一朝厭蝸角萬里騎鵬背一聯最為妙絶山谷亦嘗歎賞此句寫韻亭紫極宫下春江橫紫極宫中百尺亭水入方洲界玉局雲映連山羅翠屏小楷四聲餘翰墨主人一粒盡仙靈文簫彩鸞不復返至今神界花冥冥紫微詩話作詩至此殆無遺矣春風春風吹桃李欻然滿中園羣動不遑息胡蝶紛飛翻我今感兹時步屧繞林間顏色豈不好持久良獨難置酒休其下聊復罄餘歡君看桃與李成蹊亦無言宿范氏水閣枕水鑿疏櫺雲扉夜不扃灘聲連地籟林影亂天星人靜魚頻躍秋高露欲零何妨呼我友乘月與揚舲獨步懷元中淨盡西山日深行城北村琅璫鳴佛屋薜荔上僧垣時雨慰枵腹夕風清病魂所思渺江水誰與共忘言晚登秋屏閣示杜氏兄弟病人湯尉暫時停漫向秋屏閣上行白日忽隨飛鳥去青山斷處落霞明林間嘒嘒寒蟬急江上悠悠煙艇橫富貴功名付公等嗟豫老矣負平生以上宋文鑑李夫人偃竹歌袖中歘忽生絲竹眼底鮮飇起寒緑闕誰能寫此真偃蹇一枝生氣足夫人故有林下風歲寒落落此君同映窗得意偶揮灑寫出篔簹郭裏千秋之臥龍夜來風雨吹倒屋但恐踊躍變化入水渺無蹤題胡潛風雨山水圖胡生好山水煙雨山更好鴻雁書遠空馬牛風塞草以上聲畫集廬山山瀑兩道瀉木葉四時春日暝不知去魚鳥會留人廬山志洪芻芻字駒父紹聖元年進士崇寧中入黨籍靖康中為諫議大夫汴京失守坐為金人括財流沙門島卒有老圃集文獻通考陳氏曰洪氏兄弟四人其母黃魯直之妹不淑早世所為賦毁璧者也龜父舉進士不第其季弟羽鴻父坐上書元符中入黨籍終其身芻炎皆貴而芻靖康失節貶廢羽詩不傳劉後村詩話三洪與徐師川皆豫章之甥龜父警句往往前人所未道然早卒惜不多見駒父詩尤工初與龜父遊梅仙觀龜父有詩卒章云願為龍鱗嬰勿學蟬骨蛻是以直節期乃弟矣駒父後居上坡晚節不終不特有愧于舅氏亦有愧于長君玉父南渡後為少蓬聞師川召有懷駒父詩云欣逢白鶴歸華表更想黃能出羽淵然師川卒不能返駒父于鯨波之外玉父愛兄之道至矣余讀而悲之蝦蟆動物類含血蝦蟆獨無之雙目但瞪也一腹亦皤其龍變或託體魚腹覩幽姿罕見三足蟾詎減六眸龜向來奏贋瑞背負輪囷芝坐謾皆下吏膠車等兒嬉雖蒙黃金擲荆卿空爾為或以白玉琢形模妙工倕咄爾百醜質詎辱五鼎脂浪號土底犧雄誇水中雞何足汙帝箸但可充蛇飢作意一池鳴和我五字詩事文類聚後集上墨工子墨客卿妙一世懷玉山中五丈夫峨眉老仙與推轂谷量牛馬斗量珠田家謡鳩婦勃磎農荷鉏身披襏襫頭茅蒲雨不破塊田坼圖稊稗青青佳榖枯大婦碓舂頭鬢疏小婦拾穗行餉姑四時作苦無袴襦門前叫嗔官索租以上合璧事類前集闕題二首槐下棗花纂纂麥秋椹子離離不沽十千美酒難消三百枯棊兩部池蛙當妓千山飛鳥催沽引睡直須黃妳曲肱正要青奴雪浪齋日記此駒父少作也擬峴臺崇臺面空闊遠眺真高明一水來朝宗彎環抱荒城連山頗偃蹇卻略倚翠屏緬懷青溪上興與峴山并客從豫章來及此春服成公子有好懷良友及兹登初筵挹溪光中觴聞雨聲翠幄列茂樹金沙漲回汀鷗鳥舞不下溪舟縱復橫尚恨夜氣斂不見白月生信美非吾土少留空復情江西通志寄題雙井黃稚川雲巢稚川名公準山谷之弟雲巢一上十五里中有今世巢居子雞鳴犬吠百餘里不知天際去此幾平生深契鳥窠禪翦茅蓋頭萬事已宴坐經行飛鳥上人間榮辱不到耳蝸牛兩角竟何為鷦鷯一枝端自喜我有一廛落城市章服裹狙聊復爾武陵未訪桃花源修江儻問桃花水會取櫻桃洞前路藜杖扶衰自此始南昌府志石耳峯朝踏紅塵暮宿雲往來車馬漫紛紛猴溪橋下潺湲水唯有峯頭石耳聞廬山志金陵作沙觜彎環轉柁牙一衣帶水繞城斜飛亷解使馮夷怒渡口風吹蕎麥花景定建康志句眼中人物東西盡肺病京華故倦遊送王立之赴官河內王直方詩話關山不隔還家夢風月猶隨過海身竄海島作記老學庵筆深秋轉覺山形瘦新雨能添水面肥雪浪齋日記徐俯俯字師川洪州分寧人以父禧死事授通直郎紹興初賜進士出身纍官端明殿學士簽書樞密院事權參知政事有東湖集豫章詩話師川七歲能詩山谷嘗曰洪龜父攜師川上藍莊詩來詞氣甚壯筆力絶不類年少書生意其行已讀書皆當老成解事熟讀數過為之喜而不寐老舅年衰力劣不足學師川有意日新之功當於古人中求之耳一家不似渭後村詩話師川豫章之甥然自為陽高自標樹藐視一世在靖康中朝列有改名避偽楚諱者師川名婢曰昌奴朝士至則呼之以名節自任諸人所推下之者不獨以其詩也雪浪齋日記佳樹冬不凋橫塘春更緑此徐師川詩頗平淡無雕鐫氣次韻可師題于逢辰畫山水江漢踰千里隂晴自一川故山黃葉下夢境白鷗前巫峽常雲雨香爐舊紫煙布帆無恙在速上泛湖船畫虎行為吉州假守蘇公作昔日何人畫於莬君家獨有他家無宣城老包骨已朽紛紛俗子尚誰呼大虎蹲踞小虎戲目光注射百步外名畫多聞內府收人間豈惜千金費巉巉巖巖谷中石老樹穹枝拂秋色鋭頭將軍射不得卻挂江南使君壁林間一嘯四山風麏驚狐號為墮空不向南山隨李廣只愁東海笑黃公憶昔余頑少小時先生教誦荆公詩秖今耆舊無新語賴有廬山病可師春日登眺遊寶勝諸寺且觀名畫護法儼神龍諸天擁梵宫樓臺春日麗海嶽畫圖雄浦樹重重緑園花灼灼紅微風吹細雨只在夕陽中明皇夜遊圖吕子廣藏畫學博士李生所作歌吹開元曲鉛華天寶粧苑風翠袖冷宫露赭袍光閨闥連閶闔驊驑從驌驦千門還欲曉九陌乍聞香李賀晚歸圖近代推名畫諸君作薦書皇都開藝學博士是新除高栁長安道亂雲昌谷居丹青聊置此僕馬晚歸歟饒守董尚書令畫史繪釋迦出山相及維摩居士使靈山香火之因不斷復惠臘藥數種皆病所欲也作此寄之示病毗邪金粟影出山五祖金仙相神妙通靈顧虎頭白蓮香火空諸妄臘中發藥補衰朽扶杖清風看花栁捷書正用此時來開顏政爾難忘酒韓門弟子更誰如即今猶有董安于更畫承明兩學士與公相對白髭鬚以上聲畫集陪李泰發登潤州城樓十年不復上南樓直為狂酋作遠遊滿地江湖春入望連天章貢水爭流青雲聊爾居金馬紫氣還應射斗牛公是主人身是客舉觴登望得無愁優古堂詩話師川此作絶類劉長卿和樊使君登潤州城樓詩題顏魯公畫像公生開元間壯及天寶亂捐軀范陽胡竟死蔡州叛其賢似魏徴天下非貞觀四帝數十年一身逢百難少時讀書史此事心已斷老來鬢髮衰慨嘆功名晚嗟哉忠義途捷去不可緩初無當年悲只令後世歎一朝絶霖雨南畝常亢旱小夫計雖得斯民蓋塗炭長歌詠君節千載勇夫愞敬書子張紳庶幾古人半容齋三筆春日遊湖上雙飛燕子幾時回夾岸桃花蘸水開春雨斷橋人不渡小舟撑出栁隂來後村千家詩跋韓子蒼代葛亞卿作詩後夏木隂隂欲放船黃鸝啼了落花天十詩盡説人間事付與風流葛稚川同曾戶部諸公尋梅對奕處處已收南畝稻間間還看北山梅纍觴聊爾酡顏在對局怡然笑口開掃徑似知佳客至杖藜唯可數君來移松種樹鄱陽老章甫風帆歲一回庭中梅花正開用舊韻貽端伯羌笛何勞塞北吹江南何處不寒梅千林寂寂無人看獨樹亭亭對客開偏為咨嗟唯爾念是誰移種待君來縱留一曲安能唱恰似朝歌墨子回以上豫章詩話滕王閣一日追王造千年與客遊雲邊梅嶺出坐上贑江流日落回飛鳥煙深失釣舟蟬鳴枯栁外天地晚風秋南昌府志句一百五日寒食雨二十四番花信風嵗時廣記開元天寶間衮衮見諸公不聞張與許名在臺省中雙廟話紫微詩今時習主簿還是魯諸生過張獻之主簿村居合璧事類後集離鸞只説閨中事舐犢那知母子情吕氏童蒙訓徐師川言作詩立意不可蹈襲前人因言慈母溪與望夫山相對望夫山詩甚多而慈母溪古今無人題詩自誦其末兩句云云頗知鶴脛緣詩瘦早棄魚須伴我間困學記聞徐師川以諫議召程致道在西垣封還除書言與中貴人倡和魚須之句為人所傳朱文公語録云師川遊廬山遇宦者鄭諶與之詩後村謂徐集不載魚須之篇愚考集中有次韻鄭本然居士云云本然居士豈即鄭諶歟詩如雲態度人似栁風流贈張仲宗詩説雋永林敏修敏修字子來敏功弟有無思集後村詩話二林詩極少曾端伯作高隱小傳云有詩文百二十卷今所存十無一二兄弟皆隱君子不但以詩重閻立本畫醉道士圖破除萬事無過酒有客何須計升斗解將富貴等浮雲醉鄉即是無何有昔人繪事亦有神丹青寫出盡天真尊罍未恥月漸傾更待曉出扶桑暾餐霞服氣浪自苦自厭神仙足官府脫巾解帶衣淋漓眼花錯莫誰賓主君不見炙手可熱唯權門欲觀佳麗爭怒嗔何如銜杯樂聖藉地飲安用醉吐丞相茵文湖州作山水橫軸吳希全家藏其子誠伯求蘇養直賦詩語特奇妙遂用其韻同賦明窗十日復五日出此湖光與山色前身畫師語不妄文侯乃是金門客乍從雲際辨遠岫爭數喬林誇眼力波漂菰米歲事空水濱枉下南飛鴻欲投曉渡喚舟子急槳已入昏煙中徑思天邊問歸路錯認江鄉舊洲渚能傳萬里在尺素豪奪應防卷寒雨以上聲畫集張牧之竹溪有序張牧之隱於竹溪不喜與世接客來蔽竹窺之或韻人佳士則呼船載之或白刺船與語俗子十反不一見怒罵相踵弗顧也人或以少漫郎余獨喜與古人意合乃作竹溪詩幽間古城隂結屋清溪曲溪流湛回映上有青青竹漫郎欣得之緑髮詠空谷高風及前修勝趣隨遠矚惡客徒擾人立談非我欲麾去寧汝瞋真意聊自足或言不當爾往往相謗讟答云豈吾私恐作林泉辱源流别涇渭臭味同草木肯當百事勝容此一物俗獨餘嵇阮輩蕩槳戒臣僕濁醪澆古胸日沒還秉燭僕忝瓜葛後意氣頗相屬平生幾兩屐共老三徑菊行年事無定此計諾已宿徑須買牛衣兒亦荷書簏從子竹間遊溪魚刴寒玉宋文鑑洪炎炎字玉父元祐末登第南渡後官祕書少監有西渡集西江宗派圖録玉父重聽嘗對上曰世人皆聾於心臣則聾於耳心則了了惟上所使詠奕荆璞玉為子井文楸作枰有求唯别墅不喜得宣城跕跕飛鳶墮丁丁伐木聲破愁逢一笑無地著虧成不作丹朱戲難禁清晝長敢言白玉局聊取紫羅囊角道空傳記乘除自有方兒童爭畫紙謾學老夫狂葉少蘊出示鄭先覺閲駿馬圖為作長歌丹青得名曹將軍畫馬已來無復人諸生韓幹受肉法絶足亦傳妙苑真儒林望郎李公麟曹韓復生能與鄰心胸可納天西極紈素頻空冀北羣鄭生晚識李侯比自許筆端輕萬里山川初出大宛城翰墨猶霑渥窪水汗血噴沙指顧閭霧鬛風鬃卷中起戲成十馬皆龍材前有飛黃後山子葉公好尚有祖風苦愛真龍似畫龍千金不惜市駿骨睥睨神物秋豪中英雄嘗聞妾換馬意氣欲將詩拔畫詩工合畫兩崛奇谷量馬觀未論價公詩自是生驊驑恨公不身親李侯向來曹韓空白頭遷居從官三十載故山凡幾歸昔歸尚有屋再歸已傾攲今歸但喬木竹落荆薪扉上為鸛鳥都下為雞犬棲相彼東西隅三畝以為基積塊與運甓實窪而培庳成兹道傍舍空我橐中資堂室取即安牖戶適所宜嘉樹三四株當窗發華姿馨花入懷袖似與遷徙期我今六十老豈不知前非骨相自不媚況復筋力微收此衰病身與汝長相依松楸幸在望鄰曲不見遺葛巾隨里社庶以保期頤以上西渡集再任祕書少監再入蘭臺逢舊史重遊東觀閲新書家徒四壁今無屋誰為君王奏子虛合璧事類後集絶句桃花浪打散花樓南浦西山送客愁為理伊州十二疊緩歌聲裏看洪州西江東畔見江樓江月江風萬斛愁試問海潮應念我為將雙淚到南州菊坡叢話洪玉父舍人有侍兒曰小九知書能為洪檢閲洪甚愛之嘗月夜登榺王閣洪賦詩云云後因兵亂失之洪悵恨不已又和前詩云云已而洪復尋得其人汪革革字信民自歙徙臨川紹聖四年試禮部第一分教長沙又為宿州教授蔡氏當國以周王宫教召不就復為楚州教官卒有青溪集後村詩話吕榮陽居符離信民為教官從滎陽學故紫微公尤推尊信民其詩云富貴空中華文章木上癭要知真實地唯有華嚴境蓋吕氏家世本喜談禪而紫微與信民皆尚禪學云困學紀聞饒德操黎介然汪信民寓宿州作詩有略詆及時事者吕滎陽聞之作麥熟繅絲等四詩以諷之自此不復有作寄謝無逸問訊江南謝康樂溪堂春水想扶疏高談何日看揮麈安步從來可當車但得丹霞訪龐老何須狗監薦相如新年更勵於陵節妻子同鉏五畝蔬和吕居仁春日晏坐黌堂一事無居官蕭散似相如偶違濁酒風前約不見繁英雨後疏以上紫微詩話李錞錞字希聲官至祕書丞有集題宗室公震四時景九江應共五湖連尺素能開萬里天山杏野桃零落處分明寒食曉風前繁隂雜樹映汀沙三伏江天自一家欲喚扁舟渡雲錦平鋪明鏡是荷花舂鉏寂寞繞疏叢霜後雲生浦溆風此處年年報秋色只應衰栁與丹楓剪水飛花細舞風斷蘆洲外水連空剡溪幾曲知名處何似今朝眼界中畫繼句散盡平生眼中客暖風晴日閉門居送王立之方詩話王直韓駒駒字子蒼蜀之仙井監人政和中召試賜進士出身除祕書省正字纍除中書舍人兼權直學士院高宗即位知江州有陵陽集後村詩話子蒼蜀人學出蘇氏與豫章不相接吕公強之入派子蒼殊不樂其詩有磨淬剪􅎒之功終身改竄不已有已寫寄人數年而追取更易一兩字者故所作少而善敖陶孫詩評韓子蒼如梨園按樂排比得倫和李上舍冬日北風吹日晝多隂日暮擁階黃葉深倦鵲繞枝翻凍影飛鴻摩月墮孤音推愁不去如相覓與老無期稍見侵顧藉微官少年事病來那復一分心復齋漫録子蒼和李上舍冬日詩日暮擁階黃葉深之句最為世所推賞故李彭商老有建除體贈子蒼云滿朝以詩名何獨遺大雅平生黃葉句摸索便知價蓋是時子蒼自館職斥宰分寧時也上元葆真宫作玉作芙蓉院院明博山香度小崢嶸誰言水北無人到亦有媻姍勃窣行耆舊續聞宣和間重華葆真宫曹王南宫也燒燈盛於都下癸卯上元館職約集而蔡老攜家以來珠翠闐溢僮僕雜行諸名士幾遭排斥巳而步過池北遊人縱觀時少蓬韓駒子蒼咏小詩云云恭賦御畫雙鵲圖君王妙畫出神機弱羽爭巢並占時想見春風鳷鵲觀一雙飛上萬年枝舍人簪筆上蓬山輦路春風從駕還天上飛來兩烏鵲為傳喜色到人間墨莊漫録宣和初賜中書何栗御畫雙鵲韓子蒼時為校書郎賦二絶云云戲作冷語石崖蔽天雪塞空萬仞隂壑號悲風纖絺不御當玄冬霜寒墜落冰溪中斫冰直侵河伯宫未若冷語清心胸劉童子七歲能誦書部使者聞諸朝既至京師會更制不果試其歸也以二小詩送之七歲瀾翻數萬言飢鷹引子望騰鶱時平不用甘羅輩寂寞提書歸故園不作西京童子郎時人已自識黃香還家更誦五千卷十八重來詣太常題修師陽關圖風煙錯漠路崎崯倦客羇臣淚滿襟何事道人常把玩只應無復去來心題楊妃上馬圖翠華欲幸長生殿立馬樓前待貴妃尚覓君王一回顧金鞍欲上故遲遲題湖南清絶圖故人來從天柱峯手提石廩與祝融兩山坡陀幾百里安得置之行李中下有瀟湘水清瀉平沙側岸搖青楓漁舟已入浦溆宿客帆日暮猶爭風我方騎馬大梁下怪此物象不與常時同故人謂我乃絹素粉墨妙手煩良工都將湖南萬古愁與我頃刻開心胸詩成畫往默惆悵老眼復厭京塵紅謝泉州連使君寄子魚驛騎持書自海旁開藍剩喜子魚香紅螺紫蛤俱羞避獨許渠儂近酒觴苕溪漁隱叢話子魚味鹹正可噉水飯若作酒品之物殊無風味子蒼之言誤矣遁齋間覽莆陽通應子魚名著天下蓋其地有通應侯廟廟前有港港中之魚最佳今人必求其大可容印者謂之通印子魚故荆公亦有詩云長魚俎上通三印此傳聞之説也題李伯時畫背面仕女睡起昭陽暗淡妝不知緣底背斜陽若教轉盼一回首三十六宫無粉光遊赤壁示何次仲時守黃州緩尋翠竹白沙遊更挽藤梢上上頭豈有危巢尚棲鶻亦無陳迹但飛鷗經營二頃將歸去眷戀羣山為少留百日使君何足道空餘詩句滿江樓題李伯時畫太乙真人圖太乙真人蓮葉舟脫巾露髮寒颼颼輕風為帆浪為楫臥看玉宇浮中流中流蕩漾翠綃舞穩如龍驤萬斛舉不是峯頭十丈花世間那得葉如許龍眠畫手老入神尺素幻出真天人恍然坐我水仙府蒼煙萬頃波粼粼玉堂學士今劉向禁直岧嶤九天上不須對此融心神會植青藜夜相訪以上陵陽集苕溪漁隱叢話李伯時畫太乙真人臥一大蓮葉中手執書卷仰讀蕭蕭有物外思子蒼有詩題其上云云語意絶妙真能咏盡此畫也乙真郡齋讀書志王黼嘗命子蒼詠其家藏太人圖盛傳一時代妓送葛亞卿劉郎底事去匆匆花有深情只暫紅弱質未應貪結子細思須恨五更風優古堂詩話王建宫詞樹頭樹底覓殘紅一片西飛一片東自是桃花貪結子錯教人恨五更風韓子蒼反其意而作詩送葛亞卿云云絶句憶將南庫官供酒共賞西垣敕賜花白髮思春醒復醉豈知流落到天涯墨莊漫録故事西京歲貢牡丹側以一百枝及南庫酒賜館職韓子蒼去國後詩云云贈向巨原老子真祠地君來覓紙題文如士衡俊年與正平齊聞説鍾陵郡官居章水西涪翁詩律在佳處可時攜容齋三筆李彭彭字商老南康軍建昌人公擇從孫有日涉園集鶚按王明清揮麈前録云李定仲求不得預蘇子美賽神會致興大獄其孫即商老彭以詩名列江西派中此李定洪州人子弟也東坡山谷後村詩話商老公擇尚書家文潛諸公皆與往還頗博覽強記然詩體拘狹少變化江西宗派圖録吕居仁云商老詩文富贍宏博非後生容易可到閻立本醉客圖酒有何好工作病頗怪此人喜中聖藏身麴糵勝嵓幽寄愁天上呼不醒春風吹開玉東西月墮參橫斟酌之吐茵脫帽有妙理眩朱成碧渾忘歸右相丹青果馳譽幻藥調成疑笑語便覺微綃古意生似開醉眼卿可去半生憂患復蕭條甕中肥遁何須邀一樽桑落對公等盡解平時藜莧嘲唐明皇夜遊圖開元御極垂衣裳登三咸五陵羲皇白環重譯銀甕出卜夜遨遊離未央香車鬭風秦與虢羅帊覆鞍真乘黃赭袍錯落綴北斗步輦優遊銜鏤錫寧王玉笛上霄漢御路花光爭月光汝陽羯鼓絹帽穩打徹參旌低建章太真霑醉玉攲側力士傳呼聲渺茫翠叉挂冠紅粉妝金貂貰酒白面郎君臣玩狎樂莫比清禁喜聞宫漏長若令姚宋坐廟堂袖中諫疏神揚揚萬里橋邊行幸處後世龜鑑懷苞桑魏鍊師四松畫圖四松在澗壑歲晚乃更奇蕭然如黃綺傲岸不可追誰將談天口掉舌聊見移由來拂東絹寫此霜雪姿便有松上雨催我窗間詩翻思斸青冥採藥堪扶衰當年丹青手開闢造化隨既有圯下約子行何後期徐叔明校書篆筆奇古復作丹青為豫作漢江暮靄扇材極妙力求鄙句作此以贈曩時徐騎省篆古逼秦相後來得仍孫毫端溟渤壯能回頓挫姿丹青生意匠餘酣寫便面萬里煙莽蒼何許捕魚郎落日蕩雙槳無勞翦吳淞安用置疊嶂真欲老是間塵境孰非妄憐君俱入妙簡遠復清曠定為造物瞋覓句聊分謗以上聲畫集題訪戴圖間庭秋草積滿砌蒼苔深忽向冰紈上聊窺訪戴心雪月俱皎皎風林互森森縱觀停艫處猶聞擊汰音終年剡溪曲何嘗返山隂徒言興已盡真妄誰能尋浮生圖畫耳慷慨為長吟嵊縣志題吕少馮聽雨堂碧澗寒侵屋幽雲夜度牆貪看山入坐怪聽雨鳴廊苦乏隂鏗句聊登孺子牀非君無汲引寄傲學潛郎夢訪友生年年結客長安城妄喜縱酒同章程支離老去一茅屋枕書臥聞長短更友生相望止百里寒夜寥閴無微聲夢中乘興輒見戴剡溪聊爾扁舟行覺來蘧蘧一榻上不用僮僕爭歡迎吹燈弄筆欲書寄窗前白月方亭亭阻風雨封家市往時李成寫驟雨萬重古意毫端聚行人深藏鳥不度便覺非復鵝溪素龍眠老阮作陽關北風低草雲埋山行人客子兩愁絶未信蒲萄能解顔兩郎了了解人意似是畫我封家市戲作新詩排晝睡忽有野雁鳴煙際望西山懷駒父去歲湖湘賦凜秋聞君江國大刀頭百年會面知幾遇十事欲言還九休照眼遙岑落懷袖過眉拄杖立汀洲莫言青山淡吾慮誰料卻能生許愁以上宋文鑑寄希廣禪師已透雲庵向上關熏爐茗碗且開顔頭顱無意掃殘雪毳衲從來著壞山瘦節直疑青嶂立道心長與白鷗間歸來天末一回首疑在孤峯煙靄間補續高僧傳食蟹溪友提攜紫蟹肥形模郭索就羈縻抱黃斫雪老叨事看碧成朱露醉時大嚼故知羞海鏡嗜甘易誤食彭蜞欲將磊落輕爾雅委頓深憐蔡克兒蟹略送妙喜禪師往荆南求準公塔銘于張丞相天覺落絮霏霏攪客心鳴鳩厯厯喚春隂未于蓮社添宗炳先向蘭亭減道林遠嶠雲屯鐘磬晚諸天目斷薜蘿深詩緣病廢苦無思為子送將聊一吟大慧年譜春日懷秦髯山雨蕭蕭作快晴郊園物物近清明花如解語迎人笑草不知名隨意生晚節漸於春事懶病軀卻怕酒壺傾睡餘苦憶舊交友應在日邊聽曉鶯詩林萬選翻經臺五千餘卷在高臺內史翻時蠟屐來夢斷池塘人不見年年春色緑成堆江西通志朝沖之沖之字叔用濟北人説之從弟在羣從中獨不第授承務郎紹聖以來黨禍既作超然獨往有具茨集喻汝礪序云咸平景德中儒學文章之盛不歸之平僰宋氏則屬之清豐朝氏叔用以文莊公為曽大父文元公為高祖家藏至二萬卷紹聖初朝氏羣從多在黨中叔用于是飄然遺形逝而去之宅幽阜蔭茂林於具茨之下世之網羅不得而嬰也劉後村詩話余讀叔用詩見其意度宏闊氣力寬餘一洗詩人窮餓酸辛之態其律詩云不擬伊優陪殿下相隨于蒍過樓前亂離後追遡承平事未有悲哀警䇿於此句者廷圭墨詩君不見江南墨官有諸奚老超尚不如廷圭後來承晏頗秀出喧然父子名相齊百年相傳紋破碎倣佛尚見蛟龍背電光燭天星斗昏雨痕倒海風雷晦卻憶當年清暑殿黃門侍立才人見銀鉤灑落桃花箋牙牀磨試紅絲硯同時書畫三萬軸二徐小篆徐熙竹御題四絶海內傳祕府毫芒惜如玉君不見建隆天子開國初曹公受詔行掃除王侯舊物人今得更寫西天貝葉書紫微詩話脫去世俗畦畛高秀實深稱之追往昔二首示江子之少年使酒走京華縱步曾遊小小家看舞霓裳羽衣曲聽歌玉樹後庭花門侵楊栁垂珠箔窗對櫻桃捲碧紗坐客半驚隨逝水主人星散落天涯春風踏月過章華青鳥雙邀阿母家繫馬栁低當戶葉迎人桃出隔牆花鬢深叉暖雲侵臉臂薄衫寒玉照紗莫作一生惆悵事鄰州不在海西涯墨莊漫録政和間李師師崔念月二妓名著一時朝叔用每會飲多召侑席其後十許年再來京師二人尚在而聲名溢於中國李生者門第尤峻叔用追往昔作二詩以示江子之靖康中李生與同輩趙元奴及築毬吹笛袁綯武震輩例籍其家李生流落於浙中士大夫猶邀之以聽其歌然憔悴無復向來之態矣謝胡御史寄茶兼簡朱郎中諫議茶猶寄郎官迹已疏斜封三道印不奉一行書會遠長安去終臨顧渚居大江清見底為問客何如戲李相如攜婦還金鄉舍人固多奇奉璧登章臺君王擊缶罷將軍負荆來長卿東髮時亦復悅名字一從臨邛遊心迹了不似茂陵未得仕要是才足依高堂援哀琴月出載婦歸文君入成都乃復愧四壁晚見負弩來良悔抱頸泣以少炭寄江子之金籍曾通玉虛殿仙曹擬拜翠微郎莫嫌薄上溫黁火猶得濃熏篤耨香溫黁火事見李義山詩集以上具茨江端友端友字子我陳留人鄰幾之孫以元祐黨隱居封丘門外靖康初吳敏薦召見以為承務郎賜進士出身諸王宫教授上書辨宣仁誣謗遭黜渡江寓居桐廬之鸕鷀源後為太常少卿有七里先生自然菴集朝以道壽昌縣君劉氏墓志云夫人劉原父侍讀家女嫁為江鄰幾舍人之子婦男三人長端禮次端友端本端友等一日白夫人曰幸見聽敢有言夫人笑曰不欲從科舉乎是吾素己疑之矣且汝兄力學能文屈于有司二十年嘗為豫言有司待士之禮薄而法益苛愧之終其身汝等尚少而能不樂于此乎汝安之則吾何有故端友與弟端本遂優遊于圉城數畝之田人多高之牛酥行有客有客官長安牛酥百斤手自煎倍道奔馳少師府望塵且欲迎歸軒守閽呼語不必出已有人居第一先其多乃復倍於此台顔顧視初怡然昨朝所獻雖第二桶以淳漆麗且堅今君來遲數又少青紙封題難勝前持歸定慚遼東豕努力明年趁頭市能改齋漫録宣和初有鄧姓守西京以牛酥百斤遺梁師成江子我作牛酥行韓碑淮西功業冠吾唐吏部文章日月光千載斷碑人膾炙不知世有段文昌庚溪詩話紹聖元符間黨禁興毁東坡上清儲祥宫碑命蔡京别為之正如唐時仆韓退之平淮西碑命段文昌改作後人有詩云云余於儲祥宫碑亦云後見韓無咎元吉云是江子我詩九日萬里江河隔傷心九日來蓬驚秋日後菊換故園開楚欲圖周鼎湯猶繫夏臺東籬那一醉塵爵恥虛罍瀛奎律髓楊符符字信祖有詩集句吏道官官惡田家事事賢劉後村詩話謝薖薖字幼槃逸從弟以詩文嫓美時稱二謝有竹友集撫州府志幼槃妻董氏賢而知學幼槃每與客論古事有所遺忘妻必能記之李商老嘗來語及五代時有沙陀將臥疾僚佐見其錦衾曰爛兮怒曰我沙陀安得謂我為奚偶忘其姓名遣稚子問之董氏曰康福也陶淵明寫真圖淵明歸去潯陽曲杖藜蒲鞋巾一幅隂隂老樹囀黃鶯豔豔東籬粲霜菊世紛無盡過眼空生事不豐隨意足廟廊之姿老蓬蓽環堵蕭條僅容膝大兒頑頓懶詩書小兒嬌癡愛梨栗老妻日暮荷鋤歸欣然一笑共蝸室哦詩未遣愁肝腎醉裏呼兒共紙筆時時得句輒寫之五言平淡用一律田家酒熟夜打門頭上自有漉酒巾老農時問桑麻長提壺挈榼來相親一尊徑醉北窗臥蕭然自謂羲皇人此公聞道窮亦樂容貌不枯似丹渥儒林紛紛隨溷濁山林高義久寂寞假令九原今可作舉公籃輿也不惡題戴嵩石鼎聯句圖衡山道士熊豹姿夜過劉生逢説詩止于座隅初莫識口不能言心自知坐中清逸校書郎新有詩聲誰過之豈知老子殊不淺可但逐鬼囚蛟螭須臾指鼎出佳句脫略凡韻生新奇二生得句不敢吐鳴聲強作秋蟲悲悚如窘避鷹隼懍如敗將收旌旗借問舐筆摹者誰定是槃礴真畫師退之斯文有妙處丹青寫盡初無遺彌明得道如不死應在衡山深處棲端能過我挑詩敵與君周旋吾敢辭吳彩鸞寫真圖天上鳳皇難獨宿人間翡翠本雙棲丹青不與文簫共誰遣雉東迷雀西次韻李成德謝人惠墨牛君不見八百里誇王氏駮嘗敕家童瑩蹄角綺襦紈袴競奢豪臥疾不安愁禍作何如傳寶墨牛圖不飾青黃如素朴向來奇畫購千金宜在蘭臺天祿閣兩牛方鬭未雌雄或奔而從或小卻其餘三四亦殊絶或如虎臥鶴俯啄滕王蛺蝶東丹馬嘉陵山水青田鶴如將優劣比人才長文何必慙文若人言愛畫亦一癖如彼牛羊何用貌是家持論果非耶煩君試為評其略題于逢辰畫踏遍江南岸歸來試解衣誰言物外賞不與筆端違石帶蒼苔瘦風凋折葦稀令人清興發欲問釣魚磯顏魯公祠堂上皇御宇無長䇿牧羊奴子孤恩澤銀菟分印屬兒曹二十餘州齊陷賊常山死守平原拒公家兄弟聲名赫平原白首列班行忠義凜凜真嚴霜厯事四朝惟一節當年舌舐中丞血豈知丞相面如藍貌雖平易心巉巖老臣何罪死虎口到今誰為祛其銜臨風志士長悲吒矧瞻遺像嚴祠下未能立草迎送詞一奠椒漿淚盈把次劉世基韻兒時窺豹見一斑晚學一技千金殫齋房芝草不並秀且餐秋菊紉春蘭無心時共白雲出忘機日對沙鷗間窮人與世各異調敢望一唱仍三歎昨來卜居向巖邑玉川破屋才數間朝看爽氣出遠岫夜聽繞舍鳴清湍幾回欲棹酒船去賀老不見空稽山次韻彥光睡起病目蝶夢遊揚臥碧紗知君不賞玉叉斜夢回起坐有佳思亂觸牙籤書五車黑蠅著眼君勿嗟學道乃得青蓮華商略此意當過我樵青竹裏為煎茶寄汪信民繫纜符離日君行殊未歸寄書問毫社有夢過江西不見揮犀柄頻驚響馬蹄殷勤具雞黍多謝德公妻戲詠石榴晚開靡靡江蘺只唤愁眼前何物可忘憂楝花淨盡緑隂滿才見一枝安石榴鳴鳩雲隂解盡卻殘暉屋上鳴鳩喚婦歸不見池塘煙雨裏鴛鴦相並溼紅衣以上竹友集夏倪倪字均父蘄州人英公之孫宣和中自府曹左官祈陽監酒有遠遊堂集劉後村詩話均父集中如擬陶韋五言亹亹逼真律詩用事琢句超出繩墨言近旨遠可以諷味然竦之諸孫故其詩云堂堂文莊公事業何崢嶸孟子曰孝子慈孫百世不能改均父欲改之乎其志亦可悲矣文詞富贍儕輩罕及嘗以江西宗派圖録均父天寒霜露繁遊子有所之為韻作十詩留别饒德操曲盡芊綿之致赴江守日張彥實贈詩云未覺朝廷疏汲黯極知州郡要文翁均父朝夕諷誦之詩文一集吕紫微為之序次韻漢陽蔡守題陽關圖君不見季子敝盡黑貂裘一生車轍環九州使之負郭有二頃未必肯相六國矦此郎亦復何為者浪自出入不肯休東風夾道羅供帳倚馬欲行那得上緑尊翠勺浩縱橫四座哀歌互酬唱隂雲漠漠天四垂行子多著短後衣金羈滴瀝鳴翠珥負屩蹶倒從廬兒漁舟微茫出浦溆遠山無數迎修眉傾曦馱醉出關去縱有離愁渠得知長安春色濃如酒乃向斯時别親友可憐兒女浪辛苦奔走功名逮華首濁醪百榼胸崔嵬暮色慘慘羇鴻哀羊腸鳥道天尺五爾獨胡為來此哉水有蛟鼉獰口眼陸有兕虎潛巖隈嗟爾遊子不顧返富貴有時終自來題宗室永年畫犬圖公子朝回玉宸裏戲弄丹青歌扇底興來貌寫到穠􅀢拳尾如搖欲投胔豐顱闊腋偉骨相縱逸未饒盧鵲駛庭除花開春尚寒屈藏短喙眠朝暾其一狺狺口若吠欲前卻立客在門俗言犬馬最難畫衆所共識誰面謾非如鬼物隱幽眇反覆醜好懸毫端紛紛衆史坐歎息筆仗突兀不可扳乃知心匠本神授以心運手不作難我家敗屋依破垣偷兒踏瓦驚夜眠四壁雖如長卿第舊物猶存子敬氊就君乞取挂牆壁端能警我窺窬客跋聚蟻圖紛然蟲臂蟻爭環爭與高人一解顏不待南柯昏宦畢始知身寄大槐間以上聲畫集和山谷遊百花洲盤礴范文正公祠下以生存華屋處零落歸山丘為韻賦十詩神文秉周禮庿樂奏九成當時夔一足不待魯諸生嘖嘖鵲噪屋愔愔蛛網門我來九頓首生氣凜如存堂堂古遺直心嚴貌無華人見不嫵媚何以娛大家朴蓛復朴䔩何以棟我屋風雨莫輕搖南山無老木有酒當自醑有室莫共處古今一丘貉何能坐飛語夢回四賢篇長風吹人醒嗟哉不我見淚與秋露零百代無幾人九原何可作不必溫御史解令君膽落寶元乃多故公時總戎機胸中百萬兵要取橫山歸公歸今幾時遺懿何斑斑公議要難沒言波可懷山我心不可規滔滔誰與遊向來秉大雅今復成一丘范文正公集附題漢陽郎官湖太白當年夜郎謫一尊聊與故人留南湖乞得郎官號從此名傳五百秋豫章詩話句猶喜平生蟹螯手尚能半幅寫行書風月堂詩話王立之夏均父俱以宗女夫入仕均父饒財亦好學立之晚年中風以左手作字均父寄詩云云林敏功敏功字子仁蘄春人以春秋鄉薦不第有高隱集尚友録子仁年十六預鄉薦下第歸杜門不出者二十年元符末詔徴不赴與弟敏修居比鄰終老以文字相友善敏修亦終身不舉進士世號二林政和中林震為郡首謂吾宗有隱君子出郊見之還朝舉其隱德賜號高隱處士旌表其門子仁謝表云自是難陪英俊之遊何敢妄意高尚之事臥牛衣而待旦寒如之何搔鶴髮以興懷老其將至江西宗派圖録山谷云林處士詩甚佳碧落碑無贋本也書吳熙老醉杜甫圖清晨出尋酒家門蹇驢破帽衣懸鶉年年碧雞坊下路野梅官栁慣尋春酒錢有無俱醉倒改罷新詩留腹稿兒童拍手遮路衢拾遺笑請旁人扶百年風雅前無古沈宋曹劉安足數後來一字人難補君莫笑渠作詩苦子瞻畫扇夫子江湖客毫端託渺茫攢峯埋暮雨古樹困天霜逼側餘僧舍冥濛失雁行死生隨化盡此意獨難忘以上聲畫集春日有懷風高收雨急日薄過窗微梅蘂初迎臘春溪欲染衣形容今日是遊衍昔人非節物關愁緒歸鴻正北飛宋文鑑絶句君心恨不走天涯不比衰翁只戀家最是橫塘黃葉路今年無伴折梅花方是間居士小稿句嘗憶他年接緒餘饒三謂德操落拓我迂疏溪橋幾換風前栁僧壁今留醉後書寄夏均父苕溪漁隱叢話王直方直方字立之汴人舍人棫之子補承奉郎元祐中延致名士唱和號歸叟有詩話并集朝以道王立之墓志銘立之少樂從諸丈人行遊無他嗜好惟畫夜讀書手自傳録非其所好雖以勢力美官誘致之莫肻自枉也常監懷州酒稅尋易冀州糴官僅數月投劾歸凡十五年處城隅小園嘯傲自適命其園之堂曰賦歸亭曰頓有一時文士多為賦詩彭城陳無己卒于京師立之割田十畝以周其孤病中取平生書畫古器散之四方朋友無遺臘梅紛紛紅紫雖無韻映帶園林正要渠誰遣一枝香最勝故應有客問何如苕溪漁隱叢話直方自記云山谷初見臘梅作二絶句緣此臘梅盛于京師然交遊間亦有不喜之者余為解嘲云云淮安園賢王經别墅深窈近嚴城花竹四時好賔朋一座傾闔奩爭奕罷擊鉢記詩成明日朝天去門扄鳥雀驚文翰類選上已遊金明池遊絲隨絮惹行人酒肆歌樓駐畫輪鳳管遏回雲冉冉龍舟衝破浪粼粼日斜黃繖歸馳道風約青簾認别津朝野歡娛真有象壺中要看四時春汴京遺迹志高荷荷字子勉荆南人自號還還先生元祐太學生晚為童貫客得蘭州通判以終有集山谷跋云子勉作詩以杜子美為標準用一事如軍中之令置一字如關門之鍵而充之以博學行之以溫恭天下士也谷經指授記覽多如劉後村詩話子勉親見山麥城詩押險韻略無窘態集中健語層出十韻瀛奎律髓山谷自戎州歸荷以五言律三贄見山谷賞之又和王子豫章華碑云威強九鼎懼喪亂一臺成又芍藥詩云勃興連榖雨閏位次花王謁馬中玉云辨雖豪白馬讒亦困青蠅皆可取而臘梅絶句尤奇賦國香南溪太史還朝晚息駕江陵頗從款綵毫會詠水仙花可惜國香天不管將花託意為羅敷十七未有十五餘宋玉門牆迂貴從藍橋門戶怪貧居十年目色遙成處公更不來天上去已嫁鄰姬窈窕姿空傳墨客殷勤句聞道離鸞别鶴悲稿砧無賴鬻蛾眉桃花結子風吹後巫峽行雲夢足時田郎好事知渠久酬贈明珠同石友憔悴猶疑洛浦妃風流固可章臺栁寶髻犀梳金鳳翹尊前初識董嬌嬈來遲杜牧應須恨愁殺蘇州也合銷卻把水仙花説似猛省西家黃學士乃能知妾妾當時悔不書空作黃字王子初聞話此詳索詩裁與謾凄涼只今驅豆無方法徒使田郎號國香能改齋漫録國香荆渚田氏侍兒名也山谷自南溪召為吏部員外郎留荆州乞守當塗待報所居與此女子為鄰山谷偶見之以為幽間姝美目所未覩後其家以嫁下里貧民因賦水仙花寓意云淤泥解出白蓮藕糞壤能開黃玉花可惜國香天不管隨緣流落小民家俾高子勉和之後數年山谷卒于嶺表當時賔客雲散此女既生二子矣會荆南嵗荒其夫鬻于田氏家田氏一日邀子勉置酒出之掩袂困悴無復故態坐間話當時事相與感歎子勉客京師會王性之問山谷詩中本意因道其詳且為賦詩云見黃太史萬里南溪郡黃香得賜環盛名喧海內摧翮返雲間太史資誠峻郎官選亦慳朝廷才特起堂奧援誰扳一夢追前事羣公兀後艱中傷皆死禍放逐罕生還别駕之戎僰僑居傍葺菅想知諸鳥道聞説異人寰揚子家元窘王維室久鰥鵩來心破碎猿叫淚潺湲達觀終難得羇愁必易刪衆情相憫惻靈物自恬憪迥閣澄秋晚幽窗聳夜跧蜀天何處盡巴月幾回彎墜履魂空斷遺弓涕忽潸石門凄殿楯銅雀慘宫鬟帝統聯仁聖皇恩感豔頑網羅疏黨禁株蔓掃朋姦點檢金閨彥凋零玉筍班尚令宗廟器遙隔鬼門關拊髀咨詢及含香誥命頒笑談趨赤縣吟詠落烏蠻奏記懷東觀移文頷北山應將九遷待未補七年間士愧千鈞弩身謀五兩綸退藏欣望氣延佇竊窺斑昌谷詞源窄浯溪筆力孱斫輪深類扁投斧欲隨般鵠卵真能伏龍鱗敢冀攀不嗔無紹介試遣略承顏宋文鑑蠟梅少鎔蠟淚裝應似多爇龍涎臭不如只恐春風有機事夜來開破幾丸書菊坡叢話句沙軟緑頭相並鴨水深紅尾自跳魚雪浪齋日記吕本中本中字居仁宰相公著曾孫右丞好問長子靖康初官祠部員外郎紹興中賜進士出身厯中書舍人權直學士院以劾罷提舉太平觀學者稱東萊先生諡文清有東萊集紫微詩話江西宗派圖苕溪漁隱叢話吕居仁詩清駛可愛如樹移午影重簾靜門閉春風十日間往事高低半枕夢故人南北數行書殘雨入簾收薄暑破窗留月鏤微明敖陶孫詩評吕居仁如散聖安禪自能奇逸有西江宗派圖録居仁嘗序詩社宗派圖謂詩活法若靈均自得忽然有入然後惟意所出萬變不窮暮步至江上客事久輸鸚鵡杯春愁如接鳳凰臺樹隂不礙帆影過雨氣卻隨潮信來山似故人堪對飲花如遺恨肯重開雪籬風榭年年事辜負韶光取次回題孫子紹所藏摩詰渡水羅漢問渠褰裳欲何往倣佛徙倚滄波上至人入水固不濡何以有此恐怖狀我知摩詰意未真欲以筆端調世人此水此渡俱非實摩詰亦未嘗下筆孫郎寶藏今幾年往來周旋兵火間世人險阻更百難彼渡水者安如山請君但作如此觀莫更思惟尋筆端還韓城乍喜全家脫虛疑匹馬奔乾坤德盛大盜賊爾猶存稻壠秋仍旱溪流晚自渾素冠兼白髮愁絶更誰論楊道孚墨竹歌君不見渭川之隂臥龍橫千秋貌取者誰文湖州十年筆意閉黃壤只今妙手唯楊侯楊侯畫竹盡真意巧奪造化令人愁滿堂回首看下筆擾擾雲煙亂晴日大叢縱橫高入雲斜風落葉秋紛紛小叢攲傾病無力旁水長根走蒼石門前車馬汗前川何得隂風動高壁楊侯嘻笑辭未工此意不與丹青同粉黛初無一錢費酒炙能使千金空襪材遠寄動盈屋我知子畫無由窮剡溪寒藤不難致須君放手為雙叢須君放手為雙叢與我俱隱南山中懷雪童犬名老來於世漫多悲夢幻推移且自知想得開山藏骨處卻如搖尾乞憐時送行識我貧無蓋間坐思渠悶有詩從此窮居添寂寞夜長誰復繞簾帷以上東萊集秦處度與一上人同宿密菴處度為一畫斷崖枯木小菴無客亦無氊遂有高人借榻眠一夜西風撼枯柳不知春在石崖邊題范才元畫軸後昔年同過嶺南州曾見湘江萬里流妙手可傳詩外意亂雲寒木更孤舟以上聲畫集王文孺臞菴伊洛富山水家有五畝園花竹繞瀍澗不讓桃花源清時足真賞戶戶開層軒一朝邊塵暗故家希復存莽蒼走萬里始及吳市門菴廬據形勝冰壺貯乾坤亭榭著仍穩不見斧鑿痕主人更超邁雲夢八九吞植杖邀我坐笑語清而溫坐令車馬客稍識山林尊十年老朝市漸見兩目昏求田與問舍姑置不復論但願從我公不使世諦渾吳郡志句忍窮有味知詩進處事無心覺纍輕病知前路資糧少老覺平生事業非能改齋漫録鶚按善權祖可如璧三僧詩入釋子宋詩紀事卷三十三
