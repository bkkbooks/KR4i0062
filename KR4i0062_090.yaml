body:
  text: 宋詩紀事卷九十錢塘厲鶚撰鍾離權宣和書譜神仙鍾離先生名權不知何時人閒出接物自謂生于漢吕洞賔于先生執弟子禮自稱天下都散漢字畫飄然有凌雲氣草書詩露滴紅蘭玉滿畦間拖象履到峰西但令心似蓮花潔何必身將槁朩齊古塹細香紅樹老半峰殘雪白猿啼雖然不是桃花洞春至桃花亦滿溪夷堅志淳熙十一年溧陽倉斗子坐盜官米黥配而籍其家得草書二軸題云庚申嵗書其名權花押止如一劒之狀蓋鍾離翁也其詞云云李粹伯跋之曰字畫放逸有翔龍舞鳳之勢脫去尋常畦徑非得于心而應于手者不能爾飄然神仙風度固有所本云真本藏于建康府治軍質庫絹素標飾處皆斷裂獨字畫不動景裴嘗見之庚申嵗者豈非藝祖創業建隆元年乎示太原學士風燈泡沫兩相悲未肯遺榮自保持頷下藏珠當猛取身中有道更求誰才髙雅稱神仙骨智照靈如大寶龜一半青山無買處與君攜手話希夷元祐七年九月九日鍾離權書雲麓漫抄莊綽跋云昔維揚有何仙姑者世以為謫仙能與真靈接一日鍾離過之使治黃素乃書此詩吕公亦跋其後令俟王學士至授之後數日王古敏仲自二卿出守㑹稽至維揚訪姑即以與之王祕不以示人吕嵒嵒字洞賔關右人唐德宗朝吕渭之孫咸通中舉進士不第值黃巢亂攜家隱居終南山學老子法年百餘嵗而狀貌如嬰兒世傳有劒術時至陳摶室其事跡多顯于宋書楚州紫極宫小軒宫門閒一入獨憑闌干立終日不逢人朱頂鶴聲急避暑録話題嶽州古寺二首朝遊北海暮蒼梧袖有青蛇膽氣粗三醉嶽陽人不識朗吟飛過洞庭湖獨自行時獨自坐無限時人不識我惟有城南老樹精分明知道神仙過蒙齊筆談洞賔吕渭之後五代間從鍾離權得道權漢人不老自本朝以來與權更出沒人間權不甚多而洞賔蹤跡數見好道者每以為口實余記童子時見大父魏公自湖外罷官還道嶽州客有言洞賔事者云近嵗常過城南一古寺題二詩壁閒而去說者云寺有一大古松吕始至時無能知者有老人自松顛徐下致恭故詩云然書沈東老壁西鄰已富憂不足東老雖貧樂有餘白酒釀來緣好客黃金散盡為收書避暑録話東林沈氏世為著姓元豐閒有名某字東老者家頗藏書喜賔客東林當錢唐往來之衝故士大夫與游客勝士聞其好事必過之沈亦應接不倦嘗有布裘青巾稱回山人風神超邁與之飲終日不醉薄暮取食餘石榴皮書一絶壁閒即長揖出門越石橋而去追躡之已不見意其為吕洞賔也留詩太平寺手內青蛇凌白日洞中仙果豔長春須知物外烟霞客不是尋常磨鏡人青瑣髙議賈師雄郎中治平中通判邵武嘗收鐵鏡甚大非常物也久欲淬磨未得其人左右言近有回處士自言善磨鏡召至風骨軒昻非常人也飲酒畢推藥鏡上言藥少當自取之既去不回詢其宿在太平寺留詩一絶而去取鏡視之藥已化去堆藥處一㸃表裏通明如寒玉春水書與胡詠之濟世應須不世才調羮重見用鹽梅種成白璧人何處熟了黃粱夢未回相府舊開延士閣武夷新築望仙臺青雞唱徹函關曉好卷游幃歸去來題秦州天慶觀壁石池清水是吾心漫被桃花倒影沈一到邽山空闕內消閒塵纍七弦琴墨莊漫録鄱陽胡詠之朝散生平好道元符初嘗于信州弋陽縣見一道人青巾葛衣神氣特異因揖而延之對飲道人指取大白滿引無算曰君有從軍之行去否胡竦然曰當去蓋是時欲就熙河帥姚雄之辟也道人曰西陲方用師好去索紙書詩云云授詠曰為我以此寄章相公且曰章相公好箇人又錯了路徑也問其姓名不肯言乃拂衣去明日因告縣令遍邑物色竟無見者詠至京師見王副車詵具告以此欲持詩謁子厚詵曰慎不可上方以邊事倚辦相公丞相得此必堅請去上必疑怪詰其所以然君且得罪詠以為然徑趨幕從取青唐既還闕則子厚已去矣他日子厚北歸聞有此詩就詠求之其真本已為副車奄有乃録寄之子厚見詩嘆曰使吾早得此詩去位久矣豈復有今日乎方詠之在邉日嘗至秦州天慶觀聞說吕先生在此月餘近日方去矣問何以知其為吕道士云道人去時適道衆皆赴鄰郡醮道人顧小童曰吾且去借筆書壁候師歸示之小童辭以觀新修戒勿令涴乃曰煩貯火殿爐吾欲禮三清而去既而行殿後砌下有池水甚清泚乃以爪畫殿壁留詩云云後題回字衆驚歎以為必吕翁也壁甚髙其字非手可能及邽山即秦山也此說豫聞江元一太初云題冢上亭冢上為亭鬼莫嗔冢頭人即冢中人憑欄莫起存亡意除郤虛空總是塵西溪叢語襄漢隱者躬耕數畝因古冢為亭往來題詩甚富一日柱閒得一絶相傳吕翁作也題崇元觀在吉水縣褰裳懶步尋真宿清景一宵吟不足月在碧潭風在松何必洞天三十六方輿勝覽題京師景德寺東廊三學院壁明月斜秋風冷今夜故人來不來教人立盡梧桐影庚溪詩話題靈石屋山南塢數回泉石西峯幾疊烟雲登攜孰以為侣顔寓李甲蕭耘竹坡詩話西湖諸寺所存無幾唯南山靈石猶是舊屋寺僧言頃有數道人來丏食拒而不與乃題詩屋山而去至今猶在字畫頗類李北海好事者譯之乃是吕洞賔與三人者來耳李甲近世人東坡以比郭恕先善畫而有文餘不知為何人當是神仙也吕仙牧童絶句草鋪橫野六七里笛弄晚風三四聲歸來飽飯黃昏後不脫蓑衣臥月明西清詩話鍾弱翁帥平涼一方士通謁從牧童牽黃犢立于庭下弱翁異之指牧童曰道人頗能賦此乎笑曰不煩吾語是兒能之牧童乃操筆大書云云既去郡人見方士擔兩大甕長歌出郭迹之不見兩甕乃兩口豈洞賔耶許堅許堅江左人早嵗以時事干江南李氏不見禮拂衣歸隱茅山太平興國八年自茅山游廬山或在洪州西山吉州玉笥山宿溧陽靈泉精舍僧以白字韻請留詩近枕吳溪與越峯前朝恩賜靈泉額竹林晴見雁塔髙石室曾棲幾禪伯荒碑字沒秋苔深古池香泛荷花白客有經年别故林落日啼猿情脈脈郡閣雅談張虛白虛白邢州人遺崔母武陵溪畔崔婆酒天上應無地下有南來道士飲一斗醉臥白雲深洞口湖廣總志虛白舉進士不第辟穀從劉易陳摶逰寓武陵崔母家崔飲以醇酒一旦殁崔殯之後邑人余安見虛白賣藥揚州市中賦詩託安遺崔崔得詩啓殯視之乃知尸解石仲元仲元字慶宗宋初桂林七星山道士以能詩名楊徽之守湘源大加稱賞目為玉方響有桂華集陽朔道中平原翠削萬瓊瑰頓轡塵沙眼暫開文網牽人寧底急未妨得意看山來句石壓筍斜出岸懸花倒生以上桂林府志沈廷瑞廷瑞筠州髙安人玉笥山道士别僧昭瑩南北東西路人生會不無早曾依閣皂又郤上𤣥都雲片隨天闊泉聲落石孤何期早相遇樂共煮菖蒲郡閣雅談沈廷瑞吏部郎中彬之子棄妻入道居玉笥山雍熙二年上元日辭道侣念人生幾何賦無病而終遺言于弟子以畫土宿一幀度人經一卷隨葬後二年有閣皂山僧昭瑩于山門相遇云暫到廬山尋知已留土宿一幀及度人經一卷五言詩一首為别昭瑩到玉笥山話及方知沈道士已亡往墳上見土坼裂尺餘蓋尸解也張無夢無夢字靈隱號鴻濛子與种放劉海蟾為方外友事陳希夷多得微㫖久之遊天台登赤城廬于瓊臺觀真宗召對除著作郎不受賜還山令台州給著作郎俸以養老有瓊臺集天台桐柏觀天台瀑布落青天觀在天台瀑布邊道士秖今燒藥處仙翁曾是種芝田龍居古洞遺殘雨鶴出髙巢㸃破烟暫别靈溪遊五嶽不知重到又何年赤城志劉遁贈丁晉公屢在仙遊亭上醉仙遊洞裏杳無人他時鳴鶴歸滄海同看蓬萊島上春古今詩話丁晉公舊有園在保康門外園有仙遊亭仙遊洞與道士劉遁往來遁作詩贈公云云後南遷遁往見公于崖州方思其詩知為異人也許昌齡南莊南莊相見北莊居更入深山十里餘幽谷每尋樵徑上真心還與世情疏雲中犬吠流星過天外雞鳴曉日初昨日有人相問訊旋將落葉寫回書皇朝類苑許昌齡安世諸父早得神仙術杖策居潁陽石唐山歐陽永叔生平不肯信佛老與語豁然有悟嘗手書其詩申徒有涯髙吟仲尼非不賢為世所不容嗤嗤同舟子不識人中龍溪雪載落梅寒聲激長松往來但一嘯一壺隱塵蹤樹萱録申徒有涯方外之士嘗攜一白瓷瓶自陽羡遊吳中大風雪中脫衣賃舟沽酒斗餘飲畢大吐同載者惡之榜舟者逐之有涯挈瓶登岸倚欄高吟云云歌訖跳身入瓶悄然無迹劉元英元英號海蟾子題潭州壽寧觀醉走白雲來倒提銅尾秉引箇碧眼奴擔著獨壺癭自言秦世事家住葛洪井不讀黃庭經豈燒龍虎鼎獨立都市中不受俗人請欲攜霹靂琴去上芙蓉頂吳牛買十角溪田耕半頃種秫釀白醪總是仙家境醉眠松隂下閒過白雲嶺要去即便去直入秋霞影湖廣總志劉元英號海蟾子初名操燕地廣陵人以明經擢第仕燕主劉守光為相一旦忽有道人來謁自稱正陽子索雞卵十枚金錢十枚以一文置几上纍十卵于錢若浮圖之狀海蟾驚歎曰危哉道人曰人居榮樂之場履憂患之地其危有甚于此者復盡以其錢擘為二擲之而去海蟾由此大悟遂易服從道宋仁宗天聖九年遊歷名山所至多有遺跡一日于潭州壽寧觀題古詩十韻云云仍自寫真其傍撮襟書龜鶴齊夀四字題云廣陵閒民劉某書丹成尸解至元六年贈海蟾明悟宏道真君羅道成道成郴州人游嶽因思靈秀偶來遊碧玉寒堆萬疊秋直上太山髙處望根盤連接十餘州白騾代步若奔雲閒人所至留詩迹欲知名姓問源流請看郴陽山下石古今詩話慶歷中有閒人遊嶽謁主簿郭及甫視其刺羅道成也自言郴州人問郴人言有真人得道乘白騾行石壁上迹至今存黃希旦希旦字姬仲邵武人自號支離子生于仁宗景祐閒入道本軍九龍觀熙寧中詔住京師五福宫又典太乙宫事年四十二解化有竹堂集謝人惠星冠學道多年尚屈蟠豈勝仙伯贈峩冠曉簮乍覺星攢頂夜戴偏宜月滿壇對鑑寧忘朋友正避時羞為利名彈預思他日雲林下輕罩紗巾鶴髮寒和賈鴻舉移竹琳房珠館何虛寂寶砌無塵苔蘚碧仙翁倚檻靜吟哦郤憶篔簹拂巖石徑節虛心守嵗寒未嘗暫變風霜色移來迢遞不辭遠深根訝向瑤臺植漸承春意葉青青時惹天香烟羃羃月籠翠影尚蕭疏露被繁枝才滴瀝迎風閒夜擬龍吟結實他年期鳳食非才終約老烟霞此際謬當親采擇寄言紅紫莫相猜彼此無情蒙化力逢時翦拂任他人沈去葛陂都咫尺以上竹堂集歸真子呈桂州唐秀才袁州相見又之全不遇先生道未圓大抵有心求富貴到頭無分學神仙篋中靈藥宜頻施鼎裏丹砂莫妄傳待得角龍為宴㑹好來黃壁臥林泉古今詩話唐子正著作桂州人治平中赴舉至全州途中雇一僕負重擔健若飛羽雖鞭馬疾馳常去馬百步外恐其逸去遂遣之其僕即日自全州二千七百里日午已到唐州留書驛吏曰候桂州唐秀才至即投之唐月餘到驛驛吏出書題云呈桂州唐秀才歸真子封唯一詩云云話其狀貌乃全州僕也留書之日乃全州所遣日也始悟其為神仙唐後為雍倅熙寧丙辰交趾寇雍唐遇害乃詩所謂角龍也陳景元景元字太虛自稱碧虛子建昌南城縣人神宗朝為右街副道籙賜號真人宣和書譜景元每著書什襲藏之有佳客至必發函具鉛槧出客前以求㸃定乞歸廬山詔賜白金既歸行李無他物百擔皆經史也所居以道儒醫書各為齊館而區別之四方學者從其遊則隨所類齊館相與校讐人人得盡其學而所藏號為完書未嘗與俗子將迎惟相善法雲寺釋法秀人比之廬山陸修靜交惠逺也所役二奴一曰黃精一曰枸杞一時大臣如王安石王圭喜與之遊嘗與蔡卞論書至歐陽詢曰世皆知其體方而莫知其筆圓卞頗服膺臨化作昔之委和今之蛻質非化非生復吾真宅宣和書譜李陶真陶真不知何許人熙豐閒游武夷好吹笛諸道士招飲于雲房陶真皆赴而諸房笛聲一時同發後寓修于建平之通仙巖一日留詩别衆不知所往絶句毛竹森森自翦裁試吹一曲下瑶臺當塗不遇知音聽䄂拂白雲歸去來崇安縣志周貫貫膠東人熙寧元年至豫章石頭寺尸解冷齊夜話周貫者不知何許人自號木雁子治平熙寧閒往來西山日酣飲畜一大瓢夜以為溺器工作詩詩成癖嘗宿奉新龍泉觀半夜槌門道士驚問其故曰偶得句耳因使口誦貫以手指畫吟曰彈琴傷指甲蓋席損髭鬚是夜寒甚貫以席自覆故耳答人八十西山作酒仙麻鞋軋斷布衣穿相逢甲子君休問太極光隂不計年冷齊夜話題虛白觀在筠州上髙縣出郭十餘里藍輿試初程山髙雲氣重野曠烟光輕斷石絡樹根敧崖澑泉聲行行款道宇一徑掌樣平仙隱記甘羅觀名取莊生寶藏絢金碧仙佩飛瑶瓊簷鐸自相語龕燈弄微明出門境界寬一笑大江橫蹁躚白羽衣孤鶴松梢鳴瑞州府志郭行行字思誠不知何許人舉進士不第遂學道不食唯飲酒馬默知鄆之項城縣行訪之一見如舊云與祕丞同隱華山來時默官祕丞也後行死期年有人過華隂見行附書并詩與默發其墓唯杖屨而已寄馬默祕丞汶上歡然喜再逢為言相憶白蓮峯死生決定歸真性嵗月休交改舊容漫把文章添野録奈何官爵自天鍾南山記得登臨處間郤烟雲千萬重陶朱新録邢仙老詩贈晚學李君日轉篷窗影漸移羅浮舊隱到多時瀛洲伴侣無消息風撼巖前紫桂枝玉照新志熙寧辛亥聞李侯事忘其名以供奉官為汾州管界巡檢一日捕盜入九疑山深歷巖洞遙見嶺中有青烟一㸃了然可辨村民云居常見闕樵牧皆不能到李識其處歸以告同姓李彥髙李君業文志未就嘗以養生不死為意聞之即尋烟處攀緣而上有草堂三閒一老人燕坐其中李問老人姓名言唐末人避世來此姓邢名字不必問指靣前二小池乃有竹筒作刻漏狀曰從來甲子日辰吾盡知之所不知者國姓年號耳李因告以熙寧天子姓名傳序年月仙老頷之而已數日復往因授李以內丹真訣臨别書一絶題云詩贈晚學李君髙坦留别句容簿巖下相逢不忍還狂歌醉酒且盤桓仇香莫問神仙事天上人閒總一般西溪叢語熙寧閒句容簿至茅山遇道人髙坦被髮跣足與簿劇談飲酒終日書一詩留别而去李斯立斯立居舒州靈仙觀常從蘇軾游年踰八十始卒句巖澑連雲凍溪梅帶雪香安慶府志黃知微知微字明道江州人元豐閒居廬山太平宫號養正先生句溪雲拂地送殘雨谷鳥向人啼落花九江府志王文卿文卿麻姑山道士麻姑壇漉酒巾籠五嶽冠懶攜琴鶴上朝端丹房晝睡烟霞暖紫府夜歸星斗寒詩就幾教山鬼泣劒靈那許俗人看麻姑報道桑田變一曲仙棊尚未殘丹霞洞天志劉跛子與客飲市橋遷客南湘召赴京輪蹄迎送一何榮爭如與子市橋飲且免人閒寵辱驚冷齊夜話劉跛子者青州人也拄一拐每嵗必一至洛中看花館范家園春盡即還京師為人談噱有味范家子弟多狎戲之張丞相召自荆湖時跛子與客飲市橋客聞車騎過甚盛起觀之跛子手挽其衣使起飲作詩云云豫姻家許中復之內乃趙概參政之孫女云我十許嵗時見劉跛子來覓酒飲笑語而去計其夀百四五十許嘗館于京師新門張婆店三十年日坐相國寺東邸人無識之者李伯祥伯祥眉山矮道士見百斛明珠句夜過修竹院醉打老僧門能改齊漫録蘇黃門云東坡先生稱眉山矮道士好為詩格不能髙往往有竒句可喜也三朵花絶句戴花三朵鎮長春誰識元中不二門醉裏自傳神似活終當不老看乾坤夷堅志房州異人或云姓李氏常戴紙花三朵入市能作詩皆神仙異談自能寫真東坡常作詩詠之郡人稱三朵花先生猶記其一絶徐守信守信海陵人少孤役于天慶觀嘉祐四年天台道士余元吉來遊示惡疾守信事之無倦忽于溺器得丹砂餌之自是常放言笑歌日誦度人經絶粒至數日為人言禍福如影響發運使蔣之竒以經中有神公受命普掃不祥之語呼曰神公自是人以神翁目之徽宗召入言事多驗賜號虛靜沖和先生年七十有六卒賜大中大夫給葬用四品禮厝城東響林原弟子苗希頤裦次其事為語録陸游家世舊聞元符中哲宗嘗遣密問聖嗣神翁曰吉人君子吉人者上名也于是召至都下上用太宗見陳摶故事御縧褐即便殿以賔禮接之泰州志云神翁役天慶時常持一帚供掃除後響林方洲仙源霜節亭諸處多生帚竹宛然叢篲絶句汲汲光隂似水流隨時得過便須休兒孫自有兒孫計莫與兒孫作馬牛徐神公語録獻康王詩牡蠣灘頭一艇橫夕陽西去待潮生與君不負登臨約同上金鼇背上行輟耕録章安張善初云初宋髙宗在潛邸日泰州徐神翁能知前來事羣閹言于徽宗召至以賔禮接之一日獻詩云云及兩宫北狩匹馬南渡建炎庚戌正月三日帝航海次臨海縣之章安鎮灘淺閣舟落帆于鎮之福濟寺前以候潮顧問左右曰此何山曰金鼇山又問此何所曰牡蠣灘因默思神翁之詩乃徒步登岸見此詩在寺壁間題墨若新方信其為異人也陳應祥應祥字知明西安人政和中試修文輔教科授道至元素大夫凝神殿校籍有詩集西興晚望晚色催吟思江風掠斷霞亂烏投岸朩幽鷺集汀沙月出海門近人歸渡口斜㑹須操舴艋隨處是天涯衢州府志劉卞功卞功字子民濵州安定人築環堵于家之後圃不語不出者三十年徽宗聞其名召之不起賜號髙尚先生靖康之變不知所終賔退録子民六嵗誤觸甕碎家人更譙之神色自若曰俟釘校者來當全之復譙其妄曰人破尚可修矧甕耶語未絶釘校者至相與料理頃之如新嘗云常人以嗜欲殺身以貨財殺子孫以政事殺民以學術殺天下後世吾無是四者豈不快哉答外兄王子常問修行之術王名衣官侍郎非道亦非律又非虛空禪獨守一畝宅惟耕已心田賔退録張景端景端字子仁嗣漢二十九代天師大觀初贈葆真先生題梅山作尉南昌日投書北闕頻忠言不悟主直節恥為臣漢室多灾異吳門念隱淪掛冠忘寵辱蒙袂出埃塵虹屈英雄氣鷗羣自在身永懷三洞訣髙謝九江春擇地開仙館看雲翦壽巾元臺秋步月虛室夜凝真無夢生芳草留年養大椿碧茸香不斷青鳥性偏馴太液刀圭就中黃道路新武夷空墜馬郁朩竟棲神絳節雖朝帝靈波尚濟民一名傳舊史千古事嚴禋瑞氣生仙藥清風付羽人壇遺金鼎像井鎖玉華津地接洪崖府溪通劒水濵鶴歸雲抖擻龍起石鱗皴已悟身為患元期德有鄰青山不忘我今日是天親梅仙事實張繼先繼先字嘉聞嗣漢三十代天師崇寧中賜號虛靖先生天師世家云崇寧四年召繼先建醮內廷因密奏赤馬紅羊之兆請修德靖康丙午之變其言始驗還山題翛然亭壁曰赤帝御龍行末伏姮娥分月入深山人莫能測遊洞霄洞霄深處日棲真仙子親曾此致身鳳闕有人來獻禮溪聲山色愈增新洞霄詩集曹道沖道沖南嶽羽流題謝先生白雲菴桃源洞口武陵人跳出紅塵二十春但喜白雲深有趣不知青眼近來親丹砂已向坤爐伏玉汞先從坎鼎烹活計一張焦尾外碧壇三尺禮星辰南嶽總勝集王介介七閩羽客洞霄宫飄飄遼鶴去難尋野客重來歎復吟許邁林中丹竈冷郭文山上白雲深南陵事跡都非昔北嶺歸期直到今珍重玉京無限意待將功節養髙岑洞霄詩集皇甫介介無為軍道士洞霄宫大滌雲深日月遲羽人曾作帝王師鼎中絳雪成千日巖下幽花占四時玉杖已乘鸞鶴去青山難使鬼神移人閒萬事惟間好山頂誅茅待幾時洞霄詩集黎師俁師俁字道華臨川人入道學詩于謝無逸與曾季貍裘父文慧大師惠嚴同時以詩鳴號臨川三逸有頤菴集門外門外黃塵尺許深癡兒抵死競浮沈誰知一寸茅簷日天付間人值萬金詩家鼎臠明水寺寒日荒荒野外昏亂山深處訪祗園一條㵎水穿龍洞十里松隂蔽寺門衲子茹蔬憐鶴瘦吾儕飲酒作鯨吞夜闌笑語喧空闊驚起棲鴉過别村西江詩話游道士道士饒州人書假簿相别來來一百秋幻泡重作故人游紫泥白雪尋常事何苦人間話不休今是堂手録太學禮遠齊饒州一同人遇游道士道士本里人化去已多年一日來客位相訪約同人請假歸齊假簿中有詩一絶乃道士所書也葛道人句百囀已休鶯哺子三眠初罷柳飛花竹坡詩話宣和中錢塘有葛道人以業屨為生一日為寺僧修屨口中作吟哦聲僧訝而問之曰今日偶得句耳朩廣漠廣漠和州道士自咏百萬人中隱一身深如勺水在滄溟獨醒自負賢人酒天闊難尋處士星照影自憐湖水碧髙吟贏得蜀山青城南老樹如相問不枉翻空過洞庭費衮梁溪漫志雍孝聞蜀人崇寧間廷試對䇿力詆時政闕失駁放後雖授以右列然卒不仕浪迹山林遂遇異人得道政和末變姓名為道士入內說法徽宗謂其得林靈素之半因賜姓朩更名廣漠竟不知其為孝聞也過東坡墓文星落處天地泣此老已亡吾道窮才力謾趨生仲達功名猶忌死姚崇人間便覺無清氣海外何人識古風平日萬篇誰愛惜六丁收拾在瑤宫玉照新志秋浦朱去奢謂雍孝聞自海外量移池州以卒嘗有詩云官田種秫陶元亮私釜生塵范史雲至今郡人猶傳誦之孝聞沒後和州道士亡其姓名冒而為孝聞走江淮間其才亦不下孝聞有弔項羽庿文云無守陵之繐帳有照夜之寒釭過東坡墓題詩云云宣和初至京師遂得幸祐陵謂其人可及林靈素之半錫姓名朩廣漠至紹興中猶寓會稽之天長觀明清尚及識之羅浮黃野人歌詩雲來萬嶺動雲去天一色長嘯兩三聲空山秋月白西清詩話黃野人葛仙弟子或云葛仙之𨽻稚川棲山煉丹野人隨之葛既仙去留丹柱石閒野人自外至得一粒服之為地行仙近有人遊羅浮宿留巖谷閒中夜見一人身無衣而紺毛覆體意必仙也乃再拜問道其人了不顧但長嘯數聲響振林朩歌詩云云裴道人歌好酒喫三盞好花插一枝思量今古事安樂是便宜泉州府志紹興中有人自稱江東裴道人頭帶通草花行歌于市一日于北山石嵌中端坐而逝盛曠曠字元放武林人紹興中入道赤松觀髙宗召見賜號至樂先生獨吟刋名紫簡羣魔賔扶桑暘谷奏玉晨控鶴三素輔翊宸敢忘南嶽魏夫人金華山志陳田夫田夫字耕叟居南嶽九真洞老圃菴緝南嶽總勝集隆興改元自序題朱陵洞白雲堂我愛瀟湘境朱陵後洞天白雲堂裏客青草渡頭眠小艇牽紅鯉幽池種白蓮頤真堪此地風月兩依然南嶽總勝集金梁之梁之字彥隆休寧人兩浙提刑受長子以蔭為奉新尉一旦若狂惑者不滿秩棄歸自是袒跣垢汙走歙之墟落動旬月不食夜臥往往有光樞密朱朴一見則曰是八百仙之一也直以金丹動蕩故耳晚年多食大黃棲止無常處自稱野仙每云我當以八月死幸毋焚我淳熙元年八月十二日夜半起坐揮扇而逝年六十有一葬城陽山立壇其上後有自蜀見之者為攜家問歸蓋尸解云洪杏庭金野仙傳同郡士人朱南一字德修瀟灑間逸至老不娶野仙贈詩有云寄語月溪朱逸士他年同賞水仙花野仙殁二紀南一下世士友率葬正在野仙墓後山中水仙正開其前知類如此答郡守趙師䕫王侯門戶懶開顔斗酒千錢一笑閒無雪可欺青檜老有天難管白雲間丹霄作客曾騎鶴紫府為家不買山京口相逢又相别隻琴孤劒幾時還郡侯雪天開宴即席以填字韻索詩昨夜嫦娥弄玉纎也應掐月作花鈿為嫌梅影太清瘦幾片飛來疏處填以上新安志贈郡士張夢錫赴南宫試秧針刺水麥鋒齊漠漠平沙白鷺飛盡道春光已歸去清香猶有野薔薇