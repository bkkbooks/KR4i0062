翁詠柳春到枝枝是緑絲秋來葉葉是愁眉灞橋何限經行者不記尋花繫馬時全芳備祖劒浦思歸韶華客裏一番老自歎此生行路多獨上危樓望鄉國闌干倚遍奈愁何詩家鼎臠思友孤坐忽太息拂衣臨長風天髙夕月冷朩脫秋山空良晤匪易得好懷難再同思君不可見心逐孤飛鴻梅仙山芒屩支藤上翠微長松影裏扣柴扉石壇丹竈蒼苔冷天闊風髙鶴不歸以上詩林萬選董嗣杲嗣杲字明德號靜傳宋季入道孤山四聖觀改名思學字無益有西湖百詠雨中宿洞霄青青九鎖山步步聽潺湲雨重精神倦雲深意緒間禽聲依石樹泉澑出巖關落落仙蹤在何能見大還洞霄詩集西湖百詠存十九首環碧園在豐樂樓北桞洲之側恭聖仁烈楊太后宅園繞舍晴波聚釣仙五龍池畔柳洲前清虛不類侯家屋輪奐曾資母后錢三靣軒窗秋水觀四時簫鼓夕陽船攬將山北山南翠獨有黃昏得景全東西馬塍在澑水橋北羊角埂是也河界東西土脈宜栽花卉園人工于種接仰此為業閒有園亭不過養種而塍有土神庿額扁作馬城土塍聚落界西東業在澆畦奪化工接死作生滋夜雨變紅為白借東風幾家衣食花姿異兩岸園池地勢同病叟扶鋤鋤晚照前身莫是橐馳翁水仙廟在水月園西廟創梁大同年閒號錢唐龍君廟錢氏繼請額穹碑尚存乾道中重建寶慶閒郡守别建蘇堤上乃謂舊廟有視湖邈焉牽連遷就之說梁大同時今幾傳矣雲翹雨佩有遺仙香火寧隨世代遷廟始大同年紀著額頒乾化敕碑鐫鳳間露輦荒瑤草龍溼秋衣翦玉蓮隄上創新誰述記郤無門外一泓泉孤山在西湖中孤山路西建炎前多有民屋間以四菴院山背皆花圃及冢隧山之東為林和靖隱廬就葬其下紹興中建延祥觀奉四聖香火獨留和靖一墓民屋菴院悉徙山北觀東為園纍朝臨幸寶祐二年分地之半建西太乙宫陳朝柏在和靖墓南縹眇蓬萊擁翠寒百年營取屋千閒黃庭殿矗烟霞老瀛嶼堂幽日月間水泛花隂藏輦路牆分柳色護仙關林家梅冢陳家柏萬古流芳鎮此山西林橋在孤山西即古之西村喚渡處水竹雲山拱畫圖因懷喚渡想東都雨餘晴蝀銜西照風遏春船入裏湖闌曲秖供遊子憑林閒今有野人無隔牆莫是神仙宅紅白梅花五百株嶽鄂王墓在棲霞嶺口葬名將太師忠武卾王嶽飛于此將軍魂夢繞旌旃偃月謀成尚忍言一旦風波誰左袒八陵荆棘自中原更無雁帶邊頭信惟有天知地下冤鬱鬱棲霞霞外樹墓門不掩雀巢喧玉泉在淨空寺內齊建元中靈悟大師曇超卓菴演法于錢唐靈苑山龍君逺來聽法又為撫掌出泉砌以方池畜大金魚有景定閒周棟記南齊事蹟巳消沈曾立苔碑記古今一老出泉猶撫掌此僧演法欲傳心樹頭龍過家家雨池靣魚游尾尾金行客不須閒照影要知澤物溥春霖西溪在靈隱寺山背居人能力其勞漁樵耕牧各遂其業楊蟠詩云為愛西溪好長憂溪水窮山源春更落散入野田中漁樵耕牧自成村就屋編籬古意存出塢野雲多曲折過橋溪水半清渾一逢白壁書香社幾見朱闌障墓門地利最饒人事簡山家還有别乾坤九里松在一字門裏舊名袁公松門唐開元閒刺史袁仁敬夾道種松錢唐吳說書九里松三字揭之紹興中思陵幸天竺回易以奎扁終不稱聖意旨令金填說書重揭之至今尚存開元刺史擅清風九里新栽夾道松屋頂自生濤浪勢根頭誰覓茯苓蹤行春橋掩雲千態一字門封翠幾重人訝金填吳說筆不知此筆遇髙宗冷泉亭在飛來峯下唐右司元藇建刺史白居易撰記按古志靈隱澗古許由嘗飲于此盧同父詩云問山何以名靈隱山曰當年隱許由小朵峯前玉鏡寒幾回倚杖聽潺湲箕公飲澗非凡水慧理呼猿是此山亭角靜依金剎古樹身涼臥石闌間無因可洗人閒熱時御清風照影還香林在下天竺後塔西日月嵒左舊名香林洞又名香桂林今直扁香林日月巖頭古翠埋綿雲深隔洞門開蒼藤隨石無根活靈杞何年有種栽氣凝野烟疑麝過暖薰山雨誤蜂來空亭誰領幽芬坐雪鶴同行損緑苔鍊丹井在下竺西廊下葛仙翁有丹在井水可以療病稚川曾此倒靈瓢闌上銀牀壓甃腰丹氣騰空知幾轉神光射屋起中宵有茶可品春煎細何疾能治曉汲遙萬古仙蹤應不泯轆轤聲落病僧寮真珠泉在龍山寨崇政院內開運中建顯德五年院東泉湧擊聲則泉出如貫珠景祐中元絳名之州家取為酒名雷峯路口張府園有泉亦同此名泉光四散駭猿猱迸起平池㸃滴髙誰欲斗量徒積夢人將瓶汲肯辭勞聲隨夜雨穿疏箔名逐春風入小槽别有雷峯峯下圃一泓墮沒在蓬蒿甘園在淨慈寺相對齊宫之西舊為甘內侍園淳祐中名湖曲園咸淳中屬謝府名新園園倚雷峯有四面堂淳祐郡守所創堂下接翠芳園船坊內官園邃傍齊宫楊桞隄南翠幾重四靣堂虛凌上界五層塔近壓中峯徑連湖水行幽草廊接風亭臥偃松鄰岸御舟空望幸深坊長日鎖飛龍勝景園在雷峯路口東開禧閒韓托胄園陸放翁作南園記韓遊村莊曰惜無犬吠隨有效之者韓敗園屬官名慶樂園淳祐中撥賜嗣榮王易今名名花嫋嫋草纖纖臺榭隨幽逐勝添十樣結亭環水樹一碑述記臥風簷梅關橋落停􅗚鑰射圃樓空失垜簾向日相傳誰學吠村莊畢竟出沽帘長橋在勝景園東在昔此橋跨水甚長橋亭且壯麗日填月塞皆民居矣橋西有寺南對鳳皇山又有澄水閘東抵清波門湖橋此最短而長名自若南港虛明架石梁寺樓鐘落幾斜陽相傳亭跨危基壯誰想橋橫古道長澄水閘荒沙草碧清波門近市塵黃鳳皇山在闌干外玉抹烟屏鷺一行慈雲嶺在方家峪西南嶺下為郊臺嶺頂可望江湖石上刻後唐篆字云梁單閼之嵗興建龍山至涒灘之嵗開慈雲嶺至今尚存疊疊流雲步步苔九霄紫氣限蓬萊後唐刻石初開路南宋郊天别築臺慰眼江湖空嵗月傷心陵寢墮塵埃桃花爭趁春風老又引遊人一度來包家山在慈雲嶺南冷水峪多桃花名桃花關關門上揭蒸霞二字拜郊臺此山之西籍田園在山之南綺霞蒸日透林梢一蔟南山尚姓包冷水峪邊苔色老沖雲樓下樹隂髙園鄰古道傳耕籍臺倚青城想拜郊欲趁桃花尋隱去關門無鑰不須敲聚景園在清波門外阜陵致養北宫拓圃西湖之東斥浮屠之廬九曾經四朝臨幸繼以諫官陳言出郊之令遂絶園今荒圯惟桞浪橋花光亭存鑾鈴遺響輦遺蹤萬景曾經聚此中寺宇有名基址散君王無逸宴遊空橋昏桞浪龍舟雨亭冷花光雉扇風臺沼巳無春又老萬年枝上夕陽紅以上西湖百詠聶碧窗碧窗江西人京口天慶觀主嘗為龍翔宫書記赦詔至有感乾坤殺氣正沈沈又聽燕臺降德音萬口盡傳新詔好纍朝誰念舊恩深分茅列土將軍志問舍求田父老心麗正立班猶昨日小臣無語淚霑襟哀被略婦當年結髮在深閨豈料人生有别離到底不知因色誤馬前猶自買胭脂詠北婦雙桞垂鬟别樣梳醉來馬上倩人扶江南有眼何曾見爭卷珠簾看固姑以上輟耕録禇伯秀伯秀號雪巘錢唐人宋末天慶觀道士以清苦節行聞送玉海宗師還山湖澥天教十載間玉經功就勝居壇驚塵天目妨龍臥晚嵗華陽望鶴還入詠五噫丹闕近㑹心三笑畫溪寒世緣歷盡仙緣熟坐斷陪真向上關茅山志善棊道人以下無名道流絶句爛柯真訣妙通神一局曾經幾度春自出洞來無敵手得饒人處且饒人西溪叢語蔡州裦信縣有棊師閔秀才說嘗有道人善棊凡對局率饒人一先後死于裦信託後事于一村叟數年後叟為改葬但空棺衣衾而已無名道人絶句偶到皇都玩月華笙歌留我醉流霞勸君不用悲塵土天上人閒只一家暌車志宣和閒元夕州西酒樓一道人來索酒痛飲初不持錢將去題詩壁閒云云乃探懷取藥拭杯成黃金以償酒直明日喧傳都下禁中聞之以金十兩易其杯去無名道人絶句瑶峯一别杳難期消渴從教醉枕敧不信丹青能畫得五更燈暗月來時侯鯖録云一道人敗道後作吳山道人留藥籃中詩一騎如龍送客歸銀􅐢緑耳步相隨佳人未許輕分别不是仙翁豈得知閒窗括異志三山曾陟嘗館陳氏七載音信不通有道人自吳山來謂之曰子思鄉之切何不少歸陟曰水陸三千幾時得到道人翦紙為馬令合眼上馬以水噀之其疾如風祝曰汝歸毋久留須㬰到家門戶如舊妻令入浴易新衣陟曰我便去妻曰才歸便去何不念父母妻子乎陟便上馬而行所騎馬足折驚寤身在書館中隨身衣皆新製者道人亦不見惟留一藥籃中有詩云云羅浮山中客題壁雲意不知滄海春光欲上翠微人閒一墮千劫猶愛梅花未歸谷音咸淳中客有戴烏方巾著鞾往來羅浮山中見人則大笑反走三年不言姓名它日醉歸忽取煤書壁云云無名髯仙絶句鳴梢疊葉響颼颼枕底寒聲為客留野鶴不來山月墮獨眠滋味五更秋困學齊雜録前宋士人山行于絶壁人跡不到處見有題詩者云云少前遇髯人坐大石上意其為詩者欲前揖忽不見余謂仙人亦未能忘情者邪洛浦道士道士鳳陽人修真于鼎州蘇溪靈巖山化去絶句一水穿崖走碧沙崖前樛朩偃龍蛇分明便是桃源洞不見溪中流落花湖廣總志宋詩紀事卷九十
