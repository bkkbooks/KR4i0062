body:
  text: 宋詩紀事卷八十九錢塘厲鶚撰張元元華州人入西夏容齊三筆西夏曩霄之叛其謀皆出于華州士人張元與吳昊而其事本末國史不書比得田畫承君集實紀其事云張元吳吳姚嗣宗皆關中人負氣倜儻有縱橫才相與友善嘗薄遊塞上觀覘山川風俗有經略西鄙意姚題詩崆峒山寺壁范文正公巡邊見之大驚又有踏破賀蘭石掃清西海塵之句張為鸚鵡詩卒章有好著金籠收拾取莫教飛去别人家吳亦有詩將謁韓范二帥恥自屈不肯往乃礱大石刻詩其上使壯夫拽之于通衢三人從後哭之欲以鼓動二帥既而果召與相見躊蹰未用間張吳徑走西夏范公以急騎追之不及乃表姚入幕府張吳及至夏國夏人以為謀主以抗朝廷連兵十餘年西方至為疲弊職此二人為之時二人家屬羇縻隨州聞使諜者矯中國詔釋之人未有知者後乃聞西人臨境作樂迎此二家而去自是邊帥始待士矣張有雪詩吳詩獨不傳觀此數聨可想見其人非池中物也承君所記如此豫謂張吳在夏國然後舉事不應韓范作帥日尚猶在關中豈非記其嵗時先後不審乎張吳之名正與羌酋二字同蓋非偶然也雪五丁仗劒決雲霓直取銀河下帝畿戰死玉龍三十萬敗鱗風卷滿天飛西清詩話華州狂子張元天聖閒坐纍終身每託興吟詠如雪詩云云又白鷹云有心待搦月中兔更向白雲頭上飛怪譎類是劉三嘏三嘏河閒人遼駙馬都尉慶歷中奔宋遣歸殺之自陳詩雖慙涔勺赴滄溟仰訴丹衷不為名寅分星辰將降禍兊方疆㝢即交兵春秋大義惟觀釁王者雄師但有征救得燕民歸舊主免于異國自稱兄儒林公議契丹既有幽薊及雁門以北亦開舉選以收士人幽州劉氏昆弟其名曰二元三嘏四端五常六符皆在被遇三嘏四端復尚主慶歷年秋三嘏攜嬖妾偕一子投廣信軍詞情悲切自言主凶狠必欲殺其妾與子故歸朝廷頗詢其國中機事復為詩以自陳朝廷以誓約既久恐納之生釁敵又移文邊郡躡知三嘏未還求索峻切期于必得不然則舉兵隳好矣朝廷乃遣還三嘏復由西山路入定州境所至以金賂村民求宿食勢亦窘迫定帥遣人搜索拘送比三嘏至幽州其妻已先在矣乃殺其妾與子械送三嘏以其晜弟皆方委任遂貸三嘏死使人監錮之行纍遷至北府宰相子六人一德二遼史劉慎元三嘏四端五常六符嘏端符皆第進士嘏端俱尚主為駙馬都尉三嘏獻聖宗一矢斃雙鹿賦上嘉其贍麗與公主不諧奔宋歸殺之韓璘璘金人紹興中歸宋不果遇害題扇寄弟􅗳􅗳鳴雁落江濵夢裏年來相見頻吟盡楚辭招不得夕陽愁殺倚樓人四朝聞見録司馬文季使北不屈在北生子名通國字武子蓋本蘇武之意通國有大志嘗結北方之豪韓玉舉事未得要領紹興初玉挈家而南授江淮都督府計議軍事其兄璘在北亦與通國善癸未九月以扇寄玉詩云云都督張魏公見此詩甲申春遣侯澤往大梁諷璘通國等至亳州為邏者所獲通國璘與常所與交聶山等三百餘口同日遇害是嵗三月十六日也宋詩紀事卷八十九
