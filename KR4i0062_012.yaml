body:
  text: 宋詩紀事卷十二錢塘厲鶚撰阮逸逸字天隱建陽人安定先生胡瑗之門人天聖五年進士為鎮江軍節度推官皇祐中與瑗同典樂事遷尚書屯田員外郎隱居詩話至和中阮逸為王宫記室王能詩與逸唱和有句曰易立太山石難枯上林桞有言其事者朝廷方治之㑹逸坐他事因廢棄題竹閣在嚴州能仁寺之南僧閣倚寒竹幽襟聊一開清風曽未足明月可重來曉意烟垂草秋姿露滴苔佳賔何以竚雲瑟與霞杯嚴州府志張維維烏程人子野之父仁宗朝衛尉寺丞贈尚書刑部侍郎子野取父平生所自愛詩寫之縑素號十詠圖聞砧遙野空林砧杵聲淺沙棲雁自相鳴西風送響暝色靜久客感秋愁思生何處征人移塞帳即時新月落江城不知今夜搗衣曲欲寫秋閨多少情庭鶴戢翼盤桓傍小庭不無清夜夢烟汀靜翹月色一團素閒啄苔錢數㸃青終日稻粱聊自足滿前雞鶩漫相形已隨秋意歸詩筆更與幽棲上畫屏玉蝴蝶花雪朵中閒蓓蕾齊驟開尤覺繡工遲品髙多說瓊花似曲妙誰將玉笛吹散舞不休零晚樹團飛無定撼風枝漆園如有須為夢若在藍田種更宜孤帆江心雲破處遙見去帆孤浪濶疑升漢風髙若泛湖依微過遠嶼倣佛落平蕪莫問乘舟客利名同一途太守馬大卿㑹六老於南園賢侯美化行南國華髮欣欣奉宴娛政績已聞同水薤恩輝遂喜及桑榆休言身外榮名好但恐人間此㑹無他日定知傳好事丹青寧羡洛中圖歸燕社燕秋歸何處鄉羣雛齊老稻青黃猶能時暫棲庭樹漸學稀疏度苑牆已任風庭下簾幕卻隨烟艇過瀟湘前春認得安巢所應免差池揀杏梁宿後陳莊臘凍初開苕水清烟村遠郭漫吟行灘頭斜日鳬鷖隊枕上西風鼓角聲一棹寒燈隨夜釣滿犁膏雨趁春耕誰言五福仍須富九十年餘樂太年送丁遜秀才赴舉鵬去天池鳯翼隨風雲髙處約先飛青袍賜宴出關近帶取瓊林春色歸貧女蒿簪掠鬢布裁衣水鑑雖明亦懶窺數畝秋禾滿家食一機官帛幾梭絲物為貴寶天應與花有秋香春不知多少年來豪族女總教時樣畫蛾眉句其五宿清江小舍破損僅存一句菰葉青青緑荇齊齊東野語孫莘老十詠圗序云張維吳興人少年學書貧不能卒業去而躬耕以為養善教其子至於有成平居好詩以吟咏自娛浮遊閭里上下於溪湖山谷之間遇物發興率爾成章不事雕琢之巧采繪之華而雅意自得徜徉閒肆往往與異時處士能詩者為輩公不出仕而以子封至四品行年九十有一公卒十八年公子尚書都官郎中先亦致仕家居取公生平所自愛詩十首寫之縑素號十詠圖傳示子孫唐詢詢字彥猷錢唐人天聖中賜進士及第除工部員外郎擢起居注知制誥出知杭蘇青三州拜翰林學士卒贈禮部侍郎有集皇宋書録唐彥猷弟彥範俱擅一時才雅之譽彥猷知書好古彥範文章氣格髙簡不屈竦秀比六朝人物尤精翰墨遺一小札亦必華箋妙管為杭州日送客舟中山雨霏微不滿空畫船來往疾輕鴻誰知獨卧珠簾裏一榻無塵四面風咸淳臨安志顧亭林平林標大道曽是野王居舊里風烟變荒原草樹疏湖波空上下里閈已丘墟往事將誰語淒涼六代餘柘湖世厯亡秦遠湖連大海濵柘山標觀望玉女見威神渺渺旁無地滔滔孰問津何年化魚鱉髣佛厯陽人以上松江府志王拱辰拱辰字君貺咸平人天聖八年進士第一元名拱夀仁宗賜今名厯官翰林學士武安軍節度使哲宗立加檢校太師卒贈開府儀同三司諡懿恪耆英㑹年七十一西都山水天下竒神嵩景室環清伊自注上古太室山為景室山甫申間氣秀不絶生賢㑹聖昌明時衣冠占數盛文雅台符卿月光離離魏京雄奧壓幽朔遊宫御府嚴天威膏田千里翳桑柘犀甲萬旅馴熊羆公當緩帶名三鎮懸赤繼軫承保釐追推契遇最深舊加復雍孟交旌麾仁皇一莊龍虎榜桂堂先後攀髙枝宦遊出處五十載鸞臺驥路俱騰夷三公極位固遼隔五年以長猶肩隨公今復主鳯門鑰僕亦再撫銅臺圻二京相望阻河廣三徑不克陪遊嬉忽聞幹步踵門至投我十二耆英詩整冠肅貌諷章句若坐寶肆羅珠璣為言白傅有髙躅九君結社真可師欲令千載著風迹亟就僧館圖神姿詞宗端殿序篇目滂灑大筆何淋漓眷言履道靡充詘菟裘近邑將營歸敢云繪素得精筆願列霜壁如唐規退居舊相國元老十年還政瀍之涯康寧富貴備五福靈寶盛氣如虹霓昔年大對繼朝董登科賜第同一期自注皆天聖八年紫垣步武既通接金沙里閈還鄰比探禪論道劇訓對摩軋太古窮天機二賢勳業冠朝省爵齒官學誰依稀今將圖畫表來世詎可下客聨纓緌既蒙月品定人物不敢循避違風期况承開閣厚賔客富有景物佳園池銅駝坊西福善宅修竹萬箇籠清漪天光臺髙未百尺下眺林嶺如屛帷花王千品盡殊勝風光繡畫三春暉六相街中潞公第碧瓦萬木煙參差左隅廟室本經禮右閣宸翰尊星奎婆娑青鳯舞松柏煥爛素錦薰酴醿石渠飛溜潄寒玉晝夜竽瑟鳴階墀伊豫陋宇治窮僻姑喜地廣為環溪樓名多景可曠望臺號風月延清暉四時花花不外假拏舟傲幘聊嬉怡懷歸撫事若饑渴恨無羽翼西南飛人生交舊貴倫輩情親意接心相知豈無晚秀負才蘊髙談大笑拘禮儀洛中故事名義燕二毛第一年相推灑冠登仕荷天寵尊君報國當百為既嗟大耋盍知止納祿謝事皆所宜顧方北道倚煩劇未許解紱披荷衣長篇不令負花約自注云公貽莫負花前約之句為指風什歌式微如羮甘露爽心骨似柄玉麈親顔眉蘭叢雖未長羅宅菊英似亦思陶籬子山已著小園賦彥倫猶愧鍾山移聊攄短引謝招隱肯使猿鶴常驚啼司馬光洛中耆英㑹詩史院席上奉和首吳相公原韻纍聖千春統編年四紀餘官歸柱史筆經約魯麟書班馬才長矣仁英道偉歟恩招宴東觀灑酒荷盈車揮麈後録挽老蘇先生氣得岷峨秀才推賈馬優未承宣室問空有茂陵求玩易窮三聖論書正九疇欲知歆向學二子繼弓裘蘇集附録歐陽修修字永叔廬陵人天聖八年省元中進士甲科纍擢知制誥翰林學士厯樞密副使參知政事神宗朝遷兵部尚書以太子少師致仕卒贈太子太師諡文忠晚號六一居士有六一居士集孔平仲談苑慶厯中西師未解晏元獻為樞密使大雪置酒西園歐陽永叔賦詩云須憐鐵甲冷徹骨四十餘萬屯邉兵晏曰昔韓愈亦能作言語赴裴度㑹但云園林窮勝事鐘鼓樂清時不曽如此合閙矯崑體專以氣格為主石林詩話歐公詩林廣記歐陽永叔詩如春服既成春酒既釃登山臨水竟日忘歸雪浪齊日記或疑六一居士詩以為未盡妙以質於子和子和云六一詩只欲平易耳西風酒旗市細雨菊花天豈不佳晚烟寒橘柚秋色老梧桐豈不似少陵優古堂詩話韓子蒼言歐陽文忠寄荆公詩云翰林風月三千首吏部文章二百年吏部蓋謂北史謝朓於宋明帝時為尚書吏部郎長五言詩沈約嘗言二百年來無此作也文忠之意直使謝朓事而荆公答之曰他日若能窺孟子終身安敢望韓公則荆公之意竟指吏部為退之矣陶孫詩評歐公如四瑚八璉止可施之宗廟敖能改齊漫録歐陽文忠公詩云拂面蜘蛛占喜事入簾蝴蝶報佳人自注云李賀詩柬家蝴蝶西家飛白騎少年今日歸蓋用李淳風占怪書云蛺蝶忽入人宅舍及帳幕內者主行人即返又云生貴子吉廬山髙贈同年劉凝之歸南康廬山髙哉幾千仞兮根盤幾百里嶻然屹立乎長江長江西來走其下是為揚瀾左蠡兮洪濤巨浪日夕相舂撞雲消風止水鏡淨泊舟登岸而遠望兮上摩雲霄之暗靄下壓后土之鴻龎試往造乎其間兮攀緣石磴窺空谾干巖萬壑響松檜懸崖巨石飛流淙水聲聒聒亂人語六月飛雪灑石矼仙翁釋子亦往往而逢兮吾嘗惡其學幻而言哤但見丹霞翠壁遠近映樓閣晨鍾莫鼓杳靄羅幡幢幽花野草不知其名兮風吹露濕香澗谷時有白鶴飛來雙幽尋遠兮不可極便欲絶世遺紛痝羡君買田築室老其下插秧盈疇兮有酒盈缸欲令浮嵐暖翠千萬狀坐卧常對乎軒窗君懷磊砢有至寶世俗不辨珉與玒䇿名為吏二十載青山白首困一邦寵榮聲利不可以苟屈兮自非青雲白石有深趣其氣兀硉何由降丈夫壯節似君少嗟我欲說安得巨筆如長杠王直方詩話郭功父少時喜誦文忠公詩一日過梅聖俞曰近得永叔書方作廬山髙詩送劉同年自以為得意恨未見此詩功父為誦之聖俞擊節歎賞曰使吾更作詩三十年亦不能道其中一句功父再誦不覺心醉遂置酒又再誦酒數行凡誦十數遍不交一談而罷梅聖俞贈郭功父詩其略曰一誦廬山髙萬景不得藏設令古畫師極意未能詳明妃曲和王介甫作單于以鞍馬為家射獵為俗泉甘草美無常處鳥驚獸駭爭馳逐誰將漢女嫁單于風沙無情面如玉身行不遇中國人馬上自作思歸曲推手為琵郤手琶羌人共聽亦咨嗟玉顔流落死天涯琵琶卻傳來漢家漢家爭按新聲譜遺恨已深聲更苦纖纖女手生洞房學得琵琶不下堂不識黃雲出塞路豈知此聲能斷腸漢宫有佳人天子初未識一朝隨漢使遠嫁單于國絶色天下無一失難再得雖能殺畫工于事竟何益耳目所及尚如此萬里安能逺制伊吾北誠已拙女色難自誇明妃去時淚灑向枝上花狂風日莫起飄泊落誰家紅顔勝人多薄命莫怨春風當自嗟石林詩話前輩詩文各有平日得意不過數篇然他人未必能盡知也毗陵正素處士張子厚善書余嘗于其家見歐陽公子棐以烏絲䦨絹一軸求子厚書文忠公明妃曲兩篇廬山髙一篇略云先公平生未嘗矜大所為文一日被酒語棐曰吾詩廬山髙今人莫能為唯李太白能之明妃曲後篇太白不能為唯杜子美能之至於前篇則子美亦不能為唯吾能之也因欲别録此三篇藏之以志公意余在汝隂見棐問之亦然今閲公詩者蓋未嘗獨異此三篇也禮部貢院閲進士試紫案焚香暖吹輕廣庭清曉席羣英無譁戰士銜枚勇下筆春蠶食葉聲鄉里獻賢先德行朝廷列爵待公卿自慙衰病心神耗賴有羣公鑑識精石林詩話至和嘉祐間場屋舉子為文尚竒澀讀或不成句歐公力欲革其弊既知貢舉凡文涉雕刻者皆黜之時范景仁王禹玉梅公儀韓子華同事而梅聖俞為參詳官未引試前唱酬詩極多歐公有無譁戰士銜枚勇下筆春蠶食葉聲聖俞有萬蟻戰酣春晝永五星明處夜堂深亦為諸公所稱及放榜平時有聲如劉暉輩皆不預選士論頗洶洶未幾詩傳遂鬨然以為主司唯唱酬不暇詳考且言以五星自比而待我輩為蠶蟻因造為醜語自是禮闈不復作詩終元豐末幾三十年元祐初雖稍稍為之要不如前日之盛然是榜得蘇子瞻為第二人子由與曽子固皆在選中亦不可謂不得人矣夢中作夜涼吹笛千山月路暗迷人百種花棊罷不知人換世酒䦨無奈客思家東坡題跋南嶽李嵓老好睡衆人飽食下棊嵒老輒就枕數局一展轉云我始一局君幾局矣東坡曰李嵒老常用四腳棊盤只著一色黑子昔與邊韶敵手今被陳摶爭先著時似有輸贏著了並無一物歐陽公夢中作詩云云殆是謂也批謝判官紙尾淺深紅白宜相間先後仍須次第栽我欲四時攜酒去莫教一日不花開西清詩話歐公守滁陽築醒心醉翁兩亭于琅耶幽谷且命幕客謝某者雜植花卉其間謝以狀問名品公即題紙尾云云其清放如此唐崇徽公主手痕故鄉飛鳥尚啁啾何况悲笳出塞愁青冢埋魂知不返翠崖遺迹為誰留玉顔自古為身纍肉食何曽與國謀行路至今空歎息巖花野草自春秋朱文公語録玉顔自古為身纍肉食何人與國謀以詩言之第一等詩以議論言之第一等議論也早朝感事踈星牢落曉光微殘月蒼龍闕角西玉勒爭門隨仗入牙牌當殿報班齊羽儀雖接鴛兼鷺野性終存鹿與麛笑報汝陰常處士十年騎馬聽朝雞寄許道人昌齡石唐仙室紫雲深潁陽真人此算心真人已去升寥廓嵗嵗嵒花自開落我昔曽為洛陽客偶向嵒前坐磐石四字丹書萬仞崖神清之洞鎖樓臺雲深路絶無人到鸞鶴今應待我來以上居士集西清詩話潁陽石唐山絶頂有石室邢和璞算心處治平中許昌齡早得仙術杖䇿來居焉歐陽文忠公守亳社聞之要致郡齊與語豁然有悟一日公問道許告以公屋宅已壞難復語此但明了前境猶庶幾耳且道昔遊嵩山日暮于絶壁上見苔蘚成文云神清之洞語祕不傳後公歸汝隂臨薨以詩寄之云云寄韓子華人事從來無處定世塗多故踐言難誰知潁水閒居士十頃西湖一釣竿墨莊漫録歐陽公與韓子華吳長文王禹玉同直玉堂嘗約五十八嵗即致仕子華書于柱上後過限七年方踐前志作詩寄子華曰俗諺云也賣弄得過裏劉原父再昏以二絶戲之平生志業有誰先落筆文章海內傳明日都城應紙貴開簾卻扇見新篇仙家千載一何長浮世空驚日月忙洞裏桃花莫相笑劉郎今是老劉郎西清詩話顔太初太初字醇之徐州人顔子四十七代孫第進士官國子監直講出為臨晉簿掌南京學卒有鳬繹先生集蘇東坡序略云昔吾先君適京師與士大夫遊歸語軾曰自今以往文章其日工而道將散矣士慕遠而忽近貴華而賤實吾巳見其兆矣以魯人鳬繹先生之詩文十餘篇示軾曰小子識之後十餘年天下無復為斯文者也許希并序針工許希下蔡人住梁門西市三十年及天聖中皇躬違豫有內戚逹其姓名上召見三進針而疾平面授尚藥奉御其賜豫不可勝紀謝恩畢西向而拜上詢其故奏曰臣拜本師扁鵲也上惜其用心不忘本給錢五十萬為立祠封曰靈應侯或曰人生乎世慎乎習希失其習者也使希不習醫而習儒其遇主之日不忘先師明矣若然則讀書為儒乘時取富貴髙冠長劍昂昂廟堂之上自負自得不知素王之力者許希之罪人也因為詩云京城名利塗車馬相奔馳其間取富貴往往輸巫醫前後十數輩身沒名已隳獨有許希者蘊蓄何瑰竒始自下蔡來所處尤喧卑西市三十年汩汩無人知一朝仗至藝驟登文石墀三針愈上疾神速不移時酬以六尚官著籍通端闈旌以三品服佩紫垂金龜于時稱謝畢西向復陳儀當寧驚且問厯厯宣其辭臣傳扁鵲術遇主今得施特此一展謝臣心不自私主上惜其意擊賞為噓唏仍給水衡錢國西命立祠復加靈應號金額照華榱自此輦轂下求禱何祁祁我過慶成坊見之心且悲秦醫術雖妙五藏及四肢所習得其人千齡祀不虧魯聖術至大帝道與民彛所習非其人一朝反相持小吏師荀況竊為辨說資作相勸焚書詐云愚蚩蚩後之為儒者其心皆李斯昔在布衣日動守先王規朝談十二經夕誦三百詩依憑稽古力榮進無他岐及居廟堂上長劒冠峩巍自謂天所賦焉知有宣尼宣尼斷襲封十經寒暑移他姓為邑官鄉老皆驚疑上章寢不報九重遭面欺諌官不舉失御史不言非盡為許希笑得路忘先師宋史文苑傳天聖中文宣公孔聖祐卒無子除襲封且十年是時有醫許希以針愈仁宗疾拜賜已西向拜扁鵲曰不敢忘師也帝為封扁鵲神應侯立祠城西太初作許希詩指聖祐事以諷在位又致書參政蔡齊齊為言於上遂以聖祐弟襲封東州逸黨天之有常度躔次絶乖離地之有常理沈潛無變虧人之有常道髙下遵軌儀三才各定位萬古永不移二儀設有變修德可以祈人道或反常其亂何由支昔在典午朝國祚向陵夷日向中夜出赫赫來東陲地向太極裂中有蒼鵝飛髙厚灾且異人妖亦繁滋始有竹林民怪誕名不羈次有夷甫輩髙談慕無為沈湎多越禮阮籍兼輔之虛名能飾詐光逸與王尼何曽有先見不能救其衰張華徒竭力無以扶其危至今西晋書讀之堪涕洟爾來厯千年炎宋運重熙東州有逸黨尊大自相推號曰方外交蕩然絶四維六籍被詆訶三皇遭毁訾坑儒愚黔首快哉秦李斯與世立憲度迂哉魯先師流宕終忘返惡聞有民彛或為童牧飲垂髽以相嬉或作概量歌無非市井辭或作薤露唱發聲令人悲或稱重氣義金帛不為資或曰外形骸頂踵了無私麀聚復獶雜何者為尊卑遙聞風波民未見如調饑偶逢紳帶士相對如拘縻不知二紀來此風肇自誰都緣極顯地多用寧馨兒斯人之一唱翕然天下隨斯人之一趨靡然天下馳鄉老為品狀不以逸為嗤宗伯主計偕不以逸為非私庭訓子弟多以逸為宜公朝論人物翻以逸為竒家國盡為逸禮法從何施我常病其事中夜起思惟平地三尺限空車登無岐重載厯百仞所來因陵遲萬一染成俗雖悔何由追衆人皆若夢焉能分其糜衆人皆若醉不知啜其醨天下皆病痿俾誰就魯醫天下皆病狂何暇灸其眉幸有名教黨可與决雄雌所嗟九品賤不得立文墀賈誼惟慟哭梁鴻空五噫終削南山竹冒死指其疵願乘九廟靈感悟宸心知赫爾奮獨斷去邪在勿疑分捕復大索憸人無孑遺大者肆朝市其徒竄海湄殺一以戒萬是曰政之基千奴共一膽膽破衆自隳無使永嘉風敗亂升平時以上宋文鑑宋史文苑傳山東人范諷石延年劉潛之徒豪放劇飲不循禮法後進多慕之太初作東州逸黨詩章傪如歸亭在吳江之東天聖中趙令球建吳江江上客亭幽地占姑蘇最上游萬頃重湖朝夕浪幾聲殘櫓往來舟涼生領袖蘋風晚冷射杯盤桂魄秋東道正閒時倒屣笙歌誰惜一遲留吳江縣志葉綱如歸亭拍天烟浪接滄溟識盡歸舟是此亭風遞秋香來橘社水資春味驗茶經捲簾江樹差差緑入坐湖山隱隱青魯望幽居在何處白鷗無主滿閒汀吳江縣志何永錫如歸亭獨臨朱檻愛平波安穩歸舟兩兩過數島雲霞栽橘社一汀烟月採菱歌湖心日定施青黛砌下風恬展碧羅好寫仙源槎閣主便教從此上銀河吳江縣志陶伯宗如歸亭吾家本住洞庭西烟雨生涯接釣磯今日吳江亭上望水光山色卻如歸吳江縣志梅摰摯字公儀成都新繁人天聖中進士擢殿中侍御史戶部副使出知蘇州進龍圖閣學士知杭州遷右諫議大夫徙江寧河中卒自和寒食韻龜堞春遊土著賒青青踏去冒烟華翠停舴艋客尋寺紅䣃羃䍦人上車亭落五重沽卓酒叉行十二步潘花乘歡盡醉髙陽侣倒載歸來不認家成都文類琵琶亭陶令歸來為逸賦樂天謫宦起悲歌有弦應被無弦笑何况臨弦泣更多中山詩話新橘千頭霜熟摘來新包貢䖍修望紫宸他日功成許髙退社中還結素封人五日公宴虎符新合晚芳天良㑹難并樂與賢心愧白公求治切下車三月始開筵自注白公旬宴詩云下車已三月開筵始今辰過白頭橋在蘇州盤門運河上白頭橋奈白頭何自注唐牧白公建因得名近嵗伯純修之人呼孫老橋舊德如存故老歌不特輿梁起遺愛大都才美服人多北軒欹枕苦無勤瘁補臺綱西院西頭冷峭房今日鈴齊一攲枕清風不敢傲羲皇以上吳郡志歸雁亭歐陽公建在滑州東風楊柳杏花飛曽伴先生酒一巵前輩風流那復見小亭烟雨漫相思城邊春草路南北山下河梁人别離一尺短書缺水闊年年愁絶雁歸時偶書小詩寄永叔內翰知滑州時作酒戶棊兵孰與儕月宵曽過六天街南燕到後懷君遠時入樓東畫舫齊以上大名府志句涼深荔浦月泠尉桂江秋昭州月哲匠金桴富弼弼字彥國河南人天聖八年舉茂材異等纍擢知制誥厯同中書門下平章事封鄭國公進昭文殿大學士監修國史進司徒薨贈太尉諡文忠玉蓮詩話或傳富鄭公奉使遼國遼使者云蚤登雞子之峯危如纍卵答曰夜宿丈人之館安若泰山又云酒如線因針乃見富答曰餅如月遇食則缺謝邵堯夫見訪先生自衛客西畿樂道安閒絶世機再命初筵終不起獨甘窮巷寂無依貫穿百代嘗探古吟咏千篇亦造微珍重相知忽相訪醉和風雨夜深歸聞見前録公築第與康節天津隱居相邇公曰自此可時相招矣康節曰某冬夏不出春秋時閒過親舊閒公相招未必來不召或自至一日過之作詩云云伏承留府太尉相公就敝居為耆年之㑹承命賦詩謹録上呈伏惟采覽時公年七十九西洛古帝都衣冠走集地豈惟名利場驟為耆德㑹大尹吾舊相曠懷輕富貴日與退老遊臺閣并省寺豫慙最衰老亦許預其次遂欲省儀容爛然形繪事閩嶠訪精筆鮫綃布絶藝今復崇宴衎聊以示慈惠幽居近銅駝荒敝仍湫底塞路移君庖盈車載春醴獻酬互相趣觀處不知止商嶺有四翁晉林惟七子較我集諸賢盛衰何遠邇並事實可矜傳之為千祀弼竊覽長篇斷章有十二人中第二人之句又賦一絶上呈顧我年齡雖第一在公勳德自無雙不推行業終難敵富貴康寧亦可降以上司馬光洛中耆英㑹詩涵虛閣在南昌東湖北宋國子博士李寅致政居此建畫閣髙連百雉城涵虛應不愧標名門前柳色兼旗色座上琴聲雜佩聲肯羡五湖歸范蠡未饒三徑隱淵明我來恰直初晴後山影波光分外清南昌府志資政范公以黃素小字韓文公伯夷頌寄才翁壬申正月才翁按察因跋夷清韓頌古皆無更得髙平小楷書舊相嘉篇題卷後蘇家能事復何如鐵網珊瑚文彥博彥博字寬夫介休人舉進士厯樞密副使參知政事拜同中書門下平章事封潞國公以太師致仕紹聖中降太子少保卒預元祐黨籍後追復太師諡忠烈有集蘇東坡云潞公長律無一字無考據代歸呂文邵氏聞見前録文潞公自兖州通判靖一見竒之問潞公曰有兖州墨攜以來明日潞公進墨文靖熟視之蓋欲相潞公手也遂薦為殿中侍御史閒齊有作鼓吹盡私蛙蒿蓬蔣徑斜梧髙惟待鳯栁密只容鴉度暑巾裁縠迎涼帳卷紗茂陵無奈渴猶有鎮心瓜蘅臯蘅薄頻牽望陽林久駐鑣香囊徒叩叩雲月自苕苕翠佩傳情密曽波託意遙翩鴻漸髙逝翻恨隔神霄見山樓雲淡天迷楚樓髙地占秦哀筝兩行雁小字數鉤銀巷陌三條月池塘十步春府門初夜閉多少夜遊人閲史有感縹帙青箱次第開慨然英氣轉難裁莫言每事俱長往須有清風屬後來彈鋏始知皆瑣旅枕戈方信是雄才平生自信真非薄只是休容鴆鳥媒以上文潞公集同甲㑹詩四人三百十二嵗况是同生丙午年招得梁園為賦日合成商嶺采芝仙清談亹亹風盈席素髮飄飄雪滿肩此㑹從來誠未有洛中應作畫圖傳夢溪筆談文潞公保洛日年七十八同時有中散大夫程晌朝議大夫司馬旦司封郎中致仕席汝言皆年七十八嘗為同甲㑹各賦詩一首耆英㑹詩時公年七十五九老舊賢形繪事元豐今勝㑹昌春垂肩素髮皆時彥揮麈清談盡席珍染翰不停詩思健飛觴無算酒行頻蘭亭雅集誇修禊洛社英遊賞序賔自愧空疏陪几杖更容款密奉簪紳當筵尚齒尤多幸十二人中第二人澠水燕談云富韓公熙寧四年以司空歸洛時年六十八是年司馬端明不拜樞密副使求判西臺時年五十三二公安居沖默不交世務後十一年當元豐五年文潞公留守西京慕唐白樂天九老㑹于是悉聚洛中大夫賢而老自逸者韓公置酒相樂凡十二人又命鄭奐圖形妙覺僧舍各賦詩時人呼之曰洛陽耆英㑹而司馬公為之序其相聚也用洛中舊俗叙齒不尚官韓公年七十九潞公與司封席汝言字君從皆年七十七朝議大夫王尚恭字安之七十六太常卿趙丙字南正祕書監劉几字伯夀衛州防禦使馮行巳字肅之皆七十五天章閣待制楚建中字正叔七十三朝議大夫王慎言字不疑七十二大中大夫張問字昌言龍圖閣直學士張燾字景元皆七十司馬公六十四故潞公詩云當筵尚齒尤多幸十二人中第二人韓公贈潞公詩云顧我年齡雖第一在公勳德自無雙潞公再贈韓公詩云惟公福祿并功德合是人間第一人是時宣徽使王公拱宸字君貺年七十留守大名貽書二公預其數凡十三人彥博代簡上君貺宣猷勿愛大名名遂忘西洛樂銅駝本自佳金鳯亦不惡二月三月春融融千花萬花紅灼灼公乎早歸來莫負花前約同賞狀元紅對酒劉師閣自注花雖舊房其豔維新彥博伏覩公詩有第一無雙之句輒成二十八字上呈洛下衣冠今最勝當筵尚齒禮容優惟公福夀并勳德合是人間第一流以上司馬光洛中耆英㑹詩贈李戡昌元建邑幾經春百里封疆秀氣新鴨子池邊登第客老鴉山下著棊人方輿勝覽昌元縣南有老鴉山有李戡李戣兄弟善棊㑹虜索棊戰于國朝詔求天下善奕者蜀帥以戡應詔虜望風知畏不敢措手譙南薰昌元人登皇祐五年進士第文潞公詩云云題榆次縣鼓樓置向譙樓一任撾撾多撾少不知他如今幸有黃紬被努出頭來放早衙合璧事類前集世傳太祖謂一縣令曰勿于黃紬被裏放衙潞公詩云云雙泉長劔並彈霜氣豪白虹半折秋雲髙濯纓洗耳更何處世人回看輕鴻毛河南府志湨水在孟縣西北春秋㑹于湨梁即此潺湲北山水繚繞南城臯晴灘錦石亂擊觸春湍髙誰謂湨梁大不能容魴魛臨流自縮手揭厲應徒勞孟縣志宿少林寺六六仙峯繞佛居俗塵至此暫銷除西來未㑹禪師意北去應馳使者車豫方受命移守北都五品封槐今尚在九年面壁昔何如心知一宿猶難覺花藏重尋貝葉書嵩陽石刻集記席汝言汝言字君從官尚書司封郎中致仕耆英㑹年七十七繫國安危唐上宰功成身退漢留侯二公閒暇開高宴九老雍容奉勝流共接雅歡恩意洽不矜崇貴禮容優賞心樂事人間盛豈謂今稀古莫儔壯嵗塵埃祿事牽老歸重到舊林泉曽無勳業書青史偶向康寧養老年自分杜門居陋巷敢期序齒預公筵更慙形穢才涼薄不稱圖真接巨賢司馬光洛中耆英㑹詩王尚恭尚恭字安之官朝議大夫致仕耆英㑹年七十六端朝風望兩台星圭組參差又十人八百喬年餘總數一千熙運遇良辰席間韻語皆非俗圖上形容盡得真勝事主盟開府盛誤容衰薄混清塵服許便衣更野逸坐從齒列似天倫二公笑指增和氣夜久盤花旋發春自注燭下盤花開公即指目焉詩司馬光洛中耆英㑹劉几几字伯夀洛陽人第進士神宗朝官祕書監致仕上柱國通議大夫風月堂詩話劉伯夀洛陽九老之一也築室嵩山玉華峯下號玉華菴主有妾名萱草芳草皆秀麗善音律伯夀出入乘牛吹鐵笛二草以蘄笛和之聲滿山谷出門不言所之牛行即行牛止即止其止也必命壺觴盡醉而歸嵩前人以為地仙云耆英㑹年七十五司徒碩德今無比太尉殊勳固絶倫偶以暮年陪盛宴喜將白髮照青春八公有穢山空著四皓當衰心且伸元老相望踈迹在不應此㑹愧前人制舉省元推二相龍頭昔日屬宣猷人間盛事并遐算一席幾盈九百籌自注十二老共八百九十二歲馬光洛中耆英㑹詩司馮行巳行已字肅之官衛州防禦使致仕耆英㑹年七十五書稱五福夀為先有德人方得夀延自愧櫟樗非遠器誰應齒髮亦遐年立身官未三公貴推老名陪二相賢喜把衰容模梵宇慙無纖效勒燕然當時遭遇承陶冶今日光榮預燕筵從此洛城增勝槩又新重作畫圖傳司馬光洛中耆英㑹詩趙丙丙字南正太常卿致仕耆英㑹年七十五新春鼎洛燕英髦主禮雍容下庶僚二相比肩官一品十人華髮事三朝星階並列瞻台曜尊酒時行挹斗杓東潁庸夫最無狀也將顔面趁嘉招司馬光洛中耆英㑹詩王謹言謹言字不疑官朝議大夫司農少卿致仕耆英㑹年七十二相印貂冠粲六符華顛髙㑹侍臣俱不將官職誇鄉里唯尚年齡入畫圖履道清歡追故事竚瞻陰德見訏謨叨陪几席真榮觀圭璧叢中問碔玞司馬光洛中耆英㑹詩楚建中建中字正叔洛陽人第進士官中奉大夫天章閣待制提舉崇福宮耆英㑹年七十二自顧頽齡七十餘久慙頑鈍費洪爐歸逢大老耆年㑹衰朽形骸愧畫圖二相謨猷爛史編諸公才業過前賢好圖儀像傳來世何事頑踈亦比肩司馬光洛中耆英㑹詩張燾燾字景元漢陽人第進士神宗朝厯龍圖閣直學士知成都府通議大夫提舉崇福宮耆英㑹年七十洛城今昔衣冠盛韓國園林景物全功在三朝尊二相數逾九老萃羣賢當時鄉社為髙㑹此日居留闕欵延多幸不才陪履舄更慙七十是新年司馬光洛中耆英㑹詩挽老蘇先生本朝文物盛西州獨得宗公薦冕旒稷嗣草儀書未奏茂陵辭客病無瘳一門歆向傳家學二子機雲並雋遊守蜀無因奠尊酒素車應滿古原頭蘇集附録張問問字昌言襄陽人進士起家纍官祕書監給事中終太中大夫提舉嵩山崇福宮入元祐黨籍耆英㑹年七十槐庭二老樂堯仁盛集髙年洛水濵華衮具瞻雖禮絶白頭序齒卻情親清閒几席同禪院山野巾裘似隱淪尊酒椒香才過節池塘草色已催春白公酣暢吟哦內衛武康强笑語頻豈獨丹青傳不朽潛欣風俗欲還淳芝田鶴戲調形健蓮葉龜遊納息勻商皓寂寥拘小隱漢疏局促止家人莫因氣貌疑丹竈自有光陰寄大椿復得兼謨為重客自注司馬光未七十恐遺元爽在編民神仙可學今方信道術相忘久益真滿座交歡祝眉夀羣生五福託鴻鈞司馬光洛中耆英㑹詩劉槩槩字孟節青州夀光人少師种放隱於青州之南冶源山富鄭公為築室以居范文正公文潞公皆優禮之欲薦之朝懇辭不就溫公續詩話槩喜為詩慷慨有氣節舉進士及第為幕僚一任不得志棄官隱居冶源山去人境四十里好遊山常獨挈飯一罌窮探幽險無所不至夜則宿於巖石之下或纍日乃返不畏虎豹蛇虺富丞相甚禮重之府舍西軒作昔年曽作瀟湘客憔悴東秦歸未得西軒忽見好溪山如何尚有楚鄉憶讀書誤人四十年有時醉把闌干拍閒居詩話張望句庭下郎君為宰相門前故吏作將軍邵氏聞見前録張金部名方為白波三門發運使文潞公父令公异為屬官金部召去薦令公為子弟讀書于孔目官張望家望嘗為舉子頗知書後𨽻軍籍潞公少年好遊令公怪責之潞公久不敢歸張望白令公曰郎君在某家學問益勤苦不復遊矣因出潞公文數十篇令公為之喜後潞公出入將相望尚無恙公判河南日母申國太夫人生日望自河清獻夀有詩云云望以子通籍封將軍云劉沆沆字沖之吉州永新人天聖八年進士第二至和中拜同中書門下平章事集賢殿大學士出知應天府徙陳州卒贈左僕射兼侍中小孤山擎天有八柱此一柱仍存石聳千尋勢波流四面痕江湖中作鎮風浪裏盤根平地安然者饒他五嶽尊青箱雜記送鄉人尹鑑登第歸少年相款老相逢鄉舉雖同遇不同我已位塵三事後君方身列五科中榮登莫計名髙下宦逹須由善始終若到鄉關人見問為言歸思滿秋風青箱雜記尹劉少同場屋劉巳登第大拜皇祐中尹以恩榜始登第劉以詩送之陳希亮希亮字公弼青神人天聖八年進士厯官提㸃江東刑獄入判三司户部句院請補外為京東轉運使移知鳯翔致仕卒第四子慥字季常與蘇軾遊和范公希文懷慶朔堂弱柳竒花遞間栽紅芳緑翠對時開主人當日孤真賞魂夢還應屢到來饒州府志魏兼兼官度支員外和范公希文懷慶朔堂使君去後堪思處慶朔堂前獨到來桃李無言爭不怨滿園紅白為誰開饒州府志畢京京官職方員外和范公希文懷慶朔堂花木還依舊徑栽春園不惜為誰開幾多民俗熙熙樂似到老聃臺上來饒州府志曹經經官同提㸃江東刑獄和范公希文懷慶朔堂池館名公舊日栽幾畨零落又春開誰人解識紅芳意猶有多情五馬來饒州府志曰璐按范公詩自懷慶朔堂栽花作讀四和詩可以辨西溪叢語眷憶樂籍之誣并卻掃編春風為道士名亦近附㑹矣陸軫軫山陰人官兵部郎七嵗作昔時家住海三山日月宫中屢往還無事引來天女笑謫來為吏在人間耆舊續聞陸太傅軫神采秀異七嵗猶不能語一日乳嫗攜往後園俄而吟詩云云後仕至兵部郎官歸老稽山宋元憲杜祁公皆有詩送行篇中多及神仙事蓋公雅志也魯交交字叔達梓州人仕至虞部員外郎有三江集經戰地西邊用兵地黯慘無人耕戰士報國死塞草迎春生沙飛賊風起晝黑陳雲橫夜半烽臺望旄頭星尚明宋文鑑遊華山張超谷太華鎖深谷我來真景分有苗皆是藥無石不生雲急瀑和煙㵼清猿帶雨聞幽棲未忍别峯半日將曛江樓晴望江干一雨收霽色染新愁遠水碧千里夕陽紅半樓笛寒漁浦晚山翠海門秋更待牛津月袁宏欲泛舟清夜吟露華清八極吟上小樓東月色水鋪地雁聲秋滿空明河欲㵼浪瘦竹自生風坐久心骨爽此懷誰與同有寄思君又是東風起樓倚浮雲目千里芳草不知人斷腸帶煙帶雨連春水以上前賢小集拾遺齊唐唐字祖之廓弟天聖八年進士嘗試制科辟杭州料院仕至職方員外郎致仕有少微集㑹稽志唐有家園在鑑湖有山小而近湖唐分司東歸命名少微山遂家焉引流為沼萟花為圃山之上下有芳華亭修竹巖真珠泉石室嘉遁亭樵風亭禹穴閣應星亭東山亭釣閣盡湖山之勝自為家山十詠陶寫景物語尤閒遠今詩不存玉洞在劔浦山白石洞間路吾家在其中琴窗與書閣一半是雲封㑹稽志仙茅仙方上品誇靈種忽怪靈芝拆紫苞玉澤返嬰看驗術少微山是小三茅剡録觀潮何意滔天苦作威狂驅海若走馮夷因看平地波翻起知是滄浪鼎沸時初似長平萬瓦震忽如員嶠六鼇移直應待得澄如練㑹有安流往濟時瀛奎律髓張先先字子野烏程人天聖八年進士嘗知吳江縣仕至都官郎中有安陸集東坡題跋張先子野善戲謔有風味見杭妓有彈琴者忽撫掌曰異哉此筝不見許時乃爾黑瘦耶録張先子野郎中一叢花詞云沈思細恨過庭不如桃杏猶解嫁東風一時盛傳歐陽永叔尤愛之恨未識其人子野家南地以故至都謁永叔閽者以通永叔倒屣迎之曰此乃桃杏嫁東風郎中東坡守杭子野尚在嘗預宴席有南鄉子詞末句云問道賢人聚吳分試問也應傍有老人星蓋年八十餘矣吳江春後銀魚霜下鱸遠人曽到合思吳欲圖江色不上筆靜覓鳥聲深在蘆落日未昏聞市散青天都淨見山孤橋南水漲虹垂影清夜澄光照太湖中吳紀聞往嵗吳興守滕子京席上見小妓兜娘子京賞其佳色後十年再見於京口絶非向時容態感之作詩十載芳洲撫白蘋移舟弄水賞青春當時自倚青春力不信東風解誤人侯鯖録營妓張溫卿黃子思愛姬宜哥皆葬宿州城東過而題詩好物難留古亦嗟人生無物不塵沙何時種樹連雙冢結就人間並蒂花能改齊漫録題西溪無相院積水涵虛上下清幾家門靜岸痕平浮萍破處見山影小艇歸時聞草聲入郭僧尋塵裏去過橋人似鑑中行已憑暫雨添秋色莫放修蘆礙月生合璧事類前集和元居中風水洞上祖龍圖韻水色風光近使君浥塵輕雨逐車輪暫來不宿宜無恨多少行春不到人咸淳臨安志句愁似鰥魚知夜永懶同蝴蝶為春忙石林詩話張先郎中能為詩及樂府至老不衰精居錢唐蘇子瞻作倅時先年已八十餘視聽尚强家猶畜聲妓子瞻嘗贈以詩云詩人老去鶯鶯在公子歸來燕燕忙蓋全用張氏故事戲之先和云云極為子瞻所賞俚俗多喜傳詠先樂府遂掩其詩聲識者皆以為恨云湖山隱後居空在煙雨詞亡草自青藝苑雌黃張子野過和靖隱居一聨自注云先生嘗著春草曲有滿地和煙雨之句李之才之才字挺之青州人天聖八年進士師穆修受易修受之种放放受之陳摶源流甚遠邵雍傳其學官至殿中丞簽書澤州判官鳯州絶句去年三月洛城遊今日尋春到鳯州欲把雙魚附歸信嘉陵江水不東流西溪叢話時韓中令宣撫河東委之才以秦鳯鑄錢事在鳯州有作孫復復字明復平陽人居泰山深于春秋石介以次皆師事之以薦除國子監直講卒有睢陽小集八月十四夜月銀漢無聲露欲垂玉蟾初上欲圓時清尊素瑟宜先賞明夜陰晴未可知孫明復小集石介介字守道奉符人天聖八年進士厯嘉州判官居憂躬耕徂徠山下魯人號徂徠先生後遷直集賢院出判濮州卒有徂徠集燕脂板浣花箋寄合州徐文職方合州太守鬢將絲聞說歡情尚不衰板與歌娘拍新調箋供狎客寫芳辭木成文理差差動花映溪光瑟瑟竒名得只從嘉郡樹自注燕脂木嘉州出樣傳仍自薛濤時自注有薛濤箋竒章磊磊馳聲價江令翩翩落酒巵幾首詩成卷魚子自注有魚子箋誰人唱罷泣燕脂紅牙管好同牀置紫竹笙宜一處施願助風流向尊席杏花况是未離披慶厯聖德詩於惟慶厯三年三月皇帝龍興徐出闈闥晨坐太極晝開閶闔躬攬英才手鋤姦孽大聲渢渢震搖六合如乾之動如雷之發昆蟲蹢躅怪妖藏滅同明道初天地嘉吉初聞皇帝戚然言曰豫祖豫父付豫大業豫恐失墜實賴輔弼汝得象殊慎重微密君相豫久豫嘉乃績君仍相豫笙鏞斯協昌明儒者學問該洽與豫論政傅以經術汝二二相庶績咸秩惟汝仲淹汝誠豫察太后垂簾湯沸火熱汝時小臣危言嶻嶪為豫司諌正豫門闑為豫京兆堲豫讒說賊叛于夏汝往式遏六月酷日大冬積雪汝寒汝暑同于士卒豫聞辛酸汝不告乏豫晚得弼豫心慰悅弼每見豫無有私謁以道輔豫弼言深切豫不堯舜弼自笞罰諫官一年奏疏滿篋侍從周嵗忠力盡竭契丹忘義檮杌叨餮敢侮大國其辭慢悖弼將豫命不畏不懾卒復舊好民得食褐沙磧萬里死生一節視弼之膚霜剝風裂觀弼之心煉金煅鐵寵名大官以酬勞竭弼辭不受其志莫奪惟仲淹弼一夔一卨天實賚豫豫其敢忽並來弼豫民無瘥札曰衍汝來豫之黃髮事豫二紀毛禿齒豁心如一兮率履不越遂長樞府兵政毋蹶豫早識琦琦有竒骨其器魁櫑豈視扂楔其人渾朴不施剞劂可屬大事敦厚如勃琦汝副衍知人豫哲惟修惟靖立朝讞讞言論磊砢忠誠特逹祿微身賤其志不怯嘗詆大臣亟遭卑黜萬里歸來剛氣不折屢進直言以補豫闕素相之後含忠履潔昔為御史幾叩豫榻至今諫疏在豫箱匣襄雖小官名聞豫徹亦嘗獻言針豫之失剛守粹慤尚修儔匹並為諌官正色在列豫遏汝言汝無鉗舌皇帝明聖忠邪辨别舉擢俊良掃除妖魃衆賢之進如茅斯拔大姦之去如距斯脫上倚輔弼司豫調燮下賴諫諍維豫紀結左右正人無有邪孽豫望太平日不逾浹皇帝在位二十二年神武不殺其默如淵聖神不測其動如天賞罰在手不失其權恭已南面退姦進賢知賢弗易非明弗得去邪惟囏惟斷乃克明則不惑斷則不忒既明且斷惟帝之德羣下踧踖重足屏息交相語曰惟正惟直毋作側僻皇帝汝殛諸侯危栗墮玉失舄交相告語皇帝神明四時朝覲謹修臣職四夷走馬墜鐙遺䇿交相告語皇帝神武解兵修貢永為屬國皇帝一舉羣臣懾焉諸侯畏焉四夷服焉臣願皇帝夀千萬年以上徂徠集東都事略石介為國子直講是時兵討元昊久無功海內重困仁宗奮然思欲振起威德宰相吕夷簡以疾罷歸第夏竦罷樞密使章得象晏殊為相賈昌朝參知政事用杜衍為樞密使范仲淹韓琦富弼樞密副使王素歐陽修余靖同為諌官介躍然曰此盛德事也雅頌吾職其可已乃作慶厯聖德詩詩出孫復謂介曰子禍始於此矣夏竦見而銜之介既卒竦欲以竒禍中富弼指介以起事謂其詐死北走契丹請發棺仁宗察其誣得不發宋詩紀事卷十二
