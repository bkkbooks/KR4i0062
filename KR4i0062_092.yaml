body:
  text: 宋詩紀事卷九十二錢塘厲鶚撰景淳景淳元豐初桂林僧冷齋夜話景淳居豫章乾明寺終日閉門不置侍者一室淡然聞鄰寺齋鐘即造焉坐同海衆食堂前飯罷徑去諸剎皆敬愛之或隂雨則諸剎為送食住二十年如一日絶句夜色中旬後虛堂坐幾更臨溪猿不呌當檻月初生後夜客來稀幽齋獨掩扉月中無事立草際一螢飛冷齋夜話句捲箔西風起乘時上古臺秋聲隨葉下夜色帶煙來憶口上人漁翁睡重春潭闊白鳥不飛舟自橫寄象敦譜厯代吟元照元照字湛然號安忍子餘杭唐氏子元豐中住靈芝寺賜諡大智律師白雲菴道人倦逢迎結菴就巖穴靜愛山頭雲空濛如積雪隨風亦卷舒觸石更明滅卻憶古人詩秖可自怡恱宋髙僧詩選克文克文字雲菴閿鄉鄭氏子黃龍南禪師法嗣元豐中賜號真淨大師有雲菴語録雲鶴旦過晚應宿山堂任去留孤雲能自在隻鶴更優遊楖栗開青眼袈裟伴白頭未明西祖意萍迹謾悠悠雲菴語録弔黃龍和尚塔示滅師何速空遺塔此中僧間四海錫誰復九年風鳥外千峯繞人間一徑通寥寥朝與暮唯有白雲同禪藻集僧孚僧孚號草堂慧聚寺僧仲殊喜作豔詞以詩針之大道久凌遲正風還陊隳無人整頽綱目亂空傷悲卓有出世士蔚為人天師文章通造化動與王公知囊括十洲香名翼四海馳肆意放山水灑脫無羈縻雲輕三事衲瓶錫天下之詩曲相間作百紙頃刻為藻思洪泉瀉翰墨清且竒惜哉大手筆胡為弄柔詞願師持此才奮起革澆漓騖彼東山嵩圖祖進豐碑再續輔教編髙步凌丹墀他日僧史上萬世為蓍龜迦葉聞琴舞終被習氣隨伊余浮薄人贈言增忸怩儻能循我言佛日重光離中吳紀聞惟一惟一法眼之孫神宗命主嘉禾天寧寺雁蕩山四海名山曾過目就中此景難圖録山前向見白頭翁自道一生看不足雁山志了元了元字覺老饒州浮梁林氏子少出家住持江州之開先潤州之金山杭州之聖水等寺東坡與之往還神宗賜號佛印元符初聽客語合心一笑軒渠而化答可遵打睡禪和萬萬千夢中趨利走如煙勸君抖擻修禪定老境如蠶已再眠冷齋夜話遊雲門一陳若邪溪上雨雨過荷花香滿路拖笻縱步入松門寺在白雲堆裏住老僧卻笑尋茶具旋汲寒泉煮玉乳睡魔驚散毛骨清坐看秦峯秋月午月明山鳥亂相呼松杉竹影半窗户令人徹曉憶匡廬作詩先寄江南去雲門集三詔洞疇昔先生此掩關紫泥三到石房間若教便逐蒲輪起安得清風鎮海山鎮江府志奉忠奉忠蜀僧夏雲如峯如火復如綿飛過微隂落檻前大地生靈乾欲死不成霖雨漫遮天冷齋夜話章子厚謫海康過貴州南山寺奉忠自眉山來欲渡海見東坡不及病于此寺子厚宿山中邀與飲忠欣然從之又勸食蒸蛇忠舉筯啖之無所疑子厚笑曰奉佛教乃食蒸蛇何哉忠曰相公愛人以德何必見誚已而倚檻看雲子厚曰夏雲多竒峯真善比類忠曰曾記夏雲詩甚竒子厚使誦之忠誦云云清外葛洪丹竈羽客昔眷此鍊液奪化功至今寒雲色挂樹復凝空宋高僧詩選繼興寄四明教主修真依淨社幽致絶纖埃盡日冥心坐諸方學者來杉松圍講石猿鳥立生臺卻憶重遊處扁舟泛月回宋髙僧詩選遇昌上法智大師雨霽遙空朩落時危亭南望倍依依白蓮舊社人離久丹闕經年信去稀入觀夜堂江月滿揮松秋殿晝燈微林中自有吾廬在請益終期海上歸宋高僧詩選法平北固山不負南徐約來看北固雲金焦兩山小吳楚一江分雨意生蒼壁潮聲起夕曛半生流落恨此日重殷勤宋高僧詩選慶老句交情老去淡如水病骨秋來瘦似松詩説雋永淨端淨端字明表歸安丘氏子肄業吳山解空講院參龍華齊嶽禪師得悟翻身作狻猊狀叢林號為端師子章申公極愛之有吳山集山居吳山古寺近溪邊髙閣虛堂景象全林下寂寥爐火盡未眠猶聽夜行船曹氏厯代詩選有朋有朋閩帥陳巖六世孫號囷山禪師有螺江集天開巖棲霞山後峯天開一巖秀中有坐禪人形容竹柏瘦飢餐巖上松渴飲巖下澑愛步巖室前白雲起孤岫四朝詩善權善權字巽中靖安髙氏子人物清癯人目為瘦權落魄嗜酒詩入江西派有真隱集西清詩話權詩得之清淡相上下後村詩話善權詩與祖可王性之得李伯時所作歸去來圖并自書淵明詞刻石於琢玉坊為賦長句王郎言語妙天下眉宇清揚聚風雅道山延閣歸有時吐霧珠綃已無價乃翁勳業誰與儔惠愛宛同陳太丘胡牀夜據興不淺江波漲月明江樓鄴侯牙籤三萬軸玉川五千貯枯腹掌上雙珠照户庭人間爽氣侵眉目愛君羲獻來仍昆草聖真行事逼真是家此癖古不少竒書異畫元通神龍眠解説無聲句時向煙雲一傾吐戲拈秃筆臨冰紈寫出淵明賦歸去林端飛鳥倦知還陌上征夫識前路因君勒石柴桑里便覺九原人可起廬山未是長寂寥挽著髙風自君始仁老湖上墨梅會稽有佳客薖軸媚考槃軒裳不能榮老褐圍歲寒婆娑弄泉月松風寄絲彈若人天機深萬象回筆端湖山入道眼島樹縈微瀾幻出隴首春疏枝綴冰紈初疑暗香度似有危露漙縱觀煙雨姿巳覺齒頰酸乃知淡墨妙不受膠粉殘為君秉孤芳長年配崇蘭送墨梅與王性之道人筆下有春色寫出江南雪壓枝千里持來煩驛使暗香不減隴頭時眼底春光回隴首雪中疏影落平湖政須送與王摩詰對看輞川煙雨圖以上聲畫集山中秋夜懷王性之風雨一葉秋北窗夜初永候蟲鳴空階蝙蝠挂藻井龕燈照癡坐苔壁印孤影試觀鼻端白麁了虛幻境萬事皆浮休百年政俄頃學詩寒山子造語少機警故人王文度襟韻獨秀整間蒙吐佳句惠好灼衰冷何當翳華芝飛步越林嶺攜手剟荆薪歡言饌湯餅長嘯凌紫煙同升妙峯頂洪井水發香城源度澗隨曲折奔流兩岸腹洶涌雙石闕怒翻銀漢浪冷下太古雪跳波落丹青勢盡聲自歇散漫歸平川與世濯煩熱飛梁瞰虛碧洞視竦毛髮連峯翳層隂老朩森羽節洪崖古仙子錬秀搗殘月丹成已蟬蛻藥臼見遺烈我亦辭道山浮杯愛清絶攀松一舒嘯靈風披林樾尚想騎雪精重來飲芳潔以上宋髙僧詩選祖可祖可字正平丹陽人蘇伯固之子養直之弟住廬山被惡疾人號癩可詩入江西派有東溪集瀑泉集西清詩話可詩得之雄爽如清霜羣朩落盡見西山秋又谷口未斜日數峯生夕隂皆佳句也劉後村詩話祖可􅴲讀書詩料多無蔬筍氣僧中一角麟也江西宗派圖録羅源陳善曰余與僧惠空論今之詩僧如病可瘦權嫌其太清李商老云可詩句句是廬山景物意亦以太清為病余謂清非詩之病也可師有亂山爭夕陽之句善權歎其精絶與養直唱和真隱詩如潄壑夜泉響掃窗春霧空等詠往往得意外警妙天台山中偶題傴步入蘿徑綿延趣罙深僧居不知處髣佛清磬音石梁邀屢度始見青松林谷口未斜日數峯生夕隂凄風薄喬朩萬竅作龍吟摩挲緑苔石書此慰幽尋苕溪漁隱叢話李伯時作淵明歸去來圖王性之刻于琢玉坊牆病僧祖可見而賦詩坐上柴桑墟落煙眼中百里舊山川候門稚子似無恙三徑巾車人絶憐尚友當須今逸少丹青寧復老龍眠流傳匪獨遺怡玩端使懦夫懷凛然書秦處度所作松石憐君作詩自無敵遊戲詩餘畫成癖髙堂奮袖風雨來霜幹雲根動秋色長懷祝融天柱峯萬年不死之喬松觀君此畫已無斁不復望雲支瘦笻觀壯輿所藏伯時馬平生徒説追風足厭見駑駘飽芻粟劉侯為出二馬圖緬想權竒在坰牧本朝不伐大宛城公初得之無乃驚胡沙燕山在吾目短草落日低邊明雄姿忽作風動壁意氣騰驤欲無敵前者驕矜後者馳信矣能先鳥飛疾圉人亦復神超然亮作俗肉勤加鞭吁嗟駿骨世多有伯樂不逢長棄捐以上聲畫集絶句坐見茅齋一葉秋小山叢桂鳥聲幽不知疊嶂夜來雨清曉石楠花亂流詩人玉屑廬山十八賢不能晉室扶傾覆盡作西方社裏人豈意一時希有事翻令元亮兩眉顰樂邦文類秋屏閣袖手章江淨渺然倚風殘葉舞翩翩霜鷗睡渚白勝雪霧雨含沙輕若煙楊柳一番南陌上梅花三弄逺雲邊匣鳴雙劒忽生興我欲因從東去船南昌府志句懷人更作夢千里歸思欲迷雲一灘懷蘭江窗間一榻篆煙碧門外四山秋葉紅贈端師韻語陽秋祖可詩多佳句皆清新可喜徐師川作畫虎行末章云憶昔豫頑少小時先生教誦荆公詩即今老舊無新語尚有廬山祖可師如璧如璧本撫州士人饒節字德操後為僧詩入江西派有倚松老人集墨莊漫録如璧少時曾投書于曾子宣論新法非是不合乃祝髮更名尤長于詩有詠梅云遂教天下無雙色來作人間第一春風味不淺師能改齋漫録饒德操自號倚松道人取間禪詩云云故以名菴又以自號謝無逸劉後村詩話如璧詩輕快似撫州府志僧如璧饒氏臨川人初名節字德操博學能文後之穀城香嚴寺聽智海説法而悟遂落髮陳瑩中與詩云舊時饒措大今日璧頭陀借問安心法儒禪隔幾何先是如璧有偈云間攜經卷倚松立試問客從何處來因號倚松道人寄吕居仁向來相約濟時功大似􅀈伽餉逺空我巳定交朩上座君猶求舊管城公文章不療百年老世事能排雙頰紅好貸夜窗三十刻胡牀趺坐究幡風紫微詩話德操詩蕭散不減潘邠老為僧後詩更髙妙不可及偶成松下柴門晝不開只有蝴蝶雙飛來蜜蜂兩脾大如繭應是山前花又開李太白畫歌先生之氣蓋天下當時流輩退百舍醉中咳唾落珠璣身後聲名滿夷夏青山朩拱三百年今晨乃拜先生畫烏紗之巾白紵袍岸巾攘臂方出遨神遊八極氣自穩冰壺玉斗霜氣髙嗚呼先生態絶倫仙風道骨語甚真蕭然可望不可親懸知野鶴非雞羣天寶之初天子逸先生辭去不肯屈采石江頭明月出鼓栧酣歌志願畢只今遺像粉墨間尚有英風爽毛骨宣州長史粉黛工誰令寫此人中龍細看筆意有俯仰妙處果在阿堵中人云此畫世莫比吳侯得之喜不寐意侯所愛豈徒爾亦惜真才死泥滓先生朽骨如可起誰為獵之奉天子作為文章文聖世千秋萬古誦盛美再拜先生淚如洗振衣濯足吾往矣題宗子趙明叔盤車圖後跌宕平生萬里程盤車一展老心驚溪昏樹老牛爭力似聽當年風雨聲贈道士張謙中道人髭鬚似民部平生篆隸心獨苦世間筆墨一點無駸駸氣象追千古道人得師在何許秦漢鼎彝周石鼓若嶧山碑若詛楚二李而下初不數異時心醉不窺園依繩作直規作圓一朝妙解古人意脫落尺度誠其天嗟君絶藝世無敵勿示時流渠未識我亦當年好古人推席為君三歎息歎息行有序士大夫湛于不義雖窮極富貴君子過之弗顧而況女子失身于委巷容笑之賤亦豈能自拔哉吾友人賦歎息行有謂而作誰人既屬和僕亦擬古樂府為辭傷之于其末開之以正是亦詩人之志也歎息復歎息丹砂為土玉為石誰家女兒妙無敵日日當窗淚霑舄問之何思復何憶深顰欲語語不得回身抱琴不回面清商自寫昭君怨朔風蕭蕭霜月懸萬里胡沙鳴一雁此聲此意太分明猶恐君侯未會情從頭卻欲為君説恐君腸斷君勿聽黃鶴一去已千里雉子髙飛亦能幾人生長短要自裁嗟爾此身今巳矣刺刺促促徒為爾寄夏思道惠示縑帛憶昔南方朩葉下祝融逗留不退舍閭閻未簡卒歲材明月滿門自宜夜而今身在天中央日月寒暑遵故常西風今日我為政冥冥塵沙何可當浮雲倚勢不解事濃隂蔽日釀秋思臥病但知仲卿泣載酒誰問子雲字故人千里知我寒書來遺我帛數端揀絲織作經緯稱長細廣幅尺度寬染人暴練勿設色衣被皎皎識君德以上倚松集題骨觀畫白骨纖纖巧畫眉髑髏楚楚被羅衣手持紈扇空相對笑殺傍觀自不知墨莊漫録答呂居仁寄詩長憶吟時對短檠詩成重改又雞鳴如今老矣無心力口誦君詩繞竹行墨莊漫録此詩居仁甚稱之如琳如琳如璧之僕後為僧梁溪漫志饒節字德操臨川人以文章著名曾子宣丞相禮為上客陳了翁諸公皆與之遊往來襄鄧間始亦有婚宦意遇白崖長老與之語欣然有得嘗令其僕守舍歸見其占對異常怪而問之僕曰守舍無所用心聞鄰寺長老有道價往請一轉語忽覺悟身心泰然無他也德操慨然曰汝能是我乃不能何哉徑往白崖問道八日而悟盡發囊橐與其僕祝髮為浮屠德操名如璧僕名如琳遍參諸方陳了翁關子開兄弟皆以詩稱美之至江浙樂靈隱山川因挂錫琳抱疾德操躬進藥餌既卒盡送終之義後主襄陽天寧夏均父倪為請疏其略云無復挾書更逐康成之後何憂成佛不居靈運之先又云豈惟江左公卿盡傾支遁獨有襄陽耆舊未識道安時稱其精韜光菴訪淵公不值曰琯按此詩又見倚松集紫蕨伸拳筍破梢楊花飛盡緑隂交道人開户不知處黃栗留鳴鵲在巢咸淳臨安志惠嚴惠嚴姓彭氏金溪人出家寶應寺號文惠大師遊廢圃亭榭基猶壯笙歌迹已陳竹分通别徑花發屬南鄰雲散望塵友冰銷炙手人只因忘寵辱到此不傷神宋高僧詩選正覺寺野水痕俱落拏舟日未西斷溝橫略彴支徑入招提方廣原深似竹林境可齊徘徊未能返暝色起前溪撫州府志韓陵陽駒客寓寶應寺每賦詩師從旁諦聽韓曰須吟盡粗惡而後可施鉗鎚自是有能詩聲鄉人李侍郎浩時為中都官朝士問斷溝橫略彴支徑入招提此臨川惠嚴上人詩耶李曰是特虎豹一斑耳法具法具字圓復吳興僧後寂于毗陵馬迹山有化菴湖海集容齋三筆圓復有能詩聲于福州僧智恢處見其詩稿一紙字體效王荆公其詩皆可咀嚼也送僧灘聲嘈嘈雜雨聲舍北舍南春水平拄杖穿花出門去五湖風浪白鷗輕送翁士特朝入羊腸暮鹿頭十三官驛是荆州具車秣馬曉將發寒燭燒殘語未休竹軒二首老竹排簷誰手種山日未斜寒翠重六月散髮葉底眠冷雨斜風頻入夢冬凋峯朩雪縞廬落眼青青卻笑渠花時吹筍排林上吳州還見竹溪圖和子蒼三馬圖從來畫馬稱神妙至今只説江都王將軍曹霸實季仲沙苑丞相猶諸郎龍眠居士善畫馬獨與二子遙相望兩馬駢立真驌驦一馬脫去仍騰驤浣花老人今已亡嗚呼五馬誰平章飽知畫肉亦畫骨妙處不減黃無雙絶句春日燒燈過了客思家獨立衡門數暝鴉燕子未歸梅落盡小窗明月屬梨花以上容齋三筆客中會友愁中有句可消除客裏無人問所須竹屋青燈雨聲冷白頭相對話江湖東山窗中逺看眉黛緑盡是當年歌吹愁鳥語夕陽人不見薔薇花暗小江流以上宋髙僧詩選月夜遊錢唐江小舟為我載月色白沙翠竹光相射自從李白下金陵四百年無此豪逸見攻愧集題默齋在富陽華蓋仙山院道人挂口蒼煙裏萬象無聲忽轉雷老去不知塵世事東風又上屋頭梅咸淳臨安志曇瑩曇瑩嘉禾僧號蘿月善言易洪邁容齋續筆稱為易僧睡起蕙帳煙凝晝掩關落花時節雨闌珊客來驚起還鄉夢繞屋春風緑樹寒姚江沙尾鱗鱗水退潮柳行出沒見漁樵客船自載鐘聲去落日殘僧立寺橋以上宋高僧詩選希雅寄禮導師掩關名自逺鯨浪阻相尋講罷唯澄慮孤峯秪此心柏煙秋榻靜蓮漏夜堂深盡仰鄞江上清風繼道林宋髙僧詩選士圭士圭住溫州龍翔寺觀行上座所作維摩問疾圖道人耽耽癡虎頭瞭然電轉開雙眸枯朩巳死寒巖秋定中霹靂摧四牛起來下筆不能休新詩字字蟠銀鉤發其餘者漫不收散而縱橫為九流我觀此畫真其尤病維摩詰小有瘳文殊大士從之遊彼上人者難對酬兩公文章虎而彪萬古凡馬空驊騮向來曹韓與韋侯筆端亦嘗知此否世間畫本多山丘閲人何翅如傳郵對此可以銷百憂先生胡為吟四愁安上座所作墨梅道人色心淨了見造物根筆端開此花胸中有丘園清香凝暗夜疏枝臥黃昏撞鐘西湖寺見月羅浮村老眼隔煙霧一笑作籬藩以上聲畫集藴常藴常字不輕送空上人過了梨花春亦歸小窗新緑正相宜白頭更作西州夢細雨青燈話别離别蘇養直老去難為别愁邊更著秋碧蘆圍野水落日滿行舟雁斷西風急天寒古寺幽兩鄉無百里能寄短書不以上宋髙僧詩選德葵德葵華亭僧題海慧寺畫水壁君不見昔人十日畫一水摩挲窪窿隨手起若非胸次吞江湖安得波瀾來筆底我來蕭寺觀竒蹤壁間隱隱騰蛟龍初疑乘風馭弱水恍然坐我蓬萊宮又疑去年八月秋水溢隂風襲人廊廡濕誰知畫者巧通神董羽至今羞死筆此水不是畫一水一水一水勢相及對此融神坐終日後人雖畫畫不出何如倒卻毗陵華嚴壁海慧北廊推第一松江府志善勤洛下别同志歲暮逺交朋攜笻背洛城往來興廢地今古别離情疊翠嵩峯色瀉寒伊水聲他年再相會郤訝白髭生宋藝圃集惠日題三女岡白蓮花神佛何由測芬陀陸地興素芳呈玉雪梵剎肇丘陵換額從師霸懸碑自老僧殷勤勸來者期使續千燈至元嘉禾志懷志懷志金華吳氏子遊湘上菴于南嶽石頭二十餘年崇寧初入滅答覺範問住山山中住獨掩柴門無别趣三箇柴頭品字煨不用援毫文彩露萬機俱罷付癡憨蹤迹常容野鹿參不脫麻衣拳作枕幾生夢在緑蘿菴林間録智孜智孜號禪鑑俗姓蕭長汀僧四皓忠義合時難雲林共掩關因秦生白髮為漢出青山不顧金章貴常披鶴氅還如今聖明代髙躅更難攀汀州府志洪駒父見此擊節稱賞法秀法秀字圓通秦州隴城人辛氏子受法無為懷禪師道風峻潔時目為秀鐵面冀國大長公主請師住法雲寺元祐五年説偈而化僧寶傳李伯時工畫馬師呵之曰汝畫馬期人誇以為得妙入馬腹中亦足懼伯時由是絶筆師勸畫觀音像以贖其過黃魯直作豔詞人爭傳之師呵之曰翰墨之妙甘施于此乎魯直笑曰又當置我馬腹中邪師曰汝以豔語動天下人媱心不止馬腹正恐生泥犁中耳頌子誰能一日三梳頭撮得髻根牢便休大抵是他肌骨好不搽紅粉也風流侯鯖録送僧遊嘉禾楚天西首路檇李記曾遊店宿燈懸夢隄行草喚愁玉澄湖水曉畫展囿亭秋小艇枯楊趾重來為繫留翰墨大全普首座普首座蜀僧自號性空菴主别衆一絶船子當年返故鄉沒蹤迹處妙難量真風偏繼知音者鐵笛橫吹作散場羅湖野録普首座參見死心禪師居華亭最久雅好吹鐵笛放曠自樂凡聖莫測亦善為偈句開導人既而欲追船子和尚故事遂于青龍江上乘朩盆張布帆吹鐵笛泛逺而沒懷清懷清號草堂住隆興府泐潭送崇覺空禪師十年聚首龍峯寺一悟真空萬境間此去隨緣且髙隱莫將名字落人間羅湖野録圓禪師圓禪師住湖州甘露寺漁父詞本自瀟湘一釣客自東自西自南北只把孤舟為屋宅無寬窄幕天席地人難測頃聞四海停戈革金門懶去投書策時向灘頭歌月白真髙格浮名浮利誰拘得羅湖野録正勤落葉蕭索下疏林翩翩動客心帶煙浮逺水和露逐飛禽近砌凋將盡前村疊更深年年見衰謝看即二毛侵宋髙僧詩選靈源靈源早參晦堂號清侍者辭張無盡請住豫章觀音寺無地無錐徹骨貧利生深愧乏餘珍鄽中大施門難啓乞與青山養病身羅湖野録黃魯直與興化海老手帖云承觀音虛席上司有意干清兄清兄確欲不行亦甚好蟠桃三千年一熟莫做退花杏子摘卻此事黃龍興化亦當作助道之緣共出一臂莫送人上樹拔卻梯也懷悟懷悟字瑞竹禦溪崔氏子廬山白蓮社晉室陵遲帝紀侵羣英晦迹匡山隂樓煩大士麾麈尾十七髙賢爭扣几才髙孰謂文中龍返使伊人思謝公煙飛露滴玉池空雪蓮蘸影搖秋風樂邦文類昭符秋夕又是聽猿吟如何恨更深每因多病日減卻少年心凍鶴連巖雪愁人半夜砧故園阻兵革消息遣誰尋宋髙僧詩選義了義了字廓然嵩山僧句百年休問幾時好萬事不如明日看許彥周詩話正宗正宗俗姓陳崇仁人居梅山吕居仁曾吉甫韓子蒼寓臨川日宗遊其門有愚丘詩集觀孫司户畫壁若人胸次聞能容書四庫餘地著山川得酒欲飛去摩挲雪色壁吐作無聲句寒屯水際雲瘦立煙中樹雖非桃花源亦自有佳處未休蝸角兵欲問樵蘇路秖恐山中人笑我來何暮次韻蘇堅老秋日登擬峴臺秋容淡薄晚煙孤千里誰開水墨圖欲借扁舟乘興去臥看月影弄風蒲以上宋髙僧詩選招福寺作自顧不材同社櫟乘流得坎便為家體中不快思讀易睡思欲來還煮茶撫州府志泉禪師泉禪師蔣山僧號佛慧叢林謂之泉萬卷送東坡居士腳下曹溪去路通登堂無復問幡風好將鍾阜臨歧句説似當年踏碓翁羅湖野録紹聖元年東坡居士有嶺外之行舟次金陵阻風江滸泉公迎至從容語道東坡以詩紀其事泉公復説偈送行信禪師貽老僧俗臘知多少龐眉擁毳袍看經嫌字小問事愛聲髙曝日終無厭登階漸覺勞自言曾少壯遊嶽兩三遭羅湖野録蘇州定慧信禪師為明眼宗匠此乃其遊戲耳然品題摹寫可謂曲盡矣知和知和崑山張氏子元符間住雪竇題壁竹筧兩三升野水窗前五七片間雲老僧活計只如此留與人間作見聞黃皮裹骨一常僧壞衲蒙頭百慮澄年老懶能頻對客攀蘿又上小崚嶒羅湖野録明州和菴主居雪竇之棲雲菴有志于道者多往見之主者嫉其勝已因郡守周舍人聞其名而問之對曰一常僧耳和題偈于壁徙居杖錫山顯萬顯萬字致一浯溪僧嘗參吕居仁有浯溪集曉發山店蓐食小人家寒燈碎落花雞鳴窗半曉路暗月西斜世故欺懷抱風霜迫歲華劇憐詩思苦悽惻向長沙送炭與湘山西堂惠禪師紛紛向火乞兒多獨有君如擇乳鵝萬煅爐中尋粲可一堆灰裏撥隂何雪欺敗屋間犀柄草臥空庭任雀羅亟送烏薪相暖熱恐隨春夢入南柯以上宋髙僧詩選菴中自題萬松嶺上一間屋老僧半間雲半間三更雲去作行雨回頭方羡老僧間詩人玉屑義帝陵祖龍智昏日月蝕南公力欲麒麟鬬楚雖三户必亡秦盛德宜然有其後魯公背約火咸陽咄嗟聲出羣雄右豆分瓜剖聽指頤忍使黥徒賊孤幼籍也狐埋狐搰之項伯寧不為家寇真人如龍翔霸上縞袒長風起襟袖終據黃圖豈力為雅張赤幟皆天授可憐郴北東上墳恨碧凄紅春不茂蘇仙宅蘇君善養志以孝格神明一朝蛻塵鞅通籍赤霞城相看疑夢寐去若鵝毛輕玉笙墮哀響煙髦錯霓旌丹井愈沈疴橘葉通仙靈至今華屋底想像雙眉青雲裝挹飛袖蘂佩敲風鳴兹事既茫邈無階接蓬瀛掬月潄吟齒餐霞夀頽齡藴真思逺託何從保長生漢武梓棺巧秦皇鮑魚腥空山鶴未歸花發春冥冥郴陽道中草荒驛路欲迷人未見梅花信息真憶著舊家煙雨外犯寒斜放竹籬春曉村寒水碧悠悠雨歇浮雲漫不收且緩晨炊三十里不妨亭午到郴州以上郴州文志圓璣圓璣福州林氏子元祐間住洪州翠巖寺崇寧初住金陵保寧寺答張無盡因續成詩野僧迎客下煙嵐試問如何是翠巖張商英門近洪崖千尺井石橋分水繞松杉璣羅湖野録書壁無學菴中老平生百不能忖思多幸處至老得為僧僧寶傳璣雅自號無學老而書偈于壁云云宣和中詔下髮天下僧尼為德士德女而璣巳化去豈偶然哉惠洪惠洪字覺範俗姓彭筠州人以醫識張天覺大觀中入京乞得祠部牒為僧又往來郭天信之門政和元年張郭得罪覺範決配朱崖有石門文字禪筠溪集天廚禁臠冷齋夜話能改齋漫録洪覺範有上元宿嶽麓寺詩蔡元度夫人王氏荆公女也讀至十分春瘦緣何事一掬鄉心未到家曰此浪子和尚耳龍雨忽起雪浪齋日記覺範詩云巳收一霎挂千巖攧鷂風挂龍雨對攧鷂風皆方言古今人未嘗道又云麗句妙于天下白髙才俊似海東青又云文如水行川氣如春在花皆竒句也舟行書所見剩水殘山慘淡間白鷗無事小舟間箇中著我添圖畫便是華亭落照灣冷齋夜話魯直謂豫曰觀君詩説煙波縹渺處如陸忠州論國政字字坦夷前身非篙師沙户種類耶陳瑩中移家廬山雁蕩天台看不足盡搬兒女寄篷窗往來漳水謀三頃偶愛廬山家九江名節適真如醉白生涯領略似湘龐向來萬事都休理且聽樓鐘咽夜撞與公靈鷲曾聽法遊戲人門知幾生夏口甕中藏畫像孤山月下認歌聲翳消已覺花無蒂礦盡方知珠自明煙柳夕陽殘雨外一番飛絮滿江城冷齋夜話余還自朱崖館于髙安大愚山陳瑩中自台州載其家來漳浦過九江愛廬山因家焉以書督余兼程來余以三日至湓城瑩中曰自此公可禁作詩無益于事余曰敬奉教然余兒時好食肉母使持齋余叩頭乞先飽餐肉一日母許之今日當準食肉例先吟兩詩喜吾二人死而更生如何瑩中許焉詩成瑩中喜而謂余曰此岐山豬肉雖美無多食後三年余客漳水見瑩中姪勝柔自九江來出示余詩余謂勝柔曰公癡叔詩如食鰣魚惟恐遭骨刺與岐山豬肉不可同年而語也余自并州還故里館延福寺寺前有小溪風物類斜川兒童時戲劇之地也春深獨行溪上因作小詩一作筠溪晚望小溪倚春漲攘我釣月灣新晴為不平約束晚見還銀梭時撥刺破碎波中山整鉤背落日一葉嫩紅間崇勝寺後有竹千餘竿獨一根秀出人呼為竹尊者因賦詩髙節長身老不枯平生風骨自清癯愛君修竹為尊者卻笑寒松作大夫未見同參朩上座空餘聽法石於菟戲將秋色分齋鉢抹月批風得飽無能改齋漫録黃太史見之喜因手書此詩故名以顯謁狄梁公廟九江浪黏天氣勢必東下萬山勒回之到此竟傾寫如公廷諍時一快那顧藉君看洗日光正色甚間暇使唐不敢周誰復如公者古祠蒼煙根碧草上屋瓦我來春雨餘瞻歎香火罷一讀老范碑頓塵看奔馬斯文如貫珠字字光照夜整帆更遲留風正不忍挂汪履道家觀所蓄煙雨蘆雁圖西湖漠漠生煙雨浦浦圓沙鳧雁聚今日髙堂素壁間忽見西湖最西浦翩翻兩雁方欲下數隻飄然掠波去獨餘一隻方穩眠有夢不成亦驚顧蕭梢碧蘆秋葉赤青沙白石紛無數我本江湖不繫舟爾輩況亦江湖侣令人便欲尋睿郎呼船深入龍山塢西齋晝臥餘生已無纍古寺寄間房睡足無來客窗空又夕陽叢蕉髙出屋病葉偶飄廊起探風簷立飛蚊閙晚涼贈尼昧上人不著包頭絹能披壞墨衣愧無灌溪辨敢對末山機未肯題紅葉終期老翠微余今倦行役投杖夢煙扉以上石門文字禪送僧古寺間門聊作夏秋來歸思漫迢迢枕中柔櫓驚鄉夢門外秦淮漲夜潮想見舊房生薜荔不堪疏雨滴芭蕉何時卻理緣雲策同上峯頭看石橋夏日山縣蕭條半放衙蓮塘無主自開花三義路口炊煙起白瓦青旗一兩家以上宋高僧詩選惠津句飢殘夷叔丰姿瘦泣盡娥英粉淚乾雙竹天廚禁臠梵崇梵崇字寶之香泉濟大師見過老朩因風時自號杜門春徑長蓬蒿得君過我殊堪喜夜雨不知山月髙夜歸暮策返溪寺松風遵路長水幽聲斷續山暝色蒼茫鐘隱空巖響露滋羣草香歸來人已久華月半虛廊寓居西林一身雖復懶百念勤掃除衆人自紛擾我心常晏如寄兹西林寺適與靜者俱流水響環佩芳林列扶疏時開南面窗煙中認香爐夜梵出逺壑朝雲生坐隅髙眠謝俯仰一食隨鐘魚須知天宇間所在皆我廬何必支上人買山才隱居以上宋髙僧詩選觀燕肅山水憶昨神林口江山此畫同沙鷗輕泛浪浦樹逺含風一舸菰蒲外數峯煙雨中箇中誰得計蓑笠釣魚翁聲畫集春晚春光過眼只須臾榆莢楊花掃地無卻憶菩提湖上寺緑荷擎雨看跳珠合璧事類前集沖邈沖邈政和中崑山詩僧有翠微集翠微山居一池荷葉衣無盡數樹松花食有餘卻被世人知去處更移茅屋作深居玉峯詩纂文坦寒食野步寒食出重闉郊原忽愴神人悲新舊冢花落古今春名位空標史賢愚盡委塵斜陽回首處壠朩噪鴉頻宋藝圃集文興寄雲水禪師百丈傳衣後棲心近沃洲道髙歸毳侣名重逹凝旒對話千峯雪安禪萬朩秋仍聞有新偈時向四方流雲門志略如禪師答嵩禪師道契平生更有誰間卿於我最心知當初未欲成相别恐誤同參一首詩五燈會元宗振宗振丹丘人南康雲居寺首座題壁住在千峯最上層年將耳順任騰騰免教名字挂人齒甘作今朝百拙僧五燈會元克勤克勤住成都昭覺寺紹興初逝賜諡真覺禪師贈思淨律師并序錢唐妙行淨律師具佛種智闡普門方便操鐵石身心作種種殊勝佛事三十餘年矣遐邇信向無論識與不識聞見喻彌陀即傾資樂施比年設百萬僧齋功過半而青溪巨盜寇攘武林淨公化緣自如賊脅以刃色不動緣此革心為斂迹洎宣撫公相統天兵掃蕩妖孽錢唐得清平淨目擊之遂發大心於西湖多寶隩區劖石作當來下生彌勒百尺像俾生靈不待三會龍華先覩慈氏作授記莂之因而以報聖君賢相朝貴濟護黎庶丘山之恩琢石鳩工將就能事山僧適以緣邂逅思溪乃述偈贊庶覽者知淨律師惡境界所不能轉而增廣志願知恩報恩卓卓如此宣和六年三月二十日百萬齋才了正因大緣倐舉只逡巡鑿將瑪瑙一方石鐫作龍華百尺身天竺江山增秀麗西湖風月愈清新色聲不動操能事可是僧中英特人宋妙行寺志顯彬顯彬字守中俗姓周安吉縣人寶梵寺僧新月微光已成魄隱隱夕陽間六幕無人卷一鉤長自間輪隨蟾影長香逐桂枝還三五相將近分明照竹關湖州府志僧印僧印字月江周侯祠將軍手持三尺劒奮身直入蛟龍穴至今魚鱉不敢遊溪流上下皆腥血千年廟食未足酬問之父老何其憂害人白額猶未盡紛紛不獨南山頭宋藝圃集如菴主如菴主天台僧答郡守三十年來住此山郡符何事到林間休將瑣瑣塵寰事換我一生間又間五燈會元小南禪師小南禪師汀州張氏子居廬山之羅漢寺示居士張戒頭戴烏巾著白襴山房借汝一年間出門為説來時路家在黃陂翠靄間羅湖野録思淨思淨錢塘喻氏子好畫阿彌陀佛臻其妙楊無為呼為喻彌陀就北關僦舍飯僧及三百萬移妙行額為寺鐫西湖多寶山石為佛像紹興七年趺坐逝答或問平生只解念彌陀不解參禪可奈何但得五湖風月在太平何用動干戈西湖髙僧事略懷深懷深夀春夏氏子靖康間住靈巖堯峯院號慈受禪師中秋賞月寄髙峯璝老靈岫髙峯咫尺間青松長伴白雲間今宵共賞中秋月莫道山家不往還中吳紀聞堯峯院山居十詠存六首清輝軒湛湛平湖浸月明漁歌吹斷曉風清壞衣蒙頂跏趺坐不稱詩情稱道情碧玉沼深靜含秋一鑑寬清甘聊酌齒牙寒靈巖自笑窮山骨明月泉慳只欲乾多境巖聊向蒼藤挂六環滿莎嘉致伴幽間雙眸淨洗看不厭欲結遮頭草一間觀音巖笑日野花青嶂下歌春幽鳥白雲間寶陀大士全身露懊惱遊人空看山東齋禪板蒲團消永日明窗淨几映疏筠一爐香盡六時過轉覺山家氣味真西隱匿隱長嫌山未深閉門莫放俗塵侵如今滿眼事奔走欲向何人話此心以上吳郡志慧梵慧梵字竺卿住崇德羔羊村澄寂院有蓬居集太湖黃蘆一股水翠竹兩三家落日聞雞犬荆榛一徑斜宋髙僧詩選天目僧以下無名釋子答贊寧山中人事違天眼中修定自注天目一名天眼我本無根株只將筍為命筍譜村寺僧蒸豚觜長毛短淺含臕久向山中食藥苗蒸處已將蕉葉裹熟時兼用杏漿澆紅鮮雅稱金盤飣軟熟真堪玉筯挑若把羶根來比並羶根只合喫藤條東坡志林王中令既平蜀捕逐餘寇與步隊相逺飢甚入一村寺中主僧醉甚箕踞公怒欲斬之僧應對不懼公竒而赦之問求蔬食僧云有肉無蔬公益竒之餽以一蒸豬頭食之甚美公喜問僧止能飲酒食肉耶抑有他技也僧自言能詩公令賦蒸豚援筆立成詩云云公大喜與紫衣賜號朱池寺僧絶句孤燈寂寂夜堂深寒雨蕭蕭響竹林大抵浮生只如此不須哀怨動悲吟李希聲詩話余往歲侍親睦州夀昌縣朱池寺僧卒方數日弟子出卒前一日手寫頌云云字甚端謹斯亦異矣蜀僧題東明寺三十年前鎮益州紫泥丹詔鳳池遊大鈞播物心難一六印懸腰老未休佐主不能如傅説知幾那得似留侯功名富貴今何在寂寂招提土一丘梁溪漫志蔡元長南遷道出長沙卒于城南五里東明寺遂草殯于寺之觀音殿後有蜀僧遊方過之慨然因題詩于壁云云湘僧題能仁寺寺在重雲裏秋深夢轉勞檻前雙澗急門外一峯髙谷鳥翻新樂巖松起暮濤何時拂衣去攲枕聽蕭騷南嶽總勝集宋詩紀事卷九十二
