body:
  text: 宋詩紀事卷三十八錢塘厲鶚撰毛友友初名友龍字逹可三衢人大觀元年進士政和閒由翰林學士禮部尚書出守鄉郡有爛柯集寄顯之太尉使燕山三年淮海靜妖氛老上龍庭又勒勳塞外爭看真太尉行間猶識舊將軍塵清漠北烽煙斷風落山前號令聞預想歸時如定遠爭持白玉上青雲合璧事類前集盧襄襄三衢人舊名天驥字駿元徽宗朝避天字改名襄字贊元大觀元年進士政和六年以朝散郎出為浙東提刑捕盜入剡靖康閒拜吏部侍郎推冊張邦昌建炎初安置衡州庚溪詩話贊元詩篇極多向嘗得其數十首皆清拔可喜後因兵火失之尚記其贈鼓琴者曰試將鍾子山水意一洗退之冰炭腸恨失其全篇遊南巖山不著烏紗只岸巾尋山還得愛山人半空飛雨侵衣潤入座晴嵐照眼新風過松杉猶藴藉雪消巖壑更精神何時亦把任公釣坐釣日東橫海鱗剡溪愁呵龜手冷搖鞭乘興來登訪戴船解事篙師小鳴櫓恐驚寒雁入晴天隱天閣在嵊縣下鹿苑寺欲結愛山人共了尋山債未有買山錢愁聞有山賣小雨溼春風倦雲遮落日不若叫風來吹雲放山出一眼吞萬山寸心貯千里何日上歸舟教人問春水殘雪領春來疏鐘驚夢去尚憶去年愁孤舟繫江樹瑞香花入夢生香酒力微不須金鴨䙚孤馡為嫌淡白非真色故著仙家紫道衣登玉虹亭在下鹿苑寺飢鼯愁玃號窮冬層巒秀壁撐晴空閒拖老藤借餘力來看霜巖飛怒虹小奚催呼老款段瀹鼎篝火烹團龍餘甘入口齒頰爽兩腋便欲生清風悠然千里隨眼界金箆刮膜開雙瞳乃知足力不到處别有天地生壺中國恩欲報已華髮征車未去先晨鐘玉川乘雲紫皇家謫仙騎鯨河伯宫聊追二子歸禹穴碧空轉首山重重遊定林寺寒旌隱隱入花村小雨初收水帶昏不憚山城尋寺去只將詩思與僧論菱侵水步深藏艇栁暗人家半掩門莫厭禪居蕭冷甚此來一為訪溪蓀上鹿苑寺鷲峯遊屐少我獨往多時僧護翻經石猿攀嘯月枝地寒春到晚山逺夢歸遲尚被浮雲誤吾心信是癡以上剡録途中書懷寄奉化知縣自戴淵明漉酒巾食鮭甘作庾郎貧雖無殘菊簪華髮賴有青山似故人幾處鴉鳴牛背雨經年衣犯馬蹄塵待攜神武朝衫去還我烟溪潄石身乾道四明圖經春興雪花初著鴛鴦瓦疊嶂疏林入圖畫春工不作兩樣心盡遣根荄赴陶冶我昔年少曽買春著盡榆錢不多價春應索價來覓人客氣今猶不相下待領春風歸去家家山卻有療愁花鄰公大段作春計小囿栽花今數世但憎赤腳婢惱人要逐了鬟同拾翠合璧事類前集窗外梅花已消殘雪豆秸灰斜壓疏籬一半開雖我故園無分看問渠春色幾時來冷香漸欲熏詩夢落蘂猶能韻砌臺定復水邊多屐齒試令長鬛視蒼苔瀛奎律髓詩見曽慥百家選酴醿花九言天將花王國豔殿春色酴醿洗妝素頰相追陪絶勝濃英綴枝不韻李堪友橫斜照水攙先梅瑶池董雙成浴香肌露竹林嵇叔夜醉玉山頽風流何事不入錦囊句清和天氣直挽青陽回詩話補遺桐君祠作招仙詞桐君歸來兮仙馭逺遊將何之寧不欲朝玉京兮升紫微戴日月之冠兮披紫霞之衣佩蒼精之龍兮餐玉田之芝友王喬與蕭史兮儼霓旌玉佩而葳蕤何如歸來猿鶴慘兮怨空山澗壑寂兮松桂閒胡不拂袖烟幌兮開雲關藉芳草兮歌幽蘭庶乎遊山之人可以往還招隱有玉人兮山之隅騎蒼龍兮歌步虛薜荔衣兮女蘿裾餐瓊蘂兮披玉書朝玉皇兮遊上都劈麟脯兮邀麻姑胡不捨此而來兮吾與俱以上宋藝圃集宇文虛中虛中字叔通益州廣都人大觀二年進士建炎初以資政殿學士充祈請使留金為翰林學士紹興中謀劫金主事泄全家皆死淳熙初贈開府儀同三司諡肅愍在金日作三首滿腹詩書漫古今頻年流落易傷心南冠終日囚軍府北雁何時到上林開口摧頽空抱朴脅肩奔走尚腰金莫邪利劒今安在不斬姦邪恨最深遙夜沈沈滿幕霜有時歸夢到家鄉傳聞巳築西河館自許能肥北海羊回首兩朝俱草莽馳心萬里絶農桑人生一死渾閒事裂眥穿胸不汝忘不堪垂老尚蹉跎有口無辭可奈何强食小兒猶解事學妝嬌女最憐他故衾愧見霑秋雨短褐寧忘拆海波倚杖循環如可待未愁來日苦無多北窗炙輠云宇文虛中在金作三詩所謂人生一死渾閒事云云豈李陵所謂欲一效范蠡曹沫之事後虛中仕金為國師遂得其柄令南北講和大母獲歸往往皆其力也近傳本年八月中果欲行范蠡曹沫事欲挾淵聖以歸前五日為人告變虛中覺有警急發兵直至金主帳下金主幾不能脫遂為所擒嗚呼痛哉實紹興乙丑也審如是始不負太學讀書耳吳敏敏字元中真州人大觀二年辟雍私試首選擢浙東學事司幹官蔡京薦充館職欽宗即位知樞密院事拜少宰謫涪州安置紹興初復為廣西宣撫使卒三朝北盟㑹編吳敏儀真人妙齡秀發政和初上庠試書義有聲蔡京愛其丰韻粹美欲以女妻之元中辭焉釋褐授浙東學事司幹官除館職擢記注西掖時年二十七玉立鴛鷺行中一時歆豔敏有侍兒曰逺山美姿色通文理敏每為文使供筆硯之役一日有訪敏者敏方據案運筆逺山者方磨墨拂紙時服其風流如此題山光寺壁上墨竹緑髮青衫舊竹君墨卿揮拂更清新斷枝活葉風蕭瑟想見凌雲百尺身聲畫集句醉中擲筆金鑾殿睡起鳴笳鐵甕城贈王逹可自翰苑出知鎮江耆舊續聞先生古人風文字祖西漢不令萬錢食亦合五花判贈吳正仲苕溪漁隱叢話李邦彥邦彥字士美懷州人大觀二年釋褐第一宣和中纍遷尚書左丞拜少宰靖康初特進太宰門下侍郎兼神霄宫使建炎初責潯州安置三朝北盟㑹編邦彥性俊爽喜閭閻鄙猥事自號為李浪子每以市井鄙俚之語綴成小詞喧傳里巷邦彥嘗自言賞盡天下花踢盡天下毬作盡天下官都人亦呼之為浪子宰相黃陵廟蒼梧杳靄迷遐躅晚雲愁入修眉緑薰風不動五弦空清血斑斑在山竹長沙府志劉才邵才邵字美中廬陵人大觀二年上舍釋褐宣和閒仕至尚書有檆溪居士集紀夢北風吹雲肅天宇蕙帳寒生月當戶頽然就枕睡思濃夢魂悠悠迷處所仙君勝士肻見臨促席從容款陪語自言本事清靈君學佛求仙兩無阻雲軿白日降瑶空天衣飄飄袖輕舉方諸宫深雲海闊金碧禪房隔烟雨與君初有香火緣聊復東來相勞苦方遊崑閬還無期君住世閒須善為塵勞足厭何足厭等是實相夫何疑前身似是塵外人端為世緣縻此身重聞妙語發深省若更離塵佛亦塵方平羽節何時來道宫佛殿隨塵埃未須苦說揚塵事東海波聲政似雷獨醒雜志劉尚書美中嘗夜夢與一方士談禪往復辨論宗乘中事甚詳因問之曰仙家亦談佛耶方士曰仙佛雖二理豈有二哉美中既寤頗異其事遂紀以詩詩中皆其閒問答之語夜度娘歌菱花炯炯垂鸞結懶學宫妝勻膩雪風吹涼鬢影蕭蕭一抹疏雲對斜月詩話補遺賈安宅安宅字居仁烏程人收之從孫大觀三年進士第一纍遷戶部侍郎建炎初為給事中苕溪廣苕山下有深源發此清流去不渾直抵太湖三百里滔滔分入海天門湖州府志王珩珩字彥楚鄞人說之子大觀三年進士官宗正少卿夢中作杖屨步斜暉烟村景物宜溪深水馬健霜重橘奴肥舂罷雞爭黍人行犬吠籬可憐田舍子理亂不曾知西溪叢話和潘良貴題明州三江亭韻潘郎未覺鬢毛侵佳致乘閒得得尋古岸渺茫分遠渡飛甍虛敞快人心融樽想見頻頽玉季諾由來雅勝金野老固慚東閣客何妨同作醉翁吟延祐四明志倪濤濤字巨濟永嘉人徙居廣德軍大觀三年進士歷左司員外郎貶監朝城縣酒稅有玉溪集偶訪吉甫畫三蠅壁閒吉甫有詩次韻何人刻獼猴老眼覷荆棘不如丹青手快意風雨疾我窮坐詩豪九鼎扛筆力偶然一㸃汚著紙生羽翼千言走蚍蜉寧為寸紙逼還當寫君詩什襲同藏羃畫繼次韻毛達可給事秋懷念歸結茅遠人村破屋水半扉涼葉墮清響空山轉斜暉微官臥江漢素心久依依十年天涯秋搖落幾芳菲馬蹄歲月去夢蝶東南飛平生立壑志有言輒乖違不如孤征鴻春風自知歸宋文鑑七夕玉殿憑肩共語時風清月墜有誰知梧桐秋雨三山遠始信生前有别離錦繡萬花谷章夏夏字彥明寧國人大觀三年進士歷潭州通判有湘潭集夕陽洞暖憑磴蘚坐䕃覓喬松倚一詣雲屋深猿鶴頗相喜霜髯白紛紛謂我作黃綺碧雲洞褰裳踏寒流路險仰復傴崖根乳積雪石脈泉澑雨融結知何年人閒閲今古以上寧國府志余安行安行字勉仲德興人纍舉不第以經學稱有石月老人集龍游舟中遇立冬大觀戊子同應求至京口豫赴試南京挂帆朝發龍游浦天寒正下瀟瀟雨聞道人間今日冬連檣處處歡相語我今與汝共孤舟寂寞舟中任水流人生自適乃為樂莫把閒腸生寸愁古今歲時雜詠張正已上元口號繡車簫鼓動香街鐵鎖龜城度曉開仙鳳傳香留蜀國夜龍銜燭上蓬萊月如流水隨天遠人似夭桃出洞來無限風光追不盡只驚信馬到瑤臺古今歲時雜咏白子儀暑伏偶書呈端祖抑之歲時三伏每相乘雨汗居人困不勝況是五弦均長養何須六幕苦炎蒸中乾願沃仙盤露上賜堪加凌室冰安得天風吹煩溽釋然羣動返清澄古今歲時雜詠楊齊寒食野外寒食人家事踏青偶驅羸馬出郊坰禽聲喚雨嬌相詫天色和春困不醒芳草碧來絲作毯好花紅處錦為屏回頭畫角江城晚人倚鞦韆月半庭古今歲時雜詠孫覿覿字仲益晋陵人大觀三年進士政和四年中詞科髙宗朝仕至戶部尚書提舉鴻慶宫有鴻慶集韻語陽秋東坡歸宜興道由無錫洛社嘗至孫仲益家時仲益年在髫齔坡曰孺子習何藝孫曰學屬對坡曰衡門稚子璠璵器孫應聲曰翰苑仙人錦繡腸坡撫其背曰真璠璵器也異日不凡中痛定録前此上在青城齊宫無聊何㮚吕本奏宜賦詩以遣興乃以孫覿汪藻應制上詩用時字韻覿詩曰噬臍有愧平燕日嘗膽無忘在莒時藻詩曰虜悵夢回驚日處都城心切望雲時有以此逹帥酋因托此為名遂遲留車駕楓橋三絶白首重來一夢中青山不改舊時容烏啼月落橋邊寺敧枕猶聞半夜鐘翠木蒼藤一兩家門依老桞抱溪斜古城流水參差是不見吳都舊日花三年瘴海臥炎宵夢隔青楓一水遙萬里歸來悲故物銅駝埋沒草齊腰宜春臺聞說宜春好層臺試一登隴泉悲瑟瑟松雪見層層孤絶烟中寺微茫樹下僧詩工傳寫妙不數畫師能棲霞洞飛仙巢三山弱水環四溟誰知黃茅嶺自有白玉京獨曳一枝筇梯空上青冥蟾飛墮八桂石隕化七星幽幽炬火然異狀不可名垂天紫雲蓋插地翠羽屏已無俗士駕尚有遷客經敢言居夷陋妙絶冠平生龍隱巖跳波觸石喧古木抱崖擁老蛟厭泥蟠一笑作潭洞孤峯起􅍶崒哀壑浩呼洶腥風噤蛙淫凍雨落毛氄凛凛白晝寒瘴髮立盡聳旱氣曛日黃縮爪但隂拱悠然四大海斂此一毛孔安得化為霖蕙葉有光寵以上鴻慶集題洞庭山觀音院德雲堂千丈銀山屹嵩華浪湧雲屯天一罅榜舟夜並黿鼉窟杖藜曉入雞豚社處處人家橘柚垂竹籬茅屋青黃亞牛羊出沒怪石走蛟龍起伏蒼藤挂樓殿青紅隱半山兩腋清風䇿髙駕飢鼠窺燈佛帳寒華鯨吼粥僧趺下世味久諳真嚼蠟老境得閒如噉蔗山靈知我欲歸耕一夜築垣應繞舍吳郡志胡舜陟舜陟字汝明自號三山老人績溪人大觀三年進士髙宗朝歷官徽猷閣待制廣西經略使封績溪伯忤秦檜死于獄有集泛歙溪用老杜詩青惜峯巒過為韻港淨千尋碧峯回兩岸青鷺飛煙漠漠猿嘯雨冥冥雞犬聞聲地雲霞蔽隱扃桃源疑此是時復問漁舲溪山美有餘自古神仙宅築室隱宣平題詩來李白至今負薪人聞是餐霞客不向此尋真飄蓬端可惜萬山回合處蔥鬱釣臺峯道義髙千古簞瓢敵萬鍾羊裘甘寂寞鳳闕肻從容勿謂狂奴態清風激懦庸草木紛紛落江山正薄寒雲藏桐子宅波急沈郎灘回首家林遠多愁革帶寬青楓知客恨塗血㸃林巒觀山如走馬倐忽千尋過水從雲際來舟疑天上坐羇旅猿失羣往復蟻旋磨五韻寫中腸悲詞成楚些苕溪渙隱叢話先君平日尤喜作詩手校老杜集所正舛誤甚多句法暮年深得其意味秉燭賞梅花蠟烟青繞雪培堆神女疑乘香霧來綽約仙姿明醉眼橫斜疏影入尊罍題秋香亭騷人足竒思香草比君子况此霜下傑清芬絶蘭茝氣禀金行秀德備黃中美古來鶴髮翁餐英飲其水但恐蓬藋傷課童加料理苕溪漁隱叢話菊以黃為正此朱遜之之語東坡印可作詩贈之有識真似淵明之句余頃歲居泗上假館官舍小圃中有一亭榜曰秋香環植以黃菊别無他物必好事者原東坡之意而作之也先君題詩云云附録于此句含桃紅紫鶯聲老宿麥青黃燕子飛苕溪漁隱叢話左譽譽字與言天台人大觀三年進士仕終湖州通判玉照新志左與言天台名士也錢唐幕府樂籍有名姝張穠者色藝妙天下君頗顧之如盈盈秋水淡淡春山及帷雲剪水滴粉搓酥皆為穠作當時都人有曉風殘月栁三變滴粉搓酥左與言之對俶擾之後穠委身于立勳大將家易姓章疏封大國紹興中覓官行闕暇日訪西湖兩山閒忽逢車輿甚盛中覩一麗人褰簾顧君而顰曰如今若把菱花照猶恐相逢是夢中視之乃穠也君醒然悟入即拂衣東渡一意空門洞霄宫青山九鎖溪回縈擎天一柱何崢嶸上同天目映寥廓下開大滌通滄溟晋唐人物久寂寞天台石室蒼苔生虛皇臺髙步虛冷仙科玉音神所聽自憐學道二十年此心久與青山盟朅來奉祠此山下愧無妙句如丹青木公金母吾未識且待松根生茯苓洞霄詩集晏敦復敦復字景初殊曾孫大觀三年進士髙宗朝纍官權吏部尚書兼江淮等路經制使以寶文閣學士出知衢州提舉亳州明道宫封臨淄侯卒題梵隱院方丈梅在定海縣亞檻傾簷一古梅幾番有意喚春回吹香自許仙人下照影還容高士來月射寒光侵澗戶風搖翠色鎖階苔遊蜂野蝶休相顧本性由來不染埃寧波府志沈汝諧汝諧杭州人大觀三年進士官金部臨平山山勢分明飲水駝孤峯西轉鬱嵯峨不須探問山童藥且揖朝來爽氣多咸淳臨安志李彌遜彌遜字似之連江人居吳縣大觀三年進士髙宗朝試中書舍人再試戶部侍郎以爭和議忤秦檜乞歸田隱連江西山有筠溪集樓大防序云公以力闢和議歸隱西山凡十六年不復有仕宦意詠詩自娛筆力愈偉宿觀妙堂遇雨既度復回一日竟遊九曲而行賦詩二首堂在武夷山沖佑觀人閒何地寄衰翁偶到神仙一葦中可是仙居謝逋客船頭無處避剛風渡口回舟未忍移淨坊聽雨坐題詩餘齡儻有尋真路試與披雲問鳳兒朱子跋云觀妙堂東楹李公侍郎遺墨語意清婉字畫端徑至其下輒諷玩不能去然歲久剝裂又適當供帳處後數十年當不復可讀矣别為模刻授道士使陷置壁閒庶幾來者得以想見前輩風度李公諱某時以力抵和議出守臨漳云慶元乙邜正月新安朱某謹奉書次韻仲輔山中之作崖隂坐清暝目為山光注妙意不可名悠然與心晤疏泉石中鳴落葉衣上住冷風起虛籟還向無中去三生聽鐘魚偶失來時步佛屋倚秋風團團兩桂樹郤疑此境中曽是經行處同天隱少章遊嵩山懷元明秦公我輩士早踏翰墨場萬言若投石十年猶枯囊苦欲泛江海有親在高堂牢落京華春門無一壺漿長鞭䇿瘦馬送我古道傍憐我值險艱赤心寫摧傷鏗鏘五字句勢與鵰鶚翔感此坐矯首星星鬢成蒼西風小搖落雨洗烟嵐光嶂晚露孤秀野隂棲暗芳更攜鮑謝流履盡千巖霜搜竒得幽深訪古到森茫月落潭影空清吟殊未央緬懷紫芝宇百憂繞回腸三歎已晡食十起中夜牀雲埋長安日魂夢不敢驤茂苑富山水結廬余所嘗我欲放船下卜鄰俯滄浪耦耕種秫田共掃三徑荒頭白青山裏長歌樂歲觴題趙幹江行初雪圖瓜步西頭水拍天白鷗波上寄長年箇中認得江南手十里黃蘆雪打船自大寧泛舟還涇川岸梢濃染一溪青山影歸舟落葉輕欲學漁郎揚綸手雨蓑月笛了平生以上筠溪集李元亮元亮字光祿建昌人山房公擇尚書族子大觀中以箋啓為蔡薿所賞登貢士科句人閒知書永花落見春深朝雨未休還暮雨臘寒才過又春寒容齊三筆趙企企字循道大觀閒宰績溪重和初台州倅髙齊詩話趙企循道以長短句得名所為詩亦工恨不多見嘗記其警句云愁從竹葉杯中去老向菱花鏡裏來幾夜巳生蝴蝶夢三生辜負鷓鴣斑青銅不覽一兩日白髮巳添三四莖苕溪漁隱叢話循道宰豫桑梓之邦因此傳録得循道詩多大率體格全學白樂天故句語皆平易如青燈影冷棊三戰紅火爐溫酒一杯千山來不斷一水去無窮餘不及此者亦多顯孝南山寺背日西來眼界明隔溪遙見梵王城旌旗夾道蔽山影笳鼓入林聞谷聲青鳥向人疑有意白雲迎客亦多情夕陽臨水共歸去明日紛紛塵事生赤城志泛舟晚出北關舟泛官塘靜人歸一葉閒影疏行處桞青逺望中山道在身從老詩窮意覺閒到家秋斂足有謂掩柴關秋日泛西湖湖光山色共爭秋一㸃塵埃無覓處沈沈水底見青天畫舸直疑天上去以上咸淳臨安志王震震開封人定國之姪大觀閒知蔡州雪未送餘寒歸嶰谷先傳春信到花叢侵凌竹色回新緑㸃注梅梢破小紅後村千家詩鄭滋滋大觀中臨晉縣主簿遊王官谷大廈將顚仆一木安能支唐室既頽齧有才何所施表聖隱王官出處適其宜藩鎮方跋扈擁兵相雄雌尾大不可掉綱紀日凌夷雖云務姑息要求無定期當此誰為援欲進速禍基優遊向泉石琴酒聊自資休休復莫莫終永忘所規著史以見志迂闊從人嗤風馭去不返幽谷空遺祠名與前峯髙挺挺為表儀潔與飛瀑並濁流應忸怩方今重完節裦封來非遲發揚在守土抗章無愧辭庶幾慰精爽光輝于盛時大觀初家府君簿臨晉嘗留詩于祠堂意以表聖之髙名清節暴白于世而風采為可仰也謹摹諸石庶永來觀政和戊戌八月望男從事郎虞鄉縣令師甫題王官谷集莫儔儔字壽朋湖州人政和二年進士第一靖康初為翰林學士使金留仕僞楚建炎初竄全州遊破山興福寺久聞勝地有蓮宫乘興來遊仗瘦筇庭老樛枝翠瓔珞池生並蒂玉芙蓉飛仙何意來題柱開㵎當年想鬬龍歸騎回看樓閣處雲深隱隱度疏鐘蘇州府志談知柔知柔字勝仲金壇人政和二年進士通判邵州終祕書少監有華陽居士集晚醉口占晚醉扶筇過竹村數家殘雪擁籬根風前有恨梅千㸃沙上無人月一痕苕溪漁隱叢話此即吳可晚春詩易其題改詩中三四字而巳絶句漫言無處覓歸田江北江南水拍天抖擻十年塵土夢秋風吹上釣魚船同上初夏麥隴風來翠浪浮霏微小雨似深秋野亭終日卷簾坐清樾對啼黃栗留事文類聚前集趙野野開封人政和二年進士歷中書舍人翰林學士拜尚書左丞靖康初為門下侍郎責卲州安置建炎初復起知密州盜賊充斥野棄城去軍校杜彥作亂追歸殺之句復道密通繁衍宅諸王誰似鄆王賢宣和春帖子波雜志清辛次膺次膺字起季萊州人政和二年進士南渡寓家浮梁孝宗朝纍官同知樞密院事資政殿學士提舉洞霄宫題使宅眉壽堂多病相如欲倦遊四年紆綬到三州君恩乞與歸巖壑何啻將軍得罷休淳熙三山志翁彥約彥約字行簡崇安人政和二年進士纍遷太常博士提舉河北西路學事除知髙郵軍毛竹洞毛竹連雲路欲迷洞門深鎖落花遲曾孫幾度春風老未了仙人一局棊建寧府志羅汝楫汝楫字彥濟歙縣人政和二年進士髙宗朝仕至吏部尚書龍圖閣學士封新安郡開國侯卒贈少師有東山稿謁蘇仙祠絳節回白馬青書收赤龍仙人在何許烟霞鎖晴峯荒祠冠其嶺千古凛靈蹤粉堵塵網懸石凹苔錢重我來款遺像再拜䖍且恭檀烟泄雲白茗粥浮新濃世事非所期真遊誓相從雲軺幾時來微風韻寒松郴州文志李綱綱字伯紀邵武人政和二年進士靖康初歷尚書右丞髙宗即位纍官尚書左僕射兼門下侍郎落職鄂州居住紹興中除觀文殿學士湖廣宣撫使知潭州卒贈少師孝宗朝賜諡忠定有梁溪集張南仲置酒心淵堂值雨自别西湖日置懷郤因謫宦得重來雲深不見孤山寺風急難乘搖碧齊未放幽情窮水石且將離恨泛樽罍勝遊須遍山南北何日晴天為一開登鍾山謁寶公塔寶公真至人鳥爪金色身杖攜刀尺拂語隱齊梁陳我登鍾山頂白塔髙嶙峋再拜禮雙足聊結香火因恭被詔書裦贈陳公少陽忠義痛感有作哀痛綸音灑帝章賜金贈秩喜非常無心聖主如天地著意奸臣極虎狼忠血他年應化碧英魂今日已生光先生憤悶誠昭雪九死南遷豈自傷平昔初無半面交危言幾辨蓋寬饒幽冥我已慚良友忠憤誰能念本朝故國遙看雲杳杳新阡何處草蕭蕭撫孤未遂山濤志誰繼離騷賦大招晞真館詩并序余今夏夢乘舟亂石閒四顧峯巒竒秀有如玉色者覺頗異之及謫官劒浦道武夷山小舟泝流水落石出遍覽勝槩至晞真館雪作巖石皆白恍如舊遊然後信出處之分定而斯遊之清絶已先兆于夢寐雖欲不到不可得也作小詩以紀其事清夢先曾到武夷玉峯積雪倍幽竒小舟遊罷尋歸路恰似翛然夢覺時奉寄吕丞相元直出擁雕戈入衮衣江城重詠我公歸手扶日月還黃道足履星辰上紫微已集羣英熙帝載好施長䇿復邦畿海濵病叟無他望側耳天聲暢國威以上梁溪集李正民正民字方叔揚州人定之孫政和二年進士髙宗朝歷官中書舍人徽猷閣待制流寓海鹽海月亭新亭注目了無邊脫屣塵寰思杳然萬頃秋濤翻浩渺一輪明月對虛圓光生雲漢疑無地望斷蓬萊别有天赤水棗花君莫問新詩賡唱似朱弦嘉興府志胡松年松年字茂老海州懷仁人政和二年上舍釋褐纍遷中書舍人髙宗朝拜吏部尚書權參知政事提舉洞霄宫題觀音院德雲堂并序余罷自平江謀居霅川過洞庭西山暫寓觀音院德雲堂坐揖湖山勝槩亦足以少洗簿書役矣數年兵火之禍何所不至獨此地清涼安穩豈非林屋洞天金庭玉柱為神仙窟宅有物常護持耶余願挂冠終老此閒也小舟乘風飛鳥過萬頃雲濤縱掀簸此行要是快平生無數青山笑迎我山根隱約見人家槿籬茅屋埋烟霞宛似秦人種桃處川原逺近紛香葩杖藜徑踏華山去試問蓮開今何許路迷絶壑䕃松筠身到半山聽魚鼓道人為我開雲堂是中境界渾清涼幽磬時和野鳥語飛泉暗瀉巖花香文書照眼本吾事雁鶩著行敗人意造物似憐塵世囂挈置湖山煩一洗何人夜呼隱去來向來得喪真山崖金庭玉柱永不改人閒劫火空飛灰吳郡志汪思溫思溫字汝直鄞人政和二年以太學上舍中乙科歷官知臨安府直顯謨閣以壽終和潘良貴題明州三江亭韻危亭聳觀與雲侵勝槩何勞杖履尋回合江山真有意去來鷗鷺本無心歡聲洋溢均千里好句清新抵萬金四海正須經濟手豈容長對白頭吟延祐四明志楊景政和二年三月草四日鄜延帥府大閲即席呈獻帥座賈公凱歌十首存三旌旗風暖揚春暉的皪寒光照鐵衣壯士銜枚聽傳令邊鴻敢傍陳雲飛奏罷清笳聽凱歌行營細桞拂雕戈征人盡道從軍樂城上黃雲喜氣多天兵十萬擁貔貅紫塞年年大有秋不是頡羌求款附為君唾手取靈州吳禮部詩話陳公輔公輔字國佐臨海人政和三年上舍及第髙宗朝官至禮部侍郎出知處州轉徽猷閣待制提舉江州太平觀李伯紀丞相挽詩豪傑不世出為時斯閒生有心安社稷無計避功名憂國唯知重謀身秖覺輕徒令青史上永永著英聲梁溪集附廣慈院來時膏雨迷新野去日薰風吹舊林寄語主人休惜别白雲南北本無心台州府志陳與義與義字去非洛人一云汝州葉縣人登政和三年上舍甲科紹興中歷中書舍人拜翰林學士知制誥尋參知政事提舉洞霄宫有簡齊集苕溪漁隱叢話陳去非詩平淡有工如疏疏一簾雨淡淡滿枝花官裏簿書何日了樓頭風雨見秋來客子光隂詩卷裏杏花消息雨聲中詩鶴林玉露自陳黃之後詩人無逾陳簡齊其繇簡古而發穠纖遭值靖康之亂﨑嶇流落感時恨别頗有一飯不忘君之意如凉風又落南宫木老雁孤鳴漢北州乾坤萬事集雙鬢臣子一謫今五年天翻地覆傷春色齒豁頭童祝聖時近得㑹稽消息不稍傳荆渚路岐寬東南鬼火成何事終藉胡銓作諍臣龍沙此日西風冷誰折黃花壽兩宫皆可味也起一種則波瀾富劉後村詩話元祐後詩人迭而句律疏一種則煅煉精而情性逺要之不出蘇黃二體而已及簡齊出始以老杜為師墨梅之類尚是少作建炎以後避地湖嶠行路萬里詩益竒壯元日云後飲屠蘇驚已老長乘舴艋竟安歸除夕云多事鬢毛隨節換盡情燈火向人明嶽陽樓云登臨吳蜀橫分地徙倚湖山欲暮時又云乾坤萬事集雙鬢臣子一謫今五年聞德音云自古安危關政事隨時憂喜到樵漁五言云泊舟華容縣湖水終夜明凄然不能寐左右菰蒲聲窮途事多違勝處心亦驚三更螢火閙萬里天河橫腐儒憂平世况復值甲兵終焉無寸䇿白髮滿頭生造次不忘憂愛以簡嚴掃繁縟以雄渾代尖巧第其品格當在諸家之上題唐希雅畫寒江圖江頭雲黃天醞雪樹枝慘慘凍欲折耐寒野鴨不知歸猶向沙邊㺯羽衣黃茅終日不自力影亂弱藻相因依唯有蒼石如卧虎不受隂晴與寒暑舟中過客莫敢侮閒伴長江了今古為陳介然題持約畫層層水落白灘生萬里征鴻小作程日暮微風過荷葉陂南陂北聽秋聲夏日偕五同舍集葆真宫池上避暑取緑隂生晝靜分韻賦詩得靜字清池不受暑幽討起豫病長安車轍邊有此萬荷柄是身唯可懶共寄無盡興魚遊水底涼鳥語林閒靜談餘日亭午樹影一時正清風不負客意重百金贈聊將兩鬢蓬起照千丈鏡微波喜搖人小立待其定梁王今何許桞色幾衰盛人生行樂耳詩律巳其賸邂逅一尊酒他年五君詠重期踏月來夜半嘯烟艇容齊四筆自崇寧以來時相不許士大夫讀史作詩何清源至于修入令式政和後稍復為之而陳去非遂以墨梅絶句擢置館閣其葆真避暑詩詩成出示坐上皆詫為擅場朱新仲時親見之云京師無人不傳寫也墨梅粲粲江南萬玉妃别來幾度見春歸相逢京洛渾依舊唯恨緇塵染素衣含章簷下春風面造化功成秋兔毫意足不求顔色似前身相馬九方臯苕溪漁隱叢話徽廟召對稱賞此句自此知名仕宦寖顯秋夜中庭淡月照三更白露澄空河漢明莫遣西風吹葉落只愁無處著秋聲以上簡齊集山居耿耿虛堂一榻秋人閒髙枕幾王侯亂雲未放曉山出片月不隨溪水流檢校一身渾是懶平章千古得無愁湘波見說清人骨恨不移家阿那州雨過水堂長日靜鷗沙便覺京塵隔鬢華夢裏不知涼是雨捲簾微溼在荷花長干行妾家長千里春慵晏未起花香襲夢回略略事梳洗妝臺罷窺鏡盛色照江水郎帆十幅輕渾不聞櫓聲曲岸轉掀篷一見兮目成羞聞媒致辭心許郎深情一床兩年少相看悔不早酒歡娛藏鬮園嬉索鬭草含笑盟春風同心以偕老郎行有程期郎知妾未知鷁首生羽翼蛾眉無光輝寄來紙上字不盡心中事問遍相逢人不如自見真心苦淚更苦滴爛閨中土寄語里中兒莫作商人婦九日家中風雨吳江冷雲天故國賖扶頭呼白酒揩眼認黃花客夢蛬聲歇邊心雁字斜明年又何處髙樹莫啼鴉以上珊瑚網李乘乘字德載政和中崑山令題慧聚寺次孟郊張祐韻千山貯雲房瓶鉢安空牀野籟有真響天葩無世香巢鸛羽翎老睡僧眉宇光此外足憂喜勞勞榮辱場一寺皆樓殿雖雄向此吞雲霞終日影檜柏幾年根檻俯水烟國磬傳雞犬村倚窗翻貝葉宴寂屬空門崑山雜詠洪興祖興祖字慶善丹陽人登政和上舍第髙宗朝召試授祕書省正字歷官提㸃江東刑獄知真州饒州秦檜當國以怨望編管昭州卒宋史儒林傳興祖徙知饒州初夢持六刀覺曰三刀為益今倍之其饒乎已而果然拂雲亭在真州東園黃雲收盡緑針齊江北江南水拍提野老扶攜相告語兒童今始識鋤犂儀真縣志謝彥彥字子美官稱宣句龍圖留題驪山自愧塵容去復來驪山頂上看崔嵬誰人得向長安道曾浴蓮湯十二回政和丙申三月十八日驪山刻石黃伯思伯思字長睿自號雲林子邵武人履孫大觀中官祕書省祕書郎政和中卒有東觀餘論題河南王氏所藏子敬帖君家大令書盈紙筆勢翩翩趣多媚雖云沓拖如少年豈至拘攣同餓隸㑹稽七子五知名此公風槩尤超詣太極琁題猶重書謂不書太極殿榜一時凛凛標英氣半袖精裓衆爭求數幅新裙世猶貴當時親遇得巳難況復傳今僅千歲龍珠歸浦劒還津此帖君藏真得地才披尺許目增明鸞跂鴻驚欲飛逝硬黃響搨若傳吾完碧摹刋願垂世東觀餘論杜子民望瀛亭擁傳來觀海危亭一振衣雲晴千怪出浸大百川歸日月遭吞吐乾坤入範圍羣鷗不須避禪寂久忘機蓬萊閣詩集宋詩紀事卷三十八
