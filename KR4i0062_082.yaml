body:
  text: 宋詩紀事卷八十二錢塘厲鶚撰蘇元鼎遊齊山寺秋浦齊山寺峯巒楚楚長巖根堆雁塔溪角架虹梁雨過聞幽磬雲開見上方苔侵石磴滑花擁洞門香禪客探元切騷人覓句忙汲泉寒井廢觀郡古樓荒白鳥巢危樹孤猿叫斷岡碑珉黃閣相詩板紫薇郎蹤迹依稀在文章大半亡登臨正吟賞惆悵見斜陽齊山詩集石郊石梁寺行破白雲山幾里僧牀接客幸相容泉聲到枕夜無寐時聽隔林方廣鐘天台山志劉師邵浮萍乍因輕浪疊晴沙又趁回風擁釣槎莫怪狂蹤易飄泊前身不合是楊花廣羣芳譜葉簵題光華亭在鹽官縣北畫棟朱簾勢翼然鼎新氣象冠山川鵝黃楊柳浮春晚鴨緑煙波送客船輪奐不妨農事日風光好近麥秋天佐君治簡有餘暇杯酒從教盡日傳海寧縣志黃唐九女山在奉化縣南二十里粼粼新緑起前峯拂拂垂楊煙雨中安得一蓑浮短艇玉鱗飛上釣絲風寧波府志史蘊國清寺十里松關路門開對洞天山神曾獻地海衆此安禪鐘磬開巖谷樓臺跨石泉高峯智者塔長與赤城連天台山志魏宗石橋聞説招提景曇花結翠雲晴光朝更合嵐氣晚來分梵語微茫韻鐘聲杳靄聞無由問禪法坐對柏爐熏天台山志路忱秋懷落日留虛壁秋風急戍樓高歌鬼神夜揮涕虎狼秋豪貴少青眼文章多白頭何時挂長劒天地一扁舟宋藝圃集況志寧南昌人豫章臺城陰冷落豫章臺平地晴沙捲雪來欲訪鄰翁問塵迹小園荒徑長莓苔梅仙壇上疏歸來事可歎嶺頭誰為築星壇先生不食炎劉祿自拾松花當晚餐以上南昌府志謝孚蒼梧即事近岸江聲急孤舟下杳冥峽泉飛暴雨灘石走羣星水有瀟湘色猿同巴蜀聽令人思舜德一望九疑青粵西詩載張惟中鏡湖昔年曾過賀家湖今日煙波大半無惟有一天秋夜月不隨田畝入官租紹興府志廖衡衡南劒州順昌人鄉舉不利隱居終身句淚多陳后愁離殿浴出楊妃困倚闌延平府志縣尉命詠雨中山茶時年六歲艾申遊疏山夾道蒼松六月寒塵埃只隔白雲間重遊恰是十年後往事空驚一夢間傑閣漫誇新卜築危亭不似舊躋攀憑誰説與闕師叔投老求分一半山撫州府志徐噩緑珠渡在粵西博白縣早出緑羅村晚過緑珠渡日落白州城草芳梁女墓江水流古今滔滔不相顧今人不見古時人依舊青山路如故名勝志吕江栖白菴門外竹千箇崖顚兩徑分奔泉流碎月高樹礙行雲遊客倦欲臥道人言少文但云秦學士曾此遇茅君茅山志單錫錫字君賜宜興人寄隱士巖頭鬱鬱凌寒柏柏間時復雲封白苔蒼草碧自年年絶奇中有參同客道通下躡天根深山靈啼泣穹崖陰春深不問花開落寂寂空山千萬尋宋藝圃集賈成之橫浦橫槎三月江如束風浪縈紆接天緑郡樓新創插雲飛盡日江山對雙目粵西詩載夏之中古離别郎上孤舟妾上樓闌干未倚淚先流片帆漸遠郎回首一種相思兩處愁宋藝圃集柳驥驥官德化主簿句天插一泉聲潄玉地高六月夜凝霜題九仙山雜志泉南范西堂明水寺環山清淺一溪水夾徑高低十里松煙鎖石門疑路斷斜陽影裏忽聞鐘撫州府志陸煥大慈寺天下紛紛吹戰塵我來佛隴悟修身依然猿鶴如相識知是山中幾世人台州府志祝鑄鑄蒼山人妙庭觀風雨連山松竹鳴宦途牢落若為情中宵嘹喨驚殘夢疑是雲和重度聲杭州府志朱應龍山月池德藏寺有松風臺山月池菊坡宋竹菴禪師所築池底看明月明月在山頭清光連上下分作兩輪秋菊坡口有綺語債長詠菊坡詩最好重陽景雞肥酒熟時自注竹菴禪師有菊坡稿以上柘上遺詩胡梅所石禪牀在鶴鳴山空山危石平如掌雲鎖苔封自昔時不識山僧曾坐處幾回彈舌雨龍歸漳州府志程驤富順西湖春風楊柳早藏鴉秋水芙蕖晚著花細數一年湖上景天涯行客忍思家全蜀藝文志衡泌緑波亭清淚斑斑灑緑波年來轉覺别離多扁舟南浦分攜處水遠山長愁奈何建寧府志潘景良遊金山嵌巖穹窿屹立乎江中崩湍下瞰不見底巨石崛出高摩空混沌破來到今幾萬歲雄奇秀麗胡為乎此山兮獨鍾長江西來一萬里當空削出金芙蓉上有金仙居下有馮夷宫寶坊櫛比列霄漢塔影倒置驚魚龍有時洪鐘咽煙響潮音屬和驅羣聾鳥飛竟力不得到我嘗拿舟一抵其雲峯攝衣步樓閣矯首觀無窮齊州九點落眼底岷峨西望何溟濛忽聞長風破巨浪芥蒂一洗平生胸山僧喜殊常握手何從容杯擎陸羽水茶泛玉川風鶴翁散仙恆齋老翁把臂大笑聲融融天風吹袂欲輕舉白雲縹眇將何從不知海外之三山羣仙之樂與此將異而或同迄今别去五六載我舟又復來掀篷山靈偃蹇我倨傲塵懷汩沒不得追前蹤風帆一笑金山過山頭日落飛冥鴻金山志略楊旻題惠山翠麓亭聞説支公最好賢瀛洲可買不論錢樓臺蔽日都無地草木藏春别有天石上雲翻千峽雨洞中泉落幾家田高間誰似幽居樂一坐青山不問年惠山集徐文瀾詠酒才傾一盞碧澄澄自是山妻手法成不遣水多防味薄要令麴少得香清涼從荷葉風邊起暖向梅花月裏生世味總無如此味深知此味即淵明淵鑑類函侯丹學古體桐風吹月烏啼井碧波溼露沈雲影素絲牽玉轉泉華美人睡覺燕支冷銀鉤挂簾北窗曉翠鬟臨鏡雙鸞小黃衫少年望不來寂寂庭階滿春草吳氏詩永林東戴溪亭在望仙門外溪亭故事幾年華來值秋霖眺望賒雲障山巒多少處雨埋煙火兩三家水肥去馬行高阪汀沒浮鷗上淺沙誰是子猷誰是戴小船杯酒興無涯嵊縣志陳掞破山寺雙頭白蓮湘南夜永風露清明月耿耿波益平嬋娟有人步羅襪瓊璫玉佩雙娉婷可憐玉骨埋藏久腸斷人間無復有豈知化作蘭若蓮宿契未忘猶並首想應快意洗塵緣不向謝池爭取妍玻璃盤中淨玉頰一心稽首西方仙請君以圖獻天子當與嘉禾並周史毋令寂寞墮空山泣月悲雲清夜殘破山寺志藍元威寒朔風陳陳送將來日午柴門半不開靈照只教添短褐孟光重喚暖深杯苦吟簷角玲瓏玉間撥爐頭榾柮灰移步東籬紅日晚細看凍蝶尚依梅菊坡叢話司馬允中陸羽井百尺寒泉浸崖腹蘚蝕題名不堪讀只今此味屬誰論自把銅瓶汲新淥虎邱志慕容百才大劒山李勢非嵎虎公孫是井蛙聖朝無外戶夷壤盡為家疊嶂寧須鏟停鼖久廢撾原鱗生駱谷釣駟入彭衙關失千年壯方來萬里遐商淵寧澒洞使節偏谽谺岑蔚誰驚鳥豐茭自樂麚烽屯開雨雪樵㸑老煙霞帝德朝宗地仙遊上漢槎賞奇酬酒興摛藻謝詩葩階走楓林葉窗催桕燭花山亭無刻漏隱几待鳴鴉四川總志袁植遊惠山拿舟到山寺詩句偶緣情山自錫無後寺因泉有名樓陰回夕景樹色向冬榮就水别茶味全勝他處烹惠山集陳願斗起亭乞得雨初霽登臨一解顏自攜斑竹杖來對白雲山月色朦朧裏溪聲遠近間相留且盤礴莫惜夜深還台州府志劉琰題尊勝院在奉化縣海角尋春雪未消馬蹄無處避瓊瑶巳分屋下論文酒爐火篝燈伴寂寥延祐四明志王曄芙蓉菡蓞初舒豔奇芬暈碧霄中洲欣邂逅南浦自招搖瑩色涵香霧新袍坼絳綃娉婷自珍愛穠郁更清超照水臨青鏡偎蘋倚彩翹駢枝疑貫寵並萼似爭嬌綽約霞初映披敷煙正銷鬚蕤金粉嫩房闖玉冠喬月下仙人氅風前公子袍清虛雲步溼沈浸瀣津饒濯濯靈修質盈盈神女標孤貞無漫蔓雅則絶纖妖喜動文鴛舞光搖錦鯉跳瓊根託紺潔翠蓋障炎囂靚賞聯瑶席芳搴集桂橈姚園多猥俗陶徑亦蕭條華井分流潤天池引派遙須移元圃種莫向若邪漂木末興幽詫濓溪結冥招懷之思遠道秋入鬢蕭蕭廣羣芳譜何昌弼橫塘道中即半邏北橫塘閘一舸凌風去縈紆幾度村水清魚引子田美稻生孫山近塵埃遠秋晴枕席溫悠悠迷處所疑是武陵源嘉興府志林衢衢長樂人題廣州光孝寺開池曾記虞翻苑列樹今存建德門無客不觀丞相硯有人曾悟祖師幡舊煎訶子泉猶冽新種菩提葉又繁無奈益州經卷好千絲絲縷未消痕藏內法華連華諸經係益州本故云名勝志何千里登金山上妙空王殿諸天不敢窺雲霞捧兜率日月繞須彌八柱當如許三山定自奇波瀾吞巨海正要十分詩金山志略馬世珍遊圓通寺山空不隱響一葉落還聞龍去遺荒井僧歸禮白雲蟲絲昏畫壁嵐氣溼爐薰睡思渾無奈茶甌易策勛嚴州府志張理惠山寺九峯朝暮雲搖落少遊墳野蔓碑全沒晴菴磬亦聞洞偏泉路細松折鶴巢分高視太湖近雲濤鷗起羣惠山集董曇甘陂寺晚發山間寺籃輿冒朔風雪融溪漲碧雲漏日穿紅歲月塵埃裏江山醉夢中人生重鄉井浪出笑龎公撫州府志劉侃武夷七曲峽折峯全削風回瀑盡飛山光并水色載得一船歸建寧府志宋詩紀事卷八十二
