body:
  text: 宋詩紀事卷二十九錢塘厲鶚撰杜常常字正甫衛州人昭憲皇后族孫元豐中知鄆州權發遣秦鳳等路提刑厯官工部尚書畫墁録神宗聞昭憲之家有登第者甚喜冇旨令上殿翼日謂執政曰杜常第四人登第卻一雙鬼眼可令提舉農田水利題華清宫東别家山十六程曉來和月到華清朝元閣上西風急都入長楊作雨聲夜雨晨霽柏葉青青櫟葉紅高低相倚弄秋風夜來雨後輕塵斂繡出驪山嶺上宫溫泉已去開元四百年此泉猶自響潺潺也知不憤當時事長作悲聲恨祿山驪山漁陽烽燧起雲間玉輩蒼黃下此山何事君王自神武區區南渡鹿頭關河上楮談臨潼驪山華清宫溫泉在焉中有萃玉屏皆宋元及今人詩刻內杜常詩四篇前題權發遣秦鳳等路提點刑獄公事太常寺杜常後跋云正甫大寺自河北移使秦鳳元豐三年九月二十七日過華清有詩四首詞意高遠氣格清古邑人曹端儀既親且舊因請副本勒諸方石以垂不朽閏九月初一日潁州杜詡記劉吉甫吉甫入元祐黨籍爵里未詳聞笛戍鼓停撾月五更嗚嗚巧作斷腸聲江南自是春來早吹到梅花夢也清後村千家詩陳一向一向桐廬人生元豐中題泰山靈巖寺石龜泉畔鐵袈裟上有猿銜五色花見説道人時挂搭旋將青拂掃煙霞靈巖詩集黃夷仲夷仲元豐中監察御史調王闢之高唐不是那高唐風物由來各異鄉若向此中求薦枕只應愁殺楚襄王山東通志元豐中王闢之調博州高唐令往别監察御史黃夷仲夷仲口占一絶謔之云云此雖詼談亦足以辨輿地之殊也楊損損字益老華隂人元豐中桂林郡僚七星山新開巖洞賦呈經略龍圖曾公陽巖高敞納晨曦鶴駕雲軿或可期神物雕鐫元入妙人工開闢更增奇須知水石清涼處絶勝塵沙熱惱時紅斾碧幢勞小駐多慙主客濫追隨桂勝彭次雲次雲吉水人元豐中桂林郡僚曾公巖和曾子宣安撫目擊煙霞晝卷舒披榛敲石得蓬壺洞天日月千年久人世塵埃一點無靈藥難尋雲縹眇落花不見水縈紆使君鳳閣翺翔近謾與東山作畫圖桂勝彭淵材淵材筠州人釋惠洪覺範之叔句雨過溫泉浴妃子露濃湯餅試何郎海棠冷齋夜話張繹繹字思叔壽安人以文名預鄉里計偕受業程伊川之門未及仕而卒寄友人有客厭事事潔身山之幽寒暑不相貸乃有卒歲憂有生此有事簡之成贅疣澄江本無浪不如信虛舟六經力道要無以利心求一朝與理會萬境真天遊伊水正清泠子行無滯留西風昨夜至送子至中流落月灑殘夢已看古岸頭我病強送君是行良難儔異時青門下誰識東陵侯宋文鑑張勵勵字深道長樂人神宗朝官江淮制置發運使題張公翊清溪圖九華鬱兮江南山清溪下兮貫山間江北騖兮溪東旋濁湯湯兮清漫漫山幾轉兮水幾盤近交臂兮遠連環決天末兮浮雲端齊之山兮秋之浦景晦明兮氣吞吐草木蓊兮媚林莽繡屏張兮翠綃舞深窈窕兮幽掩塢雨吟猿兮風嘯虎下鳧鴈兮泳魴鱮商之檣兮漁之罟互出沒兮更散聚樵有舍兮梵有宇雲巖阿兮棘樊圃翬連甍兮岸之滸弄潺湲兮棹容與中橫絶兮梁為渡隱孤城兮其西去春之朝兮秋之夕風既清兮月又白遐矯首兮俯陳迹攜佳人兮不可得空望遠兮中感百思悠悠兮情惻惻悵興亡兮懷令昔獨兹溪兮無終極嗟夫人兮擺塵滓遙徜徉兮玩雲水移山川兮置窗几手舒卷兮千萬里輈余車兮秣余馬往其從兮山之下枻吾舟兮泛清瀉樂魚鳥兮放林野願未適兮何為者聊寓言兮公墨畫吳禮部詩話張公翊清溪圖畫池陽清溪也郭功甫題五絶句有唯欠子瞻詩之語遂求東坡為賦清溪詞蘇公復令某示秦少遊寫小杜弄水亭詩其後自元豐以來諸賢題咏甚多真迹在金華智者寺草堂蓋宋季王佖元敬使君得之易世後其家以售於寺坡公作詞之後有長樂張勵深道長句倣佛蘇體亦佳錢祈父祈父失其名謝子瞻內翰浙西開府雋庭鴛鷺集珍羣病翮摧頽下九門罪戾我慙非晝錦回翔公亦暫朱轓龔黃政化知應爾夔契謀謨想自存缺二句合璧事類後集李彥弼彥弼字端臣廬陵人元豐中桂州郡僚傲暑棲霞洞嵌竇棲霞敲虛轉杓左驂鸞翼右耳鳳簫爽排酷烈境邈氛囂靜者多妙於焉消搖粵西詩載張吉甫吉甫元豐中人見烏臺詩案肖梅香江村招得玉妃魂化作金爐一炷雲但覺清芬暗浮動不知碧篆已氤氳春收東閣簾初下夢想西湖被更熏真似吾家雪溪上東風一夜隔籬聞香乘王仲修仲修丞相圭之子元豐中登第官崇文院校書慶姪耆登第錫宴便傾光祿酒賜袍還照上林花衣冠盛事堪書日六世詞科只一家雞肋編岐國公王圭在元豐中為丞相父準曽祖贄曾祖景圖皆登進士第其子仲修元豐中登第公有詩云三朝遇主唯文翰十榜傳家有姓名注云自太平興國以來四世凡十榜登科後姪仲原子耆仲孜子昻相繼登科昻又魁天下本朝六世登第者與朝文元二家而朝一世賜出身也崇寧四年耆初及第仲修作詩慶之宫詞雲嬌煙懶雨初晴環碧風輕細浪生盡日黃鸝不飛去萬年枝上聽簫聲玉闌萬朵牡丹開先摘姚黃獻御杯翠幕重重圍繞定料應蜂蝶不曾來玉簫聲裏酌玻璃風獵旍旗卷絳霓星渚月斜珠露重銀河流水亦東西聖人獨看臨軒陛殿後雙龍捧翠華明日集英排大宴御前先降出琵琶教坊使花日新嘗為臣言神宗見教坊琵琶制作不精每遇大宴前一日降出琵琶雪消宫殿苑梅芳曉漏聲遲下建章天氣清寒當臘日沈香甲煎賜諸房日沈天角曉星明上直妝成趁五更昨夜宣徽初進曲仙韶院裏未知名十家宫詞送越帥程公闢一麾占得山川勝金紐新提左顧龜蒼闕鬭龍辭日下紅旌引騎照江湄剡溪月午何妨醉曲水春餘好賦詩玉案天香攜滿袖錦衣誰似過鄉時剡録趙汝礪汝礪官監察御史裏行送越帥程公闢畫舫參差看欲飛紛紛車馬壓塵泥右軍筆墨空蘭渚安道風流訪剡溪白首得時歸莫遽丹心懷國去猶稽月明會醉蓬萊閣應笑雲霄自有梯剡録曾孝宗送越帥程公闢虎符分鎮浙江東艤棹都門使斾雄雙槳徘徊枌社日高牙搖曵剡溪風蓬萊閣宴公書簡賀監湖遊獄榜空行聽越民歌德政亟還青瑣見旌忠剡録王仲甫仲甫字明之岐公之從子少年以詞賦登科中吳紀聞仲甫風流翰墨名著一時其歿也丁永州注葆光祭之有云爽秀豪拔出於天資談經咏史博識周知文華自得不務競時古格近體率意一揮金玉鏘揚組繡陸離世俗所得特其歌辭生習華貴不見艱巇徘徊鴟閣出入鳳池乘興南遊曠達不羇朝賞夕宴選勝搜竒擺脫冠裳卻去輪蹄不驚榮辱不競是非擾擾萬緒付于一巵頽然終日去智忘機無題黃金零落大刀頭玉筯歸期劃到秋紅錦寄魚風逆浪碧簫吹鳳月當樓伯勞知我經春别香蠟窺人一夜愁好去渡江千里夢滿天梅雨是蘇州中吳紀聞仲甫客吳門嘗有所愛往京師為岐公強留之逾時不返因作詩云云此詩效古樂府稿砧今何在體人皆愛其巧苖時中時中字子中甬上人元豐中廣南西路轉運副使曾公巖和曾子宣安撫紅斾尋幽東郭旁泉巖新得冠殊方一川氣象天開作萬古榛荆地蔽藏崖穴乍驚堂室闢榜名知與日星長異時人指溪橋水思愛還同召伯棠桂勝毛滂滂字澤民衢州人為杭州法曹任滿去抵富陽以詞為東坡所賞追還知名後乃出京卞之門嘗知武康縣政和中守嘉禾有東堂集揮塵後録毛澤民受知曾文肅擢置館閣文肅南遷坐黨與得罪流落久之蔡元度鎮潤州與澤民俱臨川王氏壻澤民傾心事之一日家集觀池中鴛鴦元度席上賦詩云莫學飢鷹飽便飛澤民和呈曰貪戀恩波未肯飛元度夫人笑曰豈非適從曾相公池中飛過來者乎澤民大慙夏夜毒暑彌三伏微涼起二更月窗風竹亂煙渚露荷傾後村千家詩溪上溪光照秋房娟然臥流萍水仙弄幽姿寄余汀洲情眷懷玉色子弄波濯塵纓夜寒有佳意屬此泠然清全芳備祖響潭水面平鋪映碧空夜深明月照龍宫猿啼未響潭先響一樹花開兩樹紅遊翠峯寺隔牆楊栁舞腰斜傍砌鵝梨玉作花此地風光誰管領小詩收入長官家以上西吳里語曉出定光寺曉出開霜阪飢烏啄麥畦山腰餘雪瘦天面冷雲低寒意梅花北禪心柏子西窗前借殘月照我度前溪題餘英館故第園林改遺亭壁戶新垂虹一橋月夾繡兩隄春花落俯流水烏啼懷故人憑闌看翠荇無意數遊鱗以上湖州府志下渚湖春渚連天闊春風夾岸香飛花渡水急垂栁向人長遠岫分蒼紫澄波映渺茫此身萍梗爾泊處即吾鄉武康縣志句百里飽看紅䆉稏一杯輕愧黑蜿蜒禱雨湘煙録蔡載載字天任潤州人肇之弟元豐中嘗為晉陵簿尋以薦改承事郎錢伸仲漆塘四詠結廬傍林泉偶與初心期佳處時自領未應魚鳥知遂初亭白雲來何時英英冠山椒西風莫吹去使我心搖搖望雲亭高人不惜地自種無邊春莫隨流水去恐汙世間塵芳美亭水行天地間萬派同一指胡為穿石來要洗巢由耳通惠亭容齋三筆錢伸仲大夫於錫山所居漆塘村作四亭自其先人已有卜築之意而不克就故名曰遂初先壠在其上名曰望雲種桃數百千株名曰芳美鑿池涌泉或以為與惠山泉同味名曰通惠求詩于一時名流自葛魯卿汪彥章孫仲益既各極其妙而母舅蔡天任四絶獨擅場諸公皆自以為弗及也詩筆力窺陶謝之藩錢庚溪詩話蔡天任頗工伸仲漆塘詩唯天任語簡而意遠諸公服其韻勝題膠山寺繡佛妙相奪天真針針巧入神幾多瞻佛者還想用心人常州府志盛次仲次仲元豐中翰林學士題慈溪普濟寺松石小軒呈關彥長明府一松偃蹇蒼龍蟠一石巉巖怒虎踞我來題作龍虎軒秖恐風雲捲將去乾道四明圖經句看來天地不知夜飛入園林總是春冷齋夜話盛學士次仲孔舍人平仲同在館中雪夜論詩平仲曰當作不經人道語曰斜拖闕角龍千丈淡抹牆腰月半稜坐客皆稱絶次仲曰句甚佳惜其未大乃云云平仲服其工陳律律政和人元豐八年進士龍溪令遊洞霄山中古木隂隂擁澗深青山九鎖極幽尋白雲也似知人意飛落長松伴醉吟洞霄詩集樓異異字試可鄞人元豐八年進士建中靖國初為登封令纍官徽猷閣直學士知平江府提舉崇福宫嵩山二十四詠并序存四首僕性嗜山水幾成癖所至雖假館僦舍莫不聚拳石環斗池終日玩觀殆忘食寢一旦來令嵩陽正在清泉白石中始至數月訟庭清暇乃芟廢圃鑿芙蓉菡萏二池取餘土築臺高五丈許名之揖山北面嵩嶽西顧少室南望許由自餘諸峯環擁軒檻于是居高遠眺盡山川之形勢暇日既作三十六峯賦以自廣然僕舊聞嵩山二十四峯圖經傳記所不載求之土人亦莫知也一日觀明大師李得柔勝之自京師來訪乃得其名出道藏吳天師靈迹記厯東而西一一可指遂命畫史圖諸峯於仰嵩堂以證其名僕謂勝之曰二十四峯之名湮沒久矣今自吾二人者發之不可無述也乃作嵩山二十四詠並命勝之作焉華蓋峯華蓋峯高未易窮捫參厯井到天中回頭卻顧人間世但見羣青似小童玉女峯玉仙曾此駐雲車日薄窗紗映雪膚七字天書人不辨定知元女手中符青童峯斬新高髻掠雲開翠色羅衣一樣裁知有真仙此中住故令天女捧書來玉鏡峯皎皎冰盤瑩百圍廣寒宫殿見依稀春山萬疊渾如洗浮翠光中一鏡飛以上河南府志宿少林寺六六仙峯繞佛居俗塵至此暫銷除西來未悟禪師意北去還馳使者車五品封槐今尚在九年面壁昔何如心知一宿猶難覺花藏重尋貝葉書嵩少集強淵明淵明字隱季至子元豐八年進士宣和中為翰林學士承旨兼太子賓客卒贈資政殿學士諡文憲景鐘頌并序宣和元年八月丁丑皇帝詔大晟作景鐘是月二十五日鐘成皇帝以身為度以度起律以律審聲以聲制鐘以鐘出樂而樂宗焉于以祀天地饗鬼神朝萬國罔不用又在廷之臣再拜稽首上頌明明天子以身為度有景者鐘衆樂所怙於昭於天乃眷斯顧揚于大廷罔不時序億萬斯年受天之祜揮塵後録薛昻昻字肇明錢唐人元豐八年進士附蔡京仕至尚書左丞靖康初責徽州居住羅志仁姑蘇筆記薛昻賦蔡京君臣慶會閣詩云逢時可謂真千載拜賜應須更萬回時人謂之薛萬回録荆公在鍾山下棊薛門下昻與焉能改齋漫賭梅花詩一首薛敗而不善詩荆公為代作今集中所謂薛秀才者是也薛既宦達出知金陵或者嘲以詩曰好笑當年薛乞兒荆公坐上賭梅詩而今又向江東去奉勸先生莫下棊薛書名似丏字故人有乞兒之論湖堂一段風煙不可關出門滿目是湖山昔人華廈今何在湖堂在涌金門旁郡守蔣樂安公創建此日漁舟任自間鳯觀漸新霄漢上近作涌金樓甚偉龍洲依舊水雲間栁洲祠五龍此兩處與湖堂鼎足相對歸來丘壑多幽趣願與諸賢約往還咸淳臨安志陳祐祐字純益仙井監人第進士建中靖國初為右司諫入黨籍編管歸州赦還卒有集冬夜寒氣侵人夜未央九門傳令一聲長庭除半露牆根雪月影斜分瓦壠霜後村千家詩朱京京字世昌南豐人舉進士官太常博士元符初遷國子司業祥光寺山寺藏遺刻塵埃字半昏空揮峴首淚誰起謝公門白石千年像蒼頭五世孫他年想陳迹卜築向雲根西江詩話俞紫芝紫芝字秀老金華人流寓揚州少有高行不娶遊王荆公之門弟淡字清老志操修潔頗使酒有詩名敝帚集詩人玉屑有時俗事不稱意無數好山都上心俞紫芝秀老句荆公手寫於扇山谷所書釣魚船上謝三郎一帖石刻在金山寺雞林每入貢輒市數百本以歸亦秀老句也石林詩話紫芝少有高行不娶得浮屠氏心法所至翛然而工於詩王荆公尤愛重之每見於詩所謂公詩何以解人愁初日芙蓉映碧流未怕元劉爭獨步不妨陶謝與同遊是也秀老嘗有夜深童子喚不起猛虎一聲山月高之句尤為荆公所賞和云新詩比舊仍增峭若許追攀莫太高秀老卒於元祐初惜時無發明者不得與林和靖一流槩見於隱逸南澗月夕華髮念秋晚青燈憐夜長香團菊花露寒著橘林霜月在北窗底人行南澗傍婆娑不知去身世兩相忘旅中諭懷白浪紅塵二十春就中奔走費光隂有時俗事不稱意無限好山都上心一面琴為方外友數篇詩當橐中金會須將爾同歸去家在碧溪煙樹深以上宋文鑑咏草滿目芊芊野渡頭不知若箇解忘憂細隨緑水侵離館遠帶斜陽過别洲金谷園中荒映月石頭城下碧連秋行人悵望王孫去買斷金叉十二愁歲杪山中石亂雲深客到稀鶴和殘雪在高枝小軒日午貪濃睡門外春風過不知以上墨莊漫録吳興沽酒店穿斜巷出採蓮船傍後門歸翠霑城郭三千點清蘸樓臺水一圍談鑰吳興志松聲萬壑搖蒼煙百灘度流水下有跨驢人蕭蕭吹凍耳鍾山僧舍酬辟疆祕授同謁臨川丞相時不期顔色偶然披緑葵自得山人味絳帳難求俗士知午磬喚回幽枕夢夕陽催就小窗詩松毛桂葉山川路肯顧非公復是誰水村間望畫橈兩兩枕汀沙隔岸煙蕪一望賖翡翠間居眠藕葉鷺鷥别業在蘆花溪雲淡淡迷漁屋野斾翩翩露酒家可惜一綳真水墨無人寫得寄京華以上詩林萬選句莫怪野人經宿住白蘋霜落蟹螯肥蟹略饒竦竦臨川人下第投荆公又還垂翅下丹霄歸指臨川去路遙二頃荒田都賣郤要錢準備納青苖豫章詩話龍太初詠沙茫茫黃出塞漠漠白鋪汀鳥去風平篆潮回日射星王直方詩話郭功甫方與荆公坐有一人展刺云詩人龍太初功甫勃然曰相公前敢稱詩人其不識去就如此荆公曰但且請來相見既坐介甫曰賢道能詩為我賦乎是時方有一老兵以沙擦銅器荆公即曰可作沙詩太初不頃刻間誦云云功甫遂閣筆太初緣此名聞東南王邦憲客宛陵遇鄉人作集句揚子江頭楊栁春衣冠南渡多崩奔栁條弄色不忍見東西南北更堪論誰謂他鄉各異縣豈知流落復相見青春作伴好還鄉為問淮南米貴賤竹坡詩話司馬溫公稱其敘事有情致為可喜王復復洛人鄉貢進士官典郡正郎句早秋蟬有信多雨暑無權題洛陽大字院明道雜志李願願官京東轉運使四景樓在登州蓬萊縣北縱目有佳處須登四景樓輪蹄喧市井桑榖暗郊丘翠蓋雲生裏滄溟天盡頭闌干知幾曲徙倚恣清愁山東通志王忠玉忠玉失其名東坡集有與王忠玉遊虎丘詩此刻但題忠玉同時又有馬中玉未知孰是遊華清留絶句廢宇頽垣不復新朝元輦道盡荆榛惟餘一派溫湯水長與行人洗路塵已未八月二日驪山刻石朱光庭光庭字公掞河南偃師人以父景蔭擢第從吕大防於長安幕府哲宗朝仕至右諫議大夫出知亳州徙潞州卒紹聖中追貶栁州别駕入黨籍華清偶成驪山秀色古今同盡入詩人感慨中只徇霓裳一曲樂不知天下樂無窮元豐辛酉仲春八日驪山刻石吳雍雍字子中治平初平涼令元豐中為秦帥登驪山閣留詩山頭羯鼓奏霓裳斷送君王入醉鄉憑閣無言念興廢孤煙猶起泰陵傍元豐八年十月四日驪山刻石宋詩紀事卷二十九
