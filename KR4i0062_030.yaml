body:
  text: 宋詩紀事巻三十錢塘厲鶚撰劉季孫季孫字景文贈侍中平之子以左藏庫副使爲兩浙兵馬都監蘇軾薦其才除知隰州仕至文思副使有集題饒州酒務廳屏呢喃燕子語梁間底事來驚夢裏閒説與傍人渾不解杖藜攜酒看芝山石林詩話王荆公爲江東提刑巡厯至饒按酒務始至廳事見屏間題詩云云大稱賞之問專知官誰所作以季孫對即召與之語嘉嘆升車而去不復問務事既至傳舍適郡學生持狀立庭下請差官攝州學事公判監酒殿直一郡大驚遂知名云次韻黄魯直同游郭氏西園雨過西園物物佳栁風竹日掩葵花更無人迹宜清睡奈此池頭一部蛙史容山谷後集注守關晨雞三叫未開關畱住行人更解鞍卻上月明高處立曉風吹面作清寒宋文鑑陪東坡中和堂賞月中和堂上月盛夏似高秋天瀉銀河水人披紫綺裘氣飄聞赤壁語勝誦黄樓歸袂接夫子適從何處遊咸淳臨安志寄蘇内翰倦壓鼇頭請左符笑尋潁尾爲西湖二三賢守去非遠六一清風今不孤四海共知霜鬢滿重陽曾插菊花無聚星堂上誰先到欲傍金樽倒玉壺石林詩話季孫平之子能作七字詩家藏書數千巻爲杭州鈐轄子瞻作守深知之後嘗以詩寄子瞻云四海共知霜鬢滿重陽曾插菊花無子瞻大喜在潁州和季孫詩所謂一篇向人寫肝肺四海知我霜鬢鬚蓋記此也題子瞻揚州借山亭給事風流在虛亭景趣閒全臨故宫水盡致别州山峯勢時相向嵐光夜不還無時供勝賞厯厯白雲間以上瀛奎律髓越山寺看泉龜溪有路蓮花引鷲嶺無時雲霧生聊放一身畱舴艋不逢人處聽泉聲呉氏詩永句詩書魯國眞男子歌吹揚州作貴人送孔宗翰知揚州石林詩話賈收収號耘老烏程人有詩名喜飲酒其居有水閣曰浮暉李公擇蘇子瞻與之遊倡酬極多蘇去收作亭以懷蘇名有詩一編號懷蘇集湖州府志東坡嘗寫古木怪石書其後贈賈耘老云今日舟中霜寒十指如懸槌適有人致嘉酒遂獨飲一杯醺然徑醉念賈處士貧甚無以慰其意爲作古木怪石一紙每遇飢時輒一開看飽人否若呉興有好事能爲君月致米三石酒三斗終君之世者當便以贈之不爾可令雙荷葉收掌須添丁長以付之也雙荷葉賈侍姬添丁賈之子事詳沈偕詩題有美堂自刋宸畫入雲端神物應須䕶翠巒吳越不藏千里色斗牛常占一天寒四簷望盡囘頭嬾萬象搜來下筆難誰信靜中疎拙意畧無蹤跡到波瀾庚溪詩話錢塘呉山有美堂迺仁宗朝梅摯公儀出守杭上賜之詩有曰地有呉山美東南第一州梅以上詩名堂士大夫畱題甚衆東坡倅杭因令筆吏盡錄之而未著其姓名默定詩之高下遂以賈收詩爲冠因此與耘老游從和沈君與送蟹彭越孫多伏下風蝤蛑奴視敢稱雄江湖縱養膏腴紫鼎鑊終烹爪眼紅嗍稱呉兒牙似鍍劈慚湖女手如蔥獨憐盤内秋臍實不比溪邊夏殻空齊東野語舒煥煥字堯文徐州敎授和蘇子瞻觀百歩洪原韻先生何人堪並席李郭相逢上舟日殘霞明滅日腳沈水面浮光天一色磷磷石若鐵林兵翻激奔衝精甲白岸頭旌旗蔟五馬一艣飛艎信東下入夜寒生波浪間汗衣如逐秋風乾相忘河魚元出沒得性沙鳥鳴關關委蛇二龍乃神物游樂諸溪誠爲難築臺種栁恐不暇天下龍雨須公還苕溪漁隱叢話顔幾幾字幾聖錢塘人獄中寄酒友龜不靈身禍有胎刀從林甫笑中來憂惶囚繫二十日辜負醺酣三百杯病鶴雖甘低羽翼罪龍尤欲望風雷諸豪但是知心友誰遣尊罍向北開句白日尊中短青山枕上高春渚紀聞錢塘顔幾聖俊偉不羈性復嗜酒無日不飲東坡先生臨郡日適當秋賦幾於場中潛代一豪子劉生者遂魁送舉子致訟下幾吏久不得飲密以詩付獄吏送外間酒友吏以呈坡坡因緩其獄會赦得免一日醉臥西湖寺中起題壁云云不數日而卒袁轂轂字公濟鄞人試秩館職首薦與東坡倡和次韻劉景文登介亭東南富山水所病在卑溽隂晴變朝暮梅雨大田足翰苑宴高堂金斚浮蟻緑清泠四座耳醉飽五經腹亭午登介亭縈紆俯山麓行路愁暍死是月丁初伏乗高瞰羣峯前後浪奔逐三吳在指掌百粤入雙目漢憂分朱轓堯意注黄屋下輿曾未幾傳命甚郵速霸遂伏下風元白仰髙躅倡余而和汝談笑唾珠玊所恨繼者貧囊箱無寸幅劉侯世良將文史三冬讀坐嘯邊騎卻行歌燕旦哭儒將久寂寥斷弦今日續所得最在詩銛利鋒莫觸唱酬黄巻上如響荅空谷王侯富方丈熊掌我所欲獨餒不得飽中心但誠服王梅溪蘇詩集注許仲蔚仲蔚字子均杭之新城令曾和東坡十韻詩杜公井井在新城唐大順間淮南楊氏遣兵圍城城乏水兵民穿井百餘尺不得泉杜棱至誠請之泉立至城得不陷人目爲杜公井德地見圖牒神機發杜棱寇圍炎甚火壺渇冽于冰古邑桑田換雲源鑑面澄如今風月夕煮茗詫山僧咸淳臨安志何去非去非字正臣浦城人累舉對䇿稱旨授左班殿直武學博士後以東坡薦授承奉郎司農寺丞通判廬州有集次韻翟公巽猩猩毛筆貎妍足巧語軀惡招歋歈賦形具人獸寧脱荆榛居肉嘗登俎鼎餉餽傳甘腴失計墮醉鄕顚躓無與扶柔毫傳束縛航海歸仙癯浴質逸少池摛藻知章湖殺身固有用賦芋從衆狙坐令宣城工無復誇栗鬚宣城出栗䑕鬚也文房甲四寶萬兎慙䝉膚數管友十年閉門賦三都之子信豪邁嗜學每致劬未冠游膠庠已推經行儒蓬山天禄閣崢嶸凌碧虛期予早登躡同舍校魯魚墨莊漫録何頏之頏之字斯舉黄岡人從蘇黄學曰琯按道山清話作頡之觀李伯時題閻立本西域圖窮荒未信子年欺自笑山林老一枝海上嘗思龜㱿巻天涯欲化鳥工窺丹青閻令如曾到風俗張騫舊獨知公喜著書尤博雅山經暇日補殘遺能改齋漫錄句身到瀛洲須命好官稱庾氏莫言卑寄錢伸監倉璧事類後集合長安古碑用樂石蠆尾銀鉤擅精密缺訛横道己足哀況復鐫裁代甎甓有如天呉及紫鳳顚倒在衣吁可惜道山清話天聖中詔營浮圖姜遵在永興毁漢唐碑之堅好者以代甎甓何斯舉詩云云邵迎迎高郵人登進士澠水燕談邵迎高郵人博學强記尤長於詩爲人恭儉孝友長於吏事而清羸多病奇蹇不偶登進士十餘年官止州縣窮死無嗣其妻困苦子瞻哀之集其文爲之引以爲原憲之貧顔囘之短命揚雄之無子馮衍之不遇皇甫士安之篤疾彼遇其一人猶哀悼而君兼之非命也哉句鹽豉調羮金液膩橙韲薦鱠玉絲肥蟹畧王祐祐官禮部侍郎出守長沙奉詔禱南岳訪魏夫人壇得異人率子廉東坡作率子廉傳贈率子廉下瞰虛空臨絕澗上排煙霧倚山巓四邊險絕無猨鳥獨臥深雲二十年能改齋漫録朱炎答講僧四大不須先後覺六根還向用時空難將語默呈師敎只在尋常語默中苕溪漁隱叢話東坡言從上人爲余言有節度判官朱炎學禪久之忽於楞嚴經若有得者問講僧義江云此身死後此心何在江云此身未死此心何在炎良久以偈荅云云師可之劉賔賔官至太傅郢州白雪樓江上樓高十二梯梯登偏與白雲齊人從别浦經時去天向平蕪儘眼低寒色不堪長黯黯秋光無奈更凄凄闌干曲盡愁無盡水正東流日正西皇朝類苑郢州白雪樓素多題咏一日守倅燕集是樓方命坐客賦詩時劉太傅賔以恙羇置是郡不得預會遂使人持詩以獻才致蕭散一坐爲之閣筆朱適句燒殘紅燭客未起歌斷一聲塵繞梁補夢溪筆談朱適高郵士人納婦之夕夢爲詩兩句不踰月卒侯穆穆字清叔汝陽人寒食飲梨花下共飲梨花下梨花插滿頭清香來玉樹白蟻泛金甌妝靚青娥妒光凝粉黛羞年年寒食夜吟遶不勝愁雲齋廣録侯穆有詩名因寒食郊行見數少年共飲於梨花下穆長揖就坐衆皆哂之或曰能詩者飲乃以梨花爲題穆吟此詩衆客閣筆陳智夫智失襄陽人長於歌詩遇異人授吐納之術佳句多於夢中得之句花笑似畱客鳥啼如喚人野花臨水數枝恨芳草連天千里情遯齋閒覽劉郛郛青州推官諧謔詩坐上若有一點紅斗筲之器飲千鍾坐上若無油木梳烹龍庖鳳都成虛迂齋詩話胡志道夜宿仙都山聞松聲作仙都古洞天雲闕高嵲嵲新宫欣然成碧瓦燦鱗列我時宿琳房六月失煩熱松聲起中夜夢枕忽驚輟天籟鳴虛徐玉簫遞泠徹鳳歌諧律吕鶴舞想應節安知非羣仙宴罷揺佩玦從來筝笛耳一洗萬相滅仙都山志黄帝祠宇李陽冰篆在縉雲山李侯神仙才宇宙在其手古篆誇雄奇鐵柱貫金鈕標榜黄帝祠字畫氣渾厚想當落筆時雲夢吞八九每傳風雨夜蜿蜿龍蛇走光怪發巖竇草木潤不朽鬼物煩撝訶一旦忽失守隨煙遽飛騰無復世間有因訪山中人石刻尚仍舊誰能一新之易若運諸肘宋藝圃集胡份份字子文縉雲人官國子司業仙都山鳥道盤空上松根抱石生羽人分兩舍雞犬自聞聲仙都山志李士舉士舉官浙運使過仙都徐氏山居四海無塵戰馬閒稻粱桑柘緑迴環不知盡是君王力華屋重重對好山仙都山志郭瑄瑄官涇州監副涇州懷古危坡下盡見殘墉勢扼長川萬古雄涇水無泥分畎澮囘山有脈自崆峒唐文曾祀龍君廟漢武猶存阿母宫更喜筆峯青翠處雨餘疑是畫圖中陜西通志葉集之送李道父辟大名司録李侯江南英身老自藏器讀書盡百紙落筆必千字況兼熊豹姿特負縱横志凄其望高躅異世猶一致大名國北門自昔雄元帥名賢愼柬拔薦引必同類操持紀綱地實藉循良吏要成百鍊剛小大須厯試合璧事類後集李膺仲題自畫蘆雁晚來無事理扁舟吹起騷人漫浪愁過雁飛鴻三兩字淡煙寒日荻花秋聲畫録王山山魏人荅盈盈長歌東風豔豔桃李鬆花園春入屠酥濃龍腦透縷鮫綃紅鴛鴦十二羅芙蓉盈盈初見十五六眉試青膏鬢垂緑道字不正嬌滿懷學得襄陽大隄曲阿母偏憐掌上看自此風流難管束鶯啄含桃未嚥時便會郎時風動竹日高一丈羅窗晚啼鳥壓花新睡短膩雲纖指擺還偏半被可憐畱翠暖淡黄衫袖仙衣輕紅玉欄干䊋粉淺酒痕落腮梅忍寒春羞入眼横波豔一縷未消山枕紅斜睇整衣移步嬾才如韓壽潘安亞擲果竊香心暗嫁小花靜院酒闌珊别有私言銀燭下簾聲浪皺金泥額六尺牙牀羅帳窄釵横啼笑兩不分厯盡風期腰一搦若敎飛上九天歌一聲自可傾人國嬌多必是春工與有能動人情幾許前年按舞使君筵睡起忍羞頭不舉鳳凰簫冷曲成遲凝醉桃花過風雨阿盈阿盈聽我語勸君休向陽臺住一生縱得楚王憐宋玉才多誰解賦洛陽無限青樓女袖籠紅牙金鳳縷春衫粉面誰家郎只把黄金買歌舞就中薄倖五陵兒一日憐新棄如土雲零雨落正堪悲室入他人夢來去浣花溪上海棠灣薛濤朱戸皆金鐶韋皋筆逸玳瑁落張佑盞滑琉璃乾壓倒念奴價百倍興來竒怪生毫端醉眸覷紙聊一掃落花飛雪聲漫漫夢得見之為改觀樂天更敢尋常看花間不肯下翠幕竟日烜赫羅雕鞍掃眉塗粉迨七十老大始頂菖蒲冠薛濤夀七十始頂菖蒲冠學謝自然上升之術至今愁人錦江口秋蛬露草孤墳寒盈盈大雅眞可惜爾身此後不可得滿天風月獨倚欄醉岸濃雲呼佚墨久之不見予心憶高城去天無幾尺斜陽銜山雲半紅遠水無風天一碧望眼空遙沈翠翼銀河易闊天南北瘦盡休文帶眼移忍向小樓清淚滴弔盈盈浮世繁華一夢休登臨因憶昔年遊人歸依舊野花笑玉冷幾經墳樹秋風月過情須感慨江山多恨即遲畱如今縱擬誇才思事往情多特地愁夷堅志魏人王山能爲詩標韻清卓因省試下第薄遊東海值呉女盈盈者來年方十六善歌舞尤工彈箏容貌甚冶詞翰清思翹翹出羣少年子爭登其門不惜金帛盈遴簡嘉耦乃許一笑府守田龍圖召使侍宴山預賔列相得於樽俎之間從之驩處累月山辭歸盈垂泣悲啼不能自止明年寄傷春曲示山山作長歌荅之云云又明年山適淄川遇王通判於邸舍出盈盈簡欲偕遊山東時方初夏山巳病不克赴其約秋中再如山東盈巳死山登岱岳至玉女池題詩於石弔之云云王崇崇字極之送王才元入京曰璐按王直方父名棫字才元渭城楊栁已青青强駐行人聽渭城不問使車歸路遠且從蘆酒滿杯傾相逢洮塞休兵後此去秦川照眼明若立螭頭前借箸且敎充國事春耕王直方詩話王崇極之與先君同在熙河作詩送先君入京云云先君誦其詩于呉沖卿丞相由此知名王禹錫句打葉雨拳隨手重吹涼風口逐人來王直方詩話王禹錫行十六與東坡有姻連嘗作賀知縣春雨詩云云東坡云十六郎作詩怎得如此入規矩禹錫云是醉中作異日又持一大軸呈坡坡曰爾復醉耶李孝伯晚泊鳳凰驛次韻蔣穎叔維舟亭下號三灣萬疊青山一水間偏愛澄江照天碧飛來幾片白雲閒錦繡萬花谷唐默默字存中會稽人陸農師列爲上客每愛其詩句茅屋不聞雪紙窗宜讀書山林誤採槍旗信卻怪枝頭雪未消莫似君家三十五時來不寄一行書送高彥應㑹稽志黄嗣徽題宋復古郎中畫山水匣有瑶琴篋有書棲遲猶未卜吾廬主人況是丹青手乞取生涯似畫圖許彥周詩話嗣徽少年時讀書有俊聲不幸爲後母訴于官隸軍籍王岐公宣籍得之聞其識字使抄書一日觀宋復古郎中所畫山水使子弟賦詩嗣徽亦請賦公頷之頃刻成一絶云云公大嗟賞之及問知曲折以故人子奏於朝乞以門客恩澤承務郎特補之命下之日暴卒方澤武昌阻風江上春風畱客舟無窮歸思滿東流與君盡日閒臨水貪看飛花忘卻愁西清詩話題華清宫一絕乃杜常作也武昌阻風一絕乃方澤作也二人不以文藝名世而詩語驚人如此殆不可知矣張軫句山曉月初上江鳴潮欲來錦繡萬花谷宋詩紀事巻三十
