body:
  text: 宋詩紀事卷二十一錢塘厲鶚撰蘇軾軾字子瞻洵長子嘉祐二年進士乙科對制策入三等纍除中書舍人翰林學士歷端明殿學士禮部尚書紹聖初坐訕謗安置惠州徙昌化徽宗立赦還提舉玉局觀建中靖國元年卒于常州髙宗朝贈太師諡文忠有東坡前後集和陶集應詔集明道雜志蘇惠州嘗以作詩下獄再起遂遍歷侍從而作詩每為不知者咀味以為有譏訕而實不然也出守錢唐來别潞公公曰願君至杭少作詩恐為不相喜者誣謗再三言之臨别上馬笑曰若還興也便有箋云時有吳處厚者取蔡安州詩作注蔡安州遂遇禍故有箋云之戲又云願君不忘鄙言某雖老悖然所謂者希之嵗不妨也善之言敖陶孫詩評蘇東坡如屈注天潢倒連滄海變眩百怪終歸雄渾庚溪詩話光堯太上皇帝朝盡復軾官擢其孫符至尚書今上皇帝尤愛其文梁丞相叔子乾道初任掖垣一日內中宿直召對上曰近有趙夔等注軾詩甚詳卿見之否命內侍取出以示之至乾道末上遂為軾御製文集序贊命有司刋之因贈太師諡文忠又賜曽孫嶠出身擢為臺諫侍從題韓康公家妓白團扇曰琯按續集作雜詩字句有小異窗搖細浪魚吹日舞罷花枝蜂繞衣不覺南風吹酒醒空教明月照人歸侯鯖録韓康公絳子華謝事後自潁入京看上元至十六日私第會從官九人皆門生故吏盡一時名德如傅欽之胡完夫錢穆父東坡劉貢父顧子敦皆在坐錢穆父知府至晚子華不悅坡云今日為本殿燒香人多留住坐客大笑錢形肖九子母丈夫也方坐出家妓十餘人侍飲其專寵者曰魯生舞罷為逰蜂所螫子華意不甚懌久之呼出持白團扇從東坡乞詩坡書云云上句記姓下句書蜂事康公大喜坡曰惟恐他姬厮賴故云耳客皆大笑題萬松亭十年種木百年規好德無人助我儀縣令若同倉庾氏亭松應長子孫枝天公不赦斧斤厄野火解憐冰雪姿為問幾株能合抱殷勤記取角弓詩復齋漫録萬松亭在關山始麻城縣令張毅植萬松于道用以庇行者且以名其亭去未十年而松之存者十不及三四東坡元豐二年謫居黃州過而賦詩云崇寧以還坡文方禁故詩碑不復見而過往題詠者不可勝紀鄱陽倪左司濤傷之以詩云舊韻無儀字蒼髯有恨聲謂此也何公橋一名政和橋天壤之間水居其多人之往來如鵜在河順水而行雲駛鳥疾惟水之利千里咫尺亂流而涉過膝則止惟水之害咫尺千里沔彼濫觴蛙跳鯈逰溢而懷山神禹所憂豈無一木支此大壞舞于盤渦冰拆雷解坐使此邦畫為兩州雞犬相聞胡越莫救允毅何公甚勇于仁始作石梁其艱其勤將作復止更此百難公心如鐵匪石則堅公以身先民以悅使老壯負石如負其子疏為玉虹隱如金隄直欄橫檻百賈所棲我來與公同載而出歡呼闐道抱其馬足我嘆而言視此滔滔未見剛者孰為此橋願公千嵗與橋壽考持節復來以慰父老如朱仲卿食于桐鄉我作銘詩子孫不忘容齋三筆英州小市江水貫其中舊架木作橋每不過數年輒為湍潦所壞郡守建安何智甫始疊石為之方成而東坡還自海外何求文以紀坡作四言詩凡五十六句豫侍親居英與僧希賜遊南山步過橋上讀詩碑希賜云真本藏于何氏此有石刻經黨禁亦不存今以板刻之乃希賜所書也賜因言何公初請記坡為賦此詩既大書矣而未遣送郡侯兵執役者見之以告何何又來謁坡曰軾未到橋所難以想像落筆何即命具食拉坡偕往坡曰使君為地主宜先升車何謝不敢乃並轎而行既至坡曰正堪作詩晚當奉戒抵暮送與之蓋中云我來與公同載而出歡呼填道抱其馬足故欲同行以印此語耳吕與叔博士挽詞言中謀猷行中經關西人物數清英欲過叔度留終日未識魯山空此生論議凋零三益友功名分付二難兄老來尚有憂時歎此涕無從何處傾翟耆年籀史吕大臨字與叔丞相大防之弟監鳯翔府司竹監東西省從官列其行義修飭文辭爾雅除太學博士著考古圗三十卷其卒也東坡作挽詩哭之云贈李委山頭鳴鶴向南飛載我南逰到九嶷下界何人也吹笛可憐時復犯龜兹以上東坡前後集苕溪漁隱叢話元豐五年十二月十九日東坡生日也置酒赤壁磯下踞髙峰俯鶻巢酒酣笛聲起于江上客有郭古二生頗知音曰笛聲有新意非俗工也使人問之則進士李委聞坡生日作新曲曰鶴南飛以獻呼之使前則青巾紫裘腰笛而已既奏新曲又快作數弄嘹然有穿雲裂石之聲坐客引滿醉倒委袖出嘉紙一幅曰吾何求于公得一絶足矣坡笑而從之太真妃裙帶詞百疊漪漪水皺六銖縰縰雲輕植立含風廣殿微聞環佩搖聲苕溪渙隱叢話軾自蜀應舉京師道過華清宫夢明皇令賦太真妃裙帶詞乃六言詩也覺而記之端午帖子上林珍木暗池臺蜀産吳苞萬里來不獨盤中見盧橘時于粽裏得楊梅墨莊漫録玉臺新詠徐君蒨共內人夜守嵗詩酒中喜桃子粽裏覔楊梅今人未見以楊梅為粽東坡以角黍為午日之饌故借言之耳來鶴亭鴻漸偏宜丹鳯南冠霞披月羽毿毿酒酣亭子來看舞有客新名喚作耽袁褧楓窗小牘余汴城故居近陳州門內蔡河東畔居後有圃喬林深竹映帶城隅中有來鶴亭王大父時有野鶴來棲遂馴狎不去蘇子瞻有詩云云每誦之未嘗不淚滿青衫也大庾嶺村居題壁鶴骨霜髯心已灰青松夾道手親栽問翁大庾嶺頭住曾見南遷幾箇回娛書堂詩話東坡還至庾嶺上少憩村店有一老翁出問從者曰官為誰曰蘇尚書曰是蘇子瞻歟曰是也乃前揖坡曰我聞人害公者百端今日北歸是天祐善人也東坡笑而謝之因題一詩于壁贈妓李宜東坡居士文名久何事無言及李宜恰似西川杜工部海棠雖好不題詩庚溪詩話東坡謫居齊安樂籍中李宜者色藝不下他妓因宴席中有得詩曲者宜以語訥不能有所請人皆咎之坡將移臨汝于飲餞處宜哀鳴力請坡半酣笑謂之云云書劉君佐小女裙帶任從酒滿翻香縷不願書來繫綵箋半接西湖橫緑草雙垂南浦拂紅蓮春渚紀聞每句皆用一事尤可珍寶也戲書徐黃州侍人閻姬玉筍纖纖揭繡簾一心偷看緑羅尖使君三尺毬頭帽須信從來只有簷春渚紀聞徐黃州之子叔廣嘗書先生醉墨一幅乃是張無盡過黃州而黃州有四侍人適張夫人攜其一往壻家為浴兒之會無盡因戲語云厥有美妾良由令妻即續之為小賦云道得徴章鄭趙姓稱孫妻閻齊浴兒于玉潤之家一夔足矣侍坐于冰清之側三英粲兮既暮而張夫人復還其一乃閻姬也公復書絶句云云春帖子元祐二年十二月五日進皇太妃閣東風弱栁萬絲垂的皪殘梅尚一枝繭館乍欣蠶浴後禖壇猶記燕來時式古堂書考殿閣位次春帖自歐公涑水之後惟有坡老因頌寓規不但求工樂府而已坡老欲以秦郎供帖子豈非以其才調宜用于此耶少逰不歷此官莫知工拙周美成亦有才思者代內制春帖子卅首率平平無竒及讀楊廷秀詩云玉堂著句轉春風諸老從前亦寓忠誰為君王供帖子丁寧綺語不須工劉潛夫嘗充儤值恨不得當筆措詞以續古人使果楊劉為之又不知能如坡否若徒緝綺麗諛説之詞則在太白清平樂王建和凝宫詞下風矣噫元祐往矣咸淳而後不見春帖者四五十年矣黃金臺下白玉堂中今揮翰手代不乏人太平典故行當拭目錢唐淳祐遺民仇逺謹書烏臺詩案年譜云元豐二年已未先生四十四嵗七月太子中允權監察御史何大正舒亶諫議大夫李定言公作為詩文謗訕朝政及中外臣僚無所畏憚國子博士李宜之狀亦上七月二日奉聖旨送御史臺根勘二十八日皇甫遵到湖州追之過南京文定張公上劄范蜀公上書救之八月十八日赴臺獄時獄司必欲置之死地煅煉久之不決子由請以所賜爵贖之而上亦終憐之促其獄十二月二十九日得旨責檢校尚書水部員外郎黃州團練副使本州安置按舒亶論公云陛下發錢本以業貧民則曰嬴得兒童語音好一年強半在城中陛下明法以課羣吏則曰讀書萬卷不讀律致君堯舜知無術陛下興水利則曰造物若知明主意應教斥鹵變桑田陛下議鹽鐵則曰豈是聞韶解忘味邇來三月食無鹽聞見録李定王介甫客也定不持所生母仇氏服蘇子瞻以為不孝惡之定以為恨後遂劾子瞻作詩謗訕朝政云李公簡言真宗既東封訪東坡云昔年過洛見天下隱者杞人楊朴能為詩召對自言不能上問臨行有人作詩送卿否朴曰唯臣妻有一首云更休落魄耽杯酒且莫猖狂愛詠詩今日捉將官裏去這回斷送老頭皮上大笑放還山余在湖州坐作詩追赴詔獄妻子送余出門皆哭無以語之顧謂妻子曰子獨不能如楊處士妻作一詩送我乎妻子不覺失笑余乃出山村絶句煙雨濛濛雞犬聲有生何處不安生但教黃犢無人佩布穀何勞也勸耕詩案云此詩意言是時販私鹽者多帶刀杖故取前漢龔遂令人賣劒買牛賣刀買犢曰何為帶牛佩犢意言但得鹽法寬平令民不帶刀劒而買牛犢則民自力耕不勞勸督以譏鹽法太峻不便也老翁七十自腰鐮慙愧春山筍蕨甜豈是聞韶解忘味邇來三月食無鹽詩案云此詩意言山中之人飢貧無食雖老猶自採筍蕨充飢時鹽法峻急僻逺之人無鹽食用動經數月若古之聖賢則能聞韶忘味山中小民豈能食淡而樂乎以譏鹽法太急也杖藜裹飯去匆匆過眼青錢轉手空贏得兒童語音好一年強半在城中詩案云此詩意言百姓請得青苗錢立便于城中浮費使郤又言鄊村之人一年兩度夏秋稅及數度請納和糶預買錢今來更添青苗助役錢因此莊家小子弟多在城市不著次第但學得城中語音而已以譏新法青苗助役不便也塔前古檜凛然相對敢相欺直幹凌雲未要竒根到九泉無曲處世間唯有蟄龍知石林詩話元豐間蘇子瞻繫御史獄神宗本無意深罪之時相進呈忽言蘇軾于陛下有不臣之意神宗改容曰軾固有罪然子朕不應至是卿何以知之時相因舉軾檜詩云根到九泉無曲處世間唯有蟄龍知陛下飛龍在天軾以為不知已而求地下之蟄龍非不臣而何神宗曰詩人之詞安可如此論彼自詠檜何預朕事時相語塞章子厚亦從旁解之遂薄其罪子厚嘗以語余且以醜言詆時相曰人之害物無所忌憚有如是也王定國聞見近録王和甫嘗言蘇子瞻在黃州上數欲用之王禹玉輒曰軾嘗有此心唯有蟄龍知之句陛下龍飛在天而不敬乃反求知蟄龍乎章子厚曰龍者非獨人君人臣亦皆可言龍也上曰自古稱龍者多矣如荀氏八龍孔明卧龍豈人君也及退子厚詰之曰相公乃欲覆人家族耶禹玉曰此舒亶言爾子厚曰亶之唾其亦可食乎贈孫莘老嗟余與子久離羣耳冷心灰百不聞若對青山談世事當須舉白便浮君詩案云任杭州通判日轉運司差往湖州相度隄岸利害因與知湖州孫覺相見作詩與之某是時約孫覺并坐客如有言及時事者罰一大盞雖不指言時事是非意言時事多不便不得説也天目山前緑浸裾碧瀾堂下看銜艫作隄捍水非吾事間送苕溪入太湖詩案云某為先曾言水利不便郤被轉運司差相度隄岸又云作隄捍水非吾事意言本非興水利之人以譏水利之不便也河至湖其言作趙彥材云先生倅杭以開運鹽隄捍水非吾事意謂于此可以為隄而事不在已也秋日牡丹一朵妖紅翠欲流春光回照雪霜羞化工只欲呈新巧不放間花得少休詩案云杭州一僧寺內開牡丹花數朵陳襄作絶句某和之此詩譏當時執政以化工比執政以間花比小民言執政但欲出新意擘畫令民不得暫間也寄子由眼看時事力難任貪戀君恩退未能遲鈍終須投劾去使君何日換聾丞詩案云某初到杭州寄弟轍詩此詩云眼看時事力難任時事謂新法青苗助役等事也言已才力不能勝任意亦是譏新法事煩難了辦也八月十五觀潮吳兒生長狎濤淵冒利忘生不自憐東海若知明主意應教斥鹵變桑田詩案云時新有旨禁弄潮故云吳兒生長狎濤淵冒利忘身不自憐蓋言弄潮之人為貪官中利物致其間有溺死者故朝旨禁斷某為主上好興水利因作此詩言東海若知明主意應教斥鹵變桑田意言東海若知此意當令斥鹵地盡變桑田此事之必不可成者以譏興水利之難成也和李常韻何人勸我此間來弦管生衣甑有埃緑蟻濡脣無百斛蝗蟲撲面已三回磨刀入谷追窮寇灑涕循城拾棄孩為郡鮮歡君莫歎猶勝塵土走章臺詩案云李常寄來字韻某依韻和之此詩譏新法減削公使錢太甚及造酒不得過百石致弦管生衣釜甑有塵及言蝗蟲盜賊災傷飢饉之甚以譏朝廷政事闕失及新法不便之所致也題風水洞山前乳水隔塵凡山上仙風拂檜杉細細龍鱗生亂石團團羊角轉空巖馮夷窟宅非梁棟禦寇車輿謝轡銜世事漸艱吾欲去永隨二子脫譏讒詩案云熙寧七年八月望逰杭州風水洞留題此詩云世事漸艱吾欲去永隨二子脫譏讒意謂朝廷行新法之後世事漸以艱難小人多務讒謗某思之不可以合又不可以容故欲棄官求隱居之地也蓋言世態可厭欲從馮夷之水趙彥材詩注云居禦寇之風馭為可以脫譏讒也詩集作欲出詩案作吾欲去今從詩案和劉道原敢向清時怨不容直嗟吾道與君東坐談足使淮南懼歸去方知冀北空獨鶴不須驚夜旦羣烏未可辦雌雄廬山自古不到處得與幽人子細窮詩案云和劉道原見寄詩意謂劉恕有學問性正直故作此美之因以譏諷當今進用之人也敢向清時怨不容是時恕自館中出監稅言非敢怨時之不容子也馬融謂鄭康成吾道東矣故以比之汲黯在朝淮南寢謀又以比恕之直也又使韓愈云冀北馬羣遂空言館中無人也嵇紹昻昂如獨鶴在雞羣又淮南子雞知將旦鶴知夜半又以劉恕比鶴謂衆人為雞也詩云具曰余聖誰知鳥之雌雄意言當今朝廷進用之人君子小人雜處如鳥不可辨雌雄也習射放鷹青蓋前頭點皂旗黃茅岡下出長圍弄風驕馬跑空立趁蒼鷹掠地飛回望白雲生翠巘歸來紅葉滿征衣聖朝若用西涼簿白羽猶能效一揮詩案云知密州日因祭常山回與同官習射放鷹作此詩意取西涼州主簿謝艾本是書生郤善用兵意以自比言聖朝若用某為將不減謝艾也和劉攽韻白髮相望兩故人眼看時事幾番新曲無和者應思郢論少卑之且借秦嵗惡詩人無好語夜長鰥守向誰親少思多睡無如我鼻息如雷撼四鄰詩案云熙寧九年劉攽寄秦字韻詩與某尋和之此詩云眼看時事幾番新以譏近日更立新法事多也十載漂然不可期那堪重作看花詩門前惡語誰傅出醉後狂歌自不知刺舌君今猶未戒炙眉我亦更何辭相從痛飲無餘事正是春容最好時詩案云劉攽聞人唱某小詞作詩相戲某和之此詩引賀拔惎以錐刺其子舌戒以言語事以戲攽又不合引王舒狂言為王敦炙其眉事以自比以譏時人不能容狂直之言也和李清臣韻五斗塵勞尚足留閉門聊欲治幽憂羞為毛遂囊中穎未許朱雲地下逰無事會須成好飲思歸時亦賦登樓羡君幕府如僧舍日向城西看浴鷗詩案云弟轍時在徐州李清臣與詩于詩後批云可求子瞻共和某次其韻朱雲漢成帝時乞斬張禹漢成帝欲誅之朱雲曰臣得地下從龍逢比干逰足矣龍逢比干皆因諫而死某為屢言新法不蒙施行不合以朱雲自比意言聖明之世必無誅戮之事故未許與朱雲地下逰及王粲是魏武帝時人因天下亂離故粲在荆州依託劉表作登樓賦中有懷鄉思歸之心意亦欲作此賦也送李清臣珥筆西歸近紫宸太平典册不緣麟付君此事寧論晉載我當時舊過秦門外想無千斛米墓中知有百年人看君兩眼明如鏡休把春秋坐素臣詩案云李清臣差修國史賦詩送之某于仁宗朝曽進論二十五首皆論往古得失賈誼漢文帝時人追論秦之過失作過秦論史記載之某妄以賈誼自比意欲李清臣于國史中載所進論司馬君實獨樂園元城先生語録云老先生于國子監之側得故營地創獨樂園自傷不得與衆同也以當時君子自比伊周孔孟公乃以種竹澆花事自比晉唐間人以救其弊也胡苕溪云元城所謂當時君子自比伊周孔孟者意誚金陵也青山在屋上流水在屋下中有五畝園花竹秀而野花香襲杖屨竹色侵盞斝尊酒樂餘春棊局消長夏洛陽古多士風俗猶爾雅先生卧不出冠蓋傾洛社雖云與衆樂中有獨樂者才全德不形所貴知我寡先生獨何事四海望陶冶兒董誦君實走卒知司馬持此欲安歸造物不我舍名聲逐我輩此病天所赭撫掌笑先生年來學喑啞詩案云司馬光在西京葺一園名獨樂園作詩寄之此詩言四海望光執政陶冶天下以譏見任執政不得其人又言兒童走卒皆知其姓字終當進用緣光曾言新法不便某亦曾言新法不便既言終當進用光意亦譏朝廷新法不便終用光改變此法也又言光郤瘖默不言意望光依前上言攻擊新法也送劉攽通判泰州君不見阮嗣宗臧否不挂口莫誇舌在牙齒牢是中唯可飲醇酒讀書不用多作詩不須工海邉無事日日醉夢魂不到蓬萊宫秋風昨夜入庭樹蓴絲未老君先去君先去幾時回劉郎應白髮桃花開不開詩案云此詩云君不見阮嗣宗臧否不挂口莫誇舌在牙齒牢是中唯可飲醇酒言當學阮籍口不臧否人物唯可飲酒勿談時事意以譏新法不便不容人直言也送曾鞏通判越州醉翁門下士雜遝難為賢曾子獨超軼孤芳陋羣妍昔從南方來與翁兩聫翩翁今自憔悴子去亦宜然賈誼窮適楚樂生老思燕那因江膾美遽厭天庖羶但苦世論隘聒耳如蜩蟬安得萬頃池養此橫海鱣詩案云曾鞏通判越州臨行館閣同舍舊例餞送衆人分韻得然字韻此詩云但苦世論隘聒耳如蜩蟬以譏近日朝廷進用多刻薄之人議論褊隘喧亂如蟬又云安得萬頃池養此橫海鱣者以比曾鞏賢才也後漢黃憲汪汪如萬頃波言安得有度量如黃憲者以容養此宏才也熙寧五年某寫書柬寄曾鞏言賦役毛起鹽法峻急民不安命以譏新法青苗助役煩碎如毛及鹽法峻急不堪也留題風水洞春山磔磔鳴春禽此間不可無我吟路長漫漫傍江浦此間不可無君語金鯽池邊不見君追君直過定山村路人皆言君未逺騎馬少年清且婉風巖水穴舊聞名只隔山溪夜不行溪橋曉溜浮梅萼知君繫馬巖花落出城三日尚逶遲妻孥怪罵歸何時世上小兒誇疾走如君相待今安有詩案云熙寧七年二月二十七日逰杭州風水洞節推李佖知軾到來先行三日留彼見待某到彼于壁上留題詩末句云世上小兒誇疾走如君相待今安有意以譏諷世之小人多務急進也詩話云舊讀蘇子美六和塔詩云松橋待先生金鯽竟中獨遲留初不喻此語及倅錢唐乃知寺後池有此魚金色也昨復逰池上投餅餌乃略出不食復入則此魚自珍貴蓋久矣和劉道原寄張師民仁義大捷徑詩書一旅亭相夸綬若若猶誦麥青青腐鼠何勞嚇髙鴻本自冥顛狂不用喚酒盡漸須醒詩案云此詩譏近日朝廷進用之人以仁義為捷徑詩書為逆旅但為印綬爵祿所誘則假捷徑以進如莊子所謂儒以詩禮發冢故云麥青青又言小人之顧祿位如鴟鳶以腐鼠嚇鴻鵠其溺于利如人之醉于酒盡則自醒也者亦未元城先生語録子弟固欲其佳然不佳必無用處元豐二年東坡下御史獄天下之士痛之環視而不敢救時張安道在南京憤然上疏欲附南京遞府官不敢受乃遣其子恕持至登聞鼓院投進恕素愚懦徘徊不敢投後東坡出獄見其副本因吐舌色動久之問其故東坡不答後子由亦見之云宜吾兄之吐舌也此事正得張恕力或問其故子由曰獨不見鄭崇之救蓋寬饒乎其疏有云上無許史之屬下無金張之託此語正是激宣帝怒耳且寬饒正以犯許史輩有此禍今乃再訐之是益其怒也且東坡何罪獨以名太髙與朝廷爭勝耳今安道之疏乃云其文學實天下之異才也獨不激人主之怒乎但一時急欲救之故為此言耳僕曰然則是時救東坡宜為何説先生曰但言本朝未嘗殺士大夫今乃開端則是殺士大夫自陛下始神宗好名而畏義疑可以止之詩案所載不止此餘長篇詳見别集刋行御史獄中遺子由聖主如天萬物春小臣愚暗自亡身百年未滿先償債十口無歸更纍人是處青山可藏骨他年夜雨獨傷神與君今世為兄弟更結來生未了因本序云豫以事繫御史臺獄府吏稍見侵自度不能堪死獄中不得别子由故作詩授獄卒梁成以遺子由以上詩林廣記蘇轍轍字子由洵次子與兄軾同登進士舉制科哲宗朝代軾為翰林學士纍拜尚書右丞進門下侍郎自紹聖初至崇寧再被謫貶晚罷祠居許州復大中大夫致仕自號潁濵遺老卒追復端明殿學士淳熙中諡文定有欒城集前集後集應詔集南窗京城三日雪雪盡泥方深閉門謝還往不聞車馬音西齋書帙亂南窗朝日升展轉守牀榻欲起復不能開戶失瓊玉滿階松竹隂故人逺方來疑我何苦心疏拙自當爾有酒聊共斟容齋隨筆此其少年時所作也東坡好書之以為人間當有數百本蓋間淡簡逺得味外味題李公麟山莊圗并序伯時作龍眠山莊圗由建德館至垂雲沜著録者十六處自西而南凡數里巖崿隱見泉源相屬山行者路窮于此道南溪山清深秀峙可逰者有四曰勝金巖寶華巖陳彭漈鵲源以其不可緒見也故特著于後子瞻既為之記又屬轍賦小詩二十章以繼摩詰輞川之作云龍眠淨淥中微吟作雲雨幽人建德居知是清風主建德館此心初無住每與物皆禪如何一丸墨舒卷化山川墨禪堂佛口如瀾翻初無一正定畫作正定看于何是佛性華嚴堂清溪便種稻秋晚連雲熟不待見新舂西風薌自足雲薌閣山開稍有路水放亦成川遊人得所息真意方淡然發真塢山居少華麗牽茅結淨屋此間不受塵幽人亦新沐薌茅館泉流逢石缺脈散成寶網水作瓔珞看山是如來相瓔珞巖石室空無主浮雲自去來人間春雨足歸意帶風雷棲雲室世道自碎破全理未嘗違溪山亦何有永覺平日非祕全菴共恨春不長逡巡就搖落一見洞中天真知世間惡延華洞石門日不下潭鏡月長臨細細溪風度相看識此心澄元谷層崖落飛泉微風泛喬木坐遣谷中人家家有琴築泠泠谷白龍晝飲潭修尾挂石壁幽人欲下看雨雹晴相射玉龍峽倚崖開翠壁臨潭置苔石有所獨無人君心得未得觀音巖未見垂雲沜其如歸興何路窮雙足熟為我洗盤陀垂雲沜置馬步巖間巖前得平地肴蔬取行簏粗飽有遺味勝金巖團團寶華巖重重蔭珍木歸來得商鼎試鬻溪邉緑寶華巖蒼壁立精鐵縣泉瀉天紳山行見自久指與未來人陳彭漈深溪龜魚驕石瘦椿楠徑借子木蘭船寬我芒鞋病鵲源四時皆記伯時所畫秦虢夫人走馬圗二絶秦虢風流本一家豐枝穠葉映雙花欲分妍醜都無處夾道逰人空嘆嗟朱韁玉勒鞚飛龍笑語喧譁步驟同馳入九重人不見金鈿翠羽落泥中書郭熙橫卷鳯閣鸞臺十二屏屏上郭熙題姓名崩崖斷壑人不到枯松野葛相攲傾黃散給舍多肉食食罷起愛飛泉清皆言古人不復見不知北門待詔白髮垂冠纓袖中短軸才半幅慘淡百里山川橫巖頭古寺擁雲木沙尾漁舟浮晚晴遙山可見不知處落霞斷雁俱微明十年江海興不淺滿帆風雨通宵行投篙椓杙便止宿買魚沽酒相逢迎歸來朝中亦何有包裹觀闕圍重城日髙困睡心有適夢中時作東南征眼前欲擬要真物拂拭東絹付與汾陽生李公麟陽關二絶百年摩詰陽關語三疊嘉榮意外聲誰遣伯時開縞素消條邊思坐中生西出陽關萬里行彎弓走馬自忘生不堪未别一杯酒長聼佳人泣渭城周昉畫美人歌深宫美人百不知飲酒食肉事逰嬉彈絲吹竹舞羅衣曲終對鏡理鬢眉岌然髙髻玉叉垂雙鬟窈窕萼葉微宛轉躑躅從嬰兒倚楹俯檻皆有姿擁扇執拂知從誰瘦者飛燕肥玉妃俯仰向背樂且悲九重深逺安得窺周生執筆心坐馳流傳人間眩心脾飛瓊小玉雲霧幃長風吹開忽見之夢魂清夜那復追老人衰朽百事非展卷一笑亦相為持付少年良所宜奉使契丹寄子瞻誰將家集過幽都每被行人問大蘇莫把文章動蠻貊恐妨談笑卧江湖苕溪漁隱叢話此欒城集中詩也澠水燕談録云張藝叟奉使大遼宿幽州館中有題蘇子瞻老人行于壁間者聞范陽書肆亦刻子瞻詩數十萹謂之大蘇集藝叟題其後曰誰傳佳句到幽都逢著邊人問大蘇此二句與子由之詩全相類疑好事者改之而為此説也使契丹題寺壁亂山環合疑無路小徑縈回長傍溪倣佛夢中尋蜀道興州東谷鳯州西以上欒城集池北偶談古北口一寺中有石刻蘇潁濱詩云云蓋公元祐間奉使契丹時所題而遼人刻石者追和張文定公少年便識成都尹中嵗仍為幕下賔待我江西徐孺子一生知已有斯人容齋四筆張文定公在蜀一見蘇公父子即以國士許之熙寧中張守陳州南都辟子由幕府元豐初東坡謫齊安子由貶監筠酒稅與張别張悽然不樂酌酒相命手寫一詩後七年子由召還猶復見之于南都及元符末自龍川還許昌因姪叔黨出坡遺墨再讀張所贈詩其薨已十年泣下不能巳乃追和之云云哀而不怨使人至今有感于斯文贈薑公弼生長藝間已異芳風流稷下古諸薑適從瓊管魚龍窟秀出羊城翰墨場滄海何曽斷地脈白袍端合破天荒錦衣他日千人看始信東坡眼目長墨莊漫録東坡在海外瓊州士人薑公弼來從學坡題其肩云滄海何曾斷地脈白袍端合破天荒公弼求足之坡云候汝登料當為汝足後入廣被貢至京師時坡已薨乃謁黃門于許下子由乃為足之云蘇隨隨晉江人嘉祐二年進士任博羅令棄官歸里號紫雲先生葆神鍊氣不與俗接後數年端坐而逝紀夢夢乘鸞鳳到仙家侍女風流魏月華琥珀盞斟千嵗酒琉璃瓶種四時花金函藏籙文刋玉石壁題名篆點砂一枕北窗初睡覺日移門外栁隂斜泉南雜記方仲謀仲謀字公輔淳安人嘉祐二年進士官殿中丞有雉山集南峯亭水色山光照曲闌芳春時節稱逰觀鶯花不為少年惜尊俎莫辭終日歡香逐好風來席上景隨佳句落毫端人間勝事今猶古誰識相并四者難青溪詩集黃履履字安中邵武人嘉祐二年進士纍除知制誥哲宗朝歷翰林學士御史中丞拜尚書右丞提舉中太一宫卒入元祐黨籍孫伯思字長睿著東觀餘論史院席上次首相吳公元韻禮攽三事宴史發兩朝餘偶綴金閨彥來紬石室書法良司馬不辭措子遊歟盛事逢衰懶重須讀五車揮麈後録蔣之翰之翰之竒兄守蘇州換蘇印和弟穎叔從來疏拙懶身謀攬轡登車已倦逰幸有醉鄊為樂地何妨吟笑老東州吳郡志蔣之竒之竒字穎叔宜興人嘉祐二年進士哲宗朝纍擢翰林學士徽宗朝拜同知樞密院事除觀文殿學士出知杭州提舉靈仙觀卒入黨籍有集春帖子昧旦求衣向曉雞蓬萊仗下日將西花添漏鼓三聲逺栁映春旗一色齊丹陽集和鮑娘題兌溪驛盡日行荒徑全家出瘴嵐鮑娘詩句好今夜宿江南清波雜志和兄之翰寵換蘇印早同侍宦向長洲今擁旌麾訪舊逰自古風流詩酒地韋蘇州後蔣蘇州吳郡志題海陵天慶觀樂子長真人碑瑶壇三級滿蒼苔想像真人飲赤杯颯颯仙風動杉檜只應飈馭暫歸來徐神翁語録和祕閣曝書會宴豆追儒雅簪纓成禮容中天開壁府左海見鼇峰汗簡陳三館緗圗煥九重紫薇方思敏十吏筆能供事文類聚後集奉敇宿齋于上清館儲祥宫日月圓丘吉前期告上清朅來修祀事齋潔奉祇明靈圉賔瑶館仙逰列玉京丹青浮象魏盛典照蓬瀛合璧事類外集寄米元章京城汨沒興如何歸棹翩翩返薜蘿盡室生涯寄京口滿牀圗籍鎖巖阿六朝人物東流盡千古山河北固多為借文殊方丈地中間容箇病維摩淨名齋帖即事渭水岐山不出兵郤攜琴劍錦官城醉來身外窮通小老去人間毁譽輕捫蝨雄豪空自許屠龍工巧竟何成雅聞岷下多區芋聊試寒爐玉糝羮詩林萬選遊朝陽巖遂登西亭有序朝陽巖在瀟江之西去治城不逺唐永泰二年元次山為道州刺史避兵至零陵訪而得之以其東嚮遂名朝陽方是時結有盛名于世故永之守丞獨孤愐竇泌為之翦荆棘建茅閣結又為之銘與歌其後桞子厚繼為之詩豫以子厚詩考之正所謂西亭者也復為之亭而系以詩昔遊不在逺幽巖臨治城嶔岑俯瀟碧庨豁延陽明緣澗可徑入滑路逼仄行泉源自何來涓涓玉鏘鳴疑穿雲雷窟常帶魚龍腥寒江淨瀉鏡怪石坐開屏幽鳥馴可羅潛蛟深莫罾梯險接層棧冠巔聳危亭俯睨極玄窞仰攀窮青冥蹇曠出物表髙虗挹元英惜哉非吾土不得憩此生舊業寄陽羡故園依晉陵秋風滆湖白春色頤山青一從紳笏去遂使猿鶴驚迂疏暗時機孱瑣叨官榮謫棄分所宜愧恧顔已盈人生詎有幾世纍吾方輕願言解羈紲上疏還簪纓寧居召魂魄恬養休性情紛華屏外慕沖淡嚴中扃窮年伴農圃畢志先疇耕淡巖零陵水石天下聞淡山之勝難具論初從崖口入地底始見殿閣開重門乃知兹洞最殊絶洞中金碧開祇園寬平可容萬人坐仰視有若覆盎盆虛明最宜朝日照隂晦常有黑雲屯盤虯夭矯垂乳下巨獸突兀巨石蹲木香一株在巖壁人迹峭絶不可捫呀然雙穴露天半籠絡萬象將并吞只疑七竅混沌在五竅忘失兩竅存神竒遺迹未泯滅至今猶有斧鑿䀶雲牀石屏極隈隩昔有居士常潛蟠避秦不出號徴君美名遂入賢水源咸通曾為二蛇窟元暢演法蛇輒奔從兹其中建佛剎棲隱不復聞世喧惜哉此景久埋沒但與釋子安枯禪次山子厚愛山水探索幽隱窮晨昏朝陽迫迮若就狴石角秃鬝如遭髠豪萹矜誇過其實稱譽珉石為璵璠環觀珍寶欲掩有不到勝處天所慳嗟豫至此駴未覩不暇稱讚徒驚歎恨無雄文壓竒怪好事略與二子班蕪詞願勒巖上石勿使嵗久字滅漫以上零陵志清光亭鄭圃僕射陂漢陽郎官湖郎官何為名張謂佩使符泛觴江城南乃與太白俱明月一萬頃清光天下無萍鄉即事地接長沙近鄊名自古聞毛山千嶂雪玉女一堆雲拱木扶霄上飛泉觸石分霜風萍實老目斷楚江濆以上湖廣通志重湖閣宫亭彭蠡接揚瀾浩蕩橫空六月寒試問風波何似險老僧只管倚闌干廬山志水西示劉尉役役塵埃倦客情偶逢佳處得間行慿君為把如椽筆便向蒼崖記姓名寧國府志題到氏田舍到氏杳林田舍到洽到溉兄弟所居六朝冠蓋俱塵土到氏今無苗裔存當時任昉過田舍野老猶記查林村宜興縣志丁隲隲字公默晉陵人嘉祐二年進士除太常博士由儀曹出知處州有集賡蘇東坡秀出眉山有慶門風流長與蜀山存翰林未老生曾嫡想見纍纍百世孫毗陵志隲與二蘇同年有女適二蘇從子彭孫得甥東坡報以詩隲賡云云吕惠卿惠卿字吉甫晉江人璹子嘉祐二年進士為真州推官熙寧初王安石薦于神宗纍官翰林學士參知政事元祐初除建寧軍節度副使建州安置崇寧中安置宣州再移廬州死有東平集復齋漫録子美詩笠澤鱸肥人鱠玉洞庭橘熟客分金吕吉甫詩魚出清波庖鱠玉菊含寒露酒浮金吕勝于蘇蓋人客兩字雖無亦可答逢原晨出趨長司跪坐與之言偶然脫齟齬相送顔色溫歸舍未休鞍簿書隨滿門相仍賔客過攲午僅朝餐平生性懶惰應接非吾真況乃重戕賊良氣能幾存就夜甫得息閲我几上文開卷未及讀睡思已昏昏自知小人歸昭昭復何云每于清夜夢多見夫子魂側耳聽髙義如飲黃金樽覺來不得往欲飛無羽翰昨日得子詩我心子先論怪我書苦遲友道宜所敦豈不旦夕思實苦案牘繁豈無同官賢未免走與奔相見鞅掌間有言無暇陳嗟嗟茲世上無食同所患念我力難任聞子謀更艱久知屬之天安能怨窶貧吾聞君子仕行義而已焉亦將達吾義肻遂為利牽東海有滄溟西極有崑崙古來到者誰不過數子尊子已具車航吾亦為楫輪欲一從子遊不知何時然王令廣陵集附戲題風乞兒扇無人肻作原注音佐除非乞沒藥堪醫最是風求乞害風都占斷算來世上少如公賔退録趙鑑堂朝野遺事云吕吉甫在趙韓王南園京師丐人風乞兒者持大扇造吕求詩吕即書扇上云留題興安王廟翦葉疏封意歸禾協濟心遺風固唐逺積德本周深逝水悲興廢浮雲閲古今祠宫尚翬翼鳴玉潄松隂晉祠石刻許廣淵廣淵杭州新城人嘉祐二年進士淨名院杖錫窮危頂茅菴構白雲軒窗半峰出鐘磬别山聞海月曉同色爐煙晝雜熏莫教深靜處思慮落塵氛咸淳臨安志王韶韶字子純江州德安人嘉祐二年進士熙寧中歷龍圗閣學士知熙州拜觀文殿學士樞密副使罷知洪州卒諡襄敏有敷陽集詠裕老菴前老松緑皮皴剝玉嶙峋髙節分明似古人解與乾坤生氣概幾因風雨長精神裝添景物年年别捭闔窮愁日日新惟有碧霄雲裏月共君孤影最相親復齋漫録王公韶少日讀書于廬山東林裕老菴菴前有老松因賦此詩王荆公為憲江東過而見之大加稱賞遂為知已張載載字子厚先世大梁人後居鳯翔之橫渠鎮學者稱橫渠先生嘉祐二年進士以薦為崇文院檢書同知太常禮院卒有崇文集絶句渭南涇北已三遷水旱縱橫數畝田四十二年居陜右老年生計似初年兩山南北雨冥冥四牖東西萬木青面似枯髏頭似雪後生誰與屬遺經後村詩話移疾移疾謝華省問耕還弊舍扶持便疏慵曠僻逃將迓晝棊莎徑側暮粥桐隂下久矣澄清心永愧桑弧射濓洛風雅林希希字子中號醒老福州人嘉祐二年進士哲宗朝纍遷翰林學士同知樞密院事建中靖國初罷知揚州徙舒州卒贈資政殿學士諡文節詔修兩朝國史開局日史院賜筵首相吳公席上有作奉和元韻調元台極貴頒宴帝恩餘昔副名山録今裁史觀書天心憂作者國論屬誰歟寂寞懷鉛客容瞻相府車揮麈後録初至吳門示諸弟兼呈伯原教授夢寐家山忽五春君恩乞與守符新便推白傅為前政更得梁鴻作部民入境喜逢餘秉穗舉杯無復歎鱸蓴左司西掖誠非據非是詩情愧昔人將之宣城留别吳門效白樂天體被召守東吳夜渡揚子津拭目迎家山洗我京洛塵此邦多賢豪況復平生親初欲循故事公宴月三旬庶以敘契闊豈徒樂吾身臨州未閲月吏牘方紛紜避嫌俄得請主地翻為賔尊酒未重持行樂知何因物理可勝歎俯仰迹已陳趣整震澤帆遙挹敬亭春五月而報政速哉彼齊人今我若置郵何德于吳民舉手謝吳民自笑行役頻使君不能詩煩汝迎送勤來慙白太守去愧謝宣城以上吳郡志吳興繞郭芙蕖拍岸平花深蕩漿不聞聲萬家笑語荷花裏知是人間極樂城方與勝覽賀滕元發守吳興清風樓下兩溪春二十餘年一夢新自注元發初第即倅湖州距是三十年矣欲識玉皇香案吏水晶宫裏謫仙人湖州府志馮山山字允南蜀之普州人初名獻能嘉祐二年進士熙寧末為祕書丞通判梓州終祠部郎中有安嶽集山路梅花傳聞山下數株梅不免車帷暫一開試向林梢親手折早知春意逼人來何妨歸路參差見更遣東風次第催莫作尋常花蘂看江南音信隔年回西縣道中溪水引我行梁山邀我坐山水已清絶春容碧相和下馬取酒餘梅飄酒中墮日落醉不去青茸草間卧謝人惠兖墨故人山東來遺我數丸墨握丸大如指盥水重拂拭濃磨向日看古瓦增潤澤經屑不見紙清光隱深黑書云舊所祕聞今已難得庭圭死已久至寶世罕識御府從近存人間萬金直兖州擅髙價比歙固少抑古松亦將盡神竒漸衰息文章不見貴筆研豈可擲牢落況此君雖精淡無色憐君情好古投贈兼以臆世事持此觀噫嗟共冥默朝氏墨經兖沂登密之山總謂之東山東山之松色澤肥膩性質沈重品惟上上舊以十月煎膠十一月造墨工則兖州陳朗朗弟逺子惟進惟逮與易水奚氏並稱元豐九域志潞州兖州絳州皆貢墨一百枚答江安尉鮮于頃野翁寶峰首相聚錦屏袂一判音容阻良覿嵗月嗟易換我官潼江曲君尉瀘水岸到處逢酒徒無人作詩伴南風灑襟袖佳句適我願汶蜀幾萬里信息偶中斷三軒風雅會蕭條各分散孤吟少儔侣衆喙易嘲囋念君同所嗜路近聲可喚唱酬實相眷牽率豈辭憚亹亹郊籍心無為簿書亂八陳磧永安宫前瀼西磧萬流峽口爭奔激秋濤捲地裂山谷水落依然陳圗出陳形聚拳六十四傳是武侯親手迹斯人管蕭豈足道身在巴東心漢室從容所遇皆法制浩蕩胸中萬分一隂機暗與天地合壯氣曾將鬼神役至今千載矻不動渺莽幾深難致詰豈徒豪傑重嗟賞應有神靈長護惜廟偏裸裎七壯士酒炙紛紛走巫覡萬事顚倒皆偶然卧龍無處霑餘瀝以上安嶽集趙衮衮字希甫以殿中丞致仕歸隱嘉禾平江亭邀馮允南同作文公昔記滕王閣氣象終天拂寥廓崔皓題詩黃鶴樓今日聲華還磊落安漢城頭有佳處江山清氣歸簾幕少陵無人謫仙死不遇材豪終寂寞蒼苔滿地荆棘生梁棟塵埃喧鳥雀風流賢守一登臨久倚闌干情不薄夜來風月覺澄清天意人心如素約仙葩當見浮空來幾百年來無此作嗟豫好古今白頭到底支離材力弱木桃或見致瓊瑶免對江山負慙怍四朝詩鄧潤甫潤甫字溫伯建昌人嘗避高魯王諱以字行别字聖求第進士纍除知制誥翰林學士進承旨紹聖初歷尚書左丞卒贈開府儀同三司諡安惠春帖子晨曦瀲灩上簾櫳金屋熙熙歌吹中桃臉似知宫宴早百花頭上放輕紅丹陽集道中詠懷奉寄利州馮允南使君交印夔人國分襟汴水隄十年難會合一夢頓乖暌官序潘生拙詩文庾信齊諸公多汲引憲府屢提攜不肻乘驄馬那能出寶雞安恬輕世味灑落見天倪照物聰明決為邦聞望躋笑談清岸獄暇豫勸耕犁不忍為鉤距何嘗設町畦燕堂傳夜燭遊轂碾春泥衆服題鸚鵡疇將食駃騠草黃思隼擊梧碧值鸞棲欲問無來使開編有舊題君方安玉壘豫亦逺金閨地隔江波闊書傳鳥翼稽豈知雙鬢白相見兩當西內顧微他技殊私牧逺黎辭親愁不斷叱馭意空迷吳苑飛雲杳春城北斗低南山千里雪劒閣萬盤溪夜宿星邊驛朝行石上溪深疑窺地軸髙駭躡天梯看岫時攲帽聽泉或杖藜蕭蕭黃葉下裊裊冷猿啼蜀道無艱險人心漫慘悽永懷持後槖遙想綴朝圭直北瞻天日征西疊鼓鼙相期郡齋冷清話看揮犀全蜀藝文志田開開嘉祐初知封州臨封雜詠我愛臨封好詩人興味長嶺南蕉子國海上荔支莊民有百年夀家藏十載糧宦遊無逺近樂處是仙鄉我愛臨封好賔朋日往還年來甘白酒老去益朱顔引鶴遊西寺攜琴上北山君恩雖未報公外且偷間肇慶府志趙挺之挺之字正夫密州諸城人舉進士徽宗朝歷右僕射中書門下侍郎再除觀文殿大學士佑聖觀使卒贈司徒諡清憲題朱朴隱居天和堂華亭山水佳秀色宛如畫前賢有遺迹卜築俟來者高人養天和放浪寄林野安知歲月徂但喜名利捨傳家得之子流輩推博雅春風振客衣逸棹東南下賦詩臺閣彥落筆珠璣瀉持觴拜親膝喜色動鄉社都城十二衢塵土翳車馬一夢逐君行茲懷已瀟灑松江府志范百祿百祿字子功華陽人鎮姪舉進士終中書侍郎諡文簡祖禹其姪也中秋待月夜分乃見十二周流數經行自不違長圓非物理暫晦亦天時人欲終宵玩雲才逐族移秪應逢此景無足纍心期古今歲時雜詠楊夀祺夀祺官著作郎合江令將過益昌先寄馮允南使君衮衮京華志氣低歸心長伴日輪西蒼顔白髮因新選明月清風思舊溪屈指光隂時節晚舉頭霄漢路岐迷巴陵太守應憐我準擬經過醉似泥馮山安嶽集附李時亮時亮字端夫博白人嘉祐中進士纍官御史大夫與陶弼相賡和有李陶集蟠龍山獨臥粵南天盡頭吐吞清氣壓林丘風雲上下三千丈霧雨西南十六州古澗有泉穿石冷隂崖無暑滿山秋我來結構林亭下時復憑欄看未休名勝志宋詩紀事卷二十一
