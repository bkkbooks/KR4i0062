body:
  text: 宋詩紀事巻四錢塘厲鶚撰姚鉉鉉字寶之廬州合肥人太平興國八年進士知鄆州入為起居舎人累遷兩浙轉運使有文集賞花釣魚侍宴應制上苑煙花迥不同漢皇何必幸回中花枝冷濺昭陽雨釣線斜牽太液風綺萼惹衣朱檻近錦鱗隨手玉波空小臣侍宴驚凡目知是蓬萊第幾重詩話總龜淳化中春日苑中賞花釣魚小宴宰相至三館預坐咸使賦詩上覽以第優劣時姚鉉賜白金百兩時輩榮之以比奪袍賜花等故事松江句吳竒勝絶無儔更見松江八月秋震澤波光連别派洞庭山影落中流汀蘆擁雪藏漁市岸竹香風趁客舟清興不窮聊一望煙空雲霽倚層樓蘇州府志句疎鐘天竺曉一雁海門秋錢塘郡皇朝類苑歐陽程程營道人太平興國八年進士仕至屯田員外郎詠池亭鑿開幽境泛流萍廻合波間小洞庭寒影倒吞凌漢樹冷光髙浴半天星魚翻錦鬛波紋皺鷺洗霜翎水氣腥昨夜蛟龍忽飛去滿軒風雨震雷霆湖廣通志歐陽程初名和營道人少貧兄為郡吏依之傭書賦池亭詩太守大喜給俸金遣充學官弟子太平興國八年赴試路逢一青衣童子云以今科省榜走報各處城隍因問歐陽和中否曰但有歐陽程因改名程是年登第王禹偁禹偁字元之鉅野人九嵗能文太平興國八年登進士歴右拾遺拜左司諫廬州妖尼道安誣訟徐鉉禹偁請論道安罪貶商州團練副使累遷翰林學士坐謗訕知滁州眞宗即位召知制誥出知黃州卒有小畜集晁以道與三泉李奉議書云本朝王元之之後晏公晏公之後歐陽公歐陽之後東坡皆號一代龍門其門下灑掃應對之士後為名公卿將相者不可勝數也西清詩話王元之父本磨家畢文簡士安為州從事元之代其父輸麫至公宇立庭下文簡方命諸子屬句云鸚鵡能言爭比鳯元之抗聲曰蜘蛛雖巧不如蠶文簡曰子精神滿腹將且名世後與公接武朝廷松江三年為吏住江濵重到江頭照病身滿眼碧波輸野鳥一蓑疎雨屬漁人隨船曉月孤輪白入座晴山數㸃春張翰精靈應笑我綠袍依舊惹埃塵汎吳松江帶篷疎薄漏斜陽半日孤吟未過江惟有鷺鷥知我意時時翹足對船窗移任長洲移任長洲縣舟中興有餘篷高猶見月棹隱不妨書雨碧蘆枝亞霜紅蓼穗疎此行紆墨綬不是為鱸魚移任長洲縣窮秋入水鄉江涵千頃月船載一篷霜竹密藏魚躍雲疎漏雁行故園漸迢遞烟浪自茫茫虎丘蘚牆圍著碧孱顔曾是當年海涌山盡把好峯藏寺裏不教幽境落人間劒池草色經冬在石座苔花自古斑珍重晉朝吾祖宅一回來此便忘還絶句謫官無俸突無煙唯擁琴書盡日眠還有一般勝趙壹囊中猶貯御書錢侯鯖錄前世錢未有草書者淳化中太宗始以宸翰為之即成以賜近臣崇寧大觀中御書錢蓋襲故事也王元之謫商於有詩云云春日雜興兩株桃杏暎籬斜妝㸃商州副使家何事春風容不得和鶯吹折數枝花蔡寛夫詩話元之嘗學白樂天詩在商州賦春日雜興云云其子嘉祐謂老杜嘗有恰似春風相欺得夜來吹折數枝花之句語頗相近請易之元之欣然曰吾詩精詣遂能暗合子美耶更為詩曰本擬樂天為後進敢期杜甫是前身卒不復易齊安郡作憶昔西都看牡丹稍無顔色便心闌而今寂寞山城裏鼓子花開亦喜歡能改齋漫録王元之謫齊安郡民物荒涼殊無佳况營妓有不佳者公詩云云然唐抒情集記朝士在外地覩野花追思京師舊遊詩云曾過街西看牡丹牡丹未謝郎心闌如今變作村田眼鼓子花開亦喜歡蓋王刋定此詩耳題錢塘縣羅隱手植海棠江東遺蹟在錢塘手植庭花滿縣香若使當時居顯位海棠今日是甘棠以上小畜集别諸生綴行相送我何榮老鶴乘軒媿谷鶯三入承明不知舉看人門下放門生澠水燕談王元之初知制誥上疏雪徐鉉貶商州召入為學士坐辨孝章皇后不實謫滁州復召知制誥撰太祖尊號册坐輕誣謫黃州作三黜賦以自述時蘇易簡適放㮄奏曰禹偁翰林名儒今將全㮄諸生送於郊上可其奏諸生别元之占一絶付狀元孫何曰為我多謝蘇易簡云投時相早有虛名達九重宦途流落漸龍鍾散為郎吏同元稹羞見都人看李邕舊日謬吟紅藥樹新朝曾獻皁囊封猶祈少報君恩了歸卧山林作老農石林燕語王元之初自掖垣謫商州團練副使至道中復自學士謫滁州眞宗即位以刑部郎召知制誥凡再貶還朝不無怏怏時張丞相齊賢李文定沆當國以詩投之齊賢不悦繼有黃州之遷句元象中台拆皇家上相薨大功銘玉鉉密事在金縢趙普挽詞先帝升遐日詞臣寓直時柩前言顧命筆下定鴻詞宋湜挽詞以上青箱雜記身後聲名文集草眼前衣食簿書堆澤畔騷人正憔悴道旁山鬼莫揶揄許彥周詩話元之詩可重大抵語廹切而意雍容有句云云類樂天也羅處約處約字思純益州華陽人太平興國八年進士知吳縣太宗召試擢著作郎直史館詔授荆湖路廵撫卒蘇易簡王禹偁集其文為東觀集泛太湖三萬六千頃湖侵海内田逢山方得地見月始知天南國吞將盡東溟勢欲連何當灑為雨無處不豐年宋文鑑鄭文寶文寶字仲賢寧化人仕南唐校書郎宋太平興國八年舉進士歷官陜西轉運使兵部員外郎東都事畧文寶以詩名家多警句善篆工琴題王子晉祠秋陰漠漠秋雲輕緱氏山頭月正明帝子西飛仙馭逺不知何處夜吹笙西清詩話緱氏王子晉昇仙之地有祠在焉鄭工部文寶題一絶云云後晏元獻守洛過見之取白樂天語書其後云此詩在處有神物䕶持寒食訪僧客舎愁經百五春雨餘溪寺綠無塵金花開處鞦韆鼔粉頰誰家鬬草人水上碧桃流片段梁閒新燕語逡廵高僧不飲客攜酒來勸先朝放逐臣郢城新亭每到新亭即厭歸野香經雨長松圍四簷山色消繁暑一局棊聲下翠微冰片角巾簪澗月錦文巻石砌苔磯近來學得籠中鶴廻避流鶯笑不飛以上玉壺野史闕題亭亭畫舸繫寒潭直到行人酒半酣不管烟波與風雨載將離恨過江南一夜西風旅雁秋背身調鏃索征裘闗山落盡黄榆葉駐馬誰家唱石州江雲薄薄日斜暉江館蕭條獨掩扉梁燕不知人事改雨中猶作一雙飛蔡寛夫詩話送曹緯劉鼎二秀才旦夕春風老離心共黯然小舟聞笛夜微雨養花天手筆人皆有曹劉世所賢郴侯重才子從此看鶯遷宋文鑑句百草千花路輕風細雨天過關已躍樗蒱馬誤喘猶驚顧兔屏重經貶所杜曲花光濃似酒灞陵春色老于人長安送别詩滿帆西日催行客一夜東風落楚梅送人歸湖中失意此中遷客酒多年不見侍臣花以上皇朝類苑沙暖鳧鷖行哺子蹊深桃李卧開花蔡寛夫詩話歐陽文忠公稱仲賢張僕射園中一聯以為集中少比其詩云云曽致堯致堯字正臣撫州南豐人太平興國八年進士真宗朝以户部郎知泰泉等州有山亭六詠集崇覺寺水深花影地莓苔春色烘人若不開走報鴒原無别事逺將歌管酒壺來西江詩話句沙鷺窺吟榻風蟬入座隅六詠芙蓉閣雲昏迷候館樹缺辨江湖六詠望江樓以上輿地紀勝寇準準字平仲華州下邽人太平興國中進士淳化五年參知政事眞宗朝累官尚書右僕射集賢殿大學士同中書門下平章事封萊國公乾興初貶雷州司户徙衡州司馬卒仁宗時贈中書令諡忠愍有巴東集湘山野錄萊公有野水無人渡孤舟盡日横之句深入唐人風格送人使嶺南句云到海只十里過山應萬重人以為警絶晚竄海康至境首問雷吏去海逺近曰只可十里憔悴奔竄已兆于此雜記魏仲先贈萊公詩曰有官居鼎鼐無青箱地起樓臺播傳漠北章聖朝北使至問那箇是無地起樓臺相公時方居散地因召還授北門宫鑰苕溪漁隱叢話忠愍公詩含思悽惋葢富於情者也江南春波淼淼柳依依孤村芳草逺斜日杏花飛江南春盡離腸斷蘋滿汀洲人未歸杳杳煙波隔千里白蘋香散東風起日落汀洲一望時柔情不斷如春水湘山野錄萊公富貴之時所作詩皆悽楚愁怨嘗為江南春云云春日登樓懷歸髙樓聊引望杳杳一川平野水無人渡孤舟盡日橫荒村生斷靄古寺語流鶯舊業遙清渭沈思忽自驚水村即事虚齋臨逺水吟釣度朝晡葦岸秋聲合莎庭鶴影孤片雲藏疊巘野燒起寒蕪獨歩時凝望離人隔五湖題巴東寺寺在猿啼外門開古澗涯山深微有徑樹老半無枝望逺雲長暝談空日易移恐朝金馬去還失白蓮期書河上亭壁暮天寥落凍雲垂一望危亭欲下遲臨水數村誰畫得淺山寒雪未消時海康西館有懷風露凄凉西館静悄然懷舊一長歎海雲銷盡金波冷半夜無人獨凭闌以上寇萊公集過襄州留題驛亭沙堤築處迎丞相驛吏催時送逐臣到了輸他林下客無榮無辱自由身石林詩話和蒨桃將相功名終若何不堪急景似奔梭人間萬事何須問且向樽前聽豔歌侍兒小名錄拾遺春晝白晝綠成芳草夢起來幽興有新詩風簾不動黃鸝語坐見庭花日影移春恨侵堦草色連朝雨滿地梨花昨夜風蜀魄不來春寂寞楚魂吟夜月朦朧以上合璧事類前集李含章含章字時用宣城人太平興國中進士官屯田都官員外郎充三司度支判官出知本郡罷遊桃源觀碧草芊綿十洞春青蒼寒疊五溪雲山縈乳竇層層秀路隔桃花處處分苔徑竹深迷鶴跡石壇松古漏星文通宵回想塵寰事好結茅茨向水濵宛雅何承矩承矩字正則河南人贈侍中繼筠子㓜為棣州衙内指揮使太平興國中知潭州至齊州團練使夢溪筆談瓦橋關北與遼為鄰素無闗河為阻六宅使何承矩守關始議瀦水為塞恐謀泄日㑹僚佐汎船置酒賞蓼花作蓼花游數十篇文昭園聞提壺有感馬家公子好樓臺鑿破青山碧沼開啼鳥不知人事變數聲猶傍水邊來方輿勝覽文昭園在潭州興國閒何承矩為守園吏云昔屬馬家今歸趙氏因聞提壺有感作詩云云王操操字正美江南處士太平興國時上南郊頌授太子洗馬仕至殿中丞黃葵奉使隴右至石濠驛作昔年南國看黃葵雲鬢金釵向後垂今日衰容籬落下秋風寂寞兩三枝雅言系述題水心寺壁分飛南渡春風晚卻返家林舊業空無限離情似楊柳萬條垂向楚江東歴代吟譜王操謁宋國老獻詩送數百縑于鍾陵飲酒數日而盡醉中挂帆數百里至落星灣半醉醒煙雨中登水心寺題詩於壁送人南歸相送當揺落孤舟泛𣺌瀰去帆看已逺臨水立多時别浦寒鴻下空山夜鶴移他年重㑹靣吟鬢共成絲喜故人至地僻無賔侣柴門晝始開谿山寒葉落江國故人來話舊驚霜鬢論詩滯酒杯相留喜同宿不寐曙光回上李相公弱冠登龍入粉闈少年清貴古來稀袖中詔草朝天去頭上宫花侍燕歸卓筆玉堂寒漏迥巻簾池館水禽飛三台位近猶多遜閒聽秋霖憶翠微以上宋文鑑塞上無定河邊路風髙雪灑春沙平寛似海鵰逺立如人絶域居中土多年息虜塵邊城吹暮角久客自悲辛村家野景村家好柴籬夾樹身牧童眠向日山犬吠隨人地僻鄉音别年豐酒味醇風光吟有興桑麥暖逢春以上瀛奎律髓潘若沖若沖太平興國中官桂林守寄南嶽廖融曾經别墅住行蹤春浪和烟撼釣筒共歩幽亭連石蘚寄眠静榻帶松風秋來頻夢岳雲白别後應添鶴頂紅又泛扁舟隨汴水不堪南望思忡忡雅言雜載王周周登進士第曾官巴蜀詩一巻胡震亨云唐宋藝文志並無其人惟文獻通考載入唐人集目中今考峽船詩序引陸魯望茶具詩其人蓋在魯望之後而詩題紀年有戊寅已卯兩嵗近則梁之貞明逺則宋之太平興國也自註地名又有漢陽軍興國軍為宋郡號殆五代人而入宋者湖口縣柴桑分邑載圖經屈曲山光展畫屏最是蘆洲東北望人家殘照隔烟汀金口歩在江北漢陽軍下必鐵也兩山鬬咽喉羣石矗牙齒行客無限愁橫吞一江水宿疎陂驛秋染棠梨葉半紅荆州東望草平空誰知孤宦天涯意微雨蕭蕭古驛中以上全唐詩錢熙熙字大雅泉州南安人善屬文陳洪進愛其才以弟之子妻之將署府職辭不就中雍熙二年進士仕殿中丞直史館坐累出判朗州至道閒加右司諫卒有集娛書堂詩話錢熙泉南才士曾作四夷來王賦獻太宗愛其才又嘗撰三酌酸文世稱精絕後亦不達而故鄉人李慶孫以詩弔之曰四夷妙賦無人繼三酌酸文舉世傳雞冠花亭亭高出竹籬閒露滴風吹血未乾學得京城梳洗様舊羅包卻綠雲鬟全芳備祖九日溪偶成漁家深處住鷗鷺泊柴扉雨過莎迷徑潮來風滿衣岸幽分遠景波冷漾晴暉卻憶曾遊賞嚴陵有舊磯清源文獻句鶴歸已改新城郭牛卧重尋舊墓田送人金陵拜掃皇朝類苑陳彭年彭年字永年撫州南城人雍熙二年進士眞宗朝召試為祕書丞直史館翰林學士拜參知政事進兵部侍郎卒贈右僕射諡文僖有集國老談苑陳彭年在翰林所兼十餘職皆文翰清祕之目時人謂其署銜為一條冰送申國長公主為尼曰琯按唐詩紀事作楊邭伯送妓人入道詩字句小異盡出花鈿散寶津雲鬟初翦向殘春因驚風燭難留世遂作池蓮不染身貝葉乍翻疑軸錦梵聲纔學誤梁塵從兹豔質歸空後湘浦應無解佩人湘山野錄章聖朝申國長公主為尼詔兩禁送於寺各賦詩彭年詩云云都下好事者以鷓鴣天曲聲歌之劉師道師道字損之開封人雍熙二年進士咸平初知潤州累官三司度支副使樞密直學士句南浦未傷春草碧北山猶媿曉猿驚寄别野馬飛窗日醯雞舞甕天以上皇朝類苑陳世卿世卿字光逺南劒州沙縣人雍熙二年進士眞宗朝歴官度支員外郎荆湖北路轉運使以祕書少監知廣州思古堂思古堂前酒一尊共談時事出孤村臨期上馬無他囑多買詩書教子孫延平府志錢若水若水字澹成一字長卿河南新安人雍熙中舉進士累知制誥歷集賢學士鄧州觀察并代經畧使卒贈户部尚書有集禁林讌㑹之什一夜春風滿帝都禁林清曉宴簪裾玉堂乍到驚凡目金鎖徐開見御書承㫖學士嚴以扃鐍鎖御書于玉堂之上四字驪龍爭夭矯兩篇瓊樹鬭扶疎詞臣此㑹人應羡聖主多才古不如日上花甎簾捲後柳遮鈴索雨晴初閣前吟罷先沈醉忘卻西垣有直廬翰苑羣書送楊大年知處州二首夫子厭承明還求領郡行兩章干負扆數刻對延英豈獨綵衣樂兼為晝錦榮聖朝循吏傳首得見君名汗簡成惇史分符别近班仍聞括蒼郡酷似武夷山捲箔煙霞麗登樓水石閒二年棄官去惟我獨何顔括蒼彚紀濟源縣裴公亭裴相亭成未退身空煩舞袖與歌塵至今亭下蕭蕭竹似對秋風怨主人御選四朝詩句日上花梢簾捲後柳遮鈴索雨晴初耆舊續聞孫冕冕字伯純新淦人雍熙進士天禧中尚書禮部郎中直史館出守蘇州書蘇州㕔壁人生七十鬼為鄰已覺風光屬别人莫待朝廷差致仕早謀泉石養閒身去年河北曽逢李今日淮西又見陳寄語姑蘇孫太守也須抖擻舊精神湘山野錄孫集賢冕天禧中直史館晚守蘇已及引年大書詩于㕔拂衣而往詔下公已歸矣焦宗古句芳樹高低啼蜀魄朝雲濃淡極巴天送人遊蜀文皇朝類菀雍熙以來士句朱嚴嚴工篆隸見王元之小畜集句寓直有誰同騎省立班獨自戴貂冠贈徐常侍文皇朝類苑雍熙以來士句李拱拱雍熙閒人句犬眠花影地牛牧雨聲坡題村舎楊文公談苑趙復復雍熙閒人句船官風破浪關吏鼓侵晨送晏集賢南歸苑楊文公談陳詁句籠雞對窗語鬬雀繞門飛閒居句皇朝類苑雍熙以來文士胡則則字子正婺州永康人端拱已丑進士歴太常博士提舉兩浙𣙜茶事兼知睦州又為江淮制置發運使以右諫議大夫知杭州官至兵部侍郎致仕别方巖并序端拱元年春僕與湖湘陳生束書居方巖僧舎暨命駕求岳牧薦應天子舉將與僧别率為五言十二韻書於屋壁下卜商曰動天地感鬼神莫近於詩僕罔敢知而復為或言之者無罪庶幾懐矣知我無所隱焉仲秋月朔胡則書寓居峯頂寺不覺度炎天山叟頗為約林僧每出禪虚懷思往事宴坐息諸緣照像龕燈暗通宵磬韻傳冥心資寂寞琢句極幽𤣥拾菌寒雲下烹茶翠竹前逺陰臨岳樹清響荅巖泉僻徑無來客新秋足亂蟬松風生井浪溪雨長苔錢自省隨浮世終難駐永年徧遊曾宛轉欲去更留連明日東西路依依獨黯然永康縣志陳堯叟堯叟字唐夫閬中人省華子端拱二年進士第一解褐光祿寺丞累遷樞密直學士加三班兼銀臺通進封駮司制置羣牧使大中祥符中與王欽若以本官檢校太尉同平章事尋拜右僕射知河陽卒贈侍中諡文忠洞霄宫迥合烟光疊翠屏東南山水此為靈鶯花春壓蓬萊境樓閣夜干牛斗星古檜森羅燒藥竈彩雲飄灑聚仙亭遼天俯近期歸鶴澥谷㫄通駭巨溟紫陌紅塵無一點綠毛仙骨有千齡當時聽法談𤣥者環佩鏘鏘拱上清杭州府志披雲亭秦人百二山河固陜服城闉控此中别構棟梁成爽塏俯觀竹樹立青蔥虚簷碩敞迎朝日曲檻縈廻帶晚風登眺自欣襟帶地萬方轍迹坦然同河南府志曾㑹㑹字宗元泉州晉江人端拱二年進士第二由光禄寺丞知宣州祥符末由三司判官出為兩浙轉運使仁宗朝以刑部郎中集賢殿修撰知明州重登蕭相樓不見當年李翰林江天為我結層陰九華門外柳三尺蕭相樓前松十尋物在人亡空有涙時殊事變獨傷心隻雞斗酒江干市白首風前些楚吟池州府志擣砧詞曰琯按此詩中吳紀聞作龔宗元星斿耿耿寒煙浮白龍衘月臨霜樓誰家砧弄細腰杵一聲擣破江城秋雙桐老翠墮金井髙低冷逐西風緊静如秋籟暗穿雲天半驚鴻斷斜影哀音散落愁人耳何處離情先喚起長信宫中葉滿堦洞庭湖上波平水萬里征夫眠未成搖風擣月何丁丁楚闗秦嶺有歸客一枕夜長無限情吳氏詩永盛度度字公量餘杭人端拱二年進士眞宗朝累官翰林學士仁宗景祐初拜參知政事遷知樞密院事出知應天府以太子少傅致仕卒贈太子太保諡文肅嘗被命與李宗諤楊億王曾李維舒雅任隨石中立同編文苑英華有愚谷銀臺中書中樞四集庶子泉在瑯琊山實應寺唐李幼卿守滁州始有此泉歐陽永叔云庶子泉銘李陽冰撰并書深藏西竹寺寒擁北譙城石字贊皇古泉銘庶子清方輿勝覽陳堯佐堯佐字希元閬中人端拱二年進士歴官同中書門下平章事卒贈司徒兼侍中諡文惠有愚丘集遣興集澠水燕談陳文惠公堯佐端拱元年程宿下及第同年二十八人時公兄弟俱未仕父省華為小官家極貧魏野以詩賀曰放人少處先登第舉族貧時己授官中山詩話陳文惠以使相致仕年八十有詩云青雲岐路遊將徧白髮光陰得最多構亭號佚老歸政者多效之喜堆墨書深自矜負善為四句詩遊長安佛寺題名從者誤側硯汙鞵公性急遂窒筆于其鼻客笑失聲書㸃畫肥重世謂皇宋書錄陳文惠公善八分之堆墨書領鄭州日伶人戲以一大紙濃墨塗之中以粉筆細書四㸃問曰此何字也曰堆墨書田字也公大笑湖州碧瀾堂苕溪清淺霅溪斜碧玉光寒照萬家誰向月明中夜聽洞庭漁笛隔蘆花湘山野錄吳江平波𣺌𣺌烟蒼蒼菰蒲纔熟楊柳黃扁舟繫岸不忍去秋風斜日鱸魚鄉歴代吟譜答張順之有花無酒頭慵舉有酒無花眼倦開正向西園念蕭索洛陽花酒一時來雲齋廣錄陳文惠退居鄭下張退傅知西京以姚黃魏紫及酒寄之文惠有詩虎丘雲際樓臺樹杪烟孤松千尺聳平田危闌逸思微吟好隱隱秋帆半入天人間靈蹟徧曾遊秪欠吳門訪虎丘今日偶來無限感闔閭墳左劒池頭吳郡志題漳浦縣壁蠻烟漁火接鯨波樹樹花枝處處歌況是天涯好行樂莫教憔悴鬢絲多方輿勝覽林處士水亭城外逋翁宅開亭野水寒冷光浮荇葉静影浸魚竿吠犬時迎客饑禽忽上闌疎籬僧舎近嘉樹鶴庭寛拂砌烟絲裊侵窗筍㦸攢小橋橫落日幽境轉層巒好景吟何極清歡盡亦難憐君留我意重疊取琴彈遊湖上昭慶寺湖邊山影裏静景與僧分一榻坐臨水片心閒對雲樹寒時落葉鷗散忽成羣莫問紅塵事林閒肻暫聞以上瀛奎律髓洞霄宫一帆髙挂出紅塵萬仞長歌入紫雲莫道遊仙别無侣玉清冠蓋許同羣谷口停驂上翠微五雲宫殿闢金扉不知何處朝元㑹卻見龍鸞隊仗歸三天封部稼如雲流水清寒出洞門更愛林間盤石上松花飄落羽人樽娟娟紅樹碧峯前為愛桃花入洞天偶逐霓旌纔百歩卻憂人世已經年洞霄詩集洞霄宫志在餘杭縣本漢天柱宫祥符五年堯佐奏改今名芳菲園錢氏時清源門内有此園盡日芳菲園不見芳菲好茂草與斜陽脈脈情多少湖州府志望越亭颯颯西風葉葉秋誰家烟火起滄洲乗閒不奈無機性擬動漁翁直釣鉤杭州府志智果寺蘿巖山下寺静境絶過從芳草二三月碧雲千萬峯窗閒明落日樓迥響疎鐘卻恐重來晩庭前記偃松紹興府志遊西湖附郭水連山公餘獨往還疎烟漁艇逺斜日寺樓閒繫馬芭蕉外移舟菡萏閒天涯逢此景誰信自開顏廣東通志題野吏亭野吏厭公堂開軒出郡牆殘花炎帝圃斜日尉佗鄉疊巘分諸粤重城􅎒大荒耕桑蠻聚落烟火漢封疆雲勢飄蓬島天形壓夜郎扁舟閒得侣嘉樹逺分行梅雨千林暮春風百草香人家浮浩𣺌鳥道沒青蒼爽塏吟魂健虚明夏景涼佗年重回首牢落媿甘棠惠州府志句雨網蛛絲斷風枝鳥夢搖溫公續詩話千里好山雲乍斂一樓明月雨初晴偶成郡吏百函通爵里從兵千騎屬櫜鞬送朱荆南君恩來萬里客路出千山潮州召還供帳開天苑傳呼度國門送种放風樵若邪路霜橘洞庭秋送人越州苑以上皇朝類劉少逸少逸蘇州人以童子賜進士及第官止尚書員外郎句無風烟燄直羅有月竹陰寒劉日移竹影侵棊局羅風遞花香入酒尊劉風雨江城暮王波濤海寺秋劉一回酒渴思吞海王幾度詩狂欲上天劉續歸田錄蘇州童子劉少逸年十一文辭精敏有老成體其師潘閬攜以見長洲宰王元之吳縣宰羅思純以所作贄二公二公名重當時疑所贄假手因試之與之聮句畧不淹思二公驚異至聞于朝賜進士及第孫周翰周翰賜童子出身句口吹楊柳成新曲郡侯頭戴花枝學後生孫續歸田錄孫周翰亦少逸之流其父穆之攜以見郡侯時賞春作㑹座客簪花郡侯屬周翰聯句笑曰何遽便戯老夫賜童子出身張秉秉官監察御史知鄭州鄭州聯句函闗秋霽雁初廻六里商於曉色開秉四皓有靈應笑我謫官方始入山來王禹偁小畜集宋詩紀事巻四
