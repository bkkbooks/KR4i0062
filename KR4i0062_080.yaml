body:
  text: 宋詩紀事卷八十錢塘厲鶚撰鄭思肖思肖字憶翁號所南福州連江人太學上舍應博學宏詞科元兵南下叩閽上太后幼主疏辭切直忤當路不報遂客吳下寄食城南報國寺以終有錦錢集一百二十四圖詩集咸淳集中興集輟耕録先生剛介有立志會天兵南叩闕上疏犯新禁衆爭目之由是遂變今名曰肖曰南義不忘趙北面他姓也隱居吳下一室蕭然坐必南向歲時伏臘望南野哭而再拜乃返人莫識焉工畫墨蘭不妄與人邑宰求之不得聞先生有田三十畝因脅以賦役取先生怒曰頭可斫蘭不可得過齊子芳之書孰云此世但除君父外不曾别受一人恩寒菊云禦寒不藉氷為命去國自同金鑄心其忠肝義膽于此可見思趙遺民録所南初名某宋亡乃改名思肖即憶翁與所南皆寓意也坐臥不北向扁其堂曰夲穴世界以本之十置下文則大宋也精墨蘭自更祚後為蘭不畫土根無所慿藉或問其故則云地為人奪去汝猶不知耶伯牙絶弦圖終不求人更賞音只當仰面看山林一雙間手無聊賴滿地斜陽是此心秦女吹簫圖弄玉飄飄仙女姿鳳皇低舞久相期簫中應有别一曲飛上青天影外吹以上一百二十圖詩集逢陳宜之行李苦役役相逢古潤州千金一夜醉四海十年遊山靜鬼行月宵涼人夢秋近聞邊事急畎畝得無憂送友人歸年髙雪滿簪喚渡浙江潯花落一杯酒月明千里心鳳凰身宇宙麋鹿性山林别後空回首冥冥煙樹深防隱者石竇雲封隱者家一溪流水繞門斜滿山落葉無行路樹上寒猿剝蘚花春日登城城頭啼鳥隔花鳴城外遊人傍水行遙認孤帆何處去柳塘煙重不分明春詞春氣暄妍御夾紗玉叉雙裊緑雲斜倚欄看遍庭前樹盡是枝頭結子花懷友今日樽前忽憶君為憐秋事又平分坐來凝睇西風久過盡天邊數片雲春日遊承天寺野梅香軟雨新晴來此間聽笑語聲不管少年人老去春風歲歲闔閭城湖上漫賦蘚崖蒼潤雨初乾石罅飛泉噴雪寒啼斷禽聲山更靜青松影下倚闌干以上咸淳集隱居謡布衣暖菜羮香詩書滋味長醉鄉江潮初上玉船空假道青州一水通相去塵寰千萬里不愁日夜不春風以上中興集自題推篷圖清曉清風吹過後露出青青一罅天一似推篷偷看見竹林半抹古蒼煙自題墨竹萬頃琅玕壓碧雲清風幽興渺無垠當時首肯説不得不意相知有此君以上鐡網珊瑚龔開開字聖豫號翠巖淮隂人吳萊桑海遺録序聖豫嘗與陸秀夫同居廣陵幕府宋亡潛居深隱立則沮洳坐無几席一子名浚每令俯伏就其背按紙作唐馬圖風騣霧鬣豪骭蘭筋備盡諸態一持出人輒以數十金易之藉是不飢然竟以無所求而死居吳之日高郵龔璛為忘年友時人謂之楚兩龔以比漢之兩龔髙馬小兒圖華驄料肥九分臕童子身長五尺饒青絲鞚短金勒緊春風去去人馬驍莫作尋常厮飬看沙陀義兒皆好漢此兒此馬俱可憐馬方三齒兒未冠天真爛漫好容儀楚楚衣裝無不宜豈比五陵年少輩胭脂坡下鬬輕肥四海風塵雖已息人才自少當愛惜如此小兒如此馬它日應須萬人敵老夫出無驢可騎乃有此馬騎此兒呼兒回頭為小駐停鞭聼我新吟詩兒不回頭馬行疾老夫對之空嘖嘖黑馬圖八尺龍媒出墨池崑崙月窟等間馳幽州俠客夜騎去行過陰山鬼不知瘦馬圖一從雲霧降天關空盡先朝十二間今日有誰憐瘦骨夕陽沙岸影如山以上吳禮部詩話湯垕畫鑒云此詩膾炙人口真有盛唐風致陸右丞君實挽詩立事寧將敗事論在邊難與在朝分從來大地為滄海可得孤臣抱幼君南北一家今又見乾坤再造古曾聞他年自有春秋筆不比田橫祭墓文數關天地人何與分在君臣禮可無周粟如山夷叔餒史書猶日臼嬰誣舊邦新命方開化公法私情本不渝忠義未須論彼此後先崇長是昌圖以上陸右丞蹈海録自題中山出遊圖髯君家本住中山駕言出遊安所適謂為小獵無鷹犬以為意行有家室阿妹韶容見靚妝五色胭脂最宜黑道逢驛舍須少憩古屋無人供酒食赤幘烏衫固可烹美人清血終難得不如歸飲中山釀一醉三年萬緣息卻愁有物覷髙明入姨豪買他人宅侍闕君醒為掃除馬嵬金馱去無迹鐡網珊瑚翠巖自記人言墨鬼為戲筆是大不然此乃書家之草聖也豈有不善真書而能作草者在昔善畫墨鬼有似頤真趙千里千里丁香鬼誠為竒特所惜去人物科大逺故人得以戲筆目之頤真鬼雖甚工然其用意猥近甚者作髯君野溷一豪豬即之妹子持杖披襟趕逐此何為者耶僕今作中山出遊圖蓋欲一酒頤真之陋庶不廢翰墨清玩譬之書猶真行之間也鍾馗事絶少僕前後為詩未免重用今即他事成篇聊出新意焉耳僕為虛谷先生作玉豹馬先生有詩見酬極筆勢之馳騁乃以此詩報謝南山有雄豹隱霧成變化竒姿驚世人毛物亦增價天上房星浥瑞光孕成白馬而黑章為誰容易來中國風雪天山道路長頭為王欲得方目為相欲得明脊為將軍欲得強腹為城郭欲得張絶憐此馬皆具足十五肋中包腎腸嗟豫老去有馬癖豈但障泥知愛惜千金市駿巳無人秃筆松煤聊自得君侯昔如汗血駒名場萬馬曾先驅山林鐘鼎今何有歲晚江湖託著書白雲未信仙鄉逺黃髮鬖鬖健有餘飲酒百川猶一吸吟詩何嫌萬夫敵我持此馬將安歸投之君侯如獻璧君侯作詩凛馳騖八荒滿盈動雷雨定知此馬知此意獨欠老奚通馬語曹將軍杜工部各有一心存萬古其傳非畫亦非詩要在我輩之襟期君侯君侯知不知鐡網珊瑚自題山水卷谷口長松澗底藤石橋山路晚登登囊琴斗酒來何暮空負寒齋昨夜燈退谷消夏記題趙鷗波髙士圖雪氣侵人臥欲僵苦勞明府到藜牀主賔問答皆情話何用間名入薦章式古堂書考張逢原逢原字淵甫鹽官人橫浦先生之後官漳州簽判宋亡不仕句曲外史伯雨其孫也題髙房山夜山圖地位清髙眼界寬盡收風景入毫端廢宫臺榭和煙鎖隔岸江山對月看一水中分吳越近層樓低接斗牛寒有聲畫意吟難了更把瑶琴膝上彈鐡綱珊瑚王鎡鎡字介翁括蒼人嘗官縣尉當帝昺播遷棄印綬歸隱湖山與尹緑坡虞君集葉柘山諸人結社賦詩有月洞吟送默然上人歸天台孤雲不定心持鉢度寒林野飯青蒲潔客程黃葉深海風潮水發山雨曉煙沈歸到石橋日應看瀑布吟早行客程因太早卻費一更眠落月已歸海殘星猶在天櫓聲荷葉浦螢火豆花田隔岸誰家起青燈逺樹邊溪村水路隨山轉溪晴踏軟沙斜陽曬魚網疏竹露人家行蟹上枯岸飢禽銜落花老翁分石坐間話到桑麻古杭感事國事雕零王氣衰東南豪傑竟何之雲埋廢殿排班石草臥前朝記事碑沙漲浙江龍去逺天寬北闕鳳歸遲可憐不老吳山月曾照官家寵幸時尹緑坡山間吟所苔痕分路見人家犬護籬根臥落花一片林塘詩境界四時花果隱生涯鉏山揀日春栽藥汲水和雲夜煮茶耕録有文須點看旋搖松露入朱砂訪庭植上人苔侵坐處石頭青滿屋春雲不用扃入定醒來香印冷一簾花雨溼殘經段橋春望拾翠車間輦路塵山南山北杜鵑春誰家庭院東風裏吹出桃花不見人裁衣曲燒罷心香午夜闌玉纖輕捻剪刀寒衣成恐不如郎意獨試燈前照影看春酌酒闌歌罷翠簾遮月栁驚啼子夜鴉多少斷雲心上事結成香夢是梨花燈花喜信今宵報與誰玉人曾翦畫雙眉等間開落銀釭見只閉春風不得知以上月洞吟萬嚞嚞字愚公仙居人中秋寄陳碧棲秋氣清如此秋花香奈何人生還健在月色況明多有酒君當醉無愁我欲歌樓髙俯松頂誰共酌姮娥絶句少日時時負百憂從人絡馬與牽牛中年置此身如竹荏苒風前得自由以上吳禮部詩話杜濬之濬之字若川金華人旃之孫領鄉貢宋亡矯行晦迹寄食西峯僧寺以終述志詩寧枉百里步曲朩不可息寧忍三日飢邪蒿不可食雖云食息頃便分淑與慝志士當暮年聞道轉歷歷要使此一身如琢復如滌整冠與納履微嫌費疏剔未若瓜李地絶不見吾迹書警食李弗言苦食梅弗嫌酸不為身所纍且從心所安吾分固云薄吾志亦非單靜看如山禍差之一念間所得甚眇眇所喪已漫漫百年修不足一朝容易殘雖處四壁立如享萬鍾寬靜坐明月窟濯足清風灘以上金華府志錢仲鼎仲鼎字德鈞通州人宋末領鄉薦題趙鷗波髙士圖在昔洛陽雪深丈餘士也髙臥來令尹車今年吳淞雪復何如積素一色鷗鷺有無之子江臯修亭是居有琴有書有酒有魚賞靜獨眺聊以自娛挹兹清風凛凛起余此景此圖再卷再舒水村歌舟搖搖兮風嫋嫋兮波鱗鱗兮鷗翩翩兮扣舷漁歌兮孰知其他兮以上珊瑚網胡一桂一桂字廷芳婺源人宋末鄉貢進士學者稱雙湖先生冬至寓建陽作繡日添漢宫書雲紀晉觀山家獨奚為剛腸占易彖幽人意欣然起坐視晴漢大化回初陽茫茫今巳旦川泳有遊魚雲飛見翔雁滯留本何心永懷發孤歎誠哉利攸往觀辭思過半新安文獻志陳普普字尚德閩之寧德人為恂齋韓氏門人韓出于慶元輔氏蓋考亭的派也宋亡後三辟為本省教授不起有石堂集秋日即事夜牀輾轉恨明遲曉髮梳寒倚竹扉樹影紙窗風作色蛬聲壁罅月流輝三杯白酒窮年客滿篋紅塵隔嵗衣遙想間鷗江上路蓼花楓葉雨霏霏野步六言黃犢眠中荒草鷺鷥立處枯荷宦海風濤舟楫故山煙雨松蘿紅葉林風颯颯蒼苔徑雨斑斑人迹石邊流水樵歌鳥外青山自哂鬬雞走馬醉髙陽今日歸來兩鬢霜無限少年心上事半簾豆雨語寒螿荀彧亂離揀得一枝棲得道爭知卻是迷曹操若逢諸葛亮暮年當作漢征西北地王諶何物譙周口似簧幾年漢帝手牽羊紛紛蜀土祠諸葛香火曾分北地王顔杲卿驪宫歌笑入青雲曾識常山有戰塵忠骨已澌餘髮在因人得見夢中身以上石堂集湘煙録此詩蓋指杲卿見夢明皇妻疑髮動之事蘇壽元壽元字仁仲號北溪安福人贈風鑑空有竒胸貯石渠功名不許老頭顱憑君細閲寒窗下還有他年房杜無四朝詩韓性同性同字伯循别號古遺與陳石堂同里而及其門入元不仕嶽王墓妖星隳地芒角赤龍劔悲號風蕭瑟中原王氣挽不回將軍一死為毛擲秦家小兒真戲劇播弄造化搖樞極指讐為親忠且逆隻手上遮天眼碧九重茫茫隔天日無由下燭臣愚直臣愚萬死不足惜國恥未湔猶憤激古墳埋寃血空瀝風雨年年土花蝕我恐精忠埋不得白日英魂土中泣請將衰骨斫苔痕獻作吾皇補天石曹氏歷代詩選孫嵩嵩字元京號艮山休寧人以薦入太學有艮山集朱大同云孫上舍宋亡後歸隱海寧山中自號艮山示不復仕杜門賦詠鍛苦鍊枯棲斷淪絶以寄其沒世無涯之悲時婺源有制幹許月卿先生者亦宋進士宋亡歸隱製齊衰服之以居月卿壻江凱及汪炎昶皆絶意當世俱從嵩遊其詩悲壯激烈讀之可知其為人開歲連日隂雨老杜詩章五百年為吾替寫早春篇恰從元日踰人日重有隂隂冷落天日日嵐陰守翠微清溪平沒釣魚磯流鶯一任無來意直恐梅花半樹稀新草天涯入斷魂若為有意眺郊原只應老子春愁少須著瀟瀟雨暗村覓佳山水遷居未能又力役不休微吟清嘯有孤懷歷落嶔﨑已大乖芳草何心知世事間雲肆意繞天涯前時絶喜王官谷此去聊堪阿里街一語作銘君記取騰騰任運莫安排竹枝詞灩澦堆頭君莫行瞿塘峽裏不論程龍吟小雨蜀天黑等有明朝春水生峽路隂隂無四時寒雲鳥道挂天危荒亭敗驛此何處望帝江山聞子規黃牛廟前鴉鸛棲黃魔宫外梟鵩啼估客酹神巫嫗醉青林日轉風凄凄生日雲外荒村半掩扉門弧事業與心違悠悠歲月山林老納納乾坤道路非鴻雁關河秋滿眼梧桐風雨冷侵衣蓼莪自是長休廢獨立蒼茫一歎欷哭程晦夫握手論交意氣真舊遊四顧黯傷神陪從金馬門中客和唱銅駝陌上春尚謂鄉邦離有合忍聞丘壟夜無晨夕陽古道曾經別腸斷西風淚滿巾以上方回桐江集曲江頭君不見曲江頭離離衰草寒雲秋今人不見昔人遊昔人不見今人愁欲談往事無耆舊沈吟千載空搔首盛衰倚伏如寒暄秦時宜春苑漢世樂遊園更復唐人宫殿擁千門往來古今但如此同一溶溶曲江水秋懷秋蟲日以喧秋樹日以疏君聽草根蛬泣弔風中梧壯士秋懷涕及此清霜初從來感秋人一例皆楚聲吾聞古燕趙慷慨多不平惜哉宋玉辭不使荆軻聼何處秋聲多竹外聲歷歷凄切不禁寒蕭蕭舊時碧此中白髮愁餉與秋風客疇昔旅江湖夜夜南飛雁山園柿栗多出户望河漢秖今寒雁時中夕起三歎黃山秋雕鎪風露洗崖崿行行聼清猿處處采靈藥秋雲老石牀已後十年約冬夜雜興牧童與樵叟共載牛背歸我無薪蒸計南山松櫟稀寒風昨日至須用葺我扉破扉故可葺何以完我衣人生有定分勿怪生理微行都餞嵗插架餘殘厯挑燈憶故鄉年光蛇赴壑羈迹雁隨陽禁闕迎儺鼓鄰街祭竈香英雄須自力容易鬢毛蒼臨安錢武肅廟吳越歸旗纛風雲初鼓鼙錦蒙山樹遍弩射海潮低龍鳳城蔥鬱牛羊墓慘悽古祠存故里秋草廡東西春日武康遊望過孟東野故居殘靄初收半在沙一川芳草趁溪斜羣峯古意汪芒國廢地詩情正曜家天末凄迷浮野色柳邊駘蕩受春華更攜尊酒看修竹不為前陂得意花紫陽夜坐一夜燈前白紵單沈吟有此夏初寒露零若與人相語松杪蕭蕭下石壇姑蘇元夕茂苑長洲滿地春吳兒歌舞逐時新風流百巧花燈手猶是夫差國裏人以上新安文獻志孫巖巖字次臯號爽山嵩之弟有爽山集方虛谷序云長孫君嵩元京詩清徑苦淡如其為人小孫君巖次臯豫未之識忽袖詩訪于武林亦清徑苦淡如其兄去冬過石潭上時吳義夫同行欣然謂豫曰詩境甚佳今日再過有作將寄義夫長潭有令姿山緑納空洞軒軒吳武陵曾此接飛鞚殷勤顧我笑詩材不勝用重來春事深物采尤錯綜褚小強懷大秀異肯受控沈吟日已昃十彀才一中故人抱才藻衆象入嘲弄即今溫水館匡坐教弦誦嗟哉實前語束葦代杗棟明當寄東風煙水發清夢留武林訪客城南隅故第何其雄曲池猶漾漭土山尚巃嵸頗聞此中人易姓良匆匆往時恩澤侯意氣干晴虹樂曲播秦城衣制聞漢宫恨不逢季倫詎肯交毛公斥地西鄰去伐木南山空百楹一傳舍顧極當年工悠悠感成敗何獨操鏝翁觀漁行霜降平湖鑑羣象中有黃魚幾一丈漁師早已中豪家今旦連舟布新網東西南北三重圍圍形漸縮如小池孟獲身窮吕布窘尚許性命延斯須舊與鱒魴同出入爾暇悲憐禍相及日斜創甚上平沙兩岸居人如堵立渺渺腥風吹水雲賣魚沽酒賽湖神醉來預唱江南春和元京兄賦蘋花一春觀物眼紅紫厭繽紛此水浮明玉何人翦白雲惠風遊漢女吉日禮湘君地僻應無是留花混藻芹兵後績溪道中古道緣流水寒郊帶斷煙稀疏鴉種麥羞澀女耕田人事休兵後秋懷落木前小蘇遺翰墨今古一山川方虛谷云休兵落木之句非近人晚進所能到陳監丞用韻見贈亦和以謝肅肅東方老依人可計年名言傾蓋後古意結繩前君户仍多轍豫琴故一弦不應昌歜味置在衆肴先九日呈戴兄一别三十載而今近講堂蕭條同甲子強健又重陽萸菊數杯酒煙雲千仞岡偶然為此夢寧復次公狂方虛谷云類陳后山出越城舟行紆道以避過兵擾擾紅巾起草間舊遊何地不搶殘歸囊薄有桃花米行路如經竹節灘戰馬冬來橫殺氣扁舟北去解憂端曲肱便結須臾夢栁暗黟川把釣竿武林絶句繽紛迎酒伎宛轉賣花聲偶似承平世攜書試鳳城比屋單衣日名城冷食天居人多上冢逺客未歸田樹隂春去空山啼乳鶯鶯邊老樹冪新青一瓢挂此坐終日即是蘇家擇勝亭以上新安文獻志滕塛塛字仲塞號星崖婺源人汪幼鳳云星崖常命其兄子舜父求文丞相遺墨舜父得所書過金陵驛詩以歸日懸于堂焚香拜泣又過西湖拜嶽將軍墓有相對含悲石翁仲老衰無淚落秋風之句其忠義蓋天性也東城東城有髙樓峩峩冠城闕我來屬昏暮見此初上月遙天羅江山極目如霽雪江山秀如此豈不生豪傑臨風一髙歌達曙何由歇新安文獻志張炎炎字叔夏號玉田又號樂笑翁循王諸孫本西秦人家臨安生于淳祐間宋亡落魄縱遊工為長短句鄧牧心云玉田春水一詞絶唱今古人以張春水目之舒閬風云叔夏詩有薑堯章深婉之風腰帶水在奉化州西五十里犀繞魚懸事已非水光猶自溼雲衣山中幾日渾無雨一夜溪痕又減圍延祐四明志潘文虎文虎字武子金沙人寓言詞為被虜婦作交交桑扈交交桑扈桑滿牆隂三月暮去年蠶時處深閨今年蠶時涉逺路路傍忽聞人采桑恨不相與攜傾筐一身不蠶甘凍死秖憶兒女無衣裳山房隨筆陳森森字茂卿婺州人生宋末卒以詩殉葬南海南連弩聲獰黑風壯白日滄波影相蕩神蛟一去還不還淚溼空荒捲煙浪盤渦蜃氣髙矗天老鯨巨鼇那忍眠老鯨已化子獨返越山越水青茫然樓船夜半猩猩語黃葛花開墜秋雨金華詩粹陳深深字子微平江人宋亡棄舉子業閉門著書有寧極齋稿曹叔時見過索餞篇泄雲蒙朝日微雨霑庭除幽人掩關臥門外無來車曹子别經歲枉道過我廬謂余抱文藝胡為守鄉閭余曰匪髙尚褊性涉世疏上奉白髮親餘暇讀我書豈如叔時甫妙年美名譽詞華爛絺繡問學滋新畬奉子一巵酒聊為談斯須威鳳翔髙閣逸驥騰雲衢及時樹逺業臨事毋躊蹰內人臂白鸚鵡圖華清宫中歌既醉南海竒禽逺爭致玉環最愛雪衣娘當時曾得龍顔媚璿房雕檻春日長繡綳嬌兒在傍戲君王憐汝解語言懷恩不説宫中祕臨風鷙鳥何軒軒歎惜純良遭猛厲苕翁寫出當時事側立紅衫內人臂江花滿地不忍看空拂畫圖憐俊慧南遊驅車登逺道白日忽西流宇宙驚新夢山河感舊遊雲迷江令宅月淡庾公樓巳巳知何奈長歌去國愁悼亡短日一何急殘宵不肯明霜寒那有夢月落重傷情壁凍琴絲斷風驚燭淚盈微言憶王衍達理誤莊生南湖史君製暗香湯竒甚賦絶句求之霧閣雲窗深閉春微聞玉杵搗清聲元霜秖許雲英見地上詩人渴夢生自注時侍姬新至故戲及之寧極齋稿以上劉鑑鑑字清叟號立雪江西人少年才氣卓犖連蹇不第中更世故蹙頞悲吟鰥居隱處年踰七十而終有立雪稿同門生鄧光薦序其第五稿云余嘗評君一生琢對匠語洗削治擇齒牙間纚纚有聲大率成就精切二字而已今皮毛落盡孤立兀然雷霹之琴火成之鐻潮湍激齧之山皆自然成趣有不假繩削而合蓋于是門外雪三尺矣得其髓者非齊腰子不能題醉月亭采石江頭李太白狂不奈煩宫錦窄赤壁磯下蘇東坡一葉泛泛凌風波當時有月并有酒和酒和月吞入口酒腸得月冷于冰化作瑰辭喧宇宙兩首賦百篇詩千秋萬古稱絶竒兩翁不作歸來鶴玉宇瓊樓寒漠漠若得長江變潑醅少住人間亦差樂望圓晦缺秋復春古來明月今來人我時舉酒問明月月亦團團譍不得鐡如意玉唾壺我歌君和聲嗚嗚爛醉起舞嗔人扶問影莫是李與蘇月中仙子知得無寄朱約山歲晚江空煙水寒楓林葉落楚天寬苦無雁足書難寄作盡鳶聲吟未安晉帖臨成思入石離騷讀罷擬栽蘭老來絶被梅花惱後會君應笑我孱謁蕭小山一冬晴暖春相似欲扣吟關未有詩折得梅花裝擔了起程還是雪飛時一水凝寒棹不開幾人于此欲船回思君卻有扁舟興半夜直衝風雪來以上立雪稿葛慶龍慶龍九江人寓越霏雪録葛慶龍號秋巖又號寄漁翁江南野道人蚤年嘗入匡廬學浮屠法稱璹書記不樂遂歸俗放浪江湖中名公巨卿酒徒劒客多與之遊好為詩落落有氣每風日清美乘筍輿遊天衣雲門諸山年逾七帙齯齒童顔終歲不澡沐肌體清潔衣垢不生蚤蝨化去王君理得函其骨于仙人洞仍鐫石為肖像并一鶴于洞中在山隂縣西北六十里至今稱葛仙洞贈僧七軸蓮經供茗瓢一龕繡佛挂松寮舶香亦帶魚龍氣自采枝頭柏子燒謝理得惠書五朵飛來漬剡藤重重響似水泠泠不教落在紅塵耳讀與青松白鶴聽詠黃石公挾書律重火猶光天下嚴搜不敢藏圯上老人無見者一編親寫授張良笻杖白髮慵巾短短衣間行斜倚小笻枝自家弄影猶癡絶只似初騎竹馬時題仙人洞并謝草堂方公所贈石匣多謝林僧亦好竒新遺石匣我酬詩鶴胎收卻雲封裹付囑山靈木客時雲長鎮洞有時開石匣終藏化鶴胎千歲不須華表柱飛鳴南向洞山來以上霏雪録遊寶林寺坐如有待思依依看竹回廊出寺遲窅窅緑隂清寂處半窗斜日兩僧棊越詠于石石字介翁婺之蘭溪人業詞賦自負甚髙宋亡隱居不出一意于詩因居鄉自號紫巖晚徙城中更號兩溪有集探梅分韻得香字絶壁兩屨雲荒村半橋霜孤往欲何之林下幽徑長寒梅在何許臨風幾徜徉誰家斷籬外一枝寄林塘水靜不搖影竹深難護香無言獨倚樹山空月荒涼路傍女路傍誰家女躊蹰不能去自言妾小時家本樵川住十五嫁良人長年秉機杼辛勤奉舅姑足不越庭户去年秋棗紅邊人健如虎移家入深林自謂百無慮空山鳴劔戟失色駭相顧星散各偷生不幸適相遇妾身如風花飄零委塵土妾命如蜉蝣焉能保朝暮一死恨不早空為年少誤去去忽相失零落在中路妾有乳下兒咿啞方學語四海尚干戈安知爾生死回首望天涯家山在何處妾命負所天顧影惟自憐自憐輕失節天下何獨妾我從山中遊我從山中遊歸來林壑暝澗水凍不流月出四山靜柴扉不敢敲恐驚孤鶴醒徘徊踏月明倚杖看松影得家書久客秋又晚思家夢屢驚空階聞葉落隔樹見鐙明親老貧常健兒癡學未成凄涼今夜月將我故鄉情半山亭萬疊嵐光冷滴衣清泉白石鎖煙扉半山落日樵相語一徑寒松僧獨歸葉墮誤驚幽鳥去林空不礙斷雲飛層崖峭壁疑無路忽有鐘聲出翠微春事白了江梅栁又青遊絲千尺網紅塵鵓鳩夫婦孤村雨杜宇君臣故國春客裏易添芳草思樽前誰是去年人桃花源上空流水安得漁郎一問津旅中遣懷片雲相望浙東西回首家山路欲迷昨夜桐江江上夢倒隨流朩上雙溪以上紫巖集方夔夔一名一夔字時佐淳安人生于宋季嘗從何潛齋遊攻舉子業不利于有司退隱富山之麓扁其堂曰緑猗授徒講學其間自號知非子學者稱富山先生有富山懶稿錢王守鳧墩在臨安道左山下鐙龕挂紙錢水楊墩上草芊綿髙人不要金丸用買得三吳八十年盧明之開爐懶作西風汗漫遊歸謀諸婦此淹留采花墩近初成酒種秫田多早帶秋燕頷已空西塞夢犢褌莫遣逺山愁滄江留得偏醒客袖手時憑百尺樓九里路去年九里路烏攫人腸挂枯樹今年九里溪沙頭白骨髙復低人生變滅如泥土久後猶傳薑萬户翠眉紅頰誰家兒夜赴軍前效首虜將軍多愛恩意疏分將吳口充苞苴殷勤道與送行使前日朝官多有書自注唐人攻藩中朝官多以書託主將求沒官妻妾續感興猛虎等百獸天賦與長雄曼胡秋利戟隅目磨青銅從知世路暗羣行各西東吼地一長嘯颯颯來悲風飢來待人肉不數豹與熊肥領而黑喙不知是何蟲坐臥不自防穴爾皮毛中爾虎雖云猛一旦皮骨空慎勿欺微細即且制神龍惡木生髙岡枝疏上指天雨露非有私蟠踞幾何年蕘子寢其下山鳥棲其巔匠石過不睨生理得自全皮為野火燒根為螻蟻穿空中不足恃一朝踣而顚上有千歲藤相依久纏綿樹猶不足保爾藤何足憐二女灑竹淚盡是心中血精誠著于物千載猶不滅當時從南巡豈少稷與契奈何比孤纍匍匐陽城謁皇英獨何人風泉共幽咽可憐女子心慷慨男兒烈湘水流不斷誰道恩情絶何時見歸來續君逺離别驚禽營顆粒飛飛集丘隅遊人困行役十年落江湖煌煌秦與洛運轉天下樞啓明曜東漢萬足爭奔趨豈無爪距力逺利如孫吳得失昧前料青雲間泥塗天命有厚薄定分不可踰歸來北山下俯仰收桑榆秋晚雜興青溪溪上路書劔此棲遲涼月穿衣褐寒波照鬢絲古桐傳賀若橫玉犯龜兹不為傷秋老孤吟自可悲以上富山懶稿金應桂應桂字一之號蓀璧錢唐人又號積慶山人戚輔之佩楚軒客談一之雅標度能歐書受知賈似道晚居西湖南山中築蓀璧山房左弦右壺中設圖史古竒器客至撫摩諦玩清談纚纚不得休每肩輿入城府幅巾氅衣望之若神仙然送西秦張仲實遊大滌洞天山林有真趣得趣即神仙好趁暮春月來遊大滌天晴嵐融玉室花氣襲丹泉此地通懸霤清吟過叔元洞霄詩集潘詰詰宋末人經賈秋壑故第相業如何不到頭諸公歷歷頌伊周夢迷葛嶺酣歌夜鬼哭樊城血戰秋誤國正須憂大廈覆師寧忍駕孤舟木棉庵裏催歸魄誰掩湖山富貴羞杭州府志汪楚狂感慈元殿翠華扶輦出龍庭密炬星繁天未明鵷鷺分行江上别貔貅從駕雨中行緑波渺渺浮三殿紫禁沈沈斷六更惟有周遭山似洛不堪回首涕縱橫忠義集王沂孫沂孫字聖與號碧山又號中仙會稽人與周公謹唐玉潛諸公倡和有詞名花外集觀周曾秋塘圖有作一字至七字款題琅琊聖與秋秋瀟灑清幽人靜處水邊頭波紋細細風色颼颼鷗鷺情相狎鳧鷖樂自由疏葦敗荷池沼白蘋紅蓼汀洲幾竿漁釣去已盡一段晚雲寒不收珊瑚網周密密字公謹號草窗濟南人流寓吳興居辨山自號辨陽嘯翁又號蕭齋淳祐中為義烏令有蠟屐集齊東野語癸辛雜識志雅堂雜鈔浩然齋視聼鈔武林舊事澄懷録雲煙過眼録鄧牧心序云蠟屐非屨非舄不足以忘足而阮孚愛之詩發乎情性與蠟屐不類周公謹以名其集豈以阮孚所以忘足者而忘心于詩物無美惡溺于所愛皆不得為性情之正安得與詩同日語然與為阮孚猶愈于祖約畏人況不為阮孚者乎南郊紀事黃道宫羅瑞腦香衮龍升降佩鏘鏘大安輦奏乾安曲萬點明星蔟紫皇萬騎雲從蔟錦圍內官排立馬如飛九重閶闔開清曉太母登樓望駕歸西太乙宫在孤山路舊四聖觀理宗朝建蘂宫廣殿號黃庭突兀浮雲最上層五福貴神留不住水堂空照九枝燈南園光宗朝賜平原郡王韓托胄陸放翁為記清芬堂下千株桂猶是韓家舊賜園白髮老翁和淚説百年中見兩平原甘園內侍甘忭園又名湖曲曾經臨幸有御愛松望湖亭小蓬萊西湖一曲小小蓬萊在水中乾淳舊賞有遺蹤園林幾換東風主留得庭前御愛松裦親崇壽寺在鳳皇山劉貴妃功德三門有陳公儲畫龍翟羽鸞綃事已空奉華遺寺對髙松宫斜鳳去無人見且看門前粉壁龍奉華劉妃閣名以上武林舊事韓氏慶樂園舊事凄涼尚可尋斷碑間臥草深深凌風閣下槎牙樹當日人疑是水沈齊東野語云四朝聞見録載蜀帥獻韓平原沈香山髙五丈立之南園凌風閣下今慶樂園即南園也所謂香山尚巍然立于閣前乃枯枿耳初非沈香也為楊大芳悼亡帳中蝶化真成夢鏡裏鸞孤枉斷腸吹徹玉簫人不見世間難覓返魂香癸辛雜識大芳娶謝氏謝亡未殮有蝶大如扇其色紫褐翩翩自帳中徘徊飛集窗户間終日乃去乙丑良月遊大滌洞天書于蓬山堂太虛灝氣浮空濛煙霞九鎖蓬萊宫崩騰雲木競竒秀澗芳野實垂青紅何年斷鼇立天柱古洞隂森白鴉舞玉書寶劔不可尋老翠封崖滴元乳光芒靈氣干斗牛遺丹箬底誰能求黃精紫杞遍巖谷仙禽夜搗聲幽幽懶蛟千年睡未足癡涎吼雷噴飛瀑隂風黑穴吹海醒石虎當關橫地軸是非萬古一笑慨神仙不死今安在送西秦張仲實遊大滌洞天玉室金堂積翠邊舊遊猶記劫灰前禽聲夜搗千年藥花片春浮九鎖泉洞府暗通滄海路樓居何異化成仙茶香筍美松醪熟正好山中過禁煙以上洞霄詩集題髙房山夜山圖為江浙行省照磨李公略作郎潛暇日多冥搜夜深獨上千尺樓天回海立月政溼風起雲涌山疑浮縈青繚白互變滅浮嵐飛霧寒颼颼潛虯棲鶻聲磔磔山鬼木客鳴呦呦城中癡兒方囈語有夢不到千山幽遙岑寸碧目力逺欲遡汗漫凌風遊髙侯落筆萬象泣寫出千古蒼茫愁無聲詩與有聲畫一夕異事傳南州玉琴在膝酒在手欲寫天籟無莊周憑誰為問華表鶴城郭人民今是不鐡網珊瑚題溫日觀葡萄百八牟尼顆攜將萬里遊歸來還自笑何不博涼州六硯齋筆記題髙彥敬山村圖卷為仇仁近作我昔遊七閩百嶺爭巀嶪白雲漲川原深谷如積雪又遊天姥岑幽磴緣曲折長林翳寒日十里行落葉轉頭五十年遐想正愁絶開圖意忽動戃恍生內熱何當駕松廣分我翠一疊辨陽我所廬見謂山水窟漂零愧楸檟歲月老薇蕨平生阮遙集足痺屐齒折何當賦歸田初志遂所愜懷哉復懷哉清夢繞林樾清河書畫舫句繁華不結三春夢零落空餘寸草心杭社試燈花楚軒客談佩吕同老同老濟南人有詞見樂府補題宋遺民也丹泉觱沸檻外泉逺出天柱陽清音應空谷潛波渙寒塘昔人飬靈芝長年此山旁金骨換玉髓素虯朝紫皇尚餘浴丹池神光透扶桑蓬萊幾揚塵兹泉日泱泱我願滌世氛朗詠三元章手持北斗杓下酌流霞漿洞霄詩集題髙房山夜山圖我昔絶江看吳山朝光正落山水間金波逺自海門入翠嵐髙插扶桑殷安知璚樓有夜景明月蒼茫墮清影李侯勝賞髙侯筆展卷一時如夢醒鐡網珊瑚龍泉寺納涼靡靡市塵盡杳杳泉石間灌木蔽榛莽爽籟彌空山飛甍納餘輝丹艧粲以繁巍然青蓮宫俯此碧玉闌化人淡無為趺坐觀塵寰支郎杳不逢元蟬噪其間昔賢憩逰地眢井潛龍蟠詠歌之所傳百世猶不刋我生悅超曠危磴重躋攀歸隱諒未能溯風發長歎越詠鄭斗煥斗煥字丙文號松窗辨陽老人周密編輯絶妙好詞特載其人于宋末陪秋山相公遊大滌洞天一庵夜宿感夢天柱清遊尾使星筍輿軋軋入山深龍行雨去泉花定鶴叫雲來木葉隂松石已安通夕寐江湖空老百年心圓冠方袂何仙子夢裏將詩索共吟洞霄詩集宋詩紀事卷八十
