body:
  text: 宋詩紀事卷六十錢塘厲鶚撰黃順之順之字佑甫邵武人開禧元年進士聽悟師彈招隱悟師手攜清風琴為我再奏招隱吟九原靈均不可作後人遺恨空沈沈我今聽之淚霑襟楚山日落秋聲起古猿啼月空山裏千年愁思上青楓幽蘭無香桂花死吾道非耶何至此曲中歷歷分眀道苦怨王孫負春草歲晚山中難久留憶君一夕令人老王孫王孫知不知琴心招君胡不歸下沿湘江之水流上逐湘山之雲飛一彈一招一太息水流雲飛朝復夕送葉靖逸山髙積雪明嵗序冉以逼佳人抱書去西湖失顔色清夜獨慷慨詩壇夢生棘我有雙鯉魚對之不敢食初寓橫涇十年泉石夢及此始依然野迥天垂地身間日抵年稍欣聞見少漸與土風便分得漁樵席白雲相共眠題九曲尼院曾是霓裳第一人曲終認得夲來身多年不作東風夢間卻薔薇一架春觀冷水峪桃花石家步障久成塵移作包山一段春惆悵日斜原上路年年紅雨打行人以上前賢小集拾遺韜光菴瘦笻拄到古韜光分得山僧半榻涼幽鳥一聲春夢斷溼雲漠漠護殘香咸淳臨安志李宗勉宗勉字強父富陽人開禧元年進士理宗朝拜參知政事左丞相兼樞密使卒贈太師諡文清題六和塔經從塔下幾春秋每恨無因到上頭今日始知髙處險不如歸去卧林丘咸淳臨安志危和和字祥仲逢吉弟號間靖居士又號蟾塘開禧元年進士知德興縣有蟾塘集積翠樓著我高逺堂恍若非人世一榻臥白雲清寒不成寐松竹四山秋颼颼驚客耳誰在隔窗中朱弦寫流水撫州府志陳垓垓字漫翁閩縣人密學襄六世從孫開禧元年進士官至淮東提刑絶句硯乾筆秃墨糊塗半夜敲門送省符擲得么么監嶽廟恰如輸了選官圖吹劒録陳漫翁監轉般倉與鎮江守喬平章爭一事平章乞回避漫翁得嶽祠吏持牒索回文漫翁就書一絶云云華嶽嶽字子西貴池人為武學生開禧元年上書請誅韓托胄蘇師旦下大理鞠治編管建寧圜土中托胄誅放還登嘉定武科第一為殿前司官以史彌遠當國謀去之事覺下臨安獄杖死東市有翠微南征録春暮麥髯豆莢雨生肥間録園林粉蝶飛賸置好花安四壁不教人道是春歸遊溪西寺次府判湯丈韻寺覺重遊好僧期後會賖青蟲雕病葉白鳥篆平沙水瘦石生齒山寒梅未花功名應有待且謁惠公茶別館即事十年客裏過春光客裏逢春分外狂半堵碧雲蝸路溼一簾紅雨燕泥香銜山西日辭香閣拍岸春風趂夜航莫向錢塘蘇小説東吳新髻李紅娘以上翠微南征録吕聲之聲之字大亨新昌人官宿松尉徙平陽丞終昭信軍節度推官有沃洲雜咏賀葉司業兼中書舍人英妙才華四十年山林朝市姓名傳何妨萬斛橫江上不礙千帆過目前我肯尾書干木紙人饒首著祖生鞭金鑾何日商風雅伴直能呼孟浩然丹丘道中夜宿溪頭十里村數星魚火照籬門鴈山峭絶經行處猶帶煙霞入夢魂以上四朝詩嚴大猷大猷蒼溪人特奏名官隆慶府參軍句笏未到身難擊泚兵如入手易擒吳萬姓統譜吳曦僭蜀大猷詩云云王翥翥字一飛成都人篤學尚氣吳曦謀反來請翥陽病風瘖潛往安丙謀誅曦事定匿巴中為農終身送張判官歸巴州回首三巴曲平生萬里橋衣冠無賴客花月可憐宵灌口秋漲所向愁無地窮源欲上天蛟龍胡爾怒鷗鷺更誰憐萬里朝宗意羣凶跋扈年生涯秋色裏獨立問漁船吳宣撫故宅社稷疲奔命乾坤服至誠扶持三蜀在出入兩朝榮豕犬有遺恨麒麟空復情家聲隤已盡國法用猶輕成季翻無後花卿浪得名門庭黃鳥語几杖緑苔生威福何偏重精神恐不平庶幾蒙世立凡百愼持盈憶舍弟藥物吾仍病花時汝未歸不眠愁月落獨立看雲飛詩禮自持律飢寒誰解圍遙知理舟楫西望涕沾衣以上谷音方信孺信孺字孚若興化軍人以廕補官開禧中假朝奉郎使金三往返不詘歷淮東轉運判官知真州至廣西漕有好菴遊戲詩境集劉後村序公詩文操簡立成宫羽協諧經緯麗密題龍隱巖春波飽微緑斗柄涵空明方舟貫巖腹鵝鸛相酬鳴仰窺穹窿頂宛轉百怪呈僅餘鱗甲碎不見頭角獰下闖清泠淵演迤萬頃澄但同魚鳥參勿遣蛟龍驚抉苔撫竒篆倚棹看題名三將標殊勳自與山不傾誰歟贅小築正恐嗔山靈南洞更幽絶仙佛依崢嶸太虛可為室豈復資欒楹乳泉助茗碗中有冰雪清何須驂鸞去此即白玉京鼎來不速客抱琴忽遲迎愛此無絃曲巖澑同一聲為我洗塵耳喚我詩魂醒秪愁白衣到好句無繇成桂州黃潭舜祠西風攪桂樹落日明楓林遊子懷歸期余悲渺登臨虞山一何高湘水一何深英皇僅枯冡寂寞南薰琴我欲奏古曲俗耳更哇淫古器不可見聊作相思吟相思長相思相思無古今一歌衆鳥聽再歌萬籟沈推手君勿歌有酒且孤斟落落此時意寥寥千載心五絃母庸絶四海誰知音重題龍隱巖愛山那惜走千回生怕前驅後騎催石上參差鱗甲動眼中在處畫圖開驂鸞未辦乘風去浮鷁何妨載雨來人事百年俱變滅祗應題字不塵埃以上曹氏歷代詩選遊九言九言字誠之建陽人父訔湖南安撫參議官九言筮仕古田尉開禧中知光化宰充荆鄂宣武參謀官卒端平中特贈直龍圖閣諡文靖有默齋遺稿金陵野外廢寺寒花窈嫋蔓頽牆古寺蒼苔晝掩房犬吠屋頭山杳杳蟲鳴階隙草荒荒池塘淡日蒹葭冷籬落西風橘柚黃六代江山金碧地斷碑留得管興亡聽鄭三彈雙韻子歌寒窗積雪生虛明玉壺風折層簷冰朱霞秀色妙公子理弦燈下髙亭亭遊絲兩兩挂孤月雙聲應手無留停月寒壞戶砌蟲泣雲凍出浦邊鴻征蒼蠅撲紙窗欲透蜾螺穴桑兒未成琵琶寬詳雙韻切含悽盡向弦中説酒酣疏綺雜娛嬉誰道壯夫心更折一從氊毳被河山學得聲容難辨別鷓鴣金屋沸歌吹鼠頭寶陌行鞾襪帕腰慢舞作彎孤捉耳釂觴真折馘眼前猶聽舊歌辭鳳韶豈獨鏘虞時罷彈三喟寢不熟風定寒江靜夜悲以上默齋遺稿美人倚樓圖簷頭燕子説春寒胡蝶悠悠午夢殘睡起高樓多少恨天涯小雨怯闌干溪上煙開曉日照溪頭溪上人家岸下舟啼鳥不知春已老數聲啼破碧巖幽以上詩家鼎臠遊儀儀字伯莊長平之勝士早遊京師自北方縱覽名山已而浮洞庭歸隱武溪之上黃鶴樓長江巨浪拍天浮城郭相望萬景收漢水北吞雲夢入蜀江西帶洞庭流角聲交送千家月帆影中分兩岸秋黃鶴樓髙人不見郤隨鸚鵡過汀洲詩人玉屑按栁溪吕炎近録云伯莊此詩膾炙人口遊默齋嘗書置南樓遊受齋漕湖北日復為之刻石遊僩僩字憲武金精山歌皺裙蹙鳳金屈盤秦叉衛鬢香添寒洞庭波橫嬌不起舞娥拂桂棲孤鸞寶光瑞色元宫閟碧峽瑤草春漫漫霜刀如泥割蒼玉樓綃閣綺白日間楯花紅飛洞雲溼驚雷挾空老蚪泣崖前紅落霞不流縞衣丹使杓衡急君不見石髮流漿翻柱礎弱水液橫天上乳西方七宿欃槍熒長沙地遠豐鐘鳴金精風月趙雍一作雍雍號竹潭忠簡後人開禧間為處州太守雪夜黃州城下雪後人家早閉門江寒水落見沙䀶黃州城下東坡路月浸梅花正斷魂詩林萬選煙雨樓在處州畫棟飛雲暮靄寒樓臺城堞有無門煙收雨霽曾看否見盡東南萬疉山括蒼彚紀高孝璹孝璹字公純臨卭人生開禧中魏了翁表叔臨安西湖朱簾白舫亂湖光隔岸龍舟檥夕陽今日歡遊復明日便將京洛看錢塘魏鶴山題跋李丙丙字仲南官左修職郎監臨安府都鹽倉夜夜曲玉窗結怨歌幽獨弦絶鸞膠幾時續銅龍漏促春夜長冷雨酸風亂心曲間熏翠被鬱金香拂拭繡枕屏山緑飛飛乳燕歸不歸寂寞流蘇帳前燭前賢小集拾遺髙翥翥字九萬餘姚人有菊礀小集過臨平征帆一似白鷗輕起揭篷船看曉晴梅子著花霜壓岸自披風帽過臨平春日湖上清波門外放船時盡日輕寒戀客衣花下笑聲人共語栁邊檣影燕交飛曉風不定棠梨瘦夜雨相連薺麥肥最憶故山春更好夜來先遣夢魂歸重午懷舊獨守空庭日欲晡滿斟濁酒不須沽白頭兄弟三年别青眼交遊一字無醉看葵榴懷舊事饞思櫻笋夢吾廬向時癡絶今愁絶自讀離騷些老夫初聞雷二月寒猶在春雲溼未開灑窗終夜雨發軔數聲雷薺麥緑生腦棠梨紅拆腮西湖花事動從此日徘徊無題風竹蕭蕭淡月明孤眠真箇可憐生不知昨夜相思夢去到伊行是幾更秋興數聲新雁夜初長曉起開門衣袂涼籬菊褪黃秋興懶瓦溝才試一䀶霜題二小姬扇慶娘顰翠眉春瘦怯羅衣笑問采花蝶如何成對飛湘湘未識羞獨坐抱箜篌貪學耆婆舞擡身拜部頭恭跋思陵宸翰拓本卷後淡黃越紙打殘碑盡是先皇御賜詩白髮內人和淚讀為曾親見寫詩時下塘二首河水新添三尺髙河邊蘆葦有龜巢波流夜夜飄魚箔空點籃燈照樹梢日出移船日又斜蘆根時復見人家水鄉占得秋多少岸岸紅雲是蓼花輦下酒市多祭二郎祠山神簫鼓喧天鬧酒行二郎賽罷賽張王愚民可煞多忘本香火何曽到杜康過平原故相宅拂曉官家簿録時未曾吹徹玉參差旁人不忍聽鸚鵡猶向雕籠喚太師以上菊礀小集齊東野語韓托胄久用事欲立竒功以固位首謀北伐出師諸將相繼潰敗金人渡淮圍楚州遣方信孺奉使通謝信儒回言金人欲太師首級托胄怒謀再用兵楊后俾榮王入奏復命史彌遠錢象祖衛涇王居安張鎡誅托胄時開禧三年十一月二日托胄愛姬三夫人號滿頭花者生辰張鎡移庖府中酣飲至五鼓其夕周筠聞其事遂以覆帖告變托胄已被酒叱曰誰敢遂升車而去甫至六部橋殿司夏震聲諾於道旁曰有旨太師罷平章事日下出國門語未竟健卒百餘人擁其轎出至玉津園夾牆內撾殺之西湖暮歸風荷百頃占漣漪煙樹冥濛乳燕飛買斷小舟休喚客暗穿萍葉載詩歸咸淳臨安志感懷漂泊南州又過年恰如杜子客鄜川酒堪度日難為醉詩怕傷時未可傳店舍無煙兵火後街坊有月試燈前荒涼古驛聞吹笛老淚縱橫落枕邊拜林和靖墓玉函香骨老雲根占斷孤山水月村薦菊泉香涵竹影種梅地冷帶苔痕生前已自全名節身後從誰問子孫惟有年年寒食日遊人來與酹清尊以上詩林萬選春詞鬭草歸來上玉階香泥微汚合歡鞋全籌贏得無人賞依舊春愁自滿懷貴耳集李熙輔題真空閣括蒼山上雲山好雲亦好可憐山下僧看雲不知老赤城志李迎迎字彥將濟源人通判明州有濟溪老人遺稿句籍甚人言易巳東陳振孫書録解題李迎彥將永嘉周浮沚先生之壻與先大父為襟袂集中有送先君子赴戊子秋試詩首句云云蓋先君治易故也朱鼐鼐字子大奉題周南仲正字所藏閻立本畫蘇李别少卿昔在河梁别執手踟蹰不能發萬古初傳五字詩努力相期在明德子卿海上氊為食故人朅來重相覿不覺看羊度歲年郤因射雁傳消息人間此是長别離少卿在虜子卿歸歸歟尚握漢臣節留者永衣胡人衣天長地闊半尺絹滿眼雲愁風景變一人仰叫頭脫冠一人橫涕褎著面閻君國相稱畫師未必想像能爾竒前身恐是胡婦子曾見兩公分袂時前賢小集拾遺陳炳炳龍泉人官提轄文思院有退菴集資福院平緑軒水屋圍春緑雲嵐送晚青無心向朝市信步到禪扃野境連天遠疏鐘隔岸聽杯行莫辭醉簷月笑人醒白髮流年迅青春盡日間煙消漁舍出風約櫓聲還往事空搔首微官秖強顔漂零那對此歸夢繞雲山至元嘉禾志柯夢得夢得字東海莆陽人屢上春官不第後以特科入仕有抱甕集陌上桑朝采陌上桑暮采陌上桑一桑十日采不見薄情郎正是吳頭桑葉緑行人莫唱江南曲見舊題壁小遲點筆醉還嗔畫斷蕭梁古佛塵今日重來應抵掌十年分付未逢人晚望無數寒鴉來遠鐘物華心迹偶然同不知海北江南路更有愁人立晚風以上前賢小集拾遺夢蝶一覺千年一轉機覺來還是夢還非當時夢裏知為蝶便好穿花傍水歸劉後村詩話吳伯凱伯凱字虞賓夏夜書所見吳牛見月喘引重不得休孤螢出露草意行淩九秋形大苦見役物微長自由世無漆園吏持問逍遙遊前賢小集拾遺鮑壄壄字份甫仰止亭昔年曾此戀青山幾度秋風入夢寒想得玉岑回合處夕陽依舊滿朱闌前賢小集拾遺李叔逹叔逹字頴士舟中聞木犀地近孤城水合流天風吹下廣寒秋巖花似喜幽人至先遣清香到小舟前賢小集拾遺馬并并淮南人金庭觀右軍學業隱林丘世隔年餘景尚幽苔鎖一泓殘墨沼雲遮三級舊書樓欣逢羽客開金闕快覩仙童侍玉旒自怪今朝脫肌骨飛身得向洞天遊剡録金嘉謨魚籪芒葦織簾箔橫當湖水秋寄言魚與蟹機穽在中流蟹略蔣廷玉廷玉字太璞淨剎碑上文難讀開山失所傳巖松秋落子石井下添泉地曠常多月廚寒不起煙昔年曾有虎來到寺門前前賢小集拾遺揚州一馬揚州路桃花幾樹花春光無揀擇淮地亦繁華日沸長江水風昏古壘沙爭雄舊時事君去莫思家揚州府志霍洞洞字太清武進人崇寧大魁端友從孫居城東梅坡自號筠寮宿田舍北風吹晴屋滿霜翁兒赤體悲無裳閨中幼婦飢欲泣忍飢取麻燈下績一身豈暇私自憐鳴機軋軋明窗前織成五丈布翁作襴裙兒作袴明朝官中催租急依然赤體當風立歲飢太守春遊呈以絶句朝來五馬去尋春誰信家家甑有塵枕藉道傍宜細問恐非芳草醉眠人以上咸淳毗陵志朱訔訔字介然采菊亭霜降草木落園菊發幽姿風流賢史君採掇欣忘疲雅尚已千載載詠間居詩佳處要領略坐見花隂移前賢小集拾遺張德象寄沈菊山八十乾淳老生涯半子虛久無朝士餽空有故人書詩道窮方進塵緣老盡除茫茫天壤闊誰復是知豫翰墨大全惠端方端方字敬之迪之子永嘉丞梅花美人在空谷抱志苦貞潔素衣飄白雲容色貶春雪臨風一笑粲皓齒何瑩徹破鏡忽上天寒影浸瑤闕前賢小集拾遺張道元金焦行次梁必大韻二山砥柱江流中下有水府之幽宫巨靈設此天險重怒濤欲起兩伏龍山光對面山淡濃朝暮雲起相過從鐘聲兩樣飄江風撞驚大夢醒塵胸海門茫茫直其東江山第一麗且雄六朝形勝留遺蹤天荒地老代不同登臨此地閲幾翁公獨硬語盤髙穹長江滔滔去不已千古名山占蕭寺白髮印公心水止嗟豫勞生竟何似人門平地風波起誰能釣舟煙波裏千年間限鐵臺址不如流芳向文字州縣之職徒勞耳丈夫封矦待時至以道事人直如矢豈但弦歌化州里人兮山兮有如此我願學者梁夫子金山志略費震次梁必大金焦行太倉一米梁魏中梵王坐處如天宫硨磲瑪瑙珊瑚重護法更有諸天龍醍醐浮香甘露濃我欲問訊當何從惟有一席西津風快哉八九雲夢胸海門直指扶桑東金鼇兩角爭豪雄蒜山房客送墨蹤妙高千偈佛印同衲衣玉帶知何在至今詩句撑蒼穹江山如畫人往巳雲霾浪打寺復寺華陽真逸曾至止鶴銘筆法蘭亭似老綸敗壁扶不起沙戶祈蠶修竹裏處士蝸牛空舊址留得名山作焦字年來俗事怕到耳神尻氣輿隨所至從渠烏兔走如矢白雲之鄉吾故里桑榆斥鷃安識此大鵬逍遙問莊子金山志略金遁初金焦行次梁必大韻江春淮水通吳中深有萬丈天吳宫珠樓貝闕知幾重魚身人面赤如龍紫雲赫奕青霞濃天帝下降百神從鮫鯨無端怒生風敕移三山填其胸曰躔月緯分西東戴鼇方知䇿強雄馬塵轍迹絶遊蹤仙境直與蓬萊同千濤萬浪插兩峰屹然對拱摩層穹金山蜿蜒勢未已焦山縈回藏古寺大覺仙聖所廬止人間畫圖那得似鏡銅摩青鳥飛起浮圖倒影澄波裏六朝陵闕存故址百戰功名數行字相去清風半帆耳此身未遊心已至君詩到手破的矢我詩刻畫慚下里三分之句豈辦此舉杯一酹問蘇子金山志略朱渙渙字濟仲蟻飲研槽歌晴窗棐几風日舒呼童汲水供蟾蜍涓流入研元頴濡一蟻蠢蠢爰來趨須臾十百與之俱前後有行不亂踰宛若徙穴舁腐餘想應燥吻脣頰枯清夢思欲吞江湖搖尾羞作涸轍呼奮迅恰如東海魚物生天地小大殊飢食渴飲皆同途矧爾有靈非至愚大槐南柯名利區一夢而覺驚幻虛爾其聽我母睢盱爾吭既沃腹既腴歸安其藏勿浪逋階前羣兒正嬉娛以指劃土糜爾軀題徐禮部家歸去來圖古木參天呌杜鵑春愁渾在夕陽邊看君此畫還三歎憶得西江上水船以上前賢小集拾遺項詵詵字宜甫便橋泊舟身寄一葉舟擾擾又行役不知寒襲人但覺酒無力霜剝岸石裂風激水波逆望眼浩無涯遠山相對碧前賢小集拾遺李清叟清叟縉雲人金庭觀山屬蓬壺第幾重竒峰翠岫繞靈宫雲藏毛竹深深洞煙起香爐裊裊風放鶴已歸天漢上養鵝無復小池中羽人盡得飛章法神與寥陽路暗通剡録蔡宰宰字仲平望洞陽歲事今無幾清霜苦見侵寒深落雁渚風急搗衣砧翠縠紋秋水斑綃纈霧林洞陽棲隱地樓觀白雲深前賢小集拾遺李謙謙字恭甫秋懷西風入商管衆木夜有聲候蟲竟何為聒聒終夕鳴彼亦有所思感此歲月征人生豈異適長嘯一拊楹敗壁鳴莎雞涼月照虛堂南鄰機杼聲熠熠燈火光遙聞誰家砧巳趣公子裳佳人在何許葉落山中霜前賢小集拾遺郭從範從範字世模烏衣啼碧煙障樓天欲暮飛烏夜絶蕪城戍雲外畢逋銜泥來月明腷膞同枝語樓中有人輟機杼玉笙怨咽凝江霧惆悵幽懷夜未闌桂樹秋風蘭葉露前賢小集拾遺歐陽光祖和朱文公九曲棹歌九首存一玉女峰臨二曲流刳心學道幾春秋東風不信心如鐵郤放石楠花滿頭武夷詩集趙民則題張家店壁舍䇿投牀睡便濃覺來涼葉動西風驚秋念遠無窮意客裏知誰此夜同誠齋詩話潘葛民葛民字子尚胡蝶花風光白日長胡蝶飛過牆飛飛不停去何忙牆外誰家菜花黃出門不知南陌路心隨胡蝶尋郎處前賢小集拾遺江朝宗朝宗括蒼人有詩名梅花小小人家短短籬冷香溼雪兩三枝寂寥竹外無窮思正倚江天日暮時剡録黃復之復之字幼張過臨平孤蹤逐浪萍幾度過臨平人語水相應帆移山倒行鷺飛秋嶼冷虹飲晚川明不是憑詩句丹青寫不成題扇面六言峽束天圍漸小林穿日腳微明竹居有徑誰掃水碓無人自鳴以上前賢小集拾遺楊冠上揚州太守古人肉食無遠謀腰錢騎鶴向揚州春風十里珠簾捲但看竹西歌吹樓天朝選用詩書帥上䇿公言須自治屏翰堅持保障功江淮益壯金湯勢北騎不敢縱南牧關塞煙迷芳草緑健兒歌舞樂升平一曲梅花細栁營揚州府志李大方大方字允蹈豸之孫句三百年來今幾秋天地自老江自流笛聲吹起白玉盤正照御前楊栁碧可憐一代經綸業不抵鍾山幾首詩後院落花人不到黃鸝飛下石榴隂詩人玉屑楊誠齋云李方叔之孫大方字允蹈晚得一鶡冠今為雜買場寄豫詩一編多有警句鄭天錫天錫字景輔江西宗𣲖西江一水活春茶寒谷春燈夜撥花人比建安多作者詩從元祐總名家宫商迭奏弦邊雁鼓吹都慚井底蛙身在天南心太史幾番搔首夕陽斜前賢小集拾遺宋詩記事卷六十
