body:
  text: 宋詩紀事卷四十七錢塘厲鶚撰楊由義由義字宜之開封人避地鹽官與漕薦不第以父奉直恩補右階監贍南軍庫隆興初以閣門祗候使金不屈而還孝宗嘉歎纍遷太府卿兼刑部侍郎徽國朱文公曾受業焉弔王忠肅名稟靖康時堅守太原城陷父子同赴水死太原城下屹行宫雲樹蘢蔥掩碧空鐵馬無聲汾水急滿天風雨泣英雄海寧縣志李浩浩字德逺臨川人紹興十二年進士孝宗朝歷官直寶謨閣知靖江府召還擢權吏部侍郎旋豫祠除祕閣修撰帥夔部卒贈集英殿修撰東西船行東船得風帆席髙千里瞬息輕鴻毛西船見笑苦遲鈍汗流撑折百張篙明日風翻波浪異西笑東船卻如此東西相笑無巳時我但行藏任天理合璧事類外集述陂在臨川縣數椽臨蒼波我目得以寓長溪山根來澄潭一回互萬象森可掬翛翛淡清素草短牛羊飢沙暖鳧鶩聚枯槎自斷岸孤艇橫野渡荒寒何代城隱翳尚門户昔時歌舞地今日採樵路回薄萬古心斜陽在煙樹出疏山忙中安得此身間杖策西風自往還今日巳償雲水債籃輿帶雨下疏山以上撫州府志陳知柔知柔字體仁號休齋永春人紹興十二年進士知循州徙賀州萬年寺古寺來投宿雲巖第幾層有詩堪供佛無事且依僧小閣泉喧枕修廊雨暗燈好峯看未足幽夢幾回登天台山志九日宴蓮花峰多病登臺今古情菊花搖動午涼生山前木落石巖出海上潮來秋渚平野興巳隨芳草逺歸鞭更傍落霞明愧無十丈開花句獨卧禪房心自清南安縣志魏杞杞字南夫夀春人徙居鄞紹興十二年進士孝宗朝纍遷宗正少卿拜參知政事尚書右僕射兼樞密使出知平江府卒贈特進諡文節有山房集送左彥武歸鄉折桂歸來日西風萬里秋錦衣天上客紅葉渡頭舟把酒難為别題詩更欲留明朝山水隔何日是重逰寧國府志李庚庚字子長臨海人紹興十二年進士歷官監察御史知袁州有集號詅癡符樓大防序云海邦貨魚于市者夸詡其美謂之詅魚字書以為詅衒賣也顔黃門之推家訓曰吾見世人至無才思自謂清華流布醜拙亦已衆矣江南號為詅癡符公之意蓋出于此特謙詞耳畫扇睡起小樓春又殘半埀雲袖傍闌干楊花飛過秋千索一陳東風作曉寒前賢小集拾遺劉珙珙字共父忠顯公韐孫忠定公子羽之子紹興十二年進士孝宗朝纍官同知樞密院事知建康府江東安撫使行宫留守進觀文殿學士卒贈光祿大夫諡忠肅帥潭日勸駕詩十載湘江守重來白髮垂初無下車教再賦食蘋詩天闊摶鵬翼春融長桂枝功名儻來事大節要堅持詩人玊屑送元晦翩翩雙黃鶴結巢相因依一為天風便矯翮西北飛歲華及晼晚霜露侵征衣此行亦良苦千里以為期堂上玄髮親榮祿當及兹人生會有役不復情凄洏徘徊都門道欲語行且遲念子抱孤桐窈窕弦古詞清商奮逸響激烈有餘悲不辭彈者勞正恐知音稀知音何足貴我顧不可追翰墨大全留正正字仲至泉州永春人居惠州紹興十二年進士孝宗朝拜右丞相光宗即位進左丞相寧宗朝終少保觀文殿大學士封魏國公卒贈太師諡忠宣中興編年慶元偽學之禁凡五十九人宰執四人趙汝愚留正王藺周必大待制以上十三人朱熹徐誼彭龜年陳傅良薛叔似章穎鄭湜樓鑰林大中黃由黃黼何異孫逢吉餘官三十一人劉光祖吕祖儉葉適楊方項安世李德沈有開曾三聘遊仲鴻吳獵李祥楊簡趙汝談汝譡陳峴范仲黼汪逵孫元卿袁夑陳武田淡黃度張體仁蔡幼學黃灝周南吳柔勝王厚之孟浩趙鞏白炎震武臣三人皇甫斌范仲任張志逺士人八人楊宏中周端朝張道林仲麟蔣傅徐範蔡元定吕祖泰必具鄉貫三代名銜謂之腳朝野類要初入仕色崇觀間當書云不係元祐黨籍紹興間即云不係童蔡朱王等親屬慶元間加不是偽學方與銓除羅浮天漢橋霏霏細雨濕芝田短短桃花照水妍可惜洞門關不盡彩虹天外著飛泉惠州府志史浩浩字直翁鄞縣人紹興十五年進士孝宗朝纍擢中書舍人翰林院學士知制誥歷右丞相封魏國公進太師卒追封會稽郡王諡文惠嘉定中改諡忠定封越王配享孝宗廟庭有鄮峰真隱漫録淳熙丁酉九月丙辰宣召錫宴澄碧殿抵暮送以金蓮燭宿玊堂直廬應制古詩三十韻季秋中浣日淳熙隆四祀朝回攬轡間中使俄傳旨少頃日轉申宣詔陪燕喜預令掃玉堂深夜備棲止悚懼跽承命鳴騶亟穿市綘闕聳皇居非煙常靡靡入自東華門熊羆森爪士詔許乘肩輿安徐無跛倚復古距選德相望幾數里修廊接雲漢岧嶤璨珠蘂中途敞金扉恍若蓬壼裏羣山擁蒼璧四顧環弱水山既日夕佳水亦湛無滓冰簾映綺疏瓊殿中央峙澄碧耀宸奎龍神爭守視蹈舞上丹墀天威不違咫奉觴祈萬夀時蒙一啓齒餘波丏鼠腹酒行不知幾徘徊下瑶席緩步煩玊趾從逰至清激錫坐談名理泉聲韻琴瑟一洗筝笛耳皇云萬機暇觀書每來此論道及帝王直欲齊其軌堯舜禹湯文前身無乃是臣言匪獻諛道實由心起既然明是心要在力行爾登橋釂餘罍餘興未容巳金蓮引雙燭再拜離階戺玉音寵諭臣此會宜有紀歸途感恩榮占寫忘骫骳青櫺子羽幰新從帝所回餘歡未盡玳筵開醉拋青子香泥上留與仙家取次栽恭和御製翠寒堂詩禁籞蔥蔥擁瑞雲雄樓傑閣環金碧花光草色媚芳辰鳯輦舂容惟所適中有虛堂玉作楹冰雪玲瓏周四壁不知跬步是瑶臺何須八駿殷勤覓青松萬古拱簷牙生香不減芝蘭室更欲相看飽歲寒疏梅瘦竹為三益吾皇土木未嘗興為詢此景從何得神運元從德夀來天成豈假人工役進明堂慶成詩六閲淳熙祀秋髙日仲辛大君敷渙號重屋薦明禋玊輅興清廟龍旗旦紫宸雲隂連夜解霽色一朝新周禮樽罍備虞韶樂舞陳合宫天地並侑席祖宗均峻墄登三獻修楹秩百神肅祗申睿意肸蠁降髙旻宣室宜膺福慈闈亟拱宸篸花馳萬騎歸胙見雙親釐事超隆古年齡肇億春蓼蕭覃有截成命播無垠惠餕朌羣后恩波逮老臣祝堯非健筆徒學華封人江倅出家樂沈沈春酌話綢繆花月行船看拍浮手束柔荑調雁柱袖翻紋錦出香毬未攀青子猶如豆欲膾赬鱗始上鉤蓬島古來無覓處我曹今此得真遊遊雨花臺試扶鳩䇿上煙霞尚想當年天雨花潮熟野航歸别浦雪乾宿鷺點晴沙髙連西竺三千界俯眺南陽十萬家更欲雲開窮逺目鬱蔥起處認中華以上鄮峯真隱漫録王淮淮字季海金華人紹興十五年進士纍官翰林學士孝宗朝拜右丞相兼樞密事薨贈少師諡文定題福祐王廟在蘭溪苧峰之巔祀楚亞父范增關中失鹿人爭逐一去鴻門不可尋千古英雄死遺恨封侯廟食亦何心湧幢小品莫濟濟字子齊吳興人紹興十五年進士甲戍中宏詞科官祕書次韻梁尉秦碑并序秦會稽石刻唐人如張守節司馬貞皆嘗援以證史記紹興初舅氏姚令威刪定登山弔古見碑石猶存後二十餘年分教是邦以語簽判王龜齡勉邑尉梁君求之則石巳缺字不可見矣以詩記其事龜齡既賡之以濟首發其端書以示濟按會稽秦頌德碑凡二百九十六字視秦世泰山之罘諸刻獨此碑字為最多唐李嗣真云斯小篆之精古今妙絶秦望諸山及皇帝玉璽猶千鈞強弩萬石洪鐘豈徒後學之宗匠亦是傳國之遺寶周越法書苑獨載封禪碑數十字而巳至歐陽公趙德父集録天下金石遺文殆盡亦不復有秦望山碑姚令威紀鵝鼻山頂石屋所插一碑今古屋故在碑蓋無有梁次張所模片紙指為秦碑乃在何山其去鵝鼻尤為隔絶盡記夲末以俟後之君子六王失國四海歸秦皇東刻南巡碑法因史籀有增減名與蒼頡爭飛馳自言功德可歌頌黔首箇箇愚無知海神何故獨拒命風濤塞路蟠蛟螭羣臣諂佞仙藥逺死生治亂分兩岐山靈不可守碑記片段應作龜牀支陵谷雖存世代異耳目雙被誕者欺只餘紙夲落人世千古遺臭東南崖我聞秦望最髙峻城域所見非昔時何山距縣四十里符合傳記壯且竒衆峰乃是子孫行古木幾換蛟龍枝指東作西未足怪父老流傳從小兒政如塗山玊帛會漫不可考歲久之梁君吏隱年甚少鬱鬱寸角初解麋裹糧挈榼訪古迹氣味蕭散如分司忽聞片石在絶頂小篆無乃斯翁為手披荆棘訶虎兕拄杖直叩山頭皮糢糊豈復有字畫此物及見秦亂離當時威勢振天下不言慘毒民嗟咨乘輿所至為刀鋸方嶽何暇安禮儀關中屢棄百二險歷數浪指億萬期君臣乃爾自賢聖鯁論不復相瑕疵陳迹安知百世後樵夫牧子笑脫頤興亡俄頃三嘆息撫掌重閲太史辭假使玉筯餘筆畫文過其實世所嗤早知金石不可恃相君應悔燔書詩雲門志略鄭耕老耕老莆田人紹興十五年進士國子監簿分教四明句開懷溪一曲養拙屋三間題木蘭溪書堂興化府志湯思退思退字進之青田人紹興十五年中宏詞科歷相兩朝官至特進觀文殿大學士左僕射封岐國公隆興初責居永州卒詠石僧雲作袈裟石作身巖前獨立幾經春有人若問西來意默默無言總是真湖海新聞宋髙宗一日坐寢殿湯丞相思退侍立上曰卿家處州有何異迹思退曰臣鄉有石僧題詠云云遂大稱旨夲無此詩徹夜遣人歸刻石石僧之旁句虞妃從梧野啓母祔稽山二老堂詩話湯岐公顯仁皇后挽詩云云顯仁初以賢妃從徽宗北狩其後祔葬徽宗永祐陵虞妃為徽宗也啓母為髙宗也用事可謂的切林仰仰字少瞻候官人紹興十五年進士終朝奉郎桃源洞深樹冥冥一徑風溪流應與十洲通仙家日月無人識只愛桃花三月紅天台山志鄒定定字應可奉新人紹興十五年進士官奉議楊誠齋云定詩上遡山谷以入少陵戶牖過杜工部祠疇昔哦詩憶耒陽兹因奉檄過祠堂一生忠義孤吟裏千載凄涼古道旁自是風霜侵病骨非干牛酒涴詩腸明朝解纜秋江上問訊先生一瓣香詩人玉屑汪大猷大猷字仲嘉思溫之子紹興十五年進士官至吏部侍郎兼權尚書慶元中進敷文閣學士與甥陳居仁樓鑰並居翰苑人稱舅甥三學士有適齋存稿和薑梅山投分雖深迹卻疏君居東婺我西湖兒曹方喜承毛檄父執應容教鯉趨慨念舊遊多宿草舊同官六十餘人今惟大猷與公獨存僅餘二老見霜鬚詩來喚起相思夢又向梅山得楷模鄞縣志楊偰偰字子寬崞縣人居臨安和王存中之子紹興十五年進士仕至權工部侍郎紹興己已遊洞霄青山九鎖隔凡緣福地潛通小有天古洞落花春寂寂空山亂石水涓涓金丹翠箬藏千歲芝草琅玕定幾年惆悵何時謝塵事山中長作地行仙洞霄詩集王剛中剛中字時亨樂平人紹興十五年進士孝宗朝纍官禮部尚書端明殿學士同知樞密院事卒贈光祿大夫諡恭簡有東溪集彌牟鎮八陳圖我稽八陳圖規模載方册朅來鎮西川夔門觀壘石賦詩數百字字字究來歷進涉漢川西彌牟鎮之北平原列堆阜灘石同一式細思作者意孔明有深䇿高岸或為谷灘石存遺迹滄海變桑田平原猶可覓故令兩處存千載必一得再歌遂成篇當有智者識成都文類楊汝南汝南字彥侯龍溪人紹興十五年進士初調贑州教以薦知古田縣夜宿龍頭江流如箭路如梯夜泊龍頭煙靄迷兩角孤雲天一握曉光不覺玊繩低漳州府志黃徹徹字常明莆田人紹興十五年進士官辰州有䂬溪詩話句但遣一枝居巧婦不殊大厦供嘉賔䂬溪詩話豫題友人居云云蓋用爾雅注鷦鷯俗呼巧婦炙轂子雀一名嘉賔圓冠思得多于鯽刻木惟冝少似彪䂬溪詩話北夢瑣言載江陵在唐世號衣冠藪澤琵琶多如飯甑措大多如鯽魚退之酬崔少府伊陽詩云下言人吏稀惟足彪與虥余官辰溪時士人皆可喜而不多得近城人虎雜居戲為對云鄭伯熊伯熊字景望永嘉人紹興十五年進士纍授太子侍讀宗正少卿諡文肅有集赤城志鄭伯熊為黃巖尉人呼為石蓮縣尉以其年少而堅不可磷也枕上飄風不崇朝驟雨不終日清寒入絺綌御夾有餘鬱天時不能調人事那可必清燈耿孤窗萬籟助飀飄憂愁從中來起坐髮屢櫛丈夫屬有念功名乃餘物突兀萬間屋此意何時畢長吟答寒螿四壁轉蕭瑟東甌詩集周麟之麟之字茂振海陵人紹興十五年進士中宏詞科擢知制誥翰林學士終于知樞密院事有海陵集以珠子香建茶寄皖公山馬先生筠谷珠璣北苑春寸誠千里託靈芬為投白鹿岩前客何日容分半席雲海陵集董德元德元字體仁永豐人少魁鄉舉纍試禮部不第就特奏名補文學初任寧逺簿復預漕司薦紹興戊辰試禮部合格遂為第一秦檜援引至參知政事檜死以言章罷歸廬陵登第報家人御筆封題墨未乾君恩重許拜金鑾故鄉若問登科事便是當初老榜官獨醒雜志廬陵之俗謂特奏名為老榜初體仁既預漕舉謁一逹官干東上之資逹官語坐客有老榜之語體仁頗不能平故其詩及之尤袤袤字延之無錫人紹興十八年進士纍遷樞密院正兼左諭德孝宗朝進權禮部侍郎直學士院光宗朝除禮部尚書卒諡文簡嘗取孫綽遂初賦以自號光宗書扁賜之有遂初小稿梁溪集方萬里跋宋中興來言詩必曰尤楊范陸誠齋時出竒峭放翁善為悲壯公與石湖冠冕佩玉度騷婉雅落梅清溪西畔小橋東落月紛紛水映紅五夜客愁花片裏一年春事角聲中歌殘玊樹人何在舞破山香曲未終卻憶孤山醉歸路馬蹄香雪襯東風劉屯田墓壯節亭劉名渙字凝之西澗當年卜考槃便于神武挂衣冠後生無復知前輩故老猶能説長官三尺荒墳埋玉冷百年壯節倚天寒表章賴有羣賢力誰把生芻奠一餐玉簪花一名鷺鷥一種幽花迥出塵孤髙恥逐豔陽辰瑶枝巧插青鸞扇玉蘂斜攲白鷺巾難與松筠爭嵗晚也同葵藿趁時新西風昨夜驚庭緑滿院清香惱殺人送吳待制守襄陽待制名環吳琚之弟髙宗吳后之姪方持紫橐侍西清忽領雄藩向外行誰謂風流貴公子甘為辛苦一書生詞源筆下三千牘武庫胸中十萬兵從此君王寬北顧山南東道得長城以上梁溪遺稿淮民謡東府買舟船西府買器械問儂欲何為團結山水寨寨長過我廬意氣甚雄粗青衫兩承局暮夜連句呼句呼且未巳椎剝到雞豕供應稍不如向前受笞箠驅東復驅西棄郤鉏與犂無錢買刀劍典盡渾家衣去年江南荒趁熟過江北江北不可往江南歸未得父母生我時教我學耕桑不識官府嚴安能事戎行執槍不解刺執弓不能射團結我何為徒勞定無益流離重流離忍凍復忍飢誰謂天地寬一身無所依淮南喪亂後安集亦未久死者積如麻生者能幾口荒村日西斜破屋兩三家撫摩力不給將奈此擾何三朝北盟會編紹興三十一年金人傾國而入寇嘗以淮南置山水寨擾民泰興縣令尤袤竊哀之作淮民謡庚子歲除前一日逰茅山犯寒出行邁值此歲云除剛風駕飇輪送我逰清都華陽第八天仙聖之所居洞房劣容人中寬如室廬橫前大溪水于焉限塵區其右萬石林錯落空翠圖茅菴著深秀細路緣﨑嶇幽泉見客喜頗亦類逃虛山深日易曛捷徑趨元符琳宫照金碧天籟鳴笙竽側睨白雲峰前瞻赤沙湖金壇聳百丈隂洞通七塗俯視人間世擾擾真蟲蛆早以卑陋質沗分赤城符豈悟夙昔緣復造神霄墟平生夢寐處恍若登華胥歸來拜緑章足力尚有餘珍館十六所安能遍遨娛窮探恨不盡太息仍躊躇茅山志逰張公洞并序舟次湖洑侍季父伯兄逰洞靈步行五里夾道皆喬木參天鶴巢其上若咳澗水㶁㶁鳴聲甚悲殆不類人間也入洞靈宫覽前賢留題徘徊久之由石徑里許逹于洞深數十丈磴道險絶俯僂僅可下下寬廣容數百人大石離立或下聳欲落若劒盾矛戟相撑拄或甍連崛起而不斷若虎豹蹲伏俯踞而拿攫中有小門持炬乃得入丹竈井臼在焉由石罅而上皆亂石怪形無窮其狀旁行屈曲益深逺不可到其陽有懸崖滴乳水水流澗谷乍細乍大自成宫商橫澗得小閣可憩朱藤纒絡崖上丹花簌簌下墜芬芳襲人毛髮凛然欲少留而大風作遂歸余逰名山多矣兹遊最可紀因成五百字貽我同志以備他日觀覽焉吾聞荆溪南有地仙所宅十年勞夢想今日著腳歷扁舟下湖洑水漲投沙磧結纜小橋旁杖藜從此適平岡面陂陀疊嶂堆襞積行行兩三里夾道喬木植其大幾合抱其髙乃千尺風生萬壑響日照四山赤時搖樹林杪忽見屋宇脊宫門何峥嶸古道頗修直長廊景曀曀崩殿人寂寂寥落昔賢題摩挲壁間墨捫蘿上層巔俯瞰得深窟危梯交枝撑鳥道穿詰屈投身乍寬間局步仍逼窄攀援愁顛躋傲睨驚險僻懸崖朵頦頷亂石拱劒戟白雲何時橫乳溢或自滴正中空􅐓洞了不見天隙冥行迷近逺傴僂猶擲埴巉巖豈人工隱軫入地胍忩幽或篝火俯跪僅容席仙壇尚故處丹竈儼遺迹山蟲鳴咿嚘野鼠聲嘖唶傳聞老父語以往真莫測中有白玉堂橫絶巨石塞傍連洞庭野欲去不可極潛窺目先旋縱走膝無力邅回步仄徑突兀出峭壁樅風髙枝樛藤蔓青隂羃芳草何芊綿丹花亦狼藉躊躇古亭上俯仰幽澗碧丁當下流水磊磈欲落石雖云培塿高氣與嵩華敵其南有空穴淡瀩殷幽黑隂風訝谷吐冷氣森噴逼蛟龍久伏藏金玉閟簡册靈蹤信茫昧幻怪紛慘戚將無神物守欲與世壤隔平生丘壑志早歲泉石癖豈不思三山所恨無六翮樂哉兹晨遊逸興潛有激仙翁在何許緑髮尚如昔髣佛笙簫聲徘徊鸞鶴翼俗緣磨不盡塵境坐形役何當築衡茅幽討窮日夕風雨西北起天地忽改色倉皇促歸斾造物豈戲劇良遊易乖忤真賞難再得寄語山中人重來儻相識荆溪外紀重登斗野亭在江都邵伯鎮梵行院之側野色涵空濶平蕪接渺瀰江淮天設險星斗地分維喬木千年意滄波萬古悲老僧猶好事見客索題詩揚州府志題米元暉瀟湘圖萬里江天杳靄一村煙樹微茫只欠孤篷聽雨恍如身在瀟湘淡淡曉山橫霧茫茫逺水平沙安得緑蓑青笠往來泛宅浮家郁氏書畫題跋記句去年江南荒趁逐過江北江北不可往江南歸未得無題胸中襞積千般事到得相逢一語無寄友人送客漸稀人漸逺歸途應減兩三程台州秩滿歸後村詩話雍有容有容字德裕資州盤石縣人紹興十八年進士富樂山在巴西縣東昭烈自荆州入蜀劉璋延之于此山望見蜀之全盛飲酒樂甚故得名當時四海一皇叔至此巳堪悲失腳出語翻為樂國想是人止可偏方著大漢曾封隆準翁聞道山河錦繡中安能鬱鬱久居此睥睨三秦日欲東方輿勝覽陳天麟天麟字季陵宣城人紹興十八年進士纍官集賢殿修撰歷知饒州襄陽贛州鎮江有攖寧居士集登上嶺逰黃山朝陽滉漾水朦朧曉煙橫抹天微風三十六峰不著色點綴淡墨排秋空小山連延大山倨林深無人但雲樹平生愛山真成癖我以意行夲無住黃山之路何敧危黃山之溪何漣漪登山度水亦勞止正要行役發吾詩仙家與世不相逺徑入桃源亦良便向來父老亦嘗行竹籜桃花大于扇黃山志石壁道中雲山疊疊石齒齒山色溪聲三十里霜餘木葉半丹青道上松風雜宫徴捨車而徒度險艱邇來趼足愁躋攀官間無祿與王事不妨拄杖對潺湲旌陽道中山邑無郵傳農夫半甲兵石樓橫斷岸草徑入荒城聞道甘泉駕將臨細桞營風塵何日靜留眼看升平勝因寺山行詰曲到禪林臺殿丹青歲月深薄晚春寒生几席逼人空翠撲衣襟客塵冉冉凌清思俗狀紛紛費苦吟若得一丘容我老便攜藜杖事幽尋風玉亭夜聞騷屑此君語晨起急登風玊亭一笑相逢珍重别不隨人改舊時青以上寧國府志吕城舟行晚晴楊桞隄長月一灣芙蓉花小蓼初斑孤帆白鳥無邉水殘日斷雲何處山逺客自應歸興動新詩都在晚晴間功名有底催人去只合漁樵作往還宛雅葉衡衡字夢錫婺州金華人紹興十八年進士孝宗朝拜右丞相兼樞密使責授安德軍節度使郴州安置復官與祠句水花分塹弱山木抱雲稠更宿招提境還同惠逺逰鹿田寺集杜謝翺金華遊録石才孺才孺字伯元鄭州管城人紹興十八年進士青陽驛在順政縣東幸蜀奔波為祿兒聞鈴夜雨有餘悲青陽一夕難髙寢黼幄千官減盛儀方輿勝覽莫汲汲字子及吳興人濟弟紹興十八年進士為學官以言獲罪南遷石龍談鑰吳興志莫磻字彥輔君陳之子有子曰伯鎔字器之年五十即歸休以迎師教子為事子三人曰濟曰汲曰沖皆有峻聲擢進士第時號三莫後濟沖又中博學宏詞科石龍泛海作一帆點破碧落界八面展盡虗無天柁樓長嘯海波闊今夕何夕吾其仙齊東野語石龍地並海子及素負邁往之氣暇日具大舟招一時賔友之豪泛海以自快將至北洋海之尤大處也舟人畏不敢進子及大怒脅之以劒不得巳從之及至四顧無際浪涌舟掀簸如桔橰見三魚皆長十餘丈浮弄日光衆皆戰栗不能出語子及命大白連酌賦詩數絶興盡乃返芮曄曄字國器一字仲蒙烏程人紹興十八年進士歷官御史司業祭酒卒吕東萊再娶乃其女也董斯張吳興備志芮國器官左從郎仁和縣尉嘗和沈長卿牡丹詩云寧知漢社稷變作莽乾坤秦檜惡之坐竄化州檜死始召還從沈文伯乞娑羅樹碑楚州淮隂娑羅樹霜露榮悴今何如能令草木死不朽當時為有北海書荒碑雨侵澀苔蘚尚想墨夲傳東吳容齋四筆題鶯花亭人言多技亦多窮隨意文章要底工淮海秦郎天下士一生懷抱百憂中後村詩話秦少逰常謫處州後人摘柳邉沙外詞中語為鶯花亭題詠甚多羅浮寶積寺木落天寒山氣沈年華客意共蕭森偶于佳處發深省其實宦逰非夲心紅日坐移鐘閣影白雲間度石樓隂還家莫話神仙事老不寬人雪滿簪瀛奎律髓芮輝輝字國瑞國器弟同登紹興十八年進士仕至尚書更戴溪亭為興盡亭仍賦詩溪山之興無時盡興盡名亭意可知出岫孤雲含細雨投林宿鳥愛深枝風流已是十年事公案今成七字詩短棹悠然隨所適人生出處要如斯剡録宋詩紀事卷四十七
